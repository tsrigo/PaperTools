name: Bug Report
description: Report a reproducible PaperTools bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, private papers, or production logs containing secrets.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Commit SHA, branch, or release.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands and sanitized inputs.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or status files
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed API keys, tokens, and private data.
          required: true
