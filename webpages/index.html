                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体的方法论研究**。论文提出了SkillSynth框架，核心目标是解决终端智能体(terminal agents)训练中高质量执行轨迹稀缺的问题，通过技能图(skill graph)来控制和生成多样化的训练任务。\n\n**第二步：正面指标分析**\n\n论文明确包含我的核心关注点：\n1. **单智能体(Agentic)**: 论文明确提到训练\"terminal agents\"和提升其\"agentic capabilities\"，这是典型的构建智能体的研究\n2. **多智能体**: 使用了\"multi-agent harness\"来实例化任务，虽然这里的harness是用于任务生成而非智能体间的协作博弈，但这表明涉及多智能体机制\n3. **智能体能力**: 关注终端智能体的自主命令行执行能力，属于智能体的规划与执行能力范畴\n\n**第三步：排除标准检查**\n\n- **非演化型应用**: ❌ 不适用。论文不是将已有智能体应用于特定领域，而是提出新的智能体训练方法\n- **非Agentic推理**: ❌ 不适用。论文明确研究终端智能体的能力提升\n- **基础设施**: ❌ 不适用\n- **安全相关**: ❌ 不涉及\n- **多模态与视觉**: ❌ 不涉及\n- **图相关技术**: ⚠️ 涉及技能图，但这里的图是用于任务合成的方法工具，而非图神经网络或知识图谱推理，是可接受的\n- **多智能体拓扑与编排**: ⚠️ 论文使用multi-agent harness，但这是作为任务生成工具，并非研究多智能体系统的协作机制或拓扑结构\n\n**第四步：特殊处理**\n\n这篇论文属于\"构建智能体\"的范畴——它提出了SkillSynth框架来生成训练数据，最终用于训练出更强的终端智能体(Hy3 Preview)。虽然核心贡献是任务合成方法，但其目标是构建和改进LLM智能体，符合我的研究范围。\n\n**结论**\n\n论文的核心贡献是提出SkillSynth框架，通过技能图采样和多智能体harness来合成终端任务，以提升智能体的训练效果。这直接服务于\"构建和改进LLM智能体\"的核心目标，属于我筛选范围内的研究。",
                    "intro_logic": "1. Terminal agents 以 CLI 作为通用 action space，能够在真实计算系统中执行复杂、长程任务，因此具有很强的 autonomous command-line execution 潜力。\n\n2. 但 terminal agents 的能力提升受到核心瓶颈限制：缺少 high-quality、diverse execution trajectories 用于训练。\n\n3. 手工构造 executable terminal tasks 成本高、难度大、难以规模化，因此近期研究转向通过 synthetic terminal task instances 来大规模收集训练轨迹。\n\n4. 仅仅增加 task instances 的数量并不等同于获得有效训练数据；关键在于这些任务能让 agent 在执行过程中经历怎样的 execution trajectories。\n\n5. Terminal agent 的执行过程不是一次性规划完整环境，而是在 partial observability 下逐步交互：它会依次进入一系列 intermediate scenarios，并在每个 scenario 中应用某个 skill 推进任务。\n\n6. 因此，一条有训练价值的 execution trajectory 同时由两个维度决定：它 traverses 哪些 scenarios，以及它 exercises 哪些 skills。\n\n7. 训练 terminal agents 的本质，是让模型学会在多样化的 partial scenarios 中选择并应用合适的 skills；所以训练数据必须同时覆盖 diverse scenarios 和 diverse skills。\n\n8. 现有 task synthesis 方法主要关注扩展 task 数量或 domain coverage：一类依赖 LLM-generated taxonomies，可能偏离真实使用；另一类基于 GitHub repositories 或 buggy environment inversion，通常局限在 software-engineering 场景。\n\n9. 这些方法虽然能生成更多 tasks，但对最终 execution trajectories 的 scenario composition 和 skill composition 缺乏显式控制。\n\n10. 结果是，许多合成任务在执行层面产生高度重叠的 scenarios 和 skills，导致训练轨迹冗余，无法充分提升 agent 的泛化能力。\n\n11. 因此，问题的核心不再是“如何合成更多 terminal tasks”，而是“如何合成能够显式控制并提升 execution trajectory diversity 的 terminal tasks”。\n\n12. 研究问题：How can we synthesize scalable terminal task instances while explicitly controlling the diversity of scenarios and skills that terminal agents experience in their execution trajectories?",
                    "core_insight": "下面我把这篇论文的“灵光一闪”拆成三层：**核心认知突破 → 方法论推导 → 实现中的试错与调整**。\n\n---\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n**作者真正意识到：terminal task synthesis 的关键不只是“生成更多任务”，而是要显式控制 agent 在训练中经历的“scenario–skill 轨迹分布”；而 terminal 任务的执行轨迹可以被抽象为一条由 scenario 节点和 skill 边组成的路径。**\n\n换句话说，论文的 seed insight 不是“我们要合成更多 terminal tasks”，而是：\n\n> **terminal agent 学到的不是孤立任务本身，而是在不同 scenario 下选择并执行合适 skill 的能力；因此 synthetic tasks 应该从可控的 scenario–skill workflow paths 中生成。**\n\n---\n\n### 原文证据 1：agent 执行过程本质上是 scenario 与 skill 的交替\n\n论文在 Introduction 中明确指出：\n\n> “During execution, a terminal agent does not plan over the entire environment in a single shot. Instead, it acts through step-by-step interaction with a sequence of intermediate _scenarios_, applying a _skill_ at each scenario to make progress.”\n\n这句话是整篇论文的核心认知基础。\n\n作者观察到，terminal agent 并不是一次性理解完整环境、一次性规划到底；它是在局部状态中不断做决策。每一步它面对的是一个 **scenario**，然后调用某个 **skill** 去推进环境状态。\n\n因此，terminal trajectory 不是简单的 command 序列，而是：\n\n> scenario → skill → scenario → skill → scenario …\n\n---\n\n### 原文证据 2：训练数据的价值取决于 scenario 和 skill 两个维度的覆盖\n\n论文继续说：\n\n> “An execution trajectory is therefore jointly characterized by two dimensions: the scenarios it traverses and the skills it exercises.”\n\n以及：\n\n> “Training terminal agents thus amounts to learning to apply appropriate skills across diverse partial scenarios, which in turn requires trajectories that are diverse along both dimensions.”\n\n这就是作者区别于已有工作的关键点。\n\n已有工作主要在扩大 task 数量或 domain 数量，但作者认为这还不够。因为即使任务很多，如果 agent 实际经历的 scenario 和 skill 高度重复，训练信号仍然贫乏。\n\n---\n\n### 原文证据 3：已有方法缺乏对 execution trajectory diversity 的显式控制\n\n论文批评已有方法时说：\n\n> “These approaches provide limited explicit control over the scenario or skill composition underlying the resulting trajectories.”\n\n又在 Abstract 中说：\n\n> “Existing approaches mitigate this bottleneck by synthesizing large-scale terminal task instances for trajectory sampling. However, they primarily focus on scaling the number of tasks while providing limited control over the diversity of execution trajectories that agents actually experience during training.”\n\n也就是说，作者认为之前的 synthetic task generation 关注的是：\n\n- task 数量；\n- domain 覆盖；\n- repo/environment 多样性；\n\n但没有显式控制：\n\n- agent 会经历哪些 scenario；\n- agent 会练习哪些 skill；\n- scenario 和 skill 如何组合成 workflow。\n\n这就是论文的认知突破。\n\n---\n\n### 原文证据 4：scenario-mediated skill graph 是自然的表达方式\n\n作者在 Abstract 中给出方法的核心：\n\n> “SkillSynth first constructs a large-scale skill graph, where scenarios serve as intermediate transition nodes that connect diverse command-line skills.”\n\n以及：\n\n> “By grounding task synthesis in graph-sampled workflow paths, SkillSynth explicitly controls the diversity of minimal execution trajectories required to solve the synthesized tasks.”\n\n这说明作者的洞察不是停留在分析层面，而是直接导向了一个结构化生成框架：\n\n> 把 skill 看成从 precondition scenario 到 postcondition scenario 的 transition；  \n> 把 scenario 看成连接不同 skills 的中介节点；  \n> 然后从图中采样 path 作为任务的 workflow skeleton。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这篇论文的方法几乎是从上述洞察一步步自然推出的。可以把推理链条还原如下。\n\n---\n\n### Step 1：terminal trajectory 应该被语义抽象为 scenario–skill sequence\n\n论文在 Problem Formulation 中写道：\n\n> “low-level trajectories ζ consist only of fine-grained observations and actions, obscuring the high-level strategy the agent applies during execution.”\n\n因此，作者引入两个抽象：\n\n> “A _scenario_ σt ∈ Ω is a decision-relevant abstraction of the observation at a decision point of execution…”\n\n以及：\n\n> “A _skill_ κt ∈ K is an action subsequence applied at one scenario that produces a predictable transition to the next…”\n\n这一步非常重要。\n\n它把原本难以控制的 terminal command trajectory 提升为一个高层语义结构：\n\n```text\nscenario σ0\n  → skill κ1\nscenario σ1\n  → skill κ2\nscenario σ2\n  → ...\n```\n\n也就是论文中的 execution trajectory abstraction。\n\n---\n\n### Step 2：训练目标揭示了 coverage 的关键是 scenario–skill conditional space\n\n作者进一步从学习目标出发，说明训练 agent 其实是在学习：\n\n> 在某个 scenario 下，应该选择什么 skill。\n\n论文写道：\n\n> “an agent reduces to a policy over skills conditioned on scenarios”\n\n并进一步指出：\n\n> “Equation 4 makes explicit that the learnable region of π is confined to the support of D along both factors: scenarios with pD(σ | g) = 0 are unobservable, and skills with pD(κ | σ, g) = 0 are unexercised.”\n\n这句话非常关键。\n\n它说明如果训练数据没有覆盖某个 scenario，那么模型根本无法学习在该 scenario 下行动；如果某个 skill 从未在某个 scenario 下出现，模型也不会学习这种条件化 skill selection。\n\n因此，目标不再是“生成更多 task”，而是：\n\n> 生成能覆盖更多 scenario–skill pairs 的 trajectories。\n\n论文明确说：\n\n> “Maximizing learned capacity therefore requires training data whose induced D densely covers the conditional product space…”\n\n这就直接导向了后续的 graph-based synthesis。\n\n---\n\n### Step 3：如果 skill 是 transition，那么自然可以构造 skill graph\n\n既然 skill 是从一个 scenario 到另一个 scenario 的 transition，那么可以定义：\n\n```text\nskill κ : pre-scenario σ → post-scenario σ'\n```\n\n论文在 §3.2 中写道：\n\n> “Recall from § 2 that each skill κ ∈ K is a directed transition κ : σ → σ′ between scenarios. We lift this pairwise structure into a directed multigraph G = (Ω, K), where nodes are scenarios and edges are skills.”\n\n这就是方法的核心结构：\n\n- node = scenario；\n- edge = skill；\n- path = workflow；\n- path sampling = controllable trajectory synthesis。\n\n这一步是从理论抽象到工程方法的桥梁。\n\n---\n\n### Step 4：从图中采样 path，作为 task synthesis 的 workflow skeleton\n\n论文说：\n\n> “A directed path sampled from the graph therefore specifies an agentic workflow, consisting of a sequence of skills ordered together with the intermediate scenarios they traverse.”\n\n也就是说，作者不是让 LLM 随机想任务，而是先从 graph 中采样一个 workflow path：\n\n```text\nσ0 --κ1--> σ1 --κ2--> σ2 --κ3--> σ3\n```\n\n这个 path 规定了 synthesized task 的“最小解题轨迹”。\n\n例如 Figure 4 中的视频任务：\n\n```text\nraw video footage available\n→ Video Analyzer\n→ video editing session active\n→ Frame Extractor\n→ extracted frames with timestamps\n→ GIF Generator\n→ generated GIF with output metadata\n```\n\n这个 task 的 natural language instruction 是：\n\n> “Turn the provided raw video into a GIF summary package with sampled frames, metadata, and the final animated GIF.”\n\n也就是说，任务表面上是一句话，但背后被 graph path 控制为一个多 skill workflow。\n\n---\n\n### Step 5：为了避免采样集中在 hub nodes，需要 inverse-frequency path sampling\n\n如果 graph 很大，直接 random walk 会偏向高度连接的 generic scenarios，导致路径冗余。\n\n论文指出：\n\n> “A uniform random walk on G concentrates on high-degree scenarios and frequently traversed skills, producing redundant paths that revisit the same sub-structures.”\n\n因此作者设计了 Algorithm 1：**Inverse-Frequency Path Sampling with Monotone Progression**。\n\n核心机制是：\n\n- 访问少的 scenario 更容易被采样；\n- 使用少的 skill 更容易被采样；\n- 同一路径内不重复访问 scenario 和 skill；\n- 只接受长度合适且 skill set 未重复的 path。\n\n论文说：\n\n> “The source scenario is drawn with probability p(σ) ∝ (ν(σ)+1)^−1…”\n\n以及：\n\n> “the next edge is drawn from the outgoing skills of the current node with probability p(κ) ∝ (µ(κ)+1)^−1.”\n\n最终目的是：\n\n> “progressively steering the empirical distribution toward uniform coverage over Ω × K”\n\n这一步把 seed insight 中的“控制 scenario–skill diversity”落实成了一个具体 sampling algorithm。\n\n---\n\n### Step 6：用 multi-agent harness 把 abstract path 实例化成 executable task\n\ngraph path 本身只是语义骨架，还不是可执行任务。因此需要一个 task instantiation pipeline。\n\n论文说：\n\n> “Given a sampled path P from § 3.3, a multi-agent harness is designed to produce an executable task instance consisting of five components: a natural-language instruction, an initial filesystem snapshot, a containerized environment, verification scripts, and an oracle solution.”\n\n也就是说，一个 task instance 包括：\n\n1. `instruction.md`\n2. 初始文件系统；\n3. Dockerized environment；\n4. tests / verifier；\n5. oracle solution，例如 `solve.sh`。\n\n这里的关键是：task 不是随便生成的，而是必须让其 intended solution realize sampled path。\n\n论文在 Abstract 中说：\n\n> “It then samples paths from this graph as abstractions of real-world workflows, and uses a multi-agent harness to instantiate them into executable task instances.”\n\n所以整个方法可以总结为：\n\n```text\ntrajectory diversity insight\n→ scenario–skill abstraction\n→ skill as directed transition\n→ scenario-mediated skill graph\n→ path sampling for workflow control\n→ multi-agent harness for executable task synthesis\n→ oracle/rubric verification\n→ trajectory collection and SFT\n```\n\n---\n\n## 3. 试错历程：困难、调整与新子问题\n\n这篇论文里其实暴露了很多“原方案不够用，于是必须改”的痕迹。主要体现在四个层面。\n\n---\n\n### 3.1 直接让 LLM 一次性生成完整 task 效果不好，于是拆成 Planner + Constructor\n\n最明显的试错来自 §3.4。\n\n作者说：\n\n> “Directly prompting an LLM to generate all components in a single pass leads to two issues: 1) long-context generation produces outputs of inconsistent quality, and 2) the model focuses on implementation details rather than designing a coherent task instance, resulting in tasks that lack sufficient complexity.”\n\n这说明他们一开始很可能尝试过 single-pass generation：\n\n```text\ninput: sampled path\nLLM output: instruction + files + Dockerfile + tests + solution\n```\n\n但遇到两个问题：\n\n1. long-context generation 质量不稳定；\n2. LLM 过早陷入 implementation details，导致任务设计不够复杂、不够 coherent。\n\n因此他们改成了 multi-agent harness：\n\n> “We thus decouple planning from implementation: a planner first transforms P into a structured plan of sub-objectives and expected outputs, then a constructor generates the whole task instance conditioned on this plan.”\n\n也就是：\n\n```text\nsampled path\n→ Planner: 设计 sub-objectives / expected outputs\n→ Constructor: 生成具体 task artifacts\n→ Verification loop: 检查并修复\n```\n\n这个调整非常关键，因为它把“任务设计”和“任务实现”分开，降低了 LLM 长上下文生成的失败率。\n\n---\n\n### 3.2 生成 task 后并不天然可解，于是引入 oracle verification 和 repair loop\n\n合成 executable task 的难点是：LLM 生成出来的环境、测试和 oracle solution 之间经常不一致。\n\n因此作者引入双重验证：\n\n> “execution-based verification runs the verification scripts against the oracle solution inside the environment container to ensure solvability”\n\n以及：\n\n> “rubric-based verification uses LLM-as-a-Judge to assess (i) alignment between instructions and tests… and (ii) instruction self-containedness…”\n\n也就是说，他们发现“oracle 能跑通”还不够，还要检查：\n\n- instruction 和 tests 是否一致；\n- tests 是否过严或过松；\n- instruction 是否泄露了解题路径；\n- task 是否 self-contained。\n\n如果失败，就进入 repair loop：\n\n> “If either check fails, diagnostic feedback is returned to the constructor for repair via multi-turn tool use.”\n\n这说明 task synthesis 过程产生了新的子问题：\n\n> 如何自动判断一个 synthetic task 是 solvable、fair、well-specified 的？\n\n这已经不只是生成问题，而是一个 verification and repair 问题。\n\n---\n\n### 3.3 Rubric failures 中 instruction-test misalignment 是主要问题\n\n在 §4.2 中，作者进一步分析了失败原因：\n\n> “Of failed rubric checks, 77% stem from test scripts that either over-specify or under-specify relative to the instruction…”\n\n这说明一个意料之外但非常实际的问题是：\n\n> LLM 很容易写出“看似合理”的 tests，但这些 tests 和 instruction 的语义边界不一致。\n\n例如：\n\n- instruction 没要求某个 edge case，但 test 强行检查；\n- instruction 要求某个功能，但 test 没覆盖；\n- test 检查了 implementation detail，而不是 user-visible behavior。\n\n这会导致错误的 reward signal，尤其对 RL 很危险。\n\n作者对此的处理是：\n\n> “We retain these task instances for supervised fine-tuning to preserve trajectory diversity, but discard them for reinforcement learning to avoid erroneous reward signals.”\n\n也就是说：\n\n- 对 SFT，可以保留，因为 trajectory 仍有学习价值；\n- 对 RL，必须丢弃，因为 verifier 会产生错误奖励。\n\n这是一个很重要的工程判断。\n\n---\n\n### 3.4 初次生成质量太差的 task 很难靠 repair 挽救\n\n作者还发现 repair loop 不是万能的：\n\n> “For oracle failures, the dominant cause is corrupted filesystem snapshots: due to the randomness of LLM generation, the first synthesis round may produce buggy stages that remain unrecoverable even after multiple repair cycles.”\n\n这说明有些失败不是局部 bug，而是初始 environment snapshot 本身已经坏掉，后续 patch 很难修复。\n\n作者总结：\n\n> “Although the multi-agent architecture substantially outperforms a single-stage pipeline, these cases suggest a floor on repair effectiveness.”\n\n他们提出的策略是：\n\n> “Re-running failed paths with a higher sampling temperature is a simple yet effective strategy to help recover these paths and preserve the diversity of the synthesized task set.”\n\n这表明 synthesis pipeline 里又产生了一个新问题：\n\n> 如何在不损失 path diversity 的前提下恢复失败路径？\n\n如果某个 path 合成失败就直接丢弃，会让 graph sampling 的 diversity 设计被破坏。因此他们选择对失败路径重新采样生成，而不是放弃。\n\n---\n\n### 3.5 Random multi-skill composition 不够 coherent，验证了 scenario-mediated graph 的必要性\n\n在 ablation 中，作者比较了：\n\n1. Single-skill；\n2. Multi-skill random composition；\n3. SkillSynth graph-guided path。\n\n他们发现随机组合多个 skills 并不能自然产生复杂任务。\n\n论文说：\n\n> “Random composition lacks workflow coherence.”\n\n并解释：\n\n> “randomly composed skills lack sequential dependencies and cannot form coherent workflows.”\n\n结果是：\n\n> “The multi-agent harness tends to generate simplified task instances that contain multiple fine-grained requirements but require few execution steps.”\n\n这非常能体现 SkillSynth 的核心价值。\n\n如果只是把多个 skills 拼在一起，LLM 会把它们变成一组并列小需求，而不是一个真正有状态依赖的 workflow。\n\n因此必须通过 scenario-mediated graph 来保证：\n\n```text\nskill A 的 postcondition\n= skill B 的 precondition\n```\n\n这样 skills 之间才有顺序依赖和状态连续性。\n\n这也是为什么论文强调 scenario 是“mediated”的关键。\n\n---\n\n### 3.6 Graph construction 本身也经历了方案比较：embedding-only alignment 不够好\n\n在 Appendix B 中，作者提到他们试过其他 graph construction 方式：\n\n> “We also explored several alternative graph construction strategies, including embedding-based scenario alignment and single-pass subgraph generation; we found that the LLM-based pairwise alignment approach yields higher-quality graphs.”\n\n这说明构图并不是简单 embedding nearest neighbor 就能解决。\n\n因为 scenario compatibility 不只是语义相似，还涉及 precondition/postcondition 的状态逻辑。例如：\n\n- “Python project with failing tests”\n- “Python project with tests passing”\n\n这两个 embedding 可能很近，但它们不能随便合并。\n\n因此作者采用：\n\n- embedding retrieval 找候选；\n- LLM 判断 semantic compatibility；\n- 双向 alignment；\n- LLM-based scenario merging；\n- transition filtering。\n\n这是从“相似性匹配”升级到“状态兼容性判断”。\n\n---\n\n### 3.7 Scenario deduplication 也出现规模和语义漂移问题\n\n作者还专门讨论了 clustering 的实现。\n\n他们没有直接做全局 hierarchical clustering，因为规模大，内存成本高；也不能简单链式合并，因为会出现 chain drift。\n\n论文说：\n\n> “we run complete-linkage agglomerative clustering with cosine distance to avoid the quadratic memory cost of global hierarchical clustering while preserving the desirable property of complete linkage: every pair within a cluster must be mutually close, preventing chain-drift artifacts…”\n\n这说明 scenario deduplication 中有两个子问题：\n\n1. scalability：全局聚类太贵；\n2. semantic precision：不能把语义不同但中间相似的 scenario 串起来合并。\n\n因此他们采用两阶段：\n\n```text\nLouvain coarse bucketing\n→ complete-linkage agglomerative clustering within bucket\n```\n\n这也是实现 seed insight 时必须解决的底层问题：如果 scenario 节点质量差，整个 skill graph 就会失真。\n\n---\n\n## 总结\n\n这篇论文的“灵光一闪”可以概括为：\n\n> **不要把 terminal task synthesis 看成 task 数量扩张问题，而要看成 agent execution trajectory distribution 的可控构造问题；而 trajectory 的高层结构正是 scenario 与 skill 的交替，因此可以用 scenario-mediated skill graph 来采样 workflow，再把 workflow 实例化为 executable tasks。**\n\n它的方法论从这个洞察自然推出：\n\n```text\nterminal agent execution\n→ scenario–skill abstraction\n→ skill = transition between scenarios\n→ skill graph\n→ graph path = workflow\n→ inverse-frequency sampling controls diversity\n→ multi-agent harness turns path into task\n→ oracle/rubric verification ensures usability\n```\n\n实现过程中，作者遇到的主要困难包括：\n\n- single-pass LLM task generation 质量不稳定；\n- instruction/test/oracle 容易不一致；\n- repair loop 有上限，坏的 filesystem snapshot 难以修复；\n- random skill composition 缺乏 workflow coherence；\n- embedding-only scenario alignment 不够可靠；\n- scenario clustering 存在规模和 semantic drift 问题。\n\n这些困难又推动作者引入：\n\n- Planner + Constructor 分工；\n- execution-based verification；\n- rubric-based verification；\n- multi-turn repair loop；\n- inverse-frequency monotone path sampling；\n- LLM-based pairwise alignment；\n- scalable clustering pipeline。\n\n所以，SkillSynth 的核心贡献不是单个组件，而是围绕一个关键洞察建立的一整套闭环：\n\n> **用 graph-controlled scenario–skill workflow 来决定 agent 训练中真正经历什么。**",
                    "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的区别是：**以前主要是在“多造任务”，而 SkillSynth 先控制任务背后要经历的“场景—技能—场景”执行路径，再把这些路径变成可运行的终端任务。**\n\n---\n\n# 这篇论文到底在做什么？\n\n这篇论文要解决的问题很直接：\n\n> 训练终端智能体需要大量终端操作轨迹，但现有合成任务虽然数量多，轨迹却容易重复，模型反复学到类似场景和类似操作。\n\n作者认为，一个终端任务的解决过程可以拆成两类东西：\n\n- **场景 scenario**：智能体当前面对的状态，例如“Python 项目测试失败”“有一个原始视频文件”“Docker 环境缺少依赖”。\n- **技能 skill**：智能体在这个场景下执行的一段操作流程，例如“运行 pytest 并定位失败原因”“提取视频帧”“安装缺失依赖”。\n\n所以一条任务执行轨迹不是简单的一串 shell 命令，而是：\n\n> 场景 1 → 使用技能 1 → 场景 2 → 使用技能 2 → 场景 3 → ...\n\nSkillSynth 的核心做法就是：\n\n1. 收集很多真实的终端技能；\n2. 给每个技能标出它适用前的场景和执行后的场景；\n3. 把这些场景和技能连成一个图；\n4. 从图里采样一条“场景—技能—场景”的路径；\n5. 让多个 LLM agent 把这条路径变成一个真实可运行的终端任务；\n6. 用验证器检查这个任务能不能被解出来；\n7. 用这些任务采样轨迹，训练终端智能体。\n\n---\n\n# 按执行顺序拆解 SkillSynth\n\n## 第一步：收集并过滤终端技能\n\n### 输入\n\n系统拿到两类技能来源：\n\n- ClawHub 里的人工写好的 agent 技能；\n- 公开 GitHub 仓库里的技能描述、代码和示例。\n\n这里的“技能”指的是一段可以在终端里执行的工作流程，例如文件处理、测试修复、视频处理、Docker 配置等。\n\n### 操作\n\n系统对原始技能做过滤，只保留满足条件的技能：\n\n1. 能在 Linux 终端里执行；\n2. 不是单纯的 prompt 技巧，而是有具体操作流程；\n3. 不包含危险内容，比如窃取密钥、下载不明 IP 文件、越狱攻击；\n4. 输出结果尽量确定，并且可以客观验证。\n\n### 输出\n\n得到一个经过过滤的技能池。\n\n论文最后构建出的图里有：\n\n- 57,214 个过滤后的技能；\n- 82,073 个去重后的场景；\n- 185,529 个 LLM 验证过的连接关系。\n\n### 目的\n\n这一步是为了保证后面生成的任务是：\n\n- 可执行的；\n- 安全的；\n- 可以自动验证的；\n- 来自真实终端使用经验，而不是纯靠 LLM 随机编出来的任务。\n\nIntroduction 里提到的问题是：现有方法要么靠 LLM 扩展 taxonomy，容易偏离真实使用；要么只围绕 GitHub issue，领域太窄。这里通过收集真实技能来扩大来源，同时保持实际可执行性。\n\n### 如果不做会怎样\n\n如果不做过滤，后面生成的任务可能不可执行、不可验证，甚至包含危险操作，导致合成数据质量失控。\n\n---\n\n## 第二步：给每个技能推断“使用前场景”和“使用后场景”\n\n### 输入\n\n每个过滤后的技能，包括：\n\n- Markdown 描述；\n- 代码；\n- 使用示例；\n- 工作流程说明。\n\n### 操作\n\n系统调用 LLM，让它读技能说明，然后推断：\n\n- **pre-scenario**：这个技能适用于什么场景；\n- **post-scenario**：执行完这个技能后会到达什么场景。\n\n例如一个“Frame Extractor”技能：\n\n- 使用前场景：工作区里有原始视频；\n- 使用后场景：已经提取出带时间戳的视频帧。\n\n于是一个技能会被表示成：\n\n> 场景 A → 技能 κ → 场景 B\n\n### 输出\n\n得到大量三元组：\n\n> 使用前场景，技能，使用后场景\n\n也就是：\n\n> scenario → skill → scenario\n\n### 目的\n\n这一步是 SkillSynth 的基础。\n\n作者不想只知道“有哪些技能”，而是要知道：\n\n- 这个技能什么时候能用；\n- 用完之后环境变成什么样；\n- 哪些技能可以接在另一个技能后面。\n\n只有这样，后面才能组合出合理的多步任务。\n\n### 如果不做会怎样\n\n如果只收集技能、不知道它们的前后状态，系统就无法判断哪些技能可以顺序连接，后面只能随机拼技能，任务流程会不连贯。\n\n---\n\n## 第三步：去重和合并相似场景\n\n### 输入\n\n上一步 LLM 推断出的所有 pre-scenario 和 post-scenario。\n\n这些场景是自然语言写的，所以会有大量重复或近似表达。例如：\n\n- “Python project with failing tests”\n- “Python repository where unit tests are failing”\n- “A codebase with pytest failures”\n\n它们可能指的是同一种状态。\n\n### 操作\n\n系统做两件事：\n\n1. 把场景文本转成 embedding；\n2. 用聚类算法把语义相近的场景合并。\n\n论文里用的是两阶段聚类：\n\n- 先用 Louvain 方法做粗分组；\n- 再在每个组内用 complete-linkage 层次聚类做细合并。\n\n这里的重点不是算法名字，而是操作目的：\n\n> 把意思相同但说法不同的场景合成一个节点。\n\n### 输出\n\n得到去重后的场景集合。\n\n### 目的\n\n这一步是为了解决场景表达碎片化的问题。\n\n如果不合并，相同场景会被拆成很多不同节点，技能之间就连不起来，图会变得稀疏，后面采样路径时容易断掉。\n\n### 如果不做会怎样\n\n如果不做去重，相同状态会被当成不同状态，技能图会碎裂，能采到的多步路径会少，任务多样性也会下降。\n\n---\n\n## 第四步：对齐不同技能的前后场景，构建技能图\n\n### 输入\n\n系统现在有：\n\n- 去重后的 pre-scenario；\n- 去重后的 post-scenario；\n- 每个技能对应的 “pre-scenario → skill → post-scenario”。\n\n### 操作\n\n系统要判断：\n\n> 某个技能执行后的场景，能不能作为另一个技能执行前的场景？\n\n具体做法是：\n\n1. 对每个 post-scenario，检索最相似的 1000 个 pre-scenario；\n2. 让 LLM 判断它们是否语义兼容；\n3. 反过来也做一次，从 pre-scenario 检索 post-scenario；\n4. 通过 LLM 合并兼容的场景；\n5. 再用 LLM 过滤掉无效的 “场景—技能—场景” 三元组。\n\n最终构成一个图：\n\n- 节点是场景；\n- 有向边是技能；\n- 一条边表示：在某个场景下执行某个技能，会进入另一个场景。\n\n### 输出\n\n得到一个“场景作为节点、技能作为边”的有向图。\n\n论文里的图规模是：\n\n- 82,073 个场景节点；\n- 57,214 个技能边；\n- 185,529 个 LLM 验证过的连接；\n- 最大弱连通分量覆盖 85.6% 的场景。\n\n### 目的\n\n这一步是为了让技能可以按真实执行逻辑连接起来。\n\n之前的方法往往只生成一个任务，或者随机组合多个技能，但不保证技能之间有前后依赖。SkillSynth 要保证：\n\n> 后一个技能的使用条件，来自前一个技能执行后的结果。\n\n这直接对应 Introduction 里的痛点：现有任务虽然多，但不能显式控制 agent 实际经历的执行轨迹。\n\n### 如果不做会怎样\n\n如果不做场景对齐和图构建，系统就只能随机拼技能，很多组合没有真实流程关系，生成的任务会变成多个孤立要求，而不是一个连贯任务。\n\n---\n\n## 第五步：从技能图中采样一条执行路径\n\n### 输入\n\n已经构建好的技能图：\n\n> 场景节点 + 技能边\n\n以及路径长度限制：\n\n- 最短 1 个技能；\n- 最长 7 个技能。\n\n### 操作\n\n系统从图中采样一条路径：\n\n> 场景 0 → 技能 1 → 场景 1 → 技能 2 → 场景 2 → ...\n\n但它不是普通随机游走，而是用了两个控制：\n\n### 1. 低频优先采样\n\n系统记录：\n\n- 每个场景被采过多少次；\n- 每个技能被采过多少次。\n\n采样时优先选择之前较少出现的场景和技能。\n\n也就是：\n\n> 越少采过，越容易被选中。\n\n### 2. 路径内部不重复\n\n在同一条路径里：\n\n- 不重复访问已经走过的场景；\n- 不重复使用已经用过的技能。\n\n这样避免路径原地循环或重复操作。\n\n### 输出\n\n得到一条有序的“场景—技能—场景”路径。\n\n例如论文图 4 里的视频任务路径：\n\n1. 有原始视频；\n2. 使用视频分析技能；\n3. 进入视频编辑会话；\n4. 使用帧提取技能；\n5. 得到带时间戳的帧；\n6. 使用 GIF 生成技能；\n7. 得到 GIF 和元数据。\n\n### 目的\n\n这一步是为了直接控制训练轨迹的多样性。\n\n论文的核心观点是：训练终端智能体时，不只是任务数量重要，更重要的是模型实际经历过多少不同的：\n\n- 场景；\n- 技能；\n- 场景—技能组合。\n\n低频优先采样就是为了避免系统总是采到高频场景和常见技能。\n\n### 如果不做会怎样\n\n如果用普通随机采样，路径会集中在高连接度场景和热门技能上，最后生成的任务表面很多，实际训练轨迹高度重复。\n\n---\n\n## 第六步：把采样路径变成一个可执行终端任务\n\n### 输入\n\n一条采样出来的路径，例如：\n\n> 场景 A → 技能 1 → 场景 B → 技能 2 → 场景 C\n\n### 操作\n\n系统使用一个多 agent 合成流程，把抽象路径变成真实任务。\n\n它分成两个主要角色：\n\n### 1. Planner\n\nPlanner 先把路径变成任务设计方案，包括：\n\n- 任务目标；\n- 每个阶段要完成什么；\n- 中间产物是什么；\n- 最终输出是什么。\n\n它不直接写完整环境，而是先规划任务结构。\n\n### 2. Constructor\n\nConstructor 根据 Planner 的方案生成完整任务实例，包括：\n\n- `instruction.md`：自然语言任务说明；\n- 初始文件系统；\n- Dockerfile；\n- 环境文件；\n- 测试脚本；\n- oracle solution，也就是标准解法脚本 `solve.sh`。\n\n### 输出\n\n得到一个完整的终端任务实例。\n\n一个任务实例包括：\n\n- 任务说明；\n- 初始环境；\n- Docker 容器；\n- 测试脚本；\n- 标准解法。\n\n### 目的\n\n直接让 LLM 一次性生成完整任务质量不稳定。论文说会出现两个问题：\n\n1. 长上下文生成质量不稳定；\n2. LLM 容易陷入实现细节，任务整体设计不够清楚。\n\n所以作者把“设计任务”和“生成文件”拆开。\n\n### 如果不做会怎样\n\n如果直接一次性生成完整任务，任务更容易不连贯、不可执行，或者测试和说明不匹配。\n\n---\n\n## 第七步：验证任务能不能被标准解法解出来，并检查任务质量\n\n### 输入\n\n上一步生成的完整任务实例，包括：\n\n- instruction；\n- Docker 环境；\n- 测试脚本；\n- oracle solution。\n\n### 操作\n\n系统做两类验证。\n\n---\n\n### 1. 执行验证\n\n系统在 Docker 环境中运行 oracle solution，然后跑测试脚本。\n\n检查：\n\n> 标准解法能不能通过测试。\n\n如果 oracle 都过不了，说明这个任务本身坏了。\n\n---\n\n### 2. 质量验证\n\n系统用 LLM-as-a-Judge，也就是让 LLM 当评审，检查两个问题：\n\n1. 任务说明和测试是否一致；\n   - 测试不能检查说明里没要求的东西；\n   - 测试也不能漏掉说明里要求的东西。\n2. 任务说明是否自洽；\n   - 不能把标准解法的过程泄露给 agent；\n   - 不能让任务靠暗示答案降低难度。\n\n---\n\n### 3. 失败后修复\n\n如果验证失败，系统把错误反馈给 Constructor，让它修改任务。\n\n最多修复：\n\n- 3 轮；\n- 每轮最多 20 次工具调用。\n\n### 输出\n\n得到通过验证的任务，或者丢弃失败任务。\n\n论文中 3,721 条采样路径最终得到：\n\n- 3,423 个任务同时通过 oracle 和质量检查，占 92.0%；\n- 137 个只通过 oracle，占 3.7%；\n- 161 个失败，占 4.3%；\n- 总共 3,560 个可用任务；\n- oracle 通过率 95.7%。\n\n### 目的\n\n这一步是为了保证合成任务不是“看起来像任务”，而是真的能运行、能验证、能训练。\n\n尤其是如果未来用于 RL，测试脚本错误会带来错误奖励信号，所以验证很关键。\n\n### 如果不做会怎样\n\n如果不验证，训练数据会混入大量不可解任务、错误测试和说明不一致的任务，模型可能学到错误行为。\n\n---\n\n## 第八步：用这些任务采样终端轨迹，并训练模型\n\n### 输入\n\n通过验证的 SkillSynth 任务实例。\n\n### 操作\n\n作者用 MiniMax M2.7 作为 teacher model，在每个任务上采样 3 条轨迹。\n\n总共得到：\n\n- 3,560 个任务；\n- 10,680 条轨迹。\n\n然后用这些轨迹对 Qwen3 系列模型做监督微调。\n\n注意：他们保留成功轨迹和失败轨迹。\n\n原因是失败轨迹里也有有用内容，比如：\n\n- 诊断错误；\n- 尝试修复；\n- 根据终端反馈调整操作。\n\n### 输出\n\n得到经过 SkillSynth 数据训练的终端 agent 模型：\n\n- Qwen3-8B + SS；\n- Qwen3-14B + SS；\n- Qwen3-32B + SS。\n\n### 目的\n\n最终目标不是只生成任务，而是提升模型终端操作能力。\n\n所以任务合成只是中间步骤，真正用于训练的是模型在这些任务上产生的执行轨迹。\n\n### 如果不做会怎样\n\n如果只生成任务但不采样轨迹训练模型，就无法证明这些任务真的能提升终端 agent 能力。\n\n---\n\n# 主实验结果说明了什么？\n\n作者在 Terminal-Bench 1.0 和 2.0 上测试。\n\nTerminal-Bench 是终端 agent 评测集，任务都在 Docker 环境中运行，要求模型通过终端完成真实任务。\n\n结果如下：\n\n| 模型 | TB 1.0 | TB 2.0 |\n|---|---:|---:|\n| Qwen3-8B + SkillSynth | 17.1 | 13.5 |\n| Qwen3-14B + SkillSynth | 22.9 | 19.9 |\n| Qwen3-32B + SkillSynth | 33.8 | 29.6 |\n\n对比一些开源模型：\n\n- Qwen 3 Coder 480B 在 TB 2.0 是 23.9；\n- Qwen3-32B + SkillSynth 在 TB 2.0 是 29.6。\n\n这说明：针对终端任务构造高质量、多样化轨迹，可以让较小模型在这个领域超过更大的通用代码模型。\n\n---\n\n# 结合消融实验解释：为什么这套方法有效？\n\n论文的消融实验主要比较三种任务合成种子：\n\n1. **Single-skill**：每个任务只用一个技能作为种子；\n2. **Multi-skill**：随机组合 2 到 7 个技能；\n3. **SkillSynth**：从场景—技能图中采样有前后关系的技能路径。\n\n三者使用同一个 multi-agent harness，所以差别主要来自“任务种子怎么选”。\n\n结果：\n\n| 方法 | TB 1.0 | TB 2.0 |\n|---|---:|---:|\n| Single-skill | 25.4 | 21.3 |\n| Multi-skill | 30.8 | 25.8 |\n| SkillSynth | 33.8 | 29.6 |\n\n---\n\n## 1. 哪个组件贡献最大？\n\n从数据看，贡献最大的是：\n\n> **用场景—技能图采样连贯的多技能路径，而不是单技能或随机拼技能。**\n\n具体看下降幅度：\n\n### SkillSynth vs Single-skill\n\n- TB 1.0：33.8 → 25.4，下降 8.4 分；\n- TB 2.0：29.6 → 21.3，下降 8.3 分。\n\n这说明：只用单个技能生成任务，轨迹太短、太简单，训练效果明显差。\n\n### SkillSynth vs Random Multi-skill\n\n- TB 1.0：33.8 → 30.8，下降 3.0 分；\n- TB 2.0：29.6 → 25.8，下降 3.8 分。\n\n这说明：多技能本身有用，但随机组合不够好；必须按场景前后关系来组织技能，才能进一步提升。\n\n所以最大贡献可以拆成两层：\n\n1. **多技能任务比单技能任务更有用**；\n2. **图指导的多技能顺序比随机多技能组合更有用**。\n\n---\n\n## 2. 哪个组件可有可无？\n\n论文没有提供一个明确“去掉后性能几乎不变”的组件。\n\n它没有单独消融这些部分：\n\n- 不做场景去重会怎样；\n- 不做 LLM 对齐会怎样；\n- 不做 inverse-frequency 采样会怎样；\n- 不做 planner/constructor 拆分会怎样；\n- 不做 rubric 检查会怎样。\n\n所以严格来说，不能根据实验说某个组件可有可无。\n\n但论文中有一个现象值得注意：\n\n- 有 137 个任务只通过 oracle，没有通过质量 rubric；\n- 作者仍然把这些任务保留用于监督微调；\n- 但不建议用于 RL，因为 RL 会依赖测试给奖励，测试不准会污染奖励。\n\n这意味着：\n\n> 对于监督微调，rubric 质量检查可能不是绝对必要；但对于 RL，它很重要。\n\n不过这不是正式消融实验，只能算作者的经验判断。\n\n---\n\n## 3. 各组件之间是否有协同效应？\n\n有，而且主要体现在：\n\n> 多技能组合 + 图上的前后场景约束，一起产生了明显提升。\n\n看数据：\n\n### 单技能 → 随机多技能\n\n- TB 1.0：25.4 → 30.8，提升 5.4；\n- TB 2.0：21.3 → 25.8，提升 4.5。\n\n说明多技能任务确实比单技能任务更能训练 agent。\n\n### 随机多技能 → SkillSynth\n\n- TB 1.0：30.8 → 33.8，提升 3.0；\n- TB 2.0：25.8 → 29.6，提升 3.8。\n\n说明仅仅“技能数量更多”还不够，还要技能之间有合理顺序。\n\n所以协同效应是：\n\n- 多技能让任务更复杂；\n- 场景图让多技能组合更连贯；\n- 低频采样让轨迹覆盖更多场景和技能；\n- multi-agent harness 把这些路径变成可执行任务。\n\n单独随机加技能，效果不如“按场景连接关系加技能”。\n\n---\n\n## 4. 回扣动机：论文声称的痛点到底被哪个设计解决了？\n\n论文的核心痛点是：\n\n> 现有合成任务数量可以很多，但 agent 实际经历的轨迹重复，场景和技能覆盖不足。\n\n对应解决设计如下：\n\n| 痛点 | SkillSynth 的具体设计 | 实验是否支持 |\n|---|---|---|\n| 任务多但轨迹重复 | 用“场景—技能”表示轨迹，而不是只看任务数量 | 多样性分析支持 |\n| 随机组合技能不连贯 | 构建场景—技能图，保证技能前后状态匹配 | Multi-skill 比 SkillSynth 差 3.0 / 3.8 分 |\n| 高频场景和技能被反复采样 | inverse-frequency path sampling，低频优先采样 | 多样性分析支持 |\n| 合成任务可能不可执行 | oracle 验证和修复循环 | oracle 通过率 95.7% |\n| 测试和任务说明可能不一致 | rubric-based verification | 发现 77% rubric 失败来自说明和测试不一致 |\n| 任务太简单 | 从图里采样多步路径 | SkillSynth 任务 38% 在 Hy3 Preview 三次尝试中 0/3 成功 |\n\n多样性分析里也给了直接证据：\n\n- SkillSynth 轨迹的 unique scenario-skill pair 覆盖比 single-skill 高 31%；\n- 比 random multi-skill 高 19%。\n\n这和论文主张一致：\n\n> 不是单纯增加任务数量，而是增加训练轨迹中“场景—技能组合”的覆盖。\n\n---\n\n# 任务难度结果说明了什么？\n\n作者用 Hy3 Preview 对 3,560 个任务每个尝试 3 次，并按成功次数划分难度：\n\n| 三次尝试成功次数 | 任务比例 | 任务数量 |\n|---|---:|---:|\n| 0/3 | 38% | 1,352 |\n| 1/3 | 18% | 637 |\n| 2/3 | 19% | 679 |\n| 3/3 | 25% | 892 |\n\n解释很直接：\n\n- 25% 的任务比较容易，三次都能过；\n- 37% 的任务处在可学习区间，也就是 1/3 或 2/3；\n- 38% 的任务当前强模型也完全没过，说明任务确实有挑战性。\n\n这支持作者的说法：SkillSynth 不只是生成大量简单任务，而是生成了相当比例的困难任务。\n\n---\n\n# 失败轨迹分析说明了什么？\n\n作者分析了失败轨迹，主要错误是：\n\n| 错误类型 | 比例 |\n|---|---:|\n| 部分实现，漏掉要求 | 42.2% |\n| 过度相信自己写的小测试 | 29.5% |\n| 过早结束，没有正式验证 | 12.9% |\n| API / 参数幻觉 | 7.0% |\n| 卡在重复调试循环 | 5.1% |\n| 把失败合理化 | 3.3% |\n\n最主要的问题是：\n\n> agent 经常觉得自己完成了，但其实没有完整满足 instruction，也没有用可靠测试验证。\n\n这说明后续训练不只要教模型写代码或执行命令，还要教它：\n\n- 对照任务说明逐条检查；\n- 不要只跑自己挑的简单测试；\n- 发现失败后换策略；\n- 不要在没验证的情况下提交。\n\n---\n\n# 这套方法的硬伤在哪里？\n\n论文没有单独写一个很完整的 Limitation 部分，但在 Discussion 和实验分析里可以看出几个明显边界。\n\n## 硬伤一：它目前主要采样“链式路径”，不能很好表达并行或分支任务\n\nSkillSynth 现在采样的是：\n\n> 场景 1 → 技能 1 → 场景 2 → 技能 2 → 场景 3\n\n也就是一条线性的执行顺序。\n\n但真实终端任务有时不是单线流程，可能需要：\n\n- 同时处理多个文件；\n- 并行检查多个模块；\n- 分支探索多个可能原因；\n- 多个子任务最后汇总。\n\n作者在未来工作里明确提到：\n\n> 后续要从采样链条扩展到采样子图。\n\n这说明当前方法对复杂任务结构的表达还有限。\n\n---\n\n## 硬伤二：任务合成质量仍然依赖 LLM，坏的初始生成很难修好\n\n论文提到，oracle 失败里一个主要原因是：\n\n> 初始文件系统快照被生成坏了。\n\n一旦第一轮生成的环境文件本身有严重问题，即使后面有 3 轮修复，也经常修不好。\n\n这说明 multi-agent harness 不是完全可靠的。\n\n它能把总体通过率做到 95.7%，但失败样本里仍然存在系统性问题：\n\n- 文件环境生成错误；\n- 测试脚本和说明不一致；\n- 修复过程不能总是恢复坏任务。\n\n作者建议对失败路径重新采样或提高温度重跑，但这会增加成本。\n\n---\n\n## 硬伤三：图构建大量依赖 LLM 判断，成本和误差不可忽略\n\n图构建里的很多关键步骤都依赖 LLM：\n\n- 推断 pre/post scenario；\n- 判断 post-scenario 和 pre-scenario 是否兼容；\n- 合并场景；\n- 过滤三元组；\n- 判断任务质量。\n\n这带来两个问题：\n\n1. 成本不低；\n2. LLM 判断错误会进入技能图，影响后续任务合成。\n\n论文报告平均每个 verified task 成本约 27.3 美元，这对大规模扩展仍然是现实限制。\n\n---\n\n# 最后总结\n\nSkillSynth 的核心思路很清楚：\n\n> 先决定 agent 应该经历哪些场景和技能，再生成对应任务，而不是先随机造任务、再希望轨迹自然多样。\n\n它的执行流程是：\n\n1. 收集真实终端技能；\n2. 推断每个技能的前后场景；\n3. 合并相似场景；\n4. 对齐不同技能的前后状态，构建技能图；\n5. 从图中低频优先采样路径；\n6. 把路径生成可执行任务；\n7. 用 oracle 和 rubric 检查任务；\n8. 采样轨迹训练模型。\n\n消融实验支持了核心主张：\n\n- 单技能任务不够；\n- 随机多技能组合也不够；\n- 按场景图组织出的多技能路径效果最好。\n\n最关键的数据是：\n\n- SkillSynth 比 Single-skill 高 8.4 / 8.3 分；\n- 比 Random Multi-skill 高 3.0 / 3.8 分；\n- 轨迹中的 unique scenario-skill pair 覆盖比 Single-skill 高 31%，比 Random Multi-skill 高 19%。\n\n所以这篇论文真正想说明的是：\n\n> 终端 agent 的训练数据质量，关键不只是任务数量，而是任务解法轨迹覆盖了多少不同场景和不同技能组合。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **“随机多技能组合”并不自然带来更强任务，反而会降低任务质量。** 论文的 Multi-skill baseline 随机组合 2–7 个 skills，但下游效果低于 SkillSynth：TB 1.0 为 30.8 vs 33.8，TB 2.0 为 25.8 vs 29.6；作者指出随机组合缺乏 sequential dependencies，harness 会生成“多要求但少步骤”的简化任务。\n\n- **任务数量不是关键，trajectory diversity 才是关键。** Single-skill、Multi-skill 和 SkillSynth 使用相同数量的 synthesis seeds 与同一 multi-agent harness，但 SkillSynth 训练出的 Qwen3-32B 明显更强，说明提升来自轨迹结构差异而非任务规模；论文结论中也明确指出 training effectiveness depends on trajectory diversity, not merely task volume。\n\n- **失败轨迹也有训练价值，而不是应当全部丢弃。** 作者在 SFT 中保留 successful 和 failed trajectories，理由是 failed trajectories 包含 error diagnosis、recovery strategies 等有用 agentic reasoning patterns；这与常见“只用成功轨迹”的直觉相反。\n\n- **较小模型经 targeted data training 后可超过远大模型。** Qwen3-32B + SkillSynth 在 TB 2.0 达到 29.6，超过 Qwen 3 Coder 480B 的 23.9，说明 terminal capability 对数据构造高度敏感，参数规模不是唯一决定因素。\n\n- **LLM 生成任务的主要质量问题不是“解不出来”，而是 instruction-test misalignment。** 在 rubric failures 中，77% 来自测试脚本相对 instruction 过严或过松；这说明自动任务合成中最危险的问题不是 oracle solvability，而是 evaluator 是否忠实反映任务说明。\n\n- **修复循环很有效，但对一开始生成质量很差的样本效果有限。** verify-then-repair 额外恢复了 721 个任务，最终 oracle pass rate 达 95.7%；但 oracle failures 主要来自 corrupted filesystem snapshots，作者认为这类 first-round bad generation 即使多轮 repair 也难恢复。\n\n- **Agent 最常失败于“做了一部分就自信完成”，而不是完全不会做。** Error analysis 显示 Partial Implementation 占 42.2%，Inline Self-Test Over-trust 占 29.5%；这表明很多失败来自 verification discipline 不足，而非单纯能力缺失。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **Graph-guided seed selection 的收益被清晰隔离出来。** Ablation 中三组都用相同 multi-agent harness，仅改变 seed selection：Single-skill、Random Multi-skill、SkillSynth；结果 SkillSynth 在 TB 1.0 / TB 2.0 分别比 Single-skill 高 8.4 / 8.3 点，比 Multi-skill 高 3.0 / 3.8 点。\n\n- **任务难度分布证明 SkillSynth 不只是生成“更容易训练”的样本，而是生成更难任务。** SkillSynth 的 0/3 success tasks 占 38%，高于 Single-skill 的 16% 和 Multi-skill 的 27%；说明 graph-guided workflow 会增加真实执行难度。\n\n- **Diversity analysis 直接把“轨迹多样性”和“性能提升”联系起来。** 在 1,000 条 trajectory 样本上，SkillSynth 的 unique scenario-skill pair coverage 比 Single-skill 高 31%，比 Multi-skill 高 19%；对应下游模型性能也最高。\n\n- **Terminal task 的 diversity 不能只看 domain 或 task instruction，需要看执行中实际经历的 scenario-skill pairs。** 作者用 LLM 从 trajectories 中抽取 scenarios 和 skills，再做 embedding clustering 去重，发现不同 task instances 往往暴露重复场景和技能；这解释了为什么“看起来很多样”的任务集可能训练价值有限。\n\n- **Skill graph 的 degree distribution 是 heavy-tailed，这解释了 uniform random walk 为什么会产生冗余。** 图中 median degree 为 2，但 max degree 达 752，少数 generic intermediate states 会成为 hubs；这支持作者采用 inverse-frequency sampling 来避免反复采到高频结构。\n\n- **大连通分量与大量小组件共存，说明 terminal skills 既有通用可组合性，也有长尾专用 workflow。** 85.6% scenarios 属于 largest weakly connected component，同时还有 6,251 个 connected components；这揭示了 terminal workflow 空间既有宏观连通性，也有领域孤岛。\n\n- **Rubric-based verification 对 RL 尤其重要。** 作者保留 rubric failed 但 oracle passed 的任务用于 SFT 以保留多样性，却将其从 RL 中丢弃，理由是错误 test-reward 会产生 inaccurate reward signals；这区分了 SFT 与 RL 对数据质量的不同容忍度。\n\n---\n\n## 3. 对领域的新认知\n\n- **Terminal agent 的训练瓶颈不只是“缺任务”，而是缺少覆盖足够 scenario-skill conditional space 的轨迹。** 论文从目标函数分解指出，模型只能学习训练分布中出现过的 scenarios 和 admissible skills；因此数据建设应优化 coverage，而不是简单扩充任务数量。\n\n- **“多技能任务”不等于“组合性任务”。** Random Multi-skill baseline 表明，把多个 skills 放进同一个任务说明并不会自动形成 workflow；真正有训练价值的是存在状态依赖和时序推进的 compositional trajectory。\n\n- **Instruction following 与 verification behavior 是 terminal agents 的核心短板。** Error analysis 中大量失败来自 partial implementation、自造 happy-path tests、不过 pytest、忽略 failing tests 等，说明 terminal agent 不仅需要会写代码/命令，还需要严格对齐 specification 并执行可靠验证。\n\n- **Task synthesizer 的质量评估应同时看 solvability 和 specification fidelity。** Oracle passed 只能说明 solution 能过 tests，但不能保证 tests 与 instruction 对齐；论文中 3.7% 任务只 oracle passed，且 rubric failures 多为 test-instruction mismatch。\n\n- **Terminal workflow 空间存在可复用的中间状态结构。** Skill graph 中大量 scenarios 可作为 pre/post condition 被不同 skills 连接，说明 terminal 操作不是孤立命令集合，而是围绕可复用 environment states 组织的 transition system。\n\n- **Open-source 小模型的 terminal agent 能力差距可以通过高质量 trajectory data 显著缩小。** Qwen3-8B、14B、32B 经 SkillSynth trajectories 训练后均提升，且 gains 随模型规模增大；这深化了对“数据工程 vs 模型规模”关系的理解。\n\n---\n\n## 4. 实用的经验性结论\n\n- **自动任务合成最好采用 verify-then-repair loop，而不是一次性生成。** 论文中 repair loop 恢复 721 个任务，平均 2.31 个 repair cycles、11 次 tool calls；最终 3,721 条 sampled paths 产出 3,560 个 usable tasks。\n\n- **对 task verification 应采用“双重检查”：execution-based oracle + rubric-based judge。** Oracle 保证可解，rubric 检查 instruction-test alignment 和 instruction self-containedness；论文显示单靠 oracle 会漏掉大量 reward 质量问题。\n\n- **对 RL 数据应更严格过滤 test-instruction mismatch。** 作者将 rubric failed 的任务保留给 SFT，但丢弃于 RL，因为 RL 会直接依赖 verifier 作为 reward，错误测试会导致错误优化方向。\n\n- **对失败 synthesis path 可以用更高 sampling temperature 重跑，而不是只依赖 repair。** 作者观察 corrupted filesystem snapshots 很难在 repair 中恢复，建议 re-running failed paths with higher sampling temperature 是简单有效的恢复方式。\n\n- **做 trajectory diversity 评估时，可用 LLM 先抽取 scenario/skill，再用 embedding clustering 去重。** 论文用 deepseek-reasoner 抽取 trajectories 中的 semantic pairs，用 Harrier-OSS-v1-27B embedding 聚类，得到 unique scenarios、skills、scenario-skill pairs 作为可比较指标。\n\n- **场景去重时，complete-linkage hierarchical clustering 比容易 chain-drift 的方法更稳。** 作者采用 Louvain coarse bucketing + complete-linkage agglomerative clustering，理由是 complete linkage 要求簇内任意两点都相近，能避免 A≈B、B≈C 但 A≠C 的错误合并。\n\n- **路径长度可覆盖 1–7 个 skills，以同时包含单技能与组合任务。** 实验中设置 Lmin=1、Lmax=7，并区分 single-skill tasks 与 L≥4 的 compositional multi-step tasks；这是一个可直接复用的 synthesis granularity 范围。\n\n- **评估 synthesized task difficulty 可用强模型多次 rollouts 的成功次数分桶。** 作者用 Hy3 Preview 每题尝试 3 次，并按 0/3、1/3、2/3、3/3 划分难度；这种方法能快速识别 learnable range 与 hard tasks。\n\n- **SFT 训练 terminal trajectories 时，保留失败轨迹可能提升覆盖度。** 作者采集每题 3 条 MiniMax M2.7 trajectories，共 10,680 条，并保留成功与失败样本，理由是失败样本包含诊断、纠错和恢复策略。\n\n- **长 terminal trajectories 的 SFT 可采用较保守稳定配置。** 论文使用 AdamW，learning rate 2e-5，5 epochs，bf16，warmup ratio 10%，weight decay 1e-4，gradient clipping 1.0，micro-batch size 1 with gradient accumulation。\n\n---\n\n## 5. 局限性中的机会\n\n- **从 chain sampling 扩展到 subgraph sampling 是明显的下一步。** 作者指出当前主要采样 skill chains，未来可采样 subgraphs，使任务需要并行执行多个 skills，从而增加复杂度和更接近真实 workflow。\n\n- **更低成本、更强鲁棒的 synthesis harness 仍有很大空间。** 作者未来工作包括 scaling to larger data regimes，同时 refining harness to adapt to more cost-effective models；这暗示当前 synthesis 成本与 LLM 质量仍是规模化瓶颈。\n\n- **Instruction-test alignment 是自动环境生成和 RL 的关键未解问题。** 77% rubric failures 来自测试相对 instruction 过严或过松，说明未来可专门研究 verifier synthesis、specification checking、test adequacy calibration。\n\n- **Corrupted filesystem snapshots 暗示需要更结构化的 environment construction。** 作者发现这类错误是 oracle failures 的主因，且 repair 难恢复；未来可用 programmatic environment builders、schema constraints 或 staged validation 降低首轮生成损坏率。\n\n- **Agent verification behavior 是提升 terminal agents 的高价值方向。** 失败中 42.2% 是 Partial Implementation、29.5% 是 Inline Self-Test Over-trust，说明未来训练可强化 specification-grounded testing、mandatory test execution、failure-aware replanning。\n\n- **38% 的 synthesized tasks 被 Hy3 Preview 三次都未解，构成可用于 exploration/RL 的 hard task pool。** 作者将 0/3 success tasks 视为 future exploration 的潜在挑战，这类任务可用于 curriculum learning、self-improvement 或 targeted RL。\n\n- **Graph 中大量小 connected components 代表长尾专用工作流，值得专项挖掘。** 虽然 85.6% scenarios 在 giant component 中，但 6,251 个 components 中有大量小组件；这些可能对应 specialized domains，可用于增强模型在长尾 terminal workflows 上的能力。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文针对的是 terminal agents 训练中的具体瓶颈：缺少 high-quality、diverse execution trajectories，而不是泛泛讨论“任务不够多”。  \n- SkillSynth 生成的 3,560 个任务、10,680 条轨迹用于训练 Qwen3 系列模型后，在 Terminal-Bench 上有明确提升：Qwen3-32B + SkillSynth 在 TB 1.0 / TB 2.0 达到 33.8 / 29.6。  \n- Qwen3-32B + SkillSynth 在 TB 2.0 上超过 Qwen 3 Coder 480B 的 23.9，说明数据合成方式可能改变“靠更大模型提升 terminal agent”的实践路径。  \n- 论文声称 SkillSynth 生成的任务已被用于训练 Hy3 Preview，并贡献其 terminal-based agentic capability。\n\n**负面证据或缺失**：  \n- 实验主要集中在 Terminal-Bench 1.0 / 2.0，缺少更多真实生产环境或跨 benchmark 的验证。  \n- 任务合成成本较高，材料中提到平均每个 verified task 约 27.3 美元，这会限制大规模实践采用。  \n- 目前任务主要是链式路径，不能很好覆盖并行、分支、多子任务汇总等复杂真实 workflow。\n\n**判断**：强\n\n**理由**：  \n这项工作有可能改变 terminal agent 数据构造方式：从“增加任务数量”转向“控制 execution trajectory 的 scenario-skill 覆盖”。这种转变不仅有理论动机，也有具体结果支撑，例如 Qwen3-32B + SkillSynth 在 TB 2.0 达到 29.6，超过 Qwen 3 Coder 480B 的 23.9。不过其影响力是否能扩展到更广泛真实环境，还受限于成本、LLM 依赖和链式任务结构。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 论文不是简单用 LLM 生成更多任务，而是显式构建“scenario-mediated skill graph”：节点是场景，边是技能。  \n- 它将任务合成种子从 taxonomy / GitHub issue / random skill combination 转为“场景—技能—场景”的路径采样。  \n- 消融显示，随机多技能组合不等于图引导组合：SkillSynth 比 Random Multi-skill 在 TB 1.0 / TB 2.0 高 3.0 / 3.8 分。  \n- 多样性分析显示 SkillSynth 的 unique scenario-skill pair 覆盖比 Single-skill 高 31%，比 Random Multi-skill 高 19%。\n\n**负面证据或缺失**：  \n- 技术组成并非完全新：pre/post condition、图采样、LLM-as-judge、verify-then-repair、trajectory SFT 都已有相关思想。  \n- 论文没有证明其他团队无法通过类似“workflow graph + LLM task synthesis”的路线很快复现类似结果。  \n- 关键组件如 inverse-frequency sampling、场景去重、LLM 对齐、planner/constructor 拆分没有被单独消融，因此很难判断独特性集中在哪个不可替代设计上。\n\n**判断**：中等\n\n**理由**：  \nSkillSynth 的整体组合有辨识度，尤其是用 scenario 作为技能连接的中介状态，这比随机多技能合成更有结构性，并且消融中带来 3.0 / 3.8 分收益。但它更像是把已有的 graph abstraction、LLM synthesis、verification pipeline 组织成一个有效系统，而不是提出一个别人短期内难以想到的根本性新机制。因此不可替代性是中等，而不是强。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- Terminal agents 正处在快速发展阶段，材料明确指出它们以 CLI 作为通用 action space，具备 autonomous command-line execution 潜力。  \n- 当前能力提升的核心瓶颈被定位为缺少高质量、多样化执行轨迹，而 SkillSynth 正好针对这个瓶颈。  \n- 近期已有 synthetic terminal task instances 的研究趋势，但现有方法偏重 task quantity 或 domain coverage，缺少对 trajectory diversity 的控制。  \n- Terminal-Bench 1.0 / 2.0 已经提供可量化评测环境，使得这类方法能被直接验证。\n\n**负面证据或缺失**：  \n- 该领域仍较新，terminal task synthesis 的标准化评估可能还不稳定；过度针对 Terminal-Bench 优化存在风险。  \n- 如果未来 terminal agents 的交互模式从 CLI 扩展到 GUI、浏览器、IDE、多模态环境，当前方法的适用范围需要重新验证。  \n- 成本和 LLM 依赖说明它距离低成本工业规模化还有距离。\n\n**判断**：强\n\n**理由**：  \n这个问题的时机很好：terminal agents 已经能执行复杂 CLI 任务，但训练数据瓶颈非常明显，而 synthetic task generation 正在成为主流解决路线。SkillSynth 进一步指出“合成任务数量”不是充分目标，正好切中当前方法的盲点。虽然领域还在早期，但 Terminal-Bench 的存在让这类工作有了及时且可比较的评估基础。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确质疑“多造 task instances 就能得到有效训练数据”的默认思路。  \n- 它把关注点从 task count / domain coverage 转向 execution trajectories 中实际经历的 scenarios 和 skills。  \n- 消融支持这一点：Single-skill、Random Multi-skill、SkillSynth 使用相同 multi-agent harness，但 SkillSynth 效果最好。  \n- Random Multi-skill 虽然增加了技能数量，但低于 SkillSynth：TB 2.0 为 25.8 vs 29.6，说明“多技能”本身不等于有效组合性。\n\n**负面证据或缺失**：  \n- 它仍然处在 synthetic task generation 这个现有框架内，并没有否定“合成任务训练 agent”的大范式。  \n- 对现有方法的比较主要是 task seed selection 层面，缺少与更多真实数据采集、human-authored benchmark、RL environment generation 等路线的系统比较。  \n- 它没有彻底解决 synthetic task 的 evaluator correctness 问题，只是通过 oracle + rubric 降低风险。\n\n**判断**：强\n\n**理由**：  \n这篇论文确实挑战了一个被容易默认接受的做法：只要合成更多任务，训练数据就会更好。它用 Random Multi-skill 的失败相对证明了“技能数量增加”不等于“轨迹多样性增加”，并提出 scenario-skill pair coverage 作为更贴近训练价值的视角。虽然它仍属于合成任务范式内部改进，但对该范式的关键评价指标进行了有力修正。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩为一句话：**“任务价值取决于轨迹覆盖。”**  \n- 材料中反复强调 terminal agent 的训练本质是在 partial scenarios 中选择并应用 skills，因此训练数据必须覆盖 diverse scenarios 和 diverse skills。  \n- 方法设计与洞见高度一致：收集技能、推断 pre/post scenario、构图、低频路径采样、生成任务、采样轨迹训练。  \n- 多样性分析给出直接证据：SkillSynth 的 unique scenario-skill pair 覆盖比 Single-skill 高 31%，比 Random Multi-skill 高 19%。\n\n**负面证据或缺失**：  \n- “scenario”和“skill”本身依赖 LLM 抽取与 embedding 聚类，边界可能不稳定。  \n- 论文没有充分证明 scenario-skill pair coverage 是最优或充分的 trajectory diversity 指标。  \n- 真实 terminal 任务可能包含并行、回溯、探索、失败恢复等结构，线性 scenario-skill 路径只能表达其中一部分。\n\n**判断**：强\n\n**理由**：  \n这篇论文的核心洞见非常清楚：训练 terminal agent 的关键不是任务说明有多少种，而是执行轨迹覆盖了多少状态与技能组合。更重要的是，论文的方法几乎每一步都围绕这个洞见展开，而不是只在引言中提出口号。虽然 scenario-skill 抽取本身有噪声，但作为研究问题的中心抽象足够清晰。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术风险是真实存在的：需要从技能中推断 pre/post scenario、做场景去重、判断场景兼容、生成可执行任务、构造测试、验证 oracle。  \n- 论文证明了基本可行性：3,721 条采样路径最终得到 3,560 个可用任务，oracle 通过率 95.7%。  \n- verify-then-repair loop 恢复了 721 个任务，说明系统不是一次性生成，而是能处理实际合成错误。  \n- 任务难度不是全都很简单：Hy3 Preview 三次尝试中 38% 任务 0/3 成功，37% 任务处于 1/3 或 2/3 的可学习区间。\n\n**负面证据或缺失**：  \n- 很多关键步骤依赖 LLM 判断，包括 scenario 推断、兼容性判断、三元组过滤、rubric 检查，误差可能在图中累积。  \n- 平均每个 verified task 成本约 27.3 美元，削弱“scalable”的实际可行性。  \n- 论文没有单独消融 inverse-frequency sampling、场景聚类、LLM 对齐、planner/constructor 拆分等组件，因此风险来源和收益来源没有完全拆清。  \n- 失败样本中 corrupted filesystem snapshots 很难通过 repair 恢复，说明生成环境仍有脆弱点。\n\n**判断**：中等\n\n**理由**：  \n这项工作有真实技术风险，也展示了相当强的工程可行性，例如 95.7% oracle pass rate 和 3,560 个可用任务。但它的可行性大量建立在昂贵 LLM、多轮修复和 LLM-as-judge 上，且关键组件缺少细粒度消融。因此它不是低风险平庸工程，但也还没有充分证明能低成本、稳健地规模化。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 材料显示作者能够接入或构建大规模技能来源，包括 ClawHub 和公开 GitHub 技能。  \n- 他们具备完整 terminal task synthesis pipeline：技能过滤、图构建、multi-agent harness、Docker 验证、oracle solution、rubric judge、trajectory sampling、SFT。  \n- 他们能用 MiniMax M2.7 采样 10,680 条轨迹，并训练 Qwen3-8B/14B/32B。  \n- 论文声称任务实例已被用于训练 Hy3 Preview，说明团队可能处在 terminal agent 训练与产品化交叉点上。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队、机构、已有系统、数据资产或基础设施的明确背景。  \n- 很多能力看起来是资源密集型，而不一定是独占优势；其他有强 LLM 与 agent infra 的团队也可能复现。  \n- 没有证据说明他们拥有不可替代的真实 terminal usage logs 或高质量人工标注技能库。\n\n**判断**：中等\n\n**理由**：  \n从结果看，团队显然具备做这类工作的工程能力和模型训练资源，尤其是能完成大规模任务合成、验证和 SFT，并将数据用于 Hy3 Preview。但输入材料没有证明他们拥有其他团队难以获得的独特数据或基础设施。比较优势存在，但更像是执行能力和资源优势，而非不可复制的结构性优势。\n\n---\n\n# 综合评价\n\n**值得深入关注。**\n\n这篇论文的研究问题有明确价值：它把 terminal task synthesis 的核心目标从“任务数量”推进到“执行轨迹的 scenario-skill 覆盖”，并用消融、Terminal-Bench 结果和多样性分析给出了较具体的支持。最强的地方不是某个单独算法，而是把 terminal agent 训练数据重新建模为一个可控的 workflow transition system。它的短板也明显：成本高、强依赖 LLM judge/constructor、关键组件消融不足，且目前主要覆盖线性链式任务。总体看，这是一个值得跟进的方向，但还不是一个已经完全成熟的可规模化方案。\n\n# 最致命的弱点\n\n最致命的问题是：**“可扩展性”仍然高度依赖昂贵且有噪声的 LLM 判断与任务生成流程。**  \n论文虽然报告了 95.7% oracle pass rate，但图构建、场景对齐、任务生成、rubric 检查都依赖 LLM，而且平均每个 verified task 成本约 27.3 美元。这会削弱它作为 scalable synthesis framework 的核心主张。\n\n# 如果要做得更好\n\n1. **补充关键组件消融**：至少应分别验证 inverse-frequency sampling、场景去重、LLM 场景对齐、planner/constructor 拆分、rubric verification 对最终性能和任务质量的贡献。  \n2. **从链式路径扩展到子图任务**：真实 terminal workflow 往往包含并行子任务、分支探索和汇总，目前的 linear skill chain 表达能力有限。  \n3. **降低 LLM 依赖与成本**：可以引入结构化 environment builder、schema-based test generation、局部规则验证，减少每个任务都依赖强 LLM 多轮修复的成本。\n\n# 与 Carlini 原则的对照\n\n**最符合的 Carlini 原则**：它符合“好研究应有一个清晰、可一句话说出的核心观点”——这里的核心观点就是“任务价值取决于轨迹覆盖，而非任务数量”。  \n\n**最不符合的 Carlini 原则**：它不太符合“用最小、干净的实验隔离关键因果因素”——多个关键组件没有单独消融，导致我们知道 SkillSynth 整体有效，但不完全知道每个设计到底贡献多少。",

                    "summary_translation": "Terminal agents（终端智能体）在 autonomous command-line execution（自主命令行执行）方面展现出强大潜力，但其训练仍受到 high-quality and diverse execution trajectories（高质量且多样化的执行轨迹）稀缺性的限制。现有方法通过合成大规模 terminal task instances（终端任务实例）以进行 trajectory sampling（轨迹采样），从而缓解这一瓶颈。然而，这些方法主要关注 task（任务）数量的扩展，而对 agents（智能体）在训练过程中实际经历的 execution trajectories（执行轨迹）多样性缺乏充分控制。\n\n本文提出 SkillSynth，一个基于 scenario-mediated skill graph（场景介导的技能图）的 automated framework（自动化框架），用于 terminal task synthesis（终端任务合成）。SkillSynth 首先构建一个大规模 skill graph（技能图），其中 scenarios（场景）作为 intermediate transition nodes（中间转换节点），用于连接多样化的 command-line skills（命令行技能）。随后，SkillSynth 从该图中采样 paths（路径），将其作为 real-world workflows（真实世界工作流）的抽象表示，并使用 multi-agent harness（多智能体执行框架）将这些路径实例化为 executable task instances（可执行任务实例）。\n\n通过将 task synthesis（任务合成）建立在 graph-sampled workflow paths（基于图采样的工作流路径）之上，SkillSynth 能够显式控制解决合成任务所需的 minimal execution trajectories（最小执行轨迹）的多样性。基于 Terminal-Bench 的实验结果验证了 SkillSynth 的有效性。此外，由 SkillSynth 合成的 task instances（任务实例）已被用于训练 Hy3 Preview，并促进其在 terminal-based settings（基于终端的场景）中的 agentic capabilities（智能体能力）提升。"

                    "summary": "Multi-agent debate has been shown to improve reasoning in large language models (LLMs). However, it is compute-intensive, requiring generation of long transcripts before answering questions. To address this inefficiency, we develop a framework that distills multi-agent debate into a single LLM through a two-stage fine-tuning pipeline combining debate structure learning with internalization via dynamic reward scheduling and length clipping. Across multiple models and benchmarks, our internalized models match or exceed explicit multi-agent debate performance using up to 93% fewer tokens. We then investigate the mechanistic basis of this capability through activation steering, finding that internalization creates agent-specific subspaces: interpretable directions in activation space corresponding to different agent perspectives. We further demonstrate a practical application: by instilling malicious agents into the LLM through internalized debate, then applying negative steering to suppress them, we show that distillation makes harmful behaviors easier to localize and control with smaller reductions in general performance compared to steering base models. Our findings offer a new perspective for understanding multi-agent capabilities in distilled models and provide practical guidelines for controlling internalized reasoning behaviors. Code available at https://github.com/johnsk95/latent_agents",
