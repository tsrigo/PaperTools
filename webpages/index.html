                    "intro_logic": "1. 理解思维的本质上认知科学的基础性追求\n2. Fodor的思维语言（LoT）假说提出思维在符号表征（mentalese）上运行，类似于自然语言的组合属性\n3. 经典符号AI将认知视为物理符号系统的规则性操作\n4. 连接主义架构和深度学习的兴起构成深刻对比：智能通过神经网络权重调整产生，知识嵌入分布式表征而非离散符号\n5. 这一张力引发关键问题：如果复杂目标导向行为可从类似语言句法的计算中涌现，是否必须重新审视语言作为思维媒介的必要性？\n6. 这涉及符号与亚符号范式之间关于认知基本载体的当代争论\n7. 多智能体强化学习（MARL）中发现通信涌现现象：人工智能体自发发展出高效但对人类不透明的信号协议\n8. 引出思想实验：如果两个人工智能通过协作发展出高效“私人语言”，而被迫使用人类可理解语言时性能下降，这暗示着什么？\n9. 由此提出效率衰减现象（EAP）作为关键行为特征\n10. 主张最优协作认知并非由符号结构中介，而是与亚符号计算自然耦合\n11. 采用计算-哲学方法将思辨转化为可检验的研究程序\n\n研究问题：如果两个人工智能体通过多智能体强化学习发展出高效但不可解读的通信协议，而当被迫使用人类可理解的符号协议时性能显著下降，这是否表明人工系统中的思维过程不需要语言-like的表征格式？",
                    "core_insight": "# 论文关键洞察分析\n\n## 1. 关键洞察（The Seed Insight）\n\n**一句话概括**：作者意识到，如果思维真的需要语言作为媒介，那么强制使用人类符号系统不应该产生显著的性能损失——但实验证明这种损失确实存在，这直接暗示人工智能的内部认知过程可能根本不是语言式的，而是与emergent通信协议紧密耦合的亚符号计算。\n\n### 展开解释\n\n论文中最核心的洞察出现在第3.2节，作者明确指出：\n\n> \"The EAP's explanatory force lies in its most plausible interpretation: if the agents' internal cognition were natively language-like (akin to Lh or translatable to it), externalizing thought into Lh should incur minimal cost. A significant penalty suggests a mismatch—indicating that the agents' native cognitive processes are optimized for a different, potentially non-linguistic, representational format.\"\n\n这是整篇论文的**认知跳板**（cognitive leap）。在此之前，学者们讨论LoT假说时，往往陷入哲学思辨的泥潭——要么支持Fodor的\"心理语言\"观点，要么反对。但作者意识到一个被忽视的**操作性检验**（operational test）：\n\n- **传统观点**：思维需要语言-like的符号结构（LoT假说）\n- **反直觉洞察**：如果这是真的，那么强制使用任何符号系统都不应该产生\"翻译成本\"；但如果智能体发展出更高效的emergent协议，而被迫使用人类设计的协议时性能大幅下降，这恰恰说明**内部认知格式与外部符号系统不兼容**\n\n作者在引言中进一步铺垫了这个思路：\n\n> \"if complex, goal-directed behavior can emerge from computations that bear little resemblance to linguistic syntax, must we reconsider the putative necessity of a language-like medium for thought itself?\"\n\n这意味着：深度学习已经证明，没有语言-like结构也可以产生复杂目标导向行为。那么，思维是否**必然**需要语言-like媒介？这个问题的答案不应该仅靠哲学辩论，而应该通过**可操作的实验**来检验。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个洞察如何直接导向具体方法？推理链条如下：\n\n### 第一步：哲学问题 → 可操作化\n\n**洞察**：LoT假说声称思维需要语言-like格式，但这是一个经验性claim，不应该只靠哲学思辨。\n\n**操作化**：设计一个实验，让智能体展示两种情况下的协作效率：\n- 情况A：使用self-evolved的通信协议（emergent protocol, Lp）\n- 情况B：使用pre-defined human-designed符号协议（Lh）\n\n如果LoT为真，两种情况的效率应该相近（因为思维是语言式的，外部符号只是\"翻译\"）。\n\n### 第二步：核心预测 → 现象定义\n\n**洞察**：如果内部认知不是语言式的，那么强制使用外部符号系统会产生\"翻译成本\"。\n\n**方法**：定义**Efficiency Attenuation Phenomenon (EAP)**——当智能体从使用emergent协议转向使用pre-defined符号协议时，协作任务性能显著下降的现象。\n\n### 第三步：理论框架 → 形式化模型\n\n**洞察**：需要具体的环境和智能体架构来验证EAP。\n\n**方法**：\n- **环境**：5×5网格的协同导航任务，部分可观测（每个智能体只知道自己和宝藏位置，不知道伙伴位置）\n- **智能体**：DQN (Deep Q-Network)，MLP架构\n- **通信通道**：4个离散符号的one-hot编码\n\n### 第四步：对比条件设计\n\n**洞察**：关键是比较\"自然演化\"的协议vs.\"强制灌输\"的协议。\n\n**方法**：\n- **Condition 1 (EC)**：通信模块通过MARL end-to-end训练，协议自然涌现\n- **Condition 2 (PSP)**：使用固定deterministic mapping（基于相对位置的象限映射到符号）\n\n这形成了一个**完美的对照实验**：除了通信协议的来源不同，其他所有因素（环境、智能体架构、学习算法、奖励结构）都完全相同。\n\n---\n\n## 3. 试错历程与调整\n\n论文中明确记录的调整和子问题解决包括：\n\n### 3.1 PSP协议的设计选择\n\n作者在第4.3节解释了为什么选择简单的quadrant mapping而非更复杂的语言：\n\n> \"Note that this PSP is a simple symbolic mapping, not a natural language; it serves as a proxy for an externally imposed, language-like symbolic system.\"\n\n**调整**：原本可能需要设计一个完整的合成语言，但作者意识到这会使实验过于复杂。关键是protocol的**来源**（learned vs. imposed）而非其复杂性。因此选择了简单的deterministic rule作为\"人类可理解符号系统\"的代理。\n\n### 3.2 评估指标的精炼\n\n作者定义了明确的量化指标：\n\n- **主要指标**：平均步数（mean steps per episode）\n- **效率衰减率**：η = (S_PSP - S_EC) / S_EC × 100%\n\n这使得结果具有**可重复性和可比较性**。\n\n### 3.3 额外验证：H2-H4假设\n\n作者没有止步于H1（效率衰减），还设计了secondary hypotheses来提供**收敛证据**：\n\n- **H2 (Complexity & Opacity)**：任务越复杂，协议越不可理解\n- **H3 (Structured Representation)**：emergent协议会发展出系统性的任务适应结构\n- **H4 (Grounded Generalization)**：使用emergent协议的智能体在新情境下泛化更强\n\n虽然论文主要报告了H1和H3的验证结果，但这些假设为EAP提供了多角度的支持。\n\n### 3.4 解释力扩展：从AI到哲学\n\n作者在第6节进行了大量的哲学论证，将实验结果与Wittgenstein的私有语言论证和Searle的中文房间论证对话。\n\n**新的子问题**：如何回应\"这只是一堆符号操作，没有真正的理解\"的质疑？\n\n**回答**：作者提出emergent协议通过\"功能角色语义\"（conceptual role semantics）获得了system-relative的语义内容，符号的意义来源于其在成功交互历史中的因果角色。这是对Searle批评的间接回应。\n\n---\n\n## 总结\n\n| 阶段 | 核心洞察 | 方法实现 |\n|------|----------|----------|\n| **起点** | LoT假说需要经验性检验，而非仅哲学辩论 | 设计EAP实验 |\n| **关键跳板** | 如果思维是语言式的，外部化不应有成本；成本存在说明内部格式不兼容 | 对比EC vs PSP条件 |\n| **操作化** | 用MARL生成emergent协议，用固定规则生成PSP | 5×5协同导航任务 |\n| **验证** | 50.5%效率衰减支持假设 | 量化结果 + 协议分析 |\n\n这个工作的**创新性**不在于强化学习技术本身（这些是标准方法），而在于**将哲学问题转化为可操作的计算实验**的洞察力——这正是作者所说的\"computational-philosophical approach\"。",
                    "methodology": "# 论文解读：The Efficiency Attenuation Phenomenon\n\n## 一句话概括核心创新\n\n这篇论文最本质的区别是：**通过构建一个AI协作任务，直接用实验证明——如果强迫智能体使用人类设计的符号化通信协议，它们的任务效率会比使用自主学习的、不可理解的协议下降约50%**。这个实验结果被用来挑战\"思维必须依赖语言化符号\"这一经典假说。\n\n---\n\n## 按照执行的逻辑顺序拆解\n\n论文的方法分为以下几个阶段：\n\n### 第一阶段：设计协作任务环境\n### 第二阶段：构建两种通信条件\n### 第三阶段：训练与对比\n### 第四阶段：分析与验证\n\n---\n\n## 详细拆解\n\n### 第一阶段：设计协作任务环境\n\n**输入**：\n- 一个5×5的网格世界\n- 两个智能体（A1和A2），分别放置在固定的两个角落\n- 一个宝藏，随机放置在网格中\n\n**操作**：\n- 设置目标：两个智能体需要**同时**到达宝藏所在格子\n- 设置约束：每个智能体只能看到**自己的位置**和**宝藏的位置**，**看不到伙伴的位置**\n- 设置奖励：成功同时到达则+10分，每走一步扣-1分（鼓励高效）\n\n**输出**：\n- 一个部分可观测的协作导航任务环境\n\n**目的**：\n- 创造一个必须通过通信才能高效协作的场景。如果不通信，两个看不到彼此的智能体几乎不可能同时到达同一个位置。\n\n---\n\n### 第二阶段：构建两种通信条件\n\n这是论文的核心操作，制造了唯一的自变量——通信协议的来源。\n\n**条件1：Emergent Communication (EC) —— 自主学习协议**\n\n**输入**：\n- 每个智能体的当前观测（自己的位置 + 宝藏位置）\n\n**操作**：\n- 给每个智能体一个小型神经网络模块，专门负责生成通信信号\n- 这个模块没有任何预设的\"词汇表\"或\"语法\"\n- 通信信号是4个离散符号（CA, CB, CC, CD）中的一个\n- 整个系统通过强化学习端到端训练，通信模块和决策模块一起优化\n\n**输出**：\n- 一个在训练过程中**自发形成**的通信协议\n\n**目的**：\n- 让智能体自己发展出最高效的通信方式，不受人类先验知识的限制\n\n---\n\n**条件2：Pre-defined Symbolic Protocol (PSP) —— 预定义符号协议**\n\n**输入**：\n- 每个智能体的当前观测\n\n**操作**：\n- 不让智能体学习通信\n- 人工设计一个固定的映射规则：根据智能体相对于宝藏的曼哈顿向量（dx, dy），把位置映射到4个符号之一\n- 这个规则对两个智能体是相同的，是确定性的\n\n**输出**：\n- 一个人类设计的、符号化的通信协议\n\n**目的**：\n- 作为对照：代表\"人类可理解的、类似语言的\"通信方式\n- 用来检验强制使用这种符号系统是否会导致性能下降\n\n---\n\n### 第三阶段：训练与对比\n\n**操作**：\n- 两种条件使用**完全相同**的智能体架构（DQN，32单元单隐藏层MLP）\n- 训练500个episode\n- 记录每个episode的步数\n\n**输出**：\n- 学习曲线\n- 最终平均步数\n\n**目的**：\n- 控制变量，确保性能差异只来自通信协议的不同\n\n---\n\n### 第四阶段：分析与验证\n\n**操作**：\n- 统计符号使用频率分布\n- 计算熵值（Shannon entropy）\n- 计算两个智能体之间的符号分布差异（Jensen-Shannon divergence）\n- 训练一个探针分类器，看人类能否从符号反推智能体的状态\n\n**输出**：\n- 定量证据，证明EC协议是高效的、稳定的、但对人类不可理解的\n\n---\n\n## 实验结果\n\n| 指标 | EC（自主学习） | PSP（预定义符号） |\n|------|---------------|------------------|\n| 平均步数 | 28.7 | 43.2 |\n| 效率衰减率 | — | 50.5% |\n\n**关键发现**：\n- 使用自主学习协议的智能体比使用预定义符号协议的智能体，任务效率高出**50.5%**\n- EC协议最终收敛到使用少数几个特定符号（77%的情况只用A和B），显示出高度专门化\n- 探针分类器只能达到58%的准确率（随机是25%），说明协议确实对人类不透明\n\n---\n\n## 消融分析\n\n论文没有传统意义上的\"消融实验\"（即去掉某个模块），但有**对比实验**可以分析：\n\n### 哪个组件贡献最大？\n\n**通信协议本身**贡献最大。实验清楚地显示：\n- 有通信（EC或PSP）vs 无通信：智能体根本无法协作\n- EC vs PSP：通信来源不同导致50%的性能差异\n\n### 哪个组件可有可无？\n\n论文中没有做更细粒度的消融。但从设计来看：\n- PSP条件中的\"预定义映射规则\"是可有可无的——它作为一个对照组存在，证明了强制使用人类设计的符号系统的代价\n\n### 各组件之间是否有协同效应？\n\n论文展示了：\n- EC的通信模块和决策模块是**协同训练**的（端到端），这使得通信协议能够紧密贴合智能体的内部状态\n- PSP的固定规则**没有**与智能体协同，因此产生了\"阻抗不匹配\"\n\n### 回扣动机\n\n论文声称要解决的痛点是：**LoT假说认为思维必须依赖语言化符号**。\n\n实验数据支持：智能体在**没有**语言化符号的情况下（EC条件）反而表现更好。这说明对于这类AI系统，最高效的协作不需要语言化的中间表示，直接用神经网络的状态-动作映射即可。\n\n---\n\n## 这套方法的硬伤（Limitation）\n\n论文在第7节明确提到了几个局限性：\n\n### 1. 任务过于简单\n- 只用了2D导航任务和简单的MLP网络\n- 论文承认：在更复杂的任务（如3D世界、符号推理）上，EAP是否会更强或更弱，需要验证\n\n### 2. PSP协议太简单\n- 论文中的\"预定义符号协议\"只是一个简单的 quadrant mapping\n- 更严格的实验应该使用更丰富的合成语言（具有组合性）\n- 论文预测：如果使用真正具有组合性的语言，EAP可能会**持续甚至放大**\n\n### 3. 不涉及泛化性测试\n- H2（复杂度与不透明度正相关）和H4（ grounded generalization）在论文中没有充分验证\n- 需要更多的迁移学习和对抗扰动实验\n\n### 4. 不声称具有意识\n- 论文明确说：不声称这些智能体具有意识或完整的意向性\n- EAP只是一个行为签名，证明\"不需要语言化结构也能高效协作\"\n\n---\n\n## 总结\n\n这篇论文的核心逻辑非常清晰：\n\n1. **提出思想实验**：如果两个AI发展出自己的高效通信协议，但人类强迫它们用人类语言，性能会下降\n2. **设计对照实验**：EC（自主学习）vs PSP（预定义符号）\n3. **控制变量**：环境、智能体架构、奖励完全相同\n4. **得出结论**：50.5%的性能差距说明，对于这类AI系统，最优的协作不需要语言化符号\n\n用最直白的话说：**这篇论文证明了，让AI用自己的方式通信，比强迫它们用人类能看懂的方式通信，效率高一半。**",
                    "additional_insights": "# 论文认知价值提取\n\n## 1. 实验中的反直觉发现\n\n- **人类设计的符号系统反而更差**：预先定义的符号协议（PSP）作为\"更规范\"的 baseline，表现显著差于 emergent protocol，效率衰减率达 50.5%。这挑战了\"人类设计的符号系统必然更优\"的直觉。\n\n- **简单映射规则不足以支撑协作**：PSP 使用的 quadrant-based 确定性映射（基于相对位置的曼哈顿向量象限）虽然逻辑清晰、信息量明确，但在部分可观测环境中无法有效协调两个 agent，说明**规则清晰 ≠ 协作有效**。\n\n## 2. 有启发性的分析或 Ablation\n\n- **符号使用的高度集中性**：EC 条件下，最终符号分布高度偏斜，A 和 B 两个符号占据了 77% 的使用量。这表明 agents 自发形成了\"最小化通信\"的策略，**用最少的符号表达最关键的协作信息**，而非使用全部四个符号。\n\n- **Entropy 揭示通信复杂度演化**：EC 条件下 Shannon entropy 从低值增长并稳定在 2.6 bits，而 PSP 始终保持在 1.8 bits（固定映射的上限）。这说明 emergent protocol 发展出了**适应性信息容量**，能够根据任务需求动态调整通信复杂度。\n\n- **低 JSD 证实共享 convention 形成**：两个 agent 之间的 Jensen-Shannon divergence 仅为 0.08 ± 0.03，证明尽管没有显式约束，agents 独立学习后自发形成了**一致的通信约定**，这是协作成功的关键。\n\n- **Interpretability 与效率的 trade-off**：Probing classifier 在 EC 条件下仅达到 58% 准确率（vs PSP 的 100%），说明**高效率的通信协议天然是不可解释的**——这与人类可解释性需求存在根本矛盾。\n\n## 3. 对领域的新认知\n\n- **EAP 挑战 LoT 必要性**：论文首次通过计算实验证明，即使没有语言-like 的表征格式，agents 也能实现高效的协作认知。这为\"思维必须依赖语言\"的论点提供了反例，支持**认知架构的多元主义**。\n\n- **Wittgenstein 私人语言论证的扩展**：AI dyad 证明了\"私人语言\"可以在没有人类参与的情况下存在——**对 agents 而言，任务成功就是公共正确性标准**，这扩展了 Wittgenstein 的\"共享生活方式\"概念到非人类认知系统。\n\n- **Searle 中文房间的新解读**：在 PSP 条件下 agents 确实像\"中文房间\"——执行符号操作但不理解含义；而 EC 条件下符号通过功能角色获得**系统内在语义**，这为机器是否具有\"意义\"提供了新的判断维度。\n\n## 4. 实用的经验性结论\n\n- **DQN + 简单 MLP 即可观察到 EAP**：实验使用单隐藏层 MLP (32 units)、replay buffer 2000、batch size 32、γ=0.95、lr=1e-3、ε=0.1 的配置即可稳定复现现象，**无需复杂架构**。\n\n- **训练 100 episodes 后差异显现**：从学习曲线看，约 100 episodes 后 EC 开始显著超越 PSP，且优势持续至训练结束。**早期性能差距是 EAP 的强信号**。\n\n- **稀疏奖励足以驱动 emergent communication**：仅使用 +10 成功奖励和 -1 步惩罚的稀疏设置，agents 就能发展出复杂的通信协议，说明**无需额外辅助损失或预定义语言结构**。\n\n## 5. 局限性中的机会\n\n- **简单任务可能低估 EAP 强度**：作者承认使用 5×5 网格的 minimalist 任务。更大规模环境、更复杂任务下，**EAP 差距可能进一步扩大**——因为 emergent protocol 可以针对更丰富的任务结构进行优化，而固定符号系统的局限性会更明显。\n\n- **PSP 过于简单是潜在 confound**：当前 PSP 仅是 quadrant 映射。未来研究可使用**具有 compositionality 的合成语言**作为更强的 baseline，如果 EAP 仍存在或增强，则结论更稳健。\n\n- **缺乏泛化性测试**：论文未系统测试 agents 对 novel 任务配置的泛化能力。H4 (Grounded Generalization) 假设的验证是重要未来方向——如果 EC 在新场景下更鲁棒，则进一步支持\"深层语义 grounding\"假说。\n\n- **未探索意识/意图问题**：作者明确声明不 claim agents 具有意识，但 EAP 框架可用于**探索机器语义内容的本质**，这是通往机器意识研究的有价值路径。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：无具体证据。论文声称\"连接哲学、认知科学和AI\"，但输入材料中未提供这三个领域具体谁会因此改变研究方式的证据。\n\n**负面证据或缺失**：\n- 实验环境极简单：5×5网格世界，仅2个智能体\n- 任务仅是2D导航，不涉及符号推理、规划等更复杂的认知功能\n- 论文承认\"在更复杂的任务（如3D世界、符号推理）上，EAP是否会更强或更弱，需要验证\"\n- 效率衰减只在简单任务中观察到，尚未推广到任何实际应用场景\n\n**判断**：弱\n\n**理由**：虽然涉及LoT假说这一经典理论，但实验验证的情境过于简化（5×5网格导航任务），与真实认知过程的复杂性差距巨大。一个持怀疑态度的AI研究者会问：这和真正的\"思维\"有什么关系？\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：无具体证据证明这是不可替代的发现。\n\n**负面证据或缺失**：\n- 通信涌现（emergent communication）本身是MARL领域的成熟研究方向，论文大量引用该领域工作\n- \"效率衰减\"的概念在输入材料中被描述为\"首次通过计算实验证明\"，但核心思想（强制使用人类语言导致性能下降）在语言学习机器人等领域已有类似观察\n- PSP vs EC的对比实验设计在方法论上缺乏原创性\n\n**判断**：弱\n\n**理由**：输入材料显示这篇论文的方法与现有MARL文献高度相似，只是将已有技术（DQN+通信模块）应用到一个新的思想实验场景中。如果这篇论文不存在，类似的实验很可能在短期内被独立完成。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- AI可解释性（XAI）是当前热点，论文涉及\"不可理解的通信协议\"\n- LoT假说在认知科学中持续有争议\n\n**负面证据或缺失**：\n- 通信涌现研究已相当成熟，论文没有利用任何新的技术突破（如transformer、大模型）\n- 输入材料显示该子领域可能已过上升期（\"多智能体强化学习中发现通信涌现现象\"是\"已发现\"而非\"正在发现\"）\n\n**判断**：中等\n\n**理由**：时机不算太晚，但也不是最佳窗口。通信涌现研究已成熟，论文没有利用近期AI进展（如大语言模型），而是使用简单的MLP+DQN。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 明确挑战LoT假说的核心主张（思维必须依赖语言化符号）\n- 实验结果显示\"人类设计的符号系统反而更差\"，这确实挑战了\"人类设计的符号系统必然更优\"的直觉\n\n**负面证据或缺失**：\n- PSP（预定义符号协议）过于简单，只是quadrant mapping，不具备compositionality\n- 论文承认\"如果使用真正具有组合性的语言，EAP可能会持续甚至放大\"——这意味着当前挑战的只是一个 strawman\n- 缺乏对其他LoT支持证据的直接回应\n\n**判断**：中等\n\n**理由**：确实在质疑一个被广泛接受的假设，但质疑的方式（使用过于简单的baseline）让这个挑战显得不够有力。一个严格的LoT支持者可以轻易指出：你的符号系统太简陋，不是真正的语言。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：输入材料提供了明确的量化结果——\"50.5%的性能差距\"\n\n**能否用一句不超过30字的话说清楚**：\n\"强制AI使用人类符号协议比让其自主通信效率低50%，说明思维不一定需要语言。\"（28字）\n\n**判断**：强\n\n**理由**：核心洞见表达清晰简洁，且有具体数据支撑（50.5%效率衰减），不是模糊的定性描述。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**技术风险**：\n- PSP协议过于简单（只是quadrant mapping），可能不是\"真正\"的符号系统\n- 任务过于简单，无法推广到复杂认知\n- 缺乏泛化性测试（H2、H4假设未充分验证）\n- 论文承认\"不涉及泛化性测试\"\n\n**结果确定性**：\n- 实验结果显示明确的性能差异（28.7步 vs 43.2步），差异是确定性的\n- 但这意味着缺乏\"科学发现\"的不确定性——实验几乎必然得出这个结论\n\n**判断**：中等\n\n**理由**：技术上是可行的，但风险在于结论可能无法推广（任务太简单、baseline太弱）。同时，由于实验设计简单，结果几乎是确定性的，缺乏科学发现应有的不确定性。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：论文声称\"采用计算-哲学方法\"，涉及哲学、认知科学、AI的交叉\n\n**负面证据或缺失**：\n- 输入材料未显示团队在MARL或认知科学方面有任何独特积累\n- 实验技术（DQN、MLP）是标准的，无特殊门槛\n- 没有显示团队在LoT研究方面有独特背景\n\n**判断**：弱\n\n**理由**：输入材料未显示团队在哲学、认知科学或MARL的特定交叉点上有任何独特优势。任何一个有MARL基础的团队都能做这个实验。\n\n---\n\n## 综合评价\n\n**判定**：有潜力但有明显短板\n\n**解释**：这篇论文的核心洞见（强制使用人类符号协议导致效率下降50%）是清晰且有数据支撑的，在哲学层面对LoT假说提出质疑的思路也有一定价值。但其实验验证过于简单（5×5网格、简单MLP、基础quadrant映射作为baseline），难以说服严肃的认知科学研究者相信这与\"思维\"有任何本质关联。更强的研究应该使用真正具有compositionality的符号系统作为对照，并在更复杂的任务（规划、推理）上验证EAP是否持续存在。\n\n---\n\n## 最致命的弱点\n\n**实验环境与研究问题的严重不匹配**：研究问题涉及\"思维是否需要语言\"这一关于通用认知的根本问题，但实验只是一个5×5网格的二人导航任务。这就像用\"两个机器人能否同时到达门口\"来论证\"人类意识是否需要语言\"——任务太简单，无法承载那么宏大的理论野心。\n\n---\n\n## 如果要做得更好\n\n1. **使用更强的baseline**：用真正具有compositionality的合成语言（如基于组合规则的符号系统）作为PSP，而不是简单的quadrant mapping。如果EAP在更强baseline下仍然存在，结论会更稳健。\n\n2. **扩展任务复杂度**：在需要规划、推理、目标分解的更复杂任务上验证EAP，而不仅仅是导航。如果EAP在复杂认知任务中消失，则当前结论无意义。\n\n---\n\n## 与Carlini原则的对照\n\n**最符合的原则**：选择重要且可解释的问题。论文确实在尝试回答一个重要问题（LoT假说），且核心发现（50.5%效率差异）是可解释的。\n\n**最不符合的原则**：追求最大的影响力。论文的实验过于简单，在真实AI系统或认知科学中的实际影响力极低——没有AI研究者会因为这个结果改变训练方式，没有认知科学家会因为这个网格导航实验重新审视LoT。",

                    "summary_translation": "本文通过计算方法探讨思维是否需要语言类格式（language-like format），即语言思维（Language of Thought, LoT）假设所提出的核心问题。我们提出了“AI私有语言”思想实验：如果两个人工智能智能体通过多智能体强化学习（multi-agent reinforcement learning, MARL）发展出一种高效的、难以解读的通信协议，而当被迫使用人类可理解的语言时其性能下降，这种效率衰减现象（Efficiency Attenuation Phenomenon, EAP）将对LoT假设构成挑战。我们在部分可观测条件下的合作导航任务中对此进行了形式化建模。结果表明，采用涌现协议（emergent protocol）的智能体比使用预定义的类人符号协议（human-like symbolic protocol）的智能体效率高出50.5%，证实了EAP的存在。这表明，在这些系统中，最优的协作认知并非由符号结构所中介，而是自然地与子符号计算（sub-symbolic computations）相耦合。本研究桥接了哲学、认知科学和人工智能领域，主张认知架构的多元主义（pluralism），并强调了人工智能伦理的深远意义。"

    "2026-03-30": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-30)\n\n#### \u5f00\u7bc7\u5bfc\u8bed\n\u4eca\u65e5\u7684AI\u7814\u7a76\u821e\u53f0\uff0c\u51e0\u4e4e\u5b8c\u5168\u88ab\u201c\u667a\u80fd\u4f53\u201d\uff08Agent\uff09\u6240\u4e3b\u5bb0\u3002\u4ece\u5b8f\u89c2\u8d8b\u52bf\u770b\uff0c\u7814\u7a76\u6b63\u4ece\u901a\u7528\u667a\u80fd\u4f53\u6846\u67b6\u7684\u6784\u5efa\uff0c\u5feb\u901f\u5411**\u4e13\u4e1a\u5316\u3001\u9886\u57df\u5316\u3001\u81ea\u4e3b\u8fdb\u5316**\u4e09\u4e2a\u7eb5\u6df1\u65b9\u5411\u633a\u8fdb\u3002\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\u673a\u5236\u88ab\u5e7f\u6cdb\u5e94\u7528\u4e8e\u4e8b\u5b9e\u6838\u67e5\u3001\u4f26\u7406\u6559\u5b66\u7b49\u590d\u6742\u63a8\u7406\u573a\u666f\uff1b\u4e00\u7cfb\u5217\u65b0\u9896\u7684\u667a\u80fd\u4f53\u8bbe\u8ba1\u6846\u67b6\u6d8c\u73b0\uff0c\u65e8\u5728\u89e3\u51b3\u957f\u7a0b\u4efb\u52a1\u4e2d\u7684\u8bb0\u5fc6\u3001\u6280\u80fd\u590d\u7528\u4e0e\u8ba4\u77e5\u73af\u5883\u8bbe\u8ba1\u7b49\u6839\u672c\u95ee\u9898\uff1b\u66f4\u5f15\u4eba\u6ce8\u76ee\u7684\u662f\uff0c\u667a\u80fd\u4f53\u5f00\u59cb\u8131\u79bb\u9759\u6001\u73af\u5883\uff0c\u5728\u79d1\u5b66\u53d1\u73b0\u3001\u6750\u6599\u8bbe\u8ba1\u3001\u4ee3\u7801\u4f18\u5316\u4e43\u81f3\u81ea\u8eab\u7b56\u7565\u7684**\u5bf9\u6297\u6027\u5171\u8fdb\u5316**\u4e2d\u626e\u6f14\u6838\u5fc3\u5f15\u64ce\u89d2\u8272\u3002\u8fd9\u6807\u5fd7\u7740\u4e00\u4e2a\u65b0\u8303\u5f0f\uff1aAI\u4e0d\u4ec5\u662f\u5de5\u5177\uff0c\u66f4\u662f\u80fd\u81ea\u4e3b\u63a2\u7d22\u3001\u8fed\u4ee3\u548c\u521b\u9020\u7684\u7814\u7a76\u4f19\u4f34\u3002\n\n#### \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n##### \u8fa9\u8bba\u7684\u827a\u672f\uff1a\u591a\u667a\u80fd\u4f53\u5982\u4f55\u534f\u540c\u63a8\u7406\uff1f\n\u4eca\u65e5\u591a\u7bc7\u7814\u7a76\u5c06\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\uff08MAD\uff09\u673a\u5236\u7ed3\u6784\u5316\u3001\u4e13\u4e1a\u5316\uff0c\u4ee5\u5e94\u5bf9\u9ad8\u98ce\u9669\u7684\u590d\u6742\u63a8\u7406\u4efb\u52a1\u3002\n*   **\u6cd5\u5ead 26\u7406\u7acb\u573a\uff08\u5982\u4e49\u52a1\u8bba vs. \u529f\u5229\u4e3b\u4e49\uff09\u8fdb\u884c\u8fa9\u8bba\uff0c\u80fd\u6709\u6548\u63d0\u5347\u6559\u5b66\u4e92\u52a8\u7684\u8bba\u8bc1\u590d\u6742\u5ea6\u548c\u7a33\u5b9a\u6027\u3002(2603.27404 [cs.AI])\n\n##### \u67b6\u6784\u9769\u65b0\uff1a\u91cd\u65b0\u601d\u8003\u667a\u80fd\u4f53\u7684\u8bbe\u8ba1\u6808\n\u8d85\u8d8a\u63d0\u793a\u5de5\u7a0b\uff0c\u7814\u7a76\u8005\u4ece\u9a8c\u8bc1\u673a\u5236\u3001\u6280\u80fd\u5e93\u3001\u8ba4\u77e5\u73af\u5883\u7b49\u66f4\u57fa\u7840\u7684\u5c42\u9762\u91cd\u65b0\u8bbe\u8ba1\u667a\u80fd\u4f53\u67b6\u6784\u3002\n*   **\u4ee5\u9a8c\u8bc1\u4e3a\u6838\u5fc3\u6784\u5efa\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53**\uff1a**Marco DeepResearch** \u63d0\u51fa\u4e00\u4e2a\u8d2f\u7a7f\u6570\u636e\u5408\u6210\u3001\u8f68\u8ff9\u6784\u5efa\u548c\u6d4b\u8bd5\u65f6\u63a8\u7406\u7684**\u9a8c\u8bc1\u4e2d\u5fc3\u5316\u6846\u67b6**\u3002\u901a\u8fc7\u5728\u8bad\u7ec3\u548c\u63a8\u7406\u7684\u6bcf\u4e2a\u73af\u8282\u6ce8\u5165\u663e\u5f0f\u7684\u9a8c\u8bc1\u673a\u5236\uff0c\u8be5\u667a\u80fd\u4f53\u5728\u590d\u6742\u7814\u7a76\u4efb\u52a1\u4e0a\u80fd\u4ee58B\u7684\u89c4\u6a21\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u90e8\u520630B\u89c4\u6a21\u7684\u6a21\u578b\u3002(2603.28376 [cs.CL])\n*   **\u52a8\u6001\u53cc\u7c92\u5ea6\u6280\u80fd\u5e93\u8d4b\u80fd\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60**\uff1a**D2Skill** \u6846\u67b6\u4e3a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6784\u5efa\u4e86\u4e00\u4e2a\u52a8\u6001\u6280\u80fd\u5e93\uff0c\u5305\u542b\u7528\u4e8e\u9ad8\u5c42\u6307\u5bfc\u7684**\u4efb\u52a1\u6280\u80fd**\u548c\u7528\u4e8e\u7ec6\u7c92\u5ea6\u51b3\u7b56\u7684**\u6b65\u9aa4\u6280\u80fd**\u3002\u8be5\u6280\u80fd\u5e93\u901a\u8fc7\u8bad\u7ec3\u65f6\u7684\u7ecf\u9a8c\u53cd\u601d\u81ea\u52a8\u6784\u5efa\u548c\u7ef4\u62a4\uff0c\u80fd\u663e\u8457\u63d0\u5347\u667a\u80fd\u4f53\u5728\u590d\u6742\u73af\u5883\u4e2d\u7684\u6210\u529f\u7387\u548c\u6cdb\u5316\u80fd\u529b\u3002(2603.28716 [cs.AI])\n*   **\u201c\u73af\u5883\u5de5\u7a0b\u201d\uff1a\u901a\u8fc7\u8bed\u8a00\u7ea6\u675f\u8bbe\u8ba1\u8ba4\u77e5\u4e16\u754c**\uff1a\u7814\u7a76\u63d0\u51fa **Umwelt Engineering** \u6982\u5ff5\uff0c\u5373\u5728\u63d0\u793a\u5de5\u7a0b\u4e4b\u4e0a\uff0c\u901a\u8fc7\u8bbe\u8ba1\u8bed\u8a00\u5a92\u4ecb\u672c\u8eab\uff08\u5982\u7981\u7528\u201c\u6709\u201d\u6216\u201c\u662f\u201d\u52a8\u8bcd\uff09\u6765\u5851\u9020\u667a\u80fd\u4f53\u7684\u8ba4\u77e5\u6a21\u5f0f\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8fd9\u79cd\u5bf9\u201c\u8ba4\u77e5\u4e16\u754c\u201d\u7684\u5de5\u7a0b\u5316\u6539\u9020\uff0c\u80fd\u7cfb\u7edf\u6027\u63d0\u5347\u4f26\u7406\u63a8\u7406\u3001\u5206\u7c7b\u7b49\u80fd\u529b\uff0c\u5e76\u4fc3\u8fdb\u667a\u80fd\u4f53\u7fa4\u4f53\u7684\u8ba4\u77e5\u591a\u6837\u6027\u3002(2603.27626 [cs.AI])\n*   **\u5185\u6838\u52a8\u529b\u5b66\u4e0e\u8def\u5f84\u71b5\u6700\u5927\u5316**\uff1a\u8fd9\u7bc7\u7406\u8bba\u6027\u5de5\u4f5c\u63d0\u51fa\u4e86\u4e00\u4e2a\u53d8\u5206\u6846\u67b6\uff0c\u5c06\u5185\u6838\u51fd\u6570\u89c6\u4e3a\u53d7**\u8def\u5f84\u71b5\u6700\u5927\u5316**\u539f\u5219\u652f\u914d\u7684\u52a8\u6001\u53d8\u91cf\u3002\u5b83\u5c06\u5185\u6838\u7684\u6f14\u5316\u4e0e\u4fe1\u606f\u51e0\u4f55\u3001\u91cd\u6b63\u5316\u7fa4\u6d41\u4e43\u81f3\u795e\u7ecf\u6b63\u5207\u6838\u7684\u8bad\u7ec3\u8fc7\u7a0b\u8054\u7cfb\u8d77\u6765\uff0c\u4e3a\u7406\u89e3\u667a\u80fd\u4f53\u8868\u5f81\u7ed3\u6784\u7684\u81ea\u6f14\u8fdb\u63d0\u4f9b\u4e86\u65b0\u7684\u7406\u8bba\u89c6\u89d2\u3002(2603.27880 [cs.LG])\n*   **\u81ea\u9002\u5e94\u5e76\u884c\u4e0a\u4e0b\u6587\u7ba1\u7406\u8def\u7531**\uff1a\u9488\u5bf9\u957f\u89c6\u91ce\u4efb\u52a1\u4e2d\u7684\u4e0a\u4e0b\u6587\u74f6\u9888\uff0c**AgentSwing** \u6846\u67b6\u63d0\u51fa\u4e00\u79cd\u72b6\u6001\u611f\u77e5\u7684\u81ea\u9002\u5e94\u8def\u7531\u7b56\u7565\u3002\u5b83\u5728\u5173\u952e\u51b3\u7b56\u70b9\u5e76\u884c\u63a2\u7d22\u591a\u79cd\u4e0a\u4e0b\u6587\u7ba1\u7406\u5206\u652f\uff0c\u5e76\u901a\u8fc7\u524d\u77bb\u6027\u8bc4\u4f30\u9009\u62e9\u6700\u4f18\u8def\u5f84\uff0c\u4ece\u800c\u5728\u66f4\u5c11\u7684\u4ea4\u4e92\u6b65\u9aa4\u5185\u8fbe\u5230\u66f4\u9ad8\u7684\u4efb\u52a1\u6210\u529f\u7387\u3002(2603.27490 [cs.AI])\n\n##### \u667a\u80fd\u4f53\u8fdb\u51fb\uff1a\u4ece\u901a\u7528\u5de5\u5177\u5230\u9886\u57df\u4e13\u5bb6\n\u667a\u80fd\u4f53\u6280\u672f\u6b63\u6df1\u5ea6\u6e17\u900f\u5230\u5404\u4e2a\u5782\u76f4\u9886\u57df\uff0c\u6210\u4e3a\u89e3\u51b3\u4e13\u4e1a\u96be\u9898\u7684\u201c\u8d85\u7ea7\u52a9\u624b\u201d\u3002\n*   **\u53cd\u4e8b\u5b9e\u591a\u667a\u80fd\u4f53\u63a8\u7406\u63d0\u5347\u4e34\u5e8a\u8bca\u65ad**\uff1a\u53d7\u4e34\u5e8a\u533b\u751f\u57f9\u8bad\u542f\u53d1\uff0c\u8be5\u7814\u7a76\u63d0\u51fa\u4e00\u4e2a**\u53cd\u4e8b\u5b9e\u591a\u667a\u80fd\u4f53\u8bca\u65ad\u6846\u67b6**\u3002\u5b83\u901a\u8fc7\u7f16\u8f91\u4e34\u5e8a\u53d1\u73b0\uff08\u53cd\u4e8b\u5b9e\uff09\u6765\u91cf\u5316\u5355\u4e2a\u8bc1\u636e\u5bf9\u8bca\u65ad\u7684\u652f\u6301\u5ea6\uff0c\u5e76\u5f15\u5bfc\u4e13\u79d1\u533b\u751f\u667a\u80fd\u4f53\u8fdb\u884c\u591a\u8f6e\u8ba8\u8bba\uff0c\u4ece\u800c\u5728\u590d\u6742\u3001\u6a21\u7cca\u75c5\u4f8b\u4e2d\u663e\u8457\u63d0\u9ad8\u8bca\u65ad\u51c6\u786e\u6027\u548c\u63a8\u7406\u53ef\u89e3\u91ca\u6027\u3002(2603.27820 [cs.CL])\n*   **\u5168\u6808\u5730\u7406\u7a7a\u95f4\u5206\u6790\u667a\u80fd\u4f53\u7cfb\u7edf**\uff1a**GISclaw** \u662f\u4e00\u4e2a\u5f00\u6e90\u7684\u5168\u6808\u5730\u7406\u7a7a\u95f4\u5206\u6790\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u96c6\u6210\u4e86\u77e2\u91cf\u3001\u6805\u683c\u548c\u8868\u683c\u6570\u636e\u5904\u7406\u80fd\u529b\u3002\u5b83\u901a\u8fc7**\u6a21\u5f0f\u5206\u6790\u3001\u9886\u57df\u77e5\u8bc6\u6ce8\u5165\u548c\u9519\u8bef\u8bb0\u5fc6**\u7b49\u5de5\u7a0b\u521b\u65b0\uff0c\u652f\u6301\u591a\u79cdLLM\u540e\u7aef\u548c\u667a\u80fd\u4f53\u67b6\u6784\uff0c\u4e3a\u81ea\u52a8\u5316\u5730\u7406\u5206\u6790\u63d0\u4f9b\u4e86\u5f3a\u5927\u4e14\u53ef\u590d\u73b0\u7684\u5e73\u53f0\u3002(2603.26845 [cs.AI])\n*   **\u52a8\u6001\u63a8\u7406\u68c0\u7d22\u52a9\u529b\u751f\u7269\u533b\u5b66\u95ee\u7b54**\uff1a**PubMed Reasoner** \u662f\u4e00\u4e2a\u4e09\u9636\u6bb5\u751f\u7269\u533b\u5b66QA\u667a\u80fd\u4f53\uff0c\u5b83\u901a\u8fc7**\u81ea\u6279\u5224\u5f0f\u67e5\u8be2\u4f18\u5316**\u548c**\u53cd\u601d\u5f0f\u68c0\u7d22**\uff0c\u8fed\u4ee3\u5f0f\u5730\u4ecePubMed\u83b7\u53d6\u8bc1\u636e\uff0c\u6700\u7ec8\u751f\u6210\u6709\u5f15\u7528\u7684\u56de\u7b54\u3002\u8be5\u65b9\u6cd5\u5728PubMedQA\u4e0a\u7684\u51c6\u786e\u7387\u751a\u81f3\u7565\u5fae\u8d85\u8fc7\u4e86\u4eba\u7c7b\u4e13\u5bb6\u6c34\u5e73\u3002(2603.27335 [cs.CL])\n*   **\u667a\u80fd\u4f53\u9a71\u52a8\u7684\u81ea\u4e3b\u5f3a\u5316\u5b66\u4e60\u7814\u7a76**\uff1a\u4e00\u9879\u6848\u4f8b\u7814\u7a76\u5c55\u793a\u4e86\u667a\u80fd\u4f53\u5982\u4f55\u5728\u4e00\u4e2a\u56db\u8db3\u673a\u5668\u4eba locomotion \u7684\u5f3a\u5316\u5b66\u4e60\u7814\u7a76\u4e2d\uff0c\u81ea\u4e3b\u6267\u884c\u4ee3\u7801\u8bca\u65ad\u3001\u5956\u52b1\u51fd\u6570\u8c03\u6574\u3001\u5b9e\u9a8c\u542f\u52a8\u4e0e\u76d1\u63a7\u3001\u7ed3\u679c\u5206\u6790\u53ca\u4e0b\u4e00\u8f6e\u5b9e\u9a8c\u89c4\u5212\u7b49\u5927\u90e8\u5206\u7814\u7a76\u5faa\u73af\uff0c\u8bc1\u660e\u4e86\u667a\u80fd\u4f53\u5728\u590d\u6742\u5de5\u7a0b\u5316RL\u7814\u7a76\u4e2d\u7684\u6f5c\u529b\u3002(2603.27416 [cs.AI])\n*   **\u95ed\u73af\u6392\u540d\u4f18\u5316\u667a\u80fd\u4f53\u5f71\u54cd\u5546\u4e1a\u6307\u6807**\uff1a**Sortify** \u662f\u9996\u4e2a\u90e8\u7f72\u4e8e\u5927\u89c4\u6a21\u751f\u4ea7\u63a8\u8350\u7cfb\u7edf\u7684\u5168\u81ea\u4e3bLLM\u9a71\u52a8\u6392\u540d\u4f18\u5316\u667a\u80fd\u4f53\u3002\u5b83\u5c06\u6392\u540d\u4f18\u5316\u91cd\u6784\u4e3a**\u5f71\u54cd\u529b\u4ea4\u6362**\u95ee\u9898\uff0c\u901a\u8fc7\u53cc\u901a\u9053\u6846\u67b6\u548c\u5143\u63a7\u5236\u5668\uff0c\u5b9e\u73b0\u4e86\u4ece\u8bca\u65ad\u5230\u53c2\u6570\u90e8\u7f72\u7684\u5b8c\u6574\u95ed\u73af\uff0c\u5728\u771f\u5b9e\u573a\u666f\u4e2d\u663e\u8457\u63d0\u5347\u4e86GMV\u548c\u5e7f\u544a\u6536\u5165\u3002(2603.27765 [cs.AI])\n*   **\u57fa\u4e8e\u6f14\u5316\u7684\u51b3\u7b56\u89c4\u5219\u7528\u4e8e\u822a\u5929\u5668\u64cd\u63a7**\uff1a**GUIDE** \u6846\u67b6\u8ba9LLM\u9a71\u52a8\u7684\u822a\u5929\u5668\u64cd\u4f5c\u667a\u80fd\u4f53\u80fd\u591f\u8de8\u4efb\u52a1\u8fed\u4ee3\u8fdb\u5316\u3002\u5b83\u901a\u8fc7\u79bb\u7ebf\u53cd\u601d\u66f4\u65b0\u4e00\u4e2a\u7ed3\u6784\u5316\u7684\u81ea\u7136\u8bed\u8a00\u51b3\u7b56\u89c4\u5219\u201c\u5267\u672c\u201d\uff0c\u5b9e\u73b0\u4e86\u65e0\u9700\u6743\u91cd\u66f4\u65b0\u7684\u7b56\u7565\u6539\u8fdb\uff0c\u5728\u5bf9\u6297\u6027\u8f68\u9053\u62e6\u622a\u4efb\u52a1\u4e2d\u8868\u73b0\u4f18\u4e8e\u9759\u6001\u57fa\u7ebf\u3002(2603.27306 [cs.AI])\n\n##### \u81ea\u6211\u8fdb\u5316\uff1a\u5f53\u667a\u80fd\u4f53\u6210\u4e3a\u81ea\u8eab\u7684\u201c\u9020\u7269\u4e3b\u201d\n\u6700\u524d\u6cbf\u7684\u7814\u7a76\u6b63\u8ba9\u667a\u80fd\u4f53\u7a81\u7834\u9759\u6001\u73af\u5883\u7684\u9650\u5236\uff0c\u901a\u8fc7\u8fdb\u5316\u3001\u5bf9\u6297\u548c\u641c\u7d22\uff0c\u5b9e\u73b0\u80fd\u529b\u7684\u81ea\u6211\u7a81\u7834\u4e0e\u521b\u9020\u3002\n*   **\u5bf9\u6297\u6027\u5171\u8fdb\u5316\u751f\u6210\u73af\u5883\u4e0e\u7b56\u7565**\uff1a**COvolve** \u6846\u67b6\u5c06\u73af\u5883\u8bbe\u8ba1\u8005\u548c\u7b56\u7565\u8bbe\u8ba1\u8005\u5efa\u6a21\u4e3a\u4e00\u4e2a**\u4e24\u4eba\u96f6\u548c\u535a\u5f08**\uff0c\u5229\u7528LLM\u540c\u65f6\u751f\u6210\u73af\u5883\u4ee3\u7801\u548c\u7b56\u7565\u4ee3\u7801\uff0c\u4f7f\u5176\u5728\u5bf9\u6297\u4e2d\u5171\u540c\u8fdb\u5316\u3002\u6700\u7ec8\u8ba1\u7b97\u51fa\u7684\u6df7\u5408\u7b56\u7565\u7eb3\u4ec0\u5747\u8861\u5143\u7b56\u7565\uff0c\u80fd\u786e\u4fdd\u667a\u80fd\u4f53\u5728\u4e0d\u65ad\u5b66\u4e60\u65b0\u73af\u5883\u7684\u540c\u65f6\u4e0d\u9057\u5fd8\u65e7\u6280\u80fd\u3002(2603.28386 [cs.AI])\n*   **\u8fdb\u5316\u5185\u6838\u4f18\u5316\u7edf\u4e00\u6846\u67b6**\uff1a**Kernel-Smith** \u63d0\u51fa\u4e86\u4e00\u4e2a\u7ed3\u5408\u8fdb\u5316\u667a\u80fd\u4f53\u548c\u8bad\u7ec3\u914d\u65b9\u7684\u9ad8\u6027\u80fdGPU\u5185\u6838\u751f\u6210\u7edf\u4e00\u6846\u67b6\u3002\u8fdb\u5316\u667a\u80fd\u4f53\u57fa\u4e8e\u7f16\u8bd1\u3001\u6b63\u786e\u6027\u548c\u52a0\u901f\u53cd\u9988\u8fed\u4ee3\u6539\u8fdb\u5185\u6838\uff1b\u8bad\u7ec3\u914d\u65b9\u5219\u5c06\u8fdb\u5316\u8f68\u8ff9\u8f6c\u5316\u4e3a\u76d1\u7763\u548c\u5f3a\u5316\u5b66\u4e60\u4fe1\u53f7\uff0c\u4f7f\u6a21\u578b\u6210\u4e3a\u8fdb\u5316\u5faa\u73af\u5185\u7684\u5f3a\u5927\u201c\u5c40\u90e8\u6539\u8fdb\u5668\u201d\uff0c\u5728\u591a\u4e2a\u540e\u7aef\u4e0a\u8fbe\u5230SOTA\u3002(2603.28342 [cs.CL])\n*   **\u591a\u667a\u80fd\u4f53\u8fdb\u5316\u641c\u7d22\u7528\u4e8e\u8de8\u7269\u7406\u5fae\u7ed3\u6784\u8bbe\u8ba1**\uff1a**AutoMS** \u6846\u67b6\u5c06\u9006\u6750\u6599\u8bbe\u8ba1\u95ee\u9898\u8f6c\u5316\u4e3aLLM\u9a71\u52a8\u7684\u8fdb\u5316\u641c\u7d22\u3002\u5b83\u8ba9LLM\u4f5c\u4e3a\u201c\u8bed\u4e49\u5bfc\u822a\u5668\u201d\u5f15\u5bfc\u641c\u7d22\u65b9\u5411\uff0c\u5e76\u5f15\u5165**\u6a21\u62df\u611f\u77e5\u8fdb\u5316\u641c\u7d22\uff08SAES\uff09** \u5229\u7528\u4eff\u771f\u53cd\u9988\u8fdb\u884c\u5c40\u90e8\u68af\u5ea6\u8fd1\u4f3c\uff0c\u6210\u529f\u5730\u5728\u590d\u6742\u3001\u4e0d\u8fde\u7eed\u7684\u8de8\u7269\u7406\u76ee\u6807\u8bbe\u8ba1\u7a7a\u95f4\u4e2d\u627e\u5230\u4e86\u6709\u6548\u7684\u5e15\u7d2f\u6258\u524d\u6cbf\u3002(2603.27195 [cs.AI])\n*   **\u201c\u8d2a\u5a6a\u5373\u6700\u4f18\u201d\uff1a\u667a\u80fd\u4f53\u4f5c\u4e3a\u8fed\u4ee3\u4f18\u5316\u5668\u7684\u542f\u793a**\uff1a\u8fd9\u9879\u7814\u7a76\u7528LLM\u667a\u80fd\u4f53\u66ff\u4ee3\u7ecf\u5178\u4f18\u5316\u7b97\u6cd5\uff08\u5982\u6a21\u62df\u9000\u706b\uff09\u4e2d\u7684\u968f\u673a\u63d0\u8bae\u5668\u3002\u7ed3\u679c\u53d1\u73b0\uff0c\u5728LLM\u62e5\u6709\u5f3a\u5927\u5148\u9a8c\u77e5\u8bc6\u7684\u4efb\u52a1\u4e0a\uff0c**\u8d2a\u5a6a\u722c\u5c71\u6cd5**\u56e0\u5176\u7b80\u5355\u9ad8\u6548\u800c\u6210\u4e3a\u6700\u5f3a\u9ed8\u8ba4\u9009\u62e9\uff0c\u590d\u6742\u7684\u63a5\u53d7\u89c4\u5219\u548c\u5e76\u884c\u7b56\u7565\u5e76\u672a\u5e26\u6765\u989d\u5916\u6536\u76ca\uff0c\u8fd9\u6311\u6218\u4e86\u201c\u66f4\u590d\u6742\u4f18\u5316\u7b97\u6cd5\u5fc5\u7136\u66f4\u597d\u201d\u7684\u76f4\u89c9\u3002(2603.27415 [cs.AI])\n*   **\u81ea\u4e3b\u67b6\u6784\u641c\u7d22\u63a2\u7d22\u5206\u5b50Transformer\u8bbe\u8ba1**\uff1a\u7814\u7a76\u90e8\u7f72\u667a\u80fd\u4f53\u5728\u5206\u5b50\u5e8f\u5217\u3001\u86cb\u767d\u8d28\u5e8f\u5217\u548c\u81ea\u7136\u8bed\u8a00\u6587\u672c\u4e0a\u81ea\u4e3b\u8fdb\u884c\u795e\u7ecf\u7f51\u7edc\u67b6\u6784\u641c\u7d22\u3002\u4e00\u4e2a\u53cd\u76f4\u89c9\u7684\u53d1\u73b0\u662f\uff1a\u5bf9\u4e8e\u5206\u5b50\u8868\u793a\uff0c\u7cbe\u7ec6\u7684\u8d85\u53c2\u6570\u8c03\u4f18\u6bd4\u5b8c\u6574\u7684\u67b6\u6784\u641c\u7d22\u66f4\u6709\u6548\uff1b\u800c\u53d1\u73b0\u7684\u67b6\u6784\u521b\u65b0\u867d\u56e0\u9886\u57df\u800c\u5f02\uff0c\u5374\u51e0\u4e4e\u53ef\u4ee5\u65e0\u635f\u5730\u8de8\u9886\u57df\u8fc1\u79fb\uff0c\u8868\u660e\u5dee\u5f02\u66f4\u591a\u6e90\u4e8e\u641c\u7d22\u8def\u5f84\u4f9d\u8d56\u800c\u975e\u672c\u8d28\u9700\u6c42\u3002(2603.28015 [cs.AI])\n*   **\u81ea\u8fdb\u5316\u591a\u667a\u80fd\u4f53\u6846\u67b6\u7528\u4e8e\u86cb\u767d\u8d28\u53d1\u73b0**\uff1a**VenusFactory2** \u63d0\u4f9b\u4e86\u4e00\u4e2a\u81ea\u4e3b\u6846\u67b6\uff0c\u5c06\u9759\u6001\u5de5\u5177\u4f7f\u7528\u8f6c\u53d8\u4e3a**\u52a8\u6001\u5de5\u4f5c\u6d41\u5408\u6210**\uff0c\u901a\u8fc7\u81ea\u8fdb\u5316\u591a\u667a\u80fd\u4f53\u57fa\u7840\u8bbe\u65bd\uff0c\u80fd\u591f\u4ece\u5355\u4e00\u81ea\u7136\u8bed\u8a00\u63d0\u793a\u51fa\u53d1\uff0c\u81ea\u4e3b\u7ec4\u7ec7\u86cb\u767d\u8d28\u7684\u53d1\u73b0\u4e0e\u4f18\u5316\u6d41\u7a0b\u3002(2603.27303 [cs.AI])\n\n##### \u4ee3\u7801\u5373\u884c\u52a8\uff1a\u667a\u80fd\u4f53\u4f5c\u4e3a\u8f6f\u4ef6\u5de5\u7a0b\u5e08\u4e0e\u79d1\u5b66\u5bb6\n\u667a\u80fd\u4f53\u5728\u7f16\u7a0b\u548c\u79d1\u7814\u81ea\u52a8\u5316\u65b9\u9762\u5c55\u73b0\u51fa\u8d8a\u6765\u8d8a\u7cbe\u7ec6\u548c\u5f3a\u5927\u7684\u80fd\u529b\u3002\n*   **\u201c\u4e13\u7cbe\u800c\u540e\u7edf\u4e00\u201d\u7684\u667a\u80fd\u4f53\u7f16\u78 7eaf\u7684\u6587\u672c\u63a8\u7406\u6280\u672f\uff0c\u6210\u4e3a\u4e00\u4e2a\u5f3a\u5927\u7684\u8de8\u754c\u878d\u5408\u6846\u67b6\u3002\u5b83\u88ab\u7528\u4e8e**\u4e8b\u5b9e\u6838\u67e5\uff08\u5bf9\u6297\u8bc1\u636e\uff09\u3001\u4f26\u7406\u6559\u5b66\uff08\u5bf9\u7acb\u7acb\u573a\uff09\u3001\u8bba\u8bc1\u6316\u6398\uff08\u8fa9\u8bc1\u7cbe\u70bc\uff09**\uff0c\u751a\u81f3\u53ef\u80fd\u542f\u53d1\u66f4\u5e7f\u6cdb\u7684\u51b3\u7b56\u4e0e\u8bc4\u5ba1\u7cfb\u7edf\u3002\u8fd9\u79cd\u5c06\u5bf9\u7acb\u3001\u5ba1\u67e5\u548c\u88c1\u51b3\u673a\u5236\u5236\u5ea6\u5316\u7684\u601d\u60f3\uff0c\u662f\u63d0\u5347AI\u7cfb\u7edf\u7a33\u5065\u6027\u4e0e\u53ef\u89e3\u91ca\u6027\u7684\u5b9d\u8d35\u8303\u5f0f\u3002\n*   **\u5185\u6838\u4e0e\u6280\u80fd\u5e93\uff1a\u667a\u80fd\u4f53\u7684\u201c\u57fa\u7840\u8bbe\u65bd\u201d\u6f5c\u529b**\uff1a**Kernel-Smith** \u548c **EffiSkill** \u5206\u522b\u4ece\u786c\u4ef6\u8ba1\u7b97\u5e95\u5c42\u548c\u8f6f\u4ef6\u4f18\u5316\u4e2d\u5c42\uff0c\u5c55\u793a\u4e86\u6784\u5efa**\u53ef\u590d\u7528\u3001\u53ef\u8fdb\u5316\u6280\u672f\u6808**\u7684\u5de8\u5927\u6f5c\u529b\u3002\u524d\u8005\u53ef\u80fd\u6210\u4e3a\u5f02\u6784\u8ba1\u7b97\u5e73\u53f0\u7684\u6027\u80fd\u4f18\u5316\u5f15\u64ce\uff0c\u540e\u8005\u5219\u4e3a\u4ee3\u7801\u4f18\u5316\u63d0\u4f9b\u4e86\u53ef\u8fc1\u79fb\u7684\u201c\u5de5\u5177\u7bb1\u201d\u3002\u8fd9\u7c7b\u5de5\u4f5c\u6b63\u5728\u4e3a\u667a\u80fd\u4f53\u6784\u5efa\u957f\u671f\u3001\u901a\u7528\u7684\u80fd\u529b\u57fa\u5e95\uff0c\u800c\u975e\u4e00\u6b21\u6027\u7684\u89e3\u51b3\u65b9\u6848\u3002",
    "2026-03-26": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-26)\n\n## \u5f00\u7bc7\u5bfc\u8bed\n\n\u4eca\u65e5\u7684AI\u7814\u7a76\u5448\u73b0\u51fa\u660e\u663e\u7684\"Agent\u5411\"\u8d8b\u52bf\u3002\u57288\u7bc7\u8bba\u6587\u4e2d\uff0c\u67095\u7bc7\u76f4\u63a5\u805a\u7126\u4e8eLLM Agent\u7684\u81ea\u4e3b\u6027\u63d0\u5347\u2014\u2014\u4ece\u81ea\u8fdb\u5316\u6846\u67b6\u5230\u6280\u80fd\u84b8\u998f\uff0c\u4ece\u5143\u8ba4\u77e5\u8c03\u8282\u5230\u5f62\u5f0f\u5316\u9a8c\u8bc1\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u4ece\u591a\u4e2a\u7ef4\u5ea6\u89e3\u51b3Agent\u7684\u53ef\u9760\u6027\u3001\u53ef\u6269\u5c55\u6027\u548c\u81ea\u6211\u6539\u8fdb\u96be\u9898\u3002\u4e0e\u6b64\u540c\u65f6\uff0c\u591aAgent\u7cfb\u7edf\u7684\u534f\u8c03\u4e0e\u901a\u4fe1\u95ee\u9898\u4e5f\u53d7\u5230\u5173\u6ce8\uff0c\u5b66\u8005\u4eec\u5f00\u59cb\u501f\u9274\u653f\u6cbb\u54f2\u5b66\u4e2d\u7684\"\u6743\u529b\u5206\u7acb\"\u6982\u5ff5\u6765\u8bbe\u8ba1\u66f4\u7a33\u5065\u7684\u591aAgent\u67b6\u6784\u3002\u6574\u4f53\u6765\u770b\uff0c**\"\u8ba9Agent\u66f4\u53ef\u4fe1\u3001\u66f4\u81ea\u4e3b\u3001\u66f4\u4f1a\u534f\u4f5c\"** \u5df2\u6210\u4e3a\u5f53\u524d\u7814\u7a76\u7684\u6838\u5fc3\u547d\u9898\u3002\n\n---\n\n## \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \u4e00\u3001\u81ea\u8fdb\u5316Agent\u4e0e\u7cfb\u7edf\u5408\u6210\n\n\u8fd9\u4e00\u4e3b\u9898\u4e0b\u7684\u4e09\u7bc7\u8bba\u6587\u4ece\u4e0d\u540c\u89d2\u5ea6\u63a2\u7d22\u4e86Agent\u7684\u81ea\u6211\u6539\u8fdb\u80fd\u529b\uff0c\u4f46\u4fa7\u91cd\u70b9\u5404\u6709\u4e0d\u540c\u2014\u2014\u5f62\u5f0f\u5316\u9a8c\u8bc1\u3001\u7ecf\u9a8c\u5b66\u4e60\u3001\u4ee3\u7801\u81ea\u6f14\u5316\u3002\n\n- **SEVerA** \u63d0\u51fa\u4e86\u5c06Agent\u4ee3\u7801\u751f\u6210\u5f62\u5f0f\u5316\u7684\u65b0\u8303\u5f0f\u3002\u5b83\u5c06Agentic\u4ee3\u7801\u751f\u6210\u5efa\u6a21\u4e3a\u7ed3\u5408\u786c\u6027\u5f62\u5f0f\u5316\u89c4\u8303\u4e0e\u8f6f\u6027\u4efb\u52a1\u76ee\u6807\u7684\u7ea6\u675f\u5b66\u4e60\u95ee\u9898\uff0c\u5e76\u5f15\u5165**Formally Guarded Generative Models (FGGM)**\uff0c\u901a\u8fc7\u62d2\u7edd\u91c7\u6837\u548c\u9a8c\u8bc1\u56de\u9000\u673a\u5236\u786e\u4fdd\u8f93\u51fa\u6ee1\u8db3\u5408\u7ea6\u3002\u5728Dafny\u7a0b\u5e8f\u9a8c\u8bc1\u3001\u7b26\u53f7\u6570\u5b66\u5408\u6210\u548c\u03c4\u00b2-bench\u5de5\u5177\u4f7f\u7528\u4efb\u52a1\u4e0a\uff0cSEVerA\u5b9e\u73b0\u4e86**\u96f6\u7ea6\u675f\u8fdd\u89c4**\u540c\u65f6\u663e\u8457\u8d85\u8d8a\u57fa\u7ebf\u6027\u80fd\uff0c\u8bc1\u660e\u4e86\u5f62\u5f0f\u5316\u7ea6\u675f\u4e0d\u4ec5\u80fd\u4fdd\u8bc1\u6b63\u786e\u6027\uff0c\u8fd8\u80fd\u5f15\u5bfc\u5408\u6210\u66f4\u9ad8\u8d28\u91cf\u7684Agent\u3002 (2603.25111 [cs.LG])\n\n- **Experiential Reflective Learning (ERL)** \u5f15\u5165\u4e86\u4e00\u79cd\u7b80\u5355\u7684\u81ea\u6539\u8fdb\u6846\u67b6\uff0c\u4f7fAgent\u80fd\u591f\u901a\u8fc7\u7ecf\u9a8c\u5b66\u4e60\u5feb\u901f\u9002\u5e94\u7279\u5b9a\u73af\u5883\u3002\u8be5\u65b9\u6cd5\u53cd\u601d\u4efb\u52a1\u8f68\u8ff9\u548c\u7ed3\u679c\u4ee5\u751f\u6210**\u53ef\u8fc1\u79fb\u7684\u542f\u53d1\u5f0f\u89c4\u5219**\uff0c\u5728\u6d4b\u8bd5\u65f6\u6839\u636e\u5f53\u524d\u4efb\u52a1\u68c0\u7d22\u76f8\u5173\u542f\u53d1\u5f0f\u5e76\u6ce8\u5165\u4e0a\u4e0b\u6587\u3002\u5728Gaia2\u57fa\u51c6\u4e0a\uff0cERL\u76f8\u6bd4ReAct\u57fa\u7ebf\u63d0\u5347\u4e86**7.8%\u7684\u6210\u529f\u7387**\uff0c\u4e14\u4f18\u4e8e\u5148\u524d\u7ecf\u9a8c\u5b66\u4e60\u65b9\u6cd5\uff0c\u9a8c\u8bc1\u4e86\u4ece\u5355\u6b21\u5c1d\u8bd5\u4e2d\u63d0\u53d6\u53ef\u8fc1\u79fb\u542f\u53d1\u5f0f\u662f\u5b9e\u73b0Agent\u81ea\u6539\u8fdb\u7684\u6709\u6548\u8def\u5f84\u3002 (2603.24639 [cs.LG])\n\n- **The Kitchen Loop** \u63d0\u51fa\u4e86\u4e00\u4e2a\u9762\u5411\u81ea\u8fdb\u5316\u4ee3\u7801\u5e93\u7684\u7edf\u4e00\u4fe1\u4efb\u6a21\u578b\u6846\u67b6\uff0c\u5305\u542b\u56db\u4e2a\u6838\u5fc3\u7ec4\u4ef6\uff1a\u89c4\u8303\u8868\u9762\u679a\u4e3e\u4ea7\u54c1\u529f\u80fd\u3001\"As a User x 1000\"\u4ee5\u5343\u500d\u4eba\u7c7b\u901f\u5ea6\u6a21\u62df\u538b\u529b\u6d4b\u8bd5\u3001\u4e0d\u53ef\u6b3a\u9a97\u7684**Unbeatable Tests**\u771f\u5b9e\u9a8c\u8bc1\u3001\u4ee5\u53ca**Drift Control**\u6301\u7eed\u8d28\u91cf\u76d1\u63a7\u3002\u5728\u4e24\u4e2a\u751f\u4ea7\u7cfb\u7edf\u4e0a\u7ecf\u8fc7285+\u6b21\u8fed\u4ee3\u3001\u5408\u5e761094+\u4e2aPR\u540e\uff0c\u96f6\u56de\u5f52\u68c0\u51fa\uff0c\u5c55\u73b0\u51fa\u591a\u8f6e\u81ea\u4fee\u6b63\u94fe\u3001\u81ea\u4e3b\u57fa\u7840\u8bbe\u65bd\u4fee\u590d\u7b49 emergent \u7279\u6027\u3002 (2603.25697 [cs.AI])\n\n---\n\n### \u4e8c\u3001\u591aAgent\u534f\u8c03\u4e0e\u901a\u4fe1\n\n\u4e24\u7bc7\u8bba\u6587\u4ece\u4e0d\u540c\u89c6\u89d2\u5207\u5165\u591aAgent\u534f\u4f5c\u95ee\u9898\u2014\u2014\u4e00\u4e2a\u5173\u6ce8\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u534f\u8c03\u57fa\u51c6\u8bbe\u8ba1\uff0c\u53e6\u4e00\u4e2a\u5219\u4ece\u653f\u6cbb\u54f2\u5b66\u4e2d\u6c72\u53d6\u7075\u611f\u6784\u5efa\u5236\u5ea6\u6846\u67b6\u3002\n\n- **CRAFT** \u63d0\u51fa\u4e86\u4e00\u4e2a\u4e25\u683c\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u591aAgent\u534f\u8c03\u57fa\u51c6\uff0c\u8bc4\u4f30LLM\u5728\u4e92\u8865\u4f46\u4e0d\u5b8c\u5168\u89c6\u56fe\u4e0b\u7684**\u8bed\u7528\u6c9f\u901a**\u80fd\u529b\u3002\u591a\u4e2aAgent\u9700\u901a\u8fc7\u81ea\u7136\u8bed\u8a00\u534f\u8c03\u6784\u5efa\u4e00\u4e2a\u4efb\u4f55\u5355Agent\u90fd\u65e0\u6cd5\u5b8c\u5168\u89c2\u5bdf\u7684\u5171\u4eab3D\u7ed3\u6784\u3002\u7814\u7a76\u53d1\u73b0\uff1a\u66f4\u5f3a\u7684\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u80fd\u53ef\u9760\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u534f\u8c03\u6027\u80fd\uff0c\u8f83\u5c0f\u7684\u5f00\u653e\u6743\u91cd\u6a21\u578b\u7ecf\u5e38\u5339\u654c\u751a\u81f3\u8d85\u8d8a\u524d\u6cbf\u7cfb\u7edf\uff0c\u4e14\u4e2a\u4f53\u901a\u4fe1\u6539\u5584\u5e76\u4e0d\u4fdd\u8bc1\u534f\u4f5c\u6210\u529f\u2014\u2014\u8fd9\u63ed\u793a\u4e86\u591aAgent\u534f\u8c03\u4ecd\u662f\u5f53\u524d\u8bed\u8a00\u6a21\u578b\u7684\u57fa\u7840\u6027\u96be\u9898\u3002 (2603.25268 [cs.AI])\n\n- **From Logic Monopoly to Social Contract** \u63d0\u51fa\u4e86\u4e00\u4e2a\u6839\u672c\u6027 7a33\u5065\u7684\u591aAgent\u7cfb\u7edf\u63d0\u4f9b\u4e86\u5bcc\u6709\u542f\u53d1\u6027\u7684\u84dd\u56fe\u3002\n\n- **\u6280\u80fd\u84b8\u998f\u7684\u53ef\u8fc1\u79fb\u6027\u7a81\u7834**\uff1aTrace2Skill\u5c55\u793a\u4e86\u4ece\u5355\u4e00\u6a21\u578b\u8f68\u8ff9\u4e2d\u63d0\u53d6\u7684\u6280\u80fd\u53ef\u4ee5\u8de8\u6a21\u578b\u89c4\u6a21\u3001\u8de8\u5206\u5e03\u6cdb\u5316\u7684\u53ef\u80fd\u6027\u3002\u8fd9\u4e3a\u6784\u5efa\u53ef\u590d\u7528\u7684Agent\u6280\u80fd\u5e93\u5f00\u8f9f\u4e86\u65b0\u8def\u5f84\u2014\u2014\u672a\u6765\u6216\u8bb8\u4f1a\u51fa\u73b0\u7c7b\u4f3c\"\u6280\u80fd\u5e02\u573a\"\u7684\u751f\u6001\u3002",
    "2026-03-25": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-25)\n\n## \u5f00\u7bc7\u5bfc\u8bed\n\n\u4eca\u65e5AI\u7814\u7a76\u5448\u73b0\u51fa\u4e09\u5927\u6838\u5fc3\u8d8b\u52bf\uff1a\u4e00\u662f**\u667a\u80fd\u4f53\u67b6\u6784\u4ece\u201c\u5355\u70b9\u5de5\u5177\u8c03\u7528\u201d\u5411\u201c\u590d\u6742\u591a\u5de5\u5177\u7f16\u6392\u201d\u6df1\u5ea6\u6f14\u8fdb**\uff0c\u5b66\u754c\u5f00\u59cb\u7cfb\u7edf\u6027\u5730\u7814\u7a76\u957f\u8f68\u8ff9\u3001\u591a\u6b65\u9aa4\u7684\u534f\u4f5c\u5de5\u4f5c\u6d41\u8bbe\u8ba1\uff1b\u4e8c\u662f**\u81ea\u6211\u6539\u8fdb\u4e0e\u5143\u8ba4\u77e5\u80fd\u529b\u6210\u4e3a\u65b0\u7126\u70b9**\uff0cG\u00f6del Agent\u3001\u5143\u81ea\u52a8\u7814\u7a76\u7b49\u6846\u67b6\u8bd5\u56fe\u8ba9\u667a\u80fd\u4f53\u5177\u5907\u201c\u5ba1\u89c6\u81ea\u8eab\u3001\u4fee\u6539\u81ea\u8eab\u201d\u7684\u9012\u5f52\u80fd\u529b\uff1b\u4e09\u662f**\u8bb0\u5fc6\u7cfb\u7edf\u4ece\u201c\u4e2a\u4f53\u5b58\u50a8\u201d\u8d70\u5411\u201c\u8de8\u667a\u80fd\u4f53\u534f\u4f5c\u201d**\uff0c\u5f02\u6784\u667a\u80fd\u4f53\u95f4\u7684\u77e5\u8bc6\u5171\u4eab\u4e0e\u5bf9\u9f50\u6210\u4e3a\u53ef\u80fd\u3002\u7406\u8bba\u5c42\u9762\uff0c\u601d\u7ef4\u8bed\u8a00(LoT)\u5047\u8bbe\u906d\u9047\u4e86\u8ba1\u7b97\u5b9e\u9a8c\u7684\u6311\u6218\u2014\u2014 emergent protocol \u5728\u6548\u7387\u4e0a\u663e\u8457\u4f18\u4e8e\u4eba\u7c7b\u53ef\u7406\u89e3\u7684\u7b26\u53f7\u534f\u8bae\u3002\n\n---\n\n## \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \u4e00\u3001\u5de5\u5177\u4f7f\u7528\u4e0e\u5de5\u4f5c\u6d41\u7f16\u6392\uff1a\u4ece\u5355\u70b9\u8c03\u7528\u5230\u52a8\u6001\u7f16\u6392\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u968f\u7740LLM Agent\u4ece\u7b80\u5355\u5de5\u5177\u8c03\u7528\u5411\u590d\u6742\u4efb\u52a1\u6267\u884c\u6f14\u8fdb\uff0c\u7814\u7a76\u91cd\u5fc3\u5df2\u4ece\u201c\u80fd\u5426\u9009\u5bf9\u5de5\u5177\u201d\u8f6c\u5411\u201c\u5982\u4f55\u9ad8\u6548\u7f16\u6392\u591a\u5de5\u5177\u3001\u957f\u5468\u671f\u3001\u52a8\u6001\u9002\u5e94\u7684\u5de5\u4f5c\u6d41\u201d\u3002\u672c\u677f\u5757\u4e09\u7bc7\u8bba\u6587\u4ece\u6f14\u8fdb\u7efc\u8ff0\u3001\u6846\u67b6\u4f18\u5316\u3001\u6280\u80fd\u8def\u7531\u4e09\u4e2a\u7ef4\u5ea6\u52fe\u52d2\u4e86\u8fd9\u4e00\u9886\u57df\u7684\u5168\u666f\u56fe\u3002\n\n- **The Evolution of Tool Use in LLM Agents** \u7cfb\u7edf\u68b3\u7406\u4e86LLM\u5de5\u5177\u4f7f\u7528\u4ece\u5355\u5de5\u5177\u8c03\u7528\u5230\u591a\u5de5\u5177\u7f16\u6392\u7684\u6f14\u8fdb\u5386\u7a0b\u3002\u7814\u7a76\u5c06\u4efb\u52a1\u5f62\u5f0f\u5316\u4e3a\u516d\u7ef4\u6846\u67b6\uff1a\u63a8\u7406\u65f6\u89c4\u5212\u4e0e\u6267\u884c\u3001\u8bad\u7ec3\u4e0e\u8f68\u8ff9\u6784\u5efa\u3001\u5b89\u5168\u4e0e\u63a7\u5236\u3001\u8d44\u6e90\u7ea6\u675f\u4e0b\u7684\u6548\u7387\u3001\u5f00\u653e\u73af\u5883\u80fd\u529b\u5b8c\u6574\u6027\u3001\u57fa\u51c6\u6d4b\u8bd5\u8bbe\u8ba1\u3002\u8bba\u6587\u6307\u51fa\u5f53\u524d\u6838\u5fc3\u6311\u6218\u5df2\u4ece\u5de5\u5177\u9009\u62e9\u8f6c\u5411\u957f\u8f68\u8ff9\u7f16\u6392\u4e2d\u7684\u72b6\u6001\u7ba1\u7406\u3001\u6267\u884c\u53cd\u9988\u4e0e\u73af\u5883\u9002\u5e94\u95ee\u9898\u3002 **(2603.22862 [cs.CL])**\n\n- **From Static Templates to Dynamic Runtime Graphs** \u5c06LLM\u5de5\u4f5c\u6d41\u62bd\u8c61\u4e3a**Agentic Computation Graphs (ACG)**\uff0c\u4ece\u201c\u4f55\u65f6\u786e\u5b9a\u7ed3\u6784\u201d\u8fd9\u4e00\u5b9a\u4e49\u6027\u89c6\u89d2\u7edf\u4e00\u4e86\u9759\u6001\u65b9\u6cd5\u4e0e\u52a8\u6001\u65b9\u6cd5\u3002\u9759\u6001\u65b9\u6cd5\u5728\u90e8\u7f72\u524d\u56fa\u5b9a\u5de5\u4f5c\u6d41\u811a\u624b\u67b6\uff0c\u52a8\u6001\u65b9\u6cd5\u5219\u5728\u8fd0\u884c\u65f6\u9009\u62e9\u3001\u751f\u6210\u6216\u4fee\u8ba2\u5de5\u4f5c\u6d41\u3002\u8bba\u6587\u63d0\u51fa\u4e86\u53ef\u590d\u7528\u5de5\u4f5c\u6d41\u6a21\u677f\u3001\u8fd0\u884c\u65f6\u5b9e\u73b0\u56fe\u3001\u6267\u884c\u8f68\u8ff9\u7684\u4e09\u5c42\u533a\u5206\uff0c\u4e3a\u672a\u6765\u5de5\u4f5c\u6d41\u4f18\u5316\u7814\u7a76\u63d0\u4f9b\u4e86\u7edf\u4e00\u6846\u67b6\u4e0e\u8bc4\u4f30\u6807\u51c6\u3002 **(2603.22386 [cs.CL])**\n\n- **SkillRouter: Retrieve-and-Rerank Skill Selection** \u9488\u5bf9\u5927\u89c4\u6a21\u6280\u80fd\u6c60\uff08\u5df2\u8fbe\u6570\u4e07\u7ea7\u522b\uff09\u7684\u8def\u7531\u96be\u9898\uff0c\u63d0\u51fa\u4e24\u9636\u6bb5\u68c0\u7d22-\u91cd\u6392\u5e8fpipeline\u3002\u901a\u8fc7\u7cfb\u7edf\u6027\u5b9e\u8bc1\u7814\u7a76\uff0c\u8bba\u6587\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u7684\u53d1\u73b0\uff1a**\u6280\u80fd\u5b9e\u73b0\u4f53\uff08skill body\uff09\u662f\u51b3\u5b9a\u6027\u4fe1\u53f7**\uff0c\u79fb\u9664\u540e\u5bfc\u81f429-44\u4e2a\u767e\u5206\u70b9\u7684\u6027\u80fd\u4e0b\u964d\uff1b\u8de8\u7f16\u7801\u5668\u6ce8\u610f\u529b\u5206\u6790\u663e\u793a91.7%\u7684\u6ce8\u610f\u529b\u96c6\u4e2d\u5728body\u5b57\u6bb5\u3002\u57fa\u4e8e\u6b64\u53d1\u73b0\u6784\u5efa\u7684SkillRouter\u4ec5\u75281.2B\u53c2\u6570\u5373\u8fbe\u523074.0%\u7684top-1\u8def\u7531\u51c6\u786e\u7387\uff0c\u4e14\u53ef\u5728\u6d88\u8d39\u7ea7\u786c\u4ef6\u4e0a\u90e8\u7f72\u3002 **(2603.22455 [cs.LG])**\n\n---\n\n### \u4e8c\u3001\u667a\u80fd\u4f53\u67b6\u6784\u4e0e\u81ea\u6211\u6539\u8fdb\uff1aG\u00f6del Agent\u4e0e\u5143\u8ba4\u77e5\u7684\u5d1b\u8d77\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u672c\u677f\u5757\u805a\u7126\u667a\u80fd\u4f53\u67b6\u6784\u7684\u6839\u672c\u6027\u521b\u65b0\u3002\u4e09\u7bc7\u8bba\u6587\u5206\u522b\u4ece**\u653f\u7b56\u7ea7\u81ea\u6211\u4fee\u590d**\u3001**\u5143\u81ea\u52a8\u7814\u7a76**\u3001**O(1)\u4e0a\u4e0b\u6587\u67b6\u6784**\u4e09\u4e2a\u65b9\u5411\u7a81\u7834\u4f20\u7edf\u667a\u80fd\u4f53\u8bbe\u8ba1\u7684\u8fb9\u754c\uff0c\u6807\u5fd7\u7740\u667a\u80fd\u4f53\u4ece\u201c\u6267\u884c\u5de5\u5177\u201d\u5411\u201c\u81ea\u6211\u4f18\u5316\u7684\u8ba4\u77e5\u7cfb\u7edf\u201d\u8f6c\u578b\u3002\n\n- **Polaris: A G\u00f6del Agent Framework** \u63d0\u51fa\u4e86\u9762\u5411\u5c0f\u6a21\u578b\u7684**G\u00f6del Agent**\u6846\u67b6\uff0c\u5b9e\u73b0\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u3002Polaris\u901a\u8fc7\u201c\u5206                     allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        function toggleCollapsible(header) {
            const content = header.nextElementSibling;

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表
        function renderPapers() {
            const mainContent = document.getElementById('main-content');
            const loading = document.getElementById('loading');

            if (loading) {
                loading.classList.add('hidden');
            }

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date];
                if (clusters.length === 0) continue;

                const { html: papersHTML, count: dateVisibleTotal } = collectPapersForDate(clusters, date);

                totalPapers += dateVisibleTotal;

                // 如果该日期下没有可见论文，跳过
                if (dateVisibleTotal === 0) continue;

                html += `
                    <section class="mb-6 sm:mb-8" data-date-section="${date}">
                        <h2 class="text-base sm:text-lg font-medium text-slate-500 dark:text-slate-400 mb-3 sm:mb-4" data-date-heading="${date}">${date} (${dateVisibleTotal} 篇论文)</h2>
                `;

                // 添加该日期的AI论文速览（如果存在）
                if (dailyOverviews[date]) {
                    html += `
                        <div class="mb-3 sm:mb-4 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-700 rounded-lg shadow-md p-3 sm:p-5">
                            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-600 dark:text-blue-400 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                                </svg>
                                <span class="font-semibold text-slate-900 dark:text-white text-sm sm:text-base">今日AI论文速览</span>
                            </div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="markdown-content text-slate-700 dark:text-slate-200 text-xs sm:text-sm" id="overview-${date}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                `;
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
