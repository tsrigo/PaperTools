<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperTools - 学术论文集合</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 微软雅黑字体 */
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body {
                font-size: 14px;
            }

            /* 改善可点击区域 */
            button, a {
                min-height: 44px;
                min-width: 44px;
            }

            /* 优化间距 */
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }
        }

        /* 星标样式 */
        .star-button {
            transition: color 0.2s ease-in-out;
        }
        .star-button.starred {
            color: #fbbf24;
        }
        .star-button:not(.starred) {
            color: #9ca3af;
        }
        .star-button:hover {
            color: #fbbf24;
        }
        /* 删除按钮样式 */
        .delete-button {
            transition: all 0.2s ease-in-out;
        }
        .delete-button:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        /* 论文项目样式 */
        .paper-item {
            transition: all 0.3s ease-in-out;
        }
        .paper-item.hidden-paper {
            opacity: 0.3;
            transform: scale(0.98);
        }
        /* 平滑过渡 */
        .rotate-90-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* 论文卡片展开/收起 */
        .paper-expand-hint {
            padding: 4px 0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .paper-expand-hint:hover {
            color: #2563eb;
        }
        .dark .paper-expand-hint:hover {
            color: #60a5fa;
        }
        .paper-expand-hint .expand-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.65rem;
            margin-right: 4px;
        }
        .paper-detail {
            border-top: 1px solid #e2e8f0;
            margin-top: 8px;
            padding-top: 8px;
        }
        .dark .paper-detail {
            border-top-color: #334155;
        }
        .paper-detail.hidden {
            display: none;
        }

        /* 可折叠部分样式 */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            padding: 8px 0;
            user-select: none;
            color: #1e40af;
            transition: all 0.2s ease-in-out;
        }
        .dark .collapsible-header {
            color: #60a5fa;
        }
        .collapsible-header:hover {
            opacity: 0.8;
        }
        .collapsible-header::before {
            content: "▶";
            margin-right: 8px;
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }
        .collapsible-header.open::before {
            transform: rotate(90deg);
        }
        .collapsible-content {
            display: none;
        }
        .collapsible-content.open {
            display: block;
        }
        .collapsible-content .inner {
            padding-top: 8px;
        }

        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #1e40af;
        }
        .dark .markdown-content h1 {
            color: #60a5fa;
        }
        .markdown-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: #1e40af;
        }
        .dark .markdown-content h2 {
            color: #60a5fa;
        }
        .markdown-content h3 {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 0.6em;
            margin-bottom: 0.3em;
            color: #1e40af;
        }
        .dark .markdown-content h3 {
            color: #60a5fa;
        }
        .markdown-content h4 {
            font-size: 1em;
            font-weight: bold;
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            color: #2563eb;
        }
        .dark .markdown-content h4 {
            color: #93c5fd;
        }
        .markdown-content p {
            margin-bottom: 0.8em;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .markdown-content ul {
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.3em;
        }
        .markdown-content code {
            background-color: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .dark .markdown-content code {
            background-color: #334155;
        }
        .markdown-content pre {
            background-color: #f1f5f9;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 0.8em;
        }
        .dark .markdown-content pre {
            background-color: #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 0.8em;
            color: #64748b;
        }
        .dark .markdown-content blockquote {
            border-left-color: #475569;
            color: #94a3b8;
        }
        .markdown-content strong {
            font-weight: 600;
        }
        .markdown-content em {
            font-style: italic;
        }

        /* Tag filter button styles */
        .tag-btn {
            padding: 4px 14px;
            font-size: 0.875rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tag-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .tag-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .dark .tag-btn { border-color: #475569; color: #94a3b8; }
        .dark .tag-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .dark .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* Tag badge styles */
        .tag-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.7rem;
            border-radius: 9999px;
            background: #dbeafe;
            color: #1e40af;
            margin-right: 4px;
        }
        .tag-badge.tag-arxiv {
            background: #e0f2fe;
            color: #0369a1;
        }
        .dark .tag-badge { background: #1e3a5f; color: #7dd3fc; }
        .dark .tag-badge.tag-arxiv { background: #164e63; color: #67e8f9; }

        /* 作者机构上标样式 */
        .author-aff {
            vertical-align: super;
            font-size: 0.65em;
            color: #3b82f6;
            margin-left: 1px;
        }
        .dark .author-aff {
            color: #60a5fa;
        }

        /* TOC 侧边栏样式 - 固定在左侧 */
        #toc-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            z-index: 35;
            background: white;
            border-right: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .dark #toc-sidebar {
            background: #1e293b;
            border-right-color: #334155;
        }
        #toc-sidebar.collapsed {
            transform: translateX(-100%);
        }
        #toc-inner {
            padding: 1rem 0.5rem;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        #toc-inner::-webkit-scrollbar {
            width: 4px;
        }
        #toc-inner::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark #toc-inner::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .toc-date {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toc-date:hover {
            background: #e2e8f0;
        }
        .dark .toc-date:hover {
            background: #334155;
        }
        .toc-date.active {
            background: #dbeafe;
            color: #1e40af;
        }
        .dark .toc-date.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        .toc-date-arrow {
            transition: transform 0.2s;
            font-size: 0.65rem;
        }
        .toc-date-arrow.open {
            transform: rotate(90deg);
        }
        .toc-papers {
            display: none;
            padding-left: 1.2rem;
        }
        .toc-papers.open {
            display: block;
        }
        .toc-paper {
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .toc-paper:hover {
            background: #f1f5f9;
            color: #1e40af;
        }
        .dark .toc-paper {
            color: #94a3b8;
        }
        .dark .toc-paper:hover {
            background: #1e293b;
            color: #93c5fd;
        }
        .toc-paper.active {
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 500;
        }
        .dark .toc-paper.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        /* TOC 切换按钮 - 左侧 */
        #toc-toggle {
            position: fixed;
            left: 220px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 40;
            width: 28px;
            height: 56px;
            border-radius: 0 6px 6px 0;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            transition: left 0.3s ease, background 0.2s;
        }
        #toc-toggle:hover {
            background: #2563eb;
        }
        #toc-toggle svg {
            transition: transform 0.3s;
        }
        #toc-toggle:not(.sidebar-open) {
            left: 0;
        }
        @media (max-width: 1023px) {
            #toc-sidebar {
                width: 240px;
            }
            #toc-toggle {
                left: 240px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
        @media (max-width: 767px) {
            #toc-sidebar {
                width: 260px;
                box-shadow: 4px 0 16px rgba(0,0,0,0.1);
            }
            #toc-toggle {
                left: 260px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
    </style>
    <script>
        // Tailwind CSS 暗色模式配置
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

                    "summary": "When a tool-calling agent picks the wrong tool, the failure is invisible until execution: the email gets sent, the meeting gets missed. Probing 12 instruction-tuned models across Gemma 3, Qwen 3, Qwen 2.5, and Llama 3.1 (270M to 27B), we find the identity of the chosen tool is linearly readable and steerable inside the model. Adding the mean-difference between two tools' average internal activations switches which tool the model selects at 77-100% accuracy on name-only single-turn prompts (93-100% at 4B+), and the JSON arguments that follow autoregressively match the new tool's schema, so flipping the name is enough. The same per-tool means also flag likely errors before they happen: on Gemma 3 12B and 27B, queries where the gap between the top-1 and top-2 tool is smallest produce 14-21x more wrong calls than queries with the largest gap. The causal effect concentrates along one direction, the row of the output layer that produces the target tool's first token: a unit vector along it at matched magnitude already reaches 93-100%, while what is left over leaves the choice almost untouched. Activation patching localises this to a small set of mid- and late-layer attention heads, and a within-topic probe across 14 same-domain $τ$-bench airline tools reaches top-1 61-89% across five 4B-14B models, ruling out the reading that we are just moving the model along a topic axis. Even base models encode the right tool before they can emit it: cosine readout from the internal state recovers 69-82% on BFCL while base generation reaches only 2-10%, suggesting pretraining forms the representation and instruction tuning later wires it to the output. We measure tool identity selection and JSON schema correctness in single-turn fixed-menu settings; multi-turn agentic transfer is more fragile and is discussed in Limitations.",

                    "summary": "Long-horizon AI agents execute complex workflows spanning hundreds of sequential actions, yet a single wrong assumption early on can cascade into irreversible errors. When instructions are incomplete, the agent must decide not only whether to ask for clarification but when, and no prior work measures how clarification value changes over the course of execution. We introduce a forced-injection framework that provides ground-truth clarifications at controlled points in the agent's trajectory across four information dimensions (goal, input, constraint, context), three agent benchmarks, and four frontier models (three per benchmark; one on a single benchmark only; 84 task variants; 6,000+ runs). Counter to the common intuition that \"earlier is always better,\" we find that the value of clarification depends sharply on what information is missing: goal clarification loses nearly all value after 10% of execution (pass@3 drops from 0.78 to baseline), while input clarification retains value through roughly 50%. Deferring any clarification type past mid-trajectory degrades performance below never asking at all. Cross-model Kendall tau correlations (0.78-0.87 among models sharing identical task coverage; 0.34-0.67 across the full 4-model panel) confirm these timing profiles are substantially task-intrinsic. A complementary study of 300 unscripted sessions reveals that no current frontier model asks within the empirically optimal window, with strategies ranging from over-asking (52% of sessions) to never asking at all. These empirical demand curves provide the quantitative foundation that existing theoretical frameworks require but have lacked, and establish concrete design targets for timing-aware clarification policies. Code and data will be publicly released.",

                    "summary": "Tool-integrated reasoning (TIR) is difficult to scale to small language models due to instability in long-horizon tool interactions and limited model capacity. While reinforcement learning methods like group relative policy optimization provide only sparse outcome-level rewards. Recently, on-policy distillation (OPD) has gained popularity by supplying dense token-level supervision from a teacher on student-generated trajectories. However, our experiments indicate that applying OPD to TIR leads to a critical failure mode: erroneous tool calls tend to cascade across subsequent reasoning steps, progressively amplifying student-teacher divergence and rendering the teacher's token-level supervision increasingly unreliable. To address this, we propose SOD, a step-wise on-policy distillation framework for small language model agents, which adaptively reweights distillation strength at each step based on step-level divergence. Therefore, SOD can attenuate potentially misleading teacher signals in high-divergence regions while preserving dense guidance in well-aligned states. Experiments on challenging math, science, and code benchmarks show that SOD achieves up to 20.86% improvement over the second-best baseline. Notably, our 0.6B student achieves 26.13% on AIME 2025, demonstrating effective transfer of agentic reasoning to lightweight models. Our code is available at https://github.com/YoungZ365/SOD.",

                    "summary": "Large Language Model (LLM) agents are deployed in complex environments -- such as massive codebases, enterprise databases, and conversational histories -- where the relevant state far exceeds their context windows. To navigate these spaces, an agent must iteratively explore the environment to find relevant information. However, without explicit infrastructure, an agent's working memory can degrade into lossy representations of the search state, resulting in redundant work (e.g. repetitive looping) and premature stopping. In this work, we formalize this challenge as the Context Gathering Decision Process (CGDP), a specialized Partially Observable Markov Decision Process, where an agent's objective is to adaptively refine its belief state to isolate the necessary information for a task. We model an LLM's behavior as approximate Thompson Sampling within this CGDP, and introduce a predicate-based method that decomposes an LLM's implicit search into explicit and modular operations. We then derive two plug-and-play interventions for iterative LLM agents: a persistent, predicate-based belief state that bounds context while preserving multi-hop reasoning, and a programmatic exhaustion gate that halts unproductive search without premature stopping. Across four methods and three question-answering domains, we empirically validate that replacing an LLM's implicit state with our CGDP-motivated belief state improves multi-hop reasoning by up to $11.4\\%$; while the modular programmatic exhaustion detection saves up to $39\\%$ of tokens without any degradation in agent performance. Ultimately, we argue that framing the LLM agent loop as a CGDP can guide the design of modular, non-interfering improvements to agentic search harnesses.",

                    "summary": "At the heart of existing language model agents is a fixed orchestrator program responsible for the state transition between consecutive turns. This paper introduces self-programmed execution (SPE), an agent architecture in which the model completion is itself the orchestrator program, and the harness evaluates this program but does not impose its own orchestration policy. I formalize this idea using agentic machines: an SPE state is one from which a model completion can load any state of an embedded copy of the machine, meaning that it is subject to no fixed turn-to-turn orchestration policy. Realizing SPE in practice is nontrivial because the same data is both model context and executable program. I therefore introduce Spell, a Lisp-based language in which programs can edit and re-evaluate themselves, and effectful expressions like model invocations are structured such that re-evaluating an edited program does not replay its side effects. Experiments with existing models, not trained for SPE or Spell, show that frontier models can operate in this regime and accomplish challenging agentic tasks. These results demonstrate how an LM can act as an agent without any fixed orchestration policy, and they raise the question of what self-orchestration strategies might be learned by a model trained for self-programmed execution. Code is available at https://github.com/lukejoconnor/spell .",

                    "summary": "Adaptive test-time compute for LLM agents aims to invoke extra computation only when it improves performance. Existing methods typically use confidence-, uncertainty-, or difficulty-based gates, assuming a fixed direction from the gating signal through compute need to the value of computation. This makes gating a utility-calibration problem: gating signals should align with whether extra computation improves the final outcome over the base policy. We show that this alignment is unstable: the same signal predicts rollout benefit in one setting and rollout harm in another, with reversals across environments and backbones even when the task is fixed. Wrong-direction gates can therefore worsen performance by precisely selecting harmful states. This reversal reflects a deeper distinction between compute need and compute suitability: a high uncertainty signal may indicate decision-difficult states where rollouts help compare alternatives, or intervention-unsuitable states where the current context does not support useful rollout-based improvement. Under this two-source model, fixed-direction gates are unreliable across heterogeneous settings. To address this, we propose DIAL (Direction-Informed Adaptive Learning), a sparse gate trained from signal-agnostic counterfactual exploration to learn the utility direction of state features per (environment, backbone). Across six environments and three backbones, DIAL yields a stronger overall success-cost trade-off than fixed-direction baselines.",

                    "summary": "Code-agent RL often receives weak feedback: rollout-time signals are reliable and executable, but capture only necessary or surface conditions for task success rather than the target semantic predicate. Using agentic compile-fix as the setting, we study signal reshaping for standard GRPO under such feedback. Our central claim is that GRPO's within-group comparison is meaningful only after three kinds of signals are reshaped: outcome rewards recover semantic ranking, process signals localize intra-trajectory credit, and rollouts from the same prompt remain execution-comparable. We operationalize these conditions with a minimal signal-reshaping construction that leaves GRPO's group-normalized advantage construction unchanged: compile-and-semantic layered rewards reshape trajectory ranking, step-level process scores outside group reward normalization reshape within-trajectory update strength, and failure-cause-aware rollout governance reshapes within-group comparability. Experiments show a clear end-to-end gain: full signal-reshaped GRPO improves strict compile-and-semantic accuracy from the base model's zero-shot $0.385$ to $0.535$. Controlled comparisons further explain the source of this gain: binary rewards remove the compile-only middle tier and degrade trajectory control; on top of layered rewards, process-score weighting further improves accuracy from $0.48$ to $0.53$ and reduces average evaluation steps from $23.50$ to $17.02$. As a boundary comparison, privileged-prompt token-level distillation mainly optimizes local distributional alignment; in long tool-use trajectories, this signal is diluted by non-critical tokens and cannot replace outcome semantics, process credit, or within-group comparability.",

                    "summary": "Large Language Models (LLMs) have become increasingly capable as tool-using agents, with benchmarks spanning diverse general agentic tasks. Yet rigorous evaluation of scientific tool use remains limited. In chemistry, recent agents can plan syntheses and invoke domain-specific tools, but evaluations often rely on curated demonstrations, expert assessment, or LLM-as-judge scoring rather than exact, judge-free ground truth. We address this gap with chemical procurement cost estimation, a practical task in which an agent must ground chemical identities, retrieve supplier quotes, select valid purchasable packs, normalize quantities, and compute cost from a reaction description. We introduce ChemCost, a benchmark of 1,427 evaluable reactions grounded to a frozen pricing snapshot covering 2,261 chemicals and 230,775 supplier quotes, supporting scalar scoring and stage-level diagnosis of grounding, retrieval, procurement, and arithmetic failures. To evaluate robustness, we further construct controlled noise-injected views that perturb chemical aliases, quantity expressions, missing fields, and input formatting. Experiments with frontier, open-weight, and chemistry-specialized LLM agents show that tool access is necessary but insufficient for solving the task. The strongest agents reach only 50.6% accuracy within 25% relative error on clean inputs and degrade substantially with realistic noise. Stage-level analysis further shows that failures arise from brittle parsing, ineffective evidence integration, invalid pack selection, and non-convergent tool use.",

                    "summary": "AI agents are increasingly used to diagnose and mitigate failures in production systems, known as agentic Site Reliability Engineering (SRE). Current SRE benchmarks are limited to oversimplistic SRE tasks and are unfortunately hard to extend due to bespoke designs. We present SREGym, a high-fidelity benchmark for SRE agents. SREGym exposes a live system environment built atop real-world cloud-native system stacks, where high-fidelity failure scenarios are simulated through fault injectors. SREGym models the complexity of production environments by simulating (1) a wide range of faults at different layers, (2) various ambient noises, and (3) diverse failure modes such as metastable failures and correlated failures. SREGym is architected as a modular, extensible framework that orchestrates fault and noise injectors across stacks. SREGym currently includes 90 realistic, challenging SRE problems. We use SREGym to evaluate frontier agents and show that their capabilities varies significantly in addressing different kinds of failures, with up to 40% differences in end-to-end results. SREGym is actively maintained as an open-source project and has been used by researchers and practitioners.",

                    "summary": "As large language models (LLMs) show increasing promise on research-level physics reasoning tasks and agentic AI becomes more common, a practical question emerges: How does the interaction between researchers and agents affect the results? We study this using SCALAR (Structured Critic--Actor Loop for AI Reasoning), an Actor--Critic--Judge pipeline applied to quantum field theory and string theory problems. The Actor proposes solutions, the Critic provides iterative feedback, and an independent Judge evaluates the transcript against reference solutions. We vary the Actor persona, the Critic feedback strategy, and the Actor model family and scale. Multi-turn dialogue improves over single-shot attempts throughout, but both the mechanism of improvement and the value of different prompting choices depend strongly on the Actor--Critic pairing. Increasing the scale within one model family (e.g. from the 8B-parameter DeepSeek-R1 variant to DeepSeek-R1 70B) improves some easier-problem behavior, but does not remove the hardest bottleneck we observe. Critic feedback strategy matters most clearly in the asymmetric Actor--Critic setting (e.g., a lightweight Haiku Actor guided by a stronger Sonnet Critic), where constructive feedback improves mean-score outcomes. In same-family Actor--Critic settings, strategy effects are weaker: lenient feedback is sometimes favored, while strict and adversarial feedback are not beneficial. Taken together, SCALAR provides a controlled testbed for evaluating which interaction structures help or hinder AI-driven scientific discovery.",

                    "summary": "Large language models (LLMs) are increasingly deployed as autonomous agents in offensive cybersecurity. In this paper, we reveal an interesting phenomenon: different agents exhibit distinct attack patterns. Specifically, each agent exhibits an attack-selection bias, disproportionately concentrating its efforts on a narrow subset of attack families regardless of prompt variations. To systematically quantify this behavior, we introduce CyBiasBench, a comprehensive 630-session benchmark that evaluates five agents on three targets and four prompt conditions with ten attack families. We identify explicit bias across agents, with different dominant attack families and varying entropy levels in their attack-family allocation distributions. Such bias is better characterized as a trait of the agents, rather than a factor associated with the attack success rate. Furthermore, our experiments reveal a bias momentum effect, where agents resist explicit steering toward attack families that conflict with their bias. This forced distribution shift does not yield measurable improvements in attack performance. To ensure reproducibility and facilitate future research, we release an interactive result dashboard at https://trustworthyai.co.kr/CyBiasBench/ and a reproducibility artifact with aggregated session-level statistics and full evaluation scripts at https://github.com/Harry24k/CyBiasBench.",

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 通过按钮删除论文（避免JavaScript字符串转义问题）
        function deletePaperByButton(button) {
            const arxivId = button.getAttribute('data-arxiv-id');
            const title = button.getAttribute('data-title');
            deletePaper(arxivId, title);
        }

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);

        }

        // 切换星标状态
        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);

            if (showOnlyStarred) {

                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);

                    if (starredPapers.has(arxivId)) {

        function toggleRead(arxivId) {

            if (checkbox.checked) {

        // 切换摘要语言
        function toggleSummaryLanguage() {

            toggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

        function updateStats() {

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building

            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';
            const tagBadges = (paper.tags || []).map(tag => `<span class="tag-badge tag-arxiv">${tag}</span>`).join('');

            return `

                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>
                    </label>
                </div>
            `;

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">
                    <div class="collapsible-header open text-sm sm:text-base" onclick="toggleCollapsible(this)">原始摘要</div>
                    <div class="collapsible-content open">
                        <div class="inner">
                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}
                                ${hasSummaryZh ? `
                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                                    暂无原始摘要。上游抓取或解析可能失败。
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: paper.research_value_source === 'reviewgrounder' ? 'ReviewGrounder 审稿' : '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">
                            <div class="collapsible-header text-sm sm:text-base" onclick="toggleCollapsible(this)">${s.title}</div>

                                <div class="inner">
                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">

            });

            if (renderedSections === 0) {
                html += `
                    <div class="mb-3 sm:mb-4">
                        <div class="bg-amber-50/80 dark:bg-amber-950/20 border-l-3 border-amber-300 p-3 sm:p-4 rounded-r-lg text-xs sm:text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。
                        </div>
                    </div>
                `;
            }

            // 论文链接
            html += `
                <div class="flex flex-wrap gap-2">
                    <a href="https://arxiv.org/abs/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">
                        arXiv 原文

                    <a href="https://arxiv.org/pdf/${aid}.pdf" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-md transition-colors whitespace-nowrap">
                        PDF 下载
                    </a>
                    <a href="https://papers.cool/arxiv/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">

        // Toggle paper detail expansion

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表
        function renderPapers() {
            const mainContent = document.getElementById('main-content');
            const loading = document.getElementById('loading');

            if (loading) {
                loading.classList.add('hidden');
            }

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date] || [];
                const { html: papersHTML, count: dateVisibleTotal } = collectPapersForDate(clusters, date);

                totalPapers += dateVisibleTotal;

                html += `
                    <section class="mb-6 sm:mb-8" data-date-section="${date}">
                        <h2 class="text-base sm:text-lg font-medium text-slate-500 dark:text-slate-400 mb-3 sm:mb-4" data-date-heading="${date}">${date} (${dateVisibleTotal} 篇论文)</h2>
                `;

                // 添加该日期的AI论文速览（如果存在）
                if (dailyOverviews[date]) {
                    html += `
                        <div class="mb-3 sm:mb-4 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-700 rounded-lg shadow-md p-3 sm:p-5">
                            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-600 dark:text-blue-400 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                                </svg>
                                <span class="font-semibold text-slate-900 dark:text-white text-sm sm:text-base">今日AI论文速览</span>
                            </div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="markdown-content text-slate-700 dark:text-slate-200 text-xs sm:text-sm" id="overview-${date}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                if (dateVisibleTotal === 0) {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-5 lg:p-6">
                            <div class="text-sm sm:text-base text-slate-600 dark:text-slate-300 leading-relaxed">
                                今日数据已处理，但没有符合当前筛选条件的论文。
                            </div>
                        </div>
                    </section>
                    `;
                } else {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                    `;
                }
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json?v=${DATA_VERSION}`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
