<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperTools - 学术论文集合</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 微软雅黑字体 */
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body {
                font-size: 14px;
            }

            /* 改善可点击区域 */
            button, a {
                min-height: 44px;
                min-width: 44px;
            }

            /* 优化间距 */
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }
        }

        /* 星标样式 */
        .star-button {
            transition: color 0.2s ease-in-out;
        }
        .star-button.starred {
            color: #fbbf24;
        }
        .star-button:not(.starred) {
            color: #9ca3af;
        }
        .star-button:hover {
            color: #fbbf24;
        }
        /* 删除按钮样式 */
        .delete-button {
            transition: all 0.2s ease-in-out;
        }
        .delete-button:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        /* 论文项目样式 */
        .paper-item {
            transition: all 0.3s ease-in-out;
        }
        .paper-item.hidden-paper {
            opacity: 0.3;
            transform: scale(0.98);
        }
        /* 平滑过渡 */
        .rotate-90-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* 论文卡片展开/收起 */
        .paper-expand-hint {
            padding: 4px 0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .paper-expand-hint:hover {
            color: #2563eb;
        }
        .dark .paper-expand-hint:hover {
            color: #60a5fa;
        }
        .paper-expand-hint .expand-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.65rem;
            margin-right: 4px;
        }
        .paper-detail {
            border-top: 1px solid #e2e8f0;
            margin-top: 8px;
            padding-top: 8px;
        }
        .dark .paper-detail {
            border-top-color: #334155;
        }
        .paper-detail.hidden {
            display: none;
        }

        /* 可折叠部分样式 */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            padding: 8px 0;
            user-select: none;
            color: #1e40af;
            transition: all 0.2s ease-in-out;
        }
        .dark .collapsible-header {
            color: #60a5fa;
        }
        .collapsible-header:hover {
            opacity: 0.8;
        }
        .collapsible-header::before {
            content: "▶";
            margin-right: 8px;
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }
        .collapsible-header.open::before {
            transform: rotate(90deg);
        }
        .collapsible-content {
            display: none;
        }
        .collapsible-content.open {
            display: block;
        }
        .collapsible-content .inner {
            padding-top: 8px;
        }

        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #1e40af;
        }
        .dark .markdown-content h1 {
            color: #60a5fa;
        }
        .markdown-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: #1e40af;
        }
        .dark .markdown-content h2 {
            color: #60a5fa;
        }
        .markdown-content h3 {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 0.6em;
            margin-bottom: 0.3em;
            color: #1e40af;
        }
        .dark .markdown-content h3 {
            color: #60a5fa;
        }
        .markdown-content h4 {
            font-size: 1em;
            font-weight: bold;
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            color: #2563eb;
        }
        .dark .markdown-content h4 {
            color: #93c5fd;
        }
        .markdown-content p {
            margin-bottom: 0.8em;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .markdown-content ul {
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.3em;
        }
        .markdown-content code {
            background-color: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .dark .markdown-content code {
            background-color: #334155;
        }
        .markdown-content pre {
            background-color: #f1f5f9;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 0.8em;
        }
        .dark .markdown-content pre {
            background-color: #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 0.8em;
            color: #64748b;
        }
        .dark .markdown-content blockquote {
            border-left-color: #475569;
            color: #94a3b8;
        }
        .markdown-content strong {
            font-weight: 600;
        }
        .markdown-content em {
            font-style: italic;
        }

        /* Tag filter button styles */
        .tag-btn {
            padding: 4px 14px;
            font-size: 0.875rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tag-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .tag-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .dark .tag-btn { border-color: #475569; color: #94a3b8; }
        .dark .tag-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .dark .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* Tag badge styles */
        .tag-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.7rem;
            border-radius: 9999px;
            background: #dbeafe;
            color: #1e40af;
            margin-right: 4px;
        }
        .tag-badge.tag-arxiv {
            background: #e0f2fe;
            color: #0369a1;
        }
        .dark .tag-badge { background: #1e3a5f; color: #7dd3fc; }
        .dark .tag-badge.tag-arxiv { background: #164e63; color: #67e8f9; }

        /* 作者机构上标样式 */
        .author-aff {
            vertical-align: super;
            font-size: 0.65em;
            color: #3b82f6;
            margin-left: 1px;
        }
        .dark .author-aff {
            color: #60a5fa;
        }

        /* TOC 侧边栏样式 - 固定在左侧 */
        #toc-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            z-index: 35;
            background: white;
            border-right: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .dark #toc-sidebar {
            background: #1e293b;
            border-right-color: #334155;
        }
        #toc-sidebar.collapsed {
            transform: translateX(-100%);
        }
        #toc-inner {
            padding: 1rem 0.5rem;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        #toc-inner::-webkit-scrollbar {
            width: 4px;
        }
        #toc-inner::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark #toc-inner::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .toc-date {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toc-date:hover {
            background: #e2e8f0;
        }
        .dark .toc-date:hover {
            background: #334155;
        }
        .toc-date.active {
            background: #dbeafe;
            color: #1e40af;
        }
        .dark .toc-date.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        .toc-date-arrow {
            transition: transform 0.2s;
            font-size: 0.65rem;
        }
        .toc-date-arrow.open {
            transform: rotate(90deg);
        }
        .toc-papers {
            display: none;
            padding-left: 1.2rem;
        }
        .toc-papers.open {
            display: block;
        }
        .toc-paper {
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .toc-paper:hover {
            background: #f1f5f9;
            color: #1e40af;
        }
        .dark .toc-paper {
            color: #94a3b8;
        }
        .dark .toc-paper:hover {
            background: #1e293b;
            color: #93c5fd;
        }
        .toc-paper.active {
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 500;
        }
        .dark .toc-paper.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        /* TOC 切换按钮 - 左侧 */
        #toc-toggle {
            position: fixed;
            left: 220px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 40;
            width: 28px;
            height: 56px;
            border-radius: 0 6px 6px 0;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            transition: left 0.3s ease, background 0.2s;
        }
        #toc-toggle:hover {
            background: #2563eb;
        }
        #toc-toggle svg {
            transition: transform 0.3s;
        }
        #toc-toggle:not(.sidebar-open) {
            left: 0;
        }
        @media (max-width: 1023px) {
            #toc-sidebar {
                width: 240px;
            }
            #toc-toggle {
                left: 240px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
        @media (max-width: 767px) {
            #toc-sidebar {
                width: 260px;
                box-shadow: 4px 0 16px rgba(0,0,0,0.1);
            }
            #toc-toggle {
                left: 260px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
    </style>
    <script>
        // Tailwind CSS 暗色模式配置
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-200">

            <span id="toast-message" class="text-sm sm:text-base">已删除</span>

    <!-- TOC 切换按钮 -->
    <button id="toc-toggle" class="hidden lg:flex sidebar-open" onclick="toggleTocSidebar()" title="切换目录">

                    </button>
                    <button id="filter-all" class="px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none transition-colors whitespace-nowrap">

                    </button>
                    <!-- 中英文摘要切换按钮 -->
                    <button id="summary-toggle" class="px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none transition-colors whitespace-nowrap">

                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="space-y-6 sm:space-y-8" id="main-content">

            <div id="loading" class="text-center py-8">
                <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm shadow rounded-md text-slate-500 bg-white dark:bg-slate-800 transition ease-in-out duration-150">

    <script>
        const allPapers = {
    "2026-04-29": [
        {
            "name": "Agent Development Frameworks",
            "count": 2,
            "papers": [
                {
                    "title": "ClawGym: A Scalable Framework for Building Effective Claw Agents",
                    "arxiv_id": "2604.26904",
                    "authors": "Fei Bai, Huatong Song, Shuang Sun, Daixuan Cheng, Yike Yang, Chuan Hao, Renyuan Li, Feng Chang, Yuan Wei, Ran Tao, Bryan Dai, Jian Yang, Wayne Xin Zhao",
                    "summary": "Claw-style environments support multi-step workflows over local files, tools, and persistent workspace states. However, scalable development around these environments remains constrained by the absence of a systematic framework, especially one for synthesizing verifiable training data and integrating it with agent training and diagnostic evaluation. To address this challenge, we present ClawGym, a scalable framework that supports the full lifecycle of Claw-style personal agent development. Concretely, we construct ClawGym-SynData, a diverse dataset of 13.5K filtered tasks synthesized from persona-driven intents and skill-grounded operations, paired with realistic mock workspaces and hybrid verification mechanisms. We then train a family of capable Claw-style models, termed ClawGym-Agents, through supervised fine-tuning on black-box rollout trajectories, and further explore reinforcement learning via a lightweight pipeline that parallelizes rollouts across per-task sandboxes.To support reliable evaluation, we further construct ClawGym-Bench, a benchmark of 200 instances calibrated through automated filtering and human-LLM review. Relevant resources will be soon released at https://github.com/ClawGym.",
                    "category": "cs.CL",

                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是构建一个用于开发 Claw 风格智能体的可扩展框架（ClawGym），包括训练数据合成、智能体训练（监督微调和强化学习）、以及评估基准。这不是将LLM作为工具应用到特定领域（如生物、医疗、金融），而是**关于如何构建和改进智能体本身**的方法论研究。\n\n**第二步：正面指标分析**\n\n论文符合多个核心关注点：\n\n1. **核心范式**: 明确涉及 \"Claw-style agents\"、\"agent training\"，属于 LLM-based Agents 研究范畴\n2. **智能体能力**: 涉及多步骤工作流（multi-step workflows）、工具使用（tools）、持久工作区状态（persistent workspace states）——这些都是典型的 Agentic 能力\n3. **演化机制**: 包含监督微调（supervised fine-tuning）和强化学习（reinforcement learning）训练流程，体现了智能体的训练和改进机制\n\n**第三步：排除标准检查**\n\n- 安全相关：无涉及\n- 多模态与视觉：无涉及  \n- 图相关技术：无涉及\n- 多智能体拓扑与编排：无涉及\n\n**第四步：特殊分析**\n\n虽然论文的主要贡献是构建智能体开发的框架和工具包（数据合成、训练流程、评估基准），而非专门研究\"自我演化\"机制，但它确实包含了：\n- 通过强化学习让智能体在环境中进行并行 rollout 训练\n- 这体现了智能体通过训练数据和环境交互进行能力改进的过程\n\n**结论**\n\n这篇论文的核心贡献是构建、训练和改进 LLM 智能体的框架方法，属于\"构建和改进 LLM 智能体\"的范畴，符合用户\"筛选核心贡献在于构建、改进或演化 LLM 智能体的论文\"的研究目标。虽然它更偏向于工程框架和数据合成，但本质上仍是关于 Agentic AI 的方法论研究，而非特定领域的应用论文。",
                    "intro_logic": "1. Autonomous agent frameworks such as OpenClaw are moving AI from isolated chat interfaces into users’ real computer environments, where agents can use tools, manage local files, interact with services, and execute multi-step daily workflows.\n\n2. This shift creates a new class of personal agents that are expected to perform concrete digital tasks in realistic user workspaces, rather than merely answer questions in text.\n\n3. However, even advanced LLMs still struggle to complete many everyday OpenClaw tasks reliably; weaker LLMs are especially prone to failures in multi-step instruction following, tool selection, and error recovery.\n\n4. The difficulty comes from the distinctive nature of Claw-style tasks: they are grounded in local workspace states, require tool execution and file updates, and often depend on long-horizon interactions with persistent environment changes.\n\n5. These tasks differ from static reasoning benchmarks such as AIME, because success cannot be judged only by textual reasoning or final answers; it depends on whether the final workspace state satisfies the user’s request.\n\n6. They also differ from conventional agentic benchmarks such as SWE-Bench-Verified and BrowseComp, which usually offer more structured and observable agent loops; Claw-style agents operate through more opaque interfaces with ambiguous instructions, unexpected workspace states, tool errors, and cross-session dependencies.\n\n7. Therefore, Claw-style agents require workspace-grounded evaluation and training resources that can capture real execution behavior, rather than relying only on static reasoning tasks or structured agent-loop benchmarks.\n\n8. Existing work has explored specialized training algorithms, online learning from user interactions, and dedicated benchmarks for personal agents, but these efforts remain constrained by the limited availability of large-scale Claw-style task data grounded in realistic user workspaces.\n\n9. Building such data is hard because Claw-style tasks must reflect diverse personalized user needs across professions and routines, making it difficult to define representative task scenarios.\n\n10. They are also hard to verify at scale, because task completion may involve long chains of file operations, tool calls, workspace updates, intermediate checks, and qualitative output requirements.\n\n11. In addition, they require realistic mock workspaces and task-specific artifacts, since the task context must be executable and meaningfully grounded in files, folders, configurations, and other local resources.\n\n12. As a result, the field lacks a systematic foundation for generating verifiable Claw-style tasks, training agents on them, and evaluating agent capabilities in realistic workspace-grounded settings.\n\n13. Research question: How can we systematically build scalable, diverse, verifiable, and workspace-grounded data and evaluation resources to develop more capable Claw-style personal agents?",
                    "core_insight": "下面我把这篇论文的“灵光一闪”概括为一个更底层的方法论洞察：**Claw agent 的核心瓶颈不是单个模型不会推理，而是缺少可规模化生成的、带 workspace、可执行、可验证的环境任务；只要把“真实用户意图”和“可执行技能”解耦再重新组合，就能合成训练、评测、RL 都可用的完整 Claw-style task。**\n\n---\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n**作者意识到：Claw-style agent 数据不必依赖真实用户工作流采集，而可以通过“persona-driven intent + skill-grounded operation + mock workspace + hybrid verifier”系统性合成为可执行、可验证的环境任务。**\n\n### 展开解释\n\n这篇论文真正的认知突破，不只是“我们需要更多训练数据”，而是进一步意识到：**Claw-style task 的最小可用单元不是一条 instruction，而是一个完整的 environment-grounded task instance**，它必须同时包含：\n\n- 用户指令；\n- 初始 workspace；\n- 可用工具/操作；\n- 执行后 workspace state 的变化；\n- 能判断最终状态是否正确的 verifier。\n\n论文在 task definition 中明确说，Claw task 的主要输出不是文本答案，而是最终环境状态：\n\n> “However, for Claw-style agent tasks, the primary output is the final environment state \\(s_H\\), rather than merely the final text response.”\n\n这句话非常关键。它意味着传统 instruction tuning 或静态 QA 数据无法直接满足 Claw agent 训练，因为 agent 需要学会改变 workspace，而不是只回答问题。\n\n进一步，作者发现大规模构造这类任务的难点不在于“写更多 prompt”，而在于同时满足三件事：**diversity、executability、verifiability**。论文原文指出：\n\n> “Claw-style agent tasks introduce distinct challenges for large-scale data synthesis, driven by three key factors. First, they need to capture personalized requirements across different professions and routines... Second, their long-horizon nature often involves sequences of file operations, tool calls, workspace updates, and intermediate validation... Third, their grounding in local workspaces necessitates realistic mock workspaces and task-specific artifacts...”\n\n这里就引出了 seed insight：如果能把这三件事拆开建模，就可以合成完整任务。\n\n于是作者提出了 dual-route synthesis：\n\n> “At the core of our approach lies a dual-route data synthesis strategy that generates both diverse and verifiable tasks. Specifically, the persona-driven top-down pipeline grounds tasks in high-level user personas and scenario intents, while the skill-grounded bottom-up pipeline composes multi-step workflows from concrete, executable capabilities.”\n\n这就是整篇论文的核心“灵光一闪”：  \n**top-down 负责真实感和多样性，bottom-up 负责可执行性和工具 grounding，再通过 mock resources 和 verifier 把 instruction 变成完整的 executable task。**\n\n论文也明确说：\n\n> “To ensure execution realism, we automatically instantiate workspace-grounded environments by generating task-specific mock files and auxiliary resources. We further implement a hybrid verification protocol that combines deterministic code-based checkers with qualitative rubric-based verifiers.”\n\n所以，作者的洞察不是单点技术，而是一种数据工程范式：  \n**把 Claw task 合成为一个闭环：intent → resource → execution → verification → trajectory → training/evaluation。**\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个 seed insight 直接导向了 ClawGym 的三大组件：ClawGym-SynData、ClawGym-Agents、ClawGym-Bench。中间的推理链条大致如下。\n\n---\n\n### 第一步：既然 Claw agent 的瓶颈是缺少环境任务，就先定义“完整任务”是什么\n\n作者首先把 Claw-style task 形式化为：\n\n- user instruction \\(p\\)；\n- action space \\(A\\)；\n- environment transition function \\(F\\)；\n- task-specific verifier \\(V_\\tau\\)。\n\n论文说：\n\n> “In our work, a Claw-style agent task is an environment-grounded instruction-execution problem. The agent is provided with a user instruction and an initial workspace, and it may utilize available computer tools within that workspace to perform work in an effort to satisfy the user’s request.”\n\n这一步很重要：它把任务从“文本 prompt”提升为“workspace-grounded instruction-execution problem”。\n\n因此，如果要合成数据，就不能只生成 prompt，还必须生成：\n\n1. 初始 workspace；\n2. 可执行资源；\n3. 验证器。\n\n---\n\n### 第二步：单一路线的数据合成不够，所以采用 dual-route synthesis\n\n作者意识到，单纯从 persona 出发会产生“看起来真实但可能不可执行”的任务；单纯从技能出发会产生“可执行但缺少真实用户场景”的任务。于是他们设计了两个互补路径。\n\n#### Persona-driven top-down synthesis\n\n这一部分从用户身份、场景和操作集合出发，保证任务的现实性和多样性。\n\n论文说：\n\n> “Persona-driven top-down synthesis generates diverse and practical Claw agent tasks from high-level user contexts.”\n\n以及：\n\n> “The persona and scenario category encourage realistic user-facing task intents, while the selected basic operations constrain the later generated instruction to actions that can plausibly be carried out in a Claw-style workspace.”\n\n也就是说，persona-driven pipeline 解决的是：  \n**任务像不像真实用户会提出的需求。**\n\n#### Skill-grounded bottom-up synthesis\n\n这一部分从 OpenClaw skills 出发，保证任务贴近 agent 实际能调用的能力。\n\n论文说：\n\n> “Unlike the persona-driven top-down pipeline, which starts from user contexts and scenario intentions, the skill-grounded bottom-up pipeline starts from concrete capabilities already implemented in OpenClaw skills.”\n\n以及：\n\n> “The purpose of this pipeline is to identify skills suitable for task synthesis, normalize capability descriptions, and compose them into practical task specifications.”\n\n也就是说，skill-grounded pipeline 解决的是：  \n**任务是否建立在真实可用的 OpenClaw capability 上。**\n\n两者结合起来，形成了论文后续实验里强调的 synergy：\n\n> “models trained with mixed synthesis outperform those trained with either strategy alone, highlighting the synergy between top-down intent diversity and bottom-up operational grounding.”\n\n---\n\n### 第三步：instruction 还不够，需要生成 mock workspace\n\n因为 Claw task 的执行依赖本地文件、表格、配置、文档等环境状态，所以作者进一步生成 task-specific resources。\n\n论文写道：\n\n> “Claw-style tasks often require concrete files to establish the initial workspace state.”\n\n并且强调他们不依赖真实用户文件：\n\n> “Instead of relying on real user files or large external datasets, we generate lightweight mock files tailored to each task, such as documents to summarize, tables to analyze, configuration files to inspect, records to reorganize, or reference materials that constrain the expected output.”\n\n这一步是从 seed insight 推出的关键工程设计：  \n**如果任务要 environment-grounded，就必须自动 materialize environment。**\n\n否则数据仍然只是 instruction，不是 Claw task。\n\n---\n\n### 第四步：为了让任务可训练、可评测，必须自动生成 verifier\n\nClaw task 的成功标准通常不是一个字符串答案，而是 workspace 中的文件是否正确、统计是否准确、报告是否完整。因此必须有 verifier。\n\n作者采用 hybrid verification：\n\n> “To address this, we design a hybrid verification scheme consisting of code-based verification and rubric-based verification.”\n\n其中 code-based verifier 检查确定性条件：\n\n> “Code-based verification targets objective and executable requirements, such as whether required files are created, whether structured outputs follow the specified schema, or whether computed values are correct.”\n\nrubric-based verifier 检查定性要求：\n\n> “Rubric-based verification complements it by assessing qualitative requirements that are difficult to formalize as deterministic checks, such as clarity, completeness and style.”\n\n这一步把合成任务变成了可闭环优化的对象：  \n**有 verifier，就可以筛选 trajectory、训练 agent、构造 benchmark、做 RL。**\n\n---\n\n### 第五步：有了任务池，就可以用 black-box rollout 收集真实轨迹\n\nClawGym-SynData 生成的是 task；ClawGym-Agents 需要的是 interaction trajectory。因此作者用强 teacher model 在 OpenClaw 环境中 rollout。\n\n但 OpenClaw 是黑盒系统，不能简单套用标准 agent loop。论文说：\n\n> “frameworks like OpenClaw operate as highly encapsulated systems. Consequently, internal execution details, such as context management and subagent sessions, remain completely opaque.”\n\n所以他们采用 black-box rollout：\n\n> “we adopt a black-box rollout strategy that directly leverages the OpenClaw harness.”\n\n并用 proxy 捕获交互：\n\n> “we introduce a proxy layer that intercepts each request and response exchanged during the rollout.”\n\n这一步说明，作者并没有重写 OpenClaw agent loop，而是尊重原系统的真实运行方式，从而得到更 faithful 的训练轨迹。\n\n---\n\n### 第六步：用 verifier score 过滤 trajectory，再做 SFT / RL\n\n因为每条 trajectory 都可以被 verifier 打分，所以作者可以筛选高质量轨迹：\n\n> “we retain it for training only if its final score exceeds a predefined reward threshold.”\n\n最终得到：\n\n> “a final dataset of 24.5K high-fidelity interaction trajectories for SFT.”\n\n这就完成了从洞察到方法的闭环：\n\n```text\nClaw task 是 workspace-grounded final-state problem\n        ↓\n需要完整 task instance，而不只是 prompt\n        ↓\n用 persona-driven 生成真实用户意图\n用 skill-grounded 保证可执行操作 grounding\n        ↓\n生成 mock workspace\n        ↓\n生成 code/rubric verifier\n        ↓\n用 verifier 筛选任务和轨迹\n        ↓\nSFT / RL 训练 ClawGym-Agents\n        ↓\n从同一合成池中严格筛选 ClawGym-Bench\n```\n\n---\n\n## 3. 试错历程：困难、调整与新子问题\n\n论文没有以“失败实验日志”的形式叙述试错过程，但从方法设计和分析中可以看出，作者在实现 seed insight 时遇到了多个意料之外的困难，并相应调整了原始方案。\n\n---\n\n### 困难一：合成任务容易“不真实、不可执行、重复或过难”\n\n一开始，如果只是让 LLM 生成任务，很容易产生重复任务、虚构环境、不可用工具、或难度失衡的问题。因此作者增加了 automated quality assessment。\n\n论文明确说：\n\n> “After task synthesis and verification design, we perform automated quality assessment to filter lowquality samples before using them for training or evaluation.”\n\n他们具体检查三类问题：\n\n- novelty；\n- plausibility；\n- difficulty。\n\n关于 plausibility，论文写道：\n\n> “The judge determines whether each task is clear, internally consistent, and realistic as a Clawstyle user request. In particular, it checks whether the task relies on unavailable or imaginary environment components, such as non-existent system tools, unsupported services, or unrealistic software integrations.”\n\n这说明原始合成任务可能会出现“看起来合理但实际环境无法支持”的情况。作者的调整是加入 LLM judge 和 embedding-based novelty filtering。\n\n此外，人工抽样质量分析也显示 execution feasibility 是相对较弱的一项：\n\n> “Execution feasibility is relatively lower but still positive, reflecting the non-trivial environment assumptions and multi-step execution complexity of some tasks.”\n\nTable 2 中 Execution Feasibility 平均分为 3.50，低于 Task Reasonableness 4.46 和 Resource Consistency 4.36。  \n这表明作者确实遇到了“任务看起来合理，但执行起来不总是顺滑”的问题。\n\n---\n\n### 困难二：自动 verifier 容易过松、过严或与任务不对齐\n\n这是 ClawGym 最关键的难题之一。因为 verifier 是自动生成的，如果 verifier 错了，整个训练和评测都会被污染。\n\n论文指出：\n\n> “An incorrect checker invalidates evaluation, an overly lenient checker may inflate scores by rewarding superficial outputs such as merely creating a file, and an overly strict checker may penalize valid solutions by enforcing requirements beyond the task.”\n\n这句话揭示了他们在 verifier 设计中遇到的三类问题：\n\n1. checker 本身错误；\n2. checker 太松，只要创建文件就给分；\n3. checker 太严，要求了任务没有明确要求的格式或字段。\n\n为了解决这个问题，作者增加了 verification quality assessment。\n\n对于 code checker，他们做了 executable sanity check：\n\n> “If it already assigns a non-trivial score before the task is attempted, the checker is considered unsuitable, since it may reward superficial conditions or fail to distinguish task completion from the initial workspace state.”\n\n这个设计很有意思：  \n他们把初始 workspace 直接拿去跑 checker，如果还没执行任务就得分，说明 checker 过松。\n\n同时，他们用 LLM judge 检查 requirement coverage 和 over-strictness：\n\n> “Requirement coverage measures whether the checker verifies the core objective requirements of the task... Over-strictness measures whether the checker enforces conditions beyond the task specification.”\n\n对于 rubric，也有一个新问题：rubric 可能重复 code checker 已经检查的内容。于是作者要求 rubric 只补充定性评价：\n\n> “The judge reviews the task instruction, input files, code checker, and rubric rules to identify whether any rubric rule merely duplicates code-verifiable requirements.”\n\n这说明 seed insight 推出“自动生成 verifier”后，又产生了一个新的子问题：  \n**如何验证 verifier 本身？**\n\nClawGym 的解决办法是 meta-verification：对 verifier 再做 executability、coverage、strictness、complementarity 检查。\n\n---\n\n### 困难三：OpenClaw 是黑盒，不能直接套标准 agent training loop\n\n作者本来要收集 agent trajectory，但 OpenClaw 内部执行细节不可见：\n\n> “frameworks like OpenClaw operate as highly encapsulated systems. Consequently, internal execution details, such as context management and subagent sessions, remain completely opaque.”\n\n因此，不能像普通 agent benchmark 那样自定义 action-observation loop。作者的调整是：\n\n> “Rather than implementing a separate agent loop or constructing an external harness to approximate OpenClaw’s interaction protocol, we execute tasks through OpenClaw itself.”\n\n也就是采用 black-box rollout，并加 proxy layer：\n\n> “This proxy captures the complete multi-turn interaction stream, including model inputs, model outputs, tool invocations, and environment feedback.”\n\n这是一种非常务实的调整：  \n不是把 OpenClaw 改造成研究者想要的标准形式，而是把它当作黑盒系统，外部拦截真实运行轨迹。\n\n---\n\n### 困难四：black-box rollout 日志是碎片化的，还夹杂无关系统消息\n\n收集到日志以后，作者发现 raw trace 并不天然就是干净的训练数据。论文说：\n\n> “Since the proxy captures requests at the granularity of individual model calls, a single task execution may correspond to multiple partially overlapping request traces.”\n\n所以他们需要 reconstruct trajectory：\n\n> “We reconstruct trajectories by grouping requests that share identical message prefixes and concatenating subsequent interaction turns.”\n\n此外，OpenClaw session 中会插入 cron / heartbeat messages：\n\n> “long-running OpenClaw sessions may explicitly insert auxiliary prompts, such as cron or heartbeat messages, into the conversation.”\n\n这些消息不是任务求解的一部分，所以作者把它们删掉：\n\n> “during aggregation, we remove such systematic reminders and retain only the interaction segments that are relevant to task execution.”\n\n还有 unsupported tools 的问题：\n\n> “we filter out trajectories involving unsupported tools.”\n\n因此，trajectory construction 也成为一个新的子问题：  \n**如何从真实黑盒系统日志中恢复干净、连贯、可训练的多轮 agent trajectory。**\n\n---\n\n### 困难五：Claw task 的 verifier score 是连续值，传统 best-of-N 二元过滤不适用\n\n在很多 coding / QA 任务中，reward 是 binary success/failure。但 ClawGym 的 hybrid verifier 会产生连续分数。\n\n论文说：\n\n> “Unlike conventional program-repair or question-answering tasks, where rewards are often binary, our hybrid verification protocol produces continuous scores in [0, 1]... Consequently, standard best-of-N filtering strategies designed for binary success signals may become directly inapplicable.”\n\n这导致了一个新问题：  \n**怎样选择训练轨迹？**\n\n作者采用 reward-threshold filtering：\n\n> “we adopt a simple yet robust reward-threshold-based filtering strategy.”\n\n但 threshold 不是越高越好。实验发现 0.5 最优：\n\n> “a threshold of 0.5 yields the best results on both benchmarks, marking a critical equilibrium between execution completeness and data diversity.”\n\n他们还解释了原因：\n\n> “While lower thresholds introduce trajectories with insufficient task fulfillment that may degrade the supervision signal, excessively high thresholds prune valuable behavioral variety.”\n\n这说明作者最初可能会自然倾向于只保留高分轨迹，但实验发现过高 threshold 会损失多样性，包括一些有价值的 partial recovery patterns。因此他们调整为 calibrated threshold，而不是极端过滤。\n\n---\n\n### 困难六：长轨迹训练会超过上下文窗口，还可能让模型学习环境输出\n\nClaw-style trajectory 很长。Table 3 显示：\n\n> “each selected trajectory contains 13.00 interaction rounds and 18.67K tokens on average”\n\n有些轨迹会更长。因此作者对 Qwen3-8B 使用 YaRN 扩展上下文：\n\n> “For Qwen3-8B, whose native context window is 32K tokens, we apply YaRN to extend the maximum context length to 64K tokens.”\n\n另一个问题是，trajectory 中既有模型输出，也有 Docker/tool observation。如果直接全量做 SFT，模型可能学习模仿环境反馈，而不是学习决策。\n\n于是作者采用 loss masking：\n\n> “tokens corresponding to environment feedback produced by Docker-based execution are excluded from the supervised loss.”\n\n理由是：\n\n> “This prevents the model from learning to imitate deterministic execution outputs or tool-returned observations, which are not actions generated by the policy.”\n\n这也是从实现中暴露出的新子问题：  \n**agent trajectory 不是普通对话数据，必须区分 policy-generated tokens 和 environment-generated tokens。**\n\n---\n\n### 困难七：benchmark 不能直接从合成池随机抽样，否则可能太简单、太难或不稳定\n\n如果 benchmark 直接从 ClawGym-SynData 中抽样，会出现三类问题：\n\n1. strong model 也解不了，任务可能有问题；\n2. small model 也轻松解，区分度不够；\n3. verifier 或资源仍可能有隐藏问题。\n\n因此作者引入 difficulty-aware filtering：\n\n> “The first condition removes tasks that are too difficult or unstable even for the strong agent, while the second filters out tasks that are already easy for the smaller agent. The third condition ensures that the strong agent performs better than the smaller one, indicating that the task reflects a meaningful capability gap.”\n\n然后再做 human-LLM review：\n\n> “Human reviewers then act as final decision makers: they examine the LLM feedback, determine whether the identified issues are valid, decide whether to accept, revise, or reject each candidate, and add missing details when necessary.”\n\n这说明 ClawGym-Bench 不是简单的 synthetic benchmark，而是对 synthetic pool 进行二次筛选和人工校准后的结果。\n\n---\n\n## 总结：这篇论文的方法论主线\n\n这篇论文的 seed insight 可以再压缩为一句话：\n\n**Claw agent 的训练与评测可以被转化为一个“可合成的环境任务闭环”：用 persona 保证真实意图，用 skill 保证可执行 grounding，用 mock workspace 保证环境上下文，用 hybrid verifier 保证可训练和可评测。**\n\n从这个洞察出发，论文自然导出了：\n\n1. **ClawGym-SynData**：大规模合成 executable task；\n2. **ClawGym-Agents**：用 verifier-filtered black-box rollout 轨迹做 SFT / RL；\n3. **ClawGym-Bench**：从合成池中经过 difficulty calibration 和 human-LLM review 选出可靠 benchmark。\n\n而在实现过程中，作者不断遇到“合成任务是否可执行”“verifier 是否可靠”“黑盒日志如何变成训练轨迹”“连续 reward 如何筛选数据”“长轨迹如何训练”“benchmark 如何稳定可区分”等子问题，并分别通过 quality assessment、hybrid verification、proxy-based rollout、reward thresholding、loss masking、difficulty-aware filtering 等机制修正原方案。\n\n所以，这篇论文的真正贡献不是单个模型或单个 benchmark，而是提出了一套围绕 **workspace-grounded synthetic task lifecycle** 的系统性范式。",
                    "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的区别是：**它不是只做一个 Claw agent 评测集，或者只训练一个 agent，而是先自动造出大量“带文件、带工具、可验证”的真实工作区任务，再用这些任务收集执行轨迹来训练模型，并从中筛出可靠任务做评测。**\n\n---\n\n# 这篇论文到底在做什么？\n\n它要解决的问题很直接：\n\n现在的个人电脑 agent，比如 OpenClaw 这类系统，需要在用户本地工作区里读文件、写文件、跑脚本、整理目录、生成报告、修改配置。\n\n但问题是：\n\n1. **缺少大量训练数据**：没有足够多“真实工作区任务 + 正确执行过程”的数据。\n2. **任务难验证**：agent 做完后，不能只看最后一句话，要看文件有没有真的改对。\n3. **缺少稳定评测集**：现有 benchmark 不一定覆盖这种本地工作区、多步操作、文件状态变化的任务。\n4. **小模型在这类任务上很弱**：它们不会稳定地用工具、读反馈、修错误、完成长流程。\n\n所以 ClawGym 做了三件事：\n\n1. 自动生成大量 Claw 风格任务，叫 **ClawGym-SynData**。\n2. 用强模型在这些任务上跑 OpenClaw，收集成功执行轨迹，然后训练小模型，得到 **ClawGym-Agents**。\n3. 从生成任务里严格筛出 200 个高质量任务，作为评测集 **ClawGym-Bench**。\n\n---\n\n# 按执行顺序拆解整套方法\n\n---\n\n## 第一步：定义什么叫 Claw-style 任务\n\n### 输入\n\n一个用户请求，例如：\n\n> 找出项目文件夹里所有文件名包含 sales 的 CSV，合并它们，加一列 source_file，然后保存成 sales_report.csv。\n\n以及一个初始工作区，包括：\n\n- 本地文件\n- 文件夹结构\n- CSV / JSON / Markdown / YAML 等输入文件\n- 可以使用的工具，比如读文件、写文件、运行脚本、移动文件\n\n### 操作\n\n论文把任务形式化为：\n\n- agent 收到用户指令；\n- agent 在工作区里执行一串工具调用；\n- 每次工具调用会改变工作区状态；\n- 最后用一个 verifier，也就是检查器，判断最终工作区是否满足要求。\n\n这里重点是：**最终答案不是一句文本，而是最终工作区状态。**\n\n比如不是看 agent 说“我完成了”，而是检查：\n\n- `output/sales_report.csv` 是否存在；\n- CSV 内容是否正确；\n- 是否真的合并了所有符合条件的文件；\n- 是否加了 `source_file` 列。\n\n### 输出\n\n得到一个清晰的任务格式：\n\n```text\n用户指令 + 初始工作区 + 可用动作 + 验证器\n```\n\n### 目的\n\n这是为了解决一个核心问题：\n\n> Claw 任务不能像普通问答一样只判断最后一句话对不对，必须判断 agent 是否真的改对了文件和工作区。\n\n### 如果不做会怎样\n\n如果不先明确这种任务格式，后面生成数据、训练模型、评测模型都会混乱，因为不知道到底该检查什么。\n\n---\n\n## 第二步：自动生成任务指令\n\n论文用两条路线生成任务：\n\n1. **Persona-driven top-down synthesis**：从用户身份和场景出发生成任务。\n2. **Skill-grounded bottom-up synthesis**：从 OpenClaw 已有技能出发组合任务。\n\n这两条路线最后会合并。\n\n---\n\n## 第二步 A：从用户场景生成任务\n\n### 输入\n\n系统拿到三类信息：\n\n1. **用户画像**  \n   比如教师、财务人员、软件工程师、运营人员、研究助理等。\n\n2. **场景类别**  \n   论文里有 9 大类、43 个子类，比如：\n   - 办公协作\n   - 信息检索\n   - 数据分析\n   - 软件开发\n   - 自动化\n   - 内容写作\n\n3. **基础操作集合**  \n   论文里有 7 类、26 种操作，比如：\n   - 读文件\n   - 写报告\n   - 搜索网页\n   - 提取数据\n   - 计算统计量\n   - 草拟消息\n   - 运行脚本\n\n### 操作\n\n系统随机组合：\n\n```text\n用户画像 + 场景类别 + 若干基础操作\n```\n\n然后让强 LLM，也就是 GPT-5，生成一个具体用户任务。\n\n例如：\n\n```text\n你是一个市场分析人员。请读取 input/survey.csv，\n统计各地区用户满意度，生成 Markdown 报告，\n并把异常低分用户单独导出成 JSON。\n```\n\n### 输出\n\n得到一批从用户需求出发的任务指令。\n\n### 目的\n\n这是为了解决：\n\n> 任务不能只像工具测试题一样机械，必须像真实用户会提出的工作请求。\n\n它保证任务有真实感和场景多样性。\n\n### 如果不做会怎样\n\n如果没有这一步，生成的任务可能只覆盖工具调用，缺少真实用户场景，训练出来的 agent 更容易只会做模板化操作。\n\n---\n\n## 第二步 B：从 OpenClaw 技能生成任务\n\n### 输入\n\n系统拿到 OpenClaw 技能库 ClawHub 里的约 30K 个原始技能。\n\n每个技能可能包含：\n\n- `SKILL.md`\n- `README.md`\n- 使用说明\n- 输入输出要求\n- 约束条件\n\n### 操作\n\n先用 MiniMax-M2.5 这类强模型给每个技能做标注：\n\n- 这个技能是干什么的；\n- 输入是什么；\n- 输出是什么；\n- 有什么限制；\n- 能不能用于任务生成。\n\n然后过滤掉不适合的技能，比如：\n\n- 需要真实账号密码；\n- 依赖不可用服务；\n- 描述不完整；\n- 无法稳定验证。\n\n论文从约 30K 技能中留下约 16K 个可用技能。\n\n之后系统选择：\n\n```text\n1 个主技能 + 最多 3 个辅助技能\n```\n\n再让 GPT-5 生成一个多步骤任务。\n\n### 输出\n\n得到一批从实际技能能力出发的任务指令。\n\n### 目的\n\n这是为了解决：\n\n> 只从用户场景生成任务，可能会产生听起来合理但工具上不一定好执行的任务。\n\n这一步让任务更贴近 OpenClaw 真实能做的操作。\n\n### 如果不做会怎样\n\n如果没有技能约束，生成任务可能看起来真实，但 agent 实际执行时工具不支持，导致训练数据质量下降。\n\n---\n\n## 第三步：为每个任务准备初始工作区资源\n\n### 输入\n\n系统拿到一个任务指令。\n\n例如任务要求：\n\n```text\n读取 input/inventory.csv 和 input/bulk_discounts.csv，\n生成 reorder_list.csv、supplier_orders.csv 和每个供应商的 JSON 文件。\n```\n\n### 操作\n\n系统分析这个任务需要哪些输入文件，包括：\n\n- 文件路径\n- 文件类型\n- 文件字段\n- 文件内容约束\n\n然后让 GPT-5 自动生成这些 mock 文件，也就是模拟文件。\n\n例如生成：\n\n```text\ninput/inventory.csv\ninput/bulk_discounts.csv\n```\n\n里面有 SKU、供应商、库存数量、补货点、单价、折扣规则等字段。\n\n### 输出\n\n得到一个完整的初始工作区。\n\n也就是：\n\n```text\n任务指令 + 任务所需输入文件 + 目录结构\n```\n\n### 目的\n\n这是为了解决：\n\n> Claw 任务必须落在具体文件和目录上，不能只有一句抽象指令。\n\n训练和评测时，agent 必须真的读文件、处理内容、写输出。\n\n### 如果不做会怎样\n\n如果没有输入文件，任务就变成空想任务；agent 只能编造结果，无法真实执行和验证。\n\n---\n\n## 第四步：为每个任务生成验证器\n\n验证器就是判断 agent 是否完成任务的程序或规则。\n\n论文用了两种验证方式：\n\n1. **Code-based verification**：代码检查。\n2. **Rubric-based verification**：评分规则检查。\n\n---\n\n## 第四步 A：生成代码检查器\n\n### 输入\n\n系统拿到：\n\n- 任务指令；\n- 初始输入文件；\n- 预期输出要求。\n\n### 操作\n\nGPT-5 生成一段可执行检查代码。\n\n检查代码会判断：\n\n- 指定输出文件是否存在；\n- JSON / CSV 格式是否正确；\n- 字段是否齐全；\n- 数值是否算对；\n- 是否符合筛选条件；\n- 输出是否和输入文件一致。\n\n例如 reorder 任务中，检查器会重新读取 `inventory.csv`，然后检查：\n\n```text\n只有 Quantity <= ReorderPoint 的行才能进入 reorder_list.csv\nOrderQty 是否算对\nLineTotal 是否算对\n供应商 JSON 文件是否完整\n```\n\n### 输出\n\n得到一个代码 verifier。\n\n### 目的\n\n这是为了解决：\n\n> 不能靠人工逐个看 agent 输出，必须自动判断大量任务是否完成。\n\n尤其是文件操作和数据计算任务，代码检查比人工看更稳定。\n\n### 如果不做会怎样\n\n如果没有代码检查器，就无法大规模筛选训练轨迹，也无法稳定评测模型。\n\n---\n\n## 第四步 B：生成评分规则检查器\n\n### 输入\n\n系统拿到：\n\n- 任务指令；\n- 输出文件；\n- 代码检查器无法覆盖的要求。\n\n### 操作\n\nGPT-5 生成一些评分标准。\n\n这些标准检查更主观的东西，比如：\n\n- 报告是否清楚；\n- 摘要是否忠实；\n- 邮件语气是否专业；\n- 内容是否完整；\n- 解释是否有帮助。\n\n论文里这个叫 rubric-based verification，也就是让 LLM 按规则打分。\n\n### 输出\n\n得到一组评分规则。\n\n### 目的\n\n这是为了解决：\n\n> 有些任务不是纯粹算数或格式检查，代码很难判断质量。\n\n比如“写一封专业通知邮件”，代码只能检查文件存在，不能判断语气和内容质量。\n\n### 如果不做会怎样\n\n如果没有这一步，很多写作、总结、沟通类任务只能检查表面文件是否存在，评价会过于宽松。\n\n---\n\n## 第四步 C：合并代码分数和规则分数\n\n### 输入\n\n系统拿到：\n\n- 代码检查分数；\n- 规则评分分数。\n\n### 操作\n\n如果只有代码检查，就直接用代码分数。\n\n如果两者都有，就按权重合并：\n\n```text\n最终分数 = 0.7 × 代码检查分数 + 0.3 × 规则评分分数\n```\n\n代码检查权重更高。\n\n### 输出\n\n得到一个 0 到 1 的任务完成分数。\n\n### 目的\n\n这是为了解决：\n\n> Claw 任务的核心还是工作区状态是否真的改对，所以代码检查应该更重要；但部分质量要求也不能完全忽略。\n\n### 如果不做会怎样\n\n如果只用代码分数，主观质量会漏掉；如果只用规则评分，评测会不稳定，也容易被表面文本骗过。\n\n---\n\n## 第五步：过滤低质量任务和低质量验证器\n\n### 输入\n\n系统拿到前面生成的大量候选任务，每个任务包含：\n\n- 指令；\n- mock 输入文件；\n- 代码检查器；\n- rubric 规则。\n\n### 操作\n\n系统做两类质量检查。\n\n---\n\n### 5.1 检查任务质量\n\n检查三点：\n\n1. **新颖性**  \n   用 embedding 相似度比较，如果和已有任务太像，就删掉。\n\n2. **合理性**  \n   用 GPT-5.4 判断任务是否清楚、现实、可执行。\n\n3. **难度**  \n   用 GPT-5.4 估计任务复杂度，避免全是太简单或太难的任务。\n\n### 输出\n\n去掉重复、离谱、太差的任务。\n\n### 目的\n\n这是为了解决：\n\n> 自动生成任务很容易产生重复任务、不现实任务、含糊任务。\n\n### 如果不做会怎样\n\n训练数据会充满重复和噪声，模型可能学到模板化行为，评测也不可靠。\n\n---\n\n### 5.2 检查验证器质量\n\n### 输入\n\n系统拿到任务和对应 verifier。\n\n### 操作\n\n系统检查代码 verifier：\n\n1. 能不能运行；\n2. 在初始工作区上会不会错误给高分；\n3. 是否覆盖核心要求；\n4. 是否过于严格，比如强制不必要格式。\n\n系统也检查 rubric：\n\n1. 是否补充代码检查不了的质量维度；\n2. 是否只是重复代码检查已经覆盖的东西。\n\n### 输出\n\n留下 verifier 比较可靠的任务。\n\n### 目的\n\n这是为了解决：\n\n> 如果 verifier 错了，后面所有训练和评测都不可信。\n\n例如，一个任务要求生成正确 CSV，但 verifier 只检查文件存在，这种任务会让错误轨迹也被当成成功。\n\n### 如果不做会怎样\n\n模型会从错误轨迹中学习；benchmark 分数也会失真。\n\n---\n\n## 第六步：形成 ClawGym-SynData\n\n### 输入\n\n经过任务生成、资源准备、验证器生成、质量过滤后的任务。\n\n### 操作\n\n系统整理这些任务，形成最终训练任务池。\n\n### 输出\n\n得到 **ClawGym-SynData**：\n\n```text\n13.5K 个可执行、带文件、带验证器的 Claw-style 任务\n```\n\n### 目的\n\n这是整篇论文训练 agent 的数据基础。\n\n### 如果不做会怎样\n\n后面无法大规模收集轨迹，也无法训练 ClawGym-Agent。\n\n---\n\n# 第七步：用强模型跑任务，收集执行轨迹\n\n这一步开始从“任务数据”变成“训练数据”。\n\n### 输入\n\n系统拿到：\n\n- ClawGym-SynData 任务；\n- 每个任务的初始工作区；\n- OpenClaw 运行环境；\n- 强模型 teacher，比如 MiniMax-M2.5 和 GLM-5.1。\n\n### 操作\n\n系统把每个任务放进一个 Docker 容器里运行。\n\n这里 Docker 容器就是一个隔离工作区，每个任务有自己的文件和环境。\n\n然后强模型作为 agent，在 OpenClaw 里执行任务：\n\n- 读文件；\n- 调用工具；\n- 跑脚本；\n- 写输出文件；\n- 根据错误反馈调整。\n\n论文强调这里是 **black-box rollout**，意思是：\n\n> 不修改 OpenClaw 内部 agent 流程，只从外面记录它的输入、输出、工具调用和观察结果。\n\n系统用代理层记录完整交互过程，包括：\n\n- 模型看到的上下文；\n- 模型输出；\n- 工具调用；\n- 工具返回；\n- 最终工作区状态。\n\n### 输出\n\n得到大量原始 agent 执行日志。\n\n### 目的\n\n这是为了解决：\n\n> 只有任务还不够，SFT 需要“模型应该怎么一步步执行”的轨迹。\n\n而且必须是真实 OpenClaw 环境里的轨迹，否则训练出来的模型可能不适应实际工具调用格式。\n\n### 如果不做会怎样\n\n只能训练模型理解任务，不能训练它如何在 OpenClaw 里多步使用工具完成任务。\n\n---\n\n## 第八步：整理和筛选执行轨迹\n\n### 输入\n\n系统拿到原始执行日志。\n\n### 操作\n\n系统做几件事：\n\n1. 把碎片日志拼成完整轨迹。\n2. 删除无关系统提示，比如 heartbeat、cron 提醒。\n3. 删除使用不支持工具的轨迹。\n4. 用任务 verifier 给每条轨迹打分。\n5. 只保留分数超过阈值的轨迹。\n\n论文发现最好的阈值是 **0.5**。\n\n最后留下：\n\n```text\n24.5K 条高质量交互轨迹\n```\n\n平均每条轨迹：\n\n- 13 轮交互；\n- 18.67K tokens；\n- 15.82 次工具调用；\n- 3.25 种工具类型。\n\n### 输出\n\n得到可以用于 SFT 的多轮训练数据。\n\nSFT，即 supervised fine-tuning，在这里就是让模型模仿高质量执行轨迹中的 agent 行为。\n\n### 目的\n\n这是为了解决：\n\n> 强模型也会失败，不能把所有轨迹都拿来训练；必须只学相对成功的执行过程。\n\n同时论文没有只保留满分轨迹，因为部分未满分轨迹也可能包含有用的恢复和操作模式。\n\n### 如果不做会怎样\n\n如果不过滤，模型会学到错误操作；如果过滤太严，数据多样性会下降。\n\n---\n\n## 第九步：用轨迹训练 ClawGym-Agents\n\n### 输入\n\n系统拿到：\n\n- 24.5K 条筛选后的轨迹；\n- Qwen3 系列模型作为底座，包括：\n  - Qwen3-4B\n  - Qwen3-8B\n  - Qwen3-30B-A3B\n\n### 操作\n\n系统对这些模型做多轮 SFT。\n\n训练时有一个重要细节：\n\n它只对模型生成的部分算 loss，不对工具返回结果算 loss。\n\n也就是说：\n\n- 模型应该学习如何思考、如何发工具调用；\n- 不应该学习去“背诵”工具返回内容。\n\n对于 Qwen3-8B，论文还用了 YaRN，把上下文长度扩到 64K。YaRN 在这里就是一种扩展长上下文的方法。\n\n### 输出\n\n得到三个训练后的 agent：\n\n```text\nClawGym-4B\nClawGym-8B\nClawGym-30B-A3B\n```\n\n### 目的\n\n这是为了解决：\n\n> 小模型原本不会稳定处理长流程、工具调用、文件反馈，通过模仿高质量轨迹提升它们的 Claw 执行能力。\n\n### 如果不做会怎样\n\n小模型会继续停留在普通聊天或普通指令跟随能力上，无法可靠完成工作区任务。\n\n---\n\n## 第十步：进一步尝试 RL 训练\n\n### 输入\n\n系统拿到：\n\n- 训练任务；\n- 可隔离运行的任务沙箱；\n- 模型初始版本，比如 Qwen3-4B 或 ClawGym-30B-A3B；\n- 代码 verifier 给出的最终分数。\n\n这里 RL 指 reinforcement learning，也就是让模型自己试做任务，根据最终得分更新策略。\n\n论文用的是 GRPO，一种不需要单独训练 reward model 的 RL 方法。\n\n### 操作\n\n系统为每个任务建立独立沙箱，让多个任务并行运行。\n\n每次模型执行完任务后，用代码 verifier 给奖励。\n\n训练设置包括：\n\n- 2,000 个任务；\n- 每个 prompt 采样 8 条 rollout；\n- 训练 100 步；\n- 最大响应长度 64K。\n\n### 输出\n\n得到 RL 后的模型。\n\n论文图 3 显示：\n\n- 从 Qwen3-4B 起步，RL 后 ClawGym-Bench 代码验证分数提升到约 35.7%；\n- 从 ClawGym-30B-A3B 起步，RL 后提升到约 56.7%。\n\n### 目的\n\n这是为了解决：\n\n> SFT 只能模仿已有轨迹，RL 可以让模型直接根据最终任务完成分数继续改进。\n\n### 如果不做会怎样\n\n模型仍然能通过 SFT 获得明显提升，但无法利用 verifier 的最终奖励进一步优化。\n\n---\n\n# 第十一步：构建 ClawGym-Bench 评测集\n\n训练数据之外，论文还要做一个可靠 benchmark。\n\n### 输入\n\n系统拿到生成任务池里没有用于训练的候选任务。\n\n### 操作\n\n它不是随便抽 200 个，而是严格筛选。\n\n---\n\n## 11.1 难度过滤\n\n### 输入\n\n候选任务。\n\n### 操作\n\n对每个任务：\n\n- 用强 agent 跑 4 次；\n- 用小 agent 跑 4 次；\n- 比较平均分。\n\n保留满足条件的任务：\n\n1. 强 agent 能做得比较好；\n2. 小 agent 不能太容易做对；\n3. 强 agent 明显强于小 agent。\n\n### 输出\n\n留下既可解、又有区分度的任务。\n\n### 目的\n\n这是为了解决：\n\n> benchmark 不能太简单，也不能强模型都做不了。\n\n### 如果不做会怎样\n\n评测集可能充满无意义任务：要么所有模型都满分，要么所有模型都失败。\n\n---\n\n## 11.2 LLM 辅助人工审核\n\n### 输入\n\n难度过滤后的任务，包括：\n\n- 指令；\n- 输入文件；\n- checker；\n- rubric。\n\n### 操作\n\nGPT-5.4 先检查任务问题：\n\n- 指令是否清楚；\n- 文件是否支持任务；\n- checker 是否可运行；\n- checker 是否太松或太严；\n- rubric 是否重复代码检查。\n\n然后人工审核者做最终决定：\n\n- 接受；\n- 修改；\n- 删除。\n\n### 输出\n\n得到最终 benchmark。\n\n### 目的\n\n这是为了解决：\n\n> 自动生成的 benchmark 如果不人工把关，很容易存在隐藏错误。\n\n### 如果不做会怎样\n\n评测分数可能反映的是任务或 checker 的 bug，而不是模型能力。\n\n---\n\n## 11.3 最终 benchmark 组成\n\n### 输出\n\n最终得到 **ClawGym-Bench**：\n\n```text\n200 个任务\n```\n\n分为 6 类：\n\n| 类别 | 任务数 |\n|---|---:|\n| Productivity and Collaboration | 44 |\n| Systems and Automation | 42 |\n| Analysis and Reasoning | 35 |\n| Content and Domain Support | 28 |\n| Planning and Knowledge | 26 |\n| Software Development | 25 |\n\n其中：\n\n- 156 个任务只用代码检查；\n- 44 个任务使用代码检查 + rubric 检查。\n\n### 目的\n\n这是为了提供一个稳定、可复现、有区分度的 Claw agent 评测集。\n\n### 如果不做会怎样\n\n论文只能说模型在自己训练任务上变好了，无法证明它真的具备更通用的 Claw 执行能力。\n\n---\n\n# 主实验结果说明\n\n## 1. SFT 明显提升小模型\n\n论文最关键的结果在 Table 6。\n\n### Qwen3-8B\n\n| 模型 | PinchBench | ClawGym-Bench |\n|---|---:|---:|\n| Qwen3-8B | 54.50 | 35.02 |\n| ClawGym-8B | 75.70 | 50.24 |\n\n提升：\n\n- PinchBench：+38.90%\n- ClawGym-Bench：+43.46%\n\n### Qwen3-30B-A3B\n\n| 模型 | PinchBench | ClawGym-Bench |\n|---|---:|---:|\n| Qwen3-30B-A3B | 55.60 | 45.11 |\n| ClawGym-30B-A3B | 86.00 | 56.82 |\n\n提升：\n\n- PinchBench：+54.68%\n- ClawGym-Bench：+25.96%\n\n这说明：\n\n> 这些合成任务和执行轨迹确实让模型学到了更强的 Claw 工具执行能力。\n\n---\n\n## 2. ClawGym-30B-A3B 甚至超过更大的 Qwen3-235B-A23B\n\n在 ClawGym-Bench 上：\n\n| 模型 | 分数 |\n|---|---:|\n| Qwen3-235B-A23B | 54.48 |\n| ClawGym-30B-A3B | 56.82 |\n\n这说明：\n\n> 针对 Claw 任务的训练数据，比单纯增大模型规模更有效。\n\n---\n\n## 3. ClawGym-Bench 有区分度\n\n不同模型分数差距明显：\n\n- Qwen3-8B：35.02\n- Qwen3-30B-A3B：45.11\n- ClawGym-30B-A3B：56.82\n- GPT-5.4：73.49\n- Claude-4.7-Opus：77.81\n\n这说明 benchmark 不是只会给大家差不多的分数，而是能区分模型能力。\n\n---\n\n# 结合消融实验解释为什么有效\n\n论文主要做了三组分析：\n\n1. 任务生成策略消融；\n2. 训练轮数分析；\n3. 轨迹筛选阈值分析。\n\n---\n\n## 1. 哪个组件贡献最大？\n\n从整体结果看，贡献最大的是：\n\n> **用 ClawGym-SynData 收集高质量轨迹，然后做 SFT。**\n\n证据是：\n\n### Qwen3-8B → ClawGym-8B\n\n| Benchmark | 原始模型 | 训练后 | 提升 |\n|---|---:|---:|---:|\n| PinchBench | 54.50 | 75.70 | +21.20 |\n| ClawGym-Bench | 35.02 | 50.24 | +15.22 |\n\n### Qwen3-30B-A3B → ClawGym-30B-A3B\n\n| Benchmark | 原始模型 | 训练后 | 提升 |\n|---|---:|---:|---:|\n| PinchBench | 55.60 | 86.00 | +30.40 |\n| ClawGym-Bench | 45.11 | 56.82 | +11.71 |\n\n这比内部小组件之间的差距大很多。\n\n所以最大贡献不是某个小技巧，而是：\n\n```text\n合成可执行任务 → 收集成功轨迹 → 过滤 → SFT\n```\n\n这一整条数据训练链路。\n\n---\n\n## 2. 两种任务生成方式是否都有用？\n\n论文 Table 7 比较了三种训练数据来源：\n\n1. 只用 persona-driven；\n2. 只用 skill-grounded；\n3. 两者混合。\n\n### Qwen3-8B\n\n| 训练数据 | ClawGym-Bench | PinchBench |\n|---|---:|---:|\n| Only Persona-driven | 49.44 | 73.51 |\n| Only Skill-grounded | 49.06 | 68.23 |\n| Mixed Synthesis | 50.24 | 75.68 |\n\n### Qwen3-30B-A3B\n\n| 训练数据 | ClawGym-Bench | PinchBench |\n|---|---:|---:|\n| Only Persona-driven | 53.65 | 84.92 |\n| Only Skill-grounded | 52.27 | 80.05 |\n| Mixed Synthesis | 56.82 | 86.00 |\n\n结论很清楚：\n\n> 混合任务生成最好。\n\n尤其是 Qwen3-30B-A3B 上：\n\n- ClawGym-Bench：56.82，比 persona-only 高 3.17，比 skill-only 高 4.55；\n- PinchBench：86.00，比 persona-only 高 1.08，比 skill-only 高 5.95。\n\n这说明两条路线有互补性：\n\n- persona-driven 提供真实用户场景；\n- skill-grounded 提供工具能力约束；\n- 混合后模型既知道用户想要什么，也更知道工具怎么做。\n\n---\n\n## 3. 哪个组件可有可无？\n\n严格说，论文没有证明哪个核心组件完全可有可无。\n\n但有一个现象：\n\n在 Qwen3-8B 的 ClawGym-Bench 上：\n\n| 训练数据 | 分数 |\n|---|---:|\n| Only Persona-driven | 49.44 |\n| Only Skill-grounded | 49.06 |\n| Mixed | 50.24 |\n\n这里只用一种生成策略也能接近混合策略。\n\n这说明：\n\n> 对 ClawGym-Bench 这种相对同源的评测，只用 persona-driven 或 skill-grounded 也能学到不少能力。\n\n但在 PinchBench 上，差距变大：\n\n| 训练数据 | Qwen3-8B PinchBench |\n|---|---:|\n| Only Skill-grounded | 68.23 |\n| Mixed | 75.68 |\n\n这说明：\n\n> 单一路线不是完全没用，但泛化能力不如混合路线。\n\n所以不能说某个组件可有可无，只能说：\n\n- 在部分同源评测上，单一路线也能工作；\n- 但要获得更好的跨 benchmark 泛化，混合更可靠。\n\n---\n\n## 4. 轨迹筛选阈值为什么重要？\n\n论文测试了不同 verifier 分数阈值，从 0.4 到 0.9。\n\n结果显示：\n\n> 阈值 0.5 最好。\n\n原因很直接：\n\n- 阈值太低，比如 0.4，会保留太多没完成任务的轨迹，训练信号变脏。\n- 阈值太高，比如 0.8 或 0.9，会删掉很多有价值的轨迹，数据多样性下降。\n\n论文的解释是：\n\n有些轨迹虽然不是满分，但包含有用行为，比如：\n\n- 从错误中恢复；\n- 部分完成复杂任务；\n- 尝试合理的工具链；\n- 根据反馈调整。\n\n如果只保留高分轨迹，这些行为会被删掉。\n\n所以 0.5 是一个平衡点。\n\n### 对应前面步骤的目的\n\n这直接支持第八步的动机：\n\n> 轨迹筛选不能只追求满分，也不能无脑保留全部；需要在正确性和多样性之间折中。\n\n---\n\n## 5. 训练轮数为什么重要？\n\n论文训练 5 个 epoch，每 60 步评测一次。\n\n结果显示：\n\n> 第 3 个 epoch，也就是 step 309 左右效果最好，之后略微下降。\n\n这说明：\n\n- 训练太少，模型还没充分学到工具执行模式；\n- 训练太多，会对合成数据分布过拟合。\n\n### 对应前面步骤的目的\n\n这支持第九步的一个隐含问题：\n\n> 合成数据确实有用，但不能无限训练；训练规模需要控制。\n\n---\n\n## 6. 各组件之间是否有协同效应？\n\n有，最明显的是：\n\n> persona-driven 和 skill-grounded 混合后效果超过任意单独使用。\n\n以 Qwen3-30B-A3B 为例：\n\n| 数据来源 | ClawGym-Bench | PinchBench |\n|---|---:|---:|\n| Only Persona-driven | 53.65 | 84.92 |\n| Only Skill-grounded | 52.27 | 80.05 |\n| Mixed | 56.82 | 86.00 |\n\n这说明两者不是简单重复。\n\n它们解决的是不同问题：\n\n- persona-driven 解决“任务像真实用户需求”的问题；\n- skill-grounded 解决“任务能落到实际工具操作”的问题；\n- 混合后同时覆盖这两个问题。\n\n---\n\n## 7. 回扣 Introduction：论文声称的痛点分别由什么设计解决？\n\n| Introduction 里的痛点 | 对应设计 | 实验是否支持 |\n|---|---|---|\n| 缺少大规模 Claw 训练数据 | ClawGym-SynData，13.5K 任务 | 支持。SFT 后 Qwen3-8B 和 30A3 大幅提升 |\n| 任务需要真实工作区文件 | Resource Preparation 自动生成 mock 文件 | 间接支持。模型在文件处理类任务上明显提升 |\n| 任务完成难验证 | Code verifier + rubric verifier | 支持。能筛选 24.5K 高质量轨迹，并构造 benchmark |\n| 只从用户场景或只从技能出发都不够 | 双路线任务生成 | 支持。Mixed Synthesis 优于单一路线 |\n| 需要可靠 benchmark | ClawGym-Bench 难度过滤 + 人工审核 | 支持。不同模型分数有明显区分，重复评测标准差 ≤ 1% |\n| 小模型不会多步工具执行 | 黑盒 rollout + SFT | 支持。ClawGym-8B 从 35.02 提升到 50.24 |\n\n---\n\n# 行为分析：强 agent 到底强在哪里？\n\n论文给了三个案例，说明强模型和弱模型差别不只是“会不会调用工具”。\n\n---\n\n## 1. 工具使用是否形成完整流程\n\n任务：读取多个 CI artifact JSON，生成审计报告。\n\nGPT-5.4 的做法：\n\n1. 展开文件路径；\n2. 检查 JSON 结构；\n3. 写 Python 聚合脚本；\n4. 生成两个报告；\n5. 打印关键统计量确认。\n\n得分：1.000。\n\n30A3 的问题：\n\n- 一开始通配符读取失败；\n- 虽然后来用 `find` 恢复了；\n- 但后续统计、过滤、critical 计数都没完全做对。\n\n得分：0.308。\n\n结论：\n\n> 工具调用本身不够，agent 必须把文件探索、数据计算、输出验证连成稳定流程。\n\n---\n\n## 2. 长流程中能否从错误恢复\n\n任务：处理 support-ticket JSONL，生成改写、统计、通知和幂等状态文件。\n\nGPT-5.4 的做法：\n\n- 发现 `MEMORY.md` 不存在后，没有卡住；\n- 继续读 inbox；\n- 写处理脚本；\n- 遇到命令被拒绝后换方案；\n- 重置状态文件；\n- 重新运行；\n- 检查重复运行不会重复处理。\n\n得分：1.000。\n\n30A3 的问题：\n\n- 多次遇到文件缺失；\n- 进入 approval dead-end；\n- 没有完成主要输出文件。\n\n得分：0.067。\n\n结论：\n\n> 长任务里，错误不可避免，关键是能不能把错误转化成下一步行动，而不是不断堆积失败。\n\n---\n\n## 3. 是否遵守细粒度条件\n\n任务：从库存 CSV 生成补货计划，只能包含：\n\n```text\nQuantity <= ReorderPoint\n```\n\n的行。\n\nGPT-5.4：\n\n- 正确过滤；\n- 正确计算；\n- 正确生成供应商 JSON。\n\n得分：1.000。\n\n30A3：\n\n- 文件都生成了；\n- 看起来结构合理；\n- 但包含了 Quantity 大于 ReorderPoint 的行；\n- 错误继续传播到供应商汇总和 JSON 文件。\n\n得分：0.429。\n\n结论：\n\n> Claw 任务里，文件存在不等于任务完成；细小条件错了，后续所有派生输出都会错。\n\n---\n\n# 这套方法的硬伤在哪里？\n\n论文没有单独写一个明确的 Limitation 部分，但从正文和实验可以看出几个边界。\n\n---\n\n## 硬伤 1：任务、文件和 verifier 都高度依赖强 LLM 生成\n\nClawGym 的很多关键步骤都靠 GPT-5 / GPT-5.4：\n\n- 生成任务；\n- 生成 mock 文件；\n- 生成代码检查器；\n- 生成 rubric；\n- 判断任务合理性；\n- 审核 verifier；\n- 做 rubric 打分。\n\n这带来一个问题：\n\n> 如果生成器或审核模型本身出错，整个数据链路会引入系统性错误。\n\n论文虽然用了自动过滤和人工审核，但训练集规模是 13.5K，不可能每个任务都人工精查。\n\n所以这套方法适合有强 LLM 支撑的数据生成流程；如果没有强模型，数据质量可能明显下降。\n\n---\n\n## 硬伤 2：评测主要看最终状态，不充分评价执行过程\n\n论文自己在任务定义里说了：\n\n它主要评估最终工作区状态。\n\n也就是说，只要最后文件对，很多中间问题可能不会被扣分，比如：\n\n- 过程是否安全；\n- 是否删除了不该删的文件；\n- 是否执行了不必要的危险命令；\n- 是否用了过多工具；\n- 是否有隐私风险；\n- 是否靠偶然方式得到结果。\n\n论文明确说，轨迹级别的安全性、效率、错误恢复评估留给未来工作。\n\n所以这套 benchmark 更擅长判断：\n\n```text\n最后东西有没有做对\n```\n\n但不够擅长判断：\n\n```text\n执行过程是不是安全、稳健、高效\n```\n\n---\n\n## 硬伤 3：合成数据仍可能和真实用户环境有差距\n\nClawGym 的 workspace 文件是自动生成的 mock 文件。\n\n优点是：\n\n- 可控；\n- 可验证；\n- 无隐私问题；\n- 可大规模生成。\n\n但缺点是：\n\n> mock 文件和真实用户电脑里的复杂文件、混乱目录、历史状态、权限问题、真实软件环境仍有差距。\n\n所以模型在 ClawGym-Bench 和 PinchBench 上变强，不等于在所有真实个人电脑环境里都稳定可靠。\n\n---\n\n# 最后总结\n\n这篇论文的核心逻辑很清楚：\n\n1. 先自动造大量真实感较强、能执行、能验证的工作区任务；\n2. 给每个任务配文件和检查器；\n3. 用强模型在 OpenClaw 里真实执行这些任务；\n4. 用 verifier 过滤出较好的执行轨迹；\n5. 用这些轨迹 SFT 小模型；\n6. 再从任务池中严格筛出 benchmark；\n7. 实验证明小模型在 Claw 类任务上明显变强。\n\n最重要的结论是：\n\n> 对 Claw-style agent 来说，关键不是再写一个 prompt，也不是只换更大的模型，而是构建一条“任务生成—文件环境—自动验证—轨迹收集—训练—评测”的完整数据闭环。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **小模型经过 Claw-style SFT 后可以超过大得多的模型。** ClawGym-30A3B 在 ClawGym-Bench 上达到 56.82，超过 Qwen3-235A23B 的 54.48；ClawGym-4B 在 PinchBench 上达到 76.40，也显著超过 Qwen3-235A23B 的 60.60，说明 agent-specific 数据有时比纯模型规模更关键。\n\n- **模型规模在 Claw-style 任务上并不严格单调。** Qwen3-32B 在 ClawGym-Bench 平均分为 40.32，低于 Qwen3-30A3B 的 45.11；在 PinchBench 上 Qwen3-32B 仅 49.40，甚至低于 Qwen3-8B 的 54.50，说明更大的通用 LLM 未必更擅长 workspace-grounded execution。\n\n- **frontier model 的强项高度分化，并不存在一个模型全面统治所有 Claw 能力。** Claude-4.7-Opus 在 ClawGym-Bench 总分最高 77.81，但 GPT-5.4 在 Productivity & Collaboration 类别最高，Gemini-3-Flash 在 Software Dev 类别最高 84.04，表明不同 agent 能力维度之间并不完全共线。\n\n- **Skill-grounded 数据看似更贴近工具执行，但单独使用并不最优。** 在 Qwen3-30A3B 上，Only Skill-grounded 的 ClawGym-Bench 分数为 52.27，低于 Only Persona-driven 的 53.65，更低于 Mixed Synthesis 的 56.82；说明仅有 executable skill grounding 不足以覆盖真实用户意图多样性。\n\n- **一个很简单的 reward threshold filtering 反而非常有效。** 作者没有使用复杂的 trajectory ranking 或 reward modeling，而是用 verifier score 阈值过滤轨迹；实验显示阈值 0.5 在 ClawGym-Bench 和 PinchBench 上都最好。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **Persona-driven 与 Skill-grounded 的混合带来互补增益。** Table 7 显示 Mixed Synthesis 在 Qwen3-8B 和 Qwen3-30A3B 上均优于单一路径；作者解释为 persona-driven 提供真实场景覆盖，skill-grounded 提供操作边界与工具可执行性。\n\n- **训练步数存在明显最优点，继续训练会轻微退化。** Figure 4 中模型在第 3 个 epoch、step 309 左右达到峰值，之后 ClawGym-Bench 和 PinchBench 都出现下降，说明 synthesized agent trajectory 也会过拟合，不能简单“多训就好”。\n\n- **trajectory 质量和多样性之间存在非线性 trade-off。** Figure 5 显示阈值过低会引入未完成任务的噪声，阈值过高又会丢失包含恢复策略、部分解决路径的有价值行为；0.5 是最佳平衡点。\n\n- **行为分析揭示：tool use 的关键不是“会调用工具”，而是“能组织成可靠 workflow”。** Figure 6 中弱模型虽然能从 wildcard read error 中恢复并读到文件，但没有形成 discovery-inspection-computation-verification pipeline，最终 reward 只有 0.308，而 GPT-5.4 得到 1.000。\n\n- **长程任务的核心能力是 error recovery 与 closure，而不是零错误执行。** Figure 7 中 GPT-5.4 也遇到 ENOENT 和 preflight refused，但能绕开失败动作、重置 state、rerun 并验证 idempotency；30A3 则陷入 approval dead-end，reward 仅 0.067。\n\n- **细粒度规则错误会在 workspace artifacts 中级联传播。** Figure 8 中 30A3 创建了看似完整的 CSV 和 JSON，但违反 Quantity <= ReorderPoint 过滤规则，导致 supplier totals 和 per-supplier JSON 全部继承错误，reward 只有 0.429。\n\n---\n\n## 3. 对领域的新认知\n\n- **Claw-style agent 评估的核心对象应是 final workspace state，而不是 final text response。** 论文在任务定义中明确指出，主要输出是修改后的文件、目录、报告、脚本等持久化状态；自然语言回复只是 optional。\n\n- **Claw-style 任务不同于传统 reasoning 或 SWE/Browse benchmark，因为它们包含 opaque system interface 与 persistent workspace dependency。** 作者强调 agent 需要处理模糊指令、未知 workspace 状态、tool execution error、跨 session 依赖，这使其不能被简单归类为静态推理或标准 agent-loop benchmark。\n\n- **agent 能力不能只看最终是否调用了正确工具，还要看工具调用是否服务于可验证的中间计算链。** 行为案例表明，弱模型常能“做一些相关操作”，但缺少 schema inspection、intermediate validation、rerun verification 等闭环步骤。\n\n- **Claw 任务中的“完成度”天然是连续的，而非二值成功/失败。** 作者使用 hybrid verifier 产生 [0,1] 连续分数，并指出传统 best-of-N binary filtering 不直接适用，这提示 agent training/evaluation 需要处理 partial credit。\n\n- **benchmark 的可靠性不仅取决于题目质量，也取决于 verifier 是否既不过宽也不过严。** 作者专门检查 checker 在初始 workspace 上是否给非零分，并用 LLM 审查 requirement coverage 与 over-strictness，说明 verifier design 是 Claw benchmark 的核心瓶颈之一。\n\n---\n\n## 4. 实用的经验性结论\n\n- **SFT 训练时应 mask 掉 environment feedback / tool observations 的 loss。** 作者只对 model-generated reasoning、decision making、tool-call generation 计算监督损失，避免模型学习模仿 Docker 执行输出。\n\n- **Claw-style trajectory 需要较长上下文，64K 是更安全的设置。** 过滤后的轨迹平均 13.00 轮、18.67K tokens、15.82 次 tool calls；作者对 Qwen3-8B 使用 YaRN 将 context 从 32K 扩到 64K。\n\n- **trajectory filtering 的经验阈值可从 verifier score ≥ 0.5 开始。** Figure 5 显示 0.5 在两个 benchmark 上最优，低于该值噪声大，高于该值损失行为多样性。\n\n- **SFT 不宜盲目多 epoch，作者的最佳点约为 3 epochs。** Figure 4 中第 3 个 epoch 后性能开始下降，可作为类似 synthesized agent trajectory 训练的 early stopping 参考。\n\n- **收集 black-box rollout 时需要清理 session 维护噪声。** 作者在 trajectory aggregation 中移除了 cron / heartbeat messages，因为这些系统提示维持 session 但不直接服务任务解决。\n\n- **应过滤包含不可用工具的轨迹，避免把基础设施失败当成模型行为学习。** 作者移除了 canvas-related operations 等远程 rollout 环境不支持的工具调用，以减少训练噪声。\n\n- **检查 code verifier 是否过宽的一个简单办法：在 initial workspace 上运行 checker。** 如果 agent 还没执行任务时 checker 已给 non-trivial score，说明 verifier 可能奖励表面条件或无法区分完成状态。\n\n- **hybrid verification 中 code-based signal 可以给更高权重。** 作者将 code verifier 权重设为 0.7、rubric 权重设为 0.3，理由是 Claw 任务最可靠的证据通常是具体 workspace change。\n\n- **Claw benchmark 不一定需要大量 repeated runs 才能比较模型。** Table 5 中 Qwen3-8B 与 Qwen3-30B-A3B 在 5 次重复评测中的标准差分别只有 0.3% 和 1.0%，说明在固定 harness、workspace 和 verifier 下稳定性较好。\n\n- **轻量 RL 可以先用 outcome-only code verifier reward，而不必上复杂 reward model。** 作者用 sandbox-parallel rollouts + GRPO，在 Qwen3-4B 和 ClawGym-30B-A3B 两个起点上都观察到提升；使用的配置包括 lr 1e-6、batch size 8、每 prompt 8 rollouts、100 steps、temperature 0.7、max response 64K。\n\n---\n\n## 5. 局限性中的机会\n\n- **当前主要评估 final-state correctness，trajectory-level safety、efficiency、robustness 仍未系统验证。** 作者明确将 action safety、efficiency、error recovery 的细粒度评估留给未来工作，这为过程级 verifier 或 execution trace evaluation 留出空间。\n\n- **最优 reward threshold 仍是经验选择。** 作者承认 0.5 阈值是当前 pipeline 下的 empirical design choice，未来可以研究更原则化的 continuous verifier score selection 或 trajectory weighting。\n\n- **rubric-based 与 code-based verifier 的互补性仍依赖审查。** 作者需要 LLM + human review 来判断 rubric 是否重复 code-checkable requirement，说明自动生成高质量 hybrid verifier 仍是开放问题。\n\n- **执行可行性仍是 synthesized task 的薄弱项。** 人工抽样中 Execution Feasibility 平均分为 3.50，低于 Task Reasonableness 4.46 和 Resource Consistency 4.36，暗示未来可改进 environment assumption modeling 与 resource generation。\n\n- **当前 RL 主要依赖 code verifier，尚未充分处理 qualitative rubric reward。** Figure 3 的 RL 曲线明确说明只用 code-based verifier、weight 1.0，不含 rubric judgment；未来可探索 hybrid reward、LLM judge reward 或 process reward。\n\n- **细粒度约束传播错误提示需要更强 intermediate supervision。** Figure 8 中一个 filtering rule 错误会污染多个下游 artifact，作者据此指出未来需要对 intermediate decisions、artifact contents、cross-file consistency 提供更细监督。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文针对的是 OpenClaw 这类个人电脑 agent：读写本地文件、运行脚本、整理目录、生成报告、修改配置等真实工作流。  \n- 它不只提出 benchmark，而是构建了完整闭环：**13.5K ClawGym-SynData 任务、24.5K 条筛选轨迹、200 个 ClawGym-Bench 评测任务、ClawGym-Agents 训练模型**。  \n- 实验显示该闭环能显著提升模型：Qwen3-8B 在 ClawGym-Bench 从 35.02 提升到 50.24；Qwen3-30B-A3B 从 45.11 提升到 56.82。  \n- ClawGym-30B-A3B 在 ClawGym-Bench 上达到 56.82，超过更大的 Qwen3-235B-A23B 的 54.48，说明这类 agent-specific 数据可能改变“只靠扩大模型”的实践路径。\n\n**负面证据或缺失**：  \n- 工作区和文件主要是 mock 合成的，与真实用户电脑中的混乱目录、权限问题、历史状态、隐私约束仍有差距。  \n- 评测主要看 final workspace state，对执行过程中的安全性、效率、隐私风险、危险命令等没有系统评价。  \n- 资源“soon released”，输入材料没有显示社区实际采用情况。\n\n**判断**：强\n\n**理由**：  \n这项工作如果可靠释放，确实可能改变 Claw-style agent 的训练和评测方式：研究者不再只做 prompt 或静态 benchmark，而是围绕“可执行任务—工作区—verifier—轨迹—SFT/RL”构建数据闭环。具体证据是 13.5K 任务、24.5K 轨迹和显著模型提升，尤其是 ClawGym-30B-A3B 超过更大 Qwen3-235B-A23B，说明其影响不是单纯工程堆量。主要折扣来自合成工作区与真实环境之间仍有外推风险。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 它不是单独做 benchmark，也不是单独训练 agent，而是把任务合成、mock workspace、代码/rubric verifier、黑盒 rollout、轨迹过滤、SFT、RL、benchmark 构建连成完整系统。  \n- 任务生成采用两条互补路径：persona-driven top-down synthesis 和 skill-grounded bottom-up synthesis，并用实验显示混合优于单一路径。  \n- Claw-style 任务强调本地文件状态和 persistent workspace changes，这与 AIME、SWE-Bench、BrowseComp 等输入材料中提到的传统 benchmark 有明确差别。\n\n**负面证据或缺失**：  \n- 多个关键技术元素并非全新：LLM 合成任务、自动 verifier、轨迹 SFT、GRPO/RL、Docker sandbox、benchmark filtering 都已有相似思路。  \n- 输入材料也承认已有工作探索过 personal agent training、online learning、dedicated benchmarks，只是规模和 Claw-style 数据不足。  \n- 论文的增量更像是系统集成和规模化，而不是提出一个别人短期内难以想到的新算法。\n\n**判断**：中等\n\n**理由**：  \nClawGym 的组合方式在 Claw-style personal agent 场景下是有辨识度的，尤其是将 workspace-grounded task synthesis 与 verifier-based trajectory training 打通。但它的核心部件多数是已有范式的组合，若这篇论文不存在，其他做 agent benchmark/data 的团队很可能也会在数月到一年内走向类似方向。因此不可替代性不弱，但还不足以评为强。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- 输入材料明确指出 autonomous agent frameworks 正在把 AI 从聊天界面推向真实电脑环境，agent 需要管理本地文件、调用工具、执行多步工作流。  \n- 现有 LLM 即使较强也难以稳定完成 OpenClaw 日常任务，小模型尤其容易在多步指令、工具选择、错误恢复中失败。  \n- OpenClaw/ClawHub 已经存在约 30K 技能，为 skill-grounded synthesis 提供了现实基础；同时 GPT-5/GPT-5.4、MiniMax-M2.5、GLM-5.1 等强模型可作为任务生成器和 teacher。  \n- 当前领域缺少 workspace-grounded、可验证、大规模 Claw-style 数据，正好形成供需缺口。\n\n**负面证据或缺失**：  \n- 如果真实个人 agent 生态尚未大规模落地，部分任务分布可能仍处在模拟阶段。  \n- 强依赖 GPT-5/GPT-5.4 生成任务和 verifier，说明这个时间点也受制于 frontier model 能力与成本。\n\n**判断**：强\n\n**理由**：  \n这个问题现在做是比较恰当的：一方面个人电脑 agent 已经从概念进入工具执行阶段，另一方面可靠训练和评测数据明显不足。OpenClaw/ClawHub 的技能基础和强 LLM 的合成能力同时存在，使得大规模构建这类数据在现在才变得可行。它既不是过早的空想，也不是成熟领域里的补丁。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确反对只用最终文本答案评估 agent，强调 Claw-style 任务成功取决于 final workspace state。  \n- 它指出 AIME 这类静态推理 benchmark 无法评估文件修改、工具执行和环境状态变化。  \n- 它也指出 SWE-Bench-Verified、BrowseComp 等传统 agentic benchmarks 的 agent loop 更结构化、更可观察，而 Claw-style agent 面对的是更 opaque 的本地工作区、模糊指令、工具错误和跨 session 依赖。  \n- 验证器设计上采用 code-based + rubric-based hybrid verification，并且代码验证权重更高，体现了对“文本 judge”惯例的修正。\n\n**负面证据或缺失**：  \n- “根据最终状态评估任务完成”本身并非全新，SWE-Bench 等也有类似 final-state 或 test-based evaluation 思路。  \n- 方法上仍主要沿用合成数据、SFT、RL、自动评测这些主流 agent 训练范式，并没有从根本上重构 agent 学习方式。  \n- 对过程安全、效率、隐私等更深层 convention 的挑战仍留给未来工作。\n\n**判断**：中等\n\n**理由**：  \n论文确实在质疑“看最终文本回复”这种不适合 personal agent 的评估习惯，并用 workspace-grounded verification 做了系统替代。但它更多是把已有 final-state/test-based evaluation 思路迁移和扩展到 Claw-style 工作区任务，而不是彻底推翻现有 agent 训练范式。因此这一维度是合格且有亮点，但不算强。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 论文的主线非常明确：Claw-style agent 的核心不是回答文本，而是改变工作区状态。  \n- 整套方法围绕同一个洞见展开：任务必须有初始 workspace、可执行工具、最终 verifier；训练数据也必须来自真实 rollout，而不是静态问答。  \n- 实验也回扣这一点：细粒度文件规则错误会级联污染下游 artifact，说明“文件存在”不等于“任务完成”。\n\n**负面证据或缺失**：  \n- 论文的实现链条很长，容易让读者把贡献理解成“大规模工程 pipeline”，而不是一个简洁理论洞见。  \n- 核心洞见本身并不复杂，强度主要来自执行完整度，而不是概念上的深刻反转。\n\n**判断**：强\n\n**理由**：  \n核心洞见可以非常清楚地压缩为一句话：**“Claw agent 应按工作区最终状态训练与评测。”** 这句话直接解释了为什么需要 mock workspace、代码 verifier、黑盒 rollout、轨迹过滤和 benchmark。虽然洞见不玄妙，但它足够清晰，并且贯穿了论文所有主要设计。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术风险真实存在：自动生成任务、mock workspace 和 verifier 很容易出现不可执行、过松、过严或与资源不一致的问题。  \n- 输入材料提到人工抽样中 Execution Feasibility 平均分为 3.50，低于 Task Reasonableness 4.46 和 Resource Consistency 4.36，说明执行可行性确实是薄弱点。  \n- 论文通过多层过滤、初始 workspace 上运行 checker、LLM+人工审核、难度过滤等方式缓解这些风险。  \n- 最终结果显示该 pipeline 可行：13.5K 过滤任务、24.5K 高质量轨迹、SFT 后显著提升、RL 也有进一步收益。\n\n**负面证据或缺失**：  \n- 很多风险被强 LLM 外包：任务生成、mock 文件、代码 verifier、rubric、合理性判断、rubric 打分都依赖 GPT-5/GPT-5.4。  \n- RL 部分规模较小，主要用 2,000 个任务、100 steps，并且只使用 code-based verifier reward，没有充分处理 qualitative rubric reward。  \n- 如果 verifier 有系统性漏洞，模型可能学习“骗 checker”而不是真实完成任务；输入材料没有显示大规模 adversarial verifier audit。  \n- 最终状态评估没有覆盖过程安全和效率，降低了问题探索的完整性。\n\n**判断**：中等\n\n**理由**：  \n这个研究不是结果确定的低风险工程，因为 task/resource/verifier 的一致性、轨迹质量筛选和长程执行都存在真实失败模式；论文也用 13.5K 任务和 24.5K 轨迹证明了可行性。但其科学风险部分被强 LLM 生成器和工程过滤吸收，RL 探索也相对轻量。因此风险—可行性平衡不错，但还不足以构成特别强的科学发现。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 团队显然具备搭建完整 Claw-style pipeline 的工程能力：能处理 ClawHub 约 30K 技能，筛出约 16K 可用技能，并构建 13.5K 任务和 24.5K 轨迹。  \n- 他们能运行 OpenClaw 黑盒 rollout、Docker sandbox、轨迹记录、SFT、RL 和 benchmark 审核，说明在 agent infrastructure、数据合成和模型训练交叉点上有实践能力。  \n- 论文承诺释放资源，说明他们有能力把系统打包成社区可用资产。\n\n**负面证据或缺失**：  \n- 输入材料没有提供团队背景、与 OpenClaw/ClawHub 的关系、是否拥有独家基础设施或真实用户环境数据。  \n- 其主要依赖的强 LLM、Docker sandbox、Qwen3 模型、GRPO 等并非团队独有。  \n- 目前看不出别人难以复制的特殊数据来源；优势更多是执行规模和系统整合，而非不可复制资源。\n\n**判断**：弱\n\n**理由**：  \n材料能证明作者有很强的工程执行能力，但不能证明他们在这个交叉点上拥有独特、不可替代的比较优势。尤其是关键能力依赖公开/通用组件和强 LLM，缺少团队特有数据、平台或真实用户闭环的证据。因此这一维度只能评为弱。\n\n---\n\n# 综合评价\n\n**综合评价：值得深入关注。**\n\nClawGym 选择的问题很及时，也有实际影响力：personal computer agents 正在进入真实文件和工具环境，而当前训练与评测资源确实不足。论文的价值不在某个单点算法，而在把“任务生成—工作区资源—自动验证—真实 rollout—轨迹过滤—SFT/RL—benchmark”连成了可运行闭环，并用 13.5K 任务、24.5K 轨迹和显著模型提升支撑了这一点。它的短板也明显：任务、资源和 verifier 高度依赖强 LLM，合成工作区与真实用户环境之间仍有外推差距，过程安全和效率评估不足。但整体看，这不是平庸 benchmark，而是一个可能影响 Claw-style agent 研究流程的系统性工作。\n\n---\n\n# 最致命的弱点\n\n**最大问题是数据与评测可信度高度依赖自动生成的 verifier 和 mock workspace。**\n\n如果 verifier 过松、过严或漏掉关键要求，训练轨迹筛选、RL reward 和 benchmark 分数都会被系统性污染。论文虽然做了过滤、初始 workspace 检查和人工审核，但训练集规模达到 13.5K，不可能逐项深审；而且 mock workspace 与真实用户电脑环境仍有明显差距。\n\n---\n\n# 如果要做得更好\n\n1. **加强 verifier 可信度验证。**  \n   可以加入 adversarial agent、人工抽样复核、cross-verifier consistency、故意错误输出测试等，系统评估 checker 是否会被表面文件、格式投机或部分完成骗过。\n\n2. **补充过程级评估。**  \n   除 final workspace state 外，应增加 safety、efficiency、unnecessary destructive action、privacy leakage、error recovery quality 等 trace-level 指标，否则个人 agent 的真实可用性仍无法充分衡量。\n\n---\n\n# 与 Carlini 原则的对照\n\n**最符合的 Carlini 原则**：它符合“做会改变别人工作方式的问题”这一类原则；如果 ClawGym 的数据和 benchmark 可复现释放，研究者可能会从静态问答/简单 agent loop 转向 workspace-grounded training and evaluation。\n\n**最不符合的 Carlini 原则**：它不太符合“用最小、最清晰的实验揭示一个深层机制”的原则；论文更像大型系统工程闭环，核心结论依赖复杂 pipeline，较难把改进归因到单一科学机制。",

butors alphabetically ordered\"\n    },\n    {\n      \"marker\": \"†\",\n      \"text\": \"Corresponding Author\"\n    }\n  ]\n}",
                    "summary_translation": "Claw-style environments（Claw 风格环境）支持围绕本地文件、tools（工具）以及持久化 workspace states（工作空间状态）开展 multi-step workflows（多步骤工作流）。然而，围绕此类环境进行 scalable development（可扩展开发）仍受到缺乏 systematic framework（系统性框架）的限制，尤其缺少一种能够合成 verifiable training data（可验证训练数据）并将其与 agent training（智能体训练）和 diagnostic evaluation（诊断性评估）相整合的框架。为应对这一挑战，我们提出 ClawGym，这是一个 scalable framework（可扩展框架），支持 Claw-style personal agent development（Claw 风格个人智能体开发）的完整生命周期。\n\n具体而言，我们构建了 ClawGym-SynData，这是一个包含 13.5K 个经过筛选任务的多样化 dataset（数据集）。这些任务由 persona-driven intents（角色驱动意图）和 skill-grounded operations（基于技能的操作）合成，并配套 realistic mock workspaces（真实感模拟工作空间）与 hybrid verification mechanisms（混合验证机制）。随后，我们通过对 black-box rollout trajectories（黑箱 rollout 轨迹）进行 supervised fine-tuning（监督微调），训练了一系列能力较强的 Claw-style models（Claw 风格模型），称为 ClawGym-Agents；此外，我们进一步探索了 reinforcement learning（强化学习），采用 lightweight pipeline（轻量级流水线）在 per-task sandboxes（按任务划分的沙箱）中并行化 rollouts（轨迹生成）。\n\n为支持可靠评估，我们进一步构建了 ClawGym-Bench，这是一个包含 200 个实例的 benchmark（基准测试集），并通过 automated filtering（自动化筛选）以及 human-LLM review（人工与大语言模型联合审查）进行校准。相关资源将很快发布于：https://github.com/ClawGym。"

                    "summary": "Operating and maintaining (O&M) large-scale online engine systems (search, recommendation, advertising) demands substantial human effort for release monitoring, alert response, and root cause analysis. While LLM-based agents are a natural fit for these tasks, the deployment bottleneck is not reasoning capability but orchestration: selecting, for each operational event, the relevant data (metrics, logs, change events) and the applicable operational knowledge (handbook rules and practitioner experience). Feeding all signals indiscriminately causes dilution and hallucination, while manually curating the event-to-(data, knowledge) mapping is intractable under dozens of daily releases. We present Bian Que, an agentic framework with three contributions: (i) a \\emph{unified operational paradigm} abstracting day-to-day O&M into three canonical patterns: release interception, proactive inspection, and alert root cause analysis; (ii) \\emph{Flexible Skill Arrangement}, where each Skill specifies which data and knowledge to retrieve for a given business-module context and can be automatically generated and updated by LLMs or iteratively refined through natural-language instructions from on-call engineers; (iii) a \\emph{unified self-evolving mechanism} in which one correction signal drives two parallel pathways, case-memory-to-knowledge distillation and targeted Skill refinement. Deployed on the e-commerce search engine of KuaiShou, the major short-video platform in China, Bian Que reduces alert volume by 75%, achieves 80% root-cause analysis accuracy, and cuts mean time to resolution by over 50%. Our framework achieves 99.0% pass rate on offline evaluations. Our code is available at https://github.com/benchen4395/BianQue_Assistant.",
                    "category": "cs.AI",
                    "cluster": "Agent Development Frameworks",
