u6027\uff08ground-truth-preserving\uff09** \u7684\u8bb0\u5fc6\u7cfb\u7edf\u67b6\u6784\uff0c\u65e8\u5728\u51cf\u5c11\u4f20\u7edfRAG\u4e2d\u57fa\u4e8eLLM\u7684\u3001\u6709\u635f\u7684\u4fe1\u606f\u63d0\u53d6\u3002\u5b83\u901a\u8fc7**\u4e0a\u4e0b\u6587\u68c0\u7d22**\u6269\u5c55\u6838\u5fc3\u5339\u914d\u8303\u56f4\uff0c\u5728\u9700\u8981\u8de8\u591a\u8f6e\u5bf9\u8bdd\u7684\u8bc1\u636e\u53ec\u56de\u4efb\u52a1\u4e2d\u8868\u73b0\u4f18\u5f02\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e86\u8f93\u5165\u4ee4\u724c\u6d88\u8017\u3002(2604.04853 [cs.AI])\n*   **Springdrift** \u5219\u4ece\u4e00\u4e2a\u5b8c\u6574\u7684**\u6301\u4e45\u5316\u8fd0\u884c\u65f6**\u89c6\u89d2\u51fa\u53d1\uff0c\u96c6\u6210\u4e86\u53ef\u5ba1\u8ba1\u6267\u884c\u3001\u57fa\u4e8e\u6848\u4f8b\u7684\u6df7\u5408\u68c0\u7d22\u8bb0\u5fc6\u5c42\u3001\u786e\u5b9a\u6027\u5b89\u5168\u89c4\u8303\u8ba1\u7b97\u548c\u8fde\u7eed\u7684\u73af\u5883\u81ea\u6211\u611f\u77e5\u3002\u5b83\u88ab\u5b9a\u4e49\u4e3a **\u201c\u4eba\u5de5\u968f\u4ece\uff08Artificial Retainer\uff09\u201d** \uff0c\u5f3a\u8c03\u5728\u7279\u5b9a\u9886\u57df\u5185\uff0c\u4e3a\u7279\u5b9a\u4e3b\u4f53\u63d0\u4f9b\u5177\u6709\u6301\u7eed\u6027\u3001\u81ea\u4e3b\u6027\u548c\u53ef\u8ffd\u6eaf\u95ee\u8d23\u7684\u670d\u52a1\u3002(2604.04660 [cs.AI])\n*   **Memory Intelligence Agent (MIA)** \u91c7\u7528 **Manager-Planner-Executor** \u4e09\u5c42\u67b6\u6784\uff0c\u521b\u65b0\u6027\u5730\u5efa\u7acb\u4e86**\u53c2\u6570\u5316\u4e0e\u975e\u53c2\u6570\u5316\u8bb0\u5fc6\u4e4b\u95f4\u7684\u53cc\u5411\u8f6c\u6362\u5faa\u73af**\uff0c\u5b9e\u73b0\u4e86\u8bb0\u5fc6\u5728\u63a8\u7406\u8fc7\u7a0b\u4e2d\u7684\u52a8\u6001\u3001\u9ad8\u6548\u6f14\u5316\uff0c\u652f\u6301\u667a\u80fd\u4f53\u7684\u6301\u7eed\u81ea\u6211\u8fdb\u5316\u3002(2604.04503 [cs.AI])\n*   **SuperLocalMemory V3.3** \u5927\u80c6\u501f\u9274\u751f\u7269\u5b66\u539f\u7406\uff0c\u5f15\u5165\u4e86**\u8d39\u5e0c\u5c14-\u62c9\u5965\u91cf\u5316\u611f\u77e5\u8ddd\u79bb\uff08FRQAD\uff09** \u548c**\u827e\u5bbe\u6d69\u65af\u81ea\u9002\u5e94\u9057\u5fd8**\u7b49\u673a\u5236\uff0c\u5e76\u5b9e\u73b0\u4e86**7\u901a\u9053\u8ba4\u77e5\u68c0\u7d22**\u3002\u5176\u6838\u5fc3\u76ee\u6807\u662f\u6784\u5efa\u4e00\u4e2a\u5b8c\u5168\u672c\u5730\u5316\u3001\u65e0\u9700\u4e91LLM\u7684\u3001\u5177\u5907\u5b8c\u6574\u8ba4\u77e5\u751f\u547d\u5468\u671f\u7684\u8bb0\u5fc6\u7cfb\u7edf\u3002(2604.04514 [cs.CL])\n\n---\n\n### \u6388\u4e4b\u4ee5\u6e14\uff1a\u667a\u80fd\u4f53\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u8bfe\u7a0b\u5b66\u4e60\n\n\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u6446\u8131\u5bf9\u6d77\u91cf\u4eba\u5de5\u6807\u6ce8\u6570\u636e\u7684\u4f9d\u8d56\uff0c\u5b9e\u73b0\u81ea\u4e3b\u5b66\u4e60\u548c\u80fd\u529b\u63d0\u5347\uff1f\u4eca\u65e5\u7684\u7814\u7a76\u5c55\u793a\u4e86\u4ece\u7b97\u6cd5\u3001\u8bfe\u7a0b\u5230\u6280\u80fd\u5e93\u6784\u5efa\u7684\u591a\u79cd\u8fdb\u5316\u8def\u5f84\u3002\n\n*   **Vocabulary Dropout** \u4e3a\u89e3\u51b3**\u534f\u540c\u8fdb\u5316\u81ea\u535a\u5f08**\u4e2d\u63d0\u8bae\u8005\uff08proposer\uff09\u5feb\u901f\u9677\u5165**\u591a\u6837\u6027\u5d29\u6e83**\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u7b80\u5355\u7684**\u8bcd\u6c47\u8868\u968f\u673a\u63a9\u7801**\u673a\u5236\u3002\u8fd9\u7c7b\u4f3c\u4e8e\u4e3a\u8bed\u8a00\u6a21\u578b\u7248\u7684\u201c\u81ea\u6211\u5bf9\u5f08\u201d\u5f15\u5165\u4e86\u6e38\u620f\u89c4\u5219\uff0c\u6709\u6548\u7ef4\u6301\u4e86\u8bfe\u7a0b\u591a\u6837\u6027\uff0c\u5e76\u6700\u7ec8\u63d0\u5347\u4e86\u6c42\u89e3\u5668\uff08solver\uff09\u7684\u6027\u80fd\u3002(2604.03472 [cs.CL])\n*   **RoboPhD** \u5728**\u56fa\u5b9a\u8bc4\u4f30\u9884\u7b97**\u4e0b\uff0c\u7cfb\u7edf\u6bd4\u8f83\u4e86Elo\u9526\u6807\u8d5b\u9009\u62e9\u3001\u5e15\u7d2f\u6258\u9009\u62e9\u4e0e\u8d2a\u5a6a\u722c\u5c71\u4e09\u79cd\u4f18\u5316\u8303\u5f0f\u3002\u5176\u63d0\u51fa\u7684**\u514d\u9a8c\u8bc1\u8fdb\u5316**\u65b9\u6cd5\uff0c\u901a\u8fc7\u8bad\u7ec3\u6570\u636e\u4e0a\u7684Elo\u7ade\u4e89\u540c\u65f6\u9a71\u52a8\u8bc4\u4f30\u4e0e\u8fdb\u5316\uff0c\u5728\u591a\u4e2a\u590d\u6742\u4efb\u52a1\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u5c55\u793a\u4e86\u81ea\u52a8\u5316\u667a\u80fd\u4f53\u8bbe\u8ba1\u7684\u6f5c\u529b\u3002(2604.04347 [cs.AI])\n*   **InferenceEvolve** \u5c06\u8fdb\u5316\u601d\u60f3\u5f15\u5165\u4e25\u8c28\u7684**\u56e0\u679c\u63a8\u65ad**\u9886\u57df\u3002\u8be5\u6846\u67b6\u5229\u7528LLM\u53d1\u73b0\u5e76\u8fed\u4ee3\u4f18\u5316\u56e0\u679c\u4f30\u8ba1\u65b9\u6cd5\uff0c\u5176\u8fdb\u5316\u51fa\u7684\u4f30\u8ba1\u5668\u5728\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u8d85\u8d8a\u4e86\u4f17\u591a\u4eba\u5de5\u8bbe\u8ba1\u7684\u57fa\u7ebf\uff0c\u5c55\u793a\u4e86AI\u9a71\u52a8\u79d1\u5b66\u53d1\u73b0\u7684\u65b0\u8303\u5f0f\u3002(2604.04274 [cs.AI])\n*   **SKILLFOUNDRY** \u81f4\u529b\u4e8e\u4ece\u5f02\u6784\u7684\u79d1\u5b66\u8d44\u6e90\uff08\u5982API\u3001\u811a\u672c\u3001\u8bba\u6587\uff09\u4e2d\u81ea\u52a8\u6316\u6398\u548c\u6784\u5efa**\u53ef\u6267\u884c\u7684\u667a\u80fd\u4f53\u6280\u80fd\u5e93**\u3002\u901a\u8fc7\u95ed\u73af\u9a8c\u8bc1\u8fc7\u7a0b\uff0c\u5b83\u80fd\u751f\u6210\u65b0\u9896\u4e14\u6709\u6548\u7684\u6280\u80fd\u5305\uff0c\u663e\u8457\u63d0\u5347\u79d1\u5b66\u667a\u80fd\u4f53\u5728\u7279\u5b9a\u9886\u57df\u4efb\u52a1\u4e0a\u7684\u8868\u73b0\uff0c\u89e3\u51b3\u4e86\u201c\u77e5\u8bc6\u4e30\u5bcc\u4f46\u6280\u80fd\u532e\u4e4f\u201d\u7684\u74f6\u9888\u3002(2604.03964 [cs.AI])\n\n---\n\n### \u624b\u811a\u5e76\u7528\uff1a\u5de5\u5177\u589e\u5f3a\u667a\u80fd\u4f53\u7684\u53ef\u9760\u89c4\u5212\u4e0e\u6267\u884c\n\n\u5f53\u667a\u80fd\u4f53\u9700\u8981\u8c03\u7528\u5de5\u5177\u4e0e\u771f\u5b9e\u4e16\u754c\u4ea4\u4e92\u65f6\uff0c\u5982\u4f55\u89c4\u5212\u3001\u5982\u4f55\u51cf\u5c11\u9519\u8bef\u3001\u5982\u4f55\u9002\u5e94\u5c0f\u6a21\u578b\u6210\u4e3a\u65b0\u7684\u6311\u6218\u3002\u4eca\u65e5\u7684\u7814\u7a76\u5728\u89c4\u5212\u6846\u67b6\u548c\u8bad\u7ec3\u65b9\u6cd5\u4e0a\u63d0\u51fa\u4e86\u65b0\u601d\u8def\u3002\n\n*   **Profile-Then-Reason (PTR)** \u6846\u67b6\u65e8\u5728\u89e3\u51b3\u53cd\u5e94\u5f0f\u6267\u884c\uff08\u5982ReAct\uff09\u7684\u5ef6\u8fdf\u548c\u9519\u8bef\u4f20\u64ad\u95ee\u9898\u3002\u5b83\u8981\u6c42\u667a\u80fd\u4f53\u5148\u5408\u6210\u4e00\u4e2a**\u663e\u5f0f\u7684\u5de5\u4f5c\u6d41**\uff0c\u7136\u540e\u7531\u786e\u5b9a\u6027\u7b97\u5b50\u6267\u884c\uff0c\u4ec5\u5728\u5fc5\u8981\u65f6\u624d\u8c03\u7528LLM\u8fdb\u884c\u4fee\u590d\uff0c\u4ece\u800c\u5728**\u6709\u754c\u4fee\u590d**\u6761\u4ef6\u4e0b\u5c06LLM\u8c03\u7528\u6b21\u6570\u9650\u5236\u57282-3\u6b21\uff0c\u5728\u68c0\u7d22\u548c\u5206\u89e3\u5bc6\u96c6\u578b\u4efb\u52a1\u4e0a\u4f18\u52bf\u660e\u663e\u3002(2604.04131 [cs.AI])\n*   **Search, Do not Guess** \u53d1\u73b0\u5c0f\u8bed\u8a00\u6a21\u578b\uff08SLM\uff09\u4f5c\u4e3a\u641c\u7d22\u667a\u80fd\u4f53\u65f6\uff0c\u5b58\u5728**\u5de5\u5177\u8c03\u7528\u9891\u7387\u4f4e\u3001\u5e7b\u89c9\u503e\u5411\u9ad8**\u7684\u95ee\u9898\u3002\u4e3a\u6b64\uff0c\u5b83\u63d0\u51fa\u4e86\u4e00\u79cd\u8f7b\u91cf\u7ea7\u5fae\u8c03\u65b9\u6cd5\uff0c\u663e\u5f0f\u8bad\u7ec3SLM\u8fdb\u884c\u53ef\u9760\u7684\u68c0\u7d22\u548c\u57fa\u4e8e\u8bc1\u636e\u7684\u7b54\u6848\u751f\u6210\uff0c\u4f7f\u5176\u5728\u590d\u6742\u63a8\u7406\u4efb\u52a1\u4e0a\u8fbe\u5230\u4e86LLM\u6c34\u5e73\u3002(2604.04651 [cs.AI])\n*   **SHARP** \u5c06\u77e5\u8bc6\u56fe\u8c31\u4e09\u5143\u7ec4\u9a8c\u8bc1\u4efb\u52a1\u91cd\u6784\u4e3a\u4e00\u4e2a**\u52a8\u6001\u7684\u6218\u7565\u89c4\u5212\u4e0e\u8bc1\u636e\u63a8\u7406**\u8fc7\u7a0b\u3002\u5b83\u7ed3\u5408\u4e86\u8bb0\u5fc6\u589e\u5f3a\u673a\u5236\u3001\u6a21\u5f0f\u611f\u77e5\u89c4\u5212\u4ee5\u53ca\u878d\u5408\u5185\u90e8\u56fe\u7ed3\u6784\u548c\u5916\u90e8\u6587\u672c\u8bc1\u636e\u7684\u6df7\u5408\u77e5\u8bc6\u5de5\u5177\u96c6\uff0c\u5728\u63d0\u5347\u51c6\u786e\u6027\u7684\u540c\u65f6\u63d0\u4f9b\u4e86\u900f\u660e\u7684\u8bc1\u636e\u94fe\u3002(2604.04190 [cs.AI])\n*   **ActionNex** \u662f\u4e00\u4e2a\u9762\u5411**\u4e91\u8fd0\u7ef4\u4e2d\u65ad\u7ba1\u7406**\u7684\u751f\u4ea7\u7ea7\u667a\u80fd\u4f53\u7cfb\u7edf\u3002\u5b83\u901a\u8fc7\u5c06\u591a\u6a21\u6001\u8fd0\u8425\u4fe1\u53f7\u538b\u7f29\u4e3a\u5173\u952e\u4e8b\u4ef6\uff0c\u5e76\u7ed3\u5408\u5206\u5c42\u8bb0\u5fc6\uff08\u957f\u671fKCA\u77e5\u8bc6\u3001\u5386\u53f2\u4e8b\u4ef6\u8bb0\u5fc6\u3001\u5de5\u4f5c\u8bb0\u5fc6\uff09\u6765\u63d0\u4f9b\u7aef\u5230\u7aef\u7684\u8f85\u52a9\uff0c\u5305\u62ec\u5b9e\u65f6\u5efa\u8bae\u548c\u6301\u7eed\u81ea\u6211\u8fdb\u5316\uff0c\u5df2\u5728\u771f\u5b9e\u573a\u666f\u4e2d\u8bd5\u70b9\u3002(2604.03512 [cs.AI])\n*   **Toward Full Autonomous Laboratory Instrumentation Control** \u901a\u8fc7\u6848\u4f8b\u7814\u7a76\u5c55\u793a\u4e86LLM\u53ca\u57fa\u4e8eLLM\u7684\u667a\u80fd\u4f53\u5728**\u964d\u4f4e\u5b9e\u9a8c\u5ba4\u4eea\u5668\u81ea\u52a8\u5316\u7f16\u7a0b\u95e8\u69db**\u4e43\u81f3\u5b9e\u73b0\u81ea\u4e3b\u63a7\u5236\u65b9\u9762\u7684\u53d8\u9769\u6f5c\u529b\uff0c\u4e3a\u79d1\u5b66\u5b9e\u9a8c\u7684\u6c11\u4e3b\u5316\u548c\u52a0\u901f\u63d0\u4f9b\u4e86\u8def\u5f84\u3002(2604.03286 [cs.AI])\n\n---\n\n### \u793e\u4f1a\u6027\u840c\u82bd\uff1a\u591a\u667a\u80fd\u4f53\u4ea4\u4e92\u4e0e\u5fc3\u667a\u7406\u8bba\u7684\u6d8c\u73b0\n\n\u667a\u80fd\u4f53\u4e4b\u95f4\u5982\u4f55\u7406\u89e3\u5f7c\u6b64\uff1f\u5408\u4f5c\u4e0e\u535a\u5f08\u4e2d\u4f1a\u6d8c\u73b0\u51fa\u4f55\u79cd\u590d\u6742\u884c\u4e3a\uff1f\u4eca\u65e5\u7684\u7814\u7a76\u5f00\u59cb\u6df1\u5165\u63a2\u7d22\u8fd9\u4e00\u524d\u6cbf\u3002\n\n*   **Readable Minds** \u901a\u8fc7\u4e00\u4e2a\u7cbe\u5de7\u7684\u5fb7\u5dde\u6251\u514b\u5b9e\u9a8c\u53d1\u73b0\uff0c**\u6301\u4e45\u6027\u8bb0\u5fc6**\u662fLLM\u667a\u80fd\u4f53\u5728\u52a8\u6001\u4ea4\u4e92\u4e2d\u6d8c\u73b0\u51fa**\u5fc3\u667a\u7406\u8bba\uff08ToM\uff09** \u7c7b\u4f3c\u884c\u4e3a\u7684**\u5fc5\u8981\u4e14\u5145\u5206\u6761\u4ef6**\u3002\u62e5\u6709\u8bb0\u5fc6\u7684\u667a\u80fd\u4f53\u80fd\u53d1\u5c55\u51fa\u5bf9\u5bf9\u624b\u7684\u9012\u5f52\u5fc3\u7406\u6a21\u578b\uff0c\u5e76\u5b9e\u65bd\u57fa\u4e8e\u6b64\u7684\u6218\u7565\u6b3a\u9a97\uff0c\u5176\u884c\u4e3a\u6a21\u5f0f\u4e0e\u4eba\u7c7b\u4e13\u5bb6\u76f8\u4f3c\uff0c\u4e14\u6240\u6709\u5fc3\u7406\u6a21\u578b\u90fd\u4ee5\u81ea\u7136\u8bed\u8a00\u8868\u8fbe\uff0c\u5177\u6709\u53ef\u8bfb\u6027\u3002(2604.04157 [cs.AI])\n*   **Scaling Teams or Scaling Time?** \u63d0\u51fa\u4e86\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684**\u4e8c\u7ef4\u6269\u5c55**\u6982\u5ff5\uff1a\u589e\u52a0\u56e2\u961f\u89c4\u6a21 vs. \u901a\u8fc7\u8bb0\u5fc6\u5b9e\u73b0\u7ec8\u8eab\u5b66\u4e60\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u6269\u5c55\u683c\u5c40\u5e76\u975e\u5355\u8c03\u7684\u2014\u2014**\u66f4\u5927\u7684\u56e2\u961f\u5e76\u4e0d\u603b\u662f\u66f4\u597d**\uff0c\u5f53\u8bb0\u5fc6\u80fd\u66f4\u597d\u5730\u652f\u6301\u7ecf\u9a8c\u590d\u7528\u65f6\uff0c\u8f83\u5c0f\u7684\u56e2\u961f\u53ef\u80fd\u8868\u73b0\u66f4\u4f18\uff0c\u8fd9\u4e3a\u9ad8\u6548\u6269\u5c55\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\u3002(2604.03295 [cs.AI])\n\n---\n\n### \u57fa\u51c6\u3001\u6548\u7387\u4e0e\u4ee3\u7801\u751f\u6210\n\n*   **ClawArena** \u63a8\u51fa\u4e86\u4e00\u4e2a\u7528\u4e8e\u8bc4\u4f30\u667a\u80fd\u4f53\u5728**\u52a8\u6001\u6f14\u5316\u4fe1\u606f\u73af\u5883**\u4e2d\u8868\u73b0\u7684\u57fa\u51c6\u3002\u5b83\u6a21\u62df\u4e86\u4fe1\u606f\u5206\u6563\u3001\u77db\u76fe\u3001\u66f4\u65b0\u7684\u771f\u5b9e\u6311\u6218\uff0c\u56f4\u7ed5\u591a\u6e90\u51b2\u7a81\u63a8\u7406\u3001\u52a8\u6001\u4fe1\u5ff5\u4fee\u6b63\u548c\u9690\u5f0f\u4e2a\u6027\u5316\u4e09\u4e2a\u8026\u5408\u6311\u6218\u8bbe\u8ba1\u8bc4\u4f30\uff0c\u586b\u8865\u4e86\u73b0\u6709\u57fa\u51c6\u591a\u5047\u8bbe\u9759\u6001\u3001\u5355\u4e00\u4fe1\u6e90\u7684\u7a7a\u767d\u3002(2604.04202 [cs.LG])\n*   **Decocted Experience Improves Test-Time Inference** \u63d0\u51fa\u5c06**\u4e0a\u4e0b\u6587\uff08Context\uff09** \u4f5c\u4e3a\u63d0\u5347LLM\u667a\u80fd\u4f53\u6027\u80fd\u7684\u6269\u5c55\u8f74\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u5982\u4f55\u901a\u8fc7**\u63d0\u70bc\u7ecf\u9a8c\uff08Decocted Experience\uff09** \u6765\u6784\u5efa\u66f4\u597d\u7684\u8f93\u5165\u4ee5\u5f15\u5bfc\u63a8\u7406\uff0c\u4e3a\u5728\u63a8\u7406\u65f6\u5229\u7528\u5386\u53f2\u7ecf\u9a8c\u63d0\u4f9b\u4e86\u7406\u8bba\u5206\u6790\u548c\u5b9e\u8df5\u9a8c\u8bc1\u3002(2604.04373 [cs.LG])\n*   **Persistent Cross-Attempt State Optimization** \u9488\u5bf9\u4ed3\u5e93\u7ea7\u4ee3\u7801\u751f\u6210\u4e2d\u540c\u4e00\u4efb\u52a1\u9700\u591a\u6b21\u5c1d\u8bd5\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86 **LiveCoder** \u6846\u67b6\u3002\u5b83\u901a\u8fc7\u7ef4\u62a4\u8de8\u5c1d\u8bd5\u7684**\u6301\u4e45\u6027\u4efb\u52a1\u72b6\u6001**\uff08\u6210\u529f\u77e5\u8bc6\u3001\u5931\u8d25\u77e5\u8bc6\u3001\u5386\u53f2\u6700\u4f73\u4ed3\u5e93\uff09\uff0c\u5c06\u91cd\u590d\u751f\u6210\u8f6c\u53d8\u4e3a\u6301\u7eed\u7684\u3001\u77e5\u8bc6\u9a71\u52a8\u7684\u4f18\u5316\u8fc7\u7a0b\uff0c\u663e\u8457\u63d0\u5347\u4e86\u6210\u529f\u7387\u548c\u6548\u7387\u3002(2604.03632 [cs.AI])\n\n---\n\n### \u4eca\u65e5\u770b\u70b9\n\n*   **\u8bb0\u5fc6\u7cfb\u7edf\u8bbe\u8ba1\u8fce\u6765\u201c\u5c0f\u6d6a\u6f6e\u201d**\uff1a\u4eca\u65e5\u5171\u67095\u7bc7\u9ad8\u8d28\u91cf\u8bba\u6587\u805a\u7126\u667a\u80fd\u4f53\u8bb0\u5fc6\uff0c\u4ece\u4fdd\u6301\u771f\u5b9e\u6027\u7684\u67b6\u6784\uff08MemMachine\uff09\u3001\u5b8c\u6574\u8fd0\u884c\u65f6\uff08Springdrift\uff09\u3001\u52a8\u6001\u6f14\u5316\u5faa\u73af\uff08MIA\uff09\u5230\u751f\u7269\u542f\u53d1\u5f0f\u672c\u5730\u7cfb\u7edf\uff08SuperLocalMemory\uff09\uff0c\u5448\u73b0\u51fa\u767e\u82b1\u9f50\u653e\u7684\u6001\u52bf\u3002\u8fd9\u6807\u5fd7\u7740\u7814\u7a76\u91cd\u70b9\u6b63\u4ece\u201c\u8ba9\u667a\u80fd\u4f53\u56de\u7b54\u95ee\u9898\u201d\u8f6c\u5411\u201c\u8ba9\u667a\u80fd\u4f53\u62e5\u6709\u8fde\u8d2f\u7684\u4eba\u751f\u201d\u3002\n*   **\u201c\u5fc3\u667a\u7406\u8bba\u201d\u5728\u535a\u5f08\u4e2d\u81ea\u7136\u6d8c\u73b0**\uff1a\u300aReadable Minds\u300b\u7684\u7814\u7a76\u5177\u6709\u98a0\u8986\u6027\u542f\u793a\uff1a\u65e0\u9700\u4e13\u95e8\u8bad\u7ec3\u6216\u63d0\u793a\uff0c\u4ec5\u901a\u8fc7\u8d4b\u4e88**\u6301\u4e45\u8bb0\u5fc6**\u5e76\u5728\u52a8\u6001\u535a\u5f08\uff08\u6251\u514b\uff09\u4e2d\u4ea4\u4e92\uff0cLLM\u667a\u80fd\u4f53\u5c31\u80fd\u81ea\u53d1\u53d1\u5c55\u51fa\u590d\u6742\u7684\u5bf9\u624b\u5fc3\u7406\u5efa\u6a21\u548c\u6218\u7565\u6b3a\u9a97\u80fd\u529b\u3002\u8fd9\u4e0d\u4ec5\u6311\u6218\u4e86\u201cLLM\u4e0d\u5177\u5907\u771f\u6b63ToM\u201d\u7684\u9759\u6001\u6d4b\u8bd5\u7ed3\u8bba\uff0c\u4e5f\u4e3a\u7406\u89e3AI\u793e\u4f1a\u667a\u80fd\u7684\u6d8c\u73b0\u6253\u5f00\u4e86\u65b0\u7a97\u53e3\u3002\n*   **\u8fdb\u5316\u7b97\u6cd5\u6210\u4e3a\u667a\u80fd\u4f53\u201c\u5143\u8bbe\u8ba1\u5e08\u201d**\uff1a\u65e0\u8bba\u662f\u4f18\u5316\u667a\u80fd\u4f53\u672c\u8eab\uff08RoboPhD\uff09\uff0c\u8fd8\u662f\u4f18\u5316\u79d1\u5b66\u65b9\u6cd5\uff08InferenceEvolve\uff09\uff0c\u6216\u662f\u4ece\u6570\u636e\u4e2d\u6316\u6398\u6280\u80fd\uff08SKILLFoundry\uff09\uff0c**\u57fa\u4e8eLLM\u7684\u8fdb\u5316\u6846\u67b6**\u90fd\u5c55\u73b0\u51fa\u5f3a\u5927\u6f5c\u529b\u3002\u8fd9\u9884\u793a\u7740\u672a\u6765\u6211\u4eec\u53ef\u80fd\u8d8a\u6765\u8d8a\u591a\u5730\u4f7f\u7528\u201c\u8bbe\u8ba1\u667a\u80fd\u4f53\u7684\u667a\u80fd\u4f53\u201d\u6765\u5e94\u5bf9\u590d\u6742\u3001\u5f00\u653e\u7684\u4efb\u52a1\u3002\n*   **\u201c\u89c4\u5212\u4f18\u5148\u201d\u6846\u67b6\u6311\u6218\u53cd\u5e94\u5f0f\u6267\u884c\u4e3b\u6d41**\uff1a\u300aProfile-Then-Reason\u300b\u63d0\u51fa\u7684**\u6709\u754c\u6267\u884c\u6846\u67b6**\uff0c\u662f\u5bf9\u5f53\u524d\u4e3b\u6d41ReAct\u5f0f\u201c\u8fb9\u60f3\u8fb9\u505a\u201d\u6a21\u5f0f\u7684\u4e00\u6b21\u6709\u529b\u53cd\u601d\u3002\u5b83\u8bc1\u660e\uff0c\u5728\u8bb8\u591a\u4efb\u52a1\u4e2d\uff0c\u5148\u5236\u5b9a\u4e00\u4e2a\u53ef\u9a8c\u8bc1\u7684\u786e\u5b9a\u6027\u8ba1\u5212\uff0c\u80fd\u66f4\u53ef\u9760\u3001\u66f4\u9ad8\u6548\u5730\u8fbe\u6210\u76ee\u6807\uff0c\u8fd9\u4e3a\u6784\u5efa\u9ad8\u53ef\u9760\u6027\u7684\u751f\u4ea7\u7ea7\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002",
    "2026-04-03": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-03)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u6e05\u6670\u5730\u6307\u5411\u4e86\u667a\u80fd\u4f53\uff08Agent\uff09\u80fd\u529b\u7684\u6df1\u5ea6\u8fdb\u5316\u3002\u4ece\u8bad\u7ec3\u8303\u5f0f\u7684\u9769\u65b0\u5230\u67b6\u6784\u8bbe\u8ba1\u7684\u7a81\u7834\uff0c\u518d\u5230\u591a\u667a\u80fd\u4f53\u793e\u4f1a\u7684\u6d8c\u73b0\u884c\u4e3a\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u81f4\u529b\u4e8e\u89e3\u51b3\u667a\u80fd\u4f53\u5728\u590d\u6742\u3001\u957f\u89c6\u91ce\u4efb\u52a1\u4e2d\u9762\u4e34\u7684\u6838\u5fc3\u74f6\u9888\uff1a\u5982\u4f55\u66f4\u9ad8\u6548\u3001\u66f4\u7a33\u5b9a\u5730\u5b66\u4e60\uff0c\u5982\u4f55\u66f4\u53ef\u9760\u5730\u8bb0\u5fc6\u4e0e\u51b3\u7b56\uff0c\u4ee5\u53ca\u5982\u4f55\u5728\u5927\u89c4\u6a21\u534f\u4f5c\u4e2d\u4fdd\u6301\u6548\u80fd\u3002\u6574\u4f53\u8d8b\u52bf\u8868\u660e\uff0cAI\u7814\u7a76\u6b63\u4ece\u5355\u4e00\u6a21\u578b\u7684\u80fd\u529b\u63d0\u5347\uff0c\u8f6c\u5411\u6784\u5efa\u66f4\u5b8c\u6574\u3001\u66f4\u81ea\u6cbb\u3001\u66f4\u53ef\u6269\u5c55\u7684\u667a\u80fd\u7cfb\u7edf\u3002\n\n---\n\n### \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n#### \u5f3a\u5316\u5b66\u4e60\u65b0\u8303\u5f0f\uff1a\u4ece\u5956\u52b1\u8bbe\u8ba1\u5230\u8bad\u7ec3\u67b6\u6784\n\u4eca\u65e5\u591a\u7bc7\u8bba\u6587\u805a\u7126\u4e8e\u6539\u8fdb\u667a\u80fd\u4f53\u7684\u8bad\u7ec3\u65b9\u6cd5\uff0c\u6838\u5fc3\u5728\u4e8e\u89e3\u51b3\u7a00\u758f\u5956\u52b1\u3001\u4fe1\u7528\u5206\u914d\u7b49\u7ecf\u5178\u96be\u9898\uff0c\u5e76\u63a2\u7d22\u81ea\u84b8\u998f\u3001\u5185\u90e8\u5956\u52b1\u7b49\u65b0\u601d\u8def\u3002\n\n*   **RLSD\uff1a\u7ed3\u5408\u81ea\u84b8\u998f\u4e0eRLVR\uff0c\u5b9e\u73b0\u7a33\u5b9a\u9ad8\u6548\u7684\u7b56\u7565\u4f18\u5316**\n    *   \u672c\u6587\u6307\u51fa\uff0c\u5728\u5927\u578b\u8bed\u8a00\u6a21\u578b\uff08LLM\uff09\u8bad\u7ec3\u4e2d\uff0c\u7eaf\u7cb9\u7684**\u81ea\u84b8\u998f**\u4f1a\u5bfc\u81f4\u4fe1\u606f\u6cc4\u6f0f\u548c\u8bad\u7ec3\u4e0d\u7a33\u5b9a\u3002\u4e3a\u6b64\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86 **RLSD** \u65b9\u6cd5\uff0c\u5de7\u5999\u5730\u5c06\u81ea\u84b8\u998f\uff08\u7528\u4e8e\u63d0\u4f9b\u7ec6\u7c92\u5ea6\u7684\u66f4\u65b0\u5e45\u5ea6\uff09\u4e0e**\u57fa\u4e8e\u53ef\u9a8c\u8bc1\u5956\u52b1\u7684\u5f3a\u5316\u5b66\u4e60\uff08RLVR\uff09**\uff08\u7528\u4e8e\u63d0\u4f9b\u53ef\u9760\u7684\u66f4\u65b0\u65b9\u5411\uff09\u76f8\u7ed3\u5408\u3002\u8fd9\u79cd\u65b9\u6cd5\u5728\u4fdd\u6301\u8bad\u7ec3\u7a33\u5b9a\u7684\u540c\u65f6\uff0c\u8fbe\u5230\u4e86\u66f4\u9ad8\u7684\u6027\u80fd\u4e0a\u9650\u3002(2604.03128 [cs.CL])\n*   **Self-Guide\uff1a\u8ba9\u667a\u80fd\u4f53\u4e3a\u81ea\u5df1\u751f\u6210\u5185\u90e8\u5956\u52b1\uff0c\u5b9e\u73b0\u7b56\u7565\u4e0e\u5956\u52b1\u7684\u5171\u8fdb\u5316**\n    *   \u7814\u7a76\u63d0\u51fa **Self-Guide** \u6846\u67b6\uff0c\u8ba9\u8bed\u8a00\u667a\u80fd\u4f53\u80fd\u591f\u751f\u6210**\u5185\u90e8\u5956\u52b1**\u4fe1\u53f7\u3002\u8be5\u4fe1\u53f7\u5728\u63a8\u7406\u65f6\u7528\u4e8e\u6307\u5bfc\u4e0b\u4e00\u6b65\u884c\u52a8\uff0c\u5728\u8bad\u7ec3\u65f6\u5219\u8f6c\u5316\u4e3a\u6b65\u7ea7\u5956\u52b1\u4ee5\u4f18\u5316\u7b56\u7565\u3002\u8fd9\u5f62\u6210\u4e86\u4e00\u4e2a\u7b56\u7565\u4e0e\u5185\u90e8\u5956\u52b1\u76f8\u4e92\u4fc3\u8fdb\u7684**\u5171\u8fdb\u5316\u5faa\u73af**\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u663e\u8457\u63d0\u5347\u4e86\u6027\u80fd\u3002(2604.03098 [cs.CL])\n*   **GrandCode\uff1a\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u7cfb\u7edf\uff0c\u9996\u6b21\u5728\u5b9e\u65f6\u7f16\u7a0b\u7ade\u8d5b\u4e2d\u5168\u9762\u8d85\u8d8a\u4eba\u7c7b**\n    *   \u672c\u6587\u4ecb\u7ecd\u4e86 **GrandCode**\uff0c\u4e00\u4e2a\u4e3a\u7ade\u6280\u7f16\u7a0b\u8bbe\u8ba1\u7684**\u591a\u667a\u80fd\u4f53RL\u7cfb\u7edf**\u3002\u5176\u6838\u5fc3\u5728\u4e8e\u534f\u8c03\u591a\u4e2a\u529f\u80fd\u6a21\u5757\uff08\u5982\u5047\u8bbe\u63d0\u51fa\u3001\u6c42\u89e3\u3001\u6d4b\u8bd5\u751f\u6210\uff09\uff0c\u5e76\u901a\u8fc7\u4e13\u95e8\u8bbe\u8ba1\u7684 **Agentic GRPO** \u7b97\u6cd5\u8fdb\u884c\u8054\u5408\u4f18\u5316\u3002\u8be5\u7cfb\u7edf\u5728\u6700\u8fd1\u7684\u4e09\u573aCodeforces\u5b9e\u65f6\u7ade\u8d5b\u4e2d\u5747\u83b7\u5f97\u7b2c\u4e00\u540d\uff0c\u6807\u5fd7\u7740AI\u5728\u6700\u9876\u5c16\u7684\u7f16\u7a0b\u4efb\u52a1\u4e0a\u5df2\u8d85\u8d8a\u6700\u5f3a\u4eba\u7c7b\u9009\u624b\u3002(2604.02721 [cs.AI])\n*   **\u591a\u8f6e\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u5f3a\u5316\u5b66\u4e60\uff1a\u901a\u8fc7\u8fed\u4ee3\u5956\u52b1\u6821\u51c6\u89e3\u51b3\u5956\u52b1\u9519\u4f4d\u95ee\u9898**\n    *   \u9488\u5bf9\u591a\u8f6e\u5bf9\u8bdd\u4e2d\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u8bad\u7ec3\u6311\u6218\uff0c\u672c\u7814\u7a76\u5e94\u7528\u4e86 **MT-GRPO** \u4e0e **GTPO** \u7b97\u6cd5\u3002\u5173\u952e\u53d1\u73b0\u662f\uff0c\u7b80\u5355\u8bbe\u8ba1\u7684\u5bc6\u96c6\u6bcf\u8f6e\u5956\u52b1\u4f1a\u56e0**\u5956\u52b1\u5224\u522b\u529b\u4e0e\u4f18\u52bf\u65b9\u5411\u9519\u4f4d**\u800c\u635f\u5bb3\u6027\u80fd\u3002\u4f5c\u8005\u63d0\u51fa\u7684**\u8fed\u4ee3\u5956\u52b1\u6821\u51c6**\u65b9\u6cd5\u89e3\u51b3\u4e86\u8fd9\u4e00\u95ee\u9898\uff0c\u4f7f\u5f97\u5c0f\u6a21\u578b\uff084B\uff09\u5728\u5ba2\u670d\u57fa\u51c6\u4e0a\u7684\u8868\u73b0\u8d85\u8fc7\u4e86GPT-4\u7b49\u5927\u6a21\u578b\u3002(2604.02869 [cs.AI])\n\n#### \u667a\u80fd\u4f53\u201c\u5927\u8111\u201d\u5347\u7ea7\uff1a\u67b6\u6784\u521b\u65b0\u5982\u4f55\u7834\u89e3\u957f\u89c6\u91ce\u96be\u9898\n\u5982\u4f55\u4e3a\u667a\u80fd\u4f53\u8bbe\u8ba1\u66f4\u5f3a\u5927\u7684\u8bb0\u5fc6\u4e0e\u51b3\u7b56\u67b6\u6784\uff0c\u4ee5\u5e94\u5bf9\u590d\u6742\u73af\u5883\u4e2d\u7684\u6f02\u79fb\u548c\u9519\u8bef\uff0c\u662f\u4eca\u65e5\u7684\u53e6\u4e00\u6761\u4e3b\u7ebf\u3002\n\n*   **SCRAT\uff1a\u4ece\u677e\u9f20\u751f\u6001\u5b66\u542f\u53d1\u7684\u667a\u80fd\u4f53\u67b6\u6784\u2014\u2014\u8026\u5408\u63a7\u5236\u3001\u8bb0\u5fc6\u4e0e\u53ef\u9a8c\u8bc1\u884c\u52a8**\n    *   \u53d7\u677e\u9f20\u5728\u8fd0\u52a8\u3001\u50a8\u98df\u7b49\u884c\u4e3a\u4e2d**\u8026\u5408\u63a7\u5236\u3001\u8bb0\u5fc6\u4e0e\u9a8c\u8bc1**\u7684\u542f\u53d1\uff0c\u672c\u6587\u63d0\u51fa\u4e86\u4e00\u4e2a\u6982\u5ff5\u6027\u6846\u67b6\u3002\u5b83\u5047\u8bbe\u5c06\u5feb\u901f\u5c40\u90e8\u53cd\u9988\u3001\u9762\u5411\u672a\u6765\u63a7\u5236\u7684\u7ed3\u6784\u5316\u8bb0\u5fc6\u4ee5\u53ca\u5185\u7f6e\u4e8e\u884c\u52a8\u5faa\u73af\u7684\u9a8c\u8bc1\u5668\u76f8\u7ed3\u5408\uff0c\u80fd\u63d0\u5347\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u3001\u5ef6\u8fdf\u53cd\u9988\u73af\u5883\u4e0b\u7684**\u9c81\u68d2\u6027**\u548c**\u53ef\u9760\u6027**\u3002\u8fd9\u4e3a\u667a\u80fd\u4f53\u67b6\u6784\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u4e00\u4e2a\u65b0\u9896\u7684**\u6bd4\u8f83\u751f\u7269\u5b66\u89c6\u89d2**\u548c\u53ef\u8bc1\u4f2a\u7684\u7814\u7a76\u8bae\u7a0b\u3002(2604.03201 [cs.AI])\n*   **\u795e\u7ecf-\u7b26\u53f7\u53cc\u8bb0\u5fc6\u6846\u67b6\uff1a\u89e3\u8026\u8bed\u4e49\u8fdb\u5c55\u4e0e\u903b\u8f91\u53ef\u884c\u6027\uff0c\u6839\u6cbb\u957f\u4efb\u52a1\u987d\u75be**\n    *   \u7814\u7a76\u6307\u51fa\uff0c\u667a\u80fd\u4f53\u5728\u957f\u89c6\u91ce\u4efb\u52a1\u4e2d\u7684\u5931\u8d25\u53ef\u5f52\u56e0\u4e8e**\u5168\u5c40\u8fdb\u5c55\u6f02\u79fb**\u548c**\u5c40\u90e8\u53ef\u884c\u6027\u8fdd\u53cd**\u8fd9\u4e24\u4e2a\u672c\u8d28\u4e0d\u540c\u7684\u95ee\u9898\u3002\u4e3a\u6b64\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86\u4e00\u4e2a**\u795e\u7ecf-\u7b26\u53f7\u53cc\u8bb0\u5fc6\u6846\u67b6**\uff0c\u660e\u786e\u89e3\u8026\u4e24\u8005\uff1a**\u795e\u7ecf\u8fdb\u5c55\u8bb0\u5fc6**\u63d0\u4f9b\u8bed\u4e49\u84dd\u56fe\uff0c**\u7b26\u53f7\u53ef\u884c\u6027\u8bb0\u5fc6**\u6267\u884c\u4e25\u683c\u7684\u903b\u8f91\u9a8c\u8bc1\u3002\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u663e\u8457\u51cf\u5c11\u4e86\u65e0\u6548\u884c\u52a8\u5e76\u7f29\u77ed\u4e86\u8f68\u8ff9\u957f\u5ea6\u3002(2604.02734 [cs.AI])\n*   **InfoSeeker\uff1a\u53ef\u6269\u5c55\u7684\u5c42\u6b21\u5316\u5e76\u884c\u6846\u67b6\uff0c\u89e3\u51b3\u5927\u89c4\u6a21\u4fe1\u606f\u641c\u7d22\u96be\u9898**\n    *   \u9762\u5bf9\u9700\u8981\u7efc\u5408\u6d77\u91cf\u5f02\u6784\u4fe1\u606f\u7684\u4efb\u52a1\uff0c\u73b0\u6709\u667a\u80fd\u4f53\u7cfb\u7edf\u5e38\u53d7\u9650\u4e8e\u4e0a\u4e0b\u6587\u9971\u548c\u548c\u9519\u8bef\u4f20\u64ad\u3002**InfoSeeker** \u6846\u67b6\u91c7\u7528**\u5c42\u6b21\u5316\u5e76\u884c**\u8bbe\u8ba1\uff0c\u5305\u542b**Host**\u3001**Manager**\u548c**Worker**\u4e09\u5c42\u3002\u901a\u8fc7\u7ba1\u7406\u5c42\u7ea7\u7684\u805a\u5408\u4e0e\u53cd\u601d\uff0c\u4ee5\u53ca\u5de5\u4f5c\u5c42\u7684\u5e76\u884c\u6267\u884c\uff0c\u8be5\u6846\u67b6\u5728\u4fdd\u8bc1\u4e25\u683c\u4e0a\u4e0b\u6587\u9694\u79bb\u9632\u6b62\u9519\u8bef\u6269\u6563\u7684\u540c\u65f6\uff0c\u5b9e\u73b0\u4e863-5\u500d\u7684\u52a0\u901f\u3002(2604.02971 [cs.AI])\n\n#### \u591a\u667a\u80fd\u4f53\u793e\u4f1a\uff1a\u4ece\u534f\u8c03\u5d29\u6e83\u5230\u6d8c\u73b0\u7cbe\u82f1\n\u5f53\u667a\u80fd\u4f53\u4ece\u72ec\u7acb\u4e2a\u4f53\u8d70\u5411\u5927\u89c4\u6a21\u534f\u4f5c\u793e\u4f1a\u65f6\uff0c\u65b0\u7684\u534f\u8c03\u3001\u4f18\u5316\u4e0e\u6f14\u5316\u89c4\u5f8b\u6210\u4e3a\u7814\u7a76\u524d\u6cbf\u3002\n\n*   **\u81ea\u4f18\u5316\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff1a\u901a\u8fc7\u667a\u80fd\u4f53\u81ea\u6211\u535a\u5f08\u63a2\u7d22\u63d0\u793a\u8bcd\u7ec4\u5408**\n    *   \u5f53\u524d\u7684\u6df1\u5ea6\u7814\u7a76\u7cfb\u7edf\u901a\u5e38\u4f9d\u8d56\u4eba\u5de5\u8bbe\u8ba1\u7684\u63d0\u793a\u8bcd\uff0c\u6539\u8fdb\u6210\u672c\u9ad8\u6602\u3002\u672c\u7814\u7a76\u63a2\u7d22\u8ba9\u591a\u667a\u80fd\u4f53\u901a\u8fc7**\u81ea\u6211\u535a\u5f08**\u6765\u63a2\u7d22\u4e0d\u540c\u7684\u63d0\u793a\u8bcd\u7ec4\u5408\uff0c\u4ece\u800c\u81ea\u52a8\u4f18\u5316\u7cfb\u7edf\u6027\u80fd\uff0c\u6700\u7ec8\u8fbe\u5230\u6216\u8d85\u8fc7\u4eba\u5de5\u7cbe\u5fc3\u8bbe\u8ba1\u7684\u63d0\u793a\u8bcd\u6548\u679c\u3002(2604.02988 [cs.AI])\n*   **Holos\uff1a\u4e3a\u201c\u667a\u80fd\u4f53\u7f51\u7edc\u201d\u8bbe\u8ba1\u7684Web\u7ea7\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u67b6\u6784**\n    *   \u968f\u7740\u667a\u80fd\u4f53\u5411\u6301\u4e45\u5316\u6570\u5b57\u5b9e\u4f53\u53d1\u5c55\uff0c\u201c**\u667a\u80fd\u4f53\u7f51\u7edc**\u201d\u751f\u6001\u6b63\u5728\u5f62\u6210\u3002\u672c\u6587\u63d0\u51fa\u4e86 **Holos**\uff0c\u4e00\u4e2a\u4e3a\u957f\u671f\u751f\u6001\u6301\u4e45\u6027\u8bbe\u8ba1\u7684**Web\u7ea7\u591a\u667a\u80fd\u4f53\u7cfb\u7edf**\u3002\u5176\u4e94\u5c42\u67b6\u6784\u5305\u542b\u7528\u4e8e\u9ad8\u6548\u751f\u6210\u667a\u80fd\u4f53\u7684**Nuwa\u5f15\u64ce**\u3001\u5e02\u573a\u9a71\u52a8\u7684**\u534f\u8c03\u5668**\u4ee5\u53ca\u5b9e\u73b0\u6fc0\u52b1\u76f8\u5bb9\u7684**\u5185\u751f\u4ef7\u503c\u5faa\u73af**\uff0c\u65e8\u5728\u4e3a\u5927\u89c4\u6a21\u81ea\u7ec4\u7ec7\u667a\u80fd\u4f53\u751f\u6001\u5960\u5b9a\u57fa\u7840\u3002(2604.02334 [cs.AI])\n*   **\u667a\u80fd\u4f53\u793e\u4f1a\u4f1a\u53d1\u5c55\u51fa\u201c\u77e5\u8bc6\u7cbe\u82f1\u201d\u5417\uff1f\u63ed\u793a\u96c6\u4f53\u8ba4\u77e5\u4e2d\u7684\u9690\u85cf\u5e42\u5f8b**\n    *   \u901a\u8fc7\u5bf9\u8d85\u8fc7150\u4e07\u6b21\u4ea4\u4e92\u7684\u5927\u89c4\u6a21\u5b9e\u8bc1\u7814\u7a76\uff0c\u672c\u6587\u9996\u6b21\u63ed\u793a\u4e86LLM\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d**\u96c6\u4f53\u8ba4\u77e5\u7684\u5b9a\u91cf\u89c4\u5f8b**\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u534f\u8c03\u9075\u5faa**\u91cd\u5c3e\u7ea7\u8054**\uff0c\u5e76\u901a\u8fc7**\u4f18\u5148\u8fde\u63a5**\u96c6\u4e2d\u5230\u5c11\u6570\u201c**\u77e5\u8bc6\u7cbe\u82f1**\u201d\u667a\u80fd\u4f53\u624b\u4e2d\uff0c\u4e14\u968f\u7740\u7cfb\u7edf\u89c4\u6a21\u6269\u5927\uff0c\u6781\u7aef\u4e8b\u4ef6\u8d8a\u53d1\u9891\u7e41\u3002\u8fd9\u4e9b\u73b0\u8c61\u6e90\u4e8e\u4e00\u4e2a**\u6574\u5408\u74f6\u9888**\u673a\u5236\u3002\u57fa\u4e8e\u6b64\u63d0\u51fa\u7684**\u8d64\u5b57\u89e6\u53d1\u6574\u5408**\u65b9\u6cd5\uff0c\u80fd\u6709\u6548\u63d0\u5347\u7cfb\u7edf\u6027\u80fd\u3002(2604.02674 [cs.AI])\n\n#### \u4e0a\u4e0b\u6587\u5b66\u4e60\uff1a\u544a\u522b\u201c\u788e\u7247\u5316\u201d\uff0c\u8d70\u5411\u201c\u7cfb\u7edf\u5316\u201d\u4f18\u5316\n\u5c06\u4e0a\u4e0b\u6587\u5b66\u4e60\u89c6\u4e3a\u4e00\u4e2a\u7cfb\u7edf\u7684\u4f18\u5316\u95ee\u9898\uff0c\u5e76\u5f15\u5165\u7ecf\u5178\u673a\u5668\u5b66\u4e60\u539f\u5219\u8fdb\u884c\u6539\u8fdb\u3002\n\n*   **\u53cd\u601d\u5f0f\u4e0a\u4e0b\u6587\u5b66\u4e60\uff1a\u4e3a\u4e0a\u4e0b\u6587\u7a7a\u95f4\u4f18\u5316\u5efa\u7acb\u7edf\u4e00\u6846\u67b6\u4e0e\u539f\u5219**\n    *   \u672c\u6587\u8ba4\u4e3a\uff0c\u5f53\u524d\u57fa\u4e8e\u4e0a\u4e0b\u6587\u5b66\u4e60\u7684\u65b9\u6cd5\uff08\u5982\u667a\u80fd\u4f53\u901a\u8fc7\u53cd\u601d\u66f4\u65b0\u5176\u4e0a\u4e0b\u6587\uff09\u662f\u96f6\u6563\u548c\u4e34\u65f6\u7684\u3002\u4f5c\u8005\u63d0\u51fa\u4e86 **\u53cd\u601d\u5f0f\u4e0a\u4e0b\u6587\u5b66\u4e60** \u7edf\u4e00\u6846\u67b6\uff0c\u5c06\u4e0a\u4e0b\u6587\u66f4\u65b0\u91cd\u65b0\u5b9a\u4e49\u4e3a\u4e00\u79cd\u4f18\u5316\u95ee\u9898\u3002\u901a\u8fc7\u7cfb\u7edf\u6027\u5730\u5f15\u5165**\u6279\u5904\u7406\u3001\u6539\u8fdb\u7684\u4fe1\u7528\u5206\u914d\u4fe1\u53f7\u3001\u8f85\u52a9\u635f\u5931\u3001\u5931\u8d25\u56de\u653e**\u7b49\u7ecf\u5178\u4f18\u5316\u539f\u8bed\uff0c\u8be5\u6846\u67b6\u663e\u8457\u63d0\u5347\u4e86\u591a\u4e2a\u4efb\u52a1\u4e0a\u7684\u6027\u80fd\uff0c\u8868\u660e\u4e0a\u4e0b\u6587\u5b66\u4e60\u5e94\u9075\u5faa\u53ef\u8fc1\u79fb\u7684\u7cfb\u7edf\u5316\u539f\u5219\u3002(2604.03189 [cs.LG])\n\n---\n\n### \u4eca\u65e5\u770b\u70b9\n\n*   **\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u65b9\u6cd5\u8fce\u6765\u201c\u5c0f\u6d6a\u6f6e\u201d**\uff1a\u4eca\u65e5\u81f3\u5c11\u6709\u56db\u7bc7\u9ad8\u8d28\u91cf\u8bba\u6587\u4ece\u4e0d\u540c\u89d2\u5ea6\u653b\u575a\u667a\u80fd\u4f53\u8bad\u7ec3\u96be\u9898\u3002\u4ece**RLSD**\u7ed3\u5408\u4e24\u79cd\u8bad\u7ec3\u8303\u5f0f\u7684\u4f18\u52bf\uff0c\u5230**Self-Guide**\u5f00\u521b\u7b56\u7565\u4e0e\u5956\u52b1\u7684\u5171\u8fdb\u5316\uff0c\u518d\u5230**GrandCode**\u5c55\u793a\u591a\u667a\u80fd\u4f53RL\u5728\u9876\u5c16\u9886\u57df\u7684\u7a81\u7834\uff0c\u4ee5\u53ca\u9488\u5bf9\u591a\u8f6e\u4efb\u52a1\u7684**\u8fed\u4ee3\u5956\u52b1\u6821\u51c6**\uff0c\u8868\u660e\u793e\u533a\u6b63\u56f4\u7ed5\u201c\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u5b66\u5f97\u66f4\u597d\u201d\u8fdb\u884c\u5bc6\u96c6\u4e14\u6df1\u5165\u7684\u6280\u672f\u63a2\u7d22\u3002\n*   **\u7ade\u6280\u7f16\u7a0b\u201c\u5723\u676f\u201d\u88ab\u6458\u53d6\uff0c\u6807\u5fd7\u6027\u8d85\u8d8a\u8bde\u751f**\uff1a**GrandCode**\u5728\u5b9e\u65f6\u7f16\u7a0b\u7ade\u8d5b\u4e2d\u5168\u9762\u51fb\u8d25\u4eba\u7c7b\u9876\u7ea7\u9009\u624b\uff08\u5305\u62ec\u4f20\u5947\u7ea7\u5927\u5e08\uff09\uff0c\u662f\u4e00\u4e2a\u5177\u6709\u91cc\u7a0b\u7891\u610f\u4e49\u7684\u6210\u679c\u3002\u8fd9\u4e0d\u4ec5\u8bc1\u660e\u4e86**\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60**\u5728\u89e3\u51b3\u6781\u7aef\u590d\u6742\u95ee\u9898\u4e0a\u7684\u5a01\u529b\uff0c\u4e5f\u8c61\u5f81\u7740AI\u5728\u4e00\u4e2a\u957f\u671f\u88ab\u89c6\u4e3a\u4eba\u7c7b\u667a\u529b\u5821\u5792\u7684\u9886\u57df\u5b9e\u73b0\u4e86\u5386\u53f2\u6027\u8de8\u8d8a\uff0c\u5176\u5f71\u54cd\u5c06\u8fdc\u8d85\u7f16\u7a0b\u7ade\u8d5b\u672c\u8eab\u3002\n*   **\u8de8\u754c\u542f\u53d1\u4e0e\u7cfb\u7edf\u5316\u601d\u7ef4\u6210\u4e3a\u521b\u65b0\u6e90\u6cc9**\uff1a**SCRAT**\u8bba\u6587\u72ec\u6811\u4e00\u5e1c\uff0c\u4ece\u677e\u9f20\u751f\u6001\u5b66\u4e2d\u63d0\u70bc\u667a\u80fd\u4f53\u8bbe\u8ba1\u539f\u5219\uff0c\u5c55\u793a\u4e86**\u8de8\u5b66\u79d1\u7c7b\u6bd4**\u7684\u542f\u53d1\u6027\u4ef7\u503c\u3002\u53e6\u4e00\u65b9\u9762\uff0c**\u53cd\u601d\u5f0f\u4e0a\u4e0b\u6587\u5b66\u4e60**\u8bba\u6587\u5219\u4f53\u73b0\u4e86\u6df1\u523b\u7684**\u7cfb\u7edf\u5316\u601d\u7ef4**\uff0c\u8bd5\u56fe\u5c06\u770b\u4f3c\u6742\u4e71\u7684\u5b9e\u8df5\u7ecf\u9a8c\u7eb3\u5165\u7edf\u4e00\u7684\u7406\u8bba\u4e0e\u4f18\u5316\u6846\u67b6\uff0c\u4e3a\u9886\u57df\u7684\u957f\u8fdc\u53d1\u5c55\u63d0\u4f9b\u4e86\u91cd\u8981\u7684\u65b9\u6cd5\u8bba\u6307\u5bfc\u3002\n*   **\u591a\u667a\u80fd\u4f53\u793e\u4f1a\u7814\u7a76\u8fdb\u5165\u201c\u5b9a\u91cf\u79d1\u5b66\u201d\u9636\u6bb5**\uff1a\u5173\u4e8e\u667a\u80fd\u4f53\u793e\u4f1a\u6d8c\u73b0**\u201c\u77e5\u8bc6\u7cbe\u82f1\u201d**\u548c**\u5e42\u5f8b**\u7684\u7814\u7a76\uff0c\u9996\u6b21\u901a\u8fc7\u5927\u89c4\u6a21\u5b9e\u9a8c\u63ed\u793a\u4e86\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u6df1\u5c42\u7edf\u8ba1\u89c4\u5f8b\u3002\u8fd9\u6807\u5fd7\u7740\u8be5\u9886\u57df\u4ece\u5b9a\u6027\u8ba8\u8bba\u548c\u6848\u4f8b\u5c55\u793a\uff0c\u5f00\u59cb\u5411\u5efa\u7acb**\u53ef\u6d4b\u91cf\u3001\u53ef\u9884\u6d4b\u7684\u5b9a\u91cf\u79d1\u5b66**\u8fc8\u8fdb\uff0c\u4e3a\u7406\u89e3\u548c\u8bbe\u8ba1\u5927\u89c4\u6a21\u667a\u80fd\u4f53\u7cfb\u7edf\u63d0\u4f9b\u4e86\u5173\u952e\u7684\u7406\u8bba\u57fa\u7840\u3002",
    "2026-04-02": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-02)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u6e05\u6670\u5730\u6307\u5411\u4e86\u667a\u80fd\u4f53\uff08Agent\uff09\u7cfb\u7edf\u7684\u6838\u5fc3\u80fd\u529b\u6784\u5efa\u4e0e\u4f18\u5316\u3002\u8bb0\u5fc6\u7ba1\u7406\u3001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u8fdb\u5316\u3001\u4ee5\u53ca\u57fa\u4e8e\u5f3a\u5316\u5b66\u4e60\u7684\u63a8\u7406\u80fd\u529b\u63d0\u5347\uff0c\u6784\u6210\u4e86\u4eca\u65e5\u8bba\u6587\u7684\u4e09\u5927\u652f\u67f1\u3002\u7814\u7a76\u8005\u4eec\u4e0d\u518d\u6ee1\u8db3\u4e8e\u8ba9\u667a\u80fd\u4f53\u6267\u884c\u5355\u4e00\u4efb\u52a1\uff0c\u800c\u662f\u81f4\u529b\u4e8e\u8d4b\u4e88\u5b83\u4eec\u6301\u4e45\u7684\u8bb0\u5fc6\u3001\u81ea\u4e3b\u8fdb\u5316\u7684\u6280\u80fd\u3001\u4ee5\u53ca\u5728\u590d\u6742\u957f\u7a0b\u4efb\u52a1\u4e2d\u7a33\u5065\u51b3\u7b56\u7684\u80fd\u529b\u3002\u4ece\u91d1\u878d\u6295\u8d44\u5230GPU\u5185\u6838\u4f18\u5316\uff0c\u8fd9\u4e9b\u57fa\u7840\u80fd\u529b\u7684\u8fdb\u6b65\u6b63\u5728\u50ac\u751f\u66f4\u5f3a\u5927\u3001\u66f4\u4e13\u4e1a\u7684\u5e94\u7528\u6846\u67b6\u3002\n\n---\n\n### \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n#### \u8bb0\u5fc6\u5373\u6218\u7565\uff1a\u5982\u4f55\u4e3a\u957f\u7a0b\u667a\u80fd\u4f53\u6253\u9020\u9ad8\u6548\u201c\u5916\u8111\u201d\uff1f\n\u56f4\u7ed5\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u7ba1\u7406\uff0c\u4eca\u65e5\u6d8c\u73b0\u4e86\u591a\u7bc7\u4ece\u4e0d\u540c\u89d2\u5ea6\u5207\u5165\u7684\u8bba\u6587\uff0c\u6838\u5fc3\u5728\u4e8e\u89e3\u51b3\u4fe1\u606f\u8fc7\u8f7d\u4e0e\u8bed\u4e49\u4fdd\u771f\u4e4b\u95f4\u7684\u6839\u672c\u77db\u76fe\u3002\n\n*   **Novel Memory Forgetting Techniques for Autonomous AI Agents: Balancing Relevance and Efficiency**\n    *   \u9488\u5bf9\u957f\u7a0b\u5bf9\u8bdd\u667a\u80fd\u4f53\u4e2d\u8bb0\u5fc6\u65e0\u9650\u589e\u957f\u5bfc\u81f4\u7684\u6027\u80fd\u8870\u51cf\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd**\u81ea\u9002\u5e94\u9884\u7b97\u9057\u5fd8\u6846\u67b6**\u3002\u8be5\u6846\u67b6\u901a\u8fc7\u76f8\u5173\u6027\u5f15\u5bfc\u7684\u8bc4\u5206\uff08\u7ed3\u5408\u65f6\u6548\u6027\u3001\u9891\u7387\u548c\u8bed\u4e49\u5bf9\u9f50\uff09\u548c\u8fb9\u754c\u4f18\u5316\uff0c\u52a8\u6001\u7ba1\u7406\u8bb0\u5fc6\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u80fd\u5728\u4e0d\u589e\u52a0\u4e0a\u4e0b\u6587\u6d88\u8017\u7684\u60c5\u51b5\u4e0b\uff0c\u663e\u8457\u63d0\u5347\u957f\u671f\u63a8\u7406\u7684F1\u5206\u6570\u5e76\u964d\u4f4e\u9519\u8bef\u8bb0\u5fc6\u7387\u3002\n    *   (2604.02280 [cs.AI])\n*   **ContextBudget: Budget-Aware Context Management for Long-Horizon Search Agents**\n    *   \u5c06\u4e0a\u4e0b\u6587\u7ba1\u7406\u5f62\u5f0f\u5316\u4e3a\u4e00\u4e2a\u53d7\u9884\u7b97\u7ea6\u675f\u7684\u5e8f\u5217\u51b3\u7b56\u95ee\u9898\uff0c\u63d0\u51fa\u4e86**BACM**\u6846\u67b6\u53ca\u57fa\u4e8e\u8bfe\u7a0b\u5b66\u4e60\u7684\u5f3a\u5316\u5b66\u4e60\u53d8\u4f53**BACM-RL**\u3002\u667a\u80fd\u4f53\u53ef\u4ee5\u4e3b\u52a8\u8bc4\u4f30\u53ef\u7528\u9884\u7b97\uff0c\u51b3\u7b56\u4f55\u65f6\u3001\u5982\u4f55\u538b\u7f29\u5386\u53f2\u4ea4\u4e92\u4fe1\u606f\u3002\u5728\u590d\u6742QA\u548c\u7f51\u9875\u6d4f\u89c8\u4efb\u52a1\u4e2d\uff0c\u8be5\u65b9\u6cd5\u5728\u4e0d\u540c\u9884\u7b97\u4e0b\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\uff0c\u5c24\u5176\u5728\u9884\u7b97\u7d27\u5f20\u65f6\u4f18\u52bf\u66f4\u660e\u663e\u3002\n    *   (2604.01664 [cs.AI])\n*   **ByteRover: Agent-Native Memory Through LLM-Curated Hierarchical Context**\n    *   \u98a0\u8986\u4e86\u4f20\u7edf\u5c06\u8bb0\u5fc6\u4f5c\u4e3a\u5916\u90e8\u670d\u52a1\u7684\u67b6\u6784\uff0c\u63d0\u51fa**\u667a\u80fd\u4f53\u539f\u751f\u5185\u5b58\u67b6\u6784**\u3002\u7531\u6267\u884c\u63a8\u7406\u7684\u540c\u4e00\u4e2aLLM\u6765\u7ba1\u7406\u77e5\u8bc6\uff0c\u5c06\u5176\u7ec4\u7ec7\u6210\u5177\u6709\u660e\u786e\u5173\u7cfb\u548c\u751f\u547d\u5468\u671f\u7684**\u5206\u5c42\u4e0a\u4e0b\u6587\u6811**\u3002\u68c0\u7d22\u91c7\u7528\u6e10\u8fdb\u7b56\u7565\uff0c\u5927\u90e8\u5206\u67e5\u8be2\u65e0\u9700\u8c03\u7528LLM\u5373\u53ef\u5728\u4e9a\u767e\u6beb\u79d2\u5185\u5b8c\u6210\uff0c\u5b9e\u73b0\u4e86\u96f6\u5916\u90e8\u4f9d\u8d56\u7684\u9ad8\u6548\u8bb0\u5fc6\u7cfb\u7edf\u3002\n    *   (2604.01599 [cs.AI])\n*   **DeltaMem: Towards Agentic Memory Management via Reinforcement Learning**\n    *   \u5c06\u89d2\u8272\u4e2d\u5fc3\u8bb0\u5fc6\u7ba1\u7406\u5efa\u6a21\u4e3a\u5355\u667a\u80fd\u4f53\u7aef\u5230\u7aef\u4efb\u52a1\uff0c\u5e76\u5f15\u5165**\u57fa\u4e8e\u8bb0\u5fc6\u7684\u83b1\u6587\u65af\u5766\u8ddd\u79bb**\u6765\u5f62\u5f0f\u5316\u8bb0\u5fc6\u66f4\u65b0\u5956\u52b1\uff0c\u8fdb\u800c\u8bbe\u8ba1\u4e86\u5b9a\u5236\u7684\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\u8fdb\u884c\u4f18\u5316\u3002\u5728\u591a\u4e2a\u957f\u671f\u8bb0\u5fc6\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u8be5\u65b9\u6cd5\u8d85\u8d8a\u4e86\u6240\u6709\u4ea7\u54c1\u7ea7\u57fa\u7ebf\u3002\n    *   (2604.01560 [cs.CL])\n*   **Memory in the LLM Era: Modular Architectures and Strategies in a Unified Framework**\n    *   \u5bf9\u73b0\u6709\u667a\u80fd\u4f53\u8bb0\u5fc6\u65b9\u6cd5\u8fdb\u884c\u4e86\u9996\u6b21\u7cfb\u7edf\u6027\u7684\u7edf\u4e00\u6846\u67b6\u603b\u7ed3\u4e0e\u5168\u9762\u5bf9\u6bd4\u5b9e\u9a8c\u3002\u57fa\u4e8e\u5206\u6790\u6d1e\u5bdf\uff0c\u4f5c\u8005\u7ec4\u5408\u73b0\u6709\u6a21\u5757\u8bbe\u8ba1\u4e86\u4e00\u79cd\u65b0\u7684\u8bb0\u5fc6\u65b9\u6cd5\uff0c\u5728\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u8d85\u8d8a\u4e86\u4e4b\u524d\u7684SOTA\uff0c\u4e3a\u672a\u6765\u7814\u7a76\u63d0\u4f9b\u4e86\u6e05\u6670\u7684\u5730\u56fe\u4e0e\u65b9\u5411\u3002\n    *   (2604.01707 [cs.CL])\n\n#### \u4ece\u534f\u4f5c\u5230\u8fdb\u5316\uff1a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u5982\u4f55\u8fc8\u5411\u81ea\u4e3b\u521b\u9020\uff1f\n\u591a\u667a\u80fd\u4f53\u67b6\u6784\u7684\u7814\u7a76\u6b63\u4ece\u9759\u6001\u534f\u4f5c\u8d70\u5411\u52a8\u6001\u8fdb\u5316\uff0c\u65e8\u5728\u5b9e\u73b0\u5f00\u653e\u73af\u5883\u4e0b\u7684\u6301\u7eed\u5b66\u4e60\u4e0e\u77e5\u8bc6\u79ef\u7d2f\u3002\n\n*   **The Self Driving Portfolio: Agentic Architecture for Institutional Asset Management**\n    *   \u6784\u5efa\u4e86\u4e00\u4e2a\u7531\u7ea650\u4e2a\u4e13\u4e1a\u667a\u80fd\u4f53\u7ec4\u6210\u7684**\u667a\u80fd\u4f53\u5316\u6218\u7565\u8d44\u4ea7\u914d\u7f6e\u7ba1\u9053**\uff0c\u6db5\u76d6\u5e02\u573a\u9884\u6d4b\u3001\u6295\u8d44\u7ec4\u5408\u6784\u5efa\u3001\u76f8\u4e92\u8bc4\u5ba1\u4e0e\u6295\u7968\u7b49\u5168\u6d41\u7a0b\u3002\u4e00\u4e2a\u5143\u667a\u80fd\u4f53\u901a\u8fc7\u5bf9\u6bd4\u5386\u53f2\u9884\u6d4b\u4e0e\u5b9e\u9645\u56de\u62a5\uff0c\u91cd\u5199\u5176\u4ed6\u667a\u80fd\u4f53\u7684\u4ee3\u7801\u548c\u63d0\u793a\u4ee5\u6539\u8fdb\u672a\u6765\u8868\u73b0\uff0c\u6574\u4e2a\u7cfb\u7edf\u7531\u6295\u8d44\u653f\u7b56\u58f0\u660e\u6587\u4ef6\u9a71\u52a8\u3002\n    *   (2604.02279 [cs.AI])\n*   **CORAL: Towards Autonomous Multi-Agent Evolution for Open-Ended Discovery**\n    *   \u63d0\u51fa\u4e86\u9996\u4e2a\u9762\u5411\u5f00\u653e\u6027\u95ee\u9898\uff08\u5982\u6570\u5b66\u3001\u7b97\u6cd5\u4f18\u5316\uff09\u7684**\u81ea\u4e3b\u591a\u667a\u80fd\u4f53\u8fdb\u5316\u6846\u67b6**\u3002\u5b83\u7528\u5177\u6709\u6301\u4e45\u8bb0\u5fc6\u3001\u53ef\u5f02\u6b65\u6267\u884c\u548c\u534f\u4f5c\u7684\u957f\u5468\u671f\u667a\u80fd\u4f53\u53d6\u4ee3\u4e86\u56fa\u5b9a\u7684\u542f\u53d1\u5f0f\u89c4\u5219\u3002\u5728\u591a\u9879\u4efb\u52a1\u4e0a\u8fbe\u5230\u65b0SOTA\uff0c\u5728Anthropic\u7684\u5185\u6838\u5de5\u7a0b\u4efb\u52a1\u4e2d\uff0c\u56db\u4e2a\u534f\u540c\u8fdb\u5316\u667a\u80fd\u4f53\u5c06\u6700\u4f73\u6210\u7ee9\u663e\u8457\u63d0\u5347\u3002\n    *   (2604.01658 [cs.AI])\n*   **From Multi-Agent to Single-Agent: When Is Skill Distillation Beneficial?**\n    *   \u63ed\u793a\u4e86**\u6280\u80fd\u6548\u7528\u672c\u8d28\u4e0a\u7531\u8bc4\u4f30\u6307\u6807\u7684\u62d3\u6251\u521a\u6027\u51b3\u5b9a**\uff0c\u800c\u975e\u4efb\u52a1\u672c\u8eab\u3002\u4f5c\u8005\u63d0\u51fa\u4e86\u4e00\u4e2a\u5148\u9a8c\u9884\u6d4b\u6307\u6807**\u5ea6\u91cf\u81ea\u7531\u5ea6\uff08F\uff09**\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1\u4e86\u4e00\u4e2a\u4e24\u9636\u6bb5\u81ea\u9002\u5e94\u84b8\u998f\u6846\u67b6\uff0c\u80fd\u667a\u80fd\u51b3\u5b9a\u4f55\u65f6\u3001\u5982\u4f55\u5c06\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u84b8\u998f\u4e3a\u5355\u667a\u80fd\u4f53\u6280\u80fd\uff0c\u5728\u4fdd\u6301\u6216\u8d85\u8d8a\u6027\u80fd\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u6210\u672c\u548c\u5ef6\u8fdf\u3002\n    *   (2604.01608 [cs.AI])\n*   **EvoSkills: Self-Evolving Agent Skills via Co-Evolutionary Verification**\n    *   \u9488\u5bf9\u590d\u6742\u591a\u6587\u4ef6**\u6280\u80fd\u5305**\u7684\u81ea\u52a8\u751f\u6210\u96be\u9898\uff0c\u63d0\u51fa\u4e86**EvoSkills**\u6846\u67b6\u3002\u5b83\u8ba9\u4e00\u4e2a\u6280\u80fd\u751f\u6210\u5668\u4e0e\u4e00\u4e2a**\u5171\u8fdb\u5316\u66ff\u4ee3\u9a8c\u8bc1\u5668**\u534f\u540c\u5de5\u4f5c\uff0c\u540e\u8005\u5728\u4e0d\u63a5\u89e6\u771f\u5b9e\u6d4b\u8bd5\u5185\u5bb9\u7684\u60c5\u51b5\u4e0b\u63d0\u4f9b\u4fe1\u606f\u4e30\u5bcc\u7684\u53cd\u9988\uff0c\u9a71\u52a8\u6280\u80fd\u5305\u7684\u81ea\u4e3b\u8fed\u4ee3\u4f18\u5316\uff0c\u5728SkillsBench\u57fa\u51c6\u4e0a\u53d6\u5f97\u4e86\u6700\u9ad8\u901a\u8fc7\u7387\u3002\n    *   (2604.01687 [cs.AI])\n*   **A Self-Evolving Agentic Framework for Metasurface Inverse Design**\n    *   \u5c06**\u4e0a\u4e0b\u6587\u7ea7\u6280\u80fd\u8fdb\u5316**\u7406\u5ff5\u5e94\u7528\u4e8e\u8d85\u8868\u9762\u9006\u5411\u8bbe\u8ba1\u8fd9\u4e00\u4e13\u4e1a\u9886\u57df\u3002\u6846\u67b6\u901a\u8fc7\u7f16\u7801\u667a\u80fd\u4f53\u3001\u8fdb\u5316\u6280\u80fd\u5de5\u4ef6\u548c\u57fa\u4e8e\u7269\u7406\u6a21\u62df\u7684\u8bc4\u4f30\u5668\u76f8\u7ed3\u5408\uff0c\u8ba9\u6c42\u89e3\u5668\u7279\u5b9a\u7b56\u7565\u80fd\u5728\u4e0d\u540c\u4efb\u52a1\u95f4\u8fed\u4ee3\u7cbe\u5316\uff0c\u663e\u8457\u63d0\u5347\u4e86\u4efb\u52a1\u6210\u529f\u7387\u548c\u6548\u7387\uff0c\u5c55\u793a\u4e86\u9886\u57df\u4e13\u4e1a\u77e5\u8bc6\u81ea\u4e3b\u79ef\u7d2f\u7684\u6f5c\u529b\u3002\n    *   (2604.01480 [cs.AI])\n\n#### \u5f3a\u5316\u5b66\u4e60\u65b0\u8303\u5f0f\uff1a\u4ece\u88ab\u52a8\u63a2\u7d22\u5230\u4e3b\u52a8\u5e72\u9884\u4e0e\u6280\u80fd\u5185\u5316\n\u5f3a\u5316\u5b66\u4e60\u5728\u63d0\u5347\u667a\u80fd\u4f53\u63a8\u7406\u80fd\u529b\u65b9\u9762\u51fa\u73b0\u65b0\u601d\u8def\uff0c\u5173\u6ce8\u5982\u4f55\u6253\u7834\u9519\u8bef\u7d2f\u79ef\u5faa\u73af\uff0c\u5e76\u5c06\u5916\u90e8\u6280\u80fd\u771f\u6b63\u5185\u5316\u4e3a\u6a21\u578b\u80fd\u529b\u3002\n\n*   **ProCeedRL: Process Critic with Exploratory Demonstration Reinforcement Learning for LLM Agentic Reasoning**\n    *   \u9488\u5bf9\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u63a2\u7d22\u56e0\u9519\u8bef\u7d2f\u79ef\u548c\u968f\u673a\u53cd\u9988\u800c\u5931\u6548\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86**ProCeedRL**\u3002\u5176\u6838\u5fc3\u662f\u4e00\u4e2a**\u8fc7\u7a0b\u7ea7\u6279\u8bc4\u5bb6**\uff0c\u80fd\u5b9e\u65f6\u76d1\u63a7\u4ea4\u4e92\uff0c\u5e76\u901a\u8fc7\u57fa\u4e8e\u53cd\u601d\u7684\u793a\u8303\u4e3b\u52a8\u5e72\u9884\uff0c\u5f15\u5bfc\u667a\u80fd\u4f53\u505c\u6b62\u9519\u8bef\u7d2f\u79ef\uff0c\u5c06\u63a2\u7d22\u4ece\u88ab\u52a8\u9009\u62e9\u8f6c\u53d8\u4e3a\u4e3b\u52a8\u5f15\u5bfc\u3002\n    *   (2604.02006 [cs.AI])\n*   **SKILL0: In-Context Agentic Reinforcement Learning for Skill Internalization**\n    *   \u6311\u6218\u4e86\u8fd0\u884c\u65f6\u68c0\u7d22\u6280\u80fd\u7684\u8303\u5f0f\uff0c\u65e8\u5728\u5c06\u6280\u80fd**\u5185\u90e8\u5316**\u5230\u6a21\u578b\u53c2\u6570\u4e2d\uff0c\u5b9e\u73b0\u96f6\u6837\u672c\u81ea\u4e3b\u884c\u4e3a\u3002**SKILL0**\u6846\u67b6\u91c7\u7528\u4e00\u79cd\u8bad\u7ec3\u65f6\u8bfe\u7a0b\uff0c\u4ece\u63d0\u4f9b\u5b8c\u6574\u6280\u80fd\u4e0a\u4e0b\u6587\u5f00\u59cb\uff0c\u9010\u6b65\u64a4\u9500\uff0c\u6700\u7ec8\u8ba9\u667a\u80fd\u4f53\u5728\u5b8c\u5168\u96f6\u6837\u672c\u73af\u5883\u4e0b\u8fd0\u884c\uff0c\u5e76\u5728\u591a\u9879\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\u3002\n    *   (2604.02268 [cs.LG])\n\n#### \u8fde\u63a5\u601d\u7ef4\u4e0e\u884c\u52a8\uff1a\u5b9e\u65f6\u63a7\u5236\u4e2d\u7684\u5206\u5c42\u89c4\u5212\u4e0e\u89c2\u5bdf\u7b56\u7565\n\u7814\u7a76\u5982\u4f55\u5c06\u5927\u6a21\u578b\u7684\u9ad8\u5c42\u63a8\u7406\u53ef\u9760\u5730\u6620\u5c04\u5230\u5b9e\u65f6\u63a7\u5236\u7cfb\u7edf\uff0c\u5e76\u4f18\u5316\u611f\u77e5\u4e0e\u51b3\u7b56\u95f4\u7684\u4fe1\u606f\u6d41\u3002\n\n*   **Bridging Large-Model Reasoning and Real-Time Control via Agentic Fast-Slow Planning**\n    *   \u63d0\u51fa**\u667a\u80fd\u4f53\u5feb\u6162\u89c4\u5212**\u5206\u5c42\u6846\u67b6\uff0c\u5c06\u611f\u77e5\u3001\u51b3\u7b56\u3001\u89c4\u5212\u4e0e\u63a7\u5236\u89e3\u8026\u5230\u4e0d\u540c\u65f6\u95f4\u5c3a\u5ea6\u3002\u901a\u8fc7**\u611f\u77e5\u5230\u51b3\u7b56**\u548c**\u51b3\u7b56\u5230\u8f68\u8ff9**\u4e24\u5ea7\u201c\u6865\u6881\u201d\uff0c\u5c06\u8bed\u4e49\u6307\u4ee4\u8f6c\u5316\u4e3a\u53ef\u6267\u884c\u7684\u8def\u5f84\uff0c\u5e76\u7531MPC\u5b9e\u65f6\u8ddf\u8e2a\u3002\u5728CARLA\u4eff\u771f\u4e2d\uff0c\u663e\u8457\u63d0\u5347\u4e86\u6270\u52a8\u4e0b\u7684\u9c81\u68d2\u6027\u3002\n    *   (2604.01681 [cs.AI])\n*   **Read More, Think More: Revisiting Observation Reduction for Web Agents**\n    *   \u91cd\u65b0\u5ba1\u89c6\u4e86\u7f51\u9875\u667a\u80fd\u4f53\u4e2d\u201c\u89c2\u5bdf\u8d8a\u7cbe\u7b80\u8d8a\u597d\u201d\u7684\u666e\u904d\u505a\u6cd5\u3002\u7814\u7a76\u53d1\u73b0\uff0c**\u6700\u4f18\u89c2\u5bdf\u8868\u793a\u53d6\u51b3\u4e8e\u6a21\u578b\u80fd\u529b\u548c\u601d\u8003\u4ee4\u724c\u9884\u7b97**\uff1a\u9ad8\u6027\u80fd\u6a21\u578b\u66f4\u80fd\u4ece\u8be6\u5c3d\u7684HTML\u4e2d\u53d7\u76ca\uff0c\u800c\u4f4e\u6027\u80fd\u6a21\u578b\u5219\u9002\u5408\u7cbe\u7b80\u8868\u793a\u3002\u7814\u7a76\u8fd8\u6307\u51fa\uff0c\u878d\u5165\u5386\u53f2\u89c2\u5bdf\u548c\u4f7f\u7528\u5dee\u5f02\u8868\u793a\u662f\u6709\u6548\u7684\u5b9e\u7528\u7b56\u7565\u3002\n    *   (2604.01535 [cs.CL])\n\n#### \u6846\u67b6\u9769\u65b0\uff1a\u4eceGPU\u5185\u6838\u4f18\u5316\u5230\u6a21\u578b\u81ea\u53cd\u601d\u8bad\u7ec3\n\u9488\u5bf9\u7279 u3002\u300aFrom Multi-Agent to Single-Agent\u300b\u4e00\u6587\u63d0\u51fa\u4e86\u4e00\u4e2a\u98a0\u8986\u6027\u89c2\u70b9\uff1a\u662f\u5426\u5e94\u5c06\u591a\u667a\u80fd\u4f53\u84b8\u998f\u4e3a\u5355\u667a\u80fd\u4f53\uff0c\u4e0d\u53d6\u51b3\u4e8e\u4efb\u52a1\uff0c\u800c\u53d6\u51b3\u4e8e\u8bc4\u4f30\u6307\u6807\u7684**\u521a\u6027**\u3002\u8fd9\u4e00\u53d1\u73b0\u8feb\u4f7f\u7814\u7a76\u8005\u5fc5\u987b\u66f4\u8c28\u614e\u5730\u5bf9\u5f85\u8bc4\u4f30\u8bbe\u8ba1\uff0c\u5e76\u53ef\u80fd\u50ac\u751f\u66f4\u667a\u80fd\u7684\u3001\u81ea\u9002\u5e94\u4e8e\u8bc4\u4f30\u76ee\u6807\u7684\u7cfb\u7edf\u67b6\u6784\u3002",

        // 全局状态管理
        let starredPapers = new Set();
        let readPapers = new Set();
        let deletedPapers = new Set();
        let pendingDeletes = new Map();
        let showChineseSummary = true; // 默认显示中文摘要
        let showOnlyStarred = false; // 筛选状态：是否只显示收藏的论文
        let isLoadingMore = false; // 是否正在加载更多
        let activeTagFilters = {}; // {date: Set of active tag names}

        // 获取未加载的日期
        function getUnloadedDates() {
            return availableDates.filter(date => !loadedDates.has(date));
        }

        // Tag filter toggle
        function toggleTagFilter(date, tagName) {
            if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {
            const loadBtn = document.getElementById('load-more-btn');
            const unloadedCount = getUnloadedDates().length;

            if (loadBtn) {
                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;
                }
            }
        }

        // 从localStorage加载状态
        function loadState() {
            const starred = localStorage.getItem('starred_papers');
            const read = localStorage.getItem('read_papers');
            const deleted = localStorage.getItem('deleted_papers');
            const summaryLang = localStorage.getItem('summary_language');

            if (starred) starredPapers = new Set(JSON.parse(starred));
            if (read) readPapers = new Set(JSON.parse(read));
            if (deleted) deletedPapers = new Set(JSON.parse(deleted));
            if (summaryLang !== null) showChineseSummary = summaryLang === 'chinese';
        }

        // 保存状态到localStorage
        function saveState() {
            localStorage.setItem('starred_papers', JSON.stringify([...starredPapers]));
            localStorage.setItem('read_papers', JSON.stringify([...readPapers]));
            localStorage.setItem('deleted_papers', JSON.stringify([...deletedPapers]));
            localStorage.setItem('summary_language', showChineseSummary ? 'chinese' : 'english');
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 通过按钮删除论文（避免JavaScript字符串转义问题）
        function deletePaperByButton(button) {
            const arxivId = button.getAttribute('data-arxiv-id');
            const title = button.getAttribute('data-title');
            deletePaper(arxivId, title);
        }

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);
            }, 300);
        }

        // 切换星标状态
        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);
            }
            saveState();

            // 如果当前是只看收藏模式，需要重新渲染
            if (showOnlyStarred) {
                renderPapers();
            } else {
                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);
                if (starBtn) {
                    if (starredPapers.has(arxivId)) {
                        starBtn.classList.add('starred');
                    } else {
                        starBtn.classList.remove('starred');
                    }
                }
            }
        }

        // 切换已读状态
        function toggleRead(arxivId) {
            const checkbox = document.querySelector(`[data-arxiv-id="${arxivId}"] input[type="checkbox"]`);
            if (!checkbox) return;

            if (checkbox.checked) {
                readPapers.add(arxivId);

        function toggleSummaryLanguage() {

            toggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

        function updateStats() {

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {

                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>

                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>

                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>

            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (paper.summary) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (paper.summary_translation) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';

            // 已读复选框
            html += `

            // 原始摘要

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },

                { key: 'research_value', id: `research-value-${aid}`, title: '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },

            sections.forEach(s => {

                    </a>

                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">

        // Toggle paper detail expansion
        function togglePaperDetail(arxivId) {

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date];
                if (clusters.length === 0) continue;

                const { html: papersHTML, count: dateVisibleTotal } = collectPapersForDate(clusters, date);

                totalPapers += dateVisibleTotal;

                html += `

                html += `

                html += `
