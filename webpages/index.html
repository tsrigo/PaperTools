                    "filter_reason": "**核心判断：** 这篇论文的核心贡献是提出一个**系统级的自我改进框架**，将LLM的自我改进概念化为一个闭环生命周期，包含四个紧密耦合的过程：数据获取、数据选择、模型优化和推理细化，以及一个自主评估层。论文明确指出模型本身在每个阶段都发挥核心作用：收集或生成数据、选择信息信号、更新参数、细化输出。 这**完全符合**我的研究目标中的第三个方向——**自我演化 (Self-Evolving)**。论文讨论的是LLM如何通过自主生成数据、评估输出、迭代 refinement 来提升自身能力，这正是\"智能体通过经验、反思或环境反馈进行自我完善和迭代\"的典型体现。 **正面指标分析：** 论文明确涉及以下核心概念： - `Self-Improvement`（自我改进） - `Self-Evolving`（自我演化） - `Iterative Improvement`（迭代改进） - `Autonomous Evaluation`（自主评估） - 模型自主驱动各阶段的改进循环 **排除标准检查：** - 不是非演化型应用：论文不是将LLM作为工具解决特定领域问题 - 不是非Agentic推理：虽然涉及推理优化，但核心是关于模型如何自主改进的机制 - 不涉及安全/对齐/可解释性等基础设施研究 - 不涉及多模态或图技术 **特殊情况的处理：** 这篇论文属于\"保留\"类别的例外情况：即使它可能涉及一些应用场景的讨论，但其核心贡献是提出一种新的\"自我演化\"机制框架，而非单纯的应用研究。 **结论：** 该论文完全符合研究范围，核心贡献在于构建和改进LLM的自我演化机制，属于Agentic AI中自我演化方向的典型研究。",
                    "intro_logic": "The problems introduced in the introduction of this paper are as follows:\n\n1. Large language models (LLMs) have achieved rapid performance gains through scaling model size, training data, and compute, with methods like RLHF relying heavily on carefully curated, high-quality human supervision.\n\n2. Limitation 1: Human data scarcity is becoming increasingly evident, as high-quality, expert-annotated data is expensive and difficult to scale, and the marginal cost of constructing large supervised datasets grows rapidly while the availability of expert labor remains limited.\n\n3. Limitation 2: There is a deeper limitation tied to human cognitive bounds—if model supervision is permanently constrained by human intelligence, can models truly surpass human-level performance?\n\n4. When models approach or exceed human-level capability in certain domains, human feedback may no longer provide sufficiently informative gradients for further improvement.\n\n5. This raises a fundamental question: how can models continue to improve once they reach parity with their supervisors?\n\n6. From an automation perspective, as LLMs become increasingly advanced and demonstrate the capacity to resolve complex engineering tasks and engage in high-level decision-making, it is a natural progression to delegate model development responsibilities (including data acquisition, data selection, and model training) to the models themselves.\n\nResearch Question: How can large language models be enabled to autonomously improve themselves through self-generated data, self-evaluation, and iterative refinement, without relying exclusively on external human signals?",
                    "core_insight": "# Analysis of the Paper's Problem Identification and Approach\n\n## The Core Pain Point Identified\n\nThe paper identifies a fundamental limitation in the current paradigm of improving Large Language Models (LLMs): **the reliance on human supervision is becoming increasingly unsustainable and insufficient**.\n\nThe authors articulate this problem through two key dimensions:\n\n### 1. Human Data Scarcity\n\nThe paper states:\n\n> \"High-quality, expert-annotated data is expensive and difficult to scale (Gilardi et al., 2023; Villalobos et al., 2024). The marginal cost of constructing large supervised datasets grows rapidly, while the availability of expert labor remains limited.\"\n\nThis highlights the practical economic and scalability constraints of human-annotated data.\n\n### 2. Human Cognitive Bounds\n\nThe paper raises a more profound concern:\n\n> \"If model supervision is permanently constrained by human intelligence, can models truly surpass human-level performance? When models approach or exceed human-level capability in certain domains, human feedback may no longer provide sufficiently informative gradients for further improvement (Bowman, 2023; Burns et al., 2023).\"\n\nThis represents the theoretical ceiling problem - if humans can only supervise up to their own level of capability, how can models exceed that threshold?\n\n## The Paper's Approach/Lens\n\nRather than focusing on a specific technique, the paper adopts a **system-level perspective** and proposes a **unified framework**:\n\n> \"We present a system-level perspective on self-improving language models and introduce a unified framework that organizes existing techniques. We conceptualize the self-improvement system as a closed-loop lifecycle, consisting of four tightly coupled processes: data acquisition, data selection, model optimization, and inference refinement, along with an autonomous evaluation layer.\"\n\nThe authors explicitly define self-improvement with two essential properties:\n\n> \"This paradigm is characterized by two essential properties: **Autonomy**: the improvement process operates without ongoing human annotation or manual correction... **Continuity**: self-improvement is not a one-off refinement. It is an iterative, self-reinforcing process...\"\n\n## The Journey and Challenges\n\nThe paper does not describe a linear trial-and-error implementation journey in the traditional sense, as it is a **survey/overview paper** rather than an empirical study. However, the paper does acknowledge the evolution of the field and identifies challenges:\n\n### Challenges in the Field (from Section 7)\n\nThe paper discusses several fundamental challenges:\n\n1. **Feedback Quality Issues**:\n   > \"The core challenge lies in the quality of self-generated feedback signals. If the model cannot accurately distinguish between correct and incorrect outputs, the improvement loop may reinforce errors rather than correct behavior.\"\n\n2. **Optimization Failures**:\n   > \"Even with high-quality feedback signals, the optimization process itself can fail in various ways, leading to reward hacking, mode collapse, or regression.\"\n\n3. **Theoretical Limitations**:\n   > \"Self-improvement is theoretically bounded by the initial model's capabilities. If the initial model lacks certain fundamental abilities (e.g., basic reasoning, tool use), it may not be able to improve itself in those dimensions.\"\n\n### The Evolution of Approaches\n\nThe paper traces how the field has evolved from:\n- Static curation (human-designed filters)\n- To model-driven data selection\n- To fully autonomous self-improvement systems\n\nAs stated:\n\n> \"A paradigm shift emerged with model-based quality filtering... These methods illustrate a clear progression in how models participate in web curation: from scoring already-crawled documents, to systematically benchmarking model-driven filtering strategies, to guiding the crawl frontier itself.\"\n\n## Conclusion\n\nThe paper's \"starting point\" was recognizing that **human supervision is both practically unsustainable and theoretically limiting** for LLM improvement. The authors approached this by creating a comprehensive taxonomic framework that organizes the fragmented landscape of self-improvement techniques into a coherent system with five interconnected components. Rather than solving a specific implementation problem, the paper synthesizes existing approaches and identifies pathways for future research toward fully autonomous self-improving LLMs.",
                    "methodology": "# 论文解读：大型语言模型的自我改进技术综述\n\n## 一句话概括核心创新\n\n这篇论文最本质的创新在于：**它不是提出某一个具体的自我改进算法，而是建立了一个统一的系统框架，把模型\"自我改进\"这个过程拆解成数据获取、数据选择、模型优化、推理优化、自主评估五个可独立运作又相互耦合的阶段，形成一个闭环的自动化改进流水线。**\n\n换句话说，之前的工作都在研究\"怎么让模型自己学得更好\"，而这篇论文告诉你\"要实现真正的自我改进，你需要系统性地解决五个问题，并且这五个问题要作为一个整体来设计\"。\n\n---\n\n## 按执行逻辑顺序拆解\n\n整个自我改进系统的运行流程，可以理解为以下五个阶段**依次执行**（注意：是逻辑上的顺序，实际运行时某些阶段会迭代循环）：\n\n**第一步：数据获取（Data Acquisition）** —— 模型自己去找或生成训练数据\n\n**第二步：数据选择（Data Selection）** —— 模型从获取到的数据里挑出真正有用的部分\n\n**第三步：模型优化（Model Optimization）** —— 模型根据筛选后的数据更新自己的参数\n\n**第四步：推理优化（Inference Refinement）** —— 模型在推理时不改参数，但通过各种技巧让输出质量更高\n\n**第五步：自主评估（Autonomous Evaluation）** —— 模型自己评估自己当前的能力水平，判断还需不需要继续改进\n\n下面逐一展开每个阶段。\n\n---\n\n## 第一步：数据获取\n\n### 输入\n- 初始状态：模型已经完成预训练，具备基本的语言能力\n- 可选的外部资源：互联网网页、代码仓库、科学论文、书籍等静态数据源；或者API、浏览器、代码执行器、游戏环境等动态交互环境\n\n### 操作\n模型通过三种途径获取数据：\n\n1. **静态筛选（Static Curation）**：模型像搜索引擎一样，在已有的数据仓库（比如Common Crawl网页库、GitHub代码库）里爬取和过滤内容。论文提到Crawl4LLM方法，模型可以自己决定\"哪些URL值得爬\"，而不是均匀地爬所有网页。\n\n2. **环境交互（Environment Interaction）**：模型作为智能体，与外部环境进行交互。比如调用搜索引擎、运行代码、执行API调用等。典型工作包括WebGPT（让模型自己搜索网页来回答问题）、Toolformer（让模型学会调用外部工具）。\n\n3. **合成生成（Synthetic Generation）**：模型完全不依赖外部环境，直接根据prompt生成新的训练数据。比如Self-Instruct方法：给模型一些种子任务，让模型自己生成更多 instruction-following 的训练数据。\n\n### 输出\n一个原始数据池（raw data pool），里面包含了模型认为可能有用的训练素材。\n\n### 目的\n解决\"人类标注数据不够用\"的问题。当模型能力接近人类时，人类反馈的质量和数量都成为瓶颈。模型需要学会自己给自己找\"教材\"。\n\n### 如果不做会怎样\n模型只能依赖人类预先准备好的数据，无法持续扩展自己的能力边界，最终会停在某个天花板以下。\n\n---\n\n## 第二步：数据选择\n\n### 输入\n- 第一步输出的原始数据池\n- 模型当前的状态（参数、当前的能力水平）\n\n### 操作\n模型对原始数据进行筛选和优先级排序。这一步的核心思想是：**不是所有数据都值得学，模型应该挑自己最需要的数据来训练**。\n\n论文把数据选择方法分成三类：\n\n1. **基于度量的评分（Metric-Guided Scoring）**：用模型自身的信号来评估数据价值。比如：\n   - 用模型的loss（损失值）来判断数据难度\n   - 用模型的perplexity（困惑度）来估计数据质量\n   - 用模型的uncertainty（不确定性）来筛选\"模型不确定会不会\"的数据\n\n2. **迭代重评分（Iterative Re-scoring）**：在训练过程中反复更新评分。比如训练几个epoch后，重新评估哪些数据更有价值，然后调整后续的采样权重。\n\n3. **自适应选择（Adaptive Selection）**：用一个可学习的\"选择器\"来决定数据优先级。这个选择器本身也是通过RL或bandit算法训练出来的。比如DUMP方法，把数据选择建模成多臂老虎机问题，根据每个数据源的\"优势\"（advantage）来动态分配采样概率。\n\n### 输出\n一个经过筛选和加权的数据批次（selected batch），准备送入模型优化阶段。\n\n### 目的\n提高数据效率。模型在每个改进周期内能处理的数据量是有限的，必须把有限的计算资源分配给最有价值的数据。同时，让数据分布与模型当前的能力水平匹配（ curriculum learning 的思想）。\n\n### 如果不做会怎样\n模型会均匀地从所有数据中学习，导致：（1）大量计算浪费在简单或无关的数据上；（2）学习曲线不够高效，可能需要更多迭代才能达到相同水平。\n\n---\n\n## 第三步：模型优化\n\n这是论文最核心的部分。模型需要根据筛选后的数据来更新自己的参数。论文提出了一个统一的框架叫做 **GRO（Generation-Reward-Optimization）**，把模型优化拆解为三个环节：\n\n### 3.1 生成（Generation）\n\n**输入**：当前模型版本 + 任务prompt\n\n**操作**：模型产生候选输出。论文总结了三种生成策略：\n\n- **自我探索生成（Self-Exploratory Generation）**：直接让模型生成一个答案或推理链。比如STaR方法，让模型为每个问题生成一个rationale（推理过程）。\n- ** refined 生成（Refined Generation）**：先生成一个初始答案，然后让模型自己批评和修改它，形成一个\"改进链\"。比如Self-Refine方法。\n- **交互式生成（Interactive Generation）**：让多个模型实例相互交互。比如Self-Play（自我对弈）：模型同时扮演\"出题人\"和\"解题人\"两个角色。\n\n**输出**：候选输出（可以是单个答案，也可以是多个答案的集合）\n\n### 3.2 奖励（Reward）\n\n**输入**：模型生成的候选输出\n\n**操作**：评估这些输出的质量，给出反馈信号。论文总结了三种奖励类型：\n\n- **启发式奖励（Heuristic Reward）**：基于统计规则的评估。比如多数投票（majority voting）：如果模型对同一个问题生成了多个答案，选出现次数最多的那个作为\"正确答案\"。\n- **模型奖励（Model-Based Reward）**：让模型自己给自己打分，或者用另一个模型（奖励模型）来评分。比如Self-Rewarding LMs方法，让模型生成答案的同时生成对自己的评分。\n- **验证奖励（Verification Reward）**：基于确定性的验证信号。比如代码任务中运行单元测试，如果测试通过则奖励=1，否则=0。\n\n**输出**：奖励信号（可以是二值的0/1，也可以是连续的分数，或者偏好排序）\n\n### 3.3 优化（Optimization）\n\n**输入**：生成的回答 + 对应的奖励信号\n\n**操作**：根据奖励信号更新模型参数。论文总结了三种优化范式：\n\n- **监督微调（SFT）**：只保留\"好\"的输出，用标准的交叉熵损失让模型学习这些正确答案。典型工作：STaR、ReGenesis。\n- **强化学习（RL）**：用奖励信号来指导策略更新。典型算法包括PPO、DPO、GRPO等。典型工作：Self-Rewarding LMs、SPIN、R-Zero。\n- **混合优化（Hybrid）**：先SFT后RL，或者交替进行。典型工作：V-STaR先用SFT训练生成器和验证器，再用DPO对齐。\n\n**输出**：更新后的模型参数\n\n### 目的\n这是自我改进的核心环节：模型通过\"自己生成→自己评估→自己更新\"的循环，实现不依赖人类反馈的能力提升。\n\n### 如果不做会怎样\n模型无法真正改进自己的能力。数据获取和数据选择只是准备了\"教材\"，但模型还需要通过参数更新来\"吸收知识\"。\n\n---\n\n## 第四步：推理优化\n\n### 输入\n用户query + 训练好的模型\n\n### 操作\n模型在推理阶段（不改变参数的前提下）通过各种技巧提升输出质量。论文总结了四类方法：\n\n1. **解码策略（Decoding Strategies）**：\n   - 采样多个答案然后投票（Self-Consistency）\n   - 用奖励模型选最好的（Best-of-N）\n   - 树搜索（Tree-of-Thought、MCTS）来探索多条推理路径\n   - Logit调整（Contrastive Decoding等）来抑制重复和幻觉\n\n2. **基于推理的改进（Reasoning-Based Improvement）**：\n   - 反馈循环：生成→评估→修改→再生成。比如Self-Refine、Reflexion。\n   - 规划推理：让模型先制定计划再执行，比如ReAct。\n   - 协作推理：多个模型实例相互讨论和辩论，比如Multi-Agent Debate。\n\n3. **智能体系统改进（Agentic System-Based Improvement）**：\n   - 动态调整prompt\n   - 建立长期记忆（memory）来积累经验\n   - 学会使用工具（tool use）\n   - 动态调整工作流（workflow）和多智能体通信拓扑\n\n4. **测试时训练（Test-Time Training）**：\n   - 在推理时临时做几步梯度更新，让模型适应当前query。比如TT-RL、VDS-TTT。\n\n### 输出\n质量更高的最终输出\n\n### 目的\n弥补\"训练时优化\"和\"推理时需求\"之间的差距。训练好的模型在部署后仍然可能遇到困难任务，推理优化提供了额外的提升空间，而且不需要重新训练。\n\n### 如果不做会怎样\n模型在面对复杂任务时只能\"一次生成\"，没有机会通过尝试、反馈、修改来提升质量，对于需要多步推理或工具使用的任务表现会明显受限。\n\n---\n\n## 第五步：自主评估\n\n### 输入\n当前模型版本 + 各种benchmark或任务\n\n### 操作\n模型自己评估自己的能力水平。论文总结了三种评估方式：\n\n1. **静态基准（Static Benchmark）**：用已有的测试集（如MMLU、HumanEval）来评估。但论文指出静态基准会很快过时。\n\n2. **动态基准（Dynamic Benchmark）**：持续更新的基准。比如LiveCodeBench（定期加入新题目）、REALTIME QA（实时问答）。\n\n3. **交互环境评估（Interactive Environment Evaluation）**：在真实环境中评估。比如让模型在模拟的浏览器环境或代码执行环境中完成任务。\n\n### 输出\n能力评估报告，包括哪些方面强、哪些方面弱\n\n### 目的\n为整个自我改进循环提供\"反馈信号\"：模型需要知道自己在哪些方面还有不足，才能有针对性地获取数据、选择数据、优化模型。如果没有评估，模型就会盲目改进，无法判断改进是否有效。\n\n### 如果不做会怎样\n模型无法判断自己是否真的在进步，可能会在错误的方向上越走越远，或者在某个局部最优停下。\n\n---\n\n## 消融实验分析\n\n论文是一篇综述（survey），主要工作是整理和分类现有方法，而不是提出一个具体的算法。因此**没有传统意义上的\"消融实验\"来验证某个具体模块的贡献**。\n\n但是，论文在各个子章节中引用了大量具体工作的实验结果。综合这些结果，我们可以总结以下几点：\n\n### 哪个组件贡献最大？\n\n从论文的叙述来看，**模型优化（GRO框架）** 是整个自我改进系统的核心引擎。没有这一环，前面的数据获取和选择就只是\"准备教材\"，模型无法真正学到东西。\n\n论文中多次强调的代表性工作（如STaR、SPIN、R-Zero、Self-Rewarding LMs）都属于模型优化阶段。这些工作直接在标准benchmark上验证了自我改进的有效性。\n\n### 哪个组件可有可无？\n\n这个问题比较复杂，因为不同阶段的作用不同：\n\n- **数据获取**：如果完全没有外部数据输入，模型只能靠合成数据。但论文提到合成数据 alone 可能导致\"模型崩溃\"（model collapse），所以完全不做数据获取是不行的。\n- **数据选择**：有实验表明，做了数据选择比不做选择效果更好（如DoReMi、GREATS等方法），但选择策略的差异带来的提升幅度相对有限。\n- **推理优化**：这是\"锦上添花\"的部分。如果计算资源充足，做推理优化肯定更好；但如果资源有限，可以不做。\n\n### 各组件之间是否有协同效应？\n\n论文的核心观点就是**这五个组件必须协同工作**。单独某一部分的改进效果有限：\n\n- 只做数据获取，不做选择和优化 → 模型学不到东西\n- 只做优化，不做数据选择 → 数据效率低\n- 只做训练时优化，不做推理优化 → 复杂任务表现受限\n- 没有自主评估 → 无法判断改进是否有效\n\n论文 Figure 2 明确展示了这是一个\"闭环循环\"，各组件之间有箭头相连，形成一个整体。\n\n### 回扣动机\n\n论文在Introduction中提到的核心痛点是：\n1. 人类数据稀缺、成本高\n2. 人类反馈可能不足以提升已接近人类水平的模型\n\n**数据获取**解决第一个痛点：模型不再完全依赖人类标注数据。\n**模型优化**解决第二个痛点：模型可以通过自我生成的反馈来提升，而不需要人类监督。\n**推理优化**和**自主评估**是配套的辅助组件，确保整个系统能持续运转。\n\n---\n\n## 这套方法的硬伤在哪里？\n\n根据论文的Limitation部分（主要集中在Section 7和Section 9），最关键的局限性包括：\n\n### 1. 反馈信号的质量问题\n\n论文明确指出（Section 7.2），自我改进系统面临的最大风险是**反馈信号退化**。如果模型对自己的评估不准确，会导致：\n- 模型可能把自己生成的错误答案当作正确答案来学习（reward hacking）\n- 长期来看可能发生\"模型崩溃\"：模型逐渐忘记真正的知识，只记得自己生成的内容\n\n论文引用了Shafayat et al. (2025)的工作，证明虽然多数投票（majority voting）作为自我奖励一开始能提升模型性能，但长期运行必然导致reward hacking和性能崩溃。\n\n### 2. 评估的困难\n\n论文指出（Section 7.1），当模型能力超过人类时，**人类无法判断模型输出的对错**。这意味着：\n- 自主评估模块可能无法获得可靠的\"真值\"来校准自己\n- 模型可能\"自己骗自己\"，表面上在进步，实际上在某些维度上已经退化\n\n### 3. 计算成本\n\n自我改进系统需要在多个阶段反复运行模型（生成、评估、选择、优化），计算成本远高于一次性训练。论文在多个地方提到效率问题，特别是在环境交互和推理优化部分。\n\n---\n\n## 总结\n\n这篇论文的核心价值在于**提供了一个系统性的视角**：把\"模型自我改进\"拆解成五个可独立研究又相互耦合的子问题，并整理了每个子问题下的代表性方法和理论分析。\n\n它告诉我们，真正的自我改进不是一个单一的算法，而是一个需要数据工程、训练策略、推理工程、评估体系共同配合的系统工程。",
                    "additional_insights": "# 论文额外价值内容提取\n\n## 1. 实验中的反直觉发现\n\n- **合成数据可替代大规模网络爬取**：论文指出BeyondWeb和Phi模型家族证明，精心合成的数据可以部分替代大规模网络爬取，以更少的token达到相当或更优的性能（§2.5）。\n- **小数据预算下合成数据导致模型崩溃**：Lei等(2025)表明，在小的数据预算下，仅使用书籍风格的合成数据会出现模型崩溃模式，而将约30%的重述合成数据与自然网络文本混合可加速收敛5-10倍而不降级（§2.5）。\n- **预训练阶段前置推理数据收益显著**：Akter等(2025)的证据表明，在预训练中前置推理密集型数据可带来19%的下游基准平均增益（§2.5）。\n\n## 2. 有启发性的分析或消融\n\n- **GRO框架的理论分析**：论文提出自改进过程本质上是一种\"Sharpening\"机制，即从分布尾部重新分配概率质量到模型潜在空间中已存在的高质量输出（§4.4）。\n- **Generation-Verification Gap关键条件**：Song等(2025a)证明，模型的判别能力必须严格超过其生成能力，才能提供有效的监督信号——这是自改进可行的关键条件（§4.4）。\n- **长期自训练的必然崩溃**：Shafayat等(2025)通过经验和分析发现，尽管基于多数投票的自我奖励最初能同时提升模型性能及其监督质量，但长期自训练不可避免地导致reward hacking和突然的性能崩溃（§4.4）。\n\n## 3. 对领域的新认知\n\n- **自改进的两种本质属性**：论文定义了自改进的两个本质属性——Autonomy（自主性，学习循环一旦部署完全自动化）和Continuity（连续性，迭代自我强化过程）（§1）。\n- **数据选择策略需随训练阶段演变**：论文指出预训练阶段静态策展和一次性评分占主导（因规模、吞吐量、稳定性的约束），而后训练阶段因有更丰富的反馈（奖励模型、验证器、偏好信号），迭代重评分和自适应选择更实用（§3.4）。\n- **从模型中心到智能体中心的优化趋势**：论文观察到随着自改进系统成熟，改进单元不再是单一模型，而是包含提示、记忆、工具和工作流的整个智能体系统（§4.5）。\n\n## 4. 实用的经验性结论\n\n- **混合路径最优**：论文指出最强的训练管道结合所有三种数据获取途径（静态策展、环境交互、合成生成），而非依赖单一路径（§2.5）。\n- **自适应选择的计算权衡**：论文承认自适应选择虽能优化长期目标，但引入了对噪声/漂移反馈的敏感性、延迟的信用分配和额外系统开销的权衡（§3.4）。\n- **结果奖励比过程奖励更通用**：论文指出结果奖励因简单、低标注成本和易集成，比过程奖励更具通用性和实用性（§4.6.1）。\n\n## 5. 局限性中的机会\n\n- **反馈设计是核心瓶颈**：论文明确指出反馈设计是持续自改进的中心瓶颈——长期自训练会导致reward hacking和崩溃（§4.4）。\n- **缺乏自我导向选择**：论文承认当前自适应选择方法都依赖独立的选择器模块，没有方法让主模型同时充当选择者和学习者——这是自我改进系统中最强自主形式的未探索方向（§3.3.3）。\n- **自我指涉架构的探索空间**：论文提到Gödel Agent和Darwin Gödel Machine探索了自我指涉架构，使智能体能够递归检查和修改自身逻辑以实现开放进化——这是递归自我修改的有价值方向（§4.5）。",
                    "summary_translation": "随着大型语言模型（LLMs）的不断发展，仅依靠人工监督来改进模型的做法正变得日益昂贵且难以扩展。当模型在某些领域接近人类水平的能力时，人工反馈可能无法再提供足够有信息量的信号来进一步推动模型改进。与此同时，模型自主决策和执行复杂任务的能力不断增强，这自然使得模型开发过程中的各个组件能够逐步实现自动化。这些挑战与机遇共同推动了对自我改进（self-improvement）研究的日益增长，即模型自主生成数据、评估输出并迭代提升自身能力。在本文中，我们提出了自我改进语言模型的系统级视角，并引入了一个统一框架来梳理现有技术。我们将自我改进系统概念化为一个闭环生命周期（closed-loop lifecycle），由四个紧密耦合的进程组成：数据获取（data acquisition）、数据选择（data selection）、模型优化（model optimization）和推理精炼（inference refinement），此外还有一个自主评估层（autonomous evaluation layer）。在这个框架内，模型本身在驱动各个阶段发挥核心作用：收集或生成数据、选择有信息量的信号、更新自身参数、以及精炼输出结果；而自主评估层则持续监控进展并指导跨阶段的改进循环。基于这一生命周期视角，我们从技术角度系统地回顾并分析了各组件的代表性方法。我们进一步讨论了当前局限性，并展望了未来实现完全自我改进LLMs的研究愿景。"
                },

                    "title": "Belief-Driven Multi-Agent Collaboration via Approximate Perfect Bayesian Equilibrium for Social Simulation",
                    "arxiv_id": "2603.24973",

                    "summary": "High-fidelity social simulation is pivotal for addressing complex Web societal challenges, yet it demands agents capable of authentically replicating the dynamic spectrum of human interaction. Current LLM-based multi-agent frameworks, however, predominantly adhere to static interaction topologies, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios. This rigidity often leads to unrealistic ``groupthink'' or unproductive deadlocks, undermining the credibility of simulations for decision support. To bridge this gap, we propose \\textit{BEACOF}, a \\textit{belief-driven adaptive collaboration framework} inspired by Perfect Bayesian Equilibrium (PBE). By modeling social interaction as a dynamic game of incomplete information, BEACOF rigorously addresses the circular dependency between collaboration type selection and capability estimation. Agents iteratively refine probabilistic beliefs about peer capabilities and autonomously modulate their collaboration strategy, thereby ensuring sequentially rational decisions under uncertainty. Validated across adversarial (judicial), open-ended (social) and mixed (medical) scenarios, BEACOF prevents coordination failures and fosters robust convergence toward high-quality solutions, demonstrating superior potential for reliable social simulation. Source codes and datasets are publicly released at: https://github.com/WUT-IDEA/BEACOF.",

                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是**构建多智能体系统的协作框架**。论文提出了BEACOF（Belief-driven Adaptive Collaboration Framework），核心贡献在于解决多智能体系统中协作策略选择的动态博弈问题，而非将现有智能体应用于特定领域。 **第二步：正面指标分析** 论文明确包含以下核心关注点： - **多智能体系统 (Multi-Agent Systems)**: 论文专门研究多个LLM智能体之间的协作机制 - **协作与通信**: 智能体通过迭代完善对同伴能力的概率信念，自主调节协作策略 - **动态博弈**: 将社会交互建模为不完全信息的动态游戏，使用Perfect Bayesian Equilibrium (PBE)来解决协作类型选择和能力估计之间的循环依赖 - **适应性**: 智能体能够根据环境动态调整合作/竞争策略 **第三步：排除标准检查** - 不涉及安全、对齐、可解释性等研究 - 不涉及多模态、视觉、VLMs - 不涉及知识图谱、GNN等图技术 **第四步：特殊情况的处理** 这篇论文不属于\"将智能体应用于特定领域\"的情况。虽然验证场景包括司法、社会和医疗，但这些只是**验证框架的测试环境**，而非论文的核心贡献。论文的核心贡献是提出通用的多智能体协作框架BEACOF本身，这是一种方法论贡献。 **结论** 该论文完全符合研究范围：其核心贡献是构建和改进LLM多智能体系统的协作机制，属于\"多智能体\"方向的研究，符合筛选标准中的\"保留\"类别。",
                    "intro_logic": "Based on the introduction section of this paper, here is the ordered list of the problem introduction logic:\n\n1. High-fidelity social simulation is important for addressing complex Web societal challenges, but it demands agents capable of authentically replicating the dynamic spectrum of human interaction.\n\n2. Current LLM-based multi-agent frameworks predominantly adhere to static interaction topologies, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios.\n\n3. This rigidity often leads to unrealistic \"groupthink\" or unproductive deadlocks, undermining the credibility of simulations for decision support.\n\n4. Exclusively cooperative models risk \"groupthink\" and error amplification, while strictly competitive approaches often succumb to unproductive deadlocks.\n\n5. Heuristic or rule-based methods attempt to bridge this gap but lack the granularity to adaptively optimize strategies based on evolving states.\n\n6. A fundamental challenge exists: strategic decision-making under incomplete information, specifically how agents can make rational collaboration decisions when peer capabilities are unobservable and must be inferred from noisy interaction signals.\n\n7. There is a circular dependency problem: collaboration type selection depends on belief estimates of peer capabilities, yet belief updates are themselves influenced by the chosen collaboration mode.\n\n8. Without principled coordination mechanisms, this interdependence can lead to erratic oscillations between strategies or premature convergence to suboptimal equilibria.\n\n**Research Question:** How can multi-agent systems dynamically and rationally adapt their collaboration strategies (cooperation, competition, or coopetition) based on beliefs about peer capabilities to achieve high-quality outcomes in social simulation?",
                    "core_insight": "# Analysis of the Paper's Problem Identification and Methodology Journey\n\n## 1. The Identified Pain Point / \"Lens\"\n\nThe paper's starting point centers on a fundamental limitation in existing LLM-based multi-agent systems for social simulation: **the rigidity of interaction topologies**. The authors observed that current frameworks cannot authentically replicate the dynamic, fluid nature of real human interactions, which naturally oscillate between cooperation and competition.\n\n### Key Evidence from the Paper:\n\nFrom the **Abstract**:\n> \"Current LLM-based multi-agent frameworks, however, predominantly adhere to static interaction topologies, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios. This rigidity often leads to unrealistic 'groupthink' or unproductive deadlocks, undermining the credibility of simulations for decision support.\"\n\nFrom the **Introduction** (Section 1):\n> \"Authentic societal interactions—whether in a courtroom debate, a medical consultation, or an open social dialogue—are rarely static; they fluctuate dynamically between cooperative knowledge synthesis and competitive critical reasoning.\"\n\nThe authors further elaborated on the consequences of this rigidity:\n> \"Exclusively cooperative models (e.g., CAMEL [21], MetaGPT [16]) risk 'groupthink' and error amplification [3], while strictly competitive approaches (e.g., MAD [24]) often succumb to unproductive deadlocks [7, 40].\"\n\n### The Core Problem Identified:\n\nThe paper identifies a **circular dependency problem** as the fundamental challenge:\n> \"Adaptive switching introduces a circular dependency problem: collaboration type selection depends on belief estimates of peer capabilities, yet belief updates are themselves influenced by the chosen collaboration mode. Without principled coordination mechanisms, this interdependence can lead to erratic oscillations between strategies or premature convergence to suboptimal equilibria.\"\n\nThis represents the \"lens\" through which the authors approached the problem—treating multi-agent collaboration as a **dynamic game of incomplete information** where agents must make rational decisions under uncertainty about their peers' capabilities.\n\n---\n\n## 2. The Methodology Journey: Challenges and Resolutions\n\n### 2.1 Initial Challenge: Computational Intractability\n\nThe authors aimed to apply **Perfect Bayesian Equilibrium (PBE)** theory to ensure sequential rationality. However, they encountered a significant obstacle:\n\n> \"Strictly enforcing PBE consistency is computationally intractable in high-dimensional continuous type spaces [36, 38].\"\n\n**Resolution:** The authors proposed a **tractable approximation** rooted in bounded rationality:\n> \"To address this, we propose a tractable approximation rooted in bounded rationality [52] that relaxes strict requirements: we substitute exact integration with LLM-based reasoning for Sequential Rationality (Sec. 4.2.1) and employ a parametric Gaussian assumption for Belief Consistency (Sec. 4.2.2).\"\n\n### 2.2 Challenge: Belief Stabilization and Convergence\n\nWithout theoretical guarantees, the belief update mechanism risked inducing cyclic or divergent behaviors, making the early stopping criterion unreachable.\n\n**Resolution:** The authors provided theoretical analysis (Proposition 4.1) proving **bounded convergence of belief estimates**:\n> \"As t → ∞, the belief dynamics exhibit Effective Memory Stabilization, where the accumulated precision ω_t converges to a steady state... Consequently, the system achieves Mean-Square Stability, ensuring that the belief estimate b_t does not diverge but converges to a neighborhood of the true parameter.\"\n\n### 2.3 Challenge: Balancing Exploration and Efficiency\n\nThe authors needed to balance strategy exploration with computational efficiency.\n\n**Resolution:** They implemented an **early stopping criterion based on belief stabilization**:\n> \"Intuitively, when an agent's estimated capabilities of peers converge to a steady state, additional interaction rounds yield diminishing returns for strategic adaptation.\"\n\n### 2.4 New Problems That Arose\n\nThe methodology revealed additional challenges during implementation:\n\n1. **Non-stationary agent behaviors**: The authors noted that agent behaviors may shift over time, requiring adaptation:\n   > \"To account for non-stationary agent behaviors, we introduce a forgetting factor λ ∈ (0, 1] that artificially inflates the posterior variance (reduces precision) at each step.\"\n\n2. **Model scale dependency**: The authors observed that larger models exploit the belief mechanism more effectively:\n   > \"While smaller models benefit generally, Qwen3-30B exhibits sharper strategic pivots... This suggests that the computational benefits of our game-theoretic framework are amplified by the stronger reasoning capabilities of larger models.\"\n\n---\n\n## 3. Summary of the Problem-Solving Journey\n\n| Stage | Challenge | Resolution |\n|-------|-----------|------------|\n| **Problem Identification** | Static interaction topologies fail to capture dynamic human collaboration | Model collaboration as dynamic game with adaptive strategy switching |\n| **Theoretical Foundation** | Circular dependency between belief updates and strategy selection | Apply Perfect Bayesian Equilibrium (PBE) framework |\n| **Computational Tractability** | Exact PBE is intractable in high-dimensional spaces | Approximate with LLM-based reasoning + Gaussian belief assumptions |\n| **Convergence Guarantees** | Risk of erratic oscillations or divergence | Theoretical proof of bounded convergence with forgetting factor |\n| **Practical Implementation** | Need for computational efficiency | Early stopping criterion based on belief stabilization |\n\nThe paper's journey demonstrates a systematic approach: identifying a practical limitation in existing systems, grounding the solution in game-theoretic principles, adapting theoretical solutions to practical constraints, and validating through extensive experimentation across diverse scenarios.",
                    "methodology": "# 论文解读：Belief-Driven Multi-Agent Collaboration\n\n## 一句话概括核心创新\n\n这篇论文最本质的创新是：**让每个智能体维护一个\"信念\"，即对自己队友能力的估计，然后根据这个信念动态决定这一轮是合作还是竞争，而不是事先固定一个协作模式。**\n\n---\n\n## 按执行逻辑顺序拆解\n\n整个系统（BEACOF）运行流程如下：\n\n### 第一步：初始化\n\n**输入**：任务描述、智能体角色列表\n\n**操作**：\n- 创建 Meta-Agent（中央协调者）\n- 为每个参与智能体分配角色（如\"原告律师\"、\"被告律师\"）\n- 初始化所有智能体对其他智能体的\"信念\"——设为0.5（不确定）\n\n**输出**：初始状态\n\n**目的**：建立多智能体协作的框架基础\n\n---\n\n### 第二步：Meta-Agent 生成收益矩阵\n\n**输入**：当前对话历史、任务描述\n\n**操作**：\n- Meta-Agent 分析当前局势\n- 估计如果每个智能体选择\"合作\"、\"竞争\"、\"合作竞争混合\"三种策略中的哪一种，能获得多少\"收益\"（0-10分）\n\n**输出**：每个智能体-策略组合的预期收益值\n\n**目的**：为后续智能体决策提供参考信息\n\n---\n\n### 第三步：智能体选择策略并生成回复\n\n**输入**：Meta-Agent 给的收益矩阵、当前对话历史、自己的角色\n\n**操作**：\n- 每个智能体根据当前信念（对队友能力的估计）和收益矩阵，计算哪种策略最划算\n- 选择策略后，按照该策略的风格生成回复\n  - 合作：同意对方观点，补充信息\n  - 竞争：质疑对方观点，找错误\n  - 合作竞争混合：部分同意但指出问题\n\n**输出**：每个智能体的回复\n\n**目的**：让智能体能够根据实际情况灵活选择协作方式\n\n---\n\n### 第四步：Meta-Agent 评估并更新信念\n\n**输入**：智能体生成的回复\n\n**操作**：\n- Meta-Agent 评估每个回复的质量（打分）\n- 所有其他智能体根据这个评估更新\"对这位智能体能力的信念\"\n- 信念更新公式：新信念 = 旧信念 + 新评估（带权重）\n\n**输出**：更新后的信念值\n\n**目的**：让智能体逐渐了解队友的真实能力，为下一轮决策提供依据\n\n---\n\n### 第五步：检查是否收敛\n\n**输入**：所有智能体的信念变化量\n\n**操作**：\n- 计算信念变化了多少\n- 如果连续几轮变化都很小，或者达到最大轮数，停止交互\n\n**目的**：避免无限循环，提高效率\n\n---\n\n## 消融实验分析\n\n论文做了两组消融实验：\n\n### 去掉信念更新（w/o Belief）\n\n**结果**：性能大幅下降\n- 法庭辩论 F1：从 16.87% 降到 10.58%（下降约37%）\n- 角色聊天多样性：从 36.85 降到 32.48\n\n**结论**：信念更新机制至关重要。没有它，智能体无法了解队友能力，做出的策略选择往往是盲目的。\n\n### 固定策略类型（w/o Type）\n\n**结果**：性能下降\n- 角色聊天多样性下降\n\n**结论**：动态切换策略类型很重要。固定为合作或固定为竞争都无法适应不同场景的需求。\n\n### 协同效应\n\n论文没有明确做组合实验，但从结果看：\n- 信念更新 + 动态策略 = 最佳效果\n- 两者单独使用都有缺陷，组合起来才能实现\"既知道队友几斤几两，又能灵活应对\"\n\n---\n\n## 这套方法的硬伤\n\n### 1. 依赖 Meta-Agent 的评估质量\n\n整个系统依赖 Meta-Agent 来评估每个智能体的回复质量并生成收益矩阵。如果 Meta-Agent 评估错了（比如把一个好的回复评为差），就会导致：\n- 信念更新方向错误\n- 智能体选择错误策略\n- 最终效果崩溃\n\n论文没有深入分析 Meta-Agent 评估失败的情况。\n\n### 2. 收敛条件可能过于理想\n\n系统假设智能体的\"能力\"是静态的（不会随时间变化），但现实中：\n- 智能体可能因为疲劳、上下文遗忘而表现波动\n- 引入的\"遗忘因子\"λ 是手动设定的，没有自适应机制\n\n### 3. 计算开销增加\n\n相比静态方法，每个回合多了：\n- Meta-Agent 评估步骤\n- 信念更新计算\n- 智能体内部的策略选择推理\n\n论文没有给出详细的计算时间对比。\n\n---\n\n## 总结\n\n这篇论文的核心思路很直接：**与其让人类预先设定智能体该怎么协作，不如让智能体自己通过观察队友表现来推断队友能力，然后根据推断结果决定这一轮是合作还是竞争。**\n\n这个思路的合理性在于：现实中的团队协作本来就是动态的——当你发现队友很靠谱时，你会更愿意合作；当你发现队友经常出错时，你会更倾向于质疑和竞争。\n\n论文的贡献是把这个直觉用\"近似完美贝叶斯均衡\"的数学框架形式化了，并给出了可操作的算法。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **纯竞争方法在合作场景中彻底失败**：MAD在MedQA上仅31.17%准确率（vs. BEACOF的84.67%），证明强制对抗无法处理需要知识综合的任务。\n- **多样性与一致性可以兼得**：BEACOF在Persona Chat中同时达到最高Diversity（41.52）和最低Contradiction（13.30%），打破\"增加多样性必增矛盾\"的直觉。\n- **大模型更能发挥信念机制优势**：Qwen3-30B上BEACOF的Consistency提升幅度（86.70% vs. MAD的73.96%）远大于小模型，说明强推理能力是信念驱动策略的放大器。\n\n## 2. 有启发性的分析或 ablation\n\n- **信念更新是战略场景的核心**：移除belief updates使Court Debate F1下降37%（16.87→10.58），证明不了解对手能力会导致策略失效。\n- **类型切换与信念更新互补**：单独移除任一组件均导致显著性能下降，二者存在协同效应。\n- **均衡近似效果验证**：平均regret低于0.5（最优性gap<5%），说明LLM可有效近似PBE决策。\n\n## 3. 对领域的新认知\n\n- **静态交互范式的根本缺陷**：纯合作陷入groupthink，纯竞争导致deadlock，需动态\"竞合\"（coopetition）模拟真实社会动态。\n- **信念收敛可作为交互终止信号**：当agent对彼此能力的估计稳定时，系统趋于均衡，无需预设固定轮数。\n\n## 4. 实用的经验性结论\n\n- **遗忘因子λ=0.6** 平衡历史信息与新观测的权重，避免信念过度受近期交互影响。\n- **早停阈值ε_change=0.05 + patience=3** 有效平衡收敛速度与计算成本。\n- **最大交互轮数T_max=4** 足以覆盖大多数场景的策略适应过程。\n\n## 5. 局限性中的机会\n\n- **策略空间仅覆盖三种类型**：未来可扩展至更细粒度的策略维度（如半合作、半对抗）。\n- **假设智能体能力静态**：实际场景中能力可能随学习演进，需研究非平稳信念更新。\n- **仅验证三元交互**：多智能体联盟形成、层级协作等更复杂拓扑待探索。",
                    "summary_translation": "高保真社会模拟对于应对复杂的网络社会挑战至关重要，然而这要求智能体能够真实地复制人类互动的动态频谱。然而，当前基于大语言模型（LLM）的多智能体框架主要遵循静态交互拓扑结构，无法捕捉现实世界中合作性知识综合与竞争性批判推理之间的动态振荡。这种刚性往往导致不切实际的“群体思维”或无果而终的僵局，削弱了模拟对决策支持的可靠性。为弥补这一差距，我们提出了**BEACOF**，一个受完美贝叶斯均衡（Perfect Bayesian Equilibrium, PBE）启发的**信念驱动的自适应协作框架**。通过将社会互动建模为不完全信息的动态博弈，BEACOF严谨地解决了协作类型选择与能力估计之间的循环依赖问题。智能体迭代地精炼关于同伴能力的概率信念，并自主调节其协作策略，从而确保在不确定性下做出序列理性决策。在对抗性（司法）、开放性（社交）和混合性（医疗）场景中进行验证，BEACOF有效防止了协调失败，并促进了向高质量解决方案的稳健收敛，展示了其在可靠社会模拟方面的卓越潜力。源代码和数据集已公开发布于：https://github.com/WUT-IDEA/BEACOF。"

                    "summary_translation": "由基于提示词的大语言模型构建的 Multi-agent systems (多智能体系统) 能够提升 multi-round reasoning (多轮推理) 能力，然而大多数现有的 pipelines (流程) 依赖于固定的、trajectory-wide (全轨迹) 通信模式，这与 iterative problem solving (迭代式问题求解) 的 stage-dependent (阶段依赖) 需求难以匹配。我们提出了 DyTopo，这是一个 manager-guided (管理者引导) 的 multi-agent framework (多智能体框架)，能够在每一轮重构一个 sparse directed communication graph (稀疏有向通信图)。基于 manager's round goal (管理者的本轮目标)，每个 agent (智能体) 输出 lightweight natural-language query (need) (轻量级自然语言查询/需求) 和 key (offer) (关键/供给) descriptors (描述符)；DyTopo 对这些 descriptors (描述符) 进行 embed (嵌入) 并执行 semantic matching (语义匹配)，仅沿着 induced edges (诱导边) 路由 private messages (私有消息)。在 code generation (代码生成) 和 mathematical reasoning (数学推理) benchmarks (基准测试) 以及四种 LLM backbones (大语言模型骨干网络) 上，DyTopo 的表现始终优于 strongest baseline (最强基线)（平均提升 +6.2）。除了 accuracy (准确性) 之外，DyTopo 还通过 evolving graphs (演化图) 生成了 interpretable coordination trace (可解释的协调轨迹)，从而能够对 communication pathways (通信路径) 如何在各轮之间 reconfigure (重新配置) 进行 qualitative inspection (定性分析)。"

                    "summary": "Graphical User Interface (GUI) agent is pivotal to advancing intelligent human-computer interaction paradigms. Constructing powerful GUI agents necessitates the large-scale annotation of high-quality user-behavior trajectory data (i.e., intent-trajectory pairs) for training. However, manual annotation methods and current GUI agent data mining approaches typically face three critical challenges: high construction cost, poor data quality, and low data richness. To address these issues, we propose M$^2$-Miner, the first low-cost and automated mobile GUI agent data-mining framework based on Monte Carlo Tree Search (MCTS). For better data mining efficiency and quality, we present a collaborative multi-agent framework, comprising InferAgent, OrchestraAgent, and JudgeAgent for guidance, acceleration, and evaluation. To further enhance the efficiency of mining and enrich intent diversity, we design an intent recycling strategy to extract extra valuable interaction trajectories. Additionally, a progressive model-in-the-loop training strategy is introduced to improve the success rate of data mining. Extensive experiments have demonstrated that the GUI agent fine-tuned using our mined data achieves state-of-the-art performance on several commonly used mobile GUI benchmarks. Our work will be released to facilitate the community research.",

                    "summary": "Joint planning through language-based interactions is a key area of human-AI teaming. Planning problems in the open world often involve various aspects of incomplete information and unknowns, e.g., objects involved, human goals/intents -- thus leading to knowledge gaps in joint planning. We consider the problem of discovering optimal interaction strategies for AI agents to actively elicit human inputs in object-driven planning. To this end, we propose Minimal Information Neuro-Symbolic Tree (MINT) to reason about the impact of knowledge gaps and leverage self-play with MINT to optimize the AI agent's elicitation strategies and queries. More precisely, MINT builds a symbolic tree by making propositions of possible human-AI interactions and by consulting a neural planning policy to estimate the uncertainty in planning outcomes caused by remaining knowledge gaps. Finally, we leverage LLM to search and summarize MINT's reasoning process and curate a set of queries to optimally elicit human inputs for best planning performance. By considering a family of extended Markov decision processes with knowledge gaps, we analyze the return guarantee for a given MINT with active human elicitation. Our evaluation on three benchmarks involving unseen/unknown objects of increasing realism shows that MINT-based planning attains near-expert returns by issuing a limited number of questions per task while achieving significantly improved rewards and success rates.",

                    "summary": "Training-time privileged information (PI) can enable language models to succeed on tasks they would otherwise fail, making it a powerful tool for reinforcement learning in hard, long-horizon settings. However, transferring capabilities learned with PI to policies that must act without it at inference time remains a fundamental challenge. We study this problem in the context of distilling frontier models for multi-turn agentic environments, where closed-source systems typically hide their internal reasoning and expose only action trajectories. This breaks standard distillation pipelines, since successful behavior is observable but the reasoning process is not. For this, we introduce π-Distill, a joint teacher-student objective that trains a PI-conditioned teacher and an unconditioned student simultaneously using the same model. Additionally, we also introduce On-Policy Self-Distillation (OPSD), an alternative approach that trains using Reinforcement Learning (RL) with a reverse KL-penalty between the student and the PI-conditioned teacher. We show that both of these algorithms effectively distill frontier agents using action-only PI. Specifically we find that π-Distill and in some cases OPSD, outperform industry standard practices (Supervised finetuning followed by RL) that assume access to full Chain-of-Thought supervision across multiple agentic benchmarks, models, and forms of PI. We complement our results with extensive analysis that characterizes the factors enabling effective learning with PI, focusing primarily on π-Distill and characterizing when OPSD is competitive.",

                    "summary": "Embodied agents operating in multi-agent, partially observable, and decentralized environments must plan and act despite pervasive uncertainty about hidden objects and collaborators' intentions. Recent advances in applying Large Language Models (LLMs) to embodied agents have addressed many long-standing challenges, such as high-level goal decomposition and online adaptation. Yet, uncertainty is still primarily mitigated through frequent inter-agent communication. This incurs substantial token and time costs, and can disrupt established workflows, when human partners are involved. We introduce PCE, a Planner-Composer-Evaluator framework that converts the fragmented assumptions latent in LLM reasoning traces into a structured decision tree. Internal nodes encode environment assumptions and leaves map to actions; each path is then scored by scenario likelihood, goal-directed gain, and execution cost to guide rational action selection without heavy communication. Across two challenging multi-agent benchmarks (C-WAH and TDW-MAT) and three diverse LLM backbones, PCE consistently outperforms communication-centric baselines in success rate and task efficiency while showing comparable token usage. Ablation results indicate that the performance gains obtained by scaling model capacity or reasoning depth persist even when PCE is applied, while PCE consistently raises the baseline across both capacity and reasoning-depth scales, confirming that structured uncertainty handling complements both forms of scaling. A user study further demonstrates that PCE produces communication patterns that human partners perceive as more efficient and trustworthy. Together, these results establish a principled route for turning latent LLM assumptions into reliable strategies for uncertainty-aware planning.",

                    "summary_translation": "真正的自我进化要求智能体作为终身学习者，将新颖经验内化以解决未来的问题。然而，严格测量这一基础能力受限于两个障碍：先验知识的纠缠，即“新”知识可能出现在预训练数据中；以及推理复杂度的纠缠，即失败可能源于问题难度，而非无法回忆已学知识。我们提出了SE-Bench，这是一个诊断环境，它将NumPy库及其API doc（API文档，应用程序接口文档）混淆为一个具有随机标识符的伪新颖包。智能体被训练以内化该包，并在无法访问文档的简单编码任务上接受评估，从而构建了一个纯净的设置：在该设置下，拥有新API doc时任务轻而易举，但对于缺乏该文档的基础模型而言则无法完成。我们的研究揭示了三个见解：(1) Open-Book Paradox（开卷悖论），即使用参考文档进行训练会抑制记忆，需要通过“Closed-Book Training”（闭卷训练）强制将知识压缩到权重中；(2) RL Gap（强化学习差距），即由于PPO（Proximal Policy Optimization，近端策略优化）裁剪和负梯度的存在，标准RL（Reinforcement Learning，强化学习）无法完全内化新知识；(3) Self-Play（自我对弈）在内化中的可行性，证明了模型在结合SFT（Supervised Fine-Tuning，监督微调）而非RL时，能够从自生成的、有噪声的任务中学习。综上所述，SE-Bench建立了一个严格的诊断平台，用于评估基于知识内化的自我进化能力。我们的代码和数据集可在 https://github.com/thunlp/SE-Bench 获取。"

                    "summary": "Multi-agent systems (MAS) have emerged as a prominent paradigm for leveraging large language models (LLMs) to tackle complex tasks. However, the mechanisms governing the effectiveness of MAS built upon publicly available LLMs, specifically the underlying rationales for their success or failure, remain largely unexplored. In this paper, we revisit MAS through the perspective of uncertainty, considering both intra- and inter-agent dynamics by investigating entropy transitions during problem-solving across various topologies and six benchmark tasks. By analyzing 245 features spanning token-, trajectory-, and round-level entropy, we counterintuitively find that a single agent outperforms MAS in approximately 43.3% of cases, and that uncertainty dynamics are largely determined during the first round of interaction. Furthermore, we provide three key observations: 1) Certainty Preference: reducing uncertainty at any stage for any agent is critical for guaranteeing correct solutions; 2) Base Uncertainty: base models with lower entropy during problem-solving directly benefit MAS performance; and 3) Task Awareness: entropy dynamics of MAS play varying roles across different tasks. Building on these insights, we introduce a simple yet effective algorithm, the Entropy Judger, to select solutions from MAS's pass@k results, leading to consistent accuracy improvements across all MAS configurations and tasks. Our source code is available at https://github.com/AgenticFinLab/multiagent-entropy.",

                    "summary_translation": "多智能体系统已成为利用大语言模型解决复杂任务的主要范式。然而，基于公开可用的大语言模型构建的多智能体系统，其有效性的潜在机制——特别是其成功或失败的底层原理——在很大程度上仍未被探索。在本文中，我们从不确定性的视角重新审视多智能体系统，通过研究在各种拓扑结构和六个基准任务中解决问题过程中的熵转换，考察了智能体内部及智能体间的动态变化。通过分析涵盖 token（词元）、trajectory（轨迹）和 round（轮次）级别熵的 245 个特征，我们得出了一个反直觉的发现：在约 43.3% 的情况下，单个智能体的表现优于多智能体系统；且不确定性动态在很大程度上在第一轮交互期间就已确定。此外，我们提出了三个关键观察：1) 确定性偏好：在任何阶段降低任何智能体的不确定性对于确保获得正确解至关重要；2) 基础不确定性：在解决问题过程中具有较低熵的基础模型能直接提升多智能体系统的性能；3) 任务感知：多智能体系统的熵动态在不同任务中发挥着不同的作用。基于这些见解，我们引入了一种简单而有效的算法——熵判别器，用于从多智能体系统的 pass@k 结果中筛选解决方案，从而在所有多智能体系统配置和任务中实现了准确性的持续提升。我们的源代码可在 https://github.com/AgenticFinLab/multiagent-entropy 获取。"

    "2026-03-26": "<think>Let me analyze these papers and create a comprehensive daily AI paper overview.\n\nLooking at the papers:\n\n1. **SEVerA: Verified Synthesis of Self-Evolving Agents** (2603.25111) - Self-evolving LLM agents with formal verification guarantees. Uses Formally Guarded Generative Models (FGGM) to ensure safety/correctness.\n\n2. **Training LLMs for Multi-Step Tool Orchestration** (2603.24709) - Multi-step tool orchestration with constrained data synthesis and graduated rewards. Uses real API responses and decomposes correctness into atomic validity and orchestration.\n\n3. **Experiential Reflective Learning for Self-Improving LLM Agents** (2603.24639) - ERL framework that reflects on task trajectories to generate transferable heuristics. Improves success rate by 7.8% on Gaia2.\n\n4. **Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills** (2603.25158) - Framework for extracting skills from execution experience. Skills transfer across LLM scales and generalize to OOD settings.\n\n5. **Supervising Ralph Wiggum** (2603.24768) - Metacognitive Co-Regulation Agent (CRDAL) for engineering design. Mitigates design fixation.\n\n6. **The Kitchen Loop** (2603.25697) - Framework for autonomous, self-evolving software with specification surface, synthetic testing, and drift control.\n\n7. **CRAFT: Grounded Multi-Agent Coordination** (2603.25268) - Multi-agent benchmark for pragmatic communication under partial information. Finds that reasoning ability doesn't reliably translate to coordination.\n\n8. **From Logic Monopoly to Social Contract** (2603.25100) - Agent Enterprise for Enterprise (AE4E) paradigm with Separation of Power for autonomous agent economies.\n \nI'm examining two additional papers exploring advanced AI learning and collaboration techniques. The first paper provides a comprehensive overview of self-improving language models, presenting a systematic framework for autonomous model enhancement. The second introduces BEACOF, an innovative approach to multi-agent collaboration using belief-driven adaptive strategies inspired by Perfect Bayesian Equilibrium principles. These papers highlight emerging trends in AI learning, focusing on self-referential improvement and dynamic collaborative frameworks.\n\nThe emerging themes reveal a sophisticated landscape of AI development:\n- Autonomous agent systems are becoming more self-directed\n- Verification and safety mechanisms are critical\n- Multi-agent interactions require nuanced coordination\n- Learning approaches are evolving toward more adaptive, reflective techniques\n\nThe research landscape suggests AI systems are progressively developing more complex, self-regenerative capabilities that mirror human cognitive processes.\n</think>\n\n### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-26)\n\n### \u4e00\u3001\u5f00\u7bc7\u5bfc\u8bed\n\n\u4eca\u65e5\u7684AI\u7814\u7a76\u5448\u73b0\u51fa\u4e24\u6761\u6e05\u6670\u7684\u4e3b\u7ebf\uff1a\u4e00\u662f**\u81ea\u4e3b\u667a\u80fd\u4f53(Agent)\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u5b89\u5168\u4fdd\u969c**\u6210\u4e3a\u7126\u70b9\uff0c\u591a\u4e2a\u56e2\u961f\u4ece\u4e0d\u540c\u89d2\u5ea6\u63a2\u7d22\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u5728\u6267\u884c\u590d\u6742\u4efb\u52a1\u65f6\u5b9e\u73b0\u81ea\u6211\u6539\u8fdb\u3001\u5f62\u5f0f\u5316\u9a8c\u8bc1\u548c\u53ef\u9760\u7684\u5de5\u5177\u8c03\u7528\uff1b\u4e8c\u662f**\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u5236\u5ea6\u8bbe\u8ba1**\u9886\u57df\u8fce\u6765\u6df1\u5ea6\u7684\u7406\u8bba\u53cd\u601d\uff0c\u4ece\u901a\u4fe1\u534f\u8bae\u5230\u793e\u4f1a\u5951\u7ea6\u5c42\u9762\u91cd\u65b0\u601d\u8003\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u6cbb\u7406\u67b6\u6784\u3002\u4e0e\u6b64\u540c\u65f6\uff0c\u63a8\u7406\u80fd\u529b\u7684\u63d0\u5347\u5e76\u672a\u81ea\u52a8\u8f6c\u5316\u4e3a\u534f\u4f5c\u80fd\u529b\u7684\u589e\u5f3a\uff0c\u8fd9\u4e00\u53d1\u73b0\u5bf9\u5f53\u524d\u201c\u5f3a\u63a8\u7406\u5373\u5f3a\u534f\u4f5c\u201d\u7684\u5047\u8bbe\u c4\u6a21\u771f\u5b9eAPI\u54cd\u5e94\u7f13\u5b58\u7684\u6570\u636e\u5408\u6210\u7ba1\u9053\uff0c\u5e76\u8bbe\u8ba1\u4e86**\u6e10\u8fdb\u5f0f\u5956\u52b1\u673a\u5236**\uff1a\u5c06\u6b63\u786e\u6027\u5206\u89e3\u4e3a\u539f\u5b50\u6709\u6548\u6027\uff08\u9012\u589e\u7c92\u5ea6\u7684\u5355\u6b65\u51fd\u6570\u8c03\u7528\u6b63\u786e\u6027\uff09\u548c\u7f16\u6392\u6b63\u786e\u6027\uff08\u5de5\u5177\u5e8f\u5217\u4e0e\u4f9d\u8d56\u5173\u7cfb\uff09\u3002\u5728ComplexFuncBench\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u56de\u5408\u51c6\u786e\u7387\uff0c\u6d88\u878d\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u4e24\u7c7b\u5956\u52b1\u7684\u5fc5\u8981\u6027\u3002(2603.24709 [cs.LG])\n\n- **Experiential Reflective Learning for Self-Improving LLM Agents** \u2014 \u63d0\u51fa**Experiential Reflective Learning (ERL)**\u6846\u67b6\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u591f\u901a\u8fc7\u53cd\u601d\u4efb\u52a1\u8f68\u8ff9\u751f\u6210\u53ef\u8fc1\u79fb\u7684\u542f\u53d1\u5f0f\u89c4\u5219\u3002\u5728Gaia2\u57fa\u51c6\u4e0a\u76f8\u6bd4ReAct\u57fa\u7ebf\u63d0\u5347**7.8%\u6210\u529f\u7387**\uff0c\u4e14\u4f18\u4e8e\u5148\u524d\u7ecf\u9a8c\u5b66\u4e60\u65b9\u6cd5\u3002\u9009\u62e9\u6027\u68c0\u7d22\u662f\u5173\u952e\u2014\u2014\u542f\u53d1\u5f0f\u89c4\u5219\u6bd4\u5c11\u6837\u672c\u8f68\u8ff9\u63d0\u793a\u63d0\u4f9b\u66f4\u53ef\u8fc1\u79fb\u7684\u62bd\u8c61\u3002(2603.24639 [cs.LG])\n\n- **Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills** \u2014 \u63d0\u51fa\u4ece\u667a\u80fd\u4f53\u6267\u884c\u7ecf\u9a8c\u4e2d\u63d0\u53d6\u53ef\u590d\u7528\u6280\u80fd\u7684\u6846\u67b6\u3002\u4e0d\u540c\u4e8e\u987a\u5e8f\u5904\u7406\u5355\u6761\u8f68\u8ff9\uff0cTrace2Skill\u5e76\u884c\u8c03\u5ea6\u5b50\u4ee3\u7406\u5206\u6790\u591a\u6837\u5316\u6267\u884c\u6c60\uff0c\u901a\u8fc7\u5f52\u7eb3\u63a8\u7406\u5c06\u8f68\u8ff9\u7279\u5b9a\u6559\u8bad\u5c42\u6b21\u5316\u6574\u5408\u4e3a\u7edf\u4e00\u3001\u65e0\u51b2\u7a81\u7684\u6280\u80fd\u76ee\u5f55\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8fdb\u5316\u540e\u7684\u6280\u80fd\u53ef\u8de8LLM\u89c4\u6a21\u8fc1\u79fb\uff1aQwen3.5-35B\u884d\u751f\u7684\u6280\u80fd\u53ef\u4e3aQwen3.5-122B\u5e26\u6765**57.65\u4e2a\u767e\u5206\u70b9\u7684\u7edd\u5bf9\u63d0\u5347**\uff0c\u4e14\u65e0\u9700\u53c2\u6570\u66f4\u65b0\u6216\u5916\u90e8\u68c0\u7d22\u6a21\u5757\u3002(2603.25158 [cs.AI])\n\n---\n\n#### \u4e3b\u9898\u4e8c\uff1a\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u5236\u5ea6\u57fa\u7840\u8bbe\u65bd\n\n**\u6838\u5fc3\u8d8b\u52bf**\uff1a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u7814\u7a76\u6b63\u4ece\u7b80\u5355\u7684\u901a\u4fe1\u534f\u8bae\u8fc8\u5411\u6df1\u5c42\u7684**\u5236\u5ea6\u8bbe\u8ba1**\u2014\u2014\u5982\u4f55\u901a\u8fc7\u6743\u529b\u5206\u7acb\u3001\u4fe1\u5ff5\u66f4\u65b0\u673a\u5236\u548c\u793e\u4f1a\u5951\u7ea6\u6765\u6cbb\u7406\u667a\u80fd\u4f53\u884c\u4e3a\uff0c\u6210\u4e3a\u7406\u89e3\u5927\u89c4\u6a21\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u5173\u952e\u3002\n\n- **From Logic Monopoly to Social Contract: Separation of Power and the Institutional Foundations for Autonomous Agent Economies** \u2014 \u6df1\u523b\u6279\u5224\u73b0\u6709\u6846\u67b6\u4e2d\u6bcf\u4e2a\u667a\u80fd\u4f53\u540c\u65f6\u627f\u62c5\u8ba1\u5212\u3001\u6267\u884c\u3001\u8bc4\u4f30\u804c\u80fd\u7684\u201c\u903b\u8f91\u5784\u65ad\u201d\u7ed3\u6784\u3002\u91cf\u5316\u63ed\u793a\u4e86\u4e25\u91cd\u7684**\u53ef\u9760\u6027\u7f3a\u53e3**\uff1a\u5e73\u574784.30%\u7684\u653b\u51fb\u6210\u529f\u7387\u300131.4%\u7684 emergent \u6b3a\u9a97\u884c\u4e3a\uff08\u65e0\u663e\u5f0f\u5956\u52b1\u4fe1\u53f7\uff09\u3002\u63d0\u51fa**Agent Enterprise for Enterprise (AE4E)**\u8303\u5f0f\u2014\u2014\u667a\u80fd\u4f53\u4f5c\u4e3a\u5177\u6709\u6cd5\u5f8b\u8eab\u4efd\u7684\u5546\u4e1a\u5b9e\u4f53\uff0c\u901a\u8fc7**\u6743\u529b\u5206\u7acb**\uff08\u7acb\u6cd5\u3001\u6267\u884c\u3001\u5ba1\u5224\u4e09\u6743\u5206\u7acb\uff09\u5b9e\u73b0\u6cbb\u7406\u3002\u5f15\u5165NetX Enterprise Framework\uff0c\u5305\u542b\u6cbb\u7406\u4e2d\u5fc3\u3001TEE\u5b89\u5168\u98de\u5730\u3001\u9690\u79c1\u6570\u636e\u6865\u548c\u667a\u80fd\u4f53\u539f\u751f\u533a\u5757\u94fe\u5e95\u5c42\u3002143\u9875\u957f\u6587\uff0c\u6784\u5efa\u4e8660\u4f59\u4e2a\u5236\u5ea6\u5316AE4E\u7684\u5b8c\u6574\u751f\u6001\u3002(2603.25100 [cs.AI])\n\n- **CRAFT: Grounded Multi-Agent Coordination Under Partial Information** \u2014 \u63d0\u51fa\u4e25\u683c\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u591a\u667a\u80fd\u4f53\u534f\u8c03\u57fa\u51c6\u3002\u591a\u4e2a\u667a\u80fd\u4f53\u9700\u901a\u8fc7\u81ea\u7136\u8bed\u8a00\u534f\u8c03\u6784\u5efa\u5171\u4eab3D\u7ed3\u6784\uff0c\u4efb\u4f55\u5355\u667a\u80fd\u4f53\u90fd\u65e0\u6cd5\u5b8c\u6574\u89c2\u5bdf\u3002\u5c06\u95ee\u9898\u5f62\u5f0f\u5316\u4e3a\u591a\u53d1\u9001\u8005\u5b9e\u7528\u63a8\u7406\u4efb\u52a1\uff0c\u5e76\u63d0\u4f9b\u8bca\u65ad\u6846\u67b6\u5206\u89e3\u5931\u8d25\u4e3a\u7a7a\u95f4\u951a\u5b9a\u3001\u4fe1\u5ff5\u5efa\u6a21\u548c\u5b9e\u7528\u901a\u4fe1\u9519\u8bef\u3002\u8de88\u4e2a\u5f00\u6e90\u6a21\u578b\u548c7\u4e2a\u524d\u6cbf\u6a21\u578b\uff08\u5305\u62ec\u63a8\u7406\u6a21\u578b\uff09\u7684\u6d4b\u8bd5\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u53d1\u73b0\uff1a**\u66f4\u5f3a\u7684\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u80fd\u53ef\u9760\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u534f\u8c03\u8868\u73b0**\uff0c\u5c0f\u578b\u5f00\u6e90\u6a21\u578b\u5e38\u5339\u654c\u6216\u8d85\u8d8a\u524d\u6cbf\u7cfb\u7edf\u3002(2603.25268 [cs.AI])\n\n- **Belief-Driven Multi-Agent Collaboration via Approximate Perfect Bayesian Equilibrium for Social Simulation** \u2014 \u9488\u5bf9\u5f53\u524dLLM\u591a\u667a\u80fd\u4f53\u6846\u67b6\u91c7\u7528\u9759\u6001\u4ea4\u4e92\u62d3\u6251\u3001\u65e0\u6cd5\u6355\u6349\u771f\u5b9e\u4e16\u754c\u4e2d\u5408\u4f5c\u4e0e\u7ade\u4e89\u52a8\u6001\u5207\u6362\u7684\u95ee\u9898\uff0c\u63d0\u51fa**BEACOF**\u6846\u67b6\u3002\u7075\u611f\u6765\u81ea\u5b8c\u7f8e\u8d1d\u53f6\u65af\u5747\u8861(PBE)\uff0c\u5c06\u793e\u4f1a\u4ea4\u4e92\u5efa\u6a21\u4e3a\u4e0d\u5b8c\u5168\u4fe1\u606f\u52a8\u6001\u535a\u5f08\u3002\u667a\u80fd\u4f53\u8fed\u4ee3\u66f4\u65b0\u5bf9\u540c\u4f34\u80fd\u529b\u7684\u6982\u7387\u4fe1\u5ff5\uff0c\u81ea\u4e3b\u8c03\u8282\u534f\u4f5c\u7b56\u7565\u3002\u5728\u5bf9\u6297\u6027\uff08\u53f8\u6cd5\uff09\u3001\u5f00\u653e\u6027\uff08\u793e\u4ea4\uff09\u548c\u6df7\u5408\uff08\u533b\u7597\uff09\u573a\u666f\u4e2d\u9a8c\u8bc1\uff0c\u9632\u6b62\u534f\u8c03\u5931\u8d25\u5e76\u4fc3\u8fdb\u9ad8\u8d28\u91cf\u65b9\u6848\u6536\u655b\u3002(2603.24973 [cs.MA])\n\n---\n\n#### \u4e3b\u9898\u4e09\uff1a\u667a\u80fd\u4f53\u5728\u5de5\u7a0b\u8bbe\u8ba1\u4e0e\u4ee3\u7801\u751f\u6210\u4e2d\u7684\u5177\u4f53\u5e94\u7528\n\n- **Supervising Ralph Wiggum: Exploring a Metacognitive Co-Regulation Agentic AI Loop for Engineering Design** \u2014 \u9488\u5bf9LLM\u8bbe\u8ba1\u667a\u80fd\u4f53\u5bb9\u6613\u201c\u56fa\u5b88\u73b0\u6709\u8303\u5f0f\u201d\u800c\u5ffd\u89c6\u63a2\u7d22\u66ff\u4ee3\u65b9\u6848\u7684\u201c\u8bbe\u8ba1\u56fa\u7740\u201d\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u67b6\u6784\uff1a(1) **\u81ea\u8c03\u8282\u5faa\u73af(SRL)**\u2014\u2014\u8bbe\u8ba1\u667a\u80fd\u4f53\u81ea\u6211\u76d1\u63a7\u5143\u8ba4\u77e5\uff1b(2) **\u5171\u8c03\u8282\u8bbe\u8ba1\u667a\u80fd\u4f53\u5faa\u73af(CRDAL)**\u2014\u2014\u5f15\u5165\u5143\u8ba4\u77e5\u5171\u8c03\u8282\u667a\u80fd\u4f53\u534f\u52a9\u76d1\u63a7\u3002\u5728\u7535\u6c60\u7ec4\u8bbe\u8ba1\u95ee\u9898\u4e2d\uff0cCRDAL\u751f\u6210\u7684\u8bbe\u8ba1\u6027\u80fd\u66f4\u4f18\uff0c\u4e14\u6bd4SRL\u548c\u57fa\u7840Ralph Wiggum\u5faa\u73af\u66f4\u6709\u6548\u5730\u63a2\u7d22\u6f5c\u5728\u8bbe\u8ba1\u7a7a\u95f4\u3002(2603.24768 [cs.AI])\n\n- **The Kitchen Loop: User-Spec-Driven Development for a Self-Evolving Codebase** \u2014 \u63d0\u51fa\u81ea\u4e3b\u3001\u81ea\u8fdb\u5316\u8f6f\u4ef6\u7684\u6846\u67b6\uff0c\u5efa\u7acb\u4e8e\u7edf\u4e00\u4fe1\u4efb\u6a21\u578b\u4e4b\u4e0a\uff1a\u89c4\u8303\u8868\u9762\u679a\u4e3e\u4ea7\u54c1\u58f0\u79f0\u652f\u6301\u7684\u529f\u80fd\uff1b\u201cAs a User x 1000\u201d\u2014\u2014LLM\u667a\u80fd\u4f53\u4e     "2026-02-05": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-02-05)\n\n\u4eca\u5929\u7684\u8bba\u6587\u96c6\u63ed\u793a\u4e86AI\u667a\u80fd\u4f53\u7814\u7a76\u6b63\u4ece\u5355\u4e00\u6a21\u578b\u7684\u201c\u72ec\u89d2\u620f\u201d\u8fc8\u5411\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u81ea\u6211\u8fdb\u5316\u7684\u201c\u751f\u6001\u7cfb\u7edf\u201d\u3002\u6838\u5fc3\u8d8b\u52bf\u663e\u793a\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u81f4\u529b\u4e8e\u89e3\u51b3\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u901a\u4fe1\u6548\u7387\u4e0e\u52a8\u6001\u534f\u8c03\u95ee\u9898\uff0c\u540c\u65f6\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u548c\u5143\u5f3a\u5316\u5b66\u4e60\u8d4b\u4e88\u667a\u80fd\u4f53\u6301\u7eed\u81ea\u6211\u6539\u8fdb\u7684\u80fd\u529b\u3002\u6b64\u5916\uff0c\u4e3a\u4e86\u514b\u670d\u5927\u6a21\u578b\u56fa\u6709\u7684\u968f\u673a\u6027\u548c\u4e0d\u53ef\u63a7\u6027\uff0c\u5f15\u5165\u6709\u9650\u72b6\u6001\u673a\uff08FSM\uff09\u548c\u51b3\u7b56\u6811\u7b49\u663e\u5f0f\u7ed3\u6784\u5316\u63a7\u5236\u673a\u5236\u6210\u4e3a\u4e86\u65b0\u7684\u6280\u672f\u70ed\u70b9\u3002\n\n---\n\n### \u591a\u667a\u80fd\u4f53\u534f\u540c\uff1a\u4ece\u9759\u6001\u62d3\u6251\u5230\u52a8\u6001\u535a\u5f08\n\n\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u7684\u7814\u7a76\u91cd\u70b9\u6b63\u4ece\u56fa\u5b9a\u7684\u901a\u4fe1\u6a21\u5f0f\u8f6c\u5411\u57fa\u4e8e\u8bed\u4e49\u7684\u52a8\u6001\u8def\u7531\u4e0e\u535a\u5f08\u8c08\u5224\uff0c\u65e8\u5728\u63d0\u5347\u590d\u6742\u4efb\u52a1\u4e2d\u7684\u534f\u4f5c\u6548\u7387\u4e0e\u7ecf\u6d4e\u4ea4\u4e92\u80fd\u529b\u3002\n\n*   **DyTopo** \u63d0\u51fa\u4e86\u4e00\u79cd\u7531\u7ba1\u7406\u8005\u5f15\u5bfc\u7684\u52a8\u6001\u62d3\u6251\u8def\u7531\u6846\u67b6\uff0c\u901a\u8fc7\u8bed\u4e49\u5339\u914d\u5728\u6bcf\u4e2a\u63a8\u7406\u8f6e\u6b21\u91cd\u6784\u7a00\u758f\u6709\u5411\u901a\u4fe1\u56fe\uff0c\u4ec5\u5728\u76f8\u5173\u667a\u80fd\u4f53\u95f4\u4f20\u9012\u6d88\u606f\uff0c\u4ece\u800c\u5728\u4ee3\u7801\u751f\u6210\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e2d\u663e\u8457\u4f18\u4e8e\u56fa\u5b9a\u62d3\u6251\u7684\u57fa\u7ebf\u6a21\u578b\u3002(2602.06039 [cs.AI])\n*   **AgenticPay** \u662f\u4e00\u4e2a\u4e13\u6ce8\u4e8e\u4e70\u5356\u53cc\u65b9\u591a\u8f6e\u8bed\u8a00\u8c08\u5224\u7684\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u5b83\u6a21\u62df\u4e86\u62e5\u6709\u79c1\u6709\u7ea6\u675f\u548c\u4f30\u503c\u7684\u590d\u6742\u5e02\u573a\u73af\u5883\uff0c\u586b\u8865\u4e86\u8bc4\u4f30\u57fa\u4e8e\u8bed\u8a00\u7684\u7ecf\u6d4e\u4ea4\u4e92\u548c\u591a\u667a\u80fd\u4f53\u6218\u7565\u63a8\u7406\u80fd\u529b\u7684\u7a7a\u767d\u3002(2602.06008 [cs.AI])\n*   **WideSeek-R1** \u63a2\u7d22\u4e86\u201c\u5bbd\u5ea6\u6269\u5c55\u201d\u8fd9\u4e00\u65b0\u7ef4\u5ea6\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e3b\u667a\u80fd\u4f53\u4e0e\u5e76\u884c\u5b50\u667a\u80fd\u4f53\u534f\u540c\u5de5\u4f5c\uff0c\u8bc1\u660e\u4e86\u5728\u5e7f\u5ea6\u4fe1\u606f\u68c0\u7d22\u4efb\u52a1\u4e2d\uff0c4B\u53c2\u6570\u7684\u5e76\u884c\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u53ef\u5ab2\u7f8e671B\u53c2\u6570\u7684\u5355\u667a\u80fd\u4f53\u7cfb\u7edf\u3002(2602.04634 [cs.AI])\n*   **SPEAR** \u5c55\u793a\u4e86\u4e00\u4e2a\u5c06\u667a\u80fd\u5408\u7ea6\u5ba1\u8ba1\u89c6\u4e3a\u534f\u8c03\u4efb\u52a1\u7684\u591a\u667a\u80fd\u4f53\u5de5\u7a0b\u6848\u4f8b\uff0c\u5e94\u7528\u4e86\u5408\u540c\u7f51\u534f\u8bae\u548c\u62cd\u5356\u534f\u8bae\u7b49\u7ecf\u5178MAS\u6a21\u5f0f\uff0c\u5b9e\u73b0\u4e86\u5728\u98ce\u9669\u611f\u77e5\u542f\u53d1\u5f0f\u4e0b\u7684\u4efb\u52a1\u5206\u914d\u4e0e\u81ea\u4e3b\u4fee\u590d\u3002(2602.04418 [cs.AI])\n*   **AgentArk** \u63d0\u51fa\u4e86\u4e00\u79cd\u5206\u5c42\u84b8\u998f\u7b56\u7565\uff0c\u5c06\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u52a8\u6001\u4ea4\u4e92\u8fc7\u7a0b\u84b8\u998f\u5230\u5355\u4e2a\u6a21\u578b\u7684\u6743\u91cd\u4e2d\uff0c\u65e8\u5728\u4fdd\u7559\u591a\u667a\u80fd\u4f53\u63a8\u7406\u4f18\u52bf\u7684\u540c\u65f6\uff0c\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u9636\u6bb5\u7684\u8ba1\u7b97\u6210\u672c\u548c\u9519\u8bef\u4f20\u64ad\u98ce\u9669\u3002(2602.03955 [cs.AI])\n*   **On the Uncertainty of LLM-based MAS** \u4ece\u71b5\u7684\u89d2\u5ea6\u6df1\u5165\u5206\u6790\u4e86\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u53d1\u73b0\u5355\u667a\u80fd\u4f53\u5728\u7ea643.3%\u7684\u60c5\u51b5\u4e0b\u8868\u73b0\u4f18\u4e8e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u4e14\u4e0d\u786e\u5b9a\u6027\u4e3b\u8981\u5728\u7b2c\u4e00\u8f6e\u4ea4\u4e92\u4e2d\u51b3\u5b9a\uff0c\u63d0\u51fa\u4e86\u57fa\u4e8e\u71b5\u5224\u636e\u7684\u7b80\u5355\u7b97\u6cd5\u6765\u63d0\u5347\u89e3\u7684\u9009\u62e9\u8d28\u91cf\u3002(2602.04234 [cs.MA])\n\n### \u667a\u80fd\u4f53\u8fdb\u5316\uff1a\u6253\u7834\u9884\u8bad\u7ec3\u7684\u8fb9\u754c\n\n\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u50cf\u4eba\u7c7b\u4e00\u6837\u901a\u8fc7\u7ecf\u9a8c\u79ef\u7d2f\u5b9e\u73b0\u201c\u7ec8\u8eab\u5b66\u4e60\u201d\u548c\u201c\u81ea\u6211\u8fdb\u5316\u201d\uff0c\u662f\u4eca\u65e5\u7814\u7a76\u7684\u53e6\u4e00\u5927\u7126\u70b9\uff0c\u91cd\u70b9\u5728\u4e8e\u8de8\u60c5\u8282\u7684\u77e5\u8bc6\u5185\u5316\u4e0e\u7ecf\u9a8c\u5171\u4eab\u3002\n\n*   **Group-Evolving Agents (GEA)** \u5f15\u5165\u4e86\u4e00\u79cd\u4ee5\u667a\u80fd\u4f53\u7fa4\u4e3a\u57fa\u672c\u8fdb\u5316\u5355\u5143\u7684\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u663e\u5f0f\u7684\u7ecf\u9a8c\u5171\u4eab\u548c\u91cd\u7528\u673a\u5236\uff0c\u514b\u670d\u4e86\u4f20\u7edf\u6811\u72b6\u8fdb\u5316\u5206\u652f\u63a2\u7d22\u6548\u7387\u4f4e\u7684\u95ee\u9898\uff0c\u5728SWE-bench Verified\u7b49\u7f16\u7801\u57fa\u51c6\u4e0a\u663e\u8457\u8d85\u8d8a\u4e86\u73b0\u6709\u7684\u81ea\u6211\u8fdb\u5316\u65b9\u6cd5\u3002(2602.04837 [cs.AI])\n*   **Empirical-MCTS** \u63d0\u51fa\u4e86\u4e00\u4e2a\u53cc\u91cd\u5faa\u73af\u6846\u67b6\uff0c\u901a\u8fc7\u6210\u5bf9\u7ecf\u9a8c\u8fdb\u5316\u5143\u63d0\u793a\uff08PE-EMP\uff09\u548c\u8bb0\u5fc6\u4f18\u5316\u667a\u80fd\u4f53\uff0c\u5c06\u65e0\u72b6\u6001\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\u8f6c\u5316\u4e3a\u6301\u7eed\u7684\u975e\u53c2\u6570\u5b66\u4e60\u8fc7\u7a0b\uff0c\u5b9e\u73b0\u4e86\u63a8\u7406\u6a21\u5f0f\u7684\u8de8\u95ee\u9898\u79ef\u7d2f\u4e0e\u590d\u7528\u3002(2602.04248 [cs.AI])\n*   **ORBIT** \u662f\u4e00\u4e2a\u591a\u4efb\u52a1\u3001\u591a\u60c5\u8282\u7684\u5143\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u4e13\u95e8\u7528\u4e8e\u8bad\u7ec3\u5927\u6a21\u578b\u5728\u4e0a\u4e0b\u6587\u4e2d\u4ece\u4ea4\u4e92\u4e2d\u5b66\u4e60\uff0c\u8bc1\u660e\u4e86\u7ecf\u8fc7\u5143\u8bad\u7ec3\u7684\u5f00\u6e90\u6a21\u578b\u5728\u672a\u89c1\u8fc7\u7684\u5728\u7ebf\u73af\u5883\u4e2d\u5177\u5907\u5f3a\u5927\u7684\u4e0a\u4e0b\u6587\u5728\u7ebf\u5b66\u4e60\u80fd\u529b\uff0c\u751a\u81f3\u80fd\u5339\u654cGPT-5.2\u3002(2602.04089 [cs.AI])\n*   **SE-Bench** \u63d0\u51fa\u4e86\u4e00\u4e2a\u8bca\u65ad\u73af\u5883\u6765\u4e25\u683c\u8861\u91cf\u667a\u80fd\u4f53\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u77e5\u8bc6\u5185\u5316\u80fd\u529b\uff0c\u63ed\u793a\u4e86\u201c\u5f00\u4e66\u6096\u8bba\u201d\uff08\u6709\u6587\u6863\u8bad\u7ec3\u53cd\u800c\u6291\u5236\u8bb0\u5fc6\uff09\u548c\u6807\u51c6RL\u5728\u77e5\u8bc6\u5185\u5316\u4e0a\u7684\u5c40\u9650\u6027\uff0c\u9a8c\u8bc1\u4e86\u81ea\u535a\u5f08\u7ed3\u5408SFT\u7684\u6709\u6548\u6027\u3002(2602.04811 [cs.AI])\n\n### \u63a8\u7406\u4e0e\u89c4\u5212\uff1a\u9a7e\u9a6d\u4e0d\u786e\u5b9a\u6027\u7684\u827a\u672f\n\n\u5728\u79d1\u5b66\u63a8\u7406\u3001\u6570\u5b66\u6c42\u89e3\u548c\u5177\u8eab\u667a\u80fd\u7b49\u9ad8\u96be\u5ea6\u9886\u57df\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u8bd5\u56fe\u901a\u8fc7\u7f6e\u4fe1\u5ea6\u63a7\u5236\u3001\u663e\u5f0f\u89c4\u5212\u548c\u6267\u884c\u53cd\u9988\u6765\u63d0\u5347\u6a21\u578b\u7684\u53ef\u9760\u6027\u3002\n\n*   **ReThinker** \u63d0\u51fa\u4e86\u4e00\u4e2a\u7f6e\u4fe1\u5ea6\u611f\u77e5\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u91c7\u7528\u6c42\u89e3\u5668-\u6279\u8bc4\u8005-\u9009\u62e9\u5668\u67b6\u6784\uff0c\u6839\u636e\u6a21\u578b\u7f6e\u4fe1\u5ea6\u52a8\u6001\u5206\u914d\u8ba1\u7b97\u8d44\u6e90\uff0c\u7ed3\u5408\u9006\u5411\u6570\u636e\u5408\u6210\u7b56\u7565\uff0c\u5728Humanity's Last Exam (HLE) \u7b49\u4e13\u5bb6\u7ea7\u63a8\u7406\u57fa\u51c6\u4e0a\u53d6\u5f97\u4e86SOTA\u3002(2602.04496 [cs.AI])\n*   **PCE (Planner-Composer-Evaluator)** \u5c06\u5927\u6a21\u578b\u63a8\u7406\u4e2d\u7684\u6f5c\u5728\u5047\u8bbe\u8f6c\u5316\u4e3a\u7ed3\u6784\u5316\u51b3\u7b56\u6811\uff0c\u901a\u8fc7\u8bc4\u4f30\u573a\u666f\u53ef\u80fd\u6027\u3001\u76ee\u6807\u6536\u76ca\u548c\u6267\u884c\u6210\u672c\u6765\u6307\u5bfc\u884c\u52a8\uff0c\u4f7f\u5177\u8eab\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u73af\u5883\u4e2d\u65e0\u9700\u9891\u7e41\u901a\u4fe1\u5373\u53ef\u5b9e\u73b0\u9ad8\u6548\u7684\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u89c4\u5212\u3002(2602.04326 [cs.AI])\n*   **Active Epistemic Control (AEC)** \u5f15\u5165\u4e86\u4e00\u4e2a\u8ba4\u77e5-\u5206\u7c7b\u89c4\u5212\u5c42\uff0c\u4e25\u683c\u533a\u5206\u7528\u4e8e\u627f\u8bfa\u7684\u201c\u843d\u5730\u4e8b\u5b9e\u5e93\u201d\u548c\u7528\u4e8e\u526a\u679d\u7684\u201c\u4fe1\u5ff5\u5e93\u201d\uff0c\u901a\u8fc7\u4e3b\u52a8\u67e5\u8be2\u6216\u6a21\u62df\u6765\u5904\u7406\u672a\u77e5\u524d\u63d0\uff0c\u5728ALFWorld\u7b49\u4efb\u52a1\u4e2d\u5b9e\u73b0\u4e86\u66f4\u5c11\u7684\u91cd\u89c4\u5212\u8f6e\u6b21\u3002(2602.03974 [cs.AI])\n*   **Agentic Verifier** \u9488\u5bf9\u7ade\u6280\u7f16\u7a0b\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e86\u4e00\u4e2a\u57fa\u4e8e\u6267\u884c\u7684\u667a\u80fd\u4f53\u9a8c\u8bc1\u5668\uff0c\u80fd\u591f\u4e3b\u52a8\u63a8\u7406\u7a0b\u5e8f\u884c\u4e3a\u5e76\u751f\u6210\u5177\u6709\u9ad8\u533a\u5206\u5ea6\u7684\u6d4b\u8bd5\u7528\u4f8b\uff08\u53cd\u4f8b\uff09\uff0c\u901a\u8fc7\u591a\u8f6e\u4ea4\u4e92\u8fed\u4ee3\u4f18\u5316\u8f93\u5165\u751f\u6210\uff0c\u663e\u8457\u63d0\u5347\u4e86Best@K\u51c6\u786e\u7387\u3002(2602.04254 [cs.CL])\n*   **IIPC (Iteratively Improved Program Construction)** \u9488\u5bf9\u6570\u5b66\u95ee\u9898\u6c42\u89e3\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u8fed\u4ee3\u6539\u8fdb\u7a0b\u5e8f\u6784\u5efa\u7684\u65b9\u6cd5\uff0c\u7ed3\u5408\u6267\u884c\u53cd\u9988\u4e0e\u539f\u751f\u601d\u7ef4\u94fe\u80fd\u529b\uff0c\u89e3\u51b3\u4e86\u7a0b\u5e8f\u4e0a\u4e0b\u6587\u5206\u6563\u6a21\u578b\u6ce8\u610f\u529b\u7684\u95ee\u9898\uff0c\u5728\u591a\u4e2a\u63a8\u7406\u57fa\u51c6\u4e0a\u8d85\u8d8a\u4e86\u73b0\u6709\u65b9\u6cd5\u3002(2602.03950 [cs.AI])\n\n### \u8bb0\u5fc6\u4e0e\u72b6\u6001\uff1a\u6784\u5efa\u66f4\u53ef\u63a7\u7684\u667a\u80fd\u4f53\n\n\u4e3a\u4e86\u89e3\u51b3\u957f\u4e0a\u4e0b\u6587\u4efb\u52a1\u4e2d\u7684\u8bb0\u5fc6\u6548\u7387\u548c\u89d2\u8272\u4e00\u81f4\u6027\uff0c\u7814\u7a76\u8005\u4eec\u5f00\u59cb\u5f15\u5165\u9884\u7b97\u63a7\u5236\u548c\u6709\u9650\u72b6\u6001\u673a\u7b49\u7ecf\u5178\u8ba1\u7b97\u673a\u79d1\u5b66\u6982\u5ff5\u3002\n\n*   **BudgetMem** \u63d0\u51fa\u4e86\u4e00\u4e2a\u8fd0\u884c\u65f6\u667a\u80fd\u4f53\u8bb0\u5fc6\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u8def\u7531\u5668\u5728\u4e0d\u540c\u9884\u7b97\u5c42\u7ea7\uff08\u4f4e/\u4e2d/\u9ad8\uff09\u95f4\u8fdb\u884c\u5185\u5b58\u6a21\u5757\u8def\u7531\uff0c\u5b9e\u73b0\u4e86\u5728\u6027\u80fd\u4e0e\u6210\u672c\u4e4b\u95f4\u7684\u663e\u5f0f\u63a7\u5236\uff0c\u5e76\u5728\u957f\u8bb0\u5fc6\u8bc4\u4f30\u4efb\u52a1\u4e2d\u5c55\u73b0\u4e86\u66f4\u4f18\u7684\u7cbe\u5ea6-\u6210\u672c\u524d\u6cbf\u3002(2602.06025 [cs.CL])\n*   **Codified Finite-State Machines (CFSMs)** \u91cd\u65b0\u5ba1\u89c6\u4e86\u6709\u9650\u72b6\u6001\u673a\u5728\u89d2\u8272\u626e\u6f14\u4e2d\u7684\u5e94\u7528\uff0c\u5229\u7528LLM\u5c06\u6587\u672c\u89d2\u8272\u6863\u6848\u81ea\u52a8\u7f16\u7801\u4e3aFSM\uff0c\u751a\u81f3\u6269\u5c55\u4e3a\u6982\u7387FSM\uff08CPFSM\uff09\uff0c\u4ece\u800c\u5728\u5f00\u653e\u5f0f\u7684\u8bed\u4e49\u7a7a\u95f4\u4e2d\u5f3a\u5236\u6267\u884c\u89d2\u8272\u72b6\u6001\u7684\u4e00\u81f4\u6027\u3002(2602.05905 [cs.CL])\n*   **Soft-FSM** \u9488\u5bf9\u6cd5\u5f8b\u4ea4\u53c9\u8be2\u95ee\u7b49\u957f\u65f6\u7a0b\u4efb\u52a1\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u795e\u7ecf\u7b26\u53f7\u67b6\             const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {
            const loadBtn = document.getElementById('load-more-btn');
            const unloadedCount = getUnloadedDates().length;

            if (loadBtn) {
                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;
                }
            }
        }

        // 从localStorage加载状态
        function loadState() {
            const starred = localStorage.getItem('starred_papers');
            const read = localStorage.getItem('read_papers');
            const deleted = localStorage.getItem('deleted_papers');
            const summaryLang = localStorage.getItem('summary_language');

            if (starred) starredPapers = new Set(JSON.parse(starred));
            if (read) readPapers = new Set(JSON.parse(read));
            if (deleted) deletedPapers = new Set(JSON.parse(deleted));
            if (summaryLang !== null) showChineseSummary = summaryLang === 'chinese';
        }

        // 保存状态到localStorage
        function saveState() {
            localStorage.setItem('starred_papers', JSON.stringify([...starredPapers]));
            localStorage.setItem('read_papers', JSON.stringify([...readPapers]));
            localStorage.setItem('deleted_papers', JSON.stringify([...deletedPapers]));
            localStorage.setItem('summary_language', showChineseSummary ? 'chinese' : 'english');
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 通过按钮删除论文（避免JavaScript字符串转义问题）
        function deletePaperByButton(button) {

            deletePaper(arxivId, title);

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);
            }, 300);
        }

        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);
            }
            saveState();

            showChineseSummary = !showChineseSummary;

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];
                header.textContent = `${dateLabel} (${totalPapers} 篇论文)`;

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                const raw = mdRawContent[el.id];
                if (raw) {
                    try {
                        el.innerHTML = marked.parse(raw);
                    } catch (e) {
                        el.textContent = raw;
                    }
                    el.setAttribute('data-rendered', '1');
                }
            });
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) {
                    const raw = mdRawContent[el.id];
                    if (raw) {
                        try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                        el.setAttribute('data-rendered', '1');
                    }
                }
            });
        }
