nt 很容易误解任务、越权操作、修改错误文件，或者做了一堆动作但最后不知道是否完成。\n\n---\n\n## 第二步：初始化或进入 Workspace\n\n这里的 **Workspace** 指的是：系统运行任务的持久工作环境，包括文件、终端、浏览器、日志、代码仓库、数据库连接、权限设置等。\n\n### 输入\n\n系统拿到：\n\n- 当前任务定义；\n- 文件系统；\n- 终端环境；\n- 浏览器状态；\n- 代码仓库；\n- 日志；\n- 可用工具；\n- 用户授权范围。\n\n### 操作\n\n系统会：\n\n1. 打开或创建一个任务工作区；\n2. 加载已有文件和项目状态；\n3. 记录当前初始状态；\n4. 设置权限边界；\n5. 准备后续执行用的工具接口。\n\n### 输出\n\n得到一个可操作的工作环境：\n\n- 文件可以被读取或编辑；\n- 终端可以执行命令；\n- 浏览器可以访问网页；\n- 日志会记录每一步；\n- 系统知道哪些操作被允许。\n\n### 目的\n\n这是为了解决 Agent Era 的一个痛点：\n\n\u003E 早期 Agent 调工具是零散的，每次工具调用像一次孤立动作，中间状态很容易丢失。\n\nWorkspace 的作用就是让中间产物留下来，让 AI 可以继续基于已有状态工作，而不是每一步都重新猜上下文。\n\n### 如果不做会怎样\n\n如果没有 Workspace，Agent 可能写了文件但后面找不到，运行了命令但日志丢失，浏览器状态断掉，最后无法检查任务到底做到哪一步。\n\n---\n\n## 第三步：检索并加载相关 Skill\n\n这里的 **Skill** 指的是：一套可复用的任务流程，通常包括说明文件、脚本、依赖、示例、检查方法、失败处理方法等。\n\n例如：\n\n- 修复测试失败的 Skill；\n- 重构代码的 Skill；\n- 数据分析的 Skill；\n- 文档生成的 Skill；\n- 安全扫描的 Skill。\n\n### 输入\n\n系统拿到：\n\n- 任务类型；\n- Workspace 当前状态；\n- 可用 Skill 列表；\n- 每个 Skill 的说明、适用条件、依赖和权限需求。\n\n### 操作\n\n系统会：\n\n1. 判断当前任务适合哪些 Skill；\n2. 检查 Skill 是否满足依赖；\n3. 检查 Skill 是否需要高风险权限；\n4. 加载相关 Skill 的说明、脚本和检查流程；\n5. 把 Skill 的步骤作为后续执行参考。\n\n### 输出\n\n得到一个或多个已加载的 Skill：\n\n- 包含任务步骤；\n- 包含需要调用的工具；\n- 包含检查方式；\n- 包含常见错误处理；\n- 包含安全约束。\n\n### 目的\n\n这是为了解决另一个痛点：\n\n\u003E 只靠 Prompt，每次任务都要重新告诉模型怎么做，过程不稳定，也很难复用经验。\n\nSkill 的作用是把“怎么做某类任务”保存下来，让系统下次遇到类似任务时不用重新摸索。\n\n### 如果不做会怎样\n\n如果没有 Skill，Agent 每次都要临时规划，容易漏步骤、重复犯错，也很难把过去成功经验稳定复用。\n\n---\n\n## 第四步：模型进行推理和计划\n\n这里论文把 LLM 的演化分成两个阶段：\n\n- Chatbot-era LLM：快速生成回答；\n- Thinking LLM：会花更多推理时间，写长推理链，检查中间步骤。\n\n**Thinking LLM** 在这里指：模型不是立刻回答，而是先分解问题、尝试路径、检查错误，再决定下一步。\n\n### 输入\n\n系统拿到：\n\n- 用户任务；\n- Workspace 状态；\n- 已加载 Skill；\n- 工具列表；\n- 历史执行日志；\n- 当前观察结果。\n\n### 操作\n\n模型会：\n\n1. 分解任务；\n2. 判断下一步该做什么；\n3. 决定调用哪个工具；\n4. 预测可能的失败点；\n5. 选择一个动作。\n\n### 输出\n\n得到下一步行动计划，比如：\n\n- 编辑某个文件；\n- 执行测试命令；\n- 打开某个网页；\n- 调用某个 API；\n- 读取某个日志；\n- 请求用户确认。\n\n### 目的\n\n这是为了解决 Chatbot 的限制：\n\n\u003E 普通 LLM 是单次生成，很难处理数学、代码、规划、长任务，因为它缺少检查、回退和持续推理。\n\nThinking LLM 提供更强的决策能力，让 Agent 不只是随机调工具，而是更有步骤地推进任务。\n\n### 如果不做会怎样\n\n如果没有这一步，系统会更像简单脚本或普通聊天模型，遇到复杂任务时容易走错方向，而且无法根据中间状态调整计划。\n\n---\n\n## 第五步：在 Workspace 中执行动作\n\n### 输入\n\n系统拿到：\n\n- 上一步生成的动作；\n- 当前 Workspace；\n- 工具接口；\n- 权限限制；\n- Skill 中规定的执行方式。\n\n### 操作\n\n系统实际执行动作，例如：\n\n1. 修改文件；\n2. 运行 shell 命令；\n3. 执行测试；\n4. 浏览网页；\n5. 查询数据库；\n6. 调用 API；\n7. 生成文档；\n8. 保存中间结果。\n\n### 输出\n\n得到真实环境反馈：\n\n- 命令输出；\n- 测试结果；\n- 文件 diff；\n- 浏览器页面变化；\n- API 返回值；\n- 报错信息；\n- 新生成的文件或日志。\n\n### 目的\n\n这是从“回答问题”变成“完成工作”的关键步骤。\n\n论文强调，真实任务不是只要一句回答，而是要改变环境状态，比如：\n\n- 代码真的修好；\n- 测试真的通过；\n- 文件真的更新；\n- 表格真的生成；\n- 网页操作真的完成。\n\n### 如果不做会怎样\n\n如果不执行真实动作，系统只能给建议，不能完成任务；用户还要自己手动操作。\n\n---\n\n## 第六步：观察结果，并决定是否修正\n\n### 输入\n\n系统拿到：\n\n- 执行动作后的结果；\n- 命令输出；\n- 报错信息；\n- 文件变化；\n- 测试结果；\n- 当前 Workspace 状态。\n\n### 操作\n\n系统会：\n\n1. 读取反馈；\n2. 判断动作是否成功；\n3. 如果失败，分析原因；\n4. 修改计划；\n5. 必要时回滚；\n6. 再次执行。\n\n### 输出\n\n得到新的状态判断：\n\n- 当前步骤成功；\n- 当前步骤失败但可修复；\n- 需要换方法；\n- 需要用户确认；\n- 任务可以进入最终检查。\n\n### 目的\n\n这是为了解决早期 Agent 的长任务脆弱问题。\n\n论文指出，早期 Agent 在多步任务中容易因为一个小错误导致全局失败，例如：\n\n- 调错 API；\n- 文件路径错；\n- 命令失败；\n- 页面变化；\n- 权限不足；\n- 工具返回格式异常。\n\n观察和修正循环就是为了让系统不要一步错就彻底失败。\n\n### 如果不做会怎样\n\n如果不观察和修正，Agent 可能在失败后继续执行错误计划，最后生成一个看似完成但实际错误的结果。\n\n---\n\n## 第七步：执行最终验证\n\n### 输入\n\n系统拿到：\n\n- 当前 Workspace 最终状态；\n- 用户成功标准；\n- Skill 中的检查方法；\n- 测试脚本；\n- 文件 diff；\n- 日志；\n- 安全检查结果。\n\n### 操作\n\n系统会：\n\n1. 运行测试；\n2. 检查文件是否符合要求；\n3. 对比初始状态和最终状态；\n4. 检查有没有越权操作；\n5. 检查是否留下无关文件；\n6. 生成执行摘要。\n\n### 输出\n\n得到最终判断：\n\n- 任务完成；\n- 任务未完成；\n- 部分完成；\n- 有风险需要用户确认；\n- 需要继续修复。\n\n### 目的\n\n这是论文里反复强调的 **task closure**，也就是“任务闭合”。\n\n**Task closure** 在这里指：不是模型说“我完成了”，而是系统能通过外部证据确认任务确实完成。\n\n比如：\n\n- SWE-bench 用测试是否通过来判断代码问题是否解决；\n- OSWorld 用执行脚本检查桌面任务是否完成；\n- WebArena 用网站最终状态判断任务是否成功。\n\n### 如果不做会怎样\n\n如果不做最终验证，系统可能自称完成任务，但代码没通过测试、文件没改对、网页操作没成功，用户很难信任结果。\n\n---\n\n## 第八步：保存日志、状态和经验\n\n### 输入\n\n系统拿到：\n\n- 完整执行轨迹；\n- 每一步动作；\n- 每一步观察结果；\n- 最终结果；\n- 成功或失败原因；\n- 用到的 Skill；\n- 用户反馈。\n\n### 操作\n\n系统会：\n\n1. 保存日志；\n2. 保存文件变更；\n3. 保存命令记录；\n4. 保存失败和修复过程；\n5. 必要时更新 Skill；\n6. 生成可审计记录。\n\n### 输出\n\n得到：\n\n- 可回放的执行记录；\n- 可审计的操作日志；\n- 可复用的经验；\n- 可能更新后的 Skill。\n\n### 目的\n\n这是为了解决长期使用中的经验复用和责任追踪问题。\n\n传统 Chatbot 没有长期状态，每次对话都从头开始。Workspace + Skill 系统希望把成功经验变成可复用资产，同时保留操作记录，方便之后检查。\n\n### 如果不做会怎样\n\n如果不保存日志和经验，系统下次还会重复犯错，出了问题也无法追踪是哪一步导致的。\n\n---\n\n# 3. 论文中几个绕不开的术语\n\n## Workspace\n\n指 AI 运行任务的持久工作环境。\n\n它包含：\n\n- 文件；\n- 终端；\n- 浏览器；\n- 日志；\n- 工具；\n- 权限；\n- 项目上下文；\n- 执行结果。\n\n重点是：**状态会保留。**\n\n---\n\n## Skill\n\n指可复用的任务流程包。\n\n它可能包含：\n\n- 操作说明；\n- 脚本；\n- 示例；\n- 依赖；\n- 检查方法；\n- 错误恢复步骤；\n- 安全约束。\n\n重点是：**不是每次临时写 Prompt，而是把做事方法保存下来。**\n\n---\n\n## State–Action–Observation trajectory\n\n中文可以理解为：**状态—动作—观察轨迹。**\n\n意思是：\n\n1. 系统看到当前状态；\n2. 做一个动作；\n3. 得到环境反馈；\n4. 再根据反馈继续做下一步。\n\n这比普通“问题—答案”数据复杂得多。\n\n---\n\n## Task closure\n\n中文可以理解为：**任务最终确实完成，并且能被检查。**\n\n不是模型说“完成了”，而是外部状态能证明完成了。\n\n---\n\n## OpenClaw\n\n论文把它作为一种代表性系统形态。\n\n它指的是：**把 LLM 放进一个有 Workspace、Skill、工具、权限、日志和验证机制的工作站式系统里。**\n\n---\n\n# 4. 为什么这套设计有效？\n\n论文的逻辑是：\n\n## 1. Thinking LLM 解决“不会深入推理”的问题\n\nChatbot 时代模型主要是快速生成文本。\n\n问题是：\n\n- 容易幻觉；\n- 不会稳定检查；\n- 长任务容易出错；\n- 数学、代码、规划能力不够稳。\n\nThinking LLM 加入：\n\n- 长推理过程；\n- 自我检查；\n- 多路径尝试；\n- 强化学习训练出的推理行为。\n\n所以它能更好地决定下一步该干什么。\n\n---\n\n## 2. Agent Loop 解决“不能操作外部环境”的问题\n\n只会回答不够。\n\nAgent 加入：\n\n- 观察环境；\n- 调工具；\n- 看反馈；\n- 再行动。\n\n这样模型可以：\n\n- 搜索；\n- 写代码；\n- 调 API；\n- 操作网页；\n- 运行命令。\n\n但论文指出，早期 Agent 还不够，因为工具调用太零散。\n\n---\n\n## 3. Workspace 解决“状态丢失和任务无法收尾”的问题\n\nWorkspace 让中间状态保留下来。\n\n这样系统可以：\n\n- 继续编辑已有文件；\n- 保留测试结果；\n- 看执行日志；\n- 回滚错误操作；\n- 检查最终状态。\n\n所以它解决的是长任务执行中的连续性问题。\n\n---\n\n## 4. Skill 解决“每次都重新摸索”的问题\n\nSkill 把做事流程保存下来。\n\n这样系统可以：\n\n- 复用成功流程；\n- 使用固定检查方法；\n- 减少临时 Prompt 的不稳定；\n- 让人类审查和维护任务流程。\n\n所以它解决的是经验复用和流程稳定性问题。\n\n---\n\n## 5. Verification 解决“模型自称完成但实际没完成”的问题\n\n验证机制会检查最终状态。\n\n比如：\n\n- 测试是否通过；\n- 文件是否正确修改；\n- 网页状态是否符合要求；\n- 是否有安全违规；\n- 日志是否完整。\n\n所以它解决的是可信交付问题。\n\n---\n\n# 5. 关于消融实验：这篇论文没有真正的 Ablation Study\n\n你要求“结合消融实验”，但这篇论文是综述，不是方法论文。  \n在你提供的文本里，**没有一个完整实验设置是：固定系统，然后逐个去掉 Workspace、Skill、Verification、Memory 等模块，比较性能下降。**\n\n所以我不能编造“去掉某模块下降多少”的消融结果。\n\n不过论文确实引用和汇总了一些相关证据，可以用来间接说明这些组件的重要性。\n\n---\n\n## 5.1 哪个组件贡献最大？\n\n严格按论文内容，**无法用消融数据证明哪个组件贡献最大。**\n\n但从论文的主线看，它最强调的是：\n\n\u003E **Workspace + Skill，尤其是 Workspace。**\n\n原因是论文认为 Agent Era 的主要瓶颈不是模型完全不会调工具，而是：\n\n- 状态不持久；\n- 工具调用零散；\n- 中间结果不可恢复；\n- 最终状态不可验证；\n- 执行过程不可审计。\n\n这些问题主要靠 Workspace 解决。\n\n论文中支持这一点的证据包括：\n\n- WebArena 中 GPT-4 只有约 14% 成功率，说明真实网页任务很难靠普通 Agent 稳定完成；\n- SWE-bench、OSWorld、WorkArena 等 benchmark 都开始检查最终环境状态，而不是只看模型回答；\n- OpenClaw-style 系统把评估目标从“动作对不对”改成“最终工作环境是否正确”。\n\n但要注意：  \n这些是跨系统、跨 benchmark 的证据，不是严格消融实验。\n\n---\n\n## 5.2 哪个组件可有可无？\n\n论文没有给出“去掉后性能几乎不变”的模块实验。\n\n不过从论文逻辑看，以下组件不是可有可无：\n\n- Workspace：没有它，长任务状态难以保留；\n- Skill：没有它，流程难以复用；\n- Verification：没有它，无法确认任务是否完成；\n- Permission / Governance：没有它，执行型 Agent 容易造成安全问题。\n\n如果一定要说论文中相对没有被实验证明的部分，是：\n\n\u003E **Skill 的具体组织形式，例如是否必须用 SKILL.md 文件夹结构。**\n\n论文认为 Skill 很重要，但没有证明某一种 Skill 文件格式一定最优。\n\n这意味着：\n\n- “复用任务流程”这个思想重要；\n- 但具体用什么文件格式、目录结构、元数据设计，还需要更多实验验证。\n\n---\n\n## 5.3 各组件之间是否有协同效应？\n\n论文的核心判断就是：**有。**\n\n但这也是系统设计层面的判断，不是严格消融得出的结论。\n\n它认为单独组件都有明显缺陷：\n\n### 只有 Thinking LLM\n\n模型会推理，但不能真正操作复杂环境。\n\n结果：\n\n- 可以写计划；\n- 但不一定能完成实际任务。\n\n### 只有工具调用\n\n模型可以调 API，但状态零散。\n\n结果：\n\n- 可以完成局部动作；\n- 长任务容易失败。\n\n### 只有 Workspace\n\n状态能保存，但模型每次还要临时想流程。\n\n结果：\n\n- 执行环境稳定；\n- 但过程仍然可能不一致。\n\n### 只有 Skill\n\n有流程说明，但没有可持续执行环境。\n\n结果：\n\n- 流程不能稳定落地；\n- 中间文件、日志、终端状态仍然难管理。\n\n### Workspace + Skill + Verification 组合\n\n系统可以：\n\n1. 保存状态；\n2. 复用流程；\n3. 执行动作；\n4. 检查结果；\n5. 回滚和修复；\n6. 留下审计记录。\n\n这正是论文认为它们必须组合的原因。\n\n---\n\n## 5.4 回扣动机：哪个设计解决哪个痛点？\n\n| 论文指出的痛点 | 对应设计 | 是否有实验证据 |\n|---|---|---|\n| Chatbot 只会快速回答，复杂推理不稳 | Thinking LLM、Long CoT、RL reasoning | 有大量 benchmark 支持，但本文是汇总 |\n| Agent 工具调用零散，状态容易丢 | Workspace | 有 WebArena、OSWorld、SWE-bench 等任务闭合评估支持 |\n| 每次靠 Prompt 临时做事，不稳定 | Skill | 有 Voyager、Agent Skills、OpenClaw Skills 等相关工作支持，但缺少严格消融 |\n| 模型说完成但实际没完成 | Final-state verification | SWE-bench、OSWorld 等 benchmark 强力支持 |\n| Agent 能操作真实环境，安全风险变大 | Permission、sandbox、audit log、guardrail | 有 ClawSafety、ATBench-Claw 等安全评估方向支持 |\n| 成功一次不代表稳定 | Repeated execution、snapshot、rollback | 论文引用 reliability 研究支持，但没有统一消融 |\n\n总结一下：\n\n\u003E 论文最有力的实验趋势支持是：  \n\u003E **评估必须从“答案对不对”转向“最终环境状态是否正确”。**  \n\u003E 但它没有严格证明 Workspace、Skill、Verification 各自的独立贡献大小。\n\n---\n\n# 6. 这套方法的硬伤在哪里？\n\n论文自己也承认，Workspace + Skill 不是最终答案。主要硬伤有两个。\n\n---\n\n## 硬伤一：Skill 会过期、会失效、会误导系统\n\nSkill 往往依赖具体环境，例如：\n\n- 某个网页布局；\n- 某个 API 格式；\n- 某个文件路径；\n- 某个软件版本；\n- 某个组织内部流程。\n\n一旦这些东西变了，原来的 Skill 可能继续被系统调用，但实际已经不适用了。\n\n具体后果是：\n\n- 执行错误步骤；\n- 调用错误工具；\n- 修改错误文件；\n- 按旧流程处理新任务；\n- 出现负迁移，也就是旧经验反而拖累新任务。\n\n所以 Skill 需要：\n\n- 版本管理；\n- 依赖检查；\n- 回归测试；\n- 过期机制；\n- 人类审查。\n\n这会增加大量维护成本。\n\n---\n\n## 硬伤二：Workspace 会积累脏状态，安全风险更大\n\nWorkspace 会保存状态，这是优点，也是风险。\n\n它可能保存：\n\n- 失败的中间文件；\n- 旧日志；\n- 错误缓存；\n- 过时配置；\n- 被污染的网页内容；\n- 恶意 Skill；\n- 敏感文件；\n- 凭证和权限信息。\n\n如果 Agent 分不清哪些状态可信，哪些状态是历史垃圾，就可能基于错误信息继续执行。\n\n更严重的是，Workspace Agent 可以真的操作文件、网络、终端和外部服务，所以风险不再只是“回答错了”，而是：\n\n- 泄露数据；\n- 删除文件；\n- 执行恶意脚本；\n- 调错外部服务；\n- 被 Prompt Injection 操控；\n- 使用恶意 Skill。\n\n所以系统必须配套：\n\n- 沙箱；\n- 权限控制；\n- 操作确认；\n- 日志审计；\n- 回滚；\n- Skill 来源检查。\n\n这些都会让系统复杂度和部署成本明显上升。\n\n---\n\n# 7. 最终总结\n\n这篇论文的核心不是提出一个新模型，而是提出一个判断：\n\n\u003E LLM 的下一步，不是单纯把模型做大，也不是单纯让模型多调几个工具，而是把模型放进一个可保存状态、可执行任务、可复用流程、可检查结果、可控制权限的工作系统里。\n\n它的设计逻辑可以压缩成一句话：\n\n\u003E **用 Thinking LLM 做决策，用 Workspace 保存和执行任务状态，用 Skill 复用任务流程，用 Verification 检查最终结果，用 Governance 控制风险。**\n\n如果只看论文最重要的贡献，就是它把 AI 系统的发展目标从：\n\n\u003E “生成一个好回答”\n\n改成了：\n\n\u003E “在真实或模拟工作环境中，把任务做到可验证完成。”", "additional_insights": "## 1. 实验中的反直觉发现\n\n1. **小模型经过 alignment 后可能比大模型更受人类偏好。** 论文指出 InstructGPT 中 1.3B 模型在人类评价中优于 175B GPT-3，说明“能力规模”和“交互可用性/对齐质量”并非同一维度；依据见 2.1.2 对 InstructGPT/RLHF 的讨论。\n\n2. **更大模型并不总是更优，数据-参数-算力配比比单纯堆参数更关键。** Chinchilla 的结论被论文用来说明 under-trained large models 是低效的，compute-optimal scaling 要求模型大小和训练 token 同步扩展；依据见 2.1.1 Scaling Laws 与 Chinchilla 段落。\n\n3. **Scaling 可能增强“看似可信的错误”，而不只是减少 hallucination。** 论文提到更大模型在某些评估中可能加剧 deceptive fluency，即用更流畅、更自信的语言生成错误内容；依据见 2.1.2 对 hallucination 和 scaling 限制的分析。\n\n4. **LLM 的“自我纠错”在没有外部反馈或 verifier 时并不可靠。** 论文引用相关研究指出，仅依靠模型自身概率分布，LLM 不能稳定实现 genuine self-correction；依据见 2.1.2 关于 autoregressive paradigm 缺乏 intrinsic verification 的讨论。\n\n5. **增加 reasoning token 并不单调提升性能，过长 CoT 会出现 overthinking。** 论文指出每个模型存在 reasoning boundary，超过能力上限后错误会累积、准确率下降；依据见 2.2.1 对 inference-time scaling、reasoning boundaries 和 overthinking 的总结。\n\n6. **“Aha moment”不一定代表真正涌现的反思能力。** DeepSeek-R1 训练中出现的自反式 utterance 被论文标记为 contested，后续分析认为可能是 pretraining bias 与 GRPO length optimization 放大的结果；依据见 2.2.1 对 Aha moment 的讨论。\n\n7. **简单的 rule-based reward 反而在 reasoning RL 中非常有效。** 论文指出 DeepSeek-R1 的成功表明 answer matching + format checking 这类简单奖励设计在实践中效果很强，而更细粒度 PRM 虽理论更好但面临标注成本和 reward hacking；依据见 2.2.2 RLVR/GRPO 段落。\n\n8. **少量高质量 reasoning 样本即可激活强 reasoning 能力。** LIMO 仅用 817 个 curated examples、s1 用约 1000 个样本取得强数学推理表现，论文据此认为 reasoning capability 可能已潜伏在 pretrained models 中，训练更多是在“激活”而非从零创造；依据见 2.2.2 distillation/SFT 段落。\n\n9. **真实 web/OS 环境中的 agent 成功率远低于静态 benchmark 直觉。** 论文提到 WebArena 中 GPT-4 只有 14% success，说明从“会回答”到“能完成真实任务”之间存在巨大落差；依据见 3.1.2 对 AgentBench/WebArena/SWE-bench/GAIA 的讨论。\n\n10. **正确的单步 tool call 不足以保证任务完成。** 论文强调 multi-step tool use 是 trajectory-level control 问题，agent 必须决定何时调用工具、如何吸收反馈、如何恢复失败以及何时停止；依据见 3.1.1 Tool Use 部分对 SMART、START、ReTool、ToRL 等工作的归纳。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n11. **Agent failure 会随任务长度超线性累积，而不是线性变差。** 论文综合 benchmark 结果指出复杂度和 horizon length 增加时 success rate 会 super-linearly decay，失败类型包括 premature ungrounded action、over-helpfulness、context pollution 和 fragile execution；依据见 3.1.2 failure analysis。\n\n12. **Agent 时代的瓶颈不是“不会调用工具”，而是环境状态被切成了碎片。** 论文将 Agent Era 的结构性问题概括为 fragmented perception、ephemeral tool invocation、environmental uncertainty 和 absence of long-term task closure；依据见 3.1.2 四个 structural bottlenecks。\n\n13. **Perception 能力受限于 agent 能观察到什么，而不是只受模型智力限制。** 论文指出早期 agent 依赖单次 API 输出或截图，缺乏 persistent visual working memory，导致环境理解碎片化；依据见 3.1.1 Perception 段落。\n\n14. **Memory 不是单一 buffer，而应区分 semantic、episodic、procedural memory。** 论文引用 memory taxonomy 说明 agent memory 包含事实知识、任务经历、可复用过程和一致性维护等不同机制；依据见 3.1.1 Memory 部分。\n\n15. **检验 agent 不能只看 single success rate，应拆成 consistency、robustness、recoverability 等维度。** 论文提到 computer-use agents 可能一次成功、重复运行失败，因此 reliability agenda 要分解为一致性、鲁棒性、可预测性、可恢复性和错误严重度；依据见 3.2.2 reliability 段落。\n\n16. **Evaluation object 的变化揭示了能力定义的变化：answer → reasoning path → final workspace state。** 论文把评估范式划分为 final-output accuracy、process-level verification 和 task-closure/state verification，说明模型能力不再等同于输出文本质量；依据见 5.2 和 Table 7。\n\n17. **Process supervision 的价值在于区分“错误推理得到正确答案”和“正确推理但最终小错”。** 论文指出 ORM 只看最终输出，而 PRM 能评估每一步是否有效，因此更适合 long-chain reasoning；依据见 5.1.2 对 PRM800K 和 Math-Shepherd 的分析。\n\n18. **Skill 是否有效，不能只看原任务成功率，还要看“不该调用时是否不会调用”。** 论文在 negative transfer 部分指出过度专用的 skill 会误导 agent，并强调未来系统需要评估 skill invocation boundary；依据见 4.2.2 Limitations 中 Skill overfitting and negative transfer。\n\n---\n\n## 3. 对领域的新认知\n\n19. **Chatbot 的核心能力可理解为 parametric knowledge compression，而非显式知识库。** 论文把 Chatbot-era LLM 描述为高容量压缩引擎：知识低延迟、可组合，但 lossy、static、难审计和难精确更新；依据见 2.1.1 Parametric Knowledge Compression。\n\n20. **“Agent”不应泛化为所有带 CoT/RAG/memory 的系统。** 论文明确将 LLM-based agents 严格定义为通过 environment-action-feedback loop 与外部工具交互的系统，而 CoT、RAG、memory 只是 enabling capabilities；依据见 3.1.2 末尾对 agent 定义的澄清。\n\n21. **从 Agent 到 OpenClaw 的边界不是“是否能调用工具”，而是环境是否成为 persistent host。** 论文指出 Agent Era 的环境是被查询的外部对象，而 OpenClaw Era 的环境是托管任务的持久工作站，行动变成可检查、可回滚、可治理的 workspace operation；依据见 3.2 开头和 Table 4。\n\n22. **Workspace 设计本身会塑造 agent 的实际智能。** 论文指出 workspace 决定状态可见性、可执行操作、artifact persistence 和 failure auditability，因此部署中的智能不只来自 foundation model；依据见 4.1.1 对 workspace-level design 的讨论。\n\n23. **Human-AI interaction 正从 instruction 转向 delegation。** 论文认为 workspace agent 中用户不再指定每个 micro-step，而是授权目标、约束、权限、成功标准和风险边界；依据见 4.1.2 From Answer Generation to Authorized Work Delegation。\n\n24. **Skill 是 procedural memory，不等同于 prompt 或 tool。** 论文指出 skill 位于 model cognition 和 workspace execution 之间，封装过程、脚本、验证、依赖和安全约束，可复用、可版本化、可审计；依据见 4.2.1 和 4.2.2。\n\n25. **Agentic safety 不能停留在 prompt-level safety，必须移动到 runtime governance。** 论文强调一旦 agent 能操作文件、网络、凭证和服务，安全策略必须在 action becomes real 的位置执行；依据见 3.2.2 对 OpenClaw PRISM、ClawGuard 的讨论。\n\n---\n\n## 4. 实用的经验性结论\n\n26. **Reasoning 训练中可优先尝试 verifiable outcome reward，而非一开始构建复杂 PRM。** 论文总结 DeepSeek-R1 等经验认为 rule-based answer matching + format checking 简单但有效，PRM 则有标注成本和 reward hacking 风险；依据见 2.2.2。\n\n27. **SFT 与 RL 的分工是：SFT 稳定格式和 cold-start，RL 扩展能力边界。** 论文概括 DeepSeek-R1 和 Qwen3 的多阶段流程，指出 SFT 提供初始化与格式稳定性，RL 通过探索扩大 reasoning 能力；依据见 2.2.2 SFT/RL synergy 段落。\n\n28. **长任务 agent 系统应默认加入 verification、rollback、rerun 和 sandbox。** 论文将 OpenClaw 时代的 failure recovery 描述为 structured verification、rollback、rerun、sandboxing 和 state repair，而不是 prompt-level reflection；依据见 Table 4 和 3.2。\n\n29. **评估 workspace agent 时要记录完整 trajectory，而不仅是最终答案。** 论文建议包含 fixed initial states、snapshot/restore、trajectory logs、replay、final-state diffs、cost 和 safety checks；依据见 5.1.3 Agent/OpenClaw benchmark properties。\n\n30. **Skill 包应显式声明 version、dependencies、trigger conditions、preconditions、postconditions、failure cases、rollback behavior 和 safety permissions。** 论文指出这类元数据是 modular skill 可评估和可维护的必要条件；依据见 5.1.3 Skill data 段落。\n\n31. **Persistent workspace 需要 workspace hygiene：状态摘要、provenance labeling、snapshotting 和 rollback。** 论文提醒持久环境会积累 stale files、failed artifacts、obsolete logs 和 corrupted caches，若无法区分权威 artifact 和噪声，反而降低可靠性；依据见 4.2.2 Workspace contamination。\n\n32. **评估 computer-use agents 要做 repeated execution 和 perturbation tests。** 论文指出 agent 可能一次成功但重复失败，因此 evaluation 应包括重复执行、扰动测试、状态检查和 post-hoc auditability；依据见 3.2.2 reliability 部分。\n\n33. **工具生态应尽量采用标准化协议和 schema，而不是 ad-hoc prompt 接口。** 论文将 MCP 和 native function calling 视为从碎片化接口走向 standardized tool infrastructures 的趋势；依据见 3.1.1 Tool Use 中 MCP 段落。\n\n34. **在高风险工作流中，应按 autonomy level 分级：短可逆任务可直接执行，中风险任务需 supervised delegation，高确定性强验证任务才适合 conditional autonomy。** 论文在 delegation 部分提出不同任务应有不同自主级别，并要求 authority、boundary、confirmation、rollback 和 accountability；依据见 4.1.2。\n\n---\n\n## 5. 局限性中的机会\n\n35. **Action trajectory 数据稀缺，提示未来需要可验证的自动轨迹生成和筛选机制。** 论文指出高质量 state-action-observation trajectories 不能简单从 web scrape，需要真实任务、真实 workspace、正确动作和 final-state verification；依据见 5.1.3 Challenges。\n\n36. **Benchmark 会随 UI/API/权限变化快速过期，提示需要 continual benchmark maintenance。** 论文称有效 trajectory 可能数月内因 UI redesign、API schema change 或 permission update 失效；依据见 5.1.3 Data Scarcity, Expert Annotation, and Temporal Decay。\n\n37. **模拟环境存在 fidelity-safety trade-off，是未来 agent evaluation 的关键基础设施问题。** 论文指出 sandbox 太简单会让 agent 学到 brittle shortcuts，太接近 live service 又昂贵、危险且难 reset；依据见 5.1.3 Simulation Bottlenecks。\n\n38. **Skill supply chain 是一个新安全研究方向。** 论文指出 skill 可能包含指令、脚本、依赖、权限和凭证假设，恶意 skill 可 exfiltrate data 或诱导 unsafe tool use，因此需要 provenance tracking、permission manifests、sandbox 和 audit；依据见 4.2.2 Security and supply-chain risk。\n\n39. **Skill lifecycle management 会成为可复用 agent 能力的瓶颈。** 论文指出 skill 会因工具版本、文件布局、API schema、权限设置变化而 silent failure，因此需要 versioning、compatibility checks、regression tests 和 deprecation；依据见 4.2.2 Skill brittleness and environmental drift。\n\n40. **Workspace persistence 同时带来记忆和污染，未来需要研究 state trust 与 artifact authority。** 论文指出 workspace 会保存有用上下文，也会保存误导性 partial outputs 和 stale artifacts；依据见 4.2.2 Workspace contamination。\n\n41. **Agent governance 的成本可能超过 prompt engineering，提示未来竞争会转向 harness engineering。** 论文指出可靠部署需要 controlled environments、snapshots、verifier scripts、permission policies、logs、skill tests 和 failure recovery，瓶颈从 prompt design 转向 system operations；依据见 4.2.2 Governance overhead and evaluation cost。\n\n42. **专家领域任务缺乏简单 verifier，提示需要面向 scientific discovery、人文研究等领域的新型 evaluation protocol。** 论文指出科学发现和 humanities research 中成功往往不能还原为 unit test、UI diff 或单一 ground-truth answer；依据见 5.1.3 Data Scarcity 段落。", "research_value": "下面是按“研究问题价值”而不是“论文写作质量”来评估。由于输入材料明确说明这是一篇综述 / 观点型论文，而非提出新算法并做系统实验的论文，我会把“证据强度”与“观点合理性”分开看。\n\n---\n\n# 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文提出的问题是：“How can an AI system reliably transform user intent into completed work?”，这直接对应当前 Agent / workspace agent 的核心瓶颈。  \n- 输入材料中多次指出评价对象正在从“answer accuracy”转向“final workspace state / task closure”，并列举 SWE-bench、OSWorld、WebArena、WorkArena 等 benchmark 都开始检查最终环境状态，而不只是模型回答。  \n- WebArena 中 GPT-4 约 14% success 的例子说明，真实网页 / OS 任务与静态问答之间存在明显落差。  \n- 论文提出 Workspace、Skill、Verification、Governance 等系统组件，可能影响 agent 系统设计、评估协议、部署治理和 benchmark 构建。\n\n**负面证据或缺失**：  \n- 论文没有提出一个可直接采用的新算法、系统实现或统一 benchmark。  \n- 没有严格实验或消融证明“Workspace + Skill”相比已有 agent 框架能带来多大改进。  \n- 很多实践建议，例如 sandbox、rollback、verification、audit log，已经在工程界和 agent 研究中逐步出现，论文更多是系统化整理，而不是首次提出。\n\n**判断**：中等\n\n**理由**：  \n这个问题本身确实重要，因为输入材料显示当前 agent 在 WebArena、OSWorld、SWE-bench 等真实任务中面临“能回答但不能可靠完成任务”的瓶颈。论文若被采纳，可能改变 agent 评估和部署方式，尤其是推动从答案评估转向 task closure。但由于它没有新系统和定量实验证据，影响力更多来自“框架化表达”，而不是可以立即改变研究路线的技术结果。\n\n---\n\n# 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 论文把 Chatbot、Thinking LLM、Agent、OpenClaw / Workspace Agent 放在同一个演化框架下，强调从 conversational answer 到 persistent work 的范式转变。  \n- 它把 Workspace + Skill 作为核心组织方式，并明确区分 Skill 与 prompt、tool、memory 的关系，认为 Skill 是 procedural memory。  \n- 它提出评估对象从 answer → reasoning path → final workspace state 的变化，这个表述相对清晰。\n\n**负面证据或缺失**：  \n- 输入材料中列出的许多组成部分都已有相关工作支撑：SWE-bench、OSWorld、WebArena、Voyager、Agent Skills、MCP、function calling、sandbox、rollback、audit log 等。  \n- 论文没有证明 OpenClaw / Workspace Agent 是一个独有架构，也没有展示只有该框架才能解释现有趋势。  \n- 如果这篇论文不存在，领域内也很可能会从 coding agent、computer-use agent、browser agent、MCP 工具生态等方向自然收敛到类似观点。\n\n**判断**：弱\n\n**理由**：  \n这篇论文的不可替代性不强。它的主要贡献是把已有趋势整合成“Chatbot → Digital Colleague”和“Workspace + Skill”的叙事，但输入材料显示这些关键元素在多个已有 benchmark 和系统中已经出现。它更像是一次有条理的综述和命名，而不是难以被他人独立发现的新理论或新技术。\n\n---\n\n# 3. 时机判断（Timing）\n\n**正面证据**：  \n- 输入材料显示，LLM 系统正从单轮问答转向 tool use、browser use、coding、file operation、OS control 等更长任务。  \n- WebArena 中 GPT-4 只有约 14% success，说明当前正处于“能力看似很强，但真实任务闭环很弱”的阶段。  \n- SWE-bench、OSWorld、WorkArena 等 benchmark 已经开始使用最终环境状态作为评价标准，说明领域正在从静态 benchmark 进入动态 workspace / agent evaluation 阶段。  \n- MCP、native function calling、sandbox、audit log、permission control 等工具基础设施正在形成，说明这个问题现在具备现实落地条件。\n\n**负面证据或缺失**：  \n- 这个话题可能已经不算非常早期；agent、computer-use、workflow automation、workspace AI 已经是显性趋势。  \n- 论文没有提供证据说明它比其他同期综述或框架更早捕捉到这一转向。\n\n**判断**：强\n\n**理由**：  \n时机是这篇论文最强的方面之一。输入材料显示，当前 agent 系统已经能调用工具，但在长任务、状态保持、验证、安全治理上仍然脆弱；与此同时，SWE-bench、OSWorld、WebArena 等评估基础设施已经成熟到足以支撑这个问题。这个问题既不是太早到无法实验，也不是太晚到已经被完全解决。\n\n---\n\n# 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确质疑 Chatbot 范式：核心问题不再是“模型能否生成更好的 answer”，而是“系统能否把 user intent 转化为 completed work”。  \n- 它质疑只看单步 tool call 的做法，强调 multi-step tool use 是 trajectory-level control 问题。  \n- 它把评价对象从 final-output accuracy 扩展到 process-level verification 和 final-state / task-closure verification。  \n- 它还质疑 prompt-level safety 的充分性，认为 agentic safety 必须移动到 runtime governance，因为 action 会真实改变文件、网络、凭证和服务状态。\n\n**负面证据或缺失**：  \n- 这种范式批判主要是概念性的，没有通过实验展示旧范式在某类任务上系统性失败、新范式系统性成功。  \n- 论文批判的是一个已经逐渐被领域认识到的问题，不是完全逆主流的挑战。\n\n**判断**：强\n\n**理由**：  \n这篇论文确实在挑战“LLM = 对话生成器 / 答案机器”的惯性框架。它把重点转到持久状态、任务闭环、可验证交付和运行时治理，这不是简单在现有 chatbot benchmark 上做增量改进。虽然缺少实验证明，但作为范式审视，它的靶子明确且有输入材料中的 benchmark 趋势支撑。\n\n---\n\n# 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 输入材料反复给出同一个核心命题：AI 不应只回答问题，而应在持久工作环境中调用可复用流程，直到完成可检查的任务。  \n- 论文的系统逻辑可压缩为：“Thinking LLM 做决策，Workspace 保存状态，Skill 复用流程，Verification 检查结果，Governance 控制风险。”  \n- 关键词之间关系清楚：Workspace 解决状态持续性，Skill 解决流程复用，Verification 解决自称完成但实际未完成，Governance 解决真实行动风险。\n\n**负面证据或缺失**：  \n- 论文覆盖范围较宽，从 scaling、alignment、reasoning RL、agent、workspace、skill、benchmark、safety 都有涉及，可能导致主线被拉长。  \n- “OpenClaw”作为代表性系统形态是否必要，输入材料没有给出足够证据；核心洞见其实可以不依赖这个名词成立。\n\n**判断**：强\n\n**理由**：  \n核心洞见可以清楚地说成一句话：**AI 的目标应从答得好转为可验证地完成工作。** 这句话既区分了论文与普通 chatbot / tool-use 论文，也能解释为什么需要 Workspace、Skill、Verification 和 Governance。尽管论文覆盖面较大，但主洞见并不模糊。\n\n---\n\n# 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 输入材料列出了明确技术风险：reasoning 不可靠、长任务错误累积、memory/state 不稳定、Workspace 污染、Skill 过期、side-effect action 带来安全与治理风险。  \n- 这些风险不是确定性工程问题，因为长任务 agent 会遇到环境变化、权限不足、API 变化、UI 变化、工具返回异常、prompt injection、恶意 Skill 等动态因素。  \n- 同时，论文也指出可行路径：sandbox、snapshot/restore、verification loop、rollback、trajectory logs、Skill metadata、permission manifests、final-state diff、repeated execution 等。\n\n**负面证据或缺失**：  \n- 论文没有亲自构建系统来证明这些机制可以组合成可靠闭环。  \n- 没有给出风险被降低多少，例如加入 verification、rollback、Skill metadata 后 success rate、recoverability 或 safety violation rate 如何变化。  \n- 某些高价值任务缺乏简单 verifier，论文也承认 scientific discovery、人文研究等任务难以用 unit test 或 UI diff 判断完成。\n\n**判断**：中等\n\n**理由**：  \n这个问题有真实技术风险，不是“只要工程实现就必然成功”的确定性任务；输入材料中关于长任务错误累积、Workspace 污染、Skill drift、安全治理的讨论说明挑战充分存在。可行性也不是空想，因为已有 SWE-bench、OSWorld、WebArena、sandbox、rollback、logs 等基础设施可用。但论文没有实证展示这些机制的组合效果，因此只能给中等。\n\n---\n\n# 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 输入材料显示作者对多个方向有较完整的整理：scaling laws、RLHF、Thinking LLM、RLVR、tool use、agent benchmark、Workspace、Skill、governance、trajectory data 等。  \n- 论文能把 reasoning、agent execution、evaluation、safety 和 data construction 串成一个统一叙事，说明作者至少具备跨子领域综述能力。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队背景、系统实现、独有 benchmark、真实 workspace 平台、工业部署经验或专有数据。  \n- 没有证据表明该团队在 OpenClaw、Workspace Agent、Skill lifecycle、agent safety governance 这些具体交叉点上有独特资源。  \n- 作为观点 / 综述型论文，它的比较优势主要来自整理能力，而不是不可复制的实验平台或数据资产。\n\n**判断**：弱\n\n**理由**：  \n从输入材料看不出作者团队有不可替代的执行优势。论文确实整合了很多方向，但没有展示独有系统、数据、实验基础设施或部署经验。对于一个强调 workspace、trajectory、verification、governance 的问题，缺少这些资源证据会明显削弱比较优势。\n\n---\n\n# 综合评价\n\n**有潜力但有明显短板。**\n\n这篇论文抓住了一个真实且正在升温的问题：LLM 系统的核心评价正在从“生成好答案”转向“在真实环境中完成可验证工作”。它的强项在于时机判断、范式审视和核心洞见清晰，尤其是把 Workspace、Skill、Verification、Governance 组织成一个面向 Digital Colleague 的系统框架。短板也很明显：它是综述 / 观点型论文，没有新算法、没有参考系统、没有严格消融，因此无法证明 Workspace + Skill 到底比已有 agent 框架强多少。它更适合作为研究议程或领域地图，而不是作为已经验证的新方法论文。\n\n---\n\n# 最致命的弱点\n\n**最致命的问题是：核心主张缺少直接实证验证。**\n\n论文反复强调 Workspace + Skill + Verification 是从 chatbot 到 digital colleague 的关键，但输入材料明确说明没有真正的 ablation study，也没有固定系统下逐个移除 Workspace、Skill、Verification、Memory 等模块的实验。因此它能令人相信“这个方向重要”，但还不能令人相信“这套具体分解就是最优或必要的”。\n\n---\n\n# 如果要做得更好\n\n1. **构建一个最小可复现的 Workspace Agent 原型，并做模块级消融。**  \n   至少应比较：无 Workspace / 有 Workspace、无 Skill / 有 Skill、无 final verification / 有 final verification、无 rollback / 有 rollback，在 SWE-bench、OSWorld、WebArena 或类似任务上的 success rate、recoverability、cost、safety violation rate。\n\n2. **把“task closure”形式化为可测指标。**  \n   不只报告最终成功率，还应记录 trajectory length、错误恢复次数、重复执行一致性、状态污染率、Skill 误调用率、越权操作率、final-state diff correctness 等指标。这样论文的范式主张才能从概念框架变成可检验研究计划。\n\n---\n\n# 与 Carlini 原则的对照\n\n**最符合的 Carlini 原则**：  \n它符合 Carlini 常强调的“研究真实且正在发生的问题”：输入材料中 WebArena 低成功率、SWE-bench / OSWorld 的 final-state evaluation、agent 长任务失败等证据说明，这不是伪问题，而是当前 LLM 系统落地的真实瓶颈。\n\n**最不符合的 Carlini 原则**：  \n它不太符合“提出可检验、可失败的具体主张”这一类原则：论文给出了很好的范式叙事，但没有通过系统实验或消融让核心主张面临真正的 empirical risk。", "research_value_source": "legacy_research_value", "research_value_model": "sjtu:qwen,sjtu:deepseek-chat,sjtu:minimax,sjtu:glm,prism:gpt-5.5", "research_value_reasoning_effort": "", "affiliations": "{\n  \"authors\": [\n    {\n      \"name\": \"Yongheng Zhang\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"∗\"\n      ]\n    },\n    {\n      \"name\": \"Ziang Liu\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": [\n        \"∗\"\n      ]\n    },\n    {\n      \"name\": \"Jiaxuan Zhu\",\n      \"affiliations\": [\n        3\n      ],\n      \"markers\": [\n        \"∗\"\n      ]\n    },\n    {\n      \"name\": \"Shuai Wang\",\n      \"affiliations\": [\n        4\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Xiangqi Chen\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Haojing Huang\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Jiayi Kuang\",\n      \"affiliations\": [\n        3\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Siyu Chen\",\n      \"affiliations\": [\n        4\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Ao Shen\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Hao Wu\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Qiufeng Wang\",\n      \"affiliations\": [\n        3\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Qian-Wen Zhang\",\n      \"affiliations\": [\n        4\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Junnan Dong\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Wenhao Jiang\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Ying Shen\",\n      \"affiliations\": [\n        3\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Hai-Tao Zheng\",\n      \"affiliations\": [\n        4\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Yinghui Li\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"†\"\n      ]\n    },\n    {\n      \"name\": \"Di Yin\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Xing Sun\",\n      \"affiliations\": [\n        3\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Philip S. Yu\",\n      \"affiliations\": [\n        5\n      ],\n      \"markers\": []\n    }\n  ],\n  \"institutions\": [\n    {\n      \"id\": 1,\n      \"name\": \"Tencent Youtu Lab\"\n    },\n    {\n      \"id\": 2,\n      \"name\": \"Tsinghua University\"\n    },\n    {\n      \"id\": 3,\n      \"name\": \"Sun Yat-sen University\"\n    },\n    {\n      \"id\": 4,\n      \"name\": \"Central South University\"\n    },\n    {\n      \"id\": 5,\n      \"name\": \"University of Illinois at Chicago\"\n    }\n  ],\n  \"footnotes\": [\n    {\n      \"marker\": \"∗\",\n      \"text\": \"Equal Contribution\"\n    },\n    {\n      \"marker\": \"†\",\n      \"text\": \"Corresponding Author\"\n    }\n  ]\n}", "summary_translation": "Large Language Models (LLMs) 正在经历一场根本性转变：从对话式生成器转向能够进行 reasoning、action、memory 和 self-improvement 的集成式 AI systems。我们将这一转变概念化为从 Chatbot 到 Digital Colleague 的转向：从对话式回答转向持续性工作。我们沿着两个紧密耦合的维度来组织这一转变。\n\n首先，在 cognitive core 层面，LLMs 正在从 Chatbot 时代由 next-token prediction 驱动的 “fast thinking” systems，发展为利用 inference-time computation、Chain-of-Thought reasoning、reflection、process supervision 和 reinforcement learning 的 Thinking LLMs，以支持更审慎且可靠的 cognition。\n\n其次，在 tool-augmented task execution 层面，LLMs 正在从以 ad hoc 方式调用外部资源的 tool-calling Agents，发展为配备 persistent Workspaces、skills、verification loops 和 governance 的 OpenClaw-style workstation systems (OpenClaw)。“Workspace + Skill” 范式通过 state persistence、reusable procedures、task closure 和 experience reuse，使 episodic tool use 变得更像 colleague 式工作。我们考察了 data construction 从 instruction-response pairs 到 State-Action-Observation trajectories 的转变，以及 evaluation 从 static benchmarks 到 sandboxed、auditable、self-evolving AI ecosystems 的转变。"}]}, {"name": "Skill \u0026 Policy Evolution", "count": 2, "papers": [{"title": "Communication Policy Evolution for Proactive LLM Agents", "arxiv_id": "2606.14314", "authors": "Xinbei Ma, Jiyang Qiu, Yao Yao, Zheng Wu, Yijie Lu, Xiangmou Qu, Jiaxin Yin, Xingyu Lou, Jun Wang, Weiwen Liu, Weinan Zhang, Zhuosheng Zhang, Hai Zhao", "summary": "LLM agents have rapidly evolved into autonomous systems, yet a persistent information gap remains between users and agents: communication is costly, while users' identical preferences further limit information exchange. To investigate how agents should communicate across modalities, this paper formalizes Communication Policy, establishes textual and UI-based policies, and then evaluates communication policies across diverse environments, personas, and model combinations. Building information asymmetry for proactive agents, we set up two complementary settings, User-Agent and Planner-Executor. Experimental results reveal complementary strengths between interaction channels: text-based interaction often facilitates task performance, while structured UI improves agents' response quality and persona compliance. Motivated by that, a hybrid method combines these advantages. We further propose Communication Policy Evolution (CPE), a self-evolution framework for refining communication policies through rollout and prompt-level evolving. Without model modification, CPE achieves the best task success across multiple settings using prompt refinement alone. Our findings identify communication behavior as a critical yet underexplored design dimension for LLM agents.", "category": "cs.AI", "cluster": "Skill \u0026 Policy Evolution", "tags": ["cs.AI"], "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (Self-Evolving/Self-Improving, LLM Agents)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。", "intro_logic": "1. LLM agents 已演变为具备推理、工具使用和扩展交互能力的自主系统。\n2. 尽管能力增强，但用户与 agent 之间存在根本性的信息鸿沟：用户掌握完整任务目标，但自然语言无法一次性传达所有约束、偏好和边缘情况，导致 agent 仅能获取 partial information。\n3. 关键信息往往通过交互逐渐浮现，因此任务成功不仅依赖推理和执行，更依赖 agent 通过交互恢复缺失信息的能力。\n4. 现有 proactive agents 研究主要关注 agent 应该问什么（what to ask），即澄清对话、主动规划等，而忽视了同样重要的问题：agent 应该如何沟通（how to communicate）。\n5. 信息恢复过程从根本上受 communication channel 本身的影响：自由形式的自然语言提供灵活交互，而结构化界面（如 Generative UI）通过约束输入降低歧义并提高信息收集质量。\n6. 在部分信息条件下，选择何种交互通道以实现有效的 task-state alignment 成为关键决策，但现有工作主要关注 Generative UI 本身的技术改进，而非其在真实应用中的部署策略。\n7. 研究问题：在 LLM agents 的交互中，agent 应该如何根据任务结构和用户特征选择沟通通道（即如何制定 Communication Policy）以最大化任务完成率和交互质量？", "core_insight": "## 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**  \n作者真正的“灵光一闪”是：在 proactive LLM agents 中，关键不只是 agent 应该问用户“什么问题”（what to ask），而是应该选择“用什么沟通通道来问”（how to communicate）——即 text 和 UI 本身就是影响信息恢复、用户配合与任务成功的核心决策变量。\n\n换句话说，论文的核心认知突破不是“agent 需要主动澄清信息”，这已经有很多工作做过；而是作者意识到：**clarification 的效果不仅由问题内容决定，还强烈受 communication channel 决定。** 同一个信息需求，用 free-form text 问、用 structured UI form 收集，可能带来完全不同的 disclosure cost、response quality、persona compliance 和 task success。\n\n论文中最直接的证据是：\n\n\u003E “However, this line of work focuses primarily on _what_ the agent should ask, while largely overlooking an equally important question: _how should the agent communicate?_”\n\n以及：\n\n\u003E “In practice, information recovery is fundamentally shaped by the communication channel itself.”\n\n作者进一步指出两类 channel 的差异：\n\n\u003E “Free-form natural language enables flexible and open-ended interaction, while structured interfaces constrain user responses into organized and lower-ambiguity formats.”\n\n因此，作者把 channel choice 提升为一个独立问题：\n\n\u003E “Choosing between these interaction channels therefore becomes a critical decision for effective task-state alignment.”\n\n这就是整篇论文的方法论起点：**把 communication channel selection 从一个工程细节，重新定义为 agent policy 的一部分。**\n\n作者随后给它命名为 **Communication Policy**：\n\n\u003E “In this paper, we formalize the channel-selection decision as **Communication Policy**.”\n\n这个洞察之所以重要，是因为过去 proactive agent 研究默认“问问题”就是 natural language clarification；而这篇论文认为，agent 与用户之间的信息不对称不仅需要“问”，还需要选择合适的 **interaction modality**：有时 text 更高效，有时 UI 更能约束输入、降低歧义、提高 persona compliance。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n作者的推理链条大致是：\n\n### Step 1：agent 面临 partial information，不完整任务需要通过 interaction 恢复\n\n论文首先设定：用户持有完整 task specification `z`，agent 只看到 vague specification `ẑ`，因此必须主动恢复缺失信息。\n\n原文：\n\n\u003E “The user holds the full task specification _z_, while the agent receives only the vague specification _z̃_ and must recover missing information through communication.”\n\n这说明 task success 不只取决于 agent 的 execution ability，也取决于它能不能有效地从用户那里拿到缺失信息。\n\n---\n\n### Step 2：但 communication 是有成本的，用户也有 persona preference\n\n用户不是无限配合的信息 oracle。不同信息有不同 sensitivity cost，用户也可能是 amateur、do_selection、one_question、answer_more 等 persona。\n\n因此，agent 的 communication 不能只是“多问一点”，而要考虑：\n\n- 问什么；\n- 问几次；\n- 用什么形式问；\n- 是否符合用户偏好；\n- 是否值得为了信息付出 disclosure cost。\n\n论文将目标写成同时考虑 task success 和 disclosure cost：\n\n\u003E “The agent’s objective is to choose communication actions that maximize task success while keeping the disclosure cost in check.”\n\n---\n\n### Step 3：text 与 UI 是两种互补的信息恢复机制\n\n作者观察到两种 channel 的 inductive bias 不同：\n\n- **ask_question / text**：灵活、低开销、适合 short factual clarification；\n- **generate_ui / HTML form**：结构化、约束输入、适合多字段、选择题、表单、视觉布局。\n\n论文中的原文是：\n\n\u003E “The primitive ask_question sends a natural-language query and receives a free-text response, while generate_ui renders an HTML form as a screenshot for the user to complete.”\n\n这自然导向了三个模式：\n\n- `M_text`：只能用 ask_question；\n- `M_ui`：只能用 generate_ui；\n- `M_hybrid`：两者都能用，由 agent 动态选择。\n\n原文：\n\n\u003E “We equip agents with two communication primitives: ask_question for free-form language interaction and generate_ui for HTML-based forms.”\n\n以及：\n\n\u003E “This defines two single-channel settings, _M_text_ and _M_ui_, and a hybrid setting, _M_hybrid_, where the agent dynamically selects between the two channels.”\n\n---\n\n### Step 4：既然 hybrid 有两个 channel，就需要一个 policy 决定何时用哪个\n\n这一步是从洞察到方法的关键跳跃。\n\n作者意识到：给 agent 两个工具本身不够，因为 agent 未必知道什么时候用 text、什么时候用 UI。于是提出 **Communication Policy**：\n\n\u003E “While _M_hybrid_ provides access to both communication channels and shows strong potential, it does not specify how the channels should be used.”\n\n更直接的一句是：\n\n\u003E “Giving the agent both channels does not tell it how to use them.”\n\n因此，Communication Policy 被定义为 prompt-level strategy：\n\n\u003E “The system prompt specifies the available tools, their invocation formats, and heuristics for channel selection. The examples provide few-shot demonstrations of choosing between ask_question and generate_ui under varied conditions.”\n\n也就是说，作者不是训练新模型，而是把 channel-selection heuristic 写进 prompt 中，使 agent 在每一轮交互时选择：\n\n- 直接执行环境动作；\n- 用 ask_question；\n- 用 generate_ui。\n\n---\n\n### Step 5：naive hybrid 不稳定，因此需要自动优化 Communication Policy\n\n实验发现 text 和 UI 确实互补，但 naive hybrid 不总是最优。\n\n论文总结：\n\n\u003E “text and UI have complementary strengths: text drives task completion, while UI improves response quality and persona compliance.”\n\n但 hybrid 也会失败：\n\n\u003E “Hybrid access is broadly useful but not universally cost-effective.”\n\n于是问题变成：**如何自动找到一个更好的 channel-selection policy？**\n\n这直接导向 **Communication Policy Evolution, CPE**。\n\nCPE 的核心做法是：\n\n1. 用当前 communication policy rollout 一批任务；\n2. 收集 productivity/proactivity/personalization scores 和 trajectories；\n3. 让 LLM optimizer 分析失败轨迹；\n4. 生成 JSON patch 修改 prompt；\n5. 在 train batch 和 validation set 上做两阶段 gating；\n6. 只接受带来提升的 policy。\n\n原文：\n\n\u003E “In each round, CPE evaluates the current policy on a training batch, prompts an LLM to analyze the rollout results and propose targeted edits, and accepts or rejects the candidate via a two-stage gate that guarantees monotonic improvement on held-out data.”\n\n这就是从 seed insight 到方法的完整桥梁：\n\n\u003E channel matters → channel choice should be formalized → hybrid needs a policy → policy can be represented as prompt → rollout traces reveal bad channel choices → LLM can evolve prompt-level channel rules → validation gating prevents overfitting.\n\n---\n\n## 3. 试错历程\n\n论文没有用“我们一开始尝试了 X，失败后改成 Y”的叙事方式显式讲试错过程，但从实验结果和方法设计中可以清楚看出作者遇到了几个意料之外的困难，并据此调整了方案。\n\n---\n\n### 困难一：UI 并没有像预期那样全面提升任务成功率\n\n直觉上，structured UI form 应该能更好地收集信息，因此可能会提升 task success。但实验显示：UI 虽然通常提升 personalization 和 proactivity，却经常降低 productivity。\n\n论文在 Table 1 后总结：\n\n\u003E “_M_ui_ achieves the best personalization in 10 of 14 pairs and the best proactivity in 8 of 14.”\n\n但同时：\n\n\u003E “_M_text_ productivity exceeds _M_ui_ in 9 of 14 pairs.”\n\n作者解释原因：\n\n\u003E “Free-text exchange is more efficient for task progress: the agent can ask precisely targeted questions and receive context-rich replies, whereas UI forms impose a fixed per-turn overhead that does not always pay off in task completion.”\n\n这说明最初如果只是把 generative UI 加进 agent，效果并不稳定。UI 不是“更高级的 text”，而是一种有成本、有适用条件的 channel。\n\n这个结果逼出了一个新问题：**什么时候 UI 值得用，什么时候 text 更好？**\n\n---\n\n### 困难二：hybrid access 本身也会 backfire\n\n另一个可能的初始假设是：如果 text 和 UI 各有优势，那么把两者都给 agent，应该自然优于单一通道。\n\n但实验显示 naive hybrid 并不总是最好。论文直接指出：\n\n\u003E “Hybrid access is broadly useful but not universally cost-effective.”\n\n甚至在 Appendix H.2 中明确写道：\n\n\u003E “When the agent lacks the judgment to choose channels wisely, having both channels is worse than having one, directly motivating the need for CPE.”\n\n主文中也说：\n\n\u003E “When hybrid underperforms a single-channel baseline, the agent is worse off than if it had been restricted to one channel.”\n\n这是一处重要的试错发现：**增加 action space 会增加决策难度。**  \nagent 拥有更多 communication tools，并不自动意味着更强；如果 channel selection policy 不好，反而会多问、误问、用复杂 UI 处理简单问题，导致 cost 上升、任务失败。\n\n因此作者引入了 instance-level regret 来衡量 hybrid 相比 best single-channel 的损失：\n\n\u003E “We define the instance-level regret to quantify this gap.”\n\n这说明作者从“让 agent 同时拥有两种工具”进一步转向“优化 agent 使用两种工具的 policy”。\n\n---\n\n### 困难三：优化 productivity 可能牺牲 proactivity 和 personalization\n\nCPE 的目标是 productivity，但 communication policy 同时影响 proactivity 和 personalization。作者意识到这不是一个简单单目标问题。\n\n论文写道：\n\n\u003E “Proactivity and personalization are reported throughout to make the trade-off visible: when communication policy is optimized for productivity, both interaction scores may rise ... or dip ...”\n\n例如 Table 2 中，CPE 在 SWE-bench DeepSeek-V3.2 + Qwen3-VL-32B 上把 productivity 从 `.140` 提升到 `.214`，但 proactivity 和 personalization 下降：\n\n\u003E `.214 ↑ / .076 ↓ / .589 ↓`\n\n这说明 CPE 不是无代价地全面提升所有指标，而是在某些场景下学会减少交互、提高执行成功率，从而牺牲一部分 persona compliance 或低成本 interaction。\n\n作者对此的处理是：**把 productivity 作为主优化目标，proactivity 和 personalization 作为报告指标，而不是强行做 multi-objective optimization。**\n\n原文：\n\n\u003E “We treat this tension as a descriptive finding rather than a multi-objective optimization problem.”\n\n这也是一次方法上的取舍：他们没有把 CPE 设计成复杂的 Pareto optimization，而是先聚焦 task completion。\n\n---\n\n### 困难四：prompt evolution 容易 overfit 某一批 rollout\n\nCPE 使用 rollout batch 来改 prompt，自然存在 batch overfitting 风险：某个 patch 可能只是在当前 batch 上有效，但泛化到其他任务会退化。\n\n因此作者设计了 two-stage gating：\n\n1. candidate policy 必须在当前 batch 上超过旧 policy；\n2. 再在 held-out validation set 上超过 best-so-far policy；\n3. 只有通过 validation gate 才更新 `π*`。\n\n论文写道：\n\n\u003E “To prevent overfitting to individual batches, _D_ is partitioned into _D_train_ and _D_val_, and a best-so-far policy _π*_ with score _J*_ is maintained across rounds.”\n\n并强调：\n\n\u003E “By construction, _J*_ is monotonically non-decreasing over rounds: the best policy on held-out data never degrades.”\n\n所以 CPE 的 gated selection 不是附属细节，而是为了解决 prompt-level self-evolution 的核心难题：**LLM 生成的 prompt patch 可能看似合理，但未必真正提升泛化性能。**\n\n---\n\n### 困难五：不同 benchmark 和 persona 的最优 channel strategy 不一致\n\n实验还发现，communication policy 不是一个通用固定规则，而是受 task structure 和 persona 强烈影响。\n\n论文说：\n\n\u003E “the optimal strategy depends on task structure and persona.”\n\nAppendix H 的 persona-level case studies 更明显。例如：\n\n\u003E “The best mode varies with persona—text for amateur, UI/hybrid for answer_more, text/hybrid for do_selection, UI for one_question.”\n\n这意味着作者不能简单给出一条硬规则，比如“复杂任务用 UI，简单任务用 text”。真正有效的 policy 需要结合：\n\n- task domain；\n- current uncertainty；\n- user persona；\n- question granularity；\n- available environment information；\n- previous failed clarification turns。\n\n这也是为什么 CPE 最后学出的 policy 中出现了很多细粒度 heuristic，例如：\n\n- 先探索环境再问用户；\n- text for simple, UI for structured；\n- “I don’t know” 两次后 fail-fast；\n- one_question persona 每次只问一个问题；\n- do_selection persona 用 A/B/C options。\n\n作者在 Appendix I.5 总结这些 emergent patterns：\n\n\u003E “Several patterns recur across the CPE-discovered policies, reflecting convergent strategies for effective channel selection.”\n\n其中最核心的一条是：\n\n\u003E “Text for simple, UI for structured.”\n\n---\n\n## 总结\n\n这篇论文的 seed insight 可以概括为：\n\n**Proactive agents 的瓶颈不只是缺少信息，也不只是不会问问题，而是不会选择合适的 communication channel；channel selection 本身应被视为一种可优化的 Communication Policy。**\n\n这个洞察直接导向了三步方法：\n\n1. 定义 text / UI / hybrid 三种 communication modes；\n2. 将 hybrid 中的 channel choice formalize 为 **Communication Policy**；\n3. 用 **Communication Policy Evolution, CPE** 通过 rollout analysis 和 prompt-level patching 自动优化该 policy。\n\n而试错过程揭示了几个关键现实：\n\n- UI 提升 response quality，但不一定提升 productivity；\n- hybrid access 可能 backfire；\n- productivity 与 personalization/proactivity 存在 trade-off；\n- prompt evolution 需要 validation gating 防止 overfitting；\n- 最优 communication strategy 强烈依赖 task 和 persona。\n\n因此，这篇论文真正的贡献不是“又加了一个 UI 工具”，而是把 **how to communicate** 提升为 LLM agent 设计中的一等公民。", "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的区别是：**它不只研究 Agent 该问用户什么，而是让 Agent 学会在“文字提问”和“生成表单 UI”之间选择用哪种方式问，并且用反复试跑来自动改进这个选择规则。**\n\n---\n\n## 这篇论文宏观上到底做了什么？\n\n它做了三件事：\n\n1. **把 Agent 和用户沟通的方式明确拆成两种：**\n   - `ask_question`：直接用文字问用户一个问题。\n   - `generate_ui`：生成一个 HTML 表单，让用户在结构化界面里填写或选择。\n\n2. **比较三种沟通模式：**\n   - 只用文字：`M_text`\n   - 只用 UI：`M_ui`\n   - 文字和 UI 都能用，由 Agent 自己选：`M_hybrid`\n\n3. **提出 CPE，也就是 Communication Policy Evolution：**\n   - CPE 指的是“沟通策略进化”。\n   - 它不训练模型参数，只改 prompt。\n   - 它让 Agent 先在一批任务上试跑，看哪里沟通得不好，然后让 LLM 自己分析失败轨迹，改写沟通规则，再验证新规则有没有变好。\n\n---\n\n# 方法按执行顺序拆解\n\n下面按系统实际运行顺序讲。\n\n---\n\n## 第一步：构造“信息不完整”的任务\n\n### 输入\n\n系统有一个完整任务说明 `z`。\n\n例如：\n\n- SWE-bench 里，完整任务可能包含：\n  - bug 描述\n  - hint\n  - 目标文件路径\n  - 目标函数名\n\n- TravelGym 里，完整任务可能包含：\n  - 目的地\n  - 日期\n  - 酒店偏好\n  - 餐厅偏好\n  - 预算\n  - 最终正确答案 ID\n\n但 Agent 一开始拿不到完整 `z`，只拿到一个模糊版本 `z̃`。\n\n例如：\n\n- 完整任务：  \n  “修改 `src/auth/session.py` 里的 `validate_session()`，修复 null token 导致 session timeout 的问题。”\n- Agent 看到的模糊任务：  \n  “修复一个登录超时 bug。”\n\n### 操作\n\n论文人为删掉任务中的关键信息，只保留一个模糊描述。\n\n删掉的信息包括：\n\n- 文件名\n- 函数名\n- 具体偏好\n- 用户 ID\n- 预订 ID\n- 登录凭据\n- 评测标准等\n\n这些完整信息只给“用户模拟器”或“Planner 模拟器”。\n\n### 输出\n\n得到两个版本：\n\n- 完整任务 `z`：用户或 Planner 持有。\n- 模糊任务 `z̃`：Agent 持有。\n\n### 目的\n\n这是为了模拟真实情况：用户一开始往往不会把所有需求、约束、偏好、边界条件都说清楚。\n\n论文 Introduction 里说的核心痛点就是：**Agent 只能看到部分信息，必须通过沟通补全缺失信息。**\n\n### 如果不做会怎样\n\n如果一开始就把完整任务给 Agent，那就测不到 Agent 会不会主动沟通，也测不到不同沟通方式的价值。\n\n---\n\n## 第二步：给 Agent 两种沟通工具\n\n### 输入\n\nAgent 拿到：\n\n- 模糊任务 `z̃`\n- 环境工具，比如：\n  - 代码编辑工具\n  - 浏览器点击工具\n  - 航班数据库工具\n  - 搜索工具\n- 两个沟通工具：\n  - `ask_question`\n  - `generate_ui`\n\n### 操作\n\nAgent 在执行任务过程中，可以选择：\n\n1. 直接操作环境；\n2. 用 `ask_question` 问用户；\n3. 用 `generate_ui` 生成 HTML 表单让用户填写。\n\n论文把这叫做 **Communication Policy**，也就是“沟通策略”。\n\n这里的沟通策略不是模型参数，而是一段 prompt，告诉 Agent：\n\n- 什么时候用文字问；\n- 什么时候用 UI；\n- 问题要多具体；\n- 是否要适配用户偏好；\n- 不同任务环境下应该优先问什么。\n\n### 输出\n\n得到三种实验模式：\n\n1. `M_text`：Agent 只能用文字问。\n2. `M_ui`：Agent 只能用 UI 问。\n3. `M_hybrid`：Agent 可以自己决定用文字还是 UI。\n\n### 目的\n\n论文想回答的问题是：**沟通渠道本身会不会影响 Agent 完成任务？**\n\n之前很多工作只关心“问什么”，这篇论文关心“用什么形式问”。\n\n### 如果不做会怎样\n\n如果只允许一种沟通方式，就无法研究文字和 UI 各自的优缺点，也无法优化二者的选择。\n\n---\n\n## 第三步：用户或 Planner 根据隐藏信息回答\n\n论文有两个设置。\n\n---\n\n### 设置 A：User–Agent\n\n这是主要设置。\n\n### 输入\n\n用户模拟器拿到：\n\n- 完整任务 `z`\n- 用户 persona，也就是用户偏好，例如：\n  - `amateur`：只能回答很简单的问题。\n  - `do_selection`：只能回答选择题。\n  - `one_question`：希望一次只问一个问题。\n  - `answer_more`：希望 Agent 多问几个问题。\n\nAgent 发来：\n\n- 一个文字问题；\n- 或一个 UI 表单。\n\n### 操作\n\n用户模拟器根据规则回答：\n\n- 如果问题符合 persona，就回答。\n- 如果问题太复杂，或者不符合偏好，就可能回答 “I don’t know”。\n- 回答时还会打两个标签：\n  - `[Cost N]`：这次透露的信息敏感程度。\n  - `[Reward 0/1]`：这次提问是否符合用户偏好。\n\n例如：\n\n如果用户是 `do_selection`，Agent 问：\n\n\u003E 你想要经济舱还是商务舱？\n\n但没有给 A/B/C 选项，用户可能回答：\n\n\u003E I don’t know.  \n\u003E [Cost 3]  \n\u003E [Reward 0]\n\n如果 Agent 问：\n\n\u003E A. Economy B. Business C. First class. Which one do you prefer?\n\n用户就可以回答：\n\n\u003E A  \n\u003E [Cost 2]  \n\u003E [Reward 1]\n\n### 输出\n\nAgent 收到用户回答，并更新自己对任务的理解。\n\n同时系统记录：\n\n- Agent 是否完成任务；\n- 花了多少沟通成本；\n- 是否符合用户偏好。\n\n### 目的\n\n这是为了测试 Agent 能不能：\n\n1. 主动补全信息；\n2. 少花成本；\n3. 适配不同用户；\n4. 最终完成任务。\n\n### 如果不做会怎样\n\n如果用户没有 persona，Agent 只要一直问详细问题就行，无法测试它是否真的会适配不同用户沟通习惯。\n\n---\n\n### 设置 B：Planner–Executor\n\n这是辅助设置。\n\n### 输入\n\nPlanner 拿到完整任务 `z`。\n\nExecutor 只拿到模糊任务 `z̃`。\n\nExecutor 可以向 Planner 问问题。\n\n### 操作\n\nPlanner 没有 persona，不会故意拒绝，也没有用户偏好。\n\n它只根据完整任务客观回答 Executor 的问题。\n\n### 输出\n\nExecutor 得到补充信息，然后执行任务。\n\n### 目的\n\n这个设置是为了排除“用户性格”和“不确定回答”的影响，只看一个问题：\n\n**即使信息提供者完全配合，文字和 UI 的选择是否仍然重要？**\n\n### 如果不做会怎样\n\n如果只做 User–Agent，就无法判断效果到底来自“适配用户”，还是来自“沟通渠道本身确实有价值”。\n\n---\n\n## 第四步：Agent 执行任务，并计算三个指标\n\n### 输入\n\n每个 episode 中，系统记录：\n\n- Agent 的最终任务结果；\n- Agent 问了几次；\n- 每次用户透露的信息成本；\n- 每次是否符合 persona。\n\n### 操作\n\n论文计算三个分数。\n\n---\n\n### 1. Productivity\n\nProductivity 就是任务完成效果。\n\n不同环境里定义不同：\n\n- SWE-bench：生成 patch 和标准 patch 的相似度。\n- TravelGym：最终旅行计划得分，最高 2.4。\n- τ2-bench：数据库状态是否匹配标准答案。\n- WebArena：网页任务是否完成。\n\n### 2. Proactivity\n\nProactivity 在这里不是“多问”，而是：\n\n\u003E Agent 能不能用较低成本、较少轮次拿到必要信息并完成任务。\n\n所以如果 Agent 问很多高成本问题，proactivity 会低。\n\n### 3. Personalization\n\nPersonalization 是：\n\n\u003E Agent 的提问方式是否符合用户 persona。\n\n例如：\n\n- 对 `one_question` 用户，一次问多个问题会扣分。\n- 对 `do_selection` 用户，不给选项会扣分。\n- 对 `amateur` 用户，问专业问题会扣分。\n\n### 输出\n\n每个模式得到三个分数：\n\n\u003E productivity / proactivity / personalization\n\n例如 Table 1 中：\n\nSWE-bench，DeepSeek-V3.2 Agent，Qwen3-VL 用户：\n\n- `M_text`: `.135 / .156 / .629`\n- `M_ui`: `.113 / .196 / .705`\n- `M_hybrid`: `.140 / .089 / .594`\n\n### 目的\n\n论文不只想看任务有没有完成，还想看：\n\n- 是否问得有效；\n- 是否让用户更容易回答；\n- 是否尊重用户偏好。\n\n### 如果不做会怎样\n\n如果只看任务成功率，就会漏掉 UI 在“回答质量”和“用户偏好适配”上的优势。\n\n---\n\n# 第五步：先比较 text、UI、hybrid 三种模式\n\n这是论文第一组主要实验。\n\n### 输入\n\n四个 benchmark：\n\n- SWE-bench\n- TravelGym\n- τ2-bench\n- WebArena\n\n多种 Agent 和 User 模型组合。\n\n四个 persona。\n\n三种沟通模式：\n\n- `M_text`\n- `M_ui`\n- `M_hybrid`\n\n### 操作\n\n论文让 Agent 在相同任务上分别用三种模式跑，然后比较三个指标。\n\n### 输出\n\n核心结果来自 Table 1：\n\n1. **hybrid 的任务完成率最好次数最多，但不是总是最好。**\n\n   `M_hybrid` 在 14 组 Agent–User 配置中，有 8 组 productivity 最好。\n\n   特别是在 SWE-bench：\n\n   - 4/4 组都是 hybrid productivity 最好。\n\n   但在 WebArena：\n\n   - 0/2 组 hybrid productivity 最好。\n\n2. **UI 更擅长提高 personalization 和 proactivity。**\n\n   `M_ui` 在 14 组里：\n\n   - personalization 最好：10/14\n   - proactivity 最好：8/14\n\n3. **文字提问更常带来更高任务完成率。**\n\n   `M_text` 的 productivity 在 14 组里有 9 组超过 `M_ui`。", "additional_insights": "## 1. 实验中的反直觉发现\n\n- **Structured UI 并不天然提升任务成功率，反而经常输给 text。** 直觉上 UI 表单能更系统地收集信息，但实验中 _M_text_ 在 9/14 个 User–Agent 配置中的 productivity 高于 _M_ui_；作者解释为 free-text 更适合快速、精确地推进任务，而 UI 有固定交互开销。依据：Table 1 与 §6.1。\n\n- **UI 最擅长的不是“完成任务”，而是提升 response quality / persona compliance。** _M_ui_ 在 10/14 个配置中取得最佳 personalization，在 8/14 个配置中取得最佳 proactivity，但 productivity 常常不占优，说明结构化界面更像是“高质量信息收集器”，不是最高效的执行工具。依据：Table 1 与 §6.1。\n\n- **给 agent 同时开放 text + UI 不一定更好，naive hybrid 会 backfire。** _M_hybrid_ 虽然在多数场景 productivity 最好，但在 WebArena 0/2 个配置中都没赢，在部分 TravelGym 和 _τ_2-bench 配置中也输给单通道 baseline。依据：Table 1、Table 8 与 §6.1。\n\n- **看似更强的 hybrid baseline 在某些 persona 下明显退化。** TravelGym 中 GPT-5-mini + Qwen3-VL-32B 的 amateur persona 下，_M_hybrid_ productivity 只有 .780，低于 _M_text_ 的 .948 和 _M_ui_ 的 1.012，说明“更多交互自由度”如果没有正确 policy，反而会制造低效沟通。依据：Table 8。\n\n- **amateur 用户反而最适合简单 text，而不是 UI。** 虽然 UI 能降低回答负担，但 amateur persona 会拒绝复杂或专业问题；_M_text_ 在 _τ_2-bench、WebArena、TravelGym 多数 amateur 配置中 productivity 最优或并列最优。依据：Table 9 与 §H.3。\n\n- **one_question 用户最符合 UI 的形式，但 UI 仍可能牺牲 productivity。** _M_ui_ 在 one_question persona 上所有 benchmark 的 personalization 都最高，但在 3/4 个 benchmark 中 productivity 低于其他模式，揭示“最符合用户偏好”的模式不一定最能完成任务。依据：Table 10 与 §H.3。\n\n- **缺失信息比执行能力更可能是瓶颈。** SWE-bench oracle 实验中，把完整 task specification 注入初始 prompt 后，productivity 相比 _M_text_ 提升 2.3×–10.6×，同时 ask_question 使用率显著下降。依据：Table 3 与 §6.2。\n\n- **即使信息提供方是完全合作的 planner，channel selection 仍然重要。** Planner–Executor 设置去掉了 persona 和人类模糊性，但 _M_hybrid_ 仍在 7/10 个配置中 productivity 最优，说明通信通道选择不是单纯的人机偏好问题，而是信息传递本身的问题。依据：Table 4 与 §6.4。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **Oracle full-information ablation 直接分离了“信息缺失”和“执行能力”。** 完整信息注入后 SWE-bench productivity 大幅提升，说明很多失败不是 agent 不会修代码，而是前期没有恢复出足够的 issue 细节、文件路径或函数名。依据：Table 3 与 §6.2。\n\n- **Planner–Executor 设置是一个去 persona 的对照实验。** 作者把 User Simulator 换成无 persona、合作式披露信息的 Planner Simulator，发现 hybrid 仍常胜出，证明 communication policy 的价值并不依赖用户个性建模。依据：§3.3、Table 4 与 §6.4。\n\n- **persona-level breakdown 揭示了 aggregate 平均值掩盖的规律。** 例如 _τ_2-bench DeepSeek-V3.2 + GPT-4o 中，不同 persona 的最佳模式分别是 text、UI、hybrid 或并列，说明“最佳沟通方式”强烈依赖用户类型。依据：Table 7 与 §H.1。\n\n- **跨 benchmark 的 persona-mode alignment 分析显示，persona 效应具有可迁移性。** amateur persona 下 text 通常最安全；one_question persona 下 UI personalization 最强但 productivity 经常下降，这些规律跨 _τ_2-bench、WebArena、TravelGym、SWE-bench 反复出现。依据：Table 9、Table 10 与 §H.3。\n\n- **productivity、proactivity、personalization 之间存在非单调关系。** UI 往往提升 proactivity / personalization，但不一定提升 productivity；优化 productivity 时，proactivity 和 personalization 可能上升也可能下降。依据：Table 1、Table 2 与 §4.2。\n\n- **ask_question 使用率可作为信息缺口的间接诊断信号。** SWE-bench oracle 下 ask_question 从接近 1.00 降到 0.96 / 0.70 / 0.59 / 0.17，说明大量提问行为其实是在补全初始任务描述缺失。依据：Table 3。\n\n---\n\n## 3. 对领域的新认知\n\n- **“问什么”之外，“通过什么通道问”本身是 agent 能力的一部分。** 论文显示 text 和 UI 在 productivity、proactivity、personalization 上各有优势，channel selection 应被视为 proactive agent 的一阶设计变量，而不是 UI 层实现细节。依据：§1、§3.2 与 §6.1。\n\n- **text 与 UI 不是替代关系，而是互补关系。** text 适合快速推进、单点澄清；UI 适合约束输入、减少歧义、提升 persona compliance，因此单一通道很难全局最优。依据：Table 1 与 §7。\n\n- **structured UI 的价值主要来自“recognition over recall”。** 论文引用并实验证实，表单式 UI 通过字段、选项和视觉组织降低用户自由表达的不确定性，但这种结构化也会带来交互成本。依据：§1、§6.1。\n\n- **用户偏好会改变最优信息恢复策略，而不只是改变回答风格。** 例如 amateur 用户需要简单问题，do_selection 用户需要显式选项，one_question 用户需要单问题交互；这些偏好直接影响任务成功率。依据：Appendix D、Table 7–10。\n\n- **proactivity 不等于“多问问题”，而是以低 cost 恢复足够信息。** 论文把 proactivity 与 disclosure cost、question turns 关联起来，强调主动提问如果成本高或重复无效，反而是不好的 proactivity。依据：§5.4 与 Appendix A。\n\n- **persona compliance 与 task success 可能冲突。** one_question persona 中 UI 显著提升 personalization，却常降低 productivity，说明真实 agent 评估不能只看用户满意或只看任务完成。依据：Table 10 与 §H.3。\n\n---\n\n## 4. 实用的经验性结论\n\n- **先探索环境，再问用户。** SWE-bench 和 WebArena 的优化后策略都强调先 inspect repo / explore page，TravelGym 也建议先做一次 database search，避免询问 agent 自己可发现的信息。依据：Appendix I.5。\n\n- **简单事实用 ask_question，结构化多字段用 generate_ui。** 多个优化后 policy 都收敛到同一 heuristic：单个 ID、yes/no、A/B/C、短事实用 text；3+ fields、复杂选项比较、视觉布局或表单输入才用 UI。依据：Appendix I.2–I.5。\n\n- **UI 不要做大而全表单，应做小而明确的 selection UI。** TravelGym 优化策略建议 UI 只呈现约 2–6 个 labeled options，或至多 3 个明确选项，并且页面只问一个 travel-related question。依据：Appendix I.3。\n\n- **每次 clarification 尽量只问一个问题。** 多个 persona 和 CPE-discovered policy 都强调 ask_question 应该 concise、single clear query，尤其对 one_question persona 或任务不确定时有效。依据：Appendix D、Appendix I.2–I.4。\n\n- **面对 do_selection 用户，直接给 A/B/C 选项通常比自由问题更稳。** do_selection persona 只回答 selection questions，优化后 _τ_2-bench policy 明确要求 always phrase questions with explicit lettered options。依据：Appendix D 与 Appendix I.2。\n\n- **面对 amateur 用户，避免问专业细节。** amateur persona 会对专业问题回答 “I don’t know”；优化后策略建议只问 general、non-technical questions，不询问 policy details、specific dates/times 等复杂信息。依据：Appendix D 与 Appendix I.2。\n\n- **客服类任务可用“两次失败即切换/升级”的 fail-fast 规则。** _τ_2-bench 多个优化后 policy 独立发现：同一 verification goal 连续两次 “I don’t know” 或 timeout 后，不要重复问，应改成 A/B/C、短 UI 或 transfer_to_human_agents。依据：Appendix I.2 与 I.5。\n\n- **WebArena 中应优先浏览器动作，communication 只用于 blocking ambiguity。** 优化后 WebArena policy 建议先用 goto、click、scroll、AXTree 信息完成任务，只有页面探索无法解决单个缺失事实时才 ask_question。依据：Appendix I.4。\n\n- **generate_ui 工程上要严格约束格式。** 多个 policy 要求 HTML 是 complete valid HTML5 document，包含 `\u003Cmeta charset=\"utf-8\"/\u003E`，并且 UI 中的问题要与 questions parameter 精确一致。依据：Appendix F 与 Appendix I.2–I.4。\n\n- **不要重复问已经回答过或可由工具查到的信息。** _τ_2-bench 优化策略明确要求用户提供 user ID 后立即查账户和 reservation，不要再次询问；WebArena 策略也要求不要询问页面可见信息。依据：Appendix I.2 与 I.4。\n\n---\n\n## 5. 局限性中的机会\n\n- **LLM User Simulator 可能不能代表真实人类，未来需要 human-in-the-loop 验证。** 作者承认模拟用户可控且可复现，但可能无法捕捉真实人类沟通的多样性，这是把 communication policy 推向真实产品前的重要研究机会。依据：Limitations。\n\n- **当前只研究 text 与 HTML UI，未来可扩展到更多 channel。** 论文指出 communication channel design space 仍大多未探索，暗示语音、多模态标注、可编辑表格、wizard、chat+form mixed UI 等都可能成为新方向。依据：Limitations 与 §3.2。\n\n- **固定 sensitivity schema 过于理想化，真实 disclosure cost 更动态。** 当前 cost annotation 假设用户按预定义层级披露信息，但现实中隐私敏感度会随上下文、信任、任务风险变化，这为 adaptive privacy / dynamic cost modeling 留下空间。依据：Limitations 与 Appendix A。\n\n- **论文主要优化 productivity，未来值得做 multi-objective communication policy。** 作者明确说 proactivity 和 personalization 只是报告指标而非联合优化目标，因此未来可以研究在 task success、cost、persona compliance 之间显式 Pareto 优化。依据：§4.2 与 Table 2。\n\n- **benchmark 覆盖有限但暴露了 domain dependence，未来需要更细粒度任务分类。** WebArena 中 hybrid 完全不占优，而 SWE-bench 中 hybrid 全胜，说明 task structure 会强烈影响最优 channel；未来可研究什么任务属性决定 text/UI/hybrid 的收益。依据：Table 1、§6.1 与 Limitations。\n\n- **真实 UI 质量本身没有被单独评估，是潜在研究变量。** 论文使用 generate_ui 作为通信 primitive，但主要衡量任务成功和 persona compliance；未来可以研究 UI layout quality、field design、visual complexity 如何影响用户披露质量。依据：§1、§3.2 与 Limitations。", "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文把 proactive agent 的研究焦点从“问什么”扩展到“用什么通道问”，即 text vs. generated UI 的 Communication Policy。  \n- 实验覆盖 SWE-bench、TravelGym、τ2-bench、WebArena 四类任务，说明问题不是单一应用中的 UI 细节。  \n- 结果显示通道选择会改变 productivity / proactivity / personalization：例如 `M_ui` 在 10/14 个配置中 personalization 最好、8/14 个配置中 proactivity 最好；`M_text` 在 9/14 个配置中 productivity 高于 `M_ui`；`M_hybrid` 在 14 组中 8 组 productivity 最好但并非总是最优。  \n- CPE 通过 prompt-level policy evolution 改进 communication policy，若成立，会影响 agent 产品中“何时聊天、何时表单、何时混合”的设计方式。\n\n**负面证据或缺失**：  \n- 主要用户来自 LLM User Simulator，而非真实人类，作者也承认需要 human-in-the-loop 验证。  \n- 当前只研究 text 和 HTML UI 两种通道，离真实产品中的语音、多模态标注、可编辑表格、wizard 等交互形态还有距离。  \n- proactivity 和 personalization 只是报告指标，不是主要优化目标，实际产品中可能更关心多目标权衡。\n\n**判断**：中等\n\n**理由**：  \n这项工作确实可能改变一部分 agent / generative UI 研究者的评估和设计方式，因为它用四个 benchmark 证明了 communication channel 会显著影响任务成功率和用户适配，而不是纯前端实现问题。但影响力还不能判为“强”，因为关键证据主要来自模拟用户，真实用户场景和更多通道尚未验证。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 输入材料明确指出，现有 proactive agents 主要关注“agent 应该问什么”，而较少研究“agent 应该如何沟通”。  \n- 论文把 `ask_question` 与 `generate_ui` 显式作为两类 communication primitive，并比较 `M_text`、`M_ui`、`M_hybrid`。  \n- 提出 CPE：不训练模型参数，而是通过 rollout、失败轨迹分析、prompt-level policy 改写来优化 communication policy。  \n- Planner–Executor 设置去掉 persona 后，`M_hybrid` 仍在 7/10 个配置中 productivity 最优，说明它不是单纯的人机偏好实验。\n\n**负面证据或缺失**：  \n- text vs. form UI 的对比本身是自然且容易想到的方向，尤其在 Generative UI 和 agent 产品兴起后，其他团队很可能也会做类似实验。  \n- CPE 本质上是 prompt evolution / self-refinement 思路在 communication policy 上的应用，不是全新的优化范式。  \n- 输入材料没有提供与非常接近工作的系统性对比，例如已有澄清问答、adaptive form、mixed-initiative UI、conversational form filling 的直接差异。\n\n**判断**：中等\n\n**理由**：  \n这篇论文的独特性主要在于把“沟通通道选择”正式抽象为 Communication Policy，并在多 benchmark 中系统评估 text/UI/hybrid，而不是仅改进 UI 生成质量。不过它的基本方向并非难以预见，CPE 也更像是已有 prompt evolution 思路的迁移，因此不可替代性达不到强。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- 输入材料指出 LLM agents 已经发展为具备推理、工具使用和扩展交互能力的自主系统，这正是通信策略开始影响实际任务成败的阶段。  \n- Generative UI 已经成为可用交互形态，但现有工作更多关注 UI 技术本身，而非部署策略。  \n- 论文实验发现 naive hybrid 会 backfire，例如 WebArena 中 `M_hybrid` 在 0/2 个配置中 productivity 最好，说明“给更多交互能力”已经不再自动等于提升，需要现在研究 policy。  \n- SWE-bench oracle 实验显示完整信息注入后 productivity 相比 `M_text` 提升 2.3×–10.6×，说明当前 agent 的瓶颈确实常在信息恢复而非单纯执行能力。\n\n**负面证据或缺失**：  \n- 真实 Generative UI 产品形态仍在快速变化，当前只研究 HTML 表单可能稍显早期。  \n- 如果真实用户行为与模拟 persona 差异很大，部分 timing 结论可能需要重新验证。\n\n**判断**：强\n\n**理由**：  \n这个问题现在做很合适：agent 已经有执行能力，用户信息不完整正在成为实际瓶颈，而 Generative UI 又刚好提供了新的沟通通道。尤其是 oracle full-information ablation 和 hybrid backfire 结果共同说明，当前阶段不研究 communication policy 会导致系统设计误判。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确挑战了 proactive agent 研究只关注“what to ask”的范式，提出“how to communicate”同样是核心问题。  \n- 实验反驳了“结构化 UI 天然更好”的直觉：`M_text` 在 9/14 个 User–Agent 配置中的 productivity 高于 `M_ui`。  \n- 实验也反驳了“开放更多工具一定更好”的直觉：`M_hybrid` 在 WebArena 0/2 个配置中没赢，在部分 TravelGym 和 τ2-bench 配置中也输给单通道 baseline。  \n- persona-level breakdown 显示不同用户类型下最佳模式不同，例如 amateur 往往更适合简单 text，而 one_question 用户虽更符合 UI 形式但 productivity 可能下降。\n\n**负面证据或缺失**：  \n- 它挑战的是 agent 交互设计中的一个子范式，而不是整个 LLM agent 架构或训练范式。  \n- 对“现有范式”的文献定位在输入材料中较概括，缺少更细的相关工作对照。\n\n**判断**：强\n\n**理由**：  \n这篇论文最有价值的地方正是质疑了两个常见默认假设：结构化 UI 不一定提升任务成功率，hybrid 也不一定天然优于单通道。上述结论有具体表格结果支撑，而不是停留在概念层面，因此在这个维度上可以给强。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩为一句话：**沟通通道决定信息恢复质量。**  \n- 论文的实验设计与这个洞见高度对应：构造 partial information 任务，让 agent 在 text、UI、hybrid 中选择，并用 productivity / proactivity / personalization 评估。  \n- 多个实验都围绕同一洞见展开：User–Agent 验证 persona 影响，Planner–Executor 排除 persona 干扰，oracle full-information ablation 证明信息缺失是瓶颈，CPE 优化通道选择规则。\n\n**负面证据或缺失**：  \n- CPE、persona、四个 benchmark、三类指标使论文整体机制较多，可能稀释读者对主线的注意力。  \n- “沟通通道”与“问题内容”在实际交互中并不完全可分，论文是否能严格区分二者，输入材料中证据有限。\n\n**判断**：强\n\n**理由**：  \n这篇论文的核心洞见非常清楚：agent 不只是要决定问什么，还要决定通过什么形式问。实验主线基本都服务于这个洞见，而且 text/UI/hybrid 的结果差异直接支撑了这一点。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 结果不是确定性的：UI 在 personalization 和 proactivity 上常占优，但 productivity 常输给 text；hybrid 在 SWE-bench 全胜却在 WebArena 不占优。这说明研究问题存在真实不确定性。  \n- Oracle full-information ablation、Planner–Executor 对照、persona-level breakdown 都降低了“只是偶然 benchmark artifact”的风险。  \n- 方法上不需要训练模型，只通过 prompt-level CPE 改进 policy，技术实现可行性较高。  \n- CPE 能通过 rollout 和失败轨迹分析自动改写 policy，说明问题不是纯人工规则设计。\n\n**负面证据或缺失**：  \n- 最大技术风险是模拟用户是否可信；LLM User Simulator 可能不能代表真实人类。  \n- disclosure cost 和 reward 标签来自预设 schema，现实中的隐私敏感度和用户耐心会更动态。  \n- 当前主要优化 productivity，没有真正做 task success、cost、persona compliance 的多目标优化。  \n- UI 质量本身没有单独评估，难以判断失败来自“UI 通道不合适”还是“生成的 UI 质量差”。\n\n**判断**：中等\n\n**理由**：  \n这个问题有足够科学风险，因为实验结果出现了多处反直觉现象，例如 UI 不一定提升 productivity、hybrid 会 backfire。但可行性主要建立在模拟环境和 prompt evolution 上，离真实用户、多通道、多目标优化仍有距离，因此不是高风险高回报型，只能判中等。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 论文能同时覆盖 SWE-bench、TravelGym、τ2-bench、WebArena，并构造 User–Agent 与 Planner–Executor 两套设置，说明团队具备较强的 benchmark 整合和 agent 实验工程能力。  \n- 他们还设计了 persona、cost、reward、partial information construction、communication tools 和 CPE，显示出跨 agent evaluation 与 interaction design 的一定能力。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队背景、过往工作、真实产品部署经验、UI/HCI 专长或用户研究能力。  \n- 由于缺少真实人类实验，无法证明团队在“LLM agent × HCI × 用户建模”这个交叉点上有独特资源。  \n- CPE 是 prompt-level 方法，其他有 agent evaluation 平台的团队也较容易复现类似路线。\n\n**判断**：弱\n\n**理由**：  \n从实验规模看，团队有不错的工程执行力；但“比较优势”要求证明他们比别人更适合做这个特定问题。输入材料没有提供团队独特资源或长期积累，且方法主要是 prompt-level 和 benchmark-level，因此证据不足以支撑中等以上判断。\n\n---\n\n# 综合评价\n\n**综合评价：值得深入关注。**  \n这篇论文的问题选择是有价值的：它把 proactive agent 的信息恢复问题从“问什么”推进到“用什么通道问”，并用 text/UI/hybrid 的系统实验给出了非显然结论。最强之处在于时机和范式挑战：当前 agent 已经足够能执行任务，但信息缺失仍是瓶颈，而论文证明结构化 UI 和 hybrid 都不是无条件更好。主要短板是外部有效性，尤其是 LLM User Simulator、固定 disclosure cost schema、有限通道集合，使得结论距离真实用户产品还有一步。\n\n# 最致命的弱点\n\n**最致命的问题是真实用户有效性不足。**  \n论文的核心对象是“用户—agent 沟通”，但主要证据来自 LLM 用户模拟器和预设 persona；如果真实用户对表单、自由文本、隐私成本和回答负担的反应不同，那么 text/UI/hybrid 的优劣排序可能会发生变化。\n\n# 如果要做得更好\n\n1. **加入真实人类或半真实用户实验。**  \n   至少在 TravelGym、WebArena 这类非专业任务上做 small-scale human-in-the-loop 验证，检查 persona simulator 的结论是否成立。\n\n2. **从单目标 productivity 扩展到多目标 policy optimization。**  \n   现在 proactivity 和 personalization 主要是报告指标；更强的版本应显式优化 task success、沟通成本、用户偏好、隐私披露之间的 Pareto trade-off。\n\n# 与 Carlini 原则的对照\n\n**最符合的 Carlini 原则**：它符合“选择一个能被简单实验揭示、且可能产生反直觉结果的问题”——UI 不一定提升任务成功率、hybrid 会 backfire，这些都是清楚且可检验的发现。  \n\n**最不符合的 Carlini 原则**：它较不符合“尽量评估真实对象而非代理对象”的精神，因为核心用户行为主要由 LLM User Simulator 和固定 persona/cost schema 代理，真实用户证据不足。", "research_value_source": "legacy_research_value", "research_value_model": "sjtu:qwen,sjtu:deepseek-chat,sjtu:minimax,sjtu:glm,prism:gpt-5.5", "research_value_reasoning_effort": "", "affiliations": "```json\n{\n  \"authors\": [\n    {\n      \"name\": \"Xinbei Ma\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"*\"\n      ]\n    },\n    {\n      \"name\": \"Jiyang Qiu\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"*\"\n      ]\n    },\n    {\n      \"name\": \"Yao Yao\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Zheng Wu\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Yijie Lu\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Xiangmou Qu\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Jiaxin Yin\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Xingyu Lou\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": [\n        \"†\"\n      ]\n    },\n    {\n      \"name\": \"Jun Wang\",\n      \"affiliations\": [\n        2\n      ],\n      \"markers\": [\n        \"†\"\n      ]\n    },\n    {\n      \"name\": \"Weiwen Liu\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Weinan Zhang\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": []\n    },\n    {\n      \"name\": \"Zhuosheng Zhang\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"†\"\n      ]\n    },\n    {\n      \"name\": \"Hai Zhao\",\n      \"affiliations\": [\n        1\n      ],\n      \"markers\": [\n        \"†\"\n      ]\n    }\n  ],\n  \"institutions\": [\n    {\n      \"id\": 1,\n      \"name\": \"Shanghai Jiao Tong University\"\n    },\n    {\n      \"id\": 2,\n      \"name\": \"OPPO Research Institute\"\n    }\n  ],\n  \"footnotes\": [\n    {\n      \"marker\": \"*\",\n      \"text\": \"Equal contribution. Work done during internship at OPPO.\"\n    },\n    {\n      \"marker\": \"†\",\n      \"text\": \"Corresponding authors.\"\n    }\n  ]\n}\n```", "summary_translation": "LLM agents 已迅速发展为自主系统，但用户与 agents 之间仍存在持续的信息鸿沟：沟通成本较高，而用户相同的偏好进一步限制了信息交换。为研究 agents 应如何跨模态沟通，本文形式化定义了 Communication Policy，建立了 textual 和 UI-based policies，并在多样化的 environments、personas 和 model combinations 中评估 communication policies。围绕 proactive agents 的信息不对称性构建，我们设置了两个互补场景：User-Agent 和 Planner-Executor。实验结果揭示了不同 interaction channels 之间的互补优势：text-based interaction 通常有助于提升任务表现，而 structured UI 则改善了 agents 的 response quality 和 persona compliance。受此启发，我们提出了一种 hybrid method 来结合这些优势。我们进一步提出 Communication Policy Evolution，简称 CPE，这是一个通过 rollout 和 prompt-level evolving 来优化 communication policies 的 self-evolution framework。在不修改模型的情况下，CPE 仅通过 prompt refinement 就在多个设置中实现了最佳的 task success。我们的研究结果表明，communication behavior 是 LLM agents 中一个关键但尚未得到充分探索的设计维度。"}, {"title": "SkillAudit: Ground-Truth-Free Skill Evolution via Paired Trajectory Auditing", "arxiv_id": "2606.14239", "authors": "Haowen Gao, Haoran Chen, Can Wang, Shasha Guo, Liang Pang, Zhaoyang Liu, Huawei Shen, Xueqi Cheng", "summary": "Agent skills are structured procedural packages that guide frozen LLM agents in specialized workflows. Skills rarely remain sufficient after deployment: edge cases, API changes, and deployment constraints become visible only through use, making skill evolution a practical necessity. Existing methods depend on privileged feedback such as held-out validation scores, hidden test outcomes, or environment rewards -- signals often unavailable when a practitioner has only a task description and workspace data. We introduce SkillAudit, a framework for evolving agent skills without ground-truth feedback. The key idea is paired trajectory auditing: at each iteration, the same task is executed with and without the candidate skill, isolating how the skill changes agent behavior without external labels. To turn behavioral differences into edit guidance, SkillAudit uses Process-Aligned Contrastive Evaluation (PACE), a cluster of evaluators that maps trajectory divergences to diagnostic signals linked to specific passages in the skill document. A structural verifier, compiled once from the task specification and then fixed, checks task constraints and rolls back harmful updates. SkillAudit routes edits through two pipelines: Refine removes noisy or irrelevant guidance from broadly useful skills, while Repair replaces passages that conflict with the task. Across 89 containerized tasks spanning 8 professional domains, SkillAudit achieves 73.9% average task reward, outperforming an agent without skills (40.9%) and the static expert skill (56.7%). These gains are obtained without accessing hidden tests, reference solutions, or external scoring functions during evolution.", "category": "cs.AI", "cluster": "Skill \u0026 Policy Evolution", "tags": ["cs.AI"], "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (LLM Agents)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。 但 selection_score=-36 需要 LLM 细筛确认边界排除项。 LLM 细筛结果: 该论文完全符合“自我演化 (Self-Evolving)”和“单智能体 (Agentic)”的研究方向。\n\n1. 核心贡献匹配：论文提出了 SkillAudit 框架，旨在解决 LLM 智能体在部署后技能（Skills）的自我演化问题。其核心机制是通过“配对轨迹审计”（Paired Trajectory Auditing）和“过程对齐对比评估”（PACE），在没有地面真值（Ground-Truth-Free）的情况下，利用智能体自身的执行轨迹差异来诊断并改进技能文档。这直接对应了筛选标准中关于“智能体通过经验、反思或环境反馈进行自我完善和迭代”的定义。\n2. 符合保留规则：\n   - 根据第一步中的保留规则：“如果论文的核心机制是 self-evolving / self-improving / iterative improvement... 即使对象是... 模型训练，也应优先保留”。本文正是研究智能体技能（作为智能体能力的一部分）的迭代改进。\n   - 根据第一步中的保留规则：“如果论文研究 agent 的 harness / scaffold... 并且核心贡献是让这些智能体运行组件通过轨迹、反馈、观测或评估结果自动改进、演化或自适应优化”。SkillAudit 正是对 Agent Skill（一种结构化程序包/工具中间件）的自动演化框架。\n3. 排除项检查：\n   - 它不是单纯的应用论文，而是提出了新的演化机制。\n   - 它不涉及被排除的安全、对齐、多模态或图神经网络技术。\n   - 它关注的是智能体能力的内在演化，而非单纯的基础设施部署。\n\n因此，这是一篇关于 LLM 智能体技能自我演化机制的高质量相关论文。", "intro_logic": "1. LLM agents are increasingly used for long-horizon professional tasks that require procedural reliability, such as invoking tools in the correct order and satisfying strict output constraints.\n2. Agent skills, defined as structured multi-file instruction packages, have emerged as a practical interface to provide this procedural knowledge to frozen models without updating model parameters.\n3. However, skills rarely remain sufficient after deployment because new edge cases, changes in tools and APIs, and deployment-specific constraints often become visible only through use, causing skills to become incomplete, misaligned, or misleading.\n4. Existing skill evolution methods typically rely on privileged feedback signals, such as held-out validation scores, hidden test outcomes, environment rewards, or expert reference responses, which are often unavailable in realistic deployment settings where practitioners only have task descriptions and workspace data.\n5. This raises the central research question: how can agent skills be improved without access to external ground-truth feedback during optimization?", "core_insight": "作为学术分析师，我深入剖析了 **SKILLAUDIT** 这篇论文。这篇论文的核心价值不在于它解决了“技能进化”这个老问题，而在于它重新定义了在没有外部真值（Ground-Truth）的情况下，我们如何**观测**和**归因**技能对智能体行为的影响。\n\n以下是针对该论文关键智力洞察的深度解析：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n作者意识到，在缺乏外部奖励信号时，**“有技能”与“无技能”执行同一任务所产生的轨迹差异（Paired Trajectory Divergence），本身就是一个自包含的、无需标签的因果诊断信号，能够直接定位技能文档中具体段落对智能体行为的贡献或干扰。**\n\n**展开解释：**\n传统的技能进化方法（如 Oracle-Gated 或 Failure-Signal Driven）都依赖于一个外部“裁判”（Oracle）来告诉系统“这次做对了”或“这次做错了”。但在真实部署中，这个裁判往往不存在。\n作者的突破在于，他们不再试图去猜测“正确答案”是什么，而是通过**控制变量法**（Controlled Experiment）来观察“技能”这个变量本身的作用。\n如果智能体在没有技能时表现尚可，而在加入技能后行为发生了显著偏离（无论是变好还是变坏），这种**行为上的差异（Behavioral Divergence）**就是技能生效的证据。更重要的是，这种差异可以追溯到技能文档中的具体段落。如果去掉某段文字，行为差异消失，那么这段文字就是导致该行为的关键因子。\n\n**论文原文证据：**\n\u003E \"The key idea is paired trajectory auditing: at each iteration, the same task is executed with and without the candidate skill, allowing the system to isolate how the skill changes agent behavior without external labels.\" (Abstract)\n\n\u003E \"Paired execution separates them by running the same task twice under identical conditions... The behavioral differences between $\\tau_w$ and $\\tau_{wo}$ expose the skill’s effect against the same baseline task difficulty.\" (Section 3.2)\n\n\u003E \"Raw trajectory pairs are evidence, not diagnosis... PACE tells it 'with this paragraph present, the agent took this wrong action at this step, whereas the without-skill run did not.'\" (Section 3.2)\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接构建了 SKILLAUDIT 的方法论骨架，推理链条如下：\n\n1.  **从“结果评估”转向“过程对比”**：\n    *   *洞察*：既然没有最终得分，那就看过程差异。\n    *   *方法*：引入 **Paired Trajectory Auditing**。每次迭代并行运行两个轨迹：$\\tau_w$（带技能）和 $\\tau_{wo}$（无技能）。\n\n2.  **从“整体反馈”转向“局部归因”**：\n    *   *洞察*：知道技能有影响还不够，必须知道是技能的*哪一部分*导致了影响，才能进行编辑。\n    *   *方法*：开发 **PACE (Process-Aligned Contrastive Evaluation)**。PACE 不仅仅是一个评分器，它是一个“差异映射器”。它将轨迹中的行为分歧点（Divergence Points）映射回技能文档中的具体段落（Segment-anchored diagnostic signals）。例如，如果 $\\tau_w$ 在调用 API 时出错，而 $\\tau_{wo}$ 没有，PACE 会指出技能文档中关于该 API 调用的具体指令段落是“有害”或“被忽略”的。\n\n3.  **从“盲目优化”转向“受控编辑”**：\n    *   *洞察*：LLM 生成的评估信号（PACE）可能不稳定（Drift），需要硬约束来防止退化。\n    *   *方法*：引入 **Anchor Verifier**。这是一个从任务描述中编译出的、固定的、确定性的结构检查器（如文件是否存在、格式是否正确）。它不依赖 LLM 的判断，作为进化的“安全网”。如果 PACE 认为技能变好了，但 Anchor Verifier 发现基本结构坏了，则强制回滚。\n\n4.  **从“单一策略”转向“双路分流”**：\n    *   *洞察*：技能的问题有两种：一是“噪音太多”（Refine），二是“核心错误”（Repair）。\n    *   *方法*：根据初始兼容性评估，将任务路由到 **Refine**（做减法，去噪）或 **Repair**（做替换，修错）管道。\n\n### 3. 试错历程与调整\n\n作者在实现过程中遇到了几个关键的意料之外的困难，并据此调整了方案：\n\n**困难一：LLM 评估器的“漂移”与主观性（Evaluator Drift）**\n*   *问题*：最初可能设想完全依赖 LLM 来判断轨迹好坏。但作者发现，LLM 作为评估器（PACE）在迭代过程中标准会发生变化（Drift），导致进化方向不稳定。\n*   *调整*：引入了 **Anchor Verifier** 作为“静态锚点”。\n    *   *原文证据*： \"PACE signals are soft and, as LLM-generated judgments, prone to drift... The Anchor Verifier provides a deterministic, static counterpart... locked for the remainder of evolution.\" (Section 3.3)\n    *   *新子问题*：如何确保 Anchor Verifier 不会过于严格导致误杀？\n    *   *解决*：限制 Anchor Verifier 只检查“无需真值即可验证”的硬性结构约束（如文件存在性、格式），而不检查语义正确性。\n\n**困难二：“无技能”基线的有效性（Degenerate Without-Skill Runs）**\n*   *问题*：配对审计的前提是“无技能”轨迹 $\\tau_{wo}$ 必须是一个合理的参考系。如果任务太难，智能体在没有技能时完全无法执行（产生垃圾轨迹），那么对比就失去了意义。\n*   *调整*：设计了 **Degenerate Run Handling** 机制。\n    *   *原文证据*： \"This contrast is informative whenever the without-skill run $\\tau_{wo}$ executes the task coherently enough to serve as a reference; when it does not, PACE marks the comparison uninformative and the iteration falls back to single-trajectory evaluation on $\\tau_w$.\" (Section 3.2)\n    *   *新子问题*：当对比失效时，如何继续进化？\n    *   *解决*：回退到单轨迹评估，仅依赖 Anchor Verifier 和单轨迹的 PACE 维度（如格式合规性）进行微调，暂停基于对比的“差距填充”（Gap-filling）。\n\n**困难三：编辑的“过度修剪”与“保留噪音”（Over-pruning vs. Under-pruning）**\n*   *问题*：在 Refine 管道中，系统倾向于删除所有看起来不直接导致成功的段落。但这可能删除了必要的上下文知识（Domain Procedure），导致技能变得过于稀疏而无法工作。反之，如果过于保守，又无法去除噪音。\n*   *调整*：引入了 **Protected Segments** 和 **Asymmetric Cost** 机制。\n    *   *原文证据*： \"The cost of accepting a harmful update far exceeds the cost of blocking a beneficial one.\" (Section 3.3)\n    *   *解决*：PACE 不仅输出“手术目标”（要改的地方），还输出“保护提示”（Protected Hints），标记那些删除后会导致退化的段落。Skill Iterator 必须遵守这些保护约束。此外，采用“减法优先”（Subtract-first）策略，只有在确认无害的情况下才进行删除，而替换操作（Repair）则更为谨慎。\n\n**困难四：技能进化的“可观测性边界”（Observability Boundary）**\n*   *问题*：作者发现，并非所有技能都能进化。那些依赖“领域程序性知识”（Domain Procedure，即知道*做什么*但无法通过结构验证的知识）的技能，进化效果很差。因为审计器只能看到“文件是否存在”或“代码是否编译”，看不到“逻辑是否正确”。\n*   *调整*：这并非通过算法调整解决，而是通过**理论界定**来管理预期。\n    *   *原文证据*： \"A skill is only as evolvable as its weakest claim is observable.\" (Section 4.3)\n    *   *结论*：作者明确指出了方法的局限性——Ground-truth-free 进化只能优化那些“正确性会留下可观测结构痕迹”的技能。对于纯语义或逻辑判断类的任务，仍需人类或更强 Oracle 的介入。这一洞察反过来指导了技能作者：**“Write skills the way a test would read them”**（像测试用例阅读那样编写技能）。", "methodology": "### 1. 一句话概括核心创新\n\n**这篇论文最本质的区别在于：它完全抛弃了“标准答案”或“外部评分”，仅通过对比“有技能”和“无技能”两种执行过程的差异，来自动判断技能的好坏并进行修改。**\n\n---\n\n### 2. 返璞归真，平铺直叙\n\nSKILLAUDIT 是一个自动优化 Agent（智能体）技能文档的系统。\n它的核心逻辑是：给 Agent 一个任务，让它跑两遍。第一遍带着当前的技能文档跑，第二遍不带任何技能文档跑。\n系统会仔细对比这两遍运行的过程记录（轨迹）。如果带技能的跑法比不带技能的跑法更顺畅、结果更符合要求，系统就认为这个技能有用；如果带技能的跑法反而出错或更差，系统就认为技能有害。\n基于这种对比，系统会定位到技能文档中具体哪一段话导致了问题，然后删除废话、修正错误，或者补充缺失的步骤。整个过程不需要任何人告诉它“正确答案”是什么，也不需要任何外部测试脚本打分。\n\n---\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：初始化与路由（Setup \u0026 Routing）\n\n*   **输入**：任务描述（T）、工作区数据（W）、初始技能文档（S0）。\n*   **操作**：\n    1.  系统分析任务描述，提取出一些硬性约束（比如必须生成某个文件、文件格式必须是什么），生成一个**锚点验证器（Anchor Verifier）**。这个验证器一旦生成，后续不再改变，只用来检查硬性指标。\n    2.  系统判断初始技能文档和任务的匹配程度。如果技能大体正确但有噪音，进入**精简模式（Refine）**；如果技能核心逻辑与任务冲突，进入**修复模式（Repair）**。\n*   **输出**：一个固定的硬性检查脚本（锚点验证器），以及确定的优化策略（精简或修复）。\n*   **目的**：\n    *   **锚点验证器**：防止系统在优化过程中把原本正确的硬性要求（如文件名、格式）改坏了。因为后续的评价主要靠对比，对比可能产生偏差，需要一个绝对客观的底线。\n    *   **路由**：不同的问题需要不同的改法。大体对的技能不能大改，否则会把好的部分改坏；完全错的技能必须大改，否则修不好。\n*   **如果不做会怎样**：如果没有锚点验证器，系统可能会为了追求“对比优势”而破坏任务的硬性结构要求；如果没有路由，对好技能进行激进修改会导致性能下降，对坏技能进行保守修改则无法解决问题。\n\n#### 第二步：成对轨迹审计（Paired Trajectory Auditing）\n\n*   **输入**：当前的技能文档（S）、任务描述、工作区。\n*   **操作**：\n    1.  **并行执行**：让 Agent 执行两次任务。\n        *   轨迹 A（$\\tau_w$）：注入当前技能文档执行。\n        *   轨迹 B（$\\tau_{wo}$）：不注入任何技能文档执行。\n    2.  **收集证据**：记录这两次执行的所有步骤、调用的工具、生成的中间文件等。\n*   **输出**：两条完整的执行轨迹记录。\n*   **目的**：隔离“技能”的影响。通过控制变量法（只有技能有无的区别），观察技能到底让 Agent 的行为发生了哪些具体变化。这是在没有标准答案的情况下，获取反馈的唯一来源。\n*   **如果不做会怎样**：如果只跑一次，无法区分是任务本身太难导致失败，还是技能写错了导致失败。只有对比，才能看出技能是“帮了忙”还是“添了乱”。\n\n#### 第三步：过程对齐对比评估（PACE Evaluation）\n\n*   **输入**：轨迹 A（有技能）、轨迹 B（无技能）、当前技能文档。\n*   **操作**：\n    1.  使用一组评估器（PACE），从四个维度对比两条轨迹：\n        *   **流程遵循**：Agent 是否按技能文档的步骤走？\n        *   **产物证据**：生成的文件是否符合技能文档的要求？\n        *   **一致性**：技能文档的要求是否与任务描述冲突？\n        *   **效果增量**：在关键分歧点上，有技能的跑法是否比无技能的跑法更好？\n    2.  **定位问题**：评估器不仅给出“好/坏”的判断，还会指出技能文档中**具体哪一段文字**导致了行为差异。\n    3.  **综合判决**：\n        *   如果任何评估器发现技能导致了严重错误（Hurt），直接否决本次更新。\n        *   如果技能带来了明显好处（Helped），批准更新。\n        *   如果没明显变化（Inert），推迟更新，进入下一轮。\n*   **输出**：一个判决结果（Helped/Hurt/Inert），以及一份“手术清单”（指出技能文档中需要修改的具体段落和修改建议）。\n*   **目的**：将抽象的“行为差异”转化为具体的“文档修改指令”。因为轨迹差异只是现象，我们需要知道是文档里的哪句话导致了这个现象，才能去改文档。\n*   **如果不做会怎样**：只有轨迹对比，不知道具体改哪里。系统会知道“技能有问题”，但不知道是删除第一段还是修改第三段，导致无法进行精确编辑。\n\n#### 第四步：技能迭代编辑（Skill Iteration \u0026 Edit）\n\n*   **输入**：判决结果、手术清单、两条轨迹、当前技能文档。\n*   **操作**：\n    1.  **根据路由策略执行编辑**：\n        *   **精简模式（Refine）**：主要做减法。删除手术清单中指出的噪音、冗余部分，保留被标记为“有帮助”的核心段落。\n        *   **修复模式（Repair）**：主要做替换。删除冲突段落，从无技能的轨迹（$\\tau_{wo}$）中提取正确的做法，或者根据任务描述补充缺失的步骤。\n    2.  **生成新技能文档**：输出修改后的技能文档 $S_{new}$。\n    3.  **版本控制**：如果判决是“Hurt”，则回滚到上一版；如果是“Helped”，则提交新文档。\n*   **输出**：更新后的技能文档。\n*   **目的**：实际执行优化动作。将评估阶段发现的“问题”转化为文档上的“修正”。\n*   **如果不做会怎样**：系统只诊断不治疗，技能文档永远不会改变，性能无法提升。\n\n#### 第五步：收敛检查（Convergence Check）\n\n*   **输入**：最新技能文档、锚点验证器结果、最近几轮的判决。\n*   **操作**：检查是否满足停止条件：\n    1.  最近两轮没有“Hurt”判决。\n    2.  锚点验证器通过。\n    3.  没有更多可修改的目标。\n    4.  或者达到最大迭代次数（如5次）。\n*   **输出**：最终技能文档 $S^*$ 或进入下一轮迭代。\n*   **目的**：防止过度优化或无限循环。当技能稳定且不再产生负面效果时，停止修改。\n*   **如果不做会怎样**：系统可能会在已经很好的技能上继续瞎改，导致性能震荡或下降。\n\n---\n\n### 6. 结合消融实验，解释这套方法为什么有效\n\n*注：论文正文中未提供传统的“去掉某个模块”的消融实验表格，但通过**对比基线**和**案例分析**，我们可以推断各组件的贡献。*\n\n*   **哪个组件贡献最大？**\n    *   **成对轨迹审计（Paired Trajectory Auditing）**是核心。论文数据显示，SKILLAUDIT 平均奖励为 73.9%，远高于无技能基线（40.9%）和静态专家技能（56.7%）。这证明了“通过对比有/无技能来优化”这一核心机制的有效性。如果没有这个对比机制，系统就无法在无 Ground Truth 的情况下获得优化信号。\n    *   **锚点验证器（Anchor Verifier）**起到了关键的“保底”作用。在案例分析中（如 Case B），当 PACE 评估出现偏差或技能修改激进时，锚点验证器强制回滚了错误的修改，防止了性能崩溃。\n\n*   **哪个组件可有可无？**\n    *   **双策略路由（Refine vs Repair）**看似复杂，但论文指出这是为了应对不同性质的技能缺陷。如果只用一种策略（比如只精简），对于核心逻辑错误的技能（如 Case B 中的 data-to-d3），可能无法修复；如果只用修复策略，对于大体正确的技能，可能会破坏原有结构。因此，两者协同工作，缺一不可。\n\n*   **各组件之间是否有协同效应？**\n    *   **PACE 评估器 + 锚点验证器**：PACE 提供细粒度的、基于行为对比的软信号，指导具体改哪里；锚点验证器提供硬性的、基于任务描述的硬约束，防止改坏。两者结合，既保证了优化的方向性，又保证了安全性。\n    *   **成对轨迹 + 手术清单**：轨迹对比提供了“证据”，手术清单提供了“处方”。只有证据没有处方，无法执行；只有处方没有证据，处方就是瞎编。\n\n*   **回扣动机：**\n    *   论文声称要解决“无 Ground Truth 反馈”的问题。**成对轨迹审计**直接解决了这个问题，它用“相对优势”替代了“绝对分数”。\n    *   论文声称要解决“技能演化中的退化”问题。**锚点验证器**和**Hurt 否决机制**直接解决了这个问题，确保每次更新都不会让硬性指标变差。\n\n---\n\n### 7. 这套方法的硬伤在哪里？\n\n根据论文的 Limitation 部分，最关键的两个局限性是：\n\n1.  **可观察性边界（Observability Boundary）**：\n    *   **大白话解释**：系统只能优化那些“结果能被看到”的技能。如果技能涉及的是深层的逻辑推理、领域知识，而这些知识在最终输出文件中没有明显的痕迹（比如一个复杂的数学推导过程，只要结果对就行，中间过程无法被系统验证），系统就无法判断技能的好坏。\n    *   **后果**：对于这类任务，系统可能会错误地删除有用的领域知识，因为它看不到这些知识带来的“结构性变化”，只看到结果没变，就认为这些知识是噪音。\n\n2.  **无技能基线的依赖性**：\n    *   **大白话解释**：系统依赖“无技能”的执行轨迹作为参考。如果任务本身太难，Agent 在没有技能的情况下完全无法执行（比如直接报错或乱跑），那么“无技能”的轨迹就是无效的。\n    *   **后果**：在这种情况下，系统无法通过对比来评估技能的价值，优化信号会失效，导致无法改进技能。", "additional_insights": "基于论文《SKILLAUDIT: GROUND-TRUTH-FREE SKILL EVOLUTION VIA PAIRED TRAJECTORY AUDITING》，以下是除核心方法外，能显著提升认知的有价值内容：\n\n### 1. 实验中的反直觉发现\n*   **静态专家技能可能具有“负价值”**：在软件工程（Software Engineering）和办公白领（Office \u0026 White Collar）领域，预置的静态专家技能（With skill）表现甚至不如无技能基线（No skill），分别仅为40.3%和60.0%（后者与无技能持平），而进化后的技能分别提升至78.8%和86.7%。这表明未经迭代的通用技能可能包含误导性信息或噪声，反而阻碍了Agent的表现（Table 3, Section 4.2）。\n*   **“少即是多”的极端案例**：在`flink-query`任务中，初始技能长达7,380行，进化后缩减至仅5行，性能从0提升至1.0。这揭示了对于某些任务，过度的背景知识（bloat）是净有害的，精简至核心指令反而能消除注意力分散（Section 4.4）。\n\n### 2. 有启发性的分析或 Ablation\n*   **可观测性边界（Observability Boundary）决定进化成败**：进化成功与否不取决于任务难度或领域，而取决于技能中的知识是否留下“可观测的结构痕迹”。基于API调用或数学公式的技能（Executable, Observable Knowledge）进化效果好（~80%奖励），而基于领域程序（Domain Procedure，如“该做什么”但无结构痕迹）的技能进化效果差（69.2%奖励），且77%的失败任务属于此类。这意味着如果验证器无法通过文件存在、格式或数值来验证步骤，进化就会失效（Section 4.3）。\n*   **技能长度的“回归中间”现象**：进化并非单纯地缩短技能，而是向“信息密度高的中间状态”收敛。初始技能过短（\u003C300行）的任务倾向于增加缺失的I/O契约（中位数+15行），而过长（\u003E1000行）的任务倾向于删除噪声（平均-616行）。最终大多数技能收敛到一个紧凑的区间，表明好的技能是“验证器可观察的执行契约”，而非教程（Section 4.4, Table 4）。\n\n### 3. 对领域的新认知\n*   **技能进化的本质是“去教程化”与“契约化”**：成功的编辑操作集中在删除教程式散文（如CVSS定义）、硬编码路径，并内联约束条件。进化后的技能更像是一个“测试脚本能读取的执行契约”，而非给人看的文档。这修正了我们对Agent Skill的理解：Skill不应是知识百科，而应是针对特定验证器的精确指令集（Section 4.4, \"Two lessons for authoring agent skills\"）。\n*   **导航层（Navigation Layer）是缺失的关键组件**：89个初始技能中没有一个包含顶层索引，但80个进化后的技能自动生成了`keyword -\u003E skill`的路由表。这表明在多文件技能包中，可导航性（Navigability）与内容本身同等重要，Agent需要显式的调度器来定位正确的技能片段（Section 4.4）。\n\n### 4. 实用的经验性结论\n*   **编写Skill的黄金法则**：\n    1.  **Write skills the way a test would read them**：只包含验证器可检查的内容（精确调用、Schema、路径、公式），移除定义、原理和最佳实践散文。\n    2.  **Aim for one task-scoped, navigable, contract-dense unit**：避免大型通用包，针对单一任务范围，确保高密度且可导航。\n    3.  **Inline constraints**：将约束条件直接内联到受控步骤旁边，而不是放在远处的备注部分（Section 4.4）。\n*   **处理“隐性伤害”（Latent Harm）的策略**：当技能包含在其他上下文中正确但在当前任务中破坏性的指令（如`exceltable-in-ppt`中的`recalc.py`导致公式清零）时，简单的验证器可能无法在第一步发现。必须依赖**成对轨迹审计（Paired Trajectory Auditing）**，通过对比`with-skill`和`without-skill`的行为差异（如公式数量变化）来定位并删除有害段落，而非依赖静态检查（Section 4.5, Case D）。\n\n### 5. 局限性中的机会\n*   **语义任务的“过度修剪”风险**：由于缺乏可观测的结构痕迹，进化系统可能会错误地删除对语义任务（如搜索、规划）至关重要的领域知识，因为验证器无法证明这些段落是“承重”的。这暗示了未来需要开发能捕捉语义正确性而非仅结构正确性的评估信号（Section 4.4, \"Two limits of observable evidence\"）。\n*   **无法合成不可观测的领域知识**：系统能识别知识缺失（如`financial-modeling-qa`中记录的“Dice game scoring algorithms”缺口），但无法从仅确认“文件存在”的信号中合成正确的领域逻辑。这指出了Ground-truth-free进化的硬性边界：对于无法通过环境反馈验证的领域程序，仍需人类专家或更强Oracle介入（Section 4.3）。", "research_value": "**1. 影响力潜力（Impact）**\n\n**正面证据**：\n1.  **解决部署痛点**：论文指出LLM Agent在部署后技能会因边缘情况、API变更而失效，且现有方法依赖难以获取的“特权反馈”（如隐藏测试集、专家参考回答）。SkillAudit 实现了“无Ground Truth”的自动演化，直接切中了工业界Agent落地中“维护成本高、反馈信号缺失”的核心痛点。\n2.  **显著的性能提升**：在89个跨领域任务中，SkillAudit 平均奖励为 73.9%，显著优于无技能基线（40.9%）和静态专家技能（56.7%）。特别是在软件工程和办公白领领域，进化后的技能表现远超初始专家技能，证明了该方法在实际应用中的巨大价值。\n3.  **范式转移的潜力**：论文提出的“技能即契约（Skill as Contract）”和“去教程化”观点，可能改变未来Agent技能编写和管理的标准实践，从编写给人看的文档转向编写给验证器看的执行指令。\n\n**负面证据或缺失**：\n1.  **适用范围受限**：论文明确承认其局限性在于“可观察性边界”，对于无法通过文件结构或数值验证的深层语义推理任务，该方法效果不佳甚至有害。这意味着它不能解决所有类型的Agent技能演化问题。\n\n**判断**：强\n\n**理由**：该研究解决了一个高价值且普遍存在的工程问题（Agent技能维护），并在
