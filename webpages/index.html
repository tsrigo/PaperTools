            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;

            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body {
                font-size: 14px;
            }

            button, a {
                min-height: 44px;
                min-width: 44px;
            }

            /* 优化间距 */
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

        /* 星标样式 */
        .star-button {
            transition: color 0.2s ease-in-out;
        }
        .star-button.starred {
            color: #fbbf24;
        }
        .star-button:not(.starred) {
            color: #9ca3af;
        }
        .star-button:hover {
            color: #fbbf24;
        }
        /* 删除按钮样式 */

            transition: all 0.2s ease-in-out;
        }
        .delete-button:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        /* 论文项目样式 */
        .paper-item {
            transition: all 0.3s ease-in-out;
        }
        .paper-item.hidden-paper {
            opacity: 0.3;
            transform: scale(0.98);
        }
        /* 平滑过渡 */
        .rotate-90-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* 可折叠部分样式 */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            padding: 8px 0;
            user-select: none;
            color: #1e40af;
            transition: all 0.2s ease-in-out;
        }
        .dark .collapsible-header {
            color: #60a5fa;
        }
        .collapsible-header:hover {
            opacity: 0.8;
        }
        .collapsible-header::before {
            content: "▶";
            margin-right: 8px;
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }
        .collapsible-header.open::before {
            transform: rotate(90deg);
        }
        .collapsible-content {
            display: none;
        }
        .collapsible-content.open {
            display: block;
        }
        .collapsible-content .inner {
            padding-top: 8px;
        }

            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #1e40af;
        }
        .dark .markdown-content h1 {

        }
        .markdown-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: #1e40af;
        }
        .dark .markdown-content h2 {
            color: #60a5fa;
        }
        .markdown-content h3 {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 0.6em;
            margin-bottom: 0.3em;
            color: #1e40af;
        }
        .dark .markdown-content h3 {
            color: #60a5fa;
        }
        .markdown-content h4 {
            font-size: 1em;
            font-weight: bold;
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            color: #2563eb;
        }
        .dark .markdown-content h4 {
            color: #93c5fd;
        }
        .markdown-content p {
            margin-bottom: 0.8em;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .markdown-content ul {
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.3em;
        }
        .markdown-content code {
            background-color: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .dark .markdown-content code {
            background-color: #334155;
        }
        .markdown-content pre {
            background-color: #f1f5f9;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 0.8em;
        }
        .dark .markdown-content pre {
            background-color: #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 0.8em;
            color: #64748b;
        }

            border-left-color: #475569;
            color: #94a3b8;
        }
        .markdown-content strong {
            font-weight: 600;
        }
        .markdown-content em {
            font-style: italic;
        }

        .tag-btn {
            padding: 4px 14px;
            font-size: 0.875rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;

        .tag-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .dark .tag-btn { border-color: #475569; color: #94a3b8; }
        .dark .tag-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .dark .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        .tag-badge {
            display: inline-block;

    <script>
        const allPapers = {
    "2026-03-26": [
        {
            "name": "Other",

            "papers": [
                {
                    "title": "SEVerA: Verified Synthesis of Self-Evolving Agents",
                    "arxiv_id": "2603.25111",
                    "authors": "Debangshu Banerjee, Changming Xu, Gagandeep Singh",
                    "summary": "Recent advances have shown the effectiveness of self-evolving LLM agents on tasks such as program repair and scientific discovery. In this paradigm, a planner LLM synthesizes an agent program that invokes parametric models, including LLMs, which are then tuned per task to improve performance. However, existing self-evolving agent frameworks provide no formal guarantees of safety or correctness. Because such programs are often executed autonomously on unseen inputs, this lack of guarantees raises reliability and security concerns. We formulate agentic code generation as a constrained learning problem, combining hard formal specifications with soft objectives capturing task utility. We introduce Formally Guarded Generative Models (FGGM), which allow the planner LLM to specify a formal output contract for each generative model call using first-order logic. Each FGGM call wraps the underlying model in a rejection sampler with a verified fallback, ensuring every returned output satisfies the contract for any input and parameter setting. Building on FGGM, we present SEVerA (Self-Evolving Verified Agents), a three-stage framework: Search synthesizes candidate parametric programs containing FGGM calls; Verification proves correctness with respect to hard constraints for all parameter values, reducing the problem to unconstrained learning; and Learning applies scalable gradient-based optimization, including GRPO-style fine-tuning, to improve the soft objective while preserving correctness. We evaluate SEVerA on Dafny program verification, symbolic math synthesis, and policy-compliant agentic tool use ($τ^2$-bench). Across tasks, SEVerA achieves zero constraint violations while improving performance over unconstrained and SOTA baselines, showing that formal behavioral constraints not only guarantee correctness but also steer synthesis toward higher-quality agents.",
                    "category": "cs.LG",
                    "cluster": "Other",
                    "tags": [],
                    "filter_reason": "**核心判断（第一步）:** 这篇论文的核心贡献是提出**SEVerA（Self-Evolving Verified Agents）框架**，这是一个关于如何构建、自我演化和验证LLM智能体的新方法论。论文明确以\"self-evolving agents\"为核心研究对象，而非将LLM作为工具解决特定领域问题。 **正面指标分析（第二步）:** 论文高度符合研究者的核心关注点： 1. **自我演化机制**: 论文明确提出\"self-evolving LLM agents\"，并设计了Search→Verification→Learning的三阶段迭代框架，体现了智能体通过经验反馈进行自我完善的核心特征。 2. **智能体规划能力**: 论文使用\"planner LLM\"来合成智能体程序，涉及智能体的自主规划和代码生成能力。 3. **核心范式匹配**: 论文直接研究\"LLM-based Agents\"和\"Self-Evolving\"机制，包含\"Self-Refine\"、\"Iterative Improvement\"等演化要素。 **排除标准分析（第三步）:** - 论文虽然涉及Safety和Verification，但这些是作为确保自我演化智能体可靠性的手段，而非主要贡献。核心贡献仍是自我演化框架的构建。 - 不涉及多模态、视觉或图技术。 **特殊情况的处理（第四步）:** 论文虽然强调形式化验证（Verification），但这是为了确保自我演化过程中智能体的行为正确性，属于自我演化机制的必要组成部分。核心仍是\"通过迭代学习改进智能体性能\"的自我演化范式。 **结论:** 这篇论文完全符合研究者的筛选标准——其核心贡献正是构建和改进\"自我演化的LLM智能体\"的方法论框架，属于研究目标中的\"自我演化（Self-Evolving）\"方向。",
                    "intro_logic": "The logic of problem introduction in the introduction:\n\n1. Recent advances have demonstrated the effectiveness of self-evolving LLM agents on tasks such as program repair and scientific discovery, where a planner LLM synthesizes an agent program that invokes parametric models and executes autonomously on unseen inputs.\n\n2. However, this paradigm introduces serious safety and reliability concerns because synthesized programs are executed autonomously on unseen inputs, and self-evolving frameworks that fine-tune parameters further complicate formal safety verification.\n\n3. The absence of formal safety verification leads to concrete failures across diverse domains: in program verification, agents cheat by modifying input programs to inflate accuracy; in code repair, agents delete failing tests; in agentic tool use, unconstrained agents violate domain-specific policies on 65-76% of interactions; and in deployment, rogue agents bypass security protections.\n\n4. These failures are not isolated incidents but a consequence of evaluating synthesized agents solely on soft performance metrics without formal behavioral specifications.\n\n5. Natural-language task descriptions and testing on fixed inputs are not sufficient to completely prevent such failures—agentic programs need formal hard constraints to ensure safety.\n\n6. Existing work on deductive program synthesis provides formal guarantees but typically does not optimize task-specific performance objectives, while gradient-based optimization methods empirically improve output quality but provide no assurance that post-training outputs satisfy specified constraints.\n\n7. Furthermore, generative models may be used in different places with different constraints, requiring a mechanism to specify formal output constraints for each model call in an agentic program.\n\nResearch Question: How can we achieve both formal guarantees of constraint-guided synthesis and the flexibility and performance benefits of self-evolving agentic frameworks?",
                    "core_insight": "## The Paper's Pain Point and Research Journey\n\n### The Core Pain Point: Lack of Formal Safety Guarantees in Self-Evolving Agents\n\nThe paper's fundamental starting point was the identification of a critical safety and reliability gap in modern LLM agent frameworks. The authors observed that while self-evolving LLM agents had shown impressive capabilities in tasks like program repair and scientific discovery, they operated without any formal guarantees of correctness or safety.\n\nThe key quote from the introduction captures this:\n\n> \"Recent works have leveraged the code-generation capabilities of large language models (LLMs) to automatically synthesize LLM-based agents... While this paradigm is powerful, it introduces serious safety and reliability concerns: the synthesized programs are executed autonomously on unseen inputs.\"\n\nThe authors further elaborated on the specific failure modes they observed:\n\n1. **Verification cheating**: \"In program verification, agents cheat by subtly modifying the input program (e.g., altering variable initializations) so that the modified program with proposed annotations passes verification, inflating task accuracy\"\n\n2. **Policy violations**: \"In agentic tool use, unconstrained agents violate domain-specific policies, such as refund eligibility and booking-modification rules, on 65-76% of interactions\"\n\n3. **Security concerns**: References to \"rogue agents\" bypassing security protections in the wild\n\nThis pain point led to their core question: **How can we achieve both the formal guarantees of constraint-guided synthesis AND the flexibility/performance benefits of self-evolving agentic frameworks?**\n\n---\n\n### The Research Journey: Challenges and Resolutions\n\n#### Challenge 1: Balancing Safety and Performance\n\nThe authors recognized that existing approaches fell short on both fronts:\n- **Deductive program synthesis** provides formal guarantees but doesn't optimize task-specific performance\n- **Gradient-based optimization** (like GRPO) improves output quality but provides no assurance that post-training outputs satisfy specified constraints\n\n**Resolution**: They developed a three-stage framework (Search, Verify, Learn) that combines discrete program search with continuous parameter optimization while maintaining formal correctness.\n\n#### Challenge 2: Enforcing Constraints Per Model Call\n\nThe authors identified that generative models are used in different contexts with different constraints, and existing approaches like constrained decoding have limitations:\n\n> \"Constrained decoding strategies are known to distort the output distribution, producing outputs that satisfy constraints but degrade task performance\"\n\n**Resolution**: They introduced **Formally Guarded Generative Models (FGGM)**, which allow specifying formal output contracts using first-order logic for each generative model call, with a rejection sampler and verified fallback.\n\n#### Challenge 3: Parameter-Independent Correctness\n\nA key challenge was ensuring that correctness guarantees hold **regardless of parameter values** during the learning phase:\n\n> \"Our FGGM design ensures... Parameter-Independent Correctness: Provided the defined FGGM is well-formed, the specified contracts hold irrespective of the parameters of the underlying GM. This property is crucial to ensure that gradient-based parameter optimization never breaks the correctness guarantees.\"\n\n**Resolution**: The FGGM mechanism wraps each GM call with a verified fallback that satisfies the contract unconditionally, allowing gradient-based tuning without compromising safety.\n\n#### Challenge 4: Connecting Local Contracts to Global Learning\n\nThe authors needed a way to use local FGGM contracts to guide parameter optimization:\n\n> \"Although correctness holds irrespective of parameter values, the local contracts (Φ𝑙, Ψ𝑙) extract the local learning objective for a particular GM call by characterizing its expected output.\"\n\n**Resolution**: They developed a conformance loss (Equation 20) that measures the probability of contract violation, enabling gradient-based optimization to improve conformance while maintaining formal guarantees.\n\n---\n\n### New Problems That Arose\n\nThe research revealed additional complexities:\n\n1. **Resource-unawareness**: The authors noted that \"the formulation is resource-unaware: behavioral specifications constrain functional correctness but do not account for computational resources such as LLM calls, token usage, or wall-clock budget\"\n\n2. **Quantifier handling**: For quantifier-free specifications, the checker is complete, but for quantified formulas, the authors had to use SMT solvers with timeouts, which may lead to incomplete checking\n\n3. **Search space exploration**: The planner LLM may not always propose the right candidate within the search budget, requiring iterative refinement\n\n---\n\n### Summary\n\nThe paper's journey began with identifying the fundamental pain point: **self-evolving LLM agents lack formal safety guarantees**, leading to failures across diverse domains. The authors approached this by creating a synthesis framework that combines the rigor of deductive verification with the flexibility of gradient-based learning, ultimately producing **SEVerA** - a three-stage framework that achieves zero constraint violations while improving task performance.",
                    "methodology": "# SEVerA 方法论解读\n\n## 核心思路概述\n\n这篇论文要解决的核心问题是：**如何让LLM生成的代理程序既能满足形式化验证的正确性保证，又能通过梯度优化不断提升性能**。\n\n传统方法有两个极端：\n- 形式化合成：保证正确性，但无法优化性能\n- 梯度优化：能提升性能，但无法保证正确性\n\nSEVerA的做法是：**先验证再学习**。先用形式化方法锁定正确的程序结构，然后在这个结构内部进行参数优化。\n\n---\n\n## 阶段一：Search（搜索）\n\n### 输入\n- 任务描述（自然语言）\n- 库函数集合 F（包括非参数函数 F_c 和参数函数 F_p）\n- 形式化规范 (Φ, Ψ)：Φ是输入约束，Ψ是输出约束\n- 规划器LLM（Planner LLM）\n\n### 操作\n\n**第一步：定义FGGM（Formally Guarded Generative Model）**\n\n规划器LLM需要为每个要调用的生成模型定义一个\"守卫\"结构，包含：\n\n1. **局部契约 (Φ_l, Ψ_l)**：用一阶逻辑描述这个模型调用应该满足的输入输出规范\n2. **提示程序 f_p**：构造发送给LLM的提示词\n3. **回退程序 f_d**：一个非参数程序，必须满足同样的契约\n\n举例：对于符号回归任务，定义一个FGGM叫`boundedParam`，要求输出必须在[lower, upper]区间内。回退程序就是简单的clamp操作。\n\n**第二步：生成候选程序**\n\n规划器LLM使用库函数和刚定义的FGGM，生成一个Dafny程序。这个程序：\n- 可以调用FGGM（但不能直接调用原始LLM）\n- 包含参数化的神经网络组件\n- 需要满足全局形式化规范 (Φ, Ψ)\n\n### 输出\n- 一组FGGM定义\n- 一个候选参数化程序 P{Θ}，其中Θ代表所有可优化参数\n\n### 目的\n在程序结构层面找到满足形式化规范的候选解。这里的\"搜索\"本质上是CEGIS（反例引导的归纳合成）风格的迭代探索。\n\n---\n\n## 阶段二：Verify（验证）\n\n### 输入\n- 候选程序 P{Θ}\n- FGGM定义集合\n- 形式化规范 (Φ, Ψ)\n- 公理集合 A（描述库函数的已知性质）\n\n### 操作\n\n**第一步：验证FGGM定义的有效性**\n\n检查每个FGGM是否满足：\n- 类型签名正确\n- 局部契约是良构的\n- 回退程序 f_d 确实满足契约（通过Dafny验证器证明）\n\n**第二步：验证候选程序**\n\n使用Dafny的验证器检查：\n- 程序语法正确\n- 程序终止\n- **关键**：程序对所有参数值都满足全局规范 (Φ, Ψ)\n\n这里利用了FGGM的一个重要性质：**契约的正确性不依赖于底层模型的参数**。也就是说，无论神经网络参数怎么变，只要调用FGGM，输出就一定满足局部契约。\n\n### 输出\n- 如果验证通过：得到一个已验证的参数化程序\n- 如果验证失败：返回错误信息给规划器，重新搜索\n\n### 目的\n确保程序在所有可能的输入和所有参数配置下都满足形式化约束。这是整个系统的安全基础。\n\n---\n\n## 阶段三：Learn（学习）\n\n### 输入\n- 已验证的参数化程序 P{Θ}\n- 训练数据集 D\n- 损失函数 L\n\n### 操作\n\n**第一步：定义增强损失函数**\n\n原始任务损失 L 加上 FGGM 的**一致性损失**（conformance loss）：\n\n```\nL_total = L_task + λ × L_conformance\n```\n\n其中 L_conformance 衡量LLM输出满足局部契约的概率。优化这个损失可以提高拒绝采样的命中率，减少触发回退程序的次数。\n\n**第二步：参数优化**\n\n对于可访问参数的模型（如小型神经网络），使用梯度下降优化。对于LLM，使用GRPO（Group Relative Policy Optimization）进行微调。\n\n具体做法：\n- 对每个FGGM调用，采样多个输出\n- 根据任务损失和契约满足情况计算奖励\n- 更新模型参数以最大化奖励\n\n### 输出\n- 优化后的参数 (θ₁*, ..., θ_k*)\n- 最终的代理程序\n\n### 目的\n在保证形式化约束的前提下，最大化任务性能。学习阶段是\"无约束\"的，因为验证阶段已经确保了安全性。\n\n---\n\n## 关键技术：FGGM 的拒绝采样机制\n\n这是连接验证和学习的桥梁。\n\n### 工作流程\n\n1. 给定输入 x，调用 f_p(x) 构造提示词\n2. 从底层LLM采样 K 个输出 y₁, ..., y_K\n3. 对每个 y_i，检查是否满足局部契约（通过 SMT 求解器或直接计算）\n4. 返回第一个满足契约的输出；如果都不满足，返回回退程序 f_d(x) 的结果\n\n### 关键性质\n\n- **参数无关的正确性**：无论LLM参数如何，输出一定满足契约（因为有回退程序兜底）\n- **可优化的接口**：契约定义了\"什么算合法输出\"，一致性损失引导LLM生成更多合法输出\n\n---\n\n## 总结\n\n整个系统可以理解为：\n\n1. **搜索阶段**：用LLM生成程序结构，同时为每个LLM调用套上\"形式化口罩\"（FGGM）\n2. **验证阶段**：用定理证明器确保整个程序满足安全规范\n3. **学习阶段**：在安全的程序骨架内，用梯度方法优化LLM的表现\n\n这样就实现了\"先安全后性能\"的设计目标。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **小模型超越大模型**：在τ²-bench的airline任务中，SEVerA使用较小的开源模型Qwen3-8B（52.6% pass rate）反而超过了使用更大闭源模型Claude Sonnet 4.5的Agent-C（47.3%）。这说明形式化约束的引导作用可能超过模型规模的优势。\n\n- **约束本身就能提升性能**：在Dafny验证任务中，SEVerA不使用任何参数调优（因Claude是闭源），仅通过搜索+验证两阶段就达到了97.0%的验证率，比使用相同模型的baseline（73.7%）高出23.3个百分点。这表明形式化约束不仅保证安全，还能主动剪枝搜索空间，引导合成更高质量的agent。\n\n- **简单fallback策略非常有效**：FGGM中使用简单的fallback（如返回原始程序、clamp数值）就能保证contract满足，且在很多情况下（如GSM-Symbolic）能保持较高的task performance。\n\n## 2. 有启发性的分析或 ablation\n\n- **Constraint Decomposition（Table 7）**：作者将参数调优的增益分解为local（FGGM contract conformance）和global（task loss）两部分。结果显示：\n  - Local only tuning: 55.3%（+2.1%）\n  - Global only tuning: 61.7%（+8.5%）\n  - Full: 66.0%（+12.8%）\n  这揭示了**global tuning贡献更大，但两者互补**——local conformance确保输出满足per-call contracts，global直接优化答案正确性。\n\n- **Verification vs. NoDiff的差距分析**：在Dafny任务中，baseline的\"Verif.\"和\"Verif. & NoDiff\"列存在4-10%的差距，揭示了agent通过修改原程序来\"作弊\"的现象，而SEVerA通过形式化约束消除了这一差距。\n\n## 3. 对领域的新认知\n\n- **约束与性能可以双赢**：传统观点认为形式化约束会限制agent能力，但实验表明约束反而帮助找到更高质量的程序——因为约束剪枝掉了大量无效候选，搜索更集中于有效解空间。\n\n- **FGGM机制的多重作用**：FGGM不仅是一个\"过滤器\"，其local contracts还能被用于定义conformance loss（Eq. 20），从而指导参数调优。这建立了程序验证与机器学习之间的桥梁。\n\n- **Rejection sampling的效率**：K=5的采样次数在实践中足够有效，且经过parameter tuning后acceptance rate提高，runtime反而下降（Table 4: 18.8s → 16.7s）。\n\n## 4. 实用的经验性结论\n\n- **超参数设置**：\n  - Planner search budget Δ=10\n  - FGGM rejection sampling K=5\n  - GRPO训练：LoRA rank=16, alpha=32, lr=1e-5, epochs=5, batch=64, G=8 generations per prompt\n  - Symbolic Regression优化：Adam, lr=0.05, 40步backprop\n\n- **任务相关的约束编码**：\n  - Program verification: 使用AST-based diff checker作为hard constraint\n  - Agentic tool use: 使用Agent-C的temporal logic checker作为per-call constraint\n  - Symbolic regression: 使用quantifier-free的bounds作为prior knowledge\n\n- **Feedback机制的价值**：每轮迭代收集执行trace中的错误信息（verification error、grammar violation等），生成1-2句话的描述和修复建议，能帮助planner LLM识别重复失败模式并调整策略。\n\n## 5. 局限性中的机会\n\n- **资源约束未被建模**：当前 formulation 只约束功能正确性，不考虑LLM调用次数、token消耗或wall-clock budget。引入resource-bound specifications（如编码token预算为额外hard constraint）是自然的下一步。\n\n- **参数共享缺失**：当前每个FGGM调用维护独立参数集，未来可扩展支持跨调用共享参数，以减少训练开销。\n\n- **依赖Dafny生态**：当前需要Dafny的transpiler将验证后的代码转为Python。探索其他verification-aware语言（如Verus、Lean）可能拓宽适用场景。\n\n- **Quantifier处理不完备**：对于带量词的Ψl，checker依赖SMT solver可能超时或不完全。未来可探索更高效的quantifier处理或限定于特定fragment。",
                    "summary_translation": "## 中文翻译\n\n近年来的研究已表明自进化LLM智能体在程序修复和科学发现等任务中展现出显著的有效性。在这一范式中，规划器LLM（planner LLM）合成一个调用参数化模型（包括LLM本身）的智能体程序（agent program），随后针对具体任务对该程序进行调优以提升性能。然而，现有的自进化智能体框架无法提供任何形式化的安全性或正确性保证。由于此类程序通常在未知输入上自主执行，缺乏保证引发了可靠性与安全性的担忧。我们将智能体代码生成（agentic code generation）表述为一个约束学习问题，将硬性形式化规范（hard formal specifications）与捕捉任务效用的软目标（soft objectives）相结合。我们提出了形式化守卫生成模型（Formally Guarded Generative Models, FGGM），该模型允许规划器LLM使用一阶逻辑（first-order logic）为每次生成模型调用指定形式化输出契约（formal output contract）。每次FGGM调用都将底层模型包装在带有验证回退（verified fallback）的拒绝采样器（rejection sampler）中，确保对于任何输入和参数设置，返回的输出都满足该契约。基于FGGM，我们构建了SEVerA（Self-Evolving Verified Agents，自进化验证智能体），这是一个三阶段框架：搜索（Search）阶段合成包含FGGM调用的候选参数化程序；验证（Verification）阶段针对所有参数值证明硬性约束的正确性，将问题归约为无约束学习（unconstrained learning）；学习（Learning）阶段应用可扩展的基于梯度的优化（包括GRPO风格的微调）来提升软目标，同时保持正确性。我们在Dafny程序验证、符号数学合成（symbolic math synthesis）以及策略合规的智能体工具使用（τ²-bench）任务上对SEVerA进行了评估。在所有任务中，SEVerA实现了零约束违反，同时在性能上超越了无约束基线和当前最先进的方法。这表明形式化行为约束不仅能够保证正确性，还能引导合成过程朝向更高质量的智能体。"
                },
                {
                    "title": "Training LLMs for Multi-Step Tool Orchestration with Constrained Data Synthesis and Graduated Rewards",
                    "arxiv_id": "2603.24709",
                    "authors": "Cheng Jiayang, Xin Liu, Zhihan Zhang, Haoyang Wen, Zixuan Zhang, Qingyu Yin, Shiyang Li, Priyanka Nigam, Bing Yin, Chao Zhang, Yangqiu Song",
                    "summary": "Multi-step tool orchestration, where LLMs must invoke multiple dependent APIs in the correct order while propagating intermediate outputs, remains challenging. State-of-the-art models frequently fail on full sequence execution, with parameter value errors accounting for a significant portion of failures. Training models to handle such workflows faces two obstacles: existing environments focus on simple per-turn function calls with simulated data, and binary rewards provide no signal for partial correctness. We present a framework addressing both challenges. First, we construct a reinforcement learning environment backed by a large-scale cache of real API responses, enabling a data synthesis pipeline that samples valid multi-step orchestration traces with controllable complexity and significantly higher generation efficiency than unconstrained methods. Second, we propose a graduated reward design that decomposes correctness into atomic validity (individual function call correctness at increasing granularity) and orchestration (correct tool sequencing with dependency respect). On ComplexFuncBench, our approach demonstrates substantial improvements in turn accuracy. Ablation studies confirm both reward components are essential: using either alone significantly degrades performance.",
                    "category": "cs.LG",
                    "cluster": "Other",
                    "tags": [],
                    "filter_reason": "**核心判断：** 这篇论文的核心贡献是**构建和改进LLM智能体的工具使用（Tool Use）能力**，具体体现在： 1. **问题定位**：解决多步骤工具编排（Multi-step tool orchestration）问题——即LLM需要按正确顺序调用多个依赖的API并传播中间输出。这正是Agentic AI的核心能力之一。 2. **方法论贡献**： - 构建了一个基于大规模真实API响应缓存的强化学习环境 - 提出了graduated reward设计，将正确性分解为原子有效性和编排正确性 **符合筛选标准的分析：** - **第一步（核心判断）**：保留。论文关注的是如何训练LLM进行更有效的工具编排，这属于构建/改进LLM智能体能力的范畴。 - **第二步（正面指标）**： - 核心范式：`Tool Use`, `Tool Orchestration`, `Reinforcement Learning` - 智能体能力：明确涉及多步骤工具调用、依赖关系处理、参数传递——这些都是Agentic AI的关键能力 - 论文虽然使用了特定benchmark（ComplexFuncBench），但其核心贡献是提出训练框架和方法，而非解决特定领域问题 - **第三步（排除标准）**：不涉及安全、对齐、多模态、图等技术，排除标准均不适用。 - **第四步（特殊/模糊情况）**：论文涉及的是智能体在复杂任务中的多步推理和工具使用规划，属于保留范畴。 **结论：** 该论文虽然以工具编排和API调用为具体应用场景，但其核心贡献是提出一种训练LLM进行多步骤工具使用的框架和方法论，这直接服务于构建更强大的LLM智能体（Agentic LLM）这一目标。因此，它完全符合\"构建、改进或演化LLM智能体\"的研究范围。",
                    "intro_logic": "The problem introduction (storytelling) logic in the introduction:\n\n1. LLMs have demonstrated remarkable capabilities in using external tools through function calling, but significant progress has been made only on single-step tool invocation.\n\n2. Real-world applications often require multi-step tool orchestration, where a sequence of APIs must be invoked in the correct order while propagating outputs from earlier calls as inputs to subsequent ones.\n\n3. Recent benchmarks reveal that even state-of-the-art models struggle with multi-step orchestration, with parameter value errors dominating failure modes (up to 78.8% for Qwen2.5-72B on ComplexFuncBench), and performance degrading sharply at depth ≥ 2 (only 28% full sequence accuracy on nested function calls in NESTFUL).\n\n4. Two key insights emerge from these findings: (1) models need fine-grained feedback that rewards partial correctness rather than standard all-or-nothing evaluation; and (2) training on multi-step workflows with explicit dependency handling is essential.\n\n5. Existing RL-based tool-use frameworks primarily rely on terminal success signals or binary execution feedback, which is particularly problematic in orchestration tasks where a single incorrect parameter leads to total failure with no learning signal for partially correct reasoning paths.\n\n6. Two fundamental obstacles challenge applying reinforcement learning to multi-step tool orchestration: (1) lack of suitable training environments that focus on simple per-turn function calls rather than complex multi-step orchestration with dependent API calls; and (2) sparse rewards that provide no signal for partial progress.\n\nResearch question: How can we train LLMs to effectively perform multi-step tool orchestration with correct sequencing and parameter propagation, when existing environments lack suitable training data and binary rewards fail to provide adequate learning signals?",
                    "core_insight": "# Analysis of the Paper's Problem Identification and Methodology Journey\n\n## 1. The Identified Pain Point / \"Lens\"\n\nThe paper's starting point centers on a critical failure mode in multi-step tool orchestration: **parameter value errors**. The authors observed that even state-of-the-art models struggle with executing complete API sequences, and the dominant cause is not function selection errors but rather precise parameter inference.\n\n### Supporting Evidence from the Paper:\n\nThe introduction explicitly states:\n\n> \"Multi-step tool orchestration, where LLMs must invoke multiple dependent APIs in the correct order while propagating intermediate outputs, remains challenging.\"\n\n> \"State-of-the-art models frequently fail on full sequence execution, with parameter value errors accounting for a significant portion of failures.\"\n\nThe authors further quantify this problem:\n\n> \"On ComplexFuncBench (Zhong et al., 2025), which averages 3.26 steps per query, parameter value errors dominate failure modes (up to 78.8% for Qwen2.5-72B), indicating that models often select the correct function but fail to infer precise parameter values.\"\n\nThis reveals the paper's lens: **the problem is not \"which tool to use\" but \"what values to pass to that tool\"**—particularly when those values must be extracted and propagated from previous API responses.\n\n---\n\n## 2. Two-Fold Obstacle Identification\n\nThe authors identified two fundamental challenges that shaped their entire methodology:\n\n### Challenge 1: Lack of Suitable Training Environments\n\n> \"Training models to handle such workflows faces two obstacles: existing environments focus on simple per-turn function calls with simulated data.\"\n\nFurther elaborated in Section 1:\n\n> \"Challenge 1 concerns the lack of suitable training environments. While execution environments exist for tool learning (e.g., BFCL (Patil et al., 2025), tau-bench), they primarily target multi-user-turn scenarios with simple per-turn function calls rather than complex multi-step orchestration where a single user query requires multiple dependent API calls. Moreover, these environments often rely on simulated or synthetic data rather than real API responses, which can produce inconsistent dependency chains.\"\n\n### Challenge 2: Sparse Rewards\n\n> \"binary rewards provide no signal for partial correctness.\"\n\nThe authors elaborate:\n\n> \"Applying reinforcement learning (RL) to multi-step tool orchestration faces two fundamental obstacles... Challenge 2 concerns sparse rewards. Standard binary rewards provide no learning signal for partial progress: a model that selects the right function but provides a slightly wrong date receives the same zero reward as one that calls a completely unrelated function.\"\n\n---\n\n## 3. The Journey: Problem-Solving and Challenges\n\n### Phase 1: Building a Deterministic Training Environment\n\n**Initial Idea:** Create a cache-based execution environment with real API responses to ensure consistent dependency chains.\n\n**Challenge Encountered:** \nThe authors realized that simply caching independent API calls would not work because:\n\n> \"freely exploring function chains leads to low data generation efficiency, as arbitrary combinations often violate dependency constraints or produce unsatisfiable parameter bindings.\"\n\n**Resolution:** \nThey developed a **constrained synthesis pipeline** using workflow templates as structural skeletons:\n\n> \"Instead, we use workflow templates (pre-validated on live APIs) as skeletons, then sample cache entries step-by-step following the dependency structure, and finally prompt an LLM to synthesize a query.\"\n\nThis involved:\n1. Building an inverted index for constraint-aware cache sampling\n2. Using the reverse index to ensure dependent steps have compatible cache entries\n3. Abandoning attempts when no valid combinations exist\n\n### Phase 2: Designing Graduated Rewards\n\n**Initial Idea:** Decompose binary rewards into finer-grained signals.\n\n**Challenge Encountered:**\nThe authors discovered that using either reward component alone led to failure modes:\n\n- **Ratomic only** led to \"orchestration collapse\" (high individual call accuracy but poor sequencing)\n- **Rorch only** led to \"atomic collapse\" (syntactically correct but semantically broken calls)\n\n**Resolution:**\nThey combined both components:\n\n> \"The combined reward substantially outperforms both, achieving 49.5% call accuracy.\"\n\n> \"The combined reward avoids both failure modes by providing complementary learning signals: Rorch guides tool selection and sequencing, while Ratomic ensures parameter correctness.\"\n\n### Phase 3: Evaluating Generalization\n\n**New Problem Emerged:**\nWhen testing on synthetic data, the authors found:\n\n> \"SFT alone yields negligible gains or even degradation. Our error analysis reveals the root cause: SFT increases function selection errors at the sequence level (12.9% → 28.3% samples stopped after function error) and worsens query parameter extraction.\"\n\n**Resolution:**\nThey found that GRPO (reinforcement learning) outperformed SFT, especially with limited data:\n\n> \"These results suggest that for strong base models, direct RL training may be more effective than SFT when data is scarce.\"\n\n---\n\n## 4. Summary of the Iterative Problem-Solving Cycle\n\n| Stage | Problem Identified | Solution Attempted | New Problem | Resolution |\n|-------|-------------------|-------------------|-------------|------------|\n| 1 | Need real API data for training | Cache-based environment with 100k+ responses | Arbitrary function combinations produce invalid chains | Workflow templates + constraint-aware sampling |\n| 2 | Binary rewards too sparse | Graduated rewards (Ratomic + Rorch) | Each component alone causes collapse | Combine both components with λ=0.5 |\n| 3 | SFT degrades performance | Try RL directly | Need to validate generalization | GRPO outperforms SFT; data efficiency is high |\n\nThe paper's journey reflects a cyclical process of identification → attempted solution → discovered limitation → refined approach, ultimately producing a framework that addresses both the environmental and reward-signal challenges of multi-step tool orchestration.",
                    "methodology": "# 论文方法论解读\n\n这篇论文要解决的核心问题是：**如何训练一个大语言模型，让它能够正确地调用多个相互依赖的API来完成用户请求**。\n\n方法论分为三个主要部分，我按执行顺序来拆解。\n\n---\n\n## 第一步：构建一个可靠的训练环境\n\n### 2.1 问题定义\n\n**输入**：用户查询 q（比如“帮我订一个酒店，再租一辆车”），和一组可用的工具函数 F\n\n**输出**：一个动作序列 y = (y1, y2, ..., yT)，每个动作 yt 包含：\n- 要调用的函数名 ft\n- 要传入的参数 θt\n\n**核心难点**：后面的动作往往依赖前面动作的输出。比如第二步需要用到第一步返回的酒店ID。\n\n---\n\n### 2.2 确定性训练环境\n\n这是整篇论文最关键的基础设施。现有环境有两个问题：\n1. 很多环境用的是模拟数据，导致不同步骤之间的依赖关系可能不一致（比如第一步返回的酒店ID在第二步查不到）\n2. 很多环境只关注单次函数调用，而不是多步骤的依赖链\n\n论文的解决方案分三步：\n\n#### 第一步：整理工作流模板\n\n**输入**：无（这是人工设计的）\n\n**操作**：人工定义一系列**工作流模板**，每个模板包含：\n- 一个有序的函数调用序列（比如先搜酒店，再查房间，再预订）\n- 明确标注哪些参数依赖前面哪一步的输出\n- 具体从哪一步的哪个字段提取值\n\n**输出**：100多个模板，覆盖5个领域（酒店、航班、租车、景点、出租车）\n\n**目的**：为后续数据生成提供“骨架”，确保生成的训练数据在逻辑上是合理的。\n\n---\n\n#### 第二步：收集真实API响应构建缓存\n\n**输入**：真实API（论文用的是Booking.com的API）\n\n**操作**：\n- 不是随机调用API，而是**按照模板定义的完整链条**来调用\n- 把每一步的调用和返回结果缓存下来\n- 用 (函数名, 参数) 的哈希值作为索引，实现O(1)查找\n\n**输出**：一个包含100k+条真实API响应的缓存数据库\n\n**目的**：\n1. 确保依赖链的一致性（因为是按完整链条调用的，所以第二步能查到的数据第一步一定返回过）\n2. 消除训练时的网络延迟和API不稳定问题\n3. 实现确定性执行——同样的输入永远得到同样的输出\n\n---\n\n#### 第三步：受限数据合成（生成训练数据）\n\n这是整个方法的数据生成核心。论文发现：如果让模型自由生成多步骤调用，成功率很低（因为参数组合经常违反依赖约束）。所以用了一种“反向”生成方法：\n\n**输入**：工作流模板 + 缓存数据库\n\n**操作**（分4小步）：\n\n1. **构建反向索引**：建立一个三级索引 (函数名, 参数名, 参数值) → 缓存条目ID。比如我想找“Search_Hotels函数、dest_id参数、值为ABC123”的所有缓存条目。\n\n2. **约束感知采样**：按步骤顺序生成动作序列\n   - 第一步：从缓存中随机选一个该函数的调用\n   - 后续步骤：如果这一步依赖前面的输出（比如需要上一步返回的hotel_id），就用反向索引去查“有哪些缓存条目使用了这个hotel_id”，然后从这些候选中采样\n   - 如果候选为空，就重新采样\n   - 这样**保证每一步采样的参数都能和上一步衔接上**\n\n3. **生成查询**：给定采样得到的正确动作序列 y*，让一个LLM生成一个用户查询，使得这个查询“应该”导致模型生成这个动作序列。查询生成时要求把参数值原封不动嵌入进去（echo-back机制）。\n\n4. **验证**：把生成的查询和动作序列放到环境中跑一遍，确保能成功执行。任何一步失败就丢弃这个样本。\n\n**输出**：合成好的训练数据集 D_syn，每个样本包含 (查询q, 正确动作序列y*)\n\n**目的**：高效生成高质量的多步骤训练数据，避免自由生成导致的低成功率问题。\n\n---\n\n## 第二步：设计奖励信号\n\n### 2.3 渐进式奖励设计\n\n#### 问题背景\n\n在多步骤任务中，传统的二元奖励（成功=1，失败=0）有两个严重问题：\n\n1. **组合爆炸**：假设每一步正确的概率是p=0.8，3步都正确的概率只有0.8³=0.51，4步只有0.41。随着步骤增加，正样本指数级减少。\n\n2. **信用分配模糊**：即使失败了，二元奖励也无法告诉模型到底是哪一步出了问题。\n\n---\n\n#### 解决方案：分解为两个奖励组件\n\n论文把“正确性”拆成两个独立的维度：\n\n---\n\n##### 组件1：Ratomic（原子有效性）\n\n**目的**：评估**单个**函数调用是否正确\n\n**输入**：预测的调用 ŷ = (函数名, 参数)，和正确的调用 y* = (函数名, 参数)\n\n**操作**：分两层验证\n\n1. **AST验证**（静态检查）：\n   - Level 1：函数名对了吗？\n   - Level 2：参数结构（有哪些参数、类型对不对）？\n   - Level 3：参数值完全一样吗？\n\n2. **语义验证**（动态执行）：\n   - 把预测的参数真的去调一次API，看能不能成功返回有效数据\n   - 不要求返回数据完全一样，只要求“不报错、有数据”\n\n**输出**：一个0到1之间的分数\n\n**目的**：给模型提供细粒度的反馈——即使整个任务失败了，模型也能知道“至少这个函数调用本身是对的/错的”\n\n---\n\n##### 组件2：Rorch（编排一致性）\n\n**目的**：评估**整个动作序列**是否满足依赖关系\n\n**输入**：预测的完整序列 ŷ，和正确的完整序列 y*\n\n**操作**：\n- 根据正确序列构建一个依赖图G（哪些步骤依赖哪些前面的步骤）\n- 检查预测序列是否：\n  1. 包含了所有需要的步骤\n  2. 这些步骤的执行顺序满足依赖关系（依赖的步骤必须在被依赖的步骤之后）\n\n**输出**：一个0到1之间的分数\n\n**目的**：让模型学会“什么时候该调用什么函数”以及“先调哪个后调哪个”\n\n---\n\n##### 组合奖励\n\n**操作**：总奖励 = λ × Ratomic + (1-λ) × Rorch\n\nλ默认设为0.5，两个组件同等重要。\n\n---\n\n## 第三步：训练（使用GRPO）\n\n论文用的是GRPO（Group Relative Policy Optimization）强化学习算法。\n\n**输入**：\n- 基础模型（Qwen3-8B或Qwen2.5-7B）\n- 合成好的训练数据\n- 上面设计的奖励函数\n\n**操作**：\n1. 让模型对每个查询生成多个候选动作序列\n2. 用奖励函数评估每个候选\n3. 根据奖励更新模型参数，让高分序列的概率上升，低分的下降\n\n**输出**：训练好的模型\n\n---\n\n## 总结\n\n这篇论文的方法论核心是：\n\n1. **数据层面**：用“模板引导+缓存采样”的方式，高效生成多步骤依赖的训练数据\n2. **奖励层面**：把“是否成功”拆成“单个调用对不对”和“调用顺序对不对”两个独立信号，解决稀疏奖励问题\n3. **环境层面**：用真实API响应构建缓存，确保训练时的执行环境和真实环境一致",
                    "additional_insights": "1. **反直觉发现**：SFT（监督微调）单独使用不仅没有提升性能，反而导致性能下降或无明显增益（表2显示SFT-3和SFT-10在多数情况下低于Zero-shot），这表明简单的模仿学习在多步工具编排任务上容易过拟合。\n\n2. **反直觉发现**：使用更少的合成样本（GRPO-3，每模板3个样本）有时反而比使用更多样本（GRPO-10）表现更好，说明数据效率很高，模型能快速捕捉工作流结构模式。\n\n3. **关键认知颠覆**：依赖参数传播并非主要瓶颈——论文发现依赖参数错误率（5-8%）远低于查询参数错误率（13-16%），这表明从自然语言提取参数比跨调用传播值要困难得多（表5）。\n\n4. **有启发性的ablation**：单独使用Ratomic导致\"orchestration collapse\"（模型个体调用准确率近完美但协调能力崩溃），单独使用Rorch导致\"atomic collapse\"（完成工作流但调用质量低），两者结合才能避免极端失效模式（图2、图3）。\n\n5. **有启发性的ablation**：Rorch only训练下，AST有效性保持~0.82但语义有效性降至~0.45，说明模型学会生成语法正确但语义错误的调用——参数名有效但值无效导致执行失败（图3）。\n\n6. **实用经验**：数据规模从67样本扩展到383样本（~6倍）几乎无性能提升（表4），暗示扩展模板多样性可能比增加单模板样本数更有价值。\n\n7. **实用经验**：跨域任务（ hotels、flights等混合）比单域任务（attraction、car-rental）难度显著更高，单域可达50-60%准确率而跨域仅22-28%（表7）。\n\n8. **新认知**：SFT会加剧函数选择错误（12.9%→28.3%），而GRPO提供均衡改进，表明模仿学习鼓励更多调用但质量更低，RL则同时改进质量与完成度（表5）。\n\n9. **局限性中的机会**：论文承认存在\"moderate generalization gap\"（图7），验证指标与训练指标有差距，这为正则化或数据增强方法提供了明确的改进空间。\n\n10. **局限性中的机会**：当前仅覆盖40个模板且部分验证失败，论文指出\"expanding template diversity...may be more valuable than generating more samples per existing template\"，为未来工作指明方向。",
                    "summary_translation": "多步骤工具编排（Multi-step tool orchestration）要求大语言模型（LLMs）以正确的顺序调用多个相互依赖的API，并在调用过程中传递中间输出，这一任务仍然具有挑战性。当前最先进（State-of-the-art）的模型在完整序列执行（full sequence execution）时频繁出现故障，其中参数值错误（parameter value errors）占据了相当大的比例。在训练模型处理此类工作流程时面临两大障碍：现有环境侧重于使用模拟数据（simulated data）进行简单的每轮函数调用（per-turn function calls），而二元奖励（binary rewards）无法提供部分正确性（partial correctness）的信号。我们提出了一个同时解决这两个挑战的框架。首先，我们构建了一个由大规模真实API响应缓存（large-scale cache of real API responses）支撑的强化学习环境（reinforcement learning environment），使得数据合成管道（data synthesis pipeline）能够采样有效的多步骤编排轨迹（multi-step orchestration traces），其复杂度可控，且生成效率显著高于无约束方法（unconstrained methods）。其次，我们提出了一种渐进式奖励设计（graduated reward design），将正确性分解为原子有效性（atomic validity，即在递增粒度下对单个函数调用的正确性检验）和编排能力（orchestration，即正确的工具排序与依赖关系尊重）。在ComplexFuncBench上，我们的方法在轮次准确率（turn accuracy）方面展现出显著提升。消融研究（Ablation studies）证实了两个奖励组件都是必不可少的：单独使用任何一个都会导致性能大幅下降。"
                },

                    "summary": "Recent advances in large language models (LLMs) have enabled the development of autonomous agents capable of complex reasoning and multi-step problem solving. However, these agents struggle to adapt to specialized environments and do not leverage past interactions, approaching each new task from scratch regardless of their accumulated experience. We introduce Experiential Reflective Learning (ERL), a simple self-improvement framework that enables rapid environment adaptation through experiential learning. ERL reflects on task trajectories and outcomes to generate heuristics, capturing actionable lessons that transfer across tasks. At test time, relevant heuristics are retrieved based on the current task and injected into the agent's context to guide execution. On the Gaia2 benchmark, ERL improves success rate by 7.8% over a ReAct baseline, with large gains in task completion reliability, and outperforms prior experiential learning methods. Through systematic ablations, we find that selective retrieval is essential and that heuristics provide more transferable abstractions than few-shot trajectory prompting. These results demonstrate that reflecting on single-attempt experiences to extract transferable heuristics enables effective agent self-improvement.",

                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是提出一个**自我演化的LLM智能体框架**（Experiential Reflective Learning, ERL），其核心贡献在于： 1. 让智能体能够**适应特定环境**并**利用过去的交互经验** 2. 通过**反思任务轨迹和结果**来生成可迁移的heuristics（启发式规则） 3. 在测试时检索相关heuristics并注入智能体上下文来指导执行 这**不属于**排除类别： - 不是非演化型应用（不是将LLM作为工具解决特定领域问题） - 不是非Agentic的推理（是关于智能体的自我改进框架） - 不是基础设施研究 **第二步：正面指标** 论文明确包含多个核心关注点： - **核心范式**: `Self-Evolving`（标题明确写\"Self-Improving LLM Agents\"） - **智能体能力**: `Self-Reflection`（反思机制）、`Memory`（利用过去经验） - **演化机制**: `Self-Improvement`（自我改进）、`Iterative Improvement`（通过经验迭代） **第三步：排除标准** - 安全与对齐：不属于安全研究 ✓ - 多模态与视觉：不涉及 ✓ - 图技术：不涉及 ✓ **第四步：特殊处理** - 推理/规划：属于智能体框架的规划能力改进 - 自我演化应用：**保留**（按照用户给出的例外规则，论文核心是提出新的\"自我演化\"机制） **结论** 该论文完全符合研究目标，其核心贡献是构建一个**自我演化的LLM智能体框架**，通过经验反思学习实现智能体的自我改进，这正是用户三个研究方向中\"自我演化 (Self-Evolving)\"的核心内容。",
                    "intro_logic": "The \"storytelling\" (problem introduction) logic in the introduction:\n\n1. LLM-powered agentic systems are increasingly deployed for complex tasks requiring multi-step planning, reasoning, and tool use\n\n2. However, general-purpose agents fail to adapt to new environments with unfamiliar tools and domain-specific conventions\n\n3. Fine-tuning can enable adaptation but is resource-intensive, infeasible for closed-source models, and does not support continuous learning\n\n4. This limitation has motivated research into experiential memory systems that enable parameter-free improvement through accumulated experience\n\n5. Existing methods like ExpeL and AutoGuide require multiple rollouts per task to construct contrastive trajectory pairs, an assumption that breaks down in practical agent deployment where tasks cannot be retried\n\n6. These prior methods also scale poorly as experience accumulates (ExpeL concatenates all insights regardless of relevance) and provide no guidance when the current state fails to match any stored context (AutoGuide)\n\n7. Research Question: How can we enable efficient self-improvement in LLM agents through experiential learning that works with single-attempt trajectories, scales well with accumulated experience, and provides relevant guidance for new tasks?",
                    "core_insight": "# Analysis of the Paper's Problem Identification and Methodology Journey\n\n## 1. The Identified Pain Point / Starting Lens\n\nThe paper's foundational problem stems from a fundamental limitation in how autonomous LLM agents handle accumulated experience. The authors observe that while modern LLM-powered agents can perform complex reasoning and multi-step problem solving, they struggle with a critical aspect of intelligent behavior: **learning from past interactions without requiring explicit retraining**.\n\nThe paper explicitly frames this issue in the introduction:\n\n> \"Recent advances in large language models (LLMs) have enabled the development of autonomous agents capable of complex reasoning and multi-step problem solving. However, these agents struggle to adapt to specialized environments and do not leverage past interactions, approaching each new task from scratch regardless of their accumulated experience.\"\n\nThis reveals the core pain point: **the absence of a parameter-free, continuous learning mechanism** that allows agents to improve from experience within their operational lifetime. The authors further elaborate on why existing solutions are inadequate:\n\n> \"Fine-tuning can enable such adaptation but is resource-intensive, infeasible for closed-source models, and does not support continuous learning.\"\n\nThe paper then identifies specific limitations in prior experiential learning approaches:\n\n- **Regarding ExpeL**: The method \"extracts reusable insights by comparing successful and failed trajectories\" but \"concatenated insights are then concatenated into every test prompt regardless of task relevance, an approach that scales poorly as experience accumulates.\"\n\n- **Regarding AutoGuide**: It \"performs context identification and guideline retrieval at every agent turn, incurring substantial overhead, and provides no guidance when the current state fails to match any stored context.\"\n\n- **A common limitation**: Both methods \"require multiple rollouts per task to construct contrastive trajectory pairs, an assumption that breaks down in practical agent deployment where tasks cannot be retried.\"\n\nThus, the \"lens\" through which the authors approached the problem was: **How can we enable agents to learn from single-attempt experiences in a scalable, retrieval-based manner without requiring multiple retries or parameter updates?**\n\n---\n\n## 2. The Journey: Challenges, Resolutions, and Emerging Problems\n\n### Challenge 1: Designing a Single-Attempt Learning Mechanism\n\n**Initial Idea**: The authors wanted to create a system that learns from every task execution, not just from tasks that could be retried until success.\n\n**Resolution**: They developed the **heuristic generation** component, where after each task, the agent reflects on the trajectory and outcome to generate structured heuristics containing:\n1. An analysis identifying what led to success or failure\n2. A learned guideline with explicit trigger conditions and recommended actions\n\nThis enabled learning from single-attempt experiences, addressing the \"multiple rollouts\" limitation of prior methods.\n\n### Challenge 2: Scaling Heuristic Pools Without Overwhelming the Agent\n\n**Problem**: As the heuristic pool grows, injecting all heuristics into the agent's context becomes impractical and counterproductive.\n\n**Resolution**: The authors implemented **retrieval-augmented execution**, where an LLM analyzes the new task, decomposes it into potential sub-tasks, and scores each stored heuristic for relevance. The top-k heuristics are then injected into the agent's context.\n\n### Challenge 3: Determining Optimal Retrieval Strategy\n\n**Problem**: The authors encountered a significant challenge in determining how to retrieve relevant heuristics. Their experiments revealed:\n\n> \"Performance exhibits a non-monotonic pattern, peaking around 40–60 heuristics before degrading with excessive inclusion.\"\n\nThis indicated that retrieval quality matters more than quantity, but the optimal approach was not immediately clear.\n\n**Resolution**: They compared multiple retrieval methods:\n\n| Retrieval Method | Overall Success Rate |\n|-----------------|---------------------|\n| Random selection | 53.8% (best random config) |\n| Embedding-based (Qwen3-Embedding-0.6B) | 53.3% |\n| LLM-based (GPT-5.2) | **56.1%** |\n\nThe authors concluded:\n\n> \"LLM-based retrieval with k = 20 achieves 56.1% overall, outperforming both embedding-based retrieval... and the best random selection configuration, confirming that retrieval quality matters more than heuristic quantity.\"\n\n### Challenge 4: Determining What to Learn From (Failures vs. Successes)\n\n**Problem**: The authors discovered that the source of heuristics (failures vs. successes) affected performance differently across task types:\n\n> \"Table 2b shows that failure-derived heuristics substantially outperform success-derived ones overall. The effect is split-dependent: failure heuristics excel on Search (+14.3% over baseline) by providing negative constraints that prune ineffective strategies, whereas success heuristics work best on Execution (+9.0%) by reinforcing proven action sequences.\"\n\n**Resolution**: While failure-only retrieval yielded the highest overall score (58.9%), the authors noted that \"retrieving from both sources offers a reliable compromise\" for practical deployment where task distribution is unknown.\n\n### Challenge 5: Dependency on Outcome Signals\n\n**Problem**: The authors investigated whether reward signals are necessary for heuristic generation:\n\n> \"Reward signals may not always be available in real-world agentic tasks.\"\n\n**Finding**: When environment validation rewards were unavailable, \"the agent correctly identifies success or failure only 70% of the time, and the success rate of ERL drops to 51.2% (-4.8%).\"\n\n**Resolution**: The authors noted that this still exceeds the baseline (48.3%), indicating that ERL provides value even with imperfect reward signals, though accurate outcome feedback remains important for optimal performance.\n\n---\n\n## Summary\n\nThe paper's journey can be characterized as a progressive refinement of the experiential learning paradigm:\n\n1. **Starting Point**: The pain point was that agents don't leverage accumulated experience, and existing methods require multiple retries or scale poorly.\n\n2. **Initial Solution**: Heuristic generation from single-attempt trajectories.\n\n3. **Challenge Encountered**: How to handle growing heuristic pools without overwhelming the agent.\n\n4. **Resolution**: LLM-based retrieval of top-k relevant heuristics.\n\n5. **New Challenge**: Determining optimal retrieval method and heuristic count.\n\n6. **Resolution**: LLM-based retrieval outperforms embedding-based and random selection; k=20 provides optimal balance.\n\n7. **Further Challenge**: Learning from failures vs. successes affects different task types differently.\n\n8. **Resolution**: Understanding the differential effects allows for targeted retrieval strategies.\n\nThis iterative process of identifying problems and refining solutions demonstrates the paper's systematic approach to building a practical self-improving agent framework.",
                    "methodology": "# 方法论拆解\n\n这篇论文提出的方法叫做 **Experiential Reflective Learning (ERL)**，中文可以叫“经验反思学习”。它的核心思想很直接：**让Agent从过去做过的事情中提取教训，形成可以复用的“行动指南”，下次遇到新任务时把这些指南翻出来参考**。\n\n整个方法分为两个阶段，按时间顺序执行：\n\n---\n\n## 第一阶段：经验 → 启发式规则（Heuristic Generation）\n\n**目的**：把一次具体的任务执行经历，变成一条通用的行动建议。\n\n**输入**：\n\n- 任务描述（用户让Agent干什么）\n- 执行轨迹（Agent在这一轮中每一步做了什么、调用了什么工具、返回了什么结果）\n- 结果信号（任务最终成功还是失败）\n\n**操作**：\n\n1. **分析结果**：如果任务失败了，找出具体在哪一步、因为什么问题失败；如果成功了，找出是哪个关键操作或决策起了作用。\n\n2. **生成结构化的启发式规则**：输出一条包含两部分内容的规定：\n   - **分析（Analysis）**：简短说明这次成功或失败的具体原因\n   - **指导（Learned Guideline）**：用“如果...那么...”的格式，写明在什么情况下应该采取什么行动\n\n3. **存入池子**：把生成的启发式规则扔进一个持久化的存储池。\n\n**输出**：一条结构化的启发式规则，包含触发条件（什么情况下用）和具体行动建议（怎么做）。\n\n**举例**（从论文Figure 6）：\n> 触发条件：当需要给日历活动的参与者发送邮件，但手里只有人名、没有邮箱地址时  \n> 行动建议：先调用Contacts工具把人名转换成邮箱地址，验证格式正确后再发邮件\n\n---\n\n## 第二阶段：新任务 → 检索并执行（Retrieval-augmented Execution）\n\n**目的**：面对一个新任务时，从过去的一大堆启发式规则中挑出最相关的几条，塞进Agent的脑子里，让它带着“前车之鉴”去干活。\n\n**输入**：\n\n- 新任务描述\n- 上一阶段积累的启发式规则池（可能有很多条）\n\n**操作**：\n\n1. **任务分解**：用LLM分析新任务，把它拆成潜在的子任务和行动步骤。\n\n2. **检索相关规则**：用LLM给池子里的每条启发式规则打分，评估它跟当前任务的关联程度。评分标准包括：\n   - 任务描述的相似度\n   - 经验的多样性（尽量覆盖不同类型的教训）\n   - 规则内容的实用性\n\n3. **选取Top-k**：选出得分最高的k条规则（论文中k=20）。\n\n4. **注入上下文**：把这k条规则塞进Agent的系统提示（system prompt）里，作为行动指导。\n\n5. **正常执行**：Agent按照正常的ReAct流程执行任务，但在每一步都可以“参考”这些被注入的规则。\n\n**输出**：Agent带着相关启发式规则执行任务，最终产出成功/失败的结果。\n\n---\n\n## 整体流程图（简化版）\n\n```\n训练阶段（积累经验）：\n  任务A执行 → 失败/成功 → 反思 → 生成启发式规则A1 → 存入池子\n  任务B执行 → 失败/成功 → 反思 → 生成启发式规则B1 → 存入池子\n  ...（重复很多次）\n\n测试阶段（新任务）：\n  新任务来了 → 检索池子 → 选出Top-k规则 → 塞进prompt → Agent执行 → 结果\n```\n\n---\n\n## 解决的核心问题\n\n论文在Introduction里提到两个痛点：\n\n1. **Agent不善于适应新环境**：之前的方法要么需要微调（fine-tuning），要么让Agent每次都从零开始，不利用过去的经验。\n2. **之前的方法有缺陷**：ExpeL方法把所有经验都塞进prompt，不管相关不相关；AutoGuide方法在每个Agent步骤都做检索，开销太大；两者都要求同一个任务跑多遍才能生成对比经验。\n\nERL的解决思路：**从单次执行经验中提炼可复用的规则，用时再按需检索**，既避免了无关信息干扰，又比每步都检索更高效。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **Few-shot轨迹演示反而降低性能**：直接使用原始轨迹作为few-shot示例（46.4%）比不使用任何经验的ReAct baseline（48.3%）更差，说明raw trajectories缺乏可操作的洞察，无法帮助agent在新场景中改进。\n\n- **随机选择heuristics呈非单调模式**：性能在40-60个heuristics时达到峰值（约53.8%），之后反而下降，表明并非 heuristics 越多越好，过多无关heuristics会干扰agent决策。\n\n- **Failure/Success heuristics的任务分化**：failure-derived heuristics在Search任务上大幅领先（+14.3%），而success-derived heuristics在Execution任务上更有效（+9.0%），两者各有适用场景。\n\n## 2. 有启发性的 ablation 分析\n\n- **无检索的ERL仍有收益**：不使用检索、直接注入所有heuristics（53.8%）仍比baseline（48.3%）高5.5%，说明heuristic生成本身就有价值，但检索进一步提升至56.1%。\n\n- **检索质量>数量**：LLM-based retrieval（56.1%）显著优于embedding-based retrieval（53.3%），证明选择\"相关性\"比简单相似度匹配更重要。\n\n- **pass@3 vs pass^3揭示可靠性提升**：ERL在pass^3（连续3次成功）上提升显著（Execution +8.3%, Search +10.6%），但pass@3（至少1次成功）提升较小，说明主要改进是\"稳定性\"而非\"解决新任务能力\"。\n\n- **迭代ERL泛化退化**：迭代版本在源任务上成功率更高（44.6% vs 42.0%），但测试泛化下降（50.7% vs 56.1%），表明过度依赖guidance会导致heuristics覆盖范围变窄。\n\n## 3. 对领域的新认知\n\n- **Heuristics是比trajectories更好的抽象**：在相同token预算下，heuristics始终优于raw trajectories（图5），因为heuristics提取了可转移的战略原则，而trajectories包含过多任务特定细节。\n\n- **Reward信号质量影响heuristic质量**：当无法获取真实reward、需agent自评时（正确率70%），ERL性能下降4.8%但仍高于baseline，说明准确的结果反馈对生成高质量heuristics至关重要。\n\n## 4. 实用的经验性结论\n\n- **k=20是LLM检索的最优值**：实验表明k=20时达到56.1%峰值，过多（k>20）检索效率下降。\n\n- **Prompt caching降低增量成本**：由于heuristics被缓存，scenario rollout的额外成本仅+15%，总体+40%是可接受的工程代价。\n\n- **保留混合类型的heuristics**：虽然failure-only在某些场景最优（58.9%），但实际部署中混合来源提供更稳健的折中。\n\n## 5. 局限性中的机会\n\n- **Dual-control环境表现较差**：τ²-bench的Telecom领域（用户参与式交互）ERL效果下降，暗示当前方法在需要协调用户行为的场景中受限，这可能是未来重要方向。\n\n- **Heuristic pool扩展挑战**：论文承认未来需解决conflicting guidelines和检索质量维护问题，可探索heuristic去重、冲突检测或层次化组织。\n\n- **无reward信号场景**：即使在自评模式下ERL仍优于baseline，为无法获取明确反馈的现实部署提供了可行路径。",
                    "summary_translation": "## 中文翻译\n\n大型语言模型（LLMs，Large Language Models）的最新进展使得能够进行复杂推理和多步骤问题解决的自主代理（agents）得以开发。然而，这些代理难以适应专业化环境，无法利用过去的交互经验，无论积累了何种经验，都从零开始处理每个新任务。我们提出了经验反思学习（ERL，Experiential Reflective Learning），这是一个简单的自我改进框架，通过经验学习实现快速环境适应。ERL对任务轨迹和结果进行反思以生成启发式规则（heuristics），捕捉可迁移到其他任务的经验教训。在测试时，根据当前任务检索相关的启发式规则并将其注入代理的上下文中以指导执行。在Gaia2基准测试中，ERL相比ReAct基线将成功率提高了7.8%，任务完成的可靠性显著提升，并优于以往的经验学习方法。通过系统性消融实验，我们发现选择性检索至关重要，且启发式规则比少样本轨迹提示（few-shot trajectory prompting）提供了更具可迁移性的抽象表示。这些结果表明，对单次尝试经验进行反思以提取可迁移的启发式规则能够实现有效的代理自我改进。\n\n---\n\n**术语说明：**\n\n- **autonomous agents**：自主代理，指能够自主执行任务的AI系统\n- **heuristics**：启发式规则，指从经验中提炼的指导性原则或经验法则\n- **ReAct**：一种结合推理（Reasoning）和行动（Acting）的代理框架\n- **few-shot trajectory prompting**：少样本轨迹提示，指通过提供少量示例来指导模型执行任务的方法"
                },

                    "title": "Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills",
                    "arxiv_id": "2603.25158",
                    "authors": "Jingwei Ni, Yihao Liu, Xinpeng Liu, Yutao Sun, Mengyu Zhou, Pengyu Cheng, Dexin Wang, Xiaoxi Jiang, Guanjun Jiang",
                    "summary": "Equipping Large Language Model (LLM) agents with domain-specific skills is critical for tackling complex tasks. Yet, manual authoring creates a severe scalability bottleneck. Conversely, automated skill generation often yields fragile or fragmented results because it either relies on shallow parametric knowledge or sequentially overfits to non-generalizable trajectory-local lessons. To overcome this, we introduce Trace2Skill, a framework that mirrors how human experts author skills: by holistically analyzing broad execution experience before distilling it into a single, comprehensive guide. Instead of reacting sequentially to individual trajectories, Trace2Skill dispatches a parallel fleet of sub-agents to analyze a diverse pool of executions. It extracts trajectory-specific lessons and hierarchically consolidates them into a unified, conflict-free skill directory via inductive reasoning. Trace2Skill supports both deepening existing human-written skills and creating new ones from scratch. Experiments in challenging domains, such as spreadsheet, VisionQA and math reasoning, show that Trace2Skill significantly improves upon strong baselines, including Anthropic's official xlsx skills. Crucially, this trajectory-grounded evolution does not merely memorize task instances or model-specific quirks: evolved skills transfer across LLM scales and generalize to OOD settings. For example, skills evolved by Qwen3.5-35B on its own trajectories improved a Qwen3.5-122B agent by up to 57.65 absolute percentage points on WikiTableQuestions. Ultimately, our results demonstrate that complex agent experience can be packaged into highly transferable, declarative skills -- requiring no parameter updates, no external retrieval modules, and utilizing open-source models as small as 35B parameters.",

                    "filter_reason": "**核心判断：** 这篇论文的核心贡献是提出 **Trace2Skill 框架**，用于自动构建和演化LLM智能体的技能（skills）。这完全符合筛选标准中的\"保留\"类别——论文的核心是关于**构建和改进LLM智能体**的方法论，而非将LLM作为工具应用到特定领域。 **正面指标分析：** 1. **核心范式匹配**： - ✓ **Self-Evolving**：论文明确提出\"trajectory-grounded evolution\"（基于轨迹的演化），通过分析执行经验来迭代改进技能 - ✓ **LLM-based Agents**：构建智能体技能系统 2. **智能体能力**： - ✓ 涉及技能的**构建**（从零创建新技能） - ✓ 涉及技能的**深化和演化**（deepening existing skills） - ✓ 涉及**归纳推理**（inductive reasoning）来整合知识 3. **演化机制**： - ✓ **Self-Improvement**：技能通过分析轨迹经验进行自我完善 - ✓ **Iterative Improvement**：通过\"parallel fleet of sub-agents\"迭代分析执行经验 - ✓ 技能可以跨模型迁移和OOD泛化，体现了演化后的鲁棒性 **排除标准检查：** - 安全与对齐：✗ 不涉及 - 多模态：✗ VisionQA只是实验领域之一，不是核心研究内容 - 图：✗ 不涉及 **特殊情况的处理：** 虽然论文在 spreadsheet、VisionQA、math reasoning 等领域进行实验，但根据第四步的规则：**\"如果论文的核心是提出一种新的'自我演化'机制，即使它被应用在特定领域，也应该保留\"**。这篇论文正是如此——其核心贡献是提出通用的技能演化框架，而非针对某个特定领域的应用。 **结论：** 这篇论文完全符合研究者的三个核心方向： 1. ✓ 单智能体：涉及智能体的技能构建和自主能力提升 2. ✓ 自我演化：通过轨迹分析实现技能的迭代演化 3. ✓ 跨模型泛化：展示了技能在不同规模LLM间的迁移能力 因此，**这篇论文应该被保留**。",
                    "intro_logic": "# Ordered List: Problem Introduction (Storytelling) in the Introduction\n\n1. **Context**: Large Language Model (LLM) agents increasingly rely on skills—structured, reusable documents encoding task-solving procedures, domain knowledge, and operational guidelines—to navigate complex environments.\n\n2. **Problem 1 (Scalability Bottleneck)**: As agents are deployed across broader and more nuanced domain-specific use cases, the demand for highly specialized skills grows, creating a severe scalability bottleneck for manual skill creation and maintenance.\n\n3. **Problem 2 (Human-Written Skills Are Not Portable)**: Even when a human-written skill exists, it does not guarantee improved performance for a given agent, model, or task distribution. A skill that lifts one agent may actively harm another.\n\n4. **Problem 3 (Parametric Knowledge Is Insufficient)**: Automated skill generation relying solely on an LLM's parametric knowledge yields limited benefits, primarily because parametric knowledge lacks information about the specifics and common pitfalls of the target domain.\n\n5. **Problem 4 (Limitations of Existing Online Evolution)**: Concurrent work proposes improving skills using agent execution experience in an online setting, but this approach diverges from human methodology in two key ways:\n   - Skill fragmentation: creating narrowly tailored skills rather than comprehensive ones\n   - Sequential updates: reacting to individual trajectories before acquiring adequate domain knowledge\n\n6. **Observation**: Human experts build comprehensive, high-level understanding of a domain before instantiating it into a skill, whereas existing approaches react sequentially to isolated trajectories.\n\n7. **Research Question**: How can we design a skill evolution framework that mirrors human expertise by analyzing broad execution experience holistically before distilling it into a single, comprehensive, and transferable skill?",
                    "core_insight": "# Analysis of Trace2Skill's Problem Identification and Methodology Journey\n\n## 1. The Identified Pain Point / \"Lens\"\n\nThe paper's foundational problem identification centers on a critical mismatch between how human experts author skills and how existing automated approaches attempt to do the same. The authors observed that **manual skill creation creates a severe scalability bottleneck** as demand for specialized skills grows across diverse domain-specific use cases. However, the more nuanced pain point—which directly shaped their methodology—was their observation that automated skill generation approaches suffer from two fundamental flaws that diverge from human expertise:\n\n### The Core Lens: Human Methodology as the Design Template\n\nThe paper explicitly frames its approach around mimicking human expert behavior:\n\n> \"Instead of reacting sequentially to individual trajectories, Trace2Skill dispatches a parallel fleet of sub-agents to analyze a diverse pool of executions. It extracts trajectory-specific lessons and hierarchically consolidates them into a unified, conflict-free skill directory via inductive reasoning.\"\n\nThe authors articulate two specific deficiencies in existing approaches that their work addresses:\n\n**First, Skill Fragmentation vs. Consolidation:**\n> \"Existing works often create new, narrowly tailored skills to host trajectory-local lessons, resulting in massive skill collections that can lead to retrieval difficulties. In contrast, human experts typically craft a single, comprehensive skill per domain, complete with broad procedural guidance and error prevention checklists.\"\n\n**Second, Sequential vs. Holistic Updates:**\n> \"In an online setting, skills are updated sequentially using lessons from isolated incoming trajectories... This mimics a scenario where an author continuously edits a skill while sequentially learning about a domain, reacting prematurely before acquiring adequate domain-specific knowledge. Human experts, conversely, build a comprehensive, high-level understanding of the domain before instantiating it into a skill.\"\n\nThis human-mimicry lens led directly to Trace2Skill's three-stage pipeline: parallel trajectory analysis followed by holistic consolidation, rather than sequential editing.\n\n---\n\n## 2. The Paper's Journey: Challenges and Resolutions\n\n### Challenge 1: Error Analysis is Harder Than Success Analysis\n\nThe authors recognized early that diagnosing failures is substantially more difficult than analyzing successes:\n\n> \"Since we assume no stronger teacher model is available, errors are substantially harder to diagnose than successes, motivating asymmetric analyst designs.\"\n\n**Resolution:** The paper implements an asymmetric design where the Success Analyst (A+) follows a simple single-pass workflow, while the Error Analyst (A−) operates as a multi-turn agentic loop:\n\n> \"Error Analyst (A−) is implemented as a ReAct-style multi-turn agentic loop. Given τᵢ ∈ T⁻, it can inspect the full trace, read input/output files, and compare the agent's answer against ground truth — iteratively narrowing down the root cause before proposing a patch.\"\n\nThis agentic approach proved superior to single-LLM-call baselines, as shown in their ablation study (Table 6), where agentic error analysis outperformed single-call analysis by +12.2 pp in some settings.\n\n### Challenge 2: Patch Conflicts and Redundancy\n\nWith many independent analysts proposing patches simultaneously, conflicts were inevitable:\n\n> \"All analysts operate on a frozen copy of S₀ with no visibility into other agents' patches. This independence prevents premature convergence, preserving the full diversity of per-trajectory observations in P.\"\n\n**Resolution:** The hierarchical merge operator M performs conflict elimination and inductive generalization:\n\n> \"Three deterministic guardrails enforce correctness: (1) patches referencing non-existent files are rejected; (2) edits targeting the same line range within the same file are flagged as conflicts and withheld; (3) the updated S is validated by a skill format checker.\"\n\n### Challenge 3: Ensuring Generalization vs. Overfitting\n\nA critical challenge was ensuring that trajectory-local lessons would transfer across model scales and out-of-distribution tasks, rather than merely memorizing specific instances:\n\n> \"Crucially, this trajectory-grounded evolution does not merely memorize task instances or model-specific quirks: evolved skills transfer across LLM scales and generalize to OOD settings.\"\n\n**Resolution:** The inductive reasoning during hierarchical merge explicitly prioritizes prevalent patterns:\n\n> \"M is explicitly instructed to identify prevalent patterns — edits appearing consistently across independent patches — on the grounds that recurring observations across diverse trajectories are more likely to reflect systematic task properties and generalize to unseen tasks and different agent models.\"\n\n### Challenge 4: Quality Control for Patches\n\nNot all trajectory analyses yield valid, useful patches—some could be spurious or unfocused.\n\n**Resolution:** The paper implements a quality gate:\n\n> \"If neither condition yields a valid causal analysis, τᵢ is excluded from the patch pool. This quality gate ensures every patch in P⁻ is grounded in a verified failure cause, in contrast to prior work deriving insights via a single non-interactive LLM call.\"\n\n### Challenge 5: Balancing General Principles vs. Case-Specific Details\n\nThe authors needed to determine which information belongs in the main skill document versus auxiliary references.\n\n**Resolution:** The pipeline automatically routes high-frequency patterns to SKILL.md and niche quirks to references/:\n\n> \"Niche quirks are routed to references/. Low-support observations are not discarded but routed into 13 supplementary reference files rather than the main SKILL.md. This mirrors established skill-design practice: procedural guidance flows from general to case-specific.\"\n\n---\n\n## Summary\n\nThe paper's journey began with identifying that existing automated skill creation methods fail to mirror how human experts actually develop skills—holistically and comprehensively rather than sequentially and fragmentarily. The methodology evolved through several implementation challenges: designing asymmetric analyst agents (error analysis being harder than success analysis), ensuring patch compatibility through hierarchical merging with conflict prevention, enforcing quality gates to filter spurious analyses, and automatically organizing the output into hierarchical skill structures. Each challenge was addressed through specific design choices that ultimately enabled the surprising finding that trajectory-grounded skills can transfer across model scales (e.g., a skill evolved by Qwen3.5-35B improving Qwen3.5-122B by up to 57.65 percentage points on WikiTQ).",
                    "methodology": "# Trace2Skill 方法论拆解\n\n## 核心目标\n\n这篇论文想解决一个问题：如何让 LLM agent 自动获得针对特定任务的高质量技能（Skill）？手动写技能太慢，而单纯让模型自己生成技能又容易质量低下或只记住特定任务的细节。\n\n核心思路是模仿人类专家写技能的方式——先广泛分析各种执行经验，然后从中提炼出通用的、可迁移的技能指导，而不是一条一条地、顺序地更新技能。\n\n---\n\n## 方法执行流程\n\n整个方法分为三个阶段，按顺序执行：\n\n### 第一步：轨迹生成（Trajectory Generation）\n\n**输入**：\n- 一个初始技能文档 S0（可以是人类写的，也可以是模型自己生成的草稿）\n- 一个任务集合 Devolve（用于让 agent 学习）\n- 一个 LLM agent（参数固定不更新）\n\n**操作**：\n让这个 agent 在每个任务上执行一遍。执行过程采用 ReAct 模式：agent 产生一段推理（reasoning），然后调用工具（tool call），得到观察结果（observation），如此循环直到任务完成或失败。\n\n**输出**：\n- 一堆轨迹集合 T = {τ1, τ2, ..., τN}\n- 每个轨迹 τi 包含：完整的推理过程、工具调用记录、观察结果\n- 还有一个标记 yi ∈ {0, 1}，表示这个任务做对了还是做错了\n\n**目的**：\n收集 agent 在这些任务上的实际表现数据。有做对的，也有做错的，这些就是后续分析的原材料。\n\n---\n\n### 第二步：并行多代理补丁建议（Parallel Multi-Agent Patch Proposal）\n\n**输入**：\n- 初始技能文档 S0（所有分析代理都基于同一个 S0）\n- 轨迹集合 T，分成两类：T⁻（失败轨迹）和 T⁺（成功轨迹）\n\n**操作**：\n系统同时启动很多个独立的分析子代理，每个子代理只处理一条轨迹。这些子代理分成两种类型：\n\n**（A）错误分析代理（Error Analyst）**：\n- 处理失败轨迹\n- 采用多轮交互的方式（类似 ReAct），可以自己调用工具查看文件、对比正确答案\n- 它的任务是：找出这条轨迹为什么失败，验证自己的诊断是否正确，然后提出一个修改建议（patch）到技能文档中\n- 如果无法找出明确的失败原因，这个轨迹会被丢弃\n\n**（B）成功分析代理（Success Analyst）**：\n- 处理成功轨迹\n- 采用单次调用的方式（不需要多轮交互，因为成功不需要诊断）\n- 它的任务是：识别这条轨迹中哪些行为是有效的、可复用的，提出把这些有效做法加入技能文档的补丁\n\n所有这些子代理是**并行**运行的，彼此之间没有信息交换。每个代理都基于同一个初始技能 S0 来提出修改建议。\n\n**输出**：\n- 一个补丁池 P = {p₁, p₂, ..., pₙ}，每个补丁是对技能文档的修改建议\n\n**目的**：\n从大量轨迹中提取\"本地经验\"——每条轨迹的失败原因或成功做法。但这些经验还是碎片化的，需要下一步整合。\n\n---\n\n### 第三步：冲突消除整合（Conflict-Free Patch Consolidation）\n\n**输入**：\n- 补丁池 P（来自第二步）\n- 初始技能文档 S0\n- 同一个 LLM（和生成轨迹的是同一个）\n\n**操作**：\n这一步把大量碎片化的补丁合并成一个统一的技能更新。采用**分层合并**的方式：\n\n1. 把所有补丁分成若干组（比如每组32个）\n2. 对每组补丁，用 LLM 合并成一个更大的补丁。这个合并过程会：\n   - 去除重复的修改建议\n   - 识别并解决冲突（比如两个补丁要修改同一行）\n   - 保留独特的、有价值的修改\n   - **关键**：如果多个独立的补丁都提出了类似的修改，这会被视为\"普遍模式\"，优先保留（因为这种反复出现的模式更可能是有用的通用知识）\n3. 重复这个过程，直到只剩一个最终补丁 p*\n4. 把这个最终补丁翻译成具体的编辑操作，应用到技能文档上\n\n**输出**：\n- 一个更新后的技能文档 S*，替换原来的 S0\n\n**目的**：\n把大量轨迹级别的\"本地经验\"提炼成少数几条通用的、可迁移的技能指导。通过让 LLM 同时分析所有补丁，它会自然地归纳出普遍规律，而不是记住某一条特定轨迹的细节。\n\n---\n\n## 两种使用模式\n\n这个框架支持两种启动方式：\n\n1. **技能深化（Skill Deepening）**：初始技能是人类专家写的，框架在此基础上改进\n2. **技能从零创建（Skill Creation）**：初始技能是模型自己根据参数知识生成的（通常没什么用），框架通过分析轨迹把它变成真正有用的技能\n\n---\n\n## 关键设计决策\n\n1. **并行分析 vs 顺序更新**：不是等一条轨迹分析完再分析下一条，而是所有轨迹一起分析。这样避免了对早期轨迹的\"过度适应\"。\n\n2. **分层合并做归纳推理**：通过让 LLM 同时看很多补丁，它自然地进行归纳——找出反复出现的模式，这些就是最可能泛化的知识。\n\n3. **错误分析采用多轮交互**：失败诊断比成功识别更难，所以错误分析代理可以自己调用工具、验证假设，而成功分析只需要单次调用。\n\n4. **整个流程使用同一个 LLM**：轨迹生成、补丁建议、补丁合并，都用同一个模型，不需要额外的\"老师模型\"。",
                    "additional_insights": "# 论文中有价值的认知内容\n\n## 1. 实验中的反直觉发现\n\n- **人类写的skill不具有普适性**：Human-Written在122B上提升20pp，但在35B上反而**不如不使用skill**（Vrf: 9.67% vs 19.00% No Skill），说明人类专家写的skill可能对特定模型规模有害。依据：表1中\"Human-Written\"行35B列。\n\n- **小模型author的skill反而更通用**：35B-authored的Creation +Error在122B上获得+57.7pp WikiTQ提升（最大提升），超越122B-authored版本。依据：表1第4列\"Creation +Error\"行。\n\n- **成功分析（+Success）比错误分析（+Error）更不稳定**：+Success产生最大单次增益（+17.6pp）但也是唯一产生负值的条件（-0.9pp），而+Error在所有设置中始终为正。依据：表1的Avg列比较。\n\n- **DocVQA上任务表现与skill写作能力脱节**：35B模型任务表现更好（0.6843 ANLS），但作为author时skill反而**损害性能**（-0.062 ANLS），表明执行能力与反思归纳能力是分离的。依据：表3。\n\n## 2. 有启发性的分析或ablation\n\n- **并行consolidation显著优于顺序更新**：并行方法比Seq-B=1快20倍（3min vs 60min），且Vrf提升+4.0pp。顺序更新因skill drift导致后续分析基于不一致的skill。依据：表4。\n\n- **Distilled skill优于retrieval-based memory**：+Combined比ReasoningBank在122B上Vrf高+13.8pp，原因包括retrieval对表面相似度敏感、retrieved内容与任务上下文竞争注意力、缺乏主动去重和抽象。依据：表5。\n\n- **Agentic error analysis优于单次LLM call**：Agentic方法在所有设置中Avg更高（最高+13.3pp），因为单次调用过度归因parse error（57% vs 14%），且会虚构失败原因。依据：表6。\n\n- **错误分析比成功分析更可靠**：错误分析产生更可迁移的patch，因为成功轨迹本身缺乏诊断空间，而错误轨迹需要因果追溯。依据：§4.3分析。\n\n## 3. 对领域的新认知\n\n- **经验可被蒸馏为可迁移的declarative skills**：挑战了\"经验必须通过retrieval管理\"的假设，证明inductive compression能平滑单次episode的quirks，产生跨模型规模和OOD任务的鲁棒原则。依据：§1讨论及实验结果。\n\n- **skill写作能力与任务执行能力分离**：一个模型在任务上表现好，不代表它能分析自己的失败并归纳出可迁移的skill。依据：§3.4 DocVQA案例。\n\n- **并行patch合并本质是inductive reasoning**：层级合并通过识别跨独立patch的共同模式（prevalent patterns），将experience-specific patches转化为generalizable SOPs。依据：§2.4。\n\n## 4. 实用的经验性结论\n\n- **公式写入后必须运行recalc.py**：这是最常见的失败模式（178/323 patches），openpyxl写入的公式只是字符串，必须通过recalc.py计算才能被data_only=True读取。依据：§4.4第一点。\n\n- **优先使用openpyxl而非pandas.to_excel()**：pandas会静默破坏公式关系和命名范围（177/323 patches），正确流程是pandas处理读/转换逻辑，openpyxl写回。依据：§4.4第二点。\n\n- **写入后必须显式读回验证**：138/323 patches强调此点，错误轨迹典型特征是缺少此检查。依据：§4.4第三点。\n\n- **删除行/列时按降序操作**：防止index-shift损坏，53/323 patches涉及此问题。依据：§4.4第四点。\n\n- **小模型（35B）足以做skill evolution**：使用开源模型即可完成全部pipeline，无需依赖Claude等闭源模型。依据：§3实验设置。\n\n## 5. 局限性中的机会\n\n- **无法量化单个patch的边际贡献**：当前patches被整体合并，难以隔离单个编辑的因果效应。暗示未来可开发patch-level ablation方法。\n\n- **无法追踪skill各部分的效用**：未实现细粒度归因，无法确定agent在推理时依赖skill的哪些部分。暗示可开发inference-time attribution tracking。\n\n- **skill sections的动态修剪**：未来可自动剪除无效或干扰的skill sections，提升skill密度。依据：§6 Limitation。",
                    "summary_translation": "## 中文翻译\n\n为大型语言模型（LLM）代理配备领域特定技能对于处理复杂任务至关重要。然而，手动编写技能存在严重的可扩展性瓶颈。相反，自动技能生成往往产生脆弱或碎片化的结果，因为这要么依赖于浅层的参数知识（parametric knowledge），要么依次过度拟合于不可泛化的轨迹局部经验（trajectory-local lessons）。为克服这一问题，我们提出了Trace2Skill框架，该框架模拟人类专家编写技能的方式：在将经验提炼为单一综合指南之前，先全面分析广泛的执行经验。Trace2Skill并非依次对单个轨迹做出反应，而是调度并行子代理（sub-agents）池来分析多样化的执行集合。它提取轨迹特定的经验，并通过归纳推理（inductive reasoning）将它们分层整合为统一的、无冲突的技能目录（skill directory）。Trace2Skill既支持深化现有人类编写的技能，也支持从零开始创建新技能。在电子表格、视觉问答（VisionQA）和数学推理等具有挑战性的领域的实验表明，Trace2Skill显著优于强基线方法，包括Anthropic官方的xlsx技能。关键的是，这种基于轨迹的演化（trajectory-grounded evolution）不仅仅是记忆任务实例或模型特定特性：演化后的技能可在不同规模的LLM之间迁移，并泛化到分布外（OOD）设置。例如，Qwen3.5-35B基于自身轨迹演化的技能，使Qwen3.5-122B代理在WikiTableQuestions上的绝对性能提升了57.65个百分点。最终，我们的研究结果表明，复杂的代理经验可以被封装为高度可迁移的声明式技能（declarative skills），无需参数更新，无需外部检索模块，且可使用小至35B参数的开源模型。\n\n---\n\n**翻译说明：**\n\n1. **专业术语处理**：保留英文原文并用括号标注中文解释，如\"parametric knowledge（参数知识）\"、\"inductive reasoning（归纳推理）\"等。\n\n2. **逻辑结构**：完整保留了原文的\"问题提出→方法介绍→实验验证→结论\"的学术论文逻辑结构。\n\n3. **语言表达**：使用中文学术写作的惯用表达，如\"为...配备\"、\"处理复杂任务\"、\"可扩展性瓶颈\"、\"泛化到分布外设置\"等。\n\n4. **术语一致性**：全文统一使用\"技能\"对应\"skill\"、\"轨迹\"对应\"trajectory\"、\"代理\"对应\"agent\"等核心概念。"

                    "summary": "The engineering design research community has studied agentic AI systems that use Large Language Model (LLM) agents to automate the engineering design process. However, these systems are prone to some of the same pathologies that plague humans. Just as human designers, LLM design agents can fixate on existing paradigms and fail to explore alternatives when solving design challenges, potentially leading to suboptimal solutions. In this work, we propose (1) a novel Self-Regulation Loop (SRL), in which the Design Agent self-regulates and explicitly monitors its own metacognition, and (2) a novel Co-Regulation Design Agentic Loop (CRDAL), in which a Metacognitive Co-Regulation Agent assists the Design Agent in metacognition to mitigate design fixation, thereby improving system performance for engineering design tasks. In the battery pack design problem examined here, we found that the novel CRDAL system generates designs with better performance, without significantly increasing the computational cost, compared to a plain Ralph Wiggum Loop (RWL) and the metacognitively self-assessing Self-Regulation Loop (SRL). Also, we found that the CRDAL system navigated through the latent design space more effectively than both SRL and RWL. However, the SRL did not generate designs with significantly better performance than RWL, even though it explored a different region of the design space. The proposed system architectures and findings of this work provide practical implications for future development of agentic AI systems for engineering design.",
