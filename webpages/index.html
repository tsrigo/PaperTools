                    "title": "From Coarse to Fine: Self-Adaptive Hierarchical Planning for LLM Agents",
                    "arxiv_id": "2604.23194",
                    "authors": "Haoran Tan, Zeyu Zhang, Chen Ma, Tianze Liu, Quanyu Dai, Xu Chen",
                    "summary": "Large language model-based agents have recently emerged as powerful approaches for solving dynamic and multi-step tasks. Most existing agents employ planning mechanisms to guide long-term actions in dynamic environments. However, current planning approaches face a fundamental limitation that they operate at a fixed granularity level. Specifically, they either provide excessive detail for simple tasks or insufficient detail for complex ones, failing to achieve an optimal balance between simplicity and complexity. Drawing inspiration from the principle of \\textit{progressive refinement} in cognitive science, we propose \\textbf{AdaPlan-H}, a self-adaptive hierarchical planning mechanism that mimics human planning strategies. Our method initiates with a coarse-grained macro plan and progressively refines it based on task complexity. It generates self-adaptive hierarchical plans tailored to the varying difficulty levels of different tasks, which can be optimized by imitation learning and capability enhancement. Experimental results demonstrate that our method significantly improves task execution success rates while mitigating overplanning at the planning level, providing a flexible and efficient solution for multi-step complex decision-making tasks. To contribute to the community, our code and data will be made publicly available at https://github.com/import-myself/AHP.",
                    "category": "cs.AI",
                    "cluster": "Planning and Execution Strategies",
                    "tags": ["cs.AI"],
                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体的规划能力**。论文提出了AdaPlan-H机制，针对现有规划方法的固定粒度局限性，提出从粗到细的自适应分层规划。这直接属于\"构建、改进或演化LLM智能体\"的范畴，而非将LLM作为工具解决特定领域问题。\n\n**第二步：正面指标分析**\n\n论文与我的研究目标高度相关：\n\n1. **核心范式匹配**：明确涉及 `Agentic AI` 和 `LLM-based Agents`，提出\"self-adaptive hierarchical planning\"机制\n\n2. **智能体能力**：直接聚焦于智能体的 `Planning`（规划）能力，这是单智能体（Agentic）的核心能力之一。论文解决了规划中的粒度自适应问题——对简单任务避免过度规划，对复杂任务提供足够细节\n\n3. **演化机制**：虽然不是完全的\"自我演化\"（Self-Evolving），但引入了\"progressive refinement\"（渐进式细化）思想，通过模仿学习和能力增强来优化规划能力，体现了智能体能力的迭代提升\n\n**第三步：排除标准检查**\n\n- 安全相关：无涉及\n- 多模态与视觉：无涉及  \n- 图相关技术：无涉及\n- 多智能体拓扑与编排：无涉及（这是单智能体的规划问题）\n\n**第四步：特殊情况的处理**\n\n这不属于\"LLM应用\"范畴——论文不是将智能体用于生物、医疗、金融等领域，而是**从根本上改进智能体本身的规划机制**。\n\n**结论**\n\n论文的核心贡献是提出一种新的LLM智能体规划方法（AdaPlan-H），通过自适应的分层规划来平衡任务复杂性与规划粒度，从而提升智能体在多步骤决策任务中的表现。这完全符合我的研究焦点——**单智能体（Agentic）的规划能力构建与改进**。因此，该论文符合研究范围，应予以保留。",
                    "intro_logic": "1. 背景：基于大语言模型（LLM）的智能体（agents）已成为解决动态、多步骤任务的有力方法。\n2. 现状：大多数现有智能体采用规划（planning）机制来在动态环境中指导长期行动。\n3. 问题：然而，当前的规划方法存在一个根本性局限，即它们在固定粒度（fixed granularity）级别上操作。\n4. 问题具体化：这导致它们要么为简单任务提供过多细节，要么为复杂任务提供不足的细节，无法在简单性与复杂性之间取得最佳平衡。\n5. 启示与目标：受认知科学中渐进细化（progressive refinement）原则的启发，人类规划策略通常从粗粒度宏观目标开始，并逐步细化。因此，研究目标是开发一种方法，以根据任务自适应地生成具有合适粒度（proper granularity）的规划。\n6. 研究问题：如何为基于LLM的智能体设计一种自适应的分层规划机制，使其能够根据不同的任务复杂度动态调整规划的粒度？",
                    "core_insight": "下面的回答把“论文真正的灵光一闪”与“背景问题”区分开来：背景问题是 fixed-granularity planning 不够好；真正的 seed insight 是：**规划的粒度本身应该成为模型自适应选择的对象，而不是预先固定的超参数**。\n\n---\n\n## 1. 关键洞察：The Seed Insight\n\n### 一句话概括\n\n**作者的核心洞察是：LLM agent 的 plan 不应该被生成为单一固定粒度的文本，而应该像人类 planning 一样，从 coarse-grained macro plan 出发，根据任务复杂度逐步 refinement，并在“足够完成任务”的最粗层级停止。**\n\n换句话说，这篇论文真正的突破不是“给 agent 加 plan”，也不是“把任务分解成 subgoals”，而是意识到：**plan 的详细程度本身是一个需要自适应优化的变量**。\n\n---\n\n### 展开解释\n\n以往很多 agent planning 方法默认 plan 有一个固定粒度：要么总是给一个高层计划，要么总是展开成很细的步骤。作者指出，这会产生一个根本矛盾：\n\n- 简单任务不需要太细的 plan，细 plan 会造成 overplanning；\n- 复杂任务只给粗 plan 又不够，actor 执行时缺乏足够指导。\n\n论文原文明确指出这一点：\n\n> “However, although explicit planning can improve the consistency of agents’ actions, most existing methods directly generate plans at a fixed granularity.”\n\n以及：\n\n> “These single-level methods fail to address the need for less detail in simple tasks and full expansion in complex tasks.”\n\n这句话其实就是整个方法的出发点：**不同任务需要不同 planning granularity**。\n\n作者进一步把这个问题和 cognitive science 中的 progressive refinement 联系起来：\n\n> “In cognitive science, researchers find that natural human planning typically starts with formulating a high-level coarse macro goal, which can be gradually refined into more specific plans until concrete steps are determined.”\n\n这就是 seed insight 的关键来源：人类不是一开始就把所有细节写满，而是先有一个 macro goal，然后视任务复杂度逐步展开。\n\n论文也直接给出了目标表述：\n\n> “Therefore, our target is to adaptively generate plans with proper granularity based on different tasks.”\n\n以及方法层面的核心定义：\n\n> “In our work, m is a self-adaptive variable that changes according to the task complexity and difficulty.”\n\n这里的 `m` 是 hierarchical plan 的层数。也就是说，作者把“plan 到底展开几层”从一个人工设定的固定值，变成了 planner 需要学习和预测的变量。\n\n---\n\n### 更精确地说，别人没意识到什么？\n\n很多已有方法已经意识到 agent 需要 planning，也有人做 task decomposition。但作者认为这些方法通常有两个问题：\n\n1. **把 planning granularity 固定住了**；\n2. **把 decomposition 当作执行中的 trial-and-error，而不是作为一个显式、可学习、可优化的 hierarchical plan generation 问题**。\n\n论文在 Related Work 中对此有比较清晰的定位：\n\n> “In contrast to prior methods that employ LLMs as single-level planners (Xiong et al., 2025), AdaPlan-H transforms the planner’s output from single-level to hierarchical.”\n\n并且：\n\n> “Unlike decomposition-based hierarchies (Prasad et al., 2023), AdaPlan-H avoids trial-and-error and provides explicit guidance, yielding clearer inheritance relationships between steps across levels.”\n\n所以，这篇论文的“灵光一闪”可以更尖锐地表述为：\n\n> **planning 的关键不是越详细越好，而是找到“刚好足够”的层级；这个层级应当由任务复杂度和环境反馈共同决定。**\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个洞察直接导向 AdaPlan-H 的方法设计。中间的推理链条大致如下。\n\n---\n\n### Step 1：如果任务难度不同，那么 plan granularity 应该不同\n\n作者首先观察到 fixed-level planning 有天然缺陷：\n\n> “too coarse planning granularity can lead to insufficient effectiveness, while too fine granularity will reduce the agent’s task completion efficiency.”\n\n这句话形成了第一个推理：\n\n- coarse plan：省 token、省 planning 成本，但可能指导不足；\n- fine plan：指导更充分，但可能冗余、低效，甚至干扰执行；\n- 因此最优 plan 不是固定的，而是 task-dependent。\n\n---\n\n### Step 2：如果 plan granularity 是 task-dependent，就需要 hierarchical representation\n\n为了让 plan 能从粗到细变化，作者不是让 planner 直接输出一个最终 plan，而是设计成多层结构：\n\n> “Unlike previous methods where the planner directly generates a final plan p, our hierarchical planning first generates the highest-level plan based on the instruction. Then, it generates the i-th level plan based on the task instruction and previous planning levels.”\n\n这一步非常关键。它把 planning 从：\n\n> 直接生成一个 plan\n\n变成：\n\n> 生成 level 1 plan → 基于 level 1 生成 level 2 plan → 基于前面层级生成 level 3 plan ...\n\n也就是 coarse-to-fine generation。\n\n论文强调每一层其实都是一个完整 plan，只是 detail level 不同：\n\n> “each level of the hierarchical plan corresponds to a complete plan for accomplishing the task, with the key difference being the level of detail.”\n\n这说明 AdaPlan-H 不是简单把 plan 拆成 subtask list，而是生成一组具有 inheritance relationship 的完整 plans。\n\n---\n\n### Step 3：如果每个任务需要不同层数，那么层数 `m` 必须自适应\n\n作者将最终 plan 表示为多个层级的拼接，而层数 `m` 是变量：\n\n> “where m represents the number of levels in the hierarchical plan and ⊕ indicates concatenation. In our work, m is a self-adaptive variable that changes according to the task complexity and difficulty.”\n\n这一步把 seed insight 形式化了。\n\n也就是说，AdaPlan-H 的输出不是固定为：\n\n```text\n<plan>\n...\n</plan>\n```\n\n而是：\n\n```text\n<plan 1>\ncoarse plan\n</plan 1>\n\n<plan 2>\nmore detailed plan\n</plan 2>\n\n...\n\n<plan m>\nmost detailed plan needed for this task\n</plan m>\n```\n\n其中 `m` 可能是 1、2、3，取决于任务复杂度。\n\n---\n\n### Step 4：但没有 ground truth 层数，所以要用 environment feedback 选择最优层级\n\n这里出现第一个关键技术问题：训练数据通常只有成功轨迹，没有“最佳 plan 层数”标签。\n\n论文写道：\n\n> “existing datasets often only provide correct trajectories for completing tasks, which can be used for implicit plan training but are not suitable for training explicit guidance.”\n\n并且：\n\n> “It is important to note that we cannot directly obtain the optimal number of hierarchical levels for each task.”\n\n所以作者采用了一个间接方案：\n\n1. 用 GPT-4o 和正确轨迹为每个 task 生成最多 `M` 层的 hierarchical plan；\n2. 把一个 3-level plan 截断成多个候选：\n   - 只用 level 1；\n   - 用 level 1 + level 2；\n   - 用 level 1 + level 2 + level 3；\n3. 对每个候选 plan，让 actor 多次 rollout；\n4. 用平均 reward 评估该 plan 的效果；\n5. 选择 reward 高且层级尽可能低的 plan 作为 supervision。\n\n论文描述为：\n\n> “These hierarchical plans are then inserted into the agent’s prompt respectively, and the agent performs the corresponding task K times for each hierarchical plan.”\n\n然后：\n\n> “By comparing the average rewards, we can select the best plan pbest with the highest average reward and the lowest level.”\n\n这里的“highest average reward and lowest level”非常重要，它体现了 AdaPlan-H 的核心价值观：**不是一味追求更细，而是在保证 performance 的情况下选择更浅层级，避免 overplanning。**\n\n---\n\n### Step 5：先用 SFT 学会自适应生成，再用 DPO 提升层级准确性和 plan quality\n\n作者没有只做 prompting，而是设计了两阶段训练。\n\n#### 第一阶段：Imitation Learning / SFT\n\n用 Monte Carlo 选出来的 best hierarchical plan 作为监督信号，让 planner 初步学会：\n\n- 对简单任务输出少层 plan；\n- 对复杂任务输出多层 plan；\n- 每一层之间有 progressive refinement 关系。\n\n论文写道：\n\n> “This selected best plan is then used as the supervised output for the corresponding task instruction, and the chosen number of best level m serves as the hierarchical supervision signal.”\n\n这一步把 environment-based selection 转化成 SFT 数据。\n\n#### 第二阶段：Capability Enhancement / DPO\n\nSFT 后模型有了基本能力，但还需要进一步优化两个维度：\n\n1. **level accuracy**：层数是否合适；\n2. **plan quality**：同样层数下，plan 内容是否更有效。\n\n论文明确说：\n\n> “we aim to further enhance the planner’s ability in both the accuracy of hierarchical planning levels and the quality of the generated plans.”\n\n因此作者构造了两类 preference data：\n\n- intra-dataset：强调 level preference；\n- inter-dataset：强调 plan quality preference。\n\n这对应两个子目标：\n\n| Preference 类型 | 优化目标 |\n|---|---|\n| intra preference | 学会输出正确层级 |\n| inter preference | 在同样层级下生成更高质量 plan |\n\n最后用 DPO 训练 planner，使 chosen plan 相对 rejected plan 概率更高。\n\n---\n\n## 3. 试错历程：困难、调整与新子问题\n\n论文没有以“我们先尝试了 A，失败后改成 B”的叙事方式详细记录实验试错过程。因此，不能虚构作者真实经历。但从 Method、Ablation、Limitations 中可以清楚看出：这个想法在落地时产生了多个意料之外或至少非平凡的技术困难，作者也做了相应调整。\n\n---\n\n### 困难 1：没有“最佳 plan 层数”的标签\n\n这是 AdaPlan-H 落地遇到的第一个核心困难。\n\n作者希望训练模型根据任务难度输出 1、2 或 3 层 plan。但现有数据集通常只给 successful trajectories，没有告诉你这个 task 应该用几层 plan。\n\n论文明确指出：\n\n> “Existing datasets do not provide labels for the best level of hierarchical plan.”\n\n更进一步，作者认为任务难度本身很主观，因此不能简单依靠人工或 LLM annotation：\n\n> “Besides, the difficulty of tasks is subjective, making it difficult to construct supervised signals for hierarchies through manual or LLM-based annotation.”\n\n#### 调整方案\n\n作者没有直接让 GPT-4o 判断“这个任务是 easy / medium / hard”，而是使用 Monte Carlo rollout 评估不同层级 plan 的实际效果。\n\n具体来说：\n\n- 先生成最大层数 `M=3` 的 hierarchical plans；\n- 将每个 plan 截断成 1-level、2-level、3-level 版本；\n- 放入 agent prompt 中执行；\n- 根据环境 reward 选择最优层数。\n\n这是一种从“主观难度判断”转向“环境反馈选择”的调整。\n\n这个调整非常重要，因为它避免了直接问 LLM：“这个任务难不难？”而是问环境：“这个层级的 plan 能不能让 agent 完成任务？”\n\n---\n\n### 困难 2：如何避免“越细越好”的误导\n\n直觉上，更详细的 plan 可能带来更高 reward。但如果总是选最详细的 plan，AdaPlan-H 就退化成 fixed-level 3 planning，失去 adaptive 的意义。\n\n因此作者的 selection criterion 不是单纯最高 reward，而是：\n\n> “the best plan pbest with the highest average reward and the lowest level.”\n\n也就是在效果相近或满足要求时，偏向选择更低层级。\n\n#### 新子问题\n\n这产生了一个新的优化目标：\n\n> plan 不仅要有效，还要不过度展开。\n\n这也是 AdaPlan-H 区别于普通 hierarchical planning 的关键：它不是单纯追求 more detailed decomposition，而是追求 proper granularity。\n\n实验 4.4 也说明了固定层级并非总是越深越好。论文写道：\n\n> “as the number of levels increases, the task completion accuracy tends to improve. However, an excessive number of levels could lead to a decline in performance.”\n\n这说明作者在实验上验证了：overplanning 真实存在，因此 adaptive level selection 是必要的。\n\n---\n\n### 困难 3：DPO 对长度敏感，可能破坏 level preference 学习\n\nAdaPlan-H 的层级选择天然和文本长度相关：\n\n- 1-level plan 通常短；\n- 3-level plan 通常长。\n\n但 DPO 本身对 sequence length 敏感，可能导致模型偏向生成更长文本，而不是学到真正的 preference。\n\n论文明确指出：\n\n> “DPO optimizes the model by increasing the likelihood of selected plans relative to rejected ones. However, it is sensitive to sequence length.”\n\n并进一步说：\n\n> “Even with balanced data distributions, its sensitivity to length can cause the model to output longer sequences.”\n\n这对 AdaPlan-H 是一个很严重的问题，因为如果 DPO 倾向于长输出，模型就可能总是生成更多层 plan，从而违背“自适应层级”的目标。\n\n#### 调整方案\n\n作者在 DPO loss 中加入 SFT loss term：\n\n> “To address this, we modify the DPO loss by adding an SFT loss term.”\n\n这是一种稳定训练的策略：DPO 负责 preference optimization，SFT loss 负责约束模型不要因为长度偏置而偏离监督格式和目标分布。\n\n---\n\n### 困难 4：构造 level preference pair 时，shared prefix 会影响 DPO 学习\n\nhierarchical plans 有一个特殊结构：不同层级之间共享前缀。例如 level-2 plan 包含 level-1 plan，level-3 plan 包含 level-1 和 level-2。\n\n但在 DPO 训练时，如果 chosen 和 rejected 大量共享 prefix，loss 可能不作用在真正区分层级的部分。论文提到：\n\n> “Since we plan to use Direct Preference Optimization (DPO), the shared prefix tokens are excluded from the loss computation (Pal et al., 2024), we must choose hierarchical plans extracted from different plans generated before.”\n\n#### 调整方案\n\n作者在构造 intra-dataset 时，不直接从同一个 GPT-4o 生成的 hierarchical plan 中截取 chosen/rejected，而是要求它们来自不同的 generated plans，即使用不同的 `n`。\n\n这是一个比较细节但很关键的工程/算法调整。否则 DPO 可能无法有效学习“为什么这个层级更好”。\n\n---\n\n### 困难 5：planner 训练时用的 actor 和测试时的 actor 不一致，会引入 bias\n\nAdaPlan-H 的最优层级和 plan quality 是通过 rollout actor 评估出来的。但不同 actor 对 plan 的依赖程度不同，理解能力也不同。因此，用 Llama-3.1-8B 评估出的最佳 plan，不一定最适合 Qwen、GLM 或 GPT-4o-mini。\n\n论文在 Main Results 后分析了这个问题：\n\n> “This gap may be due to a bias in our training process: in the first stage, we use Llama-3.1-8B as the actor for the optimal level of hierarchical plan selection, and in the second stage, the same model is also used for plan quality evaluation.”\n\n并且：\n\n> “The optimal value of levels and the most effective plan for Llama-3.1-8B may not necessarily apply to other actor models.”\n\n在 Limitations 中也再次承认：\n\n> “performance gains from planner-generated plans are more pronounced when the actor during exploration matches the one used in testing.”\n\n#### 调整方案 / 后续发现\n\n作者在 Section 4.5 做了不同 planner/actor backbone 的实验，并发现当 Monte Carlo 评估 actor 与测试 actor 一致时，效果更好：\n\n> “This suggests that we should strive to maintain consistency between the actor used in the actual test and the actor in the Monte Carlo method.”\n\n这说明 AdaPlan-H 不是完全 actor-agnostic 的。它的 training signal 与 actor behavior 绑定较强，这是一个后续需要解决的问题。\n\n---\n\n### 困难 6：是否只保留最细层 plan？还是保留完整 hierarchy？\n\n另一个自然问题是：如果 level-3 已经最详细了，那 prompt 中是否只需要最后一层？保留 level-1 和 level-2 会不会浪费 token？\n\n作者专门做了实验比较：\n\n- Last-level：只使用最后一层 plan；\n- Hierarchical：保留完整 hierarchical structure。\n\n结果发现，完整 hierarchy 更好。论文解释说：\n\n> “maintaining the full hierarchical structure significantly improved task accuracy over only using the last level.”\n\n并给出原因：\n\n> “the high-level plan in the hierarchical plan could maintain a broad alignment with the overall goal, while the low-level plan provides more detailed guidance.”\n\n#### 新子问题\n\n这说明 hierarchical plan 的价值不只是“最后得到一个详细 plan”，而是多层级共同提供 guidance：\n\n- high-level plan：保持 global alignment；\n- low-level plan：提供 local operational guidance。\n\n因此 AdaPlan-H 最终选择在 prompt 中保留完整层级，而不是只保留最细 plan。\n\n---\n\n## 总结\n\n这篇论文的 seed insight 可以概括为：\n\n> **agent planning 的核心不是生成一个固定粒度的 plan，而是学习何时停止 refinement：简单任务用 coarse plan，复杂任务逐步展开，最终形成 task-adaptive hierarchical plan。**\n\n这个洞察直接导向了 AdaPlan-H 的完整方法：\n\n1. 用 progressive refinement 表示 hierarchical plans；\n2. 把 plan 层数 `m` 设为 self-adaptive variable；\n3. 用 Monte Carlo rollout 从环境反馈中选择“最高 reward 且最低层级”的 best plan；\n4. 用 SFT 初始化 self-adaptive hierarchical planning 能力；\n5. 用 DPO 分别优化 level preference 和 plan quality；\n6. 通过保留完整 hierarchy，在 prompt 中同时提供 global guidance 和 detailed guidance。\n\n它在实现中遇到的主要困难包括：\n\n- 没有最佳层级标签；\n- 任务难度主观；\n- DPO 对长度敏感；\n- hierarchical prefix 会影响 preference learning；\n- plan evaluation actor 和 test actor 不一致会产生 bias；\n- 是否保留完整 hierarchy 需要实验验证。\n\n这些困难也反过来塑造了 AdaPlan-H 的最终形态。",
                    "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的区别是：**以前的 planner 一次性生成固定粗细的计划，而 AdaPlan-H 会先生成粗计划，再根据任务难度自动决定要不要继续生成更细的计划。**\n\n---\n\n# 这篇论文到底在做什么？\n\n它做的是一个 **LLM agent 的规划器**。\n\n一个 agent 通常有两个部分：\n\n1. **planner**：先给任务写一个计划。\n2. **actor**：根据计划一步一步和环境交互，执行动作。\n\n以前的问题是：planner 生成的计划粗细是固定的。\n\n- 简单任务也写很多细节，会浪费 token，也可能干扰执行。\n- 复杂任务只写很粗的计划，actor 不知道具体怎么做，容易失败。\n\nAdaPlan-H 的目标是：\n\n> 对简单任务只生成少量层级的计划；对复杂任务生成更多层级、更细的计划。\n\n例如：\n\n- 1 层计划：只给大方向。\n- 2 层计划：在大方向下补一些细节。\n- 3 层计划：更细地拆步骤，但仍然是计划，不是完整动作轨迹。\n\n---\n\n# 方法整体流程\n\nAdaPlan-H 分成两个大阶段：\n\n1. **训练阶段**：让 planner 学会“该生成几层计划”和“计划内容怎么写”。\n2. **使用阶段**：给一个新任务，planner 自动生成合适层数的计划，actor 按计划执行。\n\n下面按照实际执行顺序讲。\n\n---\n\n# 第一阶段：先构造训练数据，让模型学会生成自适应层级计划\n\n## 第一步：用 GPT-4o 生成固定 3 层计划候选\n\n### 输入\n\n系统拿到：\n\n- 一个任务指令，比如“找到苹果并放到边桌上”；\n- 这个任务的一条正确完成轨迹，也就是以前有人或模型成功完成任务时的动作序列；\n- 一个大模型 GPT-4o。\n\n### 操作\n\n作者让 GPT-4o 根据任务和正确轨迹，生成多个 3 层计划。\n\n论文中设置：\n\n- 每个任务生成 `N = 5` 个候选计划；\n- 每个候选计划都有最多 `M = 3` 层。\n\n也就是说，一个任务会得到类似：\n\n- 候选计划 1：plan 1 / plan 2 / plan 3\n- 候选计划 2：plan 1 / plan 2 / plan 3\n- ...\n- 候选计划 5：plan 1 / plan 2 / plan 3\n\n每个 plan 的层级越高，内容越细。\n\n### 输出\n\n每个任务得到 5 个三层计划候选。\n\n总共可以拆成：\n\n- 5 个 1 层计划；\n- 5 个 2 层计划；\n- 5 个 3 层计划。\n\n也就是每个任务有 `5 × 3 = 15` 个计划版本。\n\n### 目的\n\n训练 planner 需要“标准答案”，但原始数据集只有成功轨迹，没有告诉模型：\n\n- 这个任务应该写几层计划；\n- 哪个计划更适合 actor 执行。\n\n所以作者先用 GPT-4o 生成一批候选计划，作为后面筛选的原材料。\n\n### 如果不做会怎样\n\n如果不先生成候选计划，就没有可选的训练标签，planner 无法学习不同层级的计划长什么样。\n\n---\n\n## 第二步：用环境执行结果选择最合适的计划层数\n\n### 输入\n\n系统拿到：\n\n- 上一步生成的 15 个计划版本；\n- 一个 actor 模型，论文主要用 Llama-3.1-8B-Instruct；\n- 环境，比如 ALFWorld 或 ScienceWorld；\n- 环境返回的 reward，也就是任务完成得好不好。\n\n### 操作\n\n作者把每个计划都塞进 actor 的 prompt 里，让 actor 根据这个计划去执行任务。\n\n对每个计划，actor 会执行多次，论文里称为 Monte Carlo 方法。\n\n这里的 Monte Carlo 方法就是：\n\n> 同一个计划跑多次任务，然后取平均 reward，看看这个计划实际帮助 actor 的效果怎么样。\n\n具体操作是：\n\n1. 对某个任务，拿到一个计划版本。\n2. 让 actor 按这个计划执行任务。\n3. 环境给 reward。\n4. 重复执行 `K` 次。\n5. 算平均 reward。\n6. 对所有候选计划都这样做。\n7. 选择平均 reward 最高的计划。\n8. 如果多个计划 reward 接近或一样，优先选择层数更少的那个。\n\n### 输出\n\n每个任务得到一个“最佳计划”：\n\n- 它包含最合适的层数，比如 1 层、2 层或 3 层；\n- 它也包含对应的计划内容。\n\n例如：\n\n```text\n任务 A → 最佳计划是 1 层\n任务 B → 最佳计划是 2 层\n任务 C → 最佳计划是 3 层\n```\n\n### 目的\n\n这一步解决的是最核心的问题：\n\n> 没有人知道一个任务到底需要几层计划，所以直接让环境执行效果来决定。\n\n这比人工标注“简单 / 中等 / 困难”更直接，因为最终目标不是分类任务难度，而是让 agent 完成任务。\n\n### 如果不做会怎样\n\n如果不做这一步，模型只能学到“生成 3 层计划”，但学不到什么时候该少写、什么时候该多写。\n\n---\n\n## 第三步：用筛出来的最佳计划做 SFT 初始化\n\n### 输入\n\n系统拿到：\n\n- 任务指令；\n- 第二步选出的最佳计划；\n- 最佳计划的层数。\n\nSFT，即 supervised fine-tuning，意思是：\n\n> 用“输入—标准输出”样本去微调模型，让模型模仿标准答案。\n\n### 操作\n\n作者用这些样本训练 planner。\n\n训练格式大致是：\n\n```text\n输入：任务指令\n输出：对应的最佳层级计划\n```\n\n模型需要学会：\n\n1. 看任务；\n2. 判断该生成几层计划；\n3. 写出对应层数的计划。\n\n### 输出\n\n得到一个初步训练好的 planner。\n\n它已经具备基本能力：\n\n- 对简单任务生成较少层级；\n- 对复杂任务生成较多层级；\n- 生成层级计划内容。\n\n### 目的\n\n这一步是让 planner 先具备基本的“自适应层级计划生成能力”。\n\n如果直接做偏好优化，模型还不知道计划格式和层级关系，训练会不稳定。\n\n### 如果不做会怎样\n\n消融实验显示，不做 SFT 影响很大：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o sft | 0.2553 | 0.4825 |\n\n尤其在 ALFWorld 上，从 0.5429 掉到 0.2553，下降非常明显。\n\n---\n\n# 第二阶段：继续优化 planner，让它层数更准、计划质量更高\n\nSFT 之后，模型能生成计划，但还不够好。\n\n主要还有两个问题：\n\n1. 它可能层数判断不准；\n2. 它可能层数对了，但计划内容质量不好。\n\n所以作者又构造两类偏好数据，用 DPO 继续训练。\n\nDPO，即 Direct Preference Optimization，意思是：\n\n> 给模型一个“好答案”和一个“差答案”，训练模型更倾向于输出好答案。\n\n---\n\n## 第四步：构造“层数偏好数据”\n\n论文里叫 intra-dataset。\n\n### 输入\n\n系统拿到：\n\n- 第一阶段中每个任务的候选计划；\n- 第二步选出来的最佳层数和最佳计划。\n\n### 操作\n\n对同一个任务，作者构造这样的偏好对：\n\n```text\nchosen：最佳层数的计划\nrejected：非最佳层数的计划\n```\n\n例如，一个任务最佳是 2 层，那么：\n\n```text\nchosen：2 层计划\nrejected：1 层计划或 3 层计划\n```\n\n这样模型就能学到：\n\n- 这个任务写 2 层更好；\n- 写 1 层可能太粗；\n- 写 3 层可能太细或干扰执行。\n\n### 输出\n\n得到一批“哪个层数更好”的偏好训练样本。\n\n### 目的\n\n这一步专门训练 planner 判断计划层数。\n\n它直接对应 Introduction 里的痛点：\n\n> 固定粒度计划不能同时适应简单任务和复杂任务。\n\n### 如果不做会怎样\n\n消融实验显示，不做层数偏好数据会明显下降：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o dpo_intra | 0.4863 | 0.4762 |\n\n尤其在 ScienceWorld 上，从 0.5876 掉到 0.4762，说明层数判断对科学实验任务很重要。\n\n---\n\n## 第五步：构造“计划质量偏好数据”\n\n论文里叫 inter-dataset。\n\n### 输入\n\n系统拿到：\n\n- SFT 后的 planner；\n- 一个任务；\n- 该任务大致应该生成的层数；\n- actor 和环境 reward。\n\n### 操作\n\n作者让 SFT 后的 planner 为同一个任务生成多个计划。\n\n然后只保留层数相同的计划，比如都保留 2 层计划。\n\n接着：\n\n1. 把每个计划交给 actor 执行；\n2. 在环境中跑多次；\n3. 计算平均 reward；\n4. reward 高的计划作为 chosen；\n5. reward 低的计划作为 rejected。\n\n这一步比较的是：\n\n> 在层数相同的情况下，哪个计划内容更有用。\n\n### 输出\n\n得到一批“计划内容好坏”的偏好训练样本。\n\n### 目的\n\n层数对不代表计划内容一定好。\n\n例如两个都是 2 层计划：\n\n- 一个计划说清楚了关键物品和地点；\n- 另一个计划很泛泛。\n\n它们层数一样，但执行效果不同。\n\n所以这一步用环境 reward 继续筛计划质量。\n\n### 如果不做会怎样\n\n消融实验显示，不做计划质量偏好数据也会下降：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o dpo_inter | 0.4610 | 0.5529 |\n\n在 ALFWorld 上下降较明显，从 0.5429 掉到 0.4610。\n\n---\n\n## 第六步：用 DPO 训练 planner，同时加一个 SFT loss\n\n### 输入\n\n系统拿到两类偏好数据：\n\n1. 层数偏好数据；\n2. 计划质量偏好数据。\n\n每条数据都是：\n\n```text\n任务\nchosen plan\nrejected plan\n```\n\n### 操作\n\n作者用 DPO 训练 planner，让模型更倾向于输出 chosen plan，而不是 rejected plan。\n\n但是这里有一个额外问题：\n\nDPO 对输出长度比较敏感。\n\n如果直接用 DPO，模型可能因为长度差异而偏向更长的计划。\n\n这会和本文目标冲突，因为本文不是想让计划越长越好，而是想让计划层数合适。\n\n所以作者在 DPO loss 之外又加了一个 SFT loss。\n\n也就是训练目标变成：\n\n```text\nDPO loss + γ × SFT loss\n```\n\n论文中 γ 设为 1。\n\n### 输出\n\n得到最终的 AdaPlan-H planner。\n\n它能：\n\n- 根据任务自动生成 1 到 3 层计划；\n- 尽量选择合适层数；\n- 生成执行效果更好的计划内容。\n\n### 目的\n\n这一步把两个目标一起优化：\n\n1. 层数要合适；\n2. 内容要有用。\n\n加 SFT loss 是为了减少 DPO 的长度偏差问题。\n\n### 如果不做会怎样\n\n如果不做整个 DPO 阶段，只做 SFT，性能会下降：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o dpo | 0.4881 | 0.5103 |\n\n说明 SFT 已经有用，但 DPO 进一步提升了效果。\n\n---\n\n# 使用阶段：给新任务生成计划并执行\n\n## 第七步：planner 根据任务生成自适应层级计划\n\n### 输入\n\n系统拿到一个新任务。\n\n例如：\n\n```text\nYour task is to use chemistry to create green paint.\n```\n\n### 操作\n\nAdaPlan-H planner 读取任务，然后直接生成若干层计划。\n\n它不会固定生成 3 层，而是自己决定输出：\n\n- 1 层；\n- 2 层；\n- 或 3 层。\n\n### 输出\n\n例如可能输出：\n\n```text\n<plan 1>\nStep 1: Teleport to the art studio.\nStep 2: Find blue and yellow paint.\nStep 3: Mix them to create green paint.\nStep 4: Focus on the green paint.\n</plan 1>\n\n<plan 2>\n...\n</plan 2>\n```\n\n### 目的\n\n让计划的细节量和任务难度匹配。\n\n### 如果不做会怎样\n\n如果固定生成某一层，就会出现：\n\n- 简单任务写太多；\n- 复杂任务写太少；\n- 不同数据集、不同任务上最优层数不一致。\n\n论文的固定层数实验也说明，没有一个固定层数始终最好。\n\n---\n\n## 第八步：actor 接收完整层级计划并执行任务\n\n### 输入\n\nactor 拿到：\n\n- 任务指令；\n- planner 生成的完整层级计划；\n- 当前环境观察。\n\n### 操作\n\nactor 根据计划一步步输出动作，与环境交互。\n\n例如在 ScienceWorld 中输出：\n\n```text\nteleport to art studio\nlook around\npour blue paint into cup\npour yellow paint into cup\nmix cup\nfocus on green paint\n```\n\n### 输出\n\n环境返回最终 reward：\n\n- ALFWorld 是是否成功；\n- ScienceWorld 是 0 到 1 的分数。\n\n### 目的\n\n计划不是最终结果，它的作用是帮助 actor 更稳定地完成任务。\n\n### 如果不做会怎样\n\n没有计划时，actor 只靠自己当前上下文决策，容易在长任务中遗漏步骤或顺序错误。\n\n主实验也显示，AdaPlan-H 通常比无计划或普通计划方法更好。\n\n---\n\n# 为什么要保留完整层级，而不是只保留最后一层？\n\n论文还做了一个实验：\n\n- **Hierarchical**：把完整层级计划都给 actor；\n- **Last-level**：只给最细的最后一层计划。\n\n结果如下：\n\n| 方法 | ALF(S) | ALF(U/S) | SCI(S) | SCI(U/S) |\n|---|---:|---:|---:|---:|\n| Last-level | 0.5571 | 0.5448 | 0.5454 | 0.5136 |\n| Hierarchical | 0.5425 | 0.5896 | 0.5876 | 0.5531 |\n\n可以看到：\n\n- 在 ALFWorld Seen 上，只看最后一层略高；\n- 但在 ALFWorld Unseen、ScienceWorld Seen、ScienceWorld Unseen 上，完整层级更好。\n\n这说明：\n\n> 最细计划有用，但高层计划也有用，因为它能保留整体任务目标和主要步骤。\n\n---\n\n# 结合消融实验：这套方法为什么有效？\n\n## 1. 哪个组件贡献最大？\n\n从平均下降幅度看，**SFT 初始化贡献最大**。\n\n消融结果：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o sft | 0.2553 | 0.4825 |\n\n下降幅度：\n\n- ALFWorld：下降 0.2876；\n- ScienceWorld：下降 0.1051。\n\n平均下降最大。\n\n这说明：\n\n> 先用筛选出的最佳层级计划训练模型，是整个方法的基础。\n\n如果模型一开始连计划格式、层级数量、任务到计划的映射都没学会，后面的偏好优化效果会很差。\n\n---\n\n## 2. 哪个组件可有可无？\n\n没有明显可有可无的组件。\n\n不过如果只看下降幅度，去掉 **计划质量偏好数据 dpo_inter** 的影响相对小一些：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n| w/o dpo_inter | 0.4610 | 0.5529 |\n\n下降：\n\n- ALFWorld：0.0819；\n- ScienceWorld：0.0347。\n\nScienceWorld 上下降不大，但 ALFWorld 上仍然明显。\n\n所以不能说它没用，只能说：\n\n> 相比 SFT 和层数偏好，计划质量偏好在某些任务上的边际收益更小。\n\n---\n\n## 3. 各组件之间是否有协同效应？\n\n有。\n\n最明显的是：\n\n### SFT 单独使用还不够\n\n只做 SFT，不做 DPO：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| w/o dpo | 0.4881 | 0.5103 |\n| AdaPlan-H | 0.5429 | 0.5876 |\n\n加入 DPO 后：\n\n- ALFWorld 提升 0.0548；\n- ScienceWorld 提升 0.0773。\n\n说明：\n\n> SFT 让模型先会生成自适应层级计划，DPO 再让模型更偏向实际执行效果好的计划。\n\n### 两类 DPO 数据也互补\n\n去掉层数偏好：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| w/o dpo_intra | 0.4863 | 0.4762 |\n\n去掉质量偏好：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| w/o dpo_inter | 0.4610 | 0.5529 |\n\n完整方法：\n\n| 方法 | ALFWorld Seen | ScienceWorld Seen |\n|---|---:|---:|\n| AdaPlan-H | 0.5429 | 0.5876 |\n\n这说明：\n\n- 层数偏好负责“生成几层”；\n- 质量偏好负责“计划写得好不好”；\n- 两个都保留时效果最好。\n\n---\n\n## 4. 回扣论文最初的问题：到底哪个设计解决了固定粒度的问题？\n\n论文最初的问题是：\n\n> 固定粒度计划无法同时适应简单任务和复杂任务。\n\n对应解决方案是：\n\n1. **候选计划生成**：先准备 1/2/3 层不同细度的计划。\n2. **Monte Carlo 选择最佳层数**：用环境 reward 判断每个任务需要几层。\n3. **SFT**：让 planner 学会从任务直接生成合适层数的计划。\n4. **层数偏好 DPO**：进一步纠正“层数选错”的问题。\n5. **质量偏好 DPO**：在层数正确的基础上提升计划内容。\n\n实验是否支持？\n\n基本支持。\n\n尤其是：\n\n- w/o sft 大幅下降，说明学习最佳层级计划很关键；\n- w/o dpo_intra 明显下降，说明层数偏好确实重要；\n- 固定层数实验显示，不同任务和数据集上最优固定层数不一致，说明固定粒度确实不是稳定选择。\n\n---\n\n# 主实验结果说明了什么？\n\nAdaPlan-H 在多数设置下优于：\n\n1. ReAct：不显式生成计划，只边想边做；\n2. Base Planner：直接用 GPT-4o prompt 生成普通计划；\n3. MPO：生成单层计划并优化。\n\n例如 ALFWorld Unseen：\n\n| 方法 | Llama-3.1-8B | Qwen2.5-7B | GPT-4o-mini |\n|---|---:|---:|---:|\n| ReAct | 0.1866 | 0.7537 | 0.4030 |\n| Base Planner | 0.2090 | 0.5448 | 0.3881 |\n| MPO | 0.5224 | 0.8284 | 0.7836 |\n| AdaPlan-H | **0.5896** | **0.8881** | **0.8284** |\n\n这说明：\n\n> 自适应层级计划通常比无计划、普通计划、单层优化计划更能帮助 actor 完成多步任务。\n\n---\n\n# 这套方法的硬伤在哪里？\n\n## 1. 最大层数只设到了 3\n\n论文实验中最大层级 `M = 3`。\n\n这意味着 AdaPlan-H 只能在 1、2、3 层之间选择。\n\n但有些更复杂的任务可能需要更多层。\n\n作者自己也承认：\n\n> 更深的层级可能还能继续提升效果。\n\n所以它目前适合的是：\n\n- ALFWorld；\n- ScienceWorld；\n- 类似复杂度的文本交互任务。\n\n对更长、更复杂的任务，3 层可能不够。\n\n---\n\n## 2. 训练时用哪个 actor 评估计划，会影响最终效果\n\n作者主要用 Llama-3.1-8B-Instruct 作为 actor 来评估计划好坏。\n\n但不同 actor 的能力和偏好不同。\n\n一个对 Llama 最有帮助的计划，不一定对 Qwen 或 GPT-4o-mini 最有帮助。\n\n论文 4.5 节也说明：\n\n> 如果训练时用于评估计划的 actor 和测试时真正执行任务的 actor 保持一致，效果会更好。\n\n所以这套方法有一个边界条件：\n\n> 最好为目标 actor 单独构造计划偏好数据，否则会有迁移偏差。\n\n---\n\n## 3. 质量偏好数据采样数量较少\n\n论文构造质量偏好数据时，只让 SFT 模型生成了 2 个备选计划。\n\n这会限制偏好数据的覆盖范围。\n\n如果采样更多计划，可能能找到更好的 chosen/rejected 对，进一步提升 planner。\n\n---\n\n# 最后总结\n\nAdaPlan-H 做的事情很直接：\n\n1. 先为每个任务生成 1/2/3 层不同细度的计划候选；\n2. 让 actor 拿这些计划去环境里跑；\n3. 用实际 reward 选出每个任务最合适的计划层数和内容；\n4. 用这些结果训练 planner；\n5. 再用偏好优化让 planner 更会选层数、更会写计划；\n6. 最后在新任务上自动生成合适层级的计划给 actor 执行。\n\n它解决的核心问题是：\n\n> 不同任务需要不同细度的计划，固定粒度不够灵活。\n\n消融实验支持这个结论：\n\n- SFT 是基础；\n- 层数偏好让 planner 更会决定生成几层；\n- 质量偏好让 planner 写出的计划更有用；\n- 三者组合效果最好。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **显式 planning 不一定比 no-plan / ReAct 好，甚至 GPT-4o 生成的 Base Planner 会拖后腿。**  \n  依据：Table 1 中 ALFWorld Seen 上 Base Planner 低于 ReAct，例如 Llama-3.1-8B 为 0.2214 vs 0.2500，Qwen2.5-7B 为 0.5643 vs 0.7173；说明“更强 LLM 生成 plan”并不自动带来更好 agent performance。\n\n- **更细的 fixed-level plan 并非越多越好，过细 planning 会降低效果。**  \n  依据：Table 3 中 ALFWorld Seen 上 Fix-2 最好 0.5286，Fix-3 反而降到 0.5000；ScienceWorld Seen 上 Fix-3 最好，但 ScienceWorld Unseen 也只是小幅优于 Fix-2，说明最佳 granularity 与任务/分布相关。\n\n- **planner 和 actor 使用同一个 backbone 并不总是最优。**  \n  依据：Table 4 中 Llama planner + Qwen actor 在 ALFWorld Seen/Unseen 达到 0.7500/0.7687，显著高于 Qwen planner + Qwen actor 的 0.6643/0.7338；作者也指出“not necessarily optimal for planner and actor to use the same backbone”。\n\n- **保持 plan 的完整 hierarchical structure 通常优于只给最详细的 last-level，但并非所有场景都如此。**  \n  依据：Table 5 中 ScienceWorld Seen/Unseen hierarchical 为 0.5876/0.5531，高于 last-level 的 0.5454/0.5136；但 ALFWorld Seen 上 last-level 0.5571 略高于 hierarchical 0.5425，说明高层 plan 的价值存在任务依赖。\n\n- **模型能力更强不一定意味着更依赖或更受益于 planning。**  \n  依据：Table 1 中 GPT-4o-mini 在 ScienceWorld Seen 上 MPO 为 0.6527，AdaPlan-H 为 0.6454，未超过 MPO；而一些较小 actor 如 Qwen3-8B 在 AdaPlan-H 下提升明显，说明 planning 与 actor 能力之间不是单调关系。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **SFT 初始化对 planner 至关重要，尤其在 ALFWorld 上没有 SFT 几乎退化。**  \n  依据：Table 2 中 w/o sft 在 ALFWorld Seen 只有 0.2553，而完整方法为 0.5429；这表明 preference optimization 之前需要先建立基本的 planning format 和 granularity 判断能力。\n\n- **DPO 的两类 preference data 作用不同，缺一都会显著下降。**  \n  依据：Table 2 中 w/o dpo_inter 在 ALFWorld/ScienceWorld 为 0.4610/0.5529，w/o dpo_intra 为 0.4863/0.4762，均低于完整方法 0.5429/0.5876；说明 plan quality preference 和 level preference 都不是冗余组件。\n\n- **只做 SFT 已经能带来提升，但 DPO 能继续提升 plan 的层级准确性和质量。**  \n  依据：Table 2 中 w/o dpo 即仅 SFT，在 ALFWorld/ScienceWorld 为 0.4881/0.5103，完整方法进一步提升到 0.5429/0.5876。\n\n- **不同任务的最优 planning depth 分布差异很大，说明 fixed-depth planning 天然不合理。**  \n  依据：Figure 3 中 ALFWorld train set 最优层级分布为 plan_1 25.5%、plan_2 46.4%、plan_3 28.1%；Figure 4 中 ScienceWorld 则 plan_1 占 55.0%、plan_2 占 18.5%、plan_3 占 26.5%。\n\n- **Monte Carlo 评估计划时使用的 actor 与测试 actor 一致，会显著影响最终效果。**  \n  依据：Section 4.5 指出当 Qwen2.5-7B 作为 actor 时，如果 Monte Carlo 评估也用 Qwen，结果显著优于主实验中用 Llama 构造的数据；作者明确建议尽量保持 exploration actor 与 test actor 一致。\n\n---\n\n## 3. 对领域的新认知\n\n- **plan 的“粒度”本身是一个需要学习和优化的变量，而不是 prompt template 的静态设计。**  \n  依据：Table 3 显示不同 fixed-level 在不同数据集/划分上最优层级不同，Figure 3/4 也显示训练集中不同任务的最优层级分布分散。\n\n- **高层 plan 不只是冗余摘要，它可能提供 global alignment，帮助 actor 不偏离整体目标。**  \n  依据：Table 5 中保留 hierarchical structure 在 ScienceWorld 上显著优于只保留 last-level，作者解释为 high-level plan 维持 broad alignment，low-level plan 提供 detailed guidance。\n\n- **plan 对 actor 的帮助具有模型适配性，不同 actor 可能需要不同的 plan granularity 和 wording。**  \n  依据：Section 4.2 和 4.5 都提到，用 Llama-3.1-8B 选择的 optimal level 和 plan quality 可能对其他 actor 产生 bias，实际下游 actor 架构不同会影响最佳 plan。\n\n- **“更详细的计划”与“更好的执行”之间存在边际收益递减甚至负收益。**  \n  依据：Table 3 中 Fix-3 在 ALFWorld Seen 不如 Fix-2，作者认为 excessive number of levels could lead to decline in performance，验证 overplanning 会造成效率或执行干扰。\n\n---\n\n## 4. 实用的经验性结论\n\n- **如果要用环境反馈筛选 plan，最好用目标部署时的同一个 actor 做 Monte Carlo evaluation。**  \n  依据：Section 4.5 的 backbone 实验显示 actor 一致性会带来更明显增益，作者建议 “maintain consistency between the actor used in actual test and the actor in the Monte Carlo method”。\n\n- **构造初始 hierarchical plan 时，M=3 是一个可行的工程起点。**  \n  依据：Implementation Details 中 ALFWorld 和 ScienceWorld 都设置 maximum number of levels M=3，并取得主要实验中的稳定提升。\n\n- **每个 task 采样多个候选 plan 再用 rollout 选优，比直接相信 LLM 生成的 plan 更可靠。**  \n  依据：Section 3.2 中每个 instruction 采样 N=5 个三层 plan，并拆成 15 个候选 hierarchical plans，通过 Monte Carlo 平均 reward 选择最佳。\n\n- **构造 DPO 的 level preference pair 时，应避免 chosen/rejected 来自同一个生成 plan 的共享前缀。**  \n  依据：Section 3.3.1 提到由于 DPO 会排除 shared prefix tokens 的 loss，必须选择来自不同 GPT-4o 生成 plan 的候选，以免 level preference 信号被削弱。\n\n- **DPO 对长度敏感，训练 plan 时最好加 SFT loss 稳定输出长度和格式。**  \n  依据：Section 3.3.3 引用 length sensitivity 问题，并在 DPO loss 中加入 SFT loss term；实验使用 β=0.1、γ=1。\n\n- **actor 推理时 temperature 设为 0 有助于稳定评估。**  \n  依据：Experimental Settings 中作者为了结果稳定，将 actor model 的 generation temperature 设置为 0。\n\n- **低成本微调配置也能支撑 planner 训练。**  \n  依据：Implementation Details 中使用 LoRA，rank=16、alpha=32；SFT 学习率 5e-5 训练 3 epochs，DPO 学习率 5e-5 训练 1 epoch。\n\n- **质量 preference pair 不一定需要大量采样也能有效。**  \n  依据：Implementation Details 中第二阶段 SFT model 仅生成 2 个 alternative plans 来构造 quality preference pairs，完整方法仍在多数设置下超过 MPO 和 baselines。\n\n---\n\n## 5. 局限性中的机会\n\n- **更深的 hierarchical levels 可能继续提升复杂任务效果。**  \n  依据：Limitations 中作者承认实验中最大层级限制为 3，而结果暗示 deeper levels could yield further improvements；这是探索 scalable hierarchical planning 的机会。\n\n- **针对不同 actor 自动适配 plan selection 是重要方向。**  \n  依据：Limitations 和 Section 4.5 都指出主实验用 Llama-3.1-8B actor 进行 exploration，若与测试 actor 不一致会产生偏差；未来可以研究 actor-specific planner 或 actor-conditioned plan evaluation。\n\n- **增加 quality preference pair 的采样数量可能进一步提升 plan 质量。**  \n  依据：Limitations 中作者说明构造 quality preference pairs 时只生成了两个 plans，larger values could be set，说明 preference data scale 仍有提升空间。\n\n- **从文本环境扩展到 multi-modal environments 是自然但未解决的方向。**  \n  依据：Conclusion 中作者提出未来将 AdaPlan-H 扩展到 broader task scenarios 和 multi-modal environments，以提升 agent planning capability。\n\n- **如何同时优化 task success 与 planning efficiency 仍有空间。**  \n  依据：论文多处指出 fixed fine-grained planning 会造成 overplanning 和 token wastage，但实验主要报告 reward；未来可更系统评估 latency、token cost、plan length 与 success rate 的 Pareto trade-off。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文针对的是 LLM agent 中普遍存在的 planning 机制，而不是一个很窄的子模块。输入材料显示，作者比较了 ReAct、Base Planner、MPO 和 AdaPlan-H。  \n- AdaPlan-H 在多个设置下超过基线，例如 ALFWorld Unseen 上，Llama-3.1-8B actor 从 MPO 的 0.5224 提升到 0.5896，Qwen2.5-7B 从 0.8284 提升到 0.8881，GPT-4o-mini 从 0.7836 提升到 0.8284。  \n- 实验还显示固定层级 planning 没有稳定最优解：ALFWorld Seen 中 Fix-2 最好，Fix-3 下降；ScienceWorld Seen 中 Fix-3 更好。这支持“实际系统不应固定 planning granularity”的实践启发。  \n- Section 4.5 的结论指出，Monte Carlo 评估计划时最好使用目标部署 actor，这对后续做 agent planning 的人有具体方法论影响。\n\n**负面证据或缺失**：  \n- 实验主要限于 ALFWorld 和 ScienceWorld 两个文本交互环境，尚未证明对真实网页任务、代码 agent、机器人、多模态 agent 等更广泛场景有效。  \n- 最大层级只设为 `M=3`，对更长、更复杂任务的可扩展性没有充分验证。  \n- 方法依赖环境 rollout 和 reward 来筛选计划，在真实环境中可能成本高、不可用或 reward 稀疏。  \n- GPT-4o-mini 在 ScienceWorld Seen 上 AdaPlan-H 为 0.6454，低于 MPO 的 0.6527，说明提升不是全局稳定的。\n\n**判断**：中等\n\n**理由**：  \n这项工作有明确的实践启发：不要固定 planning 粒度，而应根据任务和 actor 自适应选择计划层级；这一点有固定层级实验和多 actor 主实验支撑。但影响力目前主要局限在文本环境和可 rollout 评估的 agent 设置中，尚不足以说明会大规模改变 LLM agent 的实际部署方式。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 论文不是简单 prompt engineering，而是提出了一套完整流程：GPT-4o 生成多层候选计划、用 Monte Carlo rollout 选择最佳层级、SFT 初始化、再用 intra-level 和 inter-quality 两类 DPO 偏好优化。  \n- 两类偏好数据有明确分工：`dpo_intra` 训练层数选择，`dpo_inter` 训练同层级内的计划质量。消融显示二者都有效，例如 ScienceWorld Seen 中去掉 `dpo_intra` 从 0.5876 降到 0.4762，去掉 `dpo_inter` 降到 0.5529。  \n- 作者还注意到 DPO 对长度敏感，并加入 SFT loss 稳定计划格式和长度，这比单纯套用 DPO 更细致。\n\n**负面证据或缺失**：  \n- 核心想法“从粗到细、按任务复杂度自适应细化计划”本身相当自然，且输入材料明确说它受 cognitive science 中 progressive refinement 启发，并非全新范式。  \n- 主要技术组件都是已有工具的组合：GPT-4o 数据生成、环境 rollout 选优、SFT、DPO、LoRA 微调。  \n- 没有证据表明其他团队难以独立想到类似方案，尤其是在 LLM agent planning 已经大量使用反思、分解、层级计划和偏好优化的背景下。  \n- 最大层级固定为 3，候选计划每任务采样 N=5，也更像一个工程化设计，而非难以替代的算法突破。\n\n**判断**：弱\n\n**理由**：  \n这篇论文的组合设计是完整的，但不可替代性不强。核心洞见自然，技术路径主要由现有模块拼接而成；如果这篇论文不存在，类似的“rollout 选择计划粒度 + SFT/DPO 训练 planner”方案很可能会在短期内被其他做 agent planning 的团队独立尝试。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- LLM agent 正处在快速发展期，输入材料中明确指出基于 LLM 的 agents 已成为解决动态、多步骤任务的重要方法，而 planning 是其中常见机制。  \n- 现有方法的局限已经足够具体：固定粒度 planning 会对简单任务过度规划，对复杂任务规划不足。  \n- 实验材料显示这个问题不是纯理论假设：固定层级在不同数据集和划分上表现不一致，ALFWorld 训练集中最优层级分布为 plan_1 25.5%、plan_2 46.4%、plan_3 28.1%，ScienceWorld 中 plan_1 55.0%、plan_2 18.5%、plan_3 26.5%。  \n- 当前已有足够的环境、actor 模型、DPO/SFT 工具链，使得这个问题可以被实证研究，而不是停留在概念阶段。\n\n**负面证据或缺失**：  \n- 目前 agent planning 领域还没有形成非常稳定的工业标准范式，因此“固定粒度 planning”是否已经是一个广泛被盲目沿用的成熟问题，证据还不充分。  \n- 方法依赖可交互环境和 reward，这说明它更适合 benchmark 阶段，而不是所有真实 agent 场景。  \n- 多模态环境、真实网页环境和长时任务尚未覆盖，说明现在做这个问题可能仍处在早期验证阶段。\n\n**判断**：中等\n\n**理由**：  \n这个问题现在做是合适的：LLM agent 已经广泛使用 planning，且实验显示固定粒度确实不是稳定选择。同时，领域还在快速变化，真实部署场景中的 reward、rollout 和长期任务评估尚不成熟，所以它更像是及时的 benchmark-level 探索，而不是已经踩中一个完全成熟的产业痛点。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确质疑了一个常见默认设定：planner 应该生成固定粒度的计划。  \n- 实验支持这个质疑：Table 3 中 ALFWorld Seen 上 Fix-2 最好，Fix-3 反而下降；ScienceWorld Seen 上 Fix-3 最好，说明“更细计划更好”并不普遍成立。  \n- 论文还显示显式 planning 不一定优于 no-plan/ReAct。比如 ALFWorld Seen 中 Base Planner 低于 ReAct：Llama-3.1-8B 为 0.2214 vs 0.2500，Qwen2.5-7B 为 0.5643 vs 0.7173。  \n- Table 5 显示只给最后一层计划和保留完整 hierarchical structure 的效果存在任务依赖，这进一步挑战了“只要最细计划就够了”的直觉。\n\n**负面证据或缺失**：  \n- 方法仍然处在 planner-actor 框架内部，没有挑战“先规划再执行”这个更大的 agent 范式。  \n- 它主要把 fixed planning 改成 adaptive hierarchical planning，属于对现有 planning pipeline 的改良，而不是完全不同的任务求解机制。  \n- 对“为什么某些任务需要更粗或更细计划”的机制解释仍然有限，主要依赖 reward 选择和经验结果。\n\n**判断**：强\n\n**理由**：  \n这篇论文在该维度上证据较强，因为它不只是提出新方法，还用实验直接反驳了两个常见直觉：显式 planning 不一定有益，计划也不是越细越好。虽然它没有推翻 planner-actor 框架，但对 fixed-granularity planning 这个具体惯例的质疑清楚且有数据支撑。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩为一句话：**计划粒度应随任务自适应。**  \n- 输入材料中反复出现同一主线：简单任务不应过度细化，复杂任务需要更细计划。  \n- 固定层级实验和最优层级分布支持这一洞见：ALFWorld 与 ScienceWorld 的最优层级分布明显不同，说明不存在单一固定最佳粒度。  \n- 方法流程也围绕这个洞见展开：先生成 1/2/3 层候选，再用环境 reward 选择合适层级，最后训练 planner 学会自动生成相应层级。\n\n**负面证据或缺失**：  \n- “任务复杂度”本身没有被显式建模，实际用的是 actor 在环境中的平均 reward 来间接决定计划层级。  \n- 计划粒度、计划长度、计划内容质量三者可能相互纠缠；论文通过 intra/inter DPO 尝试拆分，但仍未完全解释三者的因果关系。  \n- 最大只验证到 3 层，因此“自适应层级”的表达目前还比较有限。\n\n**判断**：强\n\n**理由**：  \n这篇论文的核心洞见非常清楚，而且方法、实验和消融都围绕这一点组织：固定粒度不可靠，计划应按任务和 actor 自适应细化。虽然“复杂度”没有被独立建模，但作为研究问题的中心思想，它足够简洁、可检验，并且有实验支撑。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术风险是实际存在的：Base Planner 有时低于 ReAct，Fix-3 有时低于 Fix-2，说明“生成更详细计划会提升性能”并不是确定性结果。  \n- AdaPlan-H 需要同时解决两个不确定问题：选对层级，以及在同层级内写出有用计划。消融显示二者都重要，去掉 `dpo_intra` 或 `dpo_inter` 都会下降。  \n- 可行性也被实验证明：SFT + DPO 后在多个 actor 和两个环境中多数情况下优于 ReAct、Base Planner 和 MPO。  \n- 作者注意到 DPO 长度偏差，并加入 SFT loss，说明他们处理了一个实际训练风险。\n\n**负面证据或缺失**：  \n- 方法大量依赖已有成熟技术，科学风险被工程流程降低了：GPT-4o 生成候选、rollout 选优、SFT、DPO 都是可预期有效的工具。  \n- 训练时使用成功轨迹和环境 reward，说明问题设置较受控；真实场景中没有 reward 或无法重复 rollout 时，可行性会明显下降。  \n- 风险分析主要来自 benchmark 表现，没有深入讨论失败模式，例如 planner 选错层级时 actor 如何恢复。  \n- `M=3` 和质量偏好只采样两个 alternative plans，使得实验风险和搜索空间都相对有限。\n\n**判断**：中等\n\n**理由**：  \n这项研究有一定技术风险，因为 planning 更细、更显式并不必然提升性能，实验中也确实出现了反直觉结果。但整体方案依赖成熟工具链和可 rollout 的 benchmark 环境，风险被控制得较低；它更像是一个可行性较强的系统研究，而不是高风险科学突破。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 作者完成了较完整的系统实验：包括多 actor、ALFWorld/ScienceWorld、主实验、固定层级比较、hierarchical vs last-level、SFT/DPO 消融、actor 一致性分析。  \n- 他们构造了候选计划、Monte Carlo reward 评估、SFT 数据和 DPO 偏好数据，并承诺开源代码和数据，这说明团队具备一定工程执行能力。  \n- 论文细节包括 LoRA rank、学习率、DPO β、SFT loss γ 等，显示实验实现较完整。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队背景、长期研究积累、独有数据、独有环境、独有模型或不可复制的资源。  \n- 使用的关键资源都是通用资源：GPT-4o、Llama-3.1-8B、Qwen、GPT-4o-mini、ALFWorld、ScienceWorld、SFT、DPO、LoRA。  \n- 没有证据表明这个团队在“LLM planning + environment rollout + preference optimization”这个交叉点上有别人难以复制的优势。  \n- 方法虽然工程量不小，但可复现路径清楚，竞争者进入门槛不高。\n\n**判断**：弱\n\n**理由**：  \n从输入材料看，团队有不错的工程执行力，但没有体现出独特比较优势。核心资源和技术栈都是公开或通用的，因此不能支撑“只有这个团队特别适合做这件事”的判断。\n\n---\n\n# 综合评价\n\n**综合评价：有潜力但有明显短板。**\n\n这篇论文抓住了一个真实且清楚的问题：LLM agent 的计划粒度不应固定。它的核心洞见简洁，实验也提供了具体证据，尤其是固定层级实验、Base Planner 低于 ReAct 的反直觉结果，以及 SFT/DPO 消融，都支持“自适应层级 planning”不是纯概念包装。  \n但它的不可替代性和外部有效性有限：方法主要是现有组件的系统组合，实验集中在两个文本环境，最大层级只有 3，并且强依赖 actor-specific rollout reward。整体看，这是一篇值得关注的系统型工作，但还不是足以重塑 agent planning 范式的突破。\n\n---\n\n# 最致命的弱点\n\n**最致命的问题是：方法高度依赖可重复 rollout 的环境 reward，而且选出的计划明显 actor-specific。**\n\n输入材料中已经指出，用 Llama-3.1-8B 作为 exploration actor 构造的数据不一定最适合 Qwen 或 GPT-4o-mini；Section 4.5 还显示 exploration actor 与 test actor 一致时效果更好。这意味着 AdaPlan-H 的优势可能部分来自“为特定 actor 和 benchmark 调参式筛选计划”，而不是学到了普遍可迁移的 planning 原理。\n\n---\n\n# 如果要做得更好\n\n1. **证明跨环境、跨 actor、跨任务长度的泛化能力。**  \n   需要从 ALFWorld/ScienceWorld 扩展到网页 agent、代码 agent、多模态任务或更长时程任务，并系统报告 actor mismatch 下的性能退化。\n\n2. **把层级选择从固定 `M=3` 推向真正动态。**  \n   当前只能在 1/2/3 层之间选，仍然是受限的自适应。更强的版本应该能根据任务动态决定是否继续细化，并同时报告成功率、token cost、latency 和 overplanning trade-off。\n\n---\n\n# 与 Carlini 原则的对照\n\n**最符合的 Carlini 原则**：它符合“选择一个可以用简单句说清楚、并能挑战默认假设的问题”——核心问题就是“计划不是越细越好，粒度应自适应”，且有固定层级实验支撑。\n\n**最不符合的 Carlini 原则**：它较不符合“优先做别人难以很快复制、且影响范围明确扩大的问题”——该方法主要组合现有工具，且目前证据集中在可 rollout 的文本 benchmark，独特性和真实世界影响仍不足。",

                    "summary_translation": "Large language model-based agents（基于大语言模型的智能体）近年来已成为解决 dynamic and multi-step tasks（动态多步任务）的强大方法。现有大多数 agents（智能体）采用 planning mechanisms（规划机制）来指导其在 dynamic environments（动态环境）中的 long-term actions（长期行动）。然而，当前的 planning approaches（规划方法）面临一个根本性限制：它们通常在固定的 granularity level（粒度层级）上运行。具体而言，这些方法要么在 simple tasks（简单任务）中提供过多细节，要么在 complex tasks（复杂任务）中提供不足细节，因而难以在 simplicity（简洁性）与 complexity（复杂性）之间实现最优平衡。\n\n受 cognitive science（认知科学）中 progressive refinement（渐进式细化）原则的启发，我们提出了 **AdaPlan-H**，一种 self-adaptive hierarchical planning mechanism（自适应层次化规划机制），旨在模拟人类的规划策略。该方法从 coarse-grained macro plan（粗粒度宏观计划）出发，并根据 task complexity（任务复杂度）逐步对其进行细化。它能够生成 self-adaptive hierarchical plans（自适应层次化计划），以适配不同任务的 varying difficulty levels（不同难度水平），并可通过 imitation learning（模仿学习）和 capability enhancement（能力增强）进一步优化。\n\n实验结果表明，我们的方法在显著提升 task execution success rates（任务执行成功率）的同时，能够在 planning level（规划层面）缓解 overplanning（过度规划）问题，从而为 multi-step complex decision-making tasks（多步复杂决策任务）提供一种灵活且高效的解决方案。为促进相关研究社区的发展，我们将公开发布代码和数据，地址为：https://github.com/import-myself/AHP。"

                    "summary": "Large language model (LLM) deployments increasingly rely on multi-agent architectures in which multiple models either compete through routing mechanisms or collaborate to produce a final answer. In both settings, the learning signal received by each agent is filtered by the system mechanism. Routing produces selection-gated feedback where only the chosen response is evaluated, while collaboration produces shared rewards that obscure the individual contribution of each agent. As a result, standard RLHF objectives designed for a single deployed policy become misspecified. We introduce CoFi-PGMA (Counterfactual Policy Gradients under Filtered Feedback for Multi-Agent LLMs), a unified framework for learning under filtered feedback in multi-agent LLM systems. Our approach derives a counterfactual per-agent training objective based on marginal contribution, which corrects the learning signal under both routing and collaborative mechanisms. For routing systems, the objective corresponds to off-policy corrections for selection-gated feedback, while for collaborative systems it reduces to leave-one-out difference rewards for credit assignment. We further analyze how softmax routing induces risk-sensitive incentives and provide practical training algorithms that integrate counterfactual estimators, multiturn-aware rewards, and policy optimization methods, and demonstrate the approach on a real-world reasoning dataset.",

                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是关于**多智能体LLM系统的训练方法论**，而非将LLM作为工具应用于特定领域。论文针对多智能体系统中普遍存在的“反馈过滤”问题（路由机制下的选择门控反馈、协作机制下的共享奖励），提出了新的训练目标和算法框架。这是一个典型的多智能体系统方法论贡献。\n\n**第二步：正面指标分析**\n\n论文与我的研究目标高度相关：\n- **核心范式**: 明确涉及 `Multi-Agent Systems (MAS)` 和 `LLM-based Agents`\n- **智能体能力**: 涉及多智能体系统中的**协作机制**（collaboration）和**博弈策略**（routing机制下的竞争）\n- **演化机制**: 论文提出基于强化学习的训练方法（RLHF目标的修正版），属于通过学习算法进行自我改进的范畴\n\n**第三步：排除标准检查**\n\n- 安全相关: 不涉及 ✓\n- 多模态与视觉: 不涉及 ✓  \n- 图相关技术: 不涉及 ✓\n- **多智能体拓扑与编排**: 论文**不**关注拓扑结构、通信协议或编排问题，而是关注**信用分配（credit assignment）**机制——即如何正确评估每个智能体对最终结果的边际贡献。这是多智能体系统中的核心学习问题，属于我应该保留的范畴。\n\n**关键判断依据**\n\n虽然论文涉及“路由”和“协作”机制，但重点不在于设计新的拓扑结构或通信协议，而在于解决多智能体学习中的核心挑战——**信用分配问题**。论文提出的\"leave-one-out difference rewards\"和\"counterfactual per-agent training objective\"是方法论层面的创新，旨在改进多智能体系统的学习机制，而非系统工程层面的架构设计。\n\n因此，这篇论文符合我的研究范围：构建/改进多智能体LLM智能体的方法论，特别是协作机制和博弈策略中的学习问题。",

                    "core_insight": "### 1. 关键洞察（The Seed Insight）\n\n**一句话概括**：作者意识到，在多智能体LLM系统中，**系统级的机制（路由或协作）本身会“过滤”反馈信号**，这使得为单智能体设计的标准RLHF目标从根本上就是“错误设定”的；因此，正确的学习信号不应是观察到的原始反馈，而应是每个智能体对最终结果的**反事实边际贡献**。\n\n**展开解释与原文证据**：\n作者的核心突破在于，他们没有将多智能体训练简单地视为单智能体RLHF的扩展，而是敏锐地识别出系统架构引入了一个根本性的新问题：**反馈的“过滤”**。这种过滤不是噪声，而是由路由或协作的机制设计所必然导致的、系统性的信号扭曲。\n\n*   **对问题的洞察**：论文在摘要和引言中明确指出，标准RLHF目标在多智能体场景下变得“错误设定”：\n    > “In both settings, the learning signal received by each agent is filtered by the system mechanism... As a result, standard RLHF objectives designed for a single deployed policy become **misspecified**.” (Abstract)\n    > “In multi-agent systems, however, the system mechanism induces **filtered feedback** that makes naive per-agent RLHF either **statistically biased** ... or **strategically misaligned** ...” (Section 1)\n\n*   **对解决方案的洞察**：基于此，作者提出的核心纠正思路是**反事实推理**，即通过比较现实世界与一个智能体“不存在”的虚拟世界，来剥离过滤效应，还原其真实贡献：\n    > “Our main novelty lies in introducing ... a unified framework for learning under filtered feedback... We train each agent using a **counterfactual advantage signal** that measures its **marginal contribution** to the final outcome, defined as the difference between the observed system reward and the reward that would have been obtained if the agent had not participated.” (Section 1)\n\n这个洞察连接了多智能体RL中的信用分配和上下文赌博机中的离策略评估这两个看似不同的领域，将它们统一在“**在机制过滤的反馈下学习**”这一新视角下。\n\n### 2. 从洞察到方法的桥梁\n\n从“反馈被过滤”到“使用反事实边际贡献”的推理链条清晰而直接：\n\n1.  **起点（问题定义）**：智能体i收到的效用 `Ui` 取决于系统机制（路由概率 `pi` 或共享奖励 `r`），但观察到的数据（`ot`）是过滤后的，不包含评估其行动所需的全部信息（如未选中候选的奖励，或其他智能体的贡献）。\n2.  **核心逻辑推理**：要公正地评估智能体i，需要回答一个反事实问题：**如果这个智能体以某种基线行为（如不参与、或被一个参考模型替代）行动，系统的最终回报会有什么不同？** 这个差值就是智能体i纯粹由其自身行动带来的因果效应，剥离了机制过滤和其他智能体的干扰。\n3.  **数学形式化**：将上述推理形式化为**反事实边际贡献** `Δi,t = E[Gt - G^{-i}_t | z_t, a_t^{(i)}]`。其中 `G^{-i}_t` 是在智能体i被替换为基线后，从时刻t开始的回报。\n4.  **理论验证**：论文通过 **Theorem 1** 证明，使用 `Δi,t` 作为优势信号可以给出系统目标 `J_sys` 关于智能体i参数的无偏策略梯度。这从理论上验证了该洞察的正确性。\n5.  **方法实例化**：根据不同的过滤机制，设计具体的 `Δi,t` 估计器：\n    *   **对于路由（竞争）**：反馈是“选择门控”的，只看到被选中者的奖励。这类似于部分反馈的赌博机问题。因此，方法自然引向使用**双重稳健（Doubly Robust, DR）估计器**来估算所有候选（包括未选中者）的预期回报，从而计算边际贡献（**Corollary 1**）。\n    *   **对于协作**：反馈是“共享”的，但个体贡献模糊。这直接对应多智能体RL中的信用分配问题。因此，方法引向**留一法（Leave-One-Out, LOO）** 反事实评估，即实际运行一个用基线替换智能体i的协作流程来计算 `G^{-i}_t`（**Corollary 2**）。\n\n**桥梁总结**：洞察（反馈过滤导致目标错误）→ 核心纠正思想（评估反事实下的边际贡献）→ 理论证明（该贡献给出正确梯度）→ 实践实现（针对不同过滤类型采用成熟的估计技术）。\n\n### 3. 试错历程\n\n论文虽未明确描述一个曲折的试错过程，但从其方法设计和实验设置中，可以推断出作者在实现该洞察时必然面对并解决了以下关键挑战：\n\n*   **挑战一：估计器的可行性与偏差-方差权衡**\n    *   **最初方案**：理想情况下，需要精确计算反事实回报 `G^{-i}_t`。\n    *   **意料之外的困难**：在实践中，尤其是在路由设置中，`G^{-i}_t` 无法直接观测，必须依赖估计。纯重要性采样估计器方差可能极高，而纯模型预测估计器则可能存在偏差。\n    *   **方案调整**：作者选择了**双重稳健估计器**，因为它“is known to remain more stable than either pure importance sampling or pure model-based estimation under joint misspecification, often achieving a favorable bias–variance tradeoff.” (Section 3.3, 解释 Corollary 1 后)。这表明他们在设计时已经考虑了估计的鲁棒性这一实际挑战。\n\n*   **挑战二：路由系统中智能体与路由器的共同进化与耦合**\n    *   **新产生的子问题**：在路由实验中，智能体的策略、路由器的选择概率 `pi` 和奖励预测模型 `μ_ψ` 是**共同学习、相互影响**的。一个糟糕的初始路由器会阻碍智能体学习，反之亦然。\n    *   **方案调整**：实验部分（Section 4）透露了他们的工程化解决方案：\n        1.  **渐进式训练**：“We warm up the reward predictor for the first 25 updates before applying policy updates.” 这避免了在初期信号质量极差时更新策略。\n        2.  **探索策略**：路由器使用 `ε-softmax` 并伴随退火（`τ` 和 `ε` 从较高值开始降低），确保初期有足够的探索来收集数据。\n        3.  **稳定学习技巧**：对重要性权重采用“IPS clipping at 3.0”，以防止个别样本权重过大导致训练不稳定。\n\n*   **挑战三：评估与证明的复杂性**\n    *   **困难**：要证明“反事实边际贡献”这一核心洞察的有效性，不能仅看最终性能提升，还需证明性能提升确实源于对“过滤反馈”的纠正，而非其他因素（如单纯增加了模型容量或训练数据）。\n    *   **方案调整**：作者设计了细致的实验和丰富的诊断指标：\n        1.  **设置严格的基线**：“Winner-take-all RLHF” 基线精确对应了“使用过滤后反馈”的朴素方法。\n        2.  **引入诊断指标**：他们不仅汇报准确率，还分析了**路由熵**（检查是否过早崩溃）、**Brier分数**（评估路由器校准程度）、**专业化分数**（检查智能体是否真正分化）以及**Oracle诊断**（分离出路由决策质量和智能体本身质量）。这些指标共同构建了一个证据链，表明DR-GRPO确实带来了更健康、更有效的多智能体学习行为，从而支持了其核心洞察。\n\n综上所述，作者的试错与调整历程主要体现在：**将理论洞察转化为鲁棒的估计器**，**解决多组件共同学习的工程挑战**，以及**设计严谨的实验来剥离和验证核心机制**。这些调整确保了那个优雅的“灵光一闪”能够落地为一个行之有效的实用框架。",
                    "methodology": "好的，我们来用大白话拆解这篇论文。\n\n### **一句话概括核心创新**\n这篇论文的方法，和之前直接使用被过滤的原始奖励信号来训练多智能体大模型的做法相比，最本质的区别是：**它为每个智能体重新计算了一个“反事实边际贡献”作为训练信号，这个信号衡量的是“有这个智能体和没这个智能体，系统最终奖励的差别”，从而纠正了因路由选择或奖励共享导致的反馈偏差。**\n\n### **方法执行逻辑拆解**\n整个CoFi-PGMA框架的运行，可以拆解为以下四个步骤：\n\n**第一步：多智能体并行生成候选回答**\n- **输入**：用户的问题（及历史对话）。\n- **操作**：K个智能体（大模型）各自根据当前问题，独立或按顺序地生成一个候选回答。\n- **输出**：K个候选回答。\n- **目的**：这是多智能体系统的起点，为后续的路由选择或协作组合提供素材。论文研究了两种场景：1) **竞争路由**：智能体独立生成完整答案，等待被选中；2) **协作生成**：智能体按顺序（如规划者-执行者-评审者）各自贡献答案的一部分。\n- **如果不做会怎样**：如果不让多个智能体生成，就变回了单模型系统，无法利用分工或多样性带来的潜在优势。\n\n**第二步：系统机制产生最终输出并计算奖励**\n- **输入**：第一步生成的K个候选回答。\n- **操作**：\n    - **在竞争路由场景**：一个“路由器”根据某种规则（如softmax）从K个候选中选择一个，作为最终输出给用户。\n    - **在协作生成场景**：一个“组合器”将K个智能体的输出（可能是部分答案）组合成一个完整的最终答案。\n    - 系统根据最终答案的质量（例如，在数学题GSM8K上是否答对）计算一个奖励分数。\n- **输出**：1）给用户的最终答案；2）一个系统级别的奖励分数。\n- **目的**：模拟真实产品中的决策流程，决定用户看到什么，并根据用户反馈（或模拟反馈）给出评价。\n- **如果不做会怎样**：如果跳过机制直接给奖励，就假设所有智能体的输出都被完整评估了，这与现实不符（现实中用户只看到一个答案），会导致训练信号失真。\n\n**第三步（核心）：为每个智能体估计“反事实边际贡献”**\n- **输入**：系统奖励、每个智能体的策略、以及一个“基线策略”（用于生成替代内容）。\n- **操作**：对于每个智能体i，系统思考一个问题：“**如果把这个智能体当前的输出，替换成一个由基线策略生成的、普通的输出，系统的最终奖励会变成多少？**”\n    - **在竞争路由场景**：计算变得复杂，因为没被选中的智能体的奖励从未被观察到。论文使用了一种叫“双重稳健估计”的技术：用一个预测模型来猜每个候选答案如果被选中能得多少分，同时用实际被选中的答案的奖励来校正这个预测。\n    - **在协作生成场景**：相对直接。用基线输出替换智能体i的输出，并按照原有流程重新生成后续智能体的输出，最终得到一个新的系统奖励。\n    - 然后，用 **【实际系统奖励】减去【替换后的反事实系统奖励】**，得到智能体i的“边际贡献”估计值。\n- **输出**：每个智能体i得到一个标量值，代表它这次行动对系统奖励的“净贡献”。\n- **目的**：**解决“反馈被过滤”这个核心痛点。**\n    - 对于**路由系统**：痛点是被选中的智能体拿到了全部功劳，没被选中的智能体即使答案更好也学不到东西（反馈缺失）。反事实估计让所有智能体都能根据“如果被选中会怎样”来学习。\n    - 对于**协作系统**：痛点是所有智能体平分奖励，分不清谁在摸鱼谁在出力（反馈混淆）。反事实估计能分离出每个智能体的单独贡献。\n- **如果不做会怎样**：如果直接用原始系统奖励训练，路由场景下学习会有偏差（偏向于学习如何被选中，而非给出好答案），协作场景下学习信号噪声极大、效率低下（智能体可能“搭便车”）。\n\n**第四步：使用校正后的信号更新智能体参数**\n- **输入**：每个智能体自己的策略、它生成的答案、以及第三步计算出的“边际贡献”估计值。\n- **操作**：使用策略梯度算法（论文中用的是GRPO，一种稳定训练的技术），以“边际贡献”作为优势函数，来更新每个智能体的模型参数。基本逻辑是：如果边际贡献高，就增加生成类似答案的概率；如果低，就减少。\n- **输出**：更新后的智能体模型参数。\n- **目的**：根据更准确的功劳分配，引导每个智能体优化自己的行为，最终提升整个系统的性能。\n- **如果不做会怎样**：算法就只完成了诊断（算出了贡献），但没有完成优化，系统性能不会提升。\n\n### **结合实验，解释方法为什么有效**\n论文在**竞争路由场景**（GSM8K数学题，3个智能体+1个路由器）上进行了主要实验，对比了“赢家通吃”基线法和他们的“DR-GRPO”法。\n\n1.  **哪个组件贡献最大？** **“反事实边际贡献估计”这个核心设计贡献最大。** 实验数据表明，使用该设计的DR-GRPO在**准确率（0.41）** 上显著高于直接使用被选中奖励的“赢家通吃”基线（0.37）。这直接证明了校正反馈偏差的有效性。\n2.  **哪个组件可有可无？** 从论文设计的对比来看，**没有“可有可无”的组件**。“双重稳健估计”中的预测模型和重要性加权都是保证估计无偏或低方差的关键部分，缺一不可。\n3.  **各组件之间是否有协同效应？** 论文没有设计严格的组件消融实验，但从原理上看，**反事实估计与策略梯度优化（GRPO）是紧密协同的**。反事实估计提供了正确的梯度方向，GRPO确保了沿着这个方向更新时模型不会崩掉。单独用反事实估计而不做策略优化无效；用原始奖励做策略优化（GRPO）则方向错误。\n4.  **回扣动机：** 论文声称要解决“**过滤反馈导致学习信号偏差或混淆**”的痛点。实验数据强有力地支持了这一说法：\n    - **解决偏差（路由场景）**：DR-GRPO比“赢家通吃”基线准确率高，说明它更好地利用了所有候选答案的信息，纠正了只有赢家能学习的偏差。\n    - **解决混淆/降低噪声（间接体现）**：DR-GRPO带来了更优的**路由效果**（Brier分数更低，说明路由器预测更准；专业化分数更高，说明路由器更能根据题目类型匹配合适的专家）。这说明当每个智能体都收到更清晰的、关于自己答案质量的信号时，它们会分化得更好，从而让路由器更容易做出正确选择。这印证了反事实估计能提供更干净、方差更低的训练信号。\n\n### **这套方法的硬伤在哪里？**\n根据论文的“Limitation”部分，主要有两个硬伤：\n\n1.  **实验规模有限，结论的普适性有待验证**：论文只在较小的模型（30亿参数）、较小的数据集（GSM8K的子集）和单一任务上进行了实验。在更大规模、更复杂的实际场景中（如长对话、多轮协作）效果如何，还是未知数。\n2.  **增加了系统复杂性和训练成本**：无论是路由场景需要训练一个奖励预测模型，还是协作场景需要进行额外的“反事实推演”（即用基线输出重新跑一遍流程），都增加了额外的计算开销和工程复杂度。",
                    "additional_insights": "1.  **实验中的反直觉发现**\n    *   **看似合理的“赢家通吃”训练效果不佳**：在竞争性路由系统中，直觉上只对“被选中”的智能体给予奖励（Winner-take-all RLHF）是合理的，但实验表明这种简单方法会丢弃未选中候选的有用学习信号，导致训练效果较差。而采用双重稳健（DR）估计来纠正选择偏差的方法（DR-GRPO）取得了显著更好的效果（准确率0.41 vs 0.37）。(依据：第4节 Results 与 Table 2)\n    *   **路由机制本身会诱导风险敏感的激励**：论文证明，在基于奖励的softmax路由下，一个智能体的期望效用（Ui）不仅取决于其自身答案的平均质量（mean reward），还取决于所有候选答案的相对质量（full distribution）。这意味着路由机制改变了智能体的优化目标，使其倾向于产生能“脱颖而出”的答案，而不仅仅是平均质量高的答案。(依据：第3.1节 Proposition 1)\n\n2.  **有启发性的分析或 ablation**\n    *   **路由诊断揭示了双重收益**：通过比较实际路由准确率和“理想路由”（Oracle）准确率，作者发现DR-GRPO方法不仅提高了路由准确率（0.41 vs 0.37），还降低了与理想路由的“遗憾”（Regret，0.06 vs 0.08）。这表明纠正反馈偏差不仅能提升智能体质量，还能同步提升路由器的选择质量。(依据：第4节 Table 3 及分析)\n    *   **共享奖励的模糊性分析**：论文通过构造性证明（Proposition 2）阐明，在协作系统中，相同的最终奖励分布可能源于智能体完全不同的贡献模式。这深刻揭示了仅靠共享奖励无法进行有效信用分配的根本原因，即信号无法识别（unidentified）个体贡献。\n\n3.  **对领域的新认知**\n    *   **将多智能体LLM系统的反馈问题统一形式化为“过滤反馈”**：论文将工业中常见的路由（竞争）与协作模式统一到一个框架下，指出其核心共性是智能体接收到的学习信号被系统机制“过滤”了，从而导致了有偏学习或信用分配模糊。这深化了我们对多智能体LLM训练挑战的理解，超越了单一的“信用分配”视角。(依据：第1、3节摘要及框架描述)\n    *   **揭示了“反事实边际贡献”作为通用解决方案的理论基础**：论文证明（Theorem 1），无论对于路由还是协作，以智能体的反事实边际贡献（∆i,t）作为学习信号，都能得到正确的策略梯度。这为处理多机制下的过滤反馈问题提供了一个统一的理论基石。(依据：第3.3节 Theorem 1)\n\n4.  **实用的经验性结论**\n    *   **采用轻量级专业化与共享骨干**：实验中使用共享的Llama-3.2-3B骨干网络，通过为每个智能体训练独立的低秩适配器（LoRA）来实现轻量级专业化。这是一种高效且实用的多智能体实现方案。(依据：第4节 “Models and agents”)\n    *   **路由器的探索与训练策略**：在训练竞争性路由系统时，采用ε-混合softmax（ϵ-mixed softmax）进行探索，并对温度τ和探索率ϵ进行退火（annealing）。同时，使用独立的重放缓冲区训练奖励预测器，并进行预热（warm-up）。(依据：第4节 “Router and reward predictor” 及 “Training details”)\n\n5.  **局限性中的机会**\n    *   **实验规模较小，需扩展验证**：作者指出实验是在小规模（3B模型，少量数据，单次运行）上进行的，这为在更大模型、更大数据集上进行验证留下了明确的研究方向。(依据：第5节 “A key limitation...”)\n    *   **协作场景的实证评估尚属空白**：论文虽然提出了协作场景下的留一法（LOO）估计器，但实验部分仅验证了竞争性路由场景。如何在实际协作管道（如规划-求解-批评）中有效实施和评估该方法，是一个开放的实践挑战和未来方向。(依据：第5节 “Second, the collaborative setting... should be evaluated empirically...”)\n    *   **更丰富的奖励模型与路由器的潜力**：作者指出，集成更长视野的多轮奖励（MR）以及更强的路由器，可能进一步释放性能潜力，这指明了改进系统组件的方向。(依据：第5节 “Third, richer reward models... and stronger routers may further improve performance...”)",
                    "research_value": "**1. 影响力潜力（Impact）**\n*   **正面证据**：论文明确指出并形式化了工业界多智能体LLM部署（路由、协作）中一个普遍但被忽视的实际问题：学习信号被系统机制“过滤”，导致标准RLHF目标失效。实验证明，其方法（DR-GRPO）在路由场景下显著优于直觉上合理的“赢家通吃”基线（准确率0.41 vs 0.37）。\n*   **负面证据或缺失**：实验规模有限（3B模型，GSM8K子集），且仅在一个任务（数学推理）上验证了路由场景。协作场景仅有理论框架，缺乏实证评估。这使其结论的普适性和对当前大规模工业实践的直接影响存疑。\n*   **判断**：中等\n*   **理由**：论文指出的“过滤反馈”问题确实是多智能体系统从理论走向稳健实践的关键障碍，具有明确的实践相关性。然而，有限的实验验证（尤其是协作场景的缺失）使其影响力目前主要停留在“提出一个重要问题并给出初步解决方案”的层面，尚未达到能立即改变广泛研究方式或工程实践的强度。\n\n**2. 不可替代性（Uniqueness）**\n*   **正面证据**：论文提供了一个统一框架（CoFi-PGMA），将路由和协作两种模式下的反馈问题统一为“过滤反馈”，并统一使用“反事实边际贡献”作为校正信号。这超越了单独解决“选择偏差”或“信用分配”的视角。\n*   **负面证据或缺失**：反事实推理和信用分配（如留一法奖励）在传统多智能体强化学习（MARL）中并非新概念。论文的核心贡献在于将其系统性地引入并适配于LLM多智能体场景，并进行了理论推导。考虑到该领域当前的热度，类似的思路很可能被其他团队在较短时间内独立探索。\n*   **判断**：中等\n*   **理由**：论文的“统一框架”视角和针对LLM特性的适配（如结合GRPO）构成了其独特性。然而，其核心思想（用反事实估计纠正有偏/混淆信号）的基石来自已有领域。因此，它是一项及时且扎实的集成与创新工作，但并非从零到一的颠覆性发现。\n\n**3. 时机判断（Timing）**\n*   **正面证据**：多智能体LLM架构（如路由、MoE、智能体协作）正成为研究和应用的前沿热点。论文精准地抓住了从“架构设计”迈向“高效训练”这一过程中出现的核心痛点。\n*   **负面证据或缺失**：论文的实验规模（3B模型）与当前业界探索更大规模模型多智能体系统的趋势相比，略显滞后。问题抓得准，但验证的“火力”不足以完全匹配问题的紧迫性和规模。\n*   **判断**：中等\n*   **理由**：研究问题的提出时机堪称完美，切中了领域发展的关键节点。然而，验证工作的规模和深度未能完全抓住这个“黄金时机”，使得其说服力和引领性打了折扣，处于“问题提得及时，但答案分量稍欠”的状态。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n*   **正面证据**：论文明确挑战了在多智能体系统中直接套用单智能体RLHF（如“赢家通吃”奖励）的范式。通过理论分析（Proposition 1）和实验，证明了这种做法的次优性，并揭示了路由机制本身会诱导风险敏感激励这一反直觉现象。\n*   **负面证据或缺失**：无。论文的核心就是审视和挑战现有做法。\n*   **判断**：强\n*   **理由**：论文没有满足于在现有范式内做增量改进，而是直接指出并证明了当前普遍做法的根本缺陷（目标错误设定）。其理论命题和实验对比（如DR-GRPO vs Winner-take-all）为这一挑战提供了扎实的证据，符合“质疑默认假设”的优秀研究特质。\n\n**5. 核心洞见的清晰度（Core Insight）**\n*   **正面证据**：核心洞见可以清晰概括为：**为多智能体系统中的每个智能体估计其反事实边际贡献，以纠正被机制过滤的学习信号。**\n*   **负面证据或缺失**：无。洞见非常清晰且贯穿全文。\n*   **判断**：强\n*   **理由**：该洞见简洁有力，完美对应了所提出的问题（过滤反馈），并直接导出了解决方案（反事实边际贡献）。无论是路由场景的双重稳健估计，还是协作场景的留一法估计，都是这一核心洞见在不同机制下的具体实现。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n*   **正面证据**：论文展示了完整的技术路径：理论推导、具体算法（DR/LOO估计器）、训练细节（GRPO, LoRA专业化）以及在GSM8K任务上的可行性和有效性提升。证明了方法在有限范围内是可行的。\n*   **负面证据或缺失**：作者明确指出协作场景缺乏实证，且扩展性（更大模型、更复杂任务）是未知风险。方法本身增加了计算和工程复杂度（需训练奖励预测模型或进行反事实推演），这在实际部署中可能构成可行性障碍。\n*   **判断**：中等\n*   **理由**：论文成功证明了核心想法在受控环境下的可行性，并取得了积极结果，这降低了“想法完全不可行”的风险。然而，其实验的局限性（规模、场景单一）和增加的复杂度，意味着在更现实场景中仍存在显著的工程与性能风险，并非一个“确定性”的解决方案。\n\n**7. 比较优势（Comparative Advantage）**\n*   **正面证据**：论文展现了扎实的理论建模能力（统一框架、命题与定理证明）和严谨的实验设计（与基线的对比、路由诊断分析）。在“理论分析多智能体LLM学习动力学”与“设计实用训练算法”的交叉点上，显示了较强的综合能力。\n*   **负面证据或缺失**：输入材料未提供团队背景信息。从论文本身看，未展示出在超大规模模型训练、复杂奖励模型构建或极端工程优化方面的独特优势。这更像是一个由清晰理论洞察驱动的扎实工作，而非依赖特定基础设施或数据的“护城河”型研究。\n*   **判断**：中等\n*   **理由**：团队在该研究上展现的优势在于**问题的理论抽象与算法整合能力**，这足以支撑他们完成这项质量不错的工作。但没有证据表明他们在资源、数据或特定技术上拥有其他团队难以复制的压倒性优势。\n\n---\n**综合评价**：有潜力但有明显短板。论文的核心价值在于清晰指出了一个重要且实际的问题（过滤反馈），并提出了一个统一、理论扎实的解决方案框架（反事实边际贡献），其挑战现有范式的洞见是突出的优点。然而，其实验验证的广度和深度严重不足，尤其是协作场景的缺失和较小的实验规模，构成了主要短板，极大地限制了其当前的说服力和影响力。\n\n**最致命的弱点**：实验验证不充分。仅在单一任务（数学推理）、有限规模（3B模型）下验证了路由场景，而协作场景这一重要组成部分仅有理论框架，缺乏任何实证支持。这使得论文的结论更像一个“有潜力的提案”，而非一个“经过充分验证的解决方案”。\n\n**如果要做得更好**：1. **必须补充协作场景的实证研究**。至少在一个典型的协作管道（如规划-执行-评审）上实现并评估其LOO估计器，证明其相对于共享奖励基线的有效性。2. **扩大实验规模**。在更大参数量的模型（如7B、13B）和更多样化的任务（代码生成、长文本创作）上进行验证，以增强结论的普适性。\n\n**与 Carlini 原则的对照**：\n*   **最符合**：**质疑默认假设**。论文成功地质疑了在多智能体LLM中直接应用单智能体RLHF目标（赢家通吃、共享奖励）这一普遍做法，并提供了理论分析和实验证据。\n*   **最不符合**：**大规模验证**。论文的实验部分恰恰缺乏大规模验证，无论是在模型规模、数据量还是任务复杂性上，都停留在较小的探索性阶段，未能充分支撑其框架的广泛适用性。",

                    "summary_translation": "**中文翻译：**\n\n大语言模型（Large Language Model, LLM）的部署日益依赖于多智能体架构，其中多个模型通过路由机制竞争或协作以生成最终答案。在这两种设置中，每个智能体接收的学习信号均受到系统机制的过滤。路由机制产生**选择门控反馈**（selection-gated feedback），即仅被选中的响应会得到评估；而协作机制则产生**共享奖励**（shared rewards），从而模糊了每个智能体的个体贡献。因此，为单一部署策略设计的标准RLHF目标变得不再适用。本文提出**CoFi-PGMA**（面向多智能体LLM的过滤反馈下的反事实策略梯度），这是一个在多智能体LLM系统中处理过滤反馈的统一学习框架。我们的方法基于**边际贡献**（marginal contribution）推导出每个智能体的反事实训练目标，以修正路由与协作机制下的学习信号。对于路由系统，该目标对应于对选择门控反馈的**离策略修正**（off-policy corrections）；对于协作系统，则简化为用于信用分配的**留一法差分奖励**（leave-one-out difference rewards）。我们进一步分析了softmax路由如何引发风险敏感激励，并提供了整合反事实估计器、多轮感知奖励与策略优化方法的实用训练算法，最后在一个真实世界推理数据集上验证了该方法的有效性。"
                },
                {
                    "title": "DLM: Unified Decision Language Models for Offline Multi-Agent Sequential Decision Making",
                    "arxiv_id": "2604.23557",
                    "authors": "Zhuohui Zhang, Bin Cheng, Bin He",
                    "summary": "Building scalable and reusable multi-agent decision policies from offline datasets remains a challenge in offline multi-agent reinforcement learning (MARL), as existing methods often rely on fixed observation formats and action spaces that limit generalization. In contrast, large language models (LLMs) offer a flexible modeling interface that can naturally accommodate heterogeneous observations and actions. Motivated by this, we propose the Decision Language Model (DLM), which formulates multi-agent decision making as a dialogue-style sequence prediction problem under the centralized training with decentralized execution paradigm. DLM is trained in two stages: a supervised fine-tuning phase, which leverages dialogue-style datasets for centralized training with inter-agent context and generates executable actions from offline trajectories, followed by a group relative policy optimization phase to enhance robustness to out-of-distribution actions through lightweight reward functions. Experiments on multiple benchmarks show that a unified DLM outperforms strong offline MARL baselines and LLM-based conversational decision-making methods, while demonstrating strong zero-shot generalization to unseen scenarios across tasks.",
                    "category": "cs.AI",
