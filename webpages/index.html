                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体**的研究，而非将LLM作为工具应用于特定领域。论文提出了SAVOIR框架，旨在训练语言智能体（language agents）具备社会智能（social intelligence），解决多轮对话中的信用分配问题。这是**智能体能力构建**的方法论研究。\n\n**第二步：正面指标分析**\n\n论文虽然未直接涉及规划、工具使用、记忆等经典Agentic能力，但核心贡献在于：\n- 提出了基于合作博弈论（Shapley值）的新型训练框架\n- 解决了强化学习中如何公平分配信用给智能体各个对话行为的问题\n- 提升了智能体的社会交互能力（social intelligence）\n\n这属于**构建智能体核心能力**的范畴——社会智能是Agentic AI的重要组成部分。\n\n**第三步：排除标准检查**\n\n- 安全相关：不属于安全/对齐研究 ✓\n- 多模态与视觉：纯语言模型，无视觉内容 ✓\n- 图相关技术：无知识图谱或GNN ✓\n- 多智能体拓扑：虽然涉及对话，但研究聚焦于单个智能体的训练框架，非多智能体系统架构 ✓\n\n**第四步：特殊情况的判断**\n\n这篇论文不属于\"将LLM作为工具解决领域问题\"的情况。它是**方法论层面的研究**，提出了SAVOIR这一可泛化的训练框架，用于构建具有社会智能的LLM智能体，类似于提出一种新的Agent训练范式。\n\n**结论**\n\n该论文符合研究者的核心目标——构建和改进LLM智能体的能力。虽然聚焦于社会智能这一特定能力，但其方法论贡献（Shapley-based信用分配框架）对Agentic LLM的训练具有普遍意义，属于智能体构建研究范畴。",
                    "intro_logic": "1. 社会智能（Social intelligence）是驾驭复杂人际互动、实现社会目标的能力，对人类认知至关重要，对日益融入社会应用的人工智能体也愈发关键。\n2. 尽管大语言模型（LLMs）在需要谈判、协作等社交能力的应用中日益普及，但提升其社会智能仍面临挑战，因为社交互动本质上是多轮次的，涉及参与者之间的目标竞争，且需要细致理解单个话语如何影响长期结果。\n3. 近期研究开始通过强化学习（RL）方法应对这些挑战，例如Sotopia-RL尝试将回合级反馈细化为话语级奖励。\n4. 然而，Sotopia-RL的方法存在两个根本局限：其一，其信用分配机制缺乏理论依据，依赖大语言模型启发式地分配奖励，无法保证公平性或准确性；其二，更重要的是，其奖励模型进行的是“回顾性归因”，即根据话语对已观察到的最终结果的贡献来分配功劳，而非评估其“战略价值”——即该话语为促成有利的未来对话轨迹所具备的潜力。\n5. 回顾性归因与战略价值的区分至关重要，因为具有社会智能的行为通常包含一些即时贡献看似微小，但其战略定位能为后续成功解锁关键路径的话语。\n6. 研究问题：如何设计一个理论上有依据的框架，以克服回顾性归因的局限，前瞻性地评估话语的战略价值，并进行公平的信用分配？",
                    "core_insight": "### 1. 关键洞察（The Seed Insight）\n\n**一句话概括**：作者意识到，社交智能中的信用分配问题，其核心不应是回顾性地追溯一个话语对**已发生**结果的贡献，而应是前瞻性地评估该话语为**未来可能**的成功轨迹所创造的**战略潜力**。\n\n**展开解释**：现有方法（如Sotopia-RL）的局限性在于其“回顾性归因”范式。作者洞察到，在战略性的社交互动中，一句话的价值不仅在于它直接促成了什么，更在于它如何改变了未来的对话格局，为后续有利的发展铺平了道路。一个看似平淡的“铺垫”或“试探”，其即时贡献可能很小，但却是后续成功的关键前提。因此，评估的焦点必须从“过去贡献了什么”转向“未来能开启什么”。这一认知突破将信用分配从一个基于历史事实的统计问题，转变为一个基于未来可能性的战略估值问题。\n\n**论文原文证据**：\n> “Second, and more critically, the reward model performs *retrospective attribution*: it assigns credit based on what an utterance contributed to the observed outcome, rather than evaluating its *strategic value* for enabling favorable future trajectories.” (Introduction)\n> “Rather than asking ‘what did this utterance contribute to the final outcome?’, we ask ‘what is the expected value of future interactions given this utterance?’” (Introduction)\n\n### 2. 从洞察到方法的桥梁\n\n这个关键洞察直接、逻辑严密地导向了论文方法的两大支柱，构成了一个完整的“评估什么”和“如何分配”的框架：\n\n1.  **从“前瞻性评估”到“期望效用”**：既然要评估话语的“战略潜力”，就需要量化它在当前状态下所能带来的**未来期望收益**。这自然引用了决策理论中的 **Expected Utility** 概念。具体操作是：给定一个包含部分话语的“联盟”，通过模拟（Rollout）从该状态出发所有可能的未来对话轨迹，并计算这些轨迹最终效用的平均值，以此作为该联盟的“价值”。这完美地将“战略潜力”这一抽象概念，转化为可计算的 `v(S)`。\n\n2.  **从“公平分配战略价值”到“沙普利值”**：在定义了联盟价值 `v(S)` 后，下一个问题是如何将联盟的整体“战略价值”公平地分解到每个参与的个体话语上。作者意识到，这本质上是一个合作博弈中的**收益分配问题**。而 **Shapley Value** 是解决此类问题的公理化方案，它通过考虑一个玩家（此处即话语）在所有可能加入顺序中的**边际贡献**的平均值，来确保分配的公平性（满足效率、对称性、边际性等公理）。因此，Shapley Value 成为了将前瞻性计算出的联盟价值 `v(S)` 公平分配给每个话语 `a_i` 的数学工具。\n\n**推理链条**：关键洞察（评估战略潜力而非历史贡献） → 需要前瞻性估值方法 → 采用 **Expected Utility** 定义价值函数 `v(S)` → 价值 `v(S)` 需公平分配给联盟成员 → 采用合作博弈论中的 **Shapley Value** 进行分配 → 结合两者形成 **SAVOIR** 框架。\n\n### 3. 试错历程\n\n在将这一理论洞察实现为可行方法的过程中，作者遇到了一个主要的、意料之中的技术挑战，并为此调整了方案，衍生出新的子问题。\n\n*   **意料之外的困难/核心挑战**：**计算复杂度爆炸**。Shapley Value 的原始定义要求评估所有 `2^n` 个子集（联盟）的价值 `v(S)`。而每个 `v(S)` 的计算本身又需要进行多次（`J`次）完整的对话模拟（Rollout）。对于一场有 `n` 句话的对话，这种计算成本是完全不可接受的。\n\n*   **方案调整**：作者没有放弃Shapley Value的理论纯洁性，而是采用了高效的近似算法 **KernelSHAP**。KernelSHAP 将Shapley Value的计算巧妙地转化为一个**加权线性回归**问题。通过采样一部分联盟 `S`，计算其价值 `v(S)`，然后通过回归求解最能解释这些 `v(S)` 的个体贡献值（即Shapley Value）。这极大地降低了计算量。\n\n*   **产生的新子问题及解决**：采用KernelSHAP后，新的子问题是：**如何设计高效的抽样策略和回归权重，以用最少的样本获得最准确的Shapley Value估计？**\n    *   **解决方案**：作者利用了Shapley Value的一个性质：极端大小的联盟（空集、全集、单个元素、仅缺一个元素的集合）对于估计边际贡献最为重要。因此，他们采用了 **“智能联盟抽样”** ，优先对这些信息量大的联盟进行采样。\n    *   **论文证据**：“Rather than uniform sampling, we prioritize coalitions at extreme sizes, as shown in Figure 4. Coalitions containing only one or two utterances reveal individual contributions, while coalitions missing only one or two utterances reveal synergistic effects. This strategy improves estimation accuracy with limited budget.” (Section 3.4)\n    *   同时，KernelSHAP 自带的 **SHAP kernel weight** `w_k` 为不同大小的联盟赋予了不同的回归权重，进一步优化了估计效率。\n\n**总结**：作者的实现历程是一个典型的从“理论理想”到“工程可行”的折衷与创新过程。核心洞察（Shapley Value）没有改变，但为了应对计算瓶颈，他们引入了KernelSHAP这一近似估计框架，并进一步优化了其中的抽样策略，从而在保持理论根基的同时，使方法得以在实际的RL训练流程中应用。",
                    "methodology": "好的，我们来用大白话拆解这篇论文。\n\n### **一句话概括核心创新**\n这篇论文的方法，和之前直接用大语言模型（LLM）给对话中的每句话事后打分不同，它**通过模拟未来各种可能的对话走向，来前瞻性地评估每句话的战略价值，并用一个来自合作博弈论的公平分配公式（沙普利值）来给每句话分功劳**。\n\n### **方法执行逻辑拆解**\n整个SAVOIR方法的核心是**如何给AI在对话中说的每一句话计算一个精细的奖励分数**。这个计算过程可以拆解为以下几步：\n\n**第一步：采样“对话片段”**\n- **输入**：一段完整的对话，以及AI在这段对话中说过的所有话（比如10句）。\n- **操作**：从这10句话里，随机挑出一些组合（比如只包含第1、3、5句，或者包含第2、4、6、8句）。这些组合被称为“联盟”。采样时会特意多挑一些极端情况，比如只包含一句话的联盟，或者只缺一句话的联盟。\n- **输出**：一堆不同的话的组合（联盟）。\n- **目的**：为了后续评估这些不同组合的价值。我们不可能评估所有可能的组合（2^10=1024种），所以采样是为了高效估算。\n- **如果不做**：计算量会爆炸，无法进行。\n\n**第二步：评估每个“对话片段”的价值**\n- **输入**：上一步得到的一个“话的组合”（联盟）。\n- **操作**：\n    1.  **重建历史**：根据这个组合，把原始对话中不属于这个组合的AI说的话删掉，只保留组合里的话和对方的回应，拼成一个不完整的对话历史。\n    2.  **模拟未来**：从这个不完整的历史点开始，让AI和对话伙伴的模型接着往下模拟对话，直到结束。这个过程重复几次，得到几条不同的未来对话路径。\n    3.  **计算平均分**：用评价标准（比如目标完成度、关系维护等）给每条模拟出的完整对话打分，然后取平均分。\n- **输出**：这个“话的组合”所对应的一个价值分数。这个分数代表了**从包含这些话的对话状态出发，未来能获得好结果的平均期望**。\n- **目的**：这就是“预期效用”的核心。它不看这句话对已成事实的最终结果贡献了多少，而是看**这句话为未来创造了多少机会**。一句看似平常的铺垫，可能为后续的关键谈判打开了局面，这个方法能捕捉到这种战略价值。\n- **如果不做**：就变回了传统的事后打分，无法评估话语的战略潜力。\n\n**第三步：用“沙普利值”给每句话分功劳**\n- **输入**：所有采样联盟及其对应的价值分数。\n- **操作**：解一个加权回归方程。这个方程的目标是，为每一句话分配一个分数（即沙普利值），使得**所有联盟的预测价值（用联盟内各句话的分数之和来预测）尽可能接近其真实模拟价值**。方程会给“极端规模”的联盟（如单句话或几乎满员的联盟）更高的权重。\n- **输出**：每一句话的原始功劳分数（沙普利值）。\n- **目的**：公平地分配总价值。比如三句话共同促成了一个好结果，但贡献不同。沙普利值能根据每句话在各种组合下的“边际贡献”来公平分配，确保功劳分得合理。\n- **如果不做**：奖励分配可能不公平或不准确，比如把功劳都归给最后一句“成交”，而忽略了前面建立信任的铺垫。\n\n**第四步：训练一个“快速打分模型”**\n- **输入**：大量由上述三步计算出的（对话上下文，某句话，该句话的SAVOIR分数）数据对。\n- **操作**：用一个语言模型（如Qwen-7B）学习这个映射关系。输入上下文和一句话，模型输出一个预测的奖励分数。训练目标是最小化预测分数和SAVOIR计算出的“真实”分数之间的差距。\n- **输出**：一个训练好的奖励模型。\n- **目的**：前三步的计算非常耗时（需要多次模拟对话）。一旦训练好这个奖励模型，它就能在**瞬间**对新的对话给出同样质量的精细奖励，从而可以用于后续高效的强化学习训练。\n- **如果不做**：每次训练AI策略都需要重新进行耗时的模拟计算，效率极低，不可行。\n\n**第五步：用奖励模型训练AI策略**\n- **输入**：训练好的奖励模型，以及一个待训练的AI对话模型（策略）。\n- **操作**：让AI模型与人（或另一个AI）进行对话练习。每说一句话，就用上一步训练好的奖励模型给它一个即时分数。使用强化学习算法，不断调整AI模型，让它说的话能获得更高的奖励分数。\n- **输出**：一个训练好的、更懂社交的AI模型。\n- **目的**：利用精细的奖励信号，直接优化AI的对话策略，让它学会说更有战略眼光的话。\n- **如果不做**：AI只能从最终成败中学习，学不到中间每步的好坏，进步慢且不精细。\n\n### **结合消融实验，解释为什么有效**\n论文的消融实验（表2）清晰地验证了各个组件的必要性：\n\n1.  **哪个组件贡献最大？两者协同效应显著。**\n    - **单独使用“预期效用”（EU-only）**：比基线（Sotopia-RL）提升3.1%。说明**前瞻性评估本身就是一个更强的信号**，解决了“只看结果，忽略战略潜力”的痛点。\n    - **单独使用“沙普利值”（Shapley-only）**：比基线提升4.2%。说明**公平分配功劳的机制本身也有效**，解决了“功劳分配不公”的痛点。\n    - **两者结合（SAVOIR-Full）**：提升7.5%，**效果优于两者单独提升的简单相加**。这证明两个组件解决了**正交**（不同方面）的问题：一个定义了“什么是好”（价值评估），一个定义了“怎么分”（功劳分配），组合起来产生了“1+1>2”的协同效应。\n\n2.  **回扣动机：**\n    - 论文在Introduction中指出的两个核心痛点：**① 现有方法缺乏理论依据（启发式分配）**；**② 是事后归因，而非前瞻性评估**。\n    - 消融实验证明：\n        - **沙普利值** 的引入直接解决了痛点①，提供了有公理保证的公平分配方法。\n        - **预期效用** 的引入直接解决了痛点②，将评估视角从过去转向未来。\n        - 实验数据（两者单独使用均有效，结合效果最佳）强有力地支持了论文的这两个核心主张。\n\n### **这套方法的硬伤在哪里？**\n根据论文的“Limitations”部分，最主要的两个问题是：\n\n1.  **对手越强，效果越差**：这个方法在训练时，AI的陪练对手（Partner）水平是固定的。当面对一个**比训练时遇到的对手强得多的新对手**（比如最新的GPT-4o或Gemini）时，AI的表现会明显下降。因为它的策略是在特定对手水平下优化的，遇到“高手”可能就不灵了。\n2.  **文化局限性**：目前只在英语的SOTOPIA场景中测试。社交规则和智能高度依赖文化背景（比如东方和西方的沟通方式差异很大）。这个方法没有经过多语言、跨文化场景的验证，其普适性存疑。",
                    "additional_insights": "1.  **实验中的反直觉发现**\n    *   **大型推理模型（如OpenAI-o1, Gemini-2.5-Pro）在社交任务上表现不佳**，尽管它们拥有强大的分析推理能力，但其表现甚至不如7B的SAVOIR模型。这表明社交智能可能更需要直觉式的反应，而非深思熟虑的分析链。（依据：第5.1节，表1显示推理模型得分普遍较低，并指出“social intelligence requires qualitatively different skills”）\n    *   **合作伙伴越强，模型表现反而可能下降**。当与能力更强的模型（如Gemini-3-Pro）互动时，SAVOIR的性能会出现显著退化。这与“与更强的对手互动能提升自己”的直觉相悖，暗示固定训练分布可能限制了对更强社交推理者的泛化能力。（依据：第5.3节，图7显示随着伙伴社交智能增强，模型性能下降）\n\n2.  **有启发性的分析或 ablation**\n    *   **Expected Utility (EU) 和 Shapley  attribution 是正交且互补的**。消融实验表明，单独使用EU（前瞻性估值）或Shapley（公平分配）都能带来性能提升，但两者结合效果最佳。这证实了解决信用分配需要同时处理“评估什么价值”和“如何分配价值”这两个不同问题。（依据：第5.2节，表2显示EU-only和Shapley-only均优于基线，且Full模型效果最好）\n    *   **奖励模型训练数据存在一个“关键规模”**。性能提升在数据量从3K增至5K时最为显著，之后增长放缓。这表明学习复杂的信用分配需要达到一定的数据阈值，而非简单的线性增长。（依据：第5.4节，图8显示3K到5K阶段GOAL分数提升最大（+8.6%））\n\n3.  **对领域的新认知**\n    *   **社交智能（Social Intelligence）与推理能力（Reasoning）是两种不同的能力模态**。论文明确指出，专门为增强推理而设计的大型模型（如链式思维模型）在需要社交直觉的任务上反而表现不佳，修正了“更强的推理能力必然带来更好的社交表现”的潜在假设。（依据：摘要及第5.1节指出“social intelligence requires qualitatively different capabilities than analytical reasoning”）\n\n4.  **实用的经验性结论**\n    *   **使用KernelSHAP的加权线性回归来高效近似Shapley值**。直接计算组合价值是指数级的，但通过采样联盟并求解一个加权回归问题，可以大幅降低计算成本，使方法可行。（依据：第3.4节及图5算法描述）\n    *   **在采样联盟时，优先考虑极端大小（极小或极大）的联盟**。因为Shapley核权重赋予这些联盟更高的重要性，它们对估计边际贡献最具有信息量，这种策略能提高采样效率。（依据：第3.4节，图4及“Smart Coalition Sampling”部分）\n\n5.  **局限性中的机会**\n    *   **针对不同能力伙伴的课程学习（Curriculum Learning）**。论文承认模型在面对显著更强的伙伴时性能下降，这提示了一个未来方向：在训练中逐步引入能力更多样化或更强的模拟伙伴，以提升模型的泛化和对抗能力。（依据：第5.3节及“Limitations”部分）\n    *   **跨文化社交智能评估与适应**。作者指出当前工作聚焦于英语和特定文化背景（SOTOPIA），而社交规范具有文化依赖性。这指向了一个有价值的研究方向：构建多语言/跨文化社交基准，并开发能适应不同文化语境的社会智能体。（依据：“Limitations”部分）",
                    "research_value": "### 1. 影响力潜力（Impact）\n**正面证据**：论文提出的方法（SAVOIR）在SOTOPIA基准测试中取得了新的SOTA性能，其7B模型匹配或超越了GPT-4o等大型专有模型。消融实验表明，其核心组件（预期效用和沙普利值）均能独立带来显著性能提升（3.1%和4.2%），且结合后产生协同效应（提升7.5%），为解决社交智能中的信用分配问题提供了一个新的、有理论依据的框架。\n**负面证据或缺失**：该方法计算成本高昂，依赖于离线生成大量模拟对话数据并训练一个奖励模型来加速，这限制了其作为通用工具的便捷性。其影响力目前局限于方法学层面，尚未证明能直接改变更广泛的研究者或实践者的日常研究范式。论文也承认其存在文化局限性和对强对手泛化能力差的问题。\n**判断**：中等\n**理由**：论文在特定任务（SOTOPIA社交对话）上取得了明确的性能突破，并提供了可复现的方法论，这足以影响该细分领域的研究者。然而，其较高的实现复杂度和尚未解决的泛化问题，使其短期内难以成为广泛采用的“标准做法”。\n\n### 2. 不可替代性（Uniqueness）\n**正面证据**：论文明确将“前瞻性评估”（预期效用）与“公平分配”（沙普利值）相结合，以解决现有方法（如Sotopia-RL）的两个核心痛点。这种结合方式，以及将其应用于多轮对话信用分配的具体实现，是新颖的。\n**负面证据或缺失**：预期效用和沙普利值都是成熟的概念，分别源于决策理论和合作博弈论。将它们应用于序列决策和信用分配并非革命性的想法。论文的核心贡献更多在于在一个具体问题（社交对话）上进行了巧妙、系统的工程整合与验证。\n**判断**：中等\n**理由**：论文的核心思想（用前瞻模拟评估价值，用沙普利值分配功劳）本身具有直观合理性，很可能被其他研究团队在较短时间内（例如一两年内）独立构思并实现。其不可替代性主要体现在它是首个在该问题上成功实现并验证此完整框架的工作。\n\n### 3. 时机判断（Timing）\n**正面证据**：随着大语言模型在需要社交能力的应用中普及，提升其社会智能成为一个明确且迫切的需求。论文指出现有基于LLM的启发式信用分配方法存在根本局限，这为引入更严谨的方法创造了机会。论文发现大型推理模型在社交任务上表现不佳，进一步凸显了专门优化方法的必要性。\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：该研究切入的时机非常精准。领域正处于从“直接用大模型”到“如何科学地训练/优化大模型”的转折点，论文抓住了信用分配这一关键瓶颈，并提供了基于经典理论的解决方案，符合领域向精细化、理论化发展的趋势。\n\n### 4. 对现有范式的审视（Challenging Conventions）\n**正面证据**：论文明确挑战了现有主流范式（如Sotopia-RL）的两个“盲目沿用”的做法：1) 依赖LLM进行缺乏理论依据的启发式信用分配；2) 仅进行回顾性的事后归因。它提出用有公理保证的沙普利值替代前者，用基于模拟的预期效用替代后者。\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：论文没有满足于在现有启发式方法上做微小改进，而是直接质疑其理论基础和评估视角的根本缺陷，并提出了一个结构上不同的新框架。这种对现有做法“为何不够好”的清晰剖析和正面挑战，是研究价值的重要体现。\n\n### 5. 核心洞见的清晰度（Core Insight）\n**正面证据**：核心洞见可以清晰地表述为：**评估话语应看其创造未来有利机会的潜力（前瞻性），而非其对已发生结果的贡献（回顾性）；并应基于其在不同语境下的边际贡献来公平分配功劳。**\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：这个洞见简洁有力，直指信用分配问题的两个核心维度（价值定义和分配原则）。它易于理解，且与论文提出的方法（预期效用+沙普利值）形成了直接、完美的对应。\n\n### 6. 风险与可行性（Risk vs. Feasibility）\n**正面证据**：论文通过完整的实验验证了方法的可行性：1) 构建了完整的技术流程（采样、模拟、回归、奖励模型训练）；2) 证明了其性能超越强基线及大型专有模型；3) 消融实验验证了各组件有效性。计算风险通过训练轻量级奖励模型来规避。\n**负面证据或缺失**：方法本身包含风险点：模拟未来的不确定性、采样近似沙普利值的准确性、奖励模型对离线数据质量的依赖。论文在局限性中也承认了面对强对手泛化能力差的风险。\n**判断**：中等\n**理由**：论文成功地将一个理论上优美但计算复杂的方法（沙普利值）工程化实现，并取得了实证成功，证明了其可行性。然而，方法中蕴含的近似和假设（如模拟的保真度）带来了技术风险，使其结果并非“确定性”的，这恰恰是科学探索的一部分。\n\n### 7. 比较优势（Comparative Advantage）\n**正面证据**：无具体证据。输入材料未提供任何关于作者团队背景、过往研究或资源的信息。\n**负面证据或缺失**：基于公开信息，无法判断该团队在博弈论与强化学习交叉领域、或大规模对话模拟计算方面是否有特别的积累或优势。\n**判断**：弱\n**理由**：根据“举证责任在好的一边”的原则，在缺乏任何关于团队独特优势的具体证据时，只能给出“弱”的判断。这并非否定团队的能力，而是表明从现有材料看，此工作更像是一个聪明想法的成功实现，而非依赖于某个团队独有的、难以复制的专长。\n\n---\n- **综合评价**：**有潜力但有明显短板**。这篇论文提出了一个清晰、有理论深度且实验验证充分的框架，在特定任务上取得了显著提升，对所在子领域有明确的贡献。然而，其较高的计算复杂度和已暴露的泛化短板，限制了其作为通用解决方案的即时影响力。\n- **最致命的弱点**：**方法的性能严重依赖于训练时对手（环境）的分布，面对更强或不同的社交伙伴时泛化能力显著下降**。这削弱了其作为鲁棒社交智能通用训练方法的可信度。\n- **如果要做得更好**：1) **提升泛化能力**：在训练中引入对手能力的课程学习或多样性增强，而非固定对手。2) **探索效率与效果的平衡**：研究更高效的模拟策略或沙普利值近似方法，降低计算开销，使其更易被采用。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“质疑默认”**。论文没有接受当前领域惯用的LLM启发式信用分配方法，而是深入剖析其缺陷并提出了一个原理上不同的方案。\n    - **最不符合**：**“简单性”**。论文的最终方案（SAVOIR）涉及多步采样、模拟、回归和模型训练，是一个相对复杂、不够“简洁优美”的工程系统。",

                    "summary_translation": "社交智能（Social Intelligence）——即驾驭复杂人际互动的能力——对语言智能体构成了根本性挑战。通过强化学习训练此类智能体需要解决信用分配问题（Credit Assignment Problem）：如何确定单个话语对多轮对话结果的贡献。现有方法直接使用语言模型分配回合级奖励，产生的归因具有回溯性且缺乏理论依据。我们提出SAVOIR（ShApley Value fOr SocIal RL），这是一个基于合作博弈论（Cooperative Game Theory）的新型理论框架。该方法融合了两个互补原则：期望效用（Expected Utility）将评估从回溯归因转向前瞻性价值评估，捕捉话语为实现有利未来轨迹的战略潜力；沙普利值（Shapley Values）通过效率性、对称性与边际贡献公理保证，确保公平的信用分配。在SOTOPIA基准测试上的实验表明，SAVOIR在所有评估设置中均实现了新的最先进性能，我们的70亿参数模型达到或超越了包括GPT-4o和Claude-3.5-Sonnet在内的专有模型。值得注意的是，即使大型推理模型也持续表现不佳，这表明社交智能所需的能力与解析推理能力存在本质差异。"

    "2026-04-23": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-23)\n\n\u4eca\u65e5AI\u7814\u7a76\u5448\u73b0\u51fa\u4e00\u4e2a\u9c9c\u660e\u8d8b\u52bf\uff1a**\u667a\u80fd\u4f53\uff08Agent\uff09\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u81ea\u52a8\u5316\u5de5\u7a0b\u6b63\u6210\u4e3a\u6838\u5fc3\u6218\u573a**\u3002\u4ece\u5de5\u4e1a\u7ea7\u5de5\u5177\u8c03\u7528\u5230\u5f00\u653e\u73af\u5883\u7ec8\u8eab\u5b66\u4e60\uff0c\u4eceGUI\u81ea\u52a8\u5316\u5230\u6e38\u620f\u7b56\u7565\u751f\u6210\uff0c\u7814\u7a76\u8005\u4eec\u5728\u63a2\u7d22\u5982\u4f55\u8ba9AI\u7cfb\u7edf\u6446\u8131\"\u4e00\u6b21\u6027\"\u4efb\u52a1\u6267\u884c\u6a21\u5f0f\uff0c\u8f6c\u5411\u80fd\u591f\u6301\u7eed\u79ef\u7d2f\u7ecf\u9a8c\u3001\u81ea\u6211\u8bca\u65ad\u5931\u8d25\u3001\u5e76\u81ea\u52a8\u9002\u914d\u65b0\u9886\u57df\u7684\"\u6d3b\"\u7cfb\u7edf\u3002\u5c24\u4e3a\u503c\u5f97\u5173\u6ce8\u7684\u662f\uff0c\u591a\u7bc7\u8bba\u6587\u4e0d\u7ea6\u800c\u540c\u5730\u6307\u5411\u4e86**\u5143\u5b66\u4e60\uff08Meta-Learning\uff09\u4e0e\u81ea\u52a8\u5316\u5de5\u7a0b**\u2014\u2014\u8ba9AI\u4e0d\u4ec5\u5b66\u4f1a\u505a\u4e8b\uff0c\u66f4\u5b66\u4f1a\u5982\u4f55\u5b66\u4e60\u3001\u5982\u4f55\u6784\u5efa\u81ea\u5df1\u3002\n\n---\n\n## \u4e3b\u9898\u4e00\uff1a\u81ea\u6211\u8fdb\u5316\u667a\u80fd\u4f53\u2014\u2014\u4ece\"\u65e0\u72b6\u6001\"\u5230\"\u7ec8\u8eab\u5b66\u4e60\"\n\n**\u6838\u5fc3\u6d1e\u5bdf**\uff1aLLM\u667a\u80fd\u4f53\u6b63\u4ece\"\u6bcf\u96c6\u6e05\u96f6\"\u8d70\u5411\u771f\u6b63\u7684\u7ecf\u9a8c\u7d2f\u79ef\uff0c\u4f46\u5173\u952e\u74f6\u9888\u4e0d\u5728\u4e8e\"\u8bb0\u4f4f\u4ec0\u4e48\"\uff0c\u800c\u5728\u4e8e\"\u5982\u4f55\u8bca\u65ad\u5e76\u4f7f\u7528\"\u8fd9\u4e9b\u8bb0\u5fc6\u3002\n\n- **Agent Evolving Learning (AEL)** \u63d0\u51fa\u53cc\u65f6\u95f4\u5c3a\u5ea6\u6846\u67b6\uff1a\u5feb\u65f6\u95f4\u5c3a\u5ea6\u7528Thompson Sampling\u9009\u62e9\u8bb0\u5fc6\u68c0\u7d22\u7b56\u7565\uff0c\u6162\u65f6\u95f4\u5c3a\u5ea6\u901a\u8fc7LLM\u53cd\u601d\u8bca\u65ad\u5931\u8d25\u6a21\u5f0f\u5e76\u6c 65b0\u4efb\u52a1\u4e0a\u5feb\u901f\u6536\u655b\u7684**\u5143\u534f\u8bae\u039b^(best)**\u3002\u8fd9\u6807\u5fd7\u7740\u4ece\"\u624b\u52a8\u5de5\u7a0b\"\u5230\"\u81ea\u52a8\u5316\u5de5\u7a0b\"\u518d\u5230**\"\u81ea\u52a8\u5316\u7684\u81ea\u52a8\u5316\u8bbe\u8ba1\"**\u7684\u8dc3\u8fc1\u3002(2604.21003 [cs.AI])\n\n- **AgenticQwen** \u9762\u5411\u5de5\u4e1a\u7ea7\u5de5\u5177\u8c03\u7528\u573a\u666f\uff0c\u901a\u8fc7**\u53cc\u6570\u636e\u98de\u8f6e**\u5b9e\u73b0\u5c0f\u6a21\u578b\uff087B\u7ea7\uff09\u7684Agent\u80fd\u529b\u8dc3\u5347\uff1a\u63a8\u7406\u98de\u8f6e\u4ece\u9519\u8bef\u4e2d\u5b66\u4e60\u589e\u52a0\u4efb\u52a1\u96be\u5ea6\uff0cAgent\u98de\u8f6e\u5c06\u7ebf\u6027\u5de5\u4f5c\u6d41\u6269\u5c55\u4e3a\u591a\u5206\u652f\u884c\u4e3a\u6811\u3002\u5728\u641c\u7d22\u548c\u6570\u636e\u5206\u6790\u4efb\u52a1\u4e0a\u903c\u8fd1\u5927\u6a21\u578b\u8868\u73b0\uff0c\u8bc1\u660e**\u5408\u6210\u6570\u636e+\u591a\u8f6eRL**\u662f\u6210\u672c\u53d7\u9650\u573a\u666f\u7684\u53ef\u884c\u8def\u5f84\u3002(2604.21590 [cs.CL])\n\n---\n\n## \u4e3b\u9898\u4e09\uff1aGUI\u81ea\u52a8\u5316\u2014\u2014\u4ece\"\u80fd\u505a\u4e8b\"\u5230\"\u77e5\u8fdb\u9000\"\n\n**\u6838\u5fc3\u6d1e\u5bdf**\uff1aGUI\u667a\u80fd\u4f53\u7684\u6838\u5fc3\u969c\u788d\u5df2\u4ece\"\u611f\u77e5-\u884c\u52a8\"\u8f6c\u5411\u5143\u8ba4\u77e5\u80fd\u529b\u2014\u2014\u4f55\u65f6\u8be5\u505c\u6b62\u3001\u5982\u4f55\u8df3\u51fa\u5faa\u73af\u3001\u4f55\u65f6\u6c42\u52a9\u641c\u7d22\u3002\n\n- **VLAA-GUI** \u4ee5\u6a21\u5757\u5316\u8bbe\u8ba1\u76f4\u51fb\u4e09\u5927\u987d\u75be\uff1a**\u5f3a\u5236\u5b8c\u6574\u6027\u9a8c\u8bc1\u5668**\u62d2\u7edd\u7f3a\u4e4f\u89c6\u89c9\u8bc1\u636e\u7684\u5b8c\u6210\u58f0\u660e\uff0c**\u5f3a\u5236\u5faa\u73af\u963b\u65ad\u5668**\u901a\u8fc7\u591a\u5c42\u7ea7\u8fc7\u6ee4\uff08\u6a21\u5f0f\u5207\u6362\u2192\u7b56\u7565\u53d8\u66f4\u2192\u53cd\u601d\u7ed1\u5b9a\uff09\u5c06\u8fd1\u534a\u6d6a\u8d39\u6b65\u9aa4\u6d88\u9664\uff0c**\u6309\u9700\u641c\u7d22\u667a\u80fd\u4f53**\u5904\u7406\u964c\u751f u4f30\u667a\u80fd\u4f53**\u6301\u7eed\u6280\u80fd\u5b66\u4e60**\u65b9\u6cd5\u7684\u57fa\u51c6\u3002\u5b83\u5305\u542b20\u4e2a\u6e90\u81ea\u771f\u5b9e\u6280\u80fd\u5206\u7c7b\u7684\u4efb\u52a1\uff0c\u4ece\u6280\u80fd\u8d28\u91cf\u3001\u6267\u884c\u8f68\u8ff9\u548c\u4efb\u52a1\u7ed3\u679c\u4e09\u4e2a\u5c42\u9762\u8fdb\u884c\u8bc4\u4f30\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u73b0\u6709\u7684\u6301\u7eed\u5b66\u4e60\u65b9\u6cd5\uff08\u5982\u5229\u7528\u5355\u6b21\u793a\u4f8b\u3001\u81ea\u6211/\u6559\u5e08\u53cd\u9988\uff09\u867d\u7136\u4f18\u4e8e\u65e0\u6280\u80fd\u57fa\u7ebf\uff0c\u4f46**\u6ca1\u6709\u4e00\u79cd\u65b9\u6cd5\u80fd\u5728\u6240\u6709\u4efb\u52a1\u548c\u6a21\u578b\u4e0a\u5168\u9762\u9886\u5148**\u3002\u5173\u952e\u6d1e\u89c1\u5728\u4e8e\uff1a\u5916\u90e8\u53cd\u9988\u80fd\u5e26\u6765\u771f\u6b63\u6539\u8fdb\uff0c\u800c\u4ec5\u9760\u81ea\u6211\u53cd\u9988\u53ef\u80fd\u5bfc\u81f4**\u9012\u5f52\u6f02\u79fb**\u3002**(2604.20087 [cs.CL])**\n\n#### 2. \u8fb9\u7f18\u90e8\u7f72\uff1a\u5c0f\u6a21\u578b\u7684\u201c\u5927\u529b\u51fa\u5947\u8ff9\u201d\n\u5728\u6210\u672c\u3001\u5ef6\u8fdf\u548c\u9690\u79c1\u7684\u9a71\u52a8\u4e0b\uff0c\u8ba9\u5c0f\u578b\u8bed\u8a00\u6a21\u578b\uff08SLM\uff09\u80dc\u4efb\u590d\u6742\u7684\u6df1\u5ea6\u7814\u7a76\u4efb\u52a1\uff0c\u662f\u8d70\u5411\u5927\u89c4\u6a21\u73b0\u5b9e\u90e8\u7f72\u7684\u5173\u952e\u4e00\u6b65\u3002\n\n*   **DR-Venus\uff1a\u4ec5\u75281\u4e07\u6761\u5f00\u653e\u6570\u636e\uff0c\u8bad\u7ec3\u524d\u6cbf\u7684\u8fb9\u7f18\u7ea7\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53**\n    \u8fd9\u9879\u7814\u7a76\u5c55\u793a\u4e86\u5982\u4f55\u5728\u6709\u9650\u6570\u636e\u4e0b\uff0c\u901a\u8fc7\u63d0\u5347**\u6570\u636e\u8d28\u91cf\u548c\u5229\u7528\u7387**\uff0c\u8bad\u7ec3\u51fa\u5f3a\u5927\u7684\u5c0f\u578b\uff084B\u53c2\u6570\uff09\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53 **DR-Venus**\u3002\u5176\u79d8\u8bc0\u5728\u4e8e\u4e24\u9636\u6bb5\u8bad\u7ec3\u6cd5\uff1a\u9996\u5148\u901a\u8fc7**\u667a\u80fd\u4f53\u76d1\u7763\u5fae\u8c03\uff08Agentic SFT\uff09** \u5efa\u7acb\u57fa\u7840\u80fd\u529b\uff0c\u518d\u901a\u8fc7\u521b\u65b0\u7684**\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\uff08Agentic RL\uff09**\uff08\u4f7f\u7528\u57fa\u4e8e\u4fe1\u606f\u589e\u76ca\u7684\u56de\u5408\u7ea7\u5956\u52b1\uff09\u63d0\u5347\u957f\u7a0b\u4efb\u52a1\u7684\u53ef\u9760\u6027\u3002\u7ed3\u679c\u8868\u660e\uff0c4B\u6a21\u578b\u5df2\u5177\u5907\u60ca\u4eba\u6f5c\u529b\uff0c\u663e\u8457\u7f29\u5c0f\u4e86\u4e0e\u66f4\u5927\u6a21\u578b\uff0830B\u7ea7\uff09\u7684\u5dee\u8ddd\u3002**(2604.19859 [cs.CL])**\n\n#### 3. \u4ece\u201c\u624b\u5de5\u4f5c\u574a\u201d\u5230\u201c\u81ea\u52a8\u5316\u5de5\u5382\u201d\uff1a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u81ea\u6211\u8fdb\u5316\n\u8bbe\u8ba1\u590d\u6742\u7684\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u5982\u540c\u7cbe\u5bc6\u7684\u5de5\u7a0b\uff0c\u4f20\u7edf\u4f18\u5316\u65b9\u6cd5\u6548\u7387\u4f4e\u4e0b\u3002\u80fd\u5426\u8ba9\u7cfb\u7edf\u5b66\u4f1a\u81ea\u6211\u4f18\u5316\u3001\u81ea\u6211\u8fdb\u5316\uff1f\n\n*   **Learning to Evolve\uff1a\u901a\u8fc7\u6587\u672c\u53c2\u6570\u56fe\u4f18\u5316\u5b9e\u73b0\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u81ea\u6211\u6539\u8fdb\u6846\u67b6**\n    \u672c\u6587\u63d0\u51fa **TPGO** \u6846\u67b6\uff0c\u8ba9\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u5b66\u4f1a\u81ea\u6211\u8fdb\u5316\u3002\u5176\u6838\u5fc3\u662f\u5c06MAS\u5efa\u6a21\u4e3a**\u6587\u672c\u53c2\u6570\u56fe\uff08TPG\uff09**\uff0c\u4ece\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6**\u6587\u672c\u68af\u5ea6**\u6765\u6307\u5bfc\u4f18\u5316\u3002\u6700\u5177\u521b\u65b0\u6027\u7684\u662f **GRAO** \u7b56\u7565\uff0c\u8fd9\u662f\u4e00\u79cd\u5143\u5b66\u4e60\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u5386\u53f2\u4f18\u5316\u7ecf\u9a8c\uff0c\u8ba9\u4f18\u5316\u5668\u81ea\u8eab\u4e0d\u65ad\u5b66\u4e60\u5982\u4f55\u66f4\u6709\u6548\u5730\u6539\u8fdb\u7cfb\u7edf\uff0c\u5b9e\u73b0\u4e86\u201c**\u5b66\u4e60\u5982\u4f55\u4f18\u5316**\u201d\u7684\u98de\u8dc3\u3002**(2604.20714 [cs.AI])**\n\n*   **Forage V2\uff1a\u81ea\u6cbb\u667a\u80fd\u4f53\u7ec4\u7ec7\u4e2d\u7684\u77e5\u8bc6\u8fdb\u5316\u4e0e\u8fc1\u79fb**\n    \u9762\u5bf9\u5f00\u653e\u4e16\u754c\u4efb\u52a1\uff0c\u667a\u80fd\u4f53\u5e38\u56e0\u201c\u5206\u6bcd\u76f2\u89c6\u201d\u800c\u4f4e\u4f30\u4efb\u52a1\u8303\u56f4\u3002**Forage V2** \u5c06\u667a\u80fd\u4f53\u67b6\u6784\u5347\u7ea7\u4e3a\u4e00\u4e2a**\u5b66\u4e60\u578b\u7ec4\u7ec7**\uff0c\u901a\u8fc7\u5236\u5ea6\u8bbe\u8ba1\uff08\u5ba1\u8ba1\u5206\u79bb\u3001\u5408\u7ea6\u534f\u8bae\u3001\u7ec4\u7ec7\u8bb0\u5fc6\uff09\u5b9e\u73b0\u8de8\u4efb\u52a1\u8fd0\u884c\u7684**\u77e5\u8bc6\u79ef\u7d2f**\u548c\u8de8\u6a21\u578b\u80fd\u529b\u7684**\u77e5\u8bc6\u8fc1\u79fb**\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5c06\u5f3a\u6a21\u578b\uff08Opus\uff09\u7684\u77e5\u8bc6\u8d4b\u4e88\u5f31\u6a21\u578b\uff08Sonnet\uff09\uff0c\u80fd\u5927\u5e45\u7f29\u5c0f\u6027\u80fd\u5dee\u8ddd\u3001\u964d\u4f4e\u6210\u672c\u5e76\u52a0\u901f\u6536\u655b\uff0c\u8bc1\u660e\u4e86**\u7ec4\u7ec7\u77e5\u8bc6**\u7684\u6a21\u578b\u65e0\u5173\u6027\u548c\u53ef\u8f6c\u79fb\u6027\u3002**(2604.19837 [cs.AI])**\n\n#### 4. \u751f\u6210\u5373\u4f18\u5316\uff1a\u521b\u610f\u4ea7\u7269\u7684\u8fed\u4ee3\u5f0f\u7cbe\u70bc\n\u4e00\u6b21\u6027\u751f\u6210\u5f80\u5f80\u96be\u4ee5\u4ea7\u51fa\u9ad8\u8d28\u91cf\u3001\u5bcc\u6709\u521b\u610f\u7684\u590d\u6742\u4ea7\u7269\uff08\u5982\u6e38\u620f\uff09\u3002\u5982\u4f55\u6784\u5efa\u652f\u6301\u53ef\u89e3\u91ca\u3001\u6e10\u8fdb\u5f0f\u6539\u8fdb\u7684\u751f\u6210\u7cfb\u7edf\uff1f\n\n*   **CreativeGame\uff1a\u5b9e\u73b0\u673a\u5236\u611f\u77e5\u7684\u521b\u610f\u6e38\u620f\u8fed\u4ee3\u751f\u6210**\n    \u672c\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u4e2a\u7528\u4e8e\u8fed\u4ee3\u751f\u6210HTML5\u6e38\u620f\u7684**\u591a\u667a\u80fd\u4f53\u7cfb\u7edf**\u3002\u5176\u6838\u5fc3\u521b\u65b0\u5728\u4e8e\u5c06\u6e38\u620f**\u673a\u5236**\u4f5c\u4e3a\u53ef\u89c4\u5212\u3001\u8ffd\u8e2a\u548c\u8bc4\u4f30\u7684\u663e\u5f0f\u5bf9\u8c61\uff0c\u800c\u975e\u4e8b\u540e\u63cf\u8ff0\u3002\u7cfb\u7edf\u901a\u8fc7**\u4ee3\u7406\u5956\u52b1**\uff08\u57fa\u4e8e\u7a0b\u5e8f\u5316\u4fe1\u53f7\uff09\u3001**\u8c31\u7cfb\u8bb0\u5fc6**\uff08\u8de8\u7248\u672c\u7ecf\u9a8c\u79ef\u7d2f\uff09\u548c**\u8fd0\u884c\u65f6\u9a8c\u8bc1**\uff0c\u652f\u6301\u6e38\u620f\u7684\u7248\u672c\u95f4\u6f14\u5316\u3002\u6848\u4f8b\u663e\u793a\uff0c\u673a\u5236\u5c42\u9762\u7684\u521b\u65b0\u53ef\u4ee5\u5728\u540e\u7eed\u7248\u672c\u4e2d\u6d8c\u73b0\uff0c\u5e76\u53ef\u901a\u8fc7\u7248\u672c\u8bb0\u5f55\u76f4\u63a5\u68c0\u89c6\u3002**(2604.19926 [cs.AI])**\n\n#### 5. \u5de5\u5177\u4f7f\u7528\u7684\u201c\u7cbe\u786e\u5236\u5bfc\u201d\uff1a\u63d0\u793a\u4e0e\u5de5\u5177\u63cf\u8ff0\u7684\u8054\u5408\u4f18\u5316\n\u5f53\u667a\u80fd\u4f53\u9700\u8981\u8c03\u7528\u5927\u91cf\u4e13\u4e1a\u5de5\u5177\u65f6\uff0c\u6a21\u7cca\u7684\u5de5\u5177\u63cf\u8ff0\u548c\u901a\u7528\u6307\u4ee4\u5e38\u5bfc\u81f4\u8c03\u7528\u5931\u8d25\u3002\u5982\u4f55\u5b9e\u73b0\u7cbe\u51c6\u7684\u5de5\u5177\u8c03\u7528\uff1f\n\n*   **JTPRO\uff1a\u9762\u5411\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u8054\u5408\u5de5\u5177-\u63d0\u793a\u53cd\u601d\u4f18\u5316\u6846\u67b6**\n    \u8be5\u7814\u7a76\u6307\u51fa\u5de5\u5177\u8c03\u7528\u4e0d\u53ef\u9760\u7684\u4e24\u5927\u6839\u6e90\uff1a**\u901a\u7528\u63d0\u793a**\u5ffd\u7565\u5de5\u5177\u7ec6\u8282\uff0c**\u6b20\u89c4\u8303\u7684\u5de5\u5177\u6a21\u5f0f**\u7f3a\u4e4f\u4f7f\u7528\u6307\u5bfc\u3002**JTPRO** \u6846\u67b6\u901a\u8fc7\u57fa\u4e8e\u6267\u884c\u8f68\u8ff9\u7684\u53cd\u601d\uff0c**\u8054\u5408\u4f18\u5316**\u5168\u5c40\u6307\u4ee4\u548c\u6bcf\u4e2a\u5de5\u5177\u7684\u8be6\u7ec6\u6a21\u5f0f/\u53c2\u6570\u63cf\u8ff0\uff0c\u4ece\u800c\u5728\u5927\u578b\u5de5\u5177\u5e93\u4e2d\u5b9e\u73b0\u7cbe\u51c6\u7684\u5de5\u5177\u9009\u62e9\u548c\u53c2\u6570\u586b\u5145\u3002\u5b9e\u9a8c\u8bc1\u660e\uff0c\u8054\u5408\u4f18\u5316\u6bd4\u5355\u72ec\u4f18\u5316\u4efb\u4e00\u7ec4\u4ef6\u66f4\u6709\u6548\u3001\u66f4\u9c81\u68d2\u3002**(2604.19821 [cs.AI])**\n\n---\n\n### \u4eca\u65e5\u770b\u70b9\n\n*   **\u667a\u80fd\u4f53\u5de5\u7a0b\u8fc8\u5411\u201c\u81ea\u52a8\u5316\u5de5\u5382\u201d**\uff1a\u4eca\u65e5\u591a\u7bc7\u8bba\u6587\uff08TPGO, Forage V2, CreativeGame\uff09\u5171\u540c\u6307\u5411\u4e00\u4e2a\u8d8b\u52bf\uff1a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u6784\u5efa\u6b63\u4ece\u4f9d\u8d56\u4eba\u5de5\u8bbe\u8ba1\u7684\u201c\u624b\u5de5\u4f5c\u574a\u201d\uff0c\u8f6c\u5411\u652f\u6301**\u81ea\u52a8\u5316\u4f18\u5316**\u3001**\u6301\u7eed\u5b66\u4e60**\u548c**\u77e5\u8bc6\u4f20\u627f**\u7684\u201c\u81ea\u52a8\u5316\u5de5\u5382\u201d\u3002**GRAO** \u7684\u201c\u5b66\u4e60\u5982\u4f55\u4f18\u5316\u201d\u4e0e **Forage V2** \u7684\u201c\u7ec4\u7ec7\u77e5\u8bc6\u201d\u6982\u5ff5\uff0c\u662f\u8fd9\u4e00\u8303\u5f0f\u8dc3\u8fc1\u7684\u6838\u5fc3\u6807\u5fd7\u3002\n*   **\u5c0f\u6a21\u578b\u6f5c\u529b\u518d\u83b7\u6709\u529b\u5b9e\u8bc1**\uff1a**DR-Venus** \u7684\u7814\u7a76\u4ee5\u4e25\u8c28\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u901a\u8fc7\u9ad8\u8d28\u91cf\u7684\u6570\u636e\u5904\u7406\u548c\u9488\u5bf9\u6027\u7684\u8bad\u7ec3\u65b9\u6cd5\uff08\u5982**\u4fe1\u606f\u589e\u76ca\u5f3a\u5316\u5b66\u4e60**\uff09\uff0c\u53c2\u6570\u91cf\u4ec54B\u7684\u6a21\u578b\u53ef\u4ee5\u5728\u590d\u6742\u7684\u6df1\u5ea6\u7814\u7a76\u4efb\u52a1\u4e0a\u903c\u8fd1\u751a\u81f3\u8d85\u8d8a\u66f4\u5927\u6a21\u578b\u7684\u8868\u73b0\u3002\u8fd9\u4e3a\u8fb9\u7f18\u8ba1\u7b97\u548c\u4f4e\u6210\u672c\u90e8\u7f72\u63d0\u4f9b\u4e86\u6781\u5177\u8bf4\u670d\u529b\u7684\u6280\u672f\u8def\u5f84\uff0c\u6311\u6218\u4e86\u201c\u667a\u80fd\u4f53\u80fd\u529b\u5fc5\u987b\u4f9d\u8d56\u5927\u6a21\u578b\u201d\u7684\u56fa\u6709\u8ba4\u77e5\u3002\n*   **\u201c\u7ec4\u7ec7\u77e5\u8bc6\u201d\u6210\u4e3a\u667a\u80fd\u4f53\u53ef\u9760\u6027\u7684\u65b0\u57fa\u77f3**\uff1a**Forage V2** \u63d0\u51fa\u7684**\u6a21\u578b\u65e0\u5173\u3001\u53ef\u8f6c\u79fb\u7684\u7ec4\u7ec7\u77e5\u8bc6**\u662f\u4e00\u4e2a\u6df1\u523b\u7684\u67b6\u6784\u6d1e\u89c1\u3002\u5b83\u610f\u5473\u7740\u667a\u80fd\u4f53\u7684\u53ef\u9760\u6027\u4e0d\u4ec5\u53ef\u4ee5\u6765\u81ea\u6a21\u578b\u672c\u8eab\u7684\u7f29\u653e\uff0c\u66f4\u53ef\u4ee5\u901a\u8fc7\u5236\u5ea6\u5316\u7684**\u77e5\u8bc6\u79ef\u7d2f\u4e0e\u7ee7\u627f**\u6765\u83b7\u5f97\u3002\u8fd9\u4e3a\u6784\u5efa\u7a33\u5b9a\u3001\u53ef\u8fed\u4ee3\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u5f00\u8f9f\u4e86\u65b0\u7684\u8bbe\u8ba1\u54f2\u5b66\uff0c\u5373\u201c**\u901a\u8fc7\u6539\u5584\u7ec4\u7ec7\u6765\u6539\u5584\u4e2a\u4f53**\u201d\u3002\n*   **\u8bc4\u4f30\u4fe1\u53f7\u4ece\u201c\u4e3b\u89c2\u8bc4\u5224\u201d\u8f6c\u5411\u201c\u5ba2\u89c2\u673a\u5236\u201d**\uff1a\u65e0\u8bba\u662f **SkillLearnBench** \u5f3a\u8c03\u7684\u591a\u7ef4\u5ea6\u57fa\u51c6\uff0c\u8fd8\u662f **CreativeGame** \u4f7f\u7528\u7684**\u7a0b\u5e8f\u5316\u4ee3\u7406\u5956\u52b1**\uff0c\u90fd\u53cd\u6620\u51fa\u7814\u7a76\u754c\u6b63\u52aa\u529b\u6446\u8131\u5bf9LLM\u4e3b\u89c2\u8bc4\u5206\u7684\u8fc7\u5ea6\u4f9d\u8d56\uff0c\u8f6c\u5411\u66f4\u5ba2\u89c2\u3001\u53ef\u91cf\u5316\u7684\u8bc4\u4f30\u4fe1\u53f7\u3002\u8fd9\u5bf9\u4e8e\u63a8\u52a8\u751f\u6210\u5f0fAI\u548c\u667a\u80fd\u4f53\u6280\u672f\u5728\u4e25\u8c28\u3001\u53ef\u63a7\u7684\u65b9\u5411\u53d1\u5c55\u81f3\u5173\u91cd\u8981\u3002",
    "2026-04-21": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-21)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u805a\u7126\u4e8e\u63d0\u5347AI\u7cfb\u7edf\u7684\u201c\u8f6f\u5b9e\u529b\u201d\u4e0e\u957f\u671f\u6548\u80fd\u3002\u4e00\u65b9\u9762\uff0c\u7814\u7a76\u8005\u4eec\u81f4\u529b\u4e8e\u4f18\u5316\u7ec8\u7aef\u667a\u80fd\u4f53\u7684\u957f\u671f\u8fd0\u884c\u6548\u7387\uff0c\u901a\u8fc7\u521b\u65b0\u7684\u4e0a\u4e0b\u6587\u538b\u7f29\u673a\u5236\u6765\u5e94\u5bf9\u4efb\u52a1\u6b65\u6570\u589e\u957f\u5e26\u6765\u7684\u6210\u672c\u6311\u6218\u3002\u53e6\u4e00\u65b9\u9762\uff0c\u5bf9\u4e8eAI\u7684\u793e\u4ea4\u667a\u80fd\u8fd9\u4e00\u590d\u6742\u80fd\u529b\uff0c\u7814\u7a76\u4e0d\u518d\u6ee1\u8db3\u4e8e\u7aef\u5230\u7aef\u7684\u9ed1\u7bb1\u8bad\u7ec3\uff0c\u800c\u662f\u5f15\u5165\u4e25\u8c28\u7684\u7406\u8bba\u5de5\u5177\uff08\u5982\u535a\u5f08\u8bba\uff09\u6765\u7cbe\u786e\u8bc4\u4f30\u548c\u5851\u9020\u5bf9\u8bdd\u884c\u4e3a\u3002\u8fd9\u4e24\u6761\u8def\u5f84\u5171\u540c\u6307\u5411\u4e00\u4e2a\u8d8b\u52bf\uff1a\u5728\u8ffd\u6c42\u6a21\u578b\u80fd\u529b\u4e0a\u9650\u7684\u540c\u65f6\uff0c\u5bf9\u7cfb\u7edf\u6548\u7387\u3001\u53ef\u89e3\u91ca\u6027\u4e0e\u884c\u4e3a\u8d28\u91cf\u7684\u7cbe\u7ec6\u5316\u8bbe\u8ba1\u6b63\u53d8\u5f97\u540c\u7b49\u91cd\u8981\u3002\n\n---\n\n### \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n#### \u6548\u7387\u9769\u547d\uff1a\u8ba9\u7ec8\u7aef\u4ee3\u7406\u66f4\u201c\u806a\u660e\u201d\u5730\u5de5\u4f5c\n\u7ec8\u7aef\u667a\u80fd\u4f53\u5728\u6267\u884c\u957f\u5468\u671f\u3001\u591a\u6b65\u9aa4\u4efb\u52a1\u65f6\uff0c\u4f1a\u79ef\u7d2f\u6d77\u91cf\u7684\u539f\u59cb\u73af\u5883\u53cd\u9988\u4f5c\u4e3a\u5386\u53f2\u4e0a\u4e0b\u6587\uff0c\u8fd9\u5bfc\u81f4\u8ba1\u7b97\u6210\u672c\u6025\u5267\u4e0a\u5347\u3002\u4eca\u65e5\u7684\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u79cd\u81ea\u8fdb\u5316\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u65e8\u5728\u8ba9\u4ee3\u7406\u5b66\u4f1a\u201c\u5fd8\u8bb0\u201d\u5197\u4f59\uff0c\u53ea\u8bb0\u4f4f\u7cbe\u9ad3\u3002\n\n*   **TACO\uff1a\u81ea\u8fdb\u5316\u7684\u7ec8\u7aef\u4ee3\u7406\u538b\u7f29\u6846\u67b6**\n    \u672c\u6587\u6307\u51fa\uff0c\u5728\u957f\u89c6\u91ce\u7ec8\u7aef\u4efb\u52a1\u4e2d\uff0c\u4fdd\u7559\u6240\u6709\u539f\u59cb\u89c2\u5bdf\u5386\u53f2\u4f1a\u5bfc\u81f4\u4ee4\u724c\u6210\u672c\u5448\u4e8c\u6b21\u65b9\u589e\u957f\uff0c\u4e25\u91cd\u963b\u788d\u6548\u7387\u3002\u4e3a\u6b64\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86 **TACO**\uff0c\u4e00\u4e2a\u5373\u63d2\u5373\u7528\u7684\u81ea\u8fdb\u5316\u538b\u7f29\u6846\u67b6\u3002\u5b83\u80fd\u591f\u4ece\u667a\u80fd\u4f53\u7684\u4ea4\u4e92\u8f68\u8ff9\u4e2d\u81ea\u52a8\u53d1\u73b0\u5e76\u4f18\u5316\u538b\u7f29\u89c4\u5219\uff0c\u4ece\u800c\u4e3a\u73b0\u6709\u7ec8\u7aef\u4ee3\u7406\u201c\u51cf\u8d1f\u201d\u3002\u5b9e\u9a8c\u8868\u660e\uff0cTACO\u80fd\u5728\u964d\u4f4e\u7ea610%\u4ee4\u724c\u5f00\u9500\u7684\u540c\u65f6\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u63d0\u5347\u6027\u80fd\uff0c\u6216\u5728\u76f8\u540c\u9884\u7b97\u4e0b\u83b7\u5f972%-3%\u7684\u51c6\u786e\u7387\u63d0\u5347\uff0c\u8bc1\u660e\u4e86\u5176\u6709\u6548\u6027\u548c\u901a\u7528\u6027\u3002\n    **(2604.19572 [cs.CL])**\n\n#### \u793e\u4ea4\u667a\u80fd\uff1a\u4ece\u201c\u611f\u89c9\u201d\u5230\u201c\u516c\u5f0f\u201d\u7684\u8fdb\u5316\n\u5982\u4f55\u8ba9AI\u5177\u5907\u5f97\u4f53\u7684\u793e\u4ea4\u80fd\u529b\uff1f\u4f20\u7edf\u7684\u57fa\u4e8e\u8bed\u8a00\u6a21\u578b\u7684\u5956\u52b1\u5206\u914d\u65b9\u6cd5\u7f3a\u4e4f\u7406\u8bba\u4f9d\u636e\u4e14\u504f\u5411\u4e8b\u540e\u5f52\u56e0\u3002\u4eca\u65e5\u7684\u7814\u7a76\u5c06\u5408\u4f5c\u535a\u5f08\u8bba\u4e2d\u7684\u7ecf\u5178\u6982\u5ff5\u5f15\u5165\u5f3a\u5316\u5b66\u4e60\uff0c\u4e3a\u793e\u4ea4\u667a\u80fd\u7684\u8bad\u7ec3\u63d0\u4f9b\u4e86\u575a\u5b9e\u3001\u53ef\u89e3\u91ca\u7684\u6570\u5b66\u57fa\u7840\u3002\n\n*   **SAVOIR\uff1a\u57fa\u4e8e\u6c99\u666e\u5229\u503c\u7684\u793e\u4ea4\u667a\u80fd\u5956\u52b1\u5206\u914d\u6846\u67b6**\n    \u8bad\u7ec3\u5177\u             if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json?v=${DATA_VERSION}`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {
            const loadBtn = document.getElementById('load-more-btn');
            const unloadedCount = getUnloadedDates().length;

            if (loadBtn) {
                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;
                }
            }
        }

        // 从localStorage加载状态
        function loadState() {
            const starred = localStorage.getItem('starred_papers');
            const read = localStorage.getItem('read_papers');
            const deleted = localStorage.getItem('deleted_papers');
            const summaryLang = localStorage.getItem('summary_language');

        // 保存状态到localStorage
        function saveState() {
            localStorage.setItem('starred_papers', JSON.stringify([...starredPapers]));
            localStorage.setItem('read_papers', JSON.stringify([...readPapers]));
            localStorage.setItem('deleted_papers', JSON.stringify([...deletedPapers]));
            localStorage.setItem('summary_language', showChineseSummary ? 'chinese' : 'english');
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 通过按钮删除论文（避免JavaScript字符串转义问题）

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            paperEl.style.transition = 'all 0.3s ease-out';

                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                showSimpleToast(`已删除: ${title}`);

        // 切换星标状态

            if (starredPapers.has(arxivId)) {

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">

                    <!-- 展开/收起指示器 -->

                    <!-- 懒加载的详情容器 -->

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);

            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';

            // Apply summary language setting
            if (showChineseSummary) {
                const ch = container.querySelector('.chinese-summary');
                const en = container.querySelector('.english-summary');
                if (ch) ch.style.display = 'block';
                if (en) en.style.display = 'none';
            } else {
                const ch = container.querySelector('.chinese-summary');
                const en = container.querySelector('.english-summary');
                if (ch) ch.style.display = 'none';
                if (en) en.style.display = 'block';
            }
        }

        // Toggle paper detail expansion
        function togglePaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            const hint = document.getElementById(`expand-hint-${arxivId}`);
            if (!container) return;

            const isHidden = container.classList.contains('hidden');
            if (isHidden) {
                // First expand: build the DOM
                buildPaperDetail(arxivId);
                container.classList.remove('hidden');
                if (hint) {
                    hint.querySelector('.expand-arrow').textContent = '▼';
                    hint.childNodes[hint.childNodes.length - 1].textContent = ' 点击标题收起';
                }
            } else {
                container.classList.add('hidden');
                if (hint) {
                    hint.querySelector('.expand-arrow').textContent = '▶';
                    hint.childNodes[hint.childNodes.length - 1].textContent = ' 点击标题展开详情';
                }
            }
        }

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表
        function renderPapers() {
            const mainContent = document.getElementById('main-content');
            const loading = document.getElementById('loading');

            if (loading) {
                loading.classList.add('hidden');
            }

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date] || [];
                const { html: papersHTML, count: dateVisibleTotal } = collectPapersForDate(clusters, date);

                totalPapers += dateVisibleTotal;

                html += `
                    <section class="mb-6 sm:mb-8" data-date-section="${date}">
                        <h2 class="text-base sm:text-lg font-medium text-slate-500 dark:text-slate-400 mb-3 sm:mb-4" data-date-heading="${date}">${date} (${dateVisibleTotal} 篇论文)</h2>
                `;

                // 添加该日期的AI论文速览（如果存在）
                if (dailyOverviews[date]) {
                    html += `
                        <div class="mb-3 sm:mb-4 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-700 rounded-lg shadow-md p-3 sm:p-5">
                            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-600 dark:text-blue-400 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                                </svg>
                                <span class="font-semibold text-slate-900 dark:text-white text-sm sm:text-base">今日AI论文速览</span>
                            </div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="markdown-content text-slate-700 dark:text-slate-200 text-xs sm:text-sm" id="overview-${date}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                if (dateVisibleTotal === 0) {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-5 lg:p-6">
                            <div class="text-sm sm:text-base text-slate-600 dark:text-slate-300 leading-relaxed">
                                今日数据已处理，但没有符合当前筛选条件的论文。
                            </div>
                        </div>
                    </section>
                    `;
                } else {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                    `;
                }
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json?v=${DATA_VERSION}`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
