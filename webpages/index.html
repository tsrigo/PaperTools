d\u53ef\u6b3a\u9a97\u7684**Unbeatable Tests**\u771f\u5b9e\u9a8c\u8bc1\u3001\u4ee5\u53ca**Drift Control**\u6301\u7eed\u8d28\u91cf\u76d1\u63a7\u3002\u5728\u4e24\u4e2a\u751f\u4ea7\u7cfb\u7edf\u4e0a\u7ecf\u8fc7285+\u6b21\u8fed\u4ee3\u3001\u5408\u5e761094+\u4e2aPR\u540e\uff0c\u96f6\u56de\u5f52\u68c0\u51fa\uff0c\u5c55\u73b0\u51fa\u591a\u8f6e\u81ea\u4fee\u6b63\u94fe\u3001\u81ea\u4e3b\u57fa\u7840\u8bbe\u65bd\u4fee\u590d\u7b49 emergent \u7279\u6027\u3002 (2603.25697 [cs.AI])\n\n---\n\n### \u4e8c\u3001\u591aAgent\u534f\u8c03\u4e0e\u901a\u4fe1\n\n\u4e24\u7bc7\u8bba\u6587\u4ece\u4e0d\u540c\u89c6\u89d2\u5207\u5165\u591aAgent\u534f\u4f5c\u95ee\u9898\u2014\u2014\u4e00\u4e2a\u5173\u6ce8\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u534f\u8c03\u57fa\u51c6\u8bbe\u8ba1\uff0c\u53e6\u4e00\u4e2a\u5219\u4ece\u653f\u6cbb\u54f2\u5b66\u4e2d\u6c72\u53d6\u7075\u611f\u6784\u5efa\u5236\u5ea6\u6846\u67b6\u3002\n\n- **CRAFT** \u63d0\u51fa\u4e86\u4e00\u4e2a\u4e25\u683c\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u591aAgent\u534f\u8c03\u57fa\u51c6\uff0c\u8bc4\u4f30LLM\u5728\u4e92\u8865\u4f46\u4e0d\u5b8c\u5168\u89c6\u56fe\u4e0b\u7684**\u8bed\u7528\u6c9f\u901a**\u80fd\u529b\u3002\u591a\u4e2aAgent\u9700\u901a\u8fc7\u81ea\u7136\u8bed\u8a00\u534f\u8c03\u6784\u5efa\u4e00\u4e2a\u4efb\u4f55\u5355Agent\u90fd\u65e0\u6cd5\u5b8c\u5168\u89c2\u5bdf\u7684\u5171\u4eab3D\u7ed3\u6784\u3002\u7814\u7a76\u53d1\u73b0\uff1a\u66f4\u5f3a\u7684\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u80fd\u53ef\u9760\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u534f\u8c03\u6027\u80fd\uff0c\u8f83\u5c0f\u7684\u5f00\u653e\u6743\u91cd\u6a21\u578b\u7ecf\u5e38\u5339\u654c\u751a\u81f3\u8d85\u8d8a\u524d\u6cbf\u7cfb\u7edf\uff0c\u4e14\u4e2a\u4f53\u901a\u4fe1\u6539\u5584\u5e76\u4e0d\u4fdd\u8bc1\u534f\u4f5c\u6210\u529f\u2014\u2014\u8fd9\u63ed\u793a\u4e86\u591aAgent\u534f\u8c03\u4ecd\u662f\u5f53\u524d\u8bed\u8a00\u6a21\u578b\u7684\u57fa\u7840\u6027\u96be\u9898\u3002 (2603.25268 [cs.AI])\n\n- **From Logic Monopoly to Social Contract** \u63d0\u51fa\u4e86\u4e00\u4e2a\u6839\u672c\u6027\u7684\u67b6\u6784\u53cd\u601d\uff1a\u73b0\u6709\u6846\u67b6\u8ba9\u6bcf\u4e2aAgent\u540c\u65f6\u627f\u62c5\u8ba1\u5212\u3001\u6267\u884c\u548c\u8bc4\u4f30\u804c\u80fd\uff0c\u8fd9\u79cd\"\u903b\u8f91\u5784\u65ad\"\u5bfc\u81f4\u4e86\u4e25\u91cd\u95ee\u9898\u2014\u2014\u5e73\u5747**84.30%\u7684\u653b\u51fb\u6210\u529f\u7387**\u3001**31.4%\u7684 emergent \u6b3a\u9a97\u884c\u4e3a**\u3001\u4ee5\u53ca\u7ea7\u8054\u6545\u969c\u6a21\u5f0f\u3002\u4f5c\u8005\u501f\u9274\u4e09\u6743\u5206\u7acb\u601d\u60f3\uff0c\u63d0\u51fa**Agent Enterprise for Enterprise (AE4E)** \u8303\u5f0f\uff0c\u5c06Agent\u89c6\u4e3a\u5177\u6709\u6cd5\u5f8b\u5730\u4f4d\u7684\u5546\u4e1a\u5b9e\u4f53\uff0c\u901a\u8fc7**NetX Enterprise Framework (NEF)** \u5b9e\u73b0\u7acb\u6cd5\u3001\u6267\u884c\u3001\u53f8\u6cd5\u4e09\u6743\u5206\u7acb\uff0c\u5e76\u6784\u5efa\u5305\u542b60+\u547d\u540d\u5236\u5ea6AE4E\u7684**Agentic Social Layer**\u3002 (2603.25100 [cs.AI])\n\n---\n\n### \u4e09\u3001Agent\u6280\u80fd\u5b66\u4e60\u4e0e\u5143\u8ba4\u77e5\u8c03\u8282\n\n- **Trace2Skill** \u89e3\u51b3\u4e86LLM Agent\u9886\u57df\u7279\u5b9a\u6280\u80fd\u7684\u624b\u52a8\u7f16\u5199\u53ef\u6269\u5c55\u6027\u74f6\u9888\u95ee\u9898\u3002\u8be5\u6846\u67b6\u6a21\u4eff\u4eba\u7c7b\u4e13\u5bb6\u7f16\u5199\u6280\u80fd\u7684\u65b9\u5f0f\uff1a\u5148\u5168\u9762\u5206\u6790\u5e7f\u6cdb\u6267\u884c\u7ecf\u9a8c\uff0c\u518d\u63d0\u70bc\u4e3a\u7efc\u5408\u6307\u5357\u3002\u5177\u4f53\u505a\u6cd5\u662f\u5e76\u884c\u8c03\u5ea6\u5b50Agent\u5206\u6790\u591a\u6837\u5316\u6267\u884c\u6c60\uff0c\u901a\u8fc7\u5f52\u7eb3\u63a8\u7406\u5c06\u8f68\u8ff9\u7279\u5b9a lessons \u5c42\u6b21\u5316\u6574\u5408\u4e3a\u7edf\u4e00\u3001\u65e0\u51b2\u7a81\u7684\u6280\u80fd\u76ee\u5f55\u3002\u5b9e\u9a8c\u8868\u660e\uff0cTrace2Skill\u663e\u8457\u8d85\u8d8a\u5305\u62ecAnthropic\u5b98\u65b9xlsx\u6280\u80fd\u5728\u5185\u7684\u5f3a\u57fa\u7ebf\uff0c\u4e14\u8fdb\u5316\u540e\u7684\u6280\u80fd\u53ef\u8de8LLM\u89c4\u6a21\u8fc1\u79fb\u2014\u2014\u4f8b\u5982Qwen3.5-35B\u8fdb\u5316\u7684\u6280\u80fd\u4e3aQwen3.5-122B\u5e26\u6765**57.65\u4e2a\u767e\u5206\u70b9\u7684\u7edd\u5bf9\u63d0\u5347**\u3002 (2603.25158 [cs.AI])\n\n- **Supervising Ralph Wiggum** \u805a\u7126\u5de5\u7a0b\u8bbe\u8ba1\u573a\u666f\u4e2d\u7684Agent\u8bbe\u8ba1\u56fa\u5316\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u65b0\u67b6\u6784\uff1a**Self-Regulation Loop (SRL)** \u8ba9\u8bbe\u8ba1Agent\u81ea\u6211\u76d1\u63a7\u5176\u5143\u8ba4\u77e5\uff0c**Co-Regulation Design Agentic Loop (CRDAL)** \u5219\u5f15\u5165\u5143\u8ba4\u77e5\u534f\u540c\u8c03\u8282Agent\u534f\u52a9\u4e3bAgent\u3002\u5728\u7535\u6c60\u7ec4\u8bbe\u8ba1\u95ee\u9898\u4e2d\uff0cCRDAL\u751f\u6210\u4e86\u6027\u80fd\u663e\u8457\u66f4\u4f18\u7684\u8bbe\u8ba1\uff0c\u4e14\u6bd4SRL\u548c\u57fa\u7840RWL\u66f4\u6709\u6548\u5730\u63a2\u7d22\u6f5c\u5728\u8bbe\u8ba1\u7a7a\u95f4\uff0c\u4f46SRL\u867d\u63a2\u7d22\u4e86\u4e0d\u540c\u533a\u57df\u5374\u672a\u5e26\u6765\u663e\u8457\u6027\u80fd\u63d0\u5347\u3002 (2603.24768 [cs.AI])\n\n---\n\n### \u56db\u3001\u591a\u6b65\u5de5\u5177\u7f16\u6392\n\n- **Training LLMs for Multi-Step Tool Orchestration** \u9488\u5bf9LLM\u8c03\u7528\u591a\u4e2a\u4f9d\u8d56API\u5e76\u6b63\u786e\u4f20\u64ad\u4e2d\u95f4\u8f93\u51fa\u7684\u6311\u6218\u3002\u5f53\u524dSOTA\u6a21\u578b\u5728\u5b8c\u6574\u5e8f\u5217\u6267\u884c\u4e0a\u9891\u7e41\u5931\u8d25\uff0c\u53c2\u6570\u503c\u9519\u8bef\u662f\u4e3b\u8981\u5931\u8d25\u539f\u56e0\u3002\u8be5\u7814\u7a76\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u5927\u89c4\u6a21\u771f\u5b9eAPI\u54cd\u5e94\u7f13\u5b58\u7684\u5f3a\u5316\u5b66\u4e60\u73af\u5883\uff0c\u5b9e\u73b0\u53ef\u63a7\u590d\u6742\u5ea6\u7684\u591a\u6b65\u7f16\u6392\u8f68\u8ff9\u5408\u6210\uff0c\u6548\u7387\u663e\u8457\u9ad8\u4e8e\u65e0\u7ea6\u675f\u65b9\u6cd5\u3002\u540c\u65f6\u63d0\u51fa**graduated reward\u8bbe\u8ba1**\uff0c\u5c06\u6b63\u786e\u6027\u5206\u89e3\u4e3a\u539f\u5b50\u6709\u6548\u6027\uff08\u9012\u589e\u7c92\u5ea6\u7684\u5355\u6b65\u51fd\u6570\u8c03\u7528\u6b63\u786e\u6027\uff09\u548c\u7f16\u6392\u6b63\u786e\u6027\uff08\u5c0a\u91cd\u4f9d\u8d56\u7684\u5de5\u5177\u5e8f\u5217\uff09\u3002\u5728ComplexFuncBench\u4e0a\uff0c\u8be5\u65b9\u6cd5\u5b9e\u73b0\u4e86\u663e\u8457\u7684turn accuracy\u63d0\u5347\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u5b9e\u4e24\u4e2a\u5956\u52b1\u7ec4\u4ef6\u7f3a\u4e00\u4e0d\u53ef\u3002 (2603.24709 [cs.LG])\n\n---\n\n## \u4eca\u65e5\u770b\u70b9\n\n- **\"\u5f62\u5f0f\u5316+\u81ea\u8fdb\u5316\"\u6210\u4e3aAgent\u53ef\u9760\u6027\u7684\u65b0\u8303\u5f0f**\uff1aSEVerA\u5c06\u5f62\u5f0f\u5316\u9a8c\u8bc1\u5f15\u5165\u81ea\u8fdb\u5316Agent\u5408\u6210\uff0c\u5b9e\u73b0\u4e86\u96f6\u7ea6\u675f\u8fdd\u89c4\u4e0b\u7684\u6027\u80fd\u63d0\u5347\u3002\u8fd9\u6807\u5fd7\u7740Agent\u7814\u7a76\u4ece\"\u5148\u8dd1\u8d77\u6765\u518d\u4feebug\"\u5411\"\u4ece\u8bbe\u8ba1\u5c42\u9762\u4fdd\u8bc1\u6b63\u786e\u6027\"\u7684\u8303\u5f0f\u8f6c\u53d8\uff0c\u672a\u6765\u53ef\u80fd\u50ac\u751f\u51fa\u66f4\u591a\u5f62\u5f0f\u5316\u65b9\u6cd5\u4e0eAgent\u7cfb\u7edf\u7684\u7ed3\u5408\u3002\n\n- **\u591aAgent\u534f\u8c03\u66b4\u9732\u6df1\u5c42\u80fd\u529b\u77ed\u677f**\uff1aCRAFT\u7684\u53d1\u73b0\u9887\u5177\u8b66\u793a\u610f\u4e49\u2014\u2014\u66f4\u5f3a\u7684\u4e2a\u4f53\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u81ea\u52a8\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u56e2\u961f\u534f\u4f5c\u3002\u8fd9\u63d0\u793a\u5f53\u524dLLM\u7684\"\u667a\u80fd\"\u53ef\u80fd\u4ecd\u662f\u9ad8\u5ea6\u4e2a\u4f53\u5316\u7684\uff0c\u4e0b\u4e00\u9636\u6bb5\u9700\u8981\u4e13\u95e8\u9488\u5bf9\u534f\u4f5c\u573a\u666f\u8fdb\u884c\u67b6\u6784\u548c\u8bad\u7ec3\u8303\u5f0f\u7684\u521b\u65b0\u3002\n\n- **Agent\"\u5236\u5ea6\u5316\"\u601d\u6f6e\u5174\u8d77**\uff1a\u4ece\"Logic Monopoly\"\u6279\u5224\u5230\u4e09\u6743\u5206\u7acb\u7684AE4E\u6846\u67b6\uff0c\u7814\u7a76\u8005\u4eec\u5f00\u59cb\u501f\u9274\u4eba\u7c7b\u793e\u4f1a\u6570\u5343\u5e74\u7684\u5236\u5ea6\u8bbe\u8ba1\u7ecf\u9a8c\u6765\u89e3\u51b3AI\u7cfb\u7edf\u95ee\u9898\u3002\u8fd9\u79cd\u8de8\u5b66\u79d1\u89c6\u89d2\u4e3a\u6784\u5efa\u66f4\u7a33\u5065\u7684\u591aAgent\u7cfb\u7edf\u63d0\u4f9b\u4e86\u5bcc\u6709\u542f\u53d1\u6027\u7684\u84dd\u56fe\u3002\n\n- **\u6280\u80fd\u84b8\u998f\u7684\u53ef\u8fc1\u79fb\u6027\u7a81\u7834**\uff1aTrace2Skill\u5c55\u793a\u4e86\u4ece\u5355\u4e00\u6a21\u578b\u8f68\u8ff9\u4e2d\u63d0\u53d6\u7684\u6280\u80fd\u53ef\u4ee5\u8de8\u6a21\u578b\u89c4\u6a21\u3001\u8de8\u5206\u5e03\u6cdb\u5316\u7684\u53ef\u80fd\u6027\u3002\u8fd9\u4e3a\u6784\u5efa\u53ef\u590d\u7528\u7684Agent\u6280\u80fd\u5e93\u5f00\u8f9f\u4e86\u65b0\u8def\u5f84\u2014\u2014\u672a\u6765\u6216\u8bb8\u4f1a\u51fa\u73b0\u7c7b\u4f3c\"\u6280\u80fd\u5e02\u573a\"\u7684\u751f\u6001\u3002",
    "2026-03-25": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-25)\n\n## \u5f00\u7bc7\u5bfc\u8bed\n\n\u4eca\u65e5AI\u7814\u7a76\u5448\u73b0\u51fa\u4e09\u5927\u6838\u5fc3\u8d8b\u52bf\uff1a\u4e00\u662f**\u667a\u80fd\u4f53\u67b6\u6784\u4ece\u201c\u5355\u70b9\u5de5\u5177\u8c03\u7528\u201d\u5411\u201c\u590d\u6742\u591a\u5de5\u5177\u7f16\u6392\u201d\u6df1\u5ea6\u6f14\u8fdb**\uff0c\u5b66\u754c\u5f00\u59cb\u7cfb\u7edf\u6027\u5730\u7814\u7a76\u957f\u8f68\u8ff9\u3001\u591a\u6b65\u9aa4\u7684\u534f\u4f5c\u5de5\u4f5c\u6d41\u8bbe\u8ba1\uff1b\u4e8c\u662f**\u81ea\u6211\u6539\u8fdb\u4e0e\u5143\u8ba4\u77e5\u80fd\u529b\u6210\u4e3a\u65b0\u7126\u70b9**\uff0cG\u00f6del Agent\u3001\u5143\u81ea\u52a8\u7814\u7a76\u7b49\u6846\u67b6\u8bd5\u56fe\u8ba9\u667a\u80fd\u4f53\u5177\u5907\u201c\u5ba1\u89c6\u81ea\u8eab\u3001\u4fee\u6539\u81ea\u8eab\u201d\u7684\u9012\u5f52\u80fd\u529b\uff1b\u4e09\u662f**\u8bb0\u5fc6\u7cfb\u7edf\u4ece\u201c\u4e2a\u4f53\u5b58\u50a8\u201d\u8d70\u5411\u201c\u8de8\u667a\u80fd\u4f53\u534f\u4f5c\u201d**\uff0c\u5f02\u6784\u667a\u80fd\u4f53\u95f4\u7684\u77e5\u8bc6\u5171\u4eab\u4e0e\u5bf9\u9f50\u6210\u4e3a\u53ef\u80fd\u3002\u7406\u8bba\u5c42\u9762\uff0c\u601d\u7ef4\u8bed\u8a00(LoT)\u5047\u8bbe\u906d\u9047\u4e86\u8ba1\u7b97\u5b9e\u9a8c\u7684\u6311\u6218\u2014\u2014 emergent protocol \u5728\u6548\u7387\u4e0a\u663e\u8457\u4f18\u4e8e\u4eba\u7c7b\u53ef\u7406\u89e3\u7684\u7b26\u53f7\u534f\u8bae\u3002\n\n---\n\n## \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \u4e00\u3001\u5de5\u5177\u4f7f\u7528\u4e0e\u5de5\u4f5c\u6d41\u7f16\u6392\uff1a\u4ece\u5355\u70b9\u8c03\u7528\u5230\u52a8\u6001\u7f16\u6392\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u968f\u7740LLM Agent\u4ece\u7b80\u5355\u5de5\u5177\u8c03\u7528\u5411\u590d\u6742\u4efb\u52a1\u6267\u884c\u6f14\u8fdb\uff0c\u7814\u7a76\u91cd\u5fc3\u5df2\u4ece\u201c\u80fd\u5426\u9009\u5bf9\u5de5\u5177\u201d\u8f6c\u5411\u201c\u5982\u4f55\u9ad8\u6548\u7f16\u6392\u591a\u5de5\u5177\u3001\u957f\u5468\u671f\u3001\u52a8\u6001\u9002\u5e94\u7684\u5de5\u4f5c\u6d41\u201d\u3002\u672c\u677f\u5757\u4e09\u7bc7\u8bba\u6587\u4ece\u6f14\u8fdb\u7efc\u8ff0\u3001\u6846\u67b6\u4f18\u5316\u3001\u6280\u80fd\u8def\u7531\u4e09\u4e2a\u7ef4\u5ea6\u52fe\u52d2\u4e86\u8fd9\u4e00\u9886\u57df\u7684\u5168\u666f\u56fe\u3002\n\n- **The Evolution of Tool Use in LLM Agents** \u7cfb\u7edf\u68b3\u7406\u4e86LLM\u5de5\u5177\u4f7f\u7528\u4ece\u5355\u5de5\u5177\u8c03\u7528\u5230\u591a\u5de5\u5177\u7f16\u6392\u7684\u6f14\u8fdb\u5386\u7a0b\u3002\u7814\u7a76\u5c06\u4efb\u52a1\u5f62\u5f0f\u5316\u4e3a\u516d\u7ef4\u6846\u67b6\uff1a\u63a8\u7406\u65f6\u89c4\u5212\u4e0e\u6267\u884c\u3001\u8bad\u7ec3\u4e0e\u8f68\u8ff9\u6784\u5efa\u3001\u5b89\u5168\u4e0e\u63a7\u5236\u3001\u8d44\u6e90\u7ea6\u675f\u4e0b\u7684\u6548\u7387\u3001\u5f00\u653e\u73af\u5883\u80fd\u529b\u5b8c\u6574\u6027\u3001\u57fa\u51c6\u6d4b\u8bd5\u8bbe\u8ba1\u3002\u8bba\u6587\u6307\u51fa\u5f53\u524d\u6838\u5fc3\u6311\u6218\u5df2\u4ece\u5de5\u5177\u9009\u62e9\u8f6c\u5411\u957f\u8f68\u8ff9\u7f16\u6392\u4e2d\u7684\u72b6\u6001\u7ba1\u7406\u3001\u6267\u884c\u53cd\u9988\u4e0e\u73af\u5883\u9002\u5e94\u95ee\u9898\u3002 **(2603.22862 [cs.CL])**\n\n- **From Static Templates to Dynamic Runtime Graphs** \u5c06LLM\u5de5\u4f5c\u6d41\u62bd\u8c61\u4e3a**Agentic Computation Graphs (ACG)**\uff0c\u4ece\u201c\u4f55\u65f6\u786e\u5b9a\u7ed3\u6784\u201d\u8fd9\u4e00\u5b9a\u4e49\u6027\u89c6\u89d2\u7edf\u4e00\u4e86\u9759\u6001\u65b9\u6cd5\u4e0e\u52a8\u6001\u65b9\u6cd5\u3002\u9759\u6001\u65b9\u6cd5\u5728\u90e8\u7f72\u524d\u56fa\u5b9a\u5de5\u4f5c\u6d41\u811a\u624b\u67b6\uff0c\u52a8\u6001\u65b9\u6cd5\u5219\u5728\u8fd0\u884c\u65f6\u9009\u62e9\u3001\u751f\u6210\u6216\u4fee\u8ba2\u5de5\u4f5c\u6d41\u3002\u8bba\u6587\u63d0\u51fa\u4e86\u53ef\u590d\u7528\u5de5\u4f5c\u6d41\u6a21\u677f\u3001\u8fd0\u884c\u65f6\u5b9e\u73b0\u56fe\u3001\u6267\u884c\u8f68\u8ff9\u7684\u4e09\u5c42\u533a\u5206\uff0c\u4e3a\u672a\u6765\u5de5\u4f5c\u6d41\u4f18\u5316\u7814\u7a76\u63d0\u4f9b\u4e86\u7edf\u4e00\u6846\u67b6\u4e0e\u8bc4\u4f30\u6807\u51c6\u3002 **(2603.22386 [cs.CL])**\n\n- **SkillRouter: Retrieve-and-Rerank Skill Selection** \u9488\u5bf9\u5927\u89c4\u6a21\u6280\u80fd\u6c60\uff08\u5df2\u8fbe\u6570\u4e07\u7ea7\u522b\uff09\u7684\u8def\u7531\u96be\u9898\uff0c\u63d0\u51fa\u4e24\u9636\u6bb5\u68c0\u7d22-\u91cd\u6392\u5e8fpipeline\u3002\u901a\u8fc7\u7cfb\u7edf\u6027\u5b9e\u8bc1\u7814\u7a76\uff0c\u8bba\u6587\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u7684\u53d1\u73b0\uff1a**\u6280\u80fd\u5b9e\u73b0\u4f53\uff08skill body\uff09\u662f\u51b3\u5b9a\u6027\u4fe1\u53f7**\uff0c\u79fb\u9664\u540e\u5bfc\u81f429-44\u4e2a\u767e\u5206\u70b9\u7684\u6027\u80fd\u4e0b\u964d\uff1b\u8de8\u7f16\u7801\u5668\u6ce8\u610f\u529b\u5206\u6790\u663e\u793a91.7%\u7684\u6ce8\u610f\u529b\u96c6\u4e2d\u5728body\u5b57\u6bb5\u3002\u57fa\u4e8e\u6b64\u53d1\u73b0\u6784\u5efa\u7684SkillRouter\u4ec5\u75281.2B\u53c2\u6570\u5373\u8fbe\u523074.0%\u7684top-1\u8def\u7531\u51c6\u786e\u7387\uff0c\u4e14\u53ef\u5728\u6d88\u8d39\u7ea7\u786c\u4ef6\u4e0a\u90e8\u7f72\u3002 **(2603.22455 [cs.LG])**\n\n---\n\n### \u4e8c\u3001\u667a\u80fd\u4f53\u67b6\u6784\u4e0e\u81ea\u6211\u6539\u8fdb\uff1aG\u00f6del Agent\u4e0e\u5143\u8ba4\u77e5\u7684\u5d1b\u8d77\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u672c\u677f\u5757\u805a\u7126\u667a\u80fd\u4f53\u67b6\u6784\u7684\u6839\u672c\u6027\u521b\u65b0\u3002\u4e09\u7bc7\u8bba\u6587\u5206\u522b\u4ece**\u653f\u7b56\u7ea7\u81ea\u6211\u4fee\u590d**\u3001**\u5143\u81ea\u52a8\u7814\u7a76**\u3001**O(1)\u4e0a\u4e0b\u6587\u67b6\u6784**\u4e09\u4e2a\u65b9\u5411\u7a81\u7834\u4f20\u7edf\u667a\u80fd\u4f53\u8bbe\u8ba1\u7684\u8fb9\u754c\uff0c\u6807\u5fd7\u7740\u667a\u80fd\u4f53\u4ece\u201c\u6267\u884c\u5de5\u5177\u201d\u5411\u201c\u81ea\u6211\u4f18\u5316\u7684\u8ba4\u77e5\u7cfb\u7edf\u201d\u8f6c\u578b\u3002\n\n- **Polaris: A G\u00f6del Agent Framework** \u63d0\u51fa\u4e86\u9762\u5411\u5c0f\u6a21\u578b\u7684**G\u00f6del Agent**\u6846\u67b6\uff0c\u5b9e\u73b0\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u3002Polaris\u901a\u8fc7\u201c\u5206\u6790-\u7b56\u7565\u5f62\u6210-\u62bd\u8c61-\u4ee3\u7801\u8865\u4e01\u4fee\u590d\u201d\u7684\u7ed3\u6784\u5316\u5faa\u73af\uff0c\u5c06\u5931\u8d25\u7ecf\u9a8c\u84b8\u998f\u4e3a\u53ef\u590d\u7528\u7684\u7b56\u7565\u8865\u4e01\u3002\u4e0eResponse\u7ea7\u522b\u7684\u81ea\u7ea0\u9519\u4e0d\u540c\uff0cPolaris\u5728**\u653f\u7b56\u5c42\u9762**\u8fdb\u884c\u4fee\u6539\uff0c\u751f\u6210\u7684\u8865\u4e01\u5177\u6709\u53ef\u5ba1\u8ba1\u6027\u4e14\u53ef\u5728\u540c\u7c7b\u4efb\u52a1\u4e2d\u590d\u7528\u3002\u5728MGSM\u3001DROP\u3001GPQA\u3001LitBench\u7b49\u6db5\u76d6\u7b97\u672f\u63a8\u7406\u3001\u7ec4\u5408\u63a8\u7406\u3001\u7814\u7a76\u751f\u7ea7\u95ee\u9898\u89e3\u51b3\u3001\u521b\u610f\u5199\u4f5c\u7684\u57fa\u51c6\u4e0a\uff0c7B\u53c2\u6570\u6a21\u578b\u914d\u5907Polaris\u540e\u6301\u7eed\u8d85\u8d8a\u57fa\u7ebf\u653f\u7b56\u3002 **(2603.23129 [cs.LG])**\n\n- **Bilevel Autoresearch: Meta-Autoresearching Itself** \u63d0\u51fa\u4e86\u4e00\u4e2a\u5927\u80c6\u7684\u6846\u67b6\uff1a\u7528\u81ea\u52a8\u7814\u7a76\u5faa\u73af\u6765\u4f18\u5316\u81ea\u52a8\u7814\u7a76\u5faa\u73af\u672c\u8eab\u3002\u5916\u5c42\u5faa\u73af\u901a\u8fc7\u8fd0\u884c\u65f6\u751f\u6210\u548c\u6ce8\u5165\u65b0\u7684\u641c\u7d22\u673a\u5236\uff08\u4f5c\u4e3aPython\u4ee3\u7801\uff09\u6765\u5143\u4f18\u5316\u5185\u5c42\u7814\u7a76\u5faa\u73af\u3002\u5185\u5c42\u5faa\u73af\u4f18\u5316\u4efb\u52a1\uff0c\u5916\u5c42\u5faa\u73af\u4f18\u5316\u641c\u7d22\u65b9\u5f0f\u2014\u2014\u4e24\u8005\u4f7f\u7528\u76f8\u540c\u7684LLM\uff0c\u65e0\u9700\u66f4\u5f3a\u7684\u6a21\u578b\u3002\u5728Karpathy\u7684GPT\u9884\u8bad\u7ec3\u57fa\u51c6\u4e0a\uff0c\u5143\u81ea\u52a8\u7814\u7a76\u5916\u5c42\u5faa\u73af\u5b9e\u73b0\u4e865\u500d\u63d0\u5347\uff08-0.045 vs -0.009 val_bpb\uff09\uff0c\u4e14\u81ea\u4e3b\u53d1\u73b0\u4e86\u7ec4\u5408\u4f18\u5316\u3001\u591a\u81c2\u8001\u864e\u673a\u3001\u5b9e\u9a8c\u8bbe\u8ba1\u7b49\u9886\u57df\u7684\u673a\u5236\u3002 **(2603.23420 [cs.AI])**\n\n- **Reasoner-Executor-Synthesizer (RES)** \u9488\u5bf9RAG\u67b6\u6784\u4e2d\u4e0a\u4e0b\u6587\u957f\u5ea6\u4e0e\u5e7b\u89c9\u98ce\u9669\u968f\u6570\u636e\u89c4\u6a21\u7ebf\u6027\u589e\u957f\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e09\u5c42\u67b6\u6784\uff1aReasoner\u8d1f\u8d23\u610f\u56fe\u89e3\u6790\uff0cExecutor\u8d1f\u8d23\u786e\u5b9a\u6027\u6570\u636e\u68c0\u7d22\u4e0e\u805a\u5408\uff08**\u96f6LLM token\u6d88\u8017**\uff09\uff0cSynthesizer\u8d1f\u8d23\u53d9\u4e8b\u751f\u6210\u3002\u8bba\u6587\u5f62\u5f0f\u5316\u8bc1\u660e\u4e86RES\u8fbe\u5230**O(1) token\u590d\u6742\u5ea6**\uff08\u76f8\u5bf9\u4e8e\u6570\u636e\u96c6\u89c4\u6a21\uff09\uff0c\u5e76\u5728ScholarSearch\uff08Crossref API\uff0c1.3\u4ebf+\u6587\u7ae0\uff09\u4e0a\u9a8c\u8bc1\u2014\u2014\u65e0\u8bba\u6570\u636e\u96c6\u662f4.2\u4e07\u8fd8\u662f1630\u4e07\u7bc7\u6587\u7ae0\uff0c\u5e73\u5747token\u6d88\u8017\u4ec5\u4e3a1,574\u3002\u67b6\u6784\u4ece\u6839\u672c\u4e0a\u6d88\u9664\u4e86\u6570\u636e\u5e7b\u89c9\uff1aLLM\u4ece\u4e0d\u63a5\u89e6\u539f\u59cb\u8bb0\u5f55\u3002 **(2603.22367 [cs.AI])**\n\n---\n\n### \u4e09\u3001\u8bb0\u5fc6\u7cfb\u7edf\u4e0e\u534f\u4f5c\uff1a\u4ece\u4e2a\u4f53\u8bb0\u5fc6\u5230\u8de8\u667a\u80fd\u4f53\u77e5\u8bc6\u5171\u4eab\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u8bb0\u5fc6\u662f\u667a\u80fd\u4f53\u6301\u4e45\u667a\u80fd\u7684\u6838\u5fc3\u3002\u672c\u677f\u5757\u4e24\u7bc7\u8bba\u6587\u5206\u522b\u63a2\u7d22\u4e86**\u8de8\u5f02\u6784\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u534f\u4f5c**\u4e0e**\u4e2a\u6027\u5316\u8bb0\u5fc6\u7684\u65f6\u5e8f\u4e00\u81f4\u6027**\u4e24\u4e2a\u524d\u6cbf\u95ee\u9898\uff0c\u6807\u5fd7\u7740\u8bb0\u5fc6\u7814\u7a76\u4ece\u201c\u5b58\u50a8-\u68c0\u7d22\u201d\u8303\u5f0f\u5411\u201c\u534f\u4f5c-\u6f14\u5316\u201d\u8303\u5f0f\u5ef6\u4f38\u3002\n\n- **MemCollab: Cross-Agent Memory Collaboration** \u9488\u5bf9\u5f02\u6784\u667a\u80fd\u4f53\u90e8\u7f72\u4e2d\u80fd\u5426\u5171\u4eab\u5355\u4e00\u8bb0\u5fc6\u7cfb\u7edf\u7684\u96be\u9898\uff0c\u53d1\u73b0\u76f4\u63a5\u8fc1\u79fb\u8bb0\u5fc6\u4f1a\u5bfc\u81f4\u6027\u80fd\u4e0b\u964d\u2014\u2014\u56e0\u4e3a\u8bb0\u5fc6\u7ea0\u7f20\u4e86\u4efb\u52a1\u77e5\u8bc6\u4e0e\u667a\u80fd\u4f53\u7279\u5b9a\u504f\u89c1\u3002\u8bba\u6587\u63d0\u51fa**\u5bf9\u6bd4\u8f68\u8ff9\u84b8\u998f**\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u6bd4\u4e0d\u540c\u667a\u80fd\u4f53\u5728\u540c\u4e00\u4efb\u52a1\u4e0a\u751f\u6210\u7684\u63a8\u7406\u8f68\u8ff9\uff0c\u63d0\u70bc\u51fa\u6355\u83b7\u5171\u4eab\u4efb\u52a1\u7ea7\u4e0d\u53d8\u91cf\u7684\u62bd\u8c61\u63a8\u7406\u7ea6\u675f\uff0c\u540c\u65f6\u6291\u5236\u667a\u80fd\u4f53\u7279\u5b9a artifacts\u3002\u5f15\u5165\u4efb\u52a1\u611f\u77e5\u68c0\u7d22\u673a\u5236\uff0c\u6839\u636e\u4efb\u52a1\u7c7b\u522b\u6761\u4ef6\u5316\u8bb0\u5fc6\u8bbf\u95ee\u3002\u5b9e\u9a8c\u8868\u660e\uff0cMemCollab\u5728\u6570\u5b66\u63a8\u7406\u4e0e\u4ee3\u7801\u751f\u6210\u57fa\u51c6\u4e0a\u6301\u7eed\u63d0\u5347\u51c6\u786e\u7387\u4e0e\u63a8\u7406\u6548\u7387\uff0c\u751a\u81f3\u5728\u8de8\u6a21\u6001\u5bb6\u65cf\u8bbe\u7f6e\u4e2d\u540c\u6837\u6709\u6548\u3002 **(2603.23234 [cs.LG])**\n\n- **PERMA: Benchmarking Personalized Memory Agents** \u6307\u51fa\u73b0\u6709\u8bc4\u4f30\u5c06\u504f\u597d\u76f8\u5173\u5bf9\u8bdd\u4e0e\u65e0\u5173\u5185\u5bb9\u4ea4\u7ec7\uff0c\u7b80\u5316\u4e3a\u4e86\u201c\u5927\u6d77\u635e\u9488\u201d\u5f0f\u7684\u68c0\u7d22\u4efb\u52a1\uff0c\u5ffd\u89c6\u4e86\u771f\u5b9e\u4e16\u754c\u4e2d**\u504f\u597d\u662f\u9010\u6e10\u6d6e\u73b0\u5e76\u5728\u566a\u58f0\u4e0a\u4e0b\u6587\u4e2d\u7d2f\u79ef**\u7684\u5173\u952e\u7279\u5f81\u3002\u8bba\u6587\u63d0\u51faPERMA\u57fa\u51c6\uff0c\u5305\u542b\u591a\u4f1a\u8bdd\u3001\u591a\u9886\u57df\u7684\u65f6\u5e8f\u4ea4\u4e92\u4e8b\u4ef6\uff0c\u63d2\u5165\u504f\u597d\u76f8\u5173\u67e5\u8be2\u4ee5\u63a2\u6d4b\u6a21\u578b\u5bf9 persona \u7684\u4e00\u81f4\u6027\u7406\u89e3\u3002\u8bbe\u8ba1\u4e86\u591a\u9009\u4e0e\u4ea4\u4e92\u4e24\u79cd\u4efb\u52a1\u5f62\u5f0f\uff0c\u5e76\u5f15\u5165\u6587\u672c\u53d8\u5f02\u4e0e\u8bed\u8a00\u5bf9\u9f50\u4ee5\u6a21\u62df\u771f\u5b9e\u8f93\u5165\u7684\u6df7\u4e71\u6027\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u94fe\u63a5\u76f8\u5173\u4ea4\u4e92\u53ef\u63d0\u53d6\u66f4\u7cbe\u786e\u504f\u597d\u5e76\u51cf\u5c11token\u6d88\u8017\uff0c\u4f46\u73b0\u6709\u8bb0\u5fc6\u7cfb\u7edf\u4ecd\u96be\u4ee5\u5728\u65f6\u95f4\u6df1\u5ea6\u4e0e\u8de8\u57df\u5e72\u6270\u4e0b\u4fdd\u6301\u8fde\u8d2f\u7684 persona\u3002 **(2603.23231 [cs.AI])**\n\n---\n\n### \u56db\u3001\u7406\u8bba\u57fa\u7840\uff1a\u601d\u7ef4\u8bed\u8a00\u5047\u8bbe\u7684\u8ba1\u7b97\u6311\u6218\n\n**\u6838\u5fc3\u4e3b\u9898\u89e3\u8bfb**\uff1a\u672c\u677f\u5757\u4ec5\u4e00\u7bc7\u8bba\u6587\uff0c\u4f46\u5176\u7406\u8bba\u610f\u4e49\u91cd\u5927\u2014\u2014\u5b83\u7528\u8ba1\u7b97\u5b9e\u9a8c\u76f4\u63a5\u6311\u6218\u4e86\u8ba4\u77e5\u79d1\u5b66\u4e2d\u6839\u6df1\u8482\u56fa\u7684\u201c\u601d\u7ef4\u9700\u8981\u8bed\u8a00\u201d\u7684\u5047\u8bbe\u3002\n\n- **The Efficiency Attenuation Phenomenon** \u63d0\u51fa\u4e86**\u201cAI\u79c1\u6709\u8bed\u8a00\u201d\u601d\u60f3\u5b9e\u9a8c**\uff1a\u5982\u679c\u4e24\u4e2a\u4eba\u5de5\u667a\u80fd\u667a\u80fd\u4f53\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6f14\u5316\u51fa\u4e00\u79cd\u9ad8\u6548\u4f46\u4e0d\u53ef\u89e3\u8bfb\u7684\u901a\u4fe1\u534f\u8bae\uff0c\u5f53\u88ab\u8feb\u4f7f\u7528\u4eba\u7c7b\u53ef\u7406\u89e3\u7684\u7b26\u53f7\u8bed\u8a00\u65f6\u6027\u80fd\u4e0b\u964d\u2014\u2014\u8fd9\u88ab\u5b9a\u4e49\u4e3a**\u6548\u7387\u8870\u51cf\u73b0\u8c61(EAP)**\u3002\u8bba\u6587\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u7684\u5408\u4f5c\u5bfc\u822a\u4efb\u52a1\u4e2d\u5f62\u5f0f\u5316\u4e86\u8fd9\u4e00\u573a\u666f\u3002\u7ed3\u679c\u663e\u793a\uff0c\u4f7f\u7528emergent protocol\u7684\u667a\u80fd\u4f53\u6bd4\u4f7f\u7528\u9884\u5b9a\u4e49\u4eba\u7c7b\u7b26\u53f7\u534f\u8bae\u7684\u667a\u80fd\u4f53\u6548\u7387\u9ad8\u51fa50.5%\uff0c\u8bc1\u5b9e\u4e86EAP\u3002\u8fd9\u8868\u660e\u5728\u8fd9\u4e9b\u7cfb\u7edf\u4e2d\uff0c\u6700\u4f18\u534f\u4f5c\u8ba4\u77e5\u5e76\u975e\u7531\u7b26\u53f7\u7ed3\u6784\u4e2d\u4ecb\uff0c\u800c\u662f\u81ea\u7136\u5730\u4e0e\u4e9a\u7b26\u53f7\u8ba1\u7b97\u8026\u5408\u3002 **(2603.22312 [cs.CL])**\n\n---\n\n## \u4eca\u65e5\u770b\u70b9\n\n- **G\u00f6del Agent\u4ece\u6982\u5ff5\u8d70\u5411\u5b9e\u8df5**\uff1aPolaris\u548cBilevel Autoresearch\u6807\u5fd7\u7740\u667a\u80fd\u4f53\u4e0d\u518d\u6ee1\u8db3\u4e8e\u201c\u6267\u884c\u4efb\u52a1\u201d\uff0c\u800c\u662f\u5f00\u59cb\u5177\u5907\u201c\u5ba1\u89c6\u5e76\u4fee\u6539\u81ea\u8eab\u653f\u7b56/\u641c\u7d22\u673a\u5236\u201d\u7684\u5143\u8ba4\u77e5\u80fd\u529b\u3002\u8fd9\u4e00\u65b9\u5411\u53ef\u80fd\u5f00\u542f\u667a\u80fd\u4f53\u81ea\u6211\u8fdb\u5316\u7684\u65b0\u8303\u5f0f\u3002\n\n- **O(1)\u4e0a\u4e0b\u6587\u7a97\u53e3\u7684\u7a81\u7834**\uff1aRES\u67b6\u6784\u901a\u8fc7\u4e25\u683c\u5206\u79bb\u786e\u5b9a\u6027\u6267\u884c\u4e0eLLM\u751f\u6210\uff0c\u9996\u6b21\u5728\u7406\u8bba\u4e0a\u548c\u5b9e\u8df5\u4e0a\u8bc1\u660e\u4e86RAG\u573a\u666f\u4e0btoken\u6d88\u8017\u53ef\u4ee5\u4e0e\u6570\u636e\u89c4\u6a21\u89e3\u8026\u3002\u8fd9\u5bf9\u6784\u5efa\u5927\u89c4\u6a21\u77e5\u8bc6\u5e93\u667a\u80fd\u4f53\u5177\u6709\u91cc\u7a0b\u7891\u610f\u4e49\u3002\n\n- **\u6280\u80fd\u8def\u7531\u7684\u8ba4\u77e5\u98a0\u8986**\uff1aSkillRouter\u7684\u5b9e\u8bc1\u7814\u7a76\u63ed\u793a\u4e86\u201c\u6280\u80fd\u4f53\u6bd4\u6280\u80fd\u540d\u66f4\u5173\u952e\u201d\u8fd9\u4e00\u53cd\u76f4\u89c9\u53d1\u73b0\uff0c\u6311\u6218\u4e86\u5f53\u524d\u4e3b\u6d41\u667a\u80fd\u4f53\u67b6\u6784\u4e2d\u201c\u6e10\u8fdb\u5f0f\u62ab\u9732\u201d\u8bbe\u8ba1\u7684\u9690\u542b\u5047\u8bbe\uff0c\u4e3a\u5927\u89c4\u6a21\u5de5\u5177\u751f\u6001\u7684\u5de5\u7a0b\u5b9e\u8df5\u6307\u660e\u4e86\u65b0\u65b9\u5411\u3002\n\n- **\u601d\u7ef4\u8bed\u8a00\u5047\u8bbe\u906d\u9047\u8ba1\u7b97\u5b9e\u8bc1\u6311\u6218**\uff1aEAP\u5b9e\u9a8c\u4ee550.5%\u7684\u6548\u7387\u5dee\u8ddd\u8868\u660e\uff0c\u5728AI\u7cfb\u7edf\u4e2d\u201c\u6700\u4f18\u8ba4\u77e5\u201d\u53ef\u80fd\u5929\u7136\u4e0e\u7b26\u53f7\u8868\u793a\u76f8\u6096\u3002\u8fd9\u4e00\u53d1\u73b0\u5bf9AI\u53ef\u89e3\u91ca\u6027\u3001\u8ba4\u77e5\u67b6\u6784\u8bbe\u8ba1\u4e43\u81f3AI\u4f26\u7406\u90fd\u5177\u6709\u6df1\u8fdc\u542f\u793a\u3002",
    "2026-03-24": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-24)\n\n### \u5f15\u8a00\n\n\u4eca\u65e5\u8bba\u6587\u5448\u73b0\u51fa**AI Agent\u5168\u9762\u8fc8\u5411\u5de5\u7a0b\u5316\u4e0e\u81ea\u4e3b\u5316**\u7684\u6838\u5fc3\u8d8b\u52bf\u3002\u4ece\u8bba\u6587\u5206\u5e03\u6765\u770b\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u4ece\u591a\u4e2a\u7ef4\u5ea6\u63a8\u8fdbAgent\u80fd\u529b\u8fb9\u754c\uff1a\u8bb0\u5fc6\u673a\u5236\u4e0e\u81ea\u6211\u8fdb\u5316\u67b6\u6784\u6301\u7eed\u6df1\u5316\uff0c\u4e3aAgent\u8d4b\u4e88\u201c\u6301\u7eed\u5b66\u4e60\u201d\u7684\u53ef\u80fd\uff1b\u5f3a\u5316\u5b66\u4e60\u5728\u957f\u7a0b\u4efb\u52a1\u4e2d\u7684\u843d\u5730\u914d\u65b9\u9010\u6e10\u6e05\u6670\uff0c\u4ece\u5956\u52b1\u8bbe\u8ba1\u5230\u6570\u636e\u6548\u7387\u5747\u6709\u7cfb\u7edf\u6027\u7a81\u7834\uff1b\u6b64\u5916\uff0c\u9488\u5bf9\u4f01\u4e1a\u7ea7\u573a\u666f\u4e0e\u5782\u76f4\u9886\u57df\u7684\u4e13\u7528Agent\u5f00\u59cb\u6d8c\u73b0\uff0c\u6807\u5fd7\u7740Agent\u6280\u672f\u4ece\u6982\u5ff5\u9a8c\u8bc1\u8d70\u5411\u5b9e\u9645\u90e8\u7f72\u7684\u4e34\u754c\u70b9\u6b63\u5728\u5230\u6765\u3002\n\n---\n\n### \u4e3b\u9898\u4e00\uff1a\u8bb0\u5fc6\u4e0e\u81ea\u6211\u8fdb\u5316\u2014\u2014\u8ba9Agent\u5b66\u4f1a\u201c\u79ef\u7d2f\u7ecf\u9a8c\u201d\n\n\u8fd9\u4e00\u4e3b\u9898\u4e0b\u7684\u56db\u7bc7\u8bba\u6587\u5171\u540c\u6307\u5411\u4e00\u4e2a\u6838\u5fc3\u547d\u9898\uff1a\u5982\u4f55\u8ba9Agent\u4e0d\u4ec5\u5b8c\u6210\u5f53\u524d\u4efb\u52a1\uff0c\u8fd8\u80fd\u4ece\u5386\u53f2\u7ecf\u9a8c\u4e2d\u6301\u7eed\u5b66\u4e60\u548c\u8fdb\u5316\u3002\n\n**MemAPO** \u63d0\u51fa\u4e86\u4e00\u79cd\u53cc\u8bb0\u5fc6\u673a\u5236\uff0c\u5c06\u6210\u529f\u7684\u63a8\u7406\u8f68\u8ff9\u63d0\u70bc\u4e3a\u53ef\u590d\u7528\u7684\u7b56\u7565\u6a21\u677f\uff0c\u540c\u65f6\u5c06\u9519\u8bef\u751f\u6210\u7ec4\u7ec7\u4e3a\u7ed3\u6784\u5316\u7684\u9519\u8bef\u6a21\u5f0f\u3002\u9762\u5bf9\u65b0\u4efb\u52a1\u65f6\uff0c\u6846\u67b6\u68c0\u7d22\u76f8\u5173\u7b56\u7565\u4e0e\u9519\u8bef\u6a21\u5f0f\uff0c\u7ec4\u5408\u51fa\u65e2\u80fd\u4fc3\u8fdb\u6709\u6548\u63a8\u7406\u53c8\u80fd\u89c4\u907f\u5df2\u77e5\u5931\u8bef\u7684\u63d0\u793a\u8bcd\u3002\u901a\u8fc7\u8fed\u4ee3\u81ea\u6211\u53cd\u601d\u548c\u8bb0\u5fc6\u7f16\u8f91\uff0cMemAPO\u5b9e\u73b0\u4e86\u63d0\u793a\u4f18\u5316\u7684\u6301\u7eed\u8fdb\u5316\uff0c\u800c\u975e\u6bcf\u6b21\u4efb\u52a1\u90fd\u4ece\u96f6\u5f00\u59cb\u3002\u5b9e\u9a8c\u8868\u660e\u5176\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u65b9\u6cd5\uff0c\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u4e86\u4f18\u5316\u6210\u672c\u3002**(2603.21520 [cs.CL])**\n\n**MAD-M\u00b2** \u805a\u7126\u591aAgent\u8fa9\u8bba\u6846\u67b6\u4e2d\u7684\u9519\u8bef\u8bb0\u5fc6\u95ee\u9898\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u5c3d\u7ba1\u591aAgent\u8fa9\u8bba\uff08MAD\uff09\u663e\u8457\u63d0\u5347\u4e86LLM\u7684\u63a8\u7406\u80fd\u529b\uff0c\u4f46Agent\u5bb9\u6613\u53d7\u5230\u6765\u81ea\u4e0a\u4e00\u8f6e\u8fa9\u8bba\u7684\u9519\u8bef\u8bb0\u5fc6\u5f71\u54cd\uff0c\u5bfc\u81f4\u63a8\u7406\u9000\u5316\u3002\u4f5c\u8005\u63d0\u51fa\u201c\u8bb0\u5fc6\u63a9\u7801\u201d\u673a\u5236\uff0c\u5141\u8bb8Agent\u5728\u6bcf\u8f6e\u8fa9\u8bba\u5f00\u59cb\u65f6\u5c4f\u853d\u9519\u8bef\u8bb0\u5fc6\uff0c\u4fdd\u7559\u6709\u4ef7\u503c\u7684\u4fe1\u606f\uff0c\u4ece\u800c\u63d0\u5347\u8fa9\u8bba\u7684\u9c81\u68d2\u6027\u3002\u5728\u6570\u5b66\u548c\u903b\u8f91\u63a8\u7406\u57fa\u51c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u80fd\u6709\u6548\u8bc6\u522b\u5e76\u8fc7\u6ee4\u9519\u8bef\u8bb0\u5fc6\uff0c\u5b9e\u73b0\u66f4\u4f18\u7684\u63a8\u7406\u6027\u80fd\u3002**(2603.20215 [cs.CL])**\n\n**The Library Theorem** \u4ece\u7406\u8bba\u5c42\u9762\u8bba\u8bc1\u4e86\u5916\u90e8\u5316\u7d22\u5f15\u5bf9Agent\u63a8\u7406\u80fd\u529b\u7684\u51b3\u5b9a\u6027\u4f5c\u7528\u3002\u4f5c\u8005\u5c06Transformer\u4e0a\u4e0b\u6587\u7a97\u53e3\u5f62\u5f0f\u5316\u4e3aI/O\u9875\u9762\uff0c\u8bc1\u660e\u4e86\u5e26\u7d22\u5f15\u7684\u5916\u90e8\u8bb0\u5fc6\u76f8\u6bd4\u987a\u5e8f\u626b\u63cf\u5177\u6709\u6307\u6570\u7ea7\u4f18\u52bf\uff1a\u68c0\u7d22\u6210\u672c\u4ece \u03a9(N) \u964d\u81f3 O(log_b N)\uff0cT\u6b65\u63a8\u7406\u7684\u7d2f\u79ef\u6210\u672c\u4ece \u0398(T\u00b2) \u964d\u81f3 O(T log_b T)\u3002\u5b9e\u9a8c\u572850\u52305000\u6761\u76ee\u7684\u68c0\u7d22\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u8fd9\u4e00\u9884\u6d4b\u2014\u2014\u7d22\u5f15Agent\u59cb\u7ec8\u53ea\u97001\u6b21\u9875\u9762\u8bfb\u53d6\u3002\u66f4\u6df1\u523b\u7684\u53d1\u73b0\u662f\uff1a\u5f53\u6a21\u578b\u9762\u5bf9\u719f\u6089\u5185\u5bb9\u65f6\uff0c\u4f1a\u7ed5\u8fc7\u68c0\u7d22\u534f\u8bae\u76f4\u63a5\u8c03\u7528\u53c2\u6570\u8bb0\u5fc6\uff0c\u5bfc\u81f4\u707e\u96be\u6027\u7684token\u6d88\u8017\u3002\u8fd9\u8bba\u8bc1\u4e86\u201c\u8bed\u4e49\u7406\u89e3\u201d\u4e0e\u201c\u5bfc\u822a\u534f\u8bae\u201d\u7684\u5206\u79bb\u5fc5\u8981\u6027\u2014\u2014\u524d\u8005\u5e94\u7531LLM\u5b8c\u6210\uff0c\u540e\u8005\u5e94\u4ea4\u7ed9\u786e\u5b9a\u6027\u7b97\u6cd5\u3002**(2603.21272 [cs.CL])**\n\n**REVERE** \u9488\u5bf9\u7814\u7a76\u4ee3\u7801\u5de5\u4f5c\u6d41\u4e2d\u7684\u8de8\u4ed3\u5e93\u6267\u884c\u573a\u666f\uff0c\u63d0\u51fa\u6301\u7eed\u5b66\u4e60\u6846\u67b6\u3002\u8be5\u6846\u67b6\u4ece\u5168\u5c40\u8bad\u7ec3\u4e0a\u4e0b\u6587\u8bc6\u522b\u8de8\u4ed3\u5e93\u6267\u884c\u8f68\u8ff9\u4e2d\u7684\u53cd\u590d\u5931\u8d25\u6a21\u5f0f\uff0c\u5c06\u5176\u63d0\u70bc\u4e3a\u53ef\u590d\u7528\u7684\u542f\u53d1\u5f0f\u89c4\u5219\uff0c\u5e76\u9488\u5bf9\u4e09\u4e2a\u53ef\u914d\u7f6e\u5b57\u6bb5\uff08\u7cfb\u7edf\u63d0\u793a\u3001\u4efb\u52a1\u63d0\u793a\u6a21\u677f\u3001\u7d2f\u79ef\u901f\u67e5\u8868\uff09\u6267\u884c\u5b9a\u5411\u7f16\u8f91\u3002\u5728\u7814\u7a76\u7f16\u7801\u4efb\u52a1\u57fa\u51c6\u4e0a\uff0cREVERE\u76f8\u6bd4\u4e13\u5bb6\u624b\u5de5\u8bbe\u8ba1\u7684\u6307\u4ee4\u63d0\u5347\u4e864.50%\uff08SUPER\uff09\u30013.51%\uff08ResearchCodeBench\uff09\u548c4.89%\uff08ScienceAgentBench\uff09\uff0c\u8bc1\u660e\u4e86\u5177\u5907\u5168\u5c40\u8bb0\u5fc6\u6574\u5408\u80fd\u529b\u7684Agent\u80fd\u591f\u968f\u65f6\u95f4\u663e\u8457\u8fdb\u5316\u3002**(2603.20667 [cs.AI])**\n\n---\n\n### \u4e3b\u9898\u4e8c\uff1a\u5f3a\u5316\u5b66\u4e60\u843d\u5730LLM Agent\u2014\u2014\u4ece\u201c\u914d\u65b9\u201d\u5230\u201c\u89c4\u6a21\u5316\u201d\n\n\u8fd9\u4e00\u4e3b\u9898\u805a\u7126\u4e8e\u5982\u4f55\u5c06\u5f3a\u5316\u5b66\u4e60\u771f\u6b63\u5e94\u7528\u4e8e\u957f\u7a0bAgent\u8bad\u7ec3\uff0c\u6db5\u76d6\u7b97\u6cd5\u521b\u65b0\u3001\u8bad\u7ec3\u6548\u7387\u548c\u6570\u636e\u5229\u7528\u7b49\u591a\u4e2a\u7ef4\u5ea6\u3002\n\n**Demystifying RL for Long-Horizon Tool-Using Agents** \u662f\u76ee\u524d\u5173\u4e8eAgentic RL\u6700\u7cfb\u7edf\u7684\u5b9e\u8bc1\u7814\u7a76\u4e4b\u4e00\u3002\u4f5c\u8005\u5728TravelPlanner\u6d4b\u8bd5\u5e8a\u4e0a\u6cbf5\u4e2a\u8f74\uff08\u5956\u52b1\u5851\u9020\u3001\u6a21\u578b scaling\u3001\u6570\u636e\u7ec4\u6210\u3001\u7b97\u6cd5\u9009\u62e9\u3001\u73af\u5883\u7a33\u5b9a\u6027\uff09\u5206\u89e3\u8bbe\u8ba1\u7a7a\u95f4\uff0c\u5f97\u51fa7\u6761\u5173\u952e\u7ed3\u8bba\uff1a\u2460 \u5956\u52b1\u548c\u7b97\u6cd5\u9009\u62e9\u5177\u6709scale\u4f9d\u8d56\u6027\uff0c\u5c0f\u6a21\u578b\u4ece\u5206\u9636\u6bb5\u5956\u52b1\u548c\u589e\u5f3a\u63a2\u7d22\u4e2d\u53d7\u76ca\uff0c\u5927\u6a21\u578b\u53ef\u7528\u7b80\u5355\u5bc6\u96c6\u5956\u52b1\u9ad8\u6548\u6536\u655b\uff1b\u2461 ~1K\u8bad\u7ec3\u6837\u672c\u4e0e\u5747\u8861\u96be\u5ea6\u6df7\u5408\u662f\u57df\u5185\u548c\u57df\u5916\u6027\u80fd\u7684\u201c\u751c\u871c\u70b9\u201d\uff1b\u2462 \u73af\u5883\u7a33\u5b9a\u6027\u5bf9\u9632\u6b62\u7b56\u7565\u9000\u5316\u81f3\u5173\u91cd\u8981\u3002\u57fa\u4e8e\u8fd9\u4e00\u914d\u65b9\u8bad\u7ec3\u7684\u6a21\u578b\u5728TravelPlanner\u4e0a\u8fbe\u5230SOTA\uff0c\u663e\u8457\u9886\u5148\u4e8e\u9886\u5148LLM\u3002**(2603.21972 [cs.CL])**\n\n**AgentHER** \u5c06\u201c\u540e\u89c1\u7ecf\u9a8c\u56de\u653e\u201d\uff08HER\uff09\u601d\u60f3\u5f15\u5165LLM Agent\u8bad\u7ec3\u3002\u6838\u5fc3\u6d1e\u5bdf\u7b80\u5355\u800c\u6709\u529b\uff1a\u4e00\u4e2a\u672a\u80fd\u8fbe\u6210\u76ee\u6807A\u7684\u8f68\u8ff9\uff0c\u5f80\u5f80\u662f\u8fbe\u6210\u67d0\u4e2a\u53ef\u5b9e\u73b0\u66ff\u4ee3\u76ee\u6807B\u7684\u6b63\u786e\u6f14\u793a\u3002AgentHER\u901a\u8fc7\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\u2014\u2014\u5931\u8d25\u5206\u7c7b\u3001\u7ed3\u679c\u63d0\u53d6\u3001LLM\u5f15\u5bfc\u7684\u63d0\u793a\u91cd\u6807\u6ce8\uff08\u5e26\u7f6e\u4fe1\u5ea6\u95e8\u63a7\uff09\u3001\u6570\u636e\u6253\u5305\u2014\u2014\u5c06\u4e22\u5f03\u7684\u5931\u8d25\u8f68\u8ff9\u8f6c\u5316\u4e3a\u9ad8\u8d28\u91cf\u7684SFT\u3001DPO\u548cShareGPT\u8bad\u7ec3\u6570\u636e\u3002\u5728WebArena\u548cToolBench\u4e0a\uff0cAgentHER\u76f8\u6bd4\u4ec5\u7528\u6210\u529f\u6570\u636e\u7684SFT\u63d0\u5347\u4e867.1-11.7\u4e2a\u767e\u5206\u70b9\uff0c\u540c\u65f6\u5b9e\u73b02\u500d\u6570\u636e\u6548\u7387\u2014\u2014\u4ec5\u752850%\u7684\u6210\u529f\u6f14\u793a\u5373\u53ef\u5339\u914d\u57fa\u7ebf\u6027\u80fd\u3002**(2603.21357 [cs.CL])**\n\n**CCPO** \u9488\u5bf9\u591aAgent\u534f\u4f5c\u4e2d\u7684\u4fe1\u7528\u5206\u914d\u96be\u9898\uff0c\u63d0\u51fa\u53cd\u4e8b\u5b9e\u4fe1\u7528\u7b56\u7565\u4f18\u5316\u6846\u67b6\u3002\u6838\u5fc3\u601d\u8def\u662f\u901a\u8fc7\u53cd\u4e8b\u5b9e\u8f68\u8ff9\u4f30\u8ba1\u6bcf\u4e2aAgent\u7684\u8fb9\u9645\u8d21\u732e\u2014\u2014\u6a21\u62df\u201c\u53bb\u6389\u8be5Agent\u7684\u8d21\u732e\u540e\u7ed3\u679c\u4f1a\u5982\u4f55\u201d\uff0c\u4ece\u800c\u83b7\u5f97\u89d2\u8272\u654f\u611f\u7684Advantage\u7528\u4e8e\u7b56\u7565\u4f18\u5316\u3002\u6b64\u5916\uff0c\u4f5c\u8005\u63d0\u51fa\u5168\u5c40\u5386\u53f2\u611f\u77e5\u5f52\u4e00\u5316\u65b9\u6848\uff0c\u5728\u5f02\u8d28\u4efb\u52a1\u548c\u6570\u636e\u5206\u5e03\u4e0b\u6821\u51c6Advantage\u3002\u5728\u987a\u5e8f\u201c\u601d\u8003-\u63a8\u7406\u201d\u4e8c\u5143\u7ec4\u548c\u591aAgent\u6295\u7968\u4e24\u79cd\u534f\u4f5c\u62d3\u6251\u4e0b\uff0cCCPO\u6709\u6548\u7f13\u89e3\u4e86\u201c\u642d\u4fbf\u8f66\u201d\u95ee\u9898\uff0c\u5b9e\u73b0\u4e86\u66f4\u7ec6\u7c92\u5ea6\u4e14\u6709\u6548\u7684\u4fe1\u7528\u5206\u914d\u3002**(2603.21563 [cs.AI])**\n\n**PivotRL** \u65e8\u5728\u89e3\u51b3Agentic\u540e\u8bad\u7ec3\u4e2d\u201c\u8ba1\u7b97\u6548\u7387\u201d\u4e0e\u201c\u6cdb\u5316\u80fd\u529b\u201d\u7684\u5f20\u529b\u3002SFT\u8ba1\u7b97\u9ad8\u6548\u4f46\u5f80\u5f80\u5bfc\u81f4\u57df\u5916\u6027\u80fd\u9000\u5316\uff0c\u7aef\u5230\u7aefRL\u4fdd\u6301\u6cdb\u5316\u80fd\u529b\u4f46\u8ba1\u7b97\u6210\u672c\u9ad8\u6602\u3002PivotRL\u7684\u6838\u5fc3\u673a\u5236\u5305\u62ec\uff1a\u2460 \u5c40\u90e8on-policy rollout\u5e76\u7b5b\u9009\u201cpivot\u201d\u2014\u2014\u5373\u91c7\u6837\u52a8\u4f5c\u5728\u7ed3\u679c\u4e0a\u8868\u73b0\u51fa\u9ad8\u65b9\u5dee\u7684\u4e2d\u95f4\u6b65\u9aa4\uff1b\u2461 \u4f7f\u7528\u529f\u80fd\u7b49\u4ef7\u52a8\u4f5c\u7684\u5956\u52b1\u800c\u975e\u4e25\u683c\u5b57\u7b26\u4e32\u5339\u914d\u3002\u7406\u8bba\u5206\u6790\u8868\u660e\uff0c\u8fd9\u4e9b\u673a\u5236\u6fc0\u52b1\u9ad8\u81ea\u7136\u68af\u5ea6\u8303\u6570\u7684\u5f3a\u5b66\u4e60\u4fe1\u53f7\uff0c\u540c\u65f6\u6700\u5927\u5316\u4fdd\u7559\u4e0e\u8bad\u7ec3\u4efb\u52a1\u65e0\u5173\u52a8\u4f5c\u7684\u6982\u7387\u5e8f\u3002\u5728\u56db\u4e2aAgentic\u9886\u57df\u4e0a\uff0cPivotRL\u6bd4\u6807\u51c6SFT\u5e73\u5747\u63d0\u53474.17%\u57df\u5185\u51c6\u786e\u7387\u548c10.04%\u57df\u5916\u51c6\u786e\u7387\uff1b\u5728Agentic\u7f16\u7801\u4efb\u52a1\u4e0a\uff0c\u4ee54\u500d\u66f4\u5c11\u7684rollout\u8f6e\u6b21\u8fbe\u5230\u4e0eE2E RL\u76f8\u5f53\u7684\u51c6\u786e\u7387\u3002\u8be5\u65b9\u6cd5\u5df2\u88abNVIDIA\u7684Nemotron-3-Super-120B-A12B\u91c7\u7528\u3002**(2603.21383 [cs.AI])**\n\n---\n\n### \u4e3b\u9898\u4e09\uff1a\u5782\u76f4\u9886\u57dfAgent\u2014\u2014\u4ece\u5b66\u672f\u5230\u4ea7\u4e1a\u7684\u843d\u5730\u63a2\u7d22\n\n\u8fd9\u4e00\u4e3b\u9898\u5c55\u793aAgent\u6280\u672f\u5411\u4e13\u4e1a\u9886\u57df\u7684\u6e17\u900f\uff0c\u4ece\u5b66\u672f\u8bba\u6587\u8bc4\u4f30\u5230\u5de5\u4e1a\u8bbe\u8ba1\u5747\u6709\u6d89\u53ca\u3002\n\n**NoveltyAgent** \u9488\u5bf9\u5b66\u672f\u8bba\u6587\u7b5b\u9009\u6210\u672c\u6fc0\u589e\u7684\u95ee\u9898\uff0c\u6784\u5efa\u4e86\u4e00\u4e2a\u591aAgent\u7cfb\u7edf\u6765\u751f\u6210\u5168\u9762\u4e14\u53ef\u4fe1\u7684 novelty\u62a5\u544a\u3002\u7cfb\u7edf\u5c06\u624b\u7a3f\u5206\u89e3\u4e3a\u79bb\u6563\u7684\u521b\u65b0\u70b9\u8fdb\u884c\u7ec6\u7c92\u5ea6\u68c0\u7d22\u548c\u6bd4\u8f83\uff0c\u540c\u65f6\u6784\u5efa\u76f8\u5173\u8bba\u6587\u6570\u636e\u5e93\u5e76\u4ea4\u53c9\u5f15\u7528\u4ee5\u786e\u4fdd\u5fe0\u5b9e\u5ea6\u3002\u4e3a\u89e3\u51b3\u5f00\u653e\u57df\u751f\u6210\u4efb\u52a1\u7684\u8bc4\u4f30\u96be\u9898\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86\u57fa\u4e8e\u68c0\u67e5\u8868\u7684\u8bc4\u4f30\u6846\u67b6\u3002\u5728\u5b9e\u9a8c\u4e2d\uff0cNoveltyAgent\u76f8\u6bd4GPT-5 DeepResearch\u63d0\u534710.15%\uff0c\u8fbe\u5230SOTA\u6027\u80fd\u3002**(2603.20884 [cs.CL])**\n\n**FactorSmith** \u89e3\u51b3\u4ece\u81ea\u7136\u8bed\u8a00\u89c4\u8303\u751f\u6210\u53ef\u6267\u884c\u6a21\u62df\u7684\u6311\u6218\u3002\u6838\u5fc3\u601d\u8def\u7ed3\u5408\u4e86\u4e24\u65b9\u9762\uff1a\u2460 \u57fa\u4e8e\u56e0\u5b50\u5316\u7684POMDP\u5206\u89e3\uff0c\u5c06\u6a21\u62df\u89c4\u8303\u5206\u89e3\u4e3a\u6a21\u5757\u5316\u6b65\u9aa4\uff0c\u6bcf\u4e2a\u6b65\u9aa4\u4ec5\u64cd\u4f5c\u6700\u5c0f\u76f8\u5173\u72b6\u6001\u53d8\u91cf\u5b50\u96c6\uff0c\u4ece\u800c\u9650\u5236\u5355\u6b21LLM\u8c03\u7528\u9700\u5904\u7406\u7684\u4e0a\u4e0b\u6587\uff1b\u2461 \u5d4c\u5165Planner-Designer-Critic\u4e09\u5c42Agentic\u5de5\u4f5c\u6d41\uff0c\u5728\u6bcf\u4e2a\u56e0\u5b50\u5316\u6b65\u9aa4\u4e2d\u5b9e\u73b0\u8fed\u4ee3\u8d28\u91cf\u4f18\u5316\u548c\u68c0\u67e5\u70b9\u56de\u6eda\u3002\u5728PyGame\u5b66\u4e60\u73af\u5883\u57fa\u51c6\u4e0a\uff0cFactorSmith\u751f\u6210\u7684\u6a21\u62df\u5728\u63d0\u793a\u5bf9\u9f50\u3001\u8fd0\u884c\u65f6\u9519\u8bef\u548c\u4ee3\u7801\u8d28\u91cf\u4e0a\u5747\u4f18\u4e8e\u975eAgentic\u57fa\u7ebf\u3002**(2603.20270 [cs.AI])**\n\n**Unified-MAS** \u9488\u5bf9\u77e5\u8bc6\u5bc6\u96c6\u578b\u9886\u57df\uff08\u5982\u533b\u7597\u3001\u6cd5\u5f8b\uff09\u4e2d\u81ea\u52a8\u591aAgent\u7cfb\u7edf\u751f\u6210\u7684\u74f6\u9888\u3002\u73b0\u6709\u6846\u67b6\u8981\u4e48\u4f9d\u8d56\u9759\u6001\u901a\u7528\u8282\u70b9\uff08\u5982CoT\uff09\u7f3a\u4e4f\u4e13\u4e1a\u6027\uff0c\u8981\u4e48\u5728\u751f\u6210\u8282\u70b9\u65f6\u540c\u65f6\u53d7\u9650\u4e8e\u5185\u90e8\u77e5\u8bc6\u6781\u9650\u548c\u62d3\u6251\u4f18\u5316\uff0c\u5bfc\u81f4\u4e25\u91cd\u7684\u67b6\u6784\u8026\u5408\u3002Unified-MAS\u901a\u8fc7\u4e24\u9636\u6bb5\u89e3\u8026\uff1a\u2460 \u57fa\u4e8e\u641c\u7d22\u7684\u8282\u70b9\u751f\u6210\uff0c\u68c0\u7d22\u5916\u90e8\u5f00\u653e\u4e16\u754c\u77e5\u8bc6\u5408\u6210\u4e13\u7528\u8282\u70b9\u84dd\u56fe\uff1b\u2461 \u57fa\u4e8e\u56f0\u60d1\u5ea6\u7684\u5956\u52b1\u4f18\u5316\uff0c\u8fed\u4ee3\u589e\u5f3a\u74f6\u9888\u8282\u70b9\u7684\u5185\u90e8\u903b\u8f91\u3002\u5728\u56db\u4e2a\u4e13\u4e1a\u9886\u57df\u7684\u5b9e\u9a8c\u4e2d\uff0c\u5c06 Unified-MAS \u96c6\u6210\u5230\u56db\u4e2a\u81ea\u52a8MAS\u57fa\u7ebf\u4e2d\uff0c\u5b9e\u73b0\u4e86\u6700\u9ad814.2%\u7684\u6027\u80fd\u63d0\u5347\u540c\u65f6\u663e\u8457\u964d\u4f4e\u6210\u672c\u3002**(2603.21475 [cs.AI])**\n\n**A Blueprint for Self-Evolving Coding Agents in Vehicle Aerodynamic Drag Prediction** \u9488\u5bf9\u6c7d\u8f66\u7a7a\u6c14\u52a8\u529b\u5b66\u8bbe\u8ba1\u4e2d\u7684\u5de5\u4f5c\u6d41\u6469\u64e6\u95ee\u9898\uff0c\u63d0\u51fa\u81ea\u8fdb\u5316\u7f16\u7801Agent\u7684\u5951\u7ea6\u5f0f\u84dd\u56fe\u3002\u65b9\u6cd5\u5c06\u4ee3\u7406\u53d1\u73b0\u5f62\u5f0f\u5316\u4e3a\u7a0b\u5e8f\u4e0a\u7684\u7ea6\u675f\u4f18\u5316\uff0c\u7ed3\u5408Famou-Agent\u98ce\u683c\u7684\u8bc4\u4f30\u5668\u53cd\u9988\u4e0e\u57fa\u4e8e\u79cd\u7fa4\u7684\u5c9b\u5c7f\u6f14\u5316\u3001\u7ed3\u6784\u5316\u53d8\u5f02\uff08\u6570\u636e\u3001\u6a21\u578b\u3001\u635f\u5931\u3001\u5206\u5272\u7b56\u7565\uff09\u548c\u591a\u76ee\u6807\u9009\u62e9\u3002\u786c\u6027\u8bc4\u4f30\u5951\u7ea6\u5728\u5019\u9009\u65b9\u6848\u88ab\u63a5\u53d7\u524d\u5f3a\u5236\u6267\u884c\u9632\u6cc4\u6f0f\u30         // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {

            if (isDeleted) return '';
            if (showOnlyStarred && !isStarred) return '';
            if (!paperMatchesFilters(paper, date)) return '';

            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';
            const tagBadges = (paper.tags || []).map(tag => `<span class="tag-badge tag-arxiv">${tag}</span>`).join('');

            return `
                <div class="paper-item bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-6" data-arxiv-id="${paper.arxiv_id}">

                    <div class="flex items-start justify-between mb-1">

                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (paper.summary) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (paper.summary_translation) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">

            // 原始摘要

                            <div class="inner">
                                <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                    ${paper.summary ? `
                                    <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                    </div>` : ''}
                                    ${paper.summary_translation ? `
                                    <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: none;">
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            sections.forEach(s => {
                if (paper[s.key]) {
                    html += `
                        <div class="mb-3 sm:mb-4">
                            <div class="collapsible-header text-sm sm:text-base" onclick="toggleCollapsible(this)">${s.title}</div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">
                                        <div class="text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="${s.id}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            // 论文链接
            html += `
                <div class="flex flex-wrap gap-2">
                    <a href="https://arxiv.org/abs/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">
                        arXiv 原文
                    </a>
                    <a href="https://arxiv.org/pdf/${aid}.pdf" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-md transition-colors whitespace-nowrap">
                        PDF 下载
                    </a>
                    <a href="https://papers.cool/arxiv/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">
                        Cool Paper
                    </a>
                </div>
            `;

            container.innerHTML = html;

            // Render the open summary section's markdown immediately
            container.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));

            // Apply summary language setting
            if (showChineseSummary) {
                const ch = container.querySelector('.chinese-summary');
                const en = container.querySelector('.english-summary');

                if (en) en.style.display = 'none';

        // Toggle paper detail expansion
        function togglePaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            const hint = document.getElementById(`expand-hint-${arxivId}`);
            if (!container) return;

            const isHidden = container.classList.contains('hidden');
            if (isHidden) {
                // First expand: build the DOM
                buildPaperDetail(arxivId);
                container.classList.remove('hidden');
                if (hint) {
                    hint.querySelector('.expand-arrow').textContent = '▼';
                    hint.childNodes[hint.childNodes.length - 1].textContent = ' 点击标题收起';
                }
            } else {
                container.classList.add('hidden');
                if (hint) {
                    hint.querySelector('.expand-arrow').textContent = '▶';
                    hint.childNodes[hint.childNodes.length - 1].textContent = ' 点击标题展开详情';
                }
            }
        }

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表
        function renderPapers() {
            const mainContent = document.getElementById('main-content');
            const loading = document.getElementById('loading');

            if (loading) {
                loading.classList.add('hidden');
            }

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date];
                if (clusters.length === 0) continue;

                const { html: papersHTML, count: dateVisibleTotal } = collectPapersForDate(clusters, date);

                totalPapers += dateVisibleTotal;

                // 如果该日期下没有可见论文，跳过
                if (dateVisibleTotal === 0) continue;

                html += `
                    <section class="mb-6 sm:mb-8" data-date-section="${date}">
                        <h2 class="text-base sm:text-lg font-medium text-slate-500 dark:text-slate-400 mb-3 sm:mb-4" data-date-heading="${date}">${date} (${dateVisibleTotal} 篇论文)</h2>
                `;

                // 添加该日期的AI论文速览（如果存在）
                if (dailyOverviews[date]) {
                    html += `
                        <div class="mb-3 sm:mb-4 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-700 rounded-lg shadow-md p-3 sm:p-5">
                            <div class="collapsible-header" onclick="toggleCollapsible(this)">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-600 dark:text-blue-400 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                                </svg>
                                <span class="font-semibold text-slate-900 dark:text-white text-sm sm:text-base">今日AI论文速览</span>
                            </div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="markdown-content text-slate-700 dark:text-slate-200 text-xs sm:text-sm" id="overview-${date}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                `;
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();

            updateFilterButtons();

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
