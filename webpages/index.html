                    "summary": "Multi-agent tool calling is becoming the dominant interaction pattern for LLM-based systems, yet existing inference frameworks treat each tool call as an independent request, re-processing the entire conversation from scratch even though 85-95% of the prompt is unchanged from the previous turn. We present a stateful inference architecture that converts the $O(n_t)$ per-turn cost of conventional serving into an $O(Δ_t)$ delta-only cost: a persistent KV cache lives across turns and advances by ingesting only the new tokens, while a radix prefix cache extends this across interleaved multi-agent traffic and a prompt-lookup speculative decoder accelerates structured output. Against vLLM and SGLang on novel, fully-generated workloads, the reference implementation is $2.1\\times$ faster per turn on a 6-turn agentic workflow and $4.2\\times$ on the median turn of a 35-turn one, halving end-to-end wall time. The advantage comes from stateful reuse and speculation, not caching.",

                    "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (Agentic, Multi-Agent)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。",
                    "intro_logic": "1. LLM推理范式已从单次问答转变为多轮、多Agent的Tool Calling交互模式。\n2. 该工作负载具有独特的结构特征：对话历史单调增长，每轮仅在巨大的已见前缀上追加少量新Token。\n3. 现有的Request-driven推理框架（如vLLM和SGLang）将每次API调用视为独立请求，导致每轮都重新处理完整的前缀，造成大量计算浪费。\n4. 现有的Prefix Caching机制主要针对多用户共享静态System Prompt的场景，在多Agent交错请求时，缓存驱逐策略会导致状态丢失，迫使重新计算。\n5. 这种冗余的Prefill计算显著降低了生产环境中GPU集群的有效利用率，并直接增加了计算成本。\n6. 如何通过在请求间保留和复用中间状态，将每轮推理成本从O(nt)降低为仅处理新增Token的O(∆t)，从而解决多Agent Tool Calling场景下的低延迟与高利用率问题？",
                    "core_insight": "作为学术分析师，我深入剖析了这篇关于 **Stateful Inference for Low-Latency Multi-Agent Tool Calling** 的论文。以下是对其核心智力贡献的解构：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n现有的推理框架错误地将多智能体对话中的每一轮交互视为独立的“无状态”请求，而作者意识到，对于工具调用（Tool Calling）工作负载，**对话历史是单调增长的（monotonically growing），且相邻轮次间存在极高的前缀重叠率（85-95%），因此推理成本应从处理整个提示词 $O(n_t)$ 转变为仅处理增量部分 $O(\\Delta_t)$。**\n\n**展开解释：**\n传统的 LLM 推理引擎（如 vLLM, SGLang）设计初衷是处理大量并发、独立的短请求（如搜索查询或单次问答）。在这种范式下，每个请求结束后，KV Cache 通常被释放或仅保留极短时间的静态前缀。然而，在多智能体（Multi-Agent）场景中，一个 Agent 会进行多轮对话，每一轮都在上一轮的基础上追加少量新 Token（工具结果、新指令）。\n\n作者敏锐地指出，这种工作负载具有**“单调增长的前缀结构”**。在典型的 5 轮对话中，最后一轮的 Prompt 可能包含 950 个 Token，但只有 150 个是新产生的，其余 800 个 Token 在之前的轮次中已经被计算过并生成了 KV Cache。现有的“基于请求”（Request-driven）的系统在每一轮都重新执行 Prefill（预填充），导致巨大的计算浪费。\n\n**原文证据：**\n> \"Existing inference frameworks treat each tool call as an independent request, re-processing the full conversation from scratch even when only a few tokens have changed. This is wasteful: in a typical 5-turn agent conversation, 85–95% of the prompt is identical across consecutive turns.\" (Abstract)\n\n> \"The wasted work is not academic... a substantial fraction of the gap to peak is consumed by exactly this pattern of redundant per-request prefill, applied across the long tail of agentic traffic where every turn re-processes the prefix of the previous turn.\" (Section 1)\n\n> \"The critical observation: $P_a(t)$ is a strict prefix extension of $P_a(t-1)$... The remaining 800 tokens have already been processed in prior turns.\" (Section 2.1)\n\n---\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接推导出了论文的核心架构设计，其推理链条如下：\n\n1.  **从“无状态”到“有状态”的范式转移**：\n    *   *洞察*：既然前缀是重复的，就不应该丢弃它。\n    *   *方法*：引入 **Stateful Sessions** 和 **Sequence Pool**。不再为每个 API 调用创建新的推理上下文，而是维护一个持久的 KV Cache，通过线程安全的空闲列表复用序列 ID（Sequence IDs）。这使得 KV Cache 可以在请求之间存活。\n\n2.  **从“块级缓存”到“元数据别名”的效率跃迁**：\n    *   *洞察*：现有的前缀缓存（如 SGLang 的 RadixAttention）在多智能体交错请求时，由于缓存驱逐策略（Eviction Policy）和页面映射开销，无法有效保留单个 Agent 的长对话历史。\n    *   *方法*：提出 **Radix Prefix Cache with Metadata-Only Sequence Aliasing**。\n        *   传统方法恢复前缀需要重建页表映射，成本与长度 $m$ 相关。\n        *   作者的方法通过重写统一 KV Cache 中的指针（Pointer），以 $O(1)$ 的时间复杂度将新序列“别名”（Alias）到已有的缓存前缀上。这意味着恢复 1000 个 Token 的前缀和恢复 10 个 Token 的前缀成本相同。\n        *   结合 **Leaf-oldest LRU** 驱逐策略，优先保留共享的系统提示词（System Prompts）和工具模式（Tool Schemas），而丢弃对话尾部，从而在有限的显存中最大化缓存命中率。\n\n3.  **从“通用生成”到“结构化投机”的加速**：\n    *   *洞察*：工具调用的输出是高度结构化的 JSON，且往往在 Prompt 中已经出现了工具名称和参数键。\n    *   *方法*：引入 **Prompt-Lookup Speculative Decoding (PLD)**。\n        *   不需要额外的 Draft Model（草稿模型），而是直接在当前 Prompt 和已生成的 Token 缓冲区中查找最长的后缀匹配（Suffix-anchored n-gram）。\n        *   利用这种重复性进行投机解码，将生成 $m$ 个 Token 所需的 $m$ 次前向传播减少为 $\\lceil m / (k+1) \\rceil$ 次，其中 $k$ 是投机接受的 Token 数。\n\n**原文证据：**\n> \"The core construct is a stateful KV cache that lives across persistent sessions, advanced by ingesting only the new tokens on each turn.\" (Abstract)\n\n> \"A radix prefix cache extends this property... via metadata-only sequence aliasing in a unified KV cache... restoring an m-token prefix in constant time independent of m.\" (Abstract)\n\n> \"We observe that tool-calling outputs are highly structured and repetitive... We exploit this with prompt-lookup decoding (PLD)... for each generation step, we scan the slot’s recent token buffer for the longest suffix-anchored n-gram that matches the trailing context.\" (Section 3.6)\n\n---\n\n### 3. 试错历程与调整\n\n作者在实现过程中遇到了几个关键的工程挑战和意料之外的困难，并据此调整了方案：\n\n1.  **多智能体交错导致的缓存失效（Cache Eviction under Interleaving）**：\n    *   *困难*：最初可能假设简单的 Radix Tree 就能解决问题。但在实际测试中发现，当多个 Agent（A, B, C）交错发送请求时，传统的块分页缓存（Block-paged caches）会因为容量限制而驱逐掉 Agent A 的缓存，导致 Agent A 的下一轮请求必须重新计算。\n    *   *调整*：设计了 **Cell-Budget Admission** 和 **Leaf-oldest LRU**。\n        *   不再简单地驱逐任意块，而是基于“单元格预算”（Cell Budget）进行细粒度的准入控制。\n        *   驱逐策略改为“叶子节点最旧优先”（Leaf-oldest），这确保了共享的长前缀（如 System Prompt）被保留，而只丢弃各个对话中不再需要的尾部。这解决了多租户环境下的缓存污染问题。\n\n2.  **投机解码在高并发下的吞吐量崩溃**：\n    *   *困难*：朴素的 Prompt-Lookup Decoding 在高并发（High Admission）下会导致吞吐量下降。因为验证（Verification）的成本随着并发解码器数量的增加而线性增加，且在不熟悉的内容上接受率很低，导致大量的无效计算。\n    *   *调整*：引入 **Concurrency-Capped Admission** 和 **Acceptance Gating**。\n        *   调度器根据活跃解码器的数量和每个 Slot 的历史接受率，动态限制每个 Slot 的投机长度（Draft Length）。\n        *   当接受率低于置信阈值时，自动降低投机窗口，避免在自由文本生成时浪费验证资源。\n\n3.  **无效生成的浪费（Wasted Decode after Tool Call）**：\n    *   *困难*：即使加速了生成，模型往往会在生成完有效的 JSON 工具调用后，继续生成无关的“尾随散文”（Trailing Prose），或者生成格式错误的 JSON，导致后续解析失败或需要重新生成。\n    *   *调整*：引入 **Streaming Tool-Call Validator**。\n        *   这是一个轻量级的 CPU 端状态机，实时跟踪 JSON 的大括号平衡（Brace-balanced）。\n        *   一旦检测到工具调用结构完整（深度归零），立即发送 Early-Stop 信号，终止 GPU 上的生成过程。这不仅节省了时间，还通过过滤未声明的工具名称（Declared-tool filter）提高了正确性。\n\n**原文证据：**\n> \"When multiple agents interleave requests, cache eviction policies optimized for shared prefixes fail: Agent B’s request evicts Agent A’s cached state, forcing full recomputation on Agent A’s next turn.\" (Section 1) -> *Led to Leaf-oldest LRU and Cell-Budget Admission.*\n\n> \"Without coordination, speculation collapses at high admission: verification cost scales as the product of the per-slot draft length and the number of concurrent decoders... The scheduler caps the per-slot draft length as a joint function of the number of active decoders...\" (Section 3.2)\n\n> \"An unconstrained model frequently emits malformed JSON... We address this with a low-overhead streaming validator... when depth returns to zero, the validator signals an early-stop... eliminating wasted decode after the call is complete.\" (Section 3.7)\n\n### 总结\n\n这篇论文的 **Intellectual Insight** 在于**重新定义了 LLM 推理的时间粒度**：从“以请求为单位”转变为“以增量 Token 为单位”。作者没有试图优化单个请求的 Prefill 速度，而是通过**状态持久化（Statefulness）**和**元数据别名（Metadata Aliasing）**，从根本上消除了重复计算。这是一种系统架构层面的范式转移，专门针对 Agentic 工作负载的“长上下文、高重叠、结构化输出”特性进行了深度定制。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\n这篇论文讲的是一个专门给“多智能体（Multi-Agent）”系统用的推理加速方案。\n\n现在的通用推理框架（如 vLLM、SGLang）把每一次 API 调用都当成全新的、独立的请求。哪怕是一个智能体在对话中只加了一句话，系统也会把之前几千字的对话历史重新计算一遍。这就像你写日记，每次加一行新字，都要把整本日记重新抄写一遍。\n\n这套新系统反其道而行之：它把整个对话过程当成一个**连续不断的长任务**。它让对话的“记忆”（KV Cache）一直留在显存里，不释放。当智能体下一轮只加了一小段新内容时，系统只计算这一小段新内容，直接跳过之前已经算过的几千字。同时，它利用工具调用输出格式固定（都是 JSON）的特点，通过“猜”的方式一次性生成多个词，而不是一个词一个词地算。\n\n### 2. 一句话概括核心创新\n\n**最本质的区别是：将推理成本从“每轮重新计算整段历史（O(N)）”变成了“每轮只计算新增的那一点点内容（O(Δ)）”，通过让对话状态在显存中持久化并复用，彻底消除了重复计算。**\n\n---\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：预分配“座位”（Sequence Pool）\n*   **输入**：一个新的智能体对话请求到达。\n*   **操作**：系统不从零开始分配显存，而是从一个预先建好的、固定的“座位池”里，直接拿一个空闲的“座位 ID\"（Sequence ID）给这个请求。这个座位在显存里已经预留好了位置，只是暂时没数据。\n*   **输出**：一个可用的、指向显存特定区域的序列 ID。\n*   **目的**：解决“每次请求都要重新分配显存、初始化状态”带来的几十到几百毫秒的启动延迟。\n*   **如果不做会怎样**：每次对话开始都要花大量时间做内存分配和初始化，导致首字延迟（TTFT）极高，无法应对高频的短对话。\n\n#### 第二步：查找并“嫁接”历史（Radix Prefix Cache）\n*   **输入**：当前请求的完整提示词（包含之前的对话历史 + 新的一句话）。\n*   **操作**：\n    1.  系统拿着新提示词去查一个“前缀树”（Radix Trie），看有没有之前算过的、完全一样的历史片段。\n    2.  如果找到了（比如前 900 个字都匹配），系统**不重新计算**这 900 个字。\n    3.  它直接修改当前“座位”的指针，让它**指向**之前那个已经算好并保存在显存里的“历史片段”的内存地址。这叫“元数据别名”（Metadata-only aliasing）。\n    4.  系统只把剩下的那“新的一句话”（比如 50 个字）送入模型进行计算。\n*   **输出**：一个包含了完整历史状态（通过指针指向旧数据）且只计算了新内容的推理上下文。\n*   **目的**：解决“重复计算”问题。在智能体对话中，95% 的内容是重复的，只算那 5% 的新内容能极大节省算力。\n*   **如果不做会怎样**：模型会傻乎乎地把那 900 个字重新算一遍，导致每轮对话的耗时随着对话变长而线性爆炸。\n\n#### 第三步：批量“猜”结果（Prompt-Lookup Speculative Decoding）\n*   **输入**：模型开始生成工具调用的 JSON 格式输出。\n*   **操作**：\n    1.  系统观察当前生成的词和之前的历史，发现工具调用有很多固定格式（比如 `{\"name\": \"get_weather\", ...`）。\n    2.  系统直接“猜”出接下来的一串词（比如猜后面是 `\", \"parameters\": {`）。\n    3.  系统把这“猜出来的一串词”打包，一次性送入模型验证。\n    4.  如果模型同意（验证通过），这一串词就一次性输出；如果中间有一个词不对，就只保留对的部分，剩下的继续猜。\n*   **输出**：一次性生成的多个 Token，而不是一个一个蹦出来的。\n*   **目的**：解决“生成速度慢”的问题。工具调用格式固定，适合批量猜测，能大幅减少模型向前传播（Forward Pass）的次数。\n*   **如果不做会怎样**：模型必须一个词一个词地串行生成，对于长一点的 JSON 结构，耗时会成倍增加。\n\n#### 第四步：边生成边检查（Streaming Tool-Call Validator）\n*   **输入**：模型正在输出的每一个字符片段。\n*   **操作**：\n    1.  一个轻量级的程序在后台实时数大括号 `{}` 的个数。\n    2.  一旦大括号闭合（JSON 结构完整），立刻发出“停止”信号。\n    3.  同时检查生成的工具名是否在允许列表中，不在就拦截。\n*   **输出**：一个结构完整、合法的 JSON 工具调用，且没有多余的废话。\n*   **目的**：解决“模型啰嗦”和“幻觉”问题。防止模型在工具调用结束后还继续生成废话，浪费算力；防止模型编造不存在的工具。\n*   **如果不做会怎样**：模型可能会在 JSON 结束后继续生成几百个无用的字符，或者生成错误的工具名，导致后续流程报错或浪费推理时间。\n\n---\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n论文虽然没有传统意义上的“去掉模块 A 测一次，去掉模块 B 测一次”的表格，但通过对比实验（Novel Workflows vs. Baselines）和不同深度的对话场景，清晰地展示了各组件的贡献：\n\n*   **哪个组件贡献最大？**\n    *   **Radix Prefix Cache（前缀缓存）** 是绝对的核心。\n    *   **证据**：在 6 轮对话中，新系统比 vLLM 快 2.1 倍；在 35 轮深度对话中，快 4.2 倍。\n    *   **原因**：随着对话轮数增加，历史内容（Prefix）越来越长，新增内容（Delta）占比越来越小。前缀缓存让计算量只与“新增内容”成正比，而传统框架与“总长度”成正比。对话越深，差距越大（从 2.1 倍扩大到 4.2 倍），直接证明了消除重复计算是性能提升的主因。\n\n*   **哪个组件可有可无？**\n    *   **Prompt-Deterministic Response Cache（完全重复提示词的缓存）** 在“全新对话”场景下是可有可无的。\n    *   **证据**：论文特意强调，在主要对比实验（Novel workflows）中，**刻意关闭**了这个缓存，因为实验场景是“每一轮都是新内容，没有完全重复的提示词”。即使没有它，系统依然比竞品快 2-4 倍。\n    *   **含义**：这说明系统的核心优势在于**增量计算**（处理新内容），而不是简单的**结果缓存**（处理旧内容）。结果缓存只是锦上添花，用于处理重试或轮询场景。\n\n*   **各组件之间是否有协同效应？**\n    *   **有，且非常关键。**\n    *   **协同点**：**前缀缓存** + **推测解码**。\n    *   **解释**：前缀缓存解决了“输入端”的重复计算，让模型能专注于生成新内容；推测解码解决了“输出端”的串行瓶颈。\n    *   **数据支持**：在 35 轮深度对话中，如果只有前缀缓存，虽然省去了输入计算，但生成 JSON 依然要一个词一个词算。加上推测解码后，生成速度进一步加快。论文提到在结构化输出（工具调用）上，推测解码能减少一个数量级的计算步数。两者结合，才实现了“输入只算增量，输出批量生成”的双重加速。\n\n*   **回扣动机：**\n    *   论文提出的痛点是：现有框架把每轮对话当独立请求，导致 85-95% 的算力浪费在重算历史。\n    *   **实验结论**：35 轮对话中，新系统耗时 31 秒，竞品耗时 64 秒。这直接证明了**Radix Prefix Cache**成功解决了“重复计算历史”的痛点。\n    *   **实验结论**：在 6 轮对话中，新系统依然快 2.1 倍，说明**推测解码**和**流式验证**解决了“生成效率低”和“无效输出”的痛点。\n\n---\n\n### 5. 这套方法的硬伤在哪里？\n\n根据论文的 Limitation 部分，这套方法有两个明显的边界条件：\n\n1.  **显存占用随并发量线性增长**：\n    *   因为系统要把每个智能体的对话历史都“常驻”在显存里（不释放），如果同时有 1000 个智能体在对话，且每个对话都很长，显存会瞬间爆满。\n    *   **大白话**：它省了计算时间，但占了更多内存。如果并发用户太多，或者对话特别长，显存不够用，系统就得把旧的对话历史踢出去（Eviction），一旦踢出去，下次再聊就得重新算，优势就没了。\n\n2.  **对“完全匹配”的依赖**：\n    *   前缀缓存要求历史内容必须**完全一致**（Exact Match）。\n    *   **大白话**：如果智能体在对话中途稍微改了一个字，或者系统提示词（System Prompt）微调了一下，之前的缓存就全部失效，必须重新计算。它无法处理“模糊匹配”或“部分修改”的情况，只适合那种“只增不减、严格按顺序追加”的对话模式。",
                    "additional_insights": "基于论文《Stateful Inference for Low-Latency Multi-Agent Tool Calling》，以下是除核心方法（Radix Prefix Cache 等）之外，能显著提升认知的有价值内容：\n\n1.  **反直觉发现：现有主流框架的“前缀缓存”在多 Agent 交错场景下几乎失效**\n    尽管 vLLM 和 SGLang 都具备前缀缓存（Prefix Caching）功能，但在多 Agent 交错请求（Interleaved Requests）场景下，由于缓存驱逐策略（Eviction Policy）针对的是共享静态 System Prompt 而非动态增长的会话历史，导致 Agent B 的请求会强制驱逐 Agent A 的缓存状态，迫使 Agent A 在下一轮重新计算整个前缀。\n    *依据：Section 1 & 3.9 指出，现有框架的缓存策略是为“多用户共享静态 System Prompt\"设计的，而非“单 Agent 增量构建会话”，导致在交错请求下缓存命中率极低，造成大量冗余计算。*\n\n2.  **有启发性的分析：延迟优势随对话深度呈非线性（指数级）扩大**\n    实验显示，在 6 轮对话中，新架构仅比 vLLM/SGLang 快 2.1 倍；但在 35 轮深度对话中，单轮延迟优势扩大至 4.2 倍，端到端耗时减半。这揭示了多 Agent 工作负载的核心特征：随着对话轮数增加，冗余前缀（Redundant Prefix）的占比从 85% 激增至 95% 以上，使得 $O(\\Delta_t)$ 与 $O(n_t)$ 的复杂度差异被深度放大。\n    *依据：Section 5.2 及 Figure 2/3 展示了随着 Turn 数从 6 增加到 35，Speedup 从 2.1x 跃升至 4.2x，证明了“对话深度”是决定性能差距的关键变量。*\n\n3.  **对领域的新认知：结构化输出（Tool Calling）是 Speculative Decoding 的“天然温床”**\n    论文指出，传统的 Speculative Decoding 需要额外的 Draft Model，但在 Tool Calling 场景下，由于输出高度结构化（如重复的 JSON 键值对 `{\"name\": \"...\", \"parameters\": {...}`），利用 Prompt-Lookup Decoding (PLD) 仅从当前 Prompt 和历史 Token 中查找 n-gram 即可实现极高的接受率（Acceptance Rate），无需训练额外模型。\n    *依据：Section 3.6 强调 Tool-calling outputs are \"highly structured and repetitive\"，使得 PLD 在结构化区域能达到近 100% 的接受率，而无需传统 Speculative Decoding 所需的 Draft Model 开销。*\n\n4.  **实用的工程经验：流式验证（Streaming Validator）比语法约束解码（Constrained Decoding）更高效**\n    在 Tool Calling 中，与其在每一步生成时通过 Masking Logits 进行昂贵的语法约束解码，不如使用轻量级的流式 JSON 解析器（Brace-balanced tracker）在生成完成后立即截断。这种方法在 CPU 上运行，能节省 20-40% 的解码 Token（避免生成工具调用后的多余废话），且开销远低于每步 Logits 掩码。\n    *依据：Section 3.7 指出，Brace-balanced JSON tracker 比 Grammar-based constrained decoding 更便宜，因为它只处理已生成的文本片段，且能消除模型在工具调用完成后倾向于生成的\"trailing prose\"。*\n\n5.  **局限性中的机会：多 GPU 分布式缓存协调是下一个性能瓶颈**\n    作者明确承认当前架构局限于单 GPU 内存，当并发 Agent 数量或对话长度导致 KV Cache 超出单卡容量时，系统会退化为全量重算。这暗示了未来研究的关键方向是：如何在多 GPU 环境下实现跨节点的 Radix Prefix Cache 共享与元数据别名（Metadata-only aliasing），以解决大规模集群下的状态持久化问题。\n    *依据：Section 6.2 Limitations 明确指出 \"Single-GPU scope\" 是主要限制，且 \"Multi-GPU deployments would require distributed cache coordination\"，这是当前架构无法覆盖的扩展性瓶颈。*\n\n6.  **认知修正：Prompt Determinism 是构建高效响应缓存（Response Cache）的基石**\n    通常认为 LLM 的随机性（Temperature > 0）使得缓存难以复用，但论文提出通过 FNV-1a 哈希 Prompt 来固定 Sampler 的 Seed，可以在保持 Temperature 设置的同时实现“相同 Prompt 必得相同 Output\"。这使得在 Agent 重试、轮询（Polling）等场景下，能以网络延迟（Network-roundtrip）直接返回结果，完全绕过 GPU 推理。\n    *依据：Section 3.5 提出 \"Prompt-Deterministic Response Cache\"，通过 `seed = FNV-1a(T) mod 2^32` 实现确定性采样，使得重复请求无需 GPU 工作即可返回，这是 vLLM/SGLang 目前缺乏的能力。*",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文针对的是当前LLM应用中最主流且增长最快的范式——多Agent Tool Calling。实验数据显示，在35轮深度对话中，端到端耗时减半（31秒 vs 64秒），单轮延迟优势达4.2倍。这直接解决了生产环境中GPU利用率低和成本高企的核心痛点。\n**负面证据或缺失**：目前主要局限于单GPU场景，且依赖“完全匹配”的前缀缓存，在大规模分布式集群或动态修改Prompt的场景下，其实际部署的通用性受限。\n**判断**：强\n**理由**：该工作直接切中了当前LLM推理基础设施（如vLLM, SGLang）在多轮交互场景下的最大性能瓶颈，其带来的2-4倍加速对于降低企业级Agent应用成本具有立竿见影的经济价值，足以改变现有推理框架的设计思路。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：现有主流框架（vLLM/SGLang）虽然具备Prefix Caching，但其设计初衷是共享静态System Prompt，而非处理单Agent动态增长的会话历史。论文指出现有机制在多Agent交错请求下因驱逐策略导致缓存失效，这是一个被忽视的系统级缺陷。提出的“元数据别名”和“状态持久化”架构是对现有Request-driven范式的根本性重构。\n**负面证据或缺失**：Prefix Caching本身并非新概念，Radix Tree也是成熟数据结构。创新点在于将其适配到Stateful场景，而非算法本身的原创性。\n**判断**：中等\n**理由**：虽然核心数据结构不新，但将“无状态请求”重构为“有状态会话”的系统架构设计具有独特性。然而，随着社区对Agent负载的关注，类似的优化思路（如持续会话缓存）可能在短期内被其他团队独立提出，因此其不可替代性更多体现在工程实现的完备性上，而非理论独占性。\n\n**3. 时机判断（Timing）**\n**正面证据**：LLM应用正从单次问答向复杂的多Agent协作转变，Tool Calling成为标配。此时，推理框架的瓶颈已从“首字延迟”转移到“多轮累积延迟”。论文发表于2026年（假设未来时间或笔误，按当前语境理解为Agent爆发期），正是行业急需解决长上下文重复计算问题的时刻。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：该研究精准踩中了LLM应用范式转移（从Chat到Agent）与基础设施瓶颈（重复计算）的交汇点。在Agent工作负载成为主流之前，这类优化是锦上添花；在成为主流之后，则是雪中送炭，时机极佳。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：论文明确挑战了“每次API调用视为独立请求”的行业惯例。它指出这种无状态假设在多轮对话中导致了85-95%的算力浪费。通过引入“状态持久化”和“增量计算”，它质疑了现有推理引擎在处理长尾交互时的基本假设。\n**负面证据或缺失**：这种挑战更多是工程架构层面的，而非理论层面的颠覆。它没有否定Transformer架构，只是优化了其推理流程。\n**判断**：强\n**理由**：它成功地将推理范式从“无状态、批处理”推向“有状态、流式增量”，这是对当前主流推理引擎设计哲学的一次有力修正，揭示了现有框架在特定负载下的结构性低效。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见非常清晰：在多Agent Tool Calling中，对话历史是单调增长的，因此推理成本应从$O(N)$（总长度）降低为$O(\\Delta)$（增量长度）。通过持久化KV Cache和元数据别名，实现“只算新增，复用历史”。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：洞见简洁有力，直击本质。它不仅仅是一个加速技巧，而是对多轮对话计算复杂度的重新定义，清晰地指出了“重复计算”是主要敌人，而“状态复用”是解药。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：技术路线成熟，基于现有的Radix Tree和Speculative Decoding技术，工程实现风险较低。消融实验证明了各组件的有效性。\n**负面证据或缺失**：主要风险在于显存管理。论文承认单GPU显存限制，且“完全匹配”要求使得缓存命中率对Prompt稳定性敏感。如果并发量大或Prompt微调频繁，性能可能退化。\n**判断**：中等\n**理由**：技术可行性高，但扩展性存在明显边界。显存随并发线性增长的问题限制了其在超大规模集群中的直接应用，需要额外的分布式缓存协调机制，这增加了系统复杂性。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：论文展示了在特定工作负载（Novel Workflows）下，相比vLLM和SGLang的显著优势。其团队显然对Agent工作负载的特征（如JSON结构化输出、长历史）有深入理解，从而设计了针对性的优化（如Prompt-Lookup Speculative Decoding）。\n**负面证据或缺失**：未提及团队背景，但从论文质量看，其在系统优化和Agent负载建模上的结合具有独特优势。\n**判断**：中等\n**理由**：该研究在“系统优化”与“Agent负载特性”的交叉点上建立了优势。虽然其他系统团队也能做到，但该论文对Tool Calling结构化输出的利用（如PLD的高接受率）显示了其对特定场景的深刻洞察，这是通用推理框架团队可能忽略的细节。\n\n---\n\n- **综合评价**：值得深入关注。这篇论文精准地解决了多Agent时代推理基础设施的核心痛点，通过架构级的创新（状态持久化）实现了显著的性能提升。尽管存在显存扩展性的局限，但其对现有无状态范式的挑战和验证，使其成为该领域的重要里程碑。\n- **最致命的弱点**：显存占用随并发量和对话长度线性增长，且缺乏有效的分布式缓存协调机制，限制了其在大规模生产环境中的直接部署能力。\n- **如果要做得更好**：应进一步探索跨GPU的Radix Prefix Cache共享机制，或设计更智能的缓存驱逐策略以应对动态Prompt修改，从而提升系统的鲁棒性和扩展性。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“解决真实世界的问题”**。它直接针对生产环境中高昂的计算成本和延迟问题，提供了切实可行的解决方案。\n    - **最不符合**：**“通用性”**。其优化高度依赖于“单调增长、完全匹配”的特定负载特征，对于非结构化或频繁修改的对话场景，其优势会大幅减弱。",

                    "summary_translation": "多智能体工具调用（Multi-agent tool calling）正成为基于大语言模型（LLM）系统的主导交互范式，然而现有的推理框架将每次工具调用视为独立请求，即使提示词（prompt）中 85%–95% 的内容与上一轮保持不变，仍从头重新处理整个对话。本文提出一种有状态（stateful）推理架构，将传统服务中每轮 $O(n_t)$ 的计算开销转化为仅增量（delta-only）的 $O(Δ_t)$ 开销：持久化的键值缓存（KV cache）跨轮次复用，仅通过摄入新令牌（token）进行推进；基数前缀缓存（radix prefix cache）将该机制扩展至交错的多智能体流量；而提示查找投机解码器（prompt-lookup speculative decoder）则加速结构化输出的生成。在针对全新、完全生成的工作负载，与 vLLM 和 SGLang 的对比实验中，参考实现在 6 轮智能体工作流中每轮速度提升 2.1 倍，在 35 轮工作流的中位数轮次上提升 4.2 倍，端到端墙钟时间（wall time）缩短一半。该性能优势源于有状态复用与投机解码，而非传统缓存机制。"

                    "summary": "AI coding agents are increasingly used to write real-world software, but ensuring that their outputs are correct remains a fundamental challenge. Formal verification offers a promising path: an agent generates code together with a machine-checked proof, guaranteeing that the code satisfies a formal specification. However, there is no guarantee that the formal spec itself matches the user's intent. In this work, we study specification autoformalization: whether LLM agents can translate informal programming problems into faithful formal specifications. We introduce Verus-SpecBench, a benchmark of 581 spec-writing tasks derived from Codeforces problems targeting Verus, a verifier for Rust, and Verus-SpecGym, an agentic environment in which models interact with Verus, bash, & the filesystem to develop these specs. The central challenge is evaluation: expert-written reference specs are expensive to write, & LLM judges can miss subtle mistakes. We address this by (a) extending Verus's exec_spec mechanism so that generated specs can be executed as Rust code, & (b) testing them against official Codeforces tests & adversarial cases extracted from Codeforces \"hacks\", which are edge cases written by competitors to break incorrect solutions. On Verus-SpecBench, the strongest model, Gemini 3.1 Pro, solves 77.8% of tasks, other frontier models solve 51.1--57.8% & OSS models reach only 21.5--25.5%. Our analysis of failure modes shows that model-generated specs can omit important input assumptions, accept incorrect outputs, & reject valid ones. We also find that LLM-as-a-judge evaluation misses 26% of the failures our evaluator catches. Overall, our results suggest that spec autoformalization is within reach for frontier agents but remains brittle even on problems where they can already generate correct code. The code, data, & logs can be found at https://github.com/formal-verif-is-cool/verus-spec-gym",

                    "intro_logic": "1. AI coding agents 在编写真实世界软件中的应用日益广泛，但确保其生成代码的正确性仍是一个根本性挑战。\n2. Verified code generation 提供了一条有前景的路径，即代理生成代码及证明，并由机械验证器检查代码是否符合形式化规范，从而在数学上保证代码满足规范。\n3. 然而，这种保证仅在形式化规范本身正确时才有效，而大多数场景下用户仅拥有非正式的自然语言描述，需要将非正式意图转化为精确的逻辑谓词。\n4. 随着代理在编写代码和证明方面的能力增强，瓶颈已转移至将非正式意图翻译为正确的形式化规范这一环节。\n5. 现有的评估方法依赖专家编写的参考规范或 LLM judges，前者扩展成本高，后者容易遗漏细微错误，均无法提供可靠且可扩展的信号。\n6. Can language-model agents write specifications that faithfully capture informal programming intent?",
                    "core_insight": "### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n作者意识到，评估形式化规范（Formal Specification）是否忠实于非形式化意图（Informal Intent）的瓶颈，不在于缺乏专家编写的“金标准”规范，而在于**形式化规范本身通常无法直接执行**，导致无法利用现有的、丰富的对抗性测试用例（如 Codeforces 的 \"hacks\"）来自动验证规范的“健全性”（Soundness）和“完备性”（Completeness）。\n\n**详细解释：**\n在传统的验证代码生成（Verified Code Generation）研究中，假设形式化规范是给定的且正确的。然而，当让 AI 自动生成规范时，最大的挑战是评估：AI 生成的规范是否真的捕捉到了人类意图？\n现有的评估方法要么依赖昂贵的专家编写参考规范（Reference Specifications），要么依赖不可靠的 LLM 裁判（LLM Judges）。作者发现了一个被忽视的“中间地带”：Codeforces 等编程竞赛平台拥有大量由人类对手编写的**对抗性测试用例（Hacks）**，这些用例专门设计用来破坏错误的解法。如果能将这些对抗性用例转化为对形式化规范的测试，就能构建一个无需专家参考、无需 LLM 裁判的自动化评估系统。\n然而，阻碍这一想法的关键技术障碍是：Verus 等验证器中的规范（`spec fn`）是逻辑谓词，旨在供 SMT 求解器证明，**不能像普通 Rust 代码那样在具体的输入数据上运行**。作者洞察到，如果扩展验证器的 `exec_spec` 机制，使其能将规范编译为可执行的 Rust 代码，那么就可以直接运行这些规范来测试它们是否正确地接受/拒绝了那些对抗性用例。\n\n**原文证据：**\n> \"Verus specifications are logical predicates intended for the verifier rather than ordinary Rust code, so they cannot normally be run on concrete inputs. We extend Verus's `exec_spec` mechanism... to compile each generated specification into a Rust function... To make these evaluations practical at scale, VERUS-SPECGYM additionally integrates with Harbor... matching modern agent-evaluation workflows...\"\n>\n> \"We address this by (a) extending Verus's `exec_spec` mechanism so that generated specifications can be executed as Rust code, and (b) testing them against official Codeforces tests and adversarial cases extracted from Codeforces 'hacks'...\"\n\n---\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接催生了 **VERUS-SPECBENCH** 和 **VERUS-SPECGYM** 的核心架构，推理链条如下：\n\n1.  **问题定义**：要评估规范 $s_F$ 是否忠实于意图 $s_I$，需要验证 $R_{s_F} = R_{s_I}$（输入输出关系一致）。\n2.  **数据源发现**：$R_{s_I}$ 的边界情况（即 $s_I$ 认为无效但 $s_F$ 可能接受，或反之）在 Codeforces 的 \"hacks\" 中大量存在。这些是人类编写的、针对特定错误逻辑的对抗性输入。\n3.  **技术障碍**：现有的验证器（Verus）无法直接运行 $s_F$ 来测试这些具体的 \"hack\" 输入，因为 $s_F$ 是逻辑断言而非可执行函数。\n4.  **方法构建（桥梁）**：\n    *   **扩展工具链**：修改 Verus 的 `exec_spec` 宏，引入 `exec_spec_unverified!`。这允许将规范中的逻辑谓词（如 `forall`, `Seq`, `Set`）转换为可执行的 Rust 代码（如 `Vec`, 循环），从而可以在具体输入上运行并返回 `true`/`false`。\n    *   **构建评估管道**：将 Codeforces 的官方测试（用于完备性测试）和 Hacks（用于健全性测试）自动转换为 Verus 的输入/输出数据结构。\n    *   **四象限评估**：利用转换后的数据，将测试分为四类：\n        *   `pre_complete`: 有效输入，规范应接受。\n        *   `pre_sound`: 无效输入（来自 Hacks），规范应拒绝。\n        *   `post_complete`: 有效输入 + 正确输出，规范应接受。\n        *   `post_sound`: 有效输入 + 错误输出（来自 Hacks），规范应拒绝。\n5.  **最终方案**：Agent 在环境中生成规范 -> 评估器将规范编译为可执行代码 -> 在对抗性测试集上运行 -> 根据运行结果判定规范是否忠实。\n\n**原文证据：**\n> \"We extend `exec_spec` to cover the core Verus specification types from the standard library... We also support a core subset of methods on these types... These extensions make a larger class of generated specifications executable by the runtime check.\"\n>\n> \"A faithful specification accepts every test in the two completeness buckets and rejects every test in the two soundness buckets.\"\n\n---\n\n### 3. 试错历程与方案调整\n\n在实现这一想法的过程中，作者遇到了几个关键的意料之外的困难，并进行了相应的调整：\n\n**困难一：符号验证（Symbolic Checking）的局限性**\n*   **问题**：最初，评估器试图完全依赖 Verus 的 SMT 求解器来证明规范对特定测试用例的接受/拒绝行为。然而，对于复杂的后条件（Post-specifications），SMT 求解器经常超时或无法得出结论（Indeterminate）。如果仅依赖符号验证，大量测试用例将无法被评估，导致评估信号缺失。\n*   **调整**：作者引入了**混合评估策略**。首先尝试符号验证；如果符号验证无法得出结论（Unknown），则回退到通过 `exec_spec` 生成的可执行 Rust 代码进行运行时检查（Runtime Check）。\n*   **结果**：实验发现，对于后条件检查，`exec_spec` 的运行时回退至关重要，它解决了大量符号验证无法处理的案例。\n    *   *原文*：\"Among the analyzable testcases, `exec_spec` is especially important for postcondition checking... Without `exec_spec`, these cases would have stopped at the symbolically unknown node... and we would not know whether the specification accepted or rejected those concrete examples.\"\n\n**困难二：`exec_spec` 的验证负担**\n*   **问题**：Verus 原有的 `exec_spec` 机制不仅生成可执行代码，还试图生成证明来保证生成的代码与原始规范等价。在基准测试中，这种等价性证明经常失败（由于 SMT 求解器的不完备性），导致即使生成的代码本身是正确的，评估过程也会因为证明失败而报错，这引入了不必要的噪声。\n*   **调整**：作者创建了一个新的宏 `exec_spec_unverified!`。它跳过等价性证明的生成步骤，直接生成可执行代码。因为评估环境只需要代码能运行并返回布尔值，而不需要证明代码本身的正确性（代码的正确性由规范逻辑保证，而规范逻辑正是我们要测试的对象）。\n*   **结果**：这大大降低了评估的失败率，使得更多生成的规范能够被成功执行和评估。\n    *   *原文*：\"The original `exec_spec` mechanism produces verified Rust code together with proof obligations... This creates an unnecessary failure mode for our benchmark... We therefore introduce `exec_spec_unverified`, which produces executable Rust code without the correspondence proof.\"\n\n**困难三：LLM 裁判的不可靠性**\n*   **问题**：在构建基准之前，作者可能考虑过使用 LLM 作为裁判来评估规范。但在初步尝试或对比中发现，LLM 裁判会漏掉大量细微的逻辑错误（例如，规范接受了错误的输出，但 LLM 认为规范是正确的）。\n*   **调整**：彻底放弃 LLM 裁判，完全依赖基于执行的测试（Executable Testing）。\n*   **结果**：实验显示，LLM 裁判漏掉了 26% 的失败案例，证明了基于 `exec_spec` 的自动化测试是更可靠的评估信号。\n    *   *原文*：\"We find that an LLM-as-a-judge baseline misses 26% of the failures our evaluator catches, showing that executable testing can flag specification errors that LLM judges overlook.\"\n\n**困难四：数据转换的无损性**\n*   **问题**：将 Codeforces 的原始文本测试用例转换为 Verus/Rust 的强类型数据结构时，容易出现信息丢失或解析错误，导致评估的是错误的测试用例。\n*   **调整**：设计了一个**往返检查（Round-trip check）**机制。不仅编写解析器（Parser）将文本转为代码，还编写了打印器（Printer）将代码转回文本。只有当 `Text -> Code -> Text` 的结果与原始文本完全一致时，才认为转换成功。\n*   **结果**：确保了评估数据的准确性，避免了因数据转换错误导致的误判。\n    *   *原文*：\"To ensure the conversion is lossless... The parser is accepted only if every retained testcase round-trips: $T_{reproduced} = P(R(t)) == t$.\"",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\n这篇论文构建了一个自动化测试系统，用来检查 AI 写的“程序说明书”（形式化规格）是否准确。\n\n具体来说，它把编程竞赛（Codeforces）里的题目拿出来，让 AI 模型把题目里的自然语言要求（比如“数组是排序的”、“输出最小值”）翻译成计算机能严格验证的逻辑代码（Verus 规格）。然后，系统利用一种技术手段，把这些原本只能给验证器看的逻辑代码，变成可以实际运行的 Rust 程序。最后，系统用大量的测试用例（包括官方测试和选手用来“找茬”的对抗性测试）去运行这些逻辑代码，看它们能不能正确地接受合法输入/输出，并拒绝非法输入/输出。如果 AI 写的规格漏掉了某个条件，或者多写了某个限制，这个系统就能通过运行结果发现错误。\n\n### 2. 一句话概括核心创新\n\n**最本质的区别：** 之前的方法要么靠人工写标准答案来对比，要么靠另一个 AI 模型当裁判（容易看走眼），而这篇论文通过扩展工具链，让“规格说明书”本身变成可执行的代码，直接用具体的测试用例去“跑”规格，从而实现了无需人工参考、无需 AI 裁判的客观自动化评估。\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：数据准备与转换（从题目到可测试的规格骨架）\n\n*   **输入**：Codeforces 编程竞赛的题目描述、官方测试用例、以及选手提交的“Hack”（专门用来卡错误解法的对抗性测试用例）。\n*   **操作**：\n    1.  **筛选**：去掉涉及浮点数（Verus 不支持）或没有 Hack 数据的旧题目。\n    2.  **分类**：将测试用例分为四类桶：\n        *   `pre-complete`：合法的输入（规格应该接受）。\n        *   `pre-sound`：非法的输入（规格应该拒绝，主要来自 Hack）。\n        *   `post-complete`：合法输入对应的正确输出（规格应该接受）。\n        *   `post-sound`：合法输入对应的错误输出（规格应该拒绝，主要来自 Hack）。\n    3.  **解析与序列化**：使用一个专门的 Agent 编写解析器，将文本格式的测试用例转换成 Verus/Rust 的结构化数据对象。为了确保转换没出错，还编写了反序列化器，把对象转回文本，对比是否一致（Round-trip check）。\n    4.  **生成骨架**：为每个题目生成一个 Verus 代码模板，其中包含固定的输入输出结构定义，以及两个需要 AI 填写的空函数：`pre_spec`（前置条件）和 `post_spec`（后置条件）。\n*   **输出**：581 个标准化的任务包，每个包包含题目描述、代码骨架、以及分好类的测试用例数据。\n*   **目的**：解决“如何大规模获取高质量评估数据”的问题。人工写形式化规格太贵，而 Codeforces 的 Hack 数据天然包含了大量边界情况和错误案例，是检验规格是否严谨的绝佳素材。\n*   **如果不做会怎样**：如果没有 Hack 数据，测试用例会非常稀疏，AI 写的规格可能只在简单情况下正确，但在边界情况下漏掉关键约束（比如忘了检查数组是否排序），导致评估结果虚高。\n\n#### 第二步：AI 生成规格（Agent 交互过程）\n\n*   **输入**：上述的任务包（题目描述、代码骨架、少量示例测试）。\n*   **操作**：\n    1.  AI Agent 阅读题目，理解意图。\n    2.  AI 在 `pre_spec` 和 `post_spec` 中填写逻辑代码，定义什么是合法输入，什么是正确输出。\n    3.  AI 运行本地检查命令 `verus_gym_specgen_check`，系统会在少量示例测试上运行规格，返回错误信息。\n    4.  AI 根据错误信息修改规格，直到满意后提交。\n*   **输出**：AI 生成的完整 Verus 规格代码。\n*   **目的**：模拟真实的开发场景，让 AI 有机会通过反馈迭代优化规格，而不是只生成一次。\n*   **如果不做会怎样**：如果是一次性生成，AI 很难自我修正语法错误或逻辑漏洞，成功率会极低。\n\n#### 第三步：规格执行化与评估（核心创新点）\n\n*   **输入**：AI 提交的规格代码 + 隐藏的完整测试用例集（四类桶）。\n*   **操作**：\n    1.  **符号验证尝试**：系统首先尝试用 Verus 验证器（SMT Solver）去证明规格对某个测试用例是“真”或“假”。如果验证器能证明，直接记录结果。\n    2.  **执行化回退（Exec Spec）**：如果验证器无法证明（超时或无法推导），系统调用扩展后的 `exec_spec_unverified` 宏。这个宏将 Verus 的逻辑规格（如 `forall` 量词、集合操作）编译成普通的、可运行的 Rust 代码。\n    3.  **运行测试**：将具体的测试用例数据传入编译后的 Rust 函数，运行它，得到布尔值（True/False）。\n    4.  **判定**：\n        *   对于 `complete` 桶，期望结果为 True。\n        *   对于 `sound` 桶，期望结果为 False。\n        *   如果实际结果与期望不符，则判定该规格在该测试用例上失败。\n*   **输出**：每个测试用例的通过/失败状态，以及最终的 Pass@1 分数。\n*   **目的**：解决“如何客观评估规格正确性”的问题。传统的 LLM 裁判（让另一个 AI 判断规格对不对）会漏掉 26% 的错误，而人工写参考规格成本太高。通过让规格“跑起来”，可以用确定的执行结果来判定对错。\n*   **如果不做会怎样**：如果没有 `exec_spec` 回退机制，大量复杂的规格（特别是涉及复杂后置条件的）会因为 SMT 求解器无法证明而被标记为“未知”，导致无法评估，或者只能依赖不靠谱的 LLM 裁判。\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n*   **哪个组件贡献最大？**\n    *   **对抗性测试（Hacks）**：实验显示，如果只使用官方测试用例（主要覆盖 `complete` 桶），`gpt5.3-codex` 的通过率是 76.6%，但加上 Hack 数据（主要覆盖 `sound` 桶）后，通过率降至 57.8%。这说明 **Hack 数据是发现规格“过松”（接受非法输入/输出）的关键**。去掉它，评估会严重失真，高估 AI 的能力。\n    *   **执行化评估（Exec Spec）**：实验对比了 LLM 裁判和 Exec Spec 评估。LLM 裁判漏掉了 25.7% 的错误规格。这说明 **执行化评估是保证评估准确性的核心**。\n\n*   **哪个组件可有可无？**\n    *   论文中没有明确指出某个组件完全可有可无，但提到 `exec_spec` 的扩展支持（如支持更多类型）是必要的，因为原始 `exec_spec` 不支持 Codeforces 中常见的复杂结构。如果去掉这些扩展，大量规格将无法编译运行，导致评估失败。\n\n*   **各组件之间是否有协同效应？**\n    *   **Hack 数据 + Exec Spec** 有强协同。Hack 数据提供了极端的边界案例，而 Exec Spec 提供了在这些极端案例上快速、确定性地运行规格的能力。如果没有 Exec Spec，Hack 数据可能因为 SMT 求解困难而无法被有效利用；如果没有 Hack 数据，Exec Spec 的高效运行就失去了挖掘细微错误的价值。\n\n*   **回扣动机：**\n    *   论文声称的痛点是“规格自动形式化难以评估”。\n    *   **Hack 数据** 解决了“测试用例覆盖不足”的问题，确保能抓到规格漏掉的约束。\n    *   **Exec Spec** 解决了“评估手段不可靠”的问题，用代码执行代替了主观判断。\n    *   实验数据支持：加上 Hack 后分数大幅下降（说明之前评估太松），使用 Exec Spec 比 LLM 裁判多抓出 26% 的错误（说明之前评估不准）。\n\n### 5. 这套方法的硬伤在哪里？\n\n1.  **适用范围有限**：目前仅适用于单文件的、竞赛风格的编程问题（Codeforces）。对于多文件、大型软件系统的规格形式化，这种基于测试用例的评估方法可能不够用，因为大型系统的规格往往涉及更复杂的模块间交互，难以用简单的输入输出对来覆盖。\n2.  **评估仍是近似**：虽然比 LLM 裁判准，但基于有限测试用例的评估本质上还是“抽样检查”。如果 AI 写的规格在测试用例覆盖不到的某个极端角落出错，系统依然无法发现。它不能像数学证明那样保证 100% 的正确性，只是大大提高了发现错误的概率。",
                    "additional_insights": "1. **代码生成能力与规格形式化能力存在显著解耦**：即使模型能生成正确的可执行代码（如 `gpt5.3-codex` 在 81.8% 的失败规格案例中仍能写出正确 Python 代码），也往往无法写出忠实的形式化规格，表明“理解算法逻辑”与“精确形式化约束”是两种不同的认知能力。依据：Section 4.2 及 Appendix F.6。\n\n2. **人类对抗性测试（Hacks）比官方测试更具诊断价值**：Codeforces 的“Hacks”（由人类选手编写的旨在破坏错误解法的边缘用例）能暴露出官方测试完全遗漏的规格缺陷，证明在评估形式化忠实度时，针对边界条件的对抗性输入比常规功能测试更关键。依据：Section 4.3 及 Figure 4。\n\n3. **LLM-as-a-Judge 在形式化评估中存在严重盲区**：使用 LLM 作为裁判评估规格正确性时，会漏掉 26% 的实际错误（False Acceptance），因为 LLM 难以察觉细微的逻辑漏洞，而基于 `exec_spec` 的可执行测试能捕捉这些具体反例。依据：Section 4.3 及 Table 4。\n\n4. **过度形式化（Over-specification）是主要失败模式之一**：除了常见的规格过弱（接受错误输出），模型常因试图在规格中复现复杂计算逻辑（如 Gemini 在 2074D 中尝试计算区间并集）而导致规格过强，从而拒绝合法的正确输出，这提示规格应侧重关系描述而非过程复现。依据：Section 4.3 Failure modes 及 Appendix G.4。\n\n5. **符号验证与可执行回退的互补性差异**：前置条件（Pre-spec）的验证多可通过符号推理解决，而后置条件（Post-spec）由于涉及复杂的输出关系，高度依赖 `exec_spec` 的可执行回退机制，这揭示了不同验证阶段对工具链依赖的不同特性。依据：Section 4.3 及 Figure 15。\n\n6. **规格生成的脆弱性远高于代码生成**：同一模型在多次尝试中，规格生成的 `pass@k` 与 `pass[k]`（所有尝试均成功）差距巨大（如 `gpt5.3-codex` 的 75.6% vs 34.8%），表明当前模型在形式化任务上缺乏稳定性，简单的重复采样虽能提升覆盖率但无法保证可靠性。依据：Appendix F.4。",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文解决了形式化验证领域的一个关键瓶颈——“规范自动形式化”的评估问题。通过引入 `exec_spec` 机制和 Codeforces Hack 数据，它提供了一个无需人工参考、比 LLM 裁判更可靠的自动化评估基准（Verus-SpecBench）。实验显示 LLM 裁判漏掉了 26% 的错误，而该方法能客观量化模型在将自然语言转化为形式化逻辑时的能力差距。\n**负面证据或缺失**：目前仅限于单文件、竞赛风格的编程问题（Codeforces），对于工业界常见的多模块、大型软件系统的规范形式化，其直接适用性有限。\n**判断**：强\n**理由**：该工作为“可信 AI 代码生成”中的规范生成环节提供了首个可扩展、客观的评估标准，填补了从“代码生成”到“形式化验证”之间的评估空白，对后续研究具有显著的基准设定作用。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：核心创新在于将 Verus 的逻辑规格（Spec）转化为可执行的 Rust 代码（`exec_spec_unverified`），并利用对抗性测试（Hacks）进行黑盒测试。这种“让规格跑起来”的思路不同于传统的符号验证或 LLM 裁判，且利用了 Codeforces 特有的 Hack 数据作为负样本，这种数据组合和工具链扩展具有独特性。\n**负面证据或缺失**：基于测试用例的评估思想本身并不新颖，但在形式化规范这一特定领域，结合 SMT 求解器回退和对抗性测试的具体实现是独特的。\n**判断**：强\n**理由**：在形式化验证社区中，将“执行”引入“规范评估”并结合人类对抗性测试的做法具有高度独创性，短期内难以被其他简单方法（如纯 LLM 裁判）替代，因为后者已被证明存在严重盲区。\n\n**3. 时机判断（Timing）**\n**正面证据**：随着 AI 编码代理（如 Codex, Gemini）能力的提升，瓶颈已从“生成代码”转移到“生成正确规范”。论文指出“随着代理在编写代码和证明方面的能力增强，瓶颈已转移至将非正式意图翻译为正确的形式化规范这一环节”，这表明当前正是解决此问题的最佳窗口期。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：该研究精准捕捉了 AI 编程代理发展的当前痛点（规范形式化），并在 LLM 能力足以生成初步规范但尚不完美、需要可靠评估手段的阶段介入，时机恰到好处。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：挑战了“LLM-as-a-Judge”在形式化任务中的可靠性。实验数据明确显示 LLM 裁判漏掉 25.7% 的错误，证明了在需要精确逻辑的任务中，主观的 LLM 评估是不可靠的。同时，挑战了“形式化验证必须完全依赖符号证明”的传统观念，引入了基于执行的近似评估作为补充。\n**负面证据或缺失**：它并没有完全推翻形式化验证的范式，而是作为一种评估手段的补充。\n**判断**：中等\n**理由**：虽然它有力地批评了 LLM 裁判在形式化领域的局限性，但其核心贡献更多是工程上的评估工具创新，而非对形式化验证理论范式的根本性挑战。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可以概括为：“通过扩展工具链使形式化规范可执行，并利用对抗性测试用例进行黑盒测试，可实现无需人工参考的客观规范评估。”\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：洞见清晰且直接指向问题核心：将“不可执行的逻辑”转化为“可执行的代码”以利用现有的测试基础设施，这是一个简洁而有力的工程洞见。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：技术风险较低，因为 Verus 和 Rust 生态成熟，`exec_spec` 机制已有基础，Codeforces 数据公开可用。论文成功构建了 581 个任务包并完成了评估，证明了可行性。\n**负面证据或缺失**：主要风险在于评估的完备性（基于测试用例的评估无法保证 100% 正确），但论文通过消融实验和与 LLM 裁判的对比，合理界定了其能力边界。\n**判断**：中等\n**理由**：技术实现路径清晰且已验证，风险主要在于评估方法的理论完备性不足（仍是抽样检查），但这在工程实践中是可接受的权衡。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：团队显然对 Verus 工具链有深入理解（能够扩展 `exec_spec` 宏），并熟悉 Codeforces 社区数据（Hack 数据的提取和利用）。这种对特定形式化验证工具和特定编程竞赛数据的结合，构成了独特的比较优势。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：该研究需要同时具备形式化验证工具开发能力和大规模编程数据清洗能力，这种交叉领域的技术栈使得其他纯 AI 或纯形式化验证团队难以轻易复制。\n\n---\n\n- **综合评价**：**值得深入关注**。这篇论文通过巧妙的工程创新（可执行规范 + 对抗性测试），解决了形式化验证领域中一个长期存在且难以量化的评估难题，为 AI 辅助形式化编程提供了可靠的基准。\n- **最致命的弱点**：**评估的完备性局限**。基于有限测试用例的评估本质上仍是“抽样检查”，无法像数学证明那样保证规范的绝对正确性，对于未被测试用例覆盖的极端逻辑错误可能失效。\n- **如果要做得更好**：1. 探索如何将基于测试的评估与符号验证更紧密地结合，以缩小“未知”区域；2. 尝试将数据集扩展到更复杂的、多模块的工业级代码片段，以验证方法的泛化能力。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“解决一个具体的、可衡量的问题”**。论文没有空谈形式化验证的未来，而是具体解决了“如何评估 AI 生成的规范”这一可量化问题，并提供了具体的基准和指标。\n    - **最不符合**：**“追求理论上的完备性”**。论文明确承认其评估方法是近似的（基于测试），而非数学上完备的，这在追求绝对正确性的形式化验证社区中可能被视为一种妥协。",

                    "summary_translation": "AI 编码智能体（AI coding agents）正越来越多地用于编写现实世界中的软件，但确保其输出正确性仍然是一个根本性挑战。形式化验证（Formal verification）提供了一条有前景的路径：智能体生成代码的同时附带机器可检查的证明（machine-checked proof），从而保证代码满足形式化规范（formal specification）。然而，形式化规范本身是否符合用户意图并无保证。在本研究中，我们探讨规范自动形式化（specification autoformalization）问题：即大语言模型智能体（LLM agents）能否将非形式化的编程问题忠实转化为形式化规范。我们引入了 Verus-SpecBench，这是一个包含 581 个规范编写任务的基准测试集，这些任务源自 Codeforces 题目，并针对 Verus（一种 Rust 语言的形式化验证器）设计；同时我们还提出了 Verus-SpecGym，这是一个智能体环境，模型可在其中与 Verus、bash 及文件系统交互以开发这些规范。核心挑战在于评估：专家编写的参考规范成本高昂，而基于大语言模型的评判器（LLM judges）可能遗漏细微错误。我们通过以下方式应对这一挑战：(a) 扩展 Verus 的 exec_spec 机制，使生成的规范可作为 Rust 代码执行；(b) 使用官方 Codeforces 测试用例以及从 Codeforces “hack”（由竞争对手编写的、旨在破坏错误解法的边界情况）中提取的对抗性案例进行测试。在 Verus-SpecBench 上，最强模型 Gemini 3.1 Pro 解决了 77.8% 的任务，其他前沿模型（frontier models）的解决率为 51.1%–57.8%，而开源模型（OSS models）仅达到 21.5%–25.5%。我们对失败模式（failure modes）的分析表明，模型生成的规范可能遗漏重要的输入假设、接受错误输出或拒绝有效输出。我们还发现，基于大语言模型的评判器评估方法遗漏了我们评估器所捕获的 26% 的失败案例。总体而言，我们的结果表明，规范自动形式化对于前沿智能体而言已近在咫尺，但在其已能生成正确代码的问题上，该方法仍然脆弱。代码、数据及日志可在 https://github.com/formal-verif-is-cool/verus-spec-gym 获取。"

    "2026-05-29": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-05-29)\n\n#### \u5f00\u7bc7\u5bfc\u8bed\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u663e\u8457\u5411**Agent\u7684\u53ef\u9760\u6027\u3001\u81ea\u6211\u8fdb\u5316\u4e0e\u591a\u667a\u80fd\u4f53\u534f\u4f5c**\u503e\u659c\u3002\u968f\u7740LLM Agent\u4ece\u5b9e\u9a8c\u8d70\u5411\u751f\u4ea7\u73af\u5883\uff0c\u7814\u7a76\u8005\u4eec\u5f00\u59cb\u6df1\u5165\u5ba1\u89c6\u5176\u884c\u4e3a\u7684**\u4e00\u81f4\u6027\uff08Consistency\uff09**\u4e0e**\u9632\u9000\u5316\u673a\u5236\uff08Regression Prevention\uff09**\uff0c\u8bd5\u56fe\u89e3\u51b3\u201c\u667a\u80fd\u4f53\u80fd\u5426\u7a33\u5b9a\u590d\u73b0\u884c\u4e3a\u201d\u8fd9\u4e00\u57fa\u7840\u4fe1\u4efb\u95ee\u9898\u3002\u540c\u65f6\uff0c\u5728\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u9886\u57df\uff0c**\u534f\u540c\u81ea\u8fdb\u5316**\u4e0e**\u535a\u5f08\u8bba\u89c6\u89d2\u4e0b\u7684\u5408\u4f5c\u6f14\u5316**\u6210\u4e3a\u70ed\u70b9\uff0c\u63ed\u793a\u4e86\u6a21\u578b\u63d0\u4f9b\u5546\u8eab\u4efd\u5bf9\u5408\u4f5c\u5747\u8861\u7684\u6df1\u8fdc\u5f71\u54cd\u3002\u6b64\u5916\uff0c**\u4e13\u5bb6\u5f15\u5bfc\u7684\u9886\u57df\u7279\u5b9a\u6570\u636e\u63d0\u53d6**\u5c55\u793a\u4e86LLM\u5728\u786c\u79d1\u5b66\u9886\u57df\u6253\u7834\u6570\u636e\u5b64\u5c9b\u7684\u5de8\u5927\u6f5c\u529b\u3002\n\n---\n\n#### \u4e09\u3001 \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \ud83d\udee1\ufe0f \u4fe1\u4efb\u57fa\u77f3\uff1aAgent\u7684\u53ef\u9760\u6027\u4e0e\u9632\u9000\u5316\u81ea\u8fdb\u5316\n*\u672c\u677f\u5757\u805a\u7126\u4e8e\u89e3\u51b3LLM Agent\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u6838\u5fc3\u75db\u70b9\uff1a\u884c\u4e3a\u7684\u4e00\u81f4\u6027\u4e0e\u81ea\u6211\u6539\u8fdb\u8fc7\u7a0b\u4e2d\u7684\u201c\u707e\u96be\u6027\u9057\u5fd8\u201d\u3002*\n\n*   **\u884c\u4e3a\u4e00\u81f4\u6027\u57fa\u51c6\u6d4b\u8bd5**\uff1a\u9488\u5bf9\u591a\u6b65\u5de5\u5177\u8c03\u7528\uff08Tool-Calling\uff09Agent\uff0c\u672c\u7814\u7a76\u9996\u6b21\u7cfb\u \u4e3a\u5730\u8d28\u5b66\u3001\u533b\u5b66\u7b49\u9ad8\u7cbe\u5ea6\u8981\u6c42\u9886\u57df\u7684\u6570\u636e\u6316\u6398\u63d0\u4f9b\u4e86\u53ef\u590d\u5236\u7684\u6a21\u677f\uff0c\u6709\u671b\u52a0\u901f\u79d1\u5b66\u53d1\u73b0\u7684\u81ea\u52a8\u5316\u8fdb\u7a0b\u3002",
    "2026-05-28": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-05-28)\n\n#### \u5f00\u7bc7\u5bfc\u8bed\n\u4eca\u65e5\u7684\u7814\u7a76\u52a8\u6001\u5448\u73b0\u51fa**Agent\uff08\u667a\u80fd\u4f53\uff09\u4ece\u201c\u73a9\u5177\u201d\u8d70\u5411\u201c\u5de5\u4e1a\u7ea7\u57fa\u7840\u8bbe\u65bd\u201d**\u7684\u663e\u8457\u8d8b\u52bf\u3002\u7814\u7a76\u7126\u70b9\u4e0d\u518d\u5c40\u9650\u4e8e\u5355\u4e00\u7684\u5bf9\u8bdd\u80fd\u529b\uff0c\u800c\u662f\u6df1\u5165\u5230\u4e86**\u8bb0\u5fc6\u7684\u8ba4\u77e5\u5316\u91cd\u6784**\u3001**\u6267\u884c\u73af\u5883\u7684\u4e25\u683c\u6cbb\u7406**\u4ee5\u53ca**\u751f\u4ea7\u7ea7\u8bc4\u4f30\u4f53\u7cfb\u7684\u5efa\u7acb**\u3002\u6211\u4eec\u89c2\u5bdf\u5230\uff0c\u5355\u7eaf\u7684\u68c0\u7d22\u589e\u5f3a\uff08RAG\uff09\u6b63\u5728\u6f14\u53d8\u4e3a\u66f4\u590d\u6742\u7684\u8ba4\u77e5\u5bfc\u822a\uff0c\u800c\u9759\u6001\u7684\u57fa\u51c6\u6d4b\u8bd5\uff08Benchmarks\uff09\u6b63\u88ab\u52a8\u6001\u7684\u8fd0\u884c\u65f6\u8bc4\u4f30\uff08Runtime Assessment\uff09\u6240\u53d6\u4ee3\uff0c\u4ee5\u5e94\u5bf9\u957f\u94fe\u6761\u4efb\u52a1\u4e2d\u7684\u8bef\u5dee\u7d2f\u79ef\u95ee\u9898\u3002\n\n---\n\n#### \u4e09\u3001 \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \ud83e\udde0 \u8bb0\u5fc6\u5373\u8ba4\u77e5\uff1a\u4ece\u88ab\u52a8\u68c0\u7d22\u5230\u4e3b\u52a8\u5bfc\u822a\n*\u4f20\u7edfAgent\u8bb0\u5fc6\u7cfb\u7edf\u5f80\u5f80\u5c06\u8bb0\u5fc6\u89c6\u4e3a\u9759\u6001\u5de5\u5177\uff0c\u4eca\u65e5\u591a\u7bc7\u8bba\u6587\u63a2\u8ba8\u4e86\u5982\u4f55\u8ba9\u8bb0\u5fc6\u6210\u4e3a\u63a8\u7406\u8fc7\u7a0b\u7684\u4e00\u90e8\u5206\uff0c\u5e76\u91cf\u5316\u5176\u5728\u591a\u8f68\u8ff9\u63a8\u7406\u4e2d\u7684\u5b9e\u9645\u4ef7\u503c\u3002*\n\n*   **MemCog: \u5c06\u8bb0\u5fc6\u4ece\u201c\u5de5\u5177\u201d\u5347\u7ea7\u4e3a\u201c\u8ba4\u77e5\u201d**\n    \u73b0\u6709Agent\u8bb0\u5fc6\u7cfb\u7edf\u901a\u5e38\u91c7\u7528\u201cMemory-as-Tool\u201d\u8303\u5f0f\uff0c\u5373\u5355\u6b21\u67e5\u8be2\u89e6\u53d1\u6241\u5e73\u5217\u8868\u68c0\u7d22\uff0c\u5bfc\u81f4\u63a8\u7406\u4e0e\u68c0\u7d22\u8131\u8282\u3002**MemCog** \u63d0\u51fa\u4e86 **Memory-as-Cognition** \u7cfb\u7edf\uff0c\u5c06\u7528\u6237\u77e5\u8bc6\u7ec4\u7ec7\u4e3a\u5e26\u6709\u5173\u8054\u94fe\u63a5\u56fe\u7684 **Navigable Memory Store**\uff0c\u5e76\u901a\u8fc7 **Cross-Dimensional Navigation Interface** \u652f\u6301\u591a\u6b65\u63a8\u7406\u9a71\u52a8\u7684\u904d\u5386\u3002\u8be5\u7cfb\u7edf\u5f15\u5165 **Proactive Reasoning Protocol**\uff0c\u4f7fAgent\u80fd\u81ea\u53d1\u4ece\u5bf9\u8bdd\u4e0a\u4e0b\u6587\u4e2d\u542f\u52a8\u8bb0\u5fc6\u63a2\u7d22\u3002\u5b9e\u9a8c\u8868\u660e\uff0cMemCog\u5728\u88ab\u52a8QA\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5e76\u5728\u9996\u4e2a\u4e3b\u52a8\u8bb0\u5fc6\u89e6\u53d1\u57fa\u51c6 **ProactiveMemBench** \u4e0a\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\uff0c\u8bc1\u660e\u4e86\u8bb0\u5fc6\u4f5c\u4e3a\u8ba4\u77e5\u8fc7\u7a0b\u7684\u4f18\u52bf\u3002\n    (2605.28046 [cs.CL])\n\n*   **\u591a\u8f68\u8ff9\u63a8\u7406\u4e2d\u8bb0\u5fc6\u7684\u8fb9\u754c\u4e0e\u6548\u7528\u5206\u6790**\n    \u9488\u5bf9\u5de5\u5177\u4f7f\u7528\u578bLLM Agent\u7684\u591a\u8f68\u8ff9\u63a8\u7406\uff08\u5982Best-of-N, Beam Search, MCTS\uff09\uff0c\u672c\u7814\u7a76\u901a\u8fc7\u7edf\u4e00\u6846\u67b6\u89e3\u6784\u4e86\u8bb0\u5fc6\u7684\u4e24\u4e2a\u7ef4\u5ea6\uff1a**\u8f6c\u79fb\u8303\u56f4**\uff08\u8f68\u8ff9\u5185vs.\u8f68\u8ff9\u95f4\uff09\u548c**\u5185\u5bb9\u62bd\u8c61\u5ea6**\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u63a8\u7406\u7b56\u7565\u662f\u8bb0\u5fc6\u6548\u679c\u7684\u5173\u952e\u6df7\u6dc6\u53d8\u91cf\uff1a\u4f8b\u5982\uff0c**Reflection** \u4ec5\u5728MCTS\u4e0b\u663e\u8457\u6709\u6548\uff0c\u800c **Within-expansion Injection** \u4ec5\u5bf9\u7f3a\u4e4f\u591a\u6837\u6027\u7684Beam Search\u6709\u5e2e\u52a9\u3002**Atomic Fact Extraction** \u867d\u4e0d\u63d0\u5347\u51c6\u786e\u7387\uff0c\u4f46\u80fd\u5c06\u53ef\u590d\u7528\u73af\u5883\u7ed3\u6784\u4e0b\u7684\u8f68\u8ff9\u957f\u5ea6\u7f29\u77ed19-26%\u3002\u8be5\u7814\u7a76\u     "2026-05-27": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-05-27)\n\n#### \u5f00\u7bc7\u5bfc\u8bed\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u9ad8\u5ea6\u96c6\u4e2d\u5728**\u667a\u80fd\u4f53\uff08Agent\uff09\u7684\u81ea\u4e3b\u8fdb\u5316\u4e0e\u6548\u7387\u4f18\u5316**\u4e0a\u3002\u4e00\u65b9\u9762\uff0c\u7814\u7a76\u8005\u5f00\u59cb\u6253\u7834\u201c\u56fa\u5b9a\u6a21\u578b+\u52a8\u6001\u63d0\u793a\u201d\u7684\u4f20\u7edf\u8303\u5f0f\uff0c\u63a2\u7d22\u540c\u65f6\u66f4\u65b0\u6a21\u578b\u6743\u91cd\u4e0e\u6267\u884c\u6846\u67b6\uff08Harness\uff09\u7684**\u53cc\u91cd\u81ea\u6539\u8fdb\u673a\u5236**\uff0c\u5e76\u6df1\u5165\u5256\u6790\u53cd\u9988\u4fe1\u53f7\u5982\u4f55\u8f6c\u5316\u4e3a\u89c4\u5212\u51b3\u7b56\u3002\u53e6\u4e00\u65b9\u9762\uff0c\u9488\u5bf9\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e2d\u7684\u63a8\u7406\u5ef6\u8fdf\u548c\u5de5\u5177\u8c03\u7528\u5197\u4f59\u95ee\u9898\uff0c\u65b0\u7684**\u72b6\u6001\u5316\u63a8\u7406\u67b6\u6784**\u4e0e**\u77e5\u8bc6\u8fb9\u754c\u589e\u5f3a\u7b97\u6cd5**\u663e\u8457\u63d0\u5347\u4e86\u7cfb\u7edf\u7684\u5b9e\u65f6\u6027\u4e0e\u7cbe\u51c6\u5ea6\u3002\u6b64\u5916\uff0c\u5728\u4ee3\u7801\u751f\u6210\u9886\u57df\uff0c\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u81ea\u52a8\u5316\u8bc4\u4f30\u73af\u5883\u4e5f\u53d6\u5f97\u4e86\u91cd\u8981\u8fdb\u5c55\uff0c\u6807\u5fd7\u7740AI\u7f16\u7a0b\u6b63\u4ece\u201c\u80fd\u5199\u4ee3\u7801\u201d\u5411\u201c\u53ef\u8bc1\u660e\u6b63\u786e\u201d\u8fc8\u8fdb\u3002\n\n---\n\n#### \u4e09\u3001 \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \ud83d\ude80 \u53cc\u91cd\u8fdb\u5316\uff1a\u6253\u7834\u667a\u80fd\u4f53\u4f18\u5316\u7684\u201c\u5355\u70b9\u74f6\u9888\u201d\n*\u4eca\u65e5\u591a\u7bc7\u8bba\u6587\u6311\u6218\u4e86\u4f20\u7edfAgent\u4f18\u5316\u4e2d\u201c\u53ea\u6539Prompt\u201d\u6216\u201c\u53ea\u8c03\u6743\u91cd\u201d\u7684\u5b64\u7acb\u505a\u6cd5\uff0c\u63d0\u51fa\u4e86\u66f4\u5168\u9762\u7684\u81ea\u8fdb\u5316\u6846\u67b6\u3002*\n\n*   **SIA: Self Improving AI with Harness & Weight Updates**\n    \u8be5\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u79cd**\u53cc\u91cd\u81ea\u6539\u8fdb\u5faa\u73af\uff08SIA\uff09**\uff0c\u5176\u4e2d\u5143\u667a\u80fd\u4f53\uff08Feedback-Agent\uff09\u540c\u65f6\u66f4\u65b0\u4efb\u52a1\u7279\u5b9a\u667a\u80fd\u4f53\u7684**\u6267\u884c\u6846\u67b6\uff08Harness\uff09**\u548c**\u6a21\u578b\u6743\u91cd**\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u7ed3\u5408\u6846\u67b6\u8fed\u4ee3\uff08\u5851\u9020\u641c\u7d22\u884c\u4e3a\uff09\u4e0e\u6743\u91cd\u66f4\u65b0\uff08\u5efa\u7acb\u9886\u57df\u76f4\u89c9\uff09\u5728\u6cd5\u5f8b\u54a8\u8be2\u3001GPU\u5185\u6838\u4f18\u5316\u548c\u5355\u7ec6\u80deRNA\u53bb\u566a\u4e09\u4e2a\u9886\u57df\u5747\u663e\u8457\u4f18\u4e8e\u5355\u4e00\u4f18\u5316\u7b56\u7565\uff0c\u4f8b\u5982\u5728GPU\u5185\u6838\u4f18\u5316\u4e2d\u5b9e\u73b0\u4e8691.9%\u7684\u8fd0\u884c\u65f6\u51cf\u5c11\u3002\u8fd9\u4e00\u53d1\u73b0\u8bc1\u660e\u4e86\u201c\u7ed3\u6784\u201d\u4e0e\u201c\u53c2\u6570\u201d\u534f\u540c\u8fdb\u5316\u7684\u5de8\u5927\u6f5c\u529b\u3002(2605.27276 [cs.CL])\n\n*   **MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation**\n    \u9488\u5bf9\u73b0\u6709\u6280\u80fd\uff08Skill\uff09\u9759\u6001\u4e14\u5b64\u7acb\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86**MUSE-Autoskill**\u6846\u67b6\uff0c\u8d4b\u4e88\u667a\u80fd\u4f53\u521b\u5efa\u3001\u8bb0\u5fc6\u3001\u7ba1\u7406\u548c\u8bc4\u4f30\u6280\u80fd\u7684\u5b8c\u6574\u751f\u547d\u5468\u671f\u80fd\u529b\u3002\u901a\u8fc7\u5f15\u5165**\u6280\u80fd\u7ea7\u8bb0\u5fc6\uff08Skill-level Memory\uff09**\uff0c\u667a\u80fd\u4f53\u80fd\u591f\u8de8\u4efb\u52a1\u79ef\u7d2f\u7279\u5b9a\u6280\u80fd\u7684\u7ecf\u9a8c\uff0c\u5e76\u901a\u8fc7\u5355\u5143\u6d4b\u8bd5\u548c\u8fd0\u884c\u65f6\u53cd\u9988\u8fdb\u884c\u6301\u7eed\u7cbe\u70bc\u3002\u5728SkillsBench\u4e0a\u7684\u5b9e\u9a8c\u663e\u793a\uff0c\u8fd9\u79cd\u5c06\u6280\u80fd\u89c6\u4e3a\u957f\u671f\u3001\u7ecf\u9a8c\u611f\u77e5\u4e14\u53ef\u6d4b\u8bd5\u8d44\u4ea7\u7684\u65b9\u6cd5\uff0c\u663e\u8457\u63d0\u5347\u4e86\u4efb\u52a1\u6210\u529f\u7387\u3001\u6548\u7387\u53ca\u8de8\u667a\u80fd\u4f53\u8fc1\u79fb\u80fd\u529b\u3002(2605.27366 [cs.CL])\n\n*   **Towards Feedback-to-Plan Decisions for Self-Evolving LLM Agents in CUDA Kernel Generation**\n    \u4e3a\u4e86\u89e3\u6790\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u4e2d\u53cd\u9988\u4fe1\u53f7\u5982\u4f55\u8f6c\u5316\u4e3a\u89c4\u5212\u51b3\u7b56\u7684\u9ed1\u7bb1\uff0c\u5f15\u5165\u4e86**CUDAnalyst**\u5206\u6790\u5c42\uff0c\u901a\u8fc7\u8f68\u8ff9\u51bb\u7ed3\u548c\u9009\u62e9\u6027\u53cd\u9988\u6ce8\u5165\u5b9e\u73b0\u53ef\u63a7\u7684\u5f52\u56e0\u5206\u6790\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u663e\u5f0f\u89c4\u5212\u4ec5\u5728\u53cd\u9988\u5bf9\u9f50\u65f6\u6709\u76ca\uff0c\u4e14\u6709\u6548\u7684\u89c4\u5212\u6e90\u4e8e**\u7ed3\u6784\u5316\u591a\u53cd\u9988\u4ea4\u4e92**\uff1b\u6b64\u5916\uff0c\u5f3a\u63a8\u7406\u6a21\u578b\u751f\u6210\u7684\u9ad8\u5c42\u8ba1\u5212\u53ef\u90e8\u5206\u8fc1\u79fb\u81f3\u5f31\u6a21\u578b\u3002\u8fd9\u4e3a\u7406\u89e3\u8fed\u4ee3\u89c4\u5212\u4e2d\u7684\u53cd\u9988\u6548\u5e94\u63d0\u4f9b\u4e86\u7a33\u5065\u7684\u7406\u8bba\u4f9d\u636e\u3002(2605.26720 [cs.AI])\n\n### \u26a1 \u6548\u7387\u4e3a\u738b\uff1a\u63a8\u7406\u52a0\u901f\u4e0e\u5de5\u5177\u8c03\u7528\u7684\u7cbe\u51c6\u63a7\u5236\n*\u9762\u5bf9\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u5e26\u6765\u7684\u9ad8\u5ef6\u8fdf\u548c\u5197\u4f59\u8c03\u7528\uff0c\u4eca\u65e5\u7814\u7a76\u5728\u5e95\u5c42\u63a8\u7406\u67b6\u6784\u548c\u4e0a\u5c42\u7b56\u7565\u63a7\u5236\u4e0a\u5747\u63d0\u51fa\u4e86\u9ad8\u6548\u89e3\u51b3\u65b9\u6848\u3002*\n\n*   **Stateful Inference for Low-Latency Multi-Agent Tool Calling**\n    \u9488\u5bf9\u591a\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u4e2d\u91cd\u590d\u5904\u7406\u4e0d\u53d8\u4e0a\u4e0b\u6587\u5bfc\u81f4\u7684\u4f4e\u6548\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd**\u72b6\u6001\u5316\u63a8\u7406\u67b6\u6784\uff08Stateful Inference\uff09**\uff0c\u5c06\u6bcf\u8f6e\u6210\u672c\u4ece $O(n_t)$ \u964d\u4f4e\u4e3a\u4ec5\u5904\u7406\u589e\u91cf token \u7684 $O(\\Delta_t)$\u3002\u901a\u8fc7\u6301\u4e45\u5316KV\u7f13\u5b58\u3001Radix\u524d\u7f00\u7f13\u5b58\u53ca\u63d0\u793a\u67e5\u627e\u6295\u673a\u89e3\u7801\uff0c\u8be5\u67b6\u6784\u57286\u8f6e\u5de5\u4f5c\u6d41\u4e2d\u6bd4vLLM/SGLang\u5feb2.1\u500d\uff0c\u572835\u8f6e\u4e2d\u5feb4.2\u500d\uff0c\u5927\u5e45\u964d\u4f4e\u4e86\u7aef\u5230\u7aef\u5ef6\u8fdf\uff0c\u8bc1\u660e\u4e86\u72b6\u6001\u590d\u7528\u800c\u975e\u5355\u7eaf\u7f13\u5b58\u662f\u52a0\u901f\u7684\u5173\u952e\u3002(2605.26289 [cs.LG])\n\n*   **Efficient Agentic Reinforcement Learning with On-Policy Intrinsic Knowledge Boundary Enhancement**\n    \u4e3a\u89e3\u51b3Agent RL\u8bad\u7ec3\u4e2d\u5de5\u5177\u8c03\u7528\u5197\u4f59\u53ca**\u5185\u5728\u77e5\u8bc6\u8fb9\u754c\uff08Intrinsic Knowledge Boundary\uff09**\u6a21\u7cca\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86**AKBE**\u65b9\u6cd5\u3002\u8be5\u65b9\u6cd5\u901a\u8fc7\u53cc\u8def\u5f84\uff08\u6709\u5de5\u5177/\u65e0\u5de5\u5177\uff09 rollout \u52a8\u6001\u63a2\u6d4b\u6a21\u578b\u4f55\u65f6\u9700\u8981\u5de5\u5177\u4ee5\u53ca\u6700\u5c11\u9700\u8981\u591a\u5c11\u6b21\u8c03\u7528\uff0c\u5e76\u6784\u5efa\u9488\u5bf9\u6027\u76d1\u7763\u4fe1\u53f7\u3002\u5b9e\u9a8c\u663e\u793a\uff0cAKBE\u5728\u4fdd\u6301\u51c6\u786e\u7387\u7684\u540c\u65f6\uff0c\u5c06\u5de5\u5177\u8c03\u7528\u51cf\u5c1118%\uff0c\u5de5\u5177\u751f\u4ea7\u529b\u63d0\u534725%\uff0c\u4e14\u5177\u5907\u5373\u63d2\u5373\u7528\u7684\u517c\u5bb9\u6027\u3002(2605.26952 [cs.CL])\n\n### \ud83d\udee0\ufe0f \u667a\u80fd\u4f53\u4f18\u5316\u4e0e\u5f62\u5f0f\u5316\u9a8c\u8bc1\uff1a\u4ece\u63d0\u793a\u5de5\u7a0b\u5230\u4ee3\u7801\u6b63\u786e\u6027\n*\u5728\u5e94\u7528\u5c42\uff0c\u7814\u7a76\u8005\u901a\u8fc7\u4ee3\u7801\u589e\u5f3a\u4f18\u5316\u63d0\u793a\uff0c\u5e76\u5728\u5e95\u5c42\u901a\u8fc7\u5f62\u5f0f\u5316\u9a8c\u8bc1\u786e\u4fdd\u4ee3\u7801\u751f\u6210\u7684\u53ef\u9760\u6027\u3002*\n\n*   **SPEAR: Code-Augmented Agentic Prompt Optimization**\n    \u5c06CodeAct\u8303\u5f0f\u5f15\u5165\u81ea\u52a8\u63d0\u793a\u5de5\u7a0b\uff08APE\uff09\uff0c\u63d0\u51fa**SPEAR**\uff0c\u4e00\u4e2a\u5177\u5907Python\u6c99\u7bb1\u7684\u81ea\u4e3b\u4f18\u5316\u667a\u80fd\u4f53\u3002SPEAR\u80fd\u81ea\u4e3b\u7f16\u5199\u5e76\u6267\u884cPython\u4ee3\u7801\u5bf9\u8bc4\u4f30DataFrame\u8fdb\u884c\u7ed3\u6784\u6027\u9519\u8bef\u5206\u6790\uff08\u5982\u6df7\u6dc6\u77e9\u9635\u3001\u9519\u8bef\u805a\u7c7b\uff09\uff0c\u8fd9\u662f\u957f\u4e0a\u4e0b\u6587LLM\u96be\u4ee5\u53ef\u9760\u5b8c\u6210\u7684\u4efb\u52a1\u3002\u5728\u5de5\u4e1a\u7ea7LLM-as-judge\u4efb\u52a1\u548cBBH\u57fa\u51c6\u4e0a\uff0cSPEAR\u51ed\u501fPython\u5de5\u5177\u5e26\u6765\u7684\u6df1\u5ea6\u5206\u6790\u80fd\u529b\uff0c\u663e\u8457\u4f18\u4e8eGEPA\u548cTextGrad\uff0c\u8bc1\u660e\u4e86\u4ee3\u7801\u6267\u884c\u5728\u590d\u6742\u63d0\u793a\u4f18\u5316\u4e2d\u7684\u4e0d\u53ef\u66ff\u4ee3\u6027\u3002(2605.26275 [cs.CL])\n\n*   **It's Not the Capability: Harness Sensitivity Is Non-Monotone Across LLM Agent Tiers**\n    \u901a\u8fc7432\u6b21\u5bf9\u7167\u5b9e\u9a8c\uff0c\u63a8\u7ffb\u4e86\u201c\u6a21\u578b\u80fd\u529b\u8d8a\u5f3a\uff0c\u6240\u9700\u6846\u67b6\uff08Harness\uff09\u7ed3\u6784\u8d8a\u7b80\u5355\u201d\u7684\u5355\u8c03\u5047\u8bbe\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u5bf9\u4e8e\u524d\u6cbf\u804a\u5929\u6a21\u578b\uff08Gemini 2.5 Flash\uff09\uff0c\u589e\u52a0\u6846\u67b6\u590d\u6742\u5ea6\u53cd\u800c\u964d\u4f4e\u6027\u80fd\uff08**\u6846\u67b6\u590d\u6742\u5ea6\u6096\u8bba**\uff09\uff1b\u800c\u5bf9\u4e8e\u524d\u6cbf\u63a8\u7406\u6a21\u578b\uff08Qwen3.5-122B\uff09\uff0c\u4e25\u683c\u6846\u67b6\u5219\u5e26\u6765\u6700\u9ad8\u51c6\u786e\u7387\u548c\u6700\u4f4e\u5ef6\u8fdf\u3002\u8fd9\u8868\u660e\u6846\u67b6\u654f\u611f\u6027\u53d6\u51b3\u4e8e\u6a21\u578b\u7c7b\u578b\uff08Chat vs. Reasoning\uff09\u800c\u975e\u5355\u7eaf\u7684\u80fd\u529b\u5c42\u7ea7\uff0c\u9700\u91c7\u7528\u5206\u5c42\u611f\u77e5\u7684\u6846\u67b6\u9009\u62e9\u7b56\u7565\u3002(2605.26731         let starredPapers = new Set();

        // 获取未加载的日期
        function getUnloadedDates() {
            return availableDates.filter(date => !loadedDates.has(date));
        }

        // Tag filter toggle
        function toggleTagFilter(date, tagName) {
            if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json?v=${DATA_VERSION}`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {
            const loadBtn = document.getElementById('load-more-btn');
            const unloadedCount = getUnloadedDates().length;

            if (loadBtn) {
                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;
                }
            }
        }

        // 从localStorage加载状态
        function loadState() {
            const starred = localStorage.getItem('starred_papers');
            const read = localStorage.getItem('read_papers');
            const deleted = localStorage.getItem('deleted_papers');
            const summaryLang = localStorage.getItem('summary_language');

            if (starred) starredPapers = new Set(JSON.parse(starred));
            if (read) readPapers = new Set(JSON.parse(read));
            if (deleted) deletedPapers = new Set(JSON.parse(deleted));
            if (summaryLang !== null) showChineseSummary = summaryLang === 'chinese';
        }

        // 保存状态到localStorage
        function saveState() {
            localStorage.setItem('starred_papers', JSON.stringify([...starredPapers]));
            localStorage.setItem('read_papers', JSON.stringify([...readPapers]));
            localStorage.setItem('deleted_papers', JSON.stringify([...deletedPapers]));
            localStorage.setItem('summary_language', showChineseSummary ? 'chinese' : 'english');
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

            deletePaper(arxivId, title);

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);
            }, 300);
        }

        // 切换星标状态
        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);
            }
            saveState();

            // 如果当前是只看收藏模式，需要重新渲染
            if (showOnlyStarred) {
                renderPapers();
            } else {
                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);
                if (starBtn) {
                    if (starredPapers.has(arxivId)) {
                        starBtn.classList.add('starred');
                    } else {
                        starBtn.classList.remove('starred');
                    }
                }
            }
        }

        // 切换已读状态
        function toggleRead(arxivId) {
            const checkbox = document.querySelector(`[data-arxiv-id="${arxivId}"] input[type="checkbox"]`);
            if (!checkbox) return;

            if (checkbox.checked) {
                readPapers.add(arxivId);
            } else {
                readPapers.delete(arxivId);
            }
            saveState();
        }

        // 切换摘要语言
        function toggleSummaryLanguage() {
            showChineseSummary = !showChineseSummary;
            const toggleBtn = document.getElementById('summary-toggle');
            toggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            // 更新所有摘要显示
            document.querySelectorAll('.summary-section').forEach(section => {
                const chineseContent = section.querySelector('.chinese-summary');
                const englishContent = section.querySelector('.english-summary');

                if (showChineseSummary) {
                    if (chineseContent) chineseContent.style.display = 'block';
                    if (englishContent) englishContent.style.display = 'none';
                } else {
                    if (chineseContent) chineseContent.style.display = 'none';
                    if (englishContent) englishContent.style.display = 'block';
                }
            });

            saveState();
        }

        // 更新统计信息
        function updateStats() {
            const visiblePapers = document.querySelectorAll('.paper-item:not(.hidden-paper)').length;
            document.getElementById('total-papers').textContent = visiblePapers;
        }

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];
                header.textContent = `${dateLabel} (${totalPapers} 篇论文)`;
            }

            if (totalPapers === 0) {
                sectionEl.remove();
            }
        }

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {
            const isStarred = starredPapers.has(paper.arxiv_id);
            const isRead = readPapers.has(paper.arxiv_id);
            const isDeleted = deletedPapers.has(paper.arxiv_id);

            if (isDeleted) return '';
            if (showOnlyStarred && !isStarred) return '';
            if (!paperMatchesFilters(paper, date)) return '';

            // Store paper data for lazy rendering
            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';
            const tagBadges = (paper.tags || []).map(tag => `<span class="tag-badge tag-arxiv">${tag}</span>`).join('');

            return `
                <div class="paper-item bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-6" data-arxiv-id="${paper.arxiv_id}">
                    <!-- 论文标题和操作按钮 -->
                    <div class="flex items-start justify-between mb-1">
                        <div class="flex items-start space-x-2 sm:space-x-3 flex-1 min-w-0">
                            <button class="star-button ${isStarred ? 'starred' : ''} mt-1 flex-shrink-0" onclick="toggleStar('${paper.arxiv_id}')" title="点击收藏">
                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>
                    </label>
                </div>
            `;

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">
                    <div class="collapsible-header open text-sm sm:text-base" onclick="toggleCollapsible(this)">原始摘要</div>
                    <div class="collapsible-content open">
                        <div class="inner">
                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}
                                ${hasSummaryZh ? `
                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                                    暂无原始摘要。上游抓取或解析可能失败。
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: paper.research_value_source === 'reviewgrounder' ? 'ReviewGrounder 审稿' : '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">
                            <div class="collapsible-header text-sm sm:text-base" onclick="toggleCollapsible(this)">${s.title}</div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">
                                        <div class="text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="${s.id}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            if (renderedSections === 0) {
                html += `
                    <div class="mb-3 sm:mb-4">
                        <div class="bg-amber-50/80 dark:bg-amber-950/20 border-l-3 border-amber-300 p-3 sm:p-4 rounded-r-lg text-xs sm:text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。
                        </div>
                    </div>
                `;
            }

            // 论文链接
            html += `
                <div class="flex flex-wrap gap-2">
                    <a href="https://arxiv.org/abs/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">
                        arXiv 原文
                    </a>
                    <a href="https://arxiv.org/pdf/${aid}.pdf" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-md transition-colors whitespace-nowrap">
                        PDF 下载
                    </a>
                    <a href="https://papers.cool/arxiv/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">

                const en = container.querySelector('.english-summary');
                if (ch) ch.style.display = 'none';
                if (en) en.style.display = 'block';
            }
        }

        // Toggle paper detail expansion
        function togglePaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            const hint = document.getElementById(`expand-hint-${arxivId}`);
            if (!container) return;

            const isHidden = container.classList.contains('hidden');

                    hint.querySelector('.expand-arrow').textContent = '▼';

                container.classList.add('hidden');

                    hint.querySelector('.expand-arrow').textContent = '▶';

                }
            }

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表
        function renderPapers() {
            const mainContent = document.getElementById('main-content');
            const loading = document.getElementById('loading');

            if (loading) {
                loading.classList.add('hidden');

            // Clear paper data map (rebuilt by createPaperHTML)
            Object.keys(paperDataMap).forEach(k => delete paperDataMap[k]);

            let html = '';
            let totalPapers = 0;

            for (const date in allPapers) {
                const clusters = allPapers[date] || [];
