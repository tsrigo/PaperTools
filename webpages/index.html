                    "intro_logic": "1. LLM agents已成为将生成式智能转化为实际生产力的关键范式，并在自主软件工程、科学发现和复杂工作流编排等领域展现出重要的工业应用价值。\n\n2. 近年来，系统级架构（如OpenClaw）的发展使agents超越了基于文本的推理引擎，实现了与操作系统和原生应用的深度集成，正在向数字具身（digital embodiment）状态转变。\n\n3. 这一演化轨迹指向了一个新的agentic范式：Self-Evolving Agent (SEA)。SEA的核心特征包括在开放环境中进行复杂交互，以及跨任务边界的持续多轮演化。\n\n4. 然而，SEA的新特征暴露了与现有评估框架的根本性不匹配：当前 benchmarks 采用孤立的任务episode作为评估基本单位，而SEA范式需要跨任务的行为连续性。\n\n5. 这种不匹配具体体现在三个维度：评估单元与SEA定义不兼容；静态的成功率指标无法捕捉执行效率的动态收敛；现有benchmarks缺乏生成演化分析所需的时间序列数据所需的持久记忆配置和顺序任务流设计。\n\n6. 尽管已有研究开始探索经验复用和效率维度，但这些工作将效率视为静态单任务属性，而非跨顺序任务流的动态趋势。\n\n7. **研究问题：如何设计评估框架来有效衡量Self-Evolving Agent在跨任务演化过程中的长期性能表现？**",
                    "core_insight": "# 论文深度分析：SEA-Eval\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n**作者发现了一个被现有评估框架完全忽视的关键事实：当前所有基准测试都只关注任务是否成功完成，而完全忽略了代理在执行任务过程中消耗的计算资源——这导致表面上\"成功\"的代理实际上存在高达31.2倍的效率差异，而这种效率差异恰恰是区分\"真正的自进化\"与\"伪进化\"的决定性信号。**\n\n### 展开解释\n\n作者在论文中明确指出了这个洞察：\n\n> \"Current benchmarks adopt the isolated task episode as the basic unit of evaluation, whereas the SEA paradigm requires cross-task behavioral continuity—prior experience is systematically discarded at every task boundary, making the assessment of cross-task knowledge accumulation and continuous capability growth structurally impossible.\"\n\n> \"While recent surveys have systematically catalogued the mechanisms of self-evolving agents, the construction of operational benchmarks for measuring evolutionary dynamics remains an open problem explicitly identified as a critical gap in the field.\"\n\n作者进一步揭示了问题的严重性：\n\n> \"This mismatch manifests across three dimensions: the evaluation unit is incompatible with the SEA definition; success-rate-dominated static metrics cannot capture the dynamic convergence of execution efficiency as experience accumulates; and existing benchmarks lack the persistent memory configurations and sequential task stream designs necessary to generate the time-series data required for evolutionary analysis.\"\n\n**这个洞察的突破性在于：** 之前所有评估框架都把\"任务成功率\"（Success Rate）作为唯一或最主要的评估指标。作者意识到这是一个根本性的错误——因为即使两个代理都能100%完成同样的任务，它们的\"进化状态\"可能完全不同。一个代理可能每次都从零开始\"暴力推理\"（消耗大量token），而另一个代理可能已经学会了高效的策略（消耗少量token）。只看成功率根本无法区分这两种情况。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n这个关键洞察直接导向了论文提出的具体方法，推理链条如下：\n\n**Step 1: 重新定义\"进化\"的含义**\n\n作者指出，真正的自进化代理应该表现出可观测的行为特征：\n\n> \"genuine evolution in SEAs produces a distinguishable behavioral signature: as the Evolutionary Flywheel operates above the distillation-yield threshold, execution cost converges monotonically across sequential task variants while task success is maintained.\"\n\n也就是说，当一个代理真正在学习时，它的token消耗应该**单调下降**——因为它把过去的经验提炼成了高效的策略。\n\n**Step 2: 识别\"伪进化\"的特征**\n\n> \"Conversely, pseudo-evolution—arising from distillation or retrieval failure—produces no such convergence, with execution cost scaling linearly with task frequency regardless of accumulated experience.\"\n\n如果代理没有真正进化，token消耗不会下降，而是保持线性增长（因为每次都重新推理）。\n\n**Step 3: 设计新的评估维度**\n\n基于以上分析，作者提出评估必须包含两个维度：\n- **Intra-task Execution Reliability**（任务内执行可靠性）：评估即时执行能力\n- **Long-term Evolutionary Performance**（长期进化性能）：评估跨任务的进化能力\n\n**Step 4: 选择Token Consumption作为核心指标**\n\n> \"T serves as the primary signal for detecting the transition from exhaustive zero-shot reasoning to experience-guided execution. This selection is theoretically motivated: the causal relationship between distillation quality and token cost is more direct than execution step count S, which may remain stable even as reasoning depth increases within each step, and more tractable than wall-clock latency, which introduces hardware-dependent variance that compromises cross-environment reproducibility.\"\n\n作者选择了Token Consumption而不是执行步数或延迟，因为：\n- 执行步数可能保持不变，但每步内的推理深度增加（token消耗仍会增加）\n- 延迟受硬件影响，无法跨环境比较\n\n**Step 5: 构建时序任务流**\n\n为了测量进化轨迹，作者设计了：\n- **Correlated Task Sequences**（相关任务序列）：结构相似的任务，用于观察进化增长\n- **Orthogonal Task Sequences**（正交任务序列）：结构无关的任务，用于测试进化稳定性\n\n---\n\n## 3. 试错历程与意外发现\n\n### 3.1 初步实验的意外发现\n\n作者在实验中发现了一个出乎意料的现象：\n\n> \"In static evaluation, both frameworks achieve a 100% task success rate, yet their token consumption differs by approximately sevenfold in aggregate—OpenClaw consumes a total of 27,364K tokens across all tasks, while GenericAgent consumes only 3,918K tokens, with the gap reaching up to 31.2 × on individual tasks.\"\n\n这个发现超出了作者的预期——他们原本可能预期成功率也会有差异，但没想到成功率完全相同的情况下，效率差异如此巨大。这验证了作者的核心洞察：**只看成功率会完全掩盖代理之间的巨大差异**。\n\n### 3.2 动态分析的进一步发现\n\n更出乎意料的是 sequential analysis 的结果：\n\n> \"GenericAgent exhibits genuine evolutionary characteristics: in the academic database retrieval task, its token consumption converges monotonically from 520K to 117K, reflecting the effective transformation of experience into low-cost execution strategies.\"\n\n> \"OpenClaw, by contrast, displays the hallmarks of pseudo-evolution: token consumption fluctuates across sequential task variants, fails to form a stable convergence trajectory, and collapses entirely on certain sequential tasks.\"\n\n这表明：\n1. 静态评估（只看成功率）完全无法区分真进化和伪进化\n2. 必须进行时序分析才能发现进化的本质差异\n3. 即使是\"成功\"的任务，也可能存在\"逻辑崩溃\"（如OpenClaw在Task 5-C和Task 9-B中完全失败）\n\n### 3.3 新的子问题\n\n这些发现催生了新的研究问题：\n\n1. **如何定义\"进化\"的边界？** 作者识别出两种失败模式：\n   - **Distillation failure**: Φ无法进行有效的因果归因\n   - **Retrieval failure**: Execution Hub无法识别新任务与已有知识的结构相似性\n\n2. **如何评估稳定性？** 作者引入了\"Steady-state Stability\"指标来检测异常行为波动\n\n3. **如何测量隐式对齐？** 作者提出Kalign指标来追踪用户干预率的纵向下降\n\n---\n\n## 总结\n\n这篇论文的核心贡献可以归结为一个简单但革命性的认识转变：**从\"能否完成任务\"到\"如何完成任务\"**。作者通过引入Token Consumption作为核心评估指标，并设计时序任务流来追踪进化轨迹，成功揭示了现有评估框架的根本缺陷。这一洞察不仅适用于SEA评估，也为整个LLM代理领域的研究提供了新的评估范式。",
                    "methodology": "# 论文解读：SEA-Eval\n\n## 一句话概括核心创新\n\n之前评估LLM代理的基准只看单个任务能不能完成，这篇论文提出：**评估代理在连续执行多个相似任务时，是否能把之前积累的经验转化为更低的执行成本**——即真正的\"进化\"能力，而不仅仅是\"能完成任务\"。\n\n---\n\n## 背景与问题\n\n现有基准（如WebArena、OSWorld等）有三个致命问题：\n\n1. **评估单元不对**：只测单个任务，不测跨任务的经验积累\n2. **只看成功率**：忽略执行效率，100%成功率的代理可能消耗30倍的token\n3. **没有时序设计**：无法生成追踪\"进化轨迹\"的时间序列数据\n\n论文的核心动机是：两个代理成功率都是100%，但一个越做越快（进化了），一个每次从头来（没进化），现有基准区分不出来。\n\n---\n\n## 方法论拆解\n\n### 第一步：定义什么是\"自进化代理\"（SEA）\n\n**输入**：无\n\n**操作**：提出形式化定义 SEA = (E, A, M, Φ, Ψ)\n\n- E：开放数字环境（网页、系统操作等）\n- A：可扩展的动作空间（工具集）\n- M：跨任务持久记忆（分为程序性知识Mp、经验性知识Me、声明性知识Md）\n- Φ：经验提炼函数（把交互轨迹变成记忆更新）\n- Ψ：跨任务记忆迁移函数\n\n**输出**：一个代理架构定义\n\n**目的**：把\"自进化\"从模糊概念变成可数学定义的结构，为后续评估提供理论依据\n\n---\n\n### 第二步：提出\"进化飞轮\"机制\n\n**输入**：原始交互轨迹 τ\n\n**操作**：分三阶段循环\n\n1. **执行阶段**：Execution Hub 与环境交互，生成轨迹 τ\n2. **提炼阶段**：Cognition Hub 用 Φ 分析 τ，提取关键决策点，更新记忆 M\n3. **增强执行阶段**：下次执行时从 M 检索经验，用经验指导执行而非从零推理\n\n**输出**：更高效的下一次执行\n\n**目的**：实现\"做一次比一次好\"的闭环机制\n\n**如果不做会怎样**：代理每次都从零推理，token消耗不随经验积累而下降\n\n---\n\n### 第三步：设计评估指标\n\n#### 核心指标（Primary Metrics）\n\n| 指标 | 含义 | 作用 |\n|------|------|------|\n| Success Rate (SR) | 任务成功率 | 最低保障：能不能完成 |\n| Token Consumption (T) | token消耗量 | 进化检测信号：经验提炼成功则T下降 |\n\n#### 辅助指标（Auxiliary Metrics）\n\n- **Keff**（效率进化率）：T的变化趋势，越负越好 → 说明在用经验而非重推理\n- **KSR**：成功率随任务序列的变化\n- **Kalign**：用户干预频率的变化 → 衡量隐式偏好对齐\n\n**目的**：用T的收敛趋势判断是真进化还是\"伪进化\"（两个失败模式：提炼失败、检索失败都导致T不下降）\n\n---\n\n### 第四步：构建数据集\n\n**输入**：30个原子任务（16个网页自动化 + 14个本地系统操作）\n\n**操作**：构建三类任务序列\n\n1. **相关任务序列**（Correlated）：每个原子任务生成3个语义等价变体 → 90个任务，用于测\"进化增长\"\n2. **正交任务序列**（Orthogonal）：不相关的任务交错 → 测\"进化稳定性\"（防遗忘）\n3. **动态环境突变**：45个环境变化（如库更新） → 测自愈能力\n\n**输出**：120个任务组成的连续任务流\n\n**目的**：生成时序数据，让Keff、KSR等指标有计算依据\n\n---\n\n### 第五步：实验验证\n\n**输入**：两个代理框架（OpenClaw、GenericAgent）+ Claude Opus 4.6\n\n**操作**：\n\n1. 静态评估：12个核心原子任务，各自单独执行\n2. 进化评估：12组相关任务序列，每个序列3个变体\n\n**输出**：\n\n| 框架 | 总成功率 | 总Token消耗 |\n|------|----------|-------------|\n| OpenClaw | 100% | 27,364K |\n| GenericAgent | 100% | 3,918K |\n\n**关键发现**：\n\n- 静态评估：成功率相同，但OpenClaw消耗token是GenericAgent的**7倍**\n- 单任务最大差距：31.2倍（Task 11：OpenClaw 5,950K vs GenericAgent 190.5K）\n- 进化轨迹：GenericAgent的Token消耗从520K→253K→117K（递减），OpenClaw波动或崩溃\n\n**目的**：证明\"只看成功率=假装有能力\"，Token收敛才是真进化的标志\n\n---\n\n## 消融实验分析\n\n论文没有传统意义上的\"消融实验\"（ ablation study），但通过对比两个框架的差异，间接验证了关键设计的有效性：\n\n### 哪个组件贡献最大？\n\n**记忆系统与经验提炼机制**是决定性差异：\n\n- GenericAgent有结构化的经验蒸馏机制，能把成功路径抽象成可复用的SOP（标准操作流程）\n- OpenClaw缺乏有效提炼，每次遇到变体都重新探索\n\n实验数据支持：Task 5（学术数据库检索），GenericAgent从520K降到117K（下降77%），说明提炼出的策略被复用了\n\n### 哪个组件可有可无？\n\n论文没有单独 ablation，但暗示：\n\n- 纯\"工具多\"不够（OpenClaw工具集也很丰富）\n- 纯\"推理强\"不够（两者都用同样的Claude模型）\n- **关键是记忆与执行的闭环**，而非单点技术\n\n### 协同效应\n\n论文强调：Φ（提炼）和Ψ（检索）必须同时工作——\n\n- 只提炼不检索 = 白提炼（知识用不上）\n- 只检索不提炼 = 没东西可检索\n\nGenericAgent的递减曲线证明两者形成了正向循环\n\n---\n\n## 硬伤与局限性\n\n根据论文第7节（Discussion and Future Work），主要局限包括：\n\n### 1. 冷启动问题\n\n当前SEA仍依赖人类提供的任务规格来启动第一个执行周期。完全自主的SEA应该能自己发现问题、生成训练经验、自行触发迭代——这在当前框架下无法评估。\n\n### 2. 延迟与效率矛盾\n\nSEA依赖大语言模型作为认知核心，推理延迟高。对于需要实时反馈的场景（如高频交互），当前架构不适用。论文提到异构多模型编排是方向，但未实现。\n\n### 3. 主观偏好评估困难\n\nKalign只测\"用户干预频率\"，但很多偏好（如审美、风格）无法用干预次数衡量。论文承认这是\"行为层\"评估，触及不到\"主观层\"。\n\n### 4. 安全性与治理\n\n随着代理自主扩展工具集A和更新记忆M，如何防止\"进化出危险能力\"缺乏系统性保障。论文只提到在沙箱中执行，未解决治理问题。\n\n---\n\n## 总结\n\n这篇论文的核心贡献是：**用Token Consumption的收敛趋势来定义和检测\"真进化\"**。\n\n它证明了：两个成功率100%的代理，可能在进化能力上差7倍；只看成功率的评估是自欺欺人。SEA-Eval提供了第一套能区分\"伪进化\"（每次重做）vs\"真进化\"（越做越快）的基准，但如何实现完全自主的冷启动、如何评估主观偏好，仍是开放问题。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **成功率100%仍是\"假象\"**：两个框架在静态评估中都达到100%任务成功率，但token消耗相差约7倍（OpenClaw 27,364K vs GenericAgent 3,918K），单个任务最高达31.2倍差异——单纯依赖成功率会严重高估某些框架的真实能力。\n\n- **\"伪进化\"比完全不进化更危险**：OpenClaw在后续任务变体上出现完全失败（Task 5-C、Task 9-B输出null），说明缺乏进化机制的系统不仅效率低下，还会产生不稳定性。\n\n- **简单记忆复用出奇有效**：GenericAgent仅通过将成功检索和过滤逻辑抽象为持久SOP，就将token消耗从520K降至117K（Task 5），证明经验蒸馏的威力。\n\n## 2. 有启发性的分析\n\n- **Token消耗比执行步骤数更适合作为进化指标**：论文指出执行步数S可能保持稳定但每步推理深度增加，而token消耗与蒸馏质量的因果关系更直接，且不受硬件影响。\n\n- **两种失败模式产生相同行为签名**：蒸馏失败和检索失败都表现为\"执行成本不随任务频率下降\"——这解释了为何静态指标无法区分真进化和伪进化。\n\n## 3. 对领域的新认知\n\n- **重新定义SEA的本质边界**：论文明确指出\"在任务边界重置认知状态的Agent不算进化\"——这将SEA与普通LLM Agent在概念上做了严格区分。\n\n- **Evolutionary Flywheel是结构必要性而非可选组件**：论文通过逻辑推导证明，只要满足数字具身和跨任务进化两个特征，就必然需要Execution Hub与Cognition Hub的闭环耦合。\n\n- **现有benchmark范式与SEA评估存在根本性不匹配**：主流benchmark以单任务episode为评估单元，而SEA需要跨任务行为连续性——这是该领域长期被忽视的方法论缺口。\n\n## 4. 实用的经验性结论\n\n- **评估LLM Agent必须同时追踪SR和T**：论文强调T是检测Evolutionary Flywheel运转状态的核心信号，SR单独无法揭示进化质量差异。\n\n- **顺序任务分析是必要的**：论文证明只有在顺序任务流中才能观察到进化收敛轨迹，孤立任务评估无法区分真进化和伪进化。\n\n## 5. 局限性中的机会\n\n- **冷启动问题**：当前SEA依赖人类提供的任务规格初始化，未来需研究无外部提示的自主 bootstrapping。\n\n- **多模型异构编排**：论文指出大模型推理延迟限制了在实时场景的应用，可探索\"轻量模型执行+大模型蒸馏\"的分工架构。\n\n- **多智能体共进化**：单Agent的内存容量有上限，未来需研究多个SEA如何共享/协作蒸馏知识，产生系统级进化增益。\n\n- **主观偏好对齐**：当前K_align仅追踪干预频率，无法捕捉美学质量等主观维度——这指向更丰富的偏好获取方法研究。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文通过具体实验数据证明了现有评估范式的严重不足：两个成功率100%的框架，token消耗相差7倍（27,364K vs 3,918K），单个任务最高达31.2倍差异\n- 论文识别出现有benchmark的三个根本性缺陷：评估单元不匹配、静态指标局限、缺乏时序设计\n- 指向了一个新兴的agentic范式（SEA），具有明确的工业应用价值\n\n**负面证据或缺失**：\n- 论文主要贡献是评估方法论，对如何改进agent设计本身指导有限\n- 30个原子任务的规模较小，泛化性存疑\n- 未展示该框架被其他研究团队采用的情况\n\n**判断**：中等\n\n**理由**：论文精准地识别了一个被忽视的关键问题，并通过有力的实验数据证明了现有方法的局限性。但其影响力主要停留在\"指出问题\"层面，\"解决问题\"的实践指导意义还不够丰富。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 论文首次提出了SEA的形式化定义：SEA = (E, A, M, Φ, Ψ)\n- 首次将Token Consumption的收敛趋势作为进化检测的核心信号\n- 首次构建了包含120个任务的连续任务流来评估跨任务演化能力\n\n**负面证据或缺失**：\n- \"效率进化\"概念在机器学习领域有相关研究（如课程学习、迁移学习中的效率指标）\n- 记忆系统、经验蒸馏在agent研究中已有探索（如Reflexion、RecAgent等）\n- 论文的核心创新更多是\"整合\"而非\"原创\"\n\n**判断**：中等\n\n**理由**：论文的独特贡献在于将这些分散的概念整合成一个系统性的评估框架，并给出了形式化定义。但\"用token收敛检测进化\"这个核心洞见的原创性不是100%全新。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- LLM agents正在从简单工具调用向复杂工作流编排演进，SEA作为新兴范式处于上升期\n- 系统级架构（OpenClaw等）的发展使数字具身成为可能，催生了对这类agent评估的需求\n- 论文发表日期为2026年4月，确实处于该领域的早期探索阶段\n\n**负面证据或缺失**：\n- 实验仅基于Claude Opus 4.6一个模型，未探索模型通用性\n- 120个任务的规模相对于成熟的benchmark（如WebArena有700+任务）还很小\n- 领域内对\"自进化agent\"的概念还未形成广泛共识\n\n**判断**：中等\n\n**理由**：时机恰当，SEA作为一个新兴范式确实需要新的评估方法。但该领域还处于非常早期的阶段，论文更像是\"定义问题\"而非\"解决问题\"。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 论文明确挑战了现有benchmark的基本假设：评估单元应该是任务序列而非单个任务episode\n- 挑战了\"成功率至上\"的评估范式，证明100%成功率可以掩盖31.2倍的效率差异\n- 挑战了静态评估指标的有效性，指出需要时序数据来追踪进化轨迹\n\n**负面证据或缺失**：\n- 论文主要在评估方法论层面挑战范式，对agent架构设计的挑战有限\n- 挑战的是\"做法\"而非\"根本性的科学假设\"\n\n**判断**：强\n\n**理由**：论文对现有benchmark范式进行了有说服力的批判，特别是用具体实验数据（31.2倍差异）作为支撑，这是最有力的证据。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文能用一句话概括核心洞见：\"用Token Consumption的收敛趋势来定义和检测'真进化'\"\n- 明确区分了\"真进化\"（越做越快）与\"伪进化\"（每次重做）\n- 识别出两种失败模式产生相同的行为签名（蒸馏失败和检索失败都导致成本不下降）\n\n**负面证据或缺失**：\n- 核心洞见更偏向\"评估指标设计\"而非\"科学发现\"\n- \"进化飞轮\"机制更多是架构描述而非洞见\n\n**判断**：强\n\n**理由**：核心洞见非常清晰简洁，能用一句话表达，且有具体的实验数据支撑。区分\"真进化\"和\"伪进化\"这个概念具有重要的方法论价值。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 论文采用了成熟的实验方法（对比两个框架）\n- 评估指标设计合理且可操作（SR、T、Keff）\n- 形式化定义提供了清晰的理论框架\n\n**负面证据或缺失**：\n- 没有传统意义上的消融实验，无法验证各组件的独立贡献\n- 实验仅基于两个框架，样本量很小\n- 未探索不同模型、不同任务类型的影响\n- 结果几乎是确定性的（GenericAgent确实比OpenClaw更高效），缺乏科学发现的惊喜感\n\n**判断**：中等\n\n**理由**：技术实现风险低，但科学发现的价值有限。实验设计偏简单，主要贡献是方法论层面的\"定义问题\"而非\"发现新知\"。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 论文在形式化定义和评估指标设计上有独特贡献\n- 首次系统性地将\"进化能力\"量化为可评估的指标\n- 数据集设计合理（三类任务序列：相关、正交、动态突变）\n\n**负面证据或缺失**：\n- 未明确说明团队在agent评估领域的积累\n- 实验规模有限，与成熟的benchmark构建团队（如WebArena团队）相比没有明显优势\n- 两个框架的对比可能存在选择偏差\n\n**判断**：中等\n\n**理由**：论文在评估框架设计上展现了创新性，但团队背景信息不足，无法判断其在该交叉点上的独特优势。\n\n---\n\n## 综合评价\n\n**值得深入关注**\n\n这篇论文在SEA评估这个新兴领域具有重要的开创性意义。它成功地将\"进化能力\"这个模糊概念转化为可量化的指标，并通过实验证明了现有评估方法的严重局限性。论文的核心洞见\"用Token Consumption的收敛趋势来检测真进化\"具有很强的说服力，31.2倍的效率差异被100%成功率掩盖这个发现更是发人深省。\n\n但论文的实验规模较小，主要贡献停留在\"定义问题\"层面，对如何改进agent设计的实践指导有限。作为一个评估基准论文，它完成了自己的使命；但作为推动领域进步的研究贡献，其影响力还需要更多后续验证。\n\n**最致命的弱点**\n\n实验规模太小，仅基于两个框架的对比就得出一般性结论。虽然论文指出了现有benchmark的问题，但提出的解决方案（SEA-Eval）本身的泛化性和可扩展性还没有得到充分验证。\n\n**如果要做得更好**\n\n1. 扩大实验规模，纳入更多框架（如ReAct、Reflexion等）和模型（如GPT-4、Claude 3等）\n2. 进行更系统的消融实验，验证记忆系统、经验提炼机制等各组件的独立贡献\n3. 增加任务类型的多样性，验证指标在不同场景下的鲁棒性\n\n**与 Carlini 原则的对照**\n\n最符合：选择重要且可解决的问题——论文精准地识别了SEA评估这个重要但被忽视的问题，用具体数据证明了现有方法的局限性。\n\n最不符合：追求最大的影响力——论文的实验规模有限，主要贡献停留在方法论层面，对agent设计的实际改进指导意义有限。",

                    "summary_translation": "当前基于大型语言模型（LLM）的智能体在情景化任务执行（episodic task execution）中展现出强大性能，但受限于静态工具集（static toolsets）和情景遗忘（episodic amnesia）问题，无法在任务边界间积累经验或优化策略。尽管自进化智能体（Self-Evolving Agent, SEA）范式已被提出，本文为SEA提供了基于数字具身（digital embodiment）和跨任务持续进化（continuous cross-task evolution）的新形式化定义，并引入SEA-Eval——首个从任务内执行可靠性（intra-task execution reliability）和长期进化性能（long-term evolutionary performance）两个维度评估SEA特征的基准测试。通过将任务组织为顺序任务流（sequential streams）并分析成功率（Success Rate）和Token消耗（Token Consumption）随时间的变化，SEA-Eval能够量化进化收益（evolutionary gain）和结构稳定性（structural stability），这是现有情景化基准测试（episodic benchmarks）无法实现的。实证评估揭示了当前最先进框架（state-of-the-art frameworks）中存在的显著进化瓶颈：在顺序分析下，相同的成功率掩盖了高达31.2倍的Token消耗差异和截然不同的进化轨迹（divergent evolutionary trajectories）。SEA-Eval为推动智能体从单纯的任务执行者向真正的自进化数字实体（self-evolving digital entities）提供了严格的科学基础。"

                    "summary": "While Large Language Models (LLMs) have demonstrated significant potential in Tool-Integrated Reasoning (TIR), existing training paradigms face significant limitations: Zero-RL suffers from inefficient exploration and mode degradation due to a lack of prior guidance, while SFT-then-RL is limited by high data costs and capability plateaus caused by low-entropy collapse. To address these challenges, we propose E3-TIR (Enhanced Experience Exploitation), a warm-up paradigm for the early stages of agent training. Specifically, we formulate training as the dynamic integration of three experience types: Expert Prefixes, Expert Guided, and Self-Exploration. By executing diverse branching exploration around expert \"anchors\" and employing a mix policy optimization mechanism, we effectively mitigate distribution shifts and resolve optimization conflicts arising from shared prefixes. Our method dynamically adapts the model's knowledge boundaries, effectively balancing exploration diversity with training efficiency.Experimental results demonstrate that E3-TIR achieves a 6 performance improvement over traditional paradigms on tool-use tasks, while requiring less than 10 of the synthetic data. Furthermore, in terms of ROI, a comprehensive metric integrating performance, data cost, and training efficiency we achieve a 1.46x gain compared to baselines. Code is available at https://github.com/yuki-younai/E3-TIR.",

                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体的训练方法**。论文明确指出其目标是解决\"agent training\"（智能体训练）中的问题，具体是Tool-Integrated Reasoning (TIR) 场景下的训练范式优化。论文提出了E3-TIR方法，通过动态整合三种经验类型（Expert Prefixes, Expert Guided, Self-Exploration）来改进智能体的训练过程。这直接符合用户\"构建、改进或演化LLM智能体\"的核心目标。\n\n**第二步：正面指标分析**\n\n论文包含了多个用户关注的正面指标：\n- **核心范式**: 涉及\"agent training\"、\"policy optimization\"、\"exploration\"\n- **智能体能力**: 关注\"Tool Use\"（工具使用），这是Agentic AI的核心能力之一\n- **演化机制**: 包含\"Self-Exploration\"（自我探索）和动态适应模型知识边界的机制，体现了探索与利用的平衡\n\n**第三步：排除标准检查**\n\n- **非演化型应用**: ❌ 不是将现成LLM/Agent应用于特定领域，而是专门设计训练方法来改进智能体的工具使用能力\n- **非Agentic推理**: ❌ 论文明确针对\"Tool-Integrated Reasoning\"，这是典型的Agentic能力（规划+工具使用）\n- **基础设施**: ❌ 不是关于模型部署或硬件优化\n- **安全/多模态/图技术**: ❌ 不涉及这些排除项\n- **多智能体拓扑**: ❌ 不涉及\n\n**第四步：特殊处理**\n\n虽然论文在实验中可能涉及工具使用任务（如代码执行、搜索等），但其核心贡献是**训练范式的创新**（E3-TIR方法），而不是将智能体应用于某个具体领域解决问题。这与用户第一步中的\"例外\"情况不同——这里不是\"把自我演化机制应用到特定领域\"，而是**构建自我演化/改进智能体本身的训练方法**。\n\n**结论**\n\n该论文核心贡献是提出一种新的智能体训练范式（E3-TIR），用于改进LLM智能体的工具集成推理能力。这完全符合用户的研究范围：构建和改进LLM智能体。论文关注的是如何更有效地训练智能体具备工具使用能力，属于\"Agentic AI\"的核心研究范畴。",
                    "intro_logic": "逻辑链条如下：\n\n1. 大型语言模型（LLMs）在复杂推理和工具辅助决策方面展现出显著潜力，推动了问答、规划和交互代理等高级应用的实现。\n\n2. 为了克服纯内部推理的局限性，LLMs通常被部署为工具集成推理（TIR）代理，通过多步交错过程调用外部工具（如代码解释器和搜索引擎）。\n\n3. 强化学习（RL）在解锁前沿LLM能力方面显示出显著前景，现有方法主要分为两类：Zero-RL（如Search-R1、ToRL）和SFT-then-RL（如Tool-Star、Tool-Light）。\n\n4. 依赖合成数据的SFT-then-RL方法不仅计算昂贵，而且引入训练冗余。\n\n5. 实证分析揭示了现有范式的深层局限性：Zero-RL缺乏先验指导，表现出低效探索和模式退化，模型在早期阶段需要大量试错来生成有效代码。\n\n6. Zero-RL通常收敛到一种\"react模式\"，过度依赖工具而牺牲推理能力。\n\n7. 相反，SFT-then-RL虽然受益于训练，但导致能力僵化，需要适应期来克服分布偏移。\n\n8. SFT-then-RL经常在训练后期触发低熵崩溃，严重限制样本多样性并阻碍进一步性能提升。\n\n9. 如何在早期训练阶段有效平衡探索多样性与训练效率，成为亟待解决的核心问题。\n\n研究问题：如何在Tool-Integrated Reasoning训练中同时实现高效的探索多样性和训练效率？",
                    "core_insight": "# 论文深度分析：E3-TIR 的关键洞察与方法论\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者发现：在专家轨迹中选择高熵的\"锚点\"进行分支探索，可以将指数级困难的探索问题转化为可解的子问题，从而同时解决 Zero-RL 的探索效率低下和 SFT-then-RL 的能力僵化问题。\n\n### 展开解释\n\n论文通过实证分析揭示了现有训练范式的深层问题：\n\n**对于 Zero-RL**，论文指出：\n> \"Zero-RL, lacking prior guidance, exhibits inefficient exploration and mode degradation: the model requires extensive trial-and-error to generate valid code at an early stage and often converges to a 'react mode' that over-relies on tools at the expense of reasoning.\"\n\n**对于 SFT-then-RL**，论文揭示：\n> \"SFT-then-RL, while benefiting from training, leads to capability rigidity. This necessitates an adaptation period to overcome distribution shifts and frequently triggers low-entropy collapse in the later stages of training, which severely restricts sample diversity and impedes further performance gains.\"\n\n作者意识到这两种范式的根本问题在于**探索空间的极端性**：Zero-RL 从零开始探索，面对指数级增长的搜索空间；SFT-then-RL 则过早收敛到低熵状态，失去探索多样性。\n\n**关键突破点**在于理论分析（Theorem E.3 和 E.4）：\n> \"For a task requiring T critical reasoning turns, the probability of a randomly initialized policy πθ generating a fully correct trajectory Hsucc is exponentially small with respect to the number of turns T.\"\n\n而通过在专家前缀的锚点处进行分支：\n> \"Given the expert history of k nodes, the agent only needs to complete the remaining T − k turns correctly... Since we branch at deep nodes (e.g., k ≈ T/2 or k ≈ 3T/4), the remaining horizon T − k is small, implying pT−k ≫ pT.\"\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个洞察直接导向了 E3-TIR 的核心设计：\n\n### 推理链条\n\n```\n洞察 → 问题重新定义 → 方法论设计\n```\n\n**洞察**：专家轨迹中的高熵前缀可以作为\"锚点\"，大幅缩小有效探索空间。\n\n**问题重新定义**：不再是\"如何从零开始探索\"，而是\"如何在专家基础上高效扩展\"。\n\n**方法论设计**（论文 Section 4）：\n\n1. **Prefix-Guided Branch Sampling（专家前缀引导的分支采样）**：\n   > \"We construct Dexp by selecting the top-k high-entropy prefixes... Unlike self-exploration methods, we propose expert-guided branch sampling, using expert prefixes as anchors to reduce search redundancy and ensure reasoning correctness.\"\n\n2. **Dynamic Experience Filtering（动态经验过滤）**：\n   > \"To empower the agent to dynamically adjust its knowledge boundaries, we introduce a filtering mechanism based on gradient and performance.\"\n\n3. **Hybrid Advantage Estimation（混合优势估计）**：\n   > \"We leverage the global advantage for baseline estimation... We compute an internal advantage within Dexp to measure variance among branches sharing the prefix T.\"\n\n4. **Advantage-Aware Gradient Detaching（优势感知的梯度分离）**：\n   > \"Branching sampling creates optimization conflicts where failed explorations (A < 0) incorrectly penalize valid shared prefixes. We address this via Advantage-Aware Gradient Detaching, which selectively blocks prefix gradients for failure paths (A < 0) while retaining full updates for successful ones (A > 0).\"\n\n---\n\n## 3. 试错历程与意外困难\n\n论文虽然没有明确描述\"试错历程\"，但通过**消融实验**和**分析**揭示了实现过程中的关键挑战：\n\n### 3.1 梯度冲突问题（Gradient Conflicts）\n\n作者发现当多个分支共享同一个专家前缀时，失败的探索路径会错误地惩罚有效的共享前缀，导致训练不稳定。论文中明确提到：\n> \"Branching sampling creates optimization conflicts where failed explorations (A < 0) incorrectly penalize valid shared prefixes.\"\n\n**解决方案**：Advantage-Aware Gradient Detaching (AAGD)，通过判断优势值的正负来决定是否阻断梯度传播。\n\n**消融实验证据**（表4）：\n> \"w/o AAGD: remove advantage-aware gradient detaching → accuracy drops to 20.6 / 14.7\"\n\n这证明了 AAGD 是防止训练崩溃的关键组件。\n\n### 3.2 分布偏移问题（Distribution Shift）\n\n直接混合专家经验和自探索数据会导致分布偏移，引发训练不稳定：\n> \"Since distribution shifts in expert trajectories cause training instability, we adopt off-policy policy shape to effectively utilize the mixed experience Dtrain.\"\n\n**消融实验证据**（图7）：\n> \"Without detachment, gradient norms oscillate due to optimization conflicts. AAGD ensures stable gradient flow... Off-policy reshaping corrects these shifts, maintaining training stability.\"\n\n### 3.3 超参数敏感性\n\n作者发现专家引导数量（M）和初始专家轨迹数量（K）需要精心调优：\n> \"Performance improves as M increases (for M < 8), demonstrating that expert-guided trajectories effectively accelerate early convergence. However, performance deteriorates as M increases further, indicating that retaining a sufficient proportion of self-generated trajectories is critical for stabilizing training.\"\n\n**最终发现**（图6）：\n- M（专家引导数量）的最优值约为 8\n- K（初始专家轨迹数）的最优值约为 3\n\n---\n\n## 总结\n\nE3-TIR 的核心洞察可以概括为：**\"与其从零开始艰难探索，不如在专家的'肩膀'上高效扩展\"**。这个看似简单的想法背后，是对强化学习探索困难和监督学习能力僵化的深刻理解，以及对专家轨迹结构（高熵前缀）的精准利用。最终通过混合策略优化和梯度冲突解决等技术创新，将理论洞察转化为实际可行的训练范式。",
                    "methodology": "# E3-TIR 论文解读\n\n## 一句话概括核心创新\n\n这篇论文提出的 E3-TIR 方法，其最本质的区别是：**不再让模型从零开始自己摸索（Zero-RL），也不完全依赖预先标注好的专家数据（SFT-then-RL），而是用专家轨迹中的\"高价值节点\"作为锚点，从这些锚点出发进行有针对性的分支探索。** 简单说，就是给模型指几个\"好老师\"待的地方，让它从老师身边开始往外探索，而不是让它瞎闯。\n\n---\n\n## 按照执行逻辑拆解方法\n\n### 第一步：找锚点——从专家轨迹中挑选高熵前缀\n\n**输入**：专家写好的完整推理轨迹（来自 Tool-Star 数据集）\n\n**操作**：对专家轨迹的每一步计算\"策略熵\"（entropy），这个熵值衡量的是模型在当前这一步生成内容的\"多样性\"程度。熵越高，说明这一步的选择空间越大、越关键。然后挑选熵值最高的前 k 个位置作为\"锚点\"。\n\n**输出**：一组带有树ID标记的锚点集合 D_exp\n\n**目的**：专家轨迹中不是每一步都同样重要，有些步骤只是机械执行，有些步骤才是真正体现推理水平的关键节点。找高熵节点就是为了锁定这些关键位置，从这里出发做分支探索的效率最高。\n\n**如果不做会怎样**：如果随机选位置分支，成功概率会很低，因为很多分支点本身就是死胡同，白白浪费计算资源。\n\n---\n\n### 第二步：分支采样——从锚点出发生成多样轨迹\n\n**输入**：锚点集合、自助探索预算 N（从零开始采样的数量）、专家引导预算 M（从锚点分支的数量）\n\n**操作**：\n1. **自助探索**：从问题起点开始，让当前策略模型自己生成 N 条完整轨迹\n2. **专家引导**：对每个锚点，根据其\"探索增益\"决定是否分支。如果决定分支，就在该锚点处\"复制\"当前轨迹，然后用策略模型从这里继续往下生成多个不同的分支\n\n**输出**：两个经验池——D_self（自助探索的轨迹）和 D_exp（专家引导的轨迹）\n\n**目的**：纯自助探索效率太低（后面会算概率，只有约 0.00065 的成功率）；纯用专家数据又会导致模型只会模仿、没有创新能力。从锚点分支相当于\"站在巨人的肩膀上\"——利用专家已经走对的路径，同时保留自己探索新可能性的空间。\n\n**如果不做会怎样**：Zero-RL 会在早期训练阶段长时间得不到任何正反馈（因为随机生成的代码几乎全是错的），收敛极慢。\n\n---\n\n### 第三步：动态过滤——筛选有价值的经验\n\n**输入**：D_self 和 D_exp 两个经验池\n\n**操作**：\n1. **梯度有效性过滤**：如果某个专家树里所有轨迹的奖励都一样（方差为0），说明这些轨迹提供不了梯度信息，只保留一条；否则全部保留\n2. **性能对比过滤**：比较自助探索的最大奖励和专家引导的最大奖励。如果自助探索已经能达到或超过专家水平，就只保留自助探索的轨迹；否则两者都保留\n\n**输出**：最终用于训练的轨迹集合 D_train\n\n**目的**：避免无效数据的干扰，同时确保当模型已经学得足够好时，能及时\"毕业\"不再依赖专家数据，形成自适应学习节奏。\n\n**如果不做会怎样**：训练会被大量冗余或低质量的轨迹污染，梯度方向不明确，收敛不稳定。\n\n---\n\n### 第四步：混合优势估计——给每条轨迹打分\n\n**输入**：D_train 中的所有轨迹\n\n**操作**：计算两种优势分数\n1. **全局优势**：该轨迹的奖励减去整个经验池的平均奖励，再除以标准差。衡量这条轨迹在全局来看是好是坏\n2. **专家树内部优势**：在同一个专家树内部（共享同一个前缀的不同分支），计算该轨迹相对于同树其他分支的优势。衡量这条分支在\"专家分支\"内部的表现\n\n**输出**：每条轨迹的综合优势分数 A_self 或 A_exp\n\n**目的**：全局优势保证训练稳定（不会因为个别异常值翻车），专家树内部优势让模型能学到同一步骤下不同选择之间的细微差别。\n\n**如果不做会怎样**：只用全局优势会忽略专家树内部的细微差异，模型学不到\"同一个问题不同解法哪个更好\"；只用内部优势又会导致训练不稳定。\n\n---\n\n### 第五步：带梯度阻断的混合策略优化——更新模型\n\n**输入**：带优势分数的轨迹、当前策略模型\n\n**操作**：\n1. **分两部分优化**：\n   - 自助探索部分：用标准的 on-policy GRPO（一种强化学习算法）\n   - 专家引导部分：用 off-policy 方式（带重要性采样修正）\n2. **优势感知的梯度阻断**：对于共享前缀的轨迹，如果某条分支的优势是负的（说明这个分支是失败的），就阻断它在前缀部分的梯度更新，避免失败路径错误地惩罚正确的共享前缀\n\n**输出**：更新后的策略模型\n\n**目的**：解决\"优化冲突\"问题——同一个前缀下面挂了多个分支，有的成功有的失败，如果不分青红皂白全部反向传播，成功的分支也会被拖下水。阻断负优势分支的梯度可以避免这个问题。\n\n**如果不做会怎样**：训练会剧烈震荡，梯度norm上下剧烈波动，甚至直接训练崩溃（论文 ablation 实验显示，去掉这个组件后准确率从 46.7% 暴跌到 20.6%）。\n\n---\n\n## 消融实验分析\n\n### 哪个组件贡献最大？\n\n**优势感知梯度阻断（AAGD）贡献最大**。去掉它之后，准确率从 46.7% 暴跌到 20.6%（下降 26.1 个点），直接导致训练崩溃。这验证了论文的核心动机——共享前缀的优化冲突是一个致命问题，必须用梯度阻断来解决。\n\n### 哪个组件可有可无？\n\n**混合优势估计（去掉 expert-tree 内部优势，只保留全局优势）**的影响相对较小。去掉后准确率从 46.7% 降到 49.5%（只降了 1.9 个点）。这说明全局优势是保底的，内部优势是锦上添花。\n\n### 各组件之间有协同效应吗？\n\n有。**分支探索**单独去掉会降 4.2 个点，**混合优势**单独去掉只降 1.9 个点，但论文没有单独测试两者的组合效果。不过从设计逻辑上看，分支探索负责\"找到好样本\"，混合优势负责\"给好样本打正确的分\"，两者是上下游依赖关系，缺一不可。\n\n### 回扣动机\n\n论文声称要解决两个核心痛点：\n1. **Zero-RL 的低效探索** → 由\"分支探索\"（从专家锚点出发）解决\n2. **SFT+RL 的优化冲突和低熵崩溃** → 由\"优势感知梯度阻断\"解决\n\n实验数据支持这个说法：去掉分支探索后性能下降，去掉梯度阻断后直接崩溃。\n\n---\n\n## 硬伤与局限性\n\n### 1. 对专家锚点质量敏感\n\n论文明确承认：如果初始的专家轨迹质量不高或者多样性不够，模型会被困在偏狭的搜索空间里。这相当于\"老师如果教错了，学生也会跟着错\"。\n\n### 2. 评估范围有限\n\n实验主要在数学推理和知识问答两个领域，任务复杂度相对可控。对于需要同时调用多个工具、或需要在很长的时间跨度内保持状态一致性的真实复杂场景，论文没有充分验证。",
                    "additional_insights": "1. **反直觉发现**：Zero-RL虽然看似更\"纯粹\"，但会产生\"react mode\"——模型过度依赖工具而丧失推理能力；SFT-then-RL虽然起步快，但后期会陷入低熵崩溃导致性能骤降；简单的加权SFT+RL混合（Mix SFT+RL）反而导致训练崩溃（准确率仅27.6），说明不能简单混合。\n\n2. **关键消融发现**：移除AAGD（优势感知梯度detach）导致灾难性下降——准确率从46.7%暴跌至15.3%（知识推理）和8.2%（计算推理），证实共享前缀的梯度冲突是致命问题；branching exploration的贡献最大，移除后下降4.2%，超过移除hybrid advantage的1.9%。\n\n3. **新认知**：论文揭示了当前训练范式的深层问题——Zero-RL存在\"探索效率低下\"和\"工具过度使用\"，SFT+RL存在\"分布偏移\"和\"能力僵化\"，这些系统性问题是之前未被充分重视的。\n\n4. **实用经验**：\n   - 专家引导样本数M存在倒U型曲线：M=8时最优，过多会损害训练稳定性\n   - 初始专家轨迹数K=3最合适（因为交互轮次通常2-3轮）\n   - 预热阶段50步足够，专家数据4k样本后收益递减\n   - ROI指标显示10-30步预热+4k专家数据达到最佳性价比（1.46×）\n\n5. **局限性中的机会**：\n   - 对专家前缀质量敏感——低质量种子会限制探索效率，暗示可研究\"专家轨迹质量评估\"\n   - 当前评估局限于数学和QA任务，多工具协调、长程状态保持等场景未验证——这些是未来有价值的方向",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文声称在Tool-Integrated Reasoning任务上实现了6个性能点的提升\n- ROI指标达到1.46×，显示训练效率有实质改善\n- 消融实验证明AAGD组件对训练稳定性至关重要（去掉后准确率从46.7%暴跌至20.6%）\n\n**负面证据或缺失**：\n- 实验仅在数学推理和知识问答两个领域进行，论文明确承认\"对于需要同时调用多个工具、或需要在很长的时间跨度内保持状态一致性的真实复杂场景，论文没有充分验证\"\n- 性能提升的具体数值在输入材料中不明确（只说\"6 performance improvement\"但未给出具体数值）\n\n**判断**：中等\n\n**理由**：论文解决了RL训练中确实存在的工程问题，但应用场景有限，且核心贡献更像是训练技巧的优化而非范式级别的突破。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次明确提出\"高熵前缀\"作为锚点进行分支探索的概念\n- \"优势感知梯度阻断\"（AAGD）是论文的核心技术创新，消融实验显示其贡献最大（下降26.1个点）\n\n**负面证据或缺失**：\n- 整体框架本质上是\"专家引导+自助探索\"的组合，输入材料中也提到\"简单说，就是给模型指几个'好老师'待的地方\"\n- 混合策略优化（on-policy GRPO + off-policy）是已有技术的组合应用\n\n**判断**：中等\n\n**理由**：AAGD机制具有独特性，但整体方法论的新颖度有限，属于增量改进而非范式创新。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- 当前LLM + 强化学习正处于研究热点，Tool-Integrated Reasoning是重要方向\n- 论文指出了现有范式的深层问题（\"react mode\"、低熵崩溃），这些问题确实在社区中存在讨论\n\n**负面证据或缺失**：\n- 相关研究已较为成熟，论文的方法本质上是\"打补丁\"而非开辟新方向\n\n**判断**：中等\n\n**理由**：时机恰当，但论文更像是\"在成熟框架内的优化\"而非\"开辟新战场\"。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 论文明确挑战了Zero-RL范式（指出其\"react mode\"和低效探索问题）\n- 论文也挑战了SFT-then-RL范式（指出其\"能力僵化\"和\"低熵崩溃\"问题）\n- 实验中Mix SFT+RL（简单混合）导致训练崩溃（准确率仅27.6%），证明不能简单混合\n\n**负面证据或缺失**：\n- 论文的\"挑战\"更多是指出问题并提供解决方案，而非彻底推翻现有范式\n- 论文承认仍需要专家数据（来自Tool-Star），并未完全摆脱对专家的依赖\n\n**判断**：中等\n\n**理由**：论文对现有范式有批判性审视，但解决方案仍建立在现有框架之上，属于\"改良\"而非\"革命\"。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：输入材料中提供了清晰的核心洞见表述——\"用专家轨迹中的'高价值节点'作为锚点，从这些锚点出发进行有针对性的分支探索\"\n\n**负面证据或缺失**：\n- 核心洞见更像是\"工程技巧\"而非\"科学发现\"\n- 30字内难以完整表述其全部创新点\n\n**判断**：中等\n\n**理由**：核心洞见表达清晰，但更偏向工程实现而非基础科学洞见。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 技术方案完整，包含5个步骤的详细实现\n- 实验验证较充分（有消融实验、超参数分析等）\n- ROI指标显示10-30步预热+4k专家数据达到最佳性价比\n\n**负面证据或缺失**：\n- 论文明确承认\"对专家锚点质量敏感\"——如果初始专家轨迹质量不高，模型会被困在偏狭的搜索空间\n- 评估范围有限，仅在数学和QA任务上验证\n- 消融实验显示去掉AAGD后训练直接崩溃，说明方法存在脆弱性\n\n**判断**：中等\n\n**理由**：技术可行但存在明显脆弱性，对数据质量和组件完整性高度敏感。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 论文引用了Tool-Star数据集，表明团队在该领域有积累\n- 代码已开源（https://github.com/yuki-younai/E3-TIR）\n\n**负面证据或缺失**：\n- 输入材料中未提供团队背景信息\n- 无法判断团队在\"LLM+RL+工具集成\"交叉点上的独特优势\n\n**判断**：弱\n\n**理由**：缺乏团队背景信息，无法评估其在该交叉点上的独特竞争力。\n\n---\n\n## 综合评价\n\n**判定**：有潜力但有明显短板\n\n**理由**：论文提出的AAGD机制和分支探索策略确实解决了Tool-Integrated Reasoning训练中的实际问题，实验证据也支持其有效性。但其核心贡献更像是\"训练技巧的优化\"而非范式级别的创新，且对专家数据质量高度敏感、评估场景有限，限制了其影响力的广度。\n\n---\n\n## 最致命的弱点\n\n**对专家锚点质量的强依赖**：论文明确承认\"如果初始的专家轨迹质量不高或者多样性不够，模型会被困在偏狭的搜索空间里\"。这意味着该方法的性能上限受限于专家数据的质量，而非真正的\"从零学习\"能力。\n\n---\n\n## 如果要做得更好\n\n1. **扩展评估场景**：在多工具协调、长程状态保持等更复杂的真实场景中验证方法的有效性\n2. **降低对专家数据的依赖**：探索如何从低质量或不完美的专家数据中恢复，避免\"垃圾进垃圾出\"\n\n---\n\n## 与 Carlini 原则的对照\n\n**最符合**：做\"可验证的\"研究——论文有完整的消融实验、超参数分析、ROI指标，结论有实验支撑\n\n**最不符合**：追求\"问题的根本性解决\"——论文更像是工程优化（如何更好地利用专家数据），而非揭示深层科学规律或提出全新的训练范式",

                    "summary_translation": "## 中文翻译\n\n尽管大型语言模型（Large Language Models, LLMs）在工具集成推理（Tool-Integrated Reasoning, TIR）领域展现出巨大潜力，但现有训练范式存在显著局限：Zero-RL（零强化学习）因缺乏先验引导而面临探索效率低下和模式退化问题；而SFT-then-RL（监督微调后强化学习）则受制于高昂的数据成本和低熵崩溃（low-entropy collapse）导致的能力瓶颈。为解决这些挑战，我们提出E3-TIR（增强经验利用，Enhanced Experience Exploitation），这是一种面向智能体训练早期阶段的热身范式。具体而言，我们将训练构建为三种经验类型的动态整合：专家前缀（Expert Prefixes）、专家引导（Expert Guided）和自我探索（Self-Exploration）。通过围绕专家“锚点”执行多样化的分支探索，并采用混合策略优化机制，我们有效缓解了分布偏移问题，并解决了由共享前缀引发的优化冲突。我们的方法能够动态调整模型的知识边界，有效平衡探索多样性与训练效率。实验结果表明，E3-TIR在工具使用任务上相比传统范式实现了6%的性能提升，同时仅需不到10%的合成数据。此外，在ROI（投资回报率，Return on Investment）这一综合性能、数据成本和训练效率的指标上，我们相比基线模型实现了1.46倍的收益。代码已开源，访问地址：https://github.com/yuki-younai/E3-TIR。"

cd5\u6ee1\u8db3\u590d\u6742\u4efb\u52a1\u9700\u6c42\u3002\u65e0\u8bba\u662f\u4e3a\u53d9\u4e8b\u667a\u80fd\u4f53\uff08EvoSpark\uff09\u3001\u5b66\u672f\u95ee\u7b54\u667a\u80fd\u4f53\uff08Thought-Retriever\uff09\u8fd8\u662f\u5404\u7c7b\u4e13\u4e1a\u4efb\u52a1\uff08M$^\\star$\uff09\uff0c**\u6839\u636e\u4efb\u52a1\u7279\u6027\u5b9a\u5236\u8bb0\u5fc6\u7684\u5b58\u50a8\u3001\u7ec4\u7ec7\u548c\u68c0\u7d22\u903b\u8f91**\uff0c\u6b63\u6210\u4e3a\u63d0\u5347\u667a\u80fd\u4f53\u957f\u671f\u6027\u80fd\u7684\u5173\u952e\u65b9\u5411\u3002\n*   **\u201c\u601d\u60f3\u201d\u4f5c\u4e3a\u65b0\u7684\u8bb0\u5fc6\u5355\u5143**\uff1aThought-Retriever \u63d0\u51fa\u4e86\u4e00\u4e2a\u98a0\u8986\u6027\u89c2\u70b9\uff1a\u5bf9\u667a\u80fd\u4f53\u6700\u6709\u4ef7\u503c\u7684\u8bb0\u5fc6\u53ef\u80fd\u4e0d\u662f\u539f\u59cb\u6570\u636e\uff0c\u800c\u662f\u5b83\u81ea\u5df1\u5904\u7406\u6570\u636e\u65f6\u4ea7\u751f\u7684**\u4e2d\u95f4\u63a8\u7406\u8fc7\u7a0b\uff08\u201c\u601d\u60f3\u201d\uff09**\u3002\u8fd9\u76f8\u5f53\u4e8e\u4e3aLLM\u5916\u6302\u4e86\u4e00\u4e2a\u4e0d\u65ad\u589e\u957f\u7684\u201c\u601d\u7ef4\u7f13\u5b58\u201d\uff0c\u6781\u5927\u5730\u63d0\u5347\u4e86\u77e5\u8bc6\u590d\u7528\u6548\u7387\u548c\u62bd\u8c61\u95ee\u9898\u89e3\u51b3\u80fd\u529b\uff0c\u662f\u8fc8\u5411\u66f4\u7c7b\u4eba\u8ba4\u77e5\u7684\u91cd\u8981\u4e00\u6b65\u3002\n*   **\u7a0b\u5e8f\u5316\u4e0e\u53ef\u8fdb\u5316\u67b6\u6784\u7684\u6f5c\u529b**\uff1aM$^\\star$ \u5c55\u793a\u4e86\u7528**\u4ee3\u7801\u8fdb\u5316**\u6765\u81ea\u52a8\u5316\u8bbe\u8ba1\u667a\u80fd\u4f53\u5b50\u7cfb\u7edf\u7684\u5f3a\u5927\u6f5c\u529b\u3002\u8fd9\u4e0d\u4ec5\u4e3a\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u4e5f\u4e3a\u667a\u80fd\u4f53\u7684\u5176\u4ed6\u6a21\u5757\uff08\u5982\u89c4\u5212\u5668\u3001\u5de5\u5177\u4f7f\u7528\uff09\u7684\u81ea\u52a8\u5316\u67b6\u6784\u641c\u7d22\u6253\u5f00\u4e86\u65b0\u601d\u8def\uff0c\u9884\u793a\u7740\u672a\u6765AI\u7cfb\u7edf\u8bbe\u8ba1\u53ef\u80fd\u66f4\u4f9d\u8d56\u201c\u5143\u4f18\u5316\u201d\u800c\u975e\u4eba\u5de5\u84dd\u56fe\u3002",
    "2026-04-13": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-13)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u9ad8\u5ea6\u96c6\u4e2d\u4e8e**\u667a\u80fd\u4f53\uff08Agent\uff09** \u7684\u6df1\u5316\u4e0e\u7cfb\u7edf\u5316\u3002\u591a\u7bc7\u8bba\u6587\u4e0d\u518d\u6ee1\u8db3\u4e8e\u5c55\u793a\u667a\u80fd\u4f53\u7684\u57fa\u7840\u80fd\u529b\uff0c\u800c\u662f\u6df1\u5165\u63a2\u7d22\u5176**\u590d\u6742\u793e\u4f1a\u884c\u4e3a**\uff08\u5982\u9009\u4e3e\u3001\u6b3a\u9a97\u3001\u8c08\u5224\uff09\u3001**\u66f4\u9ad8\u6548\u7684\u8bad\u7ec3\u8303\u5f0f**\uff08\u5982\u81ea\u6211\u84b8\u998f\u3001\u53ef\u9a8c\u8bc1\u5956\u52b1\uff09\uff0c\u4ee5\u53ca**\u5e94\u5bf9\u5b9e\u9645\u90e8\u7f72\u6311\u6218**\uff08\u5982\u4e0a\u4e0b\u6587\u74f6\u9888\u3001\u89c4\u5219\u98ce\u9669\u3001\u6301\u7eed\u5b66\u4e60\uff09\u7684\u89e3\u51b3\u65b9\u6848\u3002\u6574\u4f53\u8d8b\u52bf\u8868\u660e\uff0cAI\u667a\u80fd\u4f53\u7814\u7a76\u6b63\u4ece\u201c\u80fd\u529b\u6f14\u793a\u201d\u9636\u6bb5\uff0c\u8fc8\u5411\u201c\u7cfb\u7edf\u6784\u5efa\u201d\u4e0e\u201c\u884c\u4e3a\u7406\u89e3\u201d\u7684\u65b0\u5c42\u6b21\u3002\n\n---\n\n### \u4ece\u535a\u5f08\u5230\u6cbb\u7406\uff1a\u591a\u667a\u80fd\u4f53\u793e\u4f1a\u6027\u7814\u7a76\n\n\u4eca\u65e5\u591a\u7bc7\u8bba\u6587\u6784\u5efa\u4e86\u590d\u6742\u7684\u6a21\u62df\u73af\u5883\uff0c\u65e8\u5728\u89c2\u5bdf\u548c\u5851\u9020\u667a\u80fd\u4f53\u5728\u4e92\u52a8\u4e2d\u6d8c\u73b0\u7684\u793e\u4f1a\u6027\u884c\u4e3a\uff0c\u5982\u9886\u5bfc\u3001\u4fe1\u4efb\u4e0e\u6b3a\u9a97\u3002\n\n*   **\u901a\u8fc7\u9009\u4e3e\u9886\u5bfc\u529b\u8bc4\u4f30LLM\u793e\u4f1a\u7fa4\u4f53\u4e2d\u7684\u5408\u4f5c**\uff1a\u8fd9\u9879\u7814\u7a76\u63a2\u8ba8\u4e86\u5728\u7ba1\u7406\u516c\u5171\u8d44\u6e90\u7684\u667a\u80fd\u4f53\u7fa4\u4f53\u4e2d\uff0c\u5f15\u5165**\u9009\u4e3e\u9886\u5bfc\u673a\u5236**\u662f\u5426\u80fd\u6539\u5584\u96c6\u4f53\u51b3\u7b56\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u62e5\u6709\u6c11\u9009\u9886\u5bfc\u7684\u7fa4\u4f53\uff0c\u5176\u793e\u4f1a\u798f\u5229\u548c\u751f\u5b58\u65f6\u95f4\u5f97\u5230\u663e\u8457\u63d0\u5347\uff08\u5206\u522b\u63d0\u9ad855.4%\u548c128.6%\uff09\u3002\u8be5\u5de5\u4f5c\u4e3a\u7814\u7a76\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u793e\u4f1a\u7ec4\u7ec7\u5f62\u5f0f\u5960\u5b9a\u4e86\u57fa\u7840\u3002**(2604.11721 [cs.CL])**\n*   **CONSCIENTIA: LLM\u667a\u80fd\u4f53\u80fd\u5b66\u4f1a\u7b56\u7565\u5417\uff1f\u591a\u667a\u80fd\u4f53\u7ebd\u7ea6\u5e02\u6a21\u62df\u4e2d\u7684\u6d8c\u73b0\u6b3a\u9a97\u4e0e\u4fe1\u4efb**\uff1a\u7814\u7a76\u6784\u5efa\u4e86\u4e00\u4e2a\u7b80\u5316\u7684\u7ebd\u7ea6\u5e02\u6a21\u62df\u73af\u5883\uff0c\u8ba9\u5177\u6709\u5bf9\u7acb\u76ee\u6807\uff08\u9ad8\u6548\u5bfc\u822a vs. \u5e7f\u544a\u5f15\u6d41\uff09\u7684\u667a\u80fd\u4f53\u8fdb\u884c\u4e92\u52a8\u3002\u901a\u8fc7**Kahneman-Tversky\u4f18\u5316**\u8fed\u4ee3\u5b66\u4e60\uff0c\u667a\u80fd\u4f53\u5c55\u73b0\u51fa\u6709\u9650\u7684\u7b56\u7565\u884c\u4e3a\uff0c\u5982\u9009\u62e9\u6027\u4fe1\u4efb\u548c\u6b3a\u9a97\u3002\u7814\u7a76\u63ed\u793a\u4e86\u667a\u80fd\u4f53\u5728**\u5b89\u5168\u6027\u4e0e\u6709\u6548\u6027\u4e4b\u95f4\u5b58\u5728\u6301\u4e45\u6743\u8861**\u3002**(2604.09746 [cs.CL])**\n\n### \u8d85\u8d8a\u6a21\u4eff\uff1a\u667a\u80fd\u4f53\u8bad\u7ec3\u65b0\u8303\u5f0f\u6d8c\u73b0\n\n\u4e3a\u4e86\u514b\u670d\u4f20\u7edf\u5f3a\u5316\u5b66\u4e60\u5728\u8bad\u7ec3\u667a\u80fd\u4f53\u65f6\u7684\u6837\u672c\u6548\u7387\u4f4e\u4e0b\u7b49\u95ee\u9898\uff0c\u7814\u7a76\u8005\u4eec\u63d0\u51fa\u4e86\u591a\u79cd\u521b\u65b0\u8bad\u7ec3\u6846\u67b6\u3002\n\n*   **\u6307\u5bfcLLM\u901a\u8fc7\u53ef\u9a8c\u8bc1\u5956\u52b1\u7684\u5f3a\u5316\u5b66\u4e60\u8fdb\u884c\u8c08\u5224**\uff1a\u7814\u7a76\u91c7\u7528**\u57fa\u4e8e\u53ef\u9a8c\u8bc1\u5956\u52b1\u7684\u5f3a\u5316\u5b66\u4e60**\u6765\u8bad\u7ec3\u4e00\u4e2a\u4e70\u5bb6\u667a\u80fd\u4f53\u4e0eLLM\u5356\u5bb6\u8fdb\u884c\u4ef7\u683c\u8c08\u5224\u3002\u901a\u8fc7\u5c06\u5956\u52b1\u76f4\u63a5\u951a\u5b9a\u5728\u7ecf\u6d4e\u76c8\u4f59\u6700\u5927\u5316\u548c\u9884\u7b97\u7ea6\u675f\u4e0a\uff0c\u667a\u80fd\u4f53\u7ecf\u5386\u4e86\u56db\u4e2a\u9636\u6bb5\u7684\u7b56\u7565\u8fdb\u5316\uff0c\u6700\u7ec8\u4e00\u4e2a30B\u7684\u6a21\u578b\u5728\u83b7\u53d6\u76c8\u4f59\u4e0a\u80fd\u663e\u8457\u8d85\u8d8a\u5927\u5341\u500d\u7684\u5c16\u7aef\u6a21\u578b\uff0c\u5e76\u5c55\u73b0\u51fa\u5f3a\u5927\u7684\u6cdb\u5316\u80fd\u529b\u3002**(2604.09855 [cs.CL])**\n*   **Skill-SD\uff1a\u9762\u5411\u591a\u8f6eLLM\u667a\u80fd\u4f53\u7684\u6280\u80fd\u6761\u4ef6\u81ea\u84b8\u998f**\uff1a\u9488\u5bf9\u591a\u8f6e\u4ea4\u4e92\u4efb\u52a1\u4e2dRL\u5956\u52b1\u7a00\u758f\u7684\u95ee\u9898\uff0c\u672c\u6587\u63d0\u51fa**Skill-SD**\u6846\u67b6\u3002\u5b83\u5c06\u667a\u80fd\u4f53\u6210\u529f\u7684\u8f68\u8ff9\u603b\u7ed3\u4e3a\u63cf\u8ff0\u6027\u201c\u6280\u80fd\u201d\uff0c\u4f5c\u4e3a\u52a8\u6001\u7684\u3001\u4ec5\u6559\u5e08\u6a21\u578b\u53ef\u89c1\u7684\u201c\u7279\u6743\u4fe1\u606f\u201d\uff0c\u5e76\u901a\u8fc7\u91cd\u8981\u6027\u52a0\u6743\u7684\u53cd\u5411KL\u635f\u5931\u8fdb\u884c\u7a33\u5b9a\u7684\u77e5\u8bc6\u84b8\u998f\uff0c\u4ece\u800c\u5927\u5e45\u63d0\u5347\u57fa\u7840RL\u65b9\u6cd5\u7684\u6027\u80fd\u3002**(2604.10674 [cs.CL])**\n*   **\u53ef\u63a7\u4e14\u53ef\u9a8c\u8bc1\u7684\u5de5\u5177\u4f7f\u7528\u6570\u636e\u5408\u6210\uff0c\u7528\u4e8e\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60**\uff1a\u73b0\u6709\u5408\u6210\u6570\u636e\u591a\u7528\u4e8e\u76d1\u7763\u5fae\u8c03\uff0c\u800cRL\u9700\u8981\u53ef\u6267\u884c\u7684\u73af\u5883\u3002**COVERT**\u7ba1\u9053\u9996\u5148\u751f\u6210\u53ef\u9760\u7684\u57fa\u7840\u5de5\u5177\u4f7f\u7528\u8f68\u8ff9\uff0c\u7136\u540e\u901a\u8fc7**\u4fdd\u7559\u201c\u9884\u8a00\u673a\u201d\u7684\u589e\u5f3a\u65b9\u6cd5**\u5f15\u5165\u5e72\u6270\u5de5\u5177\u3001\u6a21\u7cca\u67e5\u8be2\u7b49\u590d\u6742\u6027\uff0c\u540c\u65f6\u786e\u4fdd\u6700\u7ec8\u7b54\u6848\u6b63\u786e\uff0c\u4ece\u800c\u4e3aRL\u4f18\u5316\u5de5\u5177\u8c03\u7528\u7b56\u7565\u63d0\u4f9b\u81ea\u52a8\u8ba1\u7b97\u5956\u52b1\u7684\u73af\u5883\u3002**(2604.09813 [cs.AI])**\n\n### \u7a81\u7834\u74f6\u9888\uff1a\u667a\u80fd\u4f53\u7684\u4e0a\u4e0b\u6587\u4e0e\u8bb0\u5fc6\u7ba1\u7406\n\n\u968f\u7740\u4efb\u52a1\u53d8\u957f\uff0c\u4e0a\u4e0b\u6587\u7ba1\u7406\u6210\u4e3a\u5236\u7ea6\u667a\u80fd\u4f53\u6027\u80fd\u7684\u5173\u952e\u3002\u4eca\u65e5\u7814\u7a76\u63d0\u51fa\u4e86\u4e3b\u52a8\u7ba1\u7406\u548c\u4f18\u5316\u5185\u90e8\u77e5\u8bc6\u7684\u65b9\u6848\u3002\n\n*   **\u9003\u79bb\u4e0a\u4e0b\u6587\u74f6\u9888\uff1a\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u4e3aLLM\u667a\u80fd\u4f53\u8fdb\u884c\u4e3b\u52a8\u4e0a\u4e0b\u6587\u7ba1\u7406**\uff1a\u4e3a\u4e86\u5e94\u5bf9\u957f\u89c6\u91ce\u4efb\u52a1\u4e2d\u7684\u201c\u4e0a\u4e0b\u6587\u74f6\u9888\u201d\u548c\u201c\u8ff7\u5931\u5728\u4e2d\u95f4\u201d\u73b0\u8c61\uff0c\u672c\u6587\u5f15\u5165\u4e00\u4e2a\u5171\u751f\u6846\u67b6\u3002\u4e00\u4e2a\u8f7b\u91cf\u7ea7\u7684**ContextCurator**\u7b56\u7565\u6a21\u578b\u901a\u8fc7RL\u5b66\u4e60\uff0c\u4e3b\u52a8\u4fee\u526a\u73af\u5883\u566a\u58f0\u3001\u4fdd\u7559\u5173\u952e\u7684**\u63a8\u7406\u951a\u70b9**\uff0c\u4ece\u800c\u663e\u8457\u63d0\u5347\u4efb\u52a1\u6267\u884c\u6a21\u578b\u7684\u6210\u529f\u7387\u5e76\u964d\u4f4etoken\u6d88\u8017\u3002**(2604.11462 [cs.AI])**\n*   **Agent Mentor\uff1a\u901a\u8fc7\u8bed\u4e49\u8f68\u8ff9\u5206\u6790\u6784\u5efa\u667a\u80fd\u4f53\u77e5\u8bc6\u6846\u67b6**\uff1a\u667a\u80fd\u4f53\u8868\u73b0\u53d7\u5176\u5185\u90e8\u7cfb\u7edf\u63d0\u793a\u8bcd\u5f71\u54cd\u5f88\u5927\u3002**Agent Mentor**\u662f\u4e00\u4e2a\u5f00\u6e90\u5206\u6790\u7ba1\u9053\uff0c\u5b83\u76d1\u63a7\u667a\u80fd\u4f53\u7684\u6267\u884c\u65e5\u5fd7\uff0c\u8bc6\u522b\u4e0e\u4e0d\u826f\u884c\u4e3a\u76f8\u5173\u7684\u8bed\u4e49\u7279\u5f81\uff0c\u5e76\u7cfb\u7edf\u6027\u5730\u5c06\u7ea0\u6b63\u6027\u6307\u4ee4\u6ce8\u5165\u5230\u667a\u80fd\u4f53\u7684\u77e5\u8bc6\u4e2d\uff0c\u4ee5\u81ea\u52a8\u5316\u65b9\u5f0f\u63d0\u5347\u5176\u6027\u80fd\uff0c\u7279\u522b\u662f\u5728\u89c4\u8303\u6a21\u7cca\u7684\u573a\u666f\u4e0b\u3002**(2604.10513 [cs.AI])**\n\n### \u4ece\u7814\u7a76\u5230\u90e8\u7f72\uff1a\u6784\u5efa\u5b9e\u7528\u3001\u81ea\u8fdb\u5316\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\n\n\u4eca\u5929\u7684\u8bba\u6587\u4e0d\u4ec5\u5173\u6ce8\u7b97\u6cd5\u521b\u65b0\uff0c\u4e5f\u6df1\u5165\u63a2\u8ba8\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u5728\u5b9e\u9645\u5e94\u7528\u4e2d\u66f4\u53ef\u9760\u3001\u66f4\u81ea\u4e3b\u5730\u8fdb\u5316\u3002\n\n*   **\u667a\u80fd\u4f53\u89c4\u5219\u662f\u5851\u9020\u8fd8\u662f\u626d\u66f2\uff1f\u5728\u7f16\u7a0b\u667a\u80fd\u4f53\u4e2d\uff0c\u62a4\u680f\u4f18\u4e8e\u6307\u5bfc**\uff1a\u901a\u8fc7\u5bf9GitHub\u4e0a\u6570\u5343\u6761AI\u7f16\u7a0b\u52a9\u624b\u89c4\u5219\u7684\u5927\u89c4\u6a21\u5b9e\u8bc1\u8bc4\u4f30\uff0c\u7814\u7a76\u53d1\u73b0\uff1a\u89c4\u5219\u6574\u4f53\u4e0a\u6709\u76ca\uff0c\u4f46**\u8d1f\u9762\u7ea6\u675f**\uff08\u201c\u4e0d\u8981\u505a\u4ec0\u4e48\u201d\uff09\u662f\u552f\u4e00\u5355\u72ec\u6709\u76ca\u7684\u89c4\u5219\u7c7b\u578b\uff0c\u800c**\u6b63\u9762\u6307\u4ee4**\uff08\u201c\u5e94\u8be5\u505a\u4ec0\u4e48\u201d\uff09\u53cd\u800c\u6709\u5bb3\u3002\u8fd9\u63ed\u793a\u4e86\u5f53\u524d\u914d\u7f6e\u667a\u80fd\u4f53\u7684\u4e00\u4e2a\u9690\u85cf\u53ef\u9760\u6027\u98ce\u9669\uff0c\u5e76\u7ed9\u51fa\u4e86\u5b89\u5168\u914d\u7f6e\u539f\u5219\uff1a**\u7ea6\u675f\u884c\u4e3a\u800c\u975e\u89c4\u5b9a\u884c\u4e3a**\u3002**(2604.11088 [cs.CL])**\n*   **EE-MCP\uff1a\u901a\u8fc7\u81ea\u52a8\u5316\u73af\u5883\u751f\u6210\u4e0e\u7ecf\u9a8c\u5b66\u4e60\u5b9e\u73b0\u81ea\u6211\u8fdb\u5316\u7684MCP-GUI\u667a\u80fd\u4f53**\uff1a\u7814\u7a76\u5c06\u7ed3\u5408GUI\u4ea4\u4e92\u548cMCP\u534f\u8bae\u8c03\u7528\u7684\u8ba1\u7b97\u673a\u4f7f\u7528\u667a\u80fd\u4f53\uff0c\u7edf\u4e00\u4e3a\u6df7\u5408\u7b56\u7565\u5b66\u4e60\u95ee\u9898\u3002\u63d0\u51fa\u4e86\u4e00\u4e2a**\u81ea\u6211\u8fdb\u5316\u6846\u67b6**\uff0c\u5305\u542b\u81ea\u52a8\u73af\u5883\u751f\u6210\u3001\u8f68\u8ff9\u6536\u96c6\u3001\u7ecf\u9a8c\u5e93\u7b49\u5168\u81ea\u52a8\u7ba1\u9053\u3002\u5173\u952e\u521b\u65b0\u662f**\u7ecf\u9a8c\u5e93**\uff0c\u5b83\u80fd\u79ef\u7d2f\u4ece\u8f68\u8ff9\u6bd4\u8f83\u4e2d\u5b66\u5230\u7684\u89c4\u5219\uff0c\u5b9e\u73b0\u65e0\u9700\u5fae\u8c03\u7684\u63a8\u7406\u65f6\u6539\u8fdb\u3002**(2604.09815 [cs.AI])**\n*   **\u65e0\u9700\u88ab\u95ee\u5373\u63d0\u4f9b\u5e2e\u52a9\uff1a\u4e00\u4e2a\u7528\u4e8e\u503c\u73ed\u652f\u6301\u3001\u5177\u5907\u6301\u7eed\u81ea\u6539\u8fdb\u80fd\u529b\u7684\u5df2\u90e8\u7f72\u4e3b\u52a8\u667a\u80fd\u4f53\u7cfb\u7edf**\uff1a\u672c\u6587\u4ecb\u7ecd\u4e86**Vigil**\uff0c\u4e00\u4e2a\u5728\u5b57\u8282\u8df3\u52a8\u706b\u5c71\u5f15\u64ce\u4e91\u5e73\u53f0\u90e8\u7f72\u8d85\u5341\u4e2a\u6708\u7684\u4e3b\u52a8\u667a\u80fd\u4f53\u7cfb\u7edf\u3002\u4e0e\u4ec5\u5728\u524d\u671f\u4ecb\u5165\u7684\u201c\u53cd\u5e94\u5f0f\u201d\u52a9\u624b\u4e0d\u540c\uff0cVigil\u5728\u95ee\u9898\u5347\u7ea7\u81f3\u4eba\u5de5\u5ba2\u670d\u540e\u4ecd\u6301\u7eed\u53c2\u4e0e\u5bf9\u8bdd\uff0c**\u4e3b\u52a8\u63d0\u4f9b\u534f\u52a9**\uff0c\u5e76\u80fd\u4ece\u4eba\u5de5\u89e3\u51b3\u7684\u6848\u4f8b\u4e2d\u63d0\u53d6\u77e5\u8bc6\u8fdb\u884c**\u6301\u7eed\u81ea\u6211\u6539\u8fdb**\uff0c\u5c55\u73b0\u4e86\u5b8c\u6574\u7684\u8fd0\u7ef4\u751f\u547d\u5468\u671f\u652f\u6301\u80fd\u529b\u3002**(2604.09579 [cs.AI])**\n\n### \u4eca\u65e5\u770b\u70b9\n\n*   **\u591a\u667a\u80fd\u4f53\u793e\u4f1a\u6027\u6210\u4e3a\u7126\u70b9**\uff1a\u4eca\u65e5\u7814\u7a76\u5448\u73b0\u4e00\u80a1\u5c0f\u6d6a\u6f6e\uff0c\u901a\u8fc7\u6784\u5efa\u201c\u9009\u4e3e\u793e\u4f1a\u201d\u3001\u201c\u7ebd\u7ea6\u5e02\u201d\u7b49\u590d\u6742\u6a21\u62df\u73af\u5883\uff0c\u6df1\u5165\u63a2\u7a76\u667a\u80fd\u4f53\u7fa4\u4f53\u4e2d**\u9886\u5bfc\u673a\u5236\u3001\u4fe1\u4efb\u5efa\u7acb\u3001\u7b56\u7565\u6027\u6b3a\u9a97**\u7b49\u9ad8\u7ea7\u793e\u4f1a\u884c\u4e3a\u7684\u6d8c\u73b0\u4e0e\u6f14\u5316\u3002\u8fd9\u6807\u5fd7\u7740\u7814\u7a76\u4ece\u4e2a\u4f53\u667a\u80fd\u5411\u7fa4\u4f53\u667a\u80fd\u4e0e\u6cbb\u7406\u7684\u6df1\u523b\u8f6c\u5411\u3002\n*   **\u8bad\u7ec3\u8303\u5f0f\u51fa\u73b0\u65b0\u601d\u8def\uff1a\u201c\u5185\u90e8\u8fdb\u5316\u201d\u4e0e\u201c\u5916\u90e8\u9a8c\u8bc1\u201d**\u3002**Skill-SD**\u5c06\u81ea\u8eab\u6210\u529f\u7ecf\u9a8c\u63d0\u70bc\u4e3a\u201c\u6280\u80fd\u201d\u8fdb\u884c\u5185\u90e8\u84b8\u998f\uff0c\u800c**\u53ef\u9a8c\u8bc1\u5956\u52b1\u7684RL**\u548c**COVERT**\u5219\u5f3a\u8c03\u901a\u8fc7\u5916\u90e8\u53ef\u4e25\u683c\u9a8c\u8bc1\u7684\u4fe1\u53f7\uff08\u7ecf\u6d4e\u76c8\u4f59\u3001\u9884\u8bbe\u7b54\u6848\uff09\u6765\u9a71\u52a8\u7b56\u7565\u5b66\u4e60\u3002\u4e24\u8005\u90fd\u8bd5\u56fe\u8d85\u8d8a\u7b80\u5355\u7684\u884c\u4e3a\u6a21\u4eff\uff0c\u5f15\u5bfc\u667a\u80fd\u4f53\u53d1\u5c55\u51fa\u66f4\u590d\u6742\u3001\u9c81\u68d2\u7684\u7b56\u7565\u3002\n*   **\u667a\u80fd\u4f53\u914d\u7f6e\u7684\u201c\u7b2c\u4e00\u6027\u539f\u7406\u201d\u53cd\u601d**\uff1a\u300a\u667a\u80fd\u4f53\u89c4\u5219\u662f\u5851\u9020\u8fd8\u662f\u626d\u66f2\uff1f\u300b\u4e00\u6587\u901a\u8fc7\u4e25\u8c28\u5b9e\u9a8c\uff0c\u5f97\u51fa\u4e86\u53cd\u76f4\u89c9\u4f46\u5f3a\u6709\u529b\u7684\u7ed3\u8bba\uff1a**\u6b63\u9762\u6307\u5bfc\u6709\u5bb3\uff0c\u8d1f\u9762\u7ea6\u675f\u6709\u76ca**\u3002\u8fd9\u76f4\u63a5\u6311\u6218\u4e86\u5f53\u524d\u901a\u8fc7\u7f16\u5199\u8be6\u7ec6\u6307\u5357\u6765\u914d\u7f6e\u667a\u80fd\u4f53\u7684\u666e\u904d\u5b9e\u8df5\uff0c\u4e3a\u8bbe\u8ba1\u53ef\u9760\u3001\u5b89\u5168\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u63d0\u4f9b\u4e86\u81f3\u5173\u91cd\u8981\u7684\u5b9e\u8bc1\u539f\u5219\u3002\n*   **\u4ece\u6a21\u62df\u5230\u771f\u5b9e\u90e8\u7f72\u7684\u8de8\u8d8a**\uff1a\u7814\u7a76\u4e0d\u518d\u5c40\u9650\u4e8e\u57fa\u51c6\u6d4b\u8bd5\u3002**Vigil**\u7cfb\u7edf\u5c55\u793a\u4e86\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u3001\u9ad8\u8d1f\u8f7d\u4e91\u670d\u52a1\u5e73\u53f0\u4e2d**\u5168\u751f\u547d\u5468\u671f\u4e3b\u52a8\u534f\u4f5c**\u4e0e**\u6301\u7eed\u81ea\u5b66\u4e60**\u7684\u53ef\u884c\u6027\uff0c\u800c**EE-MCP**\u6846\u67b6\u     "2026-04-10": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-10)\n\n### \u5f15\u8a00\n\n\u4eca\u65e5\u7684AI\u7814\u7a76\u5448\u73b0\u51fa\u660e\u663e\u7684\"\u667a\u80fd\u4f53\u8fdb\u5316\"\u7279\u5f81\u3002\u4e09\u7bc7\u8bba\u6587\u4e0d\u7ea6\u800c\u540c\u5730\u5c06\u76ee\u5149\u6295\u5411LLM\u667a\u80fd\u4f53\u7684\u6301\u7eed\u5b66\u4e60\u4e0e\u81ea\u6211\u4f18\u5316\u80fd\u529b\uff1a\u4ece\u5de5\u5177\u96c6\u6210\u63a8\u7406\u7684\u8bad\u7ec3\u8303\u5f0f\u9769\u65b0\uff0c\u5230\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u7684\u7cfb\u7edf\u5316\u8bc4\u4f30\u6846\u67b6\uff0c\u518d\u5230\u9886\u57df\u7279\u5b9a\u6280\u80fd\u7684\u81ea\u52a8\u5316\u521b\u5efa\u4e0e\u8fed\u4ee3\u4f18\u5316\u3002\u8fd9\u4e00\u7cfb\u5217\u5de5\u4f5c\u6807\u5fd7\u7740AI\u7814\u7a76\u6b63\u5728\u4ece\u201c\u5982\u4f55\u5b8c\u6210\u5355\u4e00\u4efb\u52a1\u201d\u5411\u201c\u5982\u4f55\u5b9e\u73b0\u6301\u7eed\u8fdb\u5316\u201d\u8fd9\u4e00\u66f4\u6df1\u5c42\u6b21\u7684\u95ee\u9898\u8fc8\u8fdb\u3002\n\n---\n\n### \u4e3b\u9898\u4e00\uff1a\u5de5\u5177\u96c6\u6210\u63a8\u7406\u7684\u8bad\u7ec3\u9769\u65b0\n\n**E3-TIR: Enhanced Experience Exploitation for Tool-Integrated Reasoning**\n\n\u73b0\u6709\u5de5\u5177\u96c6\u6210\u63a8\u7406\uff08TIR\uff09\u7684\u8bad\u7ec3\u8303\u5f0f\u9762\u4e34\u4e24\u96be\uff1aZero-RL\u56e0\u7f3a\u4e4f\u5148\u9a8c\u6307\u5bfc\u800c\u9677\u5165\u4f4e\u6548\u63a2\u7d22\u548c\u6a21\u5f0f\u9000\u5316\uff1bSFT-then-RL\u5219\u53d7\u5236\u4e8e\u9ad8\u6602\u7684\u6570\u636e\u6210\u672c\u548c\u4f4e\u71b5\u584c\u9677\u5e26\u6765\u7684\u80fd\u529b\u74f6\u9888\u3002\u672c\u6587\u63d0\u51fa\u7684**E3-TIR**\uff08\u589e\u5f3a\u7ecf\u9a8c\u5229\u7528\uff09\u901a\u8fc7\u52a8\u6001\u6574\u5408\u4e09\u7c7b\u7ecf\u9a8c\u2014\u2014\u4e13\u5bb6\u524d\u7f00\u3001\u4e13\u5bb6\u5f15\u5bfc\u4e0e\u81ea\u6211\u63a2\u7d22\u2014\u2014\u5728\u4e13\u5bb6\u201c\u951a\u70b9\u201d\u5468\u56f4\u6267\u884c\u591a\u6837\u5316\u5206\u652f\u63a2\u7d22\uff0c\u5e76\u91c7\u7528\u6df7\u5408\u7b56\u7565\u4f1             if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {

            }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息

            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

            const arxivId = button.getAttribute('data-arxiv-id');

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';

            setTimeout(() => {

                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);

        // 切换星标状态

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building

                    <!-- 论文元信息（始终可见） -->

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">

                    <!-- 懒加载的详情容器 -->

            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {

            const { paper, date } = paperDataMap[arxivId];

            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
