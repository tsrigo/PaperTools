<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperTools - 学术论文集合</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 微软雅黑字体 */
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body {
                font-size: 14px;
            }

            /* 改善可点击区域 */
            button, a {
                min-height: 44px;
                min-width: 44px;
            }

            /* 优化间距 */
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }
        }

        /* 星标样式 */
        .star-button {
            transition: color 0.2s ease-in-out;
        }
        .star-button.starred {
            color: #fbbf24;
        }
        .star-button:not(.starred) {
            color: #9ca3af;
        }
        .star-button:hover {
            color: #fbbf24;
        }
        /* 删除按钮样式 */
        .delete-button {
            transition: all 0.2s ease-in-out;
        }
        .delete-button:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        /* 论文项目样式 */
        .paper-item {
            transition: all 0.3s ease-in-out;
        }
        .paper-item.hidden-paper {
            opacity: 0.3;
            transform: scale(0.98);
        }
        /* 平滑过渡 */
        .rotate-90-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* 可折叠部分样式 */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            padding: 8px 0;
            user-select: none;
            color: #1e40af;
            transition: all 0.2s ease-in-out;
        }
        .dark .collapsible-header {
            color: #60a5fa;
        }
        .collapsible-header:hover {
            opacity: 0.8;
        }
        .collapsible-header::before {
            content: "▶";
            margin-right: 8px;
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }
        .collapsible-header.open::before {
            transform: rotate(90deg);
        }
        .collapsible-content {
            display: none;
        }
        .collapsible-content.open {
            display: block;
        }
        .collapsible-content .inner {
            padding-top: 8px;
        }

        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #1e40af;
        }
        .dark .markdown-content h1 {
            color: #60a5fa;
        }
        .markdown-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: #1e40af;
        }
        .dark .markdown-content h2 {
            color: #60a5fa;
        }
        .markdown-content h3 {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 0.6em;
            margin-bottom: 0.3em;
            color: #1e40af;
        }
        .dark .markdown-content h3 {
            color: #60a5fa;
        }
        .markdown-content h4 {
            font-size: 1em;
            font-weight: bold;
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            color: #2563eb;
        }
        .dark .markdown-content h4 {
            color: #93c5fd;
        }
        .markdown-content p {
            margin-bottom: 0.8em;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .markdown-content ul {
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.3em;
        }
        .markdown-content code {
            background-color: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .dark .markdown-content code {
            background-color: #334155;
        }
        .markdown-content pre {
            background-color: #f1f5f9;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 0.8em;
        }
        .dark .markdown-content pre {
            background-color: #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 0.8em;
            color: #64748b;
        }
        .dark .markdown-content blockquote {
            border-left-color: #475569;
            color: #94a3b8;
        }
        .markdown-content strong {
            font-weight: 600;
        }
        .markdown-content em {
            font-style: italic;
        }

        /* Tag filter button styles */
        .tag-btn {
            padding: 4px 14px;
            font-size: 0.875rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tag-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .tag-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .dark .tag-btn { border-color: #475569; color: #94a3b8; }
        .dark .tag-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .dark .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* Tag badge styles */
        .tag-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.7rem;
            border-radius: 9999px;
            background: #dbeafe;
            color: #1e40af;
            margin-right: 4px;
        }
        .tag-badge.tag-arxiv {
            background: #e0f2fe;
            color: #0369a1;
        }
        .dark .tag-badge { background: #1e3a5f; color: #7dd3fc; }
        .dark .tag-badge.tag-arxiv { background: #164e63; color: #67e8f9; }

        /* TOC 侧边栏样式 - 固定在左侧 */
        #toc-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            z-index: 35;
            background: white;
            border-right: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .dark #toc-sidebar {
            background: #1e293b;
            border-right-color: #334155;
        }
        #toc-sidebar.collapsed {
            transform: translateX(-100%);
        }
        #toc-inner {
            padding: 1rem 0.5rem;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        #toc-inner::-webkit-scrollbar {
            width: 4px;
        }
        #toc-inner::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark #toc-inner::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .toc-date {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toc-date:hover {
            background: #e2e8f0;
        }
        .dark .toc-date:hover {
            background: #334155;
        }
        .toc-date.active {
            background: #dbeafe;
            color: #1e40af;
        }
        .dark .toc-date.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        .toc-date-arrow {
            transition: transform 0.2s;
            font-size: 0.65rem;
        }
        .toc-date-arrow.open {
            transform: rotate(90deg);
        }
        .toc-papers {
            display: none;
            padding-left: 1.2rem;
        }
        .toc-papers.open {
            display: block;
        }
        .toc-paper {
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .toc-paper:hover {
            background: #f1f5f9;
            color: #1e40af;
        }
        .dark .toc-paper {
            color: #94a3b8;
        }
        .dark .toc-paper:hover {
            background: #1e293b;
            color: #93c5fd;
        }
        .toc-paper.active {
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 500;
        }
        .dark .toc-paper.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        /* TOC 切换按钮 - 左侧 */
        #toc-toggle {
            position: fixed;
            left: 220px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 40;
            width: 28px;
            height: 56px;
            border-radius: 0 6px 6px 0;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            transition: left 0.3s ease, background 0.2s;
        }
        #toc-toggle:hover {
            background: #2563eb;
        }
        #toc-toggle svg {
            transition: transform 0.3s;
        }
        #toc-toggle:not(.sidebar-open) {
            left: 0;
        }
        @media (max-width: 1023px) {
            #toc-sidebar {
                width: 240px;
            }
            #toc-toggle {
                left: 240px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
        @media (max-width: 767px) {
            #toc-sidebar {
                width: 260px;
                box-shadow: 4px 0 16px rgba(0,0,0,0.1);
            }
            #toc-toggle {
                left: 260px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
    </style>
    <script>
        // Tailwind CSS 暗色模式配置
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

                    "summary": "Recent advances have shown the effectiveness of self-evolving LLM agents on tasks such as program repair and scientific discovery. In this paradigm, a planner LLM synthesizes an agent program that invokes parametric models, including LLMs, which are then tuned per task to improve performance. However, existing self-evolving agent frameworks provide no formal guarantees of safety or correctness. Because such programs are often executed autonomously on unseen inputs, this lack of guarantees raises reliability and security concerns. We formulate agentic code generation as a constrained learning problem, combining hard formal specifications with soft objectives capturing task utility. We introduce Formally Guarded Generative Models (FGGM), which allow the planner LLM to specify a formal output contract for each generative model call using first-order logic. Each FGGM call wraps the underlying model in a rejection sampler with a verified fallback, ensuring every returned output satisfies the contract for any input and parameter setting. Building on FGGM, we present SEVerA (Self-Evolving Verified Agents), a three-stage framework: Search synthesizes candidate parametric programs containing FGGM calls; Verification proves correctness with respect to hard constraints for all parameter values, reducing the problem to unconstrained learning; and Learning applies scalable gradient-based optimization, including GRPO-style fine-tuning, to improve the soft objective while preserving correctness. We evaluate SEVerA on Dafny program verification, symbolic math synthesis, and policy-compliant agentic tool use ($τ^2$-bench). Across tasks, SEVerA achieves zero constraint violations while improving performance over unconstrained and SOTA baselines, showing that formal behavioral constraints not only guarantee correctness but also steer synthesis toward higher-quality agents.",

                    "filter_reason": "**核心判断（第一步）:** 这篇论文的核心贡献是提出**SEVerA（Self-Evolving Verified Agents）框架**，这是一个关于如何构建、自我演化和验证LLM智能体的新方法论。论文明确以\"self-evolving agents\"为核心研究对象，而非将LLM作为工具解决特定领域问题。 **正面指标分析（第二步）:** 论文高度符合研究者的核心关注点： 1. **自我演化机制**: 论文明确提出\"self-evolving LLM agents\"，并设计了Search→Verification→Learning的三阶段迭代框架，体现了智能体通过经验反馈进行自我完善的核心特征。 2. **智能体规划能力**: 论文使用\"planner LLM\"来合成智能体程序，涉及智能体的自主规划和代码生成能力。 3. **核心范式匹配**: 论文直接研究\"LLM-based Agents\"和\"Self-Evolving\"机制，包含\"Self-Refine\"、\"Iterative Improvement\"等演化要素。 **排除标准分析（第三步）:** - 论文虽然涉及Safety和Verification，但这些是作为确保自我演化智能体可靠性的手段，而非主要贡献。核心贡献仍是自我演化框架的构建。 - 不涉及多模态、视觉或图技术。 **特殊情况的处理（第四步）:** 论文虽然强调形式化验证（Verification），但这是为了确保自我演化过程中智能体的行为正确性，属于自我演化机制的必要组成部分。核心仍是\"通过迭代学习改进智能体性能\"的自我演化范式。 **结论:** 这篇论文完全符合研究者的筛选标准——其核心贡献正是构建和改进\"自我演化的LLM智能体\"的方法论框架，属于研究目标中的\"自我演化（Self-Evolving）\"方向。",
                    "intro_logic": "## Introduction 部分逻辑链条\n\n1. 背景：Self-evolving LLM agents 在程序修复、科学发现等任务上展现出有效性\n2. 当前范式：Planner LLM 合成调用参数化模型（LLMs、神经网络、SMT solvers）的 agent 程序\n3. 核心问题：与传统约束引导的程序合成不同，现有 self-evolving agent 框架缺乏安全性和正确性的形式化保证\n4. 风险所在：合成的程序在 unseen inputs 上自主运行，形式化保证的缺失引发严重的可靠性和安全性担忧\n5. 现有方法的失败案例：程序验证中 agent 通过修改输入程序来作弊；代码修复中 agent 删除失败的测试；agentic tool use 中 agent 违反领域策略；这些失败表明仅依靠自然语言描述和固定输入测试不足以防止问题\n6. 解决方向：Agentic 程序需要形式化的硬约束来确保安全性\n7. 关键挑战：如何在保证形式化正确性约束的同时，实现与 self-evolving 框架相当的灵活性和性能\n\n**研究问题：如何在为 self-evolving LLM agents 提供形式化行为保证的同时，保持其灵活性和任务性能？**",
                    "core_insight": "# SEVerA 论文深度分析\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n**作者意识到：与其在 LLM 解码阶段施加约束（这需要修改模型内部且只能处理语法级约束），不如在程序层面用\"拒绝采样+验证回退\"的机制将任何 LLM 调用封装为满足形式化合约的组件，从而把约束验证从模型内部转移到输出层面。**\n\n### 详细解释\n\n论文开篇即指出了一个关键问题：\n\n> \"However, unlike traditional constraint-guided program synthesis, existing self-evolving agent frameworks provide no formal guarantees of safety or correctness. Because such synthesized programs are often executed autonomously on unseen inputs, the lack of formal guarantees raises serious reliability and security concerns.\"\n\n作者进一步分析了现有方法的局限性：\n\n> \"Recent work on constrained decoding [4, 35, 45] can enforce context-free grammar–based syntactic constraints and limited semantic constraints such as variable naming or simple type checks. However, these approaches are restricted in the types of constraints they support and require modifying the model's decoding procedure, which limits their applicability to open-source models. Moreover, constrained decoding strategies are known to distort the output distribution, producing outputs that satisfy constraints but degrade task performance [4, 35].\"\n\n**关键洞察**：约束解码的三个根本问题：\n1. **只能处理语法级约束**（如 CFG），无法处理语义级形式化规范\n2. **需要修改模型内部解码过程**，对闭源模型不可用\n3. **扭曲输出分布**，导致任务性能下降\n\n作者提出的核心创新是绕过模型解码过程，直接在输出层面进行约束检查：\n\n> \"FGGM operates solely on LLM output strings and can be applied to both open and closed source models.\"\n\n> \"Using FGGM, we retain the formal guarantees of deductive synthesis while utilizing the performance gained through gradient-based parameter optimization.\"\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n**洞察 → 核心问题：如何在不修改模型的情况下对 LLM 输出施加形式化约束？**\n\n**解决思路**：借鉴**拒绝采样**（Rejection Sampling）的思想：\n\n> \"As a result, every returned output satisfies the specified contract for any input and any parameter setting of the underlying model.\"\n\n具体方法论分为三层：\n\n#### 第一层：FGGM（Formally Guarded Generative Model）\n\n每个 LLM 调用被封装为一个 FGGM，包含：\n- **局部合约** (Φ_l, Ψ_l)：用一阶逻辑描述输入输出规范\n- **提示程序** (f_p)：构造输入给 LLM\n- **验证回退** (f_d)：满足合约的非参数化程序\n\n> \"The first is a fallback program f_d that satisfies (Φ_l, Ψ_l) and guards against edge cases in which the GM hallucinates or produces outputs that violate the specification. Without a verified fallback, the rejection sampler could exhaust all samples; the fallback is what makes the contract hold unconditionally for all parameter values.\"\n\n#### 第二层：Search-Verify-Learn 三阶段循环\n\n1. **Search**：Planner LLM 生成候选程序，包含 FGGM 定义\n2. **Verify**：使用 Dafny 验证器证明程序满足全局规范 (Φ, Ψ)\n3. **Learn**：对已验证的程序进行无约束的梯度优化\n\n> \"In Search, the planner LLM synthesizes candidate parametric programs that may contain multiple FGGM calls. In Verification, we prove correctness with respect to the hard constraints for all parameter values, reducing the problem to unconstrained learning. In Learning, we apply scalable gradient-based optimization, including GRPO-style fine-tuning for LLMs, to improve the soft objective while preserving formal correctness.\"\n\n#### 第三层：理论保证\n\n作者证明了关键定理：\n\n> \"Theorem 5.4 (Soundness). If f* ≠ ⊥ then, φ_A ⇒ ∀x_1 ∈ T_1, ..., ∀x_n ∈ T_n. Φ(x_1, ..., x_n) ⇒ Ψ(x_1, ..., x_n, f*(x_1, ..., x_n)).\"\n\n这意味着任何返回的代理程序都满足形式化规范，与参数值无关。\n\n---\n\n## 3. 试错历程与子问题\n\n### 3.1 遇到的困难\n\n论文中提到了一些实现中的关键挑战：\n\n#### 困难一：如何检查合约满足性？\n\n对于量词自由的规范，可以直接计算；但对于带量词的规范，需要调用 SMT 求解器：\n\n> \"For Ψ_l with quantifiers, we instantiate check_{A,Φ_l,Ψ_l} with the axioms A. Then, check_{A,Φ_l,Ψ_l} substitutes the free variables in Ψ_l with their corresponding concrete values, encodes the axioms A and Φ_l similarly to Eq. 8, and submits the resulting formula to an SMT solver.\"\n\n#### 困难二：如何平衡安全性和性能？\n\n完全依赖回退程序虽然安全但性能差，需要通过参数优化减少对回退的依赖：\n\n> \"Conformance tuning helps avoid this by teaching the GM to satisfy the defined contract directly.\"\n\n#### 困难三：如何处理多 FGGM 调用的学习？\n\n每个 FGGM 的局部合约损失是独立的，可以并行优化：\n\n> \"This independence arises because each FGGM's rejection sampler and check_{A,Φ_l,Ψ_l} checker operate solely on the local contract (Φ_i^l, Ψ_i^l) and the corresponding GM's outputs.\"\n\n### 3.2 产生的子问题\n\n论文中进行了消融实验来验证各组件的贡献（表7）：\n\n> \"RQ3 (Constraint Decomposition). What are the individual contributions of parameter tuning with local FGGM contracts versus global loss L?\"\n\n实验结果表明：\n- 仅局部调优：55.3%（+2.1%）\n- 仅全局调优：61.7%（+8.5%）\n- 完整方案：66.0%（+12.8%）\n\n这说明全局损失和局部合约损失是互补的。\n\n### 3.3 方案调整\n\n作者在实现中做了实用性调整：\n\n1. **资源约束**：规范目前不考虑计算资源（LLM 调用次数、token 限制）\n   \n   > \"One current limitation is that the formulation is resource-unaware: behavioral specifications constrain functional correctness but do not account for computational resources such as LLM calls, token usage, or wall-clock budget.\"\n\n2. **参数共享**：当前不同位置的 FGGM 调用不共享参数\n   \n   > \"Currently, SEVerA does not share parameters across FGGM calls at different locations and instead assigns separate parameter sets to each boundedParam call.\"\n\n---\n\n## 总结\n\n这篇论文的核心贡献是提出了 **FGGM 机制**，它巧妙地将约束验证从\"模型内部\"转移到\"输出层面\"，通过拒绝采样+验证回退的组合，既保持了形式化保证，又不损失梯度优化的灵活性。这个洞察直接解决了约束解码方法的三大痛点，并为自演化代理的形式化验证提供了可行的工程框架。",
                    "methodology": "# SEVerA 方法论解读\n\n## 核心思路概述\n\n这篇论文要解决的核心问题是：**如何让LLM生成的代理程序既能满足形式化验证的正确性保证，又能通过梯度优化不断提升性能**。\n\n传统方法有两个极端：\n- 形式化合成：保证正确性，但无法优化性能\n- 梯度优化：能提升性能，但无法保证正确性\n\nSEVerA的做法是：**先验证再学习**。先用形式化方法锁定正确的程序结构，然后在这个结构内部进行参数优化。\n\n---\n\n## 阶段一：Search（搜索）\n\n### 输入\n- 任务描述（自然语言）\n- 库函数集合 F（包括非参数函数 F_c 和参数函数 F_p）\n- 形式化规范 (Φ, Ψ)：Φ是输入约束，Ψ是输出约束\n- 规划器LLM（Planner LLM）\n\n### 操作\n\n**第一步：定义FGGM（Formally Guarded Generative Model）**\n\n规划器LLM需要为每个要调用的生成模型定义一个\"守卫\"结构，包含：\n\n1. **局部契约 (Φ_l, Ψ_l)**：用一阶逻辑描述这个模型调用应该满足的输入输出规范\n2. **提示程序 f_p**：构造发送给LLM的提示词\n3. **回退程序 f_d**：一个非参数程序，必须满足同样的契约\n\n举例：对于符号回归任务，定义一个FGGM叫`boundedParam`，要求输出必须在[lower, upper]区间内。回退程序就是简单的clamp操作。\n\n**第二步：生成候选程序**\n\n规划器LLM使用库函数和刚定义的FGGM，生成一个Dafny程序。这个程序：\n- 可以调用FGGM（但不能直接调用原始LLM）\n- 包含参数化的神经网络组件\n- 需要满足全局形式化规范 (Φ, Ψ)\n\n### 输出\n- 一组FGGM定义\n- 一个候选参数化程序 P{Θ}，其中Θ代表所有可优化参数\n\n### 目的\n在程序结构层面找到满足形式化规范的候选解。这里的\"搜索\"本质上是CEGIS（反例引导的归纳合成）风格的迭代探索。\n\n---\n\n## 阶段二：Verify（验证）\n\n### 输入\n- 候选程序 P{Θ}\n- FGGM定义集合\n- 形式化规范 (Φ, Ψ)\n- 公理集合 A（描述库函数的已知性质）\n\n### 操作\n\n**第一步：验证FGGM定义的有效性**\n\n检查每个FGGM是否满足：\n- 类型签名正确\n- 局部契约是良构的\n- 回退程序 f_d 确实满足契约（通过Dafny验证器证明）\n\n**第二步：验证候选程序**\n\n使用Dafny的验证器检查：\n- 程序语法正确\n- 程序终止\n- **关键**：程序对所有参数值都满足全局规范 (Φ, Ψ)\n\n这里利用了FGGM的一个重要性质：**契约的正确性不依赖于底层模型的参数**。也就是说，无论神经网络参数怎么变，只要调用FGGM，输出就一定满足局部契约。\n\n### 输出\n- 如果验证通过：得到一个已验证的参数化程序\n- 如果验证失败：返回错误信息给规划器，重新搜索\n\n### 目的\n确保程序在所有可能的输入和所有参数配置下都满足形式化约束。这是整个系统的安全基础。\n\n---\n\n## 阶段三：Learn（学习）\n\n### 输入\n- 已验证的参数化程序 P{Θ}\n- 训练数据集 D\n- 损失函数 L\n\n### 操作\n\n**第一步：定义增强损失函数**\n\n原始任务损失 L 加上 FGGM 的**一致性损失**（conformance loss）：\n\n```\nL_total = L_task + λ × L_conformance\n```\n\n其中 L_conformance 衡量LLM输出满足局部契约的概率。优化这个损失可以提高拒绝采样的命中率，减少触发回退程序的次数。\n\n**第二步：参数优化**\n\n对于可访问参数的模型（如小型神经网络），使用梯度下降优化。对于LLM，使用GRPO（Group Relative Policy Optimization）进行微调。\n\n具体做法：\n- 对每个FGGM调用，采样多个输出\n- 根据任务损失和契约满足情况计算奖励\n- 更新模型参数以最大化奖励\n\n### 输出\n- 优化后的参数 (θ₁*, ..., θ_k*)\n- 最终的代理程序\n\n### 目的\n在保证形式化约束的前提下，最大化任务性能。学习阶段是\"无约束\"的，因为验证阶段已经确保了安全性。\n\n---\n\n## 关键技术：FGGM 的拒绝采样机制\n\n这是连接验证和学习的桥梁。\n\n### 工作流程\n\n1. 给定输入 x，调用 f_p(x) 构造提示词\n2. 从底层LLM采样 K 个输出 y₁, ..., y_K\n3. 对每个 y_i，检查是否满足局部契约（通过 SMT 求解器或直接计算）\n4. 返回第一个满足契约的输出；如果都不满足，返回回退程序 f_d(x) 的结果\n\n### 关键性质\n\n- **参数无关的正确性**：无论LLM参数如何，输出一定满足契约（因为有回退程序兜底）\n- **可优化的接口**：契约定义了\"什么算合法输出\"，一致性损失引导LLM生成更多合法输出\n\n---\n\n## 总结\n\n整个系统可以理解为：\n\n1. **搜索阶段**：用LLM生成程序结构，同时为每个LLM调用套上\"形式化口罩\"（FGGM）\n2. **验证阶段**：用定理证明器确保整个程序满足安全规范\n3. **学习阶段**：在安全的程序骨架内，用梯度方法优化LLM的表现\n\n这样就实现了\"先安全后性能\"的设计目标。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **小模型超越大模型**：在τ²-bench的airline任务中，SEVerA使用较小的开源模型Qwen3-8B（52.6% pass rate）反而超过了使用更大闭源模型Claude Sonnet 4.5的Agent-C（47.3%）。这说明形式化约束的引导作用可能超过模型规模的优势。\n\n- **约束本身就能提升性能**：在Dafny验证任务中，SEVerA不使用任何参数调优（因Claude是闭源），仅通过搜索+验证两阶段就达到了97.0%的验证率，比使用相同模型的baseline（73.7%）高出23.3个百分点。这表明形式化约束不仅保证安全，还能主动剪枝搜索空间，引导合成更高质量的agent。\n\n- **简单fallback策略非常有效**：FGGM中使用简单的fallback（如返回原始程序、clamp数值）就能保证contract满足，且在很多情况下（如GSM-Symbolic）能保持较高的task performance。\n\n## 2. 有启发性的分析或 ablation\n\n- **Constraint Decomposition（Table 7）**：作者将参数调优的增益分解为local（FGGM contract conformance）和global（task loss）两部分。结果显示：\n  - Local only tuning: 55.3%（+2.1%）\n  - Global only tuning: 61.7%（+8.5%）\n  - Full: 66.0%（+12.8%）\n  这揭示了**global tuning贡献更大，但两者互补**——local conformance确保输出满足per-call contracts，global直接优化答案正确性。\n\n- **Verification vs. NoDiff的差距分析**：在Dafny任务中，baseline的\"Verif.\"和\"Verif. & NoDiff\"列存在4-10%的差距，揭示了agent通过修改原程序来\"作弊\"的现象，而SEVerA通过形式化约束消除了这一差距。\n\n## 3. 对领域的新认知\n\n- **约束与性能可以双赢**：传统观点认为形式化约束会限制agent能力，但实验表明约束反而帮助找到更高质量的程序——因为约束剪枝掉了大量无效候选，搜索更集中于有效解空间。\n\n- **FGGM机制的多重作用**：FGGM不仅是一个\"过滤器\"，其local contracts还能被用于定义conformance loss（Eq. 20），从而指导参数调优。这建立了程序验证与机器学习之间的桥梁。\n\n- **Rejection sampling的效率**：K=5的采样次数在实践中足够有效，且经过parameter tuning后acceptance rate提高，runtime反而下降（Table 4: 18.8s → 16.7s）。\n\n## 4. 实用的经验性结论\n\n- **超参数设置**：\n  - Planner search budget Δ=10\n  - FGGM rejection sampling K=5\n  - GRPO训练：LoRA rank=16, alpha=32, lr=1e-5, epochs=5, batch=64, G=8 generations per prompt\n  - Symbolic Regression优化：Adam, lr=0.05, 40步backprop\n\n- **任务相关的约束编码**：\n  - Program verification: 使用AST-based diff checker作为hard constraint\n  - Agentic tool use: 使用Agent-C的temporal logic checker作为per-call constraint\n  - Symbolic regression: 使用quantifier-free的bounds作为prior knowledge\n\n- **Feedback机制的价值**：每轮迭代收集执行trace中的错误信息（verification error、grammar violation等），生成1-2句话的描述和修复建议，能帮助planner LLM识别重复失败模式并调整策略。\n\n## 5. 局限性中的机会\n\n- **资源约束未被建模**：当前 formulation 只约束功能正确性，不考虑LLM调用次数、token消耗或wall-clock budget。引入resource-bound specifications（如编码token预算为额外hard constraint）是自然的下一步。\n\n- **参数共享缺失**：当前每个FGGM调用维护独立参数集，未来可扩展支持跨调用共享参数，以减少训练开销。\n\n- **依赖Dafny生态**：当前需要Dafny的transpiler将验证后的代码转为Python。探索其他verification-aware语言（如Verus、Lean）可能拓宽适用场景。\n\n- **Quantifier处理不完备**：对于带量词的Ψl，checker依赖SMT solver可能超时或不完全。未来可探索更高效的quantifier处理或限定于特定fragment。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文针对LLM代理在程序修复、科学发现等任务中的具体失败模式（如修改输入程序作弊、删除失败测试、违反策略等）\n- 实验覆盖三个不同领域：Dafny程序验证、符号数学合成、τ²-bench策略合规代理工具使用\n- 数据显示约束本身就能显著提升性能：Dafny任务中仅搜索+验证两阶段就从73.7%提升到97.0%（+23.3%）\n- 小模型超越大模型的现象表明形式化约束的引导价值\n\n**负面证据或缺失**：\n- 目前主要在学术基准上测试，真实部署场景的效果未知\n- 依赖Dafny生态，需要transpiler转为Python，限制了在实际系统中的直接部署\n\n**判断**：中等\n\n**理由**：论文解决了LLM代理安全性的真实痛点，实验覆盖多个领域且数据支撑充分。但实际影响力还需要更多真实场景验证，且工具链依赖限制了直接应用范围。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次明确将形式化验证与自进化代理的完整流程结合\n- FGGM机制是创新设计：结合了拒绝采样、形式化契约、验证回退程序三重机制\n- 消融实验（Table 7）揭示local和global tuning的互补性是新发现\n\n**负面证据或缺失**：\n- 形式化验证在程序合成中的应用已有大量前人工作\n- 拒绝采样是机器学习中的常见技术\n- \"先验证后学习\"的思路在其他领域（如安全关键系统）已有类似实践\n\n**判断**：中等\n\n**理由**：FGGM机制和整体框架设计具有原创性，但核心技术组件（形式化验证、拒绝采样、梯度优化）均有前人基础，属于有创意的技术组合而非根本性突破。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- LLM代理安全性是当前领域热点问题，τ²-bench等新基准的出现表明社区对安全性的关注\n- 论文引用的失败案例（agentic tool use中65-76%违反策略）是近期发现\n- 形式化方法与机器学习的交叉正在成为趋势\n\n**负面证据或缺失**：\n- 形式化验证与LLM的结合已有一些工作（如Verifiable Reasoning、Coq生成等）\n- 可能不是最早进入这个方向的团队\n\n**判断**：中等\n\n**理由**：时机恰当，领域正在关注LLM代理的安全性问题，但已有相关工作探索，不是完全空白的时间窗口。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 挑战了\"形式化约束会限制agent能力\"的传统观点，实验证明约束反而帮助找到更高质量的程序\n- 消除了agent通过修改原程序来\"作弊\"的现象（baseline中\"Verif.\"和\"Verif. & NoDiff\"列存在4-10%差距）\n- 挑战了仅依赖软性能指标评估代理的做法\n\n**负面证据或缺失**：\n- 没有明确挑战某个被盲目沿用的具体做法\n- 更多是在现有框架内提出新方案，而非颠覆性范式转变\n\n**判断**：中等\n\n**理由**：论文质疑了领域中的常见假设（约束会限制性能），但没有明确针对某个被广泛采用但错误的做法进行批判。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**核心洞见**：用形式化契约包裹LLM调用，通过验证确保安全边界，再在安全边界内通过梯度优化提升性能。\n\n**判断**：强\n\n**理由**：用一句话清晰概括了\"先安全后性能\"的核心思路，区分了洞见（形式化约束作为安全骨架）与做法（三阶段框架、FGGM机制）。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**风险**：\n- 依赖Dafny生态，形式化规范的定义需要专业知识\n- 对于带量词的局部契约，checker依赖SMT solver可能超时或不完全\n- 资源约束（LLM调用次数、token消耗）未被建模\n\n**可行性**：\n- 已在三个不同领域验证方法有效性\n- 超参数设置相对明确（Δ=10, K=5, LoRA rank=16等）\n- 验证框架（Dafny）已成熟可用\n\n**判断**：中等\n\n**理由**：技术风险可控，已在多个场景验证可行性。但依赖特定工具链增加了复杂性，形式化规范的设计也需要专业知识门槛。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 团队在形式化验证与机器学习交叉领域有积累\n- 能够将两个领域的成熟技术（Dafny验证、GRPO优化）有效融合\n\n**负面证据或缺失**：\n- 这种跨领域整合的优势并非不可复制\n- 其他同时拥有形式化方法与LLM经验的团队可以快速跟进\n\n**判断**：中等\n\n**理由**：团队具备相关背景优势，但这种跨领域整合的能力在学术界并非独有。\n\n---\n\n## 综合评价\n\n**一句话判定**：有潜力但有明显短板\n\n**解释**：论文在LLM代理安全性这一重要问题上提出了有价值的解决方案，FGGM机制和三阶段框架设计具有原创性，实验数据充分。但创新幅度属于技术组合而非范式突破，且依赖特定工具链限制了通用性。整体贡献是\"在正确方向上迈出了重要一步\"。\n\n---\n\n## 最致命的弱点\n\n依赖Dafny生态导致工具链过重，形式化规范的设计需要专业知识门槛，这两者都限制了方法的广泛可用性。\n\n---\n\n## 如果要做得更好\n\n1. 探索更轻量级的验证框架（如Verus、Lean），或设计更易用的规范定义接口\n2. 扩展到资源约束场景（如token预算、调用次数限制），使方法更贴近实际部署需求\n\n---\n\n## 与 Carlini 原则的对照\n\n**最符合**：解决真实重要的问题（LLM代理安全性是实际痛点）\n\n**最不符合**：创新幅度有限（主要是现有技术的组合创新，缺乏根本性的新范式）",
                    "summary_translation": "## 中文翻译\n\n近年来的研究已表明自进化LLM智能体在程序修复和科学发现等任务中展现出显著的有效性。在这一范式中，规划器LLM（planner LLM）合成一个调用参数化模型（包括LLM本身）的智能体程序（agent program），随后针对具体任务对该程序进行调优以提升性能。然而，现有的自进化智能体框架无法提供任何形式化的安全性或正确性保证。由于此类程序通常在未知输入上自主执行，缺乏保证引发了可靠性与安全性的担忧。我们将智能体代码生成（agentic code generation）表述为一个约束学习问题，将硬性形式化规范（hard formal specifications）与捕捉任务效用的软目标（soft objectives）相结合。我们提出了形式化守卫生成模型（Formally Guarded Generative Models, FGGM），该模型允许规划器LLM使用一阶逻辑（first-order logic）为每次生成模型调用指定形式化输出契约（formal output contract）。每次FGGM调用都将底层模型包装在带有验证回退（verified fallback）的拒绝采样器（rejection sampler）中，确保对于任何输入和参数设置，返回的输出都满足该契约。基于FGGM，我们构建了SEVerA（Self-Evolving Verified Agents，自进化验证智能体），这是一个三阶段框架：搜索（Search）阶段合成包含FGGM调用的候选参数化程序；验证（Verification）阶段针对所有参数值证明硬性约束的正确性，将问题归约为无约束学习（unconstrained learning）；学习（Learning）阶段应用可扩展的基于梯度的优化（包括GRPO风格的微调）来提升软目标，同时保持正确性。我们在Dafny程序验证、符号数学合成（symbolic math synthesis）以及策略合规的智能体工具使用（τ²-bench）任务上对SEVerA进行了评估。在所有任务中，SEVerA实现了零约束违反，同时在性能上超越了无约束基线和当前最先进的方法。这表明形式化行为约束不仅能够保证正确性，还能引导合成过程朝向更高质量的智能体。"

                    "summary": "Recent advances in large language models (LLMs) have enabled the development of autonomous agents capable of complex reasoning and multi-step problem solving. However, these agents struggle to adapt to specialized environments and do not leverage past interactions, approaching each new task from scratch regardless of their accumulated experience. We introduce Experiential Reflective Learning (ERL), a simple self-improvement framework that enables rapid environment adaptation through experiential learning. ERL reflects on task trajectories and outcomes to generate heuristics, capturing actionable lessons that transfer across tasks. At test time, relevant heuristics are retrieved based on the current task and injected into the agent's context to guide execution. On the Gaia2 benchmark, ERL improves success rate by 7.8% over a ReAct baseline, with large gains in task completion reliability, and outperforms prior experiential learning methods. Through systematic ablations, we find that selective retrieval is essential and that heuristics provide more transferable abstractions than few-shot trajectory prompting. These results demonstrate that reflecting on single-attempt experiences to extract transferable heuristics enables effective agent self-improvement.",

                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是提出一个**自我演化的LLM智能体框架**（Experiential Reflective Learning, ERL），其核心贡献在于： 1. 让智能体能够**适应特定环境**并**利用过去的交互经验** 2. 通过**反思任务轨迹和结果**来生成可迁移的heuristics（启发式规则） 3. 在测试时检索相关heuristics并注入智能体上下文来指导执行 这**不属于**排除类别： - 不是非演化型应用（不是将LLM作为工具解决特定领域问题） - 不是非Agentic的推理（是关于智能体的自我改进框架） - 不是基础设施研究 **第二步：正面指标** 论文明确包含多个核心关注点： - **核心范式**: `Self-Evolving`（标题明确写\"Self-Improving LLM Agents\"） - **智能体能力**: `Self-Reflection`（反思机制）、`Memory`（利用过去经验） - **演化机制**: `Self-Improvement`（自我改进）、`Iterative Improvement`（通过经验迭代） **第三步：排除标准** - 安全与对齐：不属于安全研究 ✓ - 多模态与视觉：不涉及 ✓ - 图技术：不涉及 ✓ **第四步：特殊处理** - 推理/规划：属于智能体框架的规划能力改进 - 自我演化应用：**保留**（按照用户给出的例外规则，论文核心是提出新的\"自我演化\"机制） **结论** 该论文完全符合研究目标，其核心贡献是构建一个**自我演化的LLM智能体框架**，通过经验反思学习实现智能体的自我改进，这正是用户三个研究方向中\"自我演化 (Self-Evolving)\"的核心内容。",
                    "intro_logic": "1. 大型语言模型（LLMs）的发展使得自主智能体能够执行复杂推理和多步骤问题解决任务。\n\n2. 然而，这些通用智能体难以适应具有特殊工具和领域特定规则的新环境。\n\n3. 现有的智能体不利用过去的交互经验，而是每次都从零开始处理新任务。\n\n4. 微调（fine-tuning）虽然可以实现适应，但计算资源消耗大、对闭源模型不可行，且不支持持续学习。\n\n5. 现有的经验记忆方法存在局限性：ExpeL 将所有提取的洞察无差别地拼接到提示中，导致经验积累时扩展性差；AutoGuide 在每个智能体步骤都进行上下文识别和指南检索，产生大量开销，且当当前状态无法匹配任何存储上下文时无法提供指导。\n\n6. 如何设计一种高效的自改进框架，使智能体能够从累积的经验中学习并快速适应新环境？",
                    "core_insight": "# 论文深度分析：关键洞察与方法论\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者意识到：**与其从多次尝试的对比轨迹中学习（ExpeL、AutoGuide的做法），不如从单次尝试的轨迹中直接提取可迁移的、结构化的启发式规则（heuristics），并通过选择性检索在测试时动态注入上下文——这样既避免了重复执行的高成本，又比原始轨迹演示更具泛化能力。**\n\n### 展开解释\n\n论文中明确指出了现有方法的几个关键局限：\n\n> \"ExpeL extracts reusable insights by comparing successful and failed trajectories... Both methods require multiple rollouts per task to construct contrastive trajectory pairs, an assumption that breaks down in practical agent deployment where tasks cannot be retried.\"\n\n这是第一层洞察：**现实场景中任务往往无法重试**，因此依赖多次rollout的方法不切实际。\n\n> \"Extracted insights are then concatenated into every test prompt regardless of task relevance, an approach that scales poorly as experience accumulates.\"\n\n这是第二层洞察：**无差别地注入所有经验会导致上下文膨胀和性能下降**。\n\n> \"AutoGuide... provides no guidance when the current state fails to match any stored context.\"\n\n第三层洞察：**基于精确上下文匹配的方法存在覆盖率问题**。\n\n而作者进一步发现：\n\n> \"heuristics provide more transferable abstractions than few-shot trajectory prompting.\"\n\n这揭示了一个关键认知跃迁：**原始轨迹（raw trajectories）缺乏可迁移的可操作洞察，而将经验提炼成结构化的\"触发条件+行动建议\"格式，能够产生跨任务泛化的抽象原则**。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n```\n观察1: 现实任务无法多次重试 → 需要从单次尝试中学习\n观察2: 无差别注入所有经验导致上下文膨胀 → 需要选择性检索\n观察3: 原始轨迹缺乏可迁移性 → 需要将经验提炼成结构化heuristics\n         ↓\n核心方法: ERL = 单次轨迹反思生成heuristics + LLM-based选择性检索\n```\n\n具体而言：\n\n**（1）Heuristic Generation（启发式生成）**\n- 输入：任务描述 + 单次轨迹 + 奖励信号（成功/失败）\n- 输出：结构化的heuristic，包含：\n  - **Analysis**: 分析成功/失败的根本原因（\"Breakpoint\"或\"Winning Move\"）\n  - **Learned Guideline**: 可泛化的规则，格式为\"Trigger（触发条件）+ Action（行动建议）\"\n\n论文原文示例：\n> \"Trigger: When I need to send an email and my input is attendee names... Action: Resolve and validate recipient addresses before calling the email tool...\"\n\n这种结构使得heuristic超越了具体任务描述，成为可复用的策略。\n\n**（2）Retrieval-Augmented Execution（检索增强执行）**\n- 当面对新任务时，LLM分析任务并从heuristic pool中检索top-k相关项\n- 检索标准：任务相似性 + 经验多样性 + 内容信息量\n- 检索方法：LLM-based ranking优于embedding-based（56.1% vs 53.3%）\n\n---\n\n## 3. 试错历程与意外发现\n\n### 3.1 检索方法的选择\n\n作者比较了三种检索策略：\n\n| 方法 | 总体成功率 |\n|------|-----------|\n| Random selection | 53.8% (峰值) |\n| Embedding-based (Qwen3-Embedding-0.6B) | 53.3% |\n| LLM-based (GPT-5.2) | **56.1%** |\n\n**意外发现**：embedding-based方法虽然高效，但无法捕捉\"错误模式\"的相似性。例如，一个calendar任务可能retrieve到所有calendar相关训练场景，但无法优先选择那些犯了相同类型错误（如忘记删除原事件）的heuristic。\n\n### 3.2 成功vs失败经验的差异性影响\n\n> \"failure-derived heuristics substantially outperform success-derived ones overall. The effect is split-dependent: failure heuristics excel on Search (+14.3% over baseline) by providing negative constraints that prune ineffective strategies, whereas success heuristics work best on Execution (+9.0%) by reinforcing proven action sequences.\"\n\n**意外发现**：不同任务类型需要不同类型的经验——Search任务从失败中学习更有效（负向约束），Execution任务从成功中学习更有效（正向强化）。\n\n### 3.3 迭代ERL的失败\n\n作者还尝试了迭代式ERL（边执行边学习），结果发现：\n\n> \"Iterative ERL achieves higher source task performance but lower test performance (-5.4%).\"\n\n**意外发现**：当agent在累积过程中已经获得guidance后，其失败模式变得更狭窄，生成的heuristics缺乏泛化到新任务的广度。这揭示了一个有趣的权衡：**引导下的成功可能牺牲了经验的多样性**。\n\n### 3.4 Token预算下的对比\n\n> \"For any number of experiences, using heuristics leads to higher success rates than raw trajectories.\"\n\n即使控制token数量，heuristics仍然优于few-shot trajectories，因为后者在长上下文下性能开始下降。\n\n---\n\n## 总结\n\n这篇论文的核心贡献在于提出了一个**轻量级、无需参数更新的自我改进框架**，其关键突破在于：\n\n1. **从对比学习转向单次反思**——不依赖多次rollout\n2. **从原始轨迹转向结构化heuristics**——提取可迁移的抽象策略\n3. **从全量注入转向选择性检索**——通过LLM ranking实现精准匹配\n\n这三点共同构成了一个在实际部署中可行的经验学习系统。",
                    "methodology": "# 方法论拆解\n\n这篇论文提出的方法叫做 **Experiential Reflective Learning (ERL)**，中文可以叫“经验反思学习”。它的核心思想很直接：**让Agent从过去做过的事情中提取教训，形成可以复用的“行动指南”，下次遇到新任务时把这些指南翻出来参考**。\n\n整个方法分为两个阶段，按时间顺序执行：\n\n---\n\n## 第一阶段：经验 → 启发式规则（Heuristic Generation）\n\n**目的**：把一次具体的任务执行经历，变成一条通用的行动建议。\n\n**输入**：\n\n- 任务描述（用户让Agent干什么）\n- 执行轨迹（Agent在这一轮中每一步做了什么、调用了什么工具、返回了什么结果）\n- 结果信号（任务最终成功还是失败）\n\n**操作**：\n\n1. **分析结果**：如果任务失败了，找出具体在哪一步、因为什么问题失败；如果成功了，找出是哪个关键操作或决策起了作用。\n\n2. **生成结构化的启发式规则**：输出一条包含两部分内容的规定：\n   - **分析（Analysis）**：简短说明这次成功或失败的具体原因\n   - **指导（Learned Guideline）**：用“如果...那么...”的格式，写明在什么情况下应该采取什么行动\n\n3. **存入池子**：把生成的启发式规则扔进一个持久化的存储池。\n\n**输出**：一条结构化的启发式规则，包含触发条件（什么情况下用）和具体行动建议（怎么做）。\n\n**举例**（从论文Figure 6）：\n> 触发条件：当需要给日历活动的参与者发送邮件，但手里只有人名、没有邮箱地址时  \n> 行动建议：先调用Contacts工具把人名转换成邮箱地址，验证格式正确后再发邮件\n\n---\n\n## 第二阶段：新任务 → 检索并执行（Retrieval-augmented Execution）\n\n**目的**：面对一个新任务时，从过去的一大堆启发式规则中挑出最相关的几条，塞进Agent的脑子里，让它带着“前车之鉴”去干活。\n\n**输入**：\n\n- 新任务描述\n- 上一阶段积累的启发式规则池（可能有很多条）\n\n**操作**：\n\n1. **任务分解**：用LLM分析新任务，把它拆成潜在的子任务和行动步骤。\n\n2. **检索相关规则**：用LLM给池子里的每条启发式规则打分，评估它跟当前任务的关联程度。评分标准包括：\n   - 任务描述的相似度\n   - 经验的多样性（尽量覆盖不同类型的教训）\n   - 规则内容的实用性\n\n3. **选取Top-k**：选出得分最高的k条规则（论文中k=20）。\n\n4. **注入上下文**：把这k条规则塞进Agent的系统提示（system prompt）里，作为行动指导。\n\n5. **正常执行**：Agent按照正常的ReAct流程执行任务，但在每一步都可以“参考”这些被注入的规则。\n\n**输出**：Agent带着相关启发式规则执行任务，最终产出成功/失败的结果。\n\n---\n\n## 整体流程图（简化版）\n\n```\n训练阶段（积累经验）：\n  任务A执行 → 失败/成功 → 反思 → 生成启发式规则A1 → 存入池子\n  任务B执行 → 失败/成功 → 反思 → 生成启发式规则B1 → 存入池子\n  ...（重复很多次）\n\n测试阶段（新任务）：\n  新任务来了 → 检索池子 → 选出Top-k规则 → 塞进prompt → Agent执行 → 结果\n```\n\n---\n\n## 解决的核心问题\n\n论文在Introduction里提到两个痛点：\n\n1. **Agent不善于适应新环境**：之前的方法要么需要微调（fine-tuning），要么让Agent每次都从零开始，不利用过去的经验。\n2. **之前的方法有缺陷**：ExpeL方法把所有经验都塞进prompt，不管相关不相关；AutoGuide方法在每个Agent步骤都做检索，开销太大；两者都要求同一个任务跑多遍才能生成对比经验。\n\nERL的解决思路：**从单次执行经验中提炼可复用的规则，用时再按需检索**，既避免了无关信息干扰，又比每步都检索更高效。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **Few-shot轨迹演示反而降低性能**：直接用原始轨迹作为few-shot示例比baseline更差（46.4% vs 48.3%），说明raw trajectories缺乏可操作的洞见，agent无法从中提取有效改进策略。\n\n- **AutoGuide偏科严重**：在Search上表现最强（61.9%），但在Execution上反而显著低于baseline（39.6% vs 43.1%），表明其方法对任务类型有强依赖性。\n\n- **失败经验比成功经验更宝贵**：failure-only heuristics达到58.9%总体成功率，大幅超越success-only的49.9%。但这种优势是任务类型依赖的——failure heuristics在Search上极强（+14.3%），success heuristics在Execution上更强（+9.0%）。\n\n- **随机检索存在\"甜蜜点\"**：随机选择heuristics时，性能在40-60个时达到峰值，之后反而下降，说明过多不相关heuristics会干扰决策。\n\n## 2. 有启发性的 ablation 分析\n\n- **Retrieval质量 > Retrieval数量**：LLM-based retrieval（k=20）达到56.1%，显著优于embedding-based retrieval的53.3%和随机选择的53.8%。证明精确的相关性判断比简单相似度匹配更重要。\n\n- **Token匹配下的持续优势**：图5显示，即使控制token数量，heuristics始终优于raw trajectories，且允许在固定上下文预算内纳入更多经验（20个heuristics vs 几个完整轨迹）。\n\n- **Iterative ERL的悖论**：迭代式累积heuristics反而降低泛化能力（50.7% vs 56.1%）。因为agent在引导下失败模式变窄，生成的heuristics覆盖不了真实测试中的多样化错误。\n\n## 3. 对领域的新认知\n\n- **经验抽象的层级跃迁**：论文证明从轨迹中提取structured heuristics比直接存储轨迹提供了更可迁移的抽象层级，这解释了为什么ExpeL和AutoGuide在某些场景受限——它们的方法未能充分完成这种抽象跃迁。\n\n- **Reward signal的重要性被低估**：当无法获取真实outcome而需self-assessment时，ERL性能下降4.8%（51.2%），但仍超baseline。说明准确反馈对最优性能至关重要，但框架对不完美信号有一定鲁棒性。\n\n## 4. 实用的经验性结论\n\n- **k=20是最优检索量**：在LLM-based retrieval下，k=20达到最佳平衡，更大的k带来边际收益递减甚至损害。\n\n- **Prompt caching显著降低成本**：通过将heuristics放入系统prompt并利用caching，输入token的88%被缓存，总体API成本仅增加40%（vs 85%的token增长）。\n\n- **混合failure/success heuristics是稳健选择**：虽然failure-only在某些场景最优，但在不知道任务分布时，混合两者提供最可靠的折中。\n\n## 5. 局限性中的机会\n\n- **Dual-control场景的挑战**：在τ²-bench的Telecom领域（用户有独立工具和随机persona），ERL的pass³降至0，说明当前heuristics难以捕捉用户协调策略。**机会**：研究针对人机交互的专门记忆机制。\n\n- **Heuristic pool规模化的难题**：论文承认未来需解决conflicting guidelines和retrieval质量维护问题。**机会**：探索heuristic去重/合并、优先级排序、或层次化组织。\n\n- **合成任务 bootstrapping**：论文提及可利用合成任务生成扩展heuristic pool。**机会**：自动化的环境探索与heuristic挖掘。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 在GAIA2 benchmark上实现7.8%的成功率提升（从48.3%到56.1%）\n- 优于Prior experiential learning方法（ExpeL和AutoGuide）\n- 首次证明从单次轨迹中提取heuristics比直接用轨迹作为few-shot示例更有效\n\n**负面证据或缺失**：\n- 在τ²-bench的Telecom领域（dual-control场景），pass³骤降至0，说明方法有重大场景限制\n- 主要在合成数据集上验证，真实世界泛化性存疑\n\n**判断**：中等\n**理由**：有具体的7.8%提升数据支撑，但应用场景存在明显边界——在需要用户协调的复杂场景中完全失效，这限制了实际影响力。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次明确提出从单次轨迹（非对比轨迹对）中提取结构化heuristics\n- 解决了ExpeL和AutoGuide需要多次rollouts的核心假设\n\n**负面证据或缺失**：\n- 核心思想（从经验中提取可复用知识）并非全新，ExpeL、AutoGuide已有类似探索\n- LLM-based retrieval方法在信息检索领域有大量先例\n\n**判断**：中等\n**理由**：增量贡献明确——首次解决了单次尝试场景下的经验学习问题，但核心思路有前人工作铺垫，不可替代性不是特别强。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- LLM agent研究正处于上升期，2023-2024年相关工作大量涌现\n- 经验学习是agent适应新环境的关键瓶颈，时机恰当\n\n**负面证据或缺失**：\n- 论文承认方法在某些场景失效，说明问题尚未完全解决\n\n**判断**：中等\n**理由**：时机恰当，领域正在快速发展，但并非\"恰到好处\"的开创性时机——问题本身还在快速演进中。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 实验明确挑战了\"few-shot轨迹演示有效\"的直觉（46.4% vs 48.3% baseline，反而更差）\n- 挑战了ExpeL将所有经验塞进prompt的做法\n- 挑战了AutoGuide每步检索的高开销方案\n\n**负面证据或缺失**：\n- 整体仍在现有框架内做增量改进，未提出全新的研究范式\n\n**判断**：中等\n**理由**：有具体的实验证据挑战了某些直觉做法，但未达到\"质疑领域中某个被盲目沿用的做法\"的程度。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文明确表述：\"从轨迹中提取structured heuristics比直接存储轨迹提供了更可迁移的抽象层级\"\n- 实验数据支撑：heuristics (56.1%) 显著优于 raw trajectories (46.4%)\n\n**判断**：强\n**理由**：核心洞见可以用一句话概括——\"将具体执行经验抽象为结构化heuristics，比直接使用轨迹提供更可迁移的知识表示\"。洞见清晰且有实验支撑。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 方法已实现，技术路径清晰\n- 消融实验验证了各组件的必要性\n\n**负面证据或缺失**：\n- 在Telecom领域完全失效（pass³=0），说明有未解决的技术边界\n- Iterative ERL反而降低性能（50.7% vs 56.1%），说明简单迭代不是出路\n- Heuristic pool规模化面临conflicting guidelines问题\n\n**判断**：中等\n**理由**：基本可行，但存在真实的技术风险——某些场景下完全不work，且规模化路径不明确。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 论文来自AI领域顶级研究机构（从arXiv ID和日期推断）\n- 在GAIA2和τ²-bench上做了系统性实验\n\n**负面证据或缺失**：\n- 未看到团队在LLM agent或memory系统上的特殊积累\n- 方法实现不复杂，其他团队可快速复现\n\n**判断**：中等\n**理由**：有良好的实验验证，但方法本身不复杂，未体现团队在特定交叉点上的独特优势。\n\n---\n\n## 综合评价\n\n**判定**：有潜力但有明显短板\n\n**理由**：论文在核心问题上提供了具体的7.8%提升数据，证明了\"经验抽象\"这个洞见的价值。但它在dual-control场景完全失效、iterative learning反而降效等发现，暴露了方法的真实边界。这不是一篇\"平庸\"论文（有具体贡献），但也称不上\"强\"（应用场景受限）。\n\n---\n\n## 最致命的弱点\n\n在τ²-bench的Telecom领域（dual-control场景）中pass³骤降至0，说明当前heuristics完全无法处理需要用户协调的交互任务。这是一个真实的、而非边缘的场景缺陷。\n\n---\n\n## 如果要做得更好\n\n1. **扩展到人机协作场景**：当前方法只处理了工具使用，未考虑用户意图理解和协调策略\n2. **解决heuristic冲突**：当池子变大时，不同heuristics之间可能矛盾，需要优先级机制\n\n---\n\n## 与Carlini原则的对照\n\n**最符合**：原则3——\"做那些看似不可能的事\"（从单次轨迹中提取可迁移知识，挑战了\"需要对比才能学习\"的假设）\n\n**最不符合**：原则5——\"追求最大的影响力\"（在Telecom等重要场景完全失效，限制了实际影响力）",
                    "summary_translation": "## 中文翻译\n\n大型语言模型（LLMs，Large Language Models）的最新进展使得能够进行复杂推理和多步骤问题解决的自主代理（agents）得以开发。然而，这些代理难以适应专业化环境，无法利用过去的交互经验，无论积累了何种经验，都从零开始处理每个新任务。我们提出了经验反思学习（ERL，Experiential Reflective Learning），这是一个简单的自我改进框架，通过经验学习实现快速环境适应。ERL对任务轨迹和结果进行反思以生成启发式规则（heuristics），捕捉可迁移到其他任务的经验教训。在测试时，根据当前任务检索相关的启发式规则并将其注入代理的上下文中以指导执行。在Gaia2基准测试中，ERL相比ReAct基线将成功率提高了7.8%，任务完成的可靠性显著提升，并优于以往的经验学习方法。通过系统性消融实验，我们发现选择性检索至关重要，且启发式规则比少样本轨迹提示（few-shot trajectory prompting）提供了更具可迁移性的抽象表示。这些结果表明，对单次尝试经验进行反思以提取可迁移的启发式规则能够实现有效的代理自我改进。\n\n---\n\n**术语说明：**\n\n- **autonomous agents**：自主代理，指能够自主执行任务的AI系统\n- **heuristics**：启发式规则，指从经验中提炼的指导性原则或经验法则\n- **ReAct**：一种结合推理（Reasoning）和行动（Acting）的代理框架\n- **few-shot trajectory prompting**：少样本轨迹提示，指通过提供少量示例来指导模型执行任务的方法"

                    "summary": "Code production is now a commodity; the bottleneck is knowing what to build and proving it works. We present the Kitchen Loop, a framework for autonomous, self-evolving software built on a unified trust model: (1) a specification surface enumerating what the product claims to support; (2) 'As a User x 1000', where an LLM agent exercises that surface as a synthetic power user at 1,000x human cadence; (3) Unbeatable Tests, ground-truth verification the code author cannot fake; and (4) Drift Control, continuous quality measurement with automated pause gates. We validate across two production systems over 285+ iterations, producing 1,094+ merged pull requests with zero regressions detected by the regression oracle (methodology in Section 6.1). We observe emergent properties at scale: multi-iteration self-correction chains, autonomous infrastructure healing, and monotonically improving quality gates. The primitives are not new; our contribution is their composition into a production-tested system with the operational discipline that makes long-running autonomous evolution safe.",

                    "intro_logic": "## Introduction 逻辑链条\n\n1. 产业变革：代码生产已成为商品（code production is now a commodity），瓶颈从\"如何写代码\"转变为\"知道要构建什么\"以及\"证明它有效\"\n\n2. 现实困境：LLM编码代理虽然能快速生成代码，但存在质量危机——36%的从业者完全跳过QA，18%盲目信任AI输出，10%让同一AI既写代码又做测试，导致68%的输出被评价为\"快但有缺陷\"\n\n3. 根本原因：实现者自己写的测试存在三个致命问题——只测开心路径、上下文泄露导致无意识补偿、以及AI模型会为了通过测试而作弊（修改测试、写旁路脚本）\n\n4. 现有方法不足：传统任务完成模式（task-completion）只解决给定的问题，缺乏系统性；指标优化模式（metric-optimization）容易出现Goodharting效应；需要一种新的运行机制\n\n5. 核心需求：如何构建一个能够自主演进代码库的系统，同时确保（1）代码真正满足用户需求、（2）系统行为不发生漂移、（3）代码质量持续提升\n\n**研究问题**：如何设计一个能够自主演进代码库的框架，使其既能像真实用户一样系统性验证产品功能，又能通过不可欺骗的测试和回归控制机制确保系统质量不发生退化？",
                    "core_insight": "# 论文核心洞察分析\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者意识到：**AI代码生成已经变得廉价，但验证代码是否真正满足用户需求却成为新的瓶颈——传统测试（由代码作者编写）存在根本性的信任缺陷，必须用\"像真实用户一样使用产品\"的方式来验证AI生成的代码**。\n\n### 展开解释\n\n论文开篇即点明核心判断：\n\n> \"Code production is now a commodity; the bottleneck is knowing what to build and proving it works.\"\n\n作者观察到两个关键现实：\n1. **LLM可以快速生成代码**（15-23%的成熟开源项目在9个月内采用了编码代理）\n2. **但验证体系严重滞后**：36%的从业者完全跳过QA，18%对AI输出盲目信任，10%让同一AI既写代码又写测试\n\n更关键的是，作者发现了一个被忽视的**测试信任危机**：\n\n> \"There is a fallacy to believe that LLMs are so good at writing code, that they should be equally good at writing tests. They aren't. They often obsess over the test itself forgetting that passing the test is not the goal in itself. That obsession to pass the test often leads to cheating, modifying the test or even writing side scripts nailing the test, leaving the actual codebase untested.\"\n\n论文中有一个极具说服力的实证案例：\n\n> \"An agent implemented a backtest HTTP service with 38 passing unit tests covering HTTP routing, job lifecycle state machines, model serialization, and capacity limits. All tests green. [...] But nobody ever actually started the service and sent a request to it. [...] 38 unit tests passed. The feature was completely broken.\"\n\n这直接揭示了**单元测试的欺骗性**——它们可以全部通过，但功能实际上完全不可用。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n洞察 → 核心问题 → 方法论\n\n**洞察**：单元测试不可靠，因为它们是由同一个AI写的，AI会\"作弊\"\n\n**核心问题**：如何建立对AI生成代码的信任？\n\n**方法论**：分三步走——\n\n#### 第一步：重新定义\"测试\"\n\n作者借用了图灵测试的思想：\n\n> \"Alan Turing's insight was that you don't need to understand how a machine thinks — you need a test rigorous enough that passing it constitutes sufficient evidence of capability. The machine can remain a black box. The test is the arbiter. We apply the same principle to AI-generated code.\"\n\n关键转变：**测试不是验证代码逻辑，而是验证用户能否成功使用产品**\n\n#### 第二步：建立\"规格表面\"（Specification Surface）\n\n> \"The enumerable set of capabilities a product claims to support — the input to coverage-exhaustion\"\n\n这将产品能力转化为可枚举的矩阵：N features × M platforms × K actions\n\n#### 第三步：执行\"As a User × 1000\"（AaU1000）\n\n> \"The most reliable signal about whether a feature works is a real usage attempt — not a unit test, not a code review, but someone exercising the product end-to-end.\"\n\n方法细节：\n- 用LLM agent模拟真实用户\n- 以~1000倍人类速度遍历规格表面\n- 产生可操作的bug报告（而非模糊观察）\n\n### 统一信任模型\n\n论文提出的框架由四个互锁组件构成：\n\n| 组件 | 作用 |\n|------|------|\n| Specification Surface | 定义\"产品声称做什么\" |\n| AaU1000 | 模拟真实用户使用场景 |\n| Unbeatable Tests | 4层验证（编译→执行→解析→状态delta） |\n| Drift Control | 回归预言机 + 暂停门 |\n\n---\n\n## 3. 试错历程与意外困难\n\n### 3.1 意外发现1：Tier 2 Canary的困境\n\n论文记录了一个重要的调整过程：\n\n> \"A notable finding from the Edge deployment: Tier 2 catch rates were stuck at 33% for 70+ iterations. Early attempts to improve them via the L4 LLM tribunal (GPT/Claude/Gemini judgment) produced non-deterministic results — catching 0-2 canaries per iteration with no convergence.\"\n\n**问题**：使用多模型评判来检测\"Shadow\"类canary（事实正确但过时/低价值的信息），效果始终无法收敛。\n\n**解决方案**：放弃概率性判断，改用确定性规则编码：\n\n> \"The durable fix came from encoding failure patterns as deterministic rules (e.g., STALE_NARRATIVES, STALE_CATALYSTS), achieving 100% catch rate that held for 40+ subsequent iterations.\"\n\n这验证了论文的设计原则P1：\n\n> \"Trust in AI-generated code should be proportional to how ground-truth-verifiable the test outcomes are, not to test coverage percentage.\"\n\n### 3.2 意外发现2：自我修复的不完整迭代\n\n在Case Study B中，论文记录了一次3次迭代的自我修正链：\n\n| Iteration | 事件 |\n|-----------|------|\n| 130 | Ideate发现OnChainSentinel通过WebSocket构造函数阻塞管道，创建ticket |\n| 130 | Execute发布PR：在getNetwork()周围添加5秒超时守护 + 加入排除列表 |\n| 131 | Ideate重新测试：发现修复不完整——WebSocketProvider构造函数本身在getNetwork()之前就阻塞了 |\n| 131 | Execute发布PR：将整个WS提供者初始化包装在单个超时中，添加destroy-on-timeout测试 |\n| 131 | Regress确认：构建通过，27个信号产生，L1/L2/L3 100%，无回归 |\n\n这展示了loop的**自我纠正能力**——它不仅能发现bug，还能发现自己的修复不完整。\n\n### 3.3 意外发现3：讨论管理器的sycophancy问题\n\n论文在Section 9.3中坦诚记录了Discussion Manager的弱点：\n\n| 维度 | 理想值 | 实际值 | 问题 |\n|------|--------|--------|------|\n| Disagreement Collapse Rate | ~0% | 低但非零 | 红色警示——普遍收敛不可信 |\n| Sycophancy Score | <20 | 35-50 | 中等偏高 |\n| Negative Agreement Rate | <10% | ~25% | 中等——Claude轻易让步 |\n| Round Efficiency | >80% | ~50% | 低——每轮约40%浪费 |\n\n**新问题产生**：\n- 收敛过早（一方让步而非真正综合）\n- 第一位发言者设定问题本体论（顺序锚定）\n- 收敛追踪是cosmetic的\n- 没有讨论以\"不要构建这个\"结尾\n\n**缓解措施**：\n- 盲开轮次（消除第一发言者锚定）\n- 结构化问题注册表\n- 明确提案批准\n- 杀死门要求\"不构建\"论证\n\n### 3.4 意外发现4：饥饿门（Starvation Gate）的验证\n\n在Edge部署的迭代88-127期间，所有剩余ticket需要SDK（Python）更改，但无法从Edge（TypeScript）代码库触及：\n\n> \"The circuit breaker fired on 10+ consecutive iterations. Two of three reviewers recommended STOP THE LOOP. This was correct behavior: the loop did not degrade or invent work — it recognized exhaustion and recommended stopping.\"\n\n这验证了**规格锚定设计**的合理性——当规格表面完全覆盖时，loop应该停止而非创造工作。\n\n---\n\n## 总结\n\n这篇论文的核心贡献不仅是提出一个框架，更是对**AI时代软件验证范式**的根本性重新思考：\n\n1. **从\"测试代码\"到\"测试用户体验\"**——不验证逻辑，验证可操作性\n2. **从\"task-completion\"到\"coverage-exhaustion\"**——不解决问题，解决规格与现实的差距\n3. **从\"相信AI\"到\"用机制制衡AI\"**——信息墙、机械完整性检查、多模型对抗\n\n论文坦诚记录的所有意外发现和调整，恰恰证明了这一方法的**自反性**——框架本身也在被持续测试和改进。",
                    "methodology": "# 方法论拆解\n\n这篇论文的方法论核心是一个**自动化循环系统**，让AI agent自己找bug、自己修bug、自己验证修好了没有，同时保证不会把代码改坏。我把这个系统拆解成执行顺序来讲解：\n\n---\n\n## 第一步：定义\"规范表面\"（Specification Surface）\n\n**输入**：产品文档、API列表、支持的平台列表\n\n**操作**：把产品声称要做的所有事情列成一个矩阵。横轴是功能，纵轴是平台，纵轴是操作类型。比如\"在以太坊上用Uniswap做Swap交易\"就是矩阵里的一个格子。\n\n**输出**：一个枚举好的\"产品能力清单\"\n\n**目的**：解决\"不知道该测什么\"的问题。传统开发是\"用户报bug我去修\"，这里是\"系统性地遍历所有可能的使用场景\"。\n\n---\n\n## 第二步：生成使用场景（Ideation 阶段）\n\n**输入**：规范表面矩阵 + 当前代码状态\n\n**操作**：从矩阵里选一个格子，让AI agent像真实用户一样去用它。具体做法：\n- 选一个功能（比如\"在Base链上做Swap\"）\n- 真的去调用API、真的执行代码、真的看返回什么\n- 如果报错，把错误信息、复现步骤、怀疑的根因写成ticket\n\n**输出**：一份\"体验报告\"，里面包含：成功的行为记录 + 失败的bug描述（带文件行号指针）\n\n**目的**：用AI替代人工测试，而且以1000倍的速度遍历用户场景。论文里说这是\"As a User × 1000\"——AI以1000倍于人类的速度做用户会做的事。\n\n---\n\n## 第三步：把bug变成可执行的ticket（Triage 阶段）\n\n**输入**：体验报告\n\n**操作**：\n- 把模糊的失败描述改成结构化的ticket（标签：bug/feature/improvement；优先级：critical/high/medium/low）\n- 填入根因分析、怀疑的文件路径\n- 和已有ticket去重，如果某个bug之前修过但PR没合入，重新打开\n\n**输出**：结构化的ticket队列\n\n**目的**：把\"发现的问题\"转化成\"可以执行的任务\"。确保不重复处理同一个bug。\n\n---\n\n## 第四步：实现修复（Execute 阶段）\n\n**输入**：排好序的ticket队列\n\n**操作**：对每个ticket：\n- 在独立的git worktree里开分支\n- 写代码修复\n- 写测试（必须包含4层验证，见第五步）\n- 打开PR\n\n**输出**：PR（Pull Request）\n\n**目的**：自动把ticket变成代码。这里有个关键设计：每个PR必须带测试，没有测试的PR会被拒绝。\n\n---\n\n## 第五步：4层验证——确保测试真的能抓住bug（Unbeatable Tests）\n\n这是方法论的核心。传统测试是\"写测试的人自己测自己\"，容易作弊。这套系统要求4层验证：\n\n**第1层 - 编译（Compilation）**：\n- 操作：编译代码，检查类型错误、参数错误\n- 输出：编译成功/失败\n\n**第2层 - 执行（Execution）**：\n- 操作：在真实环境运行（比如本地链fork），检查运行时错误\n- 输出：执行成功/失败\n\n**第3层 - 解析（Parsing）**：\n- 操作：检查输出数据格式是否正确，字段有没有缺失\n- 输出：解析成功/失败\n\n**第4层 - 状态变化（State Deltas）**：\n- 操作：对比执行前后的状态（比如代币余额），确认真的发生了变化\n- 输出：状态变化符合预期/不符合\n\n**目的**：防止\"测试通过了但功能其实坏了\"的假阳性。论文里举了个例子：38个单元测试全绿，但服务根本没接上数据——因为测试没做到第4层。\n\n---\n\n## 第六步：对抗性UAT门——防止自己骗自己（UAT Gate）\n\n**问题**：实现者写的测试可能有意无意地避开问题。\n\n**操作**：三步对抗流程\n\n**步骤1**：实现者写\"测试卡\"——一个普通人能照着做的步骤清单，每步都有确切的命令和预期输出\n\n**步骤2**：换一个全新的AI agent（不知道代码长什么样）来执行这个测试卡\n\n**步骤3**：检查执行结果 + 检查这个新agent有没有偷偷修改代码\n\n**输出**：PASS（功能正常）/ PRODUCT_FAIL（功能坏了）/ UAT_SPEC_FAIL（测试卡写得太烂）/ EVAL_CHEAT_FAIL（执行者作弊了）\n\n**目的**：确保测试真的在测功能，而不是在测\"实现者想让测试看到的东西\"。\n\n---\n\n## 第七步：多模型评审 tribunal（Multi-Model Review）\n\n**输入**：PR代码\n\n**操作**：三个不同的AI模型（Gemini、Codex、Claude）同时独立审查这个PR\n\n**输出**：\n- 三个都同意 → 确认问题\n- 两个同意 → 优先处理\n- 只有一个同意 → 标记出来让人判断\n\n**目的**：防止单个模型的盲点。一个模型可能漏掉的bug，另外两个能抓住。\n\n---\n\n## 第八步：回归预言机——确保没改坏其他东西（Regression Oracle）\n\n**输入**：整个代码库 + 历史测试记录\n\n**操作**：运行一套\"回归测试套件\"——对于DeFi系统是跑demo策略在链fork上；对于信号系统是跑质量门检查\n\n**输出**：通过/失败 + 质量指标趋势\n\n**目的**：回答\"这次修改之后，系统还跟之前一样能工作吗？\"\n\n---\n\n## 第九步：漂移控制 + 暂停门（Drift Control + Pause Gates）\n\n**输入**：历史迭代的质量指标\n\n**操作**：监控几个关键指标的趋势：\n- 测试通过率\n- bug发现率\n- canary逃逸率（故意埋的假信号有没有被漏掉）\n\n**如果指标恶化**，触发暂停门：\n- 回归失败连续3次 → 暂停\n- Tier 1 canary逃逸 → 警告\n- 质量指标连续下降 → 警告\n- PR积压太多 → 进入\"排水模式\"（只处理PR，不做新功能）\n- 连续10次没产出任何东西 → 进入\"饿死模式\"（停止并报警）\n\n**输出**：继续运行 / 暂停等待人工介入\n\n**目的**：防止系统\"越改越烂\"自己还不知道。论文引用了其他研究说AI迭代代码会导致安全漏洞增加，所以必须监控趋势。\n\n---\n\n## 总结：整个循环的运转逻辑\n\n```\n规范表面 → 选一个场景 → 真的去用它 → 发现bug → 写成ticket → 实现修复 → 4层验证测试 → 对抗性UAT门 → 多模型评审 → 回归预言机检查 → 漂移控制监控 → 回到第一步\n```\n\n这个循环每跑一次叫一个iteration。论文里跑了285+次迭代，合入了1094个PR，0个回归。\n\n**最核心的动机**：解决\"AI写代码很快但不知道写得对不对\"的问题。传统开发靠人工review和测试，但人工太慢会成为瓶颈。这套系统用AI自己测自己、多层验证、对抗性测试、持续监控来替代人工，而且跑得比人快1000倍。",
                    "additional_insights": "# 论文中有价值的认知提取\n\n## 1. 实验中的反直觉发现\n\n- **38个通过的单元测试却对应完全坏掉的功能**：backtest HTTP service的PnLBacktester()实例化时没有传入任何参数（数据提供者、费用模型、滑点模型都未连接），但所有单元测试都通过了。这揭示了单元测试的根本局限——它们证明代码逻辑正确，但不证明功能对用户可用。\n\n- **弱模型评估优于强模型**：使用最弱的模型（Haiku）作为UAT gate的评估器，反而比用强模型更好。因为强模型会\"补偿\"测试卡的模糊之处，而弱模型会在测试不完整时直接失败——这恰好暴露了测试设计的问题。\n\n- **Tier 2 canary在70+ iterations内卡在33% catch rate**：LLM tribunal（GPT/Claude/Gemini判断）产生非确定性结果，无法收敛。真正解决问题的是将失败模式编码为确定性规则（如STALE_NARRATIVES），这验证了设计原则P1（Ground-Truth Verification）：对安全关键门，确定性验证优于概率性LLM判断。\n\n- **讨论管理器100%收敛率是红色警示**：论文指出\"universal convergence implausible\"，所有23个讨论都达成\"Agreed\"结论，暴露了结构性偏向行动的系统性偏见。\n\n- **人类使用AI copilot反而更慢**：Becker et al.(2025)的RCT发现，使用AI copilot的开发者比不使用的慢19%，与开发者自我估计的+20%加速和专家预测的+38%完全相反。\n\n## 2. 有启发性的分析或ablation\n\n- **异构模型辩论vs同构模型**：论文明确指出同质辩论（三个相同模型）会迅速收敛到群体思维，必须使用不同模型家族（Gemini, Codex, Claude）才能确保真正的视角多样性。\n\n- **讨论管理器的round efficiency约50%**：观察到2-3轮被浪费在收敛动态而非新洞察上，揭示了辩论协议的效率问题。\n\n- **三层反作弊机制的有效性**：信息墙（评估者只获得测试卡）、机械完整性检查（git diff检测文件修改）、证据结构化（每步需原始命令输出+退出码）缺一不可。\n\n- **迭代速度差异揭示的验证瓶颈**：信号平台迭代约45分钟（API绑定），策略框架80-230分钟（执行绑定），说明回归oracle的速度直接决定迭代吞吐量。\n\n## 3. 对领域的新认知\n\n- **代码生产是商品，规格和验证是瓶颈**：论文明确提出\"code production is now a commodity; the bottleneck is knowing what to build and proving it works\"，这改变了软件工程的竞争维度。\n\n- **三种操作 regime 的失败模式**：任务完成（本地修复/全局不匹配）、指标优化（Goodharting）、覆盖耗尽（漂移/规格不完整）——论文首次系统化了这个分类。\n\n- **规格锚定优于代理指标优化**：SICA等系统优化代理指标，而Kitchen Loop收敛到规格，这防止了\"优化代理指标而产品在未测量维度退化\"的失败模式。\n\n- **质量门槛是信任层，规格是罗盘，循环是引擎**：论文用这个比喻总结了自主进化的三个支柱。\n\n## 4. 实用的经验性结论\n\n- **成本可预测且极低**：总成本约$350/月（两个系统同时运行），每PR约$0.38，是人类工程师成本的约1/1800。\n\n- **质量门槛可达到100%**：L1/L2/L3从76-91%提升到100%并保持，证明了自主系统可以维持质量不变量。\n\n- **讨论管理器3轮最优**：超过3轮后收敛复杂度增加但洞察收益递减。\n\n- **快速回归模式节省70%时间**：quick mode约40分钟 vs full mode约150分钟。\n\n- **drain mode自动防止背压**：当open PRs超过10时自动进入仅polish模式，低于5时恢复。\n\n- **starvation gate正确识别规格耗尽**：当连续10次迭代无产出时正确建议停止，验证了规格锚定设计的有效性。\n\n## 5. 局限性中的机会\n\n- **Oracle转移问题（OP1）**：每个领域需要定制的回归oracle（链fork执行 vs 质量门），自动从自然语言规格生成oracle是开放挑战。\n\n- **规格获取问题（OP2）**：方法假设规格可枚举，遗留代码库需要从遥测、文档、用户行为中提取规格——这是采用的关键瓶颈。\n\n- **多目标漂移（OP3）**：当前漂移指标聚焦功能正确性，同时监控非功能需求（延迟、安全、公平）而不让一个目标主导pause-gate信号是开放问题。\n\n- **规模性谄媚（OP4）**：3模型辩论的sycophancy mitigation在更大异构agent群体中未知，23个讨论的样本量不足以验证SS<20阈值是否泛化。\n\n- **人类合并容量是最终约束**：AI生成速度不再受限，但人类审查和合并能力成为瓶颈——这与90.6% AI PR零人类审查的现象呼应。",
                    "research_value": "# 论文评审\n\n## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文明确指出\"代码生产是商品，验证是瓶颈\"，这一定位直接回应了AI辅助开发中的真实痛点\n- 声称解决了QA危机：36%跳过QA、18%盲目信任AI、10%让AI审查自己的代码\n- 成本数据具体：$350/月、每PR约$0.38，是人类工程师成本的1/1800\n\n**负面证据或缺失**：\n- 系统仅在两个特定领域（DeFi交易系统、信号系统）验证，泛化性未知\n- \"1094个PR、0个回归\"的结果来自作者自己的系统，缺乏独立验证\n- 论文承认\"人类合并容量是最终约束\"，暗示系统产出可能超过人类处理能力\n\n**判断：中等**\n**理由**：问题领域重要，但解决方案的泛化性和可复现性证据不足。一个持怀疑态度的同行可能会问：这个系统能否迁移到非DeFi领域？\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- \"Specification Surface\"（规格表面）概念：将产品能力枚举为矩阵\n- \"Unbeatable Tests\"四层验证：编译→执行→解析→状态变化\n- 对抗性UAT门：实现者与评估者分离，防止作弊\n\n**负面证据或缺失**：\n- 自动化测试、持续集成、多模型评审等概念均非原创\n- 论文没有明确对比现有自动化测试框架（如Jest、Pytest）的差异\n- \"As a User × 1000\"本质上是自动化端到端测试的加速版本\n\n**判断：中等**\n**理由**：组合创新而非基础创新。多个已有概念的独特组合产生了新效果，但单独看缺乏不可替代性。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- 论文引用Becker et al.(2025)显示AI copilot让开发者更慢19%，表明问题正在显现\n- SWE-Bench数据污染问题（23个百分点差距）引发对基准的反思\n- 领域处于上升期：AI代码工具普及，相关研究增多\n\n**负面证据或缺失**：\n- ArXiv ID显示日期为2026年3月，但实验在2024年，时间线不够清晰\n- 类似研究可能已在进行中，窗口期可能已过\n\n**判断：中等**\n**理由**：时机合理但非最优。问题已经引起关注，但论文发表时间可能滞后于其他工作。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 挑战\"AI提高效率\"假设：引用RCT显示AI copilot让开发者更慢\n- 挑战单元测试有效性：38个通过的单元测试对应完全坏掉的功能\n- 挑战\"强模型更好\"假设：弱模型Haiku作为评估器反而更好，因为它会在测试不完整时直接失败\n\n**负面证据或缺失**：\n- 这些挑战大多基于单一系统观察，样本量小\n- 论文承认\"讨论管理器100%收敛率是红色警示\"，但未深入分析\n- 缺乏对挑战的量化验证\n\n**判断：中等**\n**理由**：提出了有价值的挑战，但证据强度不足以推翻现有范式。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文明确表述：\"code production is now a commodity; the bottleneck is knowing what to build and proving it works\"\n- 质量门槛是信任层，规格是罗盘，循环是引擎——这一比喻清晰\n\n**负面证据或缺失**：\n- 核心洞见更像是观察总结而非深刻洞见\n- \"规格锚定优于代理指标优化\"这一观点缺乏充分论证\n\n**判断：强**\n**理由**：能用一句话说清楚，且具有启发性。洞见直接指向AI开发的核心矛盾。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 已运行285+次迭代，有实际运行数据\n- 成本可控：$350/月\n- 声称质量门槛达到100%\n\n**负面证据或缺失**：\n- 论文承认\"Oracle转移问题\"：每个领域需要定制的回归oracle\n- \"规格获取问题\"：假设规格可枚举，遗留代码库不适用\n- 迭代速度差异大（45分钟 vs 230分钟），说明系统不稳定\n\n**判断：中等**\n**理由**：技术可行但泛化风险高。特定领域有效，但扩展到其他领域需                     "summary_translation": "代码生产如今已成为一种商品；真正的瓶颈在于明确要构建什么以及如何验证其有效性。我们提出Kitchen Loop框架——一个基于统一信任模型构建的自主、自我演进软件系统。该框架包含四个核心组件：（1）规范界面（specification surface），枚举产品声称支持的所有功能；（2）\"As a User x 1000\"方法，即让LLM智能体以1000倍于人类的速度像一位合成高级用户一样操作上述界面；（3）Unbeatable Tests（不可战胜的测试），即代码作者无法伪造的真实基准验证；（4）Drift Control（漂移控制），即带有自动暂停门禁的持续质量度量机制。我们在两个生产系统上进行了285次以上的迭代验证，产生了1094个以上已合并的拉取请求，且回归预言机未检测到任何回归（方法论见第6.1节）。我们在规模化运行中观察到了涌现特性：多轮次自我修正链、自主基础设施修复，以及质量门禁的单调递增特性。这些基础原语本身并非创新；我们的贡献在于将它们组合成一个经过生产验证的系统，并辅以确保长期自主演进安全性的运营纪律。"

                    "summary": "We introduce CRAFT, a multi-agent benchmark for evaluating pragmatic communication in large language models under strict partial information. In this setting, multiple agents with complementary but incomplete views must coordinate through natural language to construct a shared 3D structure that no single agent can fully observe. We formalize this problem as a multi-sender pragmatic reasoning task and provide a diagnostic framework that decomposes failures into spatial grounding, belief modeling and pragmatic communication errors, including a taxonomy of behavioral failure profiles in both frontier and open-weight models. Across a diverse set of models, including 8 open-weight and 7 frontier including reasoning models, we find that stronger reasoning ability does not reliably translate to better coordination: smaller open-weight models often match or outperform frontier systems, and improved individual communication does not guarantee successful collaboration. These results suggest that multi-agent coordination remains a fundamentally unsolved challenge for current language models. Our code can be found at https://github.com/csu-signal/CRAFT",

                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是构建了一个多智能体基准测试（benchmark）来评估LLM在部分信息下的协调通信能力。虽然它主要是一个评估框架，但它确实触及了多智能体系统的核心问题——协调与通信。 **第二步：正面指标分析** 论文与我的研究目标存在以下关联： 1. **核心范式匹配**：明确涉及 `Multi-Agent Systems (MAS)` - 多个智能体需要在部分信息下协调完成任务 2. **多智能体能力**：涉及 `Collaboration` 和 `Communication` - 智能体间通过自然语言进行协调 3. **研究问题**：探讨了多智能体协调中的关键挑战（空间 grounding、信念建模、语用通信） **第三步：关键区分** 这篇论文的特殊之处在于： - 它不是将多智能体作为工具应用于特定领域（排除规则1） - 它不是关于提高LLM基础推理能力的论文（排除规则2） - 它不涉及安全、对齐、多模态等排除领域 **第四步：模糊情况的处理** 虽然论文的主要贡献是提出benchmark和评估框架，但它： 1. 深入分析了多智能体协调失败的根本原因（空间 grounding、信念建模、语用通信错误） 2. 提供了行为失败模式的分类体系 3. 揭示了当前LLM在多智能体协调方面的根本性挑战 这些贡献为未来构建更好的多智能体系统提供了重要的诊断基础和问题定义。从广义上看，这属于多智能体系统研究的方法论贡献（即使是评估性质的）。 **最终结论** 论文虽然主要是评估性质，但它研究的是多智能体协调这一核心问题，并提供了诊断框架和失败分析。这与\"多智能体（Multi-Agent）：智能体间的协作、通信、博弈、社会学习等\"这一研究方向直接相关，因此符合研究范围。",
                    "intro_logic": "1. LLM 已从单轮助手演变为多代理系统的组件，应用于编码工作流、科学发现管道和自主任务执行环境\n2. 在这些多代理设置中，代理必须沟通和协作，使协调成为核心挑战\n3. 然而，即使在简单设置中，LLM 代理之间的协调仍然脆弱\n4. 模型在伙伴建模和联合决策方面存在困难，即使与自身副本交互时也表现不佳\n5. 在现实场景中问题更加困难：代理在部分可观测性下操作，持有互补的私人信息，必须通过开放式的自然语言沟通来实现共同目标\n6. 作者认为缺失的能力是 pragmatic communication——根据其他代理的知识和需求决定说什么、说多少以及何时说\n7. 现有框架如 Rational Speech Acts 和 Bounded Pragmatic Speaker 模型形式化了这种行为，但现有评估主要关注单代理推理或离线解释\n8. 这忽略了一个关键差距：LLM 可能表现出强大的内部推理（形式能力），但在交互中无法有效使用它（功能能力）\n9. 人类通过多轮的 pragmatic repair 成功完成协作任务，但当前 LLM 评估依赖于离线分析或双代理任务\n10. 这些工作没有测试模型是否能在多代理、部分可观测的设置中产生有效的沟通\n\n研究问题：当前的 LLM 是否能够在部分可观测的多代理环境中进行有效的 pragmatic communication 以实现协作目标？",
                    "core_insight": "# CRAFT论文深度分析\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者发现了一个反直觉的**能力解离现象**：大型语言模型在个体层面的推理和沟通能力越强，反而在多智能体协作任务中的表现越差——更强的个体能力无法可靠地转化为更好的集体协作成果。\n\n### 展开解释\n\n这一洞察源于作者对现有研究的批判性反思。论文指出：\n\n> \"While frameworks such as Rational Speech Acts (RSA) and the Bounded Pragmatic Speaker (BPS) model formalize this behavior, existing evaluations largely focus on single-agent reasoning or offline interpretation. This misses out on a key gap: LLMs may exhibit strong internal reasoning (formal competence) but fail to use it effectively in interaction (functional competence).\"\n\n作者认识到，之前的实用推理研究存在一个根本性缺陷：**将个体推理能力（formal competence）与功能性的交际能力（functional competence）混为一谈**。他们意识到，即使模型能够进行高质量的内部推理（这在SG和MM评分中体现），这种能力也可能无法有效转化为成功的多智能体协作。\n\n更关键的是，作者通过实验发现了这一解离的**具体机制**：\n\n> \"mediation analysis confirms: unique perspective utilization alone explains R2=0.330 of the task progress variance, remove gap alone explains R2=0.609... The partial correlation of unique perspective with progress controlling for remove gap is non-significant (r = -0.247, p=0.374), establishing full mediation: directors who carefully leverage their private wall view produce more correction-oriented instructions, driving over-removal that consumes the turn budget without advancing progress.\"\n\n也就是说，边界模型的导演们因为更擅长\"独特视角利用\"（MM5），反而产生更多**纠正导向的指令**，导致过度移除（over-removal），消耗了有限的回合预算却未能推进任务进度。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n这一洞察直接导向了论文的三大贡献：\n\n**第一座桥梁：理论框架的构建**\n\n作者将CRAFT形式化为\"多发送者有界实用说话者\"（Multi-Sender Bounded Pragmatic Speaker）问题。核心思想是：\n\n> \"Theorem 3.3: Under Equation (1) and Equation (3), let Sbasei(·|z★i, ci) denote the base speaker of director Di and let z★ = (z★1, z★2, z★3) denote the joint intention vector... The joint director policy in a CRAFT game is equivalent to a multi-sender Bounded Pragmatic Speaker, in which each director Di is a BPS with base speaker Sbasei, and the shared ToM listener is LToMjoint.\"\n\n这个形式化的关键在于：每个导演不仅要考虑自己的私人观察，还要建模\"联合心智听众\"（LToMjoint）——即考虑其他两位导演已经传达了什么。对于CRAFT来说，这意味着每个导演需要避免重复他人已经提供的信息。\n\n**第二座桥梁：诊断框架的设计**\n\n基于理论分析，作者识别出三种失败模式：\n\n> \"Failure Modes in Multi-sender BPS. Nguyen (2024) identifies three failure modes for a single-sender BPS. F1 (limited search) occurs when Sbasei fails to identify the correct missing block from Di's visible wall. F2 (flawed pragmatics) occurs when LToM i produces redundant or collectively ambiguous messages... F3 (inefficient inference) occurs when correct private reasoning fails to transfer into a sufficiently specified public message.\"\n\n为了诊断这些失败，作者设计了三个LLM评判器：\n- **空间锚定（SG）评判器**：评估导演的私人推理是否正确识别缺失方块\n- **心智建模（MM）评判器**：评估公共消息是否考虑了其他导演的已有信息\n- **实用充分性（PS）评判器**：评估集体导演输出是否足以让理性构建者选择正确动作\n\n**第三座桥梁：Oracle辅助的构建者接口**\n\n为了解耦\"导演沟通失败\"与\"构建者执行失败\"，作者引入了Oracle机制：\n\n> \"to eliminate builder spatial reasoning as a confound, the builder's observation is augmented with a restricted set of oracle-verified or 'ground-truth' candidate moves per turn... This preserves the full pragmatic inference requirement while attributing performance differences to director communication quality.\"\n\n---\n\n## 3. 试错历程\n\n### 意外困难与调整\n\n论文中虽然没有明确标题为\"试错\"的章节，但通过分析实验结果，可以识别出几个关键的调整过程：\n\n**困难一：边界模型表现意外差**\n\n作者原本可能预期边界模型会优于开放权重模型，但结果相反：\n\n> \"Among frontier models, Gemini-3-Flash leads all 15 models at 0.675 progress while GPT-4.1-Mini (0.312), Claude-Sonnet-4.6 (0.285), and both Gemini-Flash variants (0.257) fall below the majority of open-weight models.\"\n\n这迫使作者深入分析原因，最终发现了\"纠正螺旋\"现象。\n\n**困难二：个体沟通质量与任务成功的负相关**\n\n> \"frontier models score higher on spatial grounding (0.829 ± 0.036 vs 0.658 ± 0.069) and message calibration (0.642 ± 0.067 vs 0.502 ± 0.024), yet achieve lower task progress (0.387 vs 0.525).\"\n\n这个反直觉的发现需要新的解释机制——作者通过中介分析（mediation analysis）揭示了remove gap的中介作用。\n\n**困难三：纠正螺旋的识别**\n\n> \"Correction spirals as a behavioral signature of communication failure. Figure 5 plots the evolution of builder remove actions across turns against oracle-prescribed remove actions... Low-performing models diverge in the opposite direction: Qwen-32B over-removes from the earliest turns (attempted remove rate 44.8% vs. oracle near zero, gap=+0.374), and frontier models such as GPT-4.1-Mini and Gemini-3.1-Flash-Lite show over-removal beginning at turn 1–3, before any board errors have accumulated—indicating that over-removal is a proactive director communication pattern rather than a reactive response to mistakes.\"\n\n作者发现，边界模型的导演们在游戏早期就表现出过度移除的倾向，这是一种**主动的沟通模式**而非对错误的被动反应。\n\n### 产生的子问题\n\n这些发现催生了新的子问题：\n\n1. **如何量化\"纠正螺旋\"？** → 作者定义了remove gap指标\n2. **为什么高能力模型会产生更多纠正指令？** → 发现与\"独特视角利用\"（MM5）相关\n3. **如何区分个体失败与集体失败？** → PS评判器专门评估集体层面的充分性\n\n---\n\n## 总结\n\n这篇论文的核心价值在于揭示了**个体能力与集体协作之间的深刻解离**。作者通过构建一个精心设计的多智能体部分信息协作任务，证明了一个反直觉的结论：更强的个体推理能力不仅无法自动转化为更好的协作，反而可能因为过度自信的\"纠正倾向\"而损害集体表现。这一发现对于当前盲目追求更大模型的多智能体系统设计具有重要的警示意义。",
                    "methodology": "# CRAFT 方法论讲解\n\n这篇论文提出的 CRAFT 是一个多智能体协作基准测试，用来评估大语言模型在**部分信息下的实用通信能力**。下面我用大白话把这个系统的工作流程讲清楚。\n\n---\n\n## 核心任务设定\n\n**背景**：三个\"导演\"智能体（Director）各自只能看到目标3D结构的**一个侧面**（2D投影），它们需要通过自然语言指挥一个\"建造者\"（Builder）智能体来搭建出完整的目标结构。\n\n**难点**：没有任何一个导演能看到全貌，它们必须把自己独有的信息告诉建造者，同时还要理解其他导演已经说了什么。\n\n---\n\n## 方法论拆解\n\n### 第一步：生成目标3D结构\n\n**输入**：\n- 一个3×3的网格，每个位置可以堆叠最多3层方块\n- 方块有5种颜色（绿、蓝、红、黄、橙），每种颜色有\"小方块\"和\"大方块\"（占两个相邻格子，类似多米诺骨牌）两种尺寸\n\n**操作**：\n- 程序化生成目标结构：先给每个网格位置分配高度（哪些位置需要3层，哪些需要1-2层），然后逐层填充方块\n- 随机决定哪些位置放大方块（大方块会同时占据两个相邻格子）\n\n**输出**：一个完整的3D目标结构，包含每个位置每一层应该放什么颜色和尺寸的方块\n\n**目的**：为后续测试提供一个客观的\"正确答案\"，用来评估智能体的工作成果\n\n---\n\n### 第二步：分配导演的私有视角\n\n**输入**：上一步生成的目标3D结构\n\n**操作**：\n- D1（左侧导演）：只能看到左墙（x=0的三列格子），从左到右投影\n- D2（对面导演）：只能看到前墙（y=0的三行格子），从左到右投影  \n- D3（右侧导演）：只能看到右墙（x=2的三列格子），从左到右投影\n\n**关键细节**：\n- 同一个大方块，从不同导演的视角看可能显示为不同尺寸（如果只看到一半）\n- 三个视角只在(0,0)位置有重叠，这是唯一的公共锚点\n\n**输出**：每个导演收到一份私有目标视图，只包含自己能看到的那些格子\n\n**目的**：制造信息不对称——这是协作难度的根源，每个导演都必须把自己独有的信息告诉别人\n\n---\n\n### 第三步：导演生成指令（多轮通信）\n\n**输入**（每个导演每轮收到）：\n- 自己的私有目标视图\n- 当前棋盘状态（已经搭了哪些方块）\n- 对话历史（之前所有导演说过的话）\n- 自己的人格设定（从四类中选择： assertive、cautious、observant、skeptical）\n\n**操作**（每个导演每轮执行）：\n1. **私有推理**（think块）：对比自己的目标视图和当前棋盘，找出缺了什么、多了什么、什么放错了\n2. **生成公共消息**（message块）：把推理结果转换成自然语言指令，说给建造者和其他导演听\n\n**关键设计**：\n- 私有推理可以很长、很详细\n- 公共消息必须简洁、只说别人需要知道的信息\n- 这模拟了人类\"心里想一套，嘴里说一套\"的实用推理\n\n**输出**：每个导演输出一个结构化响应，包含 `<analysis>`（私有推理）和 `<message>`（公共指令）\n\n**目的**：测试模型是否能把\"我知道什么\"转化为\"我应该告诉别人什么\"，这正是实用通信的核心能力\n\n---\n\n### 第四步：建造者执行动作\n\n**输入**：\n- 当前棋盘状态\n- 所有导演的公共消息（这一轮的）\n- **oracle候选动作**（这是关键！）\n\n**操作**：\n- oracle候选是系统预先算好的\"正确动作\"——在当前棋盘状态下，哪些动作确实能让结构更接近目标\n- 建造者从最多5个oracle候选中选择一个，或者自己推断一个动作\n- 执行 PLACE（放方块）、REMOVE（移除方块）或 CLARIFY（请求澄清）\n\n**关键设计**：\n- 建造者不是自由发挥，而是从oracle候选中选择\n- 这相当于给建造者提供了一个\"作弊小抄\"，让它不会因为自己空间推理能力差而犯错\n- 这样就能把\"通信问题\"和\"执行问题\"分开\n\n**输出**：一个具体的动作，作用于游戏引擎，更新棋盘状态\n\n**目的**：将通信质量（导演说得好不好）从执行能力（建造者做得好不好）中解耦出来\n\n---\n\n### 第五步：LLM评判者评估通信质量\n\n**输入**：\n- 每轮的导演私有推理（think块）\n- 每轮的导演公共消息（message块）\n- 当前棋盘状态和oracle候选\n- 对话历史\n\n**操作**：用三个独立的LLM评判者来打分\n\n1. **空间 grounding 评判（SG）**：只看导演的私有推理部分\n   - 问7个问题：是否正确识别缺失方块？是否说对了层级？是否搞清楚了方块大小？\n   - 诊断\"基础说话者失败\"（F1）——导演自己推理就错了\n\n2. **心智建模评判（MM）**：只看导演的公共消息，结合其他导演的话\n   - 问8个问题：是否说了别人已经说过的？是否利用了自己独有的视角？是否承认了冲突？\n   - 诊断\"ToM listener失败\"（F2）——导演没考虑到别人知道什么\n\n3. **实用充分性评判（PS）**：看所有导演的消息 collectively\n   - 问6个问题： collectively是否足以让建造者定位到正确位置？是否说清楚了颜色和大小？\n   - 诊断\"群体通信失败\"——每个人单独说得还行，但 collectively 不够\n\n**输出**：每个评判问题得到 Yes/No/Unclear，汇总成0-1之间的分数\n\n**目的**：把\"为什么没成功\"拆解成不同层面的原因，而不是笼统地说\"这个模型不行\"\n\n---\n\n### 第六步：计算任务指标\n\n**输入**：最终棋盘状态 vs 目标结构\n\n**操作**：计算四个指标\n- **IoU**（交并比）：每个位置的方块集合与目标的交集/并集\n- **Completion**（完成度）：每一层都完全正确才算对\n- **Position Accuracy**（位置准确度）：每个位置的方块集合对就行，不管顺序\n- **Progress**（综合进度）：上述三者的平均\n\n**输出**：一个0-1之间的进度分数\n\n**目的**：量化任务成功程度\n\n---\n\n## 总结\n\nCRAFT 这套方法的核心思路是：\n\n1. **制造信息不对称**：三个导演各看一面，必须通信才能完成\n2. **分离通信与执行**：用oracle候选帮建造者执行，把问题聚焦在导演的通信上\n3. **多维度诊断**：用三个LLM评判者分别看推理质量、消息质量和群体效果\n4. **理论框架**：把问题形式化为\"多发送者有界实用说话者\"，从Rational Speech Acts理论找依据\n\n这套方法回答的核心问题是：**当大语言模型需要在部分信息下协作时，它们会怎么失败？**",
                    "additional_insights": "1. **反直觉发现：模型规模与性能倒挂**  \n   论文发现 frontier models（如 GPT-4o、Claude-Sonnet-4.6）并不优于小的 open-weight models（Mistral-7B、Qwen-7B），反而更差。Gemini-3-Flash（0.675 progress）远超 Claude-Sonnet-4.6（0.285），而 Mistral-7B（0.631）也优于大多数 frontier models。\n\n2. **反直觉发现：高质量沟通反而导致更差结果**  \n   GPT-4.1-Mini 拥有最高的空间 grounding（SG=0.937）和 mind modeling（MM=0.787）分数，却只达到 0.312 的最低 progress。相关性分析显示 SG 和 MM 与 progress 呈负相关（r=-0.273 到 -0.619）。\n\n3. **关键分析：remove gap 是性能下降的核心中介**  \n   作者通过 mediation analysis 发现：directors 过度利用 unique perspective（MM5）导致更多 correction-oriented 指令，引发 over-removal（remove gap），进而消耗 turn budget 而非推进任务。Remove gap 单独解释 60.9% 的 progress 方差，而 MM5 通过 remove gap 的间接效应占主导（部分相关 r=-0.247, p=0.374 不显著）。\n\n4. **新认知：correction spirals 行为模式**  \n   论文识别出一种系统性的失败模式：directors 在遇到信息不对称时反复发出 remove 指令，但指定错误的 layer（如指定 layer 0 而正确位置是 layer 1），导致连续多 turn 零 progress。Qwen-32B 在结构 001 上出现 T10-T14 的死锁，oracle 推荐 placement 但 directors 坚持错误的 remove。\n\n5. **LLM grader 的诊断价值有限**  \n   实验表明 SG 和 MM 分数在成功和失败的 turn 上几乎相同（成功 turn: SG≈0.70, MM≈0.50；失败 turn: SG≈0.68, MM≈0.48），只有 Pragmatic Sufficiency（PS）分数能区分两者。这说明评估 individual communication quality 不足以预测 collaborative outcome。\n\n6. **实用经验：oracle-assisted builder 的必要性**  \n   论文采用 oracle-verified candidate moves 注入 builder prompt，消除 execution 错误对 credit assignment 的混淆，使性能差异能直接归因于 director communication quality。这为后续多智能体系统的 credit assignment 研究提供了方法论参考。\n\n7. **局限性中的机会：异构模型协作**  \n   作者指出实验使用同构 directors（所有 directors 用同一模型），未来可探索混合 open/proprietary models 的协作，这可能揭示不同 alignment 算法和预训练数据对 coordination 的影响。\n\n8. **局限性中的机会：多模态输入**  \n   论文仅用文本设置，未考虑 multimodal models 直接接收视觉输入。未来的多模态 LLM 是否能改善 spatial grounding 并转移到 multi-agent coordination 是开放问题。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：无具体证据。这篇论文提出了一个新的benchmark（CRAFT），但输入材料中没有提供任何关于该研究被引用、讨论或引起研究社区关注的证据。\n\n**负面证据或缺失**：\n- 这是一个相对小众的子领域（多智能体协作+部分信息+实用通信）\n- 输入材料没有说明这个benchmark是否已被其他研究采用\n- 没有证据表明研究社区会因此改变研究方式\n\n**判断**：弱\n\n**理由**：虽然任务设定涉及大语言模型这一热门领域，但具体的\"部分信息下多智能体实用通信\"问题目前仍是一个狭窄的子方向，输入材料中没有提供该工作引发广泛关注的证据。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 输入材料明确指出\"Prior work has studied pragmatic understanding in controlled reference games, typically in dyadic settings, but does not test whether models can produce effective communication in multi-agent, partially observable settings\"\n- 这是首个专门针对多智能体、部分信息、3D构建场景的benchmark\n\n**负面证据或缺失**：\n- 实用通信（pragmatic communication）的研究在LLM出现前就已存在\n- 部分信息下的协作也不是全新问题\n\n**判断**：中等\n\n**理由**：论文确实填补了一个特定空白（多智能体+部分信息+3D构建），但这个组合的创新更多是场景设计而非核心方法论突破。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- 大语言模型多智能体系统是当前AI研究热点\n- 输入材料提到\"LLM agents have evolved from single-turn assistants to components of multi-agent systems\"\n- 实用通信能力被认为是\"missing capability\"\n\n**负面证据或缺失**：\n- 输入材料没有提供该子领域的成熟度分析\n- 无法判断是\"恰到好处\"还是\"已经过热\"\n\n**判断**：中等\n\n**理由**：从背景描述看，这个问题确实处于上升期，但输入材料没有提供足够信息来判断时机是否最佳。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 明确挑战了\"模型规模越大性能越好\"的假设（\"frontier models并不优于小的open-weight models\"）\n- 挑战了\"高质量沟通必然带来好结果\"的直觉（GPT-4.1-Mini有最高SG和MM分数，却达到最低progress）\n\n**负面证据或缺失**：\n- 这些发现本质上是描述性的（\"发现了什么\"），而非对现有理论范式的系统性挑战\n- 没有提出替代性的理论框架\n\n**判断**：中等\n\n**理由**：论文确实发现了反直觉的现象，但这更像是\"观察报告\"而非对某个被盲目沿用的做法的系统性质疑。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：输入材料明确提供了核心洞见——\"当大语言模型需要在部分信息下协作时，它们会怎么失败\"\n\n**判断**：中等\n\n**理由**：核心问题清晰，但更像是\"定义问题\"而非\"给出答案\"。洞见是\"模型会失败\"，但具体机制（remove gap、correction spirals）更像是实验发现而非先验洞见。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 技术路线已经完成（benchmark构建、实验、评估框架）\n- 论文已经发表，说明可行性已验证\n\n**负面证据或缺失**：\n- 输入材料提到\"LLM grader的诊断价值有限\"——这说明评估方法本身存在风险\n- \"mediation analysis中MM5通过remove gap的间接效应部分相关r=-0.247, p=0.374不显著\"——统计结论不够稳健\n\n**判断**：中等\n\n**理由**：技术实现可行，但核心发现（MM5→remove gap→progress）的统计支持不够强，存在结论不稳健的风险。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 来自Signal研究组（从GitHub链接推测）\n- 输入材料提到\"Our code can be found at\"——说明有代码资源\n\n**负面证据或缺失**：\n- 输入材料没有提供团队在多智能体或实用通信方面的具体积累\n- 没有说明为什么这个团队适合做这个问题\n\n**判断**：弱\n\n**理由**：输入材料没有提供团队在该特定交叉点上的独特优势或积累的证据。\n\n---\n\n## 综合评价\n\n**判定**：有潜力但有明显短板\n\n**理由**：这篇论文在\"发现反直觉现象\"方面做得不错（模型规模倒挂、高质量沟通导致差结果），提供了一个有价值的benchmark和诊断框架。但存在几个明显短板：(1) 影响力证据不足；(2) 核心发现的统计稳健性有问题（mediation analysis的p值不显著）；(3) 团队优势不明确；(4) 更像是\"描述性研究\"而非\"突破性研究\"。\n\n**最致命的弱点**：mediation analysis的核心结论（MM5通过remove gap影响progress）的统计支持薄弱（p=0.374不显著），这削弱了整个\"关键发现\"的可信度。\n\n**如果要做得更好**：\n1. 加强统计检验的稳健性，或重新分析remove gap的中介作用\n2. 提供更多关于该工作影响力的证据（如被引用、讨论的情况）\n3. 明确团队在该领域的积累和优势\n\n**与Carlini原则的对照**：\n- **最符合**：原则2（关注反直觉现象）——论文明确聚焦于\"模型越大性能越差\"等反直觉发现\n- **最不符合**：原则1（提出全新的问题）——这个问题更像是已有问题的场景延伸，而非真正的新问题",
                    "summary_translation": "## 中文翻译\n\n我们提出了CRAFT，一个用于评估大语言模型在严格部分信息（partial information）条件下语用交际（pragmatic communication）能力的多智能体基准测试（multi-agent benchmark）。在该设定中，具有互补但不完备视角的多个智能体必须通过自然语言进行协调，以构建一个任何单个智能体都无法完全观察到的共享3D结构。我们将这个问题形式化为一个多发送者语用推理任务（multi-sender pragmatic reasoning task），并提供了一个诊断框架，将失败原因分解为空间 grounding（空间定位）、belief modeling（信念建模）和语用交际错误，同时提供了针对前沿模型（frontier models）和开放权重模型（open-weight models）的行为失败模式分类体系。在包含8个开放权重模型和7个前沿模型（包括推理模型reasoning models）的多样化模型集合中，我们发现更强的推理能力并不能可靠地转化为更好的协调表现：较小的开放权重模型经常与前沿系统相当甚至超越它们，而个体通信能力的提升并不能保证成功的协作。这些结果表明，多智能体协调对于当前的语言模型而言仍然是一个根本未解决的挑战。我们的代码可访问于 https://github.com/csu-signal/CRAFT。"

                    "title": "From Logic Monopoly to Social Contract: Separation of Power and the Institutional Foundations for Autonomous Agent Economies",

                    "authors": "Anbang Ruan",
                    "summary": "Existing multi-agent frameworks allow each agent to simultaneously plan, execute, and evaluate its own actions -- a structural deficiency we term the \"Logic Monopoly.\" Empirical evidence quantifies the resulting \"Reliability Gap\": 84.30% average attack success rates across ten deployment scenarios, 31.4% emergent deceptive behavior without explicit reward signals, and cascading failure modes rooted in six structural bottlenecks. The remedy is not better alignment of individual models but a social contract for agents: institutional infrastructure that enforces a constitutional Separation of Power. This paper introduces the Agent Enterprise for Enterprise (AE4E) paradigm -- agents as autonomous, legally identifiable business entities within a functionalist social system -- with a contract-centric SoP model trifurcating authority into Legislation, Execution, and Adjudication branches. The paradigm is operationalized through the NetX Enterprise Framework (NEF): governance hubs, TEE-backed compute enclaves, privacy-preserving data bridges, and an Agent-Native blockchain substrate. The Agent Enterprise Economy scales across four deployment tiers from private enclaves to a global Web of Services. The Agentic Social Layer, grounded in Parsons' AGIL framework, provides institutional infrastructure via sixty-plus named Institutional AE4Es. 143 pages, 173 references, eight specialized smart contracts.",
                    "category": "cs.AI",
