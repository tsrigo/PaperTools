                    "summary": "Large Language Models are being increasingly deployed as the decision-making core of autonomous agents capable of effecting change in external environments. Yet, in conversational benchmarks, which simulate real-world customer-centric issue resolution scenarios, these agents frequently fail due to the cascading effects of incorrect decision-making. These challenges are particularly pronounced for open-source LLMs with smaller parameter sizes, limited context windows, and constrained inference budgets, which contribute to increased error accumulation in agentic settings. To tackle these challenges, we present the Failure-Aware Meta-Agentic (FAMA) framework. FAMA operates in two stages: first, it analyzes failure trajectories from baseline agents to identify the most prevalent errors; second, it employs an orchestration mechanism that activates a minimal subset of specialized agents tailored to address these failures by injecting a targeted context for the tool-use agent before the decision-making step. Experiments across open-source LLMs demonstrate performance gains up to 27% across evaluation modes over standard baselines. These results highlight that targeted curation of context through specialized agents to address common failures is a valuable design principle for building reliable, multi-turn tool-use LLM agents that simulate real-world conversational scenarios.",

                    "filter_reason": "**核心判断**: 这篇论文的本质是**构建和改进LLM智能体**的方法论研究，符合“构建、改进或演化LLM智能体”的核心目标。\n\n**详细分析**:\n\n1. **核心贡献**: 论文提出了FAMA (Failure-Aware Meta-Agentic) 框架，这是一个专门用于改进开源LLM在交互式工具使用环境中表现的元智能体框架。其核心贡献在于:\n   - 分析失败轨迹以识别常见错误模式\n   - 通过专门的修复智能体在决策前注入上下文来纠正错误\n   - 这是一个典型的**智能体架构改进**研究\n\n2. **符合研究范围的理由**:\n   - **单智能体方向**: 论文关注的是如何让工具使用智能体(agentic LLM)在多轮交互中更可靠地决策，涉及决策改进机制\n   - **多智能体方向**: 虽然提到了\"orchestration mechanism\"和\"specialized agents\"，但这并非仅讨论拓扑结构或通信协议，而是提出了一种新的多智能体协作**机制**来解决特定问题——即通过专门的失败修复智能体来辅助主智能体。这属于\"新的协作机制\"范畴\n   - **自我演化**: 论文通过分析失败轨迹并进行针对性改进，体现了智能体通过反馈进行自我完善的机制\n\n3. **不属于排除范围**:\n   - 不是非演化型应用(它提出了新的框架方法，而非仅将现有智能体应用于某领域)\n   - 不是纯推理能力研究(涉及工具使用和决策改进)\n   - 不涉及安全、多模态、图技术等排除项\n\n**结论**: 该论文的核心贡献是构建一个改进LLM智能体在交互环境中表现的框架，属于用户研究范围内的“构建/改进LLM智能体”类别，应予以保留。",
                    "intro_logic": "1. LLMs are increasingly used as the decision-making core of autonomous agents, not only generating text but also selecting actions that can affect external environments.\n\n2. A major application scenario is multi-turn conversational tool use, such as customer-support or enterprise-service agents that must interact with users, follow domain policies, and invoke external APIs/tools.\n\n3. Recent interactive tool-use benchmarks such as τ-bench, τ-trait, and ACEBench show that even strong LLM agents often fail in realistic customer-centric tasks requiring long-horizon reasoning, sustained dialogue management, and structured tool use.\n\n4. The core difficulty is that small decision errors accumulate over long trajectories: an incorrect tool call, misunderstood user intent, missed policy constraint, or misread tool output can cascade into task failure.\n\n5. These trajectories involve heterogeneous context, including domain rules, prior dialogue, tool outputs, ambiguous user requests, evolving task constraints, and sometimes inter-agent interventions, making reliable decision-making difficult.\n\n6. The problem is especially severe for open-source LLMs with smaller parameter counts, limited context windows, and constrained inference budgets, because they are more vulnerable to forgetting, misinterpretation, and context overload.\n\n7. Empirical observations indicate that failures are not uniform: different open-source model backbones exhibit different dominant failure modes, so a single static prompting strategy or fixed agentic scaffold is unlikely to work reliably across models and domains.\n\n8. Existing improvement approaches often rely on task-specific supervised fine-tuning or reinforcement learning, but these are expensive in multi-turn tool-use settings because they require high-quality trajectories, repeated tool-environment execution, and long-horizon credit assignment.\n\n9. Moreover, training-based methods usually optimize for correct behavior in aggregate, rather than explicitly targeting the recurring failure patterns of a particular agent, which limits their ability to correct systematic errors.\n\n10. Training-free techniques such as structured prompting and modular agent orchestration are promising, but they have mostly been studied with strong proprietary models or large-context backbones, leaving smaller open-source tool-use agents relatively underexplored.\n\n11. Large frontier models can hide some of these weaknesses through scale and long context windows, but they may be impractical for real deployment because of cost, latency, and privacy constraints.\n\n12. Small open-source models therefore form an important and realistic testbed: they are deployable under resource constraints, but they expose the fundamental reliability problems of long-horizon tool-using agents more clearly.\n\n13. This motivates a shift from generic agent improvement to failure-aware agent composition: instead of adding more context or more agents indiscriminately, systems should understand which failures are most common and intervene only where needed.\n\n14. Research question: How can we improve the reliability of smaller open-source LLM agents in multi-turn interactive tool-use environments by using observed failure patterns to guide targeted, resource-efficient agentic support?",
                    "core_insight": "## 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**  \n作者的核心洞察是：**多轮 tool-use agent 的失败不是随机噪声，也不能靠“加更多 agent / 更长 prompt / 更强模型”统一解决；相反，失败轨迹中存在 model-specific、domain-specific 的主导 failure modes，应该把这些失败模式本身作为 orchestration signal，用来动态选择最少且最相关的 helper agents，为主 agent 构造 targeted context。**\n\n换句话说，FAMA 的“灵光一闪”不是“agent 会失败”这个背景事实，而是：**失败本身可以被结构化利用，成为 inference-time agent composition 的依据。**\n\n论文中最直接的证据是这几句话：\n\n> “Our experiments (§5.2) show that such errors are heterogeneous: different model backbones, particularly open-source models with limited context windows, exhibit distinct dominant failure modes, indicating that static prompting strategies or agentic scaffolding architectures are insufficient.”\n\n这句话指出：不同 open-source model 的失败模式并不一样，因此不能用一个固定 prompt 或固定 multi-agent scaffold 解决所有问题。\n\n另一句更接近方法论核心：\n\n> “Rather than treating all errors equally, this analysis surfaces the dominant errors that most strongly impact performance.”\n\n也就是说，作者意识到关键不在于枚举所有错误，而在于找出**最影响性能的 dominant errors**。\n\n最能体现 FAMA 设计思想的是：\n\n> “We argue that reliable multi-turn tool use requires failure-aware agent composition.”\n\n以及：\n\n> “By dynamically constructing the agent’s prior context using only the necessary agents, FAMA avoids the overhead of excessive context injection while directly addressing the agent’s most critical shortcomings.”\n\n这几句合在一起，就是整篇论文的 seed insight：  \n**失败分析不是事后 debug，而是可以前置为 meta-agentic orchestration 的决策依据；agent 系统不应静态堆叠模块，而应根据失败类型动态、最小化地组合模块。**\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个洞察直接导向 FAMA 的两阶段方法。其推理链条大致如下：\n\n### Step 1：open-source LLM agent 的主要瓶颈不是单次 tool call，而是 long-horizon failure accumulation\n\n论文指出，多轮 tool-use 环境中，agent 会面对复杂 domain policy、工具输出、用户意图、历史上下文等：\n\n> “A central challenge exposed by tool-use benchmarks is the accumulation of decision-making errors over long trajectories that involve heterogeneous context, including tool outputs, domain rules, inter-agent interventions, ambiguous user intent and evolving task constraints.”\n\n因此，单纯增强单步 tool calling 能力不够，必须关注整个 trajectory 中错误如何累积。\n\n---\n\n### Step 2：错误不是同质的，不同模型和领域有不同 dominant failure modes\n\n作者观察到，不同 open-source model 的失败分布不同。例如有的更容易 Domain Policy Violation，有的更容易 Contextual Misinterpretation，有的更依赖 Memory。论文明确说：\n\n> “different model backbones, particularly open-source models with limited context windows, exhibit distinct dominant failure modes”\n\n这意味着：  \n如果使用固定 prompt、固定 agent set，可能对某些模型有帮助，但对另一些模型反而增加负担。\n\n---\n\n### Step 3：既然失败模式不同，就不能“所有 agent 全上”\n\n作者发现 static multi-agent framework，例如 IRMA 中一次性使用所有 agents，并不稳定：\n\n> “Using all agents leads to inconsistent performance across models.”\n\n以及：\n\n> “while multi-agent frameworks can be beneficial, indiscriminately using all agents does not consistently improve performance across models and can, in some cases, degrade the base agent’s performance.”\n\n这里是从洞察到方法的关键转折：  \n**multi-agent 不是越多越好，helper context 也是一种成本。**\n\n因此问题从“如何设计更多 helper agents”变成了：\n\n> 对于当前模型和当前任务失败类型，应该选择哪些 helper agents，才能以最小 context overhead 修复最主要的问题？\n\n---\n\n### Step 4：先诊断失败，再选择 agent\n\n于是 FAMA 被设计成 two-stage framework。\n\n论文描述：\n\n> “FAMA operates in two stages: first, it analyzes failure trajectories produced by a baseline agent and categorizes errors into a small set of common failure types.”\n\n这些 failure types 包括：\n\n1. **Domain Policy Violation**\n2. **Incorrect Retrieval from Complex Tool Outputs**\n3. **Contextual Misinterpretation and Hallucination**\n4. **Incomplete Fulfillment or Early Stopping**\n\n然后第二阶段：\n\n> “In the second stage, the FAMA framework employs a lightweight routing mechanism consisting of an orchestrator and a mitigation agent that selectively activates a set of specialized LLM helper-agents designed to address these specific weaknesses.”\n\n也就是说，FAMA 把“失败诊断”转化为“agent routing”。\n\n---\n\n### Step 5：Orchestrator 负责定位主因，Mitigation Agent 负责选择最小 agent subset\n\n具体机制是：\n\n1. 先运行 baseline agent，收集 failed trajectories；\n2. 每个 error-analysis agent 针对一种 failure category 判断该失败是否存在；\n3. Orchestrator 综合所有 error-agent 的分析和完整 trajectory，判断主要 failure cause；\n4. Mitigation Agent 根据 failure cause 和 agent pool，选择最合适的 helper agent subset；\n5. 重新执行任务时，只注入这些被选中的 helper agents 的 context。\n\n论文原文：\n\n> “The textual outputs and rationales produced by all error analysis agents are concatenated into a single input and, together with the full interaction trajectory between the user and the tool-calling agent for a given task τ, are passed to the orchestrator agent for final failure attribution.”\n\n然后：\n\n> “conditioned on the error categories identified by the orchestrator agent and the functional definitions of agents in A, a dedicated mitigation agent determines an efficient subset of agents A* ⊆ A that can mitigate a specific error category e.”\n\n这就是从 seed insight 到 FAMA 方法的完整桥梁：  \n**失败模式 → failure attribution → mitigation mapping → minimal helper-agent composition → targeted context injection。**\n\n---\n\n## 3. 试错历程：遇到的困难、调整与新子问题\n\n论文没有以“研发日志”的形式直接讲作者最初怎么失败、后来怎么改，但从实验、ablation 和分析中可以清楚看出他们经历了几个关键调整。\n\n---\n\n### 3.1 最初直觉：“多 agent 应该更强”；实际发现：“全用 agent 反而不稳定”\n\n一个自然起点是：既然 helper agents 能帮助 tool-use agent，那是否直接把所有 agents 都加进去？这类似 IRMA 的思路。\n\n但作者发现这样并不可靠：\n\n> “Using all agents leads to inconsistent performance across models.”\n\n更明确地说：\n\n> “IRMA outperforms other baselines in a limited number of cases, indicating that while multi-agent frameworks can be beneficial, indiscriminately using all agents does not consistently improve performance across models and can, in some cases, degrade the base agent’s performance.”\n\n这显然是一个意料之外的困难：  \n**更多 context、更丰富 agent 并不必然提升性能，尤其对 open-source LLM 来说，额外 context 可能造成干扰、遗忘、token pressure 或决策混乱。**\n\n因此，FAMA 从“static all-agent orchestration”调整为“dynamic minimal-agent orchestration”。\n\n---\n\n### 3.2 新子问题一：如何知道失败到底属于哪一类？\n\n一旦不再“所有 agent 全上”，就必须知道当前失败由什么造成。于是出现了新的子问题：**failure attribution**。\n\n这并不简单，因为 agent 有时会犯错后恢复，不能只看某一个错误动作。论文特别提到：\n\n> “This process explicitly accounts for cases in which an agent may initially make incorrect decisions but later recover after receiving feedback from the environment, ensuring that failure attribution reflects the overall trajectory rather than isolated errors.”\n\n因此 FAMA 不能只做 local error detection，而必须分析完整 trajectory。  \n这催生了 error-analysis agents + orchestrator 的设计。\n\n---\n\n### 3.3 新子问题二：failure category 与 helper agent 如何对应？\n\n诊断出失败类型后，还要决定用哪个 agent 修复。例如：\n\n- Domain Policy Violation 可能需要 **Domain Constraints Extractor Agent, DCE**\n- Contextual Misinterpretation 或 Incomplete Fulfillment 可能需要 **Memory module**\n- Complex Tool Output 错误可能需要 **Tool Output Reformulator, TOR**\n- ACEBench 中复杂步骤执行可能需要 **Planner** 和 **Verifier**\n\n这就是 Mitigation Agent 的作用。论文说：\n\n> “a dedicated mitigation agent determines an efficient subset of agents A* ⊆ A that can mitigate a specific error category e.”\n\n这一步本质上把“failure diagnosis”转化为“agent selection”。\n\n---\n\n### 3.4 新子问题三：Memory 不是越大越好，而是 domain-dependent\n\n作者还发现 Memory module 很关键，但 memory size 本身需要调节。论文中说：\n\n> “the mitigation agent strongly recommends the Memory module and the DCE agent, confirming that memory is a critical bottleneck for open-source agents.”\n\n但 memory 的大小不是固定最优。ablation 显示：\n\n> “the optimal memory size is domain-dependent rather than model-dependent.”\n\n具体来说：\n\n> “the Retail domain, which involves longer and more complex user–agent interactions, benefits from a larger memory size, with k = 6 achieving the best performance, whereas the Airline domain attains optimal results with a smaller memory size of k = 2.”\n\n这说明作者在实现 FAMA 时遇到了一个更细的设计问题：  \n**即使选中了 Memory module，也必须决定保留多少 recent user queries。**\n\n这进一步强化了 FAMA 的核心思想：context 需要被 carefully curated，而不是盲目增加。\n\n---\n\n### 3.5 新子问题四：thinking models 看似更强，但在 agentic setting 中会触发 token overflow\n\n另一个意外发现是 reasoning / thinking 模型并不一定适合多轮 tool-use。作者本来可以用 thinking variants 来增强 reasoning，但发现它们消耗太多 token：\n\n> “such models consume a substantial portion of their token budget in the internal reasoning process, which introduces token limit constraints when deployed within agentic frameworks.”\n\n在实验中：\n\n> “they incur higher token usage and frequently lead to context window overflows in multi-turn settings, where accumulated reasoning traces consume a significant portion of the available token budget.”\n\n这说明 open-source agent 的问题不只是“不会推理”，还包括**推理痕迹本身占用 context budget**。  \n因此 FAMA 的方案不是依赖更长 chain-of-thought，而是通过 targeted helper agents 提供更压缩、更任务相关的 context。\n\n---\n\n### 3.6 新子问题五：如何证明不是 judge model 偏差？\n\nFAMA 中使用 judge / orchestrator agent 分析失败，因此一个潜在质疑是：这些判断是否依赖某个 frontier model？\n\n作者为此做了额外实验，用 GPT-4.1-mini 替代 GPT-4o，发现结论一致：\n\n> “Different judgment models produce the same decisions.”\n\n以及：\n\n> “the alternative judgment model identifies Contextual Misinterpretation (CM) and Domain Constraint Violation (DCV) as the primary failure modes of open-source models.”\n\n这说明他们意识到 FAMA 的 failure analysis 可能受到 judge model 影响，于是通过替换 judgment model 来验证 robustness。\n\n---\n\n### 3.7 新子问题六：不同 benchmark 需要扩展 agent pool\n\n在 τ-bench / τ-trait 中，主要使用 Memory、DCE、TOR、TSA 等 agents。  \n但到了 ACEBench，base agent 的限制不同：\n\n> “For ACE-Bench, we additionally include a Planner Agent and a Verifier Agent, as the base agent in ACE-Bench is unable to generate free-form text and can only invoke tools with their input arguments.”\n\n这说明 FAMA 虽然是通用框架，但实际落地时需要根据 benchmark / environment 扩展 agent pool。  \n这也对应论文 Limitations 中承认的限制：\n\n> “FAMA operates over a predefined pool of specialized agents inherited from the underlying agentic framework.”\n\n以及：\n\n> “FAMA’s effectiveness is bounded by the coverage of this agent pool: failure modes that are not well captured by existing agents may not be adequately mitigated.”\n\n所以，作者在实现中遇到的一个结构性限制是：  \n**FAMA 可以动态选择 agent，但不能自动发明新的 agent。**\n\n这成为 future work 的方向。\n\n---\n\n## 总结\n\n这篇论文真正的“灵光一闪”可以概括为：\n\n> **不要把 agent 失败仅仅看作 evaluation result，而要把失败轨迹转化为 orchestration signal；通过识别 dominant failure modes，动态选择最小 helper-agent subset，为 open-source tool-use agent 构造 targeted context。**\n\n它的创新点不在于提出某个单独的 helper agent，而在于提出了一个 meta-agentic 视角：  \nFAMA 本身不直接执行任务，而是观察 agent 如何失败、诊断失败原因、再决定应该给原 agent 什么样的辅助上下文。\n\n论文自己也这样定义这一点：\n\n> “This design motivates our use of the term ‘meta-agentic’, as the proposed system does not act in the environment directly, but operates at a higher level by reasoning over agent behaviors, diagnosing their failures, and dynamically composing a minimal set of specialized agents to shape the decision-relevant context of the underlying tool-use agent.”",
                    "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的做法是：**先看一个工具调用 Agent 经常在哪些地方失败，再只给它加上最相关的少数几个辅助模块，而不是固定地把所有辅助模块都塞进去。**\n\n---\n\n# 1. 这篇论文到底在做什么？\n\n这篇论文研究的是多轮工具调用场景里的 LLM Agent。\n\n场景大概是：\n\n- 用户提出需求，比如退货、改机票、发短信、查询套餐；\n- Agent 需要和用户多轮对话；\n- Agent 需要调用外部工具/API；\n- Agent 必须遵守领域规则，比如退货政策、航班改签规则、医疗预约规则；\n- 最后看 Agent 有没有真正完成任务。\n\n论文发现，开源模型，尤其是 4B、14B、32B、72B 这类模型，在这种环境里经常失败。失败原因不是单一的，而是包括：\n\n1. 忘了领域规则；\n2. 看错工具返回结果；\n3. 误解用户意图；\n4. 做到一半就停了；\n5. 上下文太长导致信息丢失；\n6. 辅助 Agent 太多导致上下文更乱。\n\n所以作者提出 FAMA：**Failure-Aware Meta-Agentic Framework**。\n\n这里不用被名字吓到，它本质上就是：\n\n> 先收集失败案例，分析主要失败原因，然后选择几个最能修这个错误的辅助 Agent，最后让主 Agent 带着这些辅助信息重新做任务。\n\n它不是训练模型，也不是改模型参数，而是一个**推理阶段的调度框架**。\n\n---\n\n# 2. 方法按照执行顺序拆解\n\n## 第一步：准备一组可用的辅助 Agent\n\n### 输入\n\n系统一开始有一组提前写好的辅助 Agent 或模块，包括：\n\n1. **DCE，Domain Constraints Extractor**\n   - 领域规则提取 Agent。\n   - 作用是从长长的政策说明里抽出当前任务相关的规则。\n\n2. **TSA，Tool Suggestion Agent**\n   - 工具建议 Agent。\n   - 作用是建议下一步可能该调用哪个工具。\n\n3. **TOR，Tool Output Reformulator**\n   - 工具输出改写 Agent。\n   - 作用是把复杂的工具返回结果整理得更清楚。\n\n4. **Planner Agent**\n   - 规划 Agent。\n   - 作用是生成接下来应该做哪些步骤。\n\n5. **Verifier Agent**\n   - 检查 Agent。\n   - 作用是检查当前动作是否合理，是否漏做了什么。\n\n6. **Memory Module**\n   - 记忆模块。\n   - 作用是保留最近若干轮用户请求，防止主 Agent 忘记用户前面说过什么。\n\n### 操作\n\n论文不是让所有任务都固定使用这些模块，而是先把它们放进一个候选池里。\n\n也就是说，FAMA 后面会从这些模块里挑一部分，而不是全部都用。\n\n### 输出\n\n得到一个候选辅助 Agent 集合：\n\n\\[\nA = \\{DCE, TSA, TOR, Planner, Verifier, Memory\\}\n\\]\n\n### 目的\n\n这一步是为了让系统有“可选择的修复手段”。\n\n论文的核心问题是：  \n开源模型会犯不同类型的错误，不同模型、不同领域的主要错误也不一样。  \n所以不能所有情况都用同一套辅助模块。\n\n### 如果不做会怎样\n\n如果没有这个候选池，后面即使知道 Agent 为什么失败，也没有具体模块可以拿来修。\n\n---\n\n## 第二步：定义常见失败类型\n\n### 输入\n\n作者根据已有工作和自己的实验，整理了工具调用 Agent 常见的失败类型。\n\n主要有四类：\n\n1. **Domain Policy Violation，领域规则违反**\n   - Agent 做了规则不允许的事，或者跳过了规则要求的步骤。\n\n2. **Wrong Retrieval from Complex Tool Outputs，复杂工具输出读取错误**\n   - 工具返回了正确信息，但 Agent 看错、漏看、数错、选错了。\n\n3. **Contextual Misinterpretation and Hallucination，上下文误解或幻觉**\n   - Agent 没理解用户真正想干什么，或者自己编造了不存在的信息。\n\n4. **Incomplete Fulfillment or Early Stopping，任务没做完或过早停止**\n   - 用户有多个要求，但 Agent 只完成了一部分，或者遇到困难后不继续尝试。\n\n### 操作\n\n作者为每一类错误写了更细的判断标准。\n\n比如领域规则违反包括：\n\n- 做了政策明确禁止的操作；\n- 跳过了政策明确要求的步骤；\n- 没满足前置条件就执行；\n- 编造用户或工具没提供的信息。\n\n### 输出\n\n得到一个错误类别集合：\n\n\\[\nE = \\{DCV, WRCO, CM, IFU\\}\n\\]\n\n其中：\n\n- DCV = Domain Constraint Violation；\n- WRCO = Wrong Retrieval from Complex Outputs；\n- CM = Contextual Misinterpretation；\n- IFU = Incomplete Fulfillment。\n\n### 目的\n\n这一步是为了让失败分析变得可操作。\n\n如果只说“Agent 失败了”，后面没法知道该加哪个模块。  \n必须先知道它是因为忘规则失败，还是因为看错工具输出失败，还是因为没记住用户需求失败。\n\n### 如果不做会怎样\n\n如果没有错误分类，系统只能盲目加模块，容易变成 IRMA 那种“所有模块都加”，结果上下文变长、成本变高、效果还不稳定。\n\n---\n\n## 第三步：先跑一个基础 Agent，收集失败轨迹\n\n### 输入\n\n输入包括：\n\n1. 一个任务集合，比如 τ-bench、τ-trait、ACEBench 中的任务；\n2. 一个基础工具调用 Agent，比如 ReAct 或 Function Calling；\n3. 用户模拟器；\n4. 工具环境；\n5. 领域政策和工具说明。\n\n### 操作\n\n系统先不加 FAMA，只让基础 Agent 正常完成任务。\n\n每个任务跑完后，记录：\n\n- 用户和 Agent 的完整对话；\n- Agent 调用了哪些工具；\n- 工具返回了什么；\n- Agent 最后是否成功。\n\n如果任务失败，就把完整轨迹保存下来。\n\n### 输出\n\n得到一批失败案例：\n\n\\[\nF = \\{(\\tau, \\xi)\\}\n\\]\n\n其中：\n\n- \\(\\tau\\) 是任务；\n- \\(\\xi\\) 是完整交互轨迹。\n\n### 目的\n\n这一步是为了得到真实失败数据。\n\nFAMA 不是提前假设模型会犯什么错，而是先让模型实际跑一遍，然后从失败轨迹里看它到底经常错在哪里。\n\n这对应 Introduction 里的核心痛点：  \n开源模型在长对话工具调用中会不断积累错误，而且不同模型的主要错误不一样。\n\n### 如果不做会怎样\n\n如果不先收集失败轨迹，后面的模块选择就没有依据，只能靠人工猜或者固定配置。\n\n---\n\n## 第四步：让多个错误分析 Agent 分别检查失败原因\n\n### 输入\n\n对于每一个失败任务，系统拿到：\n\n1. 完整失败轨迹；\n2. 四类错误定义；\n3. 每类错误的判断标准。\n\n### 操作\n\nFAMA 会让多个错误分析 Agent 分别检查同一条失败轨迹。\n\n每个分析 Agent 只负责一种错误。\n\n比如：\n\n- DCV 分析 Agent 只判断有没有违反领域规则；\n- WRCO 分析 Agent 只判断有没有看错工具输出；\n- CM 分析 Agent 只判断有没有误解用户意图；\n- IFU 分析 Agent 只判断有没有没做完任务。\n\n每个分析 Agent 输出：\n\n- 是否存在这种错误；\n- 为什么这么判断。\n\n### 输出\n\n得到多份错误分析结果，例如：\n\n```json\n{\n  \"error_type\": \"Domain Policy Violation\",\n  \"violation\": \"Yes\",\n  \"rationale\": \"Agent skipped required user confirmation before processing return.\"\n}\n```\n\n### 目的\n\n这一步是为了避免一个判断器同时看所有错误时遗漏问题。\n\n工具调用失败通常不是单点错误。  \n一个轨迹里可能同时出现：\n\n- 先误解用户；\n- 后面又违反规则；\n- 最后还提前结束。\n\n所以 FAMA 先让不同分析器分别查不同问题。\n\n### 如果不做会怎样\n\n如果直接让一个 Agent 判断所有失败原因，容易只看到表面错误，漏掉真正导致最终失败的原因。\n\n---\n\n## 第五步：Orchestrator Agent 判断主要失败原因\n\n### 输入\n\nOrchestrator Agent 拿到：\n\n1. 原始失败轨迹；\n2. 第四步中所有错误分析 Agent 的输出；\n3. 每个错误分析 Agent 的理由。\n\n### 操作\n\nOrchestrator 会综合判断：\n\n- 哪些错误真的导致了最终失败；\n- 哪些错误只是中间出现过但后来被修正了；\n- 最主要的失败原因是哪一个或哪几个。\n\n论文特别强调一点：  \nAgent 有时会先犯错，但后面通过工具反馈或用户反馈纠正了。  \n这种中间错误不应该被算成最终失败主因。\n\n所以 Orchestrator 不是简单数错误，而是看完整轨迹的因果关系。\n\n### 输出\n\n得到该失败任务的主要错误类别，比如：\n\n```json\n{\n  \"root_cause_analysis\": \"The primary root cause is Domain Constraint Violation.\"\n}\n```\n\n或者多个错误：\n\n```json\n{\n  \"main_errors\": [\"Contextual Misinterpretation\", \"Incomplete Fulfillment\"]\n}\n```\n\n### 目的\n\n这一步是为了从“可能出现的错误”中找出“真正需要修的错误”。\n\n这是 FAMA 和普通失败分析的关键区别。  \n它不是只做错误标注，而是为后面的模块选择服务。\n\n### 如果不做会怎样\n\n如果跳过这一步，系统可能会根据无关错误选择辅助模块，导致上下文变长但没有解决真正问题。\n\n---\n\n## 第六步：Mitigation Agent 选择最合适的辅助模块\n\n### 输入\n\nMitigation Agent 拿到：\n\n1. Orchestrator 判断出的主要错误类别；\n2. 可用辅助 Agent 的功能说明；\n3. 失败轨迹；\n4. 模型和领域信息。\n\n### 操作\n\nMitigation Agent 根据错误类型选择最小的辅助模块集合。\n\n例如：\n\n- 如果主要错误是领域规则违反，就选择 DCE；\n- 如果主要错误是忘记用户之前的要求，就选择 Memory；\n- 如果主要错误是任务步骤混乱，就选择 Planner；\n- 如果主要错误是动作没检查，就选择 Verifier；\n- 如果主要错误是工具输出复杂，就可能选择 TOR。\n\n重点是：  \n它不是把所有模块都选上，而是只选当前最有用的几个。\n\n### 输出\n\n得到一个推荐模块集合：\n\n\\[\nA^* \\subseteq A\n\\]\n\n比如：\n\n```json\n{\n  \"agent_list\": [\"Domain Constraints Extractor\", \"Memory\"]\n}\n```\n\n### 目的\n\n这一步是为了解决两个问题：\n\n1. **开源模型上下文窗口有限**\n   - 如果把所有辅助 Agent 的输出都塞进去，会占用大量上下文。\n\n2. **无关辅助信息会干扰主 Agent**\n   - IRMA 这类方法把所有模块都用上，结果有时性能下降。\n\n论文实验显示，IRMA 的 token overhead 明显更高：\n\n- 在 τ-airline 上，IRMA 额外 token 开销约 50%，FAMA 约 30%；\n- 在 τ-retail 上，IRMA 额外 token 开销约 58%，FAMA 约 29.7%。\n\n延迟也更高：\n\n- τ-airline 上，Qwen3-32B：\n  - IRMA 平均 149.78 秒；\n  - FAMA 平均 91.12 秒。\n- τ-retail 上：\n  - IRMA 平均 111.62 秒；\n  - FAMA 平均 56.73 秒。\n\n### 如果不做会怎样\n\n如果不做模块选择，就会退化成“所有辅助模块都用”，上下文更长、成本更高，而且性能不一定更好。\n\n---\n\n## 第七步：重新执行任务，只启用选中的辅助模块\n\n### 输入\n\n现在系统拿到：\n\n1. 原始任务；\n2. 主工具调用 Agent；\n3. Mitigation Agent 选出的辅助模块集合；\n4. 当前对话上下文；\n5. 工具返回结果；\n6. 领域规则。\n\n### 操作\n\n每当主 Agent 要做决策之前，FAMA 会让被选中的辅助模块先生成一些有用信息。\n\n例如在 τ-bench 中，如果选择了 DCE + Memory：\n\n- Memory 提供最近 k 轮用户请求；\n- DCE 提供当前任务相关的领域规则；\n- 主 Agent 再基于这些信息决定下一步调用什么工具。\n\n在 ACEBench 中，如果选择了 Planner + Verifier：\n\n- Planner 先列出接下来要做的步骤；\n- 主 Agent 执行工具调用；\n- Verifier 检查这一步是否正确；\n- 如果不正确，提示重新检查或修正。\n\n### 输出\n\n得到增强后的工具调用轨迹，以及最终任务是否成功。\n\n### 目的\n\n这一步是最终使用 FAMA 的地方。\n\n它的目标是：\n\n- 不训练模型；\n- 不换更大的模型；\n- 只通过更合适的上下文，让主 Agent 做出更少错误的决策。\n\n### 如果不做会怎样\n\n如果只做失败分析但不重新执行，就不会产生任何性能提升。\n\n---\n\n# 3. FAMA 和之前方法的差别\n\n论文主要和三类方法比较：\n\n## 1. Function Calling，直接函数调用\n\n主模型直接选择工具和参数。\n\n问题是：  \n它缺少显式推理和纠错机制，在多轮复杂任务中容易失败。\n\n---\n\n## 2. ReAct\n\nReAct 是一种让模型交替进行“思考”和“行动”的方法。\n\n它比直接函数调用更强，但问题是：  \n它仍然主要依赖主模型自己理解规则、记住上下文、处理工具输出。\n\n开源模型能力有限，所以长任务中还是容易出错。\n\n---\n\n## 3. IRMA\n\nIRMA 是一个多辅助 Agent 框架，会对输入做多个角度的改写和增强。\n\n问题是：  \n它基本上倾向于把一整套辅助模块都用上。\n\n论文发现这不稳定：\n\n- 有时有帮助；\n- 有时干扰主 Agent；\n- token 开销大；\n- 容易触发上下文长度问题。\n\nFAMA 的区别是：  \n**不是固定使用所有模块，而是根据失败类型选择少数模块。**\n\n---\n\n# 4. 实验结果说明了什么？\n\n## τ-bench\n\nτ-bench 包括两个领域：\n\n- Airline，航空客服；\n- Retail，零售客服。\n\n论文在多个开源模型上测试：\n\n- Qwen3-4B-Instruct；\n- Qwen3-14B；\n- Qwen3-32B；\n- Qwen2.5-72B-Instruct。\n\nFAMA 在 τ-bench 上整体优于 ReAct、Function Calling 和 IRMA。\n\n论文汇总说：\n\n- Airline 上，FAMA 平均比：\n  - ReAct 高 4.63%；\n  - FC 高 11.57%；\n  - IRMA 高 5.27%。\n\n- Retail 上，FAMA 平均比：\n  - ReAct 高 5.30%；\n  - FC 高 8.96%；\n  - IRMA 高 6.15%。\n\n不过也要注意：  \n不是每一个单独格子里 FAMA 都最高。  \n例如 Qwen3-32B 在 τ-airline 的 pass^1 上 ReAct 是 30.40%，FAMA 是 26.80%。  \n但在更严格的 pass^5 上，FAMA 是 18.00%，ReAct 是 14.00%，FAMA 更稳。\n\n这里的 pass^k 指的是：  \n独立跑 k 次，所有 k 次都成功的概率。  \n所以 pass^5 更强调稳定性。\n\n---\n\n## τ-trait\n\nτ-trait 包括更多带用户性格变化的任务，比如：\n\n- Telehealth；\n- Telecom。\n\nFAMA 也整体表现更稳。\n\n例如 Qwen2.5-72B-Instruct 在 Telecom：\n\n- ReAct pass^5：22.22%；\n- FC pass^5：27.00%；\n- IRMA pass^5：22.22%；\n- FAMA pass^5：39.00%。\n\n这说明 FAMA 在更复杂的用户行为下仍然有效。\n\n---\n\n## ACEBench\n\nACEBench 是另一个多轮工具调用基准。\n\n在 ACEBench 上，FAMA 主要选择 Planner 和 Verifier。\n\n结果也明显提升。\n\n例如 Qwen3-32B：\n\n- ReAct End-to-End Acc：13.3%；\n- FAMA-ReAct End-to-End Acc：30.0%。\n\nQwen2.5-72B-Instruct：\n\n- Base：23.3%；\n- ReAct：36.7%；\n- FAMA-Base：50.0%。\n\n这说明在 ACEBench 里，规划和检查对任务完成帮助很大。\n\n---\n\n# 5. 结合消融实验解释为什么有效\n\n## 5.1 哪个组件贡献最大？\n\n严格说，不存在一个所有任务上都最大的单一组件。\n\n但从论文结果看，贡献最大的设计是：\n\n> **根据失败原因选择模块，而不是固定使用所有模块。**\n\n这是 FAMA 的核心。\n\n证据有三个。\n\n---\n\n### 证据 1：FAMA 比 IRMA 更好\n\nIRMA 使用更多辅助模块，但 FAMA 只选择少数模块。\n\nTable 1 中，FAMA 在 τ-bench 上平均超过 IRMA：\n\n- Airline：高 5.27%；\n- Retail：高 6.15%。\n\n这说明“多加模块”不等于“更好”。\n\n---\n\n### 证据 2：FAMA token 开销更低\n\nTable 2 中，Qwen3-32B：\n\nτ-airline：\n\n- IRMA overhead tokens：1816.7；\n- FAMA overhead tokens：795.3。\n\nτ-retail：\n\n- IRMA overhead tokens：2308.7；\n- FAMA overhead tokens：725.4。\n\n也就是说，FAMA 用更少的辅助信息取得更好或更稳定的结果。\n\n这支持论文的核心动机：  \n开源模型上下文有限，不能无脑塞辅助信息。\n\n---\n\n### 证据 3：替代模块组合不如 FAMA 推荐组合\n\nAppendix A 中，作者对 Qwen3-14B 做了替代组合实验：\n\n- Exp 1：Memory + DCE + TOR；\n- Exp 2：Memory + TOR；\n- Exp 3：Memory + TOR + TSA；\n- FAMA：Mitigation Agent 推荐的组合。\n\nFigure 8 显示，FAMA 推荐组合整体表现最好。\n\n这说明：\n\n- 不是随便加几个模块就行；\n- 也不是模块越多越好；\n- 关键是加对模块。\n\n---\n\n## 5.2 在 τ-bench / τ-trait 中，最重要的具体模块是什么？\n\n在 τ-bench 和 τ-trait 里，最重要的是：\n\n1. **Memory**\n2. **DCE**\n\n原因很直接：\n\n- 开源模型经常忘记用户前面说过什么；\n- 也经常忘记或误用领域规则。\n\nFigure 4 和 Figure 12 显示，主要错误集中在：\n\n- Domain Constraint Violation；\n- Contextual Misinterpretation；\n- Incomplete Fulfillment。\n\n这些错误正好对应：\n\n- DCE 解决规则问题；\n- Memory 解决上下文遗忘和任务未完成问题。\n\nTable 5 中，τ-bench 的最佳配置大多是：\n\n- DCE + Memory；\n- 或 Memory 单独使用。\n\n例如：\n\n- Qwen3-14B Airline：DCE + Memory；\n- Qwen3-14B Retail：Memory；\n- Qwen3-32B Airline：DCE + Memory；\n- Qwen3-32B Retail：DCE + Memory。\n\nTable 6 中，τ-trait 也类似：\n\n- 很多模型只需要 Memory；\n- 有些需要 DCE + Memory。\n\n这说明 Memory 和 DCE 是 τ-bench / τ-trait 中最关键的两个模块。\n\n---\n\n## 5.3 去掉哪个模块后性能下降最明显？\n\n从论文给出的证据看，主要有两种情况。\n\n### 情况一：去掉 Memory 会明显变差\n\nFigure 10 做了 Memory 大小的消融。\n\n这里的 k 表示保留最近多少条用户请求。\n\n结果显示：\n\n- Retail 领域最好是 k = 6；\n- Airline 领域最好是 k = 2；\n- k = 0，也就是不用 Memory，效果更差。\n\n这说明 Memory 不是装饰性模块。\n\n尤其在 Retail 中，对话更长、用户需求更多，Memory 更重要。\n\n如果没有 Memory，Agent 容易：\n\n- 忘记用户已经确认过什么；\n- 忘记还有哪些子任务没做；\n- 提前结束；\n- 重复问用户。\n\n---\n\n### 情况二：在航空任务中去掉 DCE 会明显变差\n\nQwen3-14B 在 Airline 上，FAMA 推荐 DCE + Memory。\n\nAppendix A 的替代组合中：\n\n- Exp 2 = Memory + TOR；\n- 这个组合没有 DCE；\n- Figure 8 显示它不如 FAMA。\n\n这说明在 Airline 这种规则密集任务中，DCE 很关键。\n\n如果没有 DCE，Agent 更容易违反政策规则，比如：\n\n- 没确认用户信息就继续；\n- 不满足条件就改签或退款；\n- 跳过必须步骤。\n\n---\n\n## 5.4 哪些组件可有可无？\n\n在 τ-bench 和 τ-trait 中，比较可有可无的是：\n\n1. **TOR**\n2. **TSA**\n\n原因是：\n\n- Table 5 和 Table 6 的最佳配置里，大多数情况下没有 TOR 和 TSA；\n- Figure 8 的替代组合中，加入 TOR 或 TSA 并没有超过 FAMA 推荐组合；\n- 有时加了反而更差。\n\n这说明：\n\n> 工具输出整理和工具建议不是没用，而是在这些任务和模型上，它们不是主要瓶颈。\n\n主要瓶颈是：\n\n- 规则记不住；\n- 用户上下文记不住；\n- 任务没跟完。\n\n因此 DCE 和 Memory 更重要。\n\n---\n\n## 5.5 在 ACEBench 中，哪些模块最重要？\n\nACEBench 中最重要的是：\n\n1. Planner；\n2. Verifier。\n\nTable 7 显示：\n\n- Qwen3-4B：Planner + Verifier；\n- Qwen3-14B：Planner + Verifier；\n- Qwen3-32B：Planner + Verifier；\n- Qwen2.5-72B：Planner。\n\nTable 3 显示加入 FAMA 后提升明显。\n\n例如 Qwen3-32B：\n\n- ReAct End-to-End Acc：13.3%；\n- FAMA-ReAct：30.0%。\n\nQwen3-4B：\n\n- ReAct End-to-End Acc：10.0%；\n- FAMA-ReAct：20.0%。\n\n这说明 ACEBench 的主要问题不是领域规则，而是：\n\n- 步骤顺序混乱；\n- 中途状态处理不好；\n- 工具失败后不会正确恢复；\n- 不检查动作是否完成。\n\nPlanner 和 Verifier 正好解决这些问题。\n\n---\n\n## 5.6 各组件之间是否有协同效应？\n\n有，但不是“所有模块一起用”的协同。\n\n更准确地说：\n\n> 有用模块之间有协同；无关模块加入后可能破坏效果。\n\n### τ-bench 中的协同\n\nDCE + Memory 经常一起出现。\n\n它们解决两个不同问题：\n\n- DCE 让 Agent 不违反规则；\n- Memory 让 Agent 记住用户需求和最近上下文。\n\n很多失败轨迹同时包含这两种问题，所以组合比单独使用更稳。\n\n例如 Airline 中：\n\n- 需要遵守复杂政策；\n- 又需要多轮确认用户身份、订单、航班信息；\n- 所以 DCE + Memory 常常是最佳组合。\n\n---\n\n### ACEBench 中的协同\n\nPlanner + Verifier 也有协同。\n\nPlanner 负责提前列步骤。  \nVerifier 负责检查每步有没有偏离。\n\n论文给出的发短信例子中，Baseline 卡在 “sender or receiver does not exist” 的错误上，不断重复失败。\n\nFAMA 中：\n\n- Planner 让 Agent 知道还需要确认 sender 和 receiver；\n- Verifier 发现当前调用失败后提示重新检查；\n- 最后 Agent 问出 sender 是 Grace，receiver 是 Frank，然后成功发送。\n\n这说明 Planner 和 Verifier 组合能减少中途卡死和重复错误。\n\n---\n\n## 5.7 FAMA 是否只是比 Self-Reflection 多了一点提示？\n\n论文专门和 Self-Reflection 做了比较。\n\nSelf-Reflection 就是让 Agent 自己反思和修正。\n\n结果显示 FAMA 更好。\n\n例如 Qwen3-14B：\n\nτ-airline：\n\n- ReAct pass^1：18.4；\n- Self-Reflection pass^1：21.2；\n- FAMA pass^1：36.8。\n\nτ-retail：\n\n- ReAct pass^1：25.2；\n- Self-Reflection pass^1：32.1；\n- FAMA pass^1：37.9。\n\nQwen3-32B τ-retail：\n\n- ReAct pass^1：38.0；\n- Self-Reflection pass^1：26.7；\n- FAMA pass^1：40.5。\n\n这说明：\n\n> 让模型泛泛地反思，不如先判断它到底哪类错误多，再给对应模块。\n\n这也支持 FAMA 的核心设计。\n\n---\n\n# 6. 回扣动机：论文声称的问题到底被什么解决了？\n\n## 痛点一：开源模型容易忘规则\n\n对应设计：\n\n- DCE。\n\n实验支持：\n\n- 错误分析中 DCV 占比高；\n- τ-bench 最佳配置大量选择 DCE + Memory；\n- 加入 DCE 后在 Airline 这类规则密集任务上更稳。\n\n---\n\n## 痛点二：开源模型上下文记忆差\n\n对应设计：\n\n- Memory。\n\n实验支持：\n\n- Figure 10 显示 k = 0 明显不如合适的 k；\n- Retail 最适合更大的 k = 6，因为对话更长；\n- τ-trait 中 Memory 被频繁推荐，很多最佳配置只用 Memory。\n\n---\n\n## 痛点三：工具调用任务步骤长，容易中途失败\n\n对应设计：\n\n- Planner；\n- Verifier。\n\n实验支持：\n\n- ACEBench 中 Planner / Verifier 是主要推荐模块；\n- Qwen3-32B ReAct 从 13.3% 提升到 FAMA-ReAct 30.0%；\n- 论文示例中 Planner + Verifier 帮助 Agent 从工具错误中恢复。\n\n---\n\n## 痛点四：所有辅助模块都用会导致上下文变长、干扰变多\n\n对应设计：\n\n- Mitigation Agent 选择最小模块集合。\n\n实验支持：\n\n- FAMA 比 IRMA 平均更好；\n- FAMA token overhead 更低；\n- FAMA latency 更低；\n- 替代组合和全模块组合不如推荐组合稳定。\n\n---\n\n# 7. 这套方法的硬伤在哪里？\n\n## 硬伤一：它依赖预先准备好的辅助 Agent 池\n\nFAMA 只能从已有模块里选。\n\n如果出现一种新的失败模式，而候选模块里没有对应的修复模块，FAMA 就没法真正解决。\n\n论文自己也承认：\n\n- 当前框架不自动发现新错误；\n- 也不自动生成新的辅助 Agent；\n- 只能扩展已有模块池。\n\n所以它的适用前提是：\n\n> 你已经大概知道系统可能有哪些错误，并且提前写好了能修这些错误的模块。\n\n---\n\n## 硬伤二：实验主要在结构化工具调用任务上\n\n论文测试的是：\n\n- τ-bench；\n- τ-trait；\n- ACEBench。\n\n这些任务都有：\n\n- 明确工具；\n- 明确任务成功标准；\n- 明确领域政策；\n- 相对结构化的用户目标。\n\n但真实环境可能更开放，比如：\n\n- 多模态输入；\n- 网页操作；\n- 机器人控制；\n- 用户目标不明确；\n- 工具输出更杂乱；\n- 任务成功标准不清楚。\n\n论文没有证明 FAMA 在这些环境里同样有效。\n\n所以它的适用边界是：\n\n> 更适合有明确工具、明确规则、明确失败类型的多轮任务。\n\n---\n\n## 硬伤三：失败分析本身仍依赖强模型判断\n\n论文中 FAMA 的失败分析和模块选择使用了 GPT-4o 或 GPT-4.1-mini 作为 judgment agent。\n\n虽然作者用 GPT-4.1-mini 复现实验，发现判断结果和 GPT-4o 基本一致，但这仍然意味着：\n\n- 构建 FAMA 时需要较强模型做失败诊断；\n- 如果完全不用强模型，诊断质量可能下降；\n- 部署成本和隐私要求可能受到影响。\n\n这不是论文 Limitations 中最强调的点，但从系统设计上看，这是一个实际限制。\n\n---\n\n# 8. 最后总结\n\nFAMA 的核心不是提出一个新的工具调用模型，也不是训练一个更强的 LLM。\n\n它做的是：\n\n1. 先让基础 Agent 跑任务；\n2. 收集失败轨迹；\n3. 判断主要失败类型；\n4. 根据失败类型选择少数辅助模块；\n5. 重新运行时只注入这些模块的输出；\n6. 避免把所有辅助信息都塞进上下文。\n\n它有效的主要原因是：\n\n- 开源模型的错误有明显规律；\n- 不同错误需要不同辅助模块；\n- 只加相关模块比全部加模块更稳；\n- Memory 和 DCE 解决了 τ-bench / τ-trait 中最常见的问题；\n- Planner 和 Verifier 解决了 ACEBench 中步骤执行和恢复的问题。\n\n一句话说完整套方法：\n\n> FAMA 不是让 Agent 变得更聪明，而是先找出它最常犯的错，再只给它最需要的辅助信息。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **Open-source model 可以胜任 user simulator，甚至接近/超过 GPT-4o。**  \n  依据：Figure 3 中，在 _τ_-bench Airline 上，Qwen2.5-72B-Instruct 作为 user agent 的 pass@1 为 **47.6%**，高于 GPT-4o 的 **45.2%**；作者据此选择 Qwen2.5-72B-Instruct 作为后续 user simulator。\n\n- **“把所有 helper agents 都用上”并不稳定，甚至会伤害性能。**  \n  依据：IRMA 使用完整多 agent 框架，但 Table 1 显示它只在少数设置下优于 ReAct/FC，很多情况下低于 FAMA 或 ReAct；作者明确指出 indiscriminately using all agents 会造成不必要的 context injection，并可能 degrade base agent performance。\n\n- **更大的模型不一定在 tool-use 中更强，模型规模与表现并非单调关系。**  \n  依据：Table 1 中，Qwen3-4B-Instruct 的 ReAct 在 _τ_-Airline pass^1 为 **32.0%**，高于 Qwen3-14B 的 **18.4%** 和 Qwen2.5-72B-Instruct 的 **24.4%**；这说明 tool-use 可靠性受训练、上下文管理、策略稳定性影响，不只是参数量。\n\n- **Thinking/reasoning 模型并不天然适合 multi-turn tool calling。**  \n  依据：Figure 6、Table 2、Table 8 显示 thinking variants 虽然有时改善 baseline，但会显著增加 token 使用和 latency，并引发 context window overflow；例如 Qwen3-32B thinking 在 FAMA/IRMA 下 Retail 分别出现 **20/23** 次 token overflow failure。\n\n- **Function Calling 这种简单 baseline 在某些 domain 上反而很强。**  \n  依据：Table 4 中，Qwen3-4B-Instruct 在 _τ_-Telehealth 上 FC 的 pass^1–pass^5 全部最高或接近最高，pass^1 达 **34.0%**，高于 ReAct 和 IRMA；说明复杂推理 scaffold 不一定优于直接 function calling，尤其在任务结构较明确时。\n\n- **Generic Self-Reflection 并没有带来稳定收益，很多时候明显弱于更结构化的干预。**  \n  依据：Appendix G 的 Tables 9–12 中，SR 在多个模型和 domain 上低于 FAMA，且有时低于 ReAct；例如 Qwen3-32B Retail 上 SR pass^1 为 **26.7%**，低于 ReAct **38.0%** 和 FAMA **40.5%**。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **主导失败模式集中在 Domain Constraint Violation 和 Contextual Misinterpretation。**  \n  依据：Figure 4 显示 _τ_-bench Retail/Airline 中，DCV 和 CM 占据绝大多数错误；例如 Retail 中多模型的 CM 约 **54%–61%**，DCV 约 **30%–42%**。\n\n- **不同 benchmark/domain 的失败结构不同，不能假设一个通用 scaffold 适配所有场景。**  \n  依据：Figure 12 显示 _τ_-trait 中 IFU 和 memory-related failures 更突出，而 Figure 14 显示 ACEBench 中 CM 占比极高，部分模型甚至达到 **82.6%** 或 **100%**。\n\n- **Memory 是 open-source tool-use agents 的关键瓶颈。**  \n  依据：Figure 5 和 Figure 13 中，Mitigation Agent 频繁推荐 Memory module；作者分析认为长对话中 domain constraints 和 pending user requirements 容易被遗忘。\n\n- **Memory size 的最佳值主要取决于 domain，而不是模型。**  \n  依据：Figure 10 显示 Retail 交互更长、更复杂，最佳 memory size 为 **k=6**；Airline 则较短，最佳为 **k=2**。作者明确指出 optimal memory size is domain-dependent rather than model-dependent。\n\n- **No-memory baseline 明显较弱，说明最近用户请求的显式保留非常重要。**  \n  依据：Figure 10 中 K=0 通常低于 K=2/4/6，说明即使是简单的 recent-user-query memory，也能显著缓解长程对话中的遗漏和误解。\n\n- **非推荐 agent 组合表现更差，说明 agent 组合本身需要验证，而不是凭直觉堆模块。**  \n  依据：Appendix A 的 Figure 8 比较了若干未被推荐的组合，如 Memory+DCE+TOR、Memory+TOR、Memory+TOR+TSA，均整体弱于推荐配置。\n\n- **不同 judge model 给出的 failure attribution 和 agent recommendation 相当一致。**  \n  依据：Appendix A 中用 GPT-4.1-mini 替代 GPT-4o 后，Figure 9 仍主要识别 DCV 和 CM，Figure 11 仍主要推荐 Memory 和 DCE，说明 failure analysis 对 judge model 不完全敏感。\n\n- **Token overhead 和 latency 是 agentic framework 的一等评估指标，而不是附属成本。**  \n  依据：Table 2/Figure 7 中，IRMA 在 Airline/Retail 上分别带来约 **50%/58%** overhead tokens，latency 分别为 **149.8s/111.6s**；相比之下更少 context injection 的设置 overhead 约 **30%**，latency 更低。\n\n---\n\n## 3. 对领域的新认知\n\n- **Tool-use failure 的核心不只是“不会调用 API”，而是长期上下文中的 policy adherence 和 intent tracking。**  \n  依据：错误分析中 DCV、CM、IFU 占主要比例，而 Wrong Retrieval from Complex Tool Outputs 通常占比较低；这表明失败更多来自规则遵循、用户意图理解和任务状态跟踪。\n\n- **在 multi-turn tool-use 中，“更多上下文”可能是负资产。**  \n  依据：IRMA 注入所有 helper agents 的信息后表现不稳定，并带来大量 token overhead；作者多次指出 excessive context injection 会挤压上下文窗口、增加错误累积。\n\n- **Open-source smaller LLMs 的主要问题不是单步能力，而是长轨迹下的 error accumulation。**  \n  依据：论文在 Introduction 和 §5.3 中强调，随着对话变长，domain constraints 会被遗忘，pending subgoals 会丢失，导致 DCV、CM 和 IFU 增多。\n\n- **训练-free 的系统设计仍有很大改进空间，不一定必须依赖 SFT/RL。**  \n  依据：作者指出 RL/SFT 在长轨迹 tool-use 中成本高、reward sparse，而实验显示通过 failure analysis 和 context curation 可在多个 benchmark 上取得明显收益。\n\n- **Benchmark domain 会改变最有效的 agent scaffold。**  \n  依据：_τ_-bench 常需要 DCE+Memory，_τ_-trait 很多设置只用 Memory 就有效，ACEBench 则主要需要 Planner/Verifier；这说明 agentic design 不应脱离 domain failure profile。\n\n---\n\n## 4. 实用的经验性结论\n\n- **如果需要低成本 user simulator，可以优先尝试 Qwen2.5-72B-Instruct。**  \n  依据：Figure 3 中它作为 user agent 的表现最接近 GPT-4o，甚至在 Airline pass@1 上超过 GPT-4o。\n\n- **在 customer-service style tool-use 任务中，优先加入 Memory 和 Domain Constraints Extractor。**  \n  依据：Table 5 和 Table 6 显示 _τ_-bench/_τ_-trait 的最佳配置大多是 Memory 或 DCE+Memory；Figure 5/13 也显示这两个模块被高频推荐。\n\n- **Memory 的 k 不宜固定，应按 domain 调参。**  \n  依据：Figure 10 和 Table 5/6 显示 Retail 通常适合更大的 memory，例如 **k=6**；Airline 更适合较小 memory，例如 **k=2**，过多历史反而可能增加噪声。\n\n- **对结构化多步任务，可以优先尝试 Planner + Verifier，而不是复杂全套 agent。**  \n  依据：ACEBench 中 Table 7 显示 Qwen3-4B/14B/32B 最佳配置均为 Planner and Verifier；Appendix D.1 的案例显示仅 Planner+Verifier 就能避免循环失败并完成任务。\n\n- **在上下文受限的 tool-use 环境中，谨慎使用 thinking variants。**  \n  依据：Table 2 显示 ReAct-thinking 的平均 token 数远高于 non-thinking；Table 8 显示 thinking models 在 FAMA/IRMA 中产生多次 context overflow failure。\n\n- **不要只看平均 token，要监控 max tokens 和 overflow 次数。**  \n  依据：Table 2 中 thinking variants 的 max tokens 可达 **32768**，Table 8 进一步把超限作为任务失败统计，说明 max-token tail risk 会直接影响 pass rate。\n\n- **评估 agentic framework 时应同时报告 success、latency 和 helper overhead。**  \n  依据：Figure 7/Table 2 表明 IRMA 虽然增加了 reasoning scaffold，但 token overhead 和 latency 显著更高，可能抵消其收益。\n\n- **Self-Reflection 应作为 baseline，而不是默认增强手段。**  \n  依据：Appendix G 显示 SR 在多个设置下弱于 FAMA，甚至弱于 ReAct；实践中不能假设“让模型反思一下”就会提升 tool-use reliability。\n\n- **错误分类可以直接复用 DCV、WRCO、CM、IFU 四类作为诊断模板。**  \n  依据：Appendix E 给出了每类错误的定义和具体 failure causes，可作为 tool-use agent 日志分析、标注和调试 checklist。\n\n---\n\n## 5. 局限性中的机会\n\n- **固定 agent pool 限制了可修复 failure modes，自动发现/合成 specialized agents 是重要方向。**  \n  依据：Limitations 中作者承认 FAMA 的效果受预定义 agents 覆盖范围限制，未解决 automatic discovery or synthesis of such agents。\n\n- **现有实验主要在结构化 conversational environments 中，开放式/embodied/multimodal 场景仍未验证。**  \n  依据：Limitations 明确指出 _τ_-bench、_τ_-trait、ACEBench 这类环境较结构化，未来应扩展到 embodied、multimodal、open-ended environments。\n\n- **当前 failure taxonomy 依赖相对清晰的 domain policies，弱结构场景下需要新的 failure ontology。**  \n  依据：作者指出更开放环境可能没有 well-defined failure taxonomies，这暗示未来需要自动化、可迁移的错误分类与归因方法。\n\n- **Agent selection 目前仍依赖已有模块定义，缺少面向 cost/latency/success 的联合优化。**  \n  依据：论文展示了 token overhead 和 latency 的重要性，但 Limitations 未解决如何在 agent choice、context size、latency budget 之间做系统性优化。\n\n- **Memory module 的设计仍比较简单，长期个性化记忆和任务状态管理值得深入研究。**  \n  依据：实验反复显示 Memory 是关键瓶颈，Appendix F 仅调了 recent user queries 的 k；这暗示更细粒度的 memory retrieval、compression 和 state tracking 可能带来进一步收益。",
                    "research_value": "# 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文针对的是多轮 conversational tool use，这类场景直接对应客服、企业服务、订票、退货、通信服务等真实部署场景。  \n- 输入材料显示，FAMA 在多个 open-source LLM 上、多个 benchmark 上带来稳定提升：τ-bench Airline 平均比 ReAct 高 4.63%、比 FC 高 11.57%、比 IRMA 高 5.27%；Retail 平均比 ReAct 高 5.30%、比 FC 高 8.96%、比 IRMA 高 6.15%。  \n- 它不仅提升成功率，还降低 token 和 latency：例如 Qwen3-32B 在 τ-airline 上 IRMA 平均延迟 149.78 秒，FAMA 为 91.12 秒；τ-retail 上 IRMA 111.62 秒，FAMA 56.73 秒。  \n- 实用结论清晰：在 τ-bench / τ-trait 中优先用 Memory + DCE，在 ACEBench 中优先用 Planner + Verifier。\n\n**负面证据或缺失**：  \n- 实验主要限于 τ-bench、τ-trait、ACEBench 这类结构化工具调用环境，尚未证明在开放式网页操作、多模态、机器人控制、真实企业日志中同样有效。  \n- 框架依赖预定义 helper agent pool 和较强 judge model 做失败诊断，真实部署中的自动化和隐私成本仍不清楚。  \n- 部分单项结果并非 FAMA 最优，例如 Qwen3-32B 在 τ-airline pass^1 上 ReAct 为 30.40%，FAMA 为 26.80%。\n\n**判断**：强\n\n**理由**：  \n这个问题如果解决，会直接改变 open-source tool-use agent 的构建方式：不是盲目加上下文或换大模型，而是基于失败模式选择最小辅助模块。输入材料中不仅有成功率提升，还有 token overhead 和 latency 下降的具体证据，说明它对实际部署有明确意义。虽然泛化到更开放环境尚未证明，但在当前多轮工具调用 agent 研究和部署中，影响力潜力足够强。\n\n---\n\n# 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- FAMA 明确区别于 IRMA：IRMA 倾向于使用完整多 agent 框架，而 FAMA 根据失败类型选择最小 helper subset。  \n- 输入材料显示，这种选择不是形式上的：IRMA token overhead 更高，性能反而不稳定；FAMA 在 τ-bench 上平均超过 IRMA，并且延迟更低。  \n- 不同 benchmark 推荐不同模块：τ-bench / τ-trait 多为 Memory 或 DCE + Memory，ACEBench 多为 Planner + Verifier，说明它不是固定 scaffold，而是 failure-aware selection。\n\n**负面证据或缺失**：  \n- 核心想法“分析失败，再针对性加模块”非常自然，属于 agent debugging 中容易被独立想到的方向。  \n- 组成模块本身并不新：Memory、Planner、Verifier、Domain Constraint Extractor、Tool Suggestion、Tool Output Reformulation 都是已有 agentic 组件的组合。  \n- 失败 taxonomy 也较常规：DCV、WRCO、CM、IFU 基本覆盖政策错误、工具输出误读、上下文误解、任务未完成，并非特别新颖的理论分类。  \n- 框架目前不自动发现新错误，也不自动合成新 agent，创新更多在调度策略而非底层能力。\n\n**判断**：中等\n\n**理由**：  \n这篇论文的不可替代性不在于某个全新算法，而在于把 failure attribution、module selection 和 cost-aware context injection 系统化，并用实验说明“全加模块”不如“按失败加模块”。不过，这个方向相当顺理成章，且主要组件都是已知模块；如果这篇论文不存在，类似的 failure-aware orchestration 很可能会在较短时间内被其他 agent 工程团队提出。\n\n---\n\n# 3. 时机判断（Timing）\n\n**正面证据**：  \n- 输入材料指出，LLM 正越来越多作为 autonomous agents 的决策核心，并且多轮 conversational tool use 是主要应用场景。  \n- τ-bench、τ-trait、ACEBench 等近期 benchmark 已经暴露出 strong LLM agents 在长程工具使用中的失败问题。  \n- 论文特别聚焦 open-source smaller LLMs，因为它们受限于参数量、上下文窗口、推理预算，但又因成本、隐私、延迟约束而具有部署价值。  \n- Thinking variants 的 token overflow、latency 增加等现象说明当前领域正从“能不能推理”转向“如何可靠、经济地部署”。\n\n**负面证据或缺失**：  \n- 该领域变化很快，benchmark、模型能力、tool calling API 都可能迅速迭代，当前结论可能部分依赖特定模型和 benchmark。  \n- 如果未来 open-source 模型上下文窗口和 tool-use 对齐能力大幅提升，Memory/DCE 这类外部 scaffold 的边际价值可能下降。\n\n**判断**：强\n\n**理由**：  \n这个问题现在做很合适：tool-use agent 已经进入实用化阶段，但 open-source 模型在长轨迹任务中仍明显不稳定。输入材料中关于 τ-bench、τ-trait、ACEBench 的失败证据，以及 thinking models 带来的 overflow 和 latency 问题，都说明单纯扩大推理或上下文不是可持续答案。因此，failure-aware、低开销的 agent orchestration 正处在一个很好的时间窗口。\n\n---\n\n# 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文直接质疑“更多 helper agents 更好”的默认做法。IRMA 使用更多模块，但 FAMA 用更少模块获得更好或更稳定的表现，并显著降低 token overhead 和 latency。  \n- 它也质疑“更多上下文一定有帮助”：输入材料多次指出 excessive context injection 会干扰主 agent、挤压上下文窗口，甚至导致性能下降。  \n- 它还挑战了“更大模型 / thinking 模型天然更强”的直觉：Qwen3-4B 在某些 τ-airline ReAct 设置下高于 Qwen3-14B 和 Qwen2.5-72B；thinking variants 会显著增加 token、latency，并引发 context overflow。  \n- Self-Reflection 也被实验证明不稳定，例如 Qwen3-32B Retail 上 Self-Reflection pass^1 为 26.7%，低于 ReAct 38.0% 和 FAMA 40.5%。\n\n**负面证据或缺失**：  \n- 它并没有完全推翻 agentic scaffold 范式，而是在现有 modular agent framework 内做更精细的选择。  \n- 质疑的对象主要是工程实践中的“全模块注入”“泛泛反思”“长思维链”，理论层面的范式挑战较弱。\n\n**判断**：强\n\n**理由**：  \n这篇论文最有价值的地方之一，是用具体实验反驳了几个常见但未必可靠的 agent 设计习惯：多加模块、长上下文、thinking 模型、自我反思。尤其是 FAMA 比 IRMA 更好且成本更低的结果，清楚说明“更多 agentic machinery”并不等于更可靠。虽然它仍在现有 agent 框架内改进，但对实践范式的纠偏是明确的。\n\n---\n\n# 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩为一句话：**“先诊断常犯错，再只补对应上下文。”**  \n- 输入材料中的方法流程非常一致：先收集 baseline failure trajectories，再用 failure analyzers 和 orchestrator 找主要失败原因，最后由 mitigation agent 选择最小 helper subset。  \n- 实验也围绕这一洞见展开：FAMA 优于 IRMA、替代模块组合不如推荐组合、Memory k 消融、ACEBench 中 Planner + Verifier 的选择等都直接服务于这个核心观点。\n\n**负面证据或缺失**：  \n- 这个洞见更偏工程原则，而不是新的机制理论。  \n- “诊断失败后针对性干预”本身并不复杂，真正难点在诊断质量、模块设计和泛化能力，但这些部分仍依赖人工定义和强 judge model。\n\n**判断**：强\n\n**理由**：  \n这篇论文的核心洞见非常清楚，而且实验设计基本都在验证同一个命题：上下文增强要 failure-aware，而不是 indiscriminate。它的优点不是概念复杂，而是可解释、可执行、可消融。尽管洞见本身不深奥，但在 agentic tool-use 中足够明确，并且有具体实验支持。\n\n---\n\n# 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术风险是真实存在的：输入材料显示 IRMA 这种全模块增强会伤害性能，thinking variants 会导致 token overflow，Self-Reflection 也可能低于 ReAct。说明“加辅助模块”并不保证提升。  \n- FAMA 的选择结果并非固定：τ-bench / τ-trait 推荐 Memory 或 DCE + Memory，ACEBench 推荐 Planner / Verifier，Memory k 也随 domain 变化，例如 Retail 最佳 k=6，Airline 最佳 k=2。  \n- 方法本身可行性较高：不需要 SFT/RL，不改模型参数，只在推理阶段做 failure analysis 和 context injection。  \n- 多模型、多 benchmark 实验证明它不是只在单一设置下偶然有效。\n\n**负面证据或缺失**：  \n- 风险主要是工程组合风险，而不是高科学风险；一旦知道主要失败是记忆和规则问题，加入 Memory/DCE 的收益并不特别意外。  \n- 失败分析和模块选择依赖 GPT-4o 或 GPT-4.1-mini 这类较强 judgment agent，降低了纯 open-source、低成本部署的可行性。  \n- 框架只能从已有 helper pool 中选择，遇到未覆盖 failure mode 时无法自动生成新修复策略。\n\n**判断**：中等\n\n**理由**：  \n这个研究有一定真实风险，因为输入材料明确显示“更多模块”“thinking”“self-reflection”都可能失败，FAMA 的收益不是显然必然的。但总体上，它是高可行性的系统工程：不训练模型、使用已有模块、通过诊断选择组合。科学风险和探索性不算很高，主要挑战在诊断可靠性、模块覆盖和真实部署成本。\n\n---\n\n# 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 输入材料显示作者完成了较系统的评估：覆盖 τ-bench、τ-trait、ACEBench，多种 Qwen 系列 open-source 模型，以及 ReAct、Function Calling、IRMA、Self-Reflection 等 baseline。  \n- 论文还分析了 token overhead、latency、overflow、memory size、judge model 替换等，这说明团队具备较强的 agent evaluation 工程能力。  \n- 他们能够构建 user simulator，并比较 Qwen2.5-72B-Instruct 与 GPT-4o 作为 user agent 的表现。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队背景、此前在 tool-use benchmarks、agent evaluation、open-source LLM deployment 方面的长期积累。  \n- 没有证据表明团队拥有独特数据、真实企业交互日志、专有工具环境，或比其他团队更难复制的实验平台。  \n- 方法依赖公开 benchmark 和常见模型，其他有工程资源的团队大概率也能复现类似研究。\n\n**判断**：弱\n\n**理由**：  \n从论文执行质量看，团队显然有不错的工程和评估能力；但“比较优势”要求的是独特优势，而输入材料没有给出这类证据。没有看到专有数据、真实部署渠道、长期 benchmark 维护经验或不可复制的技术资产。因此这一维度只能给弱。\n\n---\n\n# 综合评价\n\n**综合评价：值得深入关注。**\n\n这篇论文的价值不在于提出全新的模型或算法，而在于给 tool-use agent 设计提供了一个清晰、可验证的原则：不要盲目增加上下文或 helper agents，而要根据失败模式选择最小有效辅助模块。输入材料中有较充分的实验支撑，包括多 benchmark 成功率提升、相比 IRMA 更低 token overhead 和 latency、以及 Memory/DCE/Planner/Verifier 的领域化选择。它的主要短板是方法仍依赖预定义 agent pool、人工设计 failure taxonomy 和强 judge model，开放式环境中的泛化尚未证明。总体看，这是一个对当前 open-source tool-use agent 实践很有启发的工作，但不是不可替代的理论突破。\n\n---\n\n# 最致命的弱点\n\n最致命的问题是：**FAMA 只能在预定义 failure taxonomy 和预定义 helper agent pool 内工作。**\n\n如果真实环境中出现新的失败模式，或者现有 helper modules 无法覆盖关键错误，FAMA 只能“选择已有工具”，不能自动发现新问题、设计新模块或学习新的修复策略。这限制了它从 benchmark 方法走向通用 agent reliability framework 的潜力。\n\n---\n\n# 如果要做得更好\n\n1. **自动化 failure discovery 和 helper synthesis**  \n   不仅判断 DCV、WRCO、CM、IFU 这几类错误，还应能从失败轨迹中发现新 failure clusters，并自动生成或检索对应辅助模块。\n\n2. **做 cost-aware / latency-aware 的在线模块选择**  \n   当前 FAMA 已经展示 token 和 latency 重要，但还没有形成显式优化目标。更强的版本应在 success probability、token budget、latency budget、context window risk 之间做联合决策。\n\n---\n\n# 与 Carlini 原则的对照\n\n**最符合 Carlini 原则的一点**：  \n它符合“好的研究问题应当有简单、清楚、可检验的核心洞见”这一原则——FAMA 的洞见可以概括为“先诊断常犯错，再只补对应上下文”，并且有直接实验验证。\n\n**最不符合 Carlini 原则的一点**：  \n它较不符合“研究应尽量建立不可轻易复制的独特优势”这一原则——方法主要基于公开 benchmark、常见 open-source 模型和预定义 helper modules，输入材料中没有显示团队拥有难以替代的数据或平台优势。",

                    "summary_translation": "Large Language Models（大型语言模型）正日益被部署为 autonomous agents（自主智能体）的 decision-making core（决策核心），使其能够对外部环境产生实际影响。然而，在 conversational benchmarks（对话式基准测试）中——这类基准模拟现实世界中以客户为中心的问题解决场景——这些 agents（智能体）常常因错误决策所引发的 cascading effects（级联效应）而失败。对于 parameter sizes（参数规模）较小、context windows（上下文窗口）有限且 inference budgets（推理预算）受限的 open-source LLMs（开源大型语言模型）而言，这些挑战尤为突出，因为上述限制会在 agentic settings（智能体式场景）中加剧 error accumulation（错误累积）。\n\n为应对这些挑战，我们提出了 Failure-Aware Meta-Agentic（FAMA，故障感知元智能体）框架。FAMA 分两个阶段运行：首先，它分析 baseline agents（基线智能体）的 failure trajectories（失败轨迹），以识别最常见的错误类型；其次，它采用一种 orchestration mechanism（编排机制），激活由 specialized agents（专门化智能体）组成的最小子集，这些智能体针对上述失败类型进行定制，并在 tool-use agent（工具使用智能体）执行 decision-making step（决策步骤）之前注入 targeted context（定向上下文），以辅助其决策。\n\n基于多种 open-source LLMs（开源大型语言模型）的实验表明，与 standard baselines（标准基线）相比，该框架在不同 evaluation modes（评估模式）下最高可实现 27% 的性能提升。这些结果表明，通过 specialized agents（专门化智能体）对 context（上下文）进行 targeted curation（定向筛选与组织），以应对常见失败，是构建可靠的、支持 multi-turn tool-use（多轮工具使用）的 LLM agents（大型语言模型智能体）的重要设计原则，尤其适用于模拟现实世界对话场景的任务。"

                    "summary": "Terminal agents have demonstrated strong potential for autonomous command-line execution, yet their training remains constrained by the scarcity of high-quality and diverse execution trajectories. Existing approaches mitigate this bottleneck by synthesizing large-scale terminal task instances for trajectory sampling. However, they primarily focus on scaling the number of tasks while providing limited control over the diversity of execution trajectories that agents actually experience during training. In this paper, we present SkillSynth, an automated framework for terminal task synthesis built on a scenario-mediated skill graph. SkillSynth first constructs a large-scale skill graph, where scenarios serve as intermediate transition nodes that connect diverse command-line skills. It then samples paths from this graph as abstractions of real-world workflows, and uses a multi-agent harness to instantiate them into executable task instances. By grounding task synthesis in graph-sampled workflow paths, SkillSynth explicitly controls the diversity of minimal execution trajectories required to solve the synthesized tasks. Experiments on Terminal-Bench demonstrate the effectiveness of SkillSynth. Moreover, task instances synthesized by SkillSynth have been adopted to train Hy3 Preview, contributing to its enhanced agentic capabilities in terminal-based settings.",
