                    "intro_logic": "1. Multi-Agent Systems (MAS) 通过分解复杂任务由专家代理处理，其中 Router 负责将查询分配给合适的专家代理，对系统整体性能至关重要。\n2. 现有的路由方法（如基于监督编码器、嵌入相似度或结构学习的方法）共享一个核心假设：代理的能力描述在注册时是准确的，并且在之后保持稳定。\n3. 这一假设在企业实际部署中失效，原因有二：首先，开发者难以提供准确的能力描述，因为代理行为由 System Prompt、工具和底层模型决定，且这些组件处于持续开发中，导致描述容易过时；其次，代理在部署后能力会发生变化（如更新 Prompt、集成新工具或切换模型），使得注册时的原始 Profile 不再反映代理的实际行为。\n4. 上述两个问题的根本原因在于当前代理 Profile 的静态性质：能力通常在注册时捕获，很少随着代理在生产环境中的演化而修订。\n5. 这促使了一种根本不同的方法：让系统通过实际交互来发现并持续更新代理能力，其关键洞察是用户查询是探查代理能力的最佳探针，高质量的成功交互对构成了基于当前行为的实证 Profile。\n6. 如何构建并持续更新代理能力描述，使其从部署交互中自我演化，而不是依赖静态的开发者提供描述？",
                    "core_insight": "作为学术分析师，我深入剖析了 **FlyRoute** 这篇论文。这篇论文的核心价值不在于它提出了一个新的路由算法，而在于它重新定义了**Agent Profile（智能体画像）**的本质和来源。\n\n以下是针对该论文关键智力洞察的深度解析：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n**用户查询（User Queries）不仅是需要被路由的任务，更是探测和定义智能体能力边界的最有效探针；因此，智能体的画像不应是静态的开发者描述，而应是从成功交互中动态涌现的实证证据。**\n\n**展开解释：**\n传统的多智能体系统（MAS）路由假设智能体的能力是固定且可被准确描述的（Static & Describable）。然而，作者意识到在真实的企业部署中，这个假设是脆弱的：开发者很难写出完美的能力描述，且智能体本身（Prompt、工具、模型）会不断演化，导致静态描述迅速过时（Stale）。\n\n作者独特的认知突破在于视角的转换：**不再试图“描述”智能体，而是通过“观察”智能体来“发现”其能力。** 既然智能体的真实行为是由其处理查询的结果决定的，那么那些被判定为高质量的“查询-响应”对（Query-Response Pairs），就是智能体当前真实能力的直接证据。这种从“先验定义”到“后验实证”的转变，构成了 FlyRoute 的理论基石。\n\n**原文证据：**\n> \"We observe that the root cause of both problems is the _static_ nature of current agent profiling... This motivates a fundamentally different approach— _let the system discover and continuously update agent capabilities through actual interactions_ . The key insight is that **user queries are the best probes for profiling agents** : when a query is dispatched to an agent and the response is evaluated as highquality, we obtain direct evidence that the agent can handle that type of query.\" (Section 1, Introduction)\n\n> \"Over time, accumulated evidence forms a rich, empirically grounded profile that is always up-to-date because it is derived from the agent’s current behavior, not from a static description.\" (Section 1, Introduction)\n\n---\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接推导出了 FlyRoute 的三大核心组件，形成了一个闭环的 **Data Flywheel（数据飞轮）**：\n\n1.  **从“静态描述”到“自适应画像（Adaptive Profiling）”：**\n    *   **推理：** 如果能力是动态发现的，那么画像必须包含两个部分：一是压缩后的能力摘要（Learned Description），二是具体的成功案例库（Success Store）。\n    *   **方法实现：** 系统不再依赖单一的开发者描述，而是维护一个包含 `Seed Description`（初始种子）、`Learned Description`（通过 LLM 蒸馏生成的动态摘要）和 `Success Example Store`（BM25 检索的高质量案例）的三元组结构。每当有新的高质量交互，就更新这个结构。\n\n2.  **从“盲目探索”到“不确定性驱动的探索（Uncertainty-Driven Exploration）”：**\n    *   **推理：** 既然我们要通过交互来“发现”能力，我们就不能只把查询发给已知最强的智能体（纯利用，Exploitation），否则新智能体或能力发生变化的智能体永远无法积累证据。但也不能随机广播（浪费资源）。我们需要一种策略，专门去“探测”那些画像尚不清晰（Uncertain）的智能体。\n    *   **方法实现：** 提出了基于 `Profile Uncertainty`（画像不确定性，基于成功样本数量衰减）和 `Lexical Novelty`（词汇新颖性，避免冗余）的探索策略。只有当查询与智能体潜在能力相关（BM25 相关性高）且该智能体画像不确定时，才进行探索性分发。\n\n3.  **从“单次路由”到“飞轮效应（Flywheel Effect）”：**\n    *   **推理：** 更好的画像带来更准确的路由，更准确的路由产生更高质量的成功案例，进而优化画像。这是一个自增强的循环。\n    *   **方法实现：** 设计了 `Quality Gate`（质量门控，使用 LLM-as-Judge）来过滤噪声，确保只有高质量的交互进入 `Success Store`，并通过定期 `Distillation`（蒸馏）将大量案例压缩为精炼的 `Learned Description`，注入到路由器的 Prompt 中。\n\n**原文证据：**\n> \"This creates a self-reinforcing cycle: better profiles _→_ better routing _→_ higher-quality feedback _→_ even better profiles.\" (Section 3.1, Overview)\n\n> \"FlyRoute introduces a targeted exploration policy that combines profile uncertainty, BM25 relevance, and lexical novelty, prioritizing under-profiled agents only for plausible queries...\" (Abstract)\n\n---\n\n### 3. 试错历程与方案调整\n\n在实现这一洞察的过程中，作者遇到了几个关键的工程与理论挑战，并进行了相应的调整：\n\n**挑战一：探索的成本与效率平衡（The Exploration Cost Dilemma）**\n*   **初始想法/困难：** 如果为了构建画像而向所有智能体广播每个查询，成本极高且大部分查询对特定智能体无关（Irrelevant）。如果只利用（Exploitation），新智能体无法冷启动。\n*   **调整方案：** 作者没有采用传统的 Bandit 算法或随机探索，而是设计了 **Relevance-Gated Exploration（相关性门控探索）**。\n    *   他们引入 BM25 作为轻量级的过滤器，确保只有当查询在词汇上与智能体已有的成功记录相关时，才考虑探索该智能体。\n    *   同时，引入 `Novelty Reweighting`（新颖性重加权），避免向同一个智能体发送语义重复的查询，因为重复查询对丰富画像没有边际贡献。\n*   **原文证据：**\n    > \"A naive approach to building agent profiles is to broadcast every query to all agents, but this is wasteful... FlyRoute introduces an uncertainty-driven exploration strategy that targets profile construction efficiently.\" (Section 3.3)\n    > \"The base score above filters out unrelated agents, but high lexical overlap can also indicate redundancy... We therefore reuse the normalized relevance signal... to derive a lightweight non-redundancy weight.\" (Section 3.3)\n\n**挑战二：画像的表示与路由器的上下文限制（Profile Representation & Context Limits）**\n*   **初始想法/困难：** 随着飞轮运转，`Success Store` 会无限增长。如果将所有成功案例都放入路由器的 Prompt，会超出 LLM 的上下文窗口，且导致推理延迟过高。\n*   **调整方案：** 引入了 **Capability Distillation（能力蒸馏）** 机制。\n    *   系统定期（每 M 个新成功案例）调用 LLM，将原始的成功案例和旧的描述作为输入，生成一个新的、更精炼的 `Learned Description`。\n    *   路由器在决策时，同时使用这个全局的 `Learned Description`（提供宏观能力边界）和 BM25 检索出的局部 `Top-k Examples`（提供微观的词汇匹配证据）。这种“全局摘要 + 局部检索”的混合策略解决了长尾和上下文限制问题。\n*   **原文证据：**\n    > \"As the success store grows, raw examples become too numerous to use directly in routing prompts. We periodically distill the accumulated evidence into a refined capability description.\" (Section 3.2)\n    > \"The LLM is instructed to combine the global profile summaries... with the retrieved examples that focus on surface similarity to _q_.\" (Section 3.4)\n\n**挑战三：冷启动与噪声过滤（Cold Start & Noise Filtering）**\n*   **初始想法/困难：** 在系统初期，没有足够的成功案例来形成画像。同时，LLM 生成的响应可能存在幻觉或低质量，如果直接存入画像，会污染后续的路由决策。\n*   **调整方案：**\n    *   **冷启动：** 允许开发者提供少量的 `Seed Examples`（种子示例）和粗略的 `Seed Description`，作为初始信号。\n    *   **噪声过滤：** 引入 `LLM-as-Judge` 作为 `Quality Gate`。只有得分高于阈值 $\\theta$ 的查询-响应对才会被写入 `Success Store`。这确保了飞轮中的数据是“干净”的，防止错误的路由决策被固化。\n*   **原文证据：**\n    > \"After the selected agents produce responses, a quality gate decides which query–agent pairs enter the success store... our default implementation instantiates this gate with _LLM-as-Judge_.\" (Section 3.1)\n    > \"Cold Start... The profile is initialized as _Pi_ = ( _d_[seed] _i , ∅, Ei_[seed] )... The learned description is left empty, and the router relies on the seed description until enough evidence is collected.\" (Section 3.2)\n\n**总结：**\nFlyRoute 的成功在于它没有试图解决“如何更好地分类”这个问题，而是解决了“如何定义分类器（Agent）”这个问题。通过将 **User Query** 视为 **Profiling Probe**，作者构建了一个能够自我进化、自我修正的路由系统，这是其最核心的智力贡献。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\nFlyRoute 是一个用于多智能体系统的“路由系统”。它的工作流程是：当用户发来一个问题时，系统决定把这个问题分发给哪个专家智能体（Agent）去回答。\n\n传统的做法是，开发者在注册智能体时写一段固定的文字描述（比如“我是做云计算的”），路由系统就根据这段文字来判断问题该给谁。但问题是，智能体在运行过程中会变强、会变功能，或者开发者更新了它的提示词，导致原来的描述过时了，路由就会分错。\n\nFlyRoute 的做法是：**不再依赖开发者写死的描述，而是让系统自己在运行中“学习”每个智能体到底擅长什么。** 它把每次成功回答的问题记录下来，定期总结成新的能力描述，并在下次路由时，既看这个新描述，也去库里找类似的成功案例作为参考。同时，为了不让某些冷门智能体因为没人问而一直学不到东西，系统会故意把一些看起来可能相关的问题分发给它们，以收集更多数据。\n\n### 2. 一句话概括核心创新\n\n**之前的做法是“静态档案”，FlyRoute 的做法是“动态履历”：它利用线上真实流量中成功的问答对，自动更新智能体的能力画像，从而解决智能体能力变化导致的路由不准问题。**\n\n### 3. 按照执行的逻辑顺序拆解\n\nFlyRoute 的运行是一个闭环，分为以下四个主要步骤：\n\n#### 第一步：初始化与冷启动（注册阶段）\n*   **输入**：开发者注册一个新的智能体，提供一个名字、一段简单的初始描述（Seed Description）和少量（如5个）种子示例。\n*   **操作**：系统创建一个空的“成功案例库”，并将初始描述和种子示例存入。此时，智能体的“学习后描述”为空。\n*   **输出**：一个包含初始信息的智能体档案。\n*   **目的**：让新加入的智能体在没有任何历史数据的情况下，也能被路由系统识别和调用，解决“冷启动”问题。\n*   **如果不做会怎样**：新智能体无法被路由系统发现，或者因为描述太模糊导致初期路由准确率极低。\n\n#### 第二步：不确定性驱动的探索性分发（路由决策阶段）\n*   **输入**：用户的一个新查询（Query）。\n*   **操作**：\n    1.  **利用（Exploitation）**：路由模型根据当前的智能体描述和检索到的相似成功案例，选出最可能胜任的智能体。\n    2.  **探索（Exploration）**：系统计算每个智能体的“档案不确定性”（即成功案例越少，不确定性越高）。对于那些案例少、且与当前查询在关键词上有一定相关性的智能体，系统会额外计算一个“探索分数”。如果分数够高，系统会把这些智能体也加入候选名单。\n    3.  **合并**：将“利用”选出的智能体和“探索”选出的智能体合并，一起处理该查询。\n*   **输出**：一个包含1个或多个智能体的候选列表，查询被分发给它们。\n*   **目的**：解决“马太效应”。如果只选最确定的智能体，那些案例少的智能体永远得不到数据，档案永远无法完善。通过探索，给冷门智能体机会积累数据。\n*   **如果不做会怎样**：只有热门智能体的档案会越来越准，冷门智能体的档案永远停留在初始状态，导致整体路由准确率上限被锁死，无法覆盖长尾需求。\n\n#### 第三步：质量门控与数据积累（反馈阶段）\n*   **输入**：智能体返回的回答。\n*   **操作**：使用一个“LLM-as-Judge”（用大模型当裁判）对回答质量打分。如果分数高于阈值（如0.7），就将这个“问题-回答”对存入该智能体的“成功案例库”。\n*   **输出**：更新后的成功案例库（Success Store）。\n*   **目的**：确保只有高质量的交互数据才能进入档案，避免垃圾数据污染智能体的能力画像。\n*   **如果不做会怎样**：错误的答案或无关的回答会被当作“擅长”的证据，导致智能体的能力描述偏离事实，路由越来越乱。\n\n#### 第四步：能力蒸馏与档案更新（定期维护阶段）\n*   **输入**：成功案例库中积累的新案例（例如每积累20个新案例）。\n*   **操作**：调用大模型，输入当前的初始描述、之前的学习后描述（如果有）以及最近的成功案例，让大模型总结出一段新的、更准确的“学习后描述”（Learned Description）。\n*   **输出**：更新后的智能体能力描述文本。\n*   **目的**：将海量的具体案例压缩成一段精炼的自然语言描述，方便路由模型快速理解智能体的整体能力边界，同时捕捉智能体能力的变化（如新增了某个工具的使用能力）。\n*   **如果不做会怎样**：随着案例增多，直接把所有案例塞给路由模型会导致上下文过长、成本过高，且路由模型难以从海量细节中提炼出宏观的能力特征。\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n论文中的消融实验（Table 5）清晰地展示了各个组件的贡献：\n\n*   **哪个组件贡献最大？**\n    *   **质量门控（Judge）**：去掉质量门控（即无条件接受所有回答），准确率从 89.83% 下降到 88.44%（下降1.39pp）。这说明**数据质量至关重要**，垃圾数据会显著干扰路由判断。\n    *   **探索策略（Explore）**：去掉探索策略（只利用已知最好的智能体），准确率下降到 88.52%（下降1.31pp）。特别是在“服务器硬件”这种数据较少的领域，下降幅度更大（-3.40pp）。这证明了**探索策略对于覆盖长尾、数据稀疏的智能体至关重要**，解决了“冷门智能体学不到东西”的问题。\n\n*   **哪个组件可有可无？**\n    *   没有完全“可有可无”的组件，但**新颖性重加权（Novelty）**和**能力蒸馏（Distill）**的影响相对较小。\n    *   去掉新颖性重加权（即不刻意避免重复案例），准确率仅下降 0.77pp。\n    *   去掉能力蒸馏（即只用原始案例检索，不用总结后的描述），准确率仅下降 0.54pp。\n    *   **这意味着**：在数据量足够大时，直接检索相似案例（BM25）已经能提供很强的信号。蒸馏和新颖性更多是起到“锦上添花”和“优化效率/边界清晰度”的作用，而非决定性因素。\n\n*   **各组件之间是否有协同效应？**\n    *   是的。**探索策略**负责把数据“喂”给冷门智能体，**质量门控**负责筛选“好数据”，**蒸馏**负责把数据变成“易读的描述”。\n    *   如果没有探索，冷门智能体没数据，蒸馏就无米之炊；如果没有质量门控，探索带来的数据可能是垃圾，蒸馏会总结出错误的描述。三者配合，形成了一个正向循环：探索带来数据 -> 门控保证质量 -> 蒸馏提炼能力 -> 更好的描述引导更准的路由和更有效的探索。\n\n*   **回扣动机：**\n    *   论文声称要解决“静态描述过时”和“开发者描述不准”的问题。\n    *   实验数据显示，仅靠初始种子（Cold Start），准确率是 78.04%；经过飞轮运转（Flywheel），准确率提升到 89.83%。这直接证明了**从真实流量中动态学习到的档案，比开发者静态写的描述要准确得多**。\n\n### 5. 这套方法的硬伤在哪里？\n\n根据论文的 Limitation 部分，主要硬伤有两点：\n\n1.  **依赖裁判（LLM-as-Judge）的准确性**：系统假设“LLM裁判”打分是准确的。如果裁判本身判断失误（比如把错误答案判为高分），这些错误数据就会进入档案，导致智能体的能力画像被污染。这是一个“垃圾进，垃圾出”的风险，且目前缺乏对裁判偏差的鲁棒性处理。\n2.  **适应变化的滞后性**：如果智能体本身发生了剧烈变化（比如开发者突然修改了提示词或更换了底层模型），FlyRoute 只能依靠后续的新流量慢慢“纠正”档案。它没有专门的“漂移检测”机制，因此在智能体能力突变时，可能会有一段时间的路由不准期。",
                    "additional_insights": "1. **实验中的反直觉发现**：在数据积累初期（N=500），FlyRoute 的针对性探索策略显著优于随机广播（Random Broadcasting）和 $\\epsilon$-greedy，表明在 Profile 稀疏阶段，“向谁探索”比“探索多少”更关键；但在数据充足后（N=7,211），所有探索策略的性能差距缩小并收敛，说明一旦检索库（Success Store）足够大，纯利用（Exploitation）和检索匹配的主导作用会掩盖探索策略的差异。依据：Table 4 及 Appendix B 中关于探索策略比较的讨论。\n\n2. **有启发性的分析或 ablation**：移除周期性能力蒸馏（Distillation）导致整体准确率仅下降 0.54pp，但在 Mobile OS 领域大幅下降 3.93pp，揭示出当检索库庞大且 BM25 检索可能引入噪声或模糊领域边界时，压缩后的全局能力摘要（Global Summary）对于维持领域边界的清晰度至关重要，而不仅仅是提供 Few-shot 示例。依据：Table 5 及 Section 4.5 对 Distillation Ablation 的分析。\n\n3. **对领域的新认知**：传统的静态 Agent Profile 假设在真实企业部署中是脆弱的，因为 Agent 的能力随 Prompt、工具和模型更新而动态变化；用户查询本身是探测 Agent 能力边界的最有效探针，通过“查询-响应-质量门控”形成的实证证据比开发者提供的初始描述更准确且实时。依据：Section 1 Introduction 及 Section 3.2 Adaptive Agent Profiling。\n\n4. **实用的经验性结论**：在冷启动阶段，仅需每个 Agent 5 个种子查询（Seed Queries）配合 BM25 检索，即可使路由准确率从 72.57% 提升至 78.04%，证明即使没有复杂的训练，简单的检索增强（Retrieval-Augmented）也能显著改善零样本路由效果；此外，使用 LLM-as-Judge 进行质量门控（阈值 $\\theta=0.7$）比无条件接受所有响应更能保证 Profile 的质量，避免噪声污染。依据：Table 2, Table 5 及 Section 4.2, 4.5。\n\n5. **局限性中的机会**：当前系统依赖 LLM-as-Judge 进行质量评估，存在 Judge 噪声和与金标准路由不一致的风险，未来可研究更鲁棒的 Judge 校准方法或确定性接受机制；此外，系统尚未处理 Agent 部署后的显式漂移检测（Drift Detection），未来可结合漂移触发机制来加速 Profile 的重新探索，而非仅依赖持续的数据飞轮。依据：Section Limitations。",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文解决了企业级多智能体系统（MAS）部署中的核心痛点——路由准确率随时间衰减。实验显示，在真实企业数据集上，准确率从冷启动的 78.04% 提升至 89.83%（+11.79pp），且仅需极少的种子数据（5个/Agent）。这直接降低了企业维护 Agent Profile 的人力成本。\n**负面证据或缺失**：该方法高度依赖 LLM-as-Judge 的质量，若裁判模型本身存在偏差，可能导致系统性错误。此外，实验仅在单一专有数据集上进行，缺乏跨领域（如医疗、金融）的泛化性验证。\n**判断**：强\n**理由**：随着 MAS 在企业端的落地，静态 Profile 的维护成本已成为规模化瓶颈。FlyRoute 提供的“自演化”机制若能被广泛采用，将显著改变 Agent 系统的运维范式，从“人工维护描述”转向“数据驱动的自我修正”，具有极高的工程实用价值。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：现有路由方法多基于监督学习或静态嵌入，假设 Agent 能力不变。FlyRoute 提出的“数据飞轮”（Data Flywheel）机制，特别是结合“不确定性驱动的探索”与“周期性能力蒸馏”的闭环设计，在解决动态能力漂移问题上具有独特性。消融实验证明，移除探索或蒸馏会导致性能显著下降，说明这些组件并非可有可无的装饰。\n**负面证据或缺失**：核心思想（利用在线反馈更新模型）在推荐系统和强化学习中已有先例。FlyRoute 的创新更多在于将这些成熟思想适配到 Agent Routing 这一特定场景，而非提出全新的算法理论。\n**判断**：中等\n**理由**：虽然“动态更新”的概念不新，但将其具体化为针对 Agent Profile 的“探索-利用-蒸馏”闭环，并解决冷启动和长尾问题，具有一定的独特性。然而，这种工程上的组合创新容易被其他团队通过类似思路（如在线学习路由策略）快速复现或超越。\n\n**3. 时机判断（Timing）**\n**正面证据**：2026年（论文日期）是多智能体系统从实验走向大规模企业部署的关键年份。此时，开发者正面临 Agent 能力快速迭代与路由系统僵化之间的矛盾。FlyRoute 恰好回应了这一市场需求。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：当前 MAS 研究正从“如何构建单个 Agent”转向“如何协调多个 Agent”。路由作为协调的核心组件，其动态适应性是当前的研究热点。FlyRoute 在 Agent 能力动态变化成为常态的背景下提出解决方案，时机恰到好处。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：论文明确挑战了“Agent 能力描述在注册时是准确且稳定”这一核心假设。它指出开发者难以提供准确描述，且描述容易过时，从而提出用“实证交互数据”替代“静态文本描述”的新范式。\n**负面证据或缺失**：该方法并未完全抛弃静态描述，而是将其作为种子（Seed），并在蒸馏后生成新的文本描述。因此，它更多是“增强”而非“颠覆”现有范式。\n**判断**：中等\n**理由**：FlyRoute 质疑了静态 Profile 的有效性，并提出了基于数据的动态替代方案，这是对现有做法的有力修正。但它仍依赖于 LLM 生成文本描述作为路由依据，未完全跳出“基于文本匹配”的传统框架，因此属于范式内的重大改进，而非范式革命。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可概括为：“用户查询是探查 Agent 能力的最佳探针，成功交互对构成了基于当前行为的实证 Profile。”这一洞见清晰、简洁，且直接指导了系统设计（收集成功对、更新描述）。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：该洞见将复杂的 Agent 能力演化问题简化为“数据收集与总结”问题，逻辑链条清晰。它揭示了“静态描述”与“动态行为”之间的鸿沟，并提供了填补这一鸿沟的直接路径。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：系统设计模块化，各组件（探索、门控、蒸馏）均有明确的消融实验支持，技术风险可控。冷启动策略（5个种子）降低了部署门槛。\n**负面证据或缺失**：主要风险在于 LLM-as-Judge 的可靠性。如果裁判模型对某些领域（如代码、数学）的判断能力不足，会导致错误数据进入 Profile，进而污染路由。此外，蒸馏过程的延迟和成本可能影响实时性。\n**判断**：中等\n**理由**：技术实现上可行，但存在“垃圾进，垃圾出”的系统性风险。若缺乏对 Judge 偏差的鲁棒性处理，该方法在复杂场景下的长期稳定性存疑。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：论文使用了“专有企业开发者支持数据集”，这表明团队拥有真实的、大规模的 MAS 部署场景和数据。这种真实世界的数据优势是纯学术研究团队难以复制的。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：拥有真实企业级 MAS 部署数据和场景，使得团队能够发现并验证“静态 Profile 失效”这一真实痛点，并基于真实流量进行优化。这种数据壁垒构成了显著的比较优势。\n\n---\n\n- **综合评价**：值得深入关注。FlyRoute 针对企业级 MAS 部署中的关键痛点（路由动态适应性）提出了切实可行的解决方案，其“数据飞轮”机制在工程上具有高度实用价值，且实验结果令人信服。\n- **最致命的弱点**：对 LLM-as-Judge 准确性的过度依赖。若裁判模型存在系统性偏差，整个自演化闭环将陷入“错误强化”的恶性循环，且论文未提供有效的纠偏机制。\n- **如果要做得更好**：1. 引入对 Judge 偏差的检测与校正机制（如多裁判投票、置信度校准）；2. 增加跨领域、跨数据集的泛化性实验，以证明方法的普适性。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“解决真实世界的问题”**。论文直接针对企业部署中的实际痛点（Profile 过时），而非虚构的学术 benchmark。\n    - **最不符合**：**“鲁棒性”**。系统对核心组件（Judge）的假设过于理想化，缺乏对组件失效情况的防御性设计。",

                    "summary_translation": "企业路由器将查询分配给专家代理（expert agents），然而部署的配置文件（profiles）保持静态，而代理本身却在不断演进（提示词 prompts、工具 tools、模型 models），开发人员也很少更新描述或示例（exemplars）。我们提出了 FlyRoute，一种自我演进的配置文件框架，该框架从真实流量中积累能力证据：将调度候选项（dispatch candidates）中通过质量门控（quality-gate）的成功配对存入每个代理的成功存储库（success store），定期将证据蒸馏为学习到的能力描述（learned capability descriptions），并将这些描述与通过 BM25 检索到的成功案例一起注入到大语言模型（LLM）路由器中。为了使这一飞轮机制（flywheel）具备数据效率，FlyRoute 引入了一种有针对性的探索策略（targeted exploration policy），该策略结合了配置文件不确定性（profile uncertainty）、BM25 相关性（BM25 relevance）和词汇新颖性（lexical novelty），仅针对合理的查询优先探索那些配置文件不足的代理，并避免冗余的证据收集。在我们专有的企业开发者支持数据集（包含真实路由查询）上的实验表明，FlyRoute 将同一骨干网络（same-backbone）的零样本（zero-shot）LLM 路由器的准确率从 72.57% 提升至 78.04%，每个代理仅需五个种子查询（seed queries），这表明配置文件检索（profile retrieval）已经增强了冷启动（cold-start）路由性能。在通过飞轮机制流式处理 7,211 个带标签的训练查询后，准确率上升至 89.83%（相比零样本提升 17.26 个百分点；相比冷启动提升 11.79 个百分点），在单标准答案测试查询（single-gold test queries）的标准路由准确率评估下，在四个专家领域（expert domains）中均表现出一致的增益。"

 \ud83c\udfd7\ufe0f \u7cfb\u7edf\u67b6\u6784\uff1a\u4ece\u6a21\u578b\u7f29\u653e\u8f6c\u5411\u7cfb\u7edf\u7f29\u653e\n*\u968f\u7740\u6a21\u578b\u80fd\u529b\u8d8b\u4e8e\u7a33\u5b9a\uff0c\u7814\u7a76\u91cd\u5fc3\u8f6c\u5411\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u6574\u4f53\u67b6\u6784\u8bbe\u8ba1\uff0c\u5305\u62ec\u5de5\u4f5c\u6d41\u4f18\u5316\u3001\u4e0a\u4e0b\u6587\u5de5\u7a0b\u4ee5\u53ca\u7cfb\u7edf\u7ea7\u7684\u53ef\u6269\u5c55\u6027\u7406\u8bba\u3002*\n\n*   **Scaling the Harness** \u63d0\u51fa\u667a\u80fd\u4f53AI\u7684\u4e0b\u4e00\u4e2a\u74f6\u9888\u5728\u4e8e**\u7cfb\u7edf\u7f29\u653e\uff08System Scaling\uff09**\uff0c\u5373\u56f4\u7ed5\u57fa\u7840\u6a21\u578b\u6784\u5efa\u53ef\u5ba1\u8ba1\u3001\u6301\u4e45\u5316\u3001\u6a21\u5757\u5316\u7684**\u667a\u80fd\u4f53\u633d\u5177\uff08Agent Harness\uff09**\u3002\u7814\u7a76\u5b9a\u4e49\u4e86\u4e0a\u4e0b\u6587\u6cbb\u7406\u3001\u53ef\u4fe1\u8bb0\u5fc6\u548c\u52a8\u6001\u6280\u80fd\u8def\u7531\u4e09\u5927\u6838\u5fc3\u74f6\u9888\uff0c\u5e76\u53d1\u5e03\u4e86\u53c2\u8003\u5b9e\u73b0 **CheetahClaws**\u3002\u6838\u5fc3\u89c2\u70b9\u662f\uff1a\u672a\u6765\u7684\u8fdb\u6b65\u5c06\u540c\u6837\u4f9d\u8d56\u4e8e\u7cfb\u7edf\u8bbe\u8ba1\uff0c\u800c\u4e0d\u4ec5\u4ec5\u662f\u66f4\u5f3a\u7684\u57fa\u7840\u6a21\u578b\u3002(2605.26112 [cs.LG])\n*   \u4e00\u9879\u5173\u4e8e**LLM\u8d4b\u80fd\u5de5\u4f5c\u6d41**\u7684\u7814\u7a76\u5206\u6790\u4e86\u5ef6\u8fdf\u3001\u53ef\u9760\u6027\u548c\u6210\u672c\u4e4b\u95f4\u7684\u57fa\u672c\u6743\u8861\u3002\u7814\u7a76\u5f15\u5165\u4e86\u5305\u542b\u63a8\u7406\u548c\u8f93\u51faToken\u5f71\u54cd\u7684\u53c2\u6570\u5316\u6307\u6570\u53ef\u9760\u6027\u51fd\u6570\uff0c\u5e76\u63d0\u51fa\u4e86**\u6ce8\u6c34Token\u5206\u914d\u7b56\u7565\uff08Water-filling Token Allocation Policy\uff09**\uff0c\u4ee5\u5728\u7ea6\u675f\u6761\u4ef6\u4e0b\u4f18\u5316\u987a\u5e8f\u5de5\u4f5c\u6d41\u7684\u53ef\u9760\u6027\uff0c\u4e3a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u8d44\u6e90\u8c03\u5ea6\u63d0\u4f9b\u4e86\u7406\u8bba\u4f9d\u636e\u3002(2605.23929 [cs.AI])\n*   **Code2UML** \u5c55\u793a\u4e86\u4e00\u79cd\u7528\u4e8e\u5927\u89c4\u6a21\u8f6f\u4ef6\u53ef\u89c6\u5316\u7684**\u667a\u80fd\u4f53\u67b6\u6784**\uff0c\u901a\u8fc7**\u4e0a\u4e0b\u6587\u5de5\u7a0b**\u89e3\u51b3IR\u8d85\u51faLLM\u4e0a\u4e0b\u6587\u9650\u5236\u7684\u95ee\u9898\u3002\u8be5\u7cfb\u7edf\u5229\u7528\u4e94\u4e2a\u4e13\u4e1a\u5316\u667a\u80fd\u4f53\uff08\u89c4\u5212\u3001\u5206\u6790\u3001\u7ed8\u56fe\u7b49\uff09\u548c\u4e00\u4e2a\u786e\u5b9a\u6027\u7684IR\u538b\u7f29\u5c42\uff0c\u80fd\u591f\u5728\u6beb\u79d2\u5185\u5c06\u5927\u578b\u4ee3\u7801\u5e93\u8f6c\u6362\u4e3a\u7b26\u5408Token\u9650\u5236\u7684\u89c6\u56fe\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u4e0d\u540c\u89c4\u6a21\u548c\u8bed\u8a00\u7684\u4ee3\u7801\u5e93\u4e0a\u5747\u80fd\u4fdd\u6301\u9ad8\u8bed\u6cd5\u6709\u6548\u6027\u548c\u7ed3\u6784\u8d28\u91cf\u3002(2605.24453 [cs.AI])\n\n---\n\n#### \u56db\u3001 \u4eca\u65e5\u770b\u70b9\n\n*   **\ud83d\udea8 \u8b66\u60d5\u201c\u8bb0\u5fc6\u526f\u4f5c\u7528\u201d\uff1a\u667a\u80fd\u4f53\u5b89\u5168\u7684\u65b0\u524d\u6cbf**\n    \u4eca\u65e5\u591a\u7bc7\u8bba\u6587\uff08ContextEcho, Memory-Induced Tool-Drift\uff09\u5171\u540c\u6307\u5411\u4e00\u4e2a\u88ab\u5ffd\u89c6\u7684\u98ce\u9669\uff1a**\u957f\u671f\u8bb0\u5fc6\u4e0d\u4ec5\u662f\u529f\u80fd\uff0c\u4e5f\u662f\u6f0f\u6d1e\u6e90**\u3002\u8bb0\u5fc6\u4e2d\u7684\u504f\u597d\u4f1a\u5bfc\u81f4\u4eba\u683c\u6f02\u79fb\u548c\u5de5\u5177\u8c03\u7528\u504f\u5dee\uff0c\u4e14\u73b0\u6709\u9632\u5fa1\u624b\u6bb5\u6548\u679c\u6709\u9650\u3002\u8fd9\u6807\u5fd7\u7740\u667a\u80fd\u4f53\u5b89\u5168\u7814\u7a76\u4ece\u201c\u8f93\u5165\u5bf9\u6297\u201d\u8f6c\u5411\u4e86\u201c\u5185\u90e8\u72b6\u6001\u7a33\u5b9a\u6027\u201d\u5ba1\u8ba1\u3002\n\n*   **\ud83d\udcc8 \u8303\u5f0f\u8f6c\u79fb\uff1a\u4ece\u201cModel Scaling\u201d\u5230\u201cHarness Scaling\u201d**\n    \u300aScaling the Harness\u300b\u4e00\u6587\u6781\u5177\u6d1e\u5bdf\u529b\u5730\u6307\u51fa\uff0c\u5355\u7eaf\u5806\u780c\u6a21\u578b\u53c2\u6570\u5df2\u89e6\u53ca\u74f6\u9888\uff0c**\u7cfb\u7edf\u67b6\u6784\uff08Harness\uff09**\u7684\u8bbe\u8ba1\u2014\u2014\u5305\u62ec\u8bb0\u5fc6\u3001\u68c0\u7d22\u3001\u7f16\u6392\u548c\u6cbb\u7406\u5c42\u7684\u534f\u540c\u2014\u2014\u5c06\u6210\u4e3a\u51b3\u5b9a\u667a\u80fd\u4f53\u6027\u80fd\u7684\u5173\u952e\u3002\u8fd9\u9884\u793a\u7740AI\u5de5\u7a0b\u5c06\u4ece\u201c\u8c03\u53c2\u201d\u8f6c\u5411\u201c\u7cfb\u7edf\u67b6\u6784\u8bbe\u8ba1\u201d\u3002\n\n*   **\ud83d\udd0d \u53ef\u89e3\u91ca\u6027\u7a81\u7834\uff1a\u5de5\u5177\u4f9d\u8d56\u56fe\u7684\u7ebf\u6027\u89e3\u7801**\n    \u53d1\u73b0LLM\u6b8b\u5dee\u6d41\u4e2d\u7ebf\u6027\u7f16\u7801\u4e86\u5de5\u5177\u8c03\u7528\u7684\u4f9d\u8d56\u56fe\uff0c\u8fd9\u662f\u4e00\u4e2a\u91cd\u8981\u7684\u53ef\u89e3\u91ca\u6027\u8fdb\u5c55\u3002\u5b83\u8bc1\u660e\u4e86\u6a21\u578b\u5e76\u975e\u76f2\u76ee\u8c03\u7528\u5de5\u5177\uff0c\u800c\u662f\u5185\u90e8\u6784\u5efa\u4e86\u62bd\u8c61\u7684\u6267\u884c\u62d3\u6251\u3002\u8fd9\u4e3a\u672a\u6765\u5f00\u53d1**\u57fa\u4e8e\u5185\u90e8\u8868\u5f81\u7684\u5de5\u5177\u8c03\u7528\u76d1\u63a7\u548c\u5e72\u9884\u673a\u5236**\u63d0\u4f9b\u4e86\u7406\u8bba\u57fa\u7840\u3002\n\n*   **\ud83c\udf10 \u534f\u4f5c\u7f51\u7edc\u7684\u201c\u516c\u5730\u60b2\u5267\u201d**\n    EvoMap\u7684\u7814\u7a76\u63ed\u793a\u4e86\u53bb\u4e2d\u5fc3\u5316\u667a\u80fd\u4f53\u534f\u4f5c\u7f51\u7edc\u4e2d\u5b58\u5728\u7684\u4e25\u91cd\u6fc0\u52b1\u9519\u914d\u548c\u8d28\u91cf\u63a7\u5236\u7f3a\u5931\u3002\u8fd9\u63d0\u9192\u6211\u4eec\uff0c\u5728\u6784\u5efa\u5927\u89c4\u6a21A2A\u751f\u6001\u65f6\uff0c**\u53ef\u9a8c\u8bc1\u7684\u6267\u884c\u8bc1\u636e**\u548c**\u57fa\u4e8e\u91c7\u7528\u7684\u6fc0\u52b1\u673a\u5236**\u6bd4\u5355\u7eaf\u7684\u53d1\u5e03\u5956\u52b1\u66f4\u4e3a\u91cd\u8981\uff0c\u5426\u5219\u5c06\u5bfc\u81f4\u4f4e\u8d28\u91cf\u8d44\u4ea7\u7684\u6cdb\u6ee5\u3002",
    "2026-05-25": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-05-25)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u9ad8\u5ea6\u96c6\u4e2d\u5728**\u667a\u80fd\u4f53\uff08Agent\uff09\u7684\u81ea\u4e3b\u8fdb\u5316\u4e0e\u957f\u7a0b\u7a33\u5b9a\u6027**\u4e0a\u3002\u4ece\u201c\u6280\u80fd\u5373\u5916\u90e8\u72b6\u6001\u201d\u7684\u4f18\u5316\u8303\u5f0f\uff0c\u5230\u57fa\u4e8e\u8bc1\u636e\u9a8c\u8bc1\u7684\u81ea\u6211\u8fdb\u5316\u95ed\u73af\uff0c\u518d\u5230\u9488\u5bf9\u5c0f\u6a21\u578b\u7684\u9ad8\u6548\u4e24\u65f6\u95f4\u5c3a\u5ea6\u8fdb\u5316\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u5728\u8bd5\u56fe\u89e3\u51b3\u667a\u80fd\u4f53\u5728\u590d\u6742\u4efb\u52a1\u4e2d\u201c\u5982\u4f55\u6301\u7eed\u53d8\u5f3a\u201d\u4ee5\u53ca\u201c\u5982\u4f55\u53ef\u9760\u6267\u884c\u201d\u7684\u6838\u5fc3\u96be\u9898\u3002\u4e0e\u6b64\u540c\u65f6\uff0c\u9488\u5bf9\u957f\u7a0b\u4efb\u52a1\u7684**\u8d44\u6e90\u6548\u7387**\u4e0e**\u76ee\u6807\u6301\u4e45\u6027**\u8bc4\u4f30\u4e5f\u8fce\u6765\u4e86\u65b0\u7684\u65b9\u6cd5\u8bba\u7a81\u7834\uff0c\u6807\u5fd7\u7740Agent\u7814\u7a76\u6b63\u4ece\u201c\u529f\u80fd\u5b9e\u73b0\u201d\u5411\u201c\u5de5\u7a0b\u5316\u53ef\u9760\u6027\u201d\u4e0e\u201c\u53ef\u89e3\u91ca\u6027\u201d\u6df1\u6c34\u533a\u8fc8\u8fdb\u3002\n\n---\n\n### \u4e00\u3001 \u6280\u80fd\u5373\u4ee3\u7801\uff1a\u667a\u80fd\u4f53\u7684\u81ea\u4e3b\u8fdb\u5316\u65b0\u8303\u5f0f\n\n\u8fd9\u4e00\u677f\u5757\u7684\u8bba\u6587\u5171\u540c\u63a2\u8ba8\u4e86\u5982\u4f55\u8ba9Agent\u6446\u8131\u5bf9\u4eba\u5de5\u63d0\u793a\u8bcd\u5de5\u7a0b\u7684\u4f9d\u8d56\uff0c\u901a\u8fc7\u7b97\u6cd5\u5316\u7684\u65b9\u5f0f\u5b9e\u73b0\u6280\u80fd\u6216\u903b\u8f91\u7684\u81ea\u52a8\u4f18\u5316\u4e0e\u8fed\u4ee3\u3002\n\n*   **SkillOpt: \u5c06\u6280\u80fd\u89c6\u4e3a\u53ef\u4f18\u5316\u7684\u5916\u90e8\u72b6\u6001**\n    \u8be5\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u79cd\u7cfb\u7edf\u6027\u7684\u6587\u672c\u7a7a\u95f4\u4f18\u5316\u5668 **SkillOpt**\uff0c\u4e3b\u5f20\u5c06Agent\u7684\u6280\u80fd\u89c6\u4e3a\u51bb\u7ed3\u6a21\u578b\u7684\u5916\u90e8\u72b6\u6001\u8fdb\u884c\u8bad\u7ec3\uff0c\u800c\u975e\u4f9d\u8d56\u677e\u6563\u7684\u81ea\u6211\u4fee\u6b63\u3002\u901a\u8fc7\u5f15\u5165\u7c7b\u4f3c\u6df1\u5ea6\u5b66\u4e60\u4f18\u5316\u5668\u7684\u673a\u5236\uff08\u5982\u5b66\u4e60\u7387\u9884\u7b97\u3001\u62d2\u7edd\u7f16\u8f91\u7f13\u51b2\u533a\uff09\uff0cSkillOpt\u4ec5\u5728\u63a5\u53d7\u80fd\u4e25\u683c\u63d0\u5347\u9a8c\u8bc1\u5206\u6570\u7684\u7f16\u8f91\u65f6\u624d\u66f4\u65b0\u6280\u80fd\u6587\u6863\uff0c\u4ece\u800c\u5b9e\u73b0\u4e86\u96f6\u63a8\u7406\u5f00\u9500\u7684\u7a33\u5b9a\u8fdb\u5316\u3002\u5728GPT-5.5\u7b49\u524d\u6cbf\u6a21\u578b\u4e0a\uff0c\u8be5\u65b9\u6cd5\u663e\u8457\u63d0\u5347\u4e86\u76f4\u63a5\u5bf9\u8bdd\u53caCodex/Claude Code\u73af\u5883\u4e0b\u7684\u4efb\u52a1\u51c6\u786e\u7387\uff0c\u5e76\u5c55\u73b0\u51fa\u826f\u597d\u7684\u8de8\u6a21\u578b\u8fc1\u79fb\u80fd\u529b\u3002\n    (2605.23904 [cs.CL])\n\n*   **EVE-Agent: \u57fa\u4e8e\u8bc1\u636e\u9a8c\u8bc1\u7684\u53ef\u4fe1\u81ea\u6211\u8fdb\u5316**\n    \u9488\u5bf9\u65e0\u6570\u636e\u81ea\u6211\u8fdb\u5316\u4e2d\u53ef\u80fd\u4ea7\u751f\u7684\u201c\u5e7b\u89c9\u5956\u52b1\u201d\u95ee\u9898\uff0c**EVE-Agent** \u5f15\u5165\u4e86**\u8bc1\u636e\u53ef\u9a8c\u8bc1\u6027\uff08Evidence Verifiability\uff09**\u539f\u5219\uff0c\u8981\u6c42\u751f\u6210\u7684\u6bcf\u4e2a\u8bad\u7ec3\u5b9e\u4f8b\u5fc5\u987b\u5305\u542b\u53ef\u6eaf\u6e90\u7684\u8bc1\u636e\u7247\u6bb5\u3002\u901a\u8fc7\u4fee\u6539\u63d0\u8bae\u8005-\u6c42\u89e3\u8005\u6846\u67b6\uff0c\u5229\u7528\u8bc1\u636e\u5bf9\u7b54\u6848\u51c6\u786e\u7387\u7684\u8fb9\u9645\u589e\u76ca\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\uff0cEVE-Agent\u6784\u5efa\u4e86\u4e00\u4e2a\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u4e14\u5177\u5907\u5ba1\u8ba1\u80fd\u529b\u7684\u81ea\u6211\u8fdb\u5316\u95ed\u73af\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u663e\u8457\u63d0\u9ad8\u4e86\u641c\u7d22\u578bAgent\u5728\u8bc1\u636e grounding \u65b9\u9762\u7684\u6b63\u786e\u6027\uff0c\u786e\u4fdd\u4e86\u8fdb\u5316\u8fc7\u7a0b\u7684\u900f\u660e\u5ea6\u4e0e\u53ef\u9760\u6027\u3002\n    (2605.22905 [cs.CL])\n\n*   **PACE: \u5c0f\u6a21\u578bAgent\u7684\u4e24\u65f6\u95f4\u5c3a\u5ea6\u81ea\u6211\u8fdb\u5316**\n    \u9762\u5411\u8d44\u6e90\u53d7\u9650\u573a\u666f\uff0c**PACE** \u6846\u67b6\u8bc1\u660e\u4e86\u51bb\u7ed3\u7684\u5c0f\u8bed\u8a00\u6a21\u578b\uff08SLM\uff09\u4e5f\u80fd\u5b9e\u73b0\u6709\u6548\u7684\u81ea\u6211\u8fdb\u5316\uff0c\u65e0\u9700\u4f9d\u8d56\u524d\u6cbf\u5927\u6a21\u578b\u4f5c\u4e3a\u6559\u5e08\u3002\u8be5\u6846\u67b6\u91c7\u7528**\u4e24\u65f6\u95f4\u5c3a\u5ea6\uff08Two-Timescale\uff09**\u7b56\u7565\uff1a\u5148\u5728\u56fa\u5b9a\u63a7\u5236\u903b\u8f91\u4e0b\u4f4e\u98ce\u9669\u5730\u4f18\u5316Prompt\uff0c\u5f85\u6536\u76ca\u9971\u548c\u540e\u518d\u8fdb\u884c\u53d7\u63a7\u7684\u63a7\u5236\u903b\u8f91\u66f4\u65b0\uff0c\u5e76\u901a\u8fc7\u4fdd\u7559\u9a8c\u8bc1\u96c6\u63a5\u53d7\u66f4\u65b0\u3002\u57284B-14B\u53c2\u6570\u7684SLM\u4e0a\uff0cPACE\u5728\u6240\u6709\u6d4b\u8bd5\u7ec4\u5408\u4e2d\u5747\u53d6\u5f97\u6700\u4f73\u6027\u80fd\uff0c\u5c55\u793a\u4e86\u81ea\u4e3b\u53d1\u73b0\u4efb\u52a1\u9002\u914d\u63a8\u7406\u7b56\u7565\u7684\u6f5c\u529b\u3002\n    (2605.23019 [cs.LG])\n\n### \u4e8c\u3001 \u957f\u7a0b\u4efb\u52a1\u7684\u53ef\u9760\u6027\u4e0e\u6548\u7387\u4f18\u5316\n\n\u968f\u7740Agent\u4efb\u52a1\u65f6\u957f\u7684\u589e\u52a0\uff0c\u5982\u4f55\u4fdd\u6301\u76ee\u6807\u4e00\u81f4\u6027\u3001\u7ba1\u7406\u4e0a\u4e0b\u6587\u7a97\u53e3\u4ee5\u53ca\u91cf\u5316\u6267\u884c\u6210\u672c\u6210\u4e3a\u5173\u952e\u6311\u6218\u3002\n\n*   **Push Your Agent: \u91cf\u5316\u76ee\u6807\u6301\u4e45\u6027\uff08QGP\uff09\u57fa\u51c6**\n    \u8be5\u7814\u7a76\u63ed\u793a\u4e86\u957f\u7a0bAgent\u5728\u5c40\u90e8\u5de5\u5177\u8c03\u7528\u6210\u529f\u4f46\u672a\u80fd\u575a\u6301\u5b8c\u6210\u5b9a\u91cf\u76ee\u6807\u65f6\u7684**\u76ee\u6807\u6301\u4e45\u6027\uff08Goal Persistence\uff09**\u7f3a\u9677\u3002\u901a\u8fc7\u6784\u5efa **PushBench** \u57fa\u51c6\uff0c\u76f4\u63a5\u6d4b\u91cf\u91cd\u590d\u63d0\u4ea4\u3001\u865a\u5047\u5b8c\u6210\u548c\u8fdb\u5ea6\u6f02\u79fb\u7b49\u95ee\u9898\uff0c\u7814\u7a76\u53d1\u73b0\u6807\u51c6\u63a7\u5236\u5668\u5728\u590d\u6742\u5b9a\u91cf\u4efb\u52a1\u4e2d\u8868\u73b0\u6781\u5dee\uff0c\u800c\u5f15\u5165\u72b6\u6001\u8ddf\u8e2a\u6216\u79ef\u538b\u8ddf\u8e2a\u7684\u63a7\u5236\u5668\u80fd\u663e\u8457\u63d0\u5347\u6210\u529f\u7387\u3002\u8fd9\u8868\u660eAgent\u7684\u53ef\u9760\u6027\u4e0d\u4ec5\u53d6\u51b3\u4e8e\u5355\u6b21\u4efb\u52a1\u80fd\u529b\uff0c\u66f4\u53d6\u51b3\u4e8e\u5176\u5728\u9a8c\u8bc1\u5668\u53cd\u9988\u4e0b\u7684\u6301\u7eed\u5de5\u4f5c\u80fd\u529b\u3002\n    (2605.23574 [cs.LG])\n\n*   **Parallel Context Compaction: \u5e76\u884c\u4e0a\u4e0b\u6587\u538b\u7f29\u52a0\u901f\u957f\u7a0b\u670d\u52a1**\n    \u9488\u5bf9\u957f\u7a0b\u5bf9\u8bdd\u4e2d\u4e0a\u4e0b\u6587\u538b\u7f29\u5bfc\u81f4\u7684\u63a8\u7406\u963b\u585e\u548c\u4fe1\u606f\u4e22\u5931\u95ee\u9898\uff0c\u8be5\u8bba\u6587\u63d0\u51fa\u4e86**\u5e76\u884c\u538b\u7f29\uff08Parallel Compaction\uff09**\u6280\u672f\u3002\u4e0e\u4f20\u7edf\u7684\u4e32\u884c\u540c\u6b65\u6458\u8981\u4e0d\u540c\uff0c\u5e76\u884c\u538b\u7f29\u5141\u8bb8\u64cd\u4f5c\u8005\u5bf9\u6458\u8981\u4f53\u79ef\u8fdb\u884c\u7ec6\u7c92\u5ea6\u3001\u53ef\u9884\u6d4b\u7684\u63a7\u5236\uff0c\u5e76\u652f\u6301\u9488\u5bf9\u6bcf\u4e2a\u5757\u7684\u5b9a\u5411\u63d0\u793a\u5de5\u7a0b\u3002\u57288B\u81f3120B\u53c2\u6570\u7684\u591a\u79cd\u67b6\u6784\u6a21\u578b\u4e0a\u6d4b\u8bd5\u663e\u793a\uff0c\u8be5\u65b9\u6cd5\u5728\u5339\u914d\u538b\u7f29\u89e3\u7801\u91cf\u7684\u60c5\u51b5\u4e0b\uff0c\u663e\u8457\u964d\u4f4e\u4e86\u7aef\u5230\u7aef\u5899\u949f\u65f6\u95f4\u5e76\u63d0\u9ad8\u4e86\u538b\u7f29\u541e\u5410\u91cf\uff0c\u89e3\u51b3\u4e86\u957f\u7a0bAgent\u670d\u52a1\u4e2d\u7684\u5ef6\u8fdf\u74f6\u9888\u3002\n    (2605.23296 [cs.AI])\n\n*   **Energy per Successful Goal: \u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u80fd\u6e90\u4f1a\u8ba1\u65b0\u6807\u51c6**\n    \u9274\u4e8e\u4f20\u7edf\u201c\u6bcf\u6b21\u63a8\u7406\u80fd\u8017\u201d\u6307\u6807\u65e0\u6cd5\u53cd\u6620\u667a\u80fd\u4f53\u591a\u6b65\u7f16\u6392\u7684\u771f\u5b9e\u6210\u672c\uff0c\u8be5\u7814\u7a76\u63d0\u51fa\u4e86**A-LEMS**\u6846\u67b6\uff0c\u5c06\u8ba1\u91cf\u5355\u4f4d\u91cd\u65b0\u5b9a\u4e49\u4e3a**\u6bcf\u6b21\u6210\u529f\u76ee\u6807\u7684\u80fd\u8017\uff08Energy per Successful Goal, EpG\uff09**\u3002\u901a\u8fc7\u5f15\u5165**\u7f16\u6392\u5f00\u9500\u6307\u6570\uff08OOI\uff09**\uff0c\u7814\u7a76\u53d1\u73b0\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\u7684\u5e73\u5747\u80fd\u8017\u662f\u7ebf\u6027\u57fa\u7ebf\u76844.33\u500d\uff0c\u4e3b\u8981\u6e90\u4e8e\u7f16\u6392\u7ed3\u6784\u800c\u975e\u63a8\u7406\u8ba1\u7b97\u672c\u8eab\uff1b\u4f46\u5728\u5de5\u5177\u589e\u5f3a\u4efb\u52a1\u4e2d\uff0c\u667a\u80fd\u4f53\u6267\u884c\u53cd\u800c\u66f4\u8282\u80fd\u3002\u8fd9\u4e00\u53d1\u73b0\u786e\u7acb\u4e86\u7f16\u6392\u7ed3\u6784\u4f5c\u4e3a\u80fd\u8017\u4e3b\u8981\u51b3\u5b9a\u56e0\u7d20\u7684\u5730\u4f4d\uff0c\u4e3a\u667a\u80fd\u4f53\u80fd\u6548\u8bc4\u4f30\u63d0\u4f9b\u4e86\u65b0\u57fa\u51c6\u3002\n    (2605.22883 [cs.LG])\n\n---\n\n### \u4eca\u65e5\u770b\u70b9\n\n*   **\u8d8b\u52bf\u89c2\u5bdf\uff1a\u4ece\u201cPrompt Engineering\u201d\u5230\u201cSkill Optimization\u201d**\n    \u4eca\u65e5\u591a\u7bc7\u8bba\u6587\uff08SkillOpt, PACE, EVE-Agent\uff09\u5171\u540c\u6307\u5411\u4e00\u4e2a\u8d8b\u52bf\uff1aAgent\u7684\u8fdb\u5316\u6b63\u5728\u4ece\u4f9d\u8d56\u4eba\u5de5\u8c03\u8bd5Prompt\uff0c\u8f6c\u5411**\u7b97\u6cd5\u5316\u7684\u6280\u80fd/\u903b\u8f91\u4f18\u5316**\u3002\u7279\u522b\u662fSkillOpt\u5c06\u6280\u80fd\u89c6\u4e3a\u201c\u5916\u90e8\u72b6\u6001\u201d\u5e76\u8fdb\u884c\u68af\u5ea6\u5f0f\u4f18\u5316\u7684\u601d\u8def\uff0c\u4ee5\u53caPACE\u5728\u5c0f\u6a21\u578b\u4e0a\u7684\u6210\u529f\uff0c\u9884\u793a\u7740\u672a\u6765Agent\u5f00\u53d1\u5c06\u66f4\u50cf\u4f20\u7edf\u7684\u8f6f\u4ef6\u5de5\u7a0b\uff0c\u5177\u5907\u53ef\u7248\u672c\u63a7\u5236\u3001\u53ef\u9a8c\u8bc1\u548c\u53ef\u8fc1\u79fb\u7684\u7279\u6027\u3002\n\n*   **\u98a0\u8986\u6027\u89c2\u70b9\uff1a\u80fd\u8017\u8bc4\u4f30\u8303\u5f0f\u7684\u8f6c\u79fb**\n    **A-LEMS** \u63d0\u51fa\u7684\u201c\u6bcf\u6b21\u6210\u529f\u76ee\u6807\u7684\u80fd\u8017\uff08EpG\uff09\u201d\u6311\u6218\u4e86\u73b0\u6709\u7684\u80fd\u6548\u8bc4\u4f30\u6807\u51c6\u3002\u5b83\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u7684\u4e8b\u5b9e\uff1a\u5bf9\u4e8e\u67d0\u4e9b\u5de5\u5177\u589e\u5f3a\u4efb\u52a1\uff0c\u667a\u80fd\u4f53\u7684\u590d\u6742\u7f16\u6392\u53cd\u800c\u6bd4\u7ebf\u6027\u6267\u884c\u66f4\u8282\u80fd\u3002\u8fd9\u63d0\u9192\u6211\u4eec\uff0c\u8bc4\u4f30Agent\u6548\u7387\u4e0d\u80fd\u53ea\u770bToken\u6d88\u8017\uff0c\u5fc5\u987b\u8003\u8651**\u7f16\u6392\u7ed3\u6784\uff08Orchestration Structure\uff09**\u5bf9\u6574\u4f53\u8d44\u6e90\u5229\u7528\u7684\u5f71\u54cd\u3002\n\n*   **\u6f5c\u529b\u6280\u672f\uff1a\u8bc1\u636e\u53ef\u9a8c\u8bc1\u7684\u81ea\u6211\u8fdb\u5316\u95ed\u73af**\n    **EVE-Agent** \u63d0\u51fa\u7684\u201c\u8bc1\u636e\u53ef\u9a8c\u8bc1\u6027\u201d\u4e3a\u81ea\u6211\u8fdb\u5316Agent\u7684\u4fe1\u4efb\u95ee\u9898\u63d0\u4f9b\u4e86\u6781\u5177\u6f5c\u529b\u7684\u89e3\u51b3\u65b9\u6848\u3002\u901a\u8fc7\u5f3a\u5236\u8981\u6c42\u751f\u6210\u53ef\u6eaf\u6e90\u7684\u8bc1\u636e\u7247\u6bb5\u5e76\u636e\u6b64\u8ba1\u7b97\u5956\u52b1\uff0c\u8be5\u65b9\u6cd5\u4e0d\u4ec5\u63d0\u9ad8\u4e86\u51c6\u786e\u6027\uff0c\u8fd8\u5b9e\u73b0\u4e86\u8fdb\u5316\u8fc7\u7a0b\u7684**\u53ef\u5ba1\u8ba1\u6027\uff08Auditable\uff09**\u3002\u8fd9\u5728\u533b\u7597\u3001\u6cd5\u5f8b\u7b49\u9ad8\u98ce\u9669\u9886\u57df\u7684Agent\u5e94\u7528\u4e2d\u5177\u6709\u6781\u9ad8\u7684\u843d\u5730\u4ef7\u503c\u3002\n\n*   **\u5de5\u7a0b\u6d1e\u5bdf\uff1a\u957f\u7a0b\u4efb\u52a1\u7684\u201c\u6301\u4e45\u6027\u201d\u74f6\u9888**\n    **PushBench** \u7684\u7814\u7a76\u7ed3\u679c\u4ee4\u4eba\u8b66\u9192\uff1a\u5373\u4f7f\u662f\u6700\u524d\u6cbf\u7684Agent\uff08\u5982Claude Code, Codex\uff09\uff0c\u5728\u9762\u5bf9100\u4e2a\u7269\u54c1\u7684\u5b9a\u91cf\u6536\u96c6\u4efb\u52a1\u65f6\uff0c\u6210\u529f\u7387\u4e5f\u4f1a\u65ad\u5d16\u5f0f\u4e0b\u8dcc\u3002\u8fd9\u8868\u660e\u5f53\u524d\u7684Agent\u67b6\u6784\u5728**\u72b6\u6001\u8ddf\u8e2a**\u548c**\u76ee\u6807\u6301\u4e45\u6027**\u65b9\u9762\u5b58\u5728\u6839\u672c\u6027\u7f3a\u9677\uff0c\u672a\u6765\u7684\u4f18\u5316\u91cd\u70b9\u5e94\u4ece\u201c\u5355\u6b21\u63a8\u7406\u8d28\u91cf\u201d\u8f6c\u5411\u201c\u957f\u7a0b\u72b6\u6001\u7ba1\u7406\u7684\u9c81\u68d2\u6027\u201d\u3002",
    "2026-05-22": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-05-22)\n\n#### \u5f00\u7bc7\u5bfc\u8bed\n\u4eca\u65e5\u7684\u7814\u7a76\u7126\u70b9\u9ad8\u5ea6\u96c6\u4e2d\u4e8e**\u667a\u80fd\u4f53\uff08Agent\uff09\u7684\u81ea\u4e3b\u8fdb\u5316\u4e0e\u67b6\u6784\u91cd\u6784**\u3002\u4ece\u9759\u6001\u914d\u7f6e\u5230\u52a8\u6001\u81ea\u6211\u4fee\u6b63\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u5728\u7a81\u7834\u4f20\u7edfAgent\u201c\u90e8\u7f72\u5373\u56fa\u5316\u201d\u7684\u74f6\u9888\u3002\u4e00\u65b9\u9762\uff0c**FlyRoute** \u548c **Ratchet** \u5c55\u793a\u4e86\u5982\u4f55\u901a\u8fc7\u6570\u636e\u98de\u8f6e\u548c\u536b\u751f\u673a\u5236\u4f18\u5316Agent\u7684\u6280\u80fd\u5e93\u4e0e\u8def\u7531\u7b56\u7565\uff1b\u53e6\u4e00\u65b9\u9762\uff0c**MOSS** \u548c **ActiveGraph** \u5219\u4ece\u66f4\u5e95\u5c42\u7684\u4ee3\u7801\u91cd\u5199\u548c\u4e8b\u4ef6\u6eaf\u6e90\u67b6\u6784\u5165\u624b\uff0c\u8bd5\u56fe\u89e3\u51b3Agent\u5728\u590d\u6742\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u7ed3\u6784\u6027\u5931\u8d25\u4e0e\u53ef\u5ba1\u8ba1\u6027\u95ee\u9898\u3002\u8fd9\u6807\u5fd7\u7740Agent\u7814\u7a76\u6b63\u4ece\u201c\u63d0\u793a\u8bcd\u5de5\u7a0b\u201d\u5411\u201c\u7cfb\u7edf\u5de5\u7a0b\u201d\u4e0e\u201c\u81ea\u4e3b\u7ef4\u62a4\u201d\u6df1\u6c34\u533a\u8fc8\u8fdb\u3002\n\n---\n\n#### \u4e09\u3001 \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \ud83d\udd04 \u6280\u80fd\u8fdb\u5316\u4e0e\u8def\u7531\u4f18\u5316\uff1a\u8ba9Agent\u8d8a\u7528\u8d8a\u806a\u660e\n\n*   **FlyRoute** \u9488\u5bf9\u4f01\u4e1a\u7ea7Agent\u8def\u7531\u4e2d\u914d\u7f6e\u6587\u4ef6\u6ede\u540e\u4e8e\u6a21\u578b\u80fd\u529b\u6f14\u8fdb\u7684\u75db\u70b9\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd**\u81ea\u8fdb\u5316\u753b\u50cf\u6846\u67b6**\u3002\u5b83\u901a\u8fc7\u771f\u5b9e\u6d41\u91cf\u6784\u5efa\u6570\u636e\u98de\u8f6e\uff0c\u5c06\u6210\u529f\u4ea4\u4e92\u6848\u4f8b\u84b8\u998f\u4e3a\u80fd\u529b\u63cf\u8ff0\uff0c\u5e76\u7ed3\u5408BM25\u68c0\u7d22\u589e\u5f3aLLM\u8def\u7531\u5668\u7684\u51b3\u7b56\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u4ec5\u9700\u5c11\u91cf\u79cd\u5b50\u67e5\u8be2\u5373\u53ef\u663e\u8457\u63d0\u5347\u51b7\u542f\u52a8\u8def\u7531\u51c6\u786e\u7387\uff0c\u968f\u7740\u6570\u636e\u79ef\u7d2f\uff0c\u8def\u7531\u7cbe\u5ea6\u5927\u5e45\u63d0\u5347\uff0c\u8bc1\u660e\u4e86**\u52a8\u6001\u753b\u50cf\u68c0\u7d22**\u5bf9\u8def\u7531\u6027\u80fd\u7684\u5173\u952e\u589e\u5f3a\u4f5c\u7528\u3002 (2605.22057 [cs.CL])\n*   **Ratchet** \u6307\u51fa\u5f53\u524d\u81ea\u8fdb\u5316Agent\u7684\u6838\u5fc3\u74f6\u9888\u5e76\u975e\u6280\u80fd\u751f\u6210\uff0c\u800c\u662f**\u751f\u547d\u5468\u671f\u7ba1\u7406**\uff08\u5982\u5197\u4f59\u3001\u8fc7\u65f6\u6280\u80fd\uff09\u3002\u8be5\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u79cd\u6781\u7b80\u7684**\u536b\u751f\u673a\u5236\uff08Hygiene Recipe\uff09**\uff0c\u5305\u542b\u57fa\u4e8e\u7ed3\u679c\u7684\u9000\u5f79\u3001\u6709\u754c\u6d3b\u8dc3\u5bb9\u91cf\u3001\u5143\u6280\u80fd\u5f15\u5bfc\u548c\u6a21\u5f0f\u89c4\u8303\u5316\u3002\u5728MBPP+\u548cSWE-bench\u4e0a\u7684\u5b9e\u9a8c\u663e\u793a\uff0c\u4ec5\u9760**\u9000\u5f79\u673a\u5236**\u548c**\u5143\u6280\u80fd\u5148\u9a8c**\u5373\u53ef\u663e\u8457\u63d0\u5347\u957f\u671f\u6027\u80fd\uff0c\u4e14\u901a\u8fc7\u6709\u754c\u5bb9\u91cf\u9632\u6b62\u4e86\u6027\u80fd\u6f02\u79fb\uff0c\u8bc1\u660e\u4e86\u201c\u5c11\u5373\u662f\u591a\u201d\u7684\u7ef4\u62a4\u7b56\u7565\u6709\u6548\u6027\u3002 (2605.22148 [cs.CL])\n\n### \ud83d\udee0\ufe0f \u5e95\u5c42\u67b6\u6784\u9769\u65b0\uff1a\u4ece\u6587\u672c\u5c42\u5230\u4ee3\u7801\u5c42\u4e0e\u4e8b\u4ef6\u5c42\n\n*   **MOSS** \u6311\u6218\u4e86\u73b0\u6709\u81ea\u8fdb\u5316Agent\u4ec5\u4fee\u6539\u6587\u672c\u5de5\u4ef6\uff08\u5982Prompt\u3001\u6280\u80fd\u6587\u4ef6\uff09\u7684\u5c40\u9650\uff0c\u63d0\u51fa**\u6e90\u7801\u7ea7\u91cd\u5199\uff08Source-Level Rewriting\uff09**\u65b9\u6848\u3002\u8be5\u7cfb\u7edf\u57fa\u4e8e\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u5931\u8d25\u8bc1\u636e\uff0c\u901a\u8fc7\u786e\u5b9a\u6027\u591a\u9636\u6bb5\u7ba1\u         let showOnlyStarred = false; // 筛选状态：是否只显示收藏的论文

        let activeTagFilters = {}; // {date: Set of active tag names}

        // 获取未加载的日期
        function getUnloadedDates() {
            return availableDates.filter(date => !loadedDates.has(date));
        }

        // Tag filter toggle
        function toggleTagFilter(date, tagName) {
            if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json?v=${DATA_VERSION}`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {

                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;

            }
        }

        // 从localStorage加载状态

            const summaryLang = localStorage.getItem('summary_language');

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

            // 3秒后自动消失

                toast.style.opacity = '0';

                    document.body.removeChild(toast);
                }, 300);
            }, 3000);

        // 通过按钮删除论文（避免JavaScript字符串转义问题）
        function deletePaperByButton(button) {
            const arxivId = button.getAttribute('data-arxiv-id');
            const title = button.getAttribute('data-title');
            deletePaper(arxivId, title);
        }

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);
            }, 300);
        }

        // 切换星标状态
        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);
            }
            saveState();

            // 如果当前是只看收藏模式，需要重新渲染
            if (showOnlyStarred) {
                renderPapers();
            } else {
                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);
                if (starBtn) {
                    if (starredPapers.has(arxivId)) {
                        starBtn.classList.add('starred');
                    } else {
                        starBtn.classList.remove('starred');
                    }
                }
            }
        }

        // 切换已读状态
        function toggleRead(arxivId) {
            const checkbox = document.querySelector(`[data-arxiv-id="${arxivId}"] input[type="checkbox"]`);
            if (!checkbox) return;

            if (checkbox.checked) {
                readPapers.add(arxivId);
            } else {
                readPapers.delete(arxivId);
            }
            saveState();
        }

        // 切换摘要语言
        function toggleSummaryLanguage() {
            showChineseSummary = !showChineseSummary;
            const toggleBtn = document.getElementById('summary-toggle');
            toggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            // 更新所有摘要显示
            document.querySelectorAll('.summary-section').forEach(section => {
                const chineseContent = section.querySelector('.chinese-summary');
                const englishContent = section.querySelector('.english-summary');

                if (showChineseSummary) {
                    if (chineseContent) chineseContent.style.display = 'block';
                    if (englishContent) englishContent.style.display = 'none';

                    if (englishContent) englishContent.style.display = 'block';

        // 更新统计信息
        function updateStats() {
            const visiblePapers = document.querySelectorAll('.paper-item:not(.hidden-paper)').length;
            document.getElementById('total-papers').textContent = visiblePapers;
        }

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];
                header.textContent = `${dateLabel} (${totalPapers} 篇论文)`;
            }

            if (totalPapers === 0) {
                sectionEl.remove();

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {

            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';

            return `

                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>
                    </label>
                </div>
            `;

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">
                    <div class="collapsible-header open text-sm sm:text-base" onclick="toggleCollapsible(this)">原始摘要</div>
                    <div class="collapsible-content open">
                        <div class="inner">
                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}
                                ${hasSummaryZh ? `
                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                                    暂无原始摘要。上游抓取或解析可能失败。
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: paper.research_value_source === 'reviewgrounder' ? 'ReviewGrounder 审稿' : '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">

                                <div class="inner">
                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">

            if (renderedSections === 0) {
                html += `

                        <div class="bg-amber-50/80 dark:bg-amber-950/20 border-l-3 border-amber-300 p-3 sm:p-4 rounded-r-lg text-xs sm:text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。

                    </div>
                `;

            // 论文链接
            html += `

                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">

                        PDF 下载
                    </a>
                    <a href="https://papers.cool/arxiv/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>

                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                if (dateVisibleTotal === 0) {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-5 lg:p-6">
                            <div class="text-sm sm:text-base text-slate-600 dark:text-slate-300 leading-relaxed">
                                今日数据已处理，但没有符合当前筛选条件的论文。
                            </div>
                        </div>
                    </section>
                    `;
                } else {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                    `;
                }
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json?v=${DATA_VERSION}`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
