                    "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (Self-Evolving/Self-Improving, Agent capability/behavior)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。",
                    "intro_logic": "1. LLM agents在解决复杂交互式任务（如软件修复）时产生包含可复用经验的长程轨迹。\n2. 现有的记忆机制主要存储原始片段或总结，而更高层级的procedural knowledge（即skills）能更紧凑地指导未来行为。\n3. 近期工作尝试从轨迹中自动蒸馏skills以支持agent self-evolution，但严重依赖fixed prompts和heuristic criteria。\n4. 这种静态方法无法适应下游agent，且在SWE场景中难以从密集异构的反馈中区分可复用的procedural knowledge与任务特定细节。\n5. 因此，目前尚不清楚应提取何种证据、skill应具备何种抽象度以及如何维护skill bank，以确保其既跨任务可复用又对具体决策可执行。\n6. 如何从coding-agent trajectories中提取、演化并维护可复用的procedural skills，以最佳方式服务于下游agent？",
                    "core_insight": "作为学术分析师，我深入剖析了 **CODESKILL** 这篇论文。这篇论文的核心贡献不在于“技能（Skills）”本身（因为技能在Agent领域已被广泛研究），也不在于“强化学习（RL）”本身，而在于它重新定义了**技能管理（Skill Management）**的本质。\n\n以下是针对该论文关键洞察的深度解析：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n作者意识到，现有的技能构建方法依赖于固定的启发式规则（Fixed Prompts/Heuristics），这导致技能与下游代理（Downstream Agent）的实际需求脱节；真正的突破在于将“技能管理”本身重构为一个**可学习的策略（Learnable Policy）**，并通过下游代理的执行反馈进行端到端的优化。\n\n**展开解释：**\n在CODESKILL之前，大多数自我进化Agent的工作（如Reflexion, SkillRL等）都采用一种“静态”或“启发式”的方法来提取和更新记忆/技能。例如，使用固定的Prompt让LLM总结经验，或者使用简单的规则判断何时合并记忆。作者敏锐地发现，这种**“一刀切”**的方法存在根本缺陷：\n1.  **缺乏适应性**：固定的Prompt无法根据下游代理的具体能力（Frozen Policy $\\pi$）来调整技能的抽象程度或具体性。\n2.  **目标错位**：现有的方法通常优化的是“技能的质量”（如是否通顺、是否概括），而不是“技能对下游代理任务成功的贡献”。\n\n作者的核心认知突破是：**技能管理不应该是一个静态的文本处理过程，而应该是一个动态的、以结果为导向的决策过程。** 既然我们有一个固定的下游编码代理（Coding Agent），那么技能提取器（Skill Extractor）就应该像一个“教练”一样，通过观察“教练给出的建议”是否真的帮助“运动员（Agent）”赢得了比赛，来不断调整自己的“教学策略”。\n\n**论文原文证据：**\n> \"Existing skill construction and maintenance methods often rely on fixed prompts and heuristic update rules, leaving it unclear how knowledge should be selected, abstracted, and maintained to best serve downstream agents.\" (Abstract)\n\n> \"We propose CODESKILL, an LLM-based framework that reformulates skill extraction and skill-bank maintenance as a learnable management policy.\" (Abstract)\n\n> \"This limitation is especially salient for software-engineering (SWE) agents... As a result, it remains unclear what evidence should be extracted, how abstract a skill should be, and how the skill bank should be revised so that the resulting skills are both reusable across tasks and actionable for concrete agent decisions.\" (Introduction)\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接导向了CODESKILL独特的**“双层RL架构”**和**“混合奖励机制”**。推理链条如下：\n\n1.  **问题重构（Reformulation）**：\n    *   如果技能管理是一个策略，那么它就是一个马尔可夫决策过程（MDP）。\n    *   **状态（State）**：当前的轨迹证据（Trajectory Evidence）+ 现有的技能库（Skill Bank Context）。\n    *   **动作（Action）**：提取（Extract）、进化（Evolve）、维护（Add/Merge/Drop）技能。\n    *   **目标**：最大化下游代理在后续任务中的成功率。\n\n2.  **训练机制设计（The Bridge）**：\n    *   由于下游代理是**冻结的（Frozen）**，我们不能直接更新代理的参数。因此，必须更新**管理策略模型（$M_\\theta$）**。\n    *   为了训练这个策略，作者引入了**Group Relative Policy Optimization (GRPO)**。这是一种高效的RL算法，不需要价值网络（Critic），适合LLM微调。\n\n3.  **奖励函数的关键设计（The Crucial Link）**：\n    *   这是连接“洞察”与“方法”最紧密的部分。如果只用任务成功作为奖励（Sparse Reward），信号太稀疏且噪声大（Agent可能因为其他原因失败，而非技能不好）。\n    *   如果只用LLM评判技能质量（Dense Reward），则缺乏真实执行验证（Skill可能写得很好但没用）。\n    *   **解决方案**：设计了一个**混合奖励（Hybrid Reward）**：\n        $$ R = \\lambda R_Q + R_A R_E $$\n        *   $R_Q$ (Quality Reward)：LLM作为裁判，评估技能的格式、可重用性、具体性（解决“技能写得怎么样”）。\n        *   $R_E$ (Execution Reward)：将生成的技能注入下游代理，运行任务，计算相对于无技能基线的提升（解决“技能有没有用”）。\n        *   $R_A$ (Alignment Reward)：LLM判断代理是否真的遵循了该技能（解决“归因问题”，即代理成功是否归功于该技能）。\n\n**推理链条总结：**\n洞察（管理需适配下游） $\\rightarrow$ 方法（将管理建模为Policy） $\\rightarrow$ 优化（使用RL） $\\rightarrow$ 信号（混合奖励：质量+执行效果+对齐度）。\n\n### 3. 试错历程与调整\n\n在实现这一想法的过程中，作者遇到了几个意料之外的困难，并进行了相应的调整：\n\n**困难一：奖励信号的稀疏性与归因难题（Attribution Problem）**\n*   **问题**：在长周期的软件工程任务中，Agent的成功或失败受多种因素影响。如果Agent成功了，是因为技能好，还是因为Agent本身能力强？如果失败了，是因为技能误导，还是因为环境复杂？直接使用任务Pass/Fail作为奖励会导致梯度噪声极大，训练不稳定。\n*   **调整**：\n    1.  **引入基线对比（Baseline Subtraction）**：执行奖励 $R_E$ 定义为 $V(\\tau_{\\pi}^{u}) - b_{\\pi}(x_u)$，即有技能时的得分减去无技能时的基线得分。这确保了奖励只反映技能的**增量价值**。\n    2.  **引入对齐奖励（Alignment Reward $R_A$）**：作者发现，即使技能有用，Agent也可能忽略它。因此，他们增加了一个LLM裁判，专门判断Agent的行为轨迹是否与技能的触发条件和规则对齐。只有当Agent“听从”了建议且任务成功时，才给予高奖励。这解决了“技能好但Agent不用”的归因模糊问题。\n\n**困难二：技能库的无限膨胀（Unbounded Growth）**\n*   **问题**：在早期的实验中，如果只进行“提取（Extract）”和“添加（Add）”，技能库会随着训练不断膨胀，导致检索效率下降，且包含大量冗余或低质量技能。\n*   **调整**：\n    1.  **引入维护操作（Maintenance Operations）**：作者将“合并（Merge）”和“丢弃（Drop）”纳入动作空间。\n    2.  **课程学习（Curriculum Training）**：作者没有一开始就训练所有操作，而是采用了三阶段课程：\n        *   Phase 1: 仅训练提取（Extraction）。\n        *   Phase 2: 加入进化（Evolution），利用新轨迹修正旧技能。\n        *   Phase 3: 加入维护（Maintenance），学习何时合并或丢弃。\n    *   这种分阶段训练使得模型能够先学会“创造”，再学会“精炼”，最终实现技能库大小的稳定（Stable Size）。\n\n**困难三：数据闭环的构建**\n*   **问题**：RL需要大量的交互数据。如何高效地生成用于训练技能管理策略的数据？\n*   **调整**：\n    *   作者设计了**反向检索（Reverse Retrieval）**机制。在RL训练时，生成一个技能后，不是随机选任务测试，而是根据技能内容去检索最相关的任务（Top-K retrieval）进行测试。这确保了执行奖励 $R_E$ 是在技能最可能生效的场景下计算的，提高了信号的信噪比。\n\n**总结：**\nCODESKILL的诞生源于一个深刻的洞察：**技能不是静态的知识片段，而是需要针对特定代理进行动态优化的策略参数。** 通过引入混合奖励和课程学习，作者成功地将这一洞察转化为一个可训练、可进化、且能显著提升下游代理性能的系统。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\n这篇论文提出了一个叫 **CODESKILL** 的系统。它的核心工作不是直接去写代码，而是充当一个“技能管理员”。\n\n具体来说，当有一个现成的、不会变动的“写代码机器人”（下游 Agent）在解决软件问题时，CODESKILL 会观察这个机器人解决问题的全过程（包括成功的和失败的记录）。CODESKILL 会把这些过程总结成一条条通用的“操作指南”（即技能），并存入一个“技能库”。\n\n随着机器人解决更多问题，CODESKILL 会不断从新记录中提取新技能，或者修改旧技能，或者删除没用的技能。最终，当机器人遇到新任务时，CODESKILL 会从库里找出最相关的指南，塞给机器人看，帮助它更快、更准地解决问题。\n\n### 2. 一句话概括核心创新\n\n之前的做法是用固定的提示词（Prompt）或简单的规则来提取和更新技能，而 CODESKILL **把“如何提取、更新和管理技能”这件事本身，变成了一个可以通过强化学习（RL）自动优化的策略模型**，让模型自己学会什么样的技能对下游机器人最有用。\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：技能提取（Skill Extraction）\n*   **输入**：下游写代码机器人解决某个任务时的完整操作记录（Trajectory），包括它想了什么、做了什么、结果如何。\n*   **操作**：CODESKILL 模型分析这些记录，判断其中是否包含可复用的经验。如果包含，它会将经验抽象成两种形式的技能：\n    1.  **任务级技能**：针对某类任务的整体策略（例如：“遇到 Maven 构建失败，先检查环境配置”）。\n    2.  **事件驱动技能**：针对特定报错或现象的局部反应（例如：“当出现‘缺少 test-jar 依赖’错误时，先运行测试生成该文件”）。\n*   **输出**：一个新的技能草稿，或者决定“跳过”（如果记录中没有值得复用的经验）。\n*   **目的**：从海量的、杂乱的操作记录中，提炼出结构化的、可复用的知识，避免每次遇到类似问题都从头摸索。\n*   **如果不做会怎样**：机器人只能依靠自身的通用能力，无法利用历史经验，导致重复犯错或效率低下。\n\n#### 第二步：技能进化（Skill Evolution）\n*   **输入**：现有的某个技能 + 新的操作记录（特别是那些使用了旧技能但依然失败，或发现旧技能有缺陷的记录）。\n*   **操作**：CODESKILL 对比新记录和旧技能，发现旧技能的不足（比如遗漏了某种情况，或者步骤顺序不对），然后对旧技能进行修改和完善。\n*   **输出**：一个更新后的技能版本，或者决定“跳过”（如果新记录不足以支撑修改）。\n*   **目的**：让技能随着机器人的实践不断迭代，修正错误，适应更复杂的情况，防止技能过时。\n*   **如果不做会怎样**：技能库会僵化，包含过时或错误的指导，误导机器人。\n\n#### 第三步：技能库维护（Skill Bank Maintenance）\n*   **输入**：新提取或进化后的技能候选者 + 当前技能库中已有的相似技能。\n*   **操作**：CODESKILL 决定对这个候选者做什么：\n    1.  **添加（Add）**：如果它是全新的、有用的知识，就存入库中。\n    2.  **合并（Merge）**：如果它和库中某个技能很像但有互补之处，就把两者合并成一个更完善的技能。\n    3.  **丢弃（Drop）**：如果它冗余、质量差或太具体无法复用，就直接扔掉。\n*   **输出**：更新后的技能库（大小保持相对稳定，不会无限膨胀）。\n*   **目的**：控制技能库的大小和质量，防止库变得太大导致检索变慢，或包含太多垃圾信息干扰机器人。\n*   **如果不做会怎样**：技能库会无限膨胀，检索效率下降，且大量低质技能会干扰机器人的判断。\n\n#### 第四步：技能应用与反馈（Skill Usage & Feedback Loop）\n*   **输入**：新的软件任务 + 更新后的技能库。\n*   **操作**：\n    1.  **检索**：根据新任务的特点，从技能库中找出最相关的技能。\n    2.  **注入**：将这些技能作为“背景知识”插入到下游机器人的提示词中。\n    3.  **执行**：下游机器人带着这些技能去解决任务。\n    4.  **评估**：计算机器人是否成功解决了任务，以及它是否真的遵循了技能的指导。\n*   **输出**：任务解决的结果（成功/失败）以及详细的执行轨迹。\n*   **目的**：验证技能的有效性，并为 CODESKILL 模型的训练提供奖励信号（Reward）。\n*   **如果不做会怎样**：技能库只是静态存储，无法通过实际效果来优化，CODESKILL 无法学会“什么才是好技能”。\n\n### 4. 讲透输入、操作、输出与动机（针对训练过程）\n\n为了训练 CODESKILL 模型，论文使用了一种混合奖励的强化学习（RL）方法：\n\n*   **输入**：训练数据（历史轨迹）+ 当前技能库状态。\n*   **操作**：\n    1.  CODESKILL 模型生成一个操作（提取/进化/维护）。\n    2.  如果生成了技能，将其注入下游机器人，让机器人去跑一个新任务。\n    3.  计算两个奖励：\n        *   **质量奖励（Quality Reward）**：由另一个大模型（Judge）打分，看生成的技能格式对不对、逻辑通不通、是否可复用。\n        *   **执行奖励（Execution Reward）**：看下游机器人用了这个技能后，任务成功率是否比不用技能时提高了。\n        *   **对齐奖励（Alignment Reward）**：看机器人是否真的按照技能的指导去做了（防止机器人靠运气成功，却没用技能）。\n    4.  根据总奖励，更新 CODESKILL 模型的参数。\n*   **输出**：一个更擅长生成有用技能的 CODESKILL 模型。\n*   **目的**：让模型不仅生成“看起来不错”的技能，更要生成“实际上能帮机器人解决问题”的技能。\n*   **如果不做会怎样**：模型可能生成很多语法正确但毫无用处的技能，或者生成过于具体无法复用的技能，导致下游机器人性能不升反降。\n\n### 5. 术语处理原则\n\n*   **GRPO (Group Relative Policy Optimization)**：一种强化学习算法。简单说，就是让模型对同一个问题生成多个不同的答案（技能），然后比较这些答案的好坏，奖励好的，惩罚差的，从而优化模型。\n*   **Frozen Downstream Agent**：指那个负责写代码的机器人。在训练 CODESKILL 时，这个机器人的参数是锁定的（不改变），我们只改变喂给它的“技能”，通过观察它表现的变化来训练 CODESKILL。\n*   **Rubric-based LLM-as-judge**：用一个大语言模型当裁判，按照预先设定好的详细评分标准（Rubric，如：是否可复用、是否具体、格式是否正确）给生成的技能打分。\n\n### 6. 结合消融实验，解释这套方法为什么有效\n\n根据论文中的消融实验（Table 2 和 Figure 3）：\n\n*   **哪个组件贡献最大？**\n    *   **技能提取（Extraction）是基础**：如果没有提取，就没有技能，性能最低。\n    *   **技能进化（Evolution）提升显著**：在只有提取的基础上，加入进化后，平均通过率从 38.63% 提升到 40.75%。这说明**修正旧技能**比单纯积累新技能更重要，因为软件问题往往有共性，旧技能需要不断打磨。\n    *   **强化学习（RL）优于监督学习（SFT）**：SFT-CODESKILL（仅用监督数据训练）效果不如 Prompt-based 基线，而经过 RL 训练的 CODESKILL 显著超越所有基线。这说明**通过下游机器人的实际反馈来优化技能管理策略**是关键，单纯靠人工标注或固定规则无法学到真正有用的技能。\n\n*   **哪个组件可有可无？**\n    *   **技能库维护（Maintenance）看似轻微降低性能，但至关重要**。实验显示，加入维护后，平均通过率略微下降约 2%，但技能库数量从 1252 个减少到 676 个（几乎减半）。\n    *   **这意味着**：维护模块牺牲了极少量的性能，换取了**技能库的紧凑性和稳定性**。如果不做维护，技能库会无限膨胀，导致检索变慢、噪音增加，长期来看不可持续。\n\n*   **各组件之间是否有协同效应？**\n    *   **任务级技能 + 事件驱动技能**：单独使用任务级或事件驱动技能效果一般，但两者结合后效果最好。这说明**宏观策略**（怎么入手）和**微观反应**（遇到报错怎么办）是互补的，缺一不可。\n\n*   **回扣动机：**\n    *   论文声称要解决“现有方法依赖固定提示词，无法适应下游 Agent”的问题。实验数据支持这一点：RL 训练的 CODESKILL 在不同下游 Agent（Qwen 和 GPT）上都表现良好，且泛化到未见过的任务（Terminal-Bench 2）上也有提升。这证明**可学习的策略**比**固定规则**更灵活、更有效。\n\n### 7. 这套方法的硬伤在哪里？\n\n根据 Limitations 部分：\n\n1.  **技能表达能力有限**：目前只支持**自然语言指令**形式的技能。如果技能能包含可执行的脚本、API 定义或工具代码，可能会更强大。但为了简化问题，论文只做了文本指令。\n2.  **操作粒度较粗**：每次只能对**一个**技能候选者执行**一个**操作（加、删、改）。无法同时处理多个相关技能的复杂联动（比如同时修改三个相互关联的技能，或者把一个技能拆分成两个）。这限制了技能管理的精细度。",
                    "additional_insights": "基于论文《CODESKILL: Learning Self-Evolving Skills for Coding Agents》，以下是除核心方法外，能显著提升认知的有价值内容：\n\n### 1. 实验中的反直觉发现\n*   **SFT 在分布外任务上可能完全失效，而 RL 能带来泛化能力**：在未见过的 Terminal-Bench 2 数据集上，仅经过监督微调（SFT-CODESKILL）的模型表现甚至不如无技能基线（No-skill baseline），而经过 RL 训练的 CODESKILL 则显著提升了性能。这表明在技能管理任务中，单纯的模仿学习容易过拟合训练数据的特定模式，而基于下游反馈的强化学习能学到更具迁移性的管理策略。\n    *   *依据*：Section 4.2 \"Generalization across Tasks\" 指出 SFT-CODESKILL does not improve over no-skill on Terminal-Bench 2, while RL helps learn more transferable behavior.\n*   **小模型配合固定 Prompt 的技能管理效果极差**：使用较小的开源模型（Qwen3.5-4B）配合固定的 Prompt 进行技能管理，其效果几乎与不使用任何技能（No-skill）持平。这说明技能管理的决策复杂度较高，弱模型无法通过简单的 Prompt 工程有效执行“提取-演化-维护”的逻辑，必须依赖更强的模型或可学习的策略。\n    *   *依据*：Section 4.2 \"Comparison with Baselines\" 指出 Prompt-based skill management with the small Qwen3.5-4B backbone brings little improvement over no-skill.\n\n### 2. 有启发性的分析或 Ablation\n*   **技能库维护（Maintenance）以牺牲少量性能为代价换取库的紧凑性**：消融实验显示，加入完整的生命周期维护（Add/Merge/Drop）后，平均通过率略微下降约 2%，但技能库规模从 1252 个缩减至 676 个（近减半）。这揭示了一个重要权衡：在长期自我进化中，防止技能库无限膨胀和冗余比追求极致的单次任务成功率更重要，因为过大的库会增加检索噪声和计算成本。\n    *   *依据*：Section 4.3 \"Lifecycle Ablation\" 指出 Full lifecycle maintenance slightly reduces average pass rate by about 2%, but shrinks the skill bank... nearly halving its size.\n*   **多粒度技能互补性**：仅使用事件驱动（Event-driven）或任务级（Task-level）技能均不如两者结合效果好。事件驱动技能擅长处理局部执行错误（如命令失败），而任务级技能提供高层策略，两者结合能覆盖从宏观规划到微观调试的全链路。\n    *   *依据*：Section 4.3 \"Lifecycle Ablation\" 指出 Event-driven and task-level skills each improve... and their combination further improves performance.\n\n### 3. 对领域的新认知\n*   **技能管理的本质是“信用分配”问题，需引入对齐奖励**：在长程代码任务中，仅依靠任务是否成功（Execution Reward）来优化技能提取策略存在严重的归因偏差（Attribution Problem），因为任务成功可能源于其他因素，失败也可能源于执行错误而非技能无用。因此，必须引入“行为对齐奖励”（Alignment Reward），判断 Agent 是否真正遵循了技能的触发条件和流程，才能有效指导技能管理策略的学习。\n    *   *依据*：Section 3.3.2 \"Hybrid Reward Design\" 指出 Execution improvement alone has an attribution problem... We therefore use an alignment factor... to judge whether the rollout actually matches the skill trigger condition.\n*   **静态技能注入并非总是有益，动态适应性至关重要**：现有研究常假设注入技能总是有帮助的，但 CODESKILL 强调技能的有效性高度依赖于任务匹配度和上下文。固定的技能管理策略无法适应不同任务的需求，因此技能管理本身必须是一个可学习的、针对下游 Agent 特性优化的策略，而非通用的启发式规则。\n    *   *依据*：Section 2.2 指出 static skill injection does not always improve coding agents... motivates adaptive skill management rather than relying on a fixed skill management strategy.\n\n### 4. 实用的经验性结论\n*   **三阶段课程学习（Curriculum Training）是训练复杂管理策略的关键**：由于技能管理涉及多种操作类型（提取、演化、维护）且反馈稀疏，直接端到端训练困难。论文建议按技能生命周期分阶段训练：先练提取（Phase 1），再练演化（Phase 2），最后练维护（Phase 3）。这种渐进式训练允许前一阶段生成的技能作为后一阶段的训练上下文，显著提升了训练稳定性。\n    *   *依据*：Section 3.3.2 \"Three-stage Curriculum Training\" 及 Appendix A.2.\n*   **反向检索（Reverse Retrieval）用于构建执行奖励**：为了评估一个新生成技能的有效性，不需要随机采样任务，而是可以通过技能内容反向检索最相关的任务实例（Reverse Retrieval），然后在该特定任务上运行下游 Agent 来测量增量收益。这种方法提高了奖励信号的针对性和信噪比。\n    *   *依据*：Section 3.3.2 指出 we select an evaluation instance by reverse retrieval... where the skill content retrieves task goals.\n\n### 5. 局限性中的机会\n*   **从自然语言指令扩展到结构化/可执行技能**：当前 CODESKILL 仅生成自然语言指令，限制了技能的表达力。未来的高价值方向是将技能管理扩展到包含可执行脚本、API 定义或工具配置的结构化资源。这将使 Agent 不仅能“知道”怎么做，还能直接“使用”优化后的工具链，大幅提升复杂软件工程任务的解决能力。\n    *   *依据*：Section 5 \"Limitations\" 指出 Skills that include executable scripts, APIs, tool definitions... may provide stronger guidance... Extending learned skill management to richer skill representations is an important direction.\n*   **多技能联合更新与复杂维护操作**：当前每次仅对单个候选技能执行单一操作（Add/Merge/Drop），无法处理更复杂的维护场景，如同时修订多个相关技能、拆分过于宽泛的技能或协调多个操作。设计支持多技能、多操作联合更新的策略空间，是提升技能库质量上限的关键突破口。\n    *   *依据*：Section 5 \"Limitations\" 指出 The current action space is also restricted to one operation over one candidate skill at a time... Future work could extend CODESKILL to multi-skill and multi-operation updates.",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文在 EnvBench、SWE-Bench Verified 和 Terminal-Bench 2 上展示了显著的性能提升（平均通过率比无技能基线高 9.69%，比最强基线高 4.01%）。更重要的是，它证明了 RL 训练的技能管理策略在分布外任务（Terminal-Bench 2）上具有泛化能力，而 SFT 方法失效。\n**负面证据或缺失**：目前仅针对 Coding Agents，且依赖“冻结下游 Agent”的设定。如果下游 Agent 本身也在进化，这种静态技能库的长期价值需进一步验证。\n**判断**：强\n**理由**：该研究直接解决了当前 LLM Agent 领域最痛的“长程记忆与经验复用”问题，且提供了从“静态提示词”到“动态可学习策略”的范式转变证据，对后续 Agent 记忆机制的研究具有标杆意义。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：核心创新在于将技能管理（提取、演化、维护）建模为 RL 策略，并设计了包含“对齐奖励”的混合奖励函数来解决归因偏差。消融实验显示，简单的 SFT 或固定 Prompt 无法达到同等效果，证明了 RL 策略学习的必要性。\n**负面证据或缺失**：RL 用于 Agent 记忆管理并非全新概念（如之前的 Self-RAG 等工作），但 CODESKILL 在“技能生命周期管理”这一具体子问题上的精细化设计（特别是维护模块的权衡）具有独特性。\n**判断**：中等\n**理由**：虽然“RL 优化记忆”是大趋势，但 CODESKILL 在技能粒度（任务级+事件级）和生命周期维护（Add/Merge/Drop）的具体实现上具有独特性，短期内难以被简单复制，但长期看可能被更通用的 Agent 框架吸收。\n\n**3. 时机判断（Timing）**\n**正面证据**：当前 Coding Agent 研究正从“单次任务解决”转向“长期自我进化”，但现有方法多依赖启发式规则。CODESKILL 出现在这一转折点，提供了可学习的自动化方案。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：随着 SWE-Bench 等基准的普及，社区急需解决 Agent 在复杂软件工程任务中的经验积累问题，此时提出可学习的技能管理框架恰逢其时。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：挑战了“固定 Prompt/Heuristic 规则足以管理 Agent 记忆”的假设。实验证明 SFT-CODESKILL 在分布外任务上甚至不如无技能基线，揭示了静态方法在泛化上的根本缺陷。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：它有力地论证了“技能管理本身是一个需要学习的策略问题”，而非简单的信息检索或总结问题，这一观点对领域内盲目堆砌 Prompt 的做法构成了直接挑战。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可概括为：“技能管理的有效性取决于下游 Agent 的实际执行反馈，而非技能文本的表面质量，因此必须通过 RL 进行端到端优化。”\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：洞见清晰且直击痛点，即解决了“技能看起来好”与“技能实际有用”之间的错位问题，通过引入对齐奖励和执行奖励实现了闭环。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：采用了三阶段课程学习（Curriculum Training）和反向检索（Reverse Retrieval）来降低训练难度，提高了可行性。\n**负面证据或缺失**：计算成本极高，需要运行下游 Agent 多次以获取执行奖励。技能表达能力局限于自然语言，限制了上限。\n**判断**：中等\n**理由**：虽然方法可行且结果显著，但高昂的训练成本和有限的技能表达形式（仅文本）限制了其在资源受限场景下的即时落地，且存在过拟合特定下游 Agent 的风险。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：团队在 Agent 轨迹分析和 RL 训练策略上有深厚积累，能够设计出复杂的混合奖励函数和课程学习流程。\n**负面证据或缺失**：无具体信息表明团队在 Coding Agent 领域有独家数据或算力优势，但方法论本身具有通用性。\n**判断**：中等\n**理由**：该研究的优势在于方法论的创新和实验设计的严谨性，而非依赖特定资源，这使得其成果具有较高的可复现性和参考价值。\n\n---\n\n- **综合评价**：值得深入关注。这篇论文通过引入强化学习来优化 Agent 的技能管理策略，成功解决了静态记忆机制在泛化和归因上的缺陷，为 Coding Agent 的自我进化提供了新的范式。\n- **最致命的弱点**：技能表达能力局限于自然语言指令，缺乏对可执行代码或结构化 API 的支持，限制了技能在复杂工程任务中的实际效用和上限。\n- **如果要做得更好**：1. 扩展技能表示形式，支持包含可执行脚本或工具调用的结构化技能；2. 探索多技能联合更新机制，以处理更复杂的技能依赖关系。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“解决真正的问题”**——它直击 Agent 经验复用难、静态规则泛化差的痛点，而非制造伪需求。\n    - **最不符合**：**“简洁性”**——系统涉及提取、演化、维护、RL 训练、混合奖励等多个复杂组件，工程实现和训练流程较为繁琐。",

                    "summary_translation": "编码智能体（Coding agents）在解决软件工程任务时会产生丰富的轨迹（trajectories）。为了实现智能体的自我进化（agent self-evolution），这些轨迹可以被提炼为可重用的程序性技能（procedural skills），以紧凑地编码经验并指导未来的行为。然而，现有的技能构建与维护方法通常依赖于固定的提示（fixed prompts）和启发式更新规则（heuristic update rules），导致如何最好地选择、抽象和维护知识以服务下游智能体（downstream agents）尚不明确。我们提出了 CODESKILL，这是一个基于大语言模型（LLM-based）的框架，将技能提取（skill extraction）和技能库维护（skill-bank maintenance）重新表述为一种可学习的管理策略（learnable management policy）。CODESKILL 从编码智能体的轨迹中提取多粒度（multi-granularity）的程序性技能，利用新经验进化技能，并维护一个紧凑的技能库（skill bank）以供未来任务求解使用。我们使用强化学习（reinforcement learning）训练 CODESKILL，采用混合奖励（hybrid reward），该奖励结合了基于密集评分标准（dense rubric-based）的技能质量反馈与来自冻结的下游智能体（frozen downstream agent）的稀疏可验证执行反馈（sparse verifiable execution feedback）。在 EnvBench、SWE-Bench Verified 和 Terminal-Bench 2 上的实验表明，CODESKILL 将平均通过率（average pass rate）提高了 9.69（相较于无技能基线），并提高了 4.01（相较于最强的基于提示或记忆的基线），同时在迭代构建过程中保持技能库的稳定规模。"

                    "summary": "Tool-using LLM agents produce trajectories whose calls form a directed dependency graph: earlier tool outputs supply arguments to later calls. Whether this execution structure is represented inside the model is unknown; prior structural probes have targeted static code or chain-of-thought text, not an agent's run-time call graph. A low-capacity edge probe on the residual stream of Qwen3-32B decodes the tool-call dependency graph well above both a Hewitt--Liang random-label control and a positional baseline. A counterfactual contrast between value corruption and structural perturbation indicates the signal tracks abstract topology rather than identifier values, and replicates under an independent, non-substring oracle. The non-positional component replicates on three further interactive multi-hop benchmarks and attenuates as call order alone becomes a sufficient proxy for dependency, vanishing in single-shot planning. Per-layer activation patching shifts the probe at a later, non-patched boundary, evidence that the representation propagates rather than passively reads out, though the realised tool call does not move. To our knowledge this is the first structural probe of an LLM agent's runtime tool-call dependency graph. Our claims concern representation, not behavioural control, and span two model families and one primary domain.",

                    "intro_logic": "1. Mechanistic interpretability has successfully characterized how LLMs represent linguistic, propositional, and numerical structures using structural probes on frozen activations.\n2. Recent extensions have applied these probes to reasoning traces and chain-of-thought planning, but the literature has not addressed tool-using agents that interleave generation with external function calls.\n3. Agent trajectories contain a non-trivial structural object, the directed acyclic graph of tool-call dependencies, which is central to deployed systems but remains unexplored in terms of internal representation.\n4. It is currently unknown whether this runtime dependency graph is encoded in the agent's residual stream, whether such encoding is causal, and whether it is a general property of agents or specific to certain benchmarks.\n5. Is the tool-call dependency graph encoded in the LLM agent's residual stream, and if so, is this representation causal and generalizable across different agent domains?",
                    "core_insight": "作为学术分析师，我深入剖析了这篇论文《Tool-Call Dependency Structure is Linearly Decodable in LLM Agent Residual Streams》。以下是对其核心智力突破（Intellectual Insight）的解构：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n作者意识到，LLM Agent 在运行时生成的**工具调用依赖图（Tool-Call Dependency DAG）**并非仅仅是外部行为序列，而是一种**抽象的拓扑结构信号**，该信号独立于具体的标识符数值（identifier values），并线性地编码在模型的残差流（Residual Stream）中。\n\n**展开解释：**\n传统的机制可解释性研究（Mechanistic Interpretability）主要关注静态代码结构、思维链（CoT）文本或单步的工具选择意图。然而，作者敏锐地发现，Agent 在执行多跳任务时，前一个工具的输出作为后一个工具的输入，形成了一种隐式的、有向无环图（DAG）的依赖关系。\n关键的认知突破在于：**这种依赖关系不是由具体的“值”（如 user_id=123）决定的，而是由“拓扑结构”（即数据流向的抽象连接）决定的。** 如果模型仅仅是在记忆具体的 ID，那么改变 ID 应该改变内部表示；但如果模型编码的是“依赖拓扑”，那么即使 ID 变了，只要依赖关系不变，内部表示应保持不变。这一洞察将研究目标从“解码具体工具”提升到了“解码运行时执行结构的抽象几何”。\n\n**原文证据：**\n> \"A counterfactual contrast between value corruption and structural perturbation indicates the signal tracks abstract topology rather than identifier values...\" (Abstract)\n>\n> \"Whether this dependency graph is encoded in the agent’s residual stream, whether that encoding is causal, and whether it is a property of agents in general or of one benchmark, are open...\" (Introduction)\n>\n> \"The dissociation evidence is the contrast itself: a near-zero effect for value corruption... against a large effect for structural perturbation... The topology-vs-value dissociation is thus cross-domain...\" (Section 4.1.2)\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接决定了论文的方法论设计，推理链条如下：\n\n1.  **目标定义（Target Definition）：** 既然洞察是“依赖图是线性可解码的”，那么方法必须是一个**结构探针（Structural Probe）**。作者没有使用复杂的非线性解码器，而是采用了低容量的逻辑回归探针（Logistic Regression Probe），以验证信号是否已经以线性形式存在于残差流中。\n    *   *推理：* 如果信号是抽象拓扑，它应该对具体的表面形式（Surface Form）不敏感，因此需要排除表面特征的干扰。\n\n2.  **控制变量设计（Control Design）：** 为了证明解码的是“拓扑”而非“位置”或“表面文本”，作者设计了严格的对照实验：\n    *   **位置基线（Positional Baseline）：** 排除“因为调用顺序固定所以依赖固定”的简单解释。\n    *   **表面形式天花板（Surface-form Ceiling）：** 排除探针只是在学习文本重叠（如 substring matching）的可能性。\n    *   **值腐蚀 vs. 结构扰动（Value Corruption vs. Structural Perturbation）：** 这是最核心的验证方法。通过交换 ID 值（保持拓扑不变）和清空工具响应（破坏拓扑），观察探针预测的变化。如果洞察正确，前者不应引起变化，后者应引起显著变化。\n\n3.  **因果验证（Causal Verification）：** 为了证明这种表示是“传播的”（propagating）而非“被动读取的”（passive readout），作者使用了**激活补丁（Activation Patching）**。\n    *   *推理：* 如果依赖结构是模型内部计算的一部分，那么在早期层修补激活值，应该能改变后期层对依赖关系的预测，即使最终的行为（工具调用）没有改变。\n\n**原文证据：**\n> \"We address this gap with a Hewitt–Liang-style logistic-regression edge probe on the residual stream... conditioned on a positional baseline... so the signal is non-trivial.\" (Introduction)\n>\n> \"We compare its response to structural perturbations against matched single-field value corruptions.\" (Section 4.1.2)\n>\n> \"Per-layer activation patching shifts the probe at a later, nonpatched boundary, evidence that the representation propagates rather than passively reads out...\" (Abstract)\n\n### 3. 试错历程与调整\n\n在实现这一想法的过程中，作者遇到了几个意料之外的困难，并进行了相应的调整：\n\n1.  **Oracle 构建的偏差风险：**\n    *   *困难：* 最初使用基于子字符串匹配（substring matching）的方法构建依赖图 Oracle。作者担心探针可能只是在学习“文本重叠”这一表面特征，而不是真正的语义依赖。\n    *   *调整：* 作者引入了一个**独立的、基于模式类型的值相等 Oracle（schema-typed value-equality oracle）**，该 Oracle 不使用子字符串匹配，而是基于结构化 ID 字段的精确匹配。\n    *   *结果：* 发现即使在这个更严格的 Oracle 上，解码性能依然很高，甚至条件贡献（conditional contribution）更高，从而排除了“表面形式幻觉”的可能性。\n    *   *原文：* \"An independent oracle reproduces the finding... A schema-typed value-equality oracle (no substring matching) agrees with the substring oracle at precision 1.0... On this cleaner edge set decodability is itself high...\" (Section 4.1.2)\n\n2.  **传递性（Transitivity）的意外发现：**\n    *   *困难/意外：* 作者最初主要关注直接依赖边（direct edges）。然而，在测试传递闭包（transitive closure，即多跳依赖）时，发现模型对**多跳祖先关系**的解码能力（AUROC 0.986）竟然**强于**直接依赖关系（AUROC 0.869）。\n    *   *调整：* 这一发现促使作者重新审视“组合（composition）”在模型中的位置。他们发现传递性信号并非在深层网络中才出现，而是在早期层（Layer 14）就与直接依赖信号同时涌现。这推翻了“组合是晚期操作”的假设。\n    *   *原文：* \"The residual encodes multi-hop provenance better than direct edges... Composition co-emerges with direct dependency, not late-stack.\" (Section 4.2.1)\n\n3.  **行为控制与表示传播的解耦：**\n    *   *困难：* 在激活补丁实验中，虽然探针的预测发生了显著变化（表明表示被改变了），但 Agent 的实际工具调用行为（realised tool call）完全没有改变。\n    *   *调整：* 作者没有将此视为失败，而是将其解释为**“表示传播”（representational propagation）与“行为控制”（behavioural control）的解耦**。这表明依赖结构在内部被编码和传播，用于维持状态一致性，但并不一定直接决定每一步的离散动作选择（或者该信号对动作选择的因果影响力较小）。这一细微的区分成为了论文的一个重要贡献，避免了过度声称模型可以被轻易“劫持”。\n    *   *原文：* \"In neither family does the agent’s realised next call move (0% shift). We therefore read this as evidence that dependency information propagates through the residual stream, not as behavioural control...\" (Section 4.1.3)\n\n通过这些调整，作者不仅验证了最初的洞察，还深化了对 LLM Agent 内部工作机制的理解，揭示了其内部表示的抽象性和鲁棒性。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\n这篇论文做的事情很简单：它想看看，当一个大语言模型（LLM）作为一个智能体（Agent）去调用工具（比如查天气、搜数据库）时，模型内部的“记忆”（即残差流，Residual Stream）里，是否真的记录了“哪个工具的输出被哪个工具用到了”这种依赖关系。\n\n具体来说，作者并没有去修改模型，也没有让模型重新学习。他们只是把模型在运行过程中每一层产生的内部数据（激活值）提取出来，然后训练了一个非常简单的线性分类器（探针，Probe）。这个分类器的任务是：给定两个工具调用的内部数据，判断它们之间是否存在“数据依赖”关系（即前一个工具的输出是否作为参数传给了后一个工具）。\n\n### 2. 一句话概括核心创新\n\n**之前的研究主要看模型怎么理解静态文本或代码结构，而这篇论文首次证明了：模型在动态执行工具调用时，其内部状态线性地编码了工具之间的运行时数据依赖图（DAG），且这种编码反映的是抽象的结构拓扑，而非具体的数值内容。**\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：构建“标准答案”（Oracle DAG）\n*   **输入**：智能体在某个任务中产生的一系列工具调用记录（Trajectory），包括每次调用的输入参数和返回结果。\n*   **操作**：\n    1.  遍历所有成对的工具调用（调用 $i$ 和调用 $j$，且 $i$ 在 $j$ 之前）。\n    2.  检查调用 $i$ 的返回结果中，是否有字符串片段（长度 $\\ge 4$）原封不动地出现在了调用 $j$ 的输入参数中。\n    3.  如果有，标记为“存在依赖边 $i \\to j$”；如果没有，标记为“无依赖”。\n    4.  同时构建一个“传递闭包”标签，即如果 $A \\to B$ 且 $B \\to C$，那么 $A \\to C$ 也算一种依赖（即使没有直接传递字符串）。\n*   **输出**：一个二进制标签集合，告诉探针哪些工具对之间有依赖关系，哪些没有。\n*   **目的**：为探针提供训练所需的“正确答案”。因为模型内部没有显式的依赖图，我们需要从外部行为反推出一个客观的依赖结构作为监督信号。\n*   **如果不做会怎样**：探针就没有目标可学，无法判断模型内部是否真的编码了这种关系。\n\n#### 第二步：提取模型内部状态（Residual Stream Extraction）\n*   **输入**：智能体在运行上述轨迹时，模型每一层（Layer）在每个工具调用结束时刻的隐藏状态向量。\n*   **操作**：\n    1.  对于每一对工具调用 $(i, j)$，提取它们在模型最后一层（或特定层）结束时的残差流向量 $H_i$ 和 $H_j$。\n    2.  将这两个向量拼接在一起，形成一个新的特征向量 $[H_i; H_j]$。\n    3.  为了增强信号，作者还尝试了对多个层（如第0, 14, 28...层）的向量进行平均池化后再拼接。\n*   **输出**：用于训练探针的特征数据。\n*   **目的**：获取模型在处理这两个工具调用时的“内部视角”。残差流被认为是Transformer中信息传递的主要通道。\n*   **如果不做会怎样**：无法访问模型的内部表示，只能分析外部行为，无法回答“模型内部是否知道”这个问题。\n\n#### 第三步：训练线性探针（Linear Probing）\n*   **输入**：第二步得到的特征向量 $[H_i; H_j]$ 和第一步得到的依赖标签（有/无）。\n*   **操作**：\n    1.  训练一个逻辑回归模型（Logistic Regression，一种最简单的线性分类器）。\n    2.  使用交叉验证（Leave-One-Group-Out），确保训练集和测试集来自不同的任务轨迹，防止模型死记硬背。\n    3.  计算探针的预测准确率（AUROC指标）。\n*   **输出**：一个训练好的探针，以及它在未见过的数据上的预测性能分数。\n*   **目的**：验证依赖关系是否“线性可分”。如果简单的线性模型就能从内部状态中高精度地读出依赖关系，说明这种信息在模型内部是以一种清晰、结构化的方式存在的。\n*   **如果不做会怎样**：无法量化模型内部编码依赖关系的程度。\n\n#### 第四步：控制变量与因果验证（Controls & Patching）\n*   **输入**：训练好的探针、原始轨迹、以及经过扰动的轨迹。\n*   **操作**：\n    1.  **位置基线控制**：只用工具调用的顺序位置（如第1个和第3个）训练探针，看性能提升多少，以排除“因为先后顺序所以有依赖”的简单猜测。\n    2.  **随机标签控制**：打乱依赖标签，看探针是否还能学到东西，排除偶然性。\n    3.  **激活补丁（Activation Patching）**：在模型运行到工具 $i$ 时，强行将其内部状态替换为另一个不同轨迹中工具 $i$ 的状态，然后观察后续工具 $j$ 的探针预测是否随之改变。\n*   **输出**：\n    1.  探针性能相对于基线的提升量（证明不是位置决定的）。\n    2.  补丁实验的结果（证明内部状态确实承载了因果信息，而不仅仅是被动记录）。\n*   **目的**：\n    1.  排除“探针只是学到了工具调用的先后顺序”这一最可能的替代解释。\n    2.  证明这种表示是“因果性”的，即改变内部状态会改变对依赖关系的判断，而不仅仅是相关性。\n*   **如果不做会怎样**：无法区分模型是真的理解了“数据依赖”，还是仅仅记住了“通常第2个工具依赖第1个工具”这种位置模式。\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n*   **哪个组件贡献最大？**\n    *   **残差流特征本身**：实验显示，仅使用位置信息（Position-only baseline）的AUROC约为0.79，而加入残差流后提升至0.87（直接边）甚至0.98（传递边）。这说明**模型内部的语义表示**是核心贡献者，位置信息虽然有用（因为依赖通常发生在前后工具间），但不足以解释所有依赖。\n    *   **多层池化**：虽然单层（如第14层）已经表现不错，但多层平均池化（V1配置）提供了更稳定的信号，尤其是在处理复杂的传递依赖时。\n\n*   **哪个组件可有可无？**\n    *   **非线性探针（MLP）**：实验对比了线性探针和多层感知机（MLP）探针，发现MLP并没有带来显著的性能提升（AUROC 0.866 vs 0.869）。这意味着**依赖关系在模型内部是线性可分的**，不需要复杂的非线性变换来提取。这简化了解释的难度。\n    *   **表面形式特征（Surface-form features）**：如n-gram重叠等文本表面特征，虽然能提供一些信号（AUROC 0.83），但残差流探针依然能超越它。说明模型编码的是**抽象的依赖拓扑**，而不仅仅是文本字符串的匹配。\n\n*   **各组件之间是否有协同效应？**\n    *   **位置 + 残差流**：两者结合效果最好。位置提供了先验（依赖通常发生在邻近工具间），残差流提供了具体的语义证据。消融实验显示，残差流在位置基线之上提供了显著的增量信息（+0.0775 AUROC）。\n\n*   **回扣动机：**\n    *   论文声称要解决“模型内部是否编码运行时依赖图”的问题。\n    *   **实验支持**：\n        1.  **线性可解码性**：探针的高AUROC证明信息存在且易于提取。\n        2.  **拓扑敏感性**：通过“值腐败”（Value Corruption）实验，发现改变具体的ID值（如用户ID从123变为456）不会改变探针的预测，但改变结构（如删除某个工具的输出）会显著改变预测。这证明了探针捕捉的是**抽象的结构关系**，而非具体的数值内容，完美回应了“是否只是记住了特定值”的质疑。\n        3.  **跨域泛化**：在多个不同的基准测试（$\\tau$-bench, ToolHop等）上，只要任务涉及多跳依赖，探针都有效；而在单步规划或无传递依赖的任务中，残差流的额外贡献消失。这证明了该现象是**通用的机制**，而非特定数据集的过拟合。\n\n### 5. 这套方法的硬伤在哪里？\n\n1.  **相关性不等于因果控制（Behavioral Control）**：\n    *   虽然激活补丁实验显示改变内部状态会改变探针的预测（表示层面的因果），但**并没有改变模型最终的工具调用行为**。也就是说，我们证明了模型“知道”依赖关系，但没证明模型“利用”这个知识来做出决策。模型可能只是被动地记录了这些信息，而决策是由其他机制驱动的。\n\n2.  **依赖定义的局限性（Oracle Limitation）**：\n    *   论文定义的“依赖”是基于**字符串子串匹配**（Substring Matching）的。这意味着，如果工具 $A$ 的输出经过复杂转换（如计算、格式化）后才被工具 $B$ 使用，这种依赖可能无法被捕捉到。因此，论文发现的“依赖图”可能只是真实数据流的一个子集，主要反映的是**值复用（Value Reuse）**，而非所有的控制流或逻辑依赖。\n\n3.  **模型规模的未验证性**：\n    *   实验主要在32B和70B规模的模型上进行。对于更小规模的模型（如7B以下）或闭源的前沿模型，这种线性可解码性是否依然存在，尚不清楚。小模型可能没有足够的容量来显式编码这种复杂的运行时结构。",
                    "additional_insights": "1. **反直觉发现：多跳（Transitive）依赖比直接（Direct）依赖更容易线性解码**\n实验显示，预测“i 是 j 的多跳祖先”的 AUROC (0.986) 显著高于预测“i 是 j 的直接父节点”的 AUROC (0.869)，且多跳信号在模型浅层（Layer 14）即已饱和，推翻了“组合结构是深层操作”的假设，表明模型在早期就构建了全局轨迹视图。\n*依据：§4.2.1 \"The residual encodes multi-hop provenance better than direct edges\" 及 Figure 3。*\n\n2. **反直觉发现：位置基线（Positional Baseline）在单步规划中完全取代了残差流信息**\n在 TaskBench（单步生成所有工具调用）中，仅靠调用顺序的位置特征即可完美预测依赖关系，导致残差流的非位置贡献为负（-0.02）；这表明当执行顺序本身编码了依赖逻辑时，模型内部不再需要维护额外的拓扑表示。\n*依据：§4.2.2 \"The contribution vanishes at both predicted boundaries\" 及 Table 2。*\n\n3. **有启发性的分析：拓扑敏感性 vs. 值敏感性的解耦（Topology vs. Value Dissociation）**\n通过对比“值腐败”（替换ID值）和“结构扰动”（清空工具返回），发现探针预测对值的变化不敏感（d=0.06），但对结构变化高度敏感（d=0.87），证明模型编码的是抽象的依赖拓扑结构，而非具体的标识符数值。\n*依据：§4.1.2 \"Topology-sensitive rather than value-specific\"。*\n\n4. **有启发性的分析：表示传播而非被动读出（Representational Propagation）**\n激活补丁实验（Activation Patching）显示，在源调用处修改残差流会改变下游非补丁层探针的预测，但不会改变模型实际生成的工具调用行为，证明依赖结构在残差流中是因果传播的，但尚未达到行为控制（Behavioral Control）的程度。\n*依据：§4.1.3 \"Representational propagation\" 及 Appendix E。*\n\n5. **对领域的新认知：工具依赖图是运行时（Runtime）而非静态结构**\n与以往针对静态代码或思维链（CoT）的结构探针不同，本研究首次证明 LLM Agent 在运行时（Runtime）的动态工具调用依赖图（DAG）被线性编码在残差流中，这为理解 Agent 的实时状态监控和漂移检测提供了新的机制解释目标。\n*依据：Abstract 及 Introduction \"Whether this execution structure is represented inside the model is unknown... first structural probe of an LLM agent’s runtime tool-call dependency graph\"。*\n\n6. **实用的经验性结论：独立 Oracle 验证优于启发式子串匹配**\n虽然主实验使用长度≥4的子串重叠作为依赖 Oracle，但使用基于 Schema 类型值相等（Value-equality）的独立 Oracle 验证时，解码性能反而提升（条件贡献从 +0.0775 升至 +0.289），建议在严谨研究中优先使用类型感知的依赖定义而非纯文本匹配。\n*依据：§4.1.2 \"An independent oracle reproduces the finding\" 及 Appendix B \"Independent (non-substring) oracle replication\"。*\n\n7. **局限性中的机会：从表示解码到行为控制的鸿沟**\n作者明确指出激活补丁虽能改变内部表示，但未改变最终行为（0% shift），暗示未来研究需探索更强或更精准的干预手段（如跨多轮、跨域的行为控制），以实现从“理解 Agent 在想什么”到“纠正 Agent 做什么”的跨越。\n*依据：Limitations \"Scope of the propagation claim... behaviourally-sufficient interventions over many turns remain future work\"。*\n\n8. **局限性中的机会：复杂拓扑与错误恢复场景的空白**\n当前验证主要基于线性链或简单 DAG，缺乏对分支拓扑（Branching DAGs）及包含错误恢复/重规划（Error-recovery/Re-planning）子图的测试，这为研究 Agent 在动态失败场景下的内部状态表征提供了明确的研究缺口。\n*依据：Limitations \"Dependency-graph topology... behaviour on richer branching topologies, and on agent domains with error-recovery or re-planning sub-graphs, remains to be characterised\"。*",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文首次将机制可解释性（Mechanistic Interpretability）从静态文本/代码扩展到动态Agent运行时状态，证明了残差流中线性编码了工具依赖图（DAG）。这为Agent的实时监控、调试和安全性分析提供了新的理论依据和潜在工具（如通过探针检测异常依赖）。\n**负面证据或缺失**：目前仅停留在“表示解码”层面，未展示如何利用这一发现直接提升Agent性能或安全性（如通过干预残差流来纠正错误调用）。\n**判断**：强\n**理由**：该研究填补了Agent内部状态表征研究的关键空白，将“黑盒”Agent的运行时逻辑部分透明化，对Agent可解释性和可靠性领域具有基础性影响。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：输入材料明确指出“prior structural probes have targeted static code or chain-of-thought text, not an agent's run-time call graph”，且这是“first structural probe of an LLM agent's runtime tool-call dependency graph”。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：在Agent研究爆发但内部机制研究滞后的背景下，率先针对运行时依赖图进行探针研究，具有显著的先发优势和独特性。\n\n**3. 时机判断（Timing）**\n**正面证据**：当前LLM Agent应用广泛，但缺乏对内部执行逻辑的理解；同时，机制可解释性技术（如探针、激活补丁）已相对成熟，适合迁移到新领域。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：正值Agent从“能用”向“可信/可控”过渡的关键期，此时揭示其内部结构表征，时机恰到好处，能引导后续关于Agent安全与鲁棒性的研究。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：推翻了“组合结构是深层操作”的假设，发现多跳依赖在浅层（Layer 14）即已饱和；发现位置基线在单步规划中可完全取代残差流信息，挑战了“残差流总是包含丰富语义”的直觉。\n**负面证据或缺失**：研究本身仍遵循标准的探针范式，未挑战探针方法本身的局限性。\n**判断**：中等\n**理由**：虽然发现了反直觉的现象（浅层编码全局结构），但整体方法论仍是现有可解释性范式的自然延伸，而非对范式的根本性挑战。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可概括为：“LLM Agent残差流线性编码了运行时工具依赖的抽象拓扑，而非具体数值。”\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：洞见清晰、简洁，且通过“拓扑敏感性 vs. 值敏感性”的实验得到了有力支撑，易于理解和传播。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：方法简单（线性探针），实验设计严谨（控制变量、激活补丁），结果可复现。\n**负面证据或缺失**：科学发现的风险较低，因为线性可解码性在LLM中已较为常见；主要风险在于定义的局限性（子串匹配可能遗漏复杂依赖）。\n**判断**：中等\n**理由**：技术可行性高，但科学惊喜度有限（线性可解码性本身不意外），价值在于应用领域的拓展而非方法学的突破。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：团队结合了Agent轨迹分析与机制可解释性技术，具备跨领域整合能力。\n**负面证据或缺失**：无具体信息表明该团队在其他方面具有独特优势。\n**判断**：中等\n**理由**：该研究依赖于公开模型和标准工具，任何具备可解释性研究能力的团队均可复现，团队特异性优势不明显。\n\n---\n\n- **综合评价**：值得深入关注。该论文在Agent可解释性领域做出了开创性工作，首次揭示了运行时依赖图的内部表征，具有高度的新颖性和理论价值。尽管在行为控制和依赖定义上存在局限，但其核心发现为理解Agent内部逻辑提供了重要基石。\n- **最致命的弱点**：**相关性不等于因果控制**。论文证明了模型“知道”依赖关系，但未证明模型“利用”这一知识进行决策，也未展示如何通过干预该表示来改变Agent行为，限制了其实际应用的直接价值。\n- **如果要做得更好**：1. 尝试通过激活补丁或更精细的干预手段，证明改变依赖表示能直接修正Agent的错误工具调用（实现行为控制）。2. 采用更鲁棒的依赖定义（如基于Schema或语义等价），以捕捉经过复杂转换后的依赖关系。\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“从简单假设开始”**（Start with simple hypotheses）。使用线性探针验证复杂结构的可解码性，体现了奥卡姆剃刀原则。\n    - **最不符合**：**“证明因果性而非相关性”**（Prove causality, not just correlation）。虽然做了激活补丁，但未达到行为层面的因果控制，仍停留在表示层面的相关性验证。",

                    "summary_translation": "使用工具的 LLM agent（大语言模型智能体）生成的轨迹中，其工具调用构成一个有向依赖图（directed dependency graph）：早期工具的输出为后续调用提供参数。目前尚不清楚这种执行结构是否在模型内部得到表征；先前的结构探针（structural probes）主要针对静态代码或思维链（chain-of-thought）文本，而非智能体运行时的调用图（run-time call graph）。在 Qwen3-32B 的残差流（residual stream）上进行的低容量边探针（edge probe）能够很好地解码工具调用依赖图，其性能显著优于 Hewitt-Liang 随机标签对照（Hewitt--Liang random-label control）和位置基线（positional baseline）。通过对值破坏（value corruption）与结构扰动（structural perturbation）进行反事实对比（counterfactual contrast），表明该信号追踪的是抽象拓扑（abstract topology）而非标识符值（identifier values），并且在独立的非子串预言机（non-substring oracle）下可复现。该非位置成分（non-positional component）在另外三个交互式多跳基准测试（interactive multi-hop benchmarks）中均可复现，但随着调用顺序本身成为依赖关系的充分代理（sufficient proxy for dependency），该成分逐渐减弱，并在单步规划（single-shot planning）中消失。逐层激活修补（per-layer activation patching）在更晚的、未修补的边界处移动了探针，这表明表征是传播（propagates）而非被动读出（passively reads out），尽管实际生成的工具调用并未改变。据我们所知，这是首次对 LLM 智能体运行时工具调用依赖图进行的结构探针研究。我们的主张关注的是表征（representation），而非行为控制（behavioural control），并涵盖两个模型家族（model families）和一个主要领域（primary domain）。"

                    "summary": "Before an LLM agent can use a tool, a retrieval system must decide which candidate tools to show to the agent. How long should that shortlist be? Show too many tools and the model struggles to choose. Show too few and the correct tool may not appear. Most systems apply a fixed shortlist size to every query, but no standard metric exists to evaluate whether that size was appropriate. We treat the number of tools shown to an LLM agent as the object of evaluation and we apply Bits-over-Random (BoR), a chance-corrected metric that asks whether success at a given depth is better than what random selection would achieve at that same depth. We evaluate BoR across three tool-selection benchmarks, multiple scorers, and registries ranging from 20 to 3,251 tools. We then turn the same principle into a reinforcement learning (RL) reward for choosing tool shortlist depth per query. The RL agent is deliberately simple, serving as a probe of the metric rather than a proposed system. As the shortlist grows, random chance of including the correct tool rises, so the reward naturally decreases, reducing the need for an engineered depth penalty. On BFCL (370 tools), the learned policy nearly matches the coverage of showing 50 tools ($90.3\\%$ vs $90.8\\%$) while presenting only 7 on average. On ToolBench (3,251 tools), a fixed shortlist of 5 tools achieves higher aggregate coverage ($64.7\\%$ vs $61.9\\%$) but finds nothing on hard queries (correct tool ranked 6th-20th). The BoR agent finds $16.7\\%$ on those same queries by searching deeper. Downstream validation with Claude Sonnet 4.6 indicates that shorter adaptive lists also improve the LLM's ability to select the right tool: $93.1\\%$ versus $87.1\\%$ when always shown 5 tools, widening to $76.8\\%$ vs $60.9\\%$ on medium-difficulty queries where the correct tool is present but not ranked first.",

                    "tags": ["cs.LG"],
                    "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (LLM Agents)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。",
                    "intro_logic": "1. LLM agent 框架面临一个核心设计选择：每个 query 应该向模型展示多少工具（即 search depth K）。\n2. 当前实践通常采用固定的 K 值并统一应用于所有 query，忽略了 query 难度的差异。\n3. 固定 K 值无法区分简单 query（少量工具即可）和困难 query，且缺乏标准方法来评估所选 K 值是否合适。\n4. 尽管文档检索领域存在 nDCG@K 等深度感知指标，但 tool selection 领域尚无等效指标。\n5. 工具注册表规模虽小，但展示过多工具会导致高昂的 token 成本并可能干扰模型选择。\n6. 评估深度需要分离三个问题：正确工具是否被展示、LLM 是否选择了它、执行是否成功，而现有研究难以诊断具体失败环节。\n7. 在给定工具注册表大小和 scorer 质量的情况下，如何确定每个 query 的最佳 search depth K 以平衡覆盖率与效率？",
                    "core_insight": "这是一篇非常典型的“度量驱动设计”（Metric-Driven Design）的论文。作者并没有发明一个新的检索算法，而是通过重新定义“如何评价检索深度”，从而自然地推导出了一个自适应深度的强化学习策略。\n\n以下是针对该论文的深度分析：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n现有的固定深度（Fixed-K）策略缺乏一个能够区分“运气”与“能力”的评价标准，而**Bits-over-Random (BoR)** 这一基于信息论的“去随机化”指标，不仅能量化检索系统的真实选择能力，其数学结构本身还天然蕴含了随深度增加而递减的奖励信号，从而无需人工设计惩罚项即可引导智能体学习自适应深度。\n\n**展开解释：**\n大多数研究者关注的是“召回率”（Recall@K）或“准确率”（Accuracy），这些指标随着展示的工具数量 $K$ 增加而单调递增，导致系统倾向于展示更多工具以刷高分数，却忽略了展示过多工具带来的 Token 成本和模型混淆风险。作者意识到，在工具检索中，由于候选集 $N$ 通常较小（几十到几千），随机猜测命中正确工具的概率 $P_{rand}$ 是不可忽略的。因此，单纯的成功率并不能反映系统的智能程度。\n\n真正的突破在于认识到：**评价检索深度的核心不在于“是否找到了”，而在于“找到它比随机猜测难多少”。** 这种“难度”可以用信息比特（Bits）来衡量。更重要的是，作者发现这个度量指标（BoR）的数学性质——即随着 $K$ 增大，随机基线 $P_{rand}$ 上升，导致 BoR 分数自然下降——恰好构成了强化学习所需的“深度惩罚”机制。\n\n**原文证据：**\n> \"Most systems apply a fixed shortlist size to every query, but no standard metric exists to evaluate whether that size was appropriate.\" (Abstract)\n>\n> \"We treat the number of tools shown to an LLM agent as the object of evaluation and we apply Bitsover-Random (BoR) [30], a chance-corrected metric that asks whether success at a given depth is better than what random selection would achieve at that same depth.\" (Abstract)\n>\n> \"Because $P_{rand}$ grows as more tools are shown, the reward naturally decreases with depth. The RL agent, thus, learns how many tools to present without requiring a task-specific depth penalty beyond a small constant continuation cost.\" (Introduction)\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察通过以下严密的逻辑链条直接导向了论文的方法论：\n\n1.  **问题重构（Reformulation）：**\n    作者将“选择展示多少个工具”从一个超参数调优问题（Hyperparameter Tuning）重构为一个**序列决策问题（Sequential Decision Problem）**。既然没有标准指标来评估 $K$ 是否合适，那就创造一个指标。\n\n2.  **引入 BoR 作为核心度量（Metric as Core）：**\n    作者引入了 Bits-over-Random (BoR) 指标。\n    *   公式：$BoR = \\log_2(P_{obs} / P_{rand})$。\n    *   其中 $P_{rand}$ 是在给定深度 $K$ 和候选集大小 $N$ 下，随机选中至少一个相关工具的概率（超几何分布）。\n    *   **关键推论：** 如果系统表现等同于随机，BoR=0；如果系统表现优于随机，BoR>0。\n\n3.  **从度量到奖励信号（Metric to Reward）：**\n    这是最精妙的一步。作者没有像传统 RL 那样手动添加一个 $- \\lambda \\cdot K$ 的深度惩罚项，而是直接利用 BoR 的数学特性。\n    *   在 MDP 框架中，当 Agent 决定停止（STOP）并展示当前列表时，如果列表中包含正确工具，奖励设为 $-\\log_2(P_{rand}(K))$。\n    *   **推理链条：** 因为 $P_{rand}(K)$ 随 $K$ 单调递增，所以 $-\\log_2(P_{rand}(K))$ 随 $K$ 单调递减。\n    *   **结果：** 在浅层（小 $K$）找到正确工具获得的奖励极高（因为随机很难做到）；在深层（大 $K$）找到正确工具获得的奖励极低（因为随机很容易做到）。这迫使 Agent 必须在“找到工具”和“保持低深度”之间寻找平衡，从而自动学习到最优的自适应深度策略。\n\n4.  **验证与对比（Validation）：**\n    为了证明这种“自然惩罚”优于人工设计的惩罚，作者设计了 $F_1$ 基线（$F_1 = 2/(K+1)$），这是一种固定形式的深度惩罚。实验表明，BoR 驱动的 Agent 能根据查询难度动态调整 $K$（简单查询 $K$ 小，困难查询 $K$ 大），而 $F_1$ 基线则表现出僵化的浅层偏好，无法在困难查询上深入搜索。\n\n### 3. 试错历程与意外发现\n\n作者在实现过程中遇到了几个意料之外的困难和洞察，这些经历进一步塑造了最终的方法：\n\n**困难 1：评分器（Scorer）质量对策略的极端影响**\n*   **现象：** 当使用弱评分器（如 BM25 在 MetaTool 上，Found@1 仅 33%）时，BoR Agent 倾向于展示几乎所有工具（$K \\approx 80$），导致选择性（Selectivity）极低。\n*   **原因分析：** 由于评分器无法提供有效的排序信号，Agent 无法通过观察分数分布来判断何时停止。为了获得非零奖励，它只能盲目增加深度，直到随机概率 $P_{rand}$ 足够高以至于“碰运气”也能成功。\n*   **调整/洞察：** 作者并没有试图修复评分器，而是将其作为一个**诊断工具**。他们指出，BoR 指标能够揭示评分器的失效。如果 BoR 分数很低且 $K$ 很大，说明评分器不可靠。这反过来证明了 BoR 不仅是一个控制指标，还是一个**系统健康度监控指标**。\n    > \"Without a discriminative scorer, there is no reliable signal for where to stop... The $F_1$ baseline, by contrast, stops early regardless of scorer quality, so the weak scorer is effectively hidden.\" (Section 4.2)\n\n**困难 2：固定深度基线在特定场景下的“虚假优势”**\n*   **现象：** 在 ToolBench 数据集上，固定深度 $K=5$ 的基线在整体覆盖率（Aggregate Coverage）上竟然高于自适应的 BoR Agent（64.7% vs 61.9%）。\n*   **原因分析：** 这是因为 ToolBench 中大量查询是“简单”的（正确工具排在前列），固定 $K=5$ 足以覆盖这些简单查询。而 BoR Agent 为了在“困难”查询（正确工具排在第 6-20 位）上获得收益，不得不牺牲部分简单查询的效率或采取更保守的策略。\n*   **调整/洞察：** 作者没有将此视为失败，而是深入分析了**难度桶（Difficulty Buckets）**。他们发现，虽然 BoR 整体覆盖率略低，但在固定基线完全失效的“困难查询”上，BoR Agent 取得了 16.7% 的覆盖率，而固定基线为 0%。\n*   **结论：** 这揭示了固定 $K$ 策略的本质缺陷——它无法处理长尾困难案例。BoR 的价值在于**鲁棒性**和**对困难查询的恢复能力**，而不仅仅是整体平均指标。\n    > \"FK=5 achieves higher aggregate coverage... but finds nothing on hard queries... The BoR agent finds 16.7% on those same queries by searching deeper.\" (Abstract)\n\n**困难 3：下游任务（LLM 选择）的验证复杂性**\n*   **现象：** 论文主要关注“检索阶段”（是否展示了正确工具），但用户真正关心的是“执行阶段”（LLM 是否选对了工具）。\n*   **调整：** 作者进行了下游验证（Section 4.3），使用 Claude Sonnet 4.6 作为下游模型。\n*   **意外发现：** 他们发现，**更短的列表不仅节省了 Token，还提高了 LLM 的选择准确率**。在中等难度查询中，BoR 生成的短列表（$K \\approx 2.2$）让 LLM 的选择准确率达到了 76.8%，而固定 $K=5$ 的列表仅为 60.9%。\n*   **洞察：** 这证实了“少即是多”（Less is More）在 LLM 工具使用中的有效性。过多的候选工具会产生“干扰项”（Distractors），降低 LLM 的判断力。BoR 通过最小化不必要的深度，间接优化了下游 LLM 的性能。\n    > \"Downstream validation with Claude Sonnet 4.6 indicates that shorter adaptive lists also improve the LLM’s ability to select the right tool... widening to 76.8% vs 60.9% on medium-difficulty queries.\" (Abstract)\n\n总结来说，这篇论文的核心不在于复杂的模型架构，而在于**将信息论中的“去随机化”思想引入检索评估，并利用其数学性质优雅地解决了强化学习中的奖励设计难题**。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\n这篇论文解决了一个很实际的问题：当大语言模型（LLM）需要调用工具（比如查天气、算数学）时，检索系统应该给它展示多少个候选工具？\n\n以前的做法是“一刀切”，不管问题难易，固定展示5个或10个工具。这有两个坏处：展示太多，模型会看花眼，选错工具；展示太少，正确的工具可能没被包含在内。\n\n这篇论文提出了一种新的评估指标叫 **BoR (Bits-over-Random)**，并用它来训练一个简单的强化学习（RL）智能体。这个智能体的任务不是去选工具，而是决定**“看多少个工具就停止”**。它通过计算“在当前展示数量下，找到正确工具的概率比纯随机猜测高多少”来决定是否继续往下翻列表。如果继续翻下去带来的收益（比随机高出的部分）很小，它就停止；如果收益还很大，它就继续翻。最终，它能为每个问题动态决定展示几个工具，既省Token，又提高准确率。\n\n### 2. 一句话概括核心创新\n\n**最本质的区别在于：** 之前的方法用固定的数量或基于分数分布的启发式规则来决定展示多少个工具，而本文使用了一个**“去除了随机运气成分”的指标（BoR）作为奖励信号**，让模型学会根据问题的难易程度和检索器的质量，动态地、自适应地决定搜索深度。\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：定义“去随机化”的评估指标 (BoR)\n\n*   **输入**：\n    1.  工具库的总大小 $N$（比如370个工具）。\n    2.  当前展示的工具数量 $K$（比如展示了5个）。\n    3.  系统实际找到正确工具的成功率 $P_{obs}$（比如80%）。\n*   **操作**：\n    1.  计算**随机基线概率** $P_{rand}$：假设完全瞎蒙，从 $N$ 个里随机选 $K$ 个，选中正确工具的概率是多少？（公式是 $K/N$，对于单工具查询）。\n    2.  计算 **BoR 值**：$BoR = \\log_2(P_{obs} / P_{rand})$。\n    3.  这个值的单位是“比特（bits）”。如果 BoR=0，说明系统和瞎蒙一样；如果 BoR=10，说明系统比瞎蒙强1024倍。\n*   **输出**：一个标量数值（BoR分数），代表系统在去除“因为展示多所以容易蒙对”的运气后，真实的筛选能力有多强。\n*   **目的**：解决“固定K无法评估是否合适”的问题。传统的准确率指标（如Success@K）会随着K增大而自然升高，无法区分是因为模型变聪明了，还是因为给的选项多了。BoR 惩罚了“靠堆数量换来的准确率”。\n*   **如果不做会怎样**：如果没有这个指标，我们就无法量化“展示5个工具”和“展示50个工具”在**效率**上的真实差距，也就无法给强化学习提供一个合理的奖励信号。\n\n#### 第二步：构建强化学习智能体以决定搜索深度\n\n*   **输入**：\n    1.  用户查询。\n    2.  检索器（如BM25或Embedding模型）对所有工具排好序的列表。\n    3.  当前已经查看的工具数量 $k$ 和它们的相似度分数。\n*   **操作**：\n    1.  智能体从列表顶部开始，逐个查看工具。\n    2.  每查看一个工具，智能体面临两个选择：**STOP（停止）** 或 **CONTINUE（继续）**。\n    3.  如果选择 **STOP**：\n        *   检查当前展示的 $k$ 个工具里有没有正确答案。\n        *   如果有，奖励 = $-\\log_2(P_{rand}(k))$。注意，这里 $k$ 越小，$P_{rand}$ 越小，负对数越大，奖励越高。这意味着**在更少的选项中找到正确答案，奖励更高**。\n        *   如果没有，奖励 = 0。\n    4.  如果选择 **CONTINUE**：\n        *   扣除一个微小的步骤成本（step_cost），防止无限循环。\n        *   进入下一步，查看下一个工具。\n*   **输出**：一个动态的决策策略（Policy），即对于不同类型的查询，智能体倾向于在第几个工具处停止。\n*   **目的**：利用 BoR 的数学特性（随着 $K$ 增加，随机概率 $P_{rand}$ 增加，导致最大可能奖励下降），让智能体**自动学会“自剪枝”**。它不需要人工设计“深度惩罚”，因为数学公式本身就告诉它：展示太多工具会稀释奖励。\n*   **如果不做会怎样**：如果不使用这种基于 BoR 的奖励，智能体可能会倾向于展示尽可能多的工具（因为这样找到答案的概率高），或者需要人工硬编码一个复杂的深度惩罚函数，这很难调优且不具备通用性。\n\n#### 第三步：下游验证与效果评估\n\n*   **输入**：\n    1.  由 RL 智能体决定的动态工具列表（例如，简单问题给2个，难问题给8个）。\n    2.  大语言模型（如 Claude Sonnet）。\n*   **操作**：\n    1.  将动态列表喂给 LLM，让它选择工具。\n    2.  对比固定列表（如固定给5个）的效果。\n*   **输出**：LLM 选择正确工具的准确率。\n*   **目的**：验证“动态减少干扰项”是否真的能帮助 LLM 做出更好的选择。\n*   **如果不做会怎样**：我们只能知道检索系统找对了工具，但不知道 LLM 是否能从一堆工具中正确识别出那个对的。这一步证明了**少即是多**：减少无关工具的干扰，能显著提高 LLM 的选择准确率。\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n论文中主要对比了 **BoR 智能体**、**F1 惩罚基线**（另一种深度惩罚方法）和 **固定 K 基线**。\n\n*   **哪个组件贡献最大？**\n    *   **BoR 奖励函数的“去随机化”特性**贡献最大。\n    *   **证据**：在 ToolBench 数据集上，面对“困难查询”（正确工具排在第6-20位），固定 K=5 的方法准确率为 **0%**，因为它只看了前5个。而 BoR 智能体通过深入搜索（平均 K=5.7），找到了 **16.7%** 的正确工具。\n    *   **对比 F1 基线**：F1 基线也试图惩罚深度，但它对所有查询一视同仁地惩罚。在困难查询上，F1 基线也几乎找不到工具（因为它倾向于过早停止，K≈1.5）。只有 BoR 能够根据“随机概率随深度增加而增加”的特性，在困难问题上敢于深入搜索，而在简单问题上迅速停止。\n\n*   **哪个组件可有可无？**\n    *   **复杂的 RL 架构**是可无的。论文特意使用了非常简单的 DQN 或表格 Q-learning，甚至是在 CPU 上运行的。这说明**核心在于奖励信号的设计（BoR）**，而不是复杂的模型结构。只要奖励信号正确，简单的模型也能学到好的策略。\n\n*   **各组件之间是否有协同效应？**\n    *   **检索器质量与 BoR 的协同**：论文发现，当检索器很强（如 Embedding 模型）时，BoR 智能体学会的 K 值很小（如 K=1.4）；当检索器很弱（如 BM25）时，K 值变大（如 K=80.7）。这说明 BoR 奖励能**自适应**检索器的能力。如果检索器不准，智能体知道必须看更多才能弥补；如果检索器准，智能体知道看几个就够了。这种自适应是固定 K 方法做不到的。\n\n*   **回扣动机：**\n    *   论文声称要解决“固定 K 无法区分难易问题”的痛点。\n    *   **实验支持**：在 BFCL 数据集上，BoR 智能体平均只展示 **7.4** 个工具，就达到了与展示 **50** 个工具（FK=50）几乎相同的覆盖率（90.3% vs 90.8%）。这直接证明了动态深度可以在大幅减少 Token 消耗（7倍）的同时，保持高覆盖率。\n    *   在下游 LLM 选择实验中，BoR 方法（平均 K=2.2）让 Claude 的选择准确率达到 **93.1%**，而固定展示 5 个工具（FK=5）只有 **87.1%**。这证明了减少干扰项（通过动态深度实现）确实提升了 LLM 的表现。\n\n### 5. 这套方法的硬伤在哪里？\n\n1.  **依赖检索器的排序质量**：\n    *   如果检索器（Scorer）完全无法区分相关和不相关的工具（即分数分布没有信息量），BoR 智能体可能会陷入“盲目深搜”或“过早停止”的困境。论文中提到，在 MetaTool 上使用 BM25（弱检索器）时，智能体不得不展示平均 **80.7** 个工具，几乎等于全量展示，失去了“节省 Token”的意义。这说明该方法**不能替代一个好的检索器**，它只是优化检索器的输出长度。\n\n2.  **优化目标是“选择性”而非“最大召回率”**：\n    *   BoR 奖励鼓励在较少的选项中找到答案。因此，在某些情况下，固定展示较多工具（如 FK=5 或 FK=20）可能在**总体覆盖率**上略高于 BoR 智能体（例如 ToolBench 上 FK=5 覆盖率 64.7% vs BoR 61.9%）。这是因为 BoR 为了追求“高选择性”（即比随机强很多），可能会牺牲掉一些中等难度问题的覆盖率，以换取在简单问题上的极致效率和在困难问题上的部分恢复。如果你的业务场景是“宁可多费 Token 也要保证最高召回率”，那么固定较大的 K 可能更简单直接。",
                    "additional_insights": "以下是从论文《How Many Tools Should an LLM Agent See? A Chance-Corrected Answer》中提取的除核心方法（BoR指标及RL框架）之外的高价值认知：\n\n### 1. 实验中的反直觉发现\n*   **固定深度（Fixed-K）在困难查询上完全失效，而自适应策略能实现“长尾”覆盖**：在ToolBench基准中，固定展示5个工具（FK=5）虽然整体覆盖率略高（64.7% vs 61.9%），但在正确工具排名靠后（第6-20位）的“困难查询”上，FK=5的命中率为0%，而BoR代理通过增加搜索深度达到了16.7%的命中率。这表明固定策略牺牲了长尾难例以换取简单例子的效率，而自适应策略能平衡两者。\n*   **展示更多工具反而降低LLM的选择准确率（Distractor Effect）**：下游验证显示，当正确工具被包含在候选集中时，展示较少工具（BoR平均K=2.2）时Claude Sonnet的选择准确率为93.1%，而固定展示5个工具（FK=5）时准确率降至87.1%。这证实了“工具过载”会显著干扰LLM的决策能力，尤其是在中等难度查询中（76.8% vs 60.9%）。\n*   **弱检索器（BM25）导致RL代理“放弃”深度控制，近乎展示所有工具**：在MetaTool基准中，使用BM25作为评分器时，BoR代理学到的平均深度高达K=80.7（接近候选集上限100），因为BM25缺乏语义区分度，代理无法从分数分布中找到停止信号，只能靠暴力搜索来保证召回。相比之下，Embedding评分器使代理迅速收敛到K≈2.3。\n\n### 2. 有启发性的分析或 Ablation\n*   **$F_1$ 惩罚无法替代机会校正（Chance-Correction）**：作者对比了基于$F_1$公式（$2/(K+1)$）的深度惩罚基线。结果显示，$F_1$基线在所有难度桶中都保持极浅的深度（K≈1.5），无法像BoR那样根据查询难度动态加深搜索。这揭示了单纯的深度惩罚缺乏对“随机命中概率”的感知，无法在难例上提供足够的探索激励。\n*   **BoR具有“自校准”特性，无需针对不同注册表大小调参**：在MetaTool实验中，当候选集大小$N$从20增加到100时，BoR代理学到的奖励值自然增加（2.75 bits -> 4.36 bits），且策略自动适应。相比之下，$F_1$基线的表现对$N$的变化不敏感。这表明BoR的数学结构（基于超几何分布）天然适配不同规模的工具库。\n*   **评分器质量决定了自适应深度的上限**：实验表明，BoR代理的深度策略高度依赖于底层评分器（Scorer）的质量。强评分器（Embedding）让代理敢于在K=1-2时停止，而弱评分器（BM25）迫使代理搜索到K=80+。这意味着RL代理本身不学习语义，而是学习“何时信任评分器的排序”。\n\n### 3. 对领域的新认知\n*   **工具检索评估应分离“呈现”与“选择”**：现有基准（如ToolBench, BFCL）通常直接评估端到端执行成功率，混淆了检索失败和LLM选择失败。本文提出应将评估分解为：1) 正确工具是否被展示（Presented%）；2) LLM是否选对（Choice Acc%）。这种分离有助于诊断系统瓶颈（是检索器不行，还是LLM被干扰了）。\n*   **“随机基线”是评估小集合检索的关键**：在工具注册表较小（N=50-500）的场景下，随机选择命中正确工具的概率（$P_{rand} = K/N$）不可忽略。传统指标（如Recall@K）无法区分“运气好”和“检索能力强”，而BoR通过减去随机基线，真实反映了检索系统的选择性（Selectivity）。\n\n### 4. 实用的经验性结论\n*   **工程Trick：使用自适应深度可显著节省Token成本并提升准确率**：在BFCL基准上，BoR代理平均仅展示7.4个工具，却达到了与展示50个工具（FK=50）相当的覆盖率（90.3% vs 90.8%）。这意味着在工程部署中，动态调整K值可以在减少7倍Token消耗的同时保持性能，甚至因减少干扰而提升最终选择准确率。\n*   **超参数建议：RL中的Step Cost应极小**：论文中使用的`step_cost`仅为0.01（或0.005），且折扣因子$\\gamma=0.95$。这表明在深度控制任务中，主要的正则化力量来自BoR奖励本身的数学结构（随K增加而自然衰减），而非人工设定的深度惩罚。过大的Step Cost可能导致代理过早停止。\n*   **评估建议：构建包含“困难查询”的专用基准**：现有基准大多由简单查询主导，导致固定K策略表现良好。作者建议未来应构建具有受控难度分布（特别是包含大量正确工具排名靠后的查询）的基准，以真正评估深度自适应能力。\n\n### 5. 局限性中的机会\n*   **机会：针对“极难查询”的恢复机制研究**：论文指出，即使在BoR代理加深搜索到K=6.9的情况下，ToolBench中“极难查询”（正确工具排名21+）的命中率仍仅为0.2%。这暗示了单纯增加展示数量无法解决语义匹配极差的问题，未来方向可能包括引入多跳检索、重排序（Reranking）或基于LLM的反馈循环，而不仅仅是调整K值。\n*   **机会：端到端执行正确性的联合优化**：当前工作仅优化“正确工具被展示”这一中间目标。局限性中提到，执行正确性（Execution Correctness）不在范围内。未来的研究机会在于设计奖励函数，不仅考虑工具是否被展示，还考虑LLM调用工具时的参数生成质量，实现检索与生成的联合优化。",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文展示了在 BFCL 数据集上，动态深度策略平均仅展示 7.4 个工具即可达到与展示 50 个工具相当的覆盖率（90.3% vs 90.8%），同时显著降低了 Token 消耗。此外，下游验证表明减少干扰项能将 LLM 的选择准确率从 87.1% 提升至 93.1%。\n**负面证据或缺失**：该方法高度依赖底层检索器（Scorer）的质量。在弱检索器（如 BM25）场景下，智能体倾向于展示几乎所有工具（K=80.7），导致节省 Token 的优势丧失。这意味着其影响力局限于拥有高质量 Embedding 检索器的系统。\n**判断**：强\n**理由**：该研究直接解决了 LLM Agent 落地中的核心成本痛点（Token 消耗）和性能瓶颈（工具过载干扰），且提供了可量化的显著收益（7倍 Token 节省，6% 准确率提升），对工业界部署具有极高的实用价值。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：引入了 **BoR (Bits-over-Random)** 这一“去随机化”指标作为 RL 奖励信号。与传统的固定 K 或基于分数阈值的启发式规则不同，BoR 从信息论角度量化了“比瞎蒙强多少”，并证明了简单的 RL 架构配合该奖励即可实现自适应，无需复杂模型。\n**负面证据或缺失**：使用 RL 来优化检索截断点并非全新概念，之前的工作可能使用过其他形式的深度惩罚（如 $1/K$ 或固定步长成本）。BoR 的创新在于奖励函数的数学形式，而非整体框架的独创性。\n**判断**：中等\n**理由**：虽然 BoR 指标的设计具有新颖性且数学性质优美，但“自适应检索深度”这一方向本身已有探索。其不可替代性主要体现在“机会校正”这一特定视角上，而非彻底颠覆了检索范式。\n\n**3. 时机判断（Timing）**\n**正面证据**：当前 LLM Agent 领域正从“能否调用工具”转向“如何高效、低成本地调用工具”。随着工具库规模扩大（从几十个到上千个），固定 K 值的弊端日益凸显，且 Token 成本成为主要制约因素。\n**负面证据或缺失**：无具体证据表明该领域已饱和或衰退。相反，随着多智能体系统和复杂工作流的普及，对细粒度检索控制的需求正在上升。\n**判断**：强\n**理由**：该研究精准击中了当前 Agent 系统从“原型验证”走向“规模化部署”的关键痛点——效率与精度的平衡。在工具库膨胀和成本敏感的双重压力下，此时提出动态深度控制恰逢其时。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：挑战了“固定 K 值适用于所有查询”的行业惯例。论文指出固定 K 值无法区分简单和困难查询，且在困难查询上完全失效（命中率为 0%）。同时，挑战了“展示越多越好”的直觉，证明了“少即是多”（减少干扰项提升 LLM 选择准确率）。\n**负面证据或缺失**：并未挑战检索本身的核心机制（如 Embedding 或 BM25），而是优化其输出长度。\n**判断**：强\n**理由**：该研究有力地反驳了“一刀切”的工程实践，并通过实验数据证明了动态适应查询难度和检索器质量的必要性，改变了人们对“检索深度”这一超参数的认知。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可概括为：“检索系统的价值不应由绝对准确率衡量，而应由其超越随机猜测的信息增益（BoR）决定，以此指导动态截断。”\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：BoR 指标将“运气”与“能力”分离，为评估和优化检索深度提供了一个清晰、可解释且数学上自洽的标准，使得“何时停止检索”这一决策变得可量化。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：使用了极简单的 RL 架构（DQN/Tabular Q-learning），甚至在 CPU 上运行，证明了方法的低计算开销和高可行性。消融实验显示，核心贡献在于奖励函数设计，而非模型复杂度。\n**负面证据或缺失**：在弱检索器场景下，方法退化为全量展示，失去了优化意义。这表明该方法在检索器质量不佳时存在“失效”风险，无法独立解决检索难题。\n**判断**：中等\n**理由**：方法本身实施风险极低，易于集成。但其效果上限受限于底层检索器，若检索器排序能力差，该方法无法通过增加深度来弥补语义匹配的缺失，存在性能天花板。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：论文通过对比 BoR 与 F1 惩罚基线，展示了 BoR 在“自校准”和“难度自适应”上的优势。F1 基线因缺乏对随机概率的感知，导致在困难查询上过早停止，而 BoR 能根据难度动态调整。\n**负面证据或缺失**：未与其他复杂的自适应检索方法（如基于 LLM 重排序的方法）进行直接对比，可能低估了更复杂方法在极端情况下的潜力。\n**判断**：中等\n**理由**：相比简单的启发式规则，BoR 提供了更科学的理论依据和更好的自适应能力。但在面对更复杂的端到端优化方法时，其比较优势可能更多体现在“简洁性”和“可解释性”上，而非绝对性能的最优。\n\n---\n\n- **综合评价**：**值得深入关注**。这篇论文以极低的工程复杂度解决了一个高价值的实际问题（Token 成本与工具选择精度的平衡）。其提出的 BoR 指标不仅是一个有效的 RL 奖励信号，更是一个具有广泛适用性的评估标准，能够清晰地量化检索系统的真实能力，去除了“堆数量”带来的虚假繁荣。\n\n- **最致命的弱点**：**对底层检索器质量的强依赖**。当检索器（如 BM25）无法提供有效的排序信号时，RL 智能体无法做出明智的截断决策，导致策略退化为全量展示，完全丧失了节省 Token 的核心优势。这意味着该方法不能替代好的检索器，只能优化好的检索器。\n\n- **如果要做得更好**：\n    1.  **引入检索器质量感知机制**：在 RL 状态空间中显式加入对检索器置信度或分数分布熵的估计，使智能体在检索器质量低时能采取不同的策略（如触发重排序或人工介入），而非盲目深搜。\n    2.  **端到端执行优化**：当前仅优化“工具被展示”这一中间目标，未来可尝试将 LLM 的最终执行成功率纳入奖励函数，实现检索与生成的联合优化，以解决“展示正确工具但 LLM 选错”的问题。\n\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“Simplicity”（简洁性）**。论文刻意使用最简单的 RL 架构，证明核心洞见（BoR 奖励）的价值，而非依赖复杂的模型结构，体现了“奥卡姆剃刀”精神。\n    - **最不符合**：**“Robustness”（鲁棒性）**。方法在弱检索器场景下表现不佳，缺乏对底层组件质量波动的鲁棒性，限制了其在通用场景下的适用性。",

                    "affiliations": "```json\n{\n  \"authors\": [\n    {\"name\": \"Vyzantinos Repantis\", \"affiliations\": [1], \"markers\": []},\n    {\"name\": \"Ameya Gawde\", \"affiliations\": [1], \"markers\": []},\n    {\"name\": \"Harshvardhan Singh\", \"affiliations\": [1], \"markers\": []},\n    {\"name\": \"Joey Blackwell II\", \"affiliations\": [1], \"markers\": []}\n  ],\n  \"institutions\": [\n    {\"id\": 1, \"name\": \"Meta\"}\n  ],\n  \"footnotes\": []\n}\n```",
                    "summary_translation": "在大型语言模型（LLM）智能体（Agent）使用工具之前，检索系统必须决定向智能体展示哪些候选工具。这份候选列表（shortlist）的长度应设定为多少？展示的工具过多，模型将难以做出选择；展示的工具过少，则正确的工具可能无法出现。大多数系统对每个查询都采用固定的候选列表大小，但目前尚缺乏标准指标来评估该大小是否合适。我们将展示给 LLM 智能体的工具数量作为评估对象，并应用“随机比特增益”（Bits-over-Random, BoR）这一经过随机性校正的指标。该指标旨在判断在给定深度下的成功表现是否优于在同一深度下随机选择所能达到的水平。我们在三个工具选择基准测试、多种评分器以及包含 20 到 3,251 个工具的注册表中对 BoR 进行了评估。随后，我们将同一原理转化为一种强化学习（Reinforcement Learning, RL）奖励机制，用于为每个查询选择工具候选列表的深度。该 RL 智能体设计得故意简单，旨在作为对该指标的探测手段，而非提出一个完整的系统方案。随着候选列表的增长，包含正确工具的随机概率随之上升，因此奖励自然下降，从而减少了对人工设计的深度惩罚（depth penalty）的需求。在 BFCL 基准（370 个工具）上，学习到的策略在覆盖率方面几乎与展示 50 个工具的效果相当（$90.3\\%$ 对比 $90.8\\%$），但平均仅展示 7 个工具。在 ToolBench 基准（3,251 个工具）上，固定大小为 5 的候选列表实现了更高的总体覆盖率（$64.7\\%$ 对比 $61.9\\%$），但在困难查询（正确工具排名在第 6 至 20 位）中未能找到任何工具。BoR 智能体通过更深度的搜索，在这些相同的查询中找到了 $16.7\\%$ 的正确工具。使用 Claude Sonnet 4.6 进行的下游验证表明，较短的自适应列表也能提高 LLM 选择正确工具的能力：在始终展示 5 个工具的情况下，准确率为 $93.1\\%$ 对比 $87.1\\%$；在中等难度查询（正确工具存在但未排在第一位）中，这一差距扩大至 $76.8\\%$ 对比 $60.9\\%$。"

                    "summary": "Agent skills today are hand-crafted, generated one-shot, or evolved through loosely controlled self-revision, none of which behaves like a deep-learning optimizer for the skill, and none of which reliably improves over its starting point under feedback. We argue the skill should instead be trained as the external state of a frozen agent, with the same discipline that makes weight-space optimization reproducible. SkillOpt is, to our knowledge, the first systematic controllable text-space optimizer for agent skills: a separate optimizer model turns scored rollouts into bounded add/delete/replace edits on a single skill document, and an edit is accepted only when it strictly improves a held-out validation score. A textual learning-rate budget, rejected-edit buffer, and epoch-wise slow/meta update make skill training stable while adding zero inference-time model calls at deployment. Across six benchmarks, seven target models, and three execution harnesses (direct chat, Codex, Claude Code), SkillOpt is best or tied on all 52 evaluated (model, benchmark, harness) cells and beats every per-cell competitor among human, one-shot LLM, Trace2Skill, TextGrad, GEPA, and EvoSkill skills. On GPT-5.5 it lifts the average no-skill accuracy by +23.5 points in direct chat, by +24.8 inside the Codex agentic loop, and by +19.1 inside Claude Code. Transfer experiments further show that optimized skill artifacts retain value when moved across model scales, between Codex and Claude Code execution environments, and to a nearby math benchmark without further optimization.",

                    "filter_reason": "确定性主题保留：标题和摘要命中强相关信号 (Agentic, Self-Evolving/Self-Improving, Agent capability/behavior)。该规则用于避免模型把明显的 LLM Agent / Agentic / Self-Evolving 论文误判为过窄范围之外。",
                    "intro_logic": "1. Frontier language models are increasingly deployed as agents in complex settings requiring domain adaptation through procedures rather than just model weights or prompts.\n2. Agent skills serve as a natural interface for this procedural adaptation by packaging procedures, heuristics, and policies as portable natural-language artifacts for frozen agents.\n3. Since the skill document is the recurring object of adaptation, it should be trainable, yet weight adaptation is often unavailable or expensive, and manual or one-shot skills are brittle.\n4. Existing systems convert execution experience into textual artifacts but leave open the fundamental question of how skills should be optimized if they are the adaptation layer.\n5. How should agent skills be optimized as a controllable domain-adaptation process?",
                    "core_insight": "作为学术分析师，我深入剖析了 **SkillOpt** 这篇论文。这篇论文的核心价值不在于它提出了一个新的 Agent 框架，而在于它**重新定义了“技能（Skill）”在机器学习范式中的地位**。\n\n以下是针对该论文关键洞察的深度解析：\n\n### 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**\n作者意识到，Agent 的“技能文档”不应被视为静态的提示词（Prompt）或一次性生成的产物，而应被视为**冻结模型（Frozen Model）的外部可训练状态（External Trainable State）**，因此必须借用深度学习优化器（Optimizer）的严谨机制（如学习率、验证门控、梯度方向类比）来对其进行受控迭代，而非依赖松散的自我修正。\n\n**展开解释：**\n在 SkillOpt 之前，社区对 Agent 技能的处理主要有三种方式：手工编写（Hand-crafted）、一次性生成（One-shot generation）或基于轨迹的松散自我修正（Loosely controlled self-revision）。这些方法缺乏“优化”的纪律性，导致技能更新往往不稳定，甚至退步。\n\nSkillOpt 的突破性认知在于建立了**“文本空间优化”与“权重空间优化”的同构性（Isomorphism）**。作者认为，既然我们无法直接修改闭源大模型的权重，那么“技能文档”就是模型在特定任务域下的“外部权重”。因此，优化这个文档的过程，应该像训练神经网络一样，具备**可控性（Controllability）**和**稳定性（Stability）**。\n\n**原文证据：**\n> \"We argue the skill should instead be _trained_ as the external state of a frozen agent, with the same discipline that makes weight-space optimization reproducible.\" (Abstract)\n\n> \"Our key idea is to treat skill editing as a controllable domain-adaptation process, with the skill document as the external state, an additional frontier model as the optimizer, and training-style controls over evidence, step size, validation, and update direction.\" (Section 1, Introduction)\n\n> \"The deep-learning analogy is operational rather than decorative... the textual learning rate and schedule control how far one skill version is allowed to move from the previous one; the held-out gate plays the role of validation...\" (Section 1, Introduction)\n\n---\n\n### 2. 从洞察到方法的桥梁\n\n这个洞察直接决定了 SkillOpt 的方法论架构，将传统的“Prompt Engineering”转化为一个标准的“Optimization Loop”。推理链条如下：\n\n1.  **如果技能是“外部状态”，那么修改技能就是“参数更新”**：\n    *   **传统做法**：LLM 根据错误反思，重写整个 Prompt 或添加一段话。这类似于在参数空间中随机跳跃，极易破坏原有结构。\n    *   **SkillOpt 做法**：引入**结构化编辑（Structured Edits）**。优化器模型（Optimizer Model）不直接重写文档，而是生成 `add/delete/replace` 的补丁（Patch）。这对应于深度学习中的**梯度方向（Gradient Direction）**，即只改变必要的部分，保持其余部分不变。\n\n2.  **如果优化需要“稳定性”，那么必须控制“步长”**：\n    *   **传统做法**：每次迭代可能引入大量新规则，导致技能文档膨胀且逻辑冲突。\n    *   **SkillOpt 做法**：引入**文本学习率预算（Textual Learning-Rate Budget）**。通过限制每次迭代接受的编辑数量（Edit Budget），控制技能文档从一个版本到下一个版本的“语义距离”。这防止了“语义跳跃（Large Semantic Jumps）”，确保优化过程是平滑的。\n\n3.  **如果优化需要“收敛”，那么必须有“验证机制”**：\n    *   **传统做法**：基于单次轨迹的成功/失败进行更新，噪声极大。\n    *   **SkillOpt 做法**：引入**保留集验证门控（Held-out Validation Gate）**。任何提出的编辑补丁，必须先在独立的验证集（Selection Split）上测试，只有当性能严格提升时，该编辑才被接受。这对应于深度学习中的**验证集早停或模型选择（Model Selection）**，防止过拟合训练轨迹。\n\n4.  **如果优化需要“动量”，那么必须利用“历史反馈”**：\n    *   **SkillOpt 做法**：引入**拒绝编辑缓冲区（Rejected-Edit Buffer）**和**跨周期慢更新（Epoch-wise Slow/Meta Update）**。被拒绝的编辑不是被丢弃，而是作为负反馈（Negative Feedback）存入缓冲区，指导未来的优化方向；慢更新则像动量项（Momentum），保留长期有效的策略，过滤短期噪声。\n\n**原文证据：**\n> \"A separate optimizer model turns scored rollouts into bounded add/delete/replace edits on a single skill document, and an edit is accepted only when it strictly improves a held-out validation score.\" (Abstract)\n\n> \"Rollout and reflection batch sizes control the noise in the evidence used for each edit; the textual learning rate and schedule control how far one skill version is allowed to move from the previous one...\" (Section 1, Introduction)\n\n---\n\n### 3. 试错历程与调整\n\n虽然论文主要呈现最终结果，但从其设计细节和消融实验（Ablations）中可以反推出作者在实现过程中遇到的核心困难及调整策略：\n\n**困难一：无约束的自我修正导致“灾难性遗忘”或“逻辑混乱”**\n*   **问题**：早期的 Agent 自我进化方法（如 Self-Refine, EvoSkill）往往让 LLM 自由重写技能。作者发现，这种“自由创作”会导致技能文档迅速膨胀，且新规则可能与旧规则冲突，或者针对特定实例过拟合（Instance-specific），无法泛化。\n*   **调整**：作者放弃了“重写（Rewrite）”范式，转向“补丁（Patch）”范式。\n    *   **具体实现**：强制优化器输出 JSON 格式的原子操作（`append`, `insert_after`, `replace`, `delete`）。\n    *   **证据**：Section 4.4 提到，最终的技能非常紧凑（300-2000 tokens），且仅由 1-4 次接受的编辑组成。这说明严格的编辑约束是必要的，否则文档会变得不可读且无效。\n\n**困难二：优化方向的噪声与不稳定性**\n*   **问题**：单次轨迹（Single Trajectory）的反馈噪声太大。如果仅根据一个失败案例修改技能，可能会引入错误的启发式规则。\n*   **调整**：引入**小批量反思（Minibatch Reflection）**和**分层合并（Hierarchical Merging）**。\n    *   **具体实现**：优化器不只看一个失败案例，而是分析一个 Mini-batch 的失败轨迹，找出“共同失败模式（Common Failure Patterns）”。然后，通过多个独立的分析器提出补丁，再由一个协调器（Coordinator）进行合并和去重。\n    *   **证据**：Appendix C.2.1 中的 Prompt 明确要求：\"Identify the most important COMMON failure patterns across the batch... Edits must be generalizable; do not hardcode task-specific values.\"\n\n**困难三：如何区分“有效改进”与“偶然运气”**\n*   **问题**：在训练集上表现好的编辑，可能在测试集上失效。\n*   **调整**：严格分离**训练集（Train Split）**、**选择集（Selection Split）**和**测试集（Test Split）**。\n    *   **具体实现**：优化过程仅在 Selection Split 上进行验证。只有当候选技能在 Selection Split 上得分高于当前最佳技能时，才更新 `s_cur`。最终报告的性能基于从未见过的 Test Split。\n    *   **证据**：Section 1 提到：\"an edit is accepted only when it strictly improves a held-out validation score.\" 以及 Section C 中的实验协议细节。\n\n**困难四：长期优化中的“漂移”问题**\n*   **问题**：随着迭代次数增加，技能可能会偏离最初的核心逻辑，或者陷入局部最优。\n*   **调整**：引入**慢更新（Slow Update）**机制。\n    *   **具体实现**：在每个 Epoch 结束时，对比前后两个 Epoch 的技能表现，生成一个受保护的、长期有效的指导原则（Protected Section），这部分内容在后续的 Step-level 优化中是不可修改的（Read-only）。这确保了核心策略的稳定性。\n    *   **证据**：Section 1 提到：\"epoch-wise slow/meta update acts like a momentum term, carrying stable editing directions across epochs.\" Appendix C.2.7 详细描述了 Slow Update 的 Prompt，强调其保护性：\"This section is READ-ONLY to all subsequent step-level optimization.\"\n\n**总结：**\nSkillOpt 的成功并非源于更强大的 LLM，而是源于作者将**深度学习优化的工程纪律（Engineering Discipline of Deep Learning Optimization）**强行移植到了**自然语言技能编辑（Natural Language Skill Editing）**这一看似非结构化的领域。这种“降维打击”式的视角转换，是其最核心的 Intellectual Insight。",
                    "methodology": "### 1. 返璞归真，平铺直叙\n\nSkillOpt 是一个用来自动修改“Agent 技能文档”（Skill Document）的系统。\n\n传统的做法是让人手写技能文档，或者让大模型一次性生成一个文档，或者让模型自己瞎改。SkillOpt 的做法是：把“技能文档”看作一个可以训练的对象。它让一个专门的“优化器模型”去观察 Agent 执行任务的过程，找出成功和失败的原因，然后提出具体的修改建议（比如增加一条规则、删除一段废话、替换一个错误指令）。这些修改建议不会直接生效，而是先在一个“验证集”上测试，只有当修改后的文档能让 Agent 在验证集上表现更好时，这个修改才会被正式写入文档。这个过程循环多次，直到文档变得足够好。最终，这个优化好的文档可以直接给任何冻结权重的 Agent 使用，不需要重新训练模型。\n\n### 2. 一句话概括核心创新\n\n**最本质的区别：** 之前的方法大多是“一次性生成”或“无约束的自我修正”，而 SkillOpt 引入了**“基于验证集的门控机制”**和**“受限的编辑预算”**，把技能文档的修改变成了一个可控的、类似深度学习中的“梯度下降”式的迭代优化过程，确保每一次修改都是经过验证且有效的。\n\n### 3. 按照执行的逻辑顺序拆解\n\n#### 第一步：收集执行轨迹（Rollout）\n*   **输入**：当前的技能文档（Skill Document）、一批待执行的任务数据（Training Split）、冻结的目标 Agent 模型。\n*   **操作**：让目标 Agent 带着当前的技能文档去执行这批任务。记录 Agent 的每一步操作、思考过程以及最终的结果（成功或失败）。\n*   **输出**：一批带有结果标签（成功/失败）的执行轨迹（Trajectories）。\n*   **目的**：获取“证据”。只有看到 Agent 实际怎么做的、哪里错了，才能知道技能文档哪里需要改。\n*   **如果不做会怎样**：没有实际执行数据，优化器就是无米之炊，无法知道当前技能文档的具体缺陷。\n\n#### 第二步：分析与提出修改建议（Analysis & Proposal）\n*   **输入**：上一步得到的执行轨迹（分为成功组和失败组）、当前的技能文档。\n*   **操作**：\n    1.  调用一个专门的“优化器模型”（Optimizer Model，通常比目标模型更强或专门调优过）。\n    2.  让优化器模型分析失败轨迹，找出共同的错误模式，提出“补丁”（Patch），即具体的增删改操作。\n    3.  让优化器模型分析成功轨迹，找出可复用的好模式，提出强化建议。\n    4.  将失败和成功的建议合并，去重，并根据重要性排序。\n    5.  **关键约束**：根据“文本学习率”（Textual Learning Rate，即编辑预算），只保留前 N 个最重要的修改建议。\n*   **输出**：一组候选的修改操作（Add/Delete/Replace）。\n*   **目的**：将非结构化的执行日志转化为结构化的、可执行的文档修改指令。限制数量是为了防止一次改动太大，导致文档面目全非或引入新错误。\n*   **如果不做会怎样**：如果没有分析步骤，就无法从日志中提取知识；如果不限制数量（编辑预算），模型可能会一次性重写整个文档，导致优化过程不稳定，甚至性能崩溃。\n\n#### 第三步：应用修改并验证（Validation Gate）\n*   **输入**：当前的技能文档、上一步选出的修改操作、一个独立的验证集（Selection Split，未参与训练的数据）。\n*   **操作**：\n    1.  将修改操作应用到当前技能文档，生成一个“候选技能文档”。\n    2.  让目标 Agent 带着这个“候选技能文档”在验证集上跑一遍，计算得分。\n    3.  **门控判断**：如果候选文档的得分 **严格高于** 当前文档的得分，则接受这次修改，更新当前文档；否则，拒绝这次修改，保留原文档。\n    4.  如果拒绝，将这次失败的修改尝试记录到“拒绝缓冲区”中，作为未来的负面反馈。\n*   **输出**：更新后的技能文档（如果接受）或保持不变的文档（如果拒绝），以及更新后的拒绝缓冲区。\n*   **目的**：确保“只进不退”。这是 SkillOpt 最核心的设计，防止优化器提出看似合理但实际有害的修改。\n*   **如果不做会怎样**：如果没有验证门控，优化器可能会提出一些在训练集上有效但在验证集上无效的修改（过拟合），或者提出逻辑混乱的修改，导致 Agent 性能随迭代次数增加而下降。\n\n#### 第四步：周期性慢更新与元学习（Slow/Meta Update）\n*   **输入**：经过多个步骤（Epoch）优化后的技能文档、历史拒绝记录、跨 Epoch 的性能对比数据。\n*   **操作**：\n    1.  **慢更新**：每隔一个 Epoch，优化器模型会对比前后两个版本的技能文档在相同任务上的表现，识别出那些“顽固的错误”或“退化的部分”，生成一段受保护的、长期的指导原则，插入到文档的特定保护区域。\n    2.  **元技能更新**：优化器模型总结“什么样的修改是有效的”，更新自己的“元技能”（Meta Skill），以便在下一轮优化中提出更高质量的修改建议。\n*   **输出**：带有长期指导原则的技能文档、更新后的优化器元技能。\n*   **目的**：解决“短期记忆”问题。普通的单步修改可能只解决表面问题，慢更新用于捕捉长期的、系统性的规律；元技能更新让优化器自己越变越聪明。\n*   **如果不做会怎样**：优化过程可能陷入局部最优，或者反复在同样的错误上打转，无法处理那些需要长期策略调整的复杂问题。\n\n### 4. 结合消融实验，解释这套方法为什么有效\n\n根据论文中的消融实验（Ablation Study）和结果分析：\n\n*   **哪个组件贡献最大？**\n    *   **验证门控（Held-out Validation Gate）** 是最关键的。论文指出，如果没有这个门控，直接应用优化器提出的所有修改，性能会大幅下降。实验数据显示，SkillOpt 在 52 个测试单元中全部达到最佳或并列最佳，这主要归功于严格的验证机制过滤掉了有害修改。\n    *   **编辑预算（Textual Learning Rate / Edit Budget）** 也非常重要。限制每次修改的数量（例如只允许改 1-4 处）保证了优化的稳定性。如果允许无限制修改，文档会变得冗长且混乱，性能反而不如限制修改的情况。\n\n*   **哪个组件可有可无？**\n    *   论文没有明确指出某个组件完全“可有可无”，但暗示了 **慢更新（Slow Update）** 和 **元技能（Meta Skill）** 是锦上添花。在简单的任务上，可能仅靠基本的“分析-修改-验证”循环就能达到不错效果，但在复杂任务（如 ALFWorld）上，慢更新对于打破循环、管理长期状态至关重要。去掉它们，性能会有所下降，但不会像去掉验证门控那样灾难性。\n\n*   **各组件之间是否有协同效应？**\n    *   **是的，协同效应显著。** “编辑预算”限制了单次改动的幅度，使得“验证门控”的判断更加可靠（因为改动小，更容易归因）。同时，“拒绝缓冲区”记录了失败的修改，这些信息被反馈给优化器，帮助它在下一轮提出更好的建议，这与“元技能更新”相辅相成。\n\n*   **回扣动机：**\n    *   论文声称要解决“现有方法不可控、不稳定、无法保证提升”的痛点。\n    *   **验证门控** 直接解决了“无法保证提升”的问题（只有变好才接受）。\n    *   **编辑预算** 解决了“不可控”的问题（限制改动幅度）。\n    *   **拒绝缓冲区** 解决了“不稳定”的问题（利用失败经验避免重蹈覆辙）。\n    *   实验数据支持这一说法：SkillOpt 在所有基准测试中均优于基线方法，且生成的技能文档非常紧凑（平均 920 tokens），说明优化过程是高效且精准的，没有产生冗余。\n\n### 5. 这套方法的硬伤在哪里？\n\n根据论文的 Limitation 部分：\n\n1.  **依赖自动化的反馈信号**：SkillOpt 需要一个能自动判断任务成功或失败的“验证器”（Verifier）。对于那些没有明确对错、或者评估成本极高的开放域任务（如创意写作、开放式对话），这种方法难以直接应用，因为无法自动计算“验证集得分”来决定是否接受修改。\n2.  **训练成本不低**：虽然部署时只需要一个文本文件，但在训练阶段，需要大量的 Agent 执行轨迹（Rollouts）和优化器模型的调用。对于一次性任务或资源受限的场景，这个“预训练”成本可能过高。\n3.  **单一技能的局限性**：SkillOpt 优化的是单个技能文档。对于极其复杂、需要多种截然不同策略的领域，单个文档可能无法容纳所有必要的知识，导致性能瓶颈。",
                    "additional_insights": "基于论文《SkillOpt: Executive Strategy for Self-Evolving Agent Skills》，以下是除核心方法外，能显著提升认知的有价值内容：\n\n### 1. 实验中的反直觉发现\n*   **极少的编辑次数带来巨大增益（Edit Economy）**：令人惊讶的是，最终部署的技能文档通常只包含 **1-4 次**被接受的编辑（中位数为 2.5 次），例如 LiveMathematicianBench 仅通过 **1 次**编辑就提升了 29.3 分。这表明优化器的主要价值不在于生成大量规则，而在于通过验证门（Validation Gate）严格筛选出极少数高信噪比的“关键程序性约束”，而非堆砌经验。\n    *   *依据：Section 4.4 \"Edit economy\" & Table 6*\n*   **强优化器模型在部署时零成本**：使用比目标模型更强的 Frontier Model（如 GPT-5.5）作为优化器（Optimizer）进行训练，虽然增加了训练成本，但在部署时完全不需要调用该强模型，仅保留一个紧凑的文本技能文件。这意味着我们可以利用最强模型的推理能力来“蒸馏”出适用于较弱或冻结模型的通用技能，实现能力的跨模型迁移。\n    *   *依据：Section 4.3 \"Transferability\" & Figure 1 caption*\n\n### 2. 有启发性的分析或 Ablation\n*   **拒绝编辑缓冲区（Rejected-Edit Buffer）的关键作用**：消融实验显示，保留被验证门拒绝的编辑作为“负反馈”至关重要。这不仅防止了有害提案的累积，还为后续优化步骤提供了明确的“什么不该做”的信号，证明了在文本空间优化中，**负样本（失败案例）的信息量与正样本同等重要**。\n    *   *依据：Section 4.4 \"Implications\" & Section 3.5 (referenced in text)*\n*   **文本学习率（Textual Learning Rate）控制稳定性**：通过限制每步允许的编辑数量（Edit Budget）作为“学习率”，并配合余弦衰减，可以防止技能文档发生语义上的剧烈跳跃。这揭示了在离散文本空间中，**小步长、受控的更新**比一次性重写更能保证优化的收敛性和可解释性。\n    *   *依据：Section 1 \"Introduction\" & Section 4.4 \"Compactness\"*\n\n### 3. 对领域的新认知\n*   **技能是“外部状态”而非“提示词”**：论文重新定义了 Agent 技能，将其视为冻结模型的**可训练外部状态（External State）**，类比于深度学习中的权重。这意味着技能优化应遵循与权重优化相同的纪律（如验证集门控、学习率调度、动量/慢更新），而不是传统的 Prompt Engineering 或一次性生成。\n    *   *依据：Section 1 \"Introduction\" & Figure 1*\n*   **程序性知识优于实例特定知识**：优化后的技能规则具有高度的**程序性（Procedural）**和**通用性**，不包含特定任务实例的细节。例如，SpreadsheetBench 的技能学会了“检查工作簿结构并写入静态值”，而不是针对某个具体 Excel 文件的指令。这证明了通过轨迹反馈可以自动提取出类似人类专家总结的“最佳实践”，而非过拟合训练数据。\n    *   *依据：Section 4.4 \"What does a learned skill actually say?\" & Figure 4*\n\n### 4. 实用的经验性结论\n*   **技能文档应保持紧凑（<2000 tokens）**：最终部署的 `best_skill.md` 长度通常在 300-2000 tokens 之间，远低于典型系统提示词的预算。这提示我们在设计 Agent 技能时，**简洁性和可审计性**比长度更重要，过长的技能文档可能包含噪声且难以维护。\n    *   *依据：Section 4.4 \"Compactness\"*\n*   **跨环境迁移的有效性**：在 Codex 环境中训练的技能可以直接迁移到 Claude Code 环境，并获得显著增益（+59.7 分）。这表明**核心程序性逻辑（如工具调用策略、证据绑定方式）是跨执行框架通用的**，开发者可以一次性优化技能，然后在不同 Agent 框架间复用。\n    *   *依据：Section 1 \"Introduction\" & Section 4.3 \"Transferability\"*\n\n### 5. 局限性中的机会\n*   **主观/开放域任务的验证难题**：作者指出 SkillOpt 依赖自动验证器（Automatic Verifiers），在主观性强、多维度的开放域任务中，验证门可能需要更强的人为或模型评估。这暗示了未来研究方向：**开发基于偏好（Preference-driven）或奖励模型（Reward Model）的验证门**，以扩展技能优化到无明确对错答案的领域。\n    *   *依据：Section B \"Limitations\"*\n*   **单一技能 vs. 技能库**：当前方法优化单一技能，对于高度异构的领域可能不足。这为**构建可共享基础设施的技能库（Skill Libraries）**和**跨基准的优化器元技能（Optimizer-side Meta Skills）**提供了明确的研究机会，即如何让优化器本身也具备“学习如何学习”的能力。\n    *   *依据：Section 5 \"Outlook\" & Section B \"Limitations\"*",
                    "research_value": "**1. 影响力潜力（Impact）**\n**正面证据**：论文声称在 6 个基准、7 个目标模型、3 个执行框架的 52 个测试单元中全部达到最佳或并列最佳，且平均提升显著（如 GPT-5.5 在直接聊天中提升 +23.5 分）。更重要的是，它提出了一种“部署时零成本”的优化范式，即利用强模型离线优化技能文档，供弱模型或冻结模型在线使用，这直接解决了当前 Agent 部署中算力与性能平衡的痛点。\n**负面证据或缺失**：该方法高度依赖存在自动验证器（Automatic Verifier）的任务环境。对于大量缺乏明确对错标准、依赖主观评估的开放域任务（如创意写作、复杂谈判），其适用性受限，这可能限制其在通用 Agent 领域的广泛普及。\n**判断**：强\n**理由**：它不仅提升了性能，更重新定义了 Agent 技能优化的工程范式（从 Prompt Engineering 转向可训练的离散状态优化），且具备跨模型迁移的实用价值，对工业界部署具有直接指导意义。\n\n**2. 不可替代性（Uniqueness）**\n**正面证据**：现有方法多为“一次性生成”或“无约束自我修正”，SkillOpt 引入了类似深度学习的“验证门控”和“文本学习率”概念，将技能修改变为可控的迭代过程。消融实验证明，去掉验证门控会导致性能大幅下降，说明这种“只进不退”的机制是独特的且必要的。\n**负面证据或缺失**：基于轨迹反馈的自我修正（Self-Correction via Trajectories）本身并非全新概念（如 Trace2Skill, EvoSkill 等基线已存在）。SkillOpt 的创新更多在于优化策略的严谨性（门控、预算），而非底层反馈机制的根本性突破。\n**判断**：中等\n**理由**：虽然核心机制（验证门控+编辑预算）具有独特性，但其基础逻辑（利用执行轨迹改进提示/技能）在领域内已有探索，属于对现有范式的精细化改进而非颠覆性创新。\n\n**3. 时机判断（Timing）**\n**正面证据**：当前 Frontier LLMs 正逐渐从“纯推理”转向“Agent 执行”，且模型权重冻结（Frozen Weights）成为常态（出于成本和安全考虑）。此时提出一种不依赖权重更新、仅优化外部文本状态的方法，恰好契合了“模型能力固化、外部知识动态化”的行业趋势。\n**负面证据或缺失**：无具体证据表明该领域已过时或过早。\n**判断**：强\n**理由**：在 Agent 技能从“手工编写”向“自动演化”过渡的关键节点，SkillOpt 提供了第一个系统化、可控的优化框架，填补了“一次性生成”与“全量微调”之间的空白。\n\n**4. 对现有范式的审视（Challenging Conventions）**\n**正面证据**：论文明确挑战了将技能文档视为“静态提示词”或“一次性生成物”的传统做法，主张将其视为“可训练的外部状态”，并引入深度学习中的优化纪律（学习率、验证集、动量）。实验显示，极少的编辑次数（中位数 2.5 次）即可带来巨大增益，反驳了“更多规则更好”的直觉。\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：它成功地将连续空间的优化直觉迁移到离散文本空间，并证明了“少而精”的程序性约束优于“多而杂”的经验堆砌，是对 Prompt Engineering 随意性的一种有力纠偏。\n\n**5. 核心洞见的清晰度（Core Insight）**\n**正面证据**：核心洞见可概括为：“Agent 技能应被视为冻结模型的可训练外部状态，通过验证门控和编辑预算实现可控的离散空间优化。”\n**负面证据或缺失**：无。\n**判断**：强\n**理由**：洞见清晰且具象，将抽象的“技能优化”转化为具体的“带约束的文本编辑过程”，易于理解和复现。\n\n**6. 风险与可行性（Risk vs. Feasibility）**\n**正面证据**：方法完全基于现有的 LLM API 调用和文本操作，无需修改模型架构或进行昂贵的权重微调，技术门槛低，可行性极高。消融实验验证了各组件的有效性，降低了方法失效的风险。\n**负面证据或缺失**：主要风险在于对“自动验证器”的依赖。如果验证器本身存在偏差或噪声，优化过程可能会收敛到错误的局部最优（即“垃圾进，垃圾出”）。\n**判断**：中等\n**理由**：技术实现风险低，但科学风险在于其有效性高度绑定于任务的可评估性（Verifiability），在不可评估任务上的泛化能力存疑。\n\n**7. 比较优势（Comparative Advantage）**\n**正面证据**：论文展示了跨模型（GPT-5.5 优化 -> 其他模型部署）和跨框架（Codex -> Claude Code）的迁移能力，表明该方法具有高度的通用性和基础设施属性。\n**负面证据或缺失**：无具体证据表明其他团队无法在短期内复现类似结果，因为核心组件（LLM 调用、文本编辑）均为通用技术。\n**判断**：中等\n**理由**：虽然方法通用，但其优势更多体现在工程实现的严谨性上，而非依赖某种独占性的数据或模型能力，因此壁垒相对有限。\n\n---\n\n- **综合评价**：**值得深入关注**。SkillOpt 在 Agent 技能优化这一新兴且关键的领域，提出了第一个系统化、可控且经过严格验证的优化框架。它成功地将深度学习的优化直觉应用于离散文本空间，解决了现有方法不稳定、不可控的痛点，并在广泛的基准测试中证明了其优越性和跨模型迁移能力。尽管其依赖自动验证器的局限性限制了在开放域任务中的应用，但其核心范式（技能作为可训练状态）具有极高的启发价值和工业落地潜力。\n\n- **最致命的弱点**：**对自动验证器（Automatic Verifier）的强依赖**。该方法的核心闭环（提出修改 -> 验证得分 -> 接受/拒绝）完全建立在任务结果可自动量化评估的基础上。对于大量缺乏明确对错标准、依赖人类主观判断或长期反馈的复杂 Agent 任务，该方法无法直接应用，除非引入昂贵且可能不稳定的奖励模型（Reward Model）。\n\n- **如果要做得更好**：\n    1.  **探索基于偏好或奖励模型的验证机制**：尝试将验证门控从“硬性的自动评分”扩展为“基于 LLM-as-a-Judge 的偏好排序”，以覆盖更多开放域任务。\n    2.  **多技能协同优化**：当前仅优化单一技能文档，未来可研究如何优化“技能库”或“技能组合策略”，以应对需要多种截然不同策略的复杂领域。\n\n- **与 Carlini 原则的对照**：\n    - **最符合**：**“Simplicity”（简洁性）**。论文发现极少的编辑次数（中位数 2.5 次）即可带来巨大增益，证明了通过严格筛选保留高信噪比的关键约束，比堆砌规则更有效，体现了“少即是多”的科学美感。\n    - **最不符合**：**“Generality”（通用性）**。由于严重依赖自动验证器，该方法在缺乏明确评估标准的广泛 Agent 应用场景中通用性受限，未能完全解决 Agent 适应性的普遍问题。",

                    "summary_translation": "当前的智能体（Agent）技能通常通过手工编写、一次性生成（one-shot generation）或在松散控制下的自我修订（self-revision）演化而来。这些方法均无法像深度学习优化器（deep-learning optimizer）那样对技能进行优化，也无法在反馈机制下可靠地超越其初始状态。我们认为，技能应作为冻结智能体（frozen agent）的外部状态进行训练，并遵循使权重空间优化（weight-space optimization）具有可重复性的相同规范。据我们所知，SkillOpt 是首个针对智能体技能的系统化、可控的文本空间优化器（text-space optimizer）：一个独立的优化器模型将带有评分的 rollout（轨迹/执行过程）转化为对单一技能文档的有界添加/删除/替换（add/delete/replace）编辑操作，且仅当编辑严格提升保留验证集（held-out validation）得分时才被接受。通过引入文本学习率预算（textual learning-rate budget）、拒绝编辑缓冲区（rejected-edit buffer）以及基于 epoch 的缓慢/元更新（slow/meta update），SkillOpt 在确保技能训练稳定性的同时，在部署阶段不增加任何推理时的模型调用（inference-time model calls）。在六个基准测试（benchmarks）、七个目标模型（target models）以及三种执行框架（execution harnesses，包括直接聊天 direct chat、Codex 和 Claude Code）的评估中，SkillOpt 在所有 52 个（模型，基准测试，执行框架）评估单元中表现最佳或并列最佳，并击败了所有单元级别的竞争对手，包括人类专家、一次性 LLM、Trace2Skill、TextGrad、GEPA 和 EvoSkill 生成的技能。在 GPT-5.5 上，SkillOpt 使无技能状态下的平均准确率在直接聊天模式下提升了 23.5 个百分点，在 Codex 智能体循环（agentic loop）中提升了 24.8 个百分点，在 Claude Code 环境中提升了 19.1 个百分点。迁移实验进一步表明，优化后的技能工件（skill artifacts）在跨模型规模迁移、在 Codex 与 Claude Code 执行环境之间迁移，以及迁移至邻近的数学基准测试（无需进一步优化）时，仍能保持其价值。"

                    "title": "EVE-Agent: Evidence-Verifiable Self-Evolving Agents",

                    "summary": "Self-evolving agents should not train on examples they cannot justify. Data-free self-evolving search agents offer a scalable route to systems that generate their own questions, answer them, and improve from their own feedback without human annotations. Yet, without verifiable evidence, this loop can reward fluent but unsupported examples, turning the self-generated curriculum into an opaque and potentially unreliable training signal. We argue that evidence verifiability is a prerequisite for trustworthy self-evolution in search agents: each generated instance should include not only an answer but also a source-grounded span whose contribution to that answer can be measured. We introduce EVE-Agent, an Evidence-Verifiable Self-Evolving Agent that operationalizes this principle through a modification to the proposer--solver framework. The proposer generates a question, an answer, and a verbatim evidence span. An evidence verifier then rewards the span according to the marginal accuracy gain when the evidence is provided. This produces a training signal that favors evidence that genuinely helps answer the question, without requiring oracle answers, human labels, or external annotations. EVE-Agent leaves the backbone model, retriever, search tool, and optimization framework unchanged. Experiments show that EVE-Agent substantially improves evidence-grounded correctness over prior self-evolving search agents. The resulting curriculum is not merely self-generated but auditable by construction: each training example carries an inspectable source span that explains why it should be trusted.",
