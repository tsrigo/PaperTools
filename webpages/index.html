                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建智能体架构**。作者提出了AGEL-Comp，一个神经符号AI智能体框架，专门用于解决LLM智能体在交互环境中的组合泛化问题。这不是将LLM作为工具应用到特定领域（如生物、医疗、金融），而是**构建和改进LLM智能体本身的能力**。\n\n**第二步：正面指标分析**\n\n该论文包含多个核心关注点：\n\n1. **智能体能力构建**：\n   - 规划：动态因果程序图(CPG)作为世界模型\n   - 记忆：通过ILP引擎从经验反馈中合成Horn子句，积累符号知识\n   - 推理：混合推理核心（LLM + 神经定理证明器）\n   - 自我修正：通过\"演绎-归纳学习循环\"实现智能体的自我完善\n\n2. **演化机制**：\n   - 论文明确提出\"deduction-abduction learning cycle\"（演绎-归纳学习循环）\n   - 通过经验反馈进行学习（\"synthesizes new Horn clauses from experiential feedback\"）\n   - 神经适应阶段保持推理引擎与新知识对齐（\"neural adaptation phase keeps its reasoning engine aligned with new knowledge\"）\n\n**第三步：排除标准检查**\n\n- 安全相关：无涉及\n- 多模态与视觉：无涉及\n- 图相关技术：虽然CPG是\"directed hypergraph\"，但这是智能体内部的世界模型表示方法，不是图神经网络或知识图谱应用，属于智能体的知识表示范畴\n- 多智能体拓扑与编排：这是单智能体架构，不涉及\n\n**结论**\n\n该论文的核心贡献是构建一个**自我演化**的LLM智能体框架，通过神经符号混合架构实现智能体从经验中学习和自我完善。这完全符合研究者\"构建、改进或演化LLM智能体\"的核心目标，特别是\"自我演化\"方向的研究焦点。",
                    "intro_logic": "1. LLMs have shown strong performance on many natural language tasks.\n\n2. As LLMs are used as the cognitive core of interactive agents, a deeper limitation becomes visible.\n\n3. This limitation is compositional generalization: the ability to understand and act on novel combinations of already-known primitive components.\n\n4. Failure in compositional generalization creates a “compositionality crisis” for LLM-based agents.\n\n5. This crisis matters because human-like intelligence requires systematic, structured understanding rather than only recognizing statistical patterns.\n\n6. The brittleness of current LLM-based agents stems from their disembodied knowledge: their representations are not sufficiently connected to the structured, causal world in which actions have consequences.\n\n7. In particular, they lack grounding: the connection between abstract symbols and their real-world referents, interactions, and causal effects.\n\n8. Because of this lack of grounding, current models struggle in open-ended interactive environments, especially when they must adapt to novel but compositionally valid situations.\n\n9. Therefore, improving robustness in interactive agents requires more than neural scaling; agents need a way to build an explicit, interpretable, and compositionally structured understanding of their world from experience.\n\n10. Research question: How can LLM-powered interactive agents acquire grounded, structured world understanding that enables robust compositional generalization in novel interactive environments?",
                    "core_insight": "## 1. 关键洞察（The Seed Insight）\n\n**一句话概括：**  \n作者的关键洞察是：**LLM agent 的 compositional generalization 失败，不应只被看作“模型能力不够”或“prompt 不够好”，而应被看作“缺少一个由行动后果持续修正的、显式可推理的 causal-symbolic world model”。**\n\n换句话说，论文真正的切入点不是简单地说“LLM 不会组合泛化”，而是进一步指出：  \n**组合泛化必须通过 grounded interaction 来获得；agent 必须把行动、反馈、因果后果转化为可复用的 symbolic rules，然后在后续规划中显式推理这些规则。**\n\n论文中最能体现这一洞察的原文是：\n\n> “This brittleness arises because the models’ knowledge is inherently disembodied and detached from the structured, causal world.”\n\n以及：\n\n> “Their understanding lacks empirical grounding, the connection between abstract symbols and their real-world referents, interactions, and consequences that govern how concepts systematically combine.”\n\n更直接的 seed insight 表述是：\n\n> “We argue that true generalization in interactive settings cannot be achieved through neural scaling alone but requires an architecture that can learn, represent, and reason over explicit, structured knowledge.”\n\n这句话基本就是整篇论文的方法论起点。\n\n作者意识到，LLM 的失败不是因为它完全没有知识，而是因为它的知识主要是 latent statistical associations，缺少三件东西：\n\n1. **action-grounding**：符号和行动后果之间没有可靠连接；\n2. **causal structure**：不知道哪些状态因素真正导致成功或失败；\n3. **explicit compositional rules**：不能把经验抽象成可复用、可验证的规则。\n\n因此，作者提出：agent 不应只是“用 LLM 生成计划”，而应该在交互中构建一个能被修改、能被证明、能被扩展的 world model。\n\n论文中也明确说：\n\n> “By enabling an agent to learn from the consequences of its actions in an interactive environment, we can augment its pre-existing knowledge with an explicit world model that captures the compositional ‘grammar’ of its environment.”\n\n这里的 **“compositional grammar of its environment”** 是一个非常关键的说法。作者实际上把环境中的可组合规律看成一种“语法”：  \n例如，`fire` 会造成伤害，不是一个孤立事实；它应该被归纳成：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\n```\n\n这样以后遇到 `lava`、`spikes`、`poison` 等新对象，只要它们满足 `is_harmful(X)`，agent 就能组合式地推理，而不是重新试错。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n这个 seed insight 直接导向了 AGEL-Comp 的三大核心设计：**CPG + ILP + NTP**。中间的推理链条可以概括为：\n\n### Step 1：如果 LLM 的问题是“无 grounding”，那就必须让 agent 从行动后果中学习\n\nLLM agent 在环境中失败时，不能只是把失败写进自然语言 memory，而应该把失败转化为结构化知识。论文说：\n\n> “By building this model from grounded experience, the agent can move beyond shallow statistical pattern matching to systematic, rule-based reasoning.”\n\n所以第一步是：  \n**交互经验不能只存成文本，而要变成 rules。**\n\n这就需要 episodic memory 和 feedback signals：\n\n> “For every executed action plan... the agent receives a corresponding set of feedback signals... serving as the primary driver for learning.”\n\n---\n\n### Step 2：如果要组合泛化，知识表示必须是 modular、symbolic、可组合的\n\n因此作者没有使用普通 vector memory 或 text memory，而是提出 **Causal Program Graph, CPG**。\n\n论文定义：\n\n> “The agent’s stateful representation of the world is a causal directed hypergraph W = (V, E) representing knowledge as a structured, executable program.”\n\n其中：\n\n> “Hyperedges... are Horn clauses functioning as sub-programs.”\n\n这一步很关键。作者不是把世界模型设计成普通 knowledge graph，而是设计成 **program graph**：  \n每条边都是一个 Horn clause，相当于一个可执行、可推理、可组合的子程序。\n\n例如：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\n```\n\n这种表示天然支持 compositionality，因为规则可以在不同对象、不同任务、不同组合场景中复用。\n\n---\n\n### Step 3：如果经验要变成规则，就需要从失败中找出真正原因\n\n交互环境中的反馈通常是 sparse 的。agent 失败了，但不知道是哪个因素导致失败。论文把这个称为 credit assignment problem：\n\n> “The first stage addresses the credit assignment problem when a prediction error occurs—a mismatch between the outcome predicted by the agent’s world model Wt and the actual feedback Ft received from the environment.”\n\n所以作者设计了 **Minimal Contrastive Search, MCS**。\n\n核心思想是：  \n找一个“几乎相同但成功”的 episode，与失败 episode 对比。如果两者唯一差别是 `is(fire, loc1)`，那么就把 `fire` 识别为可能的 causal antecedent。\n\n论文原文：\n\n> “The MCS module searches the agent’s episodic memory M for a ‘minimal pair’ experience...”\n\n以及：\n\n> “The algorithm proceeds only if ΔS contains exactly one literal... this single literal... is identified as the most probable causal antecedent for the failure.”\n\n这一步把 raw experience 转成一个 grounded causal hypothesis，例如：\n\n```prolog\ncauses_damage(fire)\n```\n\n---\n\n### Step 4：如果要组合泛化，不能只记住具体事实，必须归纳成一般规则\n\n具体事实 `causes_damage(fire)` 还不能支持强 compositional generalization。  \n所以作者引入 **ILP / Meta-Interpretive Learning, MIL**，把具体经验抽象成 Horn clause。\n\n论文说：\n\n> “This stage takes the specific hypothesis hcausal... and generalizes it into a reusable symbolic rule using a Meta-Interpretive Learning system.”\n\n例如从：\n\n```prolog\ncauses_damage(fire)\nis_harmful(fire)\n```\n\n归纳出：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\n```\n\n论文原文例子：\n\n> “the engine can induce the rule H = ∀X : causes_damage(X) ← is_harmful(X).”\n\n这就是从 grounding 到 compositionality 的关键桥梁：  \n**经验 → 因果归因 → 具体符号假设 → 一般 Horn clause → 可复用世界模型。**\n\n---\n\n### Step 5：如果 LLM 仍然负责规划，就必须有 verifier 防止 plausible-but-wrong plans\n\n作者并没有完全抛弃 LLM，而是把 LLM 放在“proposal generator”的角色上。LLM 负责生成候选 sub-goals：\n\n> “the LLM acts as a generative hypothesis engine that produces a set of candidate sub-goals”\n\n但这些候选计划不能直接执行，因为 LLM 容易产生貌似合理但逻辑上不可靠的计划。于是引入 **Neural Theorem Prover, NTP** 作为 verifier。\n\n论文明确说：\n\n> “An LLM planner is prone to generating plausible but logically unsound steps. We employ an NTP as a formal verifier to enforce compositional discipline.”\n\n以及：\n\n> “This is a more rigorous approach than simply prompting an LLM to ‘check its own work’.”\n\n所以 AGEL-Comp 的 planning 不是：\n\n```text\nLLM proposes plan → execute\n```\n\n而是：\n\n```text\nLLM proposes candidate sub-goals → NTP proves against CPG → only logically valid plans execute\n```\n\n这就是论文所谓的 hybrid planner-verifier architecture。\n\n---\n\n### Step 6：因此形成 deduction–abduction learning cycle\n\n整套方法最终闭合成一个循环：\n\n1. **Deduction**：用当前 CPG + NTP 推理可行计划；\n2. **Action**：执行计划；\n3. **Prediction error**：如果反馈和预期不一致；\n4. **Abduction / Induction**：用 MCS + ILP 找原因并归纳规则；\n5. **World model update**：把新 Horn clause 加入 CPG；\n6. **Neural adaptation**：fine-tune NTP embedding，使神经推理器和新规则一致。\n\n论文摘要中说：\n\n> “Together, these components operationalize a deduction–abduction learning cycle: enabling the agent to deduce plans and abductively expand its symbolic world model.”\n\n这就是从核心洞察到方法结构的完整推理链。\n\n---\n\n## 3. 试错历程：作者遇到的困难与调整\n\n论文没有以“研究日志”的方式描述作者真实的 chronological trial-and-error，因此不能说作者明确写了“我们一开始尝试 X，失败后改成 Y”。  \n但从方法设计、ablation study 和 scalability discussion 可以看出，作者确实识别并解决了几个关键困难。这些困难可以理解为 AGEL-Comp 诞生过程中的核心技术折衷。\n\n---\n\n### 困难一：从失败反馈中找出真正原因，而不是让 LLM 自己猜\n\n最初如果直接让 LLM 根据失败经验总结规则，很容易受到 LLM latent knowledge 的污染。比如 agent 被火烧伤，LLM 当然知道 fire dangerous，但这不是 grounded learning，而是调用预训练知识。\n\n作者专门指出要避免这一点：\n\n> “To solve this credit assignment problem without confounds from the LLM’s latent knowledge, we introduce a strict, experience-based algorithm: Minimal Contrastive Search.”\n\n这说明作者意识到：  \n**如果 grounding 过程依赖 LLM 解释，那么所谓 grounded rule learning 就不干净。**\n\n因此他们调整为 MCS：只基于 agent episodic memory 中的 minimal pair 来做 causal attribution。\n\n这个调整产生了一个新子问题：  \n必须找到失败 episode 和成功 episode 之间的最小差异，而且差异必须是 singleton。论文说：\n\n> “The algorithm proceeds only if ΔS contains exactly one literal.”\n\n这使得学习更保守，但因果归因更可靠。代价是：如果找不到 singleton difference，学习会跳过。\n\n---\n\n### 困难二：只有 verifier 没有 learner，会陷入“正确地重复错误”\n\nAblation 中的 **AGEL-Comp w/o ILP** 揭示了一个重要失败模式：  \nNTP verifier 本身并不能保证现实正确性。它只能保证 plan 相对于当前 world model 是 logically valid。  \n如果 world model 是错的或不完整的，verifier 反而会帮助 agent 坚定地执行错误计划。\n\n论文分析非常直接：\n\n> “This is a critical insight: a logical verifier (NTP) is useless if the underlying world model (W) is incomplete or wrong.”\n\n以及：\n\n> “The agent simply repeats its ‘logically valid’ but factually incorrect plan, failing to learn from experience.”\n\n这说明作者意识到，单纯 symbolic reasoning 不足以解决 interactive generalization。  \n必须引入 ILP learner，让 world model 能根据经验被修正。\n\n所以 AGEL-Comp 不是“LLM + theorem prover”，而是：\n\n```text\nLLM + NTP verifier + ILP learner + mutable CPG\n```\n\n---\n\n### 困难三：只有 learner 没有 verifier，会变成危险的 trial-and-error\n\n另一个 ablation 是 **AGEL-Comp w/o NTP**。这个 agent 能通过 ILP 学规则，但它没有 verifier，LLM 生成什么计划就执行什么。结果是它会通过犯错来学习，但不能在行动前避免错误。\n\n论文说：\n\n> “This agent learns ‘the hard way’—by executing a flawed plan, receiving negative feedback, and then inducing a new rule.”\n\n而完整 AGEL-Comp 的优势是：\n\n> “The AGEL-Comp system avoids this failure by using the NTP to reject the flawed plan before execution.”\n\n这说明作者发现：  \n**learning from experience 不等于 blind trial-and-error；真正安全高效的 agent 必须能在行动前用已学规则做 deductive verification。**\n\n因此 NTP 的角色不是锦上添花，而是让 agent 从“事后学习”升级为“事前避免”。\n\n---\n\n### 困难四：NTP 和 ILP 都可能计算开销很大，需要限制搜索空间\n\nNTP 和 ILP 都是理论上很强但计算上昂贵的组件。作者在 scalability discussion 中承认：\n\n> “NTP verification can be computationally intensive”\n\n以及：\n\n> “ILP induction, i.e., the search space for the meta-interpretive learning (MIL) engine, though potentially vast...”\n\n因此他们做了两个重要限制。\n\n第一，NTP 不做 open-ended reasoning，只验证 LLM 已提出的具体 sub-goals：\n\n> “It is not solving open-ended queries but verifying specific LLM-proposed subgoals against the world model Wt.”\n\n第二，ILP 不在整个环境空间中搜索规则，而是在 MCS 已经找出的具体 causal literal 上做归纳：\n\n> “The abstractive induction stage is triggered only after the causal attribution module has isolated a single, specific causal literal...”\n\n这大幅降低了 hypothesis search space：\n\n> “This highly focused learning task—generalizing from one or two examples—dramatically prunes the hypothesis search space, making induction efficient.”\n\n所以可以看出，AGEL-Comp 的架构不是简单堆叠 LLM、ILP、NTP，而是通过 **LLM narrowing + MCS narrowing + MIL generalization** 控制复杂度。\n\n---\n\n### 困难五：world model 会不断增长，需要处理新符号和 neural alignment\n\n当 ILP 产生新规则、新 predicate 时，NTP 的 embedding space 也必须更新，否则 symbolic CPG 和 neural prover 会脱节。\n\n论文写道：\n\n> “When new predicates are invented by the ILP engine, they are added to the vocabulary V, and their corresponding embeddings are initialized in E... before being refined during training.”\n\n因此作者引入了 two-phase NTP training regimen：\n\n1. **Phase 1: Bootstrapping on Foundational Knowledge**\n2. **Phase 2: Continual Fine-tuning on Induced Rules**\n\n论文说：\n\n> “This continual learning process ensures that the NTP’s reasoning remains consistent with the agent’s latest empirically grounded knowledge.”\n\n这说明一个新的子问题出现了：  \n**symbolic learner 更新了规则之后，neural reasoner 如何同步？**\n\nAGEL-Comp 的回答是：  \n规则加入 CPG 是 symbolic update；随后 NTP 和 embeddings 通过 continual fine-tuning 做 neural adaptation。\n\n---\n\n## 总结\n\n这篇论文的“灵光一闪”可以概括为：\n\n> **Compositional generalization for LLM agents should be treated as grounded causal program acquisition, not merely better prompting or larger-scale neural modeling.**\n\n它的独特性在于把 interactive agent 的失败转化为一个闭环学习问题：\n\n```text\nLLM generates possibilities\n→ NTP deductively verifies them against CPG\n→ agent acts\n→ feedback exposes prediction error\n→ MCS attributes the cause\n→ ILP abstracts it into Horn clauses\n→ CPG expands\n→ NTP adapts\n→ future plans become more compositionally robust\n```\n\n因此 AGEL-Comp 的核心贡献不是某一个单独模块，而是这三个模块之间的机制闭环：  \n**deduction for safe planning, abduction/induction for world-model repair, and grounding through action consequences.**",
                    "methodology": "## 一句话概括核心创新\n\n这篇论文最本质的区别是：**它不是只让 LLM 临时想办法，而是让智能体把失败经验转成明确的规则，并在以后行动前用这些规则检查计划是否会出错。**\n\n---\n\n# 1. 这套方法宏观上到底在干什么？\n\nAGEL-Comp 做的事情很直接：\n\n1. 智能体看到当前环境。\n2. LLM 提出接下来可以做什么。\n3. 系统不用直接相信 LLM，而是拿已有规则检查这个计划是否合理。\n4. 如果计划通过检查，就执行。\n5. 如果执行后结果和预期不一样，比如本来以为靠近火没事，结果扣血了，系统就分析这次失败。\n6. 它会从记忆里找类似经历，判断失败可能是哪个环境因素导致的。\n7. 然后把这个经验写成一条规则，比如：\n\n   ```prolog\n   causes_damage(X) :- is_harmful(X).\n   is_harmful(fire).\n   ```\n\n8. 之后再遇到火，系统会在行动前发现“靠近火会扣血”，从而拒绝这个计划。\n\n所以，AGEL-Comp 的核心不是让 LLM 变得更聪明，而是给 LLM 外面加了一套：\n\n- 可更新的规则库；\n- 计划检查器；\n- 从失败经验中自动写规则的学习器。\n\n---\n\n# 2. 方法按实际执行顺序拆解\n\n下面按照系统真实运行流程讲。\n\n---\n\n## 第一步：观察环境，把环境转成结构化信息\n\n### 输入\n\n环境当前状态，例如：\n\n- 智能体在位置 `loc1`\n- 旁边有火\n- 旁边有金币\n- 火正在燃烧\n- 目标是“拿到金币”\n\n论文里把原始环境状态记为：\n\n```text\nS_t\n```\n\n### 操作\n\n感知模块把环境信息转成一组明确的事实，也就是 ground literals，简单说就是“具体事实句子”。\n\n例如：\n\n```prolog\nat(agent, loc1)\nis(fire, loc1)\nis(coin, loc1)\n```\n\n### 输出\n\n得到结构化感知结果：\n\n```text\nP_t\n```\n\n也就是当前环境里有哪些对象、对象在哪里、对象有什么状态。\n\n### 目的\n\nLLM 直接看环境可能会产生含糊判断。系统需要把环境变成后续规则系统能处理的格式。\n\nIntroduction 里提到的问题是：LLM 的知识没有真正和环境结果绑定起来。这里第一步就是先把环境变成可记录、可比较、可推理的数据。\n\n### 如果不做会怎样\n\n后面的规则检查、失败归因、规则学习都无法进行，因为系统不知道当前环境里到底有哪些明确事实。\n\n---\n\n## 第二步：LLM 根据目标提出候选计划\n\n### 输入\n\n系统拿到：\n\n- 当前结构化环境信息 `P_t`\n- 用户目标 `G`\n- 当前已有世界模型 `W_t`\n\n这里的世界模型叫 CPG，Causal Program Graph，直白说就是“系统已经知道的一堆规则和事实”。\n\n例如目标是：\n\n```text\nRetrieve the shiny coin\n```\n\n当前世界模型里可能还没有“火会造成伤害”的规则。\n\n### 操作\n\nLLM 生成一个或多个候选计划。\n\n例如：\n\n```text\napproach(fire)\ngrab(coin)\n```\n\n或者生成一些子目标：\n\n```text\nmove_to(coin)\npickup(coin)\n```\n\n### 输出\n\n得到 LLM 提出的候选计划或子目标集合：\n\n```text\n{g1, g2, ..., gk}\n```\n\n### 目的\n\nLLM 的作用是提出可能的行动方案。它擅长根据目标和上下文生成计划。\n\n但论文的出发点是：LLM 生成的计划经常“看起来合理，但实际会失败”。所以这一步只负责“提出”，不负责最终决定。\n\n### 如果不做会怎样\n\n系统就没有高层行动建议，只靠符号规则搜索会比较死板，也难以处理开放目标。\n\n---\n\n## 第三步：用 NTP 检查 LLM 的计划\n\n### 术语说明\n\nNTP 是 Neural Theorem Prover，神经定理证明器。这里可以理解为：**一个可以根据已有规则检查某个结论能不能被推出来的模块**。\n\n它不是让 LLM 自己反思，而是用规则库做检查。\n\n### 输入\n\nNTP 拿到：\n\n- LLM 提出的候选计划或子目标；\n- 当前世界模型 `W_t`，也就是已有规则；\n- 当前环境事实。\n\n例如规则库里如果已经有：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\nis_harmful(fire).\n```\n\n那么对于计划：\n\n```text\napproach(fire)\n```\n\n系统可以检查它是否会导致负面结果。\n\n### 操作\n\nNTP 做的是：\n\n1. 把候选计划转成规则查询；\n2. 在当前世界模型里查找能否证明这个计划是可行的；\n3. 同时检查是否能推出负面后果，比如：\n\n   ```prolog\n   causes_damage(fire)\n   ```\n\n4. 给每个候选计划打一个证明分数 `σ`；\n5. 返回证明路径 `π`。\n\n论文里写成：\n\n```text\n(σ_i, π_i) = NTP.prove(g_i | W_t)\n```\n\n### 输出\n\n输出包括：\n\n- 每个计划的可信度分数；\n- 对应的推理路径；\n- 被接受的计划；\n- 或者拒绝某些计划。\n\n### 目的\n\n这是为了解决 LLM 计划不可靠的问题。\n\nLLM 可能会说“直接穿过火去拿金币”，但如果规则库里已经知道火会扣血，NTP 就能在执行前挡掉这个计划。\n\n### 如果不做会怎样\n\n系统会直接执行 LLM 的计划，很多错误只能靠执行后失败来发现。论文里的 `w/o NTP` 消融实验就证明了这一点：它能学规则，但不能在行动前稳定避错，First-Try Success 明显下降。\n\n---\n\n## 第四步：把高层计划转成环境可执行动作\n\n### 输入\n\n通过检查的高层计划，例如：\n\n```text\ngo around fire\npick up coin\n```\n\n### 操作\n\nAction Module 把这些计划翻译成游戏环境 API 能执行的低层命令。\n\n例如：\n\n```text\nmove_right\nmove_up\nmove_up\npickup\n```\n\n### 输出\n\n得到命令序列：\n\n```text\nC_t\n```\n\n### 目的\n\nLLM 和规则系统处理的是高层动作，但 Unity 环境需要具体控制命令。这个模块负责把计划落到环境接口上。\n\n### 如果不做会怎样\n\n系统只能“想出计划”，不能真正执行。\n\n---\n\n## 第五步：执行动作，接收环境反馈\n\n### 输入\n\n低层动作命令序列，例如：\n\n```text\nmove_right\npickup\n```\n\n### 操作\n\n环境执行这些动作，并返回反馈。\n\n例如：\n\n```text\nHP: -10\ncoin_collected: false\ncollision: true\n```\n\n或者：\n\n```text\nquest_success: true\ncoin_collected: true\n```\n\n### 输出\n\n得到反馈信号：\n\n```text\nF_t\n```\n\n每个动作都对应一个反馈：\n\n```text\n(a1, f1), (a2, f2), ...\n```\n\n### 目的\n\n系统要知道自己的行动真实造成了什么结果。AGEL-Comp 的学习不是离线训练，而是靠这些实际反馈来更新规则。\n\n### 如果不做会怎样\n\n系统不会知道计划是否真的成功，也无法从失败中学习。\n\n---\n\n## 第六步：把经历存入记忆\n\n### 输入\n\n一次交互经历，包括：\n\n```text\n当前状态 S_t\n执行计划 A_t\n环境反馈 F_t\n```\n\n例如：\n\n```text\nstate: at(agent, loc1), is(fire, loc1), is(coin, loc1)\naction: approach(fire)\nfeedback: HP -10\n```\n\n### 操作\n\n系统把这次经历存入 Episodic Memory，直白说就是最近经历缓存。\n\n论文记为：\n\n```text\nM = {e1, e2, ..., ek}\n```\n\n每条经历是：\n\n```text\ne = (S_t, A_t, F_t)\n```\n\n### 输出\n\n更新后的记忆库 `M`。\n\n### 目的\n\n后面做失败原因分析时，系统需要拿当前失败经历和过去类似经历比较。\n\n### 如果不做会怎样\n\n系统只能看到当前失败，但没有对照样本，无法判断到底是哪个因素导致失败。\n\n---\n\n## 第七步：发现预测错误，触发学习\n\n### 输入\n\n系统拿到：\n\n- 当前世界模型预测的结果 `F_expected`\n- 环境真实反馈 `F_actual`\n\n例如：\n\n```text\nF_expected = HP 不变\nF_actual = HP -10\n```\n\n### 操作\n\n系统比较二者：\n\n- 如果一致，不学习；\n- 如果不一致，说明世界模型缺东西或有错，触发学习流程。\n\n### 输出\n\n得到一个失败样本：\n\n```text\ne_fail = (S_t, A_t, F_actual)\n```\n\n### 目的\n\n学习不应该每一步都乱改规则，而是只在“系统原本判断错了”的时候发生。\n\n这对应论文的核心动机：LLM 或已有规则对环境理解不完整，需要根据真实交互修正。\n\n### 如果不做会怎样\n\n系统无法知道什么时候该更新规则，可能一直重复错误，也可能过度学习无关信息。\n\n---\n\n## 第八步：用 MCS 找失败的可能原因\n\n### 术语说明\n\nMCS 是 Minimal Contrastive Search，最小对比搜索。这里的意思是：**找一条过去类似但成功的经历，然后比较失败和成功状态中只差了什么。**\n\n### 输入\n\n系统拿到：\n\n- 当前失败经历 `e_fail`\n- 当前失败状态里的事实集合 `C_fail`\n- 记忆库 `M`\n- 期望反馈 `F_expected`\n\n例如失败状态：\n\n```prolog\nat(agent, loc1)\nis(fire, loc1)\nis(coin, loc1)\n```\n\n过去某次成功状态：\n\n```prolog\nat(agent, loc2)\nis(coin, loc2)\n```\n\n两次都执行了类似动作，比如 `approach` 或 `pickup`，但一次扣血，一次没扣血。\n\n### 操作\n\nMCS 做几件事：\n\n1. 在记忆中找一条成功经历 `e_success`；\n2. 要求这条经历和当前失败经历执行的是同一个动作，或者语义上等价的动作；\n3. 要求成功经历得到的是原本预期结果；\n4. 比较失败状态和成功状态的事实差异：\n\n   ```text\n   ΔS = C_fail - C_success\n   ```\n\n5. 如果差异里只有一个事实，比如：\n\n   ```prolog\n   is(fire, loc1)\n   ```\n\n   那就把这个事实当成最可能的失败原因。\n\n### 输出\n\n输出一个具体因果假设，例如：\n\n```prolog\ncauses_damage(fire)\n```\n\n如果差异不止一个，或者找不到合适对照样本，就输出 `null`，这次不学习。\n\n### 目的\n\n这是为了解决“失败归因”问题。\n\n比如拿金币失败了，可能原因有很多：\n\n- 火在旁边；\n- 有怪物；\n- 地面有陷阱；\n- 背包满了；\n- 距离太远。\n\n系统不能随便把失败归因给某个对象。MCS 通过找“同动作、不同结果”的对照经历，尽量定位唯一差异。\n\n### 如果不做会怎样\n\nILP 后面可能会根据错误原因学出错误规则，比如把“金币会造成伤害”学出来，而不是“火会造成伤害”。\n\n---\n\n## 第九步：用 ILP / MIL 把具体经验变成通用规则\n\n### 术语说明\n\nILP 是 Inductive Logic Programming，归纳逻辑编程。这里就是：**从少量例子和已有规则中，自动写出新的逻辑规则。**\n\nMIL 是 Meta-Interpretive Learning，是 ILP 的一种形式。这里可以理解为：**用预设的规则模板来搜索更一般的规则。**\n\nHorn clause 是一种逻辑规则，形式通常是：\n\n```prolog\n结论 :- 条件1, 条件2.\n```\n\n意思是：如果条件成立，就可以推出结论。\n\n### 输入\n\n系统拿到：\n\n- MCS 找到的具体假设：\n\n  ```prolog\n  causes_damage(fire)\n  ```\n\n- 当前已有世界模型 `W_t`\n- 可能已有背景知识：\n\n  ```prolog\n  is_harmful(fire)\n  ```\n\n### 操作\n\nILP / MIL 不只是记住：\n\n```prolog\nfire causes damage\n```\n\n它会尝试归纳成更通用的规则。\n\n例如从：\n\n```prolog\ncauses_damage(fire)\nis_harmful(fire)\n```\n\n归纳出：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\n```\n\n也就是说，不只是火会造成伤害，而是任何被标记为 harmful 的东西都会造成伤害。\n\n### 输出\n\n输出新规则集合：\n\n```text\nΔW\n```\n\n例如：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\nis_harmful(fire).\n```\n\n### 目的\n\n这是为了解决 compositional generalization，也就是组合泛化问题。\n\n如果系统只记住“这一次火扣血”，它下次遇到“岩浆”“毒水”“尖刺”可能还要重新失败一次。\n\n如果它学到的是更通用规则：\n\n```prolog\ncauses_damage(X) :- is_harmful(X)\n```\n\n那么以后只要某个东西被识别为 harmful，就能直接推断会造成伤害。\n\n### 如果不做会怎样\n\n系统无法从一次失败中得到可复用知识，只能反复试错。论文里的 `w/o ILP` 消融实验表明，去掉这个学习器后，系统在难任务上接近 baseline，无法处理新组合。\n\n---\n\n## 第十步：把新规则加入 CPG 世界模型\n\n### 术语说明\n\nCPG 是 Causal Program Graph，论文里的世界模型。直白说就是：**一个由事实和规则组成的可更新规则库**。\n\n它里面有：\n\n- 节点：事实或概念，比如 `is_harmful(fire)`\n- 边：规则，比如 `causes_damage(X) :- is_harmful(X)`\n\n### 输入\n\n新学到的规则：\n\n```text\nΔW\n```\n\n当前世界模型：\n\n```text\nW_t\n```\n\n### 操作\n\n系统把新规则加入世界模型：\n\n```text\nW_{t+1} = W_t ∪ ΔW\n```\n\n### 输出\n\n更新后的世界模型：\n\n```text\nW_{t+1}\n```\n\n### 目的\n\n让以后所有计划检查都能使用这条新规则。\n\n这一步是把“这次失败经验”变成“以后行动前能用的知识”。\n\n### 如果不做会怎样\n\n规则虽然被学出来了，但不会影响后续决策，系统下次仍然可能犯同样错误。\n\n---\n\n## 第十一步：更新 NTP 的符号表示\n\n### 输入\n\n- 更新后的规则库 `W_{t+1}`\n- 新增的谓词或常量，比如：\n\n  ```prolog\n  is_harmful\n  causes_damage\n  fire\n  ```\n\n- NTP 当前的符号向量表示\n\n### 操作\n\n论文说系统会维护一个符号嵌入矩阵 `E`。直白说，就是给每个符号分配一个向量，让 NTP 能做软匹配和可微推理。\n\n如果 ILP 产生了新符号，系统就：\n\n1. 把新符号加入词表；\n2. 初始化它的向量；\n3. 用更新后的规则库继续训练或微调 NTP。\n\n### 输出\n\n更新后的 NTP 和符号向量矩阵。\n\n### 目的\n\n让 NTP 的检查能力和新规则保持一致。\n\n如果规则库更新了，但 NTP 仍然按旧知识工作，计划检查就会滞后。\n\n### 如果不做会怎样\n\n符号规则库和神经检查器会不一致，NTP 可能无法正确使用新学到的规则。\n\n---\n\n# 3. 用一个完整例子串起来\n\n假设任务是：\n\n```text\n拿到火旁边的金币\n```\n\n初始世界模型不知道火有害。\n\n---\n\n## 第一次尝试\n\n### 输入\n\n环境事实：\n\n```prolog\nat(agent, loc1)\nis(fire, loc1)\nis(coin, loc1)\n```\n\n目标：\n\n```text\nget coin\n```\n\n### LLM 提议\n\n```text\napproach(fire)\ngrab(coin)\n```\n\n### NTP 检查\n\n当前规则库不知道火有害，所以这个计划通过。\n\n### 执行结果\n\n环境反馈：\n\n```text\nHP -50\n```\n\n系统发现预测错误：\n\n```text\n预期：不扣血\n实际：扣血\n```\n\n---\n\n## 学习阶段\n\n系统在记忆里找类似经历。\n\n成功经历可能是：\n\n```prolog\nat(agent, loc2)\nis(coin, loc2)\n```\n\n同样接近并拿金币，但没有扣血。\n\n失败状态比成功状态多了：\n\n```prolog\nis(fire, loc1)\n```\n\n所以 MCS 认为火是失败原因。\n\nILP 把具体经验：\n\n```prolog\ncauses_damage(fire)\n```\n\n泛化成规则：\n\n```prolog\ncauses_damage(X) :- is_harmful(X).\nis_harmful(fire).\n```\n\n加入世界模型。\n\n---\n\n## 第二次遇到类似情况\n\nLLM 又提出：\n\n```text\napproach(fire)\ngrab(coin)\n```\n\nNTP 现在能推出：\n\n```prolog\ncauses_damage(fire)\n```\n\n于是系统拒绝这个计划，要求 LLM 生成其他方案。\n\n可能新方案是：\n\n```text\ngo around fire\ngrab coin from safe side\n```\n\n这样就避免了重复失败。\n\n---\n\n# 4. 结合消融实验解释为什么有效\n\n论文比较了四种系统：\n\n| 配置 | 含义 |\n|---|---|\n| MLLM-Agent Baseline | 普通 ReAct 风格 LLM 智能体，没有显式规则库 |\n| AGEL-Comp Full | 完整系统：CPG + ILP + NTP |\n| AGEL-Comp w/o NTP | 有规则学习，但没有计划检查器 |\n| AGEL-Comp w/o ILP | 有计划检查器，但不能从经验学新规则 |\n\n---\n\n## 4.1 哪个组件贡献最大？\n\n从整体成功率看，**ILP 学习器贡献最大**。\n\n完整系统在四个 LLM 上的 Quest Success 都是：\n\n```text\n100%\n```\n\n去掉 ILP 后：\n\n| LLM | Full | w/o ILP |\n|---|---:|---:|\n| GPT-4o | 100.00 | 86.67 |\n| Gemini-2.5-Pro | 100.00 | 83.33 |\n| DeepSeek-VL-7B | 100.00 | 70.00 |\n| LLaVA-1.6 | 100.00 | 66.67 |\n\n平均来看：\n\n```text\nFull: 100%\nw/o ILP: 约 76.67%\n下降约 23.33 个百分点\n```\n\nFirst-Try Success 下降更明显：\n\n```text\nFull 平均: 60.0%\nw/o ILP 平均: 约 8.3%\n```\n\n也就是说，去掉 ILP 后，系统几乎不能把失败经验转成可复用规则。\n\n这说明论文最核心的主张是成立的：**如果智能体不能从交互中更新世界模型，那么单靠 LLM 或单靠检查器都不够。**\n\n---\n\n## 4.2 NTP 的贡献有多大？\n\nNTP 的主要贡献不是让系统“最终一定能学会”，而是让系统：\n\n- 更少试错；\n- 更早避开错误计划；\n- First-Try Success 更高；\n- 更安全。\n\n去掉 NTP 后：\n\n| 指标 | Full | w/o NTP |\n|---|---:|---:|\n| 平均 Quest Success | 100% | 约 91.67% |\n| 平均 First-Try Success | 60.0% | 22.5% |\n\nFirst-Try Success 从 60.0% 降到 22.5%，下降 37.5 个百分点。\n\n这说明：有 ILP 但没有 NTP 时，系统虽然能从失败中学习，但经常要先犯错，再补规则。\n\n---\n\n## 4.3 哪个组件可有可无？\n\n从论文数据看，**没有明显可有可无的核心组件**。\n\n- 去掉 ILP：整体成功率和难任务表现明显下降；\n- 去掉 NTP：First-Try Success 和效率明显下降；\n- baseline：没有显式学习和检查，表现最差。\n\n不过可以说：如果只看某些简单任务，NTP 或 ILP 的作用可能不明显。因为简单任务中 LLM 自己就能完成。\n\n但论文真正关注的是：\n\n- 新组合任务；\n- hard / very hard quest；\n- 环境中有歧义或负面反馈；\n- 需要从经验修正规则的任务。\n\n在这些情况下，没有哪个核心组件是可以随便去掉的。\n\n---\n\n## 4.4 各组件之间是否有协同效应？\n\n有，而且这是论文最重要的实验结论。\n\n### 只有 NTP，没有 ILP\n\n`w/o ILP` 有检查器，但世界模型不更新。\n\n问题是：检查器只能根据已有规则判断。如果规则库不知道火有害，它就不会拒绝靠近火的计划。\n\n结果：\n\n```text\nw/o ILP 平均 Quest Success: 约 76.67%\nw/o ILP 平均 First-Try Success: 约 8.3%\n```\n\n这说明：**会检查但知识不更新，作用有限。**\n\n---\n\n### 只有 ILP，没有 NTP\n\n`w/o NTP` 能学习新规则，但执行前不严格检查 LLM 计划。\n\n问题是：它常常需要先执行错误计划，失败后再学。\n\n结果：\n\n```text\nw/o NTP 平均 Quest Success: 约 91.67%\nw/o NTP 平均 First-Try Success: 22.5%\n```\n\n这说明：**会学习但不检查，容易试错，效率和安全性差。**\n\n---\n\n### ILP + NTP 一起用\n\n完整 AGEL-Comp：\n\n```text\nQuest Success: 100%\nFirst-Try Success: 60.0%\n```\n\n这说明两个模块的作用不是简单相加，而是互相依赖：\n\n- ILP 负责把失败变成新规则；\n- CPG 保存这些规则；\n- NTP 用这些规则在行动前拦截错误计划；\n- LLM 继续负责生成候选方案。\n\n所以完整系统能做到：\n\n1. 出错后更新知识；\n2. 更新后的知识立刻影响后续计划；\n3. 后续类似任务可以少试错甚至零试错完成。\n\n---\n\n# 5. 回扣每个设计到底解决了什么痛点\n\n| 设计 | 解决的问题 | 实验是否支持 |\n|---|---|---|\n| 结构化感知 | 把环境变成规则系统能处理的事实 | 是基础模块，论文未单独消融 |\n| LLM 生成计划 | 处理开放目标，提出候选行动 | baseline 说明单靠它不够 |\n| NTP 检查计划 | 防止 LLM 直接执行看似合理但错误的计划 | `w/o NTP` First-Try Success 从 60.0% 降到 22.5% |\n| 经验记忆 | 为失败归因提供对照样本 | 论文未单独消融，但 MCS 依赖它 |\n| MCS 失败归因 | 判断失败可能由哪个环境因素造成 | 论文把它作为减少错误归因的关键设计 |\n| ILP / MIL 规则学习 | 把具体失败变成通用规则 | `w/o ILP` 平均成功率降到约 76.67%，First-Try 约 8.3% |\n| CPG 世界模型 | 保存可解释、可复用规则 | 完整系统在所有 LLM 上 100% 成功 |\n| NTP 持续微调 | 让检查器跟上新规则 | 论文提出了机制，但实验中没有单独消融 |\n\n---\n\n# 6. 实验结果用大白话总结\n\n完整 AGEL-Comp 明显优于普通 LLM agent。\n\n比如平均 First-Try Success：\n\n```text\nAGEL-Comp Full: 60.0%\nMLLM-Agent Baseline: 3.3%\n```\n\n也就是说，普通 LLM agent 几乎不能第一次就做对新组合任务，而 AGEL-Comp 有较大概率能在第一次就做对。\n\n在 Quest Success 上：\n\n```text\nAGEL-Comp Full: 100%\nBaseline: 约 63.33% 到 86.67%，取决于 LLM\n```\n\n更重要的是，论文说在 Hard 和 Very Hard 任务上，baseline 和 `w/o ILP` 会出现严重掉性能，甚至到 0%，而完整系统仍然保持 100%。\n\n这支持了论文的核心观点：\n\n**只靠 LLM 的隐含知识不稳定；把交互经验转成明确规则，并用规则检查计划，能显著提升组合泛化。**\n\n---\n\n# 7. 这套方法的硬伤在哪里？\n\n论文自己提到的主要问题有两个。\n\n---\n\n## 硬伤一：计算成本和扩展性问题\n\nAGEL-Comp 每次不是直接让 LLM 输出动作，而是要多做几件事：\n\n- NTP 检查候选计划；\n- ILP 搜索新规则；\n- 更新 CPG；\n- 有时还要微调 NTP。\n\n这些都比普通 LLM agent 更重。\n\n论文的回应是：虽然单次推理更重，但完整系统犯错少、重试少，所以总时间反而可能更低。\n\n例如 Gemini-2.5-Pro 上：\n\n```text\nAGEL-Comp 平均样本效率: 23.27\nBaseline: 159.30\n```\n\n大约提升 6.8 倍。\n\n但边界条件仍然存在：如果环境规模很大、规则很多、候选计划很多，NTP 和 ILP 的成本可能变高。\n\n---\n\n## 硬伤二：它依赖比较干净的符号化环境和可靠归因\n\nAGEL-Comp 要能工作，前提是系统能把环境变成明确事实，比如：\n\n```prolog\nis(fire, loc1)\nis(coin, loc1)\n```\n\n而且 MCS 最好能找到“只有一个差异”的对照经历。\n\n如果现实环境里：\n\n- 感知很噪声；\n- 物体识别不准；\n- 状态差异很多；\n- 多个因素共同导致失败；\n- 找不到合适的成功对照样本；\n\n那么 MCS 就可能返回 `null`，或者学出错误规则。\n\n论文里 MCS 明确要求：\n\n```text\nΔS 里只能有一个 literal\n```\n\n这让归因更可靠，但也限制了适用范围。复杂场景下，失败原因经常不止一个。\n\n---\n\n# 8. 最后用最短版本总结\n\nAGEL-Comp 的流程是：\n\n1. 看环境，把环境转成明确事实；\n2. LLM 提出计划；\n3. NTP 根据已有规则检查计划；\n4. 执行动作，拿到反馈；\n5. 如果反馈和预期不一致，就触发学习；\n6. MCS 从记忆里找对照经历，定位失败原因；\n7. ILP 把具体失败归纳成通用规则；\n8. 把规则加入 CPG；\n9. 以后 NTP 用新规则提前拒绝错误计划。\n\n它有效的关键原因是：\n\n- LLM 负责生成候选方案；\n- ILP 负责从失败中学习新规则；\n- NTP 负责用规则在行动前检查计划；\n- CPG 负责保存这些规则。\n\n消融实验表明：\n\n- 去掉 ILP，系统不能学新规则，难任务性能明显下降；\n- 去掉 NTP，系统能学但更依赖试错，First-Try Success 大幅下降；\n- 两者结合，才能同时做到“从经验学习”和“行动前避错”。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **强 LLM baseline 并没有带来可靠的 compositional generalization。** GPT-4o / Gemini-2.5-Pro 作为 MLLM-Agent baseline 的总体成功率看似不低（86.67%、83.33%），但 First-Try Success 只有 6.67% 和 3.33%，说明它们更多依赖 trial-and-error，而不是首次就组合出正确策略；论文依据见 Table 3 与 H1 分析。\n\n- **AGEL-Comp 几乎抹平了不同 LLM backbone 之间的能力差异。** Baseline 中 LLaVA-1.6 只有 63.33% Quest Success，DeepSeek-VL-7B 只有 66.67%，但接入 AGEL-Comp Full 后四个 backbone 都达到 100% Quest Success；论文在 Figure 3 讨论中指出 closed-source 模型 baseline 更强，但框架能显著提升 open-source 模型可用性。\n\n- **“有 NTP verifier 但不能学习”的系统几乎没用。** AGEL-Comp w/o ILP 虽然保留了 NTP verifier，但因为 world model 是静态的，表现几乎等同于 baseline，例如 GPT-4o 下 Quest Success 为 86.67%，First-Try Success 仅 10.00%；作者明确指出 verifier 在不完整或错误的 world model 上只能验证“逻辑有效但事实错误”的计划。\n\n- **“能学习但没有 verifier”的系统可以完成任务，却无法避免低效和风险。** AGEL-Comp w/o NTP 在 GPT-4o 下也达到 100% Quest Success，但 First-Try Success 只有 23.33%，远低于 Full 的 66.67%，说明它往往通过失败后学习来补救，而不是在执行前避免错误；依据见 Table 3 与 H2a 分析。\n\n- **计算更重的 neuro-symbolic 系统反而总体更快。** 虽然 NTP verification 和 ILP induction 单步开销更高，但 AGEL-Comp 大幅减少迭代次数和失败重试，例如 Gemini-2.5-Pro 下 Avg. Sample Efficiency 从 baseline 的 159.30 降到 23.27，约 6.8× 改善；论文在 Scalability Considerations 中也指出 baseline 因多次错误重试导致总体慢 5–10 倍。\n\n- **总体 Quest Success 会掩盖真正的泛化失败，First-Try Success 更敏感。** Baseline 在简单任务上还能完成不少 quest，但 First-Try Success 几乎为零；论文用 Figure 5 显示 baseline 和 w/o ILP 在 Hard / Very Hard 任务上跌到 0%，说明难度分层和首次成功率比总成功率更能暴露 compositional brittleness。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **ILP 与 NTP 不是简单叠加，而是互相依赖。** w/o ILP 证明“只会 deductive verification 不够”，w/o NTP 证明“只会 abductive learning 也不够”；论文总结说 AGEL-Comp 的关键在于 deduction–abduction 闭环，而非单独某个模块。\n\n- **NTP 的价值主要体现在执行前过滤，而不是事后纠错。** w/o NTP agent 能通过 ILP 从失败中学习，但无法在第一次遇到危险组合时阻止错误行动；依据是 w/o NTP First-Try Success 均值只有 22.5%，Full 为 60.0%。\n\n- **ILP 的价值主要体现在 hard / very hard 任务，而不是简单任务。** Figure 5 显示 baseline 和 w/o ILP 在 Level 4、Level 5 任务上发生 catastrophic drop 到 0%，而 Full 仍保持 100%；这说明 learning component 的收益在分布外组合场景中才充分显现。\n\n- **静态 world model 可能造成“形式正确、语义错误”的失败模式。** w/o ILP agent 的 NTP 会继续验证基于旧知识的计划，因此它不是缺少推理能力，而是缺少经验修正机制；论文 H2b 分析指出它会重复执行“logically valid but factually incorrect plan”。\n\n- **不同指标揭示不同失败机制。** Quest Success 衡量最终能否完成，First-Try Success 衡量 zero-shot compositional reasoning，Avg. Iterations / Time / Sample Efficiency 衡量 trial-and-error 成本；论文 Table 2 和 Table 3 的组合显示，仅看最终成功率会低估系统是否真正会泛化。\n\n---\n\n## 3. 对领域的新认知\n\n- **LLM agent 的 compositional failure 不只是“模型不够大”，而是缺少 grounded, explicit world model。** 论文中 closed-source baseline 虽优于 open-source baseline，但在 hard / very hard quests 仍失败，而 AGEL-Comp 在所有 backbone 上成功，支持作者关于 neural scaling alone 不足的判断。\n\n- **交互式环境中的 compositional generalization 应被理解为“可学习的环境语法”。** 作者反复将 agent 学到的规则称为 compositional “grammar” of the environment，实验表明成功来自把经验转化为可复用结构，而不是记住单个任务解法。\n\n- **“会反思”或 ReAct-style memory 不等于 grounded learning。** Baseline 是 ReAct-style agent，但没有 persistent explicit world model，因此在 ambiguous / stochastic events 中表现差；这深化了对 LLM agent memory 的认识：非结构化记忆不足以支持系统性组合泛化。\n\n- **Neuro-symbolic 系统的优势不只在 interpretability，也在 sample efficiency。** AGEL-Comp 的规则可解释固然重要，但实验更突出其从少量失败中快速修正行为的能力，例如 Gemini 的 sample efficiency 提升 6.8×；这把 neuro-symbolic 的价值从“可解释”扩展到“低样本交互学习”。\n\n- **First-try planning ability 是区分“真正组合推理”和“试错学习”的关键。** w/o NTP 和 Full 都能较高比例完成任务，但 First-Try Success 差距巨大，说明最终成功不能直接等价于 compositional reasoning；论文据此强调 NTP 让 agent 在行动前 deduce safe plan。\n\n---\n\n## 4. 实用的经验性结论\n\n- **评估 agent 泛化时应使用连续 curriculum，而不是离线训练后静态测试。** 论文设计了 10-quest curriculum，并要求单次连续 session、无 offline fine-tuning，以观察 agent 是否能在运行中学习并迁移；这是一种更接近真实部署的评测设置。\n\n- **应报告 First-Try Success，而不仅是任务完成率。** Table 3 显示多个系统最终成功率相近但首次成功率差异巨大，例如 GPT-4o 下 Full 与 w/o NTP Quest Success 都是 100%，但 First-Try Success 分别为 66.67% 和 23.33%。\n\n- **verification 成本可以通过限制查询范围来控制。** 作者在 Scalability Considerations 中指出，NTP 不是做 open-ended proving，而是验证 LLM 已提出的 specific sub-goals，因此可用 depth limits、caching、safety-only checks 等工程手段控制成本。\n\n- **ILP / MIL 的搜索空间应由错误触发和局部因果归因来约束。** 论文指出 induction 只在 prediction error 后触发，并以少量正负例进行 focused learning，这使得符号搜索在交互场景中可行；这是把 ILP 用于 agent 的重要工程经验。\n\n- **需要同时记录任务成功、迭代次数、时间、样本效率和规则增长。** 论文用 Table 2 的多指标体系以及 CPG Growth / rules retracted 分析，展示了 agent 是否真正学习、是否高效、以及是否产生无效知识。\n\n- **对 open-source LLM，外接结构化 reasoning / learning 层可能比单纯换更大模型更划算。** LLaVA-1.6 baseline 只有 63.33% Quest Success，但 AGEL-Comp Full 达 100%；作者讨论认为该框架能最大化 accessible open-source alternatives 的能力，降低 API dependency、token cost 和 latency 风险。\n\n---\n\n## 5. 局限性中的机会\n\n- **NTP verification 的 scalability 仍是核心瓶颈，值得研究更高效的 differentiable proving。** 作者承认 NTP computationally intensive，并提出 depth limits、caching、safety-only checks；未来机会是做增量证明、近似证明、或任务相关 proof pruning。\n\n- **Symbol grounding 在 noisy / partial perception 下仍未充分解决。** Outlook 明确提到 real-world deployment 需要 robust symbol grounding under noisy/partial perception；这暗示从 Unity structured percept 迁移到真实视觉/机器人环境仍有大量研究空间。\n\n- **CPG growth 和 inconsistency control 是长期运行 agent 的关键问题。** 作者提到需要 pruning、rule retraction，以及 Figure 6 中存在 non-zero rules retracted；未来可研究 continual symbolic knowledge management、冲突检测和规则遗忘机制。\n\n- **Distribution shift 下的 safe adaptation 仍开放。** 论文指出需要 detection and repair of invalidated rules，这意味着现有系统主要展示了学习新规则，但在规则失效、环境机制改变时如何安全更新仍是机会。\n\n- **当前实验主要在 Retro Quest 仿真环境中，sim-to-real transfer 未验证。** 作者在 Outlook 中将 sim-to-real embodied agents 作为方向，说明真实机器人、开放世界游戏或网页 agent 中的泛化仍需进一步检验。\n\n- **Minimal contrastive assumptions 可能限制复杂因果场景。** Grounding 阶段要求 state difference 是 singleton 才继续学习，这有利于降低混淆但难以处理多因素交互因果；未来可扩展到多变量 causal attribution 或 probabilistic ILP。",
                    "research_value": "下面的评价只基于你给出的材料；我不会假设论文中还有额外实验或作者背景信息。\n\n---\n\n## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- 论文针对的是 LLM-based interactive agents 的组合泛化失败，材料中给出强 LLM baseline 的明显失败证据：GPT-4o / Gemini-2.5-Pro baseline 的 Quest Success 分别可达 86.67%、83.33%，但 First-Try Success 只有 6.67%、3.33%。  \n- AGEL-Comp Full 在四个 backbone 上 Quest Success 都达到 100%，平均 First-Try Success 为 60.0%，而 MLLM-Agent Baseline 平均 First-Try Success 只有 3.3%。  \n- 在 Hard / Very Hard 任务上，baseline 和 w/o ILP 据称会跌到 0%，而 Full 仍保持 100%。  \n- 论文还提出评估 agent 泛化时应报告 First-Try Success、连续 curriculum、sample efficiency，这可能影响后续 agent 评测方式。\n\n**负面证据或缺失**：  \n- 实验主要在 Retro Quest 仿真环境中，且依赖较干净的符号化环境。没有看到真实机器人、网页 agent、开放世界游戏或高噪声视觉环境中的验证。  \n- 影响力是否能外溢到真实部署，取决于 symbol grounding、multi-cause attribution、CPG 规模控制等问题是否可解；材料中这些仍是局限。  \n- 没有看到与更强的已有 neuro-symbolic agent、PDDL/planner-LLM、reflection-memory agent 的系统性比较。\n\n**判断**：中等\n\n**理由**：  \n这个问题如果解决，确实会影响 LLM agent 的设计和评估方式，尤其是从“让 LLM 反思”转向“显式世界模型 + 规则验证 + 交互学习”。但现有证据主要来自 Retro Quest，且依赖结构化感知和单因素归因，因此还不足以支撑“广泛改变实践”的强影响力判断。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- 方法不是单独使用 LLM、ILP 或 NTP，而是形成了一个闭环：LLM 生成候选计划，NTP 执行前验证，执行失败后 MCS 做归因，ILP/MIL 归纳 Horn clauses，再更新 CPG。  \n- 消融显示 ILP 和 NTP 有互补性：w/o ILP 平均 Quest Success 约 76.67%、First-Try Success 约 8.3%；w/o NTP 平均 Quest Success 约 91.67%、First-Try Success 22.5%；Full 则为 100% Quest Success、60.0% First-Try Success。  \n- “把失败经验转成规则，并在以后行动前验证计划”这一机制比普通 ReAct-style memory 更结构化。\n\n**负面证据或缺失**：  \n- LLM + symbolic planner / theorem prover / ILP / world model 的组合并不是全新方向。材料没有充分说明 AGEL-Comp 相比已有 neuro-symbolic planning agents、LLM+PDDL、LLM+formal verifier、reflection-memory 方法的本质不可替代之处。  \n- CPG、ILP、NTP、MCS 分别看起来都是已有思想的组合。材料中缺少明确证据说明其中某个算法设计具有难以被快速复现的独特性。  \n- 如果同领域团队已经在做 LLM agent grounding 和 symbolic verification，类似系统可能在较短时间内被独立拼接出来。\n\n**判断**：中等\n\n**理由**：  \nAGEL-Comp 的闭环集成有清晰价值，消融也证明“学习 + 验证”共同作用明显。但它的组成部件大多来自已有范式，材料中没有显示出一个非常独特、别人难以想到的算法突破，因此不可替代性只能算中等。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- 当前 LLM 被广泛用作 interactive agents 的 cognitive core，而材料明确指出强 LLM 在组合泛化上仍不可靠，尤其 First-Try Success 很低。  \n- 论文正好回应了当下 agent 研究中的核心痛点：ReAct-style agent 可以试错完成任务，但无法稳定首次泛化。  \n- 实验结果显示 open-source backbone 接入 AGEL-Comp 后也能从 63.33% / 66.67% Quest Success 提升到 100%，说明该问题与降低对闭源强模型依赖有关。  \n- 论文强调 evaluation protocol：连续 curriculum、无 offline fine-tuning、报告 First-Try Success。这与当前 agent 评测从静态 QA 转向交互式持续学习的趋势一致。\n\n**负面证据或缺失**：  \n- 真实环境 symbol grounding 仍未成熟，因此从“干净仿真环境中的神经符号闭环”到真实世界可能还偏早。  \n- 如果子领域仍缺少统一 benchmark，Retro Quest 的说服力可能不足以形成社区共识。  \n- 材料没有说明这个任务设置是否已经被大量同行接受，还是作者自建环境。\n\n**判断**：强\n\n**理由**：  \n这个问题现在做很合适：LLM agents 正在被部署到交互任务中，而材料给出了强模型 baseline 首次成功率极低的具体证据。论文不只是追赶成熟问题，而是在 agent 可靠性、grounded learning、first-try generalization 这些上升期议题上提出了正好对应的评测和机制。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 论文明确质疑“只靠 LLM scaling 或 ReAct-style prompting/memory 就能获得组合泛化”的假设。  \n- 强 LLM baseline 的 First-Try Success 只有 6.67%、3.33%，说明高总体成功率可能来自 trial-and-error，而不是系统性组合推理。  \n- w/o ILP 的结果显示：即使有 NTP verifier，如果 world model 不更新，也会验证“形式正确但事实错误”的计划。  \n- w/o NTP 的结果显示：只会从失败中学习，但缺少执行前验证，会导致 First-Try Success 从 Full 的 60.0% 降到 22.5%。  \n- 论文强调 First-Try Success 比 Quest Success 更能揭示组合泛化失败，这直接挑战了只看最终任务完成率的评估习惯。\n\n**负面证据或缺失**：  \n- 方法仍在现有 neuro-symbolic 框架内工作，没有彻底改变“符号规则 + 神经模型”的基本范式。  \n- 对当前主流 agent 研究的挑战主要通过 Retro Quest 体现，缺少跨环境证据。  \n- 没有看到对更强的反思型 agent、工具增强 agent、规划型 agent 的广泛对照，因此它挑战的是 LLM-only / ReAct-style baseline，而不是整个 agent 范式。\n\n**判断**：强\n\n**理由**：  \n这篇论文最有力的地方是指出“最终成功率”会掩盖 agent 的组合泛化失败，并用 First-Try Success 数据支撑这一点。它对“让 LLM 多试、多反思、多记忆”这一常见做法提出了实质性质疑，主张必须有可更新、可验证的 grounded world model。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩成一句话：**失败经验应变成行动前规则约束。**  \n- 材料中的完整例子非常清楚：第一次靠近火扣血，MCS 归因火，ILP 学到 `causes_damage(X) :- is_harmful(X)`，之后 NTP 在执行前拒绝靠近火的计划。  \n- 消融结果与这个洞见一致：没有 ILP 就不能把失败变成规则；没有 NTP 就不能在行动前使用规则避错。\n\n**负面证据或缺失**：  \n- 洞见清楚，但它更像系统架构层面的洞见，而不是一个新的理论发现。  \n- “从经验归纳规则并用于规划验证”本身并非全新思想，清晰不等于独创。  \n- 材料没有显示该洞见在复杂、多因素、噪声环境中仍能保持同样简洁有效。\n\n**判断**：强\n\n**理由**：  \n这篇论文的核心洞见非常容易复述，而且方法、例子、消融都围绕它展开。相比很多 agent 论文只说“增强记忆”或“增强推理”，AGEL-Comp 的主张更明确：经验必须转化为显式规则，并在行动前约束计划。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术路径可行性较强：论文在 Retro Quest 中展示 Full 系统四个 backbone 均达到 100% Quest Success。  \n- 消融显示结果不是单一模块偶然带来的：ILP 缺失会导致平均 Quest Success 降到约 76.67%、First-Try Success 降到约 8.3%；NTP 缺失会导致 First-Try Success 降到 22.5%。  \n- 系统有明确触发条件：prediction error 后才做 MCS 和 ILP，避免每步都做无约束符号搜索。  \n- 作者也提出控制 NTP/ILP 成本的手段，如 depth limits、caching、safety-only checks。\n\n**负面证据或缺失**：  \n- 最大风险在 symbol grounding：系统需要把环境可靠转成 ground literals，如 `is(fire, loc1)`。现实视觉和机器人环境中这一步很难。  \n- MCS 要求失败状态和成功状态的差异最好是 singleton literal，这对复杂因果场景限制很大。  \n- NTP verification 和 ILP induction 的可扩展性仍是瓶颈；规则库增长、冲突、规则撤回在长期运行中会变难。  \n- 实验环境可能偏适合这种方法：结构化、规则明确、反馈直接，因此 100% 成功不一定说明真实风险已被解决。\n\n**判断**：中等\n\n**理由**：  \n这个问题有真实技术风险，不是简单工程堆叠；symbol grounding、多因素归因、规则库规模控制都可能失败。另一方面，当前实验环境相对干净，且系统已经在其中达到 100% Quest Success，因此可行性被证明了一部分，但风险还没有在更复杂环境中被充分检验。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n无具体证据。材料没有提供作者团队背景、既有系统、环境开发经验、ILP/NTP 专长、机器人或仿真平台积累等信息。\n\n**负面证据或缺失**：  \n- 不知道作者是否长期做 neuro-symbolic reasoning、interactive agents、ILP、NTP 或 embodied simulation。  \n- 不知道 Retro Quest 是否是团队自建平台，是否有独特数据、环境或基础设施优势。  \n- 不知道团队是否具备把该方法扩展到 noisy perception 或 sim-to-real 的能力。\n\n**判断**：弱\n\n**理由**：  \n材料中完全没有团队能力或资源优势的具体证据。AGEL-Comp 处在 LLM agent、神经符号推理、交互学习的交叉点上，理论上需要强工程和符号推理积累，但输入材料没有证明该团队在这个交叉点上具有独特优势。\n\n---\n\n# 综合评价\n\n**综合评价：有潜力但有明显短板。**\n\n这篇论文提出的问题是有价值的：LLM agent 的组合泛化失败不是抽象担忧，材料中有强模型 baseline First-Try Success 极低的具体证据。它的核心洞见也清楚：把失败经验转成显式规则，并在后续行动前验证计划。最有说服力的是 ILP 与 NTP 的互补消融，说明它不是简单加模块，而是形成了“学习—验证”的闭环。  \n但它的外部有效性仍有明显短板：实验主要在 Retro Quest，依赖干净符号化感知和近似单因素归因；如果进入真实视觉、复杂因果、多噪声环境，当前证据还不足以说明方法能稳健工作。\n\n---\n\n# 最致命的弱点\n\n**最致命的弱点是对干净符号化和简单因果归因的依赖。**  \nAGEL-Comp 的优势建立在环境能被转成明确 ground literals、MCS 能找到几乎唯一差异因素、ILP 能据此归纳规则的前提上。现实交互环境中，感知噪声、多因素共同导致失败、规则冲突和分布转移都很常见，这可能直接破坏它最核心的学习闭环。\n\n---\n\n# 如果要做得更好\n\n1. **扩展到更噪声、更开放的环境。**  \n   至少应加入 partial observation、错误物体识别、多因素因果                     "summary_translation": "基于 Large Language Model (LLM) (大语言模型) 的 agents (智能体) 在 compositional generalization (组合泛化) 方面表现出系统性失效，限制了其在交互环境中的 robustness (鲁棒性)。本工作提出了 AGEL-Comp，一种 neuro-symbolic (神经符号) AI 智能体架构，旨在通过 grounding (锚定) 智能体的动作来应对这一挑战。\n\nAGEL-Comp 整合了三项核心创新：(1) 作为 world model (世界模型) 的动态 Causal Program Graph (CPG) (因果程序图)，将过程性与因果性知识表示为 directed hypergraph (有向超图)；(2) Inductive Logic Programming (ILP) (归纳逻辑编程) 引擎，从经验反馈中合成新的 Horn clauses (霍恩子句)，通过交互 grounding (锚定) symbolic knowledge (符号知识)；(3) hybrid reasoning core (混合推理核心)，其中 LLM 提出一组 candidate sub-goals (候选子目标)，并由 Neural Theorem Prover (NTP) (神经定理证明器) 验证其 logical consistency (逻辑一致性)。\n\n这些组件共同 operationalize (具体实现) 了一个 deduction-abduction learning cycle (演绎-溯因学习循环)：使智能体能够 deduce (演绎推导) 计划并 abductively expand (溯因扩展) 其符号 world model (世界模型)，同时 neural adaptation phase (神经适应阶段) 保持其 reasoning engine (推理引擎) 与新知识 aligned (对齐)。\n\n我们在 \\texttt{Retro Quest} simulation environment (仿真环境) 中提出了一套 evaluation protocol (评估方案)，以探查 compositional generalization scenarios (组合泛化场景) 来评估我们的 AGEL 智能体。研究结果明确表明，我们的 AGEL 模型性能优于纯基于 LLM 的模型。我们的框架为构建智能体提供了一条 principled path (原则性路径)，使其能够对自身所在的世界建立 explicit (显式)、interpretable (可解释) 且 compositionally structured (组合结构化) 的理解。"

                    "summary": "We introduce DreamProver, an agentic framework that leverages a \"wake-sleep\" program induction paradigm to discover reusable lemmas for formal theorem proving. Existing approaches either rely on fixed lemma libraries, which limit adaptability, or synthesize highly specific intermediate lemmas tailored to individual theorems, thereby lacking generality. DreamProver addresses this gap through an iterative two-stage process. In the wake stage, DreamProver attempts to prove theorems from a training set using the current lemma library while proposing new candidate lemmas. In the \"sleep\" stage, it abstracts, refines, and consolidates these candidates to compress and optimize the library. Through this alternating cycle, DreamProver progressively evolves a compact set of high-level, transferable lemmas that can be effectively used to prove unseen theorems in related domains. Experimental results demonstrate that DreamProver substantially improves proof success rates across a diverse set of mathematical benchmarks, while also producing more concise proofs and reducing computational cost.",

                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是构建一个**自我演化的LLM智能体框架**。DreamProver是一个agentic框架，其核心贡献不在于将LLM作为工具解决形式化定理证明问题，而在于提出了一个通用的\"wake-sleep\"程序归纳范式，通过迭代的两阶段过程（wake阶段尝试证明+提出候选引理，sleep阶段抽象精炼+优化引理库）来**实现智能体的自我演化**。这符合\"构建、改进或演化LLM智能体\"的核心目标。\n\n**第二步：正面指标**\n\n论文明确包含以下核心关注点：\n- **核心范式**: `Agentic AI`（明确称为\"agentic framework\"）、`Self-Evolving`（通过wake-sleep循环迭代演化引理库）\n- **智能体能力**: 包含规划（尝试证明定理）、自我反思（抽象、精炼候选引理）、自我修正（优化压缩引理库）\n- **演化机制**: `Self-Improvement`（通过迭代循环逐步改进）、`Iterative Improvement`（alternating cycle）、`Generational Evolution`（从具体引理演化出高层次可迁移引理）\n\n**第三步：排除标准检查**\n\n- 安全相关: 不涉及\n- 多模态与视觉: 不涉及\n- 图相关技术: 不涉及\n- 多智能体拓扑与编排: 这是单智能体系统，不涉及\n\n**第四步：特殊处理**\n\n虽然应用领域是形式化定理证明，但论文的核心贡献不是\"用LLM解决定理证明问题\"，而是**提出一种通用的自我演化机制**（wake-sleep范式），这种机制可以应用于其他领域。论文明确指出其目标是\"discover reusable lemmas\"和\"evolving transferable lemma libraries\"，强调的是可迁移性和通用性，而非特定领域的解决方案。\n\n**结论**\n\n该论文完全符合研究者的筛选标准：它是一个关于**构建和演化LLM智能体**的方法论研究，核心贡献在于提出了自我演化的智能体框架，属于\"自我演化(Self-Evolving)\"方向的典型论文。",
                    "intro_logic": "1. Automated theorem proving 正在快速发展，主要受益于两个趋势：LLMs 提供更强的 reasoning 与 proof generation 能力，Lean/mathlib 等 formal proof assistants 和 formal libraries 提供了丰富的数学知识基础。\n\n2. 这些进展已经显著扩展了自动定理证明的能力范围，使 state-of-the-art systems 能够解决越来越复杂的数学问题，甚至在部分 high-school、undergraduate competition 和 research-level tasks 上取得接近或超过人类专家的表现。\n\n3. 但是，现有 theorem proving approaches 大多仍然把每个 theorem 当作独立任务来处理，缺乏显式机制从过去的证明经验中学习并服务于未来问题。\n\n4. 虽然现有 proofs 经常使用 formal libraries 中的 lemmas，或者把复杂证明分解为 intermediate lemmas，但这些 lemmas 通常要么来自固定库、适应性有限，要么是针对单个 theorem 构造的、过于 problem-specific，难以跨问题复用。\n\n5. 这种做法与人类数学实践形成对比：人类通常会从一系列相关问题中总结、抽象并积累 transferable lemmas，之后在同一或相近 mathematical domains 中反复使用这些高层知识。\n\n6. 因此，当前自动定理证明系统的核心瓶颈之一是缺乏一种能够持续积累、抽象、压缩并复用 domain-specific lemma knowledge 的能力，这限制了其在相关未见问题上的效率、泛化性和可扩展性。\n\n7. 研究问题：Can an automated theorem-proving agent learn and maintain a compact library of reusable, transferable lemmas from prior proof attempts, and use it to improve proving performance on unseen theorems in related domains?",
                    "core_insight": "下面的回答把“灵光一闪”理解为：不是“LLM theorem proving 需要更多 lemmas”这个显而易见的问题，而是作者找到的**生成、抽象、压缩、验证 reusable lemma library 的机制性切入点**。\n\n---\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n**作者的核心洞察是：formal theorem proving 中真正可迁移的知识不是单个问题里临时生成的 intermediate lemmas，而是可以像 DreamCoder 学习程序库一样，通过 wake-sleep 循环从大量证明经验中“抽象—压缩—验证”出来的 compact transferable lemma library。**\n\n换句话说，作者意识到：  \n**lemma learning 的关键不在于“多生成一些 lemma”，而在于把 solved / decomposed proofs 中的 intermediate theorems 当作 experience，再通过 sleep 阶段抽象成更高层、更通用、更小的 domain-specific library。**\n\n---\n\n### 论文原文证据\n\n论文在 Introduction 中明确指出，现有方法的问题不是完全没有 lemmas，而是 lemmas 的使用方式不具备“迁移性”：\n\n> “most existing approaches treat each theorem largely in isolation, without explicitly leveraging past experience to improve future proving”\n\n以及：\n\n> “while proofs often draw on lemmas from existing libraries in the training data or are decomposed into multiple intermediate lemmas, these lemmas are typically constructed in a detailed, problem-specific manner and rarely generalize across theorems”\n\n这两句话说明作者看到的 gap 是：  \n**已有方法虽然会生成 intermediate lemmas，但这些 lemmas 太 instance-specific，不能积累成 transferable mathematical knowledge。**\n\n随后作者把这个 gap 和人类数学实践对比：\n\n> “These limitations stand in stark contrast to human mathematical practice, where people systematically accumulate and abstract a core set of transferable lemmas from prior problems, enabling more efficient problem solving within related mathematical domains.”\n\n这就是 seed insight 的思想来源：  \n**人类不是每道题从零开始，而是从过去的问题中抽象出 reusable lemmas。**\n\n最后，作者把这个洞察直接转化为 DreamProver 的目标：\n\n> “DreamProver continually abstracts, consolidates, and prunes lemmas into a persistent library of reusable knowledge, enabling improved performance on future theorem proving tasks.”\n\n以及 Abstract 中的概括：\n\n> “DreamProver addresses this gap through an iterative two-stage process. In the wake stage, DreamProver attempts to prove theorems from a training set using the current lemma library while proposing new candidate lemmas. In the sleep stage, it abstracts, refines, and consolidates these candidates to compress and optimize the library.”\n\n---\n\n### 展开解释\n\n这篇论文的“灵光一闪”不只是说“我们要学习 lemma library”。类似想法之前已经存在，例如 LEGO-Prover、Seed-Prover 等。真正的突破在于作者意识到：\n\n1. **intermediate theorem 本身不是最终知识**  \n   在 recursive theorem decomposition 中产生的 subgoals 往往只是某个证明路径中的低层步骤，直接存起来会导致 library 膨胀、冗余、不可检索。\n\n2. **真正有价值的是经过 abstraction 后的 lemma**  \n   多个 intermediate theorems 之间可能共享同一种数学结构，例如 AM-GM、Cauchy-Schwarz、Titu’s lemma、power of point、convexity descent identity 等。  \n   这些结构才是 reusable skills。\n\n3. **lemma library 必须 compact**  \n   如果把所有 generated lemmas 都塞进 library，会产生噪声、重复、context overload，甚至降低性能。  \n   所以 library learning 不仅是“加 lemma”，还必须有 forgetting、deduplication、verification。\n\n4. **wake-sleep 是合适的机制**  \n   Wake 阶段负责探索问题、收集经验；Sleep 阶段负责抽象、压缩、验证经验。  \n   这正好对应 theorem proving 中的“做题”和“总结题型/套路”。\n\n因此，DreamProver 的关键不是单点证明能力，而是一个持续演化的 knowledge system。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n作者的推理链条大致如下：\n\n---\n\n### Step 1：现有 theorem provers 把问题当作 isolated tasks\n\n论文指出：\n\n> “most existing approaches treat each theorem largely in isolation”\n\n这意味着每次证明一个 theorem 时，系统都要重新生成 proof sketch、重新分解 subgoals、重新搜索 lemmas。  \n即使它在之前题目中已经“见过”类似结构，也没有系统性机制保存并复用。\n\n---\n\n### Step 2：formal proofs 中天然存在可学习的 intermediate theorems\n\n在 proof decomposition 中，LLM 会产生很多中间 subgoals。作者把这些 subgoals 重新定义为可以学习的经验：\n\n> “The resulting experiences are formulated as intermediate theorems, which are derived during the proving process from the training problems.”\n\n这一步非常关键：  \n作者没有只把 wake stage 看成“证明训练题”，而是把证明过程看成一个 data generation process。  \n训练题不是最终目的，而是产生 candidate lemmas 的矿脉。\n\n---\n\n### Step 3：但 intermediate theorems 不能直接作为 library\n\n如果直接存储所有 intermediate theorems，会遇到两个问题：\n\n- 太 specific，不 transferable；\n- 太多、太杂，难 retrieval，甚至干扰 LLM。\n\n论文在 ablation 中说明：\n\n> “Without semantic clustering, the system fails to capture relationships among decomposed theorems and instead treats them independently, resulting in an oversized lemma library from which useful lemmas are difficult to retrieve.”\n\n这说明作者的中间推理是：\n\n> intermediate theorem collection → raw library too noisy → need abstraction and compression.\n\n---\n\n### Step 4：因此引入 sleep stage：semantic clustering + lemma abstraction\n\n作者选择先用 natural language annotation 捕捉 theorem 的数学语义：\n\n> “we first annotate each theorem with a natural language description. The description provides high-level explanations of the theorem, including its sub-domain and difficulty”\n\n然后用 embedding clustering 把相似 theorem 聚到一起：\n\n> “we compute embeddings of the descriptions and perform clustering in the semantic embedding space.”\n\n接着让 LLM 对每个 cluster 提出更一般的 reusable lemmas：\n\n> “DreamProver then performs abstraction over each cluster, where the grouped theorems and their corresponding descriptions are provided as input context to an LLM to generate candidate lemmas that can be used to prove the theorems in the cluster.”\n\n这里的逻辑是：\n\n> 如果多个 subgoals 在语义上相似，那么它们背后可能共享一个更高层的 lemma；  \n> 让 LLM 在 cluster 上做 abstraction，比让它对单个 theorem 生成 lemma 更容易得到 transferable theorem。\n\n---\n\n### Step 5：但 LLM proposed lemmas 不一定可靠，所以需要 structural validation 和 formal verification\n\n作者没有直接相信 LLM 生成的 lemmas，而是引入 formal structural similarity：\n\n> “To further validate that the candidate lemmas proposed from this coarse abstraction are applicable, we measure the structural similarity between each candidate lemma and the theorems in the cluster”\n\n然后再正式验证：\n\n> “Finally, each remaining candidate lemma is formally verified by attempting to prove it using the same direct prompting strategy employed in the wake stage.”\n\n所以方法链条是：\n\n1. Wake stage 证明训练题；\n2. 失败时进行 theorem decomposition；\n3. 抽取 intermediate theorems；\n4. 收集 learnable theorems；\n5. Sleep stage 对 them 进行 semantic clustering；\n6. LLM 在 cluster 层面提出 generalized lemmas；\n7. structural similarity 过滤；\n8. duplicate removal；\n9. formal verification；\n10. library pruning；\n11. 下一轮 wake stage 用更新后的 library 继续证明更多题。\n\n---\n\n### Step 6：library 反过来改变 future proving 的 difficulty landscape\n\n随着 library 变强，原本无法直接证明的定理变得 learnable：\n\n> “As the process iterates, the library gradually grows: in each wake stage, the system is equipped with the current lemma library and attempts to solve problems using the lemmas it contains.”\n\n这形成一个 bootstrapping loop：\n\n> stronger library → more theorems solvable → more useful intermediate theorems collected → better abstractions → stronger library.\n\n这就是 wake-sleep paradigm 在 theorem proving 中的具体落地。\n\n---\n\n## 3. 试错历程：困难、调整与新子问题\n\n论文不是以“开发日志”的形式叙述试错过程，但从 Method、Ablation 和 Limitations 可以清楚看出作者在实现 seed insight 时遇到了几类实际困难，并相应调整了方案。\n\n---\n\n### 困难一：从 proof sketch 中抽取 standalone theorem 并不简单\n\n作者明确说：\n\n> “Notably, extracting intermediate goals as standalone theorems is non-trivial.”\n\n原因是 Lean 中的一个 `have` subgoal 往往依赖当前 proof context，包括变量、hypotheses、前面已经证明的 intermediate facts。  \n如果直接把它拿出来作为 theorem，很可能：\n\n- 缺少上下文；\n- 变量作用域错误；\n- theorem statement 不完整；\n- 即使 subgoal 可证明，也无法重新组装成 main proof。\n\n因此作者增加了 proof assembly 检查：\n\n> “To ensure their validity, the system attempts to reassemble the full proof by combining the proof sketch with the extracted intermediate theorems and verifying whether the target theorem can be proved.”\n\n还额外用 LLM 检查 natural language proof sketch：\n\n> “the system leverages an LLM to check the proof sketch in natural language, enabling efficient filtering of potentially incorrect decompositions.”\n\n这说明最初“从 sketch 中拿出 sorry subgoals 当 lemmas”的想法，必须补上一个新子问题：\n\n> 如何保证 extracted intermediate theorems 真的是 valid、usable、context-complete 的？\n\n对应解决方案就是 theorem decomposition + proof assembly validation。\n\n---\n\n### 困难二：早期 library 太弱，直接证明或浅层 decomposition 都不够\n\n论文指出：\n\n> “during the early iterations when the lemma library is still limited and lacks sufficient abstraction, it is often difficult to prove theorems directly or even with a single level of decomposition.”\n\n这意味着 wake-sleep 系统存在 cold start 问题。  \n一开始 library 是空的，LLM 很难直接证明复杂 theorem，也很难提出高质量 abstract lemmas。\n\n作者的调整是：\n\n- training 阶段允许更深 decomposition；\n- 多轮 wake-sleep 循环；\n- inference 阶段才限制为轻量 single decomposition。\n\nAppendix A 中写道：\n\n> “On each domain, we train DreamProver for 5 wake-sleep cycles, with maximum decomposition depth = 3”\n\n而 inference 中：\n\n> “During inference, we set the maximum decomposition depth = 1 to allow only sketch-and-prove.”\n\n也就是说，作者把训练阶段设计成更强的 exploration，把测试阶段设计成更轻量的 exploitation。\n\n---\n\n### 困难三：直接存储 raw lemmas 会导致 library 膨胀和性能下降\n\n这是论文中非常重要的试错结果。Ablation 表明，如果没有 cluster-based evolving，性能甚至低于 no-library baseline：\n\n> “Without semantic clustering, the system fails to capture relationships among decomposed theorems and instead treats them independently, resulting in an oversized lemma library from which useful lemmas are difficult to retrieve.”\n\n更关键的是：\n\n> “The excessive library size further reduces performance from 76 to 53 solved problems, even below the vanilla inference pipeline without a library.”\n\n这说明作者可能一开始尝试过更简单的方案：  \n直接把 decomposed theorems 放进 library，或者类似 LEGO-Prover 那样 retrieval from growing library。  \n但结果显示，这样的 library 太 low-level、太 redundant，LLM 反而难以使用。\n\n因此作者引入了：\n\n- semantic clustering；\n- abstraction over clusters；\n- tree edit distance deduplication；\n- LRU-style forgetting；\n- library capacity control。\n\n论文说：\n\n> “DreamProver adopts a least-recently-used strategy that tracks the usage frequency of each lemma across past wake stages, and removes those that are least frequently used once the library reaches its maximum capacity.”\n\n并说明这样做的目的：\n\n> “this forgetting mechanism maintains a concise lemma library of fewer than 100 lemmas, enabling stable and efficient reuse.”\n\n这里出现的新子问题是：\n\n> lemma learning 不是越多越好，而是要解决 library optimization。\n\n---\n\n### 困难四：single-pass lemma evolution 只能学到低层 theorem，不能形成 reusable abstraction\n\nAblation 中作者比较了去掉 iterative wake-sleep refinement 的版本：\n\n> “Without iterative refinement, lemma evolution is performed in a single pass, causing the library to capture only low-level decomposed theorems.”\n\n结果是：\n\n> “This leads to degenerate lemmas during the sleep stage and fails to optimize lemma reusability during the wake stage, allowing non-reusable lemmas to persist.”\n\n这说明 wake-sleep 的 iterative nature 不是装饰，而是必要机制。  \n单轮收集到的 subgoals 往往只是局部 proof fragments；只有多轮中反复使用、抽象、筛选，才能让 library 向高层 lemma 演化。\n\n所以作者从“生成 lemma library”进一步调整为：\n\n> evolve lemma library through repeated wake-sleep cycles.\n\n---\n\n### 困难五：LLM 生成的 abstract lemmas 可能不适用或不可证明\n\nSleep stage 中 LLM 根据 cluster 提出 candidate lemmas，但这些 lemmas 可能：\n\n- 语法不正确；\n- 逻辑过强；\n- 与 cluster 关系不大；\n- 在 Lean 中无法证明；\n- 与已有 lemma 重复。\n\n因此作者加了两层过滤。\n\n第一层是 structural similarity：\n\n> “we measure the structural similarity between each candidate lemma and the theorems in the cluster, and retain a lemma if its maximum similarity exceeds a predefined threshold.”\n\n第二层是 formal verification：\n\n> “each remaining candidate lemma is formally verified by attempting to prove it”\n\n这表明作者把 lemma abstraction 拆成两个子任务：\n\n1. LLM creativity：提出 plausible generalized lemmas；\n2. formal system discipline：验证它们是否 syntactically and logically acceptable。\n\n这是一个典型的 neuro-symbolic compromise。\n\n---\n\n### 困难六：library reuse 需要可度量，否则容易变成“看起来有 library，实际上没用”\n\n论文特别提到之前 LEGO-Prover 的问题：\n\n> “Previous work shows that lemma reuse is extremely rare in prior library-learning approaches such as LEGO-Prover.”\n\n因此 DreamProver 不仅报告 accuracy，还统计 lemma usage：\n\n> “On average, 58% of the lemmas generated from the training sets are reused on the test sets, contributing to proofs for 71% of all successfully proved theorems.”\n\n这说明作者意识到一个 evaluation 子问题：\n\n> 不能只看 solved rate，还要证明 learned library 真的被 reused。\n\n所以他们增加了 lemma usage、used lemmas、covered theorems 等指标。\n\n---\n\n### 困难七：context window 和 premise selection 仍是未来问题\n\n虽然当前 learned library 小于 100 lemmas，可以直接放进 context，但作者承认这不是最终形态：\n\n> “adapting to smaller models with limited context may be challenging - especially when the problem domain is unknown and multiple libraries may need to be included”\n\n因此未来需要 premise selection：\n\n> “A practical direction is to develop stronger premise selection models that retrieve relevant lemmas before passing them to the LLM.”\n\n这说明 DreamProver 当前的 compact library 设计暂时规避了大规模 retrieval 问题，但如果未来扩展到更多 domain，仍然需要新的 retrieval mechanism。\n\n---\n\n## 总结\n\n这篇论文的核心“灵光一闪”可以概括为：\n\n> **把 theorem proving 中的 intermediate subgoals 看作经验，把 reusable lemmas 看作从经验中压缩出来的技能；因此，证明系统不应只 solve problems，而应像 DreamCoder 一样通过 wake-sleep 循环持续学习、抽象、验证并优化自己的 lemma library。**\n\n这个洞察直接导向了 DreamProver 的整体架构：\n\n- Wake：solve / decompose training theorems，收集 learnable intermediate theorems；\n- Sleep：semantic clustering，LLM abstraction，structural filtering，formal verification；\n- Library update：deduplication，forgetting，compact storage；\n- Inference：用 evolved lemma library 更低成本地证明 unseen theorems。\n\n而实现过程中暴露出的关键困难包括：\n\n1. extracted subgoals 难以 standalone；\n2. cold start 阶段 library 太弱；\n3. raw lemma accumulation 会导致 library 膨胀；\n4. single-pass evolution 只能得到 low-level lemmas；\n5. LLM proposed lemmas 需要 formal validation；\n6. 必须证明 library 真的被 reused；\n7. 多 domain / 小模型场景下仍需要 premise selection。\n\n因此，DreamProver 的真正贡献不是“让 LLM 多生成几个 lemma”，而是提出了一套让 lemma library **持续演化、保持紧凑、可验证、可迁移**的机制。",
                    "methodology": "## 一句话概括核心创新\n\nDreamProver 最本质的区别是：它不是每道题临时生成一次性中间结论，而是反复从训练题里提炼、验证、保留一小批以后还能复用的 Lean 引理库。\n\n这里的 **Lean** 是形式化证明系统；**引理 lemma** 就是可以在证明中反复调用的小定理。\n\n---\n\n# 这篇论文到底在做什么？\n\n最直白地说，DreamProver 做的是：\n\n1. 拿一批训练题；\n2. 让大模型尝试证明它们；\n3. 如果证明过程中产生了一些中间结论，就把这些中间结论收集起来；\n4. 再把很多相似的中间结论整理成更通用的引理；\n5. 把能证明、常用、不重复的引理放进一个小型引理库；\n6. 之后证明新题时，把这个引理库提供给大模型用。\n\n它想解决的问题是：  \n过去很多自动定理证明系统每道题都单独做，证明完就结束；即使生成了中间引理，这些引理也通常只对当前题有用，不能积累成之后可复用的知识。\n\nDreamProver 的核心目标就是：**把证明经验沉淀成一个可复用的、紧凑的引理库。**\n\n---\n\n# 方法按执行顺序拆解\n\n## 第一步：准备训练题和当前引理库\n\n### 输入\n\n- 某个数学领域的一批训练题，比如不等式、数论、组合、几何、机器学习理论。\n- 当前的引理库。\n  - 一开始引理库是空的。\n  - 后面每轮会逐渐加入新引理。\n\n### 操作\n\n系统进入多轮循环。每轮分成两个阶段：\n\n1. **Wake 阶段**：尝试证明训练题，并收集可学习的中间定理。\n2. **Sleep 阶段**：整理这些中间定理，生成更通用的引理，并更新引理库。\n\n论文叫它 wake-sleep，但这里不用理解成复杂算法；在本文里，它就是一个反复执行的训练流程：\n\n- 先做题、收集材料；\n- 再整理材料、更新引理库。\n\n### 输出\n\n- 一个初始为空、之后逐轮更新的引理库。\n\n### 目的\n\n让系统不是一次性证明题目，而是能在训练过程中积累可复用的证明工具。\n\n### 如果不做会怎样\n\n如果没有这个持续更新的引理库，系统就会退回到“每道题单独证明”的模式，无法把前面题目的经验用于后面题目。\n\n---\n\n## 第二步：Wake 阶段，先尝试直接证明训练题\n\n### 输入\n\n- 一道训练题。\n- 当前已有的引理库。\n- 一个大语言模型。\n- 固定的尝试次数和纠错次数。\n\n### 操作\n\n系统把题目和当前引理库一起给大模型，让它直接生成 Lean 证明。\n\n如果生成的证明能被 Lean 检查通过，那么这道题被认为是当前系统“已经能学会”的题。\n\n论文里叫 **learnable theorem**，直白说就是：  \n**当前引理库加上大模型已经能直接证明的题。**\n\n### 输出\n\n- 成功证明的训练题。\n- 这些题会被收集起来，作为后面提炼新引理的材料。\n\n### 目的\n\n找出当前知识水平下已经能解决的题。  \n这些题往往包含一些可以进一步抽象成通用引理的结构。\n\n### 如果不做会怎样\n\n如果不先直接证明，系统就不知道哪些定理已经可以被当前引理库支持，也就少了一批可以拿来总结的新材料。\n\n---\n\n## 第三步：Wake 阶段，对直接证明失败的题做拆解\n\n### 输入\n\n- 直接证明失败的训练题。\n- 当前引理库。\n- 大模型。\n\n### 操作\n\n系统让大模型生成一个证明草稿。\n\n这个证明草稿里面会包含若干 `have` 子目标，也就是证明过程中的中间结论。  \n这些子目标暂时用 `sorry` 占位，表示“这里还没证明”。\n\n然后系统把这些 `sorry` 对应的中间目标提取出来，变成独立的小定理。\n\n例如原题证明中有：\n\n```lean\nhave h1 : 某个中间结论 := by sorry\n```\n\n系统就把它提取成：\n\n```lean\ntheorem h1 : 某个中间结论 := by sorry\n```\n\n接着系统会检查：  \n如果这些中间定理都成立，那么能不能重新组装出原题的完整证明。\n\n### 输出\n\n- 一批从失败题目中提取出来的中间定理。\n- 一个经过检查的证明分解结构。\n\n### 目的\n\n有些训练题太难，不能直接证明。  \n拆解的目的就是把难题分成更小的中间结论，让系统能从这些中间结论中学习。\n\n这对应 Introduction 里的痛点：  \n过去系统经常为单道题生成临时中间引理，但这些中间引理没有被整理成可复用知识。DreamProver 先把这些中间结论收集起来，后面再抽象。\n\n### 如果不做会怎样\n\n如果不拆解难题，系统只能从直接证明成功的题里学习，训练信号会少很多，早期尤其学不到有用引理。\n\n---\n\n## 第四步：检查证明草稿和中间定理是否合理\n\n### 输入\n\n- 大模型生成的证明草稿。\n- 从草稿中提取出的中间定理。\n- Lean 检查器。\n- 大模型的自然语言检查结果。\n\n### 操作\n\n系统做两类检查：\n\n1. **形式检查**：  \n   把提取出的中间定理重新塞回证明草稿，看 Lean 是否能接受整体结构。\n\n2. **自然语言检查**：  \n   让大模型判断这个证明思路在数学上是否合理，过滤明显错误的拆解。\n\n### 输出\n\n- 通过检查的中间定理。\n- 被丢弃的错误或不可靠拆解。\n\n### 目的\n\n大模型可能会生成看起来合理但实际不成立的中间目标。  \n如果这些错误目标被放进后续引理学习流程，会污染引理库。\n\n### 如果不做会怎样\n\n系统会把错误的、无用的、或者和原题无关的中间结论拿去抽象，最后生成低质量引理，影响后续证明。\n\n---\n\n## 第五步：Sleep 阶段，给收集到的定理生成文字描述\n\n### 输入\n\n- Wake 阶段收集到的中间定理和可证明训练题。\n\n### 操作\n\n系统让大模型为每个定理写一个简短描述，包括：\n\n- 它属于哪个数学子领域；\n- 它大概是什么类型的结论；\n- 它可能和哪些常见定理有关；\n- 它难不难。\n\n这些描述不是最终证明的一部分，只是后续分组用。\n\n### 输出\n\n- 每个定理对应的一段自然语言描述。\n\n### 目的\n\nLean 形式表达式有时很长，不容易直接判断两个定理是否“意思接近”。  \n先让大模型写描述，是为了后面更容易把相似定理放到一起。\n\n### 如果不做会怎样\n\n后面聚类时只能直接看形式表达式，可能把语义相近但写法不同的定理分开，也可能把写法像但用途不同的定理放一起。\n\n---\n\n## 第六步：Sleep 阶段，把相似定理分组\n\n### 输入\n\n- 每个定理的自然语言描述。\n\n### 操作\n\n系统把这些文字描述转成向量。\n\n这里的 **embedding** 就是把一段文字变成一串数字，方便计算相似度。\n\n然后系统用 **K-Means** 聚类。  \nK-Means 在这里就是一种把相似向量分成若干组的方法。\n\n分组数量用 elbow method 选择。  \n这里不用关心细节，直白说就是系统自动估计应该分成多少组比较合适。\n\n### 输出\n\n- 多个定理簇。\n- 每一组里包含语义相近的一批定理。\n\n### 目的\n\n单个中间定理通常太具体。  \n把相似的定理放在一起，系统才有机会发现它们背后的共同结构，并生成更通用的引理。\n\n### 如果不做会怎样\n\n系统会把每个中间定理单独处理，容易生成大量低层、重复、具体的引理；引理库会变大、变乱，反而影响证明。\n\n这个问题在消融实验里很明显：去掉聚类抽象后，性能甚至低于不用引理库。\n\n---\n\n## 第七步：Sleep 阶段，从每组定理中生成更通用的候选引理\n\n### 输入\n\n- 一个定理簇。\n- 这个簇内的多个形式化定理。\n- 它们的自然语言描述。\n- 当前数学领域信息，比如“不等式”或“数论”。\n\n### 操作\n\n系统把这一组定理交给大模型，让它提出一些更通用、更可复用的 Lean 定理 statement。\n\n注意：  \n这里大模型只生成定理陈述，不直接生成完整证明。\n\n例如很多不等式题里反复出现三变量 AM-GM 结构，那么系统可能生成：\n\n```lean\ntheorem am_gm_inequality_three_vars ...\n```\n\n### 输出\n\n- 一批候选引理。\n\n### 目的\n\nWake 阶段收集到的中间定理往往还是和具体题目绑定。  \n这一步的目的就是把它们变成更一般的引理，使它们能服务于未来没见过的题。\n\n### 如果不做会怎样\n\n引理库会主要由具体题目的碎片组成，可复用性差；证明新题时很难真正用上。\n\n---\n\n## 第八步：检查候选引理和原定理是否结构上相关\n\n### 输入\n\n- 候选引理。\n- 该候选引理对应簇里的原始定理。\n\n### 操作\n\n系统把候选引理和原始定理转换成简化的一阶逻辑表达式树。\n\n这里的 **表达式树** 就是把公式拆成树状结构，例如运算符、变量、量词、条件之间的关系。\n\n然后系统计算结构相似度。  \n如果候选引理和簇内某些定理的结构差异太大，就丢掉。\n\n### 输出\n\n- 保留下来的候选引理。\n- 被过滤掉的候选引理。\n\n### 目的\n\n大模型可能提出看起来高级但和当前定理没关系的引理。  \n结构相似度检查是为了确认这些候选引理确实可能用于证明这组题。\n\n### 如果不做会怎样\n\n系统可能把无关的、过泛的、或者不能帮助当前领域证明的引理加入候选池，浪费验证成本并污染引理库。\n\n---\n\n## 第九步：更新引理库，先删除不常用的旧引理\n\n### 输入\n\n- 当前引理库。\n- 每个引理在过去 Wake 阶段中的使用次数。\n- 引理库最大容量。\n\n### 操作\n\n系统记录哪些引理经常被用，哪些很少被用。  \n当引理库太大时，删除使用频率低的引理。\n\n论文说它采用类似 **least-recently-used / usage frequency** 的策略，直白说就是：  \n**很少被用的引理会被优先删掉。**\n\n### 输出\n\n- 一个更小、更干净的引理库。\n\n### 目的\n\n引理库不能无限变大。  \n如果把太多引理全部塞给大模型，输入会变长，大模型更难找到真正有用的引理，推理成本也会上升。\n\n### 如果不做会怎样\n\n引理库会不断膨胀，里面混入很多不用的引理，导致证明时检索困难、上下文过长、性能下降。\n\n---\n\n## 第十步：去掉重复候选引理\n\n### 输入\n\n- 新生成的候选引理。\n- 当前引理库中已有的引理。\n\n### 操作\n\n系统计算候选引理和已有引理之间的结构差异。\n\n论文使用 **tree edit distance**，直白说就是：  \n看一个公式树要经过多少修改才能变成另一个公式树。\n\n如果两个引理结构太像，就认为是重复，只保留一个。\n\n### 输出\n\n- 去重后的候选引理。\n\n### 目的\n\n防止引理库里堆积大量表达不同但本质相同的引理。\n\n### 如果不做会怎样\n\n引理库会重复膨胀，浪费上下文空间，也会降低大模型选择正确引理的效率。\n\n---\n\n## 第十一步：正式证明候选引理\n\n### 输入\n\n- 去重后的候选引理。\n- 当前引理库。\n- 大模型。\n- Lean 检查器。\n\n### 操作\n\n系统要求大模型给候选引理生成 Lean 证明。  \nLean 能验证通过的才真正加入引理库。\n\n### 输出\n\n- 经过 Lean 验证的新引理。\n- 没证明出来的候选引理被丢弃。\n\n### 目的\n\n形式化证明里不能只相信大模型说“这个定理应该对”。  \n必须让 Lean 检查通过，才可以作为后续证明工具使用。\n\n### 如果不做会怎样\n\n错误引理会进入引理库，之后任何依赖它的证明都不可信。\n\n---\n\n## 第十二步：重复 Wake-Sleep 多轮\n\n### 输入\n\n- 更新后的引理库。\n- 同一领域的训练题。\n\n### 操作\n\n系统重复前面的流程：\n\n1. 用当前引理库证明训练题；\n2. 收集中间定理；\n3. 聚类；\n4. 抽象；\n5. 验证；\n6. 更新引理库。\n\n论文实验中每个领域训练 5 轮。\n\n### 输出\n\n- 一个领域专用的小型引理库。\n\n例如论文展示的不等式引理库里有：\n\n- 三变量 AM-GM；\n- 三变量 AM-HM；\n- Cauchy-Schwarz；\n- Titu lemma；\n- Schur inequality；\n- Nesbitt inequality。\n\n数论引理库里有：\n\n- Euclid lemma；\n- Dirichlet arithmetic progression；\n- Fermat little theorem；\n- Euler criterion 等。\n\n### 目的\n\n第一轮得到的引理可能比较低层、具体。  \n多轮更新可以让系统逐渐用已有引理证明更多题，再从更多题里提炼更高级的引理。\n\n### 如果不做会怎样\n\n只做一轮会得到很多低层中间定理，抽象不足，复用性明显下降。\n\n消融实验中，去掉这种迭代式库优化后，不等式总解题数从 104 降到 76。\n\n---\n\n## 第十三步：测试时用学到的引理库证明新题\n\n### 输入\n\n- 未见过的测试题。\n- 学到的引理库。\n- 大模型。\n\n### 操作\n\n测试时系统比较轻量：\n\n1. 先直接把测试题和引理库给大模型，让它尝试完整证明；\n2. 如果失败，再生成证明草稿；\n3. 把草稿里的子目标逐个证明；\n4. 子目标证明时也可以调用引理库。\n\n### 输出\n\n- 通过 Lean 检查的新题证明。\n- 统计成功率、输出 token、证明长度等指标。\n\n### 目的\n\n训练时已经花成本学到了引理库。  \n测试时就不需要很深的递归拆解，可以用较少计算完成更多证明。\n\n### 如果不做会怎样\n\n如果测试时不用学到的引理库，系统就无法利用训练阶段积累的知识，表现会接近普通大模型或普通递归证明系统。\n\n---\n\n# 为什么这套方法有效？结合消融实验看\n\n论文最关键的消融实验在不等式 benchmark 上。\n\n完整 DreamProver 的结果是：\n\n| 方法 | 567NEQ | ChenNEQ | MO-INT | 总数 |\n|---|---:|---:|---:|---:|\n| DreamProver | 55 | 33 | 16 | 104 |\n| 去掉 library optimization | 31 | 30 | 15 | 76 |\n| 去掉 cluster evolving | 21 | 23 | 9 | 53 |\n| No library | 23 | 24 | 8 | 55 |\n| + retrieval，类似 LEGO-Prover | 27 | 25 | 9 | 61 |\n\n---\n\n## 1. 哪个组件贡献最大？\n\n贡献最大的是 **cluster-based lemma evolution**，也就是前面说的：\n\n- 给定理写描述；\n- 按语义分组；\n- 从每组里生成更通用的引理。\n\n去掉它以后，总解题数从 104 掉到 53，下降 51 道。\n\n更关键的是，53 甚至低于不用引理库的 55。  \n这说明如果没有聚类抽象，系统学到的引理不但帮助有限，甚至可能干扰证明。\n\n原因很直接：  \n没有聚类抽象时，引理库里会出现大量具体、低层、重复的中间结论。大模型面对这些内容时更难找到真正有用的东西。\n\n---\n\n## 2. 哪个组件可有可无？\n\n论文没有展示一个“去掉后几乎不变”的 DreamProver 内部组件。\n\n相反，两个核心设计去掉后都明显下降：\n\n- 去掉 library optimization：104 → 76；\n- 去掉 cluster evolving：104 → 53。\n\n如果硬要说一个“效果有限”的东西，那是类似 LEGO-Prover 的简单 retrieval 方案：\n\n- No library：55；\n- + retrieval：61。\n\n只增加 6 道题。\n\n这说明：  \n单纯把一堆低层引理存起来，再靠检索拿一些出来，并不能解决核心问题。真正重要的是把中间结论整理成紧凑、通用、可验证的引理库。\n\n---\n\n## 3. 各组件之间是否有协同效应？\n\n有，而且很明显。\n\n看数据：\n\n- 不用引理库：55；\n- 类似 LEGO-Prover 的检索式引理库：61；\n- 去掉迭代优化：76；\n- 完整 DreamProver：104。\n\n这说明：\n\n单独有“引理库”不够。  \n单独存很多中间结论也不够。  \n只有同时做到：\n\n1. 从多道题中抽象通用引理；\n2. 删除不用和重复的引理；\n3. 多轮更新引理库；\n\n才能明显提升性能。\n\n完整系统比 no library 多解 49 道题，接近翻倍。  \n完整系统也比简单 retrieval 多解 43 道题。\n\n---\n\n## 4. 回扣动机：论文声称的痛点到底被哪个设计解决？\n\n论文开头说的主要痛点是：\n\n> 现有方法要么依赖固定库，要么为单道题生成临时中间引理，但这些引理不够通用，不能跨题复用。\n\nDreamProver 里对应的解决设计是：\n\n### 痛点一：中间引理太具体，不能复用\n\n对应设计：\n\n- 聚类；\n- 每组生成更通用的引理；\n- 结构相似度过滤。\n\n实验支持：\n\n- 去掉 cluster evolving 后，104 → 53。\n- 说明“抽象成通用引理”是核心。\n\n### 痛点二：引理库会变大、变乱\n\n对应设计：\n\n- 删除低使用率引理；\n- 去重；\n- 验证后再加入；\n- 控制库规模小于约 100 个引理。\n\n实验支持：\n\n- 去掉 library optimization 后，104 → 76。\n- 说明维护一个紧凑库确实有用。\n\n### 痛点三：每道题独立证明，不能利用过去经验\n\n对应设计：\n\n- Wake-Sleep 多轮循环；\n- 训练阶段积累引理；\n- 测试阶段调用引理库。\n\n实验支持：\n\n论文统计了测试集上的引理复用情况：\n\n| 领域 | 总引理数 | 被用到的引理数 | 成功证明题数 | 使用引理覆盖的题数 |\n|---|---:|---:|---:|---:|\n| Inequality | 41 | 35 | 104 | 71 |\n| Number Theory | 75 | 29 | 37 | 29 |\n| Combinatorics | 39 | 19 | 26 | 18 |\n\n论文总结说，平均 58% 的训练得到的引理在测试集被复用，71% 的成功证明题用到了这些引理。\n\n这说明它不是只把引理学出来放着不用，而是真的在测试证明中调用了。\n\n---\n\n# 主实验结果说明了什么？\n\n## 在常见数学领域\n\nDreamProver 在不等式、数论、组合上都优于对比方法。\n\n论文声称相对 Hilbert：\n\n- 不等式提升 20%；\n- 数论提升 114%；\n- 组合提升 50%；\n- 平均提升 61%。\n\n这里的 Hilbert 是一个递归拆解证明系统，主要靠把题目分解成子目标来证明，但没有像 DreamProver 这样持续学习一个紧凑引理库。\n\n这说明：  \n单纯递归拆题不如“递归拆题 + 把经验整理成可复用引理”。\n\n---\n\n## 在计算成本上\n\nDreamProver 也减少输出 token。\n\n和 Hilbert 相比，平均输出 token 减少 48%。  \n和 Goedel-Prover-V2 相比，平均减少 62%。\n\n原因很直接：  \n有了合适引理后，证明时不用从头展开很多细节。\n\n---\n\n## 在证明长度上\n\nDreamProver 的证明比 Hilbert 平均短 50%。  \n比 Goedel-Prover-V2 平均短 32%。\n\n这说明学到的引理不仅提高成功率，也能让证明更简洁。\n\n不过它和纯 proprietary LLM 相比不一定总是更短，因为 DreamProver 解出了更多难题，而难题本身证明会更长。\n\n---\n\n## 在较少覆盖的领域\n\n论文还测了：\n\n- 平面几何；\n- 机器学习理论形式化证明。\n\n这些领域不是 mathlib 和大模型训练中覆盖最充分的常规领域。\n\n结果是 DreamProver 仍然明显提升：\n\n- 平面几何相对 proprietary LLM 提升 64%；\n- 机器学习理论提升 161%。\n\n这说明它不完全依赖大模型已有知识。  \n只要有领域训练题，它可以学到该领域的专用引理库。\n\n---\n\n# 这套方法的硬伤在哪里？\n\n## 局限一：引理库目前能直接塞进大模型上下文，但规模变大后会出问题\n\n论文现在每个领域的引理库比较小，通常少于 100 个，所以可以直接放进 prompt。\n\n但如果：\n\n- 用的是上下文窗口较小的小模型；\n- 问题领域不明确，需要同时放多个领域的引理库；\n- 引理库继续变大；\n\n那么输入会变长，大模型可能更难用好这些引理，成本也会上升。\n\n论文认为未来需要更强的 **premise selection**，也就是证明前先自动选出最相关的引理，而不是把整个库都塞进去。\n\n---\n\n## 局限二：它需要领域训练题\n\nDreamProver 的引理库是领域相关的。\n\n不等式有不等式引理库，数论有数论引理库，几何有几何引理库。  \n如果某个新领域没有足够训练题，它一开始就很难学到高质量引理。\n\n论文提到可以做在线学习：  \n一边测试一边积累引理，后面的题再用前面学到的东西。  \n但这属于未来工作，不是本文已经充分解决的问题。\n\n---\n\n# 最后总结\n\nDreamProver 的核心不是提出一个新的单题证明技巧，而是提出一个训练流程：\n\n1. 用大模型和 Lean 证明训练题；\n2. 从证明过程里提取中间定理；\n3. 把相似中间定理分组；\n4. 生成更通用的候选引理；\n5. 去重、过滤、验证；\n6. 维护一个小而常用的引理库；\n7. 在测试题上复用这个库。\n\n实验最支持的一点是：  \n**真正带来提升的不是“存很多引理”，而是“把中间结论抽象、验证、压缩成可复用的小型引理库”。**",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **更强的 recursive decomposition 不一定更好；带 lemma library 的浅层推理反而更高效。** DreamProver 推理时只允许 `maximum decomposition depth = 1`，而 Hilbert baseline 允许 depth = 2，但 DreamProver 在三类 well-represented domains 上平均比 Hilbert 多解 61%，同时 token 更少；依据：Sec. 4.1、Appendix A、Fig. 2。\n\n- **“大而全的 lemma 库 + retrieval”并没有显著提升，甚至可能低于不用库。** Table 3 中，去掉 cluster evolving 后只解出 53 个 inequality 问题，低于 no-library baseline 的 55 个；类似 LEGO-Prover 的 retrieval 版本也只从 55 提升到 61，远低于 DreamProver 的 104。\n\n- **直接给 LLM 更多 context 并不能解决 underrepresented domains。** 在 plane geometry 和 machine learning theory 中，proprietary LLMs 已被提供额外 axioms/theorems context，但在 HS Competition / Olympiad geometry 上仍只解出极少题；DreamProver 则可解到 70%–90% 的 HS Competition 子集。依据：Sec. 4.4、Table 4。\n\n- **开源 prover models 在非 mathlib 主流领域上几乎不可比。** 作者没有把 DeepSeek-Prover / Goedel-Prover 作为 underrepresented domains 的主要 baseline，因为这些模型没有覆盖相关 domain，即使提供 context 也达不到可比性能；依据：Sec. 4.4 Baselines。\n\n- **更短 proof 不总是意味着模型更好，proof length 会被 solved set 难度混淆。** DreamProver 相比 proprietary LLMs 平均 proof length 更长，但作者解释这是因为它解出了更多更难的题；相比 Goedel-Prover-V2 和 Hilbert，则分别减少 32% 和 50% proof length。依据：Sec. 4.2、Fig. 3、Table 8。\n\n- **训练 library 的成本没有想象中高。** 虽然 DreamProver 训练 5 个 wake-sleep cycles，但每个训练样本的 token usage 约等于或低于 inference token usage；例如 inequality 训练 0.29k tokens/sample，inference 0.51k，Hilbert 0.73k。依据：Appendix B、Table 7。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **真正有效的不是“有 lemma”，而是“compact + abstract + reusable 的 lemma”。** Table 3 显示：完整 DreamProver 解 104 题；去掉 library optimization 降到 76；去掉 cluster evolving 降到 53；说明低层、冗余、不可复用 lemma 不仅没帮助，还会干扰 proof search。\n\n- **semantic clustering 是 library learning 的关键瓶颈之一。** 作者指出不做 semantic clustering 时，系统无法捕捉 decomposed theorems 之间的关系，会生成 oversized low-level library，使 useful lemmas 难以 retrieval，性能甚至低于 no-library。依据：Sec. 4.3、Table 3。\n\n- **iterative refinement 的作用不是单纯增加 lemma 数量，而是提升 lemma 层级。** 去掉 library optimization 后，lemma evolution 只做 single pass，主要捕获 low-level decomposed theorems，导致 sleep stage 产生 degenerate lemmas，性能从 104 降到 76。依据：Sec. 4.3。\n\n- **lemma reuse 在这个系统中是可观测且显著的，而非“名义上的 library learning”。** Table 2 显示，平均 58% 的 learned lemmas 在 test set 被复用，并覆盖 71% 的成功证明；这与 Berlot-Attwell et al. 对 LEGO-Prover “reuse extremely rare” 的观察形成对比。依据：Sec. 4.3、Table 2。\n\n- **不同 domain 的 lemma reuse 形态差异很大。** Inequality library 中 35/41 个 lemma 被使用，覆盖 71/104 个成功证明；number theory 中 29/75 个 lemma 被用，覆盖 29/37 个成功证明，说明 number theory 需要更大但更稀疏的 lemma set。依据：Table 2。\n\n- **agentic search 的收益可以被 reusable lemmas 部分替代。** Hilbert 依赖 recursive proof decomposition，而 DreamProver 通过 learned lemmas 在 inference 阶段只做 shallow sketch-and-prove，就取得更高成功率与更低 token cost。依据：Sec. 3.3、Sec. 4.1、Sec. 4.2。\n\n---\n\n## 3. 对领域的新认知\n\n- **formal theorem proving 中的“经验积累”不能简单等价为保存所有中间结论。** 实验证明，未经 abstraction / pruning 的中间 lemma library 可能比 no-library 更差；有效经验必须被压缩成高层、可迁移 lemma。依据：Sec. 4.3、Table 3。\n\n- **LLM theorem proving 的瓶颈不只是搜索深度，也包括缺少 domain-local reusable abstractions。** DreamProver 在 well-represented 和 underrepresented domains 都提升明显，说明即使 backbone LLM 很强，局部 domain lemma library 仍能提供独立增益。依据：Table 1、Table 4。\n\n- **formal verification 改变了 LLM 生成 lemma 的风险结构。** LLM 可以大胆 propose general theorem，但只有能被 Lean 验证的 lemma 才进入 library；因此系统可利用 LLM 的 abstraction 能力，同时通过 proof assistant 抑制 hallucination。依据：Sec. 3.2 Library update。\n\n- **underrepresented domains 并非只能靠大模型 pretraining 解决。** 在 LeanGeo 和 FormalML 这类非 mathlib 主流领域中，DreamProver 通过少量 domain training set 学到 library 后显著提升，说明 domain-specific lemma acquisition 是补足预训练知识缺口的有效路径。依据：Sec. 4.4、Table 4。\n\n- **premise selection / retrieval 不是万能前提，library 本身的质量更重要。** 类 LEGO-Prover 的 retrieval baseline 只带来小幅提升，而 compact abstract library 明显更强，提示领域应从“如何检索更多 lemma”转向“如何生成更可复用的 lemma”。依据：Table 3。\n\n---\n\n## 4. 实用的经验性结论\n\n- **保持 lemma library 小而精非常重要。** 作者经验上将 library 控制在少于 100 个 lemma，可直接放入 LLM context，避免重要 lemma 被长 context 稀释；依据：Sec. 3.2 Library update。\n\n- **LRU-style forgetting 是一个简单有效的 library maintenance 策略。** DreamProver 跟踪 lemma 在 wake stages 中的使用频率，当 library 达到容量上限时删除 least frequently used lemmas，以维持 conciseness 和 reusability。依据：Sec. 3.2。\n\n- **训练可以比推理更深，推理应保持轻量。** 作者训练时使用 maximum decomposition depth = 3，推理时只用 depth = 1；这让系统在训练期发现中间 theorem，在部署期依赖 library 降低成本。依据：Appendix A。\n\n- **一个可复用的默认 budget 配置：direct proof attempts = 4，error correction = 6。** DreamProver 训练和推理中 direct proof generation attempts 均设为 4，error correction for sketch/direct proof 均为 6；推理时 sketch generation attempts = 4。依据：Appendix A。\n\n- **proof sketch 中的 subgoal 设计需要强约束，否则很容易产生不可用 decomposition。** Prompt 明确要求：不要 nested `have`，每个 subgoal 一行，有名称，不创建比原题更复杂的 subgoal，不在 main goal 使用 `sorry`；依据：Appendix F.2。\n\n- **LLM-generated lemma 先做 natural language annotation 再 embedding clustering，是一个实用的聚类技巧。** 作者不是直接 embed Lean theorem，而是让 LLM 生成包含 sub-domain、difficulty、相关 theorem 的短描述，再用 sentence transformer + cosine similarity + K-Means 聚类。依据：Sec. 3.2 Lemma abstraction。\n\n- **formal structural similarity 可作为过滤 LLM abstraction 的实用 guardrail。** DreamProver 将 candidate lemma 和 cluster 内 theorem 转成 simplified first-order logic expression trees，只有最大 structural similarity 超过阈值才保留。依据：Sec. 3.2。\n\n- **duplicate removal 用 tree edit distance，比纯文本相似度更适合 theorem statements。** 系统用 expression tree 的 edit distance 判断 candidate lemma 是否与已有 lemma 重复，从而减少 redundancy、保持 library diversity。依据：Sec. 3.2 Library update。\n\n- **评估 proof efficiency 时应统计 invisible thinking tokens。** 作者 token usage 包含 invisible thinking tokens 和 visible outputs，这比只统计最终 Lean code 更能反映 reasoning model 的真实成本。依据：Sec. 4.2、Appendix B。\n\n---\n\n## 5. 局限性中的机会\n\n- **小模型或多 domain 场景需要更强 premise selection。** 作者承认当前每个 domain 的 library 小到可直接塞进 proprietary LLM context，但如果使用 context 较短的小模型，或未知 domain 下需要加载多个 library，就需要先 retrieval relevant lemmas。依据：Sec. 5。\n\n- **online library learning 是一个自然扩展方向。** 在没有足够 domain-specific training data，尤其是 research-level mathematics 中，DreamProver 可在 evaluation 过程中 incremental accumulate useful lemmas，用后续题目反哺 library。依据：Sec. 5。\n\n- **跨 domain / unknown domain 的 library routing 仍未解决。** 论文目前按 domain 训练专用 library；作者提到未知 problem domain 时可能需要包含多个 libraries，这暗示需要 domain identification、library selection 或 hierarchical premise selection。依据：Sec. 5。\n\n- **learned library 目前依赖 proprietary LLM context capacity，迁移到开源小模型有空间。** 当前强结果大量使用 GPT/Gemini 作为 backbone；如何把 compact lemma library 与 smaller prover models 结合，是一个实用且开放的问题。依据：Sec. 5 与 Table 1/4 baseline 设置。\n\n- **训练集不足时的 bootstrapping 机制值得研究。** 作者只在每个 domain 采样约 100 个 training problems 学 library；未来若 domain 更窄或数据更少，需要研究 few-shot / self-generated theorem discovery 下的 library evolution。依据：Sec. 4.1 Datasets、Sec. 5。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：  \n- DreamProver 针对的是当前 LLM theorem proving 中明确存在的工作模式问题：多数系统把每个 theorem 当独立任务，缺少从过去证明中积累可复用知识的机制。  \n- 实验显示它不只是提出概念，而是在多个指标上改变了结果：相对 Hilbert，在不等式、数论、组合上平均多解 61%；输出 token 相比 Hilbert 平均减少 48%，证明长度减少 50%。  \n- 学到的 lemma 确实被使用：平均 58% 的 learned lemmas 在测试集复用，71% 的成功证明用到了这些 lemmas。  \n- 在 underrepresented domains 上也有提升：平面几何相对 proprietary LLM 提升 64%，机器学习理论提升 161%。\n\n**负面证据或缺失**：  \n- 目前影响主要限于“同一或相近领域内有训练题”的场景；论文也承认需要 domain-specific training data。  \n- 引理库规模目前小于约 100 个，可以直接塞进上下文；更大规模、多领域、未知领域下是否仍有效没有充分证明。  \n- 强结果较依赖 proprietary LLM 和 Lean 环境，实际能否改变开源 prover 生态还不确定。\n\n**判断**：强\n\n**理由**：  \n这个问题如果被解决，会直接改变 theorem proving agent 的设计方式：从“单题递归搜索”转向“训练阶段积累可复用 lemma library，测试阶段浅层调用”。输入材料给出了具体性能、成本和复用率证据，而不是只停留在理念层面。主要限制是影响范围目前仍是 domain-specific，尚未证明能自然扩展到大规模、多领域库。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：  \n- DreamProver 不只是把中间 lemma 存起来，而是包含 wake-sleep 多轮循环、semantic clustering、LLM abstraction、结构相似度过滤、tree edit distance 去重、Lean 验证和 usage-based pruning。  \n- 消融显示简单替代方案效果有限：No library 解 55 题，类似 LEGO-Prover 的 retrieval 只到 61，而完整 DreamProver 达到 104。  \n- 去掉 cluster evolving 后降到 53，甚至低于 no-library，说明“存储中间结论 + 检索”不是等价替代。\n\n**负面证据或缺失**：  \n- 组成模块本身大多不是全新：recursive decomposition、retrieval、K-Means clustering、embedding、tree edit distance、Lean verification 都是已有技术。  \n- 人类数学中“从多题抽象通用引理”的思想并不新；这篇工作的独特性主要在工程化组合和实验证明。  \n- 没有看到与更多专门做 lemma invention / library learning 方法的系统性比较。\n\n**判断**：中等\n\n**理由**：  \n这篇工作的不可替代性来自“把多个已知组件组合成一个可迭代的 lemma library evolution pipeline”，并且消融证明这个组合不是简单 retrieval 能替代的。但它的核心思想并非完全出人意料，很多研究者在 LLM+Lean 发展到一定阶段后可能也会走向类似方向。因此它不是容易几个月内完全复现的微小增量，但也不属于概念上高度不可替代的突破。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：  \n- 输入材料明确指出 automated theorem proving 正在受益于两个趋势：LLMs 的 reasoning/proof generation 能力增强，以及 Lean/mathlib 等 formal libraries 的成熟。  \n- 当前系统已经能解决更复杂问题，但瓶颈转向“如何从过去证明经验中积累可复用知识”，这正是 DreamProver 的切入点。  \n- 小型 domain lemma library 可以直接放入当前大上下文 proprietary LLM，这使得该方案在今天具备可行性。  \n- underrepresented domains 的实验表明，当预训练知识不足时，domain-specific lemma acquisition 正好补足当前 LLM 的短板。\n\n**负面证据或缺失**：  \n- 如果未来 premise selection、retrieval-augmented proving 或端到端 prover 模型迅速成熟，直接 prompt 整个小库的设计可能很快过时。  \n- 对小模型、短上下文模型、多领域混合问题的适配尚未充分解决。\n\n**判断**：强\n\n**理由**：  \n这个问题现在做很合适：LLM 已经强到能生成证明和候选 lemma，Lean 又能提供严格验证，二者结合让“自动积累可验证引理库”变得现实。更早做可能缺少可靠生成模型，更晚做则可能被大规模 premise selection 或专门 prover 模型吸收。输入材料中的成本、复用率和 underrepresented domain 结果都说明这个时间点不是空想阶段。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：  \n- 它明确质疑“每道题独立证明”的默认范式，主张从一批相关题中抽象、压缩、维护可复用 lemma library。  \n- 它也质疑“更深 recursive decomposition 就更好”的做法：DreamProver 推理时 decomposition depth = 1，而 Hilbert baseline depth = 2，但 DreamProver 平均多解 61%，token 更少。  \n- 它进一步挑战“存更多 lemma + retrieval 就够了”的思路：类似 LEGO-Prover 的 retrieval 只从 55 提升到 61，而完整方法达到 104；去掉 cluster evolving 甚至跌到 53。\n\n**负面证据或缺失**：  \n- 它没有完全跳出现有 LLM-agent + formal verifier 框架，仍然依赖 LLM 生成、Lean 检查、prompting 和搜索。  \n- 对“固定 formal library + premise selection”范式的比较还不够全面，尤其是在大规模已有库检索条件下。\n\n**判断**：强\n\n**理由**：  \n这篇论文不是单纯在现有 theorem proving agent 上加一个小技巧，而是明确指出“单题证明、临时中间引理、低层 lemma retrieval”这几种常见做法的局限，并用消融给出反证。尤其是去掉 cluster evolving 后低于 no-library 的结果，很有说服力地表明“更多中间 lemma”可能反而有害。它仍在 LLM+Lean 范式内，但对该范式内部的默认实践有实质挑战。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：  \n- 核心洞见可以压缩为一句话：**“证明经验要抽象成可复用引理。”**  \n- 方法各部分都围绕这个洞见展开：wake 阶段收集中间定理，sleep 阶段聚类、抽象、过滤、验证、压缩，测试阶段复用。  \n- 消融实验直接验证该洞见：完整 DreamProver 104，去掉 cluster evolving 53，no library 55，说明“抽象成通用 lemma”比“保存中间结论”更关键。\n\n**负面证据或缺失**：  \n- 这个洞见在数学实践层面并不新，人类数学家一直会总结可复用 lemma。  \n- 论文的新意更多在于将这个洞见形式化、自动化、工程化，而不是发现了一个完全反直觉的理论原则。\n\n**判断**：强\n\n**理由**：  \n核心洞见非常清楚，而且方法、实验和消融都紧密围绕它展开。它不是“我们用了 wake-sleep、clustering、tree edit distance”这样的做法堆叠，而是有一个明确判断：低层中间结论必须被抽象、验证、压缩后才有迁移价值。虽然这个洞见对人类数学不新，但在 LLM formal proving agent 中被系统实现并量化验证，清晰度很高。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：  \n- 技术风险是真实存在的：LLM 生成的候选 lemma 可能错误、过泛、无关、重复，或者无法被 Lean 证明。  \n- 消融显示如果处理不好会失败：去掉 cluster evolving 后性能低于 no-library，说明“自动学习 lemma library”不是必然有效。  \n- 可行性也有具体保障：候选 lemma 必须经过结构相似度过滤、tree edit distance 去重、usage-based pruning，并最终由 Lean 验证通过才加入库。  \n- 训练成本没有明显失控：例如 inequality 训练约 0.29k tokens/sample，低于 inference 0.51k 和 Hilbert 0.73k。\n\n**负面证据或缺失**：  \n- 风险主要是工程和系统设计风险，而不是非常深的理论风险。  \n- 当前实验设定中每个 domain 约 100 个训练问题、库小于 100 个 lemma；大规模开放数学库下的失败模式还不清楚。  \n- 候选 lemma 生成依赖强 proprietary LLM，换成弱模型后可行性可能下降。\n\n**判断**：中等\n\n**理由**：  \n这个问题不是结果确定的工程优化，因为材料显示错误的 library learning 甚至会拖累性能，cluster abstraction 和 library optimization 是必要条件。但它的风险被 Lean verification 和一系列过滤机制显著降低，整体更像“高风险系统组合”而非基础科学难题。可行性证据充分，但开放规模下的风险还没有被完全检验。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：  \n- 输入材料显示作者能把 LLM prompting、Lean proof checking、lemma abstraction、聚类、结构相似度、library pruning 和 theorem proving evaluation 串成完整系统。  \n- 实验覆盖 well-represented domains 和 underrepresented domains，说明团队至少具备跨多个 formal proof benchmark 的工程能力。  \n- 他们能做细粒度消融、token 统计、proof length 统计和 lemma reuse 分析，这表明评估设计较成熟。\n\n**负面证据或缺失**：  \n- 输入材料没有提供作者团队背景、过往 Lean/mathlib 贡献、prover 系统经验、benchmark 构建经验或独有数据资源。  \n- 方法大量依赖通用 proprietary LLM、Lean 和常见算法组件，看不出团队拥有别人难以复制的独家能力或资源。  \n- 没有证据说明他们在 formal theorem proving 和 program induction 交叉点上有长期积累。\n\n**判断**：弱\n\n**理由**：  \n从论文工作本身可以看出团队有较强系统工程能力，但“比较优势”需要证明为什么这个团队比其他强 LLM/ATP 团队更适合做这件事。输入材料没有提供作者背景、独有工具、独有数据或长期积累的证据。因此不能给中等或强，只能判为证据不足下的弱。\n\n---\n\n# 综合评价\n\n**值得深入关注。**  \n这篇论文的问题选择是有分量的：它针对 LLM theorem proving 中“每题独立证明、经验无法沉淀”的真实瓶颈，并用具体消融证明简单 retrieval 或堆中间 lemma 不够。最有说服力的证据是完整系统在 inequality ablation 中从 no-library 的 55 提升到 104，同时 learned lemmas 在测试集中有可观复用率。它的短板也明确：当前仍依赖 domain-specific training set、小规模 lemma library 和强 proprietary LLM，跨领域、大规模、开源小模型场景尚未充分证明。\n\n# 最致命的弱点\n\n最大问题是 **可扩展性和泛化边界还不清楚**。  \n现在的成功依赖“每个领域训练一个小型 lemma library，并直接放入 LLM context”；一旦面对未知领域、多领域混合、大规模库或缺少训练题的 research-level 数学，当前方案是否仍能保持优势没有充分证据。\n\n# 如果要做得更好\n\n1. **补上跨领域与大规模 library 场景**：加入 domain routing、premise selection、多个 library 同时存在时的选择机制，并测试库规模从几十到几百、几千时的性能变化。  \n2. **降低对 proprietary LLM 和固定训练集的依赖**：在开源 prover model、小上下文模型、online learning 或 few-shot domain adaptation 设置下验证是否仍能学到可复用 lemma。\n\n# 与 Carlini 原则的对照\n\n- **最符合**：它符合 Carlini 式“质疑默认假设、寻找会改变实践的问题”的原则，因为它明确挑战了单题证明、深递归搜索和简单 lemma retrieval，并用消融证明这些默认做法不够。  \n- **最不符合**：它相对不符合“结论应尽量建立在可广泛复现、少依赖脆弱条件的证据上”的原则，因为核心结果仍较依赖 proprietary LLM、小规模 domain library 和有训练题的相关领域设定。",

                    "summary_translation": "我们提出了 DreamProver，一种 agentic framework（智能体式框架），其利用 “wake-sleep” program induction paradigm（“醒—睡”程序归纳范式）来发现可用于 formal theorem proving（形式化定理证明）的 reusable lemmas（可复用引理）。现有方法要么依赖固定的 lemma libraries（引理库），从而限制了其适应性；要么合成针对单个定理高度定制化的 intermediate lemmas（中间引理），因而缺乏一般性。DreamProver 通过一个迭代式的两阶段过程弥合了这一差距。在 wake stage（醒阶段），DreamProver 利用当前的 lemma library（引理库）尝试证明 training set（训练集）中的定理，同时提出新的 candidate lemmas（候选引理）。在 “sleep” stage（“睡”阶段），系统对这些候选引理进行 abstract（抽象）、refine（精炼）与 consolidate（整合），以压缩并优化引理库。通过这种交替循环，DreamProver 逐步演化出一组紧凑的 high-level（高层次）、transferable lemmas（可迁移引理），这些引理能够有效用于证明相关领域中的 unseen theorems（未见定理）。实验结果表明，DreamProver 在多样化的 mathematical benchmarks（数学基准测试）上显著提升了 proof success rates（证明成功率），同时生成了更 concise proofs（简洁证明）并降低了 computational cost（计算成本）。"
