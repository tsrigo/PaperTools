<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperTools - 学术论文集合</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 微软雅黑字体 */
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body {
                font-size: 14px;
            }

            /* 改善可点击区域 */
            button, a {
                min-height: 44px;
                min-width: 44px;
            }

            /* 优化间距 */
            .container {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }
        }

        /* 星标样式 */
        .star-button {
            transition: color 0.2s ease-in-out;
        }
        .star-button.starred {
            color: #fbbf24;
        }
        .star-button:not(.starred) {
            color: #9ca3af;
        }
        .star-button:hover {
            color: #fbbf24;
        }
        /* 删除按钮样式 */
        .delete-button {
            transition: all 0.2s ease-in-out;
        }
        .delete-button:hover {
            color: #ef4444;
            transform: scale(1.1);
        }
        /* 论文项目样式 */
        .paper-item {
            transition: all 0.3s ease-in-out;
        }
        .paper-item.hidden-paper {
            opacity: 0.3;
            transform: scale(0.98);
        }
        /* 平滑过渡 */
        .rotate-90-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* 论文卡片展开/收起 */
        .paper-expand-hint {
            padding: 4px 0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .paper-expand-hint:hover {
            color: #2563eb;
        }
        .dark .paper-expand-hint:hover {
            color: #60a5fa;
        }
        .paper-expand-hint .expand-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.65rem;
            margin-right: 4px;
        }
        .paper-detail {
            border-top: 1px solid #e2e8f0;
            margin-top: 8px;
            padding-top: 8px;
        }
        .dark .paper-detail {
            border-top-color: #334155;
        }
        .paper-detail.hidden {
            display: none;
        }

        /* 可折叠部分样式 */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            padding: 8px 0;
            user-select: none;
            color: #1e40af;
            transition: all 0.2s ease-in-out;
        }
        .dark .collapsible-header {
            color: #60a5fa;
        }
        .collapsible-header:hover {
            opacity: 0.8;
        }
        .collapsible-header::before {
            content: "▶";
            margin-right: 8px;
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }
        .collapsible-header.open::before {
            transform: rotate(90deg);
        }
        .collapsible-content {
            display: none;
        }
        .collapsible-content.open {
            display: block;
        }
        .collapsible-content .inner {
            padding-top: 8px;
        }

        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.6;
        }
        .markdown-content h1 {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #1e40af;
        }
        .dark .markdown-content h1 {
            color: #60a5fa;
        }
        .markdown-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: #1e40af;
        }
        .dark .markdown-content h2 {
            color: #60a5fa;
        }
        .markdown-content h3 {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 0.6em;
            margin-bottom: 0.3em;
            color: #1e40af;
        }
        .dark .markdown-content h3 {
            color: #60a5fa;
        }
        .markdown-content h4 {
            font-size: 1em;
            font-weight: bold;
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            color: #2563eb;
        }
        .dark .markdown-content h4 {
            color: #93c5fd;
        }
        .markdown-content p {
            margin-bottom: 0.8em;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .markdown-content ul {
            list-style-type: disc;
        }
        .markdown-content ol {
            list-style-type: decimal;
        }
        .markdown-content li {
            margin-bottom: 0.3em;
        }
        .markdown-content code {
            background-color: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .dark .markdown-content code {
            background-color: #334155;
        }
        .markdown-content pre {
            background-color: #f1f5f9;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 0.8em;
        }
        .dark .markdown-content pre {
            background-color: #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 0.8em;
            color: #64748b;
        }
        .dark .markdown-content blockquote {
            border-left-color: #475569;
            color: #94a3b8;
        }
        .markdown-content strong {
            font-weight: 600;
        }
        .markdown-content em {
            font-style: italic;
        }

        /* Tag filter button styles */
        .tag-btn {
            padding: 4px 14px;
            font-size: 0.875rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tag-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .tag-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .dark .tag-btn { border-color: #475569; color: #94a3b8; }
        .dark .tag-btn:hover { border-color: #60a5fa; color: #60a5fa; }
        .dark .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* Tag badge styles */
        .tag-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.7rem;
            border-radius: 9999px;
            background: #dbeafe;
            color: #1e40af;
            margin-right: 4px;
        }
        .tag-badge.tag-arxiv {
            background: #e0f2fe;
            color: #0369a1;
        }
        .dark .tag-badge { background: #1e3a5f; color: #7dd3fc; }
        .dark .tag-badge.tag-arxiv { background: #164e63; color: #67e8f9; }

        /* 作者机构上标样式 */
        .author-aff {
            vertical-align: super;
            font-size: 0.65em;
            color: #3b82f6;
            margin-left: 1px;
        }
        .dark .author-aff {
            color: #60a5fa;
        }

        /* TOC 侧边栏样式 - 固定在左侧 */
        #toc-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            z-index: 35;
            background: white;
            border-right: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .dark #toc-sidebar {
            background: #1e293b;
            border-right-color: #334155;
        }
        #toc-sidebar.collapsed {
            transform: translateX(-100%);
        }
        #toc-inner {
            padding: 1rem 0.5rem;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        #toc-inner::-webkit-scrollbar {
            width: 4px;
        }
        #toc-inner::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark #toc-inner::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .toc-date {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toc-date:hover {
            background: #e2e8f0;
        }
        .dark .toc-date:hover {
            background: #334155;
        }
        .toc-date.active {
            background: #dbeafe;
            color: #1e40af;
        }
        .dark .toc-date.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        .toc-date-arrow {
            transition: transform 0.2s;
            font-size: 0.65rem;
        }
        .toc-date-arrow.open {
            transform: rotate(90deg);
        }
        .toc-papers {
            display: none;
            padding-left: 1.2rem;
        }
        .toc-papers.open {
            display: block;
        }
        .toc-paper {
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .toc-paper:hover {
            background: #f1f5f9;
            color: #1e40af;
        }
        .dark .toc-paper {
            color: #94a3b8;
        }
        .dark .toc-paper:hover {
            background: #1e293b;
            color: #93c5fd;
        }
        .toc-paper.active {
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 500;
        }
        .dark .toc-paper.active {
            background: #1e3a5f;
            color: #93c5fd;
        }
        /* TOC 切换按钮 - 左侧 */
        #toc-toggle {
            position: fixed;
            left: 220px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 40;
            width: 28px;
            height: 56px;
            border-radius: 0 6px 6px 0;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
            transition: left 0.3s ease, background 0.2s;
        }
        #toc-toggle:hover {
            background: #2563eb;
        }
        #toc-toggle svg {
            transition: transform 0.3s;
        }
        #toc-toggle:not(.sidebar-open) {
            left: 0;
        }
        @media (max-width: 1023px) {
            #toc-sidebar {
                width: 240px;
            }
            #toc-toggle {
                left: 240px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
        @media (max-width: 767px) {
            #toc-sidebar {
                width: 260px;
                box-shadow: 4px 0 16px rgba(0,0,0,0.1);
            }
            #toc-toggle {
                left: 260px;
            }
            #toc-toggle:not(.sidebar-open) {
                left: 0;
            }
        }
    </style>
    <script>
        // Tailwind CSS 暗色模式配置
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

                    </button>
                    <button id="filter-all" class="px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none transition-colors whitespace-nowrap">

                    </button>

            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="space-y-6 sm:space-y-8" id="main-content">

                <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm shadow rounded-md text-slate-500 bg-white dark:bg-slate-800 transition ease-in-out duration-150">

    <script>
        const allPapers = {
    "2026-05-08": [
    ],

    ],
    "2026-05-05": [
        {
            "name": "Agent Reasoning & Planning",
            "count": 1,
            "papers": [
                {
                    "title": "Lifting Traces to Logic: Programmatic Skill Induction with Neuro-Symbolic Learning for Long-Horizon Agentic Tasks",
                    "arxiv_id": "2605.01293",
                    "authors": "Jie-Jing Shao, Haiyan Yin, Yueming Lyu, Xingrui Yu, Lan-Zhe Guo, Ivor Tsang, James Kwok, Yu-Feng Li",
                    "summary": "Foundation model-driven agents often struggle with long-horizon planning due to the transient nature of purely prompting-based reasoning. While existing skill induction methods mitigate this by distilling experience into state-blind parameterized scripts, they fail to capture the conditional logic required for robust execution in dynamic environments. In this paper, we propose Neuro-Symbolic Skill Induction (NSI), a framework that lifts interaction traces into modular, \\textit{logic-grounded} programs. By synthesizing explicit control flows and dynamic variable binding, NSI empowers agents to discover \\textit{when} and \\textit{why} to act. This paradigm enables the efficient generalization, allowing agents to induce skills from few-shot examples and flexibly adapt to unseen goals. Experiments on a series of agentic tasks demonstrate that NSI consistently outperforms state-of-the-art baselines, empowering agents to self-evolve into architects of logic-grounded skills.",
                    "category": "cs.AI",

                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体**的方法论研究，而非单纯的领域应用。\n\n论文核心贡献是提出 **Neuro-Symbolic Skill Induction (NSI)** 框架，该框架旨在解决Foundation model-driven agents在长期规划中的核心缺陷。具体而言：\n- 现有方法将经验蒸馏成\"状态盲\"的参数化脚本，无法捕获动态环境中的条件逻辑\n- NSI将交互轨迹（interaction traces）提升为模块化、**逻辑基础（logic-grounded）的程序**\n- 核心能力：使智能体能够发现\"何时\"（when）和\"为什么\"（why）行动\n\n这符合筛选标准中\"核心贡献在于构建、改进或演化LLM智能体\"的要求。\n\n**第二步：正面指标**\n\n论文明确包含多个核心关注点：\n1. **Self-Evolving（自我演化）**: 论文标题和摘要都强调\"empowering agents to self-evolve into architects of logic-grounded skills\"，智能体能够从交互轨迹中归纳技能并自我演化\n2. **Agentic AI / LLM-based Agents**: 明确针对\"long-horizon agentic tasks\"和\"Foundation model-driven agents\"\n3. **Planning**: 核心问题就是解决长期规划（long-horizon planning）的挑战\n4. **Skill Induction / Self-Reflection**: 涉及从少量示例中归纳技能，并能够灵活适应新目标\n\n**第三步：排除标准**\n\n- 安全相关: 无涉及\n- 多模态与视觉: 无涉及  \n- 图相关技术: 无涉及\n- 多智能体拓扑与编排: 无涉及\n\n**第四步：特殊处理**\n\n该论文不属于\"非演化型应用\"——它不是将现有智能体应用于特定领域（如生物、医疗），而是提出一种**通用的智能体能力提升框架**，使智能体能够自我演化出逻辑基础的技能。\n\n**结论**\n\n该论文完全符合研究范围，核心贡献是构建一种让LLM智能体能够**自我演化**的新框架，属于\"自我演化（Self-Evolving）\"方向的前沿研究。",
                    "intro_logic": "1. LLM-driven agents can perceive, reason, and act in complex environments, but in long-horizon agentic tasks they often fail because purely prompting-based reasoning is transient and unstable.\n\n2. Foundation models are general-purpose and usually lack grounded knowledge for specific real-world domains, which creates domain-specific reasoning gaps.\n\n3. These reasoning gaps lead to unreliable tool use and cascading failures in long-horizon planning, especially when the agent must repeatedly interact with a dynamic environment.\n\n4. Therefore, static pre-trained models are insufficient; an agentic system needs to self-evolve through environmental interaction to acquire reusable domain capabilities.\n\n5. Episodic-memory-based evolution stores past experience as text, but using it requires retrieval and re-reasoning, which is inefficient and fragile for long-horizon execution.\n\n6. Skill induction is a stronger self-evolution paradigm because it distills interaction experience into reusable executable procedures, expanding the agent’s action space with high-level skills.\n\n7. This resembles the transition from System-2 to System-1: deliberate reasoning traces are consolidated into fast, reusable “muscle memory” that can be invoked directly.\n\n8. However, existing skill induction methods usually represent skills as parameterized scripts, such as Open(Receptacle) → Pick(Object), which execute actions in a fixed, state-blind manner.\n\n9. State-blind scripts fail to represent the real execution logic behind successful behavior, because robust action often depends on current environmental conditions.\n\n10. For example, after opening a fridge, the agent should check whether the desired object is present; if it is present, bind it as the target and pick it; if not, search elsewhere.\n\n11. Thus, the core limitation is that existing induced skills capture what action sequence was taken, but not when and why each action should be taken under changing states.\n\n12. Research question: How can agents induce reusable skills from interaction traces that go beyond state-blind scripts and capture the state-dependent execution logic needed for robust long-horizon generalization?",
                    "core_insight": "下面的回答会区分两层：**论文明确写出的内容**与**从方法设计反推的研究动机/试错路径**。因为论文没有提供作者真实的 brainstorming 日志，所以“试错历程”部分主要是基于文中暴露出的技术困难与相应设计调整来重构。\n\n---\n\n# 1. 关键洞察（The Seed Insight）\n\n## 一句话概括\n\n**作者的核心洞察是：agent 从经验中学到的 skill 不应该只是“动作序列脚本”，而应该是能根据状态谓词决定“when and why to act”的 logic-grounded program；也就是说，真正可复用的 skill 不是轨迹本身，而是轨迹背后的条件控制逻辑与变量绑定规则。**\n\n---\n\n## 展开解释\n\n已有 skill induction 方法通常把成功轨迹压缩成类似：\n\n> `Open(Fridge) → Pick(Object)`\n\n这样的 parameterized script。它比纯 prompting 好，因为它把经验固化成了可调用的程序；但它仍然是 **state-blind** 的：只知道“做什么”，不知道“什么时候做”“为什么做”“如果状态不一样怎么办”。\n\n论文开篇的 Fig. 1 就点出了这个问题。作者举了一个例子：打开冰箱之后，传统 skill 会直接执行 pick apple；但真正合理的逻辑应该是：\n\n- 如果 apple 在 fridge 里，就 pick；\n- 如果不在，就去别的地方 search。\n\n论文原文说：\n\n> “Existing methods induce skills as *state-blind* parameterized scripts, often failing when environmental deviations occur. In contrast, **NSI** lifts traces into logic-grounded workflows. By explicitly synthesizing state predicates and control flow e.g., branching logic, our framework empowers agents to improve generalization.”\n\n这是 seed insight 的最直接证据：**轨迹不是应该被压缩成线性脚本，而是应该被提升为带有 predicates、branching、variable binding 的 workflow。**\n\nIntroduction 中也有非常关键的一段：\n\n> “However, current methods typically induce skills as *parameterized scripts (e.g., Open(Receptacle) → Pick(Object))* . These induced skills produce state-blindly actions, and thus struggle to faithfully represent the underlying execution logic.”\n\n紧接着作者指出理想的 skill 应该包含条件逻辑：\n\n> “After *Open(Fridge)*, the ideal execution logic is to check if the desirable object, ‘apple’, is present. If so, dynamically bind it to *Pick(Object)*; if not, branch to search elsewhere.”\n\n这句话基本就是整篇论文的“灵光一闪”：  \n**skill 的本质不是动作模板，而是 state-aware execution logic。**\n\nAbstract 里也把这个洞察凝练成了方法论目标：\n\n> “While existing skill induction methods mitigate this by distilling experience into state-blind parameterized scripts, they fail to capture the conditional logic required for robust execution in dynamic environments.”\n\n以及：\n\n> “NSI empowers agents to discover *when* and *why* to act.”\n\n所以，这篇论文的独特认知突破在于：  \n过去大家把 skill induction 看成“把经验变成可复用动作序列”；作者则认为应该把它看成“从经验中归纳出控制流、状态条件和变量绑定规则”。\n\n---\n\n# 2. 从洞察到方法的桥梁\n\n这个洞察直接导向了 NSI 的整体设计。中间的推理链条可以拆成六步。\n\n---\n\n## Step 1：如果 skill 要知道“when and why”，它必须能看见状态\n\n传统 script 是 state-blind 的，所以它不能根据环境变化调整行为。  \n因此，skill 必须以某种结构化状态为输入。\n\n论文在 preliminaries 里采用 object-centric modeling，把状态表示为对象之间的 relational features：\n\n> “we focus on object-centric modeling: states are described as relational features among entities in the environment”\n\n并引入 predicate symbols 和 ground atoms，例如：\n\n> “a ground atom *p* is a predicate that contains specific arguments, such as Contains(bridge, apple).”\n\n这一步的推理是：\n\n> 长程任务失败不是因为 agent 完全不知道动作，而是因为它不能稳定判断当前状态是否满足某个动作的前提；所以需要把 observation grounding 成 symbolic state。\n\n---\n\n## Step 2：但 observation 是自然语言/非结构化的，所以需要 neural grounding\n\n环境反馈往往不是直接的 FOL facts，而是自然语言观察、网页内容、游戏文本等。因此作者没有完全符号化，而是采用 neuro-symbolic 分工：\n\n- LLM 负责 perception / grounding；\n- symbolic graph 负责 execution logic。\n\n论文提出 skill schema：\n\n> “we formalize a skill schema as a triple *πω = (θω, ϕω, Gω)*, consisting of invocation parameters *θω*, a neural grounding module *ϕω*, and a symbolic execution graph *Gω*.”\n\n其中 neural module 的作用是：\n\n> “At each step, it processes raw, unstructured environmental observations *st* to update a structured *symbolic state Zt*.”\n\n这一步对应方法中的 **Neural Feedback Perception**。\n\n---\n\n## Step 3：如果 skill 要表达“when”，就需要 explicit control flow\n\n一旦有了 symbolic state，skill 就可以根据 predicates 做 branching / looping。  \n因此，作者把 skill 表示成 workflow graph：\n\n> “The core behavioral logic is encapsulated into a workflow graph *Gω*, which is executed by a symbolic interpreter.”\n\n更重要的是：\n\n> “By operating on the grounded symbolic predicates in *Zt*, it employs explicit branching to rigorously map diverse state configurations to specific actions.”\n\n这直接催生了 **CheckOp** 和 **LoopOp**：\n\n> “Control Operation (*CheckOp, LoopOp*): Inventing Decision Boundaries.”\n\n它们的作用是合成条件表达式：\n\n> “synthesizes an explicit conditional expression *pv : C × Z → {True, False}* that captures the execution branch.”\n\n也就是说，洞察中的“when to act”被具体实现为：  \n**用 predicates 构造 branch condition / loop condition。**\n\n---\n\n## Step 4：如果 skill 要表达“why/how”，就需要 dynamic variable binding\n\n仅有 branching 还不够。agent 还要知道当前具体该操作哪个 object。\n\n例如 “pick apple” 不能写死成 pick(apple_1)，而应该根据状态选择：\n\n- 当前 receptacle 中的 apple；\n- 符合目标约束的 product；\n- inventory 中缺少的 ingredient。\n\n因此作者提出 **DataOp**：\n\n> “DataOps represent the reasoning steps that precede action, which synthesizes an explicit variable transformation program *fv : C × Z → C* that queries the symbolic world state *Z* using variables from the current scope *C* and writes the resolved result back to *C*.”\n\n论文强调这是 “think-then-act” logic：\n\n> “This enforces a *think-then-act* logic, ensuring necessary arguments are rigorously resolved before execution.”\n\n于是，洞察中的“why to act / act on what”被实现为：  \n**在 action 前先用 FOL predicate 和 select_one / select_all 等操作绑定变量。**\n\n---\n\n## Step 5：如果从轨迹中归纳 logic，就不能只模仿动作序列，而要最大化 empirical consistency\n\n传统方法可能直接从一条轨迹生成一个程序。但 NSI 要学的是轨迹背后的 execution logic，所以需要判断生成的 graph 是否能在历史状态上复现专家动作。\n\n论文提出：\n\n> “we ground our consistency check in the historical execution traces.”\n\n并定义：\n\n> “empirical programmatic consistency by synchronizing the skill’s action steps with the expert’s trajectory.”\n\n其目标是：\n\n> “synthesize a skill policy *πω* that maximizes the empirical consistency of the data *Dω* while minimizing program complexity.”\n\n这一步把“从轨迹中抽象逻辑”形式化成了一个 induction objective：\n\n- 覆盖更多历史轨迹状态；\n- 同时保持程序简洁。\n\n这也解释了为什么方法里会出现 MDL / program complexity：\n\n> “This objective encourages the discovery of skills that are both empirically consistent and structurally concise.”\n\n---\n\n## Step 6：由于直接搜索 program space 太难，所以采用 progressive induction\n\n论文明确说全局搜索不可行：\n\n> “Given the combinatorial and non-differentiable nature of the program space G, directly maximizing the global objective in Eq. 2 is intractable.”\n\n于是作者设计了两阶段 induction：\n\n1. **Intra-Trajectory Logic Consolidation**  \n   先在单条轨迹内学出 local expert；\n2. **Inter-Trajectory Skill Consolidation**  \n   再把多个 local experts 合并成 global skill。\n\n原文：\n\n> “we propose a progressive specialization-to-generalization process: (1) Intra-Trajectory Consolidation, which synthesizes Local Experts *πτ* specifically fitting each demonstration trace, and (2) Inter-Trajectory Merging, which recursively unifies these local experts and constructs a generalized skill program *πglobal*.”\n\n这一步是从 seed insight 到具体算法的关键桥梁：\n\n> 既然要从轨迹中归纳隐含逻辑，而逻辑程序空间又无法端到端优化，那么就先局部拟合，再跨轨迹合并，用 structural operators 逐步引入 branch、loop、variable abstraction。\n\n---\n\n# 3. 试错历程：遇到的困难、调整与新子问题\n\n论文没有直接写“我们一开始尝试了 X，失败后改成 Y”。但从方法章节可以看出，作者在实现 seed insight 时遇到了几个明显的技术障碍，并针对每个障碍设计了补救机制。\n\n---\n\n## 困难一：原始 observation 不是 symbolic state\n\n### 问题\n\nNSI 的 execution graph 依赖 predicates，但环境反馈通常是自然语言，例如：\n\n- “On the dresser 1, you see a book 2 and a mug 1.”\n- WebShop 页面描述；\n- TextCraft inventory 状态。\n\n这意味着，如果没有可靠 grounding，symbolic logic 无法执行。\n\n论文承认这个核心难点：\n\n> “A fundamental challenge in agentic skill learning lies in bridging the gap between unstructured, ambiguous observations and the precise, state-dependent logic required for robust skill execution.”\n\n### 调整\n\n作者没有让 symbolic program 直接处理原始 observation，而是引入 **Neural Feedback Perception ϕω**：\n\n> “We employ the LLM as a semantic grounding perceptor.”\n\n它负责：\n\n> “processes raw, unstructured environmental observations *st* to update a structured *symbolic state Zt*.”\n\n### 新子问题\n\n这产生了一个新的子问题：  \n**如何把 observation 转成 predicates？**\n\nAppendix 中的 “OBSERVATION TO PREDICATES PROMPT” 就是在解决这个问题，要求 LLM 输出：\n\n> “add_facts” and “remove_facts”\n\n这说明 NSI 不只是 program induction，还必须解决 **state grounding / predicate maintenance**。\n\n---\n\n## 困难二：无法可靠地在线重置环境验证 skill\n\n### 问题\n\n理想情况下，可以把 induced skill 放回环境里测试。但 embodied / web environments 往往不能完美复现历史状态。\n\n论文明确指出：\n\n> “In partially observable environments such as embodied or web tasks, perfectly re-instantiating the environment to verify a skill hypothesis is often infeasible.”\n\n这就阻碍了传统的 trial-and-error program validation。\n\n### 调整\n\n作者改用 **empirical programmatic consistency**：  \n不要求在线重置环境，而是在历史轨迹的 recorded states 上检查程序是否能复现专家动作。\n\n原文：\n\n> “Therefore, instead of online environment verification, we ground our consistency check in the historical execution traces.”\n\n### 新子问题\n\n这带来一个新问题：  \n**如何在允许 DataOp / CheckOp 产生 internal reasoning steps 的情况下，把 program steps 和 expert action sequence 对齐？**\n\n因此论文定义了 synchronization：\n\n> “We define empirical programmatic consistency by synchronizing the skill’s action steps with the expert’s trajectory.”\n\n其中 internal reasoning steps 不对应环境动作，但 PrimitiveOp 需要和专家动作对齐。\n\n---\n\n## 困难三：program space 组合爆炸，无法直接优化\n\n### 问题\n\n如果 skill 是 graph，而且 node 里还可以发明 predicates、conditions、variable bindings，那么搜索空间非常大。\n\n论文说：\n\n> “Given the combinatorial and non-differentiable nature of the program space G, directly maximizing the global objective in Eq. 2 is intractable.”\n\n### 调整\n\n作者采用了 progressive induction：\n\n- 先做 single-trajectory 的 local expert；\n- 再做 multi-trajectory 的 global consolidation。\n\n原文：\n\n> “we propose a progressive specialization-to-generalization process”\n\n这个设计相当于把难问题拆成：\n\n1. 局部拟合；\n2. 跨例泛化；\n3. 结构压缩。\n\n### 新子问题\n\n这进一步产生了几个子问题：\n\n- 如何发现单条轨迹中的 uncovered state？\n- 如何把两个 local experts 合并？\n- 如何避免越合并越复杂、过拟合？\n\n因此作者引入：\n\n- **Structural Consolidation**\n- **Feasibility Dominance**\n- **MDL principle**\n- **Branching / Crossover / Lifting / LoopFold**\n\n例如：\n\n> “We implement the `Consolidate` operator via LLM-based program synthesis, which introduces abstract variables and control flows to unify distinct logical paths, utilizing the MDL principle to prevent overfitting.”\n\n---\n\n## 困难四：单条轨迹是线性的，但真正 skill 需要分支\n\n### 问题\n\n一个很微妙的问题是：  \ndemonstration trajectory 通常只有一条成功路径，里面未必显式包含所有状态变化。例如，轨迹中冰箱是关闭的，所以 expert 打开了冰箱；但如果未来冰箱已经打开，skill 应该跳过 open。\n\n线性轨迹本身没有展示 alternate branch。\n\n### 调整\n\n作者在 Intra-Trajectory Logic Consolidation 中引入 consistency check and refinement。它会找当前 policy 无法覆盖的 state，并加入条件分支：\n\n> “The system scans the trajectory for an uncovered state *serr* … for which the current policy *πτ* fails the consistency check.”\n\n然后：\n\n> “the synthesizer updates *πτ* to resolve the conflict at *serr* by computing a Structural Consolidation of the logic.”\n\n关键是作者指出这可以从单条轨迹里发现 latent branching logic：\n\n> “Critically, this allows the system to discover latent branching logic e.g., ‘open door only if closed’ even from a single linear trace by identifying state conditions that necessitate different actions.”\n\n这说明他们意识到：  \n**skill induction 不能只是复制轨迹，而要从动作是否必要中反推出 hidden precondition。**\n\n### 新子问题\n\n这产生了 **predicate invention / condition invention** 的问题：\n\n> “Predicate Invention: synthesizing a discriminative predicate e.g., inserting if is_closed(fridge) to unify a trace that opens the fridge with one that does not.”\n\n---\n\n## 困难五：跨轨迹泛化时容易写死常量\n\n### 问题\n\n如果一条轨迹是在 sink 里洗 apple，另一条是在 basin 里洗 object，程序可能会过拟合到具体 object name。\n\n传统 script induction 很容易学成：\n\n> go to sink_1; clean apple_1; move apple_1 to table_1\n\n这样的 hard-coded routine。\n\n### 调整\n\n作者提出 **Variable Lifting**：\n\n> “Converts instance-specific traces into generalized logic by lifting hard-coded constants to explicit input parameters.”\n\n更进一步，作者不是简单把 apple_1 改成 ITEM，而是让 LLM 发现 shared property：\n\n> “the operator prompts the LLM to discover the shared permutation-invariant property of the entities e.g., being a washable station across traces and exposes it as a parameter.”\n\n### 新子问题\n\n这对应一个更抽象的问题：  \n**如何识别不同实体的 functional equivalence？**\n\n也就是 sink 和 basin 名字不同，但在任务中都可作为 washable station。NSI 用 Variable Lifting 和 predicate-based selection 来处理。\n\n---\n\n## 困难六：重复结构需要 loop，而不是展开脚本\n\n### 问题\n\n一些任务涉及 variable-sized object collections，比如 TextCraft 中多个 ingredients，或者 WebShop 中多页搜索结果。如果只是线性展开，程序长度会随目标规模增长。\n\n### 调整\n\n作者提出 **LoopFold**：\n\n> “Synthesizes iterative control flow by detecting repetitive substructures acting on different targets.”\n\n并将：\n\n> “check(A), check(B), ...”\n\n折叠成：\n\n> “a concise *LoopOp* that iterates over a given list.”\n\n### 新子问题\n\n这解决的是：  \n**如何让 skill 对 variable-length horizon generalize？**\n\n这也是 NSI 能在 TextCraft 和长程任务中表现好的原因之一。\n\n---\n\n## 困难七：offline induction 不可能覆盖所有 runtime edge cases\n\n### 问题\n\n即使从 demonstration 中归纳出了 logic graph，真实部署时仍会遇到没见过的状态。初始 skill 会失败。\n\n论文说：\n\n> “Initially, the skill functions as a logic skeleton induced from minimal offline data. However, as the agent interacts, runtime failures inevitably expose logic gaps, i.e., states where the initial logic is insufficient.”\n\n### 调整\n\n作者加入 **Reflective Planning** 和 **Skill Honing**。\n\n当 skill 失败时，不只是返回 failed，而是通过 Failure Node 返回 symbolic diagnosis：\n\n> “When a skill execution fails, it terminates at a specific *Failure Node* that returns diagnostic symbolic feedback.”\n\n然后 planner 用这个诊断生成 recovery plan：\n\n> “utilizing this diagnostic information to generate a corrective plan, comprising alternative skills, or raw actions.”\n\n如果 recovery 成功，就把这段 recovery trajectory graft 到 failure node 上：\n\n> “If the corrective plan succeeds, the system treats the recovery trajectory as a newly discovered logical branch.”\n\n并且：\n\n> “grafting this logic onto the failure node, effectively generalizing the skill to handle previously unmodeled exceptions via new conditional paths.”\n\n### 新子问题\n\n这产生了两个新的 online evolution 问题：\n\n1. 如何判断 recovery 是偶然成功还是应该固化？\n2. 如何避免错误修补破坏已有 skill？\n\n作者采用 tentative subgraph：\n\n> “This new subgraph is initially marked as tentative to maintain policy stability, and is permanently solidified only if it consistently resolves the failure in subsequent encounters.”\n\n如果 recovery 失败，则不是扩展 skill，而是收缩 skill 的 feasible region：\n\n> “if the recovery fails, it signifies that the sub-goal is fundamentally unattainable from the current state. The system then restricts the skill’s usage by updating its docstring to explicitly exclude such infeasible contexts.”\n\n这说明 NSI 的 online evolution 有两种方向：\n\n- 成功恢复 → grow skill graph；\n- 恢复失败 → revise feasibility description。\n\n---\n\n# 总结：这篇论文真正的“灵光一闪”\n\n这篇论文的关键不是简单地说“LLM agent 需要 skill”，也不是“skill induction 有用”。这些已经是已有工作在做的事。\n\n它真正的 seed insight 是：\n\n> **把 skill 从“动作经验的压缩”重新定义为“状态条件驱动的可执行逻辑”。**\n\n也就是从：\n\n> trace → parameterized script\n\n转变为：\n\n> trace → logic-grounded workflow program\n\n这个转变直接催生了 NSI 的所有关键设计：\n\n| 洞察中的需求 | 方法中的对应设计 |\n|---|---|\n| skill 要感知状态 | Neural grounding module ϕω |\n| skill 要判断 when to act | CheckOp / LoopOp |\n| skill 要知道 act on what | DataOp / dynamic variable binding |\n| skill 要执行真实动作 | PrimitiveOp |\n| skill 要解释失败原因 | TerminalOp / symbolic diagnosis |\n| skill 要从少量轨迹中归纳 | empirical programmatic consistency |\n| program search 太难 | intra/inter-trajectory consolidation |\n| runtime 有未知 edge cases | Reflective Planning + Skill Honing |\n\n因此，NSI 的方法论可以浓缩为一句话：\n\n**不是把成功轨迹记成脚本，而是把成功轨迹“lifting”成可检查、可分支、可绑定变量、可持续修补的 neuro-symbolic program。**",
                    "methodology": "**一句话概括核心创新：**  \n这篇论文最本质的区别是：以前的方法把经验学成“固定动作脚本”，NSI 把经验学成“带条件判断、变量选择、循环和失败处理的程序”。\n\n---\n\n# 1. 这篇论文宏观上到底在做什么？\n\n这篇论文解决的是 LLM agent 在长任务里容易失败的问题。\n\n以前的 skill induction 方法通常是这样做的：\n\n> 从成功轨迹里总结出一个可复用技能，比如：  \n> `go to fridge → open fridge → take apple`\n\n问题是，这种技能基本是固定顺序执行的。它不太看当前环境状态。\n\n比如：\n\n- 冰箱已经开了，还执行 `open fridge`，可能报错；\n- 冰箱里没有 apple，还继续 `take apple`，肯定失败；\n- 目标物可能在多个地方，需要先判断在哪里；\n- 物品数量不固定，需要循环处理。\n\nNSI 的做法是：\n\n> 不只学动作顺序，而是学一个小程序。这个程序会先看当前状态，再决定做什么动作。\n\n这个小程序里面有：\n\n- 条件判断：如果冰箱关着，就打开；否则跳过；\n- 变量绑定：从当前看到的物品里选出符合条件的 apple；\n- 循环：对多个材料逐个检查；\n- 失败节点：如果找不到目标，返回明确失败原因；\n- 在线修正：如果执行失败但后来补救成功，就把补救过程加回技能里。\n\n---\n\n# 2. 方法按照实际运行顺序拆解\n\n下面按系统真正运行的顺序讲。\n\n---\n\n## 第一步：定义环境里的“事实表示”\n\n### 输入\n\n系统拿到的是环境返回的自然语言观察，例如：\n\n> You are at the dresser. On the dresser you see a mug and a book.\n\n还有任务相关的谓词列表，比如：\n\n- `locates(dresser_1)`：agent 在 dresser_1 位置；\n- `contains(dresser_1, mug_1)`：dresser_1 上有 mug_1；\n- `is_open(fridge_1)`：fridge_1 是打开的；\n- `holding(mug_1)`：agent 正拿着 mug_1。\n\n这些谓词是人工给定的，按任务领域区分：\n\n- ALFWorld：位置、容器、物体状态；\n- WebShop：按钮是否可点击、商品是否匹配；\n- TextCraft：材料数量、库存、合成需求。\n\n### 操作\n\nLLM 读环境观察，把自然语言转换成一组结构化事实。\n\n例如：\n\n输入观察：\n\n> On the dresser 1, you see a book 2 and a mug 1.\n\n输出事实：\n\n```text\nlocates(dresser_1)\ncontains(dresser_1, book_2)\ncontains(dresser_1, mug_1)\n```\n\n如果之前的事实被新观察推翻，也会删除旧事实。\n\n比如 agent 从房间中间移动到 dresser，那么删除：\n\n```text\nlocates(middle_of_room)\n```\n\n加入：\n\n```text\nlocates(dresser_1)\n```\n\n### 输出\n\n得到一个当前世界状态集合，论文里叫 symbolic state，也就是符号状态。\n\n可以理解成当前系统维护的一张事实表。\n\n### 目的\n\n技能程序不能直接可靠地处理自然语言观察，所以要先把观察转成可检查的事实。\n\n后面的程序才能执行类似：\n\n```text\nif is_closed(fridge):\n    open(fridge)\n```\n\n这种逻辑判断。\n\n### 如果不做会怎样\n\n如果不做这一步，技能还是只能依赖 LLM 临时读文本判断状态，执行过程不可控，容易重复动作、漏掉条件、选错对象。\n\n---\n\n## 第二步：从成功轨迹里抽取子目标\n\n### 输入\n\n系统拿到一些成功的交互轨迹。\n\n例如 ALFWorld 里的轨迹可能是：\n\n```text\ngo to sink\nclean apple with sink\ngo to table\nmove apple to table\n```\n\n任务目标可能是：\n\n```text\nclean an apple and put it on the table\n```\n\n### 操作\n\nLLM 读取成功轨迹，把长任务切成几个中等大小的子目标。\n\n比如抽出：\n\n```text\nclean_item_and_place(\n    CLEAN_ITEM,\n    SINK_NAME,\n    TOREC\n)\n```\n\n这个子目标表示：\n\n> 清洗某个物品，然后把它放到某个目标容器或表面上。\n\n每个子目标会带上：\n\n- 名称；\n- 参数；\n- 开始条件；\n- 成功条件；\n- 可能的步骤描述；\n- 适用任务类型。\n\n### 输出\n\n得到若干个子目标定义。\n\n例如：\n\n```json\n{\n  \"name\": \"clean_item_and_place\",\n  \"parameters\": [\n    \"CLEAN_ITEM: ItemName\",\n    \"SINK_NAME: ReceptacleName\",\n    \"TOREC: ReceptacleName\"\n  ],\n  \"start_conditions\": [\n    \"agent holds CLEAN_ITEM or can retrieve it\",\n    \"SINK_NAME is reachable\"\n  ],\n  \"success_conditions\": [\n    \"TOREC contains CLEAN_ITEM\",\n    \"CLEAN_ITEM is cleaned\"\n  ]\n}\n```\n\n### 目的\n\n长任务太长，直接学完整任务程序很难。\n\n先切成子目标，可以让系统分别学习可复用技能。\n\n例如：\n\n- 找物品；\n- 打开容器；\n- 清洗物品；\n- 移动物品；\n- 合成材料。\n\n### 如果不做会怎样\n\n如果不切子目标，程序太长，LLM 合成和检查都更困难，技能也更难复用到新任务。\n\n---\n\n## 第三步：把每个子目标对应的轨迹转成技能程序\n\n这是 NSI 的核心。\n\n### 输入\n\n系统拿到：\n\n1. 一个子目标；\n2. 与这个子目标相关的成功轨迹；\n3. 每一步轨迹中的状态事实；\n4. 允许使用的动作和谓词。\n\n例如子目标：\n\n```text\nclean_item_and_place(CLEAN_ITEM, SINK_NAME, TOREC)\n```\n\n对应轨迹：\n\n```text\ngo to sink\nclean apple with sink\ngo to table\nmove apple to table\n```\n\n### 操作\n\n系统让 LLM 生成一个流程图式的程序。\n\n这个程序不是单纯的动作列表，而是由几类节点组成。\n\n---\n\n### 3.1 DataOp：选择变量\n\nDataOp 是“变量绑定节点”，意思是：\n\n> 从当前事实里选出后面动作要用的具体对象。\n\n例如：\n\n```text\nTARGET_ITEM = select_one(Item, is_item_of_type(x, apple) and contains(current_location, x))\n```\n\n意思是：\n\n> 从当前地点包含的物品里，选一个类型是 apple 的物品。\n\n它解决的是以前脚本里的硬编码问题。\n\n以前可能直接写：\n\n```text\ntake apple_1 from fridge_1\n```\n\n但新环境里可能是 `apple_2`，也可能在 `table_1`。\n\nNSI 会在运行时根据事实动态选对象。\n\n---\n\n### 3.2 CheckOp：条件判断\n\nCheckOp 是“判断节点”，意思是：\n\n> 检查当前事实是否满足某个条件，然后走不同分支。\n\n例如：\n\n```text\nif is_closed(fridge):\n    open(fridge)\nelse:\n    continue\n```\n\n它解决的是以前固定脚本不看状态的问题。\n\n---\n\n### 3.3 LoopOp：循环\n\nLoopOp 是“循环节点”，意思是：\n\n> 对一个列表里的对象逐个执行某些检查或动作。\n\n例如 TextCraft 里要合成物品，需要检查多个材料：\n\n```text\nfor each ingredient in INGREDIENTS:\n    check inventory count\n```\n\n如果材料数量够，就继续；不够就失败或先获取材料。\n\n---\n\n### 3.4 PrimitiveOp：执行原子动作\n\nPrimitiveOp 是真正发给环境的动作，比如：\n\n```text\ngo to table\nopen fridge\ntake apple from fridge\nclean apple with sink\nmove apple to table\n```\n\n不同点是：\n\n这些动作的参数不是死写的，而是来自前面的 DataOp 或输入参数。\n\n---\n\n### 3.5 TerminalOp：结束节点\n\nTerminalOp 有两类：\n\n- Success：技能成功完成；\n- Failure：技能失败，并返回失败原因。\n\n例如：\n\n```text\nFailure: target item not found\nFailure: receptacle is closed\nFailure: missing ingredient\n```\n\n### 输出\n\n得到一个带条件、变量选择、循环和结束状态的技能程序。\n\n例如论文里的 `clean_item_and_place` 大概是：\n\n```text\ngo to sink\nclean item with sink\ngo to target receptacle\nif target receptacle is closed:\n    open target receptacle\nmove item to target receptacle\nsuccess\n```\n\n### 目的\n\n这一步直接解决 Introduction 里说的主要问题：\n\n> 以前学到的是状态无关的动作脚本，环境一变就容易失败。\n\nNSI 要让技能自己检查状态，再决定下一步动作。\n\n### 如果不做会怎样\n\n如果只学固定动作序列，遇到容器开关状态不同、目标物位置不同、材料数量不同、网页页数不同等情况，就会失败。\n\n---\n\n## 第四步：用历史轨迹检查技能是否真的符合经验\n\n论文里叫 empirical programmatic consistency，直白说就是：\n\n> 把生成的技能程序放到历史轨迹的状态上走一遍，看它产生的动作能不能对上专家动作。\n\n### 输入\n\n系统拿到：\n\n1. 生成出来的技能程序；\n2. 历史成功轨迹；\n3. 历史轨迹里每一步的状态事实；\n4. 专家当时执行的动作序列。\n\n### 操作\n\n系统从轨迹中的某个状态开始执行技能程序。\n\n程序内部可能会做一些不发给环境的判断和变量选择。\n\n但只看它真正输出的环境动作，检查这些动作是否和专家动作一致。\n\n例如专家轨迹是：\n\n```text\ngo to fridge\nopen fridge\ntake apple from fridge\n```\n\n技能程序如果在相同状态下输出：\n\n```text\ngo to fridge\nopen fridge\ntake apple from fridge\n```\n\n就算一致。\n\n如果输出：\n\n```text\ngo to fridge\ntake apple from fridge\n```\n\n而历史状态里 fridge 是关的，那就不一致。\n\n### 输出\n\n得到这个技能覆盖了哪些轨迹状态，哪些地方失败。\n\n也就是：\n\n- 哪些状态下程序能复现专家动作；\n- 哪些状态下程序不能复现专家动作；\n- 哪些轨迹还没被当前程序解释好。\n\n### 目的\n\nLLM 生成的程序可能表面合理，但实际逻辑有漏洞。\n\n所以需要用历史数据检查它是否真的对应成功经验。\n\n### 如果不做会怎样\n\n如果不检查，系统会把错误技能放进技能库，后面执行时会产生错误动作，长任务中错误会累积。\n\n---\n\n## 第五步：先在单条轨迹内部修正技能\n\n论文里叫 Intra-Trajectory Consolidation。\n\n直白说就是：\n\n> 对每条成功轨迹，先学一个能解释这条轨迹的局部技能。\n\n### 输入\n\n系统拿到：\n\n1. 某一条成功轨迹；\n2. 当前技能程序草稿；\n3. 检查出来的不一致位置。\n\n### 操作\n\n系统扫描这条轨迹。\n\n如果发现某个状态下当前程序不能复现专家动作，就让 LLM 修改程序。\n\n常见修改包括：\n\n- 加一个条件判断；\n- 改一个变量选择规则；\n- 加一个循环；\n- 加一个失败分支；\n- 把硬编码对象改成参数。\n\n例如：\n\n轨迹 A 里冰箱是关的，所以专家执行了：\n\n```text\nopen fridge\n```\n\n但另一种状态下冰箱可能已经开了，此时不该 open。\n\n系统会把原来的：\n\n```text\nopen fridge\ntake apple\n```\n\n改成：\n\n```text\nif is_closed(fridge):\n    open fridge\ntake apple\n```\n\n### 输出\n\n得到一个局部技能程序。\n\n它至少能很好解释当前这条轨迹。\n\n### 目的\n\n先解决单条轨迹内部的逻辑漏洞。\n\n否则直接合并多条轨迹，错误来源太多，LLM 更难修。\n\n### 如果不做会怎样\n\n如果不先让每条轨迹对应一个局部可用程序，后续跨轨迹合并时会把未修好的错误逻辑一起合进去，生成的全局技能更不稳定。\n\n---\n\n## 第六步：把多条轨迹学到的局部技能合并成通用技能\n\n论文里叫 Inter-Trajectory Skill Consolidation。\n\n直白说就是：\n\n> 把多个只适用于单条轨迹的程序，合成一个能覆盖更多情况的程序。\n\n### 输入\n\n系统拿到：\n\n1. 多条轨迹各自对应的局部技能；\n2. 当前全局技能；\n3. 每个局部技能在历史数据上的覆盖情况。\n\n### 操作\n\n系统反复做下面几件事：\n\n1. 找到当前全局技能最解释不好的那条轨迹；\n2. 取出那条轨迹对应的局部技能；\n3. 让 LLM 把它和当前全局技能合并；\n4. 检查合并后的技能是否覆盖更多轨迹；\n5. 如果覆盖更多且没有破坏原有一致性，就接受修改。\n\n合并时主要用几种程序修改操作。\n\n---\n\n### 6.1 Branching：加条件分支\n\n当两条轨迹大部分相同，但某一步不同，就加判断。\n\n例如：\n\n一条轨迹：\n\n```text\nopen fridge\ntake apple\n```\n\n另一条轨迹：\n\n```text\ntake apple\n```\n\n合并成：\n\n```text\nif is_closed(fridge):\n    open fridge\ntake apple\n```\n\n---\n\n### 6.2 Crossover：复用已有子结构\n\n如果某个局部技能里有一段逻辑可以用，就把那段逻辑接到全局技能里。\n\n例如一个技能已经会处理：\n\n```text\nif target receptacle is closed:\n    open target receptacle\n```\n\n另一个技能也需要类似逻辑，就复用这段结构。\n\n---\n\n### 6.3 Lifting：把具体对象改成参数或条件选择\n\n例如轨迹里写死了：\n\n```text\nclean apple with sink_1\n```\n\n另一条轨迹是：\n\n```text\nclean apple with basin_1\n```\n\n系统会尝试把它改成：\n\n```text\nclean item with selected_cleaning_receptacle\n```\n\n也就是运行时选择一个可用的清洗位置，而不是只认 `sink_1`。\n\n---\n\n### 6.4 LoopFold：把重复动作改成循环\n\n例如原来是：\n\n```text\ncheck wood\ncheck stone\ncheck iron\n```\n\n改成：\n\n```text\nfor each ingredient in ingredients:\n    check ingredient\n```\n\n这对 TextCraft 很重要，因为合成任务里的材料数量和种类会变化。\n\n### 输出\n\n得到一个更通用的技能程序。\n\n它能覆盖多条成功轨迹，并且程序尽量简短。\n\n### 目的\n\n单条轨迹只能说明一种情况。\n\n要泛化到新任务，技能必须处理不同对象、不同位置、不同状态、不同数量。\n\n### 如果不做会怎样\n\n如果不合并多条轨迹，技能只能记住单个例子的细节，到新环境里容易因为对象名、状态、数量变化而失败。\n\n---\n\n## 第七步：把技能放入技能库，供 agent 调用\n\n### 输入\n\n系统拿到已经合成好的技能程序。\n\n每个技能包括：\n\n- 技能名；\n- 参数；\n- 开始条件；\n- 成功条件；\n- 程序图；\n- 失败原因描述；\n- 简短说明，也就是 docstring。\n\n### 操作\n\n系统把这些技能注册到技能库。\n\n之后 LLM planner 在执行任务时，可以选择：\n\n- 调用一个技能；\n- 或直接执行一个原子动作。\n\n### 输出\n\n得到一个技能库。\n\n例如：\n\n```text\nclean_item_and_place(CLEAN_ITEM, SINK_NAME, TOREC)\nsearch_and_open_product(QUERY_TEXT)\ncraft_item_from_ingredients(TARGET_ITEM, INGREDIENTS, NEED_COUNT)\n```\n\n### 目的\n\n让 agent 不需要每次都从头规划一长串动作。\n\n它可以直接调用一个技能，让技能内部完成多步动作和条件判断。\n\n### 如果不做会怎样\n\n如果没有技能库，agent 每一步都要重新让 LLM 思考下一步动作，长任务里更容易中途偏离、重复、漏步骤。\n\n---\n\n## 第八步：在线执行任务时，先选择技能或原子动作\n\n### 输入\n\n系统拿到：\n\n1. 当前任务；\n2. 当前世界事实；\n3. 历史动作；\n4. 技能库；\n5. 每个技能的适用条件。\n\n### 操作\n\nLLM router 判断当前应该做什么。\n\n优先选择技能。\n\n例如当前任务是：\n\n```text\nclean apple and put it on table\n```\n\n当前事实显示：\n\n```text\nholding(apple_1)\nreachable(sink_1)\nreachable(table_1)\n```\n\n那么 router 可能选择：\n\n```text\nclean_item_and_place(\n    CLEAN_ITEM=apple_1,\n    SINK_NAME=sink_1,\n    TOREC=table_1\n)\n```\n\n如果没有合适技能，才选择原子动作，比如：\n\n```text\ngo to sink_1\n```\n\n### 输出\n\n得到一个执行决策：\n\n- 调用哪个技能；\n- 技能参数是什么；\n- 或执行哪个原子动作。\n\n### 目的\n\n技能只有被正确调用才有用。\n\n这一步负责把当前任务状态和技能库匹配起来。\n\n### 如果不做会怎样\n\n如果不做路由选择，agent 可能在不合适的状态下调用技能，或者明明有技能却继续一步一步手动执行，降低效率和成功率。\n\n---\n\n## 第九步：技能内部按“观察状态—判断—动作”的顺序执行\n\n### 输入\n\n系统拿到：\n\n1. 当前技能程序；\n2. 参数绑定；\n3. 当前符号事实；\n4. 环境观察。\n\n### 操作\n\n技能执行时反复做三件事：\n\n---\n\n### 9.1 更新事实\n\n每次环境返回新观察后，LLM 把观察转成新的事实增删。\n\n例如：\n\n```text\nadd: is_open(fridge_1)\nremove: is_closed(fridge_1)\n```\n\n---\n\n### 9.2 执行程序节点\n\n如果当前节点是 DataOp，就选变量。\n\n例如：\n\n```text\nTARGET_ITEM = select_one(Item, is_item_of_type(x, apple))\n```\n\n如果当前节点是 CheckOp，就判断分支。\n\n例如：\n\n```text\nif is_closed(fridge_1):\n    go to open branch\nelse:\n    skip open\n```\n\n如果当前节点是 PrimitiveOp，就发动作给环境。\n\n例如：\n\n```text\nopen fridge_1\n```\n\n---\n\n### 9.3 到 Success 或 Failure 停止\n\n如果成功，返回成功。\n\n如果失败，返回失败原因。\n\n例如：\n\n```text\nFailure: no product satisfies query on current page\nFailure: missing ingredient wood\nFailure: target receptacle is closed\n```\n\n### 输出\n\n技能执行结果：\n\n- 成功；\n- 或失败并附带明确原因；\n- 执行过程中产生的新轨迹。\n\n### 目的\n\n这一步让技能真正具备状态感知能力。\n\n不是按固定脚本跑，而是每一步根据当前事实决定下一步。\n\n### 如果不做会怎样\n\n如果技能内部不看状态，它就退化成旧方法里的固定脚本，遇到环境变化就容易失败。\n\n---\n\n## 第十步：如果技能失败，尝试补救，并把成功补救过程写回技能\n\n论文里叫 online skill evolution / skill honing。\n\n直白说就是：\n\n> 技能失败后，系统先让 LLM 想办法补救；如果补救成功，就把这段补救逻辑加到原技能里。\n\n### 输入\n\n系统拿到：\n\n1. 技能失败的位置；\n2. 失败节点给出的原因；\n3. 当前世界事实；\n4. 后续补救轨迹。\n\n例如失败原因：\n\n```text\ntarget receptacle is closed, so item cannot be placed inside\n```\n\n### 操作\n\n系统让 LLM 做两件事。\n\n---\n\n### 10.1 先补救当前任务\n\n例如失败是：\n\n```text\ntarget receptacle is closed\n```\n\n那么补救计划可能是：\n\n```text\nopen target receptacle\nmove item to target receptacle\n```\n\n---\n\n### 10.2 如果补救成功，把补救逻辑接到失败节点上\n\n原来的技能可能是：\n\n```text\ngo to target receptacle\nmove item to target receptacle\nfailure if closed\n```\n\n修正后变成：\n\n```text\ngo to target receptacle\nif is_closed(target receptacle):\n    open target receptacle\nmove item to target receptacle\nsuccess\n```\n\n论文还提到，新加的分支一开始是 tentative，也就是临时的。后续多次验证有效后，再固定下来。\n\n---\n\n### 如果补救失败怎么办？\n\n如果补救也失败，系统不强行修改技能。\n\n它会更新技能说明，明确这个技能不适用于某些状态。\n\n例如：\n\n```text\nDo not call this skill when required ingredient is unavailable.\n```\n\n### 输出\n\n两种可能：\n\n1. 补救成功：技能程序增加一个新分支；\n2. 补救失败：技能适用条件变得更严格。\n\n### 目的\n\n离线演示很少，不可能覆盖所有边界情况。\n\n在线执行时遇到新情况，就用失败来修正技能。\n\n### 如果不做会怎样\n\n如果不做在线修正，技能在第一次遇到新情况时可能失败；下次遇到同样情况还会失败，错误不会转化成长期改进。\n\n---\n\n# 3. 用一个具体例子把 NSI 和旧方法区别说清楚\n\n假设任务是：\n\n```text\nfind apple and pick it\n```\n\n旧方法可能学到：\n\n```text\ngo to fridge\nopen fridge\ntake apple from fridge\n```\n\n问题：\n\n- fridge 已经开了怎么办？\n- apple 不在 fridge 里怎么办？\n- apple 的具体名字是 apple_1 还是 apple_2？\n- fridge 里有多个东西，怎么选？\n\nNSI 学到的更接近：\n\n```text\ngo to fridge\n\nif is_closed(fridge):\n    open fridge\n\ntarget = select_one(Item, is_item_of_type(x, apple) and contains(fridge, x))\n\nif target exists:\n    take target from fridge\n    success\nelse:\n    failure: no apple in fridge\n```\n\n如果失败后 agent 去 table 找到 apple，并成功拿到，那么 NSI 可能把技能扩展成：\n\n```text\ngo to fridge\n\nif is_closed(fridge):\n    open fridge\n\ntarget = select_one(Item, apple in fridge)\n\nif target exists:\n    take target from fridge\n    success\nelse:\n    go to table\n    target = select_one(Item, apple in table)\n    if target exists:\n        take target from table\n        success\n    else:\n        failure\n```\n\n这就是论文的核心：  \n不是记动作，而是学什么时候判断、判断什么、变量怎么选、失败后怎么补上。\n\n---\n\n# 4. 实验结果说明了什么？\n\n论文在三个任务上测试：\n\n1. **ALFWorld**：文字版家庭环境任务；\n2. **WebShop**：网页购物任务；\n3. **TextCraft**：文字版 Minecraft 合成任务。\n\n主要结果如下。\n\n---\n\n## 4.1 ALFWorld\n\n| 方法 | 成功率 |\n|---|---:|\n| ReAct | 85.8 |\n| Reflexion | 84.3 |\n| AWM | 91.3 |\n| ASI | 70.6 |\n| NSI w.o. online honing | 93.5 |\n| NSI | **98.0** |\n\n重点：\n\n- NSI 明显高于 ReAct、AWM、ASI；\n- 去掉在线修正后，NSI 仍有 93.5；\n- 加上在线修正后到 98.0。\n\n说明：\n\n- 逻辑技能本身已经很有用；\n- 在线修正进一步提升性能。\n\n---\n\n## 4.2 WebShop\n\n| 方法 | Score | 成功率 |\n|---|---:|---:|\n| ReAct | 44.0 | 20.0 |\n| AWM | 49.2 | 30.0 |\n| ASI | 7.7 | 7.5 |\n| NSI w.o. online honing | 58.8 | 30.5 |\n| NSI | **76.5** | **44.5** |\n\n重点：\n\n- WebShop 上完整 NSI 提升最大；\n- NSI w.o. online honing 的成功率是 30.5；\n- 完整 NSI 是 44.5；\n- Score 从 58.8 提升到 76.5。\n\n这说明在线修正在 WebShop 上非常重要。\n\n原因也容易理解：\n\nWebShop 页面情况变化多：\n\n- 搜索结果可能不在第一页；\n- 商品可能价格不符合；\n- 选项按钮可能不可点；\n- 商品描述可能不满足条件。\n\n只靠一条成功轨迹很难覆盖这些情况，所以在线修正贡献更大。\n\n---\n\n## 4.3 TextCraft\n\n| 方法 | 成功率 |\n|---|---:|\n| ReAct | 62.0 |\n| ADaPT | 72.5 |\n| StateAct | 83.0 |\n| AWM | 92.5 |\n| ASI | 77.8 |\n| NSI w.o. online honing | 78.5 |\n| NSI | **95.2** |\n\n重点：\n\n- 完整 NSI 最高；\n- 但 NSI w.o. online honing 在 TextCraft 上只有 78.5，低于 AWM 的 92.5；\n- 加上在线修正后，涨到 95.2。\n\n这说明 TextCraft 里，离线学到的逻辑技能如果不继续修正，可能不够强。\n\n原因可能是 TextCraft 的任务有递归组合：\n\n- 合成 A 需要 B 和 C；\n- 合成 B 又需要 D 和 E；\n- 材料数量也变化。\n\n如果离线示范只有 depth=1，很难一次学出 depth=2 到 depth=4 的完整逻辑。\n\n在线修正可以不断补上缺失的合成路径和材料检查逻辑。\n\n---\n\n# 5. 结合消融实验解释为什么有效\n\n严格说，这篇论文没有提供很完整的消融实验表。\n\n它明确报告的主要消融是：\n\n```text\nNSI w.o. online honing\n```\n\n也就是去掉在线技能修正。\n\n除此之外，论文还通过和 ASI、AWM 等基线对比，间接说明“逻辑技能表示”有效，但这不是严格意义上的单独消融。\n\n下面按你的问题回答。\n\n---\n\n## 5.1 哪个组件贡献最大？\n\n从论文给出的数据看，**online honing，也就是在线技能修正，在 WebShop 和 TextCraft 上贡献最大**。\n\n具体数据：\n\n### ALFWorld\n\n```text\nNSI w.o. online honing: 93.5\nNSI: 98.0\n提升: +4.5\n```\n\n### WebShop\n\n```text\nNSI w.o. online honing:\nScore 58.8, Success 30.5\n\nNSI:\nScore 76.5, Success 44.5\n\n提升:\nScore +17.7\nSuccess +14.0\n```\n\n### TextCraft\n\n```text\nNSI w.o. online honing: 78.5\nNSI: 95.2\n提升: +16.7\n```\n\n所以在三个任务中：\n\n- WebShop：在线修正提升非常大；\n- TextCraft：在线修正提升非常大；\n- ALFWorld：在线修正也有提升，但幅度较小。\n\n如果只看论文提供的明确消融，在线修正是贡献最大的被验证组件。\n\n---\n\n## 5.2 哪个组件可有可无？\n\n论文没有显示某个组件“去掉后几乎不变”。\n\n从现有结果看，online honing 去掉后性能明显下降：\n\n- ALFWorld 下降 4.5；\n- WebShop 成功率下降 14.0；\n- TextCraft 下降 16.7。\n\n因此不能说它可有可无。\n\n至于 DataOp、CheckOp、LoopOp、Failure Node、经验一致性检查等组件，论文没有逐个消融，所以无法严格判断哪个可有可无。\n\n更准确的说法是：\n\n> 论文没有提供足够证据证明某个内部组件是冗余的。\n\n---\n\n## 5.3 各组件之间是否有协同效应？\n\n有，而且主要体现在：\n\n> 离线逻辑技能 + 在线修正一起用，效果明显好于只做离线逻辑技能。\n\n从数据看：\n\n### WebShop\n\n只做离线逻辑技能：\n\n```text\nNSI w.o. online honing Success: 30.5\n```\n\n加上在线修正：\n\n```text\nNSI Success: 44.5\n```\n\n提升 14.0。\n\n### TextCraft\n\n只做离线逻辑技能：\n\n```text\n78.5\n```\n\n加上在线修正：\n\n```text\n95.2\n```\n\n提升 16.7。\n\n这说明：\n\n- 离线阶段先给技能一个基本程序结构；\n- 在线阶段再处理离线数据没覆盖的情况；\n- 两者组合后，技能既有初始能力，又能根据失败补充新分支。\n\n另外，NSI w.o. online honing 和 ASI 的对比，也能间接说明“逻辑技能表示”本身有价值。\n\n例如：\n\n### ALFWorld\n\n```text\nASI: 70.6\nNSI w.o. online honing: 93.5\n```\n\n差距很大。\n\n### WebShop\n\n```text\nASI Success: 7.5\nNSI w.o. online honing Success: 30.5\n```\n\n差距也很大。\n\n这说明仅仅把轨迹学成参数化脚本不够，带条件判断和变量绑定的程序更有效。\n\n但 TextCraft 上：\n\n```text\nASI: 77.8\nNSI w.o. online honing: 78.5\n```\n\n差距很小。\n\n说明在 TextCraft 上，离线逻辑技能本身没有明显超过 ASI，主要提升来自在线修正。\n\n---\n\n## 5.4 回扣动机：论文说的痛点到底被哪个设计解决？\n\n### 痛点 1：旧技能是固定脚本，不看状态\n\n对应设计：\n\n- CheckOp 条件判断；\n- DataOp 动态变量选择；\n- LoopOp 循环；\n- 符号状态事实表。\n\n实验支持：\n\n- NSI w.o. online honing 在 ALFWorld 上达到 93.5，高于 AWM 的 91.3 和 ASI 的 70.6；\n- 在 WebShop 上，NSI w.o. online honing 的 Score 58.8，高于 AWM 的 49.2 和 ASI 的 7.7。\n\n说明逻辑化技能确实比固定脚本更稳。\n\n---\n\n### 痛点 2：长任务一步一步规划容易累积错误\n\n对应设计：\n\n- 技能库；\n- 一个技能内部封装多步动作；\n- planner 优先调用技能，而不是每一步都让 LLM 决策。\n\n实验支持：\n\n论文 Figure 4 说：\n\n- NSI 每次技能调用平均能执行更多原子动作；\n- NSI 大约把 7.4 个原子动作封装进一个技能；\n- baseline 在超过约 22 步后成功率明显崩掉；\n- NSI 可以维持到约 50 步左右。\n\n这说明技能减少了高层决策次数，从而降低长任务中的错误累积。\n\n---\n\n### 痛点 3：离线示范少，覆盖不了所有情况\n\n对应设计：\n\n- Failure Node 返回失败原因；\n- Reflective Planning 生成补救动作；\n- Skill Honing 把补救逻辑加回技能。\n\n实验支持：\n\n最明显是 WebShop 和 TextCraft：\n\n```text\nWebShop Success:\n30.5 → 44.5\n\nTextCraft Success:\n78.5 → 95.2\n```\n\n这说明在线修正确实弥补了离线数据覆盖不足的问题。\n\n---\n\n### 痛点 4：不同环境里对象名、数量、位置会变化\n\n对应设计：\n\n- DataOp 的 `select_one`、`select_all`；\n- Variable Lifting；\n- LoopFold。\n\n实验支持：\n\n论文没有单独消融这几个操作。\n\n但从 NSI 整体优于 ASI 可以间接支持：\n\n- ASI 也是程序技能，但缺少明确逻辑控制和动态变量绑定；\n- NSI 在 ALFWorld 和 WebShop 明显更强。\n\n不过需要注意：\n\n> 论文没有单独证明每个结构操作各自贡献多少。\n\n---\n\n# 6. 这套方法为什么有效？最直接的原因\n\n用大白话说，NSI 有效主要因为三点。\n\n---\n\n## 第一，它减少了 LLM 每一步临时决策的次数\n\n以前 agent 每一步都要问 LLM：\n\n```text\n现在该干什么？\n```\n\n长任务里问得越多，出错机会越多。\n\nNSI 把多个动作放进一个技能里。\n\nplanner 只需要决定：\n\n```text\n现在调用哪个技能？\n```\n\n技能内部自己完成多步执行。\n\n---\n\n## 第二，它让技能根据当前事实执行，而不是照抄轨迹\n\n旧方法容易学成：\n\n```text\nopen fridge\ntake apple\n```\n\nNSI 学成：\n\n```text\nif fridge is closed:\n    open fridge\n\ntarget = select apple in fridge\n\nif target exists:\n    take target\nelse:\n    fail with reason\n```\n\n所以它更能处理环境变化。\n\n---\n\n## 第三，它能把在线失败转成技能更新\n\n如果技能失败，NSI 不只是记录一句反思文本。\n\n它会：\n\n1. 看失败原因；\n2. 让 agent 补救；\n3. 如果补救成功，把补救过程变成程序分支；\n4. 下次遇到类似状态直接走新分支。\n\n这比单纯把失败经验写成自然语言记忆更直接。\n\n---\n\n# 7. 这套方法的硬伤在哪里？\n\n论文没有单独写一个清晰的 Limitation 部分。下面是根据论文方法本身和实验设置能看出的主要边界。\n\n---\n\n## 硬伤 1：它依赖预先定义好的谓词和动作接口\n\nNSI 需要先知道环境里有哪些可用谓词，比如：\n\n```text\ncontains(x, y)\nis_open(x)\nholding(x)\nprice_match(x)\ninventory(x, n)\n```\n\n这些谓词不是系统完全自动发现的，而是按领域设计好的。\n\n这意味着：\n\n- 换一个新领域，需要重新定义谓词；\n- 如果谓词设计不完整，技能程序就无法表达关键判断；\n- 如果 LLM 把观察转事实转错了，后面的程序判断也会错。\n\n所以 NSI 不是一个完全免人工设计的通用系统。\n\n---\n\n## 硬伤 2：离线技能合成很依赖 LLM 生成程序的质量\n\nNSI 的很多关键步骤都让 LLM 完成：\n\n- 子目标抽取；\n- 技能流程图生成；\n- 条件谓词生成；\n- 多轨迹程序合并；\n- 失败后的补救逻辑合成。\n\n如果 LLM 生成的程序：\n\n- 条件写错；\n- 变量绑定错；\n- 分支漏掉；\n- 合并时破坏原逻辑；\n\n那么技能会失败。\n\n论文用经验一致性检查缓解这个问题，但检查主要基于已有轨迹。已有轨迹覆盖不到的状态，仍然可能出错。\n\n---\n\n## 硬伤 3：历史轨迹检查不能保证真实环境里一定成功\n\n论文的离线检查是：\n\n> 看技能在历史记录状态上能不能复现专家动作。\n\n这比完全不检查要好，但它不是严格的真实环境验证。\n\n问题是：\n\n- 历史轨迹只覆盖有限状态；\n- 新环境可能出现轨迹里没见过的组合；\n- POMDP 场景下状态不完整，事实表可能缺信息；\n- 技能在记录状态上一致，不代表在线执行一定成功。\n\n所以 online honing 很重要，但这也说明离线 induction 本身并不完全可靠。\n\n---\n\n# 8. 最后总结\n\nNSI 的核心很简单：\n\n> 它把成功轨迹里的经验，不学成固定动作序列，而学成一个能看状态、选变量、做判断、执行动作、处理失败的小程序。\n\n完整流程是：\n\n1. 把自然语言观察转成结构化事实；\n2. 从成功轨迹抽取子目标；\n3. 为每个子目标生成带逻辑的技能程序；\n4. 用历史轨迹检查程序是否能复现专家动作；\n5. 先修好单条轨迹里的程序；\n6. 再合并多条轨迹，得到更通用的技能；\n7. 把技能放进技能库；\n8. 在线任务中优先调用技能；\n9. 技能执行时持续读取状态并按条件运行；\n10. 如果技能失败，就补救，补救成功后把新逻辑加入技能。\n\n实验最支持的结论是：\n\n- 逻辑技能比固定脚本更适合动态环境；\n- 在线技能修正对 WebShop 和 TextCraft 提升很大；\n- 技能封装多步动作可以减少长任务中的决策错误。\n\n但它的边界也很明确：\n\n- 需要领域谓词和动作接口；\n- 依赖 LLM 正确生成和修改程序；\n- 离线轨迹检查不能保证覆盖所有真实情况。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **Programmatic skill 不一定优于 text memory；线性脚本甚至会显著退化。**  \n  ASI 作为 parameterized programmatic skill baseline，在 ALFWorld 只有 **70.6%**，低于 ReAct 的 **85.8%** 和 AWM 的 **91.3%**；在 WebShop 上更低到 **7.7 score / 7.5% success**。作者据此指出，缺乏显式逻辑 grounding 的线性脚本存在 “expressiveness gap”，可能比非结构化 workflow memory 更脆弱。\n\n- **Reflexion 式 episodic memory 并没有稳定提升，甚至略差于 ReAct。**  \n  Reflexion 在 ALFWorld 为 **84.3%**，低于 ReAct 的 **85.8%**；TextCraft 为 **59.0%**，也低于 ReAct 的 **62.0%**。这说明简单记录失败反思并重新 reasoning，对跨 episode 泛化帮助有限。\n\n- **任务分解方法 ADaPT 在递归任务有效，但在 embodied partial-observable 环境中反而很弱。**  \n  ADaPT 在 TextCraft 达到 **72.5%**，明显优于 ReAct 的 **62.0%**，但在 ALFWorld 只有 **67.9%**，远低于 ReAct 和 AWM。作者解释为：ALFWorld 的瓶颈不是高层 decomposition，而是 sub-goal 的长期交互执行和 partial observability。\n\n- **显式 state analysis 并不总是带来鲁棒性。**  \n  StateAct 在 TextCraft 表现很强，达到 **83.0%**，但在 WebShop success rate 只有 **8.0%**。这暗示“分析当前状态”本身不足以应对 Web navigation 中的页面切换、选项绑定和搜索失败恢复。\n\n- **简单的 text-based workflow memory surprisingly strong。**  \n  AWM 在 ALFWorld 达到 **91.3%**，TextCraft 达到 **92.5%**，显著优于许多更结构化的方法。依据 Table 1，这说明在某些任务中，保留自然语言 workflow pattern 比过早压缩成刚性程序更稳。\n\n- **offline induction 单独并不够，online honing 对某些任务是决定性的。**  \n  NSI w.o. online honing 在 WebShop success 只有 **30.5%**，接近 AWM / AWMoffline；加入 online honing 后提升到 **44.5%**，score 从 **58.8** 升至 **76.5**。TextCraft 也从 **78.5%** 提升到 **95.2%**，说明复杂动态环境中，部署期修复比离线抽象更关键。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n- **长任务存在明显的 “Long-Horizon Collapse” 阈值。**  \n  Figure 4b 的 survival analysis 显示，baseline 在约 **22 atomic steps** 后成功率快速跌到 0，而 NSI 可以维持到约 **50 / 53+ steps**。这揭示了 LLM agent 的失败不是线性累积，而是在某个 horizon 后出现结构性崩溃。\n\n- **评价 skill 的关键不只是 success rate，还包括每次 skill invocation 能压缩多少 atomic actions。**  \n  Figure 4a 显示，NSI 在保持较高 sub-goal success 的同时，单次 skill 平均执行的 atomic steps 比 ASI 高 **100%–140%**。作者据此提出，skill 的价值在于 horizon compression，而不只是复用动作序列。\n\n- **约 7.4 atomic actions / skill invocation 是一个有意义的抽象粒度。**  \n  论文分析指出 NSI 平均每个 skill 封装约 **7.4 个 atomic steps**，从而把原本超过 LLM 稳定规划范围的任务压回 “comfort zone”。这提示 skill 设计不应太细，否则不能缓解长程规划；也不能太粗，否则难以可靠执行。\n\n- **online honing 的收益在不同 benchmark 上高度不均匀，说明 failure distribution 很重要。**  \n  ALFWorld 从 **93.5%** 到 **98.0%**，增益为 +4.5；WebShop 从 **30.5%** 到 **44.5% success**，TextCraft 从 **78.5%** 到 **95.2%**。这表明 online refinement 对 failure mode 多样、页面/递归结构复杂的任务更关键。\n\n- **局部修复比整体重写更稳定。**  \n  Figure 3 展示了失败节点被替换或扩展为 provisional module，例如 WebShop 中找不到商品后增加翻页逻辑，ALFWorld 中 receptacle closed 时增加 open 分支。这个分析说明 agent skill 的维护应优先采用 localized graph growth，而不是每次失败后重新生成整个策略。\n\n---\n\n## 3. 对领域的新认知\n\n- **长程 agent 的核心瓶颈可能不是 planning，而是 sub-goal realization。**  \n  ADaPT 在 TextCraft 有效但在 ALFWorld 弱，作者明确指出 ALFWorld 的难点是 partial observability 下如何完成子目标，而非如何把任务拆开。这修正了“只要 decomposition 好，long-horizon 就能解决”的常见假设。\n\n- **“程序化”不等于“可泛化”；缺少条件逻辑的程序可能只是 brittle shortcut。**  \n  ASI 的低表现说明，把 trajectory 编译成 parameterized script 并不会自动带来可靠性。论文将问题归因于 state-blind scripts 无法表达 “when” 和 “why”。\n\n- **自然语言 memory 与程序 skill 各有优势：前者宽松但不可执行，后者可执行但容易过拟合。**  \n  AWM 的强结果和 ASI 的弱结果共同表明，结构化越强并不一定越好；关键在于结构是否足够 expressive，能否表示环境条件、变量绑定和异常处理。\n\n- **agent 的 failure signal 应该被视为可学习对象，而不是单纯的终止状态。**  \n  论文中 TerminalOp / Failure Node 返回 symbolic diagnosis，并在成功恢复后用于 skill honing。这个观点把 runtime failure 从“反思文本”提升为“结构化可 graft 的经验”。\n\n- **horizon compression 是衡量 skill induction 的核心视角。**  \n  作者用 Figure 4 说明，NSI 的优势不是减少总动作，而是减少 LLM 需要逐步决策的高层 planning depth。这深化了 skill learning 在 LLM agent 中的作用：它不是 action shortcut，而是 cognitive load reducer。\n\n---\n\n## 4. 实用的经验性结论\n\n- **在 skill induction 中，sub-goal 粒度应保持中等复杂度。**  \n  Appendix B 的 subgoal extraction prompt 要求每个 sub-goal 至少包含两个 primitive actions，steps 长度为 **2–5**，并拒绝单步 skill。这个经验可直接用于避免 skill 过细、无法压缩 horizon。\n\n- **prompt / induction 实验建议使用 deterministic LLM 设置。**  \n  实验中所有 baselines 均使用 **GPT-4o**，temperature 设为 **0.0**，并对 skill-induction 方法报告 3 次运行均值和标准差。对于 workflow synthesis / skill induction，这有助于提高可复现性。\n\n- **少量 demonstration 可以产生有效 skill，但需要足够强的泛化机制。**  \n  ALFWorld 每类任务只用 **2 个 standard demonstrations**，WebShop 只用 **1 条 successful trajectory**，TextCraft 只用 **3 条 depth=1 trajectories**。这说明实践中不一定需要大量轨迹，但必须避免把少量轨迹硬编码成线性脚本。\n\n- **维护 symbolic state 时应采用 add/remove facts 的增量更新格式。**  \n  Appendix B 的 observation-to-predicates prompt 要求输出 `add_facts` 和 `remove_facts`，且“不重复 persistent facts”。这是一个实用工程 trick，可降低状态漂移和上下文冗余。\n\n- **skill 暴露给 planner 时不应只给函数名，还应包含 feasibility / precondition 信息。**  \n  Sec. 5.3 说明 skills 通过 function signature 和 docstring 暴露，docstring 总结 Feasibility Region，供 LLM 判断适用性。实践中这比只列 API 名称更能减少误调用。\n\n- **失败恢复逻辑应先作为 tentative module，而非立即固化。**  \n  Sec. 5.3 提到成功 recovery trajectory 会被 graft 到 failure node，但初始标记为 tentative，只有后续多次有效才 permanent solidified。这是防止一次偶然恢复污染 skill library 的实用策略。\n\n- **当 recovery 失败时，不要继续扩展 skill，而应缩小 skill 的适用范围。**  \n  作者建议若 corrective plan 也失败，则更新 docstring，显式排除该 infeasible context。实践上，这相当于把失败样本转化为 negative applicability constraint。\n\n- **在无法重置环境的 POMDP / web 任务中，可以用历史 trace 做 empirical consistency check。**  \n  Sec. 5.1 指出 online re-instantiation 往往不可行，因此用 recorded states 检查 induced skill 是否能复现 expert actions。这对真实 Web、机器人日志等不可完全复现环境很有参考价值。\n\n---\n\n## 5. 局限性中的机会\n\n- **empirical consistency 不能完全替代真实环境验证。**  \n  论文承认在 embodied / web tasks 中难以 re-instantiate 环境，因此转向 historical traces。这个选择暗示未来可研究更强的 offline verification、counterfactual trace augmentation 或 lightweight simulator，以减少 trace overfitting。\n\n- **方法依赖 task-specific predicate vocabulary。**  \n  Table 3 为 ALFWorld、WebShop、TextCraft 分别手工列出 predicates，如 `contains`、`description_match`、`inventory`。这暴露了一个机会：自动 predicate discovery、predicate schema induction 和跨域 predicate transfer。\n\n- **neural grounding 仍可能成为瓶颈。**  \n  Sec. 4.1 和 Appendix B 依赖 LLM 将 observation 转成 symbolic facts；若 grounding 错误，后续 symbolic execution 会基于错误状态运行。未来可研究 uncertainty-aware grounding、多模态 grounding 校验或事实一致性检测。\n\n- **online honing 的稳定性与收敛标准仍不充分明确。**  \n  论文提到 tentative module 需要“consistently resolves the failure” 后才固化，但没有给出明确阈值或理论保证。未来可以研究 skill graph evolution 的版本控制、回滚机制和统计置信准则。\n\n- **安全风险随 agent 能力提升而放大。**  \n  Impact Statement 指出，更强 autonomous agents 可能被误用于敏感场景，需要 safety alignment 和 ethical guardrails。未来方向包括将 safety constraints 纳入 skill induction / workflow evolution，而不是部署后外接过滤器。",

                    "summary_translation": "Foundation model-driven agents（由基础模型驱动的智能体）常常难以应对 long-horizon planning（长程规划），这是由于纯粹依赖 prompting-based reasoning（基于提示的推理）具有 transient nature（瞬时性/短暂性）。尽管现有的 skill induction（技能归纳）方法通过将经验蒸馏为 state-blind parameterized scripts（状态无关的参数化脚本）在一定程度上缓解了这一问题，但它们无法捕捉 dynamic environments（动态环境）中实现 robust execution（稳健执行）所需的 conditional logic（条件逻辑）。\n\n在本文中，我们提出 Neuro-Symbolic Skill Induction（神经符号技能归纳，NSI），这是一个将 interaction traces（交互轨迹）提升为 modular（模块化的）、logic-grounded programs（逻辑扎根程序）的 framework（框架）。通过合成 explicit control flows（显式控制流）和 dynamic variable binding（动态变量绑定），NSI 使 agents（智能体）能够发现何时行动以及为何行动。该 paradigm（范式）支持 efficient generalization（高效泛化），使 agents（智能体）能够从 few-shot examples（少样本示例）中归纳技能，并灵活适应 unseen goals（未见目标）。\n\n在一系列 agentic tasks（智能体任务）上的实验表明，NSI 始终优于 state-of-the-art baselines（最先进基线方法），使 agents（智能体）能够自我演化为 logic-grounded skills（逻辑扎根技能）的构建者。"

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;

            if (loadBtn) {

                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json?v=${DATA_VERSION}`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers

                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览

                    }

                    loadedDates.add(date);
                    loadedCount++;

                }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {
            const isStarred = starredPapers.has(paper.arxiv_id);
            const isRead = readPapers.has(paper.arxiv_id);
            const isDeleted = deletedPapers.has(paper.arxiv_id);

            if (isDeleted) return '';
            if (showOnlyStarred && !isStarred) return '';
            if (!paperMatchesFilters(paper, date)) return '';

            // Store paper data for lazy rendering
            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';
            const tagBadges = (paper.tags || []).map(tag => `<span class="tag-badge tag-arxiv">${tag}</span>`).join('');

            return `
                <div class="paper-item bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-6" data-arxiv-id="${paper.arxiv_id}">
                    <!-- 论文标题和操作按钮 -->
                    <div class="flex items-start justify-between mb-1">
                        <div class="flex items-start space-x-2 sm:space-x-3 flex-1 min-w-0">

                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>

                </div>
            `;

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">
                    <div class="collapsible-header open text-sm sm:text-base" onclick="toggleCollapsible(this)">原始摘要</div>
                    <div class="collapsible-content open">
                        <div class="inner">
                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}
                                ${hasSummaryZh ? `
                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">

                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: paper.research_value_source === 'reviewgrounder' ? 'ReviewGrounder 审稿' : '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">
                            <div class="collapsible-header text-sm sm:text-base" onclick="toggleCollapsible(this)">${s.title}</div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">
                                        <div class="text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="${s.id}">
                                        </div>
                                    </div>
                                </div>
                            </div>

                    `;
                }
            });

            if (renderedSections === 0) {
                html += `
                    <div class="mb-3 sm:mb-4">
                        <div class="bg-amber-50/80 dark:bg-amber-950/20 border-l-3 border-amber-300 p-3 sm:p-4 rounded-r-lg text-xs sm:text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。

                    </div>
                `;
            }

            // 论文链接
            html += `
                <div class="flex flex-wrap gap-2">
                    <a href="https://arxiv.org/abs/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">
                        arXiv 原文
                    </a>
                    <a href="https://arxiv.org/pdf/${aid}.pdf" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-md transition-colors whitespace-nowrap">
                        PDF 下载
                    </a>
                    <a href="https://papers.cool/arxiv/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors whitespace-nowrap">

            container.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
