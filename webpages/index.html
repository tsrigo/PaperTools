                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建和改进LLM智能体的方法论**。论文提出了LAMO框架，旨在解决轻量级GUI智能体在资源受限设备上的部署成本和任务可扩展性问题。这不是将LLM作为工具应用到特定领域（如医疗、金融），而是**研究如何构建更高效的GUI智能体本身**。\n\n**第二步：正面指标分析**\n\n论文明确涉及我的核心关注点：\n\n1. **单智能体 (Agentic)**: 论文构建了LAMO-3B智能体，专注于GUI自动化任务的能力提升，包括视觉感知增强、任务可扩展性等。\n\n2. **多智能体 (Multi-Agent)**: 论文明确提到\"MAS-style orchestration\"和\"role-oriented cooperative exploration\"，虽然这里的\"多角色\"更接近于单一智能体内部的任务分工，但确实涉及多角色协作机制。\n\n3. **自我演化 (Self-Evolving)**: 论文采用了两阶段训练范式，包括：\n   - 监督微调进行知识蒸馏\n   - **强化学习用于角色导向的合作探索**（这体现了通过与环境交互、迭代改进的演化机制）\n\n**第三步：排除标准检查**\n\n- **非演化型应用**: ❌ 不适用。论文不是将现成智能体应用到特定领域，而是研究智能体本身的构建方法。\n- **非Agentic推理**: ❌ 不适用。论文关注的是GUI智能体的任务执行能力，而非基础推理能力改进。\n- **基础设施**: ❌ 不适用。虽然涉及轻量级模型优化，但核心目标是构建GUI智能体，不是纯基础设施研究。\n- **安全/对齐/可解释性**: ❌ 不涉及。\n- **多模态与视觉**: ⚠️ 涉及MLLMs和视觉感知，但这是作为智能体感知环境的工具，属于智能体构建的必要组件，而非研究核心。\n- **图相关技术**: ❌ 不涉及。\n- **多智能体拓扑与编排**: ⚠️ 需要仔细辨别。论文中的\"multi-role orchestration\"和\"MAS-style orchestration\"是指单一智能体内部的多角色分工与协作能力，**不是**讨论多智能体系统的拓扑结构、通信协议或消息路由。论文的核心贡献是\"通过多角色编排扩展能力边界\"，这更接近于**智能体能力增强**而非系统工程。\n\n**第四步：特殊情况的处理**\n\n这是一个**边缘情况**：论文标题包含\"Multi-role Orchestration\"和\"MAS-style\"，可能看起来像是在讨论多智能体系统。但仔细阅读摘要后，论文的核心贡献是：\n- 赋予轻量级MLLM GUI特定知识\n- 通过多角色编排扩展能力边界\n- 开发支持单体执行和MAS风格编排的智能体\n\n这里的\"MAS风格编排\"更像是将单一智能体设计为可以扮演不同角色的执行者，而非构建多个独立智能体之间的协作系统。这更符合**单智能体的能力扩展**范畴。\n\n**最终判断**\n\n论文的核心贡献是构建一个轻量级的GUI智能体框架(LAMO)，通过角色导向的数据合成和两阶段训练（监督微调+强化学习）来提升智能体的任务可扩展性和协作能力。这符合我的研究目标：**构建、改进或演化LLM智能体的方法论**。\n\n虽然论文涉及多角色和编排概念，但其本质是**智能体能力增强**研究，而非多智能体系统工程研究，因此应该保留。",
                    "intro_logic": "1. Multimodal Large Language Models (MLLMs) 的发展显著推动了自主 Graphical User Interface (GUI) agents 的进步，使数字自动化能够在终端用户设备上实现。\n2. 通过扩大模型参数和数据规模，先进方法取得了显著性能提升，并获得了强大的 task scalability，能够通过上下文工程构建 Multi-Agent Systems (MAS) 来管理复杂、长周期的 GUI 工作流。\n3. 然而，大规模模型的高昂系统成本使其难以部署在资源受限的设备上。\n4. 与此同时，轻量级 GUI agents 虽然部署成本低，但其有限的内在容量和端到端情景学习框架，使其在应对复杂的真实场景时面临性能瓶颈和较差的 task scalability，难以适应 MAS 工作流。\n5. 训练多个特定技能的专家模型可以缓解上述限制，但这种方法成本依然很高。\n6. 研究问题：Can we strike an effective trade-off in this cost–scalability dilemma, enabling lightweight MLLMs to participate in realistic GUI workflows?",
                    "core_insight": "### 1. 关键洞察（The Seed Insight）\n\n**一句话概括**：作者意识到，轻量级MLLM在复杂长视野GUI任务中表现不佳，并非因为其完全缺乏所需的基础能力，而是因为**端到端片段学习框架将高层推理与底层执行强耦合，超出了其有限容量的处理能力**；然而，若将任务分解为独立的子能力（如规划、观察、执行），轻量级模型在单一角色上可以表现得相当可靠。\n\n**展开解释与原文证据**：\n现有研究普遍遵循“端到端片段学习”范式，试图让轻量级模型一次性完成从感知到决策再到执行的全过程。作者通过观察发现，这种范式是问题的根源，而轻量级模型的潜力在于其可被“分解”的特性。\n\n> 原文证据 (Section 4.1): **“We observe that lightweight MLLMs, though weak on long-horizon tasks where the agent must handle screen analysis, policy decisions, and tool invocation simultaneously, perform reliably when these components are handled independently.”**",
                    "methodology": "这篇论文提出了一种训练轻量级GUI操作模型的新方法。下面我用大白话为你拆解它的核心逻辑。\n\n### 一句话核心创新\n这篇论文没有像以前那样，把一个小模型从头到尾训练成一个“全能”的GUI操作员，而是把它训练成了一个“多面手”，可以根据需要扮演不同的角色（比如观察员、规划员、执行员），从而能更好地融入复杂的、需要多个智能体协作的自动化流程。\n\n### 方法执行逻辑拆解\n整个方法分为两个主要训练阶段，目标是打造一个叫 **LAMO-3B** 的轻量级模型。\n\n#### 第一阶段：知识灌输与角色塑造（监督微调）\n这一步是给模型“上课”，教它GUI操作的各种基础技能，并为扮演不同角色打基础。\n\n*   **输入**：一个原始的轻量级多模态模型，以及一个由大模型生成的“混合教材”。这本教材包含五种任务：\n    1.  **动作-工具对齐**：学习把“点击(32,188)”这种代码，理解成“点击搜索栏”。\n    2.  **逻辑一致的思维链**：学习根据屏幕和历史，一步步推理出下一步该做什么。\n    3.  **屏幕理解**：学习用文字详细描述屏幕内容。\n    4.  **目标规划**：学习把大目标（如“订机票”）拆解成子任务。\n    5.  **屏幕定位**：学习根据描述（如“关闭按钮”）在屏幕上精准找到坐标。\n*   **操作**：用“混合教材”对模型进行**监督微调**，就是让它学习这些任务的“标准答案”。\n*   **输出**：一个具备了五种基础能力的、经过初步训练的模型。\n*   **目的**：解决小模型“知识不足”和“能力单一”的问题。如果不教这些，模型就像个新手，完全不知道如何操作界面。\n*   **关键技术（PWCE损失）**：\n    *   **操作**：在训练时，给模型预测时“没把握”的词（比如关键的坐标数字）分配更大的权重。\n    *   **目的**：解决模型对坐标等关键信息预测不准的问题。如果不这样，模型容易点不准按钮。\n\n#### 第二阶段：多任务协作探索（强化学习）\n这一步是让模型在“实战”中练习，学会灵活运用知识。\n\n*   **输入**：第一阶段训练好的模型，以及一个包含上述五种任务的“任务池”。\n*   **操作**：进行**强化学习**。让模型在模拟环境中尝试完成任务，根据规则（如点击是否准确、描述是否贴切）获得奖励或惩罚，从而调整策略。\n*   **输出**：最终版的、能灵活应对多种GUI任务的轻量级智能体模型（LAMO-3B）。\n*   **目的**：解决“学以致用”和“知识迁移”问题。光有知识不会用不行，强化学习让模型在试错中学会组合技能，找到最优解。如果不做这一步，模型可能只会生搬硬套，缺乏应变能力。\n\n#### 训练完成后的三种使用模式\n1.  **单干模式**：模型自己完成“观察-思考-行动”全过程，适合简单任务。\n2.  **内部团队模式**：让同一个模型在内部扮演四个角色（观察、规划、分配、执行），通过分工处理复杂任务。\n3.  **最佳配角模式（核心）**：让一个强大的大模型（如GPT-5）当“大脑”负责规划，让LAMO-3B当“手”负责精准执行。这样小模型就能借助大模型的智慧，完成复杂任务。\n\n### 为什么有效？看消融实验\n论文的实验数据证明了各个设计的价值：\n\n*   **整体框架最有效**：从原始模型到最终模型，性能提升显著（如某个任务提升51%），证明“先上课（SFT），再实战（RL）”这个路子是对的。\n*   **两个阶段协同作战**：SFT阶段贡献了平均10.4%的性能提升，RL阶段又贡献了额外的14.8%。说明实战练习建立在扎实的知识基础上才有效。\n*   **具体设计点作用明显**：\n    *   **PWCE损失函数**：去掉它，在需要精准点击的任务上性能下降38.3%。这验证了它能有效提升模型对坐标的感知精度。\n    *   **复杂布局数据训练**：去掉它，在复杂界面定位任务上性能暴跌34.7%。这证明用混乱的屏幕数据专门训练，能极大提升模型在真实杂乱环境中的找东西能力。\n*   **回扣核心问题**：论文开头说小模型“能力有限、复杂场景不行”。实验证明：\n    1.  **“能力有限”** 通过 **两阶段训练（尤其是SFT上课）** 解决了。\n    2.  **“复杂场景不行”** 通过 **PWCE损失** 和 **复杂布局数据训练** 显著改善了。\n    3.  **“无法融入高级系统”** 通过 **角色化训练** 解决了，让它能当好“执行员”这个配角。\n\n### 这套方法的硬伤\n根据论文自己说的，主要有两点：\n\n1.  **模型太小，想不深**：由于只有30亿参数，在处理需要很多步骤（>10步）的复杂任务时，它的“思考”深度仍然不够。所以论文才强烈推荐“大模型规划+小模型执行”的模式，把深度思考的活儿交给更大的模型。\n2.  **对付复杂桌面软件仍吃力**：虽然在手机App上表现好，但在像电子表格、专业设计软件这种元素极其复杂、还需要大量软件知识的桌面环境里，表现仍有不足。比如，可能因为太依赖文字匹配而点错表格格子，或者不认识某个纯图标按钮。\n\n**总结一下**：这篇论文的核心思路是，**不逼着小模型当“全才”，而是把它培养成“专才+多面手”**，让它精通低级的GUI操作执行，并能灵活扮演不同角色，从而以“最佳配角”的身份，融入由大模型“主角”领衔的自动化流程中。用较小的成本，显著提升了小模型在真实任务中的可用性。",
                    "additional_insights": "### 1. **实验中的反直觉发现**\n*   **轻量级模型通过角色分解，在复杂任务上的表现可以超越其“容量”限制。** 尽管轻量级MLLMs在端到端的长视野推理上存在瓶颈，但通过LAMO框架将其编排成多个技能特定的角色（如观察者、规划者、执行者），在MiniWob++上的性能比单智能体模式提升了21.8%（表3），这表明分解任务复杂度比单纯增加模型参数更有效。\n*   **在静态基准上表现优异的端到端训练模型，在在线环境中可能急剧退化。** 例如，与LAMO-3B使用相同骨干网络的InfiGUI-R1-3B，在在线环境OSWorld上的成功率比LAMO-3B低了28.2个百分点（第7页及表5），这表明仅通过端到端情节学习训练的模型，其任务可扩展性和泛化到真实工作流的能力有限。\n\n### 2. **有启发性的分析或 Ablation**\n*   **针对复杂布局的合成数据（ILG）对提升模型鲁棒性至关重要。** 消融实验显示，在训练中移除ILG数据会导致在具有复杂、高分辨率布局的ScreenSpot-pro基准上的性能下降34.7%（表6），这验证了通过规则合成包含干扰项的复杂布局数据，能有效增强模型在真实杂乱屏幕状态下的 grounding 能力。\n*   **提出的Perplexity-Weighted Cross-Entropy (PWCE)损失函数能有效提升细粒度视觉感知。** 在SFT阶段，用标准交叉熵损失替代PWCE会导致在需要精确坐标预测的任务（如ScreenSpot-pro和MiniWob++）上性能显著下降（表6），这表明对高困惑度token（如坐标）进行动态加权，能引导模型更好地学习空间细节。\n\n### 3. **对领域的新认知**\n*   **轻量级GUI代理的核心瓶颈可能不是“容量”本身，而是“任务可扩展性”。** 论文指出，传统端到端情节学习框架将高层推理与低层执行耦合，限制了轻量模型适应复杂工作流和MAS的能力。LAMO通过赋予模型任务可扩展性（即可被编排成不同角色），成功扩展了其能力边界（第1、2节）。\n*   **“规划-执行”分离的范式为轻量模型参与复杂自动化提供了更优路径。** 论文发现，让轻量级模型（如LAMO-3B）作为专注、可靠的低层策略执行器，与一个先进的大规模规划器（如GPT-5）配对，其性能上限可以超越同等甚至更大参数量的单体式GUI专家模型（第7页，表4），这为系统设计提供了新思路。\n\n### 4. **实用的经验性结论**\n*   **在SFT阶段使用Perplexity-Weighted Cross-Entropy损失可以提升坐标等数值token的预测精度。** 具体实现时，对高困惑度token赋予更大权重（公式1, 2），超参数建议为 α=0.5, λ=0.09（第5.1节）。\n*   **通过规则合成“复杂布局 grounding”数据是低成本提升模型鲁棒性的有效方法。** 具体做法是：从数据中采样前景和背景屏幕，将目标元素与多个按随机比例缩放的干扰元素叠加到一个背景视图上，生成具有复杂布局的合成样本（第4.1节及图2）。\n\n### 5. **局限性中的机会**\n*   **轻量级模型在长执行步数（>10步）任务中的推理深度仍是瓶颈。** 作者指出，受缩放定律限制，LAMO-3B的参数预算在复杂GUI自动化中仍是瓶颈，要实现长视野任务的可靠性能，仍需采用与先进规划器混合的范式（第8节）。这提示未来研究可专注于如何更高效地将轻量执行器与规划器集成。\n*   **模型在视觉复杂度极高的桌面环境（如电子表格、专业软件）中表现仍具挑战。** 论文承认LAMO-3B在处理这类需要大量软件特定先验知识的场景时存在困难（第8节及图9, 10）。这指明了未来研究的一个有价值方向：如何为GUI代理有效注入领域或软件特定的知识。",
                    "research_value": "### 1. 影响力潜力（Impact）\n**正面证据**：论文提出了一个明确的轻量级GUI代理训练新范式，特别是“大模型规划+小模型执行”的混合模式。实验表明，其训练的LAMO-3B作为执行器，与先进规划器（如GPT-5）配对时，性能上限可超越同等或更大参数量的单体模型。这为在资源受限设备上部署复杂GUI自动化提供了具体路径。\n**负面证据或缺失**：其影响力可能主要局限于GUI自动化这一特定领域的研究社区。虽然“轻量化”是普遍需求，但论文未展示该方法在更广泛的具身智能或机器人操作等领域的迁移潜力。\n**判断**：中等\n**理由**：论文为解决“成本-可扩展性”困境提供了经过验证的方案（LAMO-3B + 大模型规划器），这很可能改变该领域研究者构建轻量级GUI代理的方式。然而，其影响范围目前看来仍聚焦于GUI自动化，尚未证明具有跨领域的范式变革潜力。\n\n### 2. 不可替代性（Uniqueness）\n**正面证据**：论文将“角色化”（multi-role orchestration）作为核心设计原则，并系统性地结合了角色导向的数据合成、PWCE损失和两阶段训练（SFT+RL）。这种针对轻量模型“任务可扩展性”瓶颈的特定组合是新颖的。\n**负面证据或缺失**：论文中的关键技术组件，如通过合成数据增强鲁棒性、使用困惑度加权损失关注困难样本、以及用强化学习提升泛化，在机器学习领域均非首创。其创新更多在于针对GUI任务的问题定义和有效集成。\n**判断**：中等\n**理由**：论文的核心框架（为轻量模型注入角色化能力以融入MAS）具有独特性。然而，其构建模块多为现有技术的适配应用。考虑到领域内对轻量化方案的迫切需求，类似的集成思路很可能在1-2年内被其他团队独立探索出来。\n\n### 3. 时机判断（Timing）\n**正面证据**：问题背景明确指出，大模型GUI代理成本高昂，而轻量级代理性能瓶颈突出，领域正处于寻求高效解决方案的关键期。论文抓住了从单纯“堆参数”向“精设计”和“系统协作”转变的转折点。\n**负面证据或缺失**：无具体负面证据。该领域竞争激烈，类似思路可能已在酝酿中。\n**判断**：强\n**理由**：当前正是轻量级多模态模型能力快速提升、同时与大型模型协同工作范式兴起的时期。论文精准地瞄准了“如何让轻量模型有效参与复杂工作流”这一及时且未被充分解决的问题，时机把握得当。\n\n### 4. 对现有范式的审视（Challenging Conventions）\n**正面证据**：论文明确挑战了轻量级GUI代理的“端到端情节学习”范式，指出其将高层推理与低层执行耦合是导致任务可扩展性差的根源。它提出的“角色化”和“规划-执行分离”是对这一默认做法的直接反驳。\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：论文没有满足于在现有框架内做增量改进，而是从根本上质疑了轻量模型的应用范式。它提出不应强求小模型做“全才”，而应将其塑造为可被编排的“专才”，这一洞见挑战了领域内常见的训练与评估方式。\n\n### 5. 核心洞见的清晰度（Core Insight）\n**正面证据**：可以清晰地概括为：**通过角色化训练赋予轻量级GUI模型任务可扩展性，使其能作为可靠执行器融入由大模型规划的复杂工作流。**\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：核心洞见简洁有力，直指轻量模型“能力有限”与“无法融入系统”这两个关键瓶颈，并提出了统一的解决思路（角色化、可扩展性）。这与具体方法（两阶段训练、PWCE损失等）层次分明。\n\n### 6. 风险与可行性（Risk vs. Feasibility）\n**正面证据**：论文采用了两阶段训练（SFT+RL），这两种都是成熟技术。所使用的合成数据方法（ILG）规则明确。消融实验证明了每个组件的有效性，表明整个方案是可行且结果可复现的。\n**负面证据或缺失**：技术风险较低，几乎像是一个“设计-验证”工程。结果的高确定性也意味着其科学发现（探索未知原理）的成分相对较少，更多是工程上的有效集成。\n**判断**：中等\n**理由**：该研究的技术路径清晰，风险可控，这从其扎实的实验结果中得到验证。然而，正因其可行性高、结果确定性较强，也反映出其在探索根本性未知问题上的冒险精神相对不足。\n\n### 7. 比较优势（Comparative Advantage）\n**正面证据**：论文展示了在多个静态和在线基准（MiniWob++， OSWorld等）上对比其他轻量级模型（如InfiGUI-R1-3B）的显著优势，证明了其方法的有效性。\n**负面证据或缺失**：输入材料未提供任何关于作者团队背景的信息。无法判断该团队在GUI自动化、轻量模型训练或强化学习方面是否有长期积累或独特的数据、工具优势。\n**判断**：弱\n**理由**：虽然论文呈现的结果优于同期工作，但判断团队比较优势需要了解其“不公平的优势”。输入材料中完全缺失对团队背景、过往工作或特有资源的介绍，因此没有证据支持其在该特定交叉点上具有独特优势。\n\n---\n**综合评价**：有潜力但有明显短板。这篇论文提出了一个及时且构思清晰的新范式（角色化轻量执行器），并通过系统的实验验证了其有效性，对现有做法构成了有价值的挑战。然而，其创新更多体现在对现有技术的巧妙集成而非根本性突破，且无法评估团队是否具备持续领先的独特优势。\n\n**最致命的弱点**：创新性更多体现在问题定义和工程化集成上，而非提出全新的、难以被快速复制的核心技术组件。这可能导致其技术壁垒不高，容易被跟进或超越。\n\n**如果要做得更好**：1. **深化理论或机理分析**：除了证明“是什么有效”，可进一步分析“为什么有效”，例如角色化分解如何具体改变了轻量模型内部的表征或注意力机制。2. **拓展边界验证**：在更极端或跨领域的场景（如复杂桌面软件、甚至简单的机器人视觉操控）中测试其“任务可扩展性”范式的泛化能力。\n\n**与 Carlini 原则的对照**：\n- **最符合的原则**：**“质疑默认假设”**。论文成功地质疑了“轻量级GUI代理必须进行端到端情节学习”这一领域常见做法。\n- **最不符合的原则**：**“拥有不公平的优势”**。从提供的材料中，完全无法辨识作者团队在该特定问题上是否有超越同行的独特积累或资源。",

                    "summary_translation": "基于多模态大语言模型（Multimodal Large Language Models, MLLMs）的自主图形用户界面（Graphical User Interface, GUI）智能体，能够在终端设备上实现数字化自动化。尽管扩大模型参数量与数据规模已带来显著性能提升，但先进方法在资源受限设备上仍面临高昂的部署成本。面对复杂的真实场景时，轻量级GUI智能体受限于端到端情景学习（episodic learning）下的有限能力与较差的任务扩展性，难以适应多智能体系统（multi-agent systems, MAS），而训练多个专用技能专家模型成本依然高昂。我们能否在成本与扩展性的矛盾中实现有效权衡，使轻量级MLLM能够参与实际GUI工作流？为解决这些挑战，本文提出LAMO框架，通过赋予轻量级MLLM针对GUI的专业知识与任务扩展能力，借助多角色协同机制拓展其在GUI自动化中的能力边界。LAMO结合角色导向的数据合成与两阶段训练方案：（1）采用基于困惑度加权的交叉熵优化（Perplexity-Weighted Cross-Entropy）进行监督微调，实现知识蒸馏与视觉感知增强；（2）通过强化学习进行角色导向的协同探索。基于LAMO，我们开发了具备任务扩展能力的原生GUI智能体LAMO-3B，支持单体执行与MAS式协同。当与先进规划器作为即插即用策略执行器配合使用时，LAMO-3B能够持续受益于规划器的进步，实现更高的性能上限。大量静态与在线评估验证了我们设计的有效性。"

                    "summary": "Autonomous web agents powered by large language models (LLMs) have shown promise in completing complex browser tasks, yet they still struggle with long-horizon workflows. A key bottleneck is the grounding gap in existing skill formulations: textual workflow skills provide natural language guidance but cannot be directly executed, while code-based skills are executable but opaque to the agent, offering no step-level understanding for error recovery or adaptation. We introduce WebXSkill, a framework that bridges this gap with executable skills, each pairing a parameterized action program with step-level natural language guidance, enabling both direct execution and agent-driven adaptation. WebXSkill operates in three stages: skill extraction mines reusable action subsequences from readily available synthetic agent trajectories and abstracts them into parameterized skills, skill organization indexes skills into a URL-based graph for context-aware retrieval, and skill deployment exposes two complementary modes, grounded mode for fully automated multi-step execution and guided mode where skills serve as step-by-step instructions that the agent follows with its native planning. On WebArena and WebVoyager, WebXSkill improves task success rate by up to 9.8 and 12.9 points over the baseline, respectively, demonstrating the effectiveness of executable skills for web agents. The code is publicly available at https://github.com/aiming-lab/WebXSkill.",

    "2026-04-16": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-16)\n\n**\u5f00\u7bc7\u5bfc\u8bed**\n\u4eca\u65e5\u7684\u7814\u7a76\u805a\u7126\u4e8e\u5982\u4f55\u8ba9AI\u7cfb\u7edf\u66f4\u667a\u80fd\u3001\u66f4\u81ea\u4e3b\u5730\u9002\u5e94\u590d\u6742\u73af\u5883\u3002\u6838\u5fc3\u8d8b\u52bf\u662f\u201c\u667a\u80fd\u4f53\u80fd\u529b\u7684\u7cfb\u7edf\u5316\u589e\u5f3a\u201d\uff1a\u7814\u7a76\u8005\u4eec\u4e0d\u518d\u6ee1\u8db3\u4e8e\u5355\u4e00\u4efb\u52a1\u7684\u6027\u80fd\u63d0\u5347\uff0c\u800c\u662f\u81f4\u529b\u4e8e\u4e3a\u667a\u80fd\u4f53\u88c5\u5907\u53ef\u8fc1\u79fb\u7684\u8bb0\u5fc6\u3001\u53ef\u7ec4\u5408\u7684\u6280\u80fd\u4ee5\u53ca\u6df1\u5ea6\u7684\u6218\u7565\u63a8\u7406\u80fd\u529b\u3002\u4ece\u4ee3\u7801\u751f\u6210\u5230\u7f51\u9875\u64cd\u4f5c\uff0c\u4ece\u5de5\u5177\u8c03\u7528\u5230\u591a\u667a\u80fd\u4f53\u535a\u5f08\uff0c\u4eca\u5929\u7684\u8bba\u6587\u5171\u540c\u63cf\u7ed8\u4e86\u4e00\u5e45\u667a\u80fd\u4f53\u5411\u66f4\u901a\u7528\u3001\u66f4\u9ad8\u6548\u65b9\u5411\u6f14\u8fdb\u7684\u84dd\u56fe\u3002\n\n---\n\n### \u8bb0\u5fc6\u7684\u8fc1\u79fb\u4e0e\u8fdb\u5316\uff1a\u6253\u7834\u9886\u57df\u5b64\u5c9b\n\n\u667a\u80fd\u4f53\u5982\u4f55\u50cf\u4eba\u7c7b\u4e00\u6837\uff0c\u5c06\u5728\u4e00\u4e2a\u9886\u57df\u5b66\u5230\u7684\u7ecf\u9a8c\u5e94\u7528\u5230\u53e6\u4e00\u4e2a\u9886\u57df\uff1f\u4eca\u65e5\u7684\u7814\u7a76\u63a2\u8ba8\u4e86\u8bb0\u5fc6\u62bd\u8c61\u4e0e\u8fc1\u79fb\u7684\u673a\u5236\u3002\n\n*   **\u8de8\u9886\u57df\u8bb0\u5fc6\u8fc1\u79fb\u5b66\u4e60**\uff1a\u672c\u7814\u7a76\u63a2\u7d22\u4e86\u8ba9\u7f16\u7801\u667a\u80fd\u4f53\u5728\u4e0d\u540c\u4efb\u52a1\u9886\u57df\u95f4\u5171\u4eab\u548c\u5229\u7528\u8bb0\u5fc6\u7684\u65b9\u6cd5\u3002\u5173\u952e\u5728\u4e8e\u6784\u5efa\u4e00\u4e2a\u7edf\u4e00\u7684**\u8bb0\u5fc6\u6c60**\uff0c\u5e76\u5b9e\u9a8c\u4e86\u4ece\u5177\u4f53\u6267\u884c\u8f68\u8ff9\u5230\u62bd\u8c61\u6d1e\u5bdf\u7b49\u591a\u79cd\u8bb0\u5fc6\u8868\u793a\u5f62\u5f0f\u3002\u7814\u7a76\u53d1\u73b0\uff0c**\u62bd\u8c61\u7a0b\u5ea6\u51b3\u5b9a\u4e86\u53ef\u8fc1\u79fb\u6027**\uff1a\u9ad8\u5c42\u7ea7\u7684\u5143\u77e5\u8bc6\uff08\u5982\u9a8c\u8bc1\u6d41\u7a0b\uff09\u80fd\u6709\u6548\u63d0\u5347\u8de8\u9886\u57df\u8868\u73b0\uff0c\u800c\u8fc7\u4e8e\u5177\u4f53\u7684\u4f4e\u5c42\u7ea7\u4ee3\u7801\u5219\u53ef\u80fd\u5bfc\u81f4\u8d1f\u8fc1\u79fb\u3002\u8fd9\u4e3a\u6784\u5efa\u5177\u6709\u901a\u7528\u7ecf\u9a8c\u7684\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u8bbe\u8ba1\u539f\u5219\u3002(2604.14004 [cs.AI])\n\n---\n\n### \u8f7b\u91cf\u5316\u4e0e\u6280\u80fd\u5316\uff1a\u667a\u80fd\u4f53\u843d\u5730\u65b0\u8def\u5f84\n\n\u5982\u4f55\u5728\u8d44\u6e90\u53d7\u9650\u7684\u8bbe\u5907\u4e0a\u90e8\u7f72\u5f3a\u5927\u7684GUI/\u7f51\u9875\u667a\u80fd\u4f53\uff1f\u7814\u7a76\u8005\u4eec\u7ed9\u51fa\u4e86\u4e24\u79cd\u4e92\u8865\u7684\u7b54\u6848\uff1a\u4e00\u662f\u6253\u9020\u4e00\u4e2a\u8f7b\u91cf\u4f46\u53ef\u534f\u540c\u7684\u591a\u9762\u624b\uff0c\u4e8c\u662f\u4e3a\u667a\u80fd\u4f53\u88c5\u5907\u53ef\u6267\u884c\u3001\u53ef\u7406\u89e3\u7684\u6807\u51c6\u5316\u6280\u80fd\u3002\n\n*   **LAMO\uff1a\u8f7b\u91cf\u7ea7GUI\u667a\u80fd\u4f53\u7684\u591a\u89d2\u8272\u7f16\u6392\u6846\u67b6**\uff1a\u4e3a\u4e86\u5728\u8ba1\u7b97\u8d44\u6e90\u6709\u9650\u7684\u8bbe\u5907\u4e0a\u5b9e\u73b0\u590d\u6742\u7684GUI\u81ea\u52a8\u5316\uff0c\u672c\u6587\u63d0\u51fa\u4e86**LAMO**\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u89d2\u8272\u5bfc\u5411\u7684\u6570\u636e\u5408\u6210\u548c\u4e24\u9636\u6bb5\u8bad\u7ec3\uff08\u76d1\u7763\u5fae\u8c03+\u5f3a\u5316\u5b66\u4e60\uff09\uff0c\u8ba9\u4e00\u4e2a\u4ec530\u4ebf\u53c2\u6570\u7684\u8f7b\u91cf\u7ea7\u591a\u6a21\u6001\u5927\u6a21\u578b\u5177\u5907\u4e86**\u591a\u89d2\u8272\u534f\u540c**\u6267\u884cGUI\u4efb\u52a1\u7684\u80fd\u529b\u3002\u5176\u6838\u5fc3\u8bbe\u8ba1\u662f\u4f5c\u4e3a\u201c\u7b56\u7565\u6267\u884c\u5668\u201d\uff0c\u53ef\u4e0e\u66f4\u9ad8\u7ea7\u7684\u89c4\u5212\u5668\u63d2\u4ef6\u5316\u914d\u5408\uff0c\u4ece\u800c\u6301\u7eed\u83b7\u5f97\u6027\u80fd\u63d0         // Tag filter toggle
        function toggleTagFilter(date, tagName) {
            if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {

            } else {

            renderPapers();

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);
                if (starBtn) {
                    if (starredPapers.has(arxivId)) {
                        starBtn.classList.add('starred');

                        starBtn.classList.remove('starred');

        }

        function toggleRead(arxivId) {

        // 切换摘要语言
        function toggleSummaryLanguage() {

            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building
        const paperDataMap = {};

        function createPaperHTML(paper, date) {

            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';

                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">

                    <div class="collapsible-content open">

                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}

                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                                    暂无原始摘要。上游抓取或解析可能失败。
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">
                            <div class="collapsible-header text-sm sm:text-base" onclick="toggleCollapsible(this)">${s.title}</div>

            if (renderedSections === 0) {

                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。

            // 论文链接
            html += `

        // Toggle paper detail expansion
        function togglePaperDetail(arxivId) {

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表

            if (loading) {

            // Clear paper data map (rebuilt by createPaperHTML)

            let html = '';

            for (const date in allPapers) {
                const clusters = allPapers[date] || [];

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);

            buildToc();

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
