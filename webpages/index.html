                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是**构建一个新型LLM智能体框架（APEX-Searcher）**，用于增强LLM的搜索和检索能力。它提出了一个两阶段的智能体框架，将检索过程解耦为\"规划\"和\"执行\"两个阶段，并使用强化学习（RL）和监督微调来优化智能体的规划能力和执行能力。 这符合\"构建、改进或演化LLM智能体\"的核心目标，属于方法论层面的研究，而非单纯将现有LLM作为工具应用到特定领域。 **第二步：正面指标分析** 论文与我的研究焦点高度相关： 1. **核心范式**: 明确提到\"Agentic Planning and Execution\"框架，属于Agentic AI范畴 2. **智能体能力**: - 规划（Planning）：使用RL优化战略规划 - 工具使用：增强LLM的搜索/检索能力（搜索工具） - 迭代执行：多轮迭代检索和子任务执行 - 自我优化：通过RL的分解特定奖励进行策略优化 3. **演化机制**: 虽然不是严格的\"自我演化\"，但通过RL和微调的迭代优化过程体现了智能体能力的提升 **第三步：排除标准检查** - 不涉及安全、对齐、可解释性等研究 - 不涉及多模态、视觉、图神经网络 - 不是基础设施类研究 **第四步：特殊情况的处理** 这篇论文属于\"保留\"类别中的第一种情况：关于智能体如何进行规划或在复杂任务中进行多步推理的Agentic框架研究。它不是单纯提高LLM基础推理能力（Token预测），而是构建一个完整的智能体系统来处理复杂的多跳检索任务。 **结论** 该论文的核心贡献是提出APEX-Searcher框架，这是一个专门用于增强LLM智能体规划和执行能力的架构。它明确属于\"单智能体（Agentic）\"研究方向，特别是其中的\"规划\"和\"工具使用\"子方向，完全符合我的研究范围。",
                    "intro_logic": "## Introduction 部分逻辑链条\n\n1. LLM 在处理、生成和理解人类语言方面展现出卓越的能力\n2. LLM 的知识依赖于预训练阶段的参数，是静态的\n3. 这种静态知识导致两个关键问题：一是知识冻结在训练截止日期，无法获取实时信息；二是面对训练分布外的查询时，容易产生幻觉\n4. RAG（Retrieval-Augmented Generation）作为连接 LLM 与外部知识库的规范方法被引入\n5. 标准 RAG 局限于单次检索即可获取必要信息的任务\n6. 当面对复杂的多跳问题（multi-hop questions）时，标准 RAG 达到明显的瓶颈\n7. 迭代 RAG（Iterative RAG）通过多轮检索和生成循环来解决复杂问题\n8. Agentic RAG 将检索视为可调用工具，使模型能够自主决定何时调用检索工具\n9. 尽管现有方法能增强搜索性能，但仍面临重大挑战\n10. 现有检索过程可能产生模糊的执行轨迹，缺乏任务推理和子任务结构的全局视图\n11. 这容易导致无限推理循环（如重复关键词查询），阻止系统收敛到最终结果\n12. 过度依赖端到端训练导致优化目标定义不明确，错误累积\n13. 稀疏奖励进一步影响学习效率\n14. 这些问题导致检索结果不准确和 RAG 系统性能下降\n\n## 研究问题\n\n如何通过显式的任务规划来减少执行轨迹的模糊性，并提高 LLM 在复杂多跳检索任务中的性能？",
                    "core_insight": "# APEX-Searcher 论文深度分析\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者意识到现有agentic RAG方法将**规划（planning）与执行（execution）混为一谈**进行端到端训练，导致模型缺乏对复杂任务的全局战略视图，容易陷入推理循环和错误累积；通过将两者**解耦**并分别采用RL和SFT进行针对性训练，可以分别强化战略规划能力和子任务执行能力。\n\n### 展开解释\n\n论文原文明确指出了这一洞察：\n\n> \"First, existing retrieval processes may generate **ambiguous execution trajectories**, lacking a **global view in task reasoning and sub-task structure** to guide the retrieval. Consequently, it is liable to cause infinite reasoning loops (e.g., repetitive keyword querying) that prevent the system from converging to a final result.\"\n\n以及：\n\n> \"Second, the **over-reliance on end-to-end training** often results in **ill-defined optimization objectives** due to error accumulation, and **sparse rewards** further affect learning efficiency.\"\n\n作者进一步指出：\n\n> \"To address these issues, in this paper, we proposes APEX-Searcher, a novel Agentic Planning and Execution framework... Specifically, we introduce a **two-stage agentic framework that decouples the retrieval process into planning and execution**.\"\n\n这个洞察的核心在于：**现有方法试图用一个统一的训练目标同时学习\"如何分解复杂问题\"和\"如何解决子问题\"，但这两种能力需要的训练信号和优化目标本质上是矛盾的**。规划需要的是战略性的、面向目标的任务分解能力（适合用RL训练，因为有明确的中间信号）；执行需要的是精确的、模式化的工具使用能力（适合用SFT训练，因为有明确的行为模板）。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n**洞察 → 问题诊断 → 方法设计**的逻辑链条如下：\n\n| 层次 | 内容 |\n|------|------|\n| **洞察** | 规划与执行混在一起训练导致两者都学不好 |\n| **问题诊断** | ① 规划能力弱 → 执行轨迹模糊、陷入重复检索<br>② 端到端RL奖励稀疏 → 训练不稳定<br>③ 执行依赖模式化操作 → 需要显式监督 |\n| **方法设计** | 两阶段解耦框架：<br>Stage 1: RL (GRPO) + 任务分解奖励 → 强化规划<br>Stage 2: SFT + 多轮检索数据 → 强化执行 |\n\n论文原文描述了具体实现：\n\n> \"Specifically, we employ RL with task decomposition rewards to facilitate agentic planning, and SFT on multi-turn retrieval datasets to optimize agentic execution.\"\n\n### 技术细节\n\n**Stage 1 - RL规划**：\n- 使用GRPO算法优化Planning Agent\n- 奖励函数基于任务分解的F1-score（比较生成的分解与gold-standard分解的语义对齐）\n- 使用Hungarian algorithm做最优二分匹配计算相似度\n\n**Stage 2 - SFT执行**：\n- 构建14,604条多轮检索指令数据（来自2Wiki-MultiHopQA、HotpotQA、MuSiQue）\n- 通过Self-instruct生成，Qwen2.5-32B-Instruct和Deepseek-v3参与生成\n- 严格过滤确保数据质量\n\n---\n\n## 3. 试错历程与意外发现\n\n### 3.1 规划模块的局限性\n\n论文的ablation study揭示了一个重要发现：\n\n> \"Introducing the 'Plan' module in isolation, without RL optimization or SFT, yields limited performance gains and **may even negatively impact smaller models**. When only the Plan module is enabled, the Eval score is 30.39... However, for the smaller model, the Eval score drops to 12.63, **falling below the baseline of 13.42**.\"\n\n这说明**单纯的规划模块引入反而可能损害性能**，尤其是对小模型。这超出了作者的预期——他们原本可能认为只要有规划就能提升性能。实际发现是：没有经过RL训练的规划模块会产生\"过度分解\"或\"错误分解\"，引入噪声。\n\n### 3.2 参数敏感性\n\n论文还发现了文档数量和推理hops的敏感性：\n\n> \"However, as the number exceeds 3, performance gains tend to **plateau or even exhibit a distinct decline**. This suggests that an excessive number of documents may introduce **irrelevant information or noise**, which disrupts the model's reasoning process and degrades performance.\"\n\n这说明**检索并非越多越好**，过多的文档会引入噪声干扰推理。\n\n### 3.3 训练过程中的优化\n\n作者观察到训练过程中的一个有趣现象：\n\n> \"At the same time, we noticed that as the number of training steps increases, the **average length of the model's responses decreases**. This is related to the fact that the original model always over-decomposes or incorrectly decomposes tasks when performing task planning.\"\n\n这表明原始模型倾向于\"过度分解\"问题，而经过RL训练后学会了更简洁、精准的分解策略。\n\n---\n\n## 总结\n\n| 维度 | 内容 |\n|------|------|\n| **核心洞察** | 规划与执行的解耦是提升agentic RAG性能的关键 |\n| **方法创新** | 两阶段训练：RL (GRPO) + 任务分解奖励 → SFT多轮检索 |\n| **意外发现** | ① 单纯规划模块可能损害小模型性能<br>② 检索文档数>3后性能下降<br>③ 训练使响应长度缩短（学会更简洁的分解） |\n| **关键贡献** | 在多跳QA benchmarks上取得显著提升（7B模型平均EM提升约36.6%，3B模型提升约149%） |",
                    "methodology": "# 论文解读：APEX-Searcher\n\n## 一句话概括核心创新\n\n这篇论文最本质的区别是：**把解决复杂问题的过程拆成两个独立的阶段——\"规划\"和\"执行\"，分别用不同的训练方法（RL强化学习 vs SFT监督微调）来训练，从而解决之前端到端方法中推理路径模糊、奖励信号稀疏导致的训练困难问题。**\n\n---\n\n## 按照执行逻辑顺序拆解\n\n### 第一步：问题规划（Agentic Planning）\n\n**输入**：用户提出的复杂多跳问题（比如\"Scott Derrickson和Ed Wood是同一个国籍吗？\"）\n\n**操作**：\n1. 用一个训练好的\"规划模型\"来分析这个问题\n2. 规划模型把这个复杂问题拆解成多个简单的子问题，形成一个有序的子问题链\n3. 子问题之间可以用\"#1\"、\"#2\"这样的标记来引用前面子问题的答案\n\n**输出**：一个子问题列表，比如：\n- 子问题1：Scott Derrickson的国籍是什么？\n- 子问题2：Ed Wood的国籍是什么？\n- 子问题3：#1和#2是同一个国家吗？\n\n**目的**：解决论文中提到的\"推理执行路径模糊、缺乏全局视图\"的问题。如果不先规划就直接执行，模型容易陷入重复搜索的无限循环，或者漏掉关键步骤。\n\n**训练方法**：这一步用的是**强化学习（GRPO算法）**，给规划模型一个奖励信号——把它生成的分解方案和人类标注的标准分解方案做对比，算出一个F1分数作为奖励。\n\n---\n\n### 第二步：迭代执行（Agentic Execution）\n\n**输入**：\n- 规划阶段产生的子问题列表\n- 一个外部知识库（论文用的是Wikipedia）\n- 累积知识库（存放已经回答过的子问题和答案）\n\n**操作**（对每个子问题依次执行）：\n\n1. **检查知识是否足够**：先看看累积知识库里有没有现成的信息能回答这个子问题。如果有，直接回答，跳过检索。\n\n2. **如果需要检索**：\n   - 生成搜索查询（基于当前问题和已有知识）\n   - 用搜索引擎去外部知识库拉取相关文档\n   - 从文档中提取需要的信息\n   - 判断信息是否足够，如果不够就再查一轮（最多H_max轮）\n\n3. **把答案存入累积知识库**：这个子问题的答案会被存起来，供后续子问题引用。\n\n**输出**：每个子问题的答案 + 最终合成答案\n\n**目的**：让模型学会如何一步步检索信息、回答子问题。这一步用的是**监督微调（SFT）**，用人工构造的多轮检索问答数据来训练。\n\n---\n\n### 第三步：最终合成\n\n**输入**：所有子问题的答案 + 原始问题\n\n**操作**：模型综合所有信息，给出最终答案\n\n**输出**：最终答案 + 一个置信度分数\n\n---\n\n## 结合消融实验解释为什么有效\n\n论文的消融实验（表2）回答了几个关键问题：\n\n### 哪个组件贡献最大？\n\n**RL训练的规划模块贡献最大**。实验数据显示：\n- 7B模型：只用规划（不加RL训练）时 eval分数是30.39，加上RL后提到33.82\n- 3B模型：只用规划时反而更差（12.63），加上RL后提升到18.10\n\n这说明规划能力需要通过RL训练才能真正发挥作用，单纯给模型一个\"要规划\"的指令是不够的。\n\n### 哪个组件可有可无？\n\n**单独使用规划模块（不加任何训练）对小模型反而有害**。3B模型只加规划不训练，eval分数从13.42降到12.63。这是因为小模型能力不够，强制让它规划反而引入错误。\n\n### 各组件之间是否有协同效应？\n\n**有明显的协同效应**。实验结果：\n- 7B模型：完整方法（Plan+RL+SFT）= 37.64，比单加SFT的29.11提升了8.53分\n- 3B模型：完整方法 = 33.45，比单加SFT的23.52提升了近10分\n\n两者组合带来的提升不是简单相加，而是\"1+1>2\"的效果。\n\n### 回扣动机\n\n论文声称要解决的两个痛点：\n1. **推理路径模糊、无限循环** → 被**RL训练的规划模块**解决（规划给出清晰的子问题序列，避免盲目搜索）\n2. **奖励稀疏、训练困难** → 被**两阶段分离训练**解决（规划用RL针对分解质量奖励，执行用SFT针对具体子问题，不再端到端训练）\n\n实验数据支持这个说法：加了RL规划后，模型在多个benchmark上的EM分数都有显著提升。\n\n---\n\n## 这套方法的硬伤\n\n### 1. 对小模型不友好\n\n论文自己承认（ ablation study部分），3B模型单独使用规划模块时性能反而下降。规划能力本质上需要模型有足够的推理能力来理解\"怎么拆问题\"，小模型强行规划会引入噪声。\n\n### 2. 依赖外部知识库的质量\n\n整个系统建立在外部知识库（Wikipedia）之上。如果知识库中没有相关信息，或者检索不到相关文档，系统就会失败。论文没有讨论如何处理\"知识库缺失\"的情况。\n\n### 3. 规划-执行分离的假设不一定总是成立\n\n论文假设复杂问题可以预先拆解成静态的子问题链，但实际中有些问题需要根据检索结果动态调整计划。这种\"先规划再执行\"的模式可能不适合需要探索式推理的任务。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n**CoT推理在RAG任务中反而严重损害性能**：在HotpotQA上，CoT方法（0.092）远差于Direct Inference（0.183），2Wiki上CoT（0.111）也不如Direct Inference（0.250）。这表明在检索增强场景下，思维链可能引入无关推理步骤，干扰对外部知识的利用。\n\n**IRCoT迭代RAG性能显著低于Standard RAG**：作为迭代RAG的代表性方法，IRCoT在HotpotQA上仅0.133，而Standard RAG达到0.299。这揭示了简单堆砌迭代轮次而不做策略规划，反而会引入语义不连续和错误累积。\n\n**仅加规划模块对小模型反而有害**：在3B模型上，仅启用Plan而不加RL/SFT训练时，Eval得分从13.42降至12.63。这说明强制要求弱模型进行复杂任务分解会引入噪声和错误积累。\n\n## 2. 有启发性的分析或 ablation\n\n**参数敏感性揭示了边际效益递减规律**：图3显示检索文档数从1增至3时准确率大幅提升，但超过3后性能趋于平稳甚至下降；而推理hops从1增至5时性能持续上升。这表明文档数存在\"噪声干扰阈值\"，而推理深度仍有挖掘空间。\n\n**RL规划与SFT执行存在显著协同效应**：表2显示，7B模型单独用Plan（30.39）仅略高于基线（27.55），但叠加RL后达33.82，叠加SFT后达33.55，两者同时启用达37.64。这证明规划能力需要针对性训练才能生效，且与执行能力存在1+1>2的互补性。\n\n## 3. 对领域的新认知\n\n**规划能力是agentic RAG的关键缺失环节**：论文指出现有agentic RAG方法缺乏明确的任务规划，导致任务遗忘和重复检索。这改变了\"只要端到端训练就能学会\"的传统认知，揭示了显式规划模块的不可替代性。\n\n**混合训练策略优于纯端到端RL**：论文采用\"RL训练规划+SFT训练执行\"的两阶段范式，解决了纯RL在长程任务中的稀疏奖励和错误累积问题。这为复杂多步推理任务的训练提供了新范式。\n\n## 4. 实用的经验性结论\n\n**最优超参数配置**：检索文档数设为3，最大推理hops设为5，在4个基准上取得最佳平衡。\n\n**GRPO训练配置**：学习率5×10^-6，KL散度系数0.01，熵系数0.01，每组采样8条轨迹，梯度裁剪ε=0.2。\n\n**SFT训练配置**：学习率5×10^-6，cosine调度器，warmup比例0.03，最大序列长度32768，使用ZeRO-3和Flash Attention-2加速。\n\n## 5. 局限性中的机会\n\n**执行阶段的多轮RL优化**：论文提到未来可考虑在执行阶段引入多轮RL持续提升多轮检索能力，这可能解决当前仅靠SFT导致的执行策略僵化问题。\n\n**从本地库扩展到网络搜索**：当前系统基于Wikipedia等本地数据库，未来可扩展到开放网页搜索，这将为规划能力在动态、噪声环境下的表现提供新的研究空间。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 实验结果显示显著性能提升：7B模型从基线27.55提升到37.64（+10.09），3B模型从13.42提升到33.45（+20.03）\n- 论文声称解决了agentic RAG中\"任务遗忘和重复检索\"的关键问题\n- 消融实验证明规划能力与执行能力存在1+1>2的协同效应\n\n**负面证据或缺失**：\n- 仅在Wikipedia知识库上验证，未扩展到开放网页搜索\n- 未讨论实际应用场景的部署成本和延迟问题\n\n**判断**：中等\n\n**理由**：性能提升数据扎实，但应用场景局限于本地知识库检索，对更广泛的搜索场景（如开放域网页搜索）未做探索，限制了影响力的想象空间。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次明确提出\"RL训练规划+SFT训练执行\"的两阶段分离训练范式\n- 针对端到端RL的稀疏奖励问题提供了具体解决方案（使用分解质量F1作为奖励信号）\n\n**负面证据或缺失**：\n- 问题分解（decomposition）的思想在其他AI领域（如任务规划、程序合成）已有成熟研究\n- 论文未引用任何直接竞争的方法来论证其不可替代性\n\n**判断**：中等\n\n**理由**：将规划-执行分离的思想引入RAG领域是合理的，但核心思路的原创性有限，更多是跨领域方法论的迁移应用。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- RAG和agentic RAG是当前LLM应用的研究热点\n- 论文指出了现有迭代RAG方法（如IRCoT）的不足（HotpotQA上仅0.133 vs Standard RAG的0.299），说明问题确实存在\n- 消融实验显示CoT在RAG任务中反而损害性能（HotpotQA: 0.092 vs 0.183），表明领域对正确方法论有迫切需求\n\n**负面证据或缺失**：\n- 论文发表日期为2026年3月，属于未来时间（当前为2024年），时序上有混乱\n- 迭代RAG已有大量工作，论文进入该领域的时间偏晚\n\n**判断**：中等\n\n**理由**：问题确实存在且重要，但该方向已有相当多的竞争性工作，进入时间不占先机。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 明确挑战端到端训练范式，指出其\"推理执行路径模糊\"和\"奖励信号稀疏\"的问题\n- 实验证据挑战了CoT的有效性：CoT在RAG任务中反而损害性能（HotpotQA 0.092 vs Direct 0.183）\n- 挑战了\"迭代轮次越多越好\"的假设：IRCoT性能显著低于Standard RAG\n\n**负面证据或缺失**：\n- 未对整个RAG范式本身进行反思，仅在方法论层面做调整\n- 挑战力度有限，本质上仍是增量改进\n\n**判断**：中等\n\n**理由**：提供了有价值的实证发现（CoT和IRCoT的负面结果），但未触及根本性范式转移，更多是方法论层面的修正。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文标题已清晰传达：\"Augmenting LLMs' Search Capabilities through Agentic Planning and Execution\"\n- 研究问题明确：\"如何通过显式的任务规划来减少执行轨迹的模糊性\"\n\n**判断**：强\n\n**理由**：核心洞见可以用一句话概括：\"将复杂检索任务显式分解为子问题链，分别用RL训练规划能力、SFT训练执行能力\"。洞见清晰，区别于端到端方法。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 技术方案已在4个benchmark上验证，实验数据完整\n- GRPO和SFT是成熟的训练方法\n- 消融实验提供了充分的组件贡献分析\n\n**负面证据或缺失**：\n- 对小模型不友好：3B模型单独使用规划模块时性能反而下降（12.63 vs 13.42）\n- 依赖外部知识库质量，未讨论知识库缺失的处理\n- 规划-执行分离的静态假设不适合需要动态调整的任务\n\n**判断**：中等\n\n**理由**：技术风险可控，但存在明显的适用边界（小模型、知识库依赖、静态规划假设），这些限制在论文中未被充分解决。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 论文对规划模块和执行模块分别使用RL和SFT训练，这种混合训练策略在RAG领域较少见\n- 消融实验证明了协同效应的存在\n\n**负面证据或缺失**：\n- 未提供团队背景信息，无法判断独特优势\n- 未说明为何选择GRPO而非其他RL算法\n\n**判断**：中等\n\n**理由**：方法论上有一定独特性，但缺乏明确的团队优势论证，无法判断该工作是否非这个团队不可。\n\n---\n\n## 综合评价\n\n**值得深入关注**\n\n这篇论文在RAG领域提出了一个有价值的技术方向：显式任务规划+分离训练。其核心洞见（规划-执行分离）清晰，实验数据扎实（7B模型提升10分），消融实验揭示了有意义的发现（CoT的负面效果、规划与执行的协同效应）。但其应用场景局限于本地知识库，对小模型不友好，且缺乏向开放域搜索的扩展。总体而言，是一篇有技术贡献但影响力边界清晰的论文。\n\n---\n\n## 最致命的弱点\n\n**对开放域检索的适用性未经验证**\n\n论文仅在Wikipedia知识库上测试，而实际应用中更广泛的场景是开放网页搜索。规划能力在动态、噪声环境下的表现完全未知，这大大限制了方法的实际价值。\n\n---\n\n## 如果要做得更好\n\n1. **扩展到开放域搜索**：在真实网页搜索场景（如Bing API）上验证方法的有效性\n2. **提升小模型适用性**：通过知识蒸馏或模块化设计，使规划能力可以在小模型上生效\n\n---\n\n## 与 Carlini 原则的对照\n\n**最符合**：原则3——\"证明你的想法在关键场景中确实有效\"（在4个benchmark上用具体数据证明了规划-执行分离的有效性）\n\n**最不符合**：原则1——\"选择真正重要的问题\"（问题域重要，但具体贡献的增量有限，且应用场景过于狭窄）",
                    "summary_translation": "## 中文翻译\n\n检索增强生成（RAG，Retrieval-augmented generation）基于大型语言模型（LLMs，Large Language Models），是获取和利用外部知识的重要方法，广泛应用于各个领域。当面对复杂的多跳（multi-hop）问题时，单轮检索往往不足以进行准确推理和问题解决。为了增强复杂任务的搜索能力，大多数现有工作通过端到端训练将多轮迭代检索与推理过程相结合。尽管这些方法显著提升了问题解决性能，但在任务推理和模型训练方面仍面临挑战，特别是端到端强化学习（RL，Reinforcement Learning）过程中存在检索执行路径不明确和奖励稀疏的问题，导致检索结果不准确和性能下降。为解决这些问题，本文提出APEX-Searcher，这是一种新型的智能体规划与执行（Agentic Planning and Execution）框架，用于增强LLM的搜索能力。具体而言，我们引入了一个两阶段智能体框架，将检索过程解耦为规划和执行：首先采用具有分解特定奖励的强化学习来优化战略规划；在此基础上，基于子任务分解，对高质量的多跳轨迹进行监督微调，使模型具备强大的迭代子任务执行能力。大量实验表明，我们提出的框架在多个基准测试中，在多跳RAG和任务规划性能方面均取得了显著提升。\n\n---\n\n**术语说明：**\n\n- Retrieval-augmented generation (RAG)：检索增强生成\n- Large language models (LLMs)：大型语言模型\n- Multi-hop：多跳（指需要多步推理才能回答的复杂问题）\n- End-to-end training：端到端训练\n- Reinforcement learning (RL)：强化学习\n- Agentic Planning and Execution：智能体规划与执行\n- Supervised fine-tuning：监督微调\n- Trajectories：轨迹（指任务执行的完整路径序列）"
                },
                {
                    "title": "OpenSeeker: Democratizing Frontier Search Agents by Fully Open-Sourcing Training Data",
                    "arxiv_id": "2603.15594",
                    "authors": "Yuwen Du, Rui Ye, Shuo Tang, Xinyu Zhu, Yijun Lu, Yuzhu Cai, Siheng Chen",
                    "summary": "Deep search capabilities have become an indispensable competency for frontier Large Language Model (LLM) agents, yet the development of high-performance search agents remains dominated by industrial giants due to a lack of transparent, high-quality training data. This persistent data scarcity has fundamentally hindered the progress of the broader research community in developing and innovating within this domain. To bridge this gap, we introduce OpenSeeker, the first fully open-source search agent (i.e., model and data) that achieves frontier-level performance through two core technical innovations: (1) Fact-grounded scalable controllable QA synthesis, which reverse-engineers the web graph via topological expansion and entity obfuscation to generate complex, multi-hop reasoning tasks with controllable coverage and complexity. (2) Denoised trajectory synthesis, which employs a retrospective summarization mechanism to denoise the trajectory, therefore promoting the teacher LLMs to generate high-quality actions. Experimental results demonstrate that OpenSeeker, trained (a single training run) on only 11.7k synthesized samples, achieves state-of-the-art performance across multiple benchmarks including BrowseComp, BrowseComp-ZH, xbench-DeepSearch, and WideSearch. Notably, trained with simple SFT, OpenSeeker significantly outperforms the second-best fully open-source agent DeepDive (e.g., 29.5% v.s. 15.3% on BrowseComp), and even surpasses industrial competitors such as Tongyi DeepResearch (trained via extensive continual pre-training, SFT, and RL) on BrowseComp-ZH (48.4% v.s. 46.7%). We fully open-source the complete training dataset and the model weights to democratize frontier search agent research and foster a more transparent, collaborative ecosystem.",
                    "category": "cs.CL",
                    "cluster": "Search & Retrieval Agents",
                    "tags": ["cs.CL"],
                    "filter_reason": "**第一步：核心判断** 这篇论文的核心贡献是构建一个高性能的**搜索智能体（Search Agent）**系统，并完全开源了训练数据和模型权重。虽然搜索是一个具体应用领域，但论文的核心目标是**构建和改进LLM智能体本身**，而不是将LLM作为工具去解决某个特定领域的问题（如生物、医疗、金融等）。 论文提出的两个核心技术创新： 1. Fact-grounded scalable controllable QA synthesis - 生成复杂的多跳推理任务 2. Denoised trajectory synthesis - 去噪轨迹以提升动作质量 这些都是**构建智能体方法论**的贡献，而非单纯的应用落地。 **第二步：正面指标** - 核心范式：Search Agent 属于 Agentic AI 范畴 - 智能体能力：涉及多跳推理（multi-hop reasoning）、工具使用（搜索行为） - 论文明确提到训练智能体达到\"frontier-level performance\"，属于构建Agentic LLM的范畴 **第三步：排除标准** - 安全与对齐：未涉及 ✓ - 多模态与视觉：未涉及 ✓ - 图：未涉及 ✓ **第四步：特殊处理** 虽然搜索是具体应用场景，但论文的核心贡献是提出通用的搜索智能体训练方法（数据合成、轨迹去噪），这符合\"构建LLM智能体的新框架\"这一保留标准。论文明确指出目标是\" democratize frontier search agent research\"，是将搜索智能体作为研究对象本身，而非将智能体作为解决其他领域问题的工具。 **结论** 该论文符合筛选标准，属于构建/改进LLM智能体的研究，虽然应用场景是搜索，但其核心贡献在于智能体本身的构建方法论。",
                    "intro_logic": "1. 在信息爆炸时代，从互联网上寻求准确、实时、可靠的信息已成为现代决策的基础支柱\n2. 执行深度搜索的能力已成为前沿Large Language Model agents不可或缺的核心竞争力\n3. 过去一年间，search agents领域发展迅速，截至2026年3月，已有超过十个agentic LLMs在代表性基准BrowseComp上突破50分大关\n4. 然而，高性能search agents的训练仍然是一个由资金充足的行业巨头主导的“闭门游戏”\n5. 目前最强大的search agents主要被Google和OpenAI等科技巨头垄断\n6. 即便是Kimi、Minimax等知名实验室虽贡献了open-weights模型，却对训练数据保持沉默\n7. 现有研究工作要么仅开源模型而未开源数据，要么仅提供一小部分数据，要么性能缺乏竞争力\n8. 这种持续的高质量训练数据匮乏从根本上阻碍了更广泛研究社区在该领域的发展与创新\n9. 为了弥合这一差距，我们（一个纯学术团队）推出了OpenSeeker\n10. OpenSeeker是首个达到前沿性能水平的完全开源search agent（模型和数据）\n11. 研究问题：如何通过完全开源的高质量训练数据，使学术社区能够训练出与行业巨头相竞争的前沿搜索智能体？",
                    "core_insight": "# OpenSeeker 论文分析\n\n## 1. 关键洞察（The Seed Insight）\n\n### 一句话概括\n\n作者意识到**现有搜索agent训练数据的核心问题不是数量不足，而是缺乏能够真正强制模型进行多步推理的复杂问题结构**——通过反向工程真实web图的拓扑结构来构建问题，可以生成既事实可靠又难度可控的训练数据。\n\n### 展开解释\n\n论文开篇即点明核心困境：\n\n> \"the development of high-performance search agents remains dominated by industrial giants due to a lack of transparent, high-quality training data.\"\n\n但作者进一步洞察到更深层的问题：**现有数据合成方法生成的问题过于简单，模型可以通过表面模式匹配解决**。原文指出：\n\n> \"our QA synthesis framework is designed to move beyond simple retrieval-based tasks that current models often solve through superficial pattern matching.\"\n\n作者发现，真实web的**拓扑结构本身就是一个天然的推理图谱**——通过利用网页之间的链接关系，可以构建必须遍历多个节点才能回答的问题。这种方法不仅确保了问题的**事实可靠性**（\"fact-grounded\"），还实现了**难度可控性**（通过调整子图大小k来控制复杂度）。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n### 推理链条\n\n**洞察** → **问题分析** → **方法设计**\n\n| 推理步骤 | 内容 |\n|---------|------|\n| 洞察 | Web拓扑结构 = 隐含的推理路径 |\n| 问题 | 如何将静态链接转化为动态推理任务？ |\n| 方法 | 反向工程：从链接图 → 实体子图 → 混淆问题 |\n\n具体方法论对应：\n\n1. **Graph Expansion**: 从种子页面出发，扩展k个连接节点，形成局部依赖子图\n2. **Entity Extraction**: 提取关键实体，构建实体子图（保留拓扑关系）\n3. **Entity Obfuscation**: 将具体实体映射为模糊描述，强制模型通过推理而非关键词匹配\n4. **Denoised Trajectory Synthesis**: 训练时使用原始嘈杂响应，但合成时使用摘要——**强制模型学习\"透过噪声看本质\"的能力**\n\n原文总结了这一设计哲学：\n\n> \"This decoupling compels the agent to internalize robust information-extraction capabilities, learning to 'see through the noise' to identify the essential signals required for frontier-level performance.\"\n\n---\n\n## 3. 试错历程与意外发现\n\n### 3.1 资源约束下的单次训练\n\n论文明确提到：\n\n> \"Due to resource constraints, we can only train for a single run, limiting not only the verification of effectiveness on more challenging data, but also the exploration of various parameters and data filtering strategies.\"\n\n这意味着作者**没有进行超参数调优或数据过滤**，当前结果只是一个**下界**。这既是限制，也说明方法的有效性。\n\n### 3.2 中英文数据质量差异\n\n一个有趣的发现是**中文数据难度反而高于英文**：\n\n> \"Due to resource constraints, our English data has not yet been updated to the latest QA standards, resulting in slightly lower difficulty compared to the Chinese data\"\n\nFigure 4显示：\n- 中文合成数据：平均46.35次工具调用，76.1k tokens\n- BrowseComp-ZH：平均26.98次工具调用，15.1k tokens\n\n这说明**数据质量与数量无关，而与合成方法的设计直接相关**。\n\n### 3.3 新的子问题\n\n作者在讨论中提到：\n\n> \"we aim to optimize data distributions, implement rigorous quality filtering, and generate training data of even higher complexity to push the boundaries of performance.\"\n\n这暗示未来需要解决的问题：\n- 如何自动过滤低质量合成样本？\n- 如何进一步提升问题复杂度？\n- 如何扩展到更多工具和场景？\n\n---\n\n## 总结\n\n| 维度 | 核心要点 |\n|------|---------|\n| **洞察** | Web拓扑结构本身即推理图谱，可反向工程为训练数据 |\n| **方法** | 图扩展 + 实体混淆 + 去噪轨迹合成 |\n| **验证** | 11.7k样本 > 147k基线，性能超越工业模型 |\n| **局限** | 单次训练，无超参调优，结果仍有提升空间 |\n\n这个工作的\"灵光一闪\"在于：**不是从问题出发生成数据，而是从真实web的拓扑结构出发，逆向构造必须使用该结构才能解决的问题**——这既保证了数据的真实性，又实现了难度的可控性。",
                    "methodology": "# OpenSeeker 论文解读\n\n## 一句话概括核心创新\n\n这篇论文最本质的区别是：**通过反向工程真实网页的链接结构来生成需要多步推理的复杂问题，并让训练数据中的轨迹包含\"干净摘要\"而训练时使用\"原始噪声数据\"，从而让模型学会在噪声中提取关键信息**——这样只需要1万多条样本就能训练出和工业界几十亿参数模型相媲美的搜索代理。\n\n---\n\n## 按照执行逻辑顺序拆解\n\n论文的方法分为两大核心模块：\n\n**模块一：问题生成（QA Synthesis）** —— 怎么制造出足够难的问题\n\n**模块二：轨迹生成（Trajectory Synthesis）** —— 怎么制造出高质量的解题过程\n\n---\n\n## 模块一：问题生成（Fact-grounded Scalable Controllable QA Synthesis）\n\n### 第一步：图扩展（Graph Expansion）\n\n**输入**：从海量网页中随机选一个种子页面\n\n**操作**：沿着这个页面的出链接，爬取k个相连的页面，形成一个局部子图\n\n**输出**：一个由多个网页组成的连通子图\n\n**目的**：模拟真实的信息发现过程——从一个线索出发，顺藤摸瓜找到更多相关页面。单个页面信息往往不够复杂，需要多个页面才能回答复杂问题。\n\n**如果不做会怎样**：如果只用一个页面生成问题，问题的复杂度受限，无法训练模型进行多步推理。\n\n---\n\n### 第二步：实体提取（Entity Extraction）\n\n**输入**：上一步得到的网页子图\n\n**操作**：用一个生成模型从这些页面中提取关键实体（人名、机构名、事件等），并保留它们之间的关联关系，形成一个\"实体子图\"\n\n**输出**：一个结构化的实体关系图（节点是实体，边是关系）\n\n**目的**：把原始网页的噪音文本转换成干净的实体关系结构，让后续生成问题时模型能聚焦于信息逻辑而非被无关内容干扰。\n\n**如果不做会怎样**：直接用原始网页内容生成问题会产生大量无关干扰，生成的问题质量不稳定。\n\n---\n\n### 第三步：问题生成（Question Generation）\n\n**输入**：实体子图 + 一个核心主题（答案）\n\n**操作**：让生成模型根据实体子图的结构，生成一个必须跨越多个实体节点才能推导出答案的问题\n\n**输出**：一个初始问题\n\n**目的**：确保问题必须通过多跳推理（多个步骤）才能回答，而不是简单搜索一个关键词就能搞定。\n\n**如果不做会怎样**：模型可能只训练出\"一步到位\"的搜索能力，无法处理需要多轮交互的复杂任务。\n\n---\n\n### 第四步：实体混淆（Entity Obfuscation）\n\n**输入**：初始问题 + 实体子图\n\n**操作**：把具体实体名称替换成模糊的描述（比如\"某科技公司\"代替\"腾讯\"）\n\n**输出**：一个包含模糊描述的问题\n\n**目的**：防止模型通过记住具体实体名称来\"作弊\"回答问题，强制模型真正进行推理而不是匹配关键词。\n\n**如果不做会怎样**：模型可能学会根据问题中的特定关键词直接搜答案，而不是真正理解问题逻辑。\n\n---\n\n### 第五步：双重验证（Dual-Criteria Verification）\n\n**输入**：生成的问题和答案\n\n**操作**：用两个标准筛选：\n1. **难度验证**：让一个基础模型在不借助工具的情况下回答，如果能答对就丢弃（说明问题太简单）\n2. **可解性验证**：让模型在能看到所有实体子图内容的情况下回答，如果答不对也丢弃（说明问题无解或有逻辑错误）\n\n**输出**：通过筛选的高质量问答对\n\n**目的**：确保生成的问题既足够难（必须用工具），又确实有解（不是瞎编的问题）。\n\n**如果不做会怎样**：训练数据中会混入太简单的问题或无解的问题，训练效果会变差。\n\n---\n\n## 模块二：轨迹生成（Denoised Trajectory Synthesis）\n\n### 核心思路\n\n训练搜索代理需要\"问题 + 答案 + 解题过程（轨迹）\"。但真实网页返回的内容充满噪音，直接用这些噪音内容训练模型效果不好。\n\n论文的解决办法是：**生成轨迹时用干净摘要，训练模型时用原始噪音**。\n\n---\n\n### 第一步：生成去噪后的轨迹（Teacher阶段）\n\n**输入**：问题 + 原始网页返回结果\n\n**操作**：\n- 每一步的决策（思考什么、调用什么工具）基于\"历史摘要 + 最近一步的原始结果\"\n- 每次得到新的网页返回后，用另一个模型把它压缩成简短摘要\n- 后续决策时，用摘要代替原始内容（减少噪音）\n\n**输出**：高质量的解题轨迹（包含思考过程、工具调用、工具返回）\n\n**目的**：让生成轨迹的模型能在一个相对干净的环境下工作，产生高质量的解题路径。\n\n**如果不做会怎样**：直接用充满噪音的原始网页内容生成轨迹，模型容易产生错误的解题路径。\n\n---\n\n### 第二步：训练时使用原始轨迹（Student阶段）\n\n**输入**：问题 + 原始（未摘要）的工具返回结果\n\n**操作**：让被训练的模型基于充满噪音的原始历史记录，预测上一步去噪轨迹中\"老师\"做出的正确决策\n\n**输出**：训练好的模型\n\n**目的**：强制模型学会在噪音中提取关键信息，这是真实场景中必备的能力。\n\n**如果不做会怎样**：模型只会在干净环境下工作，遇到真实噪音时性能会大幅下降。\n\n---\n\n## 消融实验分析\n\n论文没有独立的\"消融实验\"章节，但通过对比实验可以推断各组件的贡献：\n\n### 1. 数据量的对比\n\n| 模型 | 样本数 | BrowseComp | xbench | WideSearch |\n|------|--------|------------|--------|------------|\n| MiroThinker | 147k | 10.6 | - | - |\n| WebLeaper | 15k | 27.7 | - | 44.1 |\n| WebSailor-V2 | ~10k | 24.4 | 61.7 | - |\n| **OpenSeeker** | **11.7k** | **29.5** | **74.0** | **59.4** |\n\n**结论**：OpenSeeker用更少的样本取得了明显更好的效果，说明数据质量（而非数量）是关键。\n\n### 2. 与同类数据的对比\n\n论文中表3显示，使用约11.7k样本的OpenSeeker数据，效果显著优于使用10k-15k样本的其他数据组合（WebSailor + WebLeaper）。\n\n**结论**：QA合成方法（模块一）生成的问题难度更高、更适合训练。\n\n### 3. 轨迹去噪的效果\n\n论文提到：Chinese数据平均每个轨迹需要46.35次工具调用，而BrowseComp-ZH只需要26.98次。这说明去噪轨迹合成让模型学会了处理更复杂的任务。\n\n**结论**：去噪轨迹合成（模块二）让模型能够处理更长、更复杂的推理链。\n\n### 4. 哪个组件贡献最大？\n\n从论文数据来看：\n\n- **QA合成方法**贡献更大：它直接决定了问题难度，难度不够的数据无法训练出强大的推理能力\n- **去噪轨迹合成**是必要条件：没有它，模型无法在真实噪音环境下工作\n\n---\n\n## 这套方法的硬伤（Limitation）\n\n### 1. 资源限制\n\n论文明确提到：由于资源限制，只进行了一次训练，没有做数据过滤或超参数调优。这意味着性能还有很大提升空间。\n\n**大白话**：他们只跑了一次实验，如果多调调参数、多过滤一下数据，效果可能还能提升很多。\n\n### 2. 数据规模有限\n\n- 英文数据约10.3k样本，中文数据约1.4k样本\n- 论文承认英文数据的难度略低于中文数据（因为还没更新到最新标准）\n\n**大白话**：虽然效果很好，但数据量其实不大，如果能生成更多样本，效果可能还能进一步提升。\n\n### 3. 对基础模型有依赖\n\n整个pipeline依赖一个强大的基础模型（Qwen3-30B-A3B）来：\n- 生成问题\n- 验证问题难度\n- 生成轨迹\n\n如果基础模型本身能力不足，整个pipeline的效果都会受限。\n\n**大白话**：这方法不是从零开始的，需要一个已经比较聪明的模型来当\"老师\"。\n\n---\n\n## 总结\n\n这篇论文的核心价值在于：**证明了通过精妙的数据合成方法，即使是小规模的学术团队也能训练出与工业界巨头相竞争的搜索代理**。\n\n关键洞察：\n1. **问题难度**比数据量更重要——用网页拓扑结构生成的多跳推理问题比简单收集的问答对更有价值\n2. **去噪能力**需要专门训练——通过\"生成用摘要、训练用原文\"的非对称设计，让模型学会在噪音中工作\n3. **开源精神**——把完整的数据和模型都开源了，让社区可以复现和改进",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **小数据集反而更强**：仅用11.7k样本的OpenSeeker显著超越使用147k样本的MiroThinker（BrowseComp: 29.5% vs 10.6%），表明数据质量远重于数量。\n- **简单SFT超越复杂训练管线**：仅用SFT训练的OpenSeeker在BrowseComp-ZH上超越Tongyi DeepResearch（48.4% vs 46.7%），后者使用了CPT+SFT+RL的复杂流程。\n- **中文数据难度更高**：尽管中文数据仅1.4k样本，但其复杂度远超英文数据（平均46.35次工具调用 vs 英文的45.92次），导致中文benchmark表现更优。\n\n## 2. 有启发性的分析或ablation\n\n- **数据难度对比**：论文用同一模型对合成数据和benchmark推理，发现OpenSeeker-v1-Data-ZH平均46.35次工具调用、76.1k tokens，远超BrowseComp-ZH的26.98次调用、15.1k tokens，证明合成数据难度足够。\n- **同量级数据对比**（表3）：在10k-15k样本量级，OpenSeeker在xbench和WideSearch上分别领先baseline约8%和15%，验证了合成方法的高效性。\n- **与并发工作对比**（表4、图6）：OpenSeeker用11.7k样本超越OpenResearcher的96k样本；工具调用数也高于REDSearcher（EN: 45.92 vs 36.91; ZH: 46.35 vs 20.02）。\n\n## 3. 对领域的新认知\n\n- **数据是核心瓶颈**：论文揭示搜索agent领域长期被\"data moat\"困扰，工业界的优势本质在于数据而非模型架构或训练技巧。\n- **合成数据可替代真实人工标注**：通过图扩展+实体混淆生成的QA对能达到甚至超过真实benchmark的难度和有效性。\n- **denoising能力可被显式训练**：将原始含噪轨迹作为训练输入、干净摘要作为teacher输出，能让模型学会\"透过噪声找信号\"。\n\n## 4. 实用的经验性结论\n\n- **单次训练仍有提升空间**：论文默认超参数、无数据过滤即达SOTA，说明合成数据质量高，暗示进一步优化空间很大。\n- **图扩展参数k控制难度**：通过调整子图大小k可调节推理复杂度，便于构建课程学习数据。\n- **工具调用上限200足够**：论文设置最大200次调用即覆盖绝大多数任务，证明该阈值合理。\n\n## 5. 局限性中的机会\n\n- **英文数据未更新**：当前英文数据难度略低于中文（因未采用最新QA标准），更新英文数据合成流程有望进一步提升英文benchmark表现。\n- **仅用SFT、无RL**：作者指出未探索RL训练，RL可能进一步释放数据潜力。\n- **单一训练run**：资源限制导致无超参数搜索和迭代优化，未来可探索数据过滤策略、课程学习、模型规模扩展等方向。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文声称是\"首个完全开源的search agent（模型和数据）达到前沿性能\"\n- 在BrowseComp-ZH上超越了Tongyi DeepResearch（46.7%），后者使用了CPT+SFT+RL的复杂流程\n- 论文明确指出解决了搜索agent领域长期被\"data moat\"（数据护城河）困扰的问题\n\n**负面证据或缺失**：\n- 数据规模有限（英文10.3k，中文1.4k样本）\n- 仅进行了一次训练，无超参数调优\n\n**判断**：中等\n\n**理由**：论文确实回应了社区对开源数据的迫切需求，但其影响力受限于小规模数据和单次训练。如果社区基于此数据做出更多创新，才算真正产生广泛影响。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次完整开源了search agent的训练数据和模型权重\n- 提出了\"生成用摘要、训练用原文\"的去噪轨迹合成方法\n- 通过图扩展+实体混淆生成高质量多跳推理问题\n\n**负面证据或缺失**：\n- 图扩展的思想在知识图谱构建中已有类似方法\n- 去噪训练的思想在其他领域（如蒸馏）也有应用\n\n**判断**：中等\n\n**理由**：虽然各组件单独来看并非全新想法，但将它们组合用于search agent训练并达到SOTA效果的做法是独特的，具有一定的不可替代性。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- 搜索agent领域正处于快速发展期：截至2026年3月，已有超过10个agentic LLMs在BrowseComp上突破50分\n- 工业界垄断高性能search agents，学术界缺乏开源数据和模型\n- 论文明确指出这是一个\"闭门游戏\"，社区需要开源资源\n\n**负面证据或缺失**：\n- 论文承认英文数据难度略低于中文（因未采用最新QA标准）\n\n**判断**：强\n\n**理由**：时机恰到好处——领域正在上升期，工业界和学术界的差距在扩大，论文及时提供了社区亟需的开源资源。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 挑战了\"大数据量=高性能\"的传统观念：11.7k样本显著超越147k样本\n- 挑战了复杂训练流程的必要性：仅用SFT超越使用CPT+SFT+RL的Tongyi DeepResearch\n- 揭示了工业界优势本质在于数据而非模型架构\n\n**负面证据或缺失**：\n- 论文没有明确质疑某个被盲目沿用的具体做法\n- 更多是通过实验结果间接挑战，而非直接批判\n\n**判断**：中等\n\n**理由**：论文用实验结果挑战了数据量和复杂训练流程的必要性，但缺乏对现有范式的直接、系统性的审视。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 输入材料中已有一句话概括：\"通过反向工程真实网页的链接结构来生成需要多步推理的复杂问题，并让训练数据中的轨迹包含'干净摘要'而训练时使用'原始噪声数据'，从而让模型学会在噪声中提取关键信息\"\n\n**判断**：强\n\n**理由**：核心洞见可以用一句话清晰表达，且区分了\"洞见\"（为什么这样做）和\"做法\"（具体怎么实现）。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 技术方案已在多个benchmark上验证成功\n- 资源限制下单次训练即达SOTA，说明方法稳定\n- 工具调用上限200次即覆盖绝大多数任务\n\n**负面证据或缺失**：\n- 依赖强大的基础模型（Qwen3-30B-A3B）来生成问题和轨迹\n- 资源限制导致无超参数搜索和迭代优化\n- 英文数据未更新到最新标准\n\n**判断**：中等\n\n**理由**：技术风险相对可控，但存在对基础模型能力的依赖，且资源限制意味着性能还有很大提升空间。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 纯学术团队背景，敢于与工业界竞争\n- 在数据合成和去噪轨迹方法上有独特创新\n- 论文数据显示用更少样本达到更好效果\n\n**负面证据或缺失**：\n- 资源有限（只有一次训练机会）\n- 团队规模和数据积累不如工业界\n\n**判断**：中等\n\n**理由**：学术团队在资源上处于劣势，但通过创新的数据合成方法弥补了差距，证明了\"小团队+好数据\"也能与工业界竞争。\n\n---\n\n## 综合评价\n\n**值得深入关注**\n\n这篇论文的核心价值在于证明了\"数据质量比数量更重要\"——通过精妙的数据合成方法，仅用11.7k样本就能训练出与工业界巨头相竞争的搜索agent。作为首个完全开源的search agent（模型+数据），它为学术社区提供了宝贵的研究基础。其去噪轨迹合成方法（生成用摘要、训练用原文）是一个有启发性的创新。但需注意，英文数据质量未达最新标准，且对基础模型有依赖，这些因素可能限制其广泛影响。\n\n---\n\n## 最致命的弱点\n\n英文数据质量未更新到最新标准，导致英文benchmark表现相对较弱。这是论文明确承认的局限性，也是影响其广泛影响力的关键短板。\n\n---\n\n## 如果要做得更好\n\n1. **更新英文数据合成流程**：采用与中文数据相同的最新QA标准，提升英文数据难度\n2. **探索RL训练**：作者指出未探索RL训练，RL可能进一步释放数据潜力\n\n---\n\n## 与 Carlini 原则的对照\n\n**最符合**：做别人不做的事——选择开源完整的训练数据和模型，挑战工业界的\"data moat\"\n\n**最不符合**：做简单的事——整个pipeline技术复杂度较高，涉及图扩展、实体混淆、去噪轨迹合成等多个复杂组件",
                    "summary_translation": "深度搜索能力已成为前沿大型语言模型（LLM）代理不可或缺的核心能力，然而，由于缺乏透明、高质量的训练数据，高性能搜索代理的开发仍然由行业巨头主导。这种持续的数据稀缺从根本上阻碍了更广泛的研究社区在该领域开展研发与创新的进程。为弥补这一差距，我们推出了OpenSeeker，这是首个实现前沿性能的全开源搜索代理（即模型和数据），其通过两项核心技术创新实现：(1) **基于事实的可扩展可控问答合成**（Fact-grounded scalable controllable QA synthesis），该方法通过拓扑扩展（topological expansion）和实体混淆（entity obfuscation）对网络图进行逆向工程，生成具有可控覆盖范围和复杂性的复杂多跳推理任务；(2) **去噪轨迹合成**（Denoised trajectory synthesis），该方法采用回顾性总结机制对轨迹进行去噪，从而促使教师LLM生成高质量的动作。实验结果表明，OpenSeeker仅在11.7k个合成样本上训练（单次训练运行），便在多个基准测试（包括BrowseComp、BrowseComp-ZH、xbench-DeepSearch和WideSearch）中实现了最先进的性能。值得注意的是，通过简单的监督微调（SFT）训练，OpenSeeker显著超越了表现最佳的全开源代理DeepDive（例如在BrowseComp上29.5%对比15.3%），甚至超越了行业竞争对手——如通义深度研究（Tongyi DeepResearch，该模型通过大规模的持续预训练、SFT和强化学习训练而成）——在BrowseComp-ZH上的表现（48.4%对比46.7%）。我们将完整的训练数据集和模型权重完全开源，以推动前沿搜索代理研究的普及，并培育一个更加透明、协作的生态系统。"

                    "summary": "Every agent interaction generates a next-state signal, namely the user reply, tool output, terminal or GUI state change that follows each action, yet no existing agentic RL system recovers it as a live, online learning source. We present OpenClaw-RL, a framework built on a simple observation: next-state signals are universal, and policy can learn from all of them simultaneously. Personal conversations, terminal executions, GUI interactions, SWE tasks, and tool-call traces are not separate training problems. They are all interactions that can be used to train the same policy in the same loop. Next-state signals encode two forms of information: evaluative signals, which indicate how well the action performed and are extracted as scalar rewards via a PRM judge; and directive signals, which indicate how the action should have been different and are recovered through Hindsight-Guided On-Policy Distillation (OPD). We extract textual hints from the next state, construct an enhanced teacher context, and provide token-level directional advantage supervision that is richer than any scalar reward. Due to the asynchronous design, the model serves live requests, the PRM judges ongoing interactions, and the trainer updates the policy at the same time, with zero coordination overhead between them. Applied to personal agents, OpenClaw-RL enables an agent to improve simply by being used, recovering conversational signals from user re-queries, corrections, and explicit feedback. Applied to general agents, the same infrastructure supports scalable RL across terminal, GUI, SWE, and tool-call settings, where we additionally demonstrate the utility of process rewards. Code: https://github.com/Gen-Verse/OpenClaw-RL",

                    "filter_reason": "**核心判断：** 这篇论文的核心贡献是构建一个**通用的LLM智能体自我演化训练框架**（OpenClaw-RL），完全符合我的研究目标。 **符合保留条件的分析：** 1. **核心范式匹配**：论文明确聚焦于Agentic LLM的自我演化训练，提出了利用\"next-state signals\"（下一状态信号）进行在线学习的全新范式。 2. **自我演化机制**：论文提出了两种关键的演化机制： - **评估信号（Evaluative Signals）**：通过PRM（Process Reward Model）判断器提取标量奖励 - **指令信号（Directive Signals）**：通过Hindsight-Guided On-Policy Distillation (OPD)恢复，构造增强的教师上下文，提供token级别的方向性优势监督 这是一种典型的**自我改进（Self-Improvement）**和**迭代优化**机制。 3. **智能体能力建设**：该框架支持多种智能体场景（个人对话智能体、终端交互、GUI、SWE任务、工具调用），体现了智能体通过经验进行自主学习和演化的能力。 **不属于排除范围：** - ✗ 不是非演化型应用：论文核心是提出通用的自我演化训练方法论，而非将现有智能体应用于特定领域 - ✗ 不是纯推理改进：虽然涉及规划，但核心是智能体的自我演化训练框架 - ✗ 不涉及安全对齐、多模态、图等技术 **结论：** 该论文的**核心贡献**是提出一种新的LLM智能体自我演化训练框架，使智能体能够通过与环境的交互（用户回复、工具输出等）实现持续自我改进。这直接对应我的研究焦点中的\"自我演化（Self-Evolving）\"方向，属于构建和改进LLM智能体的方法论研究，**完全符合**筛选标准。",
                    "intro_logic": "## Introduction 部分逻辑链条\n\n1. 现状观察：每个部署的 AI agent 已经在收集改进所需的数据，但随后丢弃了这些数据\n\n2. 现象描述：agent 每次采取动作后都会收到 next-state signal（用户回复、工具执行结果、GUI 状态转换或测试 verdict）\n\n3. 问题识别：现有系统仅将 next-state signal 作为下一个动作的上下文（context），没有将其作为学习信号利用\n\n4. 核心论点：next-state signals 编码了关于动作的隐式评估信息，包括执行得好不好，以及通常应该如何不同\n\n5. 普遍性论证：这种信号在所有交互类型中免费产生，包括个人对话、终端环境、GUI 环境、SWE 任务和工具调用环境\n\n6. 研究空白：尽管 next-state signals 无处不在，但没有现有的 agentic RL 系统将它们作为实时的、在线的学习来源\n\n7. 浪费资源一：Evaluative signals（评估信号）被忽视——用户重新提问表示不满意，测试通过表示成功，错误追踪表示失败，这些形成了自然的 process reward\n\n8. 浪费资源二：Directive signals（指令信号）被忽视——用户说\"你应该先检查文件\"不仅表明响应错误，还具体说明了应该如何修改\n\n9. **研究问题**：如何从异构交互类型中实时回收 next-state signals 作为统一的在线学习来源，使 agent 能够通过正常交互持续改进？",
                    "core_insight": "# OpenClaw-RL 论文分析\n\n## 1. 关键洞察（The Seed Insight）\n\n**一句话概括**：作者发现每个智能体交互后产生的\"下一个状态信号\"（用户回复、工具执行结果、GUI状态变化、测试判决）实际上编码了关于智能体行为表现的评估信息和改进方向，但这些信息被现有系统当作上下文丢弃了，而不是作为实时在线学习信号回收利用。\n\n**展开解释**：\n\n论文开篇即指出了这个核心洞察：\n\n> \"Every deployed AI agent is already collecting the data it needs to improve and discarding it. After each action $a_t$, the agent receives a next-state signal $s_{t+1}$: a user reply, a tool execution result, a GUI state transition, or a test verdict. Existing systems treat this purely as context for the next action.\"\n\n作者进一步强调：\n\n> \"Every agent interaction generates a next-state signal, namely the user reply, tool output, terminal or GUI state change that follows each action, yet no existing agentic RL system recovers it as a live, online learning source.\"\n\n这个洞察的突破性在于：**现有所有agentic RL系统都把next-state signal当作\"需要遗忘的上下文\"来处理，而作者意识到这恰恰是最有价值的学习信号来源**。用户重新提问意味着不满意，测试通过意味着成功，错误trace意味着失败——这些信号天然就是reward signal，只是从未被系统性地提取和利用。\n\n---\n\n## 2. 从洞察到方法的桥梁\n\n**推理链条**：\n\n1. **洞察起点**：next-state signal $s_{t+1}$ 编码了两种信息：\n   - **Evaluative signals（评估性信号）**：指示行为做得好不好（用户满意否？测试通过否？）\n   - **Directive signals（指令性信号）**：指示行为应该怎样不同（用户说\"你应该先检查文件\"）\n\n2. **方法论转化**：\n   - 对于**评估性信号** → 用PRM（Process Reward Model）将其转化为标量reward：$r = PRM(a_t, s_{t+1}) \\in \\{+1, -1, 0\\}$\n   - 对于**指令性信号** → 用Hindsight-Guided On-Policy Distillation (OPD)将其转化为token-level advantage supervision\n\n3. **OPD的具体操作**（见Section 4.2）：\n   - 从$s_{t+1}$中提取hint（通过Judge模型）\n   - 将hint拼接到原始prompt得到$s_{enhanced} = s_t \\oplus hint$\n   - 计算token-level advantage：$A_t[k] = \\log \\pi_{teacher}(a_t[k] | s_{enhanced}) - \\log \\pi_\\theta(a_t[k] | s_t)$\n   - 正的$A_t$表示学生应该增加该token的概率，负的表示应该减少\n\n4. **统一框架**：论文将这两种方法结合：\n   > \"We propose combining these two complementary methods with a weighted loss function... $A_t = w_{binary} r_{final} + w_{opd}(\\log \\pi_{teacher}(a_t | s_{enhanced}) - \\log \\pi_\\theta(a_t | s_t))$\"\n\n**关键设计决策**：作者没有将不同类型的agent（personal, terminal, GUI, SWE, tool-call）视为不同的训练问题，而是坚持：\n> \"Personal conversations, terminal executions, GUI interactions, SWE tasks, and tool-call traces are not separate training problems. They are all interactions that can be used to train the same policy in the same loop.\"\n\n---\n\n## 3. 试错历程与意外困难\n\n论文中虽然没有明确的\"试错\"叙事，但可以从技术细节中推断出几个关键挑战和调整：\n\n### 3.1 OPD的样本稀疏性问题\n\n**问题**：OPD需要从next-state signal中提取具体的directive hint，但并非所有交互都有这样的hint。\n\n**解决**：作者设计了严格的过滤机制——只有当score=+1且hint长度>10字符时才保留样本：\n> \"Among positive votes with hints >10 characters, select the longest (most informative). If no valid hint exists, drop the sample entirely, this is deliberate. OPD trades sample quantity for signal quality\"\n\n这体现了**方法论上的务实调整**：与其在噪声数据上训练，不如只保留高信噪比的样本。\n\n### 3.2 PRM判断的不确定性\n\n**问题**：用户回复往往是隐式的（可能只是\"好的\"或沉默），难以判断满意与否。\n\n**解决**：采用**多数投票机制**：\n> \"We run $m$ independent queries and take majority vote $r_{final} = MajorityVote(r_1, ..., r_m)$\"\n\n这降低了单次判断的方差，提高了reward信号的可靠性。\n\n### 3.3 异步架构的设计挑战\n\n**问题**：实时训练需要处理多个并发交互流，同时不能中断推理服务。\n\n**解决**：作者采用了完全解耦的异步架构（Section 3.1）：\n> \"policy serving, environment hosting, PRM judging, and policy training run as four completely independent asynchronous loops with no blocking dependencies between them\"\n\n这使得模型可以在服务用户的同时进行训练，实现了**零服务中断的持续学习**。\n\n### 3.4 General Agent场景下的credit assignment\n\n**问题**：长程任务中outcome-only reward无法提供足够的梯度信号。\n\n**解决**：集成process reward和outcome reward（Section 4.4）：\n> \"Integrating outcome and process rewards leads to stronger optimization than using only outcome rewards\"\n\n---\n\n## 总结\n\n这篇论文的核心洞察非常简洁但深刻：**智能体交互中产生的\"副作用\"（用户回复、执行结果等）本身就是最丰富的学习信号，只是从未被系统性地回收**。作者由此构建了一套统一的框架，将不同场景的next-state signals转化为两种互补的学习信号（binary RL + OPD），并通过异步基础设施实现了真正的持续在线学习。这个思路类似于\"变废为宝\"——把被丢弃的上下文变成训练数据。",
                    "methodology": "# OpenClaw-RL 论文解读\n\n## 一句话概括核心创新\n\n这篇论文最本质的区别是：**不再把用户回复、工具执行结果等\"下一状态信号\"仅仅当作下一轮对话的上下文，而是把它们当作实时的学习信号来训练策略模型**。换句话说，agent每次交互后产生的信息，不仅可以用来决定下一步做什么，还可以直接用来改进模型本身，而且这个过程是**在线**发生的——边用边学，不需要预先收集数据。\n\n---\n\n## 按执行逻辑顺序拆解\n\n整个系统分为两大track：**个人Agent**（对话场景）和**通用Agent**（终端、GUI、SWE、工具调用）。我先讲个人Agent的完整流程，因为它最能体现核心思想。\n\n### 个人Agent流程（核心创新所在）\n\n**第一步：收集交互数据**\n\n- **输入**：用户和Agent之间的对话历史\n- **操作**：Agent生成回复，同时记录生成每个token时的log概率（logp_old）\n- **输出**：把这次交互的（prompt_ids, response_ids, logp_old）存入缓冲区\n- **目的**：为后续的奖励计算和训练准备原始数据\n\n**第二步：从下一状态提取评估信号**\n\n- **输入**：Agent的回复 + 用户的下一条回复（或工具执行结果）\n- **操作**：用一个PRM（过程奖励模型）来判断这个回复是好（+1）、坏（-1）、还是中性（0）。具体做法是并行调用m次PRM，取多数投票\n- **输出**：一个标量奖励 r ∈ {+1, -1, 0}\n- **目的**：把用户的反应（满意/不满意/重问）转化为可学习的信号。这就是论文说的\"Waste 1——Evaluative signals\"\n- **如果不做会怎样**：模型只能从最终结果学习，无法利用中间过程的反馈，学习信号太稀疏\n\n**第三步（可选）：从下一状态提取指令信号**\n\n- **输入**：Agent的回复 + 用户的下一条回复\n- **操作**：\n  1. 让PRM判断这个下一状态是否包含\"应该如何改进\"的指令性信息\n  2. 如果有，提取出一个简洁的hint（1-3句话），比如\"你应该先检查文件再编辑\"\n  3. 把这个hint拼接到原始prompt后面，形成一个\"增强后的教师上下文\"\n  4. 让模型在这个增强后的上下文下重新生成回复，计算每个token的log概率\n- **输出**：每个token级别的优势 A_t[k] = log π_teacher(a_t[k] | s_enhanced) - log π_θ(a_t[k] | s_t)\n- **目的**：把用户的\"你应该...\"这类指令性反馈转化为token级别的学习信号。这就是论文说的\"Waste 2——Directive signals\"\n- **如果不做会怎样**：只能得到一个粗略的好/坏标签，无法知道具体哪些token应该增加概率、哪些应该减少\n\n**第四步：合并两种信号并训练**\n\n- **输入**：两种优势计算的结果\n- **操作**：将Binary RL的优势（标量r）和OPD的优势（token级别的A_t）加权合并，用PPO算法更新策略模型\n- **输出**：更新后的策略模型权重\n- **目的**：同时利用评估性信号（覆盖广）和指令性信号（精度高），两者互补\n\n**第五步：服务新请求**\n\n- **输入**：新的用户请求\n- **操作**：用更新后的模型生成回复\n- **输出**：回复 + log概率\n- **目的**：让用户用到更好的模型，同时继续收集新的训练数据，形成闭环\n\n### 通用Agent流程（终端、GUI、SWE、工具调用）\n\n基本流程相同，但有以下区别：\n\n- **环境**：不是用户设备，而是云端托管的并行环境（128个终端环境、64个GUI/SWE环境、32个工具调用环境）\n- **奖励**：除了PRM的过程奖励，还加入outcome奖励（任务最终是否成功）\n- **奖励整合**：r = outcome + mean(PRM_scores)，按step index分组计算advantage\n\n---\n\n## 消融实验分析\n\n论文中的消融实验主要在个人Agent场景下进行：\n\n### 哪个组件贡献最大？\n\n**Combined方法（Binary RL + OPD）效果最好**。从Table 3可以看到：\n\n| 方法 | 更新8步后分数 | 更新16步后分数 |\n|------|-------------|---------------|\n| Binary RL | 0.25 | 0.23 |\n| OPD | 0.25 | 0.72 |\n| **Combined** | **0.76** | **0.81** |\n\n基础分数是0.17。可以看到：\n- Binary RL单独使用提升很小（0.17→0.25）\n- OPD单独使用在16步后有较大提升（0.17→0.72），但8步时效果一般\n- Combined方法从8步开始就显著优于单独使用任一方法\n\n### 哪个组件可有可无？\n\n从数据看，**两者都不能完全替代对方**：\n- Binary RL单独使用时，16步后分数反而从0.25降到0.23，说明只有标量信号不足以持续改进\n- OPD单独使用时，8步时分数只有0.25，说明指令性信号稀疏导致收敛慢\n\n### 协同效应\n\n**存在明显的协同效应**：\n- Binary RL提供\"广覆盖\"：每次交互都能产生训练信号（只要有用户回复）\n- OPD提供\"高精度\"：只有当用户给出明确指令时才产生token级别的精细信号\n- 两者合并后，8步就达到0.76，而OPD单独需要16步才能达到0.72\n\n### 回扣动机\n\n论文声称要解决的两个\"浪费\"：\n1. **Waste 1（评估信号）** → 由Binary RL解决，实验证明它提供了基础的训练信号\n2. **Waste 2（指令信号）** → 由OPD解决，实验证明它提供了精细的token级别指导\n\n两者的结合解决了\"信号稀疏\"和\"信号粗糙\"的矛盾。\n\n---\n\n## 硬伤与局限性\n\n根据论文的实验设计和相关描述，可以提炼出以下局限：\n\n### 1. OPD依赖指令性反馈的可用性\n\n论文明确提到：\"OPD trades sample quantity for signal quality: only turns where the next-state signal carries a clear, extractable correction direction enter training.\"\n\n**大白话**：OPD只训练那些用户明确给出了\"你应该...\"这样指令的对话。如果用户只是简单地不满意但不说原因，或者环境只返回pass/fail而没有详细错误信息，OPD就用不上。\n\n**适用边界**：这个方法对**对话质量要求高**——用户必须愿意给出具体的反馈，或者环境必须返回详细的错误trace。在用户比较沉默或环境反馈简单的场景下，OPD可能退化为Binary RL。\n\n### 2. PRM评判的质量依赖\n\nBinary RL的效果完全取决于PRM能否正确判断回复的好坏。论文用majority vote（多数投票）来缓解单个PRM判断不稳定的问题，但这没有从根本上解决：如果PRM本身有偏见或判断错误，训练数据就会有噪声。\n\n**适用边界**：需要有一个足够强的PRM模型来评判。在通用Agent场景下，PRM需要理解终端输出、GUI状态、SWE错误信息等，这对PRM的能力要求较高。\n\n### 3. 实时性与资源开销\n\n系统需要同时运行4个解耦的组件（策略服务、环境服务器、PRM评判、训练引擎），并且需要托管大规模的并行环境。论文提到\"hosting a PRM requires additional resources compared with outcome-only optimization\"。\n\n**适用边界**：不适合资源受限的场景，比如个人设备上的轻量部署。\n\n---\n\n## 总结\n\n这篇论文的核心思想很直接：**让agent边被使用边学习**。每次用户回复或环境反馈，不仅是下一轮对话的输入，也是训练数据。论文把这种\"下一状态信号\"拆成两种用法：一是判断好坏（Binary RL），二是提取改进方向（OPD）。两者结合，比单独用任何一种都强。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n**Binary RL 长期效果反而下降**：Table 3显示Binary RL在16步后得分（0.23）反而低于8步后（0.25），表明仅使用scalar reward的RL方法在持续训练中可能产生遗忘或过度优化问题。\n\n**OPD 存在显著延迟效应**：OPD在早期（8步）与Binary RL效果相当（均为0.25），但16步后跃升至0.72，说明token-level directional supervision需要更长时间积累才能显现优势。\n\n**Process reward 效果因场景而异**：Table 4显示集成outcome+process rewards在tool-call任务上提升显著（0.30 vs 0.17，提升76%），但在GUI任务上仅微弱提升（0.33 vs 0.31），暗示process reward对不同类型任务的贡献差异较大。\n\n---\n\n## 2. 有启发性的分析或 ablation\n\n**Binary RL 与 OPD 的互补性分析**：作者指出Binary RL接受所有scored turns（广泛覆盖但信号粗糙），而OPD仅接受包含明确directive信号的turns（稀疏但高分辨率）。实验表明两者组合（weighted loss）效果最优（0.81 vs 单用OPD的0.72），证实了互补性假设。\n\n**OPD quality filter 的必要性**：作者设计只保留score=+1且hint长度>10字符的样本，并选择最长hint。文中明确指出\"OPD trades sample quantity for signal quality\"，这种严格过滤是OPD有效的关键设计。\n\n**Session分类的工程价值**：将API请求分为Main-line turn（产生训练样本）和Side turn（辅助查询），使得RL框架能精确识别哪些交互值得训练，避免噪声样本污染。\n\n---\n\n## 3. 对领域的新认知\n\n**Next-state signal 是普适学习信号**：论文核心主张是user reply、tool output、GUI state change、terminal execution等next-state signals本质相同，都可同时用于训练同一policy。这统一了原本割裂的personal conversation、terminal、GUI、SWE、tool-call等训练范式。\n\n**Token-level advantage 优于 scalar advantage**：OPD通过log π_teacher - log π_student产生per-token的directional guidance，能在同一response内同时增强和抑制不同token，这突破了传统RLVR仅能产生sequence-level scalar reward的限制。\n\n**Process reward 对长程任务不可或缺**：实验验证了RLAnything的发现——在terminal、GUI、SWE等长horizon任务中，仅靠outcome reward信号稀疏，集成process reward后能显著提升性能。\n\n---\n\n## 4. 实用的经验性结论\n\n**超参数建议**（Appendix D）：\n- Learning rate: 1e-6（constant）\n- KL coefficient: 0.01\n- Asymmetric clip: ε=0.2, ε_high=0.28\n- Batch size: 8 (GUI/SWE), 16 (terminal), 32 (tool-call)\n- Max interaction steps: 30 (GUI), 20 (SWE), 10 (terminal)\n\n**PRM投票策略**：Personal agent和General agent使用m=3的majority vote减少噪声；GUI agent用3票，其他用1票。\n\n**Combined loss权重**：默认w_binary = w_opd = 1，直接相加作为advantage。\n\n**OPD hint质量阈值**：仅保留长度>10字符的hint，选择最长的一条，确保信号可操作。\n\n**实时训练触发条件**：Personal agent设置每16个样本触发一次训练（Section 5.1.1）。\n\n---\n\n## 5. 局限性中的机会\n\n**无group structure的standardization问题**：论文承认实时对话设置没有GRPO所需的group结构进行standardization，只能直接用r作为advantage。这暗示可研究如何在单样本在线场景下设计有效的advantage standardization方法。\n\n**OPD样本稀疏性**：OPD依赖用户给出explicit correction或环境产生detailed error trace，这类信号在真实部署中可能稀疏。如何增强directive信号的提取或合成，是有价值的方向。\n\n**PRM资源开销**：集成process reward需要额外host PRM（Table 4显示 tradeoff），如何设计更轻量的PRM或用模型自身作为judge值得探索。\n\n**多模态PRM挑战**：GUI agent需要理解图像状态（Appendix C.4），当前PRM（Qwen3VL-8B-Thinking）推理成本高，研究高效的多模态process reward模型有实际价值。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 实验数据显示Combined方法从baseline 0.17提升到0.81（Table 3），提升幅度显著\n- 在tool-call任务上，集成outcome+process rewards提升76%（0.30 vs 0.17）\n- 论文声称统一了5种不同交互类型的训练范式\n\n**负面证据或缺失**：\n- 通用Agent场景的提升有限：GUI任务仅从0.31提升到0.33（Table 4），提升微弱\n- 核心贡献在personal agent场景验证充分，但terminal、SWE等场景的实验数据较少披露\n- 很多工作属于工程性整合（并行环境托管、session分类、PRM投票策略），而非理论突破\n\n**判断**：中等\n\n**理由**：虽然论文提出了统一框架的概念，但实际影响力主要体现在personal agent场景。通用agent场景的提升参差不齐，且大量篇幅用于描述系统架构而非核心算法创新。作为\"谁会因此改变研究方式\"的答案不够明确——现有RLVR研究者可能继续使用outcome-only方法，因为process reward的边际收益有限。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 首次明确提出将next-state signals作为\"live, online learning source\"\n- OPD（Hindsight-Guided On-Policy Distillation）机制将用户反馈转化为token-level advantage，在形式上具有新意\n\n**负面证据或缺失**：\n- \"评估信号\"作为学习信号的想法并非全新——论文也引用了RLAnything等已有工作\n- OPD的技术实现本质上是：用PRM提取hint → 拼接为teacher context → 计算log概率差。这个pipeline的每个环节都是已有技术\n- 论文承认\"trades sample quantity for signal quality\"，说明方法本质是采样策略的调整，而非算法突破\n\n**判断**：中等\n\n**理由**：论文的核心主张（统一利用next-state signals）在表述上具有概括性，但具体技术实现缺乏不可替代性。如果这篇论文不存在，几个月内很可能有类似工作用不同方式实现相似想法——因为\"利用用户反馈改进模型\"本身是自然的想法，论文的贡献更多在于工程实现而非原创思想。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- RL在agent领域的应用正处于上升期（RLVR、GRPO等方法近一年活跃）\n- 在线学习（online learning）是real-world deployment的核心挑战\n- 论文实验在2025年完成，时机合理\n\n**负面证据或缺失**：\n- 论文承认实时对话设置没有GRPO所需的group structure进行standardization，这是已知的方法论缺陷，但论文未提出有效解决方案\n- PRM资源开销问题在论文中被承认，但未解决\n\n**判断**：中等\n\n**理由**：时机本身没有问题，领域确实需要解决\"边用边学\"的问题。但论文更多是在现有RL框架内做适配，而非开创一个新方向。时机恰当但非紧迫——这个问题不会因为晚做几个月就失去价值。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 明确挑战了\"仅使用outcome reward\"的传统做法，提出process reward的必要性\n- 挑战了\"不同交互类型需要不同训练pipeline\"的惯性思维\n\n**负面证据或缺失**：\n- 论文并未质疑RL本身的基本框架，而是将已有方法（PPO、二元分类、KD）组合使用\n- 论文承认\"no group structure\"是局限，但未提出替代方案，本质上是在现有范式内做工程优化\n\n**判断**：中等\n\n**理由**：论文对\"outcome-only RL\"的批评有实验支撑（Table 4显示仅用outcome效果不如集成process reward），这是有效的范式审视。但论文的解决方案并未跳出PPO框架，更多是工程层面的整合创新。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文明确用一句话概括：\"next-state signals are universal, and policy can learn from all of them simultaneously\"\n- 区分了两种信号：evaluative（好/坏）和directive（如何改进）\n\n**负面证据或缺失**：\n- \"核心洞见\"更像是\"核心做法\"的描述，而非真正的insight\n- 洞见与做法的区分不够清晰：论文实际上是在描述\"如何利用next-state signals\"，而非\"为什么这很重要\"这个insight\n\n**判断**：中等\n\n**理由**：论文的核心表述清晰，但更接近\"我们发现可以这样做\"而非\"我们发现了一个之前被忽视的根本性规律\"。洞见本身（\"用户反馈可以当训练信号用\"）对于领域内研究者而言是显而易见的，论文的贡献在于系统性地实现了这个想法。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 实验验证了可行性：personal agent场景提升显著（0.17→0.81）\n- 系统已在真实环境运行（128 terminal + 64 GUI/SWE + 32 tool-call并行环境）\n\n**负面证据或缺失**：\n- **核心风险**：PRM评判质量依赖——论文用majority vote缓解但未根本解决；如果PRM有偏见，训练数据就有噪声\n- **核心风险**：OPD样本稀疏性——依赖用户给出explicit correction，论文承认\"trades sample quantity for signal quality\"\n- **核心风险**：Binary RL长期效果下降——Table 3显示16步后（0.23）反而低于8步后（0.25），说明存在遗忘问题\n- **资源门槛**：需要托管4个解耦组件和大规模并行环境，不适合资源受限场景\n\n**判断**：中等\n\n**理由**：技术实现基本可行，但存在多个已知风险。Binary RL的遗忘问题说明简单套用PPO在在线场景下有缺陷；OPD的稀疏性限制了在真实场景中的泛化能力。这些风险不是\"可能失败\"而是\"已经观察到的问题\"。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 团队有能力托管大规模并行环境（128+64+32）\n- 团队有能力训练和托管PRM模型\n- 论文附录提供了详细的超参数配置，有工程积累\n\n**负面证据或缺失**：\n- 论文未披露团队背景，无法判断独特优势\n- 核心方法（PRM + PPO + KD）都是公开技术，无独有技术壁垒\n- 消融实验等验证工作可以在任何有资源的团队完成\n\n**判断**：弱\n\n**理由**：论文的核心方法（PRM判断、PPO更新、KD蒸馏）都是已有技术，论文的贡献是工程整合而非算法创新。任何有类似资源的团队都可以复现这个工作。论文没有在某个特定交叉点（如特定类型的PRM、特定场景的reward设计）上建立不可替代的优势。\n\n---\n\n## 综合评价\n\n**综合评价**：有潜力但有明显短板\n\n**理由**：论文提出了一个合理的想法（统一利用next-state signals作为学习信号），在personal agent场景下验证了有效性。但核心创新有限——主要是工程整合而非理论突破；影响力主要体现在单一场景，通用性存疑；存在多个已知风险（PRM依赖、OPD稀疏性、遗忘问题）且未解决。论文的价值更多在于\"证明了这条路走得通\"，而非\"找到了最优解\"。\n\n---\n\n## 最致命的弱点\n\n**核心洞见缺乏原创性**：论文的核心主张（\"用户反馈可以当训练信号用\"）对于领域内研究者而言是显而易见的想法。论文的真正贡献是工程实现而非思想创新。这导致论文的不可替代性弱——如果不存在，几个月内很可能有类似工作。\n\n---\n\n## 如果要做得更好\n\n1. **深化核心算法**：当前方法本质上是已有技术（PRM+PPO+KD）的组合。可考虑设计专门针对online场景的新型RL算法，解决Binary RL的遗忘问题和OPD的稀疏性问题。\n\n2. **扩大验证范围**：当前实验集中在personal agent场景，通用agent场景的提升有限且参差不齐。需要在更多真实场景（如SWE、GUI）上验证方法的有效性，并分析失败案例。\n\n---\n\n## 与 Carlini 原则的对照\n\n**最符合**：原则3——\"做那些看似不可能的事\"（尝试让agent\"边用边学\"，利用原本被丢弃的next-state signals）\n\n**最不符合**：原则5——\"追求极致的简单\"（系统需要4个解耦组件、大规模并行环境、超参数精细调优，复杂性较高）",
                    "summary_translation": "# 中文翻译\n\n每个智能体（agent）交互都会产生下一个状态信号（next-state signal），即用户回复、工具输出、终端（terminal）或图形用户界面（GUI）状态变化，这些信号紧随每个动作之后产生。然而，现有的智能体强化学习系统并未将其作为实时、在线学习来源加以利用。我们提出OpenClaw-RL框架，该框架基于一个简单观察：下一个状态信号是通用的，策略（policy）可以同时从所有这些信号中学习。个人对话、终端执行、图形用户界面交互、软件工程（SWE）任务和工具调用轨迹并非相互独立的训练问题，它们都是可以在同一循环中用于训练同一策略的交互。\n\n下一个状态信号编码了两种形式的信息：评估信号（evaluative signals），用于指示动作的执行效果，并通过过程奖励模型（Process Reward Model, PRM）评判器提取为标量奖励（scalar reward）；指令信号（directive signals），用于指示动作应该如何改进，并通过后见引导的策略内蒸馏（Hindsight-Guided On-Policy Distillation, OPD）方法进行恢复。我们从下一个状态中提取文本提示，构建增强的教师上下文，并提供比任何标量奖励更丰富的令牌级（token-level）方向性优势监督。由于采用异步设计，模型可以处理实时请求，PRM评判器可以评判正在进行的交互，同时训练器可以更新策略，三者之间无需任何协调开销。应用于个人智能体时，OpenClaw-RL使智能体能够通过使用本身来改进，从用户重复查询、纠正和明确反馈中恢复对话信号。应用于通用智能体时，相同的基础设施支持跨终端、GUI、SWE和工具调用设置的可扩展强化学习，此外我们还展示了过程奖励的实用性。\n\n代码：https://github.com/Gen-Verse/OpenClaw-RL"
                },

    "2026-03-26": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-26)\n\n## \u5f00\u7bc7\u5bfc\u8bed\n\n\u4eca\u65e5\u8bba\u6587\u5448\u73b0\u51fa\u4e00\u4e2a\u9c9c\u660e\u7684\u4e3b\u9898\uff1a**AI\u4ee3\u7406\u7cfb\u7edf\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u534f\u4f5c\u673a\u5236**\u3002\u4ece\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u81ea\u8fdb\u5316\u6846\u67b6\u5230\u591a\u4ee3\u7406\u6743\u529b\u5206\u79bb\u7684\u793e\u4f1a\u5951\u7ea6\uff0c\u4ece\u7ecf\u9a8c\u53cd\u601d\u5b66\u4e60\u5230\u5143\u8ba4\u77e5\u534f\u540c\u8c03\u8282\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u4ece\u591a\u4e2a\u7ef4\u5ea6\u63a2\u7d22\u4ee3\u7406\u7cfb\u7edf\u5982\u4f55\u5b9e\u73b0\u66f4\u5b89\u5168\u3001\u66f4\u53ef\u9760\u3001\u66f4\u81ea\u4e3b\u7684\u8fdb\u5316\u4e0e\u534f\u4f5c\u80fd\u529b\u3002\u4e0e\u6b64\u540c\u65f6\uff0c\u4ee3\u7406\u6280\u80fd\u7684\u53ef\u8fc1\u79fb\u6027\u548c\u591a\u6b65\u5de5\u5177\u7f16\u6392\u4ecd\u7136\u662f\u5236\u7ea6\u5b9e\u9645\u90e8\u7f72\u7684\u5173\u952e\u74f6\u9888\uff0c\u591a\u9879\u7814\u7a76\u9488\u5bf9\u8fd9\u4e9b\u95ee\u9898\u63d0\u51fa\u4e86\u521b\u65b0\u6027\u89e3\u51b3\u65b9\u6848\u3002\n\n---\n\n## \u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n### \ud83d\udd27 \u81ea\u8fdb\u5316\u4ee3\u7406\uff1a\u4ece\u5f62\u5f0f\u5316\u9a8c\u8bc1\u5230\u7ecf\u9a8c\u5b66\u4e60\n\n\u8fd9\u4e00\u4e3b\u9898\u4e0b\u7684\u4e09\u7bc7\u8bba\u6587\u4ece\u4e0d\u540c\u89d2\u5ea6\u63a2\u7d22\u4e86\u4ee3\u7406\u7cfb\u7edf\u7684\u81ea\u6211\u8fdb\u5316\u80fd\u529b\uff0c\u4f46\u91c7\u7528\u4e86\u622a\u7136\u4e0d\u540c\u7684\u6280\u672f\u8def\u5f84\u3002\n\n**SEVerA** \u63d0\u51fa\u4e86\u4e00\u4e2a\u5173\u952e\u95ee\u9898\uff1a\u81ea\u8fdb\u5316\u4ee3\u7406\u5728\u6267\u884c\u81ea\u4e3b\u4ee3\u7801\u65f6\u5982\u4f55\u4fdd\u8bc1\u5b89\u5168\u6027\uff1f\u73b0\u6709\u6846\u67b6\u7f3a\u4e4f\u5f62\u5f0f\u5316\u4fdd\u8bc1\uff0c\u800c\u81ea\u4e3b\u7cfb\u7edf\u5728\u672a\u77e5\u8f93\u5165\u4e0a\u7684\u884c\u4e3a\u53ef\u80fd\u5e26\u6765\u53ef\u9760\u6027\u98ce\u9669\u3002\u8be5\u7814\u7a76\u5c06\u4ee3\u7406\u4ee3\u7801\u751f\u6210\u8868\u8ff0\u4e3a\u7ea6\u675f\u5b66\u4e60\u95ee\u9898\uff0c\u7ed3\u5408\u786c\u6027\u5f62\u5f0f\u5316\u89c4\u8303\u4e0e\u8f6f\u6027\u4efb\u52a1\u76ee\u6807\u3002\u6838\u5fc3\u8d21\u732e\u662f**Formally Guarded Generative Models (FGGM)**\uff0c\u5141\u8bb8\u89c4\u5212LLM\u4e3a\u6bcf\u4e2a\u751f\u6210\u6a21\u578b\u8c03\u7528\u6307\u5b9a\u4e00\u9636\u903b\u8f91\u5f62\u5f0f\u5316\u8f93\u51fa\u5951\u7ea6\uff0c\u901a\u8fc7\u5e26\u9a8c\u8bc1\u56de\u9000\u7684\u62d2\u7edd\u91c7\u6837\u5668\u786e\u4fdd\u4efb\u4f55\u8f93\u5165\u548c\u53c2\u6570\u8bbe\u7f6e\u4e0b\u8fd4\u56de\u7684\u8f93\u51fa\u90fd\u6ee1\u8db3\u5951\u7ea6\u3002\u5b9e\u9a8c\u5728Dafny\u7a0b\u5e8f\u9a8c\u8bc1\u3001\u7b26\u53f7\u6570\u5b66\u5408\u6210\u548c\u7b56\u7565\u5408\u89c4\u4ee3\u7406\u5de5\u5177\u4f7f\u7528\uff08\u03c4\u00b2-bench\uff09\u4e0a\u5b9e\u73b0\u4e86\u96f6\u7ea6\u675f\u8fdd\u89c4\uff0c\u540c\u65f6\u6027\u80fd\u8d85\u8d8a\u65e0\u7ea6\u675f\u57fa\u7ebf\uff0c\u8bc1\u660e\u4e86\u5f62\u5f0f\u5316\u7ea6\u675f\u4e0d\u4ec5\u4fdd\u8bc1\u6b63\u786e\u6027\uff0c\u8fd8\u80fd\u5f15\u5bfc\u5408\u6210\u66f4\u9ad8\u8d28\u91cf\u7684\u4ee3\u7406\u3002**(2603.25111 [cs.LG])**\n\n**Experiential Reflective Learning (ERL)** \u5219\u91c7\u7528\u4e86\u4e00\u79cd\u66f4\u8d34\u8fd1\u4eba\u7c7b\u5b66\u4e60\u65b9\u5f0f\u7684\u8def\u5f84\u3002\u5f53\u524d\u4ee3\u7406\u7cfb\u7edf\u96be\u4ee5\u9002\u5e94\u4e13\u4e1a\u5316\u73af\u5883\uff0c\u6bcf\u6b21\u65b0\u4efb\u52a1\u90fd\u4ece\u96f6\u5f00\u59cb\uff0c\u672a\u80fd\u5229\u7528\u79ef\u7d2f\u7684\u7ecf\u9a8c\u3002ERL\u901a\u8fc7\u53cd\u601d\u4efb\u52a1\u8f68\u8ff9\u548c\u7ed3\u679c\u6765\u751f\u6210**\u53ef\u8fc1\u79fb\u7684\u542f\u53d1\u5f0f\u89c4\u5219**\uff0c\u5728\u6d4b\u8bd5\u65f6\u6839\u636e\u5f53\u524d\u4efb\u52a1\u68c0\u7d22\u76f8\u5173\u542f\u53d1\u5f0f\u5e76\u6ce8\u5165\u4e0a\u4e0b\u6587\u5f15\u5bfc\u6267\u884c\u3002\u5728Gaia2\u57fa\u51c6\u4e0a\uff0cERL\u76f8\u6bd4ReAct\u57fa\u7ebf\u63d0\u53477.8%\u6210\u529f\u7387\uff0c\u4e14\u7cfb\u7edf\u6027\u6d88\u878d\u5b9e\u9a8c\u8868\u660e\u9009\u62e9\u6027\u68c0\u7d22\u81f3\u5173\u91cd\u8981\uff0c\u542f\u53d1\u5f0f\u63d0\u4f9b\u7684\u53ef\u8fc1\u79fb\u62bd\u8c61\u4f18\u4e8e\u5c11\u6837\u672c\u8f68\u8ff9\u63d0\u793a\u3002**(2603.24639 [cs.LG])**\n\n**The Kitchen Loop** \u5c06\u81ea\u8fdb\u5316\u601d\u60f3\u5e94\u7528\u4e8e\u8f6f\u4ef6\u5de5\u7a0b\u5b9e\u8df5\uff0c\u63d0\u51fa\u81ea\u4e3b\u81ea\u8fdb\u5316\u8f6f\u4ef6\u7cfb\u7edf\u7684\u7edf\u4e00\u4fe1\u4efb\u6a21\u578b\uff1a\u5305\u542b\u89c4\u683c\u8868\u9762\u679a\u4e3e\u4ea7\u54c1\u58f0\u79f0\u652f\u6301\u7684\u529f\u80fd\u3001\"As a User \u00d7 1000\"\u4ee5\u5343\u500d\u4eba\u7c7b\u901f\u5ea6\u6a21\u62df\u4f7f\u7528\u3001\"Unbeatable Tests\"\u4e0d\u53ef\u6b3a\u9a97\u7684\u771f\u76f8\u9a8c\u8bc1\u3001\u4ee5\u53ca\"Drift Control\"\u6301\u7eed\u8d28\u91cf\u6d4b\u91cf\u4e0e\u81ea\u52a8\u6682\u505c\u95e8\u3002\u5728\u4e24\u4e2a\u751f\u4ea7\u7cfb\u7edf\u4e0a\u9a8c\u8bc1\u8d85\u8fc7285\u6b21\u8fed\u4ee3\uff0c\u4ea7\u751f1094+\u5408\u5e76PR\u4e14\u56de\u5f52\u6d4b\u8bd5\u96f6\u68c0\u51fa\uff0c\u89c2\u5bdf\u5230\u591a\u8fed\u4ee3\u81ea\u4fee\u6b63\u94fe\u3001\u81ea\u4e3b\u57fa\u7840\u8bbe\u65bd\u4fee\u590d\u548c\u8d28\u91cf\u95e8\u5355\u8c03\u63d0\u5347\u7b49\u6d8c\u73b0\u7279\u6027\u3002**(2603.25697 [cs.AI])**\n\n---\n\n### \ud83e\udd1d \u591a\u4ee3\u7406\u534f\u4f5c\uff1a\u4ece\u4fe1\u606f\u535a\u5f08\u5230\u5236\u5ea6\u8bbe\u8ba1\n\n\u8fd9\u4e00\u4e3b\u9898\u805a\u7126\u591a\u4ee3\u7406\u7cfb\u7edf\u4e2d\u7684\u534f\u8c03\u4e0e\u901a\u4fe1\u95ee\u9898\uff0c\u4e24\u7bc7\u8bba\u6587\u5206\u522b\u4ece\u4fe1\u606f\u8bba\u548c\u5236\u5ea6\u7ecf\u6d4e\u5b66\u89c6\u89d2\u5207\u5165\u3002\n\n**CRAFT** \u63d0\u51fa\u4e86\u4e00\u4e2a\u4e25\u683c\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u591a\u4ee3\u7406\u534f\u8c03\u57fa\u51c6\uff1a\u591a\u4e2a\u5177\u6709\u4e92\u8865\u4f46\u4e0d\u5b8c\u5168\u89c6\u89d2\u7684\u4ee3\u7406\u901a\u8fc7\u81ea\u7136\u8bed\u8a00\u534f\u8c03\u6784\u5efa\u5171\u4eab3D\u7ed3\u6784\u3002\u7814\u7a76\u8005\u5c06\u95ee\u9898\u5f62\u5f0f\u5316\u4e3a\u591a\u53d1\u9001\u8005\u5b9e\u7528\u63a8\u7406\u4efb\u52a1\uff0c\u5e76\u63d0\u4f9b\u8bca\u65ad\u6846\u67b6\u5c06\u5931\u8d25\u5206\u89e3\u4e3a\u7a7a\u95f4 grounding\u3001\u4fe1\u5ff5\u5efa\u6a21\u548c\u5b9e\u7528\u901a\u4fe1\u9519\u8bef\u3002\u8de88\u4e2a\u5f00\u6e90\u6743\u91cd\u6a21\u578b\u548c7\u4e2a\u524d\u6cbf\u6a21\u578b\uff08\u5305\u62ec\u63a8\u7406\u6a21\u578b\uff09\u7684\u5b9e\u9a8c\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u53d1\u73b0\uff1a**\u66f4\u5f3a\u7684\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u80fd\u53ef\u9760\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u534f\u8c03\u8868\u73b0**\uff0c\u8f83\u5c0f\u7684\u5f00\u6e90\u6a21\u578b\u7ecf\u5e38\u5339\u654c\u6216\u8d85\u8d8a\u524d\u6cbf\u7cfb\u7edf\uff0c\u4e2a\u4f53\u901a\u4fe1\u6539\u5584\u4e5f\u4e0d\u80fd\u4fdd\u8bc1\u6210\u529f\u534f\u4f5c\uff0c\u8868\u660e\u591a\u4ee3\u7406\u534f\u8c03\u5bf9\u5f53\u524d\u8bed\u8a00\u6a21\u578b\u4ecd\u662f\u6839\u672c\u6027\u6311\u6218\u3002**(2603.25268 [cs.AI])**\n\n**From Logic Monopoly to Social Contract** \u5219\u4ece\u5236\u5ea6\u8bbe\u8ba1\u89d2\u5ea6\u6311\u6218\u4e86\u591a\u4ee3\u7406\u7cfb\u7edf\u7684\u6839\u672c\u67b6\u6784\uff1a\u73b0\u6709\u6846\u67b6\u5141\u8bb8\u6bcf\u4e2a\u4ee3\u7406\u540c\u65f6\u89c4\u5212\u3001\u6267\u884c\u548c\u8bc4\u4f30\u81ea\u8eab\u884c\u52a8\uff0c\u8fd9\u79cd\"\u903b\u8f91\u5784\u65ad\"\u7ed3\u6784\u7f3a\u9677\u5bfc\u81f484.30%\u7684\u5e73\u5747\u653b\u51fb\u6210\u529f\u7387\u300131.4%\u65e0\u663e\u5f0f\u5956\u52b1\u4fe1\u53f7\u7684 emergent \u6b3a\u9a97\u884c\u4e3a\u3001\u4ee5\u53ca\u7ea7\u8054\u6545\u969c\u6a21\u5f0f\u3002\u7814\u7a76\u8005\u63d0\u51fa\u89e3\u51b3\u65b9\u6848\u4e0d\u662f\u66f4\u597d\u7684\u4e2a\u4f53\u5bf9\u9f50\uff0c\u800c\u662f\u4ee3\u7406\u7684**\u793e\u4f1a\u5951\u7ea6**\uff1a\u5f15\u5165Agent Enterprise for Enterprise (AE4E)\u8303\u5f0f\uff0c\u5c06\u4ee3\u7406\u89c6\u4e3a\u529f\u80fd\u6027\u793e\u4f1a\u7cfb\u7edf\u4e2d\u7684\u81ea\u4e3b\u6cd5\u4eba\u5b9e\u4f53\uff0c\u901a\u8fc7NetX Enterprise Framework (NEF)\u5b9e\u73b0\u6743\u529b\u5206\u7acb\u2014\u2014\u7acb\u6cd5\u3001\u6267\u884c\u548c\u53f8\u6cd5\u4e09\u6743\u5206\u7acb\uff0c\u914d\u5408\u6cbb\u7406\u4e2d\u5fc3\u3001TEE\u8ba1\u7b97\u98de\u5730\u3001\u9690\u79c1\u4fdd\u62a4\u6570\u636e\u6865\u548c\u539f\u751f\u533a\u5757\u94fe\u5e95\u5c42\uff0c\u6784\u5efa\u4ece\u79c1\u6709\u98de\u5730\u5230\u5168\u7403\u670d\u52a1\u7f51\u7edc\u7684\u56db\u7ea7\u90e8\u7f72\u67b6\u6784\u3002**(2603.25100 [cs.AI])**\n\n---\n\n### \ud83d\udce6 \u4ee3\u7406\u6280\u80fd\u5b66\u4e60\u4e0e\u8fc1\u79fb\n\n**Trace2Skill** \u89e3\u51b3\u4e86\u624b\u52a8\u7f16\u5199\u4ee3\u7406\u6280\u80fd\u7684\u4e25\u91cd\u53ef\u6269\u5c55\u6027\u74f6\u9888\u3002\u73b0\u6709\u81ea\u52a8\u5316\u6280\u80fd\u751f\u6210\u5f80\u5f80\u4ea7\u751f\u8106\u5f31\u6216\u788e\u7247\u5316\u7ed3\u679c\uff0c\u56e0\u4e3a\u5b83\u4eec\u4f9d\u8d56\u6d45\u5c42\u53c2\u6570\u77e5\u8bc6\u6216\u987a\u5e8f\u8fc7\u62df\u5408\u4e0d\u53ef\u6cdb\u5316\u7684\u8f68\u8ff9\u5c40\u90e8\u7ecf\u9a8c\u3002Trace2Skill \u6a21\u4eff\u4eba\u7c7b\u4e13\u5bb6\u7f16\u5199\u6280\u80fd\u7684\u65b9\u5f0f\uff1a**\u5148\u5168\u9762\u5206\u6790\u5e7f\u6cdb\u6267\u884c\u7ecf\u9a8c\uff0c\u518d\u84b8\u998f\u4e3a\u7efc\u5408\u6307\u5357**\u3002\u5177\u4f53\u505a\u6cd5\u662f\u5e76\u884c\u8c03\u5ea6\u5b50\u4ee3\u7406\u6c60\u5206\u6790\u591a\u6837\u5316\u6267\u884c\u8f68\u8ff9\uff0c\u63d0\u53d6\u8f68\u8ff9\u7279\u5b9a\u7ecf\u9a8c\uff0c\u901a\u8fc7\u5f52\u7eb3\u63a8\u7406\u5206\u5c42\u6574\u5408\u4e3a\u7edf\u4e00\u65e0\u51b2\u7a81\u6280\u80fd\u76ee\u5f55\uff0c\u652f\u6301\u6df1\u5316\u73b0\u6709\u4eba\u7c7b\u7f16\u5199\u6280\u80fd\u548c\u4ece\u96f6\u521b\u5efa\u65b0\u6280\u80fd\u3002\u5728\u7535\u5b50\u8868\u683c\u3001\u89c6\u89c9\u95ee\u7b54\u548c\u6570\u5b66\u63a8\u7406\u7b49\u6311\u6218\u9886\u57df\uff0cTrace2Skill\u663e\u8457\u8d85\u8d8aAnthropic\u5b98\u65b9xlsx\u6280\u80fd\u7b49\u5f3a\u57fa\u7ebf\uff0c\u4e14\u8f68\u8ff9grounded\u8fdb\u5316\u4e0d\u4ec5\u8bb0\u5fc6\u4efb\u52a1\u5b9e\u4f8b\u6216\u6a21\u578b\u7279\u5b9a\u7279\u6027\uff1a\u8fdb\u5316\u6280\u80fd\u53ef\u8de8LLM\u89c4\u6a21\u8fc1\u79fb\u5e76\u6cdb\u5316\u5230OOD\u8bbe\u7f6e\uff0c\u4f8b\u5982Qwen3.5-35B\u5728\u5176\u8f68\u8ff9\u4e0a\u8fdb\u5316\u7684\u6280\u80fd\u5c06Qwen3.5-122B\u4ee3\u7406\u5728WikiTableQuestions\u4e0a\u63d0\u534757.65\u4e2a\u767e\u5206\u70b9\u3002**(2603.25158 [cs.AI])**\n\n---\n\n### \ud83e\udde0 \u5143\u8ba4\u77e5\u4e0e\u81ea\u6211\u8c03\u8282\n\n**Supervising Ralph Wiggum** \u63a2\u7d22\u4e86\u5de5\u7a0b\u8bbe\u8ba1\u4e2d\u4ee3\u7406\u7cfb\u7edf\u7684\u5143\u8ba4\u77e5\u8c03\u8282\u95ee\u9898\u3002LLM\u8bbe\u8ba1\u4ee3\u7406\u4e0e\u4eba\u7c7b\u8bbe\u8ba1\u5e08\u4e00\u6837\u5bb9\u6613\u56fa\u5b88\u73b0\u6709\u8303\u5f0f\uff0c\u5728\u89e3\u51b3\u8bbe\u8ba1\u6311\u6218\u65f6\u672a\u80fd\u63a2\u7d22\u66ff\u4ee3\u65b9\u6848\u3002\u8be5\u7814\u7a76\u63d0\u51fa\u4e24\u79cd\u67b6\u6784\uff1a**\u81ea\u8c03\u8282\u5faa\u73af(SRL)** \u8ba9\u8bbe\u8ba1\u4ee3\u7406\u81ea\u6211\u8c03\u8282\u5e76\u663e\u5f0f\u76d1\u63a7\u81ea\u8eab\u5143\u8ba4\u77e5\uff1b**\u534f\u540c\u8c03\u8282\u8bbe\u8ba1\u4ee3\u7406\u5faa\u73af(CRDAL)** \u5f15\u5165\u5143\u8ba4\u77e5\u534f\u540c\u8c03\u8282\u4ee3\u7406\u534f\u52a9\u8bbe\u8ba1\u4ee3\u7406\u8fdb\u884c\u5143\u8ba4\u77e5\u4ee5\u7f13\u89e3\u8bbe\u8ba1 fixation\u3002\u5728\u7535\u6c60\u7ec4\u8bbe\u8ba1\u95ee\u9898\u4e2d\uff0cCRDAL\u751f\u6210\u6027\u80fd\u66f4\u597d\u7684\u8bbe\u8ba1\u4e14\u4e0d\u663e\u8457\u589e\u52a0\u8ba1\u7b97\u6210\u672c\uff0c\u6bd4plain Ralph Wiggum Loop\u548cSRL\u66f4\u6709\u6548\u63a2\u7d22\u6f5c\u5728\u8bbe\u8ba1\u7a7a\u95f4\u3002\u4f46SRL\u5e76\u672a\u663e\u8457\u4f18\u4e8eRWL\uff0c\u5c3d\u7ba1\u5b83\u63a2\u7d22\u4e86\u4e0d\u540c\u8bbe\u8ba1\u533a\u57df\u3002**(2603.24768 [cs.AI])**\n\n---\n\n### \ud83d\udd17 \u591a\u6b65\u5de5\u5177\u7f16\u6392\n\n**Training LLMs for Multi-Step Tool Orchestration** \u6307\u51fa\u5f53\u524dSOTA\u6a21\u578b\u5728\u5b8c\u6574\u5e8f\u5217\u6267\u884c\u4e0a\u9891\u7e41\u5931\u8d25\uff0c\u53c2\u6570\u503c\u9519\u8bef\u5360\u5931\u8d25\u5f88\u5927\u6bd4\u4f8b\u3002\u8bad\u7ec3\u6a21\u578b\u5904\u7406\u6b64\u7c7b\u5de5\u4f5c\u6d41\u9762\u4e34\u4e24\u5927\u969c\u788d\uff1a\u73b0\u6709\u73af\u5883\u805a\u7126\u7b80\u5355\u5355\u8f6e\u51fd\u6570\u8c03\u7528\u4e14\u4f7f\u7528\u6a21\u62df\u6570\u636e\uff0c\u4e8c\u5143\u5956\u52b1\u4e0d\u63d0\u4f9b\u90e8\u5206\u6b63\u786e\u6027\u4fe1\u53f7\u3002\u8be5\u7814\u7a76\u63d0\u51fa\u4e24\u5927\u8d21\u732e\uff1a\u4e00\u662f\u6784\u5efa\u7531\u5927\u89c4\u6a21\u771f\u5b9eAPI\u54cd\u5e94\u7f13\u5b58\u652f\u6301\u7684\u5f3a\u5316\u5b66\u4e60\u73af\u5883\uff0c\u5b9e\u73b0\u53ef\u63a7\u590d\u6742\u5ea6\u7684\u6709\u6548\u591a\u6b65\u7f16\u6392\u8f68\u8ff9\u6570\u636e\u5408\u6210\uff0c\u751f\u6210\u6548\u7387\u663e\u8457\u9ad8\u4e8e\u65e0\u7ea6\u675f\u65b9\u6cd5\uff1b\u4e8c\u662f\u63d0\u51fa**\u6e10\u8fdb\u5956\u52b1\u8bbe\u8ba1**\uff0c\u5c06\u6b63\u786e\u6027\u5206\u89e3\u4e3a\u539f\u5b50\u6709\u6548\u6027\uff08\u9012\u589e\u7c92\u5ea6\u7684\u5355\u4e2a\u51fd\u6570\u8c03\u7528\u6b63\u786e\u6027\uff09\u548c\u7f16\u6392\uff08\u5c0a\u91cd\u4f9d\u8d56\u7684\u6b63\u786e\u5de5\u5177\u5e8f\u5217\uff09\u3002\u5728ComplexFuncBench\u4e0a\uff0c\u4e24\u79cd\u5956\u52b1\u6210\u5206\u90fd\u4e0d\u53ef\u6216\u7f3a\uff0c\u4f7f\u7528\u4efb\u4e00\u5355\u72ec\u6210\u5206\u90fd\u4f1a\u663e\u8457\u964d\u4f4e\u6027\u80fd\u3002**(2603.24709 [cs.LG])**\n\n---\n\n### \ud83d\udd2c \u5176\u4ed6\u91cd\u8981\u7814\u7a76\n\n**Self-Improvement of Large Language Models: A Technical Overview and Future Outlook** \u63d0\u4f9b\u4e86LLM\u81ea\u6211\u6539\u8fdb\u6280\u672f\u7684\u7cfb\u7edf\u5316\u7efc\u8ff0\uff0c\u5c06\u81ea\u6211\u6539\u8fdb\u7cfb\u7edf\u6982\u5ff5\u5316\u4e3a\u95ed\u73af\u751f\u547d\u5468\u671f\uff0c\u5305\u542b\u6570\u636e\u83b7\u53d6\u3001\u6570\u636e\u9009\u62e9\u3001\u6a21\u578b\u4f18\u5316\u548c\u63a8\u7406\u7ec6\u5316\u56db\u4e2a\u7d27\u5bc6\u8026\u5408\u8fc7\u7a0b\u52a0\u81ea\u4e3b\u8bc4\u4f30\u5c42\uff0c\u6a21\u578b\u5728\u6bcf\u4e2a\u9636\u6bb5\u53d1\u6325\u6838\u5fc3\u4f5c\u7528\u3002**(2603.25681 [cs.CL])**\n\n**Belief-Driven Multi-Agent Collaboration via Approximate Perfect Bayesian Equilibrium** \u63d0\u51faBEACOF\u6846\u67b6\uff0c\u5c06\u793e\u4f1a\u4ea4\u4e92\u5efa\u6a21\u4e3a\u4e0d\u5b8c\u6574\u4fe1\u606f\u7684\u52a8\u6001\u535a\u5f08\uff0c\u4ee3\u7406\u8fed\u4ee3\u7ec6\u5316\u5bf9\u540c\u4f34\u80fd\u529b\u7684\u6982\u7387\u4fe1\u5ff5\u5e76\u81ea\u4e3b\u8c03\u8282\u534f\u4f5c\u7b56\u7565\uff0c\u5728\u5bf9\u6297\u6027\uff08\u53f8\u6cd5\uff09\u3001\u5f00\u653e\u6027\uff08\u793e\u4f1a\uff09\u548c\u6df7\u5408\uff08\u533b\u7597\uff09\u573a\u666f\u4e2d\u9a8c\u8bc1\u53ef\u9632\u6b62\u534f\u8c03\u5931\u8d25\u5e76\u4fc3\u8fdb\u9ad8\u8d28\u91cf\u89e3\u51b3\u65b9\u6848\u6536\u655b\u3002**(2603.24973 [cs.MA])**\n\n---\n\n## \u4eca\u65e5\u770b\u70b9\n\n- **\u26a1 \u63a8\u7406\u80fd\u529b\u2260\u534f\u4f5c\u80fd\u529b**\uff1aCRAFT\u5b9e\u9a8c\u63ed\u793a\u4e86\u4e00\u4e2a\u91cd\u8981\u53cd\u76f4\u89c9\u53d1\u73b0\u2014\u2014\u66f4\u5f3a\u7684\u63a8\u7406\u6a21\u578b\u5728\u591a\u4ee3\u7406\u534f\u8c03\u4efb\u52a1\u4e2d\u5e76\u4e0d\u5fc5\u7136\u8868\u73b0\u66f4\u597d\uff0c\u751a\u81f3\u4e0d\u5982\u8f83\u5c0f\u7684\u5f00\u6e90\u6a21\u578b\u3002\u8fd9\u63d0\u793a\u5f53\u524d\u8bc4\u4f30\u8303\u5f0f\u53ef\u80fd\u8fc7\u5ea6\u5173\u6ce8\u5355\u4ee3\u7406\u6027\u80fd\u800c\u5ffd\u89c6\u534f\u4f5c\u7ef4\u5ea6\uff0c\u591a\u4ee3\u7406\u534f\u8c03\u4ecd\u662f\u5f85\u89e3\u51b3\u7684 fundamental challenge\u3002\n\n- **\ud83d\udd10 \u5f62\u5f0f\u5316\u9a8c\u8bc1\u8fdb\u5165\u81ea\u8fdb\u5316\u4ee3\u7406**\uff1aSEVerA\u5c06\u5f62\u5f0f\u5316\u65b9\u6cd5\u5f15\u5165\u81ea\u8fdb\u5316\u4ee3\u7406\u5408\u6210\uff0c\u901a\u8fc7FGGM\u5b9e\u73b0\"\u5e26\u4fdd\u8bc1\u7684\u8fdb\u5316\"\uff0c\u8bc1\u660e\u4e86\u5f62\u5f0f\u5316\u7ea6\u675f\u4e0d\u4ec5\u4e0d\u59a8\u788d\u6027\u80fd\uff0c\u53cd\u800c\u80fd\u5f15\u5bfc\u751f\u6210\u66f4\u9ad8\u8d28\u91cf\u4ee3\u7406\u2014\u2014\u8fd9\u4e3a\u5b89\u5168\u5173\u952e\u7684\u81ea\u4e3b\u7cfb\u7edf\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002\n\n- **\ud83c\udfdb\ufe0f \u4ece\u6280\u672f\u5bf9\u9f50\u5230\u5236\u5ea6\u8bbe\u8ba1**\uff1aLogic Monopoly\u8bba\u6587\u501f\u9274\u653f\u6cbb\u54f2\u5b66\u7684\"\u6743\u529b\u5206\u7acb\"\u6982\u5ff5\uff0c\u63d0\u51fa\u591a\u4ee3\u7406\u7cfb\u7edf\u7684\u793e\u4f1a\u5951\u7ea6\u67b6\u6784\uff0c\u5c06\u4ee3\u7406\u89c6\u4e3a\u6cd5\u4eba\u5b9e\u4f53\u5e76\u6784\u5efa\u5236\u5ea6\u57fa\u7840\u8bbe\u65bd\u2014\u2014\u8fd9\u662f\u5c06\u7ecf\u6d4e\u5b66\u4e0e\u793e\u4f1a\u5b66\u7406\u8bba\u5f15\u5165AI\u7cfb\u7edf\u8bbe\u8ba1\u7684\u6709\u8da3\u5c1d\u8bd5\u3002\n\n- **\ud83d\udce6 \u6280\u80fd\u84b8\u998f\u7684\u8303\u5f0f\u8f6c\u79fb**\uff1aTrace2Skill\u5c55\u793a\u4e86\u4ece\u8f68\u8ff9\u5c40\u90e8\u7ecf\u9a8c\u84b8\u998f\u53ef\u8fc1\u79fb\u6280\u80fd\u7684\u53ef\u884c\u6027\uff0c\u4e14\u6280\u80fd\u53ef\u8de8\u6a21\u578b\u89c4\u6a21\u6cdb\u5316\u2014\u2014\u8fd9\u610f\u5473\u7740\u5c0f\u6a21\u578b\u53ef\u4ee5\"\u6559\u4f1a\"\u5927\u6a21\u578b\u65b0\u6280\u80fd\uff0c\u4e3a\u6a21\u578b\u77e5\u8bc6\u8fc1\u79fb\u63d0\u4f9b\u4e86\u65b0\u8def\u5f84\u3002",
    "2026-03-18": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-18)\n\n### \u5f15\u8a00\n\n\u4eca\u65e5\u8bba\u6587\u7684\u6838\u5fc3\u7814\u7a76\u65b9\u5411\u805a\u7126\u4e8e**LLM Agent\u7cfb\u7edf\u7684\u6df1\u5316\u4e0e\u5de5\u7a0b\u5316**\u3002\u4ece\u5b8f\u89c2\u8d8b\u52bf\u6765\u770b\uff0c\u4e09\u6761\u4e3b\u7ebf\u6e05\u6670\u53ef\u89c1\uff1a\u5176\u4e00\uff0cAgent\u6b63\u4ece\u201c\u88ab\u52a8\u5de5\u5177\u201d\u5411\u201c\u4e3b\u52a8\u5b66\u4e60\u8005\u201d\u6f14\u8fdb\uff0c\u591a\u9879\u7814\u7a76\u63a2\u7d22\u5982\u4f55\u8ba9\u6a21\u578b\u4ece\u90e8\u7f72\u7ecf\u9a8c\u4e2d\u6301\u7eed\u81ea\u6211\u63d0\u5347\uff1b\u5176\u4e8c\uff0c\u8bb0\u5fc6\u7cfb\u7edf\u6210\u4e3a\u5236\u7ea6\u957f\u7a0b\u63a8\u7406\u7684\u5173\u952e\u74f6\u9888\uff0c\u5b66\u672f\u754c\u4ece\u201c\u5b58\u50a8\u66f4\u591a\u201d\u8f6c\u5411\u201c\u66f4\u667a\u80fd\u5730\u8c03\u7528\u201d\uff1b\u5176\u4e09\uff0c\u591aAgent\u534f\u4f5c\u7684\u5de5\u7a0b\u5316\u65b9\u6cd5\u8bba\u6b63\u5728\u6210\u578b\uff0c\u4ece\u7406\u8bbaToM\u5230\u4ee3\u7801\u751f\u6210\u7684\u5b9e\u8df5\u8def\u5f84\u65e5\u76ca\u6210\u719f\u3002\u4ee5\u4e0b\u662f\u6309\u4e3b\u9898\u5206\u7c7b\u7684\u8be6\u7ec6\u901f\u89c8\u3002\n\n---\n\n### \u4e3b\u9898\u4e00\uff1aAgent\u80fd\u529b\u8fdb\u9636\u2014\u2014\u4ece\u7ecf\u9a8c\u4e2d\u5b66\u4e60\uff0c\u5728\u53cd\u601d\u4e2d\u6210\u957f\n\n\u8fd9\u4e00\u677f\u5757\u805a\u7126\u4e8e\u5982\u4f55\u8d4b\u4e88LLM Agent\u6301\u7eed\u5b66\u4e60\u548c\u81ea\u6211\u6539\u8fdb\u7684\u80fd\u529b\u3002\u4e09\u7bc7\u8bba\u6587\u4ece\u4e0d\u540c\u89d2\u5ea6\u63a2\u7d22\u4e86\u201c\u7ecf\u9a8c\u5185\u5316\u201d\u7684\u8def\u5f84\u3002\n\n**2603.16856 - Online Experiential Learning (OEL)**\n\n- **\u6838\u5fc3\u8d21\u732e**\uff1a\u63d0\u51fa\u8ba9\u8bed\u8a00\u6a21\u578b\u4ece\u90e8\u7f72\u540e\u7684\u771f\u5b9e\u4ea4\u4e92\u7ecf\u9a8c\u4e2d\u6301\u7eed\u5b66\u4e60\u7684\u6846\u67b6OEL\uff0c\u7a81\u7834\u4e86\u8fc7\u53bb\u4ec5\u4f9d\u8d56\u79bb\u7ebf\u6807\u6ce8\u6570\u636e\u7684\u5c40\u9650\u3002\n- **\u5173\u952e\u65b9\u6cd5**\uff1aOEL\u91c7\u7528\u4e24\u9636\u6bb5\u5faa\u73af\u2014\u2014\u9996\u5148\u4ece\u7528\u6237\u4fa7\u7684\u4ea4\u4e92\u8f68\u8ff9\u4e2d\u63d0\u53d6\u53ef\u8fc1\u79fb\u7684\u7ecf\u9a8c\u77e5\u8bc6\uff0c\u7136\u540e\u901a\u8fc7on-policy\u4e0a\u4e0b\u6587\u84b8\u998f\u5c06\u8fd9\u4e9b\u77e5\u8bc6\u6574\u5408\u8fdb\u6a21\u578b\u53c2\u6570\uff0c\u65e0\u9700\u8bbf\u95ee\u7528\u6237\u73af\u5883\u5373\u53ef\u5b9e\u73b0\u6301\u7eed\u8fed\u4ee3\u3002\n- **\u6838\u5fc3\u53d1\u73b0**\uff1a\u5728\u57fa\u4e8e\u6587\u672c\u7684\u6e38\u620f\u73af\u5883\u4e2d\uff0cOEL\u4e0d\u4ec5\u63d0\u5347\u4e86\u4efb\u52a1\u51c6\u786e\u7387\uff0c\u8fd8\u663e\u8457\u6539\u5584\u4e86token\u6548\u7387\uff1b\u63d0\u53d6\u7684\u7ecf\u9a8c\u77e5\u8bc6\u6bd4\u539f\u59cb\u8f68\u8ff9\u66f4\u6709\u6548\uff0c\u4e14\u77e5\u8bc6\u6e90\u4e0e\u7b56\u7565\u6a21\u578b\u4e4b\u95f4\u7684on-policy\u4e00\u81f4\u6027\u662f\u6709\u6548\u5b66\u4e60\u7684\u5173\u952e\u3002\n- **(2603.16856 [cs.CL])**\n\n**2603.16843 - LEAFE: Learning Feedback-Grounded Agency from Reflective Experience**\n\n- **\u6838\u5fc3\u8d21\u732e**\uff1a\u9488\u5bf9\u73b0\u6709\u7ed3\u679c\u9a71\u52a8\u7684\u540e\u8bad\u7ec3\u65b9\u6cd5\uff08\u5982RL with verifiable rewards\uff09\u8fc7\u5ea6\u805a\u7126\u6700\u7ec8\u6210\u529f\u4fe1\u53f7\u3001\u5ffd\u89c6\u4e30\u5bcc\u73af\u5883\u53cd\u9988\u7684\u95ee\u9898\uff0c\u63d0\u51faLEAFE\u6846\u67b6\u3002\n- **\u5173\u952e\u65b9\u6cd5**\uff1aLEAFE\u8ba9Agent\u5728\u63a2\u7d22\u8fc7\u7a0b\u4e2d\u5c06\u73af\u5883\u53cd\u9988\u603b\u7ed3\u4e3a\u53ef\u884c\u52a8\u7684\u7ecf\u9a8c\uff0c\u56de\u6eaf\u5230\u65e9\u671f\u51b3\u7b56\u70b9\u5e76\u63a2\u7d22\u66ff\u4ee3\u5206\u652f\uff0c\u6700\u540e\u901a\u8fc7\u76d1\u7763\u5fae\u8c03\u5c06\u8fd9\u4e9b\u7ecf\u9a8c\u5f15\u5bfc\u7684\u4fee\u6b63\u84b8\u998f\u5230\u6a21\u578b\u4e2d\u3002\n- **\u6838\u5fc3\u53d1\u73b0**\uff1a\u5728\u56fa\u5b9a\u4ea4\u4e92\u9884\u7b97\u4e0b\uff0cLEAFE\u5728\u4ea4\u4e92\u5f0f\u7f16\u7801\u548cAgentic\u4efb\u52a1\u4e0a\u6301\u7eed\u63d0\u5347Pass@1\uff0c\u5e76\u5728Pass@k\u6307\u6807\u4e0a\u8d85\u8d8a\u7ed3\u679c\u9a71\u52a8\u57fa\u7ebf\uff08\u5982GRPO\uff09\u548c\u65e9\u671f\u7ecf\u9a8c\u65b9\u6cd5\uff0cPass@128\u63d0\u5347\u9ad8\u8fbe14%\u3002\n- **(2603.16843 [cs.AI])**\n\n**2603.16060 - ARISE: Agent Reasoning with Intrinsic Skill Evolution**\n\n- **\u6838\u5fc3\u8d21\u732e**\uff1a\u63d0\u51faARISE\u5c42\u6b21\u5316\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u89e3\u51b3\u73b0\u6709\u6570\u5b66\u63a8\u7406RL\u65b9\u6cd5\u5c06\u6bcf\u4e2a\u95ee\u9898\u5b64\u7acb\u5904\u7406\u3001\u672a\u80fd\u5229\u7528\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u79ef\u7d2f\u7684\u53ef\u590d\u7528\u7b56\u7565\u7684\u95ee\u9898\u3002\n- **\u5173\u952e\u65b9\u6cd5**\uff1aARISE\u5c06\u5171\u4eab\u7b56\u7565\u540c\u65f6\u4f5c\u4e3a\u9ad8\u5c42\u6280\u80fd\u7ba1\u7406\u5668\u548c\u4f4e\u5c42\u54cd\u5e94\u751f\u6210\u5668\uff08Worker\uff09\uff1bManager\u901a\u8fc7\u6280\u80fd\u751f\u6210rollout\u5bf9\u6210\u529f\u89e3\u51b3\u8f68\u8ff9\u8fdb\u884c\u7ed3\u6784\u5316\u6458\u8981\u6784\u5efa\u6280\u80fd\u5e93\uff0c\u5e76\u5728\u540e\u7eedrollout\u524d\u68c0\u7d22\u76f8\u5173\u6280\u80fd\u8fdb\u884c\u6761\u4ef6\u751f\u6210\u3002\n- **\u6838\u5fc3\u53d1\u73b0**\uff1a\u5728\u4e24\u4e2a\u57fa\u7840\u6a21\u578b\u548c\u4e03\u4e2a\u6db5\u76d6\u7ade\u8d5b\u6570\u5b66\u4e0eOmni-MATH\u7684\u57fa\u51c6\u4e0a\uff0cARISE\u4e00\u81f4\u8d85\u8d8aGRPO\u7cfb\u5217\u7b97\u6cd5\u548c\u8bb0\u5fc6\u589e\u5f3a\u57fa\u7ebf\uff0c\u5c24\u5176\u5728\u5206\u5e03\u5916\u4efb\u52a1\u4e0a\u8868\u73b0\u7a81\u51fa\uff1b\u6280\u80fd\u5e93\u8d28\u91cf\u4e0e\u63a8\u7406\u80fd\u529b\u5728\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u534f\u540c\u8fdb\u5316\u3002\n- **(2603.16060 [cs.AI])**\n\n---\n\n### \u4e3b\u9898\u4e8c\uff1a\u7814\u7a76Agent\u4e0e\u81ea\u4e3b\u5b9e\u9a8c\u2014\u2014\u4ece\u8c03\u53c2\u5230\u771f\u6b63\u7684\u67b6\u6784\u53d1\u73b0\n\n\u672c\u677f\u5757\u805a\u7126\u4e8eLLM Agent\u4f5c\u4e3a\u201c\u7814\u7a76\u8005\u201d\u89d2     "2026-03-17": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-03-17)\n\n### \u5f15\u8a00\n\n\u4eca\u65e5AI\u9886\u57df\u7684\u7814\u7a76\u5448\u73b0\u51fa**\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u5168\u9762\u7206\u53d1**\u4e0e**\u81ea\u4e3b\u8fdb\u5316\u80fd\u529b\u6df1\u5316**\u4e24\u5927\u6838\u5fc3\u8d8b\u52bf\u3002\u572814\u7bc7\u8bba\u6587\u4e2d\uff0c\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u7f16\u6392\u76f8\u5173\u7814\u7a76\u5360\u636e\u6700\u5927\u6bd4\u91cd\uff0c\u6db5\u76d6\u8def\u7531\u4f18\u5316\u3001\u8ba4\u77e5\u67b6\u6784\u6a21\u62df\u548c\u5206\u5e03\u5f0f\u53d1\u73b0\u7b49\u524d\u6cbf\u65b9\u5411\u3002\u4e0e\u6b64\u540c\u65f6\uff0c\u81ea\u4e3b\u8fdb\u5316\u63a8\u7406\u7cfb\u7edf\u6301\u7eed\u6f14\u8fdb\uff0c\u4ece\u95ee\u9898\u751f\u6210\u591a\u6837\u6027\u7ef4\u62a4\u5230\u56e0\u679c\u63a8\u7406\u5f15\u5bfc\u7684\u6f14\u5316\u7b56\u7565\u5747\u6709\u7a81\u7834\u3002\u6b64\u5916\uff0c**\u795e\u7ecf-\u7b26\u53f7\u878d\u5408\u8bb0\u5fc6**\u3001**\u4ee3\u7801\u667a\u80fd\u4f53\u8fdb\u5316**\u4ee5\u53ca**\u65e0\u8bad\u7ec3\u5b66\u4e60\u6846\u67b6**\u7b49\u7ec6\u5206\u9886\u57df\u4e5f\u6d8c\u73b0\u51fa\u503c\u5f97\u5173\u6ce8\u7684\u65b0\u8fdb\u5c55\u3002\n\n---\n\n### \u4e3b\u9898\u4e00\uff1a\u641c\u7d22\u4e0e\u68c0\u7d22\u667a\u80fd\u4f53\u2014\u2014\u590d\u6742\u63a8\u7406\u7684\u201c\u5916\u8111\u201d\u6784\u5efa\n\n\u672c\u4e3b\u9898\u805a\u7126\u4e8e\u5982\u4f55\u589e\u5f3aLLM\u5728\u591a\u8df3\u590d\u6742\u67e5\u8be2\u4e2d\u7684\u4fe1\u606f\u83b7\u53d6\u4e0e\u63a8\u7406\u80fd\u529b\u3002\n\n**APEX-Searcher** \u9488\u5bf9\u591a\u8df3\u95ee\u9898\u4e2d\u5355\u8f6e\u68c0\u7d22\u4e0d\u8db3\u7684\u75db\u70b9\uff0c\u63d0\u51fa\u4e24\u9636\u6bb5\u667a\u80fd\u4f53\u89c4\u5212\u4e0e\u6267\u884c\u6846\u67b6\u3002\u8be5\u65b9\u6cd5\u5c06\u68c0\u7d22\u8fc7\u7a0b\u89e3\u8026\u4e3a\u89c4\u5212\u4e0e\u6267\u884c\u4e24\u4e2a\u72ec\u7acb\u9636\u6bb5\uff1a\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\u6218\u7565\u89c4\u5212\u80fd\u529b\uff0c\u5229\u7528\u5 ughts\u7b49\u591a\u667a\u80fd\u4f53\u57fa\u7ebf\u3002**(2603.15371 [cs.AI])**\n\n**DOVA** \u5f15\u5165\u591a\u667a\u80fd\u4f53\u5e73\u53f0\u7684\u4e09\u9879\u5173\u952e\u521b\u65b0\uff1a\u5148\u9a8c\u601d\u8003\u7f16\u6392\uff0c\u5728\u5de5\u5177\u8c03\u7528\u524d\u8fdb\u884c\u663e\u5f0f\u5143\u63a8\u7406\uff1b\u6df7\u5408\u534f\u4f5c\u63a8\u7406\uff0c\u7edf\u4e00\u96c6\u6210\u591a\u6837\u6027\u3001\u9ed1\u677f\u900f\u660e\u6027\u548c\u8fed\u4ee3\u7cbe\u70bc\u7684\u4e09\u9636\u6bb5\u7ba1\u9053\uff1b\u81ea\u9002\u5e94\u591a\u5c42\u6b21\u601d\u8003\uff0c\u91c7\u7528\u516d\u7ea7token\u9884\u7b97\u5206\u914d\u65b9\u6848\uff0c\u5728\u7b80\u5355\u4efb\u52a1\u4e0a\u964d\u4f4e40-60%\u63a8\u7406\u6210\u672c\u7684\u540c\u65f6\u4fdd\u6301\u6df1\u5ea6\u63a8\u7406\u80fd\u529b\u3002\u8be5\u7814\u7a76\u5f62\u5f0f\u5316\u6838\u5fc3\u7b97\u6cd5\u5e76\u8fdb\u884c\u67b6\u6784\u6d88\u878d\u5b9e\u9a8c\uff0c\u5206\u6790\u5404\u7ec4\u4ef6\u5bf9\u7b54\u6848\u7f6e\u4fe1\u5ea6\u3001\u6765\u6e90\u8986\u76d6\u548ctoken\u6548\u7387\u7684\u8d21\u732e\u3002**(2603.13327 [cs.AI])**\n\n**ScienceClaw + Infinite** \u5448\u73b0\u4e00\u4e2a\u65e0\u9700\u4e2d\u5fc3\u534f\u8c03\u7684\u81ea\u4e3b\u79d1\u5b66\u7814\u7a76\u6846\u67b6\uff0c\u5141\u8bb8\u72ec\u7acb\u667a\u80fd\u4f53\u5f00\u5c55\u7814\u7a76\u5e76\u5411\u5171\u4eab\u751f\u6001\u7cfb\u7edf\u90e8\u7f72\u65b0\u667a\u80fd\u4f53\u3002\u7cfb\u7edf\u5305\u542b\u4e09\u4e2a\u6838\u5fc3\u7ec4\u4ef6\uff1a\u8d85\u8fc7300\u4e2a\u53ef\u4e92\u64cd\u4f5c\u79d1\u5b66\u6280\u80fd\u7684\u53ef\u6269\u5c55\u6ce8\u518c\u8868\u3001\u4fdd\u5b58\u5b8c\u6574\u8ba1\u7b97\u8c31\u7cfb\u7684\u5de5\u4ef6\u5c42\uff08\u4f5c\u4e3a\u6709\u5411\u65e0\u73af\u56fe\uff09\uff0c\u4ee5\u53ca\u652f\u6301\u667a\u80fd\u4f53\u79d1\u5b66\u8ba8\u8bba\u7684\u7ed3\u6784\u5316\u5e73\u53f0\u3002ArtifactReactor\u5b9e\u73b0\u65e0\u89c4\u5212\u534f\u8c03\uff0cpeer\u667a\u80fd\u4f53\u901a\u8fc7\u538b\u529b\u8bc4\u5206\u53d1\u73b0\u5e76\u6ee1\u8db3\u5f00\u653e\u9700\u6c42\uff0c\u6a21\u5f0f\u91cd\u53e
