                    "summary": "Large language model (LLM) agents often struggle in long-context interactions. As the agent accumulates more interaction history, context management approaches such as sliding window and prompt compression may omit earlier structured information that later steps rely on. Recent retrieval-based memory systems surface relevant content but still overlook the causal and logical structure needed for multi-step reasoning. We introduce ContextWeaver, a selective and dependency-structured memory framework that organizes an agent's interaction trace into a graph of reasoning steps and selects the relevant context for future actions. Unlike prior context management approaches, ContextWeaver supports: (1) dependency-based construction and traversal that link each step to the earlier steps it relies on; (2) compact dependency summarization that condenses root-to-step reasoning paths into reusable units; and (3) a lightweight validation layer that incorporates execution feedback. On the SWE-Bench Verified and Lite benchmarks, ContextWeaver improves performance over a sliding-window baseline in pass@1, while reducing reasoning steps and token usage. Our observations suggest that modeling logical dependencies provides a stable and scalable memory mechanism for LLM agents that use tools.",
                    "category": "cs.CL",
                    "cluster": "Skill Retrieval and Memory Management",
                    "tags": ["cs.CL"],
                    "filter_reason": "**第一步：核心判断**\n\n这篇论文的本质是**构建LLM智能体的记忆机制**。论文提出了ContextWeaver框架，核心贡献在于解决LLM智能体在长上下文交互中的记忆管理问题，通过依赖结构化的方式组织和检索交互历史。这明确属于\"构建LLM智能体\"的范畴。\n\n**第二步：正面指标分析**\n\n- **核心范式**: ✓ 明确涉及 `LLM-based Agents` 和 `Memory` 机制\n- **智能体能力**: ✓ 论文直接涉及智能体的 `Memory` 能力建设，以及 `Tool Use`（在SWE-Bench上使用工具解决问题）\n- **演化机制**: 论文中的\"依赖摘要\"和\"验证层\"涉及一定程度的迭代优化，但主要聚焦于记忆结构本身\n\n**第三步：排除标准检查**\n\n- 安全相关: ✓ 不涉及\n- 多模态与视觉: ✓ 不涉及\n- 图相关技术: ⚠️ 论文使用了图结构来组织记忆（dependency graph），但这是实现依赖结构化记忆的手段，而非研究图神经网络或知识图谱本身，属于智能体内部架构设计，应保留\n- 多智能体拓扑与编排: ✓ 不涉及\n\n**第四步：综合评估**\n\n虽然论文没有直接涉及\"自我演化\"机制，但其核心贡献是构建智能体的记忆系统，这是智能体架构的核心组件之一。论文明确针对LLM智能体的长上下文管理问题，提出了结构化的记忆框架来支持多步推理，这符合筛选标准中\"核心贡献在于构建LLM智能体\"的要求。\n\n该论文属于单智能体方向的**记忆（Memory）**子方向，符合研究者的筛选范围。",
                    "intro_logic": "1. LLM agents 在执行需要与外部环境进行多轮交互的复杂任务时，会产生冗长的交互历史（interaction history）。\n2. 由于当前 LLM 存在上下文窗口长度限制，且长上下文会损害模型性能，因此必须对交互历史进行选择性压缩或重组。\n3. 现有的上下文管理方法（如滑动窗口、提示压缩、基于检索的方法）主要通过近期性、显著性或语义相似性来选择内容。\n4. 这些选择信号无法捕捉步骤之间存在的逻辑与因果依赖结构（logical and causal dependencies），例如后续动作对先前决策、工具输出或中间假设的依赖。\n5. 当这些依赖关系在上下文中丢失时，会导致智能体行为故障，例如中断正在执行的计划、重复之前的探索或产生与早期上下文不匹配的步骤。\n6. 研究问题：如何为 LLM agents 构建一种能够选择性保留并利用步骤间逻辑与因果依赖关系的记忆（memory）框架，以提升其在长上下文交互中的表现？",
                    "core_insight": "1. **关键洞察**\n\n**一句话概括：** Agent的上下文记忆选择不应基于时间近因或语义相似性，而应基于推理步骤之间的因果与逻辑依赖（即信息流）。\n\n**展开解释：** \n现有的LLM Agent上下文管理方法（如滑动窗口或语义检索）本质上是在做“时间过滤”（保留最近的）或“主题过滤”（保留相似的）。但这忽略了一个根本事实：Agent的推理是一个**依赖链**。下一步的行动并不取决于“刚刚发生了什么”或“什么话题相关”，而是取决于“当前步骤需要哪些特定历史步骤的输出或结论来支撑”。如果丢失了这种逻辑和因果依赖，Agent就会破坏正在进行的计划、重复探索或产生与早期前提矛盾的步骤。作者的认知突破在于，将Agent的历史轨迹视为一个**信息流动的依赖图**，而非简单的线性文本流或搜索树。正如论文所指出的：\n\n> \"Such signals do not capture the dependency structure that links one reasoning step to the next. In agentic settings, each next action can depend on (i) earlier decisions, (ii) tool outputs, and (iii) intermediate hypotheses generated during the trajectory.\"\n\n同时，作者明确区分了这种“后验的依赖结构”与现有的“先验的推理搜索树”（如Tree of Thoughts）的不同，这是视角上的关键跃迁：\n\n> \"These methods are designed for planning within a single reasoning episode rather than organizing persistent memory across long agent trajectories. In contrast, our work uses graph structure to organize past experience by constructing a dependency graph over executed steps... we model explicit logical and causal relationships (e.g., when the output of one step is required by another)...\"\n\n2. **从洞察到方法的桥梁**\n\n这个洞察直接催生了ContextWeaver的DAG（有向无环图）架构及其三个核心组件，推理链条如下：\n\n*   **步骤1：从“信息流”到“依赖图构建”**。既然上下文的选择应基于依赖，那么首先必须将线性的历史轨迹重构为显式的依赖图。这就是**Dependency-Aware Context Construction**模块。每一个新的推理步骤被提取为节点，并通过LLM分析其与历史节点的逻辑/因果关联，建立边，从而形成DAG。\n*   **步骤2：从“依赖图”到“祖先遍历选择”**。有了DAG后，如何为下一步行动提取上下文？不再是截取最近的窗口，而是从当前节点沿着依赖边**向上回溯**，提取出所有直接或间接支撑当前步骤的“祖先节点集合”。这确保了保留的上下文是当前决策真正需要的证据链。\n*   **步骤3：从“图结构膨胀”到“依赖摘要”**。随着交互增长，DAG会变得庞大，回溯整个祖先链可能超出Token预算。因此需要**Dependency Summarizer**，它不是对整个历史进行扁平摘要，而是沿着图的路径增量式地压缩根节点到当前节点的推理脉络，形成可复用的紧凑记忆单元。\n*   **步骤4：从“推理不可靠”到“验证层过滤”**。依赖图可能包含错误的推理分支（如执行失败的步骤）。为了防止Agent基于错误的依赖继续推理，引入了**Validation Layer**。它利用工具执行反馈（如测试结果）为节点打上可靠性标签，在构建图和回溯时剪枝掉失败或被取代的节点，确保信息流的源头是可靠的。\n\n3. **试错历程**\n\n在实现这一洞察的过程中，作者遇到了几个意料之外的困难，并做出了关键的调整：\n\n*   **困难1：图拓扑的复杂度与稳定性权衡（Tree vs. DAG）**\n    最初可能会认为，简单的树结构（每个节点只有一个父节点）足以表示依赖且更易实现。但在实验中，作者发现强制将多源依赖（例如一个修复步骤同时依赖于一个错误报告和一个先前的探索发现）压缩为单父节点会损失信息。虽然DAG和Tree在平均性能上差异不大（68.0% vs 67.0%），但DAG带来了**显著的方差降低**（1.55 vs 2.92）。这意味着允许节点拥有多个父节点（捕捉并行依赖）对于Agent在长轨迹中的**鲁棒性和稳定性**至关重要，而非仅仅为了提升峰值性能。\n    > \"Table 3 shows a small difference in mean Pass@1 between the DAG (68.0%) and Tree (67.0%) variants, but the DAG configuration consistently yields lower run-to-run variance (1.55 vs. 2.92), indicating improved stability.\"\n\n*   **困难2：LLM摘要的“细节丢失”陷阱**\n    作者尝试了LLM摘要作为基线，但发现对于较弱的模型（如Gemini 3 Flash, GPT-5），摘要反而比滑动窗口更差。原因是模型在压缩自身历史时，会遗漏后续步骤必需的硬性细节（如具体的错误信息、文件路径）。这促使作者调整了ContextWeaver的压缩策略：**绝不摘要被选中的核心依赖节点，而是保留其原始的Thought-Action-Observation；仅对未被选中的非祖先节点进行轻量级压缩（如省略Observation）**。\n    > \"weaker models produce summaries that omit details the agent needs in later steps, such as specific error messages or file paths... ContextWeaver avoids this issue by keeping raw observations and selecting which ones to retain based on the dependency graph, rather than asking the model to compress its own history.\"\n\n*   **困难3：结构化记忆在简单线性任务中的“过度分支”开销**\n    在案例研究中，作者意外发现对于只需单文件、单点修改的简单线性任务（如pytest-dev pytest-7205），ContextWeaver反而不如滑动窗口。因为依赖图会引入不必要的分支探索，导致Agent反复apply-revert（尝试-回退），稀释了焦点。这让作者意识到，基于依赖的结构化记忆并非万能的归纳偏置，它在需要跨步骤/跨文件协调的复杂任务中优势明显，但在严格线性的局部任务中，近因偏置反而更有效。这是一个重要的边界认知。\n    > \"In pytest-dev pytest-7205... The sliding-window baseline benefits from always retaining the most recent edit history, while ContextWeaver introduces unnecessary branching that dilutes focus in strictly linear debugging trajectories.\"",
                    "methodology": "好的，我们开始。这篇论文讲的是如何管理LLM智能体（比如能自动写代码、修bug的AI助手）在长期任务中的“记忆”问题。\n\n### 一句话概括核心创新\n这篇论文的方法，和之前只保留最近几条记录（滑动窗口）或靠语义相似度检索记忆的做法相比，最本质的区别是：**它不再按时间远近或内容像不像来选记忆，而是按照步骤之间的逻辑依赖关系来选**——只保留对当前步骤有直接因果或逻辑支持的历史步骤。\n\n### 按照执行的逻辑顺序拆解\n假设智能体正在一步步地执行任务（比如修bug），每执行一步（思考、行动、得到结果），ContextWeaver就会运行一次，为下一步生成精简的上下文。它的工作流程如下：\n\n**第一步：把新步骤变成结构化节点**\n- **输入**：智能体刚执行完的一步的完整记录（包括内部思考、调用的工具、工具返回的结果）。\n- **操作**：用一个LLM总结这一步的核心内容，并把它打包成一个结构化的“节点”。这个节点里存了总结、待会儿要填的依赖关系、以及执行结果的验证状态（比如测试通过了没）。\n- **输出**：一个代表当前步骤的节点。\n- **目的**：把非结构化的对话历史，变成一个个可以互相链接的、有明确含义的单元。这是后续分析依赖关系的基础。\n- **如果不做会怎样**：信息就是一团乱麻的文本，无法精确分析“哪一步依赖于哪一步”这种逻辑关系。\n\n**第二步：为新节点找“爸爸”（依赖的步骤）**\n- **输入**：1. 新生成的当前节点；2. 之前所有已验证有效的旧节点。\n- **操作**：用一个专门的“逻辑依赖分析器”（本质上是一个LLM，给它看当前步骤和候选旧步骤，让它判断依赖关系），为当前节点找出最多m个它所依赖的旧节点，并把它们标记为当前节点的“父节点”。\n- **输出**：确定了当前节点和哪些旧节点之间存在依赖箭头（谁依赖谁）。\n- **目的**：建立步骤之间的逻辑链条。比如，当前“修改A文件”这一步，可能是因为之前“发现A文件第10行有错误”那一步。这个操作就是为了捕捉这种逻辑联系，而不是因为两个步骤都提到了“A文件”这个表面相似性。\n- **如果不做会怎样**：步骤之间失去逻辑关联，智能体可能忘记自己为什么这么做，或者重复尝试已经被证明无效的老路。\n\n**第三步：沿着依赖链，往回找“祖宗”**\n- **输入**：1. 当前节点；2. 整个依赖图（包含刚建立的箭头）。\n- **操作**：从当前节点出发，沿着“父节点”的箭头反向查找（广度优先搜索），把所有直接或间接支持当前节点的祖先节点都找出来，直到找够预设的数量上限（比如5个）。\n- **输出**：一个“祖先节点集合”，里面包含了从任务起点到当前节点，最核心的那条（或几条）逻辑路径上的所有步骤。\n- **目的**：在成千上百的历史步骤中，精准筛选出对当前决策真正有用的部分。这保证了上下文的精简和相关。\n- **如果不做会怎样**：要么把整个冗长的历史都塞给模型（超长），要么像滑动窗口一样可能丢掉关键但久远的逻辑起点。\n\n**第四步：编织最终上下文**\n- **输入**：1. 完整的历史记录列表；2. 上一步得到的“祖先节点集合”。\n- **操作**：遍历所有历史记录。如果某条记录对应的节点在“祖先集合”里，就完整保留；如果不在，就进行压缩——只保留“思考”和“行动”，把冗长的“观察结果”（比如一大段错误日志）替换成一个简短的提示（如“此处省略了XX行输出”）。\n- **输出**：一个长短受控、且包含了完整逻辑链条的最终提示文本，送给LLM智能体去决定下一步怎么做。\n- **目的**：在严格的长度限制下，确保关键逻辑链条的完整，同时舍弃无关细节。这是整个方法最终落地的一步。\n- **如果不做会怎样**：即使知道了依赖关系，也无法生成一个模型能处理的、包含这些关系的具体文本。\n\n**贯穿始终的步骤：记录验证结果**\n- **输入**：智能体每一步执行后得到的反馈（特别是像运行测试成功/失败这样的明确信号）。\n- **操作**：解析这些反馈，给对应的节点打上标签，如“通过”、“失败”、“已过时（被后续修正取代）”。\n- **输出**：每个节点都有一个“健康状态”标签。\n- **目的**：让依赖图保持健康。在第二步“找爸爸”时，系统会跳过那些标记为“失败”或“已过时”的节点，避免智能体再去依赖一个已知的错误基础。这是一个利用环境反馈进行自我清理的机制。\n- **如果不做会怎样**：智能体可能会反复基于一个错误的前提进行推理，浪费步骤。\n\n### 结合消融实验，解释这套方法为什么有效\n论文通过对比实验（消融实验）验证了各个部分的作用：\n\n1.  **哪个组件贡献最大？——依赖图结构本身。**\n    - 实验对比了“有向无环图”（DAG，一个节点可以有多个父节点）和“树”（一个节点只能有一个父节点）两种结构。结果DAG版本的平均性能略高，但**关键是其性能波动（方差）显著更小**。\n    - **这说明什么？** 允许一个步骤依赖多个前序步骤（DAG），更符合真实任务中复杂的推理逻辑（比如一步修改需要综合之前好几个发现）。这种灵活性带来了更**稳定**的表现，这是依赖结构带来的核心价值之一。\n\n2.  **哪个组件可有可无？——具体的“窗口大小”参数。**\n    - 论文尝试了不同的祖先集合大小（5，7，9），发现性能没有显著差异。\n    - **这说明什么？** 只要依赖关系抓得准，具体保留最近5步还是7步的完整细节，对结果影响不大。这反过来说明，**依赖选择机制本身比单纯控制长度更重要**。方法的有效性不依赖于对某个超参数的精细调优。\n\n3.  **回扣动机：**\n    - 论文在Introduction中指出的痛点是：现有方法（滑动窗口、语义检索）会**丢失步骤间的逻辑依赖**，导致智能体计划断裂、重复探索。\n    - **实验数据支持**：在需要跨多文件协调的复杂任务中，ContextWeaver因保持了长期依赖而成功，滑动窗口则因丢失早期关键信息而失败。这直接证明了**“按依赖关系而非时间筛选记忆”这个核心设计，确实解决了它所声称的痛点**。消融实验进一步表明，**允许复杂的多父节点依赖（DAG）是使该方法稳健的关键**。\n\n### 这套方法的硬伤在哪里？\n根据论文Limitation部分，主要有两个：\n\n1.  **严重依赖明确的验证信号。** 这个方法在SWE-Bench（修代码）这类环境里很好用，因为每一步运行测试都能给出“对/错”的明确反馈。但在很多开放领域任务（比如创意写作、开放式对话）中，没有这种清晰的“通过/失败”信号，那么它的“验证层”和基于此的依赖图清理机制就难以发挥作用。\n2.  **构建依赖图本身需要成本。** 无论是提取节点还是分析逻辑依赖，都需要调用LLM（文中的“逻辑依赖分析器”）来完成。这增加了额外的计算开销和延迟，对于需要快速响应的应用场景可能是个负担。\n\n**总结一下**：这篇论文提出了一种给LLM智能体管理“工作记忆”的新思路：像程序员看调用栈一样，只保留和当前操作有直接因果关系的“调用链”。它通过构建和遍历一个依赖图来实现这一点，并在有明确对错反馈的任务中表现出了更好的效率和稳定性。但其效果严重依赖于任务能否提供清晰的验证信号。",
                    "additional_insights": "1.  **实验中的反直觉发现**\n    *   **LLM summarization 并非总是有效，甚至可能有害**：尽管LLM总结历史是一种直观的上下文管理方法，但论文发现，对于能力较弱的模型（如GPT-5、Gemini 3 Flash），其总结效果甚至不如简单的滑动窗口。这是因为弱模型生成的总结可能遗漏后续步骤所需的关键细节（如具体的错误信息），而滑动窗口至少完整保留了最近的观察。依据：第4.2节，LLM Summarization Results部分。\n    *   **依赖结构记忆在简单、线性的任务中可能成为负担**：在一个单文件、单行修改的案例（pytest-dev pytest-7205）中，依赖图结构引入了不必要的分支，反而稀释了注意力，导致性能不如仅关注最近历史的滑动窗口基线。这表明，对于高度线性的任务，基于逻辑依赖的复杂记忆可能不如基于“最近性”的简单归纳偏差有效。依据：第4.3节，Localized sequential fixes部分及附录C.1的案例2。\n\n2.  **有启发性的分析或 ablation**\n    *   **DAG结构相比Tree结构的主要优势在于稳定性**：消融实验表明，将依赖图限制为树结构（每个节点只有一个父节点）与使用DAG（允许多个父节点）在平均性能上差异不大，但DAG的方差（标准差）显著更低。这表明DAG的冗余连接能缓冲错误，提供更稳定的表现，这对实际部署很重要。依据：第4.5节，Graph vs. Tree Topology部分及表3(a)。\n    *   **性能对“窗口大小”参数不敏感**：在设定的参数范围内（5, 7, 9），ContextWeaver的性能没有表现出对祖先窗口大小的强敏感性。这表明该方法在合理的上下文预算内具有一定的鲁棒性。依据：第4.6节，Sensitivity to Window Size部分及表3(b)。\n\n3.  **对领域的新认知**\n    *   **在Agent任务中，“逻辑依赖”与“语义相似性”是两种不同的上下文关联信号**：论文明确指出，传统的基于检索（retrieval）或语义相似性（semantic similarity）的记忆系统，与基于信息流和因果关系的逻辑依赖（logical dependency）建模有本质区别。父节点选择是基于“当前步骤是否需要前一步的具体结果”来判定的，这修正了我们对“相关上下文”的理解。依据：第2节Related works及第3.1节Parent Selection。\n    *   **Agent的动态交互历史与代码的静态结构分析是互补的**：论文区分了专门用于软件工程的Agent所依赖的静态分析（如AST）和ContextWeaver所关注的动态交互历史。关键洞见是：在如SWE-Bench的任务中，解决问题的关键上下文往往出现在运行时错误日志、测试失败信息等动态交互中，而非仅存在于静态代码文件里。这深化了我们对Agent所需上下文类型的理解。依据：第2节，Static Analysis and Repository Context部分。\n\n4.  **实用的经验性结论**\n    *   **组织记忆时，优先使用DAG而非Tree结构**：即使性能均值相近，DAG也能带来更低的方差和更高的稳定性，这对于生产环境中的可靠Agent至关重要。依据：第4.5节及表3(a)。\n    *   **对非关键历史条目进行“观察压缩”时，简单的占位符替换是有效且低成本的方法**：对于未被选入依赖子图的历史条目，ContextWeaver仅压缩其Observation部分，用“（N lines omitted）”这样的占位符替换，而不是进行复杂的语义总结。这平衡了信息保留和token节省。依据：第3.1节Context Weaving及附录D。\n    *   **父节点选择时，限制最大父节点数（m）为一个小值（如2）是可行的**：这有助于控制依赖图的复杂度，避免每个新节点与过多历史节点产生连接，从而保持图的简洁和高效遍历。依据：算法1及第3.1节Parent Selection。\n\n5.  **局限性中的机会**\n    *   **将依赖构建扩展到缺乏明确测试信号的开放领域**：论文承认当前方法依赖于SWE-Bench等环境中可用的明确测试反馈。未来研究可以探索如何从更隐式的断言、运行时跟踪或外部验证器中提取可靠的依赖信号，从而将方法应用于更广泛的Agent任务。依据：第5节Limitations。\n    *   **开发更轻量、更可靠的依赖分析器**：目前父节点选择完全依赖LLM，其可靠性和成本是潜在问题。未来可以探索使用更小的专用控制器模型，或结合测试覆盖度（coverage）等结构化信息来辅助或替代LLM进行依赖分析，以降低开销并提高鲁棒性。依据：第5节Future Work。",
                    "research_value": "### 1. 影响力潜力（Impact）\n**正面证据**：论文在SWE-Bench基准上，相比滑动窗口基线，在提升任务解决率（pass@1）的同时，减少了推理步骤和token使用。这表明该方法在特定任务（软件工程）中能直接提升Agent的效率和成功率。消融实验表明DAG结构能带来更稳定的性能（方差更低），这对生产环境部署有实际价值。\n**负面证据或缺失**：影响力局限于有明确验证信号（如测试通过/失败）的封闭任务环境。论文自身承认在缺乏此类信号的开放领域（如对话、创意写作）中方法难以直接应用。目前未看到在更广泛任务或实际工业场景中的验证。\n**判断**：中等\n**理由**：论文在软件工程Agent这一具体且重要的子领域内，通过实验证明了其方法能有效解决“长上下文丢失逻辑依赖”这一痛点，并带来了效率提升和稳定性增益，这足以影响该子领域的研究者和实践者。但其应用范围的明显局限性（依赖明确验证信号）阻碍了其成为更通用的范式转变。\n\n### 2. 不可替代性（Uniqueness）\n**正面证据**：论文的核心创新点——基于逻辑依赖（而非时间或语义）构建记忆图——在输入材料中被明确为与现有方法（滑动窗口、语义检索）的本质区别。现有方法被指出无法捕捉步骤间的逻辑与因果依赖结构。\n**负面证据或缺失**：构建动态交互历史的依赖关系图是一个相对直观的想法。随着对Agent长上下文问题研究的深入，类似的基于图结构或因果关系的记忆管理思路很可能被其他研究者独立提出。\n**判断**：中等\n**理由**：虽然“按依赖关系组织记忆”这一核心思想具有独创性，且论文给出了完整的实现框架（ContextWeaver），但这一方向并非完全不可预见。考虑到LLM Agent研究社区对可靠长程推理的迫切需求，类似的解决方案可能在1-2年内被多个团队独立探索出来。论文的价值在于率先给出了一个具体、可工作且经过实证检验的系统性实现。\n\n### 3. 时机判断（Timing）\n**正面证据**：LLM Agent研究正处于快速上升期，处理复杂、多步任务是其核心挑战之一。上下文长度限制及其导致的性能下降是公认的瓶颈，因此高效上下文管理是当前的研究热点。\n**负面证据或缺失**：无具体负面证据。时机判断更多基于领域共识。\n**判断**：强\n**理由**：该研究精准地切入了一个当前极度活跃且未成熟的研究领域（LLM Agent的长程记忆与推理）中的一个关键痛点（上下文管理）。问题本身正当其时，既不是过早（社区已认识到问题），也远未过晚（尚无公认解决方案）。\n\n### 4. 对现有范式的审视（Challenging Conventions）\n**正面证据**：论文明确挑战了基于“近期性”（滑动窗口）和“语义相似性”（检索）的上下文选择范式，指出它们会丢失关键的逻辑依赖信息。这是对现有常见做法的一种根本性质疑。\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：论文没有停留在对现有方法的增量改进上，而是提出了一个不同的选择标准（逻辑依赖）。它通过实验证明了在某些情况下，遵循“最近性”归纳偏差的滑动窗口方法会失败，而依赖逻辑链条的方法能成功。这直接挑战并试图修正领域内对“相关上下文”的默认理解。\n\n### 5. 核心洞见的清晰度（Core Insight）\n**正面证据**：输入材料中多次用一句话概括：“按步骤间的逻辑依赖关系，而非时间远近或语义相似性，来为LLM Agent筛选记忆”。\n**负面证据或缺失**：无具体负面证据。\n**判断**：强\n**理由**：核心洞见极其清晰、简洁，且与现有做法形成鲜明对比。它用一个简单的原则（看逻辑依赖）统一了整个方法的设计，并能够被轻易理解和传播。\n\n### 6. 风险与可行性（Risk vs. Feasibility）\n**正面证据**：论文在SWE-Bench上完成了实证验证，证明了方法的可行性。通过消融实验（如DAG vs. Tree）探讨了不同设计选择的风险与收益。\n**负面证据或缺失**：方法存在明确的技术风险：1）严重依赖环境提供的明确验证信号来清理依赖图，这在许多任务中不可得；2）依赖另一个LLM（逻辑依赖分析器）来构建图，引入了额外的成本、延迟和错误传递风险。实验中也发现了方法在简单线性任务上可能不如滑动窗口的反例。\n**判断**：中等\n**理由**：论文成功地将一个具有风险（依赖关系识别可能不准）的想法，在一个条件适宜的任务环境（SWE-Bench）中实现了出来，并获得了积极结果，证明了其核心路线的可行性。但同时，论文也诚实地揭示了该方法的重大局限性和依赖条件，这些构成了将其推广到其他领域的主要风险。\n\n### 7. 比较优势（Comparative Advantage）\n**正面证据**：无具体证据。输入材料未提供作者团队背景信息。\n**负面证据或缺失**：无法从提供的材料中判断团队是否在LLM推理、软件工程Agent或图表示学习方面有独特积累。\n**判断**：弱\n**理由**：根据“举证责任在好的一边”原则，在缺乏任何关于团队背景、过往工作或资源的具体信息的情况下，无法做出正面判断。只能判定为证据不足。\n\n---\n**综合评价**：有潜力但有明显短板。这篇论文提出了一个清晰、有说服力的核心洞见（基于逻辑依赖管理记忆），并在一个合适的基准上验证了其优于主流基线方法，对现有范式构成了有价值的挑战。然而，其影响力的范围和方法的通用性被两个显著的短板所限制：对明确验证信号的严重依赖，以及构建依赖图的额外开销。\n\n**最致命的弱点**：方法严重依赖任务环境能提供明确、可解析的“验证信号”（如测试通过/失败）来维护依赖图的健康度。这将其应用范围牢牢限制在SWE-Bench这类封闭、有确定评估标准的任务中，极大地削弱了其向开放域、创造性或交互式任务推广的潜力。\n\n**如果要做得更好**：1. **探索更普适的依赖信号**：最值得调整的方向是研究如何在不依赖明确“通过/失败”信号的任务中，从交互历史中推断出可靠的逻辑依赖关系（例如，通过分析动作与状态变化的关联）。2. **降低构建成本**：探索用更轻量、更专有的模型或启发式规则来替代通用的LLM进行依赖分析，以减少延迟和开销。\n\n**与 Carlini 原则的对照**：\n*   **最符合原则#3：审视默认假设**。它成功地质疑了Agent上下文管理中“近期性”和“语义相似性”这两个默认的选择标准，并提出了“逻辑依赖性”这一替代方案。\n*   **最不符合原则#8：追求简洁性**。该方法引入了额外的系统复杂性（需要维护和遍历一个动态图，并依赖另一个LLM进行分析），以换取性能提升，这与“用最简单的方法解决问题”的简洁性追求有一定距离。",

                    "summary_translation": "大型语言模型（LLM）代理在长上下文交互中常面临挑战。随着代理积累更多交互历史，滑动窗口（sliding window）和提示压缩（prompt compression）等上下文管理方法可能会遗漏后续步骤所依赖的早期结构化信息。近期基于检索的记忆系统虽能提取相关内容，但仍未充分考虑多步推理所需的因果与逻辑结构。本文提出ContextWeaver——一种选择性、依赖结构化的记忆框架，该框架将代理的交互轨迹组织为推理步骤图（graph of reasoning steps），并为后续行动选择相关上下文。与先前的上下文管理方法相比，ContextWeaver具备以下特性：（1）基于依赖关系的构建与遍历机制，将每个步骤与其依赖的早期步骤相连接；（2）紧凑依赖摘要（compact dependency summarization）功能，将根节点至步骤的推理路径压缩为可复用单元；（3）轻量级验证层（validation layer），可整合执行反馈。在SWE-Bench Verified与Lite基准测试中，ContextWeaver在pass@1指标上较滑动窗口基线表现更优，同时减少了推理步骤与令牌消耗。实验结果表明，建模逻辑依赖关系为使用工具的LLM代理提供了一种稳定且可扩展的记忆机制。"

    "2026-04-29": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-29)\n\n\u4eca\u5929\u7684\u8bba\u6587\u51e0\u4e4e\u88ab\u201cAgent\u201d\u4e3b\u7ebf\u8d2f\u7a7f\uff1a\u4ece\u957f\u671f\u8bb0\u5fc6\u3001\u5f00\u53d1\u6846\u67b6\u3001\u8fd0\u7ef4\u843d\u5730\uff0c\u5230\u5b9a\u7406\u8bc1\u660e\u3001\u591a\u667a\u80fd\u4f53\u653f\u7b56\u6a21\u62df\u548c\u795e\u7ecf\u7b26\u53f7\u67b6\u6784\uff0c\u7814\u7a76\u91cd\u70b9\u6b63\u4ece\u201c\u8ba9\u6a21\u578b\u56de\u7b54\u95ee\u9898\u201d\u8f6c\u5411\u201c\u8ba9\u6a21\u578b\u5728\u957f\u671f\u73af\u5883\u4e2d\u53ef\u9760\u5de5\u4f5c\u201d\u3002\u4e00\u4e2a\u660e\u663e\u8d8b\u52bf\u662f\uff0cAgent \u7cfb\u7edf\u7684\u74f6\u9888\u4e0d\u518d\u53ea\u662f\u63a8\u7406\u80fd\u529b\uff0c\u800c\u662f**\u8bb0\u5fc6\u7ec4\u7ec7\u3001\u5de5\u5177\u7f16\u6392\u3001\u77e5\u8bc6\u66f4\u65b0\u3001\u53ef\u9a8c\u8bc1\u8bc4\u4f30\u4e0e\u7ed3\u6784\u5316\u6cdb\u5316**\u3002\u540c\u65f6\uff0c\u591a\u7bc7\u5de5\u4f5c\u90fd\u5728\u5c1d\u8bd5\u628a LLM \u653e\u56de\u4e00\u4e2a\u66f4\u5927\u7684\u7cfb\u7edf\u4e2d\uff1a\u8ba9\u5b83\u8c03\u7528\u89c6\u89c9\u8bb0\u5fc6\u3001\u6280\u80fd\u5e93\u3001\u5f62\u5f0f\u5316\u8bc1\u660e\u5668\u3001\u56e0\u679c\u7a0b\u5e8f\u56fe\u6216\u5f02\u6784\u6a21\u578b\u7fa4\u4f53\u3002\u4eca\u5929\u7684\u5173\u952e\u8bcd\u53ef\u4ee5\u6982\u62ec\u4e3a\uff1a**\u957f\u671f\u6027\u3001\u53ef\u9a8c\u8bc1\u6027\u3001\u53ef\u6f14\u5316\u6027\u4e0e\u7cfb\u7edf\u5316\u90e8\u7f72**\u3002\n\n---\n\n### Agent Memory Systems\uff1aLLM Agent \u7684\u957f\u671f\u8bb0\u5fc6\u80fd\u5426\u7ed5\u5f00\u6587\u672c\u4e0a\u4e0b\u6587\u74f6\u9888\uff1f\n\n- **OCR-Memory: Optical Context Retrieval for Long-Horizon Agent Memory**  \n  \u8fd9\u7bc7\u8bba\u6587\u9488\u5bf9\u957f\u671f\u4ea4\u4e92\u5f0f Agent \u7684\u6838\u5fc3\u75db\u70b9\uff1a\u5386\u53f2\u8f68\u8ff9\u592a\u957f\uff0c\u76f4\u63a5\u585e\u8fdb\u4e0a\u4e0b\u6587\u6210\u672c\u8fc7\u9ad8\uff1b\u6458\u8981\u53c8\u5bb9\u6613\u4e22\u5931\u5173\u952e\u8bc1\u636e\u3002\u4f5c\u8005\u63d0\u51fa **OCR-Memory**\uff0c\u5c06\u5386\u53f2\u8f68\u8ff9\u6e32\u67d3\u6210\u5e26\u6709\u89c6\u89c9\u6807\u8bc6\u7b26\u7684\u56fe\u50cf\uff0c\u7528\u89c6\u89c9\u6a21\u6001\u4f5c\u4e3a\u9ad8\u5bc6\u5ea6\u8bb0\u5fc6\u8f7d\u4f53\uff0c\u518d\u901a\u8fc7 **locate-and-transcribe** \u673a\u5236\u5b9a\u4f4d\u76f8\u5173\u533a\u57df\u5e76\u8f6c\u5f55\u539f\u6587\u3002\u5176\u5173\u952e\u4ef7\u503c\u5728\u4e8e\uff0c\u5b83\u4e0d\u662f\u8ba9\u6a21\u578b\u201c\u56de\u5fc6\u201d\u5386\u53f2\uff0c\u800c\u662f\u8ba9\u6a21\u578b\u4ece\u89c6\u89c9\u7d22\u5f15\u4e2d**\u5fe0\u5b9e\u53d6\u56de\u9010\u5b57\u8bc1\u636e**\uff0c\u4ece\u800c\u5728\u4e25\u683c\u4e0a\u4e0b\u6587\u9650\u5236\u4e0b\u63d0\u5347\u957f\u7a0b\u4efb\u52a1\u8868\u73b0\u3002 (2604.26622 [cs.CL])\n\n---\n\n### Agent Development Frameworks\uff1a\u4ece\u7814\u7a76\u539f\u578b\u8d70\u5411\u53ef\u8bad\u7ec3\u3001\u53ef\u8bc4\u4f30\u3001\u53ef\u90e8\u7f72\u7684 Agent \u5de5\u7a0b\u4f53\u7cfb\n\n- **ClawGym: A Scalable Framework for Building Effective Claw Agents**  \n  **ClawGym** \u9762\u5411\u201cClaw-style\u201d\u4e2a\u4eba Agent \u73af\u5883\uff0c\u5373\u9700\u8981\u5728\u672c\u5730\u6587\u4ef6\u3001\u5de5\u5177\u548c\u6301\u4e45\u5316\u5de5\u4f5c\u533a\u4e2d\u5b8c\u6210\u591a\u6b65\u4efb\u52a1\u7684\u573a\u666f\u3002\u8bba\u6587\u8d21\u732e\u4e0d\u53ea\u662f\u4e00\u4e2a benchmark\uff0c\u800c\u662f\u4e00\u4e2a\u5b8c\u6574\u751f\u547d\u5468\u671f\u6846\u67b6\uff1a\u5305\u542b 13.5K \u5408\u6210\u4efb\u52a1\u6570\u636e\u96c6 **ClawGym-SynData**\u3001\u57fa\u4e8e\u9ed1\u76d2 rollout \u7684 SFT \u8bad\u7ec3\u6d41\u7a0b\u3001\u8f7b\u91cf\u5316 RL \u7ba1\u7ebf\uff0c\u4ee5\u53ca 200 \u4f8b\u4eba\u5de5\u4e0e\u81ea\u52a8\u6821\u51c6\u7684 **ClawGym-Bench**\u3002\u5b83\u4ee3\u8868\u4e86 Agent \u7814\u7a76\u7684\u4e00\u4e2a\u91cd\u8981\u5de5\u7a0b\u65b9\u5411\uff1a\u628a\u201c\u4f1a\u7528\u5de5\u5177\u201d\u8f6c\u5316\u4e3a\u53ef\u89c4\u6a21\u5316\u751f\u6210\u6570\u636e\u3001\u8bad\u7ec3\u6a21\u578b\u548c\u8bca\u65ad\u80fd\u529b\u7684\u7cfb\u7edf\u3002 (2604.26904 [cs.CL])\n\n- **Bian Que: An Agentic Framework with Flexible Skill Arrangement for Online System Operations**  \n  **Bian Que** \u805a\u7126\u5927\u89c4\u6a21\u7ebf\u4e0a\u7cfb\u7edf\u8fd0\u7ef4\uff0c\u5305\u62ec\u53d1\u5e03\u76d1\u63a7\u3001\u544a\u8b66\u54cd\u5e94\u548c\u6839\u56e0\u5206\u6790\u3002\u4f5c\u8005\u6307\u51fa\u771f\u5b9e\u90e8\u7f72\u4e2d\u7684\u74f6\u9888\u4e0d\u662f LLM \u4e0d\u4f1a\u63a8\u7406\uff0c\u800c\u662f\u5982\u4f55\u5728\u5177\u4f53\u4e8b\u4ef6\u4e2d\u9009\u62e9\u6b63\u786e\u7684\u6570\u636e\u3001\u65e5\u5fd7\u3001\u6307\u6807\u548c\u8fd0\u7ef4\u77e5\u8bc6\uff1b\u4e3a\u6b64\u63d0\u51fa **Flexible Skill Arrangement**\uff0c\u8ba9\u6bcf\u4e2a Skill \u663e\u5f0f\u7ed1\u5b9a\u4e1a\u52a1\u4e0a\u4e0b\u6587\u4e0b\u5e94\u68c0\u7d22\u7684\u6570\u636e\u4e0e\u77e5\u8bc6\uff0c\u5e76\u53ef\u7531 LLM \u6216\u503c\u73ed\u5de5\u7a0b\u5e08\u6301\u7eed\u66f4\u65b0\u3002\u8be5\u7cfb\u7edf\u5df2\u90e8\u7f72\u5728\u5feb\u624b\u7535\u5546\u641c\u7d22\u5f15\u64ce\u4e2d\uff0c\u62a5\u544a\u4e86\u544a\u8b66\u91cf\u964d\u4f4e 75%\u3001\u6839\u56e0\u5206\u6790\u51c6\u786e\u7387 80%\u3001\u5e73\u5747\u4fee\u590d\u65f6\u95f4\u51cf\u5c11\u8d85\u8fc7 50% \u7684\u7ed3\u679c\uff0c\u662f\u4eca\u5929\u6700\u5177\u4ea7\u4e1a\u843d\u5730\u611f\u7684 Agent \u5de5\u4f5c\u4e4b\u4e00\u3002 (2604.26805 [cs.AI])\n\n---\n\n### Theorem-Proving Agents\uff1a\u8ba9\u8bc1\u660e Agent \u81ea\u5df1\u201c\u505a\u68a6\u201d\u5e76\u6c89\u6dc0\u53ef\u8fc1\u79fb\u5f15\u7406\n\n- **DreamProver: Evolving Transferable Lemma Libraries via a Wake-Sleep Theorem-Proving Agent**  \n  **DreamProver** \u5c06 wake-sleep \u8303\u5f0f\u5f15\u5165\u5f62\u5f0f\u5316\u5b9a\u7406\u8bc1\u660e\uff0c\u7528\u4e8e\u81ea\u52a8\u6f14\u5316\u53ef\u590d\u7528\u7684\u5f15\u7406\u5e93\u3002\u4e0e\u56fa\u5b9a\u5f15\u7406\u5e93\u6216\u4e3a\u5355\u4e2a\u5b9a\u7406\u4e34\u65f6\u751f\u6210\u4e2d\u95f4\u5f15\u7406\u4e0d\u540c\uff0c\u5b83\u5728 **wake stage** \u4e2d\u5c1d\u8bd5\u8bc1\u660e\u8bad\u7ec3\u5b9a\u7406\u5e76\u63d0\u51fa\u5019\u9009\u5f15\u7406\uff0c\u5728 **sleep stage** \u4e2d\u62bd\u8c61\u3001\u538b\u7f29\u548c\u6574\u5408\u8fd9\u4e9b\u5019\u9009\uff0c\u5f62\u6210\u66f4\u7d27\u51d1\u3001\u66f4\u9ad8\u5c42\u7684\u53ef\u8fc1\u79fb\u77e5\u8bc6\u3002\u4eae\u70b9\u5728\u4e8e\u5b83\u628a\u8bc1\u660e\u7ecf\u9a8c\u8f6c\u5316\u4e3a\u201c\u5e93\u7ea7\u522b\u201d\u7684\u7ed3\u6784\u5316\u80fd\u529b\u79ef\u7d2f\uff0c\u4ece\u800c\u63d0\u5347\u672a\u89c1\u5b9a\u7406\u7684\u8bc1\u660e\u6210\u529f\u7387\u3001\u7f29\u77ed\u8bc1\u660e\u5e76\u964d\u4f4e\u8ba1\u7b97\u6210\u672c\u3002 (2604.26311 [cs.AI])\n\n---\n\n### Multi-Agent Deliberation\uff1a\u591a\u667a\u80fd\u4f53\u8ba8\u8bba\u4e0d\u5e94\u603b\u662f\u8fbe\u6210\u201c\u865a\u5047\u5171\u8bc6\u201d\n\n- **Preserving Disagreement: Architectural Heterogeneity and Coherence Validation in Multi-Agent Policy Simulation**  \n  \u8fd9\u7bc7\u8bba\u6587\u7814\u7a76 LLM \u591a\u667a\u80fd\u4f53\u653f\u7b56\u6a21\u62df\u4e2d\u7684\u4e00\u4e2a\u5fae\u5999\u95ee\u9898\uff1a\u4e0d\u540c\u4ef7\u503c\u7acb\u573a\u7684\u8bc4\u4f30 Agent \u5f80\u5f80\u4f1a\u6536\u655b\u5230\u540c\u4e00\u9009\u9879\uff0c\u4ea7\u751f**\u4eba\u5de5\u5171\u8bc6**\u3002\u4f5c\u8005\u63d0\u51fa **AI Council** \u4e09\u9636\u6bb5 deliberation \u6846\u67b6\uff0c\u5e76\u53d1\u73b0\u4f7f\u7528\u4e0d\u540c 7\u20139B \u6a21\u578b\u627f\u62c5\u4e0d\u540c\u4ef7\u503c\u89c6\u89d2\u7684 **architectural heterogeneity** \u80fd\u663e\u8457\u964d\u4f4e\u9996\u9009\u9879\u96c6\u4e2d\u5ea6\uff0c\u4fdd\u7559\u66f4\u591a\u771f\u5b9e\u5206\u6b67\u3002\u8bba\u6587\u8fd8\u63d0\u51fa **coherence validation**\uff0c\u7528\u524d\u6cbf\u6a21\u578b\u68c0\u67e5\u63a8\u7406\u662f\u5426\u5fe0\u4e8e\u6307\u5b9a\u4ef7\u503c\u89c2\uff0c\u4f46\u7ed3\u679c\u663e\u793a\u5b58\u5728\u201c\u4fdd\u771f\u5ea6-\u591a\u6837\u6027\u201d\u6743\u8861\uff1a\u8d28\u91cf\u52a0\u6743\u53ef\u80fd\u51cf\u5c11\u566a\u58f0\uff0c\u4e5f\u53ef\u80fd\u653e\u5927\u67d0\u4e9b\u9ad8\u4e00\u81f4\u6027\u7acb\u573a\u7684\u96c6\u4e2d\u6548\u5e94\u3002 (2604.26561 [cs.AI])\n\n---\n\n### Neuro-Symbolic Agent Architectures\uff1a\u795e\u7ecf\u7b26\u53f7\u8def\u7ebf\u56de\u5f52\uff0c\u89e3\u51b3\u7ec4\u5408\u6cdb\u5316\u7684\u7ed3\u6784\u6027\u77ed\u677f\n\n- **AGEL-Comp: A Neuro-Symbolic Framework for Compositional Generalization in Interactive Agents**  \n  **AGEL-Comp** \u8bd5\u56fe\u89e3\u51b3 LLM Agent \u5728\u4ea4\u4e92\u73af\u5883\u4e2d\u7684\u7ec4\u5408\u6cdb\u5316\u5931\u8d25\uff1a\u6a21\u578b\u53ef\u80fd\u4f1a\u6267\u884c\u89c1\u8fc7\u7684\u6a21\u5f0f\uff0c\u5374\u96be\u4ee5\u7a33\u5065\u91cd\u7ec4\u89c4\u5219\u5e94\u5bf9\u65b0\u60c5\u5883\u3002\u8be5\u6846\u67b6\u7ed3\u5408\u52a8\u6001 **Causal Program Graph (CPG)**\u3001**Inductive Logic Programming (ILP)** \u548c **Neural Theorem Prover (NTP)**\uff1aLLM \u63d0\u51fa\u5019\u9009\u5b50\u76ee\u6807\uff0c\u7b26\u53f7\u6a21\u5757\u9a8c\u8bc1\u903b\u8f91\u4e00\u81f4\u6027\uff0c\u5e76\u901a\u8fc7\u4ea4\u4e92\u53cd\u9988\u5408\u6210\u65b0\u7684 Horn clauses\u3002\u5176\u6838\u5fc3\u610f\u4e49\u5728\u4e8e\u628a Agent \u7684\u4e16\u754c\u6a21\u578b\u663e\u5f0f\u5316\u3001\u56e0\u679c\u5316\u548c\u53ef\u89e3\u91ca\u5316\uff0c\u4e3a\u201c\u80fd\u5b66\u4e60\u73af\u5883\u7ed3\u6784\u201d\u7684\u4ea4\u4e92\u5f0f\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u4e00\u6761\u795e\u7ecf\u7b26\u53f7\u8def\u5f84\u3002 (2604.26522 [cs.AI])\n\n---\n\n### \u4eca\u65e5\u770b\u70b9\n\n- **Agent \u7814\u7a76\u6b63\u5728\u7cfb\u7edf\u5de5\u7a0b\u5316\u3002** \u4eca\u5929\u591a\u7bc7\u8bba\u6587\u90fd\u4e0d\u518d\u53ea\u5173\u6ce8\u5355\u6b21\u63a8\u7406\u6027\u80fd\uff0c\u800c\u662f\u56f4\u7ed5\u8bb0\u5fc6\u3001\u6570\u636e\u5408\u6210\u3001\u8bc4\u4f30\u3001\u6280\u80fd\u7f16\u6392\u3001\u77e5\u8bc6\u84b8\u998f\u4e0e\u90e8\u7f72\u95ed\u73af\u5c55\u5f00\u3002**ClawGym** \u548c **Bian Que** \u5c24\u5176\u4f53\u73b0\u4e86\u8fd9\u4e00\u8d8b\u52bf\uff1aAgent \u7684\u7ade\u4e89\u529b\u8d8a\u6765\u8d8a\u6765\u81ea\u201c\u751f\u6001\u7cfb\u7edf\u201d\u548c\u201c\u8fd0\u7ef4\u673a\u5236\u201d\uff0c\u800c\u4e0d\u53ea\u662f\u5e95\u5ea7\u6a21\u578b\u3002\n\n- **\u957f\u671f\u8bb0\u5fc6\u51fa\u73b0\u4e86\u4e00\u4e2a\u6709\u8da3\u7684\u201c\u89c6\u89c9\u5316\u201d\u65b9\u5411\u3002** **OCR-Memory** \u7684\u5173\u952e\u6d1e\u5bdf\u662f\uff1a\u6587\u672c\u4e0a\u4e0b\u6587\u4e0d\u662f\u957f\u671f\u8bb0\u5fc6\u7684\u552f\u4e00\u8f7d\u4f53\uff0c\u56fe\u50cf\u53ef\u4ee5\u4f5c\u4e3a\u9ad8\u5bc6\u5ea6\u7d22\u5f15\u5c42\uff0c\u518d\u6309\u9700\u6062\u590d\u539f\u6587\u8bc1\u636e\u3002\u8fd9\u79cd\u201c\u89c6\u89c9\u538b\u7f29 + \u7cbe\u786e\u8f6c\u5f55\u201d\u7684\u65b9\u5f0f\uff0c\u53ef\u80fd\u4e3a\u957f\u7a0b Agent\u3001\u6d4f\u89c8\u5668\u81ea\u52a8\u5316\u548c\u590d\u6742\u5de5\u4f5c\u6d41\u5ba1\u8ba1\u63d0\u4f9b\u65b0\u7684\u8bb0\u5fc6\u67b6\u6784\u3002\n\n- **\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u5f00\u59cb\u4ece\u201c\u8ffd\u6c42\u5171\u8bc6\u201d\u8f6c\u5411\u201c\u4fdd\u7559\u5206\u6b67\u201d\u3002** **AI Council** \u7684\u5b9e\u9a8c\u63d0\u9192\u6211\u4eec\uff0c\u5728\u653f\u7b56\u3001\u4f26\u7406\u3001\u6218\u7565\u7b49\u6ca1\u6709\u552f\u4e00\u6b63\u786e\u7b54\u6848\u7684\u4efb\u52a1\u4e2d\uff0c\u5feb\u901f\u6536\u655b\u672a\u5fc5\u662f\u597d\u4e8b\u3002\u6a21\u578b\u5f02\u6784\u6027\u4e0d\u53ea\u662f\u63d0\u5347\u9c81\u68d2\u6027\u7684\u6280\u5de7\uff0c\u4e5f\u53ef\u80fd\u6210\u4e3a\u6a21\u62df\u591a\u5143\u4ef7\u503c\u89c2\u7684\u91cd\u8981\u673a\u5236\u3002\n\n- **\u795e\u7ecf\u7b26\u53f7\u4e0e\u81ea\u6f14\u5316\u77e5\u8bc6\u5e93\u6b63\u5728\u91cd\u65b0\u53d8\u5f97\u91cd\u8981\u3002** **DreamProver** \u548c **AGEL-Comp** \u5206\u522b\u5728\u5f62\u5f0f\u5316\u8bc1\u660e\u4e0e\u4ea4\u4e92\u5f0f Agent \u4e2d\u5f3a\u8c03\u53ef\u590d\u7528\u7ed3\u6784\u77e5\u8bc6\uff1a\u4e00\u4e2a\u6f14\u5316\u5f15\u7406\u5e93\uff0c\u4e00\u4e2a\u5b66\u4e60\u56e0\u679c\u7a0b\u5e8f\u56fe\u548c\u903b\u8f91\u89c4\u5219\u3002\u8fd9\u8868\u660e\u4e0b\u4e00\u9636\u6bb5 Agent \u7684\u5173\u952e\u80fd\u529b\uff0c\u53ef\u80fd\u4e0d\u662f\u201c\u66f4\u4f1a\u8bf4\u201d\uff0c\u800c\u662f\u80fd\u628a\u7ecf\u9a8c\u6c89\u6dc0\u4e3a\u53ef\u9a8c\u8bc1\u3001\u53ef\u8fc1\u79fb\u3001\u53ef\u7ec4\u5408\u7684\u5185\u90e8\u7ed3\u6784\u3002",
    "2026-04-28": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-04-28)\n\n\u4eca\u5929\u7684\u8bba\u6587\u96c6\u4e2d\u6307\u5411\u4e00\u4e2a\u6e05\u6670\u8d8b\u52bf\uff1aAI Agent \u7814\u7a76\u6b63\u5728\u4ece\u201c\u80fd\u505a\u4efb\u52a1\u201d\u8d70\u5411\u201c\u7a33\u5b9a\u3001\u4f4e\u6210\u672c\u3001\u53ef\u8fc1\u79fb\u5730\u505a\u4efb\u52a1\u201d\u3002\u5de5\u5177\u8c03\u7528\u3001\u7ec8\u7aef\u6267\u884c\u3001\u591a\u667a\u80fd\u4f53\u63a8\u7406\u7b49\u65b9\u5411\u4e0d\u518d\u53ea\u8ffd\u6c42\u5355\u70b9\u6027\u80fd\uff0c\u800c\u662f\u5f00\u59cb\u7cfb\u7edf\u6027\u5904\u7406\u5931\u8d25\u8f68\u8ff9\u3001\u5de5\u4f5c\u6d41\u590d\u7528\u3001\u8bad\u7ec3\u6570\u636e\u591a\u6837\u6027\u548c\u63a8\u7406\u6210\u672c\u95ee\u9898\u3002\u503c\u5f97\u6ce8\u610f\u7684\u662f\uff0c\u591a\u7bc7\u5de5\u4f5c\u90fd\u5728\u5c1d\u8bd5\u628a\u539f\u672c\u6602\u8d35\u7684\u641c\u7d22\u3001\u4ea4\u4e92\u6216\u591a\u667a\u80fd\u4f53\u8fc7\u7a0b\u201c\u538b\u7f29\u201d\u4e3a\u53ef\u590d\u7528\u7684\u7ed3\u6784\u5148\u9a8c\u6216\u6a21\u578b\u5185\u90e8\u80fd\u529b\u3002\u8fd9\u8868\u660e Agent \u9886\u57df\u6b63\u5728\u8fdb\u5165\u4e00\u4e2a\u66f4\u5de5\u7a0b\u5316\u3001\u4e5f\u66f4\u8ba4\u77e5\u5316\u7684\u9636\u6bb5\uff1a\u65e2\u8981\u4f1a\u89c4\u5212\u4e0e\u6267\u884c\uff0c\u4e5f\u8981\u7406\u89e3\u81ea\u8eab\u5931\u8d25\u6a21\u5f0f\uff0c\u5e76\u628a\u5916\u90e8\u534f\u4f5c\u5185\u5316\u4e3a\u66f4\u9ad8\u6548\u7684\u63a8\u7406\u673a\u5236\u3002\n\n---\n\n### \u5de5\u5177\u8c03\u7528\u4e0e\u6267\u884c\u6846\u67b6\uff1a\u8ba9 Agent \u5c11\u72af\u9519\u3001\u7ec3\u5f97\u66f4\u5168\u9762\n\n- **FAMA: Failure-Aware Meta-Agentic Framework for Open-Source LLMs in Interactive Tool Use Environments**  \n  \u8fd9\u7bc7\u8bba\u6587\u805a\u7126\u5f00\u6e90\u5c0f\u6a21\u578b\u5728\u591a\u8f6e\u5de5\u5177\u8c03\u7528\u573a\u666f\u4e2d\u7684\u201c\u9519\u8bef\u7ea7\u8054\u201d\u95ee\u9898\uff1a\u4e00\u6b21\u9519\u8bef\u51b3\u7b56\u5f80\u5f80\u4f1a\u6c61\u67d3\u540e\u7eed\u4e0a\u4e0b\u6587\uff0c\u6700\u7ec8\u5bfc\u81f4\u4efb\u52a1\u5931\u8d25\u3002\u4f5c\u8005\u63d0\u51fa **FAMA\uff08Failure-Aware Meta-Agentic\uff09**\uff0c\u5148\u5206\u6790\u57fa\u7ebf Agent \u7684\u5931\u8d25\u8f68\u8ff9\uff0c\u8bc6\u522b\u5e38\u89c1\u9519\u8bef\u7c7b\u578b\uff0c\u518d\u901a\u8fc7\u4e00\u7ec4\u4e13\u95e8\u5316 Agent \u5728\u51b3\u7b56\u524d\u6ce8\u5165\u6709\u9488\u5bf9\u6027\u7684\u4e0a\u4e0b\u6587\uff0c\u4ece\u800c\u7ea0\u504f\u5de5\u5177\u4f7f\u7528\u8fc7\u7a0b\u3002\u5b9e\u9a8c\u663e\u793a\uff0cFAMA \u5728\u591a\u4e2a\u5f00\u6e90 LLM \u548c\u8bc4\u4f30\u6a21\u5f0f\u4e0b\u6700\u9ad8\u5e26\u6765 27% \u7684\u6027\u80fd\u63d0\u5347\uff0c\u6838\u5fc3\u542f\u793a\u662f\uff1a\u53ef\u9760 Agent \u4e0d\u4e00\u5b9a\u9700\u8981\u66f4\u5927\u7684\u6a21\u578b\uff0c\u53ef\u80fd\u66f4\u9700\u8981**\u9762\u5411\u5931\u8d25\u6a21\u5f0f\u7684\u4e0a\u4e0b\u6587\u7f16\u6392**\u3002**(2604.25135 [cs.CL])**\n\n- **Toward Scalable Terminal Task Synthesis via Skill Graphs**  \n  \u7ec8\u7aef Agent \u7684\u8bad\u7ec3\u74f6\u9888\u4e0d\u53ea\u662f\u4efb\u52a1\u6570\u91cf\u4e0d\u8db3\uff0c\u66f4\u662f\u6267\u884c\u8f68\u8ff9\u7f3a\u4e4f\u53ef\u63a7\u591a\u6837\u6027\u3002\u672c\u6587\u63d0\u51fa **SkillSynth**\uff0c\u7528\u201c\u573a\u666f\u4e2d\u4ecb\u7684\u6280\u80fd\u56fe\u201d\u7ec4\u7ec7\u547d\u4ee4\u884c\u6280\u80fd\uff0c\u5c06\u573a\u666f\u4f5c\u4e3a\u8fde\u63a5\u4e0d\u540c\u6280\u80fd\u7684\u8fc7\u6e21\u8282\u70b9\uff0c\u518d\u4ece\u56fe\u4e2d\u91c7\u6837\u5de5\u4f5c\u6d41\u8def\u5f84\u5e76\u5b9e\u4f8b\u5316\u4e3a\u53ef\u6267\u884c\u7ec8\u7aef\u4efb\u52a1\u3002\u76f8\u6bd4\u5355\u7eaf\u6269\u5145\u4efb\u52a1\u89c4\u6a21\uff0cSkillSynth \u663e\u5f0f\u63a7\u5236\u8bad\u7ec3\u4e2d\u51fa\u73b0\u7684\u6700\u5c0f\u6267\u884c\u8f68\u8ff9\u591a\u6837\u6027\uff0c\u5e76\u5df2\u88ab\u7528\u4e8e\u8bad\u7ec3 **Hy3 Preview**\uff0c\u63d0\u5347\u5176\u7ec8\u7aef\u573a\u666f\u4e0b\u7684 Agent \u80fd\u529b\u3002**(2604.25727 [cs.AI])**\n\n---\n\n### \u5de5\u4f5c\u6d41\u8bbe\u8ba1\u4e0e\u77e5\u8bc6\u8f         // Tag filter toggle
        function toggleTagFilter(date, tagName) {
            if (!activeTagFilters[date]) activeTagFilters[date] = new Set();
            const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json?v=${DATA_VERSION}`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

                } else {

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 通过按钮删除论文（避免JavaScript字符串转义问题）
        function deletePaperByButton(button) {
            const arxivId = button.getAttribute('data-arxiv-id');
            const title = button.getAttribute('data-title');
            deletePaper(arxivId, title);
        }

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            // 添加删除动画效果
            paperEl.style.transition = 'all 0.3s ease-out';
            paperEl.style.transform = 'scale(0.95)';
            paperEl.style.opacity = '0.5';

            setTimeout(() => {
                // 立即删除并保存状态
                deletedPapers.add(arxivId);
                saveState();

                // 移除DOM元素
                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);
                updateStats();
                buildToc();

                // 显示简单的删除提示
                showSimpleToast(`已删除: ${title}`);
            }, 300);
        }

        // 切换星标状态
        function toggleStar(arxivId) {
            if (starredPapers.has(arxivId)) {
                starredPapers.delete(arxivId);
            } else {
                starredPapers.add(arxivId);
            }
            saveState();

            // 如果当前是只看收藏模式，需要重新渲染
            if (showOnlyStarred) {
                renderPapers();
            } else {
                // 否则只更新星标按钮状态
                const starBtn = document.querySelector(`[data-arxiv-id="${arxivId}"] .star-button`);
                if (starBtn) {
                    if (starredPapers.has(arxivId)) {
                        starBtn.classList.add('starred');
                    } else {
                        starBtn.classList.remove('starred');
                    }
                }
            }
        }

        function toggleRead(arxivId) {
            const checkbox = document.querySelector(`[data-arxiv-id="${arxivId}"] input[type="checkbox"]`);
            if (!checkbox) return;

            if (checkbox.checked) {
                readPapers.add(arxivId);

        // 切换摘要语言
        function toggleSummaryLanguage() {
            showChineseSummary = !showChineseSummary;
            const toggleBtn = document.getElementById('summary-toggle');
            toggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            // 更新所有摘要显示

        function updateStats() {

        function updateDateSection(sectionEl) {
            if (!sectionEl) return;
            const totalPapers = sectionEl.querySelectorAll('.paper-item').length;
            const header = sectionEl.querySelector('[data-date-heading]');

            if (header) {
                const dateLabel = header.dataset.dateHeading || header.textContent.split(' ')[0];

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }
        }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for a single element by id
        function renderMarkdownEl(el) {
            if (!el || el.getAttribute('data-rendered')) return;
            const raw = mdRawContent[el.id];
            if (raw) {
                try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                el.setAttribute('data-rendered', '1');
            }
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(renderMarkdownEl);
        }

        function hasMeaningfulText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) renderMarkdownEl(el);
            });
        }

        // 创建论文HTML
        function formatAuthorsWithAffiliations(authorsStr, affiliationsStr) {
            if (!affiliationsStr) return authorsStr;
            try {
                // 解析 JSON（可能被包在 ```json ... ``` 中）
                let jsonStr = affiliationsStr;
                const match = jsonStr.match(/```json\s*([\s\S]*?)\s*```/);
                if (match) jsonStr = match[1];
                const objMatch = jsonStr.match(/\{[\s\S]*\}/);
                if (objMatch) jsonStr = objMatch[0];
                const data = JSON.parse(jsonStr);

                // 兼容旧格式（数组）
                if (Array.isArray(data)) {
                    const authors = authorsStr.split(/,\s*/);
                    const affMap = {};
                    data.forEach(a => { if (a.name && a.affiliation) affMap[a.name.trim().toLowerCase()] = a.affiliation; });
                    return authors.map(a => {
                        const aff = affMap[a.trim().toLowerCase()];
                        return aff ? `${a.trim()}<sup class="aff-sup" title="${aff}">${aff}</sup>` : a.trim();
                    }).join(', ');
                }

                if (!data.authors || !data.institutions) return authorsStr;

                // 新格式：论文式数字角标
                const instMap = {};
                data.institutions.forEach(inst => { instMap[inst.id] = inst.name; });

                // 渲染作者行
                const authorParts = data.authors.map(a => {
                    let sups = [];
                    if (a.affiliations && a.affiliations.length > 0) {
                        sups = sups.concat(a.affiliations.map(String));
                    }
                    if (a.markers && a.markers.length > 0) {
                        sups = sups.concat(a.markers);
                    }
                    const supStr = sups.length > 0
                        ? `<sup class="aff-sup">${sups.join(',')}</sup>`
                        : '';
                    return `${a.name}${supStr}`;
                });

                // 渲染机构列表
                const instLine = data.institutions.map(inst =>
                    `<sup class="aff-sup">${inst.id}</sup>${inst.name}`
                ).join('&ensp;');

                // 渲染脚注
                let footLine = '';
                if (data.footnotes && data.footnotes.length > 0) {
                    footLine = data.footnotes.map(fn =>
                        `<sup class="aff-sup">${fn.marker}</sup>${fn.text}`
                    ).join('&ensp;');
                }

                let html = authorParts.join(', ');
                html += `<div class="text-xs text-slate-500 dark:text-slate-400 mt-1">${instLine}</div>`;
                if (footLine) {
                    html += `<div class="text-xs text-slate-400 dark:text-slate-500 mt-0.5 italic">${footLine}</div>`;
                }
                return html;
            } catch (e) {
                return authorsStr;
            }
        }

        // Store paper data by arxiv_id for lazy detail building

            paperDataMap[paper.arxiv_id] = { paper, date };

            const clusterBadge = paper.cluster ? `<span class="tag-badge">${paper.cluster}</span>` : '';

                                <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                            </button>
                            <h3 class="text-base sm:text-lg font-semibold text-black dark:text-white leading-tight break-words cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors" onclick="togglePaperDetail('${paper.arxiv_id}')">${paper.title}</h3>
                        </div>
                        <button class="delete-button text-slate-400 hover:text-red-500 ml-2 sm:ml-4 flex-shrink-0" onclick="deletePaperByButton(this)" data-arxiv-id="${paper.arxiv_id}" data-title="${paper.title.replace(/"/g, '&quot;')}" title="删除">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <!-- 论文元信息（始终可见） -->
                    <div class="space-y-1 mb-2">
                        <div class="flex flex-wrap items-center gap-2 sm:gap-4 text-xs sm:text-sm text-slate-600 dark:text-slate-400">
                            <span class="break-all"><strong>ArXiv ID:</strong> ${paper.arxiv_id}</span>
                            ${clusterBadge}
                            ${tagBadges}
                            <span class="whitespace-nowrap">${date}</span>
                        </div>
                        <div class="text-xs sm:text-sm text-black dark:text-white break-words">
                            <strong>作者:</strong> ${formatAuthorsWithAffiliations(paper.authors, paper.affiliations)}
                        </div>
                    </div>

                    <!-- 展开/收起指示器 -->
                    <div class="paper-expand-hint text-xs text-slate-400 dark:text-slate-500 cursor-pointer select-none" onclick="togglePaperDetail('${paper.arxiv_id}')" id="expand-hint-${paper.arxiv_id}">
                        <span class="expand-arrow">▶</span> 点击标题展开详情
                    </div>

                    <!-- 懒加载的详情容器 -->
                    <div class="paper-detail hidden" id="detail-${paper.arxiv_id}"></div>
                </div>
            `;
        }

        // Build and inject paper detail DOM on first expand
        function buildPaperDetail(arxivId) {
            const container = document.getElementById(`detail-${arxivId}`);
            if (!container || container.getAttribute('data-built')) return;
            container.setAttribute('data-built', '1');

            const { paper, date } = paperDataMap[arxivId];
            if (!paper) return;

            const aid = paper.arxiv_id;
            const isRead = readPapers.has(aid);

            // Register all markdown content
            registerMarkdown(`filter-reason-${aid}`, paper.filter_reason);
            registerMarkdown(`intro-logic-${aid}`, paper.intro_logic);
            registerMarkdown(`core-insight-${aid}`, paper.core_insight);
            registerMarkdown(`methodology-${aid}`, paper.methodology);
            registerMarkdown(`additional-insights-${aid}`, paper.additional_insights);
            registerMarkdown(`research-value-${aid}`, paper.research_value);
            if (hasMeaningfulText(paper.summary)) registerMarkdown(`summary-en-${aid}`, paper.summary);
            if (hasMeaningfulText(paper.summary_translation)) registerMarkdown(`summary-zh-${aid}`, paper.summary_translation);

            let html = '';
            const hasSummaryEn = hasMeaningfulText(paper.summary);
            const hasSummaryZh = hasMeaningfulText(paper.summary_translation);

            // 已读复选框
            html += `
                <div class="mb-3 sm:mb-4 mt-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" ${isRead ? 'checked' : ''} onchange="toggleRead('${aid}')" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 w-4 h-4">
                        <span class="ml-2 text-xs sm:text-sm text-slate-600 dark:text-slate-400">已阅读</span>
                    </label>
                </div>
            `;

            // 原始摘要
            html += `
                <div class="mb-3 sm:mb-4">
                    <div class="collapsible-header open text-sm sm:text-base" onclick="toggleCollapsible(this)">原始摘要</div>
                    <div class="collapsible-content open">
                        <div class="inner">
                            <div class="summary-section bg-green-50/70 dark:bg-green-950/20 border-l-3 border-green-300 p-3 sm:p-4 rounded-r-lg">
                                ${hasSummaryEn ? `
                                <div class="english-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-en-${aid}" style="display: block;">
                                </div>` : ''}
                                ${hasSummaryZh ? `
                                <div class="chinese-summary text-xs sm:text-sm text-black dark:text-white leading-relaxed markdown-content break-words" id="summary-zh-${aid}" style="display: ${hasSummaryEn ? 'none' : 'block'};">
                                </div>` : ''}
                                ${!hasSummaryEn && !hasSummaryZh ? `
                                <div class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                                    暂无原始摘要。上游抓取或解析可能失败。
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 各分析section的配置
            const sections = [
                { key: 'intro_logic', id: `intro-logic-${aid}`, title: 'Introduction 逻辑链', color: 'yellow' },
                { key: 'core_insight', id: `core-insight-${aid}`, title: '核心切入点 / Pain Point', color: 'orange' },
                { key: 'methodology', id: `methodology-${aid}`, title: '方法论解读', color: 'purple' },
                { key: 'additional_insights', id: `additional-insights-${aid}`, title: '延伸洞察', color: 'red' },
                { key: 'research_value', id: `research-value-${aid}`, title: '研究价值', color: 'teal' },
                { key: 'filter_reason', id: `filter-reason-${aid}`, title: '筛选原因', color: 'blue' },
            ];

            let renderedSections = 0;
            sections.forEach(s => {
                if (hasMeaningfulText(paper[s.key])) {
                    renderedSections += 1;
                    html += `
                        <div class="mb-3 sm:mb-4">

                                    <div class="bg-${s.color}-50/70 dark:bg-${s.color}-950/20 border-l-3 border-${s.color}-300 p-3 sm:p-4 rounded-r-lg">

                            暂无扩展解析内容。通常是因为论文正文抓取失败、上游解析结果为空，或当天加载到了不完整的数据文件。
                        </div>
                    </div>
                `;
            }

            // 论文链接
            html += `
                <div class="flex flex-wrap gap-2">
                    <a href="https://arxiv.org/abs/${aid}" target="_blank"
                       class="inline-flex items-center px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors whitespace-nowrap">

        // Toggle paper detail expansion

        // 创建聚类HTML
        // Collect all papers from all clusters for a date into a flat list
        function collectPapersForDate(clusters, date) {
            let html = '';
            let count = 0;
            clusters.forEach(cluster => {
                if (cluster.papers) {
                    cluster.papers.forEach(paper => {
                        const paperHTML = createPaperHTML(paper, date);
                        if (paperHTML) {
                            html += `<li>${paperHTML}</li>`;
                            count++;
                        }
                    });
                }
            });
            return { html, count };
        }

        // Build tag filter bar HTML for a given date
        function buildTagFilterBar(date) {
            const tags = allPaperTags[date];
            if (!tags || tags.length === 0) return '';
            const filters = activeTagFilters[date] || new Set();
            const allActive = filters.size === 0;
            let html = '<div class="flex flex-wrap gap-1.5 mb-3">';
            html += `<button class="tag-btn ${allActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','All')">All</button>`;
            tags.forEach(tag => {
                const isActive = filters.has(tag.name);
                html += `<button class="tag-btn ${isActive ? 'active' : ''}" onclick="toggleTagFilter('${date}','${tag.name.replace(/'/g, "\\'")}')">${tag.name} &times;${tag.count}</button>`;
            });
            html += '</div>';
            return html;
        }

        // 渲染论文列表

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                                </svg>
                                <span class="font-semibold text-slate-900 dark:text-white text-sm sm:text-base">今日AI论文速览</span>
                            </div>
                            <div class="collapsible-content">
                                <div class="inner">
                                    <div class="markdown-content text-slate-700 dark:text-slate-200 text-xs sm:text-sm" id="overview-${date}">
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Add tag filter bar
                html += buildTagFilterBar(date);

                if (dateVisibleTotal === 0) {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-4 sm:p-5 lg:p-6">
                            <div class="text-sm sm:text-base text-slate-600 dark:text-slate-300 leading-relaxed">
                                今日数据已处理，但没有符合当前筛选条件的论文。
                            </div>
                        </div>
                    </section>
                    `;
                } else {
                    html += `
                        <div class="bg-white dark:bg-slate-800/50 rounded-lg shadow-sm p-3 sm:p-4 lg:p-6">
                            <ul class="space-y-3 sm:space-y-4">
                                ${papersHTML}
                            </ul>
                        </div>
                    </section>
                    `;
                }
            }

            // 添加"加载更多"按钮
            const unloadedCount = getUnloadedDates().length;
            if (unloadedCount > 0) {
                html += `
                    <div class="text-center py-6">
                        <button id="load-more-btn" onclick="loadMoreDates()"
                            class="inline-flex items-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-all duration-200 hover:shadow-lg">
                            📥 加载更多 (还有 ${unloadedCount} 天)
                        </button>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateStats();

            // Register overview markdown and render visible content
            for (const date in dailyOverviews) {
                registerMarkdown(`overview-${date}`, dailyOverviews[date]);
            }
            renderVisibleMarkdown();

            // 更新 TOC
            buildToc();

        }

        // 主题切换功能
        function setupThemeToggle() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');

            function updateThemeIcon() {
                if (document.documentElement.classList.contains('dark')) {
                    lightIcon.classList.add('hidden');
                    darkIcon.classList.remove('hidden');
                } else {
                    lightIcon.classList.remove('hidden');
                    darkIcon.classList.add('hidden');
                }
            }

            updateThemeIcon();

            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                updateThemeIcon();
            });
        }

        // 设置摘要语言切换功能
        function setupSummaryToggle() {
            const summaryToggleBtn = document.getElementById('summary-toggle');

            // 初始化按钮文本
            summaryToggleBtn.textContent = showChineseSummary ? '中文摘要' : 'English Summary';

            summaryToggleBtn.addEventListener('click', toggleSummaryLanguage);
        }

        // 设置筛选功能
        function setupFilter() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            filterStarredBtn.addEventListener('click', () => {
                showOnlyStarred = true;
                updateFilterButtons();
                renderPapers();
            });

            filterAllBtn.addEventListener('click', () => {
                showOnlyStarred = false;
                updateFilterButtons();
                renderPapers();
            });

            updateFilterButtons();
        }

        // 更新筛选按钮状态
        function updateFilterButtons() {
            const filterStarredBtn = document.getElementById('filter-starred');
            const filterAllBtn = document.getElementById('filter-all');

            if (showOnlyStarred) {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
            } else {
                filterStarredBtn.className = 'px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors';
                filterAllBtn.className = 'px-3 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors';
            }
        }

        // ========== TOC 侧边栏功能 ==========
        let tocSidebarOpen = true;

        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            const toggle = document.getElementById('toc-toggle');
            tocSidebarOpen = !tocSidebarOpen;
            if (tocSidebarOpen) {
                sidebar.classList.remove('collapsed');
                toggle.classList.add('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.add('collapsed');
                toggle.classList.remove('sidebar-open');
                toggle.querySelector('svg').style.transform = 'rotate(0deg)';
            }
            localStorage.setItem('tocSidebarOpen', tocSidebarOpen);
        }

        function buildToc() {
            const tocList = document.getElementById('toc-list');
            if (!tocList) return;

            let html = '';
            // 遍历所有可用日期，不仅仅是已加载的
            for (const date of availableDates) {
                const isLoaded = loadedDates.has(date);
                let papers = [];

                if (isLoaded && allPapers[date]) {
                    const clusters = allPapers[date];
                    clusters.forEach(cluster => {
                        if (cluster.papers) {
                            cluster.papers.forEach(paper => {
                                if (!deletedPapers.has(paper.arxiv_id) && (!showOnlyStarred || starredPapers.has(paper.arxiv_id))) {
                                    if (paperMatchesFilters(paper, date)) {
                                        papers.push(paper);
                                    }
                                }
                            });
                        }
                    });
                }

                const countLabel = isLoaded ? papers.length : '...';
                const dimClass = isLoaded ? '' : ' opacity-50';

                html += `<div class="mb-1" data-toc-date="${date}">`;
                html += `<div class="toc-date${dimClass}" onclick="tocToggleDate(this, '${date}')" data-toc-date-btn="${date}">`;
                html += `<span class="toc-date-arrow">▶</span>`;
                html += `<span>${date}</span>`;
                html += `<span class="text-xs text-slate-400 ml-auto">${countLabel}</span>`;
                html += `</div>`;
                html += `<div class="toc-papers" data-toc-papers="${date}">`;
                if (isLoaded) {
                    papers.forEach(paper => {
                        const title = paper.title.length > 50 ? paper.title.substring(0, 47) + '...' : paper.title;
                        html += `<div class="toc-paper" onclick="tocScrollToPaper('${paper.arxiv_id}')" data-toc-paper="${paper.arxiv_id}" title="${paper.title.replace(/"/g, '&quot;')}">${title}</div>`;
                    });
                } else {
                    html += `<div class="toc-paper opacity-50" onclick="tocLoadAndScrollToDate('${date}')">点击加载...</div>`;
                }
                html += `</div></div>`;
            }
            tocList.innerHTML = html;
        }

        async function tocLoadAndScrollToDate(date) {
            // 加载该日期之前的所有未加载日期
            const unloaded = getUnloadedDates();
            const idx = unloaded.indexOf(date);
            if (idx < 0) return;
            const datesToLoad = unloaded.slice(0, idx + 1);
            for (const d of datesToLoad) {
                try {
                    const response = await fetch(`data/${d}.json?v=${DATA_VERSION}`);
                    if (response.ok) {
                        const dateData = await response.json();
                        allPapers[d] = dateData.clusters || [];
                        allPaperTags[d] = dateData.tags || [];
                        if (dateData.overview) dailyOverviews[d] = dateData.overview;
                        loadedDates.add(d);
                    }
                } catch (e) {
                    console.error(`加载 ${d} 失败:`, e);
                }
            }
            renderPapers();
            // 等待 DOM 更新后滚动
            setTimeout(() => tocScrollToDate(date), 100);
        }

        function tocToggleDate(el, date) {
            const isLoaded = loadedDates.has(date);
            if (!isLoaded) {
                tocLoadAndScrollToDate(date);
                return;
            }
            const arrow = el.querySelector('.toc-date-arrow');
            const papers = document.querySelector(`[data-toc-papers="${date}"]`);
            if (papers) {
                papers.classList.toggle('open');
                arrow.classList.toggle('open');
            }
            // 同时滚动到对应日期
            tocScrollToDate(date);
        }

        function tocScrollToPaper(arxivId) {
            const el = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 短暂高亮
                el.style.outline = '2px solid #3b82f6';
                el.style.outlineOffset = '2px';
                setTimeout(() => {
                    el.style.outline = '';
                    el.style.outlineOffset = '';
                }, 2000);
            }
        }

        function tocScrollToDate(date) {
            const section = document.querySelector(`[data-date-section="${date}"]`);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 滚动时高亮当前可见的日期
        let tocScrollTimer = null;
        function setupTocScrollSpy() {
            window.addEventListener('scroll', () => {
                if (tocScrollTimer) clearTimeout(tocScrollTimer);
                tocScrollTimer = setTimeout(() => {
                    const sections = document.querySelectorAll('[data-date-section]');
                    let currentDate = null;
                    const scrollTop = window.scrollY + 100;

                    sections.forEach(section => {
                        if (section.offsetTop <= scrollTop) {
                            currentDate = section.getAttribute('data-date-section');
                        }
                    });

                    // 更新 TOC 高亮
                    document.querySelectorAll('.toc-date').forEach(el => el.classList.remove('active'));
                    if (currentDate) {
                        const activeBtn = document.querySelector(`[data-toc-date-btn="${currentDate}"]`);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            // 确保活跃日期在 TOC 可视区域内
                            const tocInner = document.getElementById('toc-inner');
                            if (tocInner) {
                                const btnRect = activeBtn.getBoundingClientRect();
                                const tocRect = tocInner.getBoundingClientRect();
                                if (btnRect.top < tocRect.top || btnRect.bottom > tocRect.bottom) {
                                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }
                    }
                }, 100);
            });
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            setupThemeToggle();
            setupSummaryToggle();
            setupFilter();
            renderPapers();
            buildToc();
            setupTocScrollSpy();

            // 恢复 TOC 侧边栏状态
            const savedTocState = localStorage.getItem('tocSidebarOpen');
            if (savedTocState === 'false') {
                tocSidebarOpen = true; // will be toggled to false
                toggleTocSidebar();
            }
        });
    </script>
</body>
</html>
