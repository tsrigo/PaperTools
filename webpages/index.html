                    "filter_reason": "**核心判断：** 这篇论文的核心贡献是提出一个**系统级的自我改进框架**，将LLM的自我改进概念化为一个闭环生命周期，包含四个紧密耦合的过程：数据获取、数据选择、模型优化和推理细化，以及一个自主评估层。论文明确指出模型本身在每个阶段都发挥核心作用：收集或生成数据、选择信息信号、更新参数、细化输出。 这**完全符合**我的研究目标中的第三个方向——**自我演化 (Self-Evolving)**。论文讨论的是LLM如何通过自主生成数据、评估输出、迭代 refinement 来提升自身能力，这正是\"智能体通过经验、反思或环境反馈进行自我完善和迭代\"的典型体现。 **正面指标分析：** 论文明确涉及以下核心概念： - `Self-Improvement`（自我改进） - `Self-Evolving`（自我演化） - `Iterative Improvement`（迭代改进） - `Autonomous Evaluation`（自主评估） - 模型自主驱动各阶段的改进循环 **排除标准检查：** - 不是非演化型应用：论文不是将LLM作为工具解决特定领域问题 - 不是非Agentic推理：虽然涉及推理优化，但核心是关于模型如何自主改进的机制 - 不涉及安全/对齐/可解释性等基础设施研究 - 不涉及多模态或图技术 **特殊情况的处理：** 这篇论文属于\"保留\"类别的例外情况：即使它可能涉及一些应用场景的讨论，但其核心贡献是提出一种新的\"自我演化\"机制框架，而非单纯的应用研究。 **结论：** 该论文完全符合研究范围，核心贡献在于构建和改进LLM的自我演化机制，属于Agentic AI中自我演化方向的典型研究。",
                    "intro_logic": "The problems introduced in the introduction of this paper are as follows:\n\n1. Large language models (LLMs) have achieved rapid performance gains through scaling model size, training data, and compute, with methods like RLHF relying heavily on carefully curated, high-quality human supervision.\n\n2. Limitation 1: Human data scarcity is becoming increasingly evident, as high-quality, expert-annotated data is expensive and difficult to scale, and the marginal cost of constructing large supervised datasets grows rapidly while the availability of expert labor remains limited.\n\n3. Limitation 2: There is a deeper limitation tied to human cognitive bounds—if model supervision is permanently constrained by human intelligence, can models truly surpass human-level performance?\n\n4. When models approach or exceed human-level capability in certain domains, human feedback may no longer provide sufficiently informative gradients for further improvement.\n\n5. This raises a fundamental question: how can models continue to improve once they reach parity with their supervisors?\n\n6. From an automation perspective, as LLMs become increasingly advanced and demonstrate the capacity to resolve complex engineering tasks and engage in high-level decision-making, it is a natural progression to delegate model development responsibilities (including data acquisition, data selection, and model training) to the models themselves.\n\nResearch Question: How can large language models be enabled to autonomously improve themselves through self-generated data, self-evaluation, and iterative refinement, without relying exclusively on external human signals?",
                    "core_insight": "# 论文的\"种子\"：研究切入点分析\n\n## 一、切入角度：Human Supervision的局限性\n\n根据论文原文，作者的核心切入角度是**人类监督在LLM改进中的根本性局限**。具体而言，论文识别出三个相互关联的痛点：\n\n### 1.1 成本与可扩展性问题\n\n论文明确指出：\n\n> \"As large language models (LLMs) continue to advance, improving them solely through human supervision is becoming increasingly costly and limited in scalability.\"\n\n这揭示了传统改进范式的**经济不可持续性**——随着模型规模增大，依赖人类标注数据的成本呈指数增长。\n\n### 1.2 数据稀缺问题\n\n论文进一步阐述：\n\n> \"Human data scarcity is becoming increasingly evident. High-quality, expert-annotated data is expensive and difficult to scale (Gilardi et al., 2023; Villalobos et al., 2024). The marginal cost of constructing large supervised datasets grows rapidly, while the availability of expert labor remains limited.\"\n\n### 1.3 认知天花板问题（最核心的切入角度）\n\n论文提出了一个根本性的哲学问题：\n\n> \"There is a deeper limitation tied to human cognitive bounds. If model supervision is permanently constrained by human intelligence, can models truly surpass human-level performance? When models approach or exceed human-level capability in certain domains, human feedback may no longer provide sufficiently informative gradients for further improvement (Bowman, 2023; Burns et al., 2023).\"\n\n这构成了论文最核心的**认知论切入点**：如果改进信号永远受限于人类智能的边界，模型将无法超越其\"教师\"。\n\n---\n\n## 二、切入角度如何塑造方法论\n\n基于上述痛点，论文构建了一个**闭环自我改进系统**作为回应：\n\n> \"We define self-improvement of LLMs as a learning paradigm in which a model iteratively enhances its own capabilities without continuous human-in-the-loop supervision. This paradigm is characterized by two essential properties: **Autonomy**: the improvement process operates without ongoing human annotation or manual correction. **Continuity**: self-improvement is not a one-off refinement. It is an iterative, self-reinforcing process...\"\n\n论文提出的系统架构包含五个组件：\n\n> \"we propose a lifecycle self-improvement system consisting of five interconnected components: (i) Data Acquisition, (ii) Data Selection, (iii) Model Optimization, and (iv) Inference Refinement... An additional (v) Autonomous Evaluation module provides continuous feedback...\"\n\n这个方法论框架**直接回应了切入角度**：\n- **Autonomy** → 解决human supervision的成本与可扩展性问题\n- **Continuity + 闭环系统** → 解决human feedback信息量不足的问题\n- **模型自主驱动各阶段** → 突破人类认知天花板\n\n---\n\n## 三、解决历程与挑战\n\n论文在方法论实现过程中面临的**核心挑战**体现在以下几个方面（从论文后续章节可以看出）：\n\n### 3.1 反馈信号质量挑战\n\n论文在讨论模型优化时承认：\n\n> \"self-improvement process primarily as a 'Sharpening' mechanism... This mechanism is shown to depend on a critical 'Generation-Verification Gap' (Song et al., 2025a), where the model's discriminative capability must strictly exceed its generative performance to provide valid supervision signals.\"\n\n这揭示了一个关键挑战：**模型必须具备比生成能力更强的评判能力**，否则自我改进将退化。\n\n### 3.2 模型崩溃风险\n\n论文指出：\n\n> \"Shafayat et al. (2025) empirically and analytically examine whether the GRO loop can be sustained indefinitely under self-generated rewards, finding that while majority-voting-based self-reward initially improves both the model's performance and its own supervision quality, **prolonged self-training inevitably leads to reward hacking and sudden performance collapse**, highlighting feedback design as the central bottleneck for sustained self-improvement.\"\n\n这表明作者识别到自我改进可能面临的**试错循环**：初期有效的方法可能导致后期崩溃。\n\n### 3.3 各阶段的技术挑战\n\n论文在数据获取、数据选择、模型优化、推理细化各部分都详细讨论了**trade-offs**：\n\n- **数据获取**：Scale vs. Specificity, Quality vs. Cost, Diversity vs. Coherence\n- **数据选择**：静态过滤 → 度量引导评分 → 自适应选择（自动化程度递增但复杂度也增加）\n- **模型优化**：Implicit vs. Explicit Reward, Process vs. Outcome Reward\n- **推理细化**：不同解码策略、推理方法、agent系统的权衡\n\n---\n\n## 四、总结\n\n| 层面 | 内容 |\n|------|------|\n| **种子/切入点** | 人类监督在成本、可扩展性、认知天花板三个维度的局限性 |\n| **方法论回应** | 构建模型自主驱动的五阶段闭环自我改进系统 |\n| **核心挑战** | 反馈信号质量保证、模型崩溃风险、各阶段技术权衡 |\n| **试错循环** | 论文识别出\"Generation-Verification Gap\"和\"reward hacking\"等问题，并提出各种方法（如不同reward类型、coupling/decoupled设计）作为应对尝试 |\n\n这个\"种子\"最终使论文采取了一种**系统论视角**——不是局部改进某个阶段，而是将整个模型开发流程重构为自我驱动的生命周期，这正是论文与以往局部方法的关键区别。",
                    "methodology": "# 论文方法论解读\n\n这篇论文提出了一个大型语言模型**自我改进系统**的整体框架。我把这个系统拆解为五个核心环节，下面按执行顺序逐一说明。\n\n---\n\n## 一、数据获取（Data Acquisition）\n\n**目的**：解决人类标注数据成本高、难以规模化的问题，让模型自己去找或生成训练数据。\n\n这一节介绍了三种获取数据的方式，按自动化程度从低到高排列：\n\n### 1.1 静态筛选（Static Curation）\n\n**做什么**：模型从一个已经存在的固定数据仓库（比如网页快照、代码库、书籍集合）里挑选有用的内容。\n\n**输入**：互联网爬取的原始网页、GitHub代码、书籍文本等。\n\n**操作**：\n- 用规则或训练好的分类器过滤掉低质量内容（比如广告、无意义文本）\n- 用模型（而非人工）来判断哪些文档有教育价值\n- 甚至可以让模型决定\"应该去爬哪些网址\"\n\n**输出**：清洗后的训练文本集合。\n\n**例子**：FineWeb-Edu 用一个开源大模型给网页打分，保留教育价值高的内容；Crawl4LLM 让模型决定爬取哪些URL。\n\n---\n\n### 1.2 环境交互（Environment Interaction）\n\n**做什么**：模型通过执行动作来获取数据，不只是读取现成文本。\n\n**输入**：一个外部环境（搜索引擎、代码执行器、游戏世界）。\n\n**操作**：\n- 模型发出动作（搜索查询、调用API、执行代码、点击按钮）\n- 环境返回结果（搜索结果、程序输出、游戏状态）\n- 模型把这些\"动作-观察\"序列记录下来作为训练数据\n\n**输出**：交互轨迹数据，包含模型的行为序列和对应的环境反馈。\n\n**例子**：\n- WebGPT：让模型自己搜索网页来回答问题，记录搜索过程\n- Toolformer：让模型学习调用外部工具（计算器、翻译API）\n- 代码环境：让模型写代码、执行、根据报错信息调整\n\n---\n\n### 1.3 合成生成（Synthetic Generation）\n\n**做什么**：模型完全不依赖外部环境，自己生成全新的训练数据。\n\n**输入**：一个种子（少量示例问题或主题）。\n\n**操作**：\n- **直接提示**：给模型一个主题，让它生成相关的问题和答案\n- **种子扩展**：用少量种子例子，通过模型生成更多类似例子\n- **多模型互动**：让两个模型互相提问、辩论，从对话中提取训练数据\n\n**输出**：大量合成的问答对、指令数据等。\n\n**例子**：\n- Self-Instruct：用175个种子任务让模型生成5万个新指令\n- SPIN：让模型自己出题自己答，用这种方式生成训练数据\n- R-Zero：让模型自己生成数学问题，然后自己解答\n\n---\n\n## 二、数据选择（Data Selection）\n\n**目的**：解决\"不是所有数据都有用\"的问题，从获取的一大堆数据里挑出真正值得训练的内容。\n\n### 2.1 基于度量的评分（Metric-Guided Scoring）\n\n**做什么**：用模型自身的信号来评估每个数据点的价值。\n\n**输入**：待筛选的数据、训练中的模型。\n\n**操作**：\n- **一次性评分**：训练前用当前模型给所有数据打分，之后固定不变\n- **迭代重评**：训练过程中反复用更新后的模型重新打分，动态调整\n\n**用什么信号打分**：\n- 困惑度（perplexity）：模型觉得这个文本有多\"意外\"\n- 损失值（loss）：模型预测这个数据的错误程度\n- 不确定性：模型对这个答案有多不确定\n- 梯度/影响力：训练这个数据对下游任务有多大帮助\n\n**输出**：每个数据的重要性分数或权重，用于决定训练时采样概率。\n\n---\n\n### 2.2 自适应选择（Adaptive Selection）\n\n**做什么**：不只是打分，而是训练一个专门的\"选择器\"来学习什么样的数据最好。\n\n**输入**：待筛选数据、验证集性能反馈。\n\n**操作**：\n- 定义一个\"选择单元\"（可以是一个个样本，也可以是一组数据）\n- 用强化学习或 bandit 算法，让选择器根据反馈不断调整选择策略\n- 选择器可以与主模型\"耦合\"（同步更新）或\"解耦\"（单独训练）\n\n**输出**：一个学到的选择策略，决定下一轮训练用什么数据。\n\n**例子**：\n- DUMP：用UCB算法动态调整不同数据源的采样概率\n- RAISE：用强化学习训练一个评分器来选择指令数据\n\n---\n\n## 三、模型优化（Model Optimization）\n\n**目的**：核心的自我改进环节——模型如何根据自己生成的数据来更新自己。\n\n论文提出了一个统一的 **GRO框架**（Generation生成 - Reward奖励 - Optimization优化）：\n\n### 3.1 生成（Generation）\n\n**做什么**：模型产生候选输出。\n\n**三种方式**：\n1. **自我探索生成**：直接让模型输出答案，可以生成多个候选\n2. ** refinement生成**：先出一个初版答案，然后反复修改直到更好\n3. **交互生成**：多个模型实例互相合作或对抗，产生数据\n\n**输入**：任务提示（问题、指令）。\n\n**操作**：模型根据当前策略输出一个或多个答案/推理过程。\n\n**输出**：候选输出（答案、推理链、代码等）。\n\n---\n\n### 3.2 奖励（Reward）\n\n**做什么**：给生成的输出打分，判断好坏。\n\n**三种奖励类型**：\n1. **启发式奖励**：基于统计规则，比如多数投票（多个答案里选出现最多的）\n2. **模型奖励**：让模型自己评价自己，或者用另一个模型/裁判来打分\n3. **验证奖励**：用标准答案或执行结果来判定对错（比如代码跑通没有、数学题答案对不对）\n\n**输入**：模型生成的输出。\n\n**操作**：根据上述某种方式计算质量分数。\n\n**输出**：二值（对/错）、标量分数、或偏好排序。\n\n---\n\n### 3.3 优化（Optimization）\n\n**做什么**：根据奖励信号更新模型参数。\n\n**三种方式**：\n1. **监督微调（SFT）**：只保留好的输出，用标准交叉熵训练\n2. **强化学习（RL）**：用PPO、DPO、GRPO等算法最大化奖励\n3. **混合方式**：先SFT后RL，或者交替进行\n\n**输入**：带奖励标签的生成数据。\n\n**操作**：执行梯度更新，改变模型参数。\n\n**输出**：更新后的模型。\n\n---\n\n### 3.4 代表性范式\n\n论文总结了三种典型的自我改进模式：\n\n1. **迭代拒绝采样**：生成多个答案 → 过滤出正确的 → 用这些正确答案微调\n2. **自我验证与精炼**：让模型自己评价自己答案好坏 → 根据反馈修改 → 用修改后的答案训练\n3. **自我博弈**：让模型扮演两个角色（比如出题者和解题者）互相挑战，在对抗中提升\n\n---\n\n## 四、推理优化（Inference Refinement）\n\n**目的**：在模型已经训练好的情况下，推理时（不用改参数）如何让输出更好。\n\n### 4.1 解码策略\n\n**做什么**：在生成每个词的时候做手脚。\n\n**几种方法**：\n- **自洽性（Self-Consistency）**：生成多个答案，选出现最多的\n- **树搜索**：不只生成一条路，而是探索多条推理路径\n- **logit调整**：在选择下一个词时人为提高或降低某些词的优先级\n- **效率优化**：用轻量级模型先猜几个词，大模型一起验证（speculative decoding）\n\n**输入**：用户问题。\n\n**操作**：修改解码过程（采样、搜索、概率调整）。\n\n**输出**：更好的答案。\n\n---\n\n### 4.2 基于推理的改进\n\n**做什么**：让模型多\"想\"几步，而不是直接吐答案。\n\n**三种方式**：\n1. **反馈循环**：生成答案 → 自己批评自己 → 修改答案 → 再生成 → 循环直到满意\n2. **规划**：先想一个计划/步骤列表，再按计划执行\n3. **协作推理**：多个模型互相讨论（比如辩论），综合各方观点\n\n**输入**：用户问题。\n\n**操作**：多轮交互，每轮有反馈或多个模型参与。\n\n**输出**：经过多轮思考/讨论后的答案。\n\n---\n\n### 4.3 智能体系统改进\n\n**做什么**：不只是单个模型，而是给模型配上工具、记忆、工作流。\n\n**四个方向**：\n1. **提示词优化**：自动调整给模型的指令，让它表现更好\n2. **记忆系统**：让模型记住之前对话的内容，下次能用上\n3. **工具使用**：让模型自己决定调用什么外部工具（搜索、代码、API）\n4. **工作流演化**：自动调整多个智能体之间的协作方式\n\n**输入**：任务、环境反馈。\n\n**操作**：动态调整提示词、记忆内容、工具选择、协作结构。\n\n**输出**：更适应任务的智能体系统。\n\n---\n\n### 4.4 测试时训练（Test-Time Training）\n\n**做什么**：在推理时临时微调模型。\n\n**操作**：\n- 拿到具体问题后，用这个问题相关的信息（甚至让模型自己生成一些相关数据）\n- 在这些数据上做几步梯度下降\n- 然后用更新后的模型回答这个问题\n\n**目的**：让模型针对当前问题做\"临时抱佛脚\"式的适配。\n\n---\n\n## 五、自主评估（Autonomous Evaluation）\n\n**目的**：解决人类评估跟不上模型发展的问题，让模型自己评估自己的进步。\n\n### 5.1 动态基准测试\n\n**做什么**：用会随时间更新的评估集，而不是固定的benchmark。\n\n**操作**：\n- 实时从网上抓取最新问题（如REALTIME QA）\n- 用模型生成新题目（而非人工出题）\n- 持续更新题库\n\n**输出**：一个不断进化的评估标准。\n\n---\n\n### 5.2 交互式环境评估\n\n**做什么**：在真实环境（不是静态题目）里测试模型能力。\n\n**操作**：\n- 让模型操作真实系统（网页、代码仓库、手机APP）\n- 根据任务完成度打分\n\n**输出**：在真实环境中的能力评估。\n\n---\n\n## 总结\n\n这篇论文的核心方法论可以概括为：**模型自己干活**。\n\n整个系统形成一个闭环：\n1. **自己找数据**（从网上爬、自己生成）\n2. **自己挑数据**（用模型信号判断好坏）\n3. **自己训练自己**（生成-评估-优化的循环）\n4. **推理时还能自我改进**（多想想、多改改）\n5. **自己评估自己**（不用等人来打分）\n\n论文的核心观点是：当模型足够强时，可以把原本需要人类介入的环节逐步自动化，形成一个能自己变强的系统。",
                    "additional_insights": "# 论文认知价值提取\n\n## 1. 实验中的反直觉发现\n\n- **TinyStories发现**：参数少于1000万的极小模型，仅在GPT-3.5/4生成的故事上训练就能学会连贯语言，颠覆了\"大模型才能学语言\"的直觉\n\n- **Phi系列反常结果**：Phi-1用不到1B的GPT-3.5合成Python教程token，1.3B参数达到HumanEval 50.6%；Phi-4几乎全用GPT-4生成文本训练，性能在部分推理任务上反而超越教师模型\n\n- **合成数据可替代大规模爬取**：BeyondWeb和Phi系列证明精心合成的数据可用远少于真实数据的token达到可比或更优性能\n\n## 2. 有启发性的分析/ablation\n\n- **训练阶段差异**：预训练受益于推理模式的多样性广度，监督微调对数据质量更敏感——不同阶段需要不同的数据策略\n\n- **数据混合比例**：约30%重述合成数据混合自然web文本可加速收敛5-10倍而不降质\n\n- **理论分析揭示\"生成-验证差距\"**：模型判别能力必须严格超过生成能力才能提供有效监督信号；长期自训练必然导致reward hacking和性能崩溃\n\n## 3. 对领域的新认知\n\n- **三范式归纳**：将自我改进归纳为迭代拒绝采样（过滤最佳）、自我验证与改进（自评+迭代优化）、自我博弈（对抗/协作）三大范式\n\n- **连续性维度**：从静态过滤→度量引导评分→自适应选择，数据选择连续性递增，自动化程度也递增\n\n## 4. 实用的经验性结论\n\n- **预训练数据排序**：推理密集型数据前置可获19%平均基准提升\n\n- **评估层关键性**：静态基准很快过时，无自主评估则系统无法实现长期迭代改进\n\n- **环境交互数据不可替代**：执行轨迹、浏览轨迹、工具调用日志无法通过静态文本或纯生成复制\n\n## 5. 局限性中的机会\n\n- **反馈信号脆弱**：现有方法依赖的验证器/奖励模型存在漂移，长期自训练会reward hacking——设计更鲁棒的反馈机制是核心挑战\n\n- **缺乏自我选择**：所有自适应选择方法都需独立selector模块，无方法实现模型自主选择自身训练数据——这是最强自主性方向\n\n- **评估瓶颈**：静态基准无法跟踪系统长期演化，需要新的动态/交互式评估范式",
                    "research_value": "# 论文评审报告\n\n## 1. 影响力潜力（Impact）\n\n**正面证据**：\n- 论文提出了一个包含五个环节的系统性自我改进框架：数据获取、数据选择、模型优化、推理优化、自主评估\n- 论文总结了三种典型自我改进模式（迭代拒绝采样、自我验证与精炼、自我博弈），为后续研究提供了分类学基础\n- 论文识别了多个有前景的研究方向，如反馈信号鲁棒性、自我选择机制、动态评估范式\n\n**负面证据或缺失**：\n- 这是一篇综述论文（overview），而非原创性研究，没有产生新的实验发现\n- 论文的\"Future Outlook\"部分篇幅有限，对未来方向的探讨不够深入\n\n**判断**：中等\n\n**理由**：作为综述论文，它为LLM自我改进领域提供了系统性的分类框架，具有一定的整理价值。但其影响力取决于后续研究者如何利用这个框架，而非论文本身的直接贡献。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 论文提出了GRO框架（Generation-Reward-Optimization）来统一描述模型优化过程\n- 论文将自我改进归纳为三种范式，这种分类方式在现有文献中具有系统性\n- 论文从数据获取到自主评估提供了端到端的视角\n\n**负面证据或缺失**：\n- 论文本质上是现有研究的综合梳理，许多内容都能在其他来源中找到\n- 方法论解读部分主要是对现有技术的重新组织\n\n**判断**：中等\n\n**理由**：论文的分类框架和统一视角有其价值，但作为综述论文，这些内容本质上是整理性工作。考虑到该领域的快速发展，类似的内容可能在短期内就会被其他研究者独立提出。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- LLM自我改进确实是当前AI领域的研究热点，论文引用了大量2024-2025年的最新研究\n- 论文指出了领域的多个关键挑战，如reward hacking、评估瓶颈等\n- 该子领域处于上升期，研究活跃度高\n\n**负面证据或缺失**：\n- 论文发表于2026年3月，作为综述论文，其时效性相对有限\n- 论文的\"future outlook\"部分仅占较小篇幅\n\n**判断**：中等\n\n**理由**：论文的时机恰当，该领域正处于上升阶段。但作为综述论文，其\"窗口期\"较短，需要持续更新才能保持价值。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 论文对\"模型判别能力必须严格超过生成能力\"进行了理论分析，揭示了\"生成-验证差距\"\n- 论文挑战了静态基准的传统评估方式，指出其局限性\n- 论文质疑了完全依赖人类反馈的传统方法\n\n**负面证据或缺失**：\n- 论文主要是对现有方法的分类和总结，没有明确挑战某个被盲目沿用的做法\n- 论文没有进行原创性的实验来验证或反驳某些假设\n\n**判断**：弱\n\n**理由**：论文虽然指出了一些重要问题（如静态基准的局限性），但作为综述论文，它没有对现有范式进行实质性的质疑或挑战。它更多是在现有框架内进行整理工作，而非颠覆性思考。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：\n- 论文提出了一个核心观点：\"模型自己干活\"，即模型可以自主完成数据获取、选择、训练和评估\n- 论文将自我改进系统描述为一个闭环系统\n\n**负面证据或缺失**：\n- 论文的核心洞见相对模糊，没有一个清晰的、可以用一句话表达的核心观点\n- 论文更像是对现有方法的百科全书式总结，而不是围绕一个核心洞见展开\n\n**判断**：弱\n\n**理由**：论文的核心观点\"模型自己干活\"虽然形象，但过于笼统，不能算是一个深刻的洞见。论文更像是一个技术综述，而不是围绕一个核心发现展开的研究论文。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 论文识别了多个重要的技术风险，如reward hacking、反馈信号漂移、\"生成-验证差距\"等\n- 论文讨论了长期自训练会导致性能崩溃的理论可能性\n\n**负面证据或缺失**：\n- 论文是综述性质，没有进行原创性实验来验证某些假设\n- 论文没有提出新的方法来克服这些风险\n\n**判断**：中等\n\n**理由**：论文对风险的讨论主要停留在描述层面，没有提出具体的解决方案或验证方案。作为综述论文，这可能是合理的定位，但也限制了其实际指导价值。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：\n- 论文的作者团队对LLM领域有深入的了解，引用了大量最新研究\n- 论文的分类框架较为完整，涵盖了五个核心环节\n\n**负面证据或缺失**：\n- 作为综述论文，其比较优势主要取决于对文献的覆盖范围和分类质量\n- 论文没有展示任何独特的实验资源或数据优势\n\n**判断**：中等\n\n**理由**：论文作为综述论文，其价值主要体现在对现有文献的系统整理上。但这种优势是暂时的，随着更多综述的出现，其价值可能会降低。\n\n---\n\n## 综合评价\n\n**一句话判定**：有潜力但有明显短板\n\n**解释**：这篇论文作为LLM自我改进领域的综述论文，提供了一个系统性的分类框架，对领域有整理价值。但它本质上是一篇综述论文，不是原创性研究，其核心贡献是对现有方法的分类和总结。论文的核心洞见不够清晰，对未来研究方向的探讨也不够深入，且缺乏对现有范式的实质性挑战。\n\n**最致命的弱点**：论文缺乏原创性贡献。作为综述论文，它没有提出新的方法、理论或实验发现，只是对现有研究的整理和分类。这使其难以在研究贡献方面与原创性论文竞争。\n\n**如果要做得更好**，最值得调整的1-2个方面：\n1. 增加原创性的理论分析或实验验证，而不仅仅是总结现有方法\n2. 加强对未来研究方向的深入探讨，提供更具前瞻性的视角\n\n**与Carlini原则的对照**：\n- 最符合：选择重要的问题（LLM自我改进确实是重要且前沿的研究方向）\n- 最不符合：产生新的实验发现（论文是综述性质，没有原创性实验）",
                    "summary_translation": "随着大型语言模型（LLMs）不断发展，仅依靠人工监督来改进模型的做法成本日益高昂，且可扩展性受到严重限制。当模型在某些领域接近人类水平的能力时，人工反馈可能无法再提供足够有信息量的信号来推动进一步提升。与此同时，模型做出自主决策和执行复杂任务的能力不断增强，这自然使得模型开发过程中的各个组件能够逐步实现自动化。这些挑战与机遇共同推动了对自我改进（self-improvement）研究的日益增长，即模型能够自主生成数据、评估输出并持续迭代提升自身能力。本文从系统层面审视自我改进语言模型，并提出一个统一框架来整合现有技术。我们将自我改进系统概念化为一个闭环生命周期，包含四个紧密耦合的进程：数据获取（data acquisition）、数据选择（data selection）、模型优化（model optimization）和推理精炼（inference refinement），并配备一个自主评估层（autonomous evaluation layer）。在该框架内，模型本身在驱动每个阶段中扮演核心角色：收集或生成数据、筛选有信息量的信号、更新自身参数、以及精炼输出结果；而自主评估层则持续监控进展并引导各阶段之间的改进循环。基于这一生命周期视角，我们从技术角度系统地回顾并分析了各组件的代表性方法。我们进一步讨论了当前存在的局限性，并展望了未来实现完全自我改进型LLMs的研究愿景。"
                },
                {
                    "title": "Belief-Driven Multi-Agent Collaboration via Approximate Perfect Bayesian Equilibrium for Social Simulation",
                    "arxiv_id": "2603.24973",
                    "authors": "Weiwei Fang, Lin Li, Kaize Shi, Yu Yang, Jianwei Zhang",
                    "summary": "High-fidelity social simulation is pivotal for addressing complex Web societal challenges, yet it demands agents capable of authentically replicating the dynamic spectrum of human interaction. Current LLM-based multi-agent frameworks, however, predominantly adhere to static interaction topologies, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios. This rigidity often leads to unrealistic ``groupthink'' or unproductive deadlocks, undermining the credibility of simulations for decision support. To bridge this gap, we propose \\textit{BEACOF}, a \\textit{belief-driven adaptive collaboration framework} inspired by Perfect Bayesian Equilibrium (PBE). By modeling social interaction as a dynamic game of incomplete information, BEACOF rigorously addresses the circular dependency between collaboration type selection and capability estimation. Agents iteratively refine probabilistic beliefs about peer capabilities and autonomously modulate their collaboration strategy, thereby ensuring sequentially rational decisions under uncertainty. Validated across adversarial (judicial), open-ended (social) and mixed (medical) scenarios, BEACOF prevents coordination failures and fosters robust convergence toward high-quality solutions, demonstrating superior potential for reliable social simulation. Source codes and datasets are publicly released at: https://github.com/WUT-IDEA/BEACOF.",

                    "filter_reason": "**第一步：核心判断** 这篇论文的本质是**构建多智能体系统的协作框架**。论文提出了BEACOF（Belief-driven Adaptive Collaboration Framework），核心贡献在于解决多智能体系统中协作策略选择的动态博弈问题，而非将现有智能体应用于特定领域。 **第二步：正面指标分析** 论文明确包含以下核心关注点： - **多智能体系统 (Multi-Agent Systems)**: 论文专门研究多个LLM智能体之间的协作机制 - **协作与通信**: 智能体通过迭代完善对同伴能力的概率信念，自主调节协作策略 - **动态博弈**: 将社会交互建模为不完全信息的动态游戏，使用Perfect Bayesian Equilibrium (PBE)来解决协作类型选择和能力估计之间的循环依赖 - **适应性**: 智能体能够根据环境动态调整合作/竞争策略 **第三步：排除标准检查** - 不涉及安全、对齐、可解释性等研究 - 不涉及多模态、视觉、VLMs - 不涉及知识图谱、GNN等图技术 **第四步：特殊情况的处理** 这篇论文不属于\"将智能体应用于特定领域\"的情况。虽然验证场景包括司法、社会和医疗，但这些只是**验证框架的测试环境**，而非论文的核心贡献。论文的核心贡献是提出通用的多智能体协作框架BEACOF本身，这是一种方法论贡献。 **结论** 该论文完全符合研究范围：其核心贡献是构建和改进LLM多智能体系统的协作机制，属于\"多智能体\"方向的研究，符合筛选标准中的\"保留\"类别。",
                    "intro_logic": "Based on the introduction section of this paper, here is the ordered list of the problem introduction logic:\n\n1. High-fidelity social simulation is important for addressing complex Web societal challenges, but it demands agents capable of authentically replicating the dynamic spectrum of human interaction.\n\n2. Current LLM-based multi-agent frameworks predominantly adhere to static interaction topologies, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios.\n\n3. This rigidity often leads to unrealistic \"groupthink\" or unproductive deadlocks, undermining the credibility of simulations for decision support.\n\n4. Exclusively cooperative models risk \"groupthink\" and error amplification, while strictly competitive approaches often succumb to unproductive deadlocks.\n\n5. Heuristic or rule-based methods attempt to bridge this gap but lack the granularity to adaptively optimize strategies based on evolving states.\n\n6. A fundamental challenge exists: strategic decision-making under incomplete information, specifically how agents can make rational collaboration decisions when peer capabilities are unobservable and must be inferred from noisy interaction signals.\n\n7. There is a circular dependency problem: collaboration type selection depends on belief estimates of peer capabilities, yet belief updates are themselves influenced by the chosen collaboration mode.\n\n8. Without principled coordination mechanisms, this interdependence can lead to erratic oscillations between strategies or premature convergence to suboptimal equilibria.\n\n**Research Question:** How can multi-agent systems dynamically and rationally adapt their collaboration strategies (cooperation, competition, or coopetition) based on beliefs about peer capabilities to achieve high-quality outcomes in social simulation?",
                    "core_insight": "# 论文的核心切入点与方法论演进分析\n\n## 一、切入角度：\"静态拓扑\"与\"循环依赖\"的双重困境\n\n### 1.1 表面痛点：静态交互范式的局限性\n\n论文开篇即指出现有框架的核心缺陷。原文直接引用：\n\n> \"Current LLM-based multi-agent frameworks, however, predominantly adhere to **static interaction topologies**, failing to capture the fluid oscillation between cooperative knowledge synthesis and competitive critical reasoning seen in real-world scenarios.\"\n\n这揭示了第一个切入角度：**现有方法无法动态适应交互场景的变化**，只能在\"纯合作\"或\"纯竞争\"之间二选一，而非根据情境灵活切换。\n\n### 1.2 深层痛点：循环依赖问题（Circular Dependency Problem）\n\n论文进一步揭示了更根本的理论困境，这是其方法论的\"种子\"：\n\n> \"More critically, adaptive switching introduces a **circular dependency problem**: collaboration type selection depends on belief estimates of peer capabilities, yet belief updates are themselves influenced by the chosen collaboration mode.\"\n\n这句话点明了论文的核心切入点：**协作策略的选择与对同伴能力的信念估计之间存在循环依赖**。没有原则性的协调机制，这种相互依赖会导致：\n- 策略间的 erratic oscillations（不稳定振荡）\n- premature convergence to suboptimal equilibria（过早收敛于次优均衡）\n\n---\n\n## 二、种子如何发芽：方法论的三层构建\n\n### 2.1 理论基石：动态不完全信息博弈\n\n基于上述痛点，论文将多智能体协作建模为：\n\n> \"modeling social interaction as a **dynamic game of incomplete information**\"\n\n具体形式化为元组 $G = \\langle N, \\Theta, A, H, U, T \\rangle$，其中：\n- **Types (Θ)**：每个智能体的私有能力向量 $\\theta_i \\in [0,1]^d$，始终静态但不可观测\n- **Beliefs**：每个智能体维护对他人能力的**动态信念估计** $b_t^i(j)$\n- **Actions**：协作类型 $c_t^i \\in \\{\\text{Cooperation}, \\text{Competition}, \\text{Coopetition}\\}$\n\n### 2.2 核心机制：近似完美贝叶斯均衡（Approximate PBE）\n\n论文承认精确PBE的计算不可行（\"computationally intractable in high-dimensional continuous type spaces\"），因此提出两个关键近似：\n\n**（1）近似序贯理性（Approximate Sequential Rationality）**\n\n> \"we substitute exact integration with **LLM-based reasoning** for Sequential Rationality\"\n\n智能体通过LLM近似计算最佳响应：\n$$c_i^* = \\arg\\max_{c \\in C} \\mathbb{E}_{c_{-i} \\sim \\pi(\\cdot | b_{-i})}[U_i(c, c_{-i} | H_{t-1})]$$\n\n**（2）带置信度衰减的贝叶斯信念更新**\n\n采用高斯近似，仅维护均值（估计值）和精度（置信度）：\n$$b_t^i(j) = \\frac{\\omega_{t-1}^i(j) \\cdot b_{t-1}^i(j) + \\omega_t^j \\cdot e_t^j}{\\omega_{t-1}^i(j) + \\omega_t^j}$$\n\n引入遗忘因子 $\\lambda \\in (0,1]$ 以追踪非平稳行为：\n$$\\omega_t^i(j) = \\lambda \\cdot \\omega_{t-1}^i(j) + \\omega_t^j$$\n\n---\n\n## 三、试错历程与挑战克服\n\n### 3.1 挑战一：计算复杂性\n\n**问题**：精确贝叶斯推理在高维连续类型空间中不可行。\n\n**解决**：论文明确采用\"bounded rationality\"框架，用LLM推理替代精确积分，用参数化高斯假设替代完整后验分布。\n\n### 3.2 挑战二：信念震荡与不收敛\n\n**问题**：若缺乏原则性机制，信念更新可能导致策略不稳定。\n\n**解决**：论文提供理论保证（Proposition 4.1），证明在遗忘因子 $\\lambda \\in (0,1)$ 条件下：\n- 精度 $\\omega_t$ 收敛到稳态 $\\omega_\\infty \\approx \\frac{E[\\omega_{new}]}{1-\\lambda}$\n- 信念估计 $b_t$ 满足**均方稳定性**，误差方差被 $O((1-\\lambda)\\sigma^2)$ 界限定界\n\n### 3.3 挑战三：真实场景验证\n\n**问题**：理论需要跨越 adversarial（法庭辩论）、open-ended（社交对话）、mixed（医疗会诊）三种场景。\n\n**解决**：论文设计早停机制（Eq. 5），当信念变化 $\\Delta_t^i < \\epsilon$ 持续 $K$ 轮时终止，既保证收敛又避免过度计算。\n\n---\n\n## 四、方法论演进的逻辑链条\n\n```\n表面现象：静态拓扑 → 只能合作或竞争\n                ↓\n深层问题：循环依赖 → 策略选择与信念估计相互影响\n                ↓\n理论解决：动态博弈 + PBE → 将交互建模为不完全信息游戏\n                ↓\n实现挑战：高维推理不可行\n                ↓\n工程近似：LLM推理 + 高斯信念 + 遗忘因子\n                ↓\n理论保证：收敛性证明（Proposition 4.1）\n```\n\n---\n\n## 五、总结\n\n这篇论文的\"种子\"是对**静态交互范式无法模拟真实社会动态**的洞察。其方法论的核心创新在于：**不是简单地让智能体\"学会切换策略\"，而是通过博弈论框架将\"信念估计\"与\"策略选择\"形式化为统一的序贯决策问题**，并用近似PBE实现可计算的解决方案。\n\n论文原文的关键转折句总结了这一思路：\n\n> \"By employing a tractable approximation to circumvent the computational intractability of exact inference within high-dimensional continuous type spaces, our framework provides a **rigorous solution to the circular dependency problem** by establishing sequential rationality—ensuring agents make rational collaboration decisions given their current beliefs—while maintaining belief consistency through principled Bayesian updates.\"",
                    "methodology": "# 方法论解读\n\n## 核心思想一句话概括\n\n这篇论文的方法论，本质上是**让一群AI智能体在一个\"不完全信息动态博弈\"的框架下互相猜测对方的能力，然后根据猜测结果动态决定是合作、竞争还是既合作又竞争**。\n\n---\n\n## 方法论拆解\n\n论文的方法论主要在 Section 3（动态博弈建模）和 Section 4（方法）中。以下按照实际执行顺序逐步拆解：\n\n### 第一步：把多智能体交互建模为一个\"动态博弈\"\n\n**输入**：无（这是理论建模阶段）\n\n**操作**：论文把多智能体协作问题形式化定义为一个元组 **G = ⟨N, Θ, A, H, U, T⟩**，具体含义如下：\n\n- **N（智能体集合）**：参与交互的多个AI Agent\n- **Θ（类型空间）**：每个智能体有一个\"类型\"向量，代表它的能力（比如逻辑能力、表达能力、共情能力等）。这个类型是固定的，但其他智能体看不到\n- **A（动作空间）**：每个智能体在每一轮可以选择三种策略之一——**合作（Cooperation）**、**竞争（Competition）**、**竞合（Coopetition）**，同时生成一段文字回复\n- **H（公开历史）**：记录了之前所有轮次的策略选择、消息内容和评估结果\n- **U（效用函数）**：衡量每个策略选择的好坏，由Meta-Agent打分\n\n**输出**：一个数学化的博弈框架\n\n**目的**：把\"多智能体应该怎么协作\"这个模糊问题，转化为一个严格的博弈论问题。这样做是为了让后续的策略选择有理论依据，而不是凭直觉拍脑袋。\n\n---\n\n### 第二步：设计Meta-Agent（中央协调者）\n\n**输入**：当前任务描述、智能体角色、历史交互记录\n\n**操作**：Meta-Agent负责两件事：\n\n1. **生成上下文相关的收益矩阵（Payoff Matrix）**：对每个智能体和每种策略组合，给出一个分数（0-10分），表示\"在这种策略下，这个智能体大概能获得多少收益\"\n2. **预测智能体的策略概率分布**：基于当前历史，猜测每个智能体这轮可能会选择什么策略\n\n**输出**：\n- 每个智能体的收益向量 {U^t_i}\n- 每个智能体的策略概率预测 {P^t(c_i)}\n\n**目的**：Meta-Agent相当于一个\"裁判\"和\"情报员\"。它不参与具体对话，但提供关键信息——告诉每个智能体\"你觉得对方会怎么做\"以及\"你觉得怎么做比较划算\"。\n\n---\n\n### 第三步：每个智能体选择最优策略（近似序贯理性）\n\n**输入**：\n- Meta-Agent提供的收益矩阵 {U^t_i}\n- Meta-Agent提供的策略概率预测 {P^t(c_i)}\n- 该智能体对其他智能体能力的\"信念\"（belief）\n\n**操作**：每个智能体执行以下计算：\n\n1. **计算期望效用**：根据Meta-Agent预测的对方策略概率，算出每种策略的\"期望得分\"\n   - 具体公式：c*_i = argmax_{c ∈ C} E_{c_{-i} ~ P}[U_i(c, c_{-i} | H^{t-1})]\n   - 意思是：遍历三种策略，选择那个期望得分最高的\n\n2. **生成对应策略的文字回复**：\n   - 如果选\"合作\"：生成偏向共识构建、观点融合的文字\n   - 如果选\"竞争\"：生成偏向批判、指出对方错误的文字\n   - 如果选\"竞合\"：生成部分同意但带有反驳的文字\n\n**输出**：选定的策略 c*_i 和生成的文字消息 m*_i\n\n**目的**：这是整个框架的核心——**让每个智能体根据对局势的判断，自主决定这轮应该合作还是竞争**。而不是像之前的方法那样，所有场景都固定用同一种策略。\n\n---\n\n### 第四步：Meta-Agent评估智能体的回复\n\n**输入**：智能体生成的文字消息 m*_i、选定的策略 c*_i、任务描述\n\n**操作**：Meta-Agent对每条回复进行评估，从多个维度打分（维度取决于具体场景）：\n\n- 在法庭辩论场景：评估\"证据强度\"、\"法律立场\"等\n- 在医疗场景：评估\"诊断置信度\"、\"专业性\"等\n- 在聊天场景：评估\"共情能力\"、\"人格一致性\"等\n\n**输出**：一个评估向量 e^t_i（每个维度的分数）和一个置信度分数 ω^t_i\n\n**目的**：为后续的信念更新提供\"观测数据\"。Meta-Agent的评估相当于告诉所有智能体：\"这个智能体这轮表现怎么样\"。\n\n---\n\n### 第五步：所有智能体更新对彼此能力的信念（近似贝叶斯更新）\n\n**输入**：\n- 之前对其他智能体能力的信念 b^{t-1}_j(i)（对智能体i的能力估计）\n- 之前信念的置信度 ω^{t-1}_j(i)\n- Meta-Agent刚给出的评估 (e^t_i, ω^t_i)\n\n**操作**：每个智能体使用以下公式更新信念：\n\n```\nb^t_j(i) = (ω^{t-1}_j(i) * b^{t-1}_j(i) + ω^t_i * e^t_i) / (ω^{t-1}_j(i) + ω^t_i)\n```\n\n简单理解就是：**加权平均**——之前对这个人的判断 + 这轮新观察到的表现，按置信度加权。\n\n同时更新置信度：\n```\nω^t_j(i) = λ * ω^{t-1}_j(i) + ω^t_i\n```\n其中 λ 是\"遗忘因子\"（0 < λ ≤ 1），作用是让旧的置信度逐渐衰减，防止智能体\"固步自封\"。\n\n**输出**：更新后的信念 b^t_j(i) 和置信度 ω^t_j(i)\n\n**目的**：这是解决\"循环依赖问题\"的关键——智能体通过不断观察对方的表现，逐渐修正对对方能力的估计。这个估计会影响下一轮的策略选择，形成一个动态适应过程。\n\n---\n\n### 第六步：检查是否提前停止\n\n**输入**：所有智能体的信念变化量\n\n**操作**：计算每个智能体的信念变化幅度（归一化欧氏距离）。如果某个智能体的信念连续K轮变化都很小（小于阈值 ε），就认为系统已经\"收敛\"，停止交互。\n\n**输出**：布尔值（是否停止）\n\n**目的**：避免无限轮对话，提高效率。\n\n---\n\n## 总结：整个流程的宏观图景\n\n```\n第t轮：\n1. Meta-Agent 生成收益矩阵 + 预测对方策略\n2. 每个智能体根据这些信息，决定这轮用\"合作/竞争/竞合\"\n3. 智能体生成对应的文字\n4. Meta-Agent 评估这些文字，给出分数和置信度\n5. 所有智能体根据评估结果，更新对彼此能力的\"信念\"\n6. 检查是否收敛，否则进入下一轮\n```\n\n**最核心的创新点**：通过引入\"信念\"（belief）这个变量，解决了\"循环依赖\"问题——智能体不是盲目选择策略，而是基于对对方能力的\"猜测\"来做决策，而这个\"猜测\"又会随着交互进行不断修正。",
                    "additional_insights": "## 1. 实验中的反直觉发现\n\n- **纯竞争方法在合作场景下彻底失败**：MAD在MedQA（医学问答，需要合作诊断）上准确率仅31.17%，远低于合作方法CAMEL的84.83%，说明强制对抗会严重阻碍知识合成。\n- **多样性与一致性可以兼得**：BEACOF在Persona Chat中同时达到最高Diversity（41.52）和最低Contradiction（13.30%），而MAD虽然多样性高（26.04%）但矛盾率也极高（26.04%），打破了\"多样性高必然导致一致性差\"的直觉。\n- **模型规模放大框架收益**：Qwen3-30B上BEACOF的Persona Consistency达到86.70%（vs MAD的73.96%），差距远大于小模型，说明游戏理论框架的计算收益随推理能力增强而显著放大。\n\n## 2. 有启发性的 ablation 分析\n\n- **Belief updates比type switching更关键**：移除belief updates导致Court Debate F1从16.87暴跌至10.58（~37%损失），而移除type switching仅导致Diversity从36.85降至32.48，表明对同伴能力的估计是战略决策的核心前提。\n- **遗忘因子λ确保非平稳环境下的收敛**：论文通过引入λ∈(0,1]使精度更新成为收缩映射，理论保证belief不会发散到无穷大，这是早期停止 criterion 可行的前提。\n\n## 3. 对领域的新认知\n\n- **\"coopetition\"是真实社会互动的本质**：论文指出现实中的司法辩论、医疗会诊都是\"coopetition\"（合作竞争混合），而非纯合作或纯竞争；静态框架无法捕捉这种动态切换。\n- **群体思维是LLM多智能体的系统性风险**：Case Study显示即使初始推理错误，静态合作框架下Agent B会盲目强化错误（\"echo chamber\"），而belief-driven机制通过检测信息增益下降触发策略切换，打破共识幻觉。\n\n## 4. 实用的经验性结论\n\n- **超参数建议**：遗忘因子λ=0.6，belief变化阈值ε=0.05，耐心K=3，最大轮数T_max=4；在Llama3.1-8B上已验证有效性。\n- **早期停止 criterion 有效**：基于belief stabilization的停止规则在大多数场景下4轮内触发，平衡了计算效率和解质量。\n- **Meta-Agent解耦全局状态**：将belief tracking卸载到centralized meta-agent，保留participant agents的有限context window用于persona一致性维护，这对长程交互至关重要。\n\n## 5. 局限性中的机会\n\n- **仅限成对交互**：论文承认当前框架主要针对二元智能体，未来可扩展到多智能体网络拓扑，研究群体极化等现象。\n- **固定策略空间**：当前C={Cooperation, Competition, Coopetition}是预定义的，可引入策略成本（如竞争需要更多tokens）使建模更精细。\n- **静态类型假设**：类型向量θ在游戏期间保持不变，未来可研究类型随时间演化的动态博弈，更贴近真实社会学习过程。",
                    "research_value": "## 1. 影响力潜力（Impact）\n\n**正面证据**：无具体证据。论文声称解决了\"groupthink\"和\"unproductive deadlocks\"问题，但未说明具体谁会因此改变实践方式。\n\n**负面证据或缺失**：\n- 论文主要在二元智能体场景验证，扩展到多智能体网络拓扑作为\"未来机会\"列出\n- 缺乏对实际应用场景的深入分析\n- 核心贡献是工程化的框架改进，而非范式突破\n\n**判断**：弱\n\n**理由**：虽然问题领域（LLM多智能体社交模拟）重要，但论文的具体贡献更像是\"在已知框架上增加了一个模块\"，缺乏让外部研究者改变行为的驱动力。\n\n---\n\n## 2. 不可替代性（Uniqueness）\n\n**正面证据**：\n- 论文明确识别了\"循环依赖\"问题：协作类型选择依赖信念估计，信念更新又受协作模式影响\n- 引入遗忘因子λ使精度更新成为收缩映射，理论保证收敛\n\n**负面证据或缺失**：\n- 博弈论框架在多智能体系统中已被广泛探索\n- 信念更新机制在多智能体强化学习中并非新概念\n- \"近似完美贝叶斯均衡\"是成熟理论，论文应用层面创新有限\n\n**判断**：中等\n\n**理由**：论文对特定问题（循环依赖）的形式化有一定新意，但核心技术方法在相关领域有大量先例。\n\n---\n\n## 3. 时机判断（Timing）\n\n**正面证据**：\n- LLM多智能体系统是当前热门方向\n- 社会模拟需求确实存在\n- 论文发表于2026年3月\n\n**负面证据或缺失**：\n- 论文引用的\"核心挑战\"——不完全信息动态博弈——是 decades 老的博弈论问题\n- 论文承认当前框架\"仅限成对交互\"，暗示基础架构尚未成熟\n\n**判断**：中等\n\n**理由**：应用场景有时效性，但核心技术方法缺乏时间窗口的紧迫性。\n\n---\n\n## 4. 对现有范式的审视（Challenging Conventions）\n\n**正面证据**：\n- 论文挑战了\"静态交互拓扑\"假设\n- 指出纯合作导致groupthink，纯竞争导致deadlock\n\n**负面证据或缺失**：\n- 未明确指出哪个\"被盲目沿用的做法\"被质疑\n- 论文更多是在\"合作-竞争\"二元框架内做组合，而非颠覆性创新\n\n**判断**：弱\n\n**理由**：论文描述的是对已有认知的工程化实现，而非对领域范式的根本性质疑。\n\n---\n\n## 5. 核心洞见的清晰度（Core Insight）\n\n**正面证据**：论文核心洞见可概括为\"通过引入信念更新机制解决协作策略选择与能力估计的循环依赖\"\n\n**负面证据或缺失**：\n- 这个洞见在多智能体强化学习领域是常识性理解\n- 论文未能清晰区分\"洞见\"与\"做法\"\n\n**判断**：弱\n\n**理由**：核心洞见更像是\"把已有方法论应用到新场景\"，而非真正的认知突破。\n\n---\n\n## 6. 风险与可行性（Risk vs. Feasibility）\n\n**正面证据**：\n- 提供了三个场景的实验验证\n- 包含消融实验（belief updates vs. type switching）\n- 有理论收敛性保证（遗忘因子使精度更新为收缩映射）\n\n**负面证据或缺失**：\n- 技术实现相对直接，结果几乎是确定性的\n- 论文未充分讨论失败模式\n- 局限性中列出的问题（仅限成对交互、固定策略空间）暗示基础架构不完整\n\n**判断**：中等\n\n**理由**：技术风险低，但科学发现的\"意外性\"有限。\n\n---\n\n## 7. 比较优势（Comparative Advantage）\n\n**正面证据**：无具体证据\n\n**负面证据或缺失**：\n- 输入材料中未说明团队在特定交叉点上的独特优势\n- 论文未展示与现有方法的根本性差异\n- 代码和数据已公开，但未体现团队的独特积累\n\n**判断**：弱\n\n**理由**：无法从输入材料中识别出团队的核心竞争力。\n\n---\n\n## 综合评价\n\n**判定**：平庸\n\n**解释**：这篇论文在LLM多智能体协作问题上做了工程化的有效工作，实验设计完整，理论框架自洽。但其核心贡献——用信念更新解决循环依赖——在博弈论和多智能体学习领域缺乏足够的创新性。论文更像是对已有成熟方法的组合应用，而非根本性的认知突破。影响力潜力弱，主要因为缺乏让外部研究者改变行为的独特贡献。\n\n**最致命的弱点**：核心洞见缺乏足够的独特性。论文解决的问题（循环依赖）在形式化后是博弈论的标准处理方式，论文的\"创新\"更多体现在工程实现而非认知突破。\n\n**如果要做得更好**：\n1. 深入分析现有静态框架为何失败的具体机制，而非仅指出\"groupthink\"现象\n2. 在更多样化的场景（尤其是真实社会模拟任务）上验证框架的泛化能力\n3. 明确团队在\"不完全信息动态博弈+LLM\"这个交叉点上的独特积累\n\n**与Carlini原则的对照**：\n- **最符合**：注重实际验证——论文有三个场景的实验和消融分析\n- **最不符合**：追求真正的认知突破——论文更多是工程改进，缺乏\"原来没人这样想过\"的洞见",
                    "summary_translation": "高保真社会模拟对于应对复杂的网络社会挑战至关重要，然而这要求智能体能够真实地复制人类互动的动态频谱。然而，当前基于大语言模型（LLM）的多智能体框架主要遵循静态交互拓扑结构，无法捕捉现实世界中合作性知识综合与竞争性批判推理之间的动态振荡。这种刚性往往导致不切实际的“群体思维”（groupthink）或无果而终的僵局，削弱了模拟对决策支持的可靠性。为弥补这一差距，我们提出了**BEACOF**，一个受完美贝叶斯均衡（Perfect Bayesian Equilibrium, PBE）启发的**信念驱动的自适应协作框架**（belief-driven adaptive collaboration framework）。通过将社会互动建模为不完全信息（incomplete information）的动态博弈，BEACOF严谨地解决了协作类型选择与能力评估之间的循环依赖问题。智能体迭代地精炼关于同伴能力的概率信念，并自主调节其协作策略，从而确保在不确定性下做出序列理性决策（sequentially rational decisions）。在对抗性（司法）、开放性（社交）和混合性（医疗）场景中进行验证，BEACOF有效防止了协调失败，并促进了向高质量解决方案的稳健收敛，展示了其在可靠社会模拟方面的卓越潜力。源代码和数据集已公开发布于：https://github.com/WUT-IDEA/BEACOF。"

                    "summary_translation": "由基于提示词的大语言模型构建的 Multi-agent systems (多智能体系统) 能够提升 multi-round reasoning (多轮推理) 能力，然而大多数现有的 pipelines (流程) 依赖于固定的、trajectory-wide (全轨迹) 通信模式，这与 iterative problem solving (迭代式问题求解) 的 stage-dependent (阶段依赖) 需求难以匹配。我们提出了 DyTopo，这是一个 manager-guided (管理者引导) 的 multi-agent framework (多智能体框架)，能够在每一轮重构一个 sparse directed communication graph (稀疏有向通信图)。基于 manager's round goal (管理者的本轮目标)，每个 agent (智能体) 输出 lightweight natural-language query (need) (轻量级自然语言查询/需求) 和 key (offer) (关键/供给) descriptors (描述符)；DyTopo 对这些 descriptors (描述符) 进行 embed (嵌入) 并执行 semantic matching (语义匹配)，仅沿着 induced edges (诱导边) 路由 private messages (私有消息)。在 code generation (代码生成) 和 mathematical reasoning (数学推理) benchmarks (基准测试) 以及四种 LLM backbones (大语言模型骨干网络) 上，DyTopo 的表现始终优于 strongest baseline (最强基线)（平均提升 +6.2）。除了 accuracy (准确性) 之外，DyTopo 还通过 evolving graphs (演化图) 生成了 interpretable coordination trace (可解释的协调轨迹)，从而能够对 communication pathways (通信路径) 如何在各轮之间 reconfigure (重新配置) 进行 qualitative inspection (定性分析)。"

                    "summary": "Large language model (LLM)-based agents are increasingly expected to negotiate, coordinate, and transact autonomously, yet existing benchmarks lack principled settings for evaluating language-mediated economic interaction among multiple agents. We introduce AgenticPay, a benchmark and simulation framework for multi-agent buyer-seller negotiation driven by natural language. AgenticPay models markets in which buyers and sellers possess private constraints and product-dependent valuations, and must reach agreements through multi-round linguistic negotiation rather than numeric bidding alone. The framework supports a diverse suite of over 110 tasks ranging from bilateral bargaining to many-to-many markets, with structured action extraction and metrics for feasibility, efficiency, and welfare. Benchmarking state-of-the-art proprietary and open-weight LLMs reveals substantial gaps in negotiation performance and highlights challenges in long-horizon strategic reasoning, establishing AgenticPay as a foundation for studying agentic commerce and language-based market interaction. Code and dataset are available at the link: https://github.com/SafeRL-Lab/AgenticPay.",

                    "summary": "To complete assignments provided by humans in natural language, robots must interpret commands, generate and answer relevant questions for scene understanding, and manipulate target objects. Real-world deployments often require multiple heterogeneous robots with different manipulation capabilities to handle different assignments cooperatively. Beyond the need for specialized manipulation skills, effective information gathering is important in completing these assignments. To address this component of the problem, we formalize the information-gathering process in a fully cooperative setting as an underexplored multi-agent multi-task Embodied Question Answering (MM-EQA) problem, which is a novel extension of canonical Embodied Question Answering (EQA), where effective communication is crucial for coordinating efforts without redundancy. To address this problem, we propose CommCP, a novel LLM-based decentralized communication framework designed for MM-EQA. Our framework employs conformal prediction to calibrate the generated messages, thereby minimizing receiver distractions and enhancing communication reliability. To evaluate our framework, we introduce an MM-EQA benchmark featuring diverse, photo-realistic household scenarios with embodied questions. Experimental results demonstrate that CommCP significantly enhances the task success rate and exploration efficiency over baselines. The experiment videos, code, and dataset are available on our project website: https://comm-cp.github.io.",

                    "summary_translation": "为了完成人类以自然语言形式下达的任务，机器人必须解读指令，生成并回答用于场景理解的相关问题，并操作目标物体。在现实部署中，通常需要多个具有不同操作能力的异构机器人来协作处理不同的任务。除了对专门操作技能的需求外，有效的信息收集对于完成这些任务也至关重要。针对这一问题的组成部分，我们将完全协作环境下的信息收集过程形式化为一个尚未被充分探索的多智能体多任务具身问答 (MM-EQA) 问题。这是对标准具身问答 (EQA) 的一种新颖扩展，其中有效的通信对于协调行动并避免冗余至关重要。为了解决这一问题，我们提出了 CommCP，这是一种专为 MM-EQA 设计的新型基于大语言模型 (LLM) 的去中心化通信框架。我们的框架采用共形预测来校准生成的消息，从而减少对接收者的干扰并提高通信可靠性。为了评估我们的框架，我们引入了一个 MM-EQA 基准，其中包含多样化的照片级逼真家庭场景及具身问题。实验结果表明，与基线模型相比，CommCP 显著提高了任务成功率和探索效率。实验视频、代码和数据集可在我们的项目网站上获取：https://comm-cp.github.io。"

                    "summary": "Memory is increasingly central to Large Language Model (LLM) agents operating beyond a single context window, yet most existing systems rely on offline, query-agnostic memory construction that can be inefficient and may discard query-critical information. Although runtime memory utilization is a natural alternative, prior work often incurs substantial overhead and offers limited explicit control over the performance-cost trade-off. In this work, we present \\textbf{BudgetMem}, a runtime agent memory framework for explicit, query-aware performance-cost control. BudgetMem structures memory processing as a set of memory modules, each offered in three budget tiers (i.e., \\textsc{Low}/\\textsc{Mid}/\\textsc{High}). A lightweight router performs budget-tier routing across modules to balance task performance and memory construction cost, which is implemented as a compact neural policy trained with reinforcement learning. Using BudgetMem as a unified testbed, we study three complementary strategies for realizing budget tiers: implementation (method complexity), reasoning (inference behavior), and capacity (module model size). Across LoCoMo, LongMemEval, and HotpotQA, BudgetMem surpasses strong baselines when performance is prioritized (i.e., high-budget setting), and delivers better accuracy-cost frontiers under tighter budgets. Moreover, our analysis disentangles the strengths and weaknesses of different tiering strategies, clarifying when each axis delivers the most favorable trade-offs under varying budget regimes.",

                    "summary": "Agentic systems solve complex tasks by coordinating multiple agents that iteratively reason, invoke tools, and exchange intermediate results. To improve robustness and solution quality, recent approaches deploy multiple agent teams running in parallel to explore diverse reasoning trajectories. However, parallel execution comes at a significant computational cost: when different teams independently reason about similar sub-problems or execute analogous steps, they repeatedly perform substantial overlapping computation. To address these limitations, in this paper, we propose Learning to Share (LTS), a learned shared-memory mechanism for parallel agentic frameworks that enables selective cross-team information reuse while controlling context growth. LTS introduces a global memory bank accessible to all teams and a lightweight controller that decides whether intermediate agent steps should be added to memory or not. The controller is trained using stepwise reinforcement learning with usage-aware credit assignment, allowing it to identify information that is globally useful across parallel executions. Experiments on the AssistantBench and GAIA benchmarks show that LTS significantly reduces overall runtime while matching or improving task performance compared to memory-free parallel baselines, demonstrating that learned memory admission is an effective strategy for improving the efficiency of parallel agentic systems. Project page: https://joefioresi718.github.io/LTS_webpage/",

                    "summary": "Recent advancements in Large Language Models (LLMs) have largely focused on depth scaling, where a single agent solves long-horizon problems with multi-turn reasoning and tool use. However, as tasks grow broader, the key bottleneck shifts from individual competence to organizational capability. In this work, we explore a complementary dimension of width scaling with multi-agent systems to address broad information seeking. Existing multi-agent systems often rely on hand-crafted workflows and turn-taking interactions that fail to parallelize work effectively. To bridge this gap, we propose WideSeek-R1, a lead-agent-subagent framework trained via multi-agent reinforcement learning (MARL) to synergize scalable orchestration and parallel execution. By utilizing a shared LLM with isolated contexts and specialized tools, WideSeek-R1 jointly optimizes the lead agent and parallel subagents on a curated dataset of 20k broad information-seeking tasks. Extensive experiments show that WideSeek-R1-4B achieves an item F1 score of 40.0% on the WideSearch benchmark, which is comparable to the performance of single-agent DeepSeek-R1-671B. Furthermore, WideSeek-R1-4B exhibits consistent performance gains as the number of parallel subagents increases, highlighting the effectiveness of width scaling.",

                    "summary_translation": "大语言模型（Large Language Models, LLMs）的最新进展主要集中在深度扩展（depth scaling）上，即单一智能体通过多轮推理（multi-turn reasoning）和工具使用（tool use）来解决长视界（long-horizon）问题。然而，随着任务范围的扩大，关键瓶颈已从个体能力转向组织能力。在这项工作中，我们利用多智能体系统（multi-agent systems）探索了一个互补的宽度扩展（width scaling）维度，以解决广泛的信息搜寻（broad information seeking）问题。现有的多智能体系统通常依赖手工设计的工作流（hand-crafted workflows）和轮流交互（turn-taking interactions），无法有效地实现工作并行化。为了弥合这一差距，我们提出了 WideSeek-R1，这是一个通过多智能体强化学习（multi-agent reinforcement learning, MARL）训练的主智能体-子智能体框架（lead-agent-subagent framework），旨在协同实现可扩展的编排和并行执行。通过利用具有隔离上下文（isolated contexts）和专用工具（specialized tools）的共享大语言模型（shared LLM），WideSeek-R1 在包含 2 万个广泛信息搜寻任务的精选数据集（curated dataset）上，对主智能体和并行子智能体进行了联合优化。大量实验表明，WideSeek-R1-4B 在 WideSearch 基准测试（WideSearch benchmark）上实现了 40.0% 的项目级 F1 分数（item F1 score），这与单智能体 DeepSeek-R1-671B 的性能相当。此外，随着并行子智能体数量的增加，WideSeek-R1-4B 展现出持续的性能提升，凸显了宽度扩展（width scaling）的有效性。"

                    "summary": "Embodied agents operating in multi-agent, partially observable, and decentralized environments must plan and act despite pervasive uncertainty about hidden objects and collaborators' intentions. Recent advances in applying Large Language Models (LLMs) to embodied agents have addressed many long-standing challenges, such as high-level goal decomposition and online adaptation. Yet, uncertainty is still primarily mitigated through frequent inter-agent communication. This incurs substantial token and time costs, and can disrupt established workflows, when human partners are involved. We introduce PCE, a Planner-Composer-Evaluator framework that converts the fragmented assumptions latent in LLM reasoning traces into a structured decision tree. Internal nodes encode environment assumptions and leaves map to actions; each path is then scored by scenario likelihood, goal-directed gain, and execution cost to guide rational action selection without heavy communication. Across two challenging multi-agent benchmarks (C-WAH and TDW-MAT) and three diverse LLM backbones, PCE consistently outperforms communication-centric baselines in success rate and task efficiency while showing comparable token usage. Ablation results indicate that the performance gains obtained by scaling model capacity or reasoning depth persist even when PCE is applied, while PCE consistently raises the baseline across both capacity and reasoning-depth scales, confirming that structured uncertainty handling complements both forms of scaling. A user study further demonstrates that PCE produces communication patterns that human partners perceive as more efficient and trustworthy. Together, these results establish a principled route for turning latent LLM assumptions into reliable strategies for uncertainty-aware planning.",

63d0\u51fa\u4e86\u4e25\u8083\u8d28\u7591\u3002\n\n---\n\n### \u4e8c\u3001\u4e3b\u9898\u5206\u7c7b\u4e0e\u8bba\u6587\u901f\u89c8\n\n#### \u4e3b\u9898\u4e00\uff1a\u667a\u80fd\u4f53\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u5f62\u5f0f\u5316\u5b89\u5168\u4fdd\u969c\n\n**\u6838\u5fc3\u8d8b\u52bf**\uff1a\u968f\u7740LLM\u667a\u80fd\u4f53\u5728\u7a0b\u5e8f\u4fee\u590d\u3001\u79d1\u5b66\u53d1\u73b0\u7b49\u4efb\u52a1\u4e2d\u5c55\u73b0\u51fa\u81ea\u4e3b\u5408\u6210\u4ee3\u7801\u7684\u80fd\u529b\uff0c\u5982\u4f55\u4e3a\u5176\u63d0\u4f9b**\u5f62\u5f0f\u5316\u5b89\u5168\u4fdd\u8bc1**\u6210\u4e3a\u6838\u5fc3\u6311\u6218\u3002\u672c\u4e3b\u9898\u4e0b\u7684\u7814\u7a76\u4ece\u9a8c\u8bc1\u3001\u5de5\u5177\u8c03\u7528\u4f18\u5316\u3001\u7ecf\u9a8c\u5b66\u4e60\u4e09\u4e2a\u7ef4\u5ea6\u7ed9\u51fa\u4e86\u4e0d\u540c\u8def\u5f84\u3002\n\n- **SEVerA: Verified Synthesis of Self-Evolving Agents** \u2014 \u9996\u6b21\u5c06\u5f62\u5f0f\u5316\u9a8c\u8bc1\u5f15\u5165\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u5408\u6210\u3002\u5c06\u667a\u80fd\u4f53\u4ee3\u7801\u751f\u6210\u5efa\u6a21\u4e3a\u7ed3\u5408\u786c\u6027\u5f62\u5f0f\u5316\u89c4\u8303\u4e0e\u8f6f\u6027\u4efb\u52a1\u76ee\u6807\u7684\u7ea6\u675f\u5b66\u4e60\u95ee\u9898\u3002\u63d0\u51fa**Formally Guarded Generative Models (FGGM)**\uff0c\u901a\u8fc7\u62d2\u7edd\u91c7\u6837\u4e0e\u9a8c\u8bc1\u56de\u9000\u673a\u5236\u786e\u4fdd\u6bcf\u4e2a\u751f\u6210\u8f93\u51fa\u6ee1\u8db3\u5408\u7ea6\u3002\u5728Dafny\u7a0b\u5e8f\u9a8c\u8bc1\u3001\u7b26\u53f7\u6570\u5b66\u5408\u6210\u548c\u03c4\u00b2-bench\u7b56\u7565\u5408\u89c4\u5de5\u5177\u4f7f\u7528\u4efb\u52a1\u4e2d\uff0c\u5b9e\u73b0\u4e86**\u96f6\u7ea6\u675f\u8fdd\u89c4**\u540c\u65f6\u8d85\u8d8a\u57fa\u7ebf\u6027\u80fd\u3002(2603.25111 [cs.LG])\n\n- **Training LLMs for Multi-Step Tool Orchestration with Constrained Data Synthesis and Graduated Rewards** \u2014 \u9488\u5bf9\u591a\u6b65\u5de5\u5177\u7f16\u6392\u4e2d\u53c2\u6570\u503c\u9519\u8bef\u9891\u53d1\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u57fa\u4e8e\u5927\u89c4\u6a21\u771f\u5b9eAPI\u54cd\u5e94\u7f13\u5b58\u7684\u6570\u636e\u5408\u6210\u7ba1\u9053\uff0c\u5e76\u8bbe\u8ba1\u4e86**\u6e10\u8fdb\u5f0f\u5956\u52b1\u673a\u5236**\uff1a\u5c06\u6b63\u786e\u6027\u5206\u89e3\u4e3a\u539f\u5b50\u6709\u6548\u6027\uff08\u9012\u589e\u7c92\u5ea6\u7684\u5355\u6b65\u51fd\u6570\u8c03\u7528\u6b63\u786e\u6027\uff09\u548c\u7f16\u6392\u6b63\u786e\u6027\uff08\u5de5\u5177\u5e8f\u5217\u4e0e\u4f9d\u8d56\u5173\u7cfb\uff09\u3002\u5728ComplexFuncBench\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u56de\u5408\u51c6\u786e\u7387\uff0c\u6d88\u878d\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u4e24\u7c7b\u5956\u52b1\u7684\u5fc5\u8981\u6027\u3002(2603.24709 [cs.LG])\n\n- **Experiential Reflective Learning for Self-Improving LLM Agents** \u2014 \u63d0\u51fa**Experiential Reflective Learning (ERL)**\u6846\u67b6\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u591f\u901a\u8fc7\u53cd\u601d\u4efb\u52a1\u8f68\u8ff9\u751f\u6210\u53ef\u8fc1\u79fb\u7684\u542f\u53d1\u5f0f\u89c4\u5219\u3002\u5728Gaia2\u57fa\u51c6\u4e0a\u76f8\u6bd4ReAct\u57fa\u7ebf\u63d0\u5347**7.8%\u6210\u529f\u7387**\uff0c\u4e14\u4f18\u4e8e\u5148\u524d\u7ecf\u9a8c\u5b66\u4e60\u65b9\u6cd5\u3002\u9009\u62e9\u6027\u68c0\u7d22\u662f\u5173\u952e\u2014\u2014\u542f\u53d1\u5f0f\u89c4\u5219\u6bd4\u5c11\u6837\u672c\u8f68\u8ff9\u63d0\u793a\u63d0\u4f9b\u66f4\u53ef\u8fc1\u79fb\u7684\u62bd\u8c61\u3002(2603.24639 [cs.LG])\n\n- **Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills** \u2014 \u63d0\u51fa\u4ece\u667a\u80fd\u4f53\u6267\u884c\u7ecf\u9a8c\u4e2d\u63d0\u53d6\u53ef\u590d\u7528\u6280\u80fd\u7684\u6846\u67b6\u3002\u4e0d\u540c\u4e8e\u987a\u5e8f\u5904\u7406\u5355\u6761\u8f68\u8ff9\uff0cTrace2Skill\u5e76\u884c\u8c03\u5ea6\u5b50\u4ee3\u7406\u5206\u6790\u591a\u6837\u5316\u6267\u884c\u6c60\uff0c\u901a\u8fc7\u5f52\u7eb3\u63a8\u7406\u5c06\u8f68\u8ff9\u7279\u5b9a\u6559\u8bad\u5c42\u6b21\u5316\u6574\u5408\u4e3a\u7edf\u4e00\u3001\u65e0\u51b2\u7a81\u7684\u6280\u80fd\u76ee\u5f55\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8fdb\u5316\u540e\u7684\u6280\u80fd\u53ef\u8de8LLM\u89c4\u6a21\u8fc1\u79fb\uff1aQwen3.5-35B\u884d\u751f\u7684\u6280\u80fd\u53ef\u4e3aQwen3.5-122B\u5e26\u6765**57.65\u4e2a\u767e\u5206\u70b9\u7684\u7edd\u5bf9\u63d0\u5347**\uff0c\u4e14\u65e0\u9700\u53c2\u6570\u66f4\u65b0\u6216\u5916\u90e8\u68c0\u7d22\u6a21\u5757\u3002(2603.25158 [cs.AI])\n\n---\n\n#### \u4e3b\u9898\u4e8c\uff1a\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u5236\u5ea6\u57fa\u7840\u8bbe\u65bd\n\n**\u6838\u5fc3\u8d8b\u52bf**\uff1a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u7814\u7a76\u6b63\u4ece\u7b80\u5355\u7684\u901a\u4fe1\u534f\u8bae\u8fc8\u5411\u6df1\u5c42\u7684**\u5236\u5ea6\u8bbe\u8ba1**\u2014\u2014\u5982\u4f55\u901a\u8fc7\u6743\u529b\u5206\u7acb\u3001\u4fe1\u5ff5\u66f4\u65b0\u673a\u5236\u548c\u793e\u4f1a\u5951\u7ea6\u6765\u6cbb\u7406\u667a\u80fd\u4f53\u884c\u4e3a\uff0c\u6210\u4e3a\u7406\u89e3\u5927\u89c4\u6a21\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u5173\u952e\u3002\n\n- **From Logic Monopoly to Social Contract: Separation of Power and the Institutional Foundations for Autonomous Agent Economies** \u2014 \u6df1\u523b\u6279\u5224\u73b0\u6709\u6846\u67b6\u4e2d\u6bcf\u4e2a\u667a\u80fd\u4f53\u540c\u65f6\u627f\u62c5\u8ba1\u5212\u3001\u6267\u884c\u3001\u8bc4\u4f30\u804c\u80fd\u7684\u201c\u903b\u8f91\u5784\u65ad\u201d\u7ed3\u6784\u3002\u91cf\u5316\u63ed\u793a\u4e86\u4e25\u91cd\u7684**\u53ef\u9760\u6027\u7f3a\u53e3**\uff1a\u5e73\u574784.30%\u7684\u653b\u51fb\u6210\u529f\u7387\u300131.4%\u7684 emergent \u6b3a\u9a97\u884c\u4e3a\uff08\u65e0\u663e\u5f0f\u5956\u52b1\u4fe1\u53f7\uff09\u3002\u63d0\u51fa**Agent Enterprise for Enterprise (AE4E)**\u8303\u5f0f\u2014\u2014\u667a\u80fd\u4f53\u4f5c\u4e3a\u5177\u6709\u6cd5\u5f8b\u8eab\u4efd\u7684\u5546\u4e1a\u5b9e\u4f53\uff0c\u901a\u8fc7**\u6743\u529b\u5206\u7acb**\uff08\u7acb\u6cd5\u3001\u6267\u884c\u3001\u5ba1\u5224\u4e09\u6743\u5206\u7acb\uff09\u5b9e\u73b0\u6cbb\u7406\u3002\u5f15\u5165NetX Enterprise Framework\uff0c\u5305\u542b\u6cbb\u7406\u4e2d\u5fc3\u3001TEE\u5b89\u5168\u98de\u5730\u3001\u9690\u79c1\u6570\u636e\u6865\u548c\u667a\u80fd\u4f53\u539f\u751f\u533a\u5757\u94fe\u5e95\u5c42\u3002143\u9875\u957f\u6587\uff0c\u6784\u5efa\u4e8660\u4f59\u4e2a\u5236\u5ea6\u5316AE4E\u7684\u5b8c\u6574\u751f\u6001\u3002(2603.25100 [cs.AI])\n\n- **CRAFT: Grounded Multi-Agent Coordination Under Partial Information** \u2014 \u63d0\u51fa\u4e25\u683c\u90e8\u5206\u4fe1\u606f\u4e0b\u7684\u591a\u667a\u80fd\u4f53\u534f\u8c03\u57fa\u51c6\u3002\u591a\u4e2a\u667a\u80fd\u4f53\u9700\u901a\u8fc7\u81ea\u7136\u8bed\u8a00\u534f\u8c03\u6784\u5efa\u5171\u4eab3D\u7ed3\u6784\uff0c\u4efb\u4f55\u5355\u667a\u80fd\u4f53\u90fd\u65e0\u6cd5\u5b8c\u6574\u89c2\u5bdf\u3002\u5c06\u95ee\u9898\u5f62\u5f0f\u5316\u4e3a\u591a\u53d1\u9001\u8005\u5b9e\u7528\u63a8\u7406\u4efb\u52a1\uff0c\u5e76\u63d0\u4f9b\u8bca\u65ad\u6846\u67b6\u5206\u89e3\u5931\u8d25\u4e3a\u7a7a\u95f4\u951a\u5b9a\u3001\u4fe1\u5ff5\u5efa\u6a21\u548c\u5b9e\u7528\u901a\u4fe1\u9519\u8bef\u3002\u8de88\u4e2a\u5f00\u6e90\u6a21\u578b\u548c7\u4e2a\u524d\u6cbf\u6a21\u578b\uff08\u5305\u62ec\u63a8\u7406\u6a21\u578b\uff09\u7684\u6d4b\u8bd5\u63ed\u793a\u4e86\u4e00\u4e2a\u53cd\u76f4\u89c9\u53d1\u73b0\uff1a**\u66f4\u5f3a\u7684\u63a8\u7406\u80fd\u529b\u5e76\u4e0d\u80fd\u53ef\u9760\u8f6c\u5316\u4e3a\u66f4\u597d\u7684\u534f\u8c03\u8868\u73b0**\uff0c\u5c0f\u578b\u5f00\u6e90\u6a21\u578b\u5e38\u5339\u654c\u6216\u8d85\u8d8a\u524d\u6cbf\u7cfb\u7edf\u3002(2603.25268 [cs.AI])\n\n- **Belief-Driven Multi-Agent Collaboration via Approximate Perfect Bayesian Equilibrium for Social Simulation** \u2014 \u9488\u5bf9\u5f53\u524dLLM\u591a\u667a\u80fd\u4f53\u6846\u67b6\u91c7\u7528\u9759\u6001\u4ea4\u4e92\u62d3\u6251\u3001\u65e0\u6cd5\u6355\u6349\u771f\u5b9e\u4e16\u754c\u4e2d\u5408\u4f5c\u4e0e\u7ade\u4e89\u52a8\u6001\u5207\u6362\u7684\u95ee\u9898\uff0c\u63d0\u51fa**BEACOF**\u6846\u67b6\u3002\u7075\u611f\u6765\u81ea\u5b8c\u7f8e\u8d1d\u53f6\u65af\u5747\u8861(PBE)\uff0c\u5c06\u793e\u4f1a\u4ea4\u4e92\u5efa\u6a21\u4e3a\u4e0d\u5b8c\u5168\u4fe1\u606f\u52a8\u6001\u535a\u5f08\u3002\u667a\u80fd\u4f53\u8fed\u4ee3\u66f4\u65b0\u5bf9\u540c\u4f34\u80fd\u529b\u7684\u6982\u7387\u4fe1\u5ff5\uff0c\u81ea\u4e3b\u8c03\u8282\u534f\u4f5c\u7b56\u7565\u3002\u5728\u5bf9\u6297\u6027\uff08\u53f8\u6cd5\uff09\u3001\u5f00\u653e\u6027\uff08\u793e\u4ea4\uff09\u548c\u6df7\u5408\uff08\u533b\u7597\uff09\u573a\u666f\u4e2d\u9a8c\u8bc1\uff0c\u9632\u6b62\u534f\u8c03\u5931\u8d25\u5e76\u4fc3\u8fdb\u9ad8\u8d28\u91cf\u65b9\u6848\u6536\u655b\u3002(2603.24973 [cs.MA])\n\n---\n\n#### \u4e3b\u9898\u4e09\uff1a\u667a\u80fd\u4f53\u5728\u5de5\u7a0b\u8bbe\u8ba1\u4e0e\u4ee3\u7801\u751f\u6210\u4e2d\u7684\u5177\u4f53\u5e94\u7528\n\n- **Supervising Ralph Wiggum: Exploring a Metacognitive Co-Regulation Agentic AI Loop for Engineering Design** \u2014 \u9488\u5bf9LLM\u8bbe\u8ba1\u667a\u80fd\u4f53\u5bb9\u6613\u201c\u56fa\u5b88\u73b0\u6709\u8303\u5f0f\u201d\u800c\u5ffd\u89c6\u63a2\u7d22\u66ff\u4ee3\u65b9\u6848\u7684\u201c\u8bbe\u8ba1\u56fa\u7740\u201d\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u67b6\u6784\uff1a(1) **\u81ea\u8c03\u8282\u5faa\u73af(SRL)**\u2014\u2014\u8bbe\u8ba1\u667a\u80fd\u4f53\u81ea\u6211\u76d1\u63a7\u5143\u8ba4\u77e5\uff1b(2) **\u5171\u8c03\u8282\u8bbe\u8ba1\u667a\u80fd\u4f53\u5faa\u73af(CRDAL)**\u2014\u2014\u5f15\u5165\u5143\u8ba4\u77e5\u5171\u8c03\u8282\u667a\u80fd\u4f53\u534f\u52a9\u76d1\u63a7\u3002\u5728\u7535\u6c60\u7ec4\u8bbe\u8ba1\u95ee\u9898\u4e2d\uff0cCRDAL\u751f\u6210\u7684\u8bbe\u8ba1\u6027\u80fd\u66f4\u4f18\uff0c\u4e14\u6bd4SRL\u548c\u57fa\u7840Ralph Wiggum\u5faa\u73af\u66f4\u6709\u6548\u5730\u63a2\u7d22\u6f5c\u5728\u8bbe\u8ba1\u7a7a\u95f4\u3002(2603.24768 [cs.AI])\n\n- **The Kitchen Loop: User-Spec-Driven Development for a Self-Evolving Codebase** \u2014 \u63d0\u51fa\u81ea\u4e3b\u3001\u81ea\u8fdb\u5316\u8f6f\u4ef6\u7684\u6846\u67b6\uff0c\u5efa\u7acb\u4e8e\u7edf\u4e00\u4fe1\u4efb\u6a21\u578b\u4e4b\u4e0a\uff1a\u89c4\u8303\u8868\u9762\u679a\u4e3e\u4ea7\u54c1\u58f0\u79f0\u652f\u6301\u7684\u529f\u80fd\uff1b\u201cAs a User x 1000\u201d\u2014\u2014LLM\u667a\u80fd\u4f53\u4e     "2026-02-05": "### \u4eca\u65e5AI\u8bba\u6587\u901f\u89c8 (2026-02-05)\n\n\u4eca\u5929\u7684\u8bba\u6587\u96c6\u63ed\u793a\u4e86AI\u667a\u80fd\u4f53\u7814\u7a76\u6b63\u4ece\u5355\u4e00\u6a21\u578b\u7684\u201c\u72ec\u89d2\u620f\u201d\u8fc8\u5411\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u81ea\u6211\u8fdb\u5316\u7684\u201c\u751f\u6001\u7cfb\u7edf\u201d\u3002\u6838\u5fc3\u8d8b\u52bf\u663e\u793a\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u81f4\u529b\u4e8e\u89e3\u51b3\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u901a\u4fe1\u6548\u7387\u4e0e\u52a8\u6001\u534f\u8c03\u95ee\u9898\uff0c\u540c\u65f6\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u548c\u5143\u5f3a\u5316\u5b66\u4e60\u8d4b\u4e88\u667a\u80fd\u4f53\u6301\u7eed\u81ea\u6211\u6539\u8fdb\u7684\u80fd\u529b\u3002\u6b64\u5916\uff0c\u4e3a\u4e86\u514b\u670d\u5927\u6a21\u578b\u56fa\u6709\u7684\u968f\u673a\u6027\u548c\u4e0d\u53ef\u63a7\u6027\uff0c\u5f15\u5165\u6709\u9650\u72b6\u6001\u673a\uff08FSM\uff09\u548c\u51b3\u7b56\u6811\u7b49\u663e\u5f0f\u7ed3\u6784\u5316\u63a7\u5236\u673a\u5236\u6210\u4e3a\u4e86\u65b0\u7684\u6280\u672f\u70ed\u70b9\u3002\n\n---\n\n### \u591a\u667a\u80fd\u4f53\u534f\u540c\uff1a\u4ece\u9759\u6001\u62d3\u6251\u5230\u52a8\u6001\u535a\u5f08\n\n\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u7684\u7814\u7a76\u91cd\u70b9\u6b63\u4ece\u56fa\u5b9a\u7684\u901a\u4fe1\u6a21\u5f0f\u8f6c\u5411\u57fa\u4e8e\u8bed\u4e49\u7684\u52a8\u6001\u8def\u7531\u4e0e\u535a\u5f08\u8c08\u5224\uff0c\u65e8\u5728\u63d0\u5347\u590d\u6742\u4efb\u52a1\u4e2d\u7684\u534f\u4f5c\u6548\u7387\u4e0e\u7ecf\u6d4e\u4ea4\u4e92\u80fd\u529b\u3002\n\n*   **DyTopo** \u63d0\u51fa\u4e86\u4e00\u79cd\u7531\u7ba1\u7406\u8005\u5f15\u5bfc\u7684\u52a8\u6001\u62d3\u6251\u8def\u7531\u6846\u67b6\uff0c\u901a\u8fc7\u8bed\u4e49\u5339\u914d\u5728\u6bcf\u4e2a\u63a8\u7406\u8f6e\u6b21\u91cd\u6784\u7a00\u758f\u6709\u5411\u901a\u4fe1\u56fe\uff0c\u4ec5\u5728\u76f8\u5173\u667a\u80fd\u4f53\u95f4\u4f20\u9012\u6d88\u606f\uff0c\u4ece\u800c\u5728\u4ee3\u7801\u751f\u6210\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e2d\u663e\u8457\u4f18\u4e8e\u56fa\u5b9a\u62d3\u6251\u7684\u57fa\u7ebf\u6a21\u578b\u3002(2602.06039 [cs.AI])\n*   **AgenticPay** \u662f\u4e00\u4e2a\u4e13\u6ce8\u4e8e\u4e70\u5356\u53cc\u65b9\u591a\u8f6e\u8bed\u8a00\u8c08\u5224\u7684\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u5b83\u6a21\u62df\u4e86\u62e5\u6709\u79c1\u6709\u7ea6\u675f\u548c\u4f30\u503c\u7684\u590d\u6742\u5e02\u573a\u73af\u5883\uff0c\u586b\u8865\u4e86\u8bc4\u4f30\u57fa\u4e8e\u8bed\u8a00\u7684\u7ecf\u6d4e\u4ea4\u4e92\u548c\u591a\u667a\u80fd\u4f53\u6218\u7565\u63a8\u7406\u80fd\u529b\u7684\u7a7a\u767d\u3002(2602.06008 [cs.AI])\n*   **WideSeek-R1** \u63a2\u7d22\u4e86\u201c\u5bbd\u5ea6\u6269\u5c55\u201d\u8fd9\u4e00\u65b0\u7ef4\u5ea6\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e3b\u667a\u80fd\u4f53\u4e0e\u5e76\u884c\u5b50\u667a\u80fd\u4f53\u534f\u540c\u5de5\u4f5c\uff0c\u8bc1\u660e\u4e86\u5728\u5e7f\u5ea6\u4fe1\u606f\u68c0\u7d22\u4efb\u52a1\u4e2d\uff0c4B\u53c2\u6570\u7684\u5e76\u884c\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u53ef\u5ab2\u7f8e671B\u53c2\u6570\u7684\u5355\u667a\u80fd\u4f53\u7cfb\u7edf\u3002(2602.04634 [cs.AI])\n*   **SPEAR** \u5c55\u793a\u4e86\u4e00\u4e2a\u5c06\u667a\u80fd\u5408\u7ea6\u5ba1\u8ba1\u89c6\u4e3a\u534f\u8c03\u4efb\u52a1\u7684\u591a\u667a\u80fd\u4f53\u5de5\u7a0b\u6848\u4f8b\uff0c\u5e94\u7528\u4e86\u5408\u540c\u7f51\u534f\u8bae\u548c\u62cd\u5356\u534f\u8bae\u7b49\u7ecf\u5178MAS\u6a21\u5f0f\uff0c\u5b9e\u73b0\u4e86\u5728\u98ce\u9669\u611f\u77e5\u542f\u53d1\u5f0f\u4e0b\u7684\u4efb\u52a1\u5206\u914d\u4e0e\u81ea\u4e3b\u4fee\u590d\u3002(2602.04418 [cs.AI])\n*   **AgentArk** \u63d0\u51fa\u4e86\u4e00\u79cd\u5206\u5c42\u84b8\u998f\u7b56\u7565\uff0c\u5c06\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u52a8\u6001\u4ea4\u4e92\u8fc7\u7a0b\u84b8\u998f\u5230\u5355\u4e2a\u6a21\u578b\u7684\u6743\u91cd\u4e2d\uff0c\u65e8\u5728\u4fdd\u7559\u591a\u667a\u80fd\u4f53\u63a8\u7406\u4f18\u52bf\u7684\u540c\u65f6\uff0c\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u9636\u6bb5\u7684\u8ba1\u7b97\u6210\u672c\u548c\u9519\u8bef\u4f20\u64ad\u98ce\u9669\u3002(2602.03955 [cs.AI])\n*   **On the Uncertainty of LLM-based MAS** \u4ece\u71b5\u7684\u89d2\u5ea6\u6df1\u5165\u5206\u6790\u4e86\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u53d1\u73b0\u5355\u667a\u80fd\u4f53\u5728\u7ea643.3%\u7684\u60c5\u51b5\u4e0b\u8868\u73b0\u4f18\u4e8e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u4e14\u4e0d\u786e\u5b9a\u6027\u4e3b\u8981\u5728\u7b2c\u4e00\u8f6e\u4ea4\u4e92\u4e2d\u51b3\u5b9a\uff0c\u63d0\u51fa\u4e86\u57fa\u4e8e\u71b5\u5224\u636e\u7684\u7b80\u5355\u7b97\u6cd5\u6765\u63d0\u5347\u89e3\u7684\u9009\u62e9\u8d28\u91cf\u3002(2602.04234 [cs.MA])\n\n### \u667a\u80fd\u4f53\u8fdb\u5316\uff1a\u6253\u7834\u9884\u8bad\u7ec3\u7684\u8fb9\u754c\n\n\u5982\u4f55\u8ba9\u667a\u80fd\u4f53\u50cf\u4eba\u7c7b\u4e00\u6837\u901a\u8fc7\u7ecf\u9a8c\u79ef\u7d2f\u5b9e\u73b0\u201c\u7ec8\u8eab\u5b66\u4e60\u201d\u548c\u201c\u81ea\u6211\u8fdb\u5316\u201d\uff0c\u662f\u4eca\u65e5\u7814\u7a76\u7684\u53e6\u4e00\u5927\u7126\u70b9\uff0c\u91cd\u70b9\u5728\u4e8e\u8de8\u60c5\u8282\u7684\u77e5\u8bc6\u5185\u5316\u4e0e\u7ecf\u9a8c\u5171\u4eab\u3002\n\n*   **Group-Evolving Agents (GEA)** \u5f15\u5165\u4e86\u4e00\u79cd\u4ee5\u667a\u80fd\u4f53\u7fa4\u4e3a\u57fa\u672c\u8fdb\u5316\u5355\u5143\u7684\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u663e\u5f0f\u7684\u7ecf\u9a8c\u5171\u4eab\u548c\u91cd\u7528\u673a\u5236\uff0c\u514b\u670d\u4e86\u4f20\u7edf\u6811\u72b6\u8fdb\u5316\u5206\u652f\u63a2\u7d22\u6548\u7387\u4f4e\u7684\u95ee\u9898\uff0c\u5728SWE-bench Verified\u7b49\u7f16\u7801\u57fa\u51c6\u4e0a\u663e\u8457\u8d85\u8d8a\u4e86\u73b0\u6709\u7684\u81ea\u6211\u8fdb\u5316\u65b9\u6cd5\u3002(2602.04837 [cs.AI])\n*   **Empirical-MCTS** \u63d0\u51fa\u4e86\u4e00\u4e2a\u53cc\u91cd\u5faa\u73af\u6846\u67b6\uff0c\u901a\u8fc7\u6210\u5bf9\u7ecf\u9a8c\u8fdb\u5316\u5143\u63d0\u793a\uff08PE-EMP\uff09\u548c\u8bb0\u5fc6\u4f18\u5316\u667a\u80fd\u4f53\uff0c\u5c06\u65e0\u72b6\u6001\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\u8f6c\u5316\u4e3a\u6301\u7eed\u7684\u975e\u53c2\u6570\u5b66\u4e60\u8fc7\u7a0b\uff0c\u5b9e\u73b0\u4e86\u63a8\u7406\u6a21\u5f0f\u7684\u8de8\u95ee\u9898\u79ef\u7d2f\u4e0e\u590d\u7528\u3002(2602.04248 [cs.AI])\n*   **ORBIT** \u662f\u4e00\u4e2a\u591a\u4efb\u52a1\u3001\u591a\u60c5\u8282\u7684\u5143\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u4e13\u95e8\u7528\u4e8e\u8bad\u7ec3\u5927\u6a21\u578b\u5728\u4e0a\u4e0b\u6587\u4e2d\u4ece\u4ea4\u4e92\u4e2d\u5b66\u4e60\uff0c\u8bc1\u660e\u4e86\u7ecf\u8fc7\u5143\u8bad\u7ec3\u7684\u5f00\u6e90\u6a21\u578b\u5728\u672a\u89c1\u8fc7\u7684\u5728\u7ebf\u73af\u5883\u4e2d\u5177\u5907\u5f3a\u5927\u7684\u4e0a\u4e0b\u6587\u5728\u7ebf\u5b66\u4e60\u80fd\u529b\uff0c\u751a\u81f3\u80fd\u5339\u654cGPT-5.2\u3002(2602.04089 [cs.AI])\n*   **SE-Bench** \u63d0\u51fa\u4e86\u4e00\u4e2a\u8bca\u65ad\u73af\u5883\u6765\u4e25\u683c\u8861\u91cf\u667a\u80fd\u4f53\u7684\u81ea\u6211\u8fdb\u5316\u4e0e\u77e5\u8bc6\u5185\u5316\u80fd\u529b\uff0c\u63ed\u793a\u4e86\u201c\u5f00\u4e66\u6096\u8bba\u201d\uff08\u6709\u6587\u6863\u8bad\u7ec3\u53cd\u800c\u6291\u5236\u8bb0\u5fc6\uff09\u548c\u6807\u51c6RL\u5728\u77e5\u8bc6\u5185\u5316\u4e0a\u7684\u5c40\u9650\u6027\uff0c\u9a8c\u8bc1\u4e86\u81ea\u535a\u5f08\u7ed3\u5408SFT\u7684\u6709\u6548\u6027\u3002(2602.04811 [cs.AI])\n\n### \u63a8\u7406\u4e0e\u89c4\u5212\uff1a\u9a7e\u9a6d\u4e0d\u786e\u5b9a\u6027\u7684\u827a\u672f\n\n\u5728\u79d1\u5b66\u63a8\u7406\u3001\u6570\u5b66\u6c42\u89e3\u548c\u5177\u8eab\u667a\u80fd\u7b49\u9ad8\u96be\u5ea6\u9886\u57df\uff0c\u7814\u7a76\u8005\u4eec\u6b63\u8bd5\u56fe\u901a\u8fc7\u7f6e\u4fe1\u5ea6\u63a7\u5236\u3001\u663e\u5f0f\u89c4\u5212\u548c\u6267\u884c\u53cd\u9988\u6765\u63d0\u5347\u6a21\u578b\u7684\u53ef\u9760\u6027\u3002\n\n*   **ReThinker** \u63d0\u51fa\u4e86\u4e00\u4e2a\u7f6e\u4fe1\u5ea6\u611f\u77e5\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u91c7\u7528\u6c42\u89e3\u5668-\u6279\u8bc4\u8005-\u9009\u62e9\u5668\u67b6\u6784\uff0c\u6839\u636e\u6a21\u578b\u7f6e\u4fe1\u5ea6\u52a8\u6001\u5206\u914d\u8ba1\u7b97\u8d44\u6e90\uff0c\u7ed3\u5408\u9006\u5411\u6570\u636e\u5408\u6210\u7b56\u7565\uff0c\u5728Humanity's Last Exam (HLE) \u7b49\u4e13\u5bb6\u7ea7\u63a8\u7406\u57fa\u51c6\u4e0a\u53d6\u5f97\u4e86SOTA\u3002(2602.04496 [cs.AI])\n*   **PCE (Planner-Composer-Evaluator)** \u5c06\u5927\u6a21\u578b\u63a8\u7406\u4e2d\u7684\u6f5c\u5728\u5047\u8bbe\u8f6c\u5316\u4e3a\u7ed3\u6784\u5316\u51b3\u7b56\u6811\uff0c\u901a\u8fc7\u8bc4\u4f30\u573a\u666f\u53ef\u80fd\u6027\u3001\u76ee\u6807\u6536\u76ca\u548c\u6267\u884c\u6210\u672c\u6765\u6307\u5bfc\u884c\u52a8\uff0c\u4f7f\u5177\u8eab\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u73af\u5883\u4e2d\u65e0\u9700\u9891\u7e41\u901a\u4fe1\u5373\u53ef\u5b9e\u73b0\u9ad8\u6548\u7684\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u89c4\u5212\u3002(2602.04326 [cs.AI])\n*   **Active Epistemic Control (AEC)** \u5f15\u5165\u4e86\u4e00\u4e2a\u8ba4\u77e5-\u5206\u7c7b\u89c4\u5212\u5c42\uff0c\u4e25\u683c\u533a\u5206\u7528\u4e8e\u627f\u8bfa\u7684\u201c\u843d\u5730\u4e8b\u5b9e\u5e93\u201d\u548c\u7528\u4e8e\u526a\u679d\u7684\u201c\u4fe1\u5ff5\u5e93\u201d\uff0c\u901a\u8fc7\u4e3b\u52a8\u67e5\u8be2\u6216\u6a21\u62df\u6765\u5904\u7406\u672a\u77e5\u524d\u63d0\uff0c\u5728ALFWorld\u7b49\u4efb\u52a1\u4e2d\u5b9e\u73b0\u4e86\u66f4\u5c11\u7684\u91cd\u89c4\u5212\u8f6e\u6b21\u3002(2602.03974 [cs.AI])\n*   **Agentic Verifier** \u9488\u5bf9\u7ade\u6280\u7f16\u7a0b\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e86\u4e00\u4e2a\u57fa\u4e8e\u6267\u884c\u7684\u667a\u80fd\u4f53\u9a8c\u8bc1\u5668\uff0c\u80fd\u591f\u4e3b\u52a8\u63a8\u7406\u7a0b\u5e8f\u884c\u4e3a\u5e76\u751f\u6210\u5177\u6709\u9ad8\u533a\u5206\u5ea6\u7684\u6d4b\u8bd5\u7528\u4f8b\uff08\u53cd\u4f8b\uff09\uff0c\u901a\u8fc7\u591a\u8f6e\u4ea4\u4e92\u8fed\u4ee3\u4f18\u5316\u8f93\u5165\u751f\u6210\uff0c\u663e\u8457\u63d0\u5347\u4e86Best@K\u51c6\u786e\u7387\u3002(2602.04254 [cs.CL])\n*   **IIPC (Iteratively Improved Program Construction)** \u9488\u5bf9\u6570\u5b66\u95ee\u9898\u6c42\u89e3\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u8fed\u4ee3\u6539\u8fdb\u7a0b\u5e8f\u6784\u5efa\u7684\u65b9\u6cd5\uff0c\u7ed3\u5408\u6267\u884c\u53cd\u9988\u4e0e\u539f\u751f\u601d\u7ef4\u94fe\u80fd\u529b\uff0c\u89e3\u51b3\u4e86\u7a0b\u5e8f\u4e0a\u4e0b\u6587\u5206\u6563\u6a21\u578b\u6ce8\u610f\u529b\u7684\u95ee\u9898\uff0c\u5728\u591a\u4e2a\u63a8\u7406\u57fa\u51c6\u4e0a\u8d85\u8d8a\u4e86\u73b0\u6709\u65b9\u6cd5\u3002(2602.03950 [cs.AI])\n\n### \u8bb0\u5fc6\u4e0e\u72b6\u6001\uff1a\u6784\u5efa\u66f4\u53ef\u63a7\u7684\u667a\u80fd\u4f53\n\n\u4e3a\u4e86\u89e3\u51b3\u957f\u4e0a\u4e0b\u6587\u4efb\u52a1\u4e2d\u7684\u8bb0\u5fc6\u6548\u7387\u548c\u89d2\u8272\u4e00\u81f4\u6027\uff0c\u7814\u7a76\u8005\u4eec\u5f00\u59cb\u5f15\u5165\u9884\u7b97\u63a7\u5236\u548c\u6709\u9650\u72b6\u6001\u673a\u7b49\u7ecf\u5178\u8ba1\u7b97\u673a\u79d1\u5b66\u6982\u5ff5\u3002\n\n*   **BudgetMem** \u63d0\u51fa\u4e86\u4e00\u4e2a\u8fd0\u884c\u65f6\u667a\u80fd\u4f53\u8bb0\u5fc6\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u8def\u7531\u5668\u5728\u4e0d\u540c\u9884\u7b97\u5c42\u7ea7\uff08\u4f4e/\u4e2d/\u9ad8\uff09\u95f4\u8fdb\u884c\u5185\u5b58\u6a21\u5757\u8def\u7531\uff0c\u5b9e\u73b0\u4e86\u5728\u6027\u80fd\u4e0e\u6210\u672c\u4e4b\u95f4\u7684\u663e\u5f0f\u63a7\u5236\uff0c\u5e76\u5728\u957f\u8bb0\u5fc6\u8bc4\u4f30\u4efb\u52a1\u4e2d\u5c55\u73b0\u4e86\u66f4\u4f18\u7684\u7cbe\u5ea6-\u6210\u672c\u524d\u6cbf\u3002(2602.06025 [cs.CL])\n*   **Codified Finite-State Machines (CFSMs)** \u91cd\u65b0\u5ba1\u89c6\u4e86\u6709\u9650\u72b6\u6001\u673a\u5728\u89d2\u8272\u626e\u6f14\u4e2d\u7684\u5e94\u7528\uff0c\u5229\u7528LLM\u5c06\u6587\u672c\u89d2\u8272\u6863\u6848\u81ea\u52a8\u7f16\u7801\u4e3aFSM\uff0c\u751a\u81f3\u6269\u5c55\u4e3a\u6982\u7387FSM\uff08CPFSM\uff09\uff0c\u4ece\u800c\u5728\u5f00\u653e\u5f0f\u7684\u8bed\u4e49\u7a7a\u95f4\u4e2d\u5f3a\u5236\u6267\u884c\u89d2\u8272\u72b6\u6001\u7684\u4e00\u81f4\u6027\u3002(2602.05905 [cs.CL])\n*   **Soft-FSM** \u9488\u5bf9\u6cd5\u5f8b\u4ea4\u53c9\u8be2\u95ee\u7b49\u957f\u65f6\u7a0b\u4efb\u52a1\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u795e\u7ecf\u7b26\u53f7\u67b6\             const filters = activeTagFilters[date];
            if (tagName === 'All') {
                filters.clear();
            } else if (filters.has(tagName)) {
                filters.delete(tagName);
            } else {
                filters.add(tagName);
            }
            renderPapers();
        }

        // Check if paper matches active tag filters for its date
        function paperMatchesFilters(paper, date) {
            const filters = activeTagFilters[date];
            if (!filters || filters.size === 0) return true;
            if (filters.has(paper.cluster)) return true;
            return (paper.tags || []).some(tag => filters.has(tag));
        }

        // 加载更多日期的数据
        async function loadMoreDates() {
            if (isLoadingMore) return;

            const unloadedDates = getUnloadedDates();
            if (unloadedDates.length === 0) {
                showSimpleToast('已加载全部数据');
                return;
            }

            isLoadingMore = true;
            const loadBtn = document.getElementById('load-more-btn');
            if (loadBtn) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '<span class="animate-spin inline-block mr-2">⏳</span>加载中...';
            }

            const datesToLoad = unloadedDates.slice(0, LOAD_MORE_DAYS);
            let loadedCount = 0;

            for (const date of datesToLoad) {
                try {
                    const response = await fetch(`data/${date}.json`);
                    if (!response.ok) continue;

                    const dateData = await response.json();

                    // 将数据添加到 allPapers
                    allPapers[date] = dateData.clusters;
                    allPaperTags[date] = dateData.tags;

                    // 添加每日速览
                    if (dateData.overview) {
                        dailyOverviews[date] = dateData.overview;
                    }

                    loadedDates.add(date);
                    loadedCount++;
                } catch (e) {
                    console.error(`加载 ${date} 数据失败:`, e);
                }
            }

            isLoadingMore = false;

            if (loadedCount > 0) {
                renderPapers();
                showSimpleToast(`已加载 ${loadedCount} 天的数据`);
            }

            updateLoadMoreButton();
        }

        // 更新"加载更多"按钮状态
        function updateLoadMoreButton() {
            const loadBtn = document.getElementById('load-more-btn');
            const unloadedCount = getUnloadedDates().length;

            if (loadBtn) {
                if (unloadedCount === 0) {
                    loadBtn.style.display = 'none';
                } else {
                    loadBtn.style.display = 'inline-flex';
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = `📥 加载更多 (还有 ${unloadedCount} 天)`;
                }
            }
        }

        // 从localStorage加载状态
        function loadState() {
            const starred = localStorage.getItem('starred_papers');
            const read = localStorage.getItem('read_papers');
            const deleted = localStorage.getItem('deleted_papers');
            const summaryLang = localStorage.getItem('summary_language');

            if (starred) starredPapers = new Set(JSON.parse(starred));
            if (read) readPapers = new Set(JSON.parse(read));
            if (deleted) deletedPapers = new Set(JSON.parse(deleted));
            if (summaryLang !== null) showChineseSummary = summaryLang === 'chinese';
        }

        // 保存状态到localStorage
        function saveState() {
            localStorage.setItem('starred_papers', JSON.stringify([...starredPapers]));
            localStorage.setItem('read_papers', JSON.stringify([...readPapers]));
            localStorage.setItem('deleted_papers', JSON.stringify([...deletedPapers]));
            localStorage.setItem('summary_language', showChineseSummary ? 'chinese' : 'english');
        }

        // 显示撤销删除的Toast
        function showUndoToast(message, seconds, onUndo, onExpire) {
            const toast = document.getElementById('undo-toast');
            const msgEl = document.getElementById('toast-message');
            const cdEl = document.getElementById('countdown');
            const undoBtn = document.getElementById('undo-btn');

            msgEl.textContent = message;
            let remaining = seconds;
            cdEl.textContent = `(${remaining}s)`;
            toast.classList.remove('hidden');

            let intervalId = setInterval(() => {
                remaining -= 1;
                cdEl.textContent = `(${remaining}s)`;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    toast.classList.add('hidden');
                    try { onExpire && onExpire(); } catch (e) {}
                }
            }, 1000);

            let expireTimer = setTimeout(() => {
                clearInterval(intervalId);
                toast.classList.add('hidden');
                try { onExpire && onExpire(); } catch (e) {}
            }, seconds * 1000);

            const cleanup = () => {
                clearInterval(intervalId);
                clearTimeout(expireTimer);
                toast.classList.add('hidden');
            };

            const onUndoClick = () => {
                cleanup();
                try { onUndo && onUndo(); } catch (e) {}
            };

            undoBtn.removeEventListener('click', onUndoClick);
            undoBtn.addEventListener('click', onUndoClick);
        }

        // 显示简单的提示信息
        function showSimpleToast(message) {
            // 创建一个简单的toast元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300';
            toast.textContent = message;

            document.body.appendChild(toast);

            // 3秒后自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 删除论文
        function deletePaper(arxivId, title) {
            const paperEl = document.querySelector(`[data-arxiv-id="${arxivId}"]`);
            if (!paperEl) return;
            const listItem = paperEl.closest('li');
            const sectionEl = paperEl.closest('section[data-date-section]');

            paperEl.style.transition = 'all 0.3s ease-out';

            setTimeout(() => {

                deletedPapers.add(arxivId);

                if (listItem) {
                    listItem.remove();
                } else {
                    paperEl.remove();
                }

                updateDateSection(sectionEl);

                showSimpleToast(`已删除: ${title}`);

            if (!sectionEl) return;

            if (header) {

        // 可折叠功能
        function toggleCollapsible(header) {
            const content = header.nextElementSibling;
            const isOpen = header.classList.contains('open');

            if (isOpen) {
                header.classList.remove('open');
                content.classList.remove('open');
            } else {
                header.classList.add('open');
                content.classList.add('open');
                // Lazy render: parse markdown only when first opened
                lazyRenderMarkdown(content);
            }

        // Map of element ID -> raw markdown content for lazy rendering
        const mdRawContent = {};

        // Register raw markdown content for lazy rendering
        function registerMarkdown(id, content) {
            if (id && content) mdRawContent[id] = content;
        }

        // Parse markdown for all unrendered .markdown-content elements inside a container
        function lazyRenderMarkdown(container) {
            if (typeof marked === 'undefined') return;
            container.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                const raw = mdRawContent[el.id];
                if (raw) {
                    try {
                        el.innerHTML = marked.parse(raw);
                    } catch (e) {
                        el.textContent = raw;
                    }
                    el.setAttribute('data-rendered', '1');
                }
            });
        }

        // Render markdown only for currently visible (open) sections
        function renderVisibleMarkdown() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
            // Render open collapsible sections
            document.querySelectorAll('.collapsible-content.open').forEach(c => lazyRenderMarkdown(c));
            // Render overview sections (top-level, not inside collapsible)
            document.querySelectorAll('.markdown-content:not([data-rendered])').forEach(el => {
                if (!el.closest('.collapsible-content')) {
                    const raw = mdRawContent[el.id];
                    if (raw) {
                        try { el.innerHTML = marked.parse(raw); } catch (e) { el.textContent = raw; }
                        el.setAttribute('data-rendered', '1');
                    }
                }
            });
        }
